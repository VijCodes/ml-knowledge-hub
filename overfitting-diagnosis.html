<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Overfitting diagnosis — row 4 — fingerprint: overfitting-diagnosis
// Concept explainer + 25 trap-drill problems across ≥4 axes.

// --- Vega-Lite: classic learning curve (red train ↓, blue val ↑ after epoch 20) ---
const LC_SPEC = {
  width: 600, height: 280,
  encoding: {
    x: { field: "epoch", type: "quantitative", title: "Epoch →" },
    y: { field: "loss",  type: "quantitative", title: "Loss" },
    color: { field: "split", type: "nominal",
             scale: { domain: ["Train","Val"], range: ["#dc2626","#2563eb"] } }
  },
  layer: [
    { mark: { type: "line", strokeWidth: 3 } },
    { transform: [{ filter: "datum.epoch === 20 && datum.split === 'Val'" }],
      mark: { type: "rule", color: "#16a34a", strokeDash: [4,3], strokeWidth: 2 },
      encoding: { x: { field: "epoch" } } }
  ]
};
const LC_DATA = (() => {
  const out = [];
  for (let i = 0; i <= 50; i++) {
    out.push({ epoch: i, split: "Train", loss: Math.max(0.04, 1.5 * Math.exp(-i/8)) });
    out.push({ epoch: i, split: "Val",   loss: 1.0 * Math.exp(-i/6) + Math.max(0, (i-20)*0.012) + 0.25 });
  }
  return out;
})();

// --- Vega-Lite: gap-vs-data-size curve (variance shrinks with more data) ---
const DATA_CURVE_SPEC = {
  width: 600, height: 240,
  encoding: {
    x: { field: "n", type: "quantitative", title: "Training-set size (log) →",
         scale: { type: "log" } },
    y: { field: "err", type: "quantitative", title: "Error" },
    color: { field: "split", type: "nominal",
             scale: { domain: ["Train","Val"], range: ["#dc2626","#2563eb"] } }
  },
  mark: { type: "line", strokeWidth: 3 }
};
const DATA_CURVE_DATA = (() => {
  const out = [];
  for (let p = 0; p <= 12; p++) {
    const n = Math.pow(2, p) * 100;
    out.push({ n, split: "Train", err: 0.05 + 0.20 / (1 + p*0.4) });
    out.push({ n, split: "Val",   err: 0.60 / (1 + p*0.35) + 0.10 });
  }
  return out;
})();

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Fund · Concept"
      title="Overfitting diagnosis"
      subtitle={<>The single most useful chart in ML diagnostics: identify <VIS.Term def="The difference between training-set error and held-out validation error. Large gap = the model memorized quirks of the training data that don't transfer.">train–test gap</VIS.Term>, then escalate fixes in order.</>}
      byline={[
        {label: "Audience", value: "smart but new to ML"},
        {label: "Source",   value: "Goodfellow et al., DL Book Ch. 5"},
      ]}/>

    <VIS.TLDR>
      A model <VIS.Term def="Memorizing quirks specific to the training sample that don't transfer to new data. Diagnosed by a large train–val gap.">overfits</VIS.Term> when its training-set error keeps falling while its{" "}
      <VIS.Term def="Error measured on data the model never saw during training. Stands in for true generalization until you touch the test set.">held-out validation</VIS.Term> error stops improving — or worse, starts climbing. The{" "}
      <VIS.Term def="A plot of training and validation loss over epochs (or over training-set size). The cheapest, highest-signal diagnostic in ML.">learning curve</VIS.Term>{" "}
      is the diagnostic of first resort: look at it before guessing fixes. Mitigations escalate in this order — <VIS.Term def="Adding terms to the loss that penalize model complexity (L1/L2 weight penalties, dropout, etc.). Reduces variance without touching the data.">regularization</VIS.Term> →{" "}
      <VIS.Term def="Effective number of free parameters or representable functions. Higher capacity = more variance, lower bias.">simpler model</VIS.Term> → more data → <VIS.Term def="Synthesizing extra training samples via label-preserving transforms (crop, flip, mixup, etc.). Cheap way to enlarge effective dataset.">data augmentation</VIS.Term> → <VIS.Term def="Randomly zeroing out a fraction of activations at every forward pass during training. Acts as an implicit model ensemble.">dropout</VIS.Term> →{" "}
      <VIS.Term def="A regularization technique: stop training when validation loss stops improving, even if training loss is still falling.">early stopping</VIS.Term>.
    </VIS.TLDR>

    <VIS.Section id="sec-lc" title="The learning curve (epoch view)">
      <p>
        The chart below is the canonical overfitting fingerprint. <VIS.Term def="Loss computed on the same examples the optimizer is updating on. Falls monotonically as long as the model has spare capacity.">Training loss</VIS.Term> (red) keeps falling as the optimizer drills deeper into the data. <VIS.Term def="Loss on a held-out partition. Proxy for how the model would do on fresh examples drawn from the same distribution.">Validation loss</VIS.Term> (blue) bottoms out at the green dashed line near epoch 20, then rises — that gap IS the overfitting.
      </p>
      <VIS.VegaLite spec={LC_SPEC} data={LC_DATA}/>
      <p>
        Two flavors of overfit show up here. Up to epoch 20 the two curves diverge but val is still improving — the model is still buying useful pattern from the <VIS.Term def="Optimization procedure: take a gradient step on one mini-batch at a time. Stochastic-gradient descent and its descendants (SGD, AdamW) drive almost all deep learning.">mini-batch SGD</VIS.Term> updates. After epoch 20 val turns up: each extra step now <em>costs</em> <VIS.Term def="A model's ability to predict correctly on examples drawn from the same distribution it was trained on. The thing we actually care about.">generalization</VIS.Term>. The green line marks the <VIS.Term def="The epoch at which validation metric is best. Save the checkpoint here even if you continue training.">val-peak checkpoint</VIS.Term> — the free fix is to restore it and ship. The same picture shows up whether you log raw <VIS.Term def="Standard classification loss: -log(p_t) where p_t is the predicted probability for the correct class.">cross-entropy</VIS.Term>, accuracy, or any other monotonic metric.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-data" title="The learning curve (data-size view)">
      <p>
        A second, less-used cut of the same diagnostic: hold capacity fixed, vary training-set size, and plot both errors. <VIS.Term def="A model class that fails to capture the underlying signal even on the training set; both train and val errors are high and close together.">Underfit</VIS.Term> shows up as both curves high and close; <VIS.Term def="High train accuracy with much lower validation accuracy. The classic overfitting fingerprint.">overfit</VIS.Term> as the val curve far above train at small n, slowly closing as n grows. The asymptote of both curves is bounded below by the <VIS.Term def="The randomness baked into the labels themselves — two identical inputs can have different labels. Sets a floor below which no model can go.">irreducible noise floor</VIS.Term>.
      </p>
      <VIS.VegaLite spec={DATA_CURVE_SPEC} data={DATA_CURVE_DATA}/>
      <p>
        When the two curves are still converging at the right edge, you are <strong>data-limited</strong> — more samples will close the gap (this is the <VIS.Term def="The component of error that comes from a learning rule producing different fits on different samples of training data. Shrinks with more data.">variance</VIS.Term> dropping). When they have <em>already converged</em> but val sits well above your target, you are <strong>capacity- or label-limited</strong>: <VIS.Term def="The component of error that remains even after averaging over many training samples — the gap between the model's average prediction and truth.">bias</VIS.Term> dominates and more data won't help. Pick the right axis before spending money — the <VIS.Term def="The decomposition: total expected error = bias² + variance + irreducible noise. Each fix shifts one term.">bias-variance tradeoff</VIS.Term> tells you which lever to pull.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-priority" title="Mitigation priority (use in this order)">
      <p>
        The order below is roughly cheapest-first by engineering cost. Reordering for a specific situation is fine — but the senior signal is matching the fix to the diagnosis: a <VIS.Term def="High variance: the model class is too flexible for the data. Train ≪ val. Cured by regularization, simpler models, or more data.">variance problem</VIS.Term> wants <VIS.Term def="Any technique that constrains effective capacity: L1/L2 penalties, dropout, early stopping, augmentation, label smoothing, batch norm.">regularization</VIS.Term> first; a <VIS.Term def="High bias: the model class is too rigid to represent the truth. Train ≈ val and both high. Cured by capacity or features.">bias problem</VIS.Term> wants more <VIS.Term def="Effective number of free parameters or representable functions. Higher capacity = more variance, lower bias.">capacity</VIS.Term> or richer features.
      </p>
      <VIS.Callout kind="info" title="Diagnose first, then fix">
        <strong>1. Look at the learning curve</strong> — confirms overfit vs. underfit vs. data issue. <strong>2. Regularization</strong> —{" "}
        <VIS.Term def="Penalty proportional to the sum of |w|. Drives weights to exactly zero — built-in feature selection.">L1</VIS.Term> /{" "}
        <VIS.Term def="Penalty proportional to the sum of w². Shrinks weights smoothly toward zero. Equivalent to a Gaussian prior on weights.">L2</VIS.Term> / dropout / <VIS.Term def="Deep-learning name for L2 regularization. Every step, weights are multiplied by (1 - α·η) before the gradient update — they 'decay' toward zero.">weight decay</VIS.Term>. <strong>3. Simpler model</strong> — fewer layers / smaller width / lower polynomial degree. <strong>4. More data</strong> — the most powerful and most expensive fix; only if you can collect it. <strong>5. Data augmentation</strong> — synthetic-but-cheap data via crops, flips,{" "}
        <VIS.Term def="Augmentation that linearly interpolates pairs of inputs and labels at a sampled ratio λ. Smooths decision boundary; improves calibration.">Mixup</VIS.Term>, or <VIS.Term def="Stochastic augmentation pipeline that samples N transforms with magnitude M each step. Standard for image classification.">RandAugment</VIS.Term>. <strong>6. Dropout</strong> — implicit ensemble at near-zero cost. <strong>7. Early stopping</strong> — always-on safety net. Side tools worth knowing: <VIS.Term def="Replace hard 0/1 targets with (ε, 1-ε); discourages over-confidence and helps calibration of softmax outputs.">label smoothing</VIS.Term>, <VIS.Term def="Stochastic Weight Averaging — average weights along the training trajectory of one run. Cheap regularizer that hits flatter minima.">SWA</VIS.Term>, and <VIS.Term def="Train several models with different seeds and average their predictions at inference. Reduces variance at K× compute cost.">deep ensembling</VIS.Term>.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="The 'just add regularization' trap">
        Reaching straight for L2 or dropout before looking at the learning curve hides whether you actually have an overfitting problem. Sometimes val loss is high because of <VIS.Term def="The train and test feature distributions differ (covariate shift) or label distributions differ (prior shift). Regularization cannot fix this.">distribution shift</VIS.Term>,{" "}
        <VIS.Term def="When information from the validation/test set sneaks into the training pipeline (e.g., target encoding fit on full data). Inflates train metric, gives false-good results.">data leakage</VIS.Term>, a wrong loss function, or <VIS.Term def="Labels themselves disagree with each other (annotator disagreement, ambiguous boundaries). Caps achievable accuracy regardless of model.">noisy labels</VIS.Term> — and none of those are fixed by regularization. Diagnose first.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Symptom vs cause: 'train-val gap' is not always overfit">
        A widening gap can also reflect <VIS.Term def="Train uses one distribution; val/test sees a shifted one (different time period, geography, demographic). Looks identical to overfit on the curve.">temporal drift</VIS.Term>,{" "}
        <VIS.Term def="Pseudo-labeled or augmented examples make the train set 'easier' than val. Inflates the apparent gap without true overfit.">heterogeneous train set</VIS.Term>, or a metric like <VIS.Term def="Area Under the ROC Curve. Rank-based metric; overstates performance on imbalanced data.">AUC</VIS.Term> behaving differently across splits. The diagnostic is the SHAPE — train falling, val rising — not the gap alone. Always pair with a <VIS.Term def="Holding out part of the training data K times to estimate generalization error before any final test-set evaluation.">cross-validation</VIS.Term> sanity check before declaring victory.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{color:"#475569", marginBottom: 12}}>
        Twenty-five trap problems covering identity (what counts as overfit), application (which fix and in what order), mechanism (why each fix works), intuition traps (looks like overfit but isn't), operations (running the diagnostic in practice), and failure modes (when the standard playbook misfires). Each scenario carries more context than strictly needed.
      </p>

      <VIS.TrapProblem
        id="od-q1"
        difficulty="medium"
        title="What is the single most diagnostic signature of overfitting?"
        scenario={<><em>Discriminating insight:</em> identify the SHAPE of the two curves over training time, distinct from the raw magnitudes. Train loss can be low in many regimes; pick the pattern that uniquely identifies fitting-to-noise.</>}
        options={[
          {key:"a", text:"Training loss is low and validation loss is high — the magnitudes of both at the final epoch tell you everything.", correct:false},
          {key:"b", text:"Both training and validation losses are low but training is slightly lower — a small gap proves the model generalized.", correct:false},
          {key:"c", text:"Training loss keeps falling while validation loss flattens then rises — the two curves diverge over training time.", correct:true},
          {key:"d", text:"Training accuracy fluctuates epoch-to-epoch while validation accuracy is stable — variance in the optimizer is the tell.", correct:false},
        ]}
        trap={<>(a) confuses magnitudes with shape — a high val loss can also indicate underfit or distribution shift. (b) describes a healthy fit. (d) describes optimizer noise, separate from overfit.</>}
        lens={<>The defining signature is the DIVERGENCE over training time: train monotonically falling, val flattening then rising. Magnitudes alone are ambiguous; the SHAPE uniquely identifies fitting to training-set quirks.</>}
        stretch={<>If only training loss was logged (no val), can you detect overfit?</>}
      />

      <VIS.TrapProblem
        id="od-q2"
        difficulty="medium"
        title="Train accuracy 99.8%, val accuracy 75% — what is the cheapest first action?"
        scenario={<><em>Discriminating insight:</em> rank by cost per unit of expected improvement. The model was already trained; which action consumes the least new compute?</>}
        options={[
          {key:"a", text:"Restore the validation-peak checkpoint that was saved during training — zero new compute, captures the sweet spot.", correct:true},
          {key:"b", text:"Re-train from scratch with weight decay 1e-3 added to AdamW — a single full training run.", correct:false},
          {key:"c", text:"Collect 200k additional labels on a crowd platform over two weeks, then re-train.", correct:false},
          {key:"d", text:"Shrink the architecture to a smaller backbone and re-train end-to-end on the same data.", correct:false},
        ]}
        trap={<>(b), (c), (d) are valid escalations but each requires a new training run or new data. (a) reuses work already done.</>}
        lens={<>Early stopping is FREE if you saved checkpoints. The val curve already told you where the peak was; restoring that checkpoint costs nothing and ships an honest model. Escalate only if that doesn't hit your target.</>}
        stretch={<>What if you only saved the final-epoch checkpoint?</>}
      />

      <VIS.TrapProblem
        id="od-q3"
        difficulty="hard"
        title="Why does adding dropout reduce overfitting?"
        scenario={<><em>Discriminating insight:</em> articulate the MECHANISM beyond saying 'it regularizes'. Two of the options below sound plausible but describe the wrong mechanism.</>}
        options={[
          {key:"a", text:"It zeroes out activations randomly each forward pass, so training optimizes an ensemble of thinned subnetworks that share weights.", correct:true},
          {key:"b", text:"It adds Gaussian noise to weights at each step, smoothing the loss landscape and preventing sharp minima.", correct:false},
          {key:"c", text:"It penalizes the L2 norm of activations through a Bernoulli mask, which is equivalent to weight decay on the activation layer.", correct:false},
          {key:"d", text:"It freezes a random subset of weights each step so they cannot overfit, while the rest continue training.", correct:false},
        ]}
        trap={<>(b) confuses dropout with weight noise. (c) wrong mechanism — dropout multiplies activations by a Bernoulli mask, it is not an L2 penalty. (d) confuses dropout with parameter freezing.</>}
        lens={<>Dropout drops ACTIVATIONS (not weights), and the dropped units differ per forward pass. The network is forced to make every prediction work across many random sub-networks — this is implicit ensembling. At test time the full network averages over them.</>}
        stretch={<>Why is dropout typically OFF at inference?</>}
      />

      <VIS.TrapProblem
        id="od-q4"
        difficulty="medium"
        title="Train loss 0.45, val loss 0.48, both still falling — what is happening?"
        scenario={<><em>Discriminating insight:</em> the gap is tiny and both curves still trend down at epoch 30. Pick the diagnosis consistent with both observations.</>}
        options={[
          {key:"a", text:"The model is overfitting because train is slightly below val — apply weight decay and dropout immediately to be safe.", correct:false},
          {key:"b", text:"The model has hit the irreducible noise floor at 0.45 — collect cleaner labels before any further training.", correct:false},
          {key:"c", text:"The model is underfitting because val is above train — switch to a smaller model with stronger inductive bias.", correct:false},
          {key:"d", text:"The model is healthy and still has capacity to learn — train longer, possibly with a richer architecture.", correct:true},
        ]}
        trap={<>(a) misreads a tiny gap as overfit. (b) requires curves to FLATTEN, distinct from still falling. (c) inverts the diagnosis — a smaller model would fit worse.</>}
        lens={<>A small, stable gap with both curves still falling is the signature of a healthy fit with spare capacity. Adding regularization here introduces bias for no payoff. Train longer or grow the model.</>}
        stretch={<>At what gap size would you start to worry?</>}
      />

      <VIS.TrapProblem
        id="od-q5"
        difficulty="hard"
        title="Sweep weight-decay λ from 1e-5 to 1e1. Val loss is U-shaped. Why does the right end go UP?"
        scenario={<><em>Discriminating insight:</em> very large λ produces val loss WORSE than λ=0. The mechanism must explain BOTH train and val rising at the right end.</>}
        options={[
          {key:"a", text:"Numerical instability at high λ inflates gradients and corrupts the optimizer state entirely during training.", correct:false},
          {key:"b", text:"Excessive weight decay raises variance because the over-constrained weights chase noisier gradients each step.", correct:false},
          {key:"c", text:"λ that large shrinks every weight so aggressively the model degenerates to a near-constant predictor — bias dominates.", correct:true},
          {key:"d", text:"At large λ the optimizer fails to escape local minima, so test loss is locked at the initialization value forever.", correct:false},
        ]}
        trap={<>(a) blames math when math is fine. (b) inverts the geometry — high λ LOWERS variance and raises bias. (d) is hand-wavy and fails to predict the train-loss rise.</>}
        lens={<>The right end of the bias-variance U-curve. At very large λ weights are squashed to near zero; the model predicts approximately the training mean for every input. Bias is now huge and dominates the small remaining variance — both train and val deteriorate.</>}
        stretch={<>How would the curve change if you used L1 instead of L2?</>}
      />

      <VIS.TrapProblem
        id="od-q6"
        difficulty="hard"
        title="Train acc 95%, val acc 65%, no overlap between train and val IDs by design. What's the first thing to check?"
        scenario={<><em>Discriminating insight:</em> a 30-point gap is large enough to be overfit, but ID-non-overlap is unusual for the dataset and worth probing before model surgery.</>}
        options={[
          {key:"a", text:"Add dropout 0.3 and re-train — the 30-point gap screams a textbook variance problem to fix first.", correct:false},
          {key:"b", text:"Audit the feature pipeline for target encoding or scaling fit on train+val together; leakage inflates train.", correct:false},
          {key:"c", text:"Check whether the val set comes from a different time period, geography, or label-collection process.", correct:true},
          {key:"d", text:"Switch to a much smaller architecture — the gap shows the current model is far too flexible for the data.", correct:false},
        ]}
        trap={<>(a) and (d) are reflex fixes that don't help if the gap is from distribution shift. (b) is a great check generally, but the scenario specifies non-overlap by design — leakage is unlikely to be the FIRST suspect.</>}
        lens={<>When the gap is unusually large and the split was deliberately constructed, the most likely culprit is distribution shift between the two partitions (time, source, labeler). Regularization cannot fix that. Confirm the split is i.i.d. before reaching for the regularization toolbox.</>}
        stretch={<>What plot would you produce to confirm distribution shift?</>}
      />

      <VIS.TrapProblem
        id="od-q7"
        difficulty="medium"
        title="In a learning-curve-over-data-size plot, what tells you 'more data will help'?"
        scenario={<><em>Discriminating insight:</em> two curves plotted against n. Pick the pattern showing the gap is still closing as data grows, distinct from the pattern showing you have already converged.</>}
        options={[
          {key:"a", text:"Train and val have converged and both are flat as n grows — you have squeezed all you can from this data axis.", correct:false},
          {key:"b", text:"Train sits below val by a large margin at every n and the gap is constant — adding data leaves the parallel curves unchanged.", correct:false},
          {key:"c", text:"Val has dipped below train at large n — your validation procedure is broken and reading false metrics back to you.", correct:false},
          {key:"d", text:"Train is still rising and val is still falling at the largest n — the curves are converging but have yet to meet.", correct:true},
        ]}
        trap={<>(a) is the OPPOSITE — flat means data-saturated. (b) describes a fixed bias from leakage or shift, a separate failure from a closeable gap. (c) is unusual and irrelevant to data-helping.</>}
        lens={<>The diagnostic for 'more data will help' is that the two curves are STILL TRENDING TOWARDS EACH OTHER at the right edge. If they've already converged, adding data is wasted effort.</>}
        stretch={<>If train and val are already converged but both are too high, what next?</>}
      />

      <VIS.TrapProblem
        id="od-q8"
        difficulty="hard"
        title="Why is Mixup an effective regularizer for image classification?"
        scenario={<><em>Discriminating insight:</em> Mixup interpolates two examples and their labels. Pick the explanation that names the underlying MECHANISM beyond describing the procedure.</>}
        options={[
          {key:"a", text:"It doubles the effective dataset size by adding random crops to the augmentation pipeline.", correct:false},
          {key:"b", text:"It linearly interpolates inputs and labels, encouraging linear behavior between training examples and smoother decision boundaries.", correct:true},
          {key:"c", text:"It performs label smoothing by replacing hard 0/1 targets with (ε, 1-ε) uniform soft targets.", correct:false},
          {key:"d", text:"It adds Gaussian noise to pixel intensities to make the model invariant to small perturbations.", correct:false},
        ]}
        trap={<>(a) confuses Mixup with crop augmentation. (c) confuses Mixup with label smoothing — related family, different mechanism. (d) confuses Mixup with input noise.</>}
        lens={<>Mixup samples a ratio λ from a Beta distribution and forms x' = λx_i + (1-λ)x_j, y' = λy_i + (1-λ)y_j. Training on these convex combinations enforces linearity between training points, smoothing the decision boundary and improving calibration.</>}
        stretch={<>What hyperparameter controls how aggressive the interpolation is?</>}
      />

      <VIS.TrapProblem
        id="od-q9"
        difficulty="medium"
        title="Order these four fixes by expected cost (cheapest to most expensive)."
        scenario={<><em>Discriminating insight:</em> 'cost' = engineering time + compute + new data acquisition. Pick the order a senior MLE would actually run them.</>}
        options={[
          {key:"a", text:"Collect 100k new labels → architecture shrink → weight decay tuning → early stopping at the val-peak epoch.", correct:false},
          {key:"b", text:"Architecture shrink → early stopping → collect 100k new labels → weight decay tuning at the chosen scale.", correct:false},
          {key:"c", text:"Early stopping → weight decay tuning → architecture shrink → collect 100k new labels for the final retrain.", correct:true},
          {key:"d", text:"Weight decay tuning → early stopping → collect 100k new labels → architecture shrink as the final escalation.", correct:false},
        ]}
        trap={<>(a) inverts the order entirely. (b) puts an architecture rewrite before reusing a free checkpoint. (d) swaps the first two — tuning weight decay still requires retraining; early stopping skips that cost.</>}
        lens={<>Early stopping is essentially free (reuse a saved checkpoint). Weight decay sweeps are a handful of training runs. Architecture changes require a full re-tune of HPs. Data collection is the most expensive — labeling, time, sometimes ethics review.</>}
        stretch={<>Where does data augmentation fit in this order?</>}
      />

      <VIS.TrapProblem
        id="od-q10"
        difficulty="hard"
        title="Train acc 98%, val acc 97%, test acc 70%. Where is the bug?"
        scenario={<><em>Discriminating insight:</em> val ≈ train, both high; test is much lower. Standard 'overfit' diagnosis says val should also be low. Pick the failure mode consistent with all three numbers.</>}
        options={[
          {key:"a", text:"Classical overfit on the training set — add dropout and weight decay, retrain, then re-evaluate on val.", correct:false},
          {key:"b", text:"The test set is noisier than train and val — relabel test with a higher-quality pipeline and re-evaluate.", correct:false},
          {key:"c", text:"The model converged to a sharp minimum — add Sharpness-Aware Minimization or stochastic weight averaging.", correct:false},
          {key:"d", text:"Validation leaked into training (feature engineering fit on train+val together), so val is no longer held out.", correct:true},
        ]}
        trap={<>(a) fails because val and train MATCH — that's the opposite of overfit. (b) blames the test set when the diagnostic clearly points at val being compromised. (c) is a hand-wavy SOTA-flavored guess.</>}
        lens={<>Val tracking train closely while test diverges is the fingerprint of data leakage. Common culprits: target encoding or standardization fit on train+val, near-duplicates across splits, time-based features that peek into the future. Test is now your only honest signal.</>}
        stretch={<>How do you re-engineer the pipeline to prevent recurrence?</>}
      />

      <VIS.TrapProblem
        id="od-q11"
        difficulty="hard"
        title="Why does L2 weight decay reduce variance?"
        scenario={<><em>Discriminating insight:</em> three options describe plausible-sounding mechanisms; one names the actual geometric effect on weights.</>}
        options={[
          {key:"a", text:"It clips gradients above a fixed threshold, preventing exploding-gradient overfit on training outliers.", correct:false},
          {key:"b", text:"It freezes a random subset of weights each step so those parameters cannot fit training-set noise.", correct:false},
          {key:"c", text:"It shrinks weights smoothly toward zero each step, equivalent to a Gaussian prior and shrinking effective capacity.", correct:true},
          {key:"d", text:"It removes correlated features by forcing weights of redundant features to have equal magnitudes throughout training.", correct:false},
        ]}
        trap={<>(a) confuses weight decay with gradient clipping. (b) confuses with dropout. (d) is a made-up mechanism that sounds plausible.</>}
        lens={<>L2 adds (λ/2)·||w||² to the loss; the gradient picks up λw, so each step multiplies weights by (1 - λη). Equivalent to a Gaussian prior centered at zero. Smaller weight norms mean a smaller hypothesis class — lower variance, slightly higher bias.</>}
        stretch={<>What is the L1 equivalent and what does it do differently?</>}
      />

      <VIS.TrapProblem
        id="od-q12"
        difficulty="medium"
        title="Training loss is jagged and noisy; val loss is smooth. Is this overfit?"
        scenario={<><em>Discriminating insight:</em> jaggedness reflects VARIANCE PER STEP, a separate phenomenon from generalization. Pick the option that maps the observation to its actual cause.</>}
        options={[
          {key:"a", text:"Yes — jagged train paired with smooth val is the classic overfit fingerprint seen in textbooks.", correct:false},
          {key:"b", text:"No — jagged train reflects mini-batch gradient noise; val averages over the full split. Generalization is separate.", correct:true},
          {key:"c", text:"Yes — val being smoother means it has stopped responding to training signal, equivalent to a plateau.", correct:false},
          {key:"d", text:"No — jagged train means the learning rate is too low; the model has yet to begin overfitting at all.", correct:false},
        ]}
        trap={<>(a) and (c) misread step-noise as a generalization signal. (d) inverts the LR diagnosis (jagged means LR too HIGH or batch too small, not too low).</>}
        lens={<>Train loss jaggedness reflects stochastic-gradient-descent variance over mini-batches; val loss is computed on the whole val set so it averages out. Overfit is about the LEVELS and TRENDS of the two curves, not their per-step smoothness.</>}
        stretch={<>How would you smooth the train curve for plotting?</>}
      />

      <VIS.TrapProblem
        id="od-q13"
        difficulty="hard"
        title="When is collecting more data the WRONG fix for high val loss?"
        scenario={<><em>Discriminating insight:</em> more data is the textbook reflex. Identify the scenario where it provably won't help, even with unlimited budget.</>}
        options={[
          {key:"a", text:"The training set is very small and val loss is much higher than train — more samples would close the variance gap.", correct:false},
          {key:"b", text:"The data is heavily augmented but the val set is untouched — augmentation distribution differs between the splits.", correct:false},
          {key:"c", text:"The optimizer is poorly tuned — the learning rate is too low to leave initialization within the budget.", correct:false},
          {key:"d", text:"The model class is too simple to represent the truth — train and val are both high and have already converged.", correct:true},
        ]}
        trap={<>(a) is the canonical case where more data DOES help. (b) is a real bug but is a data-quality issue, separate from data-quantity. (c) is an optimizer bug, again unrelated to quantity.</>}
        lens={<>If train and val have converged at a high error, you are bias-limited (underfit). More data of the same kind moves both curves down together by zero. The fix is more capacity, richer features, or a different model family — not more data.</>}
        stretch={<>How do you distinguish bias-limited from noise-limited on the data-size curve?</>}
      />

      <VIS.TrapProblem
        id="od-q14"
        difficulty="medium"
        title="Why is the val set held constant across all epochs (rather than resampled each epoch)?"
        scenario={<><em>Discriminating insight:</em> if val changes each epoch, which statistic of the learning curve becomes unreliable?</>}
        options={[
          {key:"a", text:"It saves compute — recomputing val on the same fixed examples is cheaper than reshuffling each epoch.", correct:false},
          {key:"b", text:"Each epoch's val loss is a measurement on a constant sample — differences reflect MODEL changes, separate from sampling noise.", correct:true},
          {key:"c", text:"A resampled val set could accidentally leak training examples — fixing it avoids cross-split contamination.", correct:false},
          {key:"d", text:"A fixed val set increases statistical power because the same examples become more familiar to the model over time.", correct:false},
        ]}
        trap={<>(a) is true but trivial and not the main reason. (c) is a real but unrelated risk. (d) is backwards — repeated evaluation on the same set is the OPPOSITE of statistical power; it just stabilizes the measurement.</>}
        lens={<>Fixing the val set turns epoch-over-epoch comparisons into paired measurements: any change in val loss is attributable to the model, not to a different sample. With a resampled val set you'd be adding sampling noise to every measurement.</>}
        stretch={<>What's the analogous reason to fix random seeds during evaluation?</>}
      />

      <VIS.TrapProblem
        id="od-q15"
        difficulty="hard"
        title="A 'val loss going down' that actually masks overfit — what could cause it?"
        scenario={<><em>Discriminating insight:</em> the val curve looks healthy but the model is silently fitting noise. Pick the operational failure that creates this illusion.</>}
        options={[
          {key:"a", text:"The val set is too large; large val sets systematically under-report any kind of overfit pattern.", correct:false},
          {key:"b", text:"The learning rate is too small — slow training is mathematically incapable of overfitting the data.", correct:false},
          {key:"c", text:"Train and val come from different sources, so the standard overfit pattern cannot manifest in this setup.", correct:false},
          {key:"d", text:"Validation examples appear as near-duplicates in training, so val loss falls as the model memorizes them.", correct:true},
        ]}
        trap={<>(a) is backwards — large val sets tighten variance, they hide overfit less. (b) fails because given enough epochs even small-LR runs overfit. (c) is wrong — different sources hide overfit as distribution shift, but make val look WORSE, not better.</>}
        lens={<>Near-duplicate leakage is the silent killer: same image with a different filename in both splits, same user appearing under different IDs, identical SQL records joined twice. Val improves as the model memorizes the leaked examples — overfit hides in plain sight. Hash-based dedup before splitting is the fix.</>}
        stretch={<>What's a 1-minute check for near-duplicates between splits?</>}
      />

      <VIS.TrapProblem
        id="od-q16"
        difficulty="medium"
        title="You apply RandAugment with magnitude M=15. Train accuracy DROPS. Is this expected?"
        scenario={<><em>Discriminating insight:</em> augmentation makes the training distribution harder. What should that do to TRAIN loss, separately from val loss?</>}
        options={[
          {key:"a", text:"No — train accuracy should rise because augmentation gives the model effectively more examples to learn from at each step.", correct:false},
          {key:"b", text:"Yes — stronger augmentation makes training harder; train accuracy falls while val often improves as variance shrinks.", correct:true},
          {key:"c", text:"Yes — augmentation introduces label noise, so train accuracy degrades roughly in proportion to the magnitude M.", correct:false},
          {key:"d", text:"No — RandAugment is a test-time-only technique by design; it should leave training accuracy entirely unaffected.", correct:false},
        ]}
        trap={<>(a) confuses augmentation with adding clean data — augmentation makes inputs harder, not just more numerous. (c) wrongly attributes the drop to label noise; the labels are preserved. (d) is wrong on every count.</>}
        lens={<>Stronger augmentation transforms each training input more aggressively, making train harder. A well-augmented train accuracy below val is normal and welcome — it means the train metric is no longer an over-optimistic mirror of val.</>}
        stretch={<>What's the right metric to monitor when train is harder than val?</>}
      />

      <VIS.TrapProblem
        id="od-q17"
        difficulty="hard"
        title="Why might cross-validation give an optimistic estimate even with proper K folds?"
        scenario={<><em>Discriminating insight:</em> K-fold is supposed to protect against overfit, but a senior team still got burned. Identify the operational failure.</>}
        options={[
          {key:"a", text:"K-fold averages errors across folds, mathematically lowering the variance estimate below the true generalization variance.", correct:false},
          {key:"b", text:"K-fold uses stratification, and stratification injects label information into the split through the class balance.", correct:false},
          {key:"c", text:"Hyperparameter search ran 300 trials adapting to fold scores, so the model selection trained implicitly on the val signal.", correct:true},
          {key:"d", text:"K-fold reports the mean of fold scores, while the median would be the unbiased estimator for skewed fold distributions.", correct:false},
        ]}
        trap={<>(a) confuses error averaging with the variance of the generalization estimate. (b) misunderstands stratification — it preserves class balance and leaks no labels. (d) is a made-up statistical claim.</>}
        lens={<>The CV folds become a 'training signal' for hyperparameter search. With enough trials, the search exploits fold-level noise and the reported CV score overstates true generalization. Fix: nested CV, or hold out a final pre-test set the HPO never touches.</>}
        stretch={<>How small does the held-out final set need to be to give a meaningful confidence interval?</>}
      />

      <VIS.TrapProblem
        id="od-q18"
        difficulty="medium"
        title="What does 'early stopping' actually save?"
        scenario={<><em>Discriminating insight:</em> describe the OPERATIONAL artifact. One option names it correctly; the others describe related but distinct concepts.</>}
        options={[
          {key:"a", text:"The optimizer state at the epoch with best validation metric — restored as the deployable model at the end of training.", correct:true},
          {key:"b", text:"The training-loss curve up to the stopping epoch — used to estimate the irreducible noise floor.", correct:false},
          {key:"c", text:"The weight-decay coefficient that gave the lowest train-val gap, applied to a re-trained model.", correct:false},
          {key:"d", text:"The list of training examples seen up to the stop epoch — used to construct a curriculum for the next run.", correct:false},
        ]}
        trap={<>(b), (c), (d) describe useful artifacts but none are what early stopping persists.</>}
        lens={<>Early stopping saves the parameter checkpoint at the val-peak epoch. Continued training may improve train loss further, but you deploy the saved checkpoint — that's the whole point.</>}
        stretch={<>What's the 'patience' parameter in early stopping?</>}
      />

      <VIS.TrapProblem
        id="od-q19"
        difficulty="hard"
        title="Train loss flat at 0.7 from epoch 1, val loss also flat at 0.7. Diagnose."
        scenario={<><em>Discriminating insight:</em> both curves flat at the same level from epoch 1 — this is the opposite of overfit. Pick the failure mode consistent with the observation.</>}
        options={[
          {key:"a", text:"Severe overfitting: train and val match at 0.7 because the model has memorized both sets equally well.", correct:false},
          {key:"b", text:"The irreducible noise floor — 0.7 is the inherent label noise inherent in this particular problem.", correct:false},
          {key:"c", text:"Underfitting: the model is too simple or the optimizer has yet to leave initialization. Grow capacity or fix the LR.", correct:true},
          {key:"d", text:"A label-leakage bug — both splits contain the same examples, so the model gives identical loss in lockstep.", correct:false},
        ]}
        trap={<>(a) is impossible — a model that memorized train would have train loss near zero. (b) is unfalsifiable as stated; it needs an independent noise estimate. (d) is leakage, but leakage usually makes BOTH losses LOW, distinct from being stuck high.</>}
        lens={<>Both curves flat at a HIGH value from epoch 1 is the underfit signature. Causes: learning rate too low, model too small to represent the signal, dead ReLUs, frozen weights, or a broken data loader feeding noise. Diagnose the optimizer first.</>}
        stretch={<>What single check rules out 'optimizer hasn't moved'?</>}
      />

      <VIS.TrapProblem
        id="od-q20"
        difficulty="hard"
        title="L1 vs L2 regularization: which is preferable when you suspect many features are irrelevant?"
        scenario={<><em>Discriminating insight:</em> the question is which mechanism performs feature selection, distinct from which generalizes better overall. Pick the geometric reason.</>}
        options={[
          {key:"a", text:"L2, because the smooth quadratic penalty shrinks all weights uniformly and removes the bad ones first.", correct:false},
          {key:"b", text:"L1, because its diamond-shaped constraint region has corners on the axes; optimal solutions tend to sit on those corners, zeroing entire features.", correct:true},
          {key:"c", text:"L2, because the L2 ball has no corners, so the optimum is always strictly inside and feature importance is preserved.", correct:false},
          {key:"d", text:"L1 and L2 are equivalent under sufficient regularization strength — pick whichever is faster to tune.", correct:false},
        ]}
        trap={<>(a) and (c) describe L2 behavior but draw the wrong conclusion. (d) is false; the two have fundamentally different geometry.</>}
        lens={<>L1 = Σ|w|; the constraint region is an axis-aligned diamond with corners ON the coordinate axes. Optimal solutions snap to those corners, setting whole coefficients to exactly zero — implicit feature selection. L2 = Σw²; round ball, no corners, all coefficients stay slightly nonzero.</>}
        stretch={<>What does elastic net do that pure L1 doesn't?</>}
      />

      <VIS.TrapProblem
        id="od-q21"
        difficulty="medium"
        title="A senior says 'just retrain for more epochs and overfit will go away.' True or false?"
        scenario={<><em>Discriminating insight:</em> name the specific regime in which longer training either helps or hurts. Avoid accepting the senior's claim at face value.</>}
        options={[
          {key:"a", text:"True — given enough epochs the optimizer eventually finds a flatter minimum that generalizes better.", correct:false},
          {key:"b", text:"False — once val loss has turned upward, more epochs deepen the overfit; the val curve is already telling you to stop.", correct:true},
          {key:"c", text:"True in deep networks (double descent), false in classical models — but the scenario didn't specify which.", correct:false},
          {key:"d", text:"False only if the optimizer is Adam; SGD with momentum does benefit from longer training.", correct:false},
        ]}
        trap={<>(a) overstates flat-minima theory and ignores the rising val curve. (c) invokes double-descent — real but only at extreme over-parameterization, not the default. (d) is fabricated.</>}
        lens={<>If val loss is already rising, additional epochs strictly increase the train-val gap. Longer training only helps if val is still falling or plateaued. The senior's heuristic is dangerous when applied without looking at the curve.</>}
        stretch={<>When DOES double-descent change this advice?</>}
      />

      <VIS.TrapProblem
        id="od-q22"
        difficulty="hard"
        title="Why is data augmentation often more effective than dropout on small image datasets?"
        scenario={<><em>Discriminating insight:</em> both are regularizers, but they act at different levels. Pick the option that contrasts mechanism beyond merely contrasting outcome.</>}
        options={[
          {key:"a", text:"Dropout is incompatible with batch normalization, so it is unusable in modern CNNs and augmentation is the sole remaining option.", correct:false},
          {key:"b", text:"Dropout requires many more parameters to be effective; small datasets fail to provide enough capacity to absorb the noise.", correct:false},
          {key:"c", text:"Augmentation is cheaper at inference time — that single property is the entire reason it dominates dropout in practice.", correct:false},
          {key:"d", text:"Augmentation enlarges the training distribution with realistic input variations; dropout perturbs only activations and teaches no input invariance.", correct:true},
        ]}
        trap={<>(a) is partially true but overstated and beside the main point. (b) is a made-up correlation. (c) is irrelevant — inference cost is the same.</>}
        lens={<>Augmentation injects the right INDUCTIVE BIAS: 'a flipped cat is still a cat.' The model learns invariances that match the true data manifold. Dropout adds noise to activations but doesn't tell the model anything about which input transformations preserve label.</>}
        stretch={<>When does augmentation hurt (i.e., is too aggressive)?</>}
      />

      <VIS.TrapProblem
        id="od-q23"
        difficulty="hard"
        title="A team uses val accuracy for early stopping AND for choosing the final model among 50 candidates. Why is this risky?"
        scenario={<><em>Discriminating insight:</em> the val set is being asked to do two jobs. Name the statistical failure that produces a misleading 'best' model.</>}
        options={[
          {key:"a", text:"Multiple-comparisons inflation: with 50 candidates, the best val score is biased upward by selection — val no longer estimates true generalization.", correct:true},
          {key:"b", text:"Early stopping and model selection use different loss functions, so combining them gives invalid gradients.", correct:false},
          {key:"c", text:"Val accuracy is a non-differentiable metric, so using it twice doubles the discretization error.", correct:false},
          {key:"d", text:"Using val for two purposes doubles its variance, requiring twice the val-set size to compensate.", correct:false},
        ]}
        trap={<>(b) confuses metric with loss. (c) is irrelevant. (d) wrongly invokes variance addition.</>}
        lens={<>Picking the best of 50 candidates by val score is like running 50 hypothesis tests and reporting the best p-value. The selected score overstates true generalization because the val set has been implicitly trained on by the selection procedure. Hold out a separate selection set, or use nested CV.</>}
        stretch={<>How much inflation should you expect with 50 candidates?</>}
      />

      <VIS.TrapProblem
        id="od-q24"
        difficulty="medium"
        title="A model with 1B parameters trained on 100k examples achieves near-zero train loss and 30% val accuracy. What's the FIRST fix to try?"
        scenario={<><em>Discriminating insight:</em> parameter-to-data ratio is extreme. Multiple fixes are valid; pick the one with highest expected impact per dollar.</>}
        options={[
          {key:"a", text:"Add aggressive dropout (0.5) on every transformer block and re-train.", correct:false},
          {key:"b", text:"Use a much smaller pretrained model and fine-tune it; 1B parameters on 100k examples is the wrong scale.", correct:true},
          {key:"c", text:"Sweep weight decay over five orders of magnitude and pick the best.", correct:false},
          {key:"d", text:"Switch from AdamW to SGD with momentum to reduce optimizer-induced variance.", correct:false},
        ]}
        trap={<>(a) is a fine band-aid but doesn't fix the scale mismatch. (c) is reasonable but expensive given how off the scale is. (d) is folklore — not the main issue.</>}
        lens={<>1B parameters on 100k examples is a 10,000-to-1 ratio — variance dominates. The fastest payoff is using a smaller model (or pretrained + frozen backbone), not adding more regularizers on top of a wildly over-parameterized one. Match capacity to data.</>}
        stretch={<>At what data scale would 1B parameters become reasonable?</>}
      />

      <VIS.TrapProblem
        id="od-q25"
        difficulty="hard"
        title="In what scenario should you DELIBERATELY allow some overfit to ship?"
        scenario={<><em>Discriminating insight:</em> overfit is bad by default, but ML decisions are tradeoffs. Pick the case where 'overfit a little' is the senior call.</>}
        options={[
          {key:"a", text:"Train, val and production share one distribution; refit on train+val combined to the early-stop epoch, accepting reduced val signal in exchange.", correct:true},
          {key:"b", text:"The val set is much smaller than the test set, so overfit on val intentionally until val accuracy reaches 100% performance.", correct:false},
          {key:"c", text:"Production distribution differs from training — overfit on the training data harder to compensate for the distribution shift.", correct:false},
          {key:"d", text:"The model is for a one-off batch job, so generalization is irrelevant and you can overfit freely without consequence.", correct:false},
        ]}
        trap={<>(b) is backwards. (c) is the OPPOSITE of correct — overfit hurts more under shift. (d) misunderstands 'one-off' — if it's used once, you still want it to be right on unseen records.</>}
        lens={<>The legitimate case: when val is from the SAME distribution as production and your goal is the best production model, the canonical move is to retrain on train+val combined using the early-stop epoch found on val — you gain ~10–20% more data, lose your val signal, and accept the bias-variance tradeoff. Always verify on a separate test set.</>}
        stretch={<>What's the risk if you skip the 'retrain on train+val' step and just ship the early-stopped train-only model?</>}
      />
    </VIS.Section>
  </main>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
