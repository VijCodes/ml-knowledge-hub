  function Callout({ kind = "info", title, children }) {
    return h("aside", { className: `vis-callout vis-callout-${kind}`, role: "note" },
      title ? h("strong", { className: "vis-callout-title" }, title) : null,
      children);
  }

  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // autoGloss: scan a string for terms in window.__VIS_GLOSSARY (set by exporter
  // before vis-components.js loads). Returns a React children array with each
  // matched term wrapped in the same <span class="vis-term"> the Term component
  // emits. First-mention only per call. Longest-match-first so "candidate
  // generation" beats "candidate" alone.
  let _glossPattern = null;
  let _glossLookup = null;
  function _buildGlossPattern() {
    const g = (typeof window !== "undefined" && window.__VIS_GLOSSARY) || {};
    const keys = Object.keys(g).filter(k => k && !k.startsWith("_"));
    if (!keys.length) { _glossPattern = false; return; }
    // Longest first to favor multi-word terms; escape regex metachars.
    keys.sort((a, b) => b.length - a.length);
    const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    // Word-boundary on each side. Allow internal hyphens/spaces; common ML terms
    // like "DP-SGD", "feature cross", "p99 latency" are all matched naturally.
    _glossPattern = new RegExp("(^|[^A-Za-z0-9_])(" + escaped.join("|") + ")(?=[^A-Za-z0-9_]|$)", "g");
    _glossLookup = g;
  }
  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,

        "Palette — click a piece to add it to your design"),

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {

      }

    }
    function optionClass(o) {

      if (!revealed && picked === o.key) cls += " is-picked";

      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// implement-two-sample-welch — coding
// Welch t-test from summary stats: unequal variances, SE = sqrt(vA/nA + vB/nB),
// Welch-Satterthwaite df, two-tailed p. Drills cover Welch vs Student, df form,
// two-tailed rationale, sample-size sensitivity, MDE, peeking, sequential alternatives.

const WT_CODE = [
  "import math",
  "from scipy import stats",
  "",
  "def welch_t_test(mean_A, var_A, n_A, mean_B, var_B, n_B):",
  "    # Effect: treatment minus control. Sign matters for one-sided variants,",
  "    # but our return is two-tailed so only magnitude affects p.",
  "    effect = __1__",
  "",
  "    # Welch standard error: each variance scaled by ITS OWN n. NOT pooled.",
  "    se = __2__",
  "    t_stat = effect / se",
  "",
  "    # Welch-Satterthwaite degrees of freedom — fractional, NOT n_A+n_B-2.",
  "    df = __3__",
  "",
  "    # Two-tailed p-value: 2 * survival function of |t| under t(df).",
  "    p_value = __4__",
  "",
  "    return t_stat, df, p_value",
];

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Coding · Senior MLE"
      title="Implement welch_t_test() from summary statistics"
      subtitle="A/B platform, 2k concurrent experiments. Treatment moves both mean AND variance — Welch, not Student. Summary-stat API so the function works on streaming aggregates."
      byline={[
        {label:"Question type", value:"ML Coding"},
        {label:"Signature", value:"welch_t_test(mean_A, var_A, n_A, mean_B, var_B, n_B) → (t, df, p)"},
        {label:"Difficulty", value:"Hard"},
      ]}/>

    <VIS.TLDR>
      The <VIS.Term def="Two-sample t-test that does NOT assume equal variances between the two groups; uses each sample's own variance and a fractional Welch-Satterthwaite degrees of freedom.">Welch's t-test</VIS.Term> is the right default for A/B: the <VIS.Term def="The arm receiving the change being measured; in A/B testing, the variant that differs from the control baseline.">treatment</VIS.Term> usually shifts both the mean AND the variance, so <VIS.Term def="Two-sample t-test that ASSUMES the two populations share a common variance; pools sample variances into one estimate.">Student's t-test</VIS.Term> with its <VIS.Term def="Single shared variance estimate (n_A-1)s_A² + (n_B-1)s_B² over (n_A+n_B-2); assumes both groups draw from the same variance.">pooled variance</VIS.Term> is biased. Four invariants: (a) the <VIS.Term def="Estimated standard deviation of the sampling distribution of the mean difference; the denominator that turns an effect into a t-statistic.">standard error</VIS.Term> scales each variance by its own n; (b) the <VIS.Term def="Parameter of the t-distribution controlling tail thickness; Welch's df is fractional and lies strictly between min(n_A-1, n_B-1) and n_A+n_B-2.">degrees of freedom</VIS.Term> is <VIS.Term def="Approximation that matches the first two moments of the t-statistic's distribution under unequal variances; gives a fractional df.">Welch-Satterthwaite</VIS.Term>; (c) the <VIS.Term def="Reports significance for an effect in EITHER direction; the canonical A/B reporting because product teams care if treatment is better OR worse.">two-tailed p-value</VIS.Term> is the A/B default; (d) <VIS.Term def="Looking at results before the planned sample size and stopping early on significance; inflates Type I error far above the nominal alpha.">peeking</VIS.Term> inflates <VIS.Term def="The probability of declaring an effect when none exists; the nominal false-positive rate, conventionally 0.05 per test.">alpha</VIS.Term> unless you use a <VIS.Term def="Family of tests designed to be valid under repeated looks: group-sequential boundaries (Pocock, O'Brien-Fleming), always-valid p-values, mSPRT, Bayesian posterior thresholds.">sequential test</VIS.Term>.
    </VIS.TLDR>

    <VIS.Section id="sec-setup" title="The production scenario">
      <p>
        Your A/B platform exposes a <VIS.Term def="API that consumes only running aggregates (mean, variance, count) rather than raw per-user data; required when the experiment service streams Welford updates from many shards.">summary-statistics API</VIS.Term>: each shard returns the running mean, <VIS.Term def="Estimate of σ² using the n-1 (Bessel-corrected) denominator; the unbiased estimator of population variance from a finite sample.">sample variance</VIS.Term>, and count for its arm, and the test layer combines them. The <VIS.Term def="A baseline arm in an A/B test that receives the existing (unchanged) experience; the reference against which the treatment is compared.">control arm</VIS.Term> and treatment arm each carry their own running aggregates, and you never see the raw rows — only the six numbers. Engineers default to <code>scipy.stats.ttest_ind_from_stats</code>; half of them leave <code>equal_var=True</code>, which silently runs Student's test. A <VIS.Term def="Experiment that changed the price of an item; classic A/B trap because price changes shift both purchase rate and purchase-value variance.">price-change experiment</VIS.Term> with 2× treatment variance shipped on Student p=0.04 that was actually Welch p=0.11 — a <VIS.Term def="An effect declared significant that does not actually exist in the population; rejecting a true null hypothesis.">false positive</VIS.Term>. The fix was to mandate <VIS.Term def="A reproducible computation done before any data is observed; for A/B tests, includes the chosen test, alpha, MDE, sample size, and stopping rule.">pre-experiment registration</VIS.Term> of test choice and a <VIS.Term def="Sample-size budget computed before launch from alpha, power, baseline variance, and the target MDE; defines when the test is allowed to read out.">fixed-n schedule</VIS.Term>. Now every test on the platform is Welch, computed from summary stats.
      </p>
      <p>
        The decoy pool includes pooled-variance SE, Student's df, one-tailed p, and a <VIS.Term def="Replaces the t-distribution with a standard normal; valid only when both sample sizes are very large (typically n &gt; 1000 per arm).">z-approximation</VIS.Term>. Each is wrong for a different reason — see the trap drills below.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-primer" title="Concept primer">
      <p>
        The <VIS.Term def="The hypothesis being tested — typically that the two population means are equal; rejected when evidence (small p) is strong enough.">null hypothesis</VIS.Term> is that the two population means are equal: H₀: μ_A = μ_B. The <VIS.Term def="The complementary hypothesis the test would accept; for two-tailed Welch it is μ_A ≠ μ_B.">alternative hypothesis</VIS.Term> is μ_A ≠ μ_B. The <VIS.Term def="The number of standard errors the observed effect sits away from zero; sampled from a t-distribution under the null.">t-statistic</VIS.Term> measures how many standard errors the observed mean difference sits away from zero. Under H₀ with unequal variances, the statistic follows a t-distribution with Welch-Satterthwaite df, and the <VIS.Term def="The probability of observing a statistic at least as extreme as the one obtained, under the null hypothesis; what scipy.stats.t.sf returns.">p-value</VIS.Term> is the area in both tails beyond ±|t|. Because the <VIS.Term def="The smallest true effect the experiment is powered to reliably detect at the planned sample size and alpha; sets the floor on what 'no significant change' actually means.">minimum detectable effect</VIS.Term> scales as MDE ≈ z_(α/2) · √(2σ²/n), halving the MDE requires 4× the sample — the dominant cost driver in <VIS.Term def="Pre-experiment calculation of the sample size required to detect a target effect with given alpha and power; the standard planning step before launch.">power analysis</VIS.Term>.
      </p>
      <p>
        Reporting two-tailed is the A/B convention because a product team cares whether the treatment <em>moved</em> the metric in <em>either</em> direction — a treatment that significantly hurts the metric must also be caught. A <VIS.Term def="Tests a directional alternative (μ_B &gt; μ_A only); halves the p-value but requires committing to the direction BEFORE peeking at data, which almost no team actually does.">one-tailed test</VIS.Term> doubles statistical power but only if the direction is pre-registered, which most A/B platforms can't enforce. <VIS.Term def="The probability that the test correctly rejects the null when the true effect equals the MDE; conventionally 0.8.">Statistical power</VIS.Term>, sample size, alpha, and effect size are linked through one identity — fix three, the fourth is determined. The complementary error is a <VIS.Term def="Failing to reject the null when an effect truly exists; the false-negative rate, conventionally bounded by beta = 1 - power = 0.2.">Type II error</VIS.Term>, and tuning <VIS.Term def="The probability of NOT rejecting a true null hypothesis; equals 1 - alpha. The test's specificity.">specificity</VIS.Term> vs power is the headline tradeoff every A/B operator faces. A common variance-reduction lever before adding more samples is <VIS.Term def="Controlled-experiment Using Pre-Experiment Data: a regression adjustment that subtracts a learned linear function of a pre-period covariate from the outcome to reduce variance by 30-50% with no sample-size cost.">CUPED</VIS.Term>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-impl" title="The implementation">
      <VIS.CodeFillin
        id="wt-impl"
        difficulty="hard"
        title="welch_t_test from summary stats — fill in the blanks"
        language="python (scipy)"
        code={WT_CODE}
        options={[
          {key:"effect", text:"mean_B - mean_A", fills:[1]},
          {key:"welch_se", text:"math.sqrt(var_A / n_A + var_B / n_B)", fills:[2]},
          {key:"welch_df", text:"(var_A/n_A + var_B/n_B)**2 / ((var_A/n_A)**2/(n_A-1) + (var_B/n_B)**2/(n_B-1))", fills:[3]},
          {key:"two_tail_p", text:"2 * stats.t.sf(abs(t_stat), df)", fills:[4]},
          // Decoys
          {key:"pooled_se", text:"math.sqrt(((n_A-1)*var_A + (n_B-1)*var_B) / (n_A+n_B-2) * (1/n_A + 1/n_B))"},
          {key:"student_df", text:"n_A + n_B - 2"},
          {key:"one_tail_p", text:"stats.t.sf(t_stat, df)"},
          {key:"z_p", text:"2 * stats.norm.sf(abs(t_stat))"},
          {key:"sum_se", text:"math.sqrt(var_A + var_B)"},
        ]}
        trap={<>
          (1) Pooled SE silently overstates significance whenever the treatment variance differs from control — the exact bug that shipped the price-change false positive. (2) Student's df is too generous when one arm is much smaller or much higher-variance; Welch's df is always smaller, p is always larger. (3) A one-tailed p halves the value but is only valid if the direction was registered before the test ran. (4) The z-approximation is fine at n=10<sup>6</sup>/arm and dangerously optimistic at n=100.
        </>}
        lens={<>
          Reference:
          <pre style={{background:"#f1f5f9", padding:"10px 14px", borderRadius:6, fontSize:13, overflow:"auto"}}>{`effect = mean_B - mean_A
se = sqrt(var_A/n_A + var_B/n_B)
t = effect / se
df = (var_A/n_A + var_B/n_B)**2 / (
       (var_A/n_A)**2/(n_A-1) + (var_B/n_B)**2/(n_B-1))
p = 2 * stats.t.sf(abs(t), df)`}</pre>
          Verify against <code>scipy.stats.ttest_ind_from_stats(..., equal_var=False)</code>.
        </>}
        stretch={<>How would you implement this so it accepts streaming Welford-style updates from shards without re-reading raw data?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-traps" title="18 trap drills — Welch, df, peeking, MDE, sequential">
      <p>Each drill isolates one bug or concept. The goal is to lock in <em>why</em> the right answer is right, not memorize the formula. Topics span <VIS.Term def="The assumption that two groups share a common variance; required for Student's t-test, almost never true in A/B testing.">homoskedasticity</VIS.Term>, fractional df, peeking and <VIS.Term def="The total false-positive rate when the same data are tested many times; grows roughly linearly with the number of looks if no correction is applied.">cumulative alpha</VIS.Term>, MDE arithmetic, and modern sequential alternatives.</p>

      <VIS.TrapProblem
        id="wt-q1"
        difficulty="easy"
        mode="single"
        title="When does Welch differ from Student?"
        scenario={<>You're choosing between <code>equal_var=True</code> and <code>equal_var=False</code>.</>}
        options={[
          {key:"a", text:"They give materially different p-values when the sample variances differ between arms.", correct:true},
          {key:"b", text:"They are mathematically identical; Welch is just slower.", correct:false},
          {key:"c", text:"They differ only when sample sizes differ.", correct:false},
          {key:"d", text:"They differ only when sample sizes are below 30.", correct:false},
        ]}
        trap={<>(c) is the most-shipped misconception. Even at equal n, unequal variance changes BOTH the SE and the df, so the p-values diverge. (d) confuses the t-vs-z choice with the Welch-vs-Student choice.</>}
        lens={<>Welch and Student agree only in the limit of equal sample variances. The moment treatment shifts variance — which is most production A/B tests — the two diverge.</>}
      />

      <VIS.TrapProblem
        id="wt-q2"
        difficulty="medium"
        mode="single"
        title="Welch SE formula"
        scenario={<>Which is the Welch standard error?</>}
        options={[
          {key:"a", text:"sqrt(var_A / n_A + var_B / n_B)", correct:true},
          {key:"b", text:"sqrt(var_A + var_B)", correct:false},
          {key:"c", text:"sqrt(((n_A-1)var_A + (n_B-1)var_B) / (n_A+n_B-2) * (1/n_A + 1/n_B))", correct:false},
          {key:"d", text:"sqrt((var_A + var_B) / (n_A + n_B))", correct:false},
        ]}
        trap={<>(b) is the SE of the SUM of two independent variables, not of the difference of two means. (c) is Student's pooled SE — the most common silent ship. (d) divides by the wrong total.</>}
        lens={<>The SE of (mean_B - mean_A) is sqrt(Var(mean_A) + Var(mean_B)) = sqrt(σ²_A/n_A + σ²_B/n_B). Each variance is scaled by its own n.</>}
      />

      <VIS.TrapProblem
        id="wt-q3"
        difficulty="hard"
        mode="single"
        title="Welch-Satterthwaite df"
        scenario={<>What's df under Welch?</>}
        options={[
          {key:"a", text:"(var_A/n_A + var_B/n_B)² / ((var_A/n_A)²/(n_A-1) + (var_B/n_B)²/(n_B-1))", correct:true},
          {key:"b", text:"n_A + n_B - 2", correct:false},
          {key:"c", text:"min(n_A, n_B) - 1", correct:false},
          {key:"d", text:"n_A + n_B - 1", correct:false},
        ]}
        trap={<>(b) is Student's df — too generous, gives p too small. (c) is the conservative "safe" lower bound used as a sanity check, not the actual Welch df. (d) is the df for a single-sample test.</>}
        lens={<>Welch-Satterthwaite matches the first two moments of the t-statistic's distribution. It's a non-integer and always satisfies min(n_A-1, n_B-1) ≤ df_W ≤ n_A+n_B-2.</>}
      />

      <VIS.TrapProblem
        id="wt-q4"
        difficulty="medium"
        mode="multi"
        title="Why two-tailed for A/B?"
        scenario={<>Pick the genuinely true statements about two-tailed reporting.</>}
        options={[
          {key:"a", text:"Product teams want to detect harm and benefit; a treatment that significantly hurts the metric must be caught too.", correct:true},
          {key:"b", text:"One-tailed is valid only if the direction is pre-registered before data is observed.", correct:true},
          {key:"c", text:"Two-tailed doubles the p-value compared to a one-tailed test on the same data.", correct:true},
          {key:"d", text:"One-tailed is forbidden by the FDA, so most A/B platforms also forbid it.", correct:false},
          {key:"e", text:"Two-tailed has strictly more power than one-tailed at the same alpha.", correct:false},
        ]}
        trap={<>(d) is folklore — A/B platforms aren't bound by FDA rules; the constraint is internal credibility. (e) is the opposite of true: one-tailed has more power IF the direction is pre-registered, at the cost of catching nothing on the other tail.</>}
        lens={<>Two-tailed is the honest default because most teams cannot credibly pre-register a direction. The cost is a ~2× larger required sample for the same power; the benefit is catching harmful treatments.</>}
      />

      <VIS.TrapProblem
        id="wt-q5"
        difficulty="medium"
        mode="single"
        title="One-tailed p from two-tailed"
        scenario={<>The function returns two-tailed p=0.06. The PM says "but I only care about lifts." What's the one-tailed p (assuming the observed direction is the lift direction)?</>}
        options={[
          {key:"a", text:"0.03 — only valid if direction was pre-registered.", correct:true},
          {key:"b", text:"0.12 — double the two-tailed.", correct:false},
          {key:"c", text:"0.06 — they're equivalent.", correct:false},
          {key:"d", text:"Cannot be derived from the two-tailed alone.", correct:false},
        ]}
        trap={<>(b) doubles when you should halve. (c) ignores the tail definition. (d) misses that two-tailed = 2 · one-tailed (on the same tail) for symmetric distributions like the t.</>}
        lens={<>Halve the two-tailed for the one-tailed in the observed direction — but post-hoc one-tailing after seeing the data is p-hacking. Either pre-register or report two-tailed.</>}
      />

      <VIS.TrapProblem
        id="wt-q6"
        difficulty="medium"
        mode="single"
        title="MDE scales with what?"
        scenario={<>You want to halve the minimum detectable effect at fixed alpha and power. How much more sample do you need per arm?</>}
        options={[
          {key:"a", text:"4× the sample per arm.", correct:true},
          {key:"b", text:"2× the sample per arm.", correct:false},
          {key:"c", text:"sqrt(2)× the sample per arm.", correct:false},
          {key:"d", text:"Halve the sample (MDE is linear in n).", correct:false},
        ]}
        trap={<>(b) is the common misread of the formula. MDE ∝ 1/sqrt(n), so halving MDE requires 4× n, not 2×. (d) confuses MDE with effect size from a fixed-n test.</>}
        lens={<>MDE ≈ z_(α/2) · sqrt(2σ²/n) under equal arms and a two-tailed test. Cutting MDE in half costs a quadratic in sample size — the dominant planning constraint.</>}
      />

      <VIS.TrapProblem
        id="wt-q7"
        difficulty="hard"
        mode="single"
        title="MDE formula recall"
        scenario={<>For a two-sample two-tailed test at alpha and power 1-β, with equal arms of size n and pooled variance σ², the MDE is approximately:</>}
        options={[
          {key:"a", text:"(z_(α/2) + z_β) · sqrt(2σ²/n)", correct:true},
          {key:"b", text:"z_(α/2) · sqrt(σ²/n)", correct:false},
          {key:"c", text:"z_α · sqrt(2σ²/n)", correct:false},
          {key:"d", text:"sqrt(σ²/n) / z_(α/2)", correct:false},
        ]}
        trap={<>(b) drops the power term entirely — equivalent to assuming power=0.5. (c) uses one-tailed z. (d) inverts the relation.</>}
        lens={<>The full formula is MDE = (z_(α/2) + z_β) · SE under H₀; at power=0.8 the z_β term adds ~0.84, so MDE is roughly 2.8× the standard error for α=0.05, power=0.8.</>}
      />

      <VIS.TrapProblem
        id="wt-q8"
        difficulty="hard"
        mode="single"
        title="Peeking — what actually breaks?"
        scenario={<>You look at the running p-value every day for 14 days, stopping the moment p &lt; 0.05.</>}
        options={[
          {key:"a", text:"True false-positive rate is ~3-4× the nominal 0.05 over 14 looks.", correct:true},
          {key:"b", text:"No inflation as long as each look uses a valid t-test.", correct:false},
          {key:"c", text:"Inflation only matters if you decide to stop early; observing is fine.", correct:false},
          {key:"d", text:"Inflation is exactly 14 × 0.05 = 0.70.", correct:false},
        ]}
        trap={<>(b) is the classic misconception — each look IS valid in isolation, but the STOPPING rule is not. (c) ignores that the optional-stopping rule itself is the problem. (d) treats the looks as independent, which overstates inflation.</>}
        lens={<>Optional stopping converts a fixed-n test into a random-stopping-time test; the actual Type I error grows ~logarithmically in the number of looks. Use a sequential test if you want to peek.</>}
      />

      <VIS.TrapProblem
        id="wt-q9"
        difficulty="medium"
        mode="multi"
        title="Sequential alternatives to fixed-n t-test"
        scenario={<>Which methods give valid inference under continuous monitoring?</>}
        options={[
          {key:"a", text:"Group-sequential boundaries (Pocock, O'Brien-Fleming) at pre-planned interim analyses.", correct:true},
          {key:"b", text:"Always-valid p-values via mSPRT (mixture sequential probability ratio test).", correct:true},
          {key:"c", text:"Bayesian posterior probability thresholds with proper priors.", correct:true},
          {key:"d", text:"Bonferroni correction at each look using the current number of looks.", correct:false},
          {key:"e", text:"Just lowering alpha to 0.01 instead of 0.05.", correct:false},
        ]}
        trap={<>(d) Bonferroni applied online is conservative AND wrong — it doesn't account for the dependence between sequential looks. (e) reduces inflation but doesn't eliminate it; it's not a principled fix.</>}
        lens={<>The two industrial defaults: O'Brien-Fleming for clinical-style fixed-look schedules, mSPRT (Optimizely-style) for fully continuous monitoring. Bayesian thresholds work too if the prior is honest.</>}
      />

      <VIS.TrapProblem
        id="wt-q10"
        difficulty="hard"
        mode="single"
        title="Welch vs Mann-Whitney"
        scenario={<>Metric is heavily right-skewed (revenue per user). What's the right move?</>}
        options={[
          {key:"a", text:"Welch on the mean is usually fine at large n (CLT); for small n or extreme outliers, Mann-Whitney on ranks is more robust but tests a different quantity.", correct:true},
          {key:"b", text:"Mann-Whitney is strictly better for revenue data.", correct:false},
          {key:"c", text:"Welch is invalid for skewed data and should never be used.", correct:false},
          {key:"d", text:"Log-transform first, then Student's t-test on the log scale.", correct:false},
        ]}
        trap={<>(b) ignores that Mann-Whitney tests stochastic dominance, not means — product teams usually want mean revenue. (c) misreads the CLT: Welch on means is asymptotically valid for ANY finite-variance distribution. (d) is a real option but changes the estimand to the geometric mean.</>}
        lens={<>Welch on raw revenue at n &gt; ~1000/arm is robust; CUPED variance reduction is the next lever. Mann-Whitney is a fallback when sample sizes are tiny.</>}
      />

      <VIS.TrapProblem
        id="wt-q11"
        difficulty="medium"
        mode="single"
        title="Z-approximation: when is it safe?"
        scenario={<>You replace <code>stats.t.sf</code> with <code>stats.norm.sf</code>.</>}
        options={[
          {key:"a", text:"Safe at n &gt; ~1000 per arm; biased optimistic at small n because t has fatter tails than normal.", correct:true},
          {key:"b", text:"Safe at any n; t and normal are mathematically identical.", correct:false},
          {key:"c", text:"Safe only if variances are equal.", correct:false},
          {key:"d", text:"Never safe — always use t.", correct:false},
        ]}
        trap={<>(b) confuses the n→∞ limit with finite-n behavior. (c) confuses Welch's correction with the z-vs-t choice — orthogonal issues. (d) is overcautious; at n=10⁵, t and normal agree to 4 decimals.</>}
        lens={<>The t-distribution has heavier tails than normal — using z at small n gives smaller p-values than reality. Web-scale A/B with n &gt; 10⁴ per arm is squarely in the normal regime; survey-scale work isn't.</>}
      />

      <VIS.TrapProblem
        id="wt-q12"
        difficulty="medium"
        mode="single"
        title="Sample-size sensitivity"
        scenario={<>Arm A has n=50,000 and var=1.0; arm B has n=500 and var=1.0. Mean difference is 0.05. What dominates the SE?</>}
        options={[
          {key:"a", text:"The smaller arm — var_B/n_B = 1/500 = 2e-3 dominates over var_A/n_A = 2e-5.", correct:true},
          {key:"b", text:"The larger arm — it carries more weight.", correct:false},
          {key:"c", text:"They contribute equally because variances are equal.", correct:false},
          {key:"d", text:"Cannot tell without knowing the means.", correct:false},
        ]}
        trap={<>(b) inverts the relation — SE is dominated by the term with the larger var/n. (c) ignores that equal variance does NOT mean equal contribution when n differs. (d) confuses SE with the t-statistic.</>}
        lens={<>SE² = var_A/n_A + var_B/n_B. The smaller arm contributes 100× more to the SE here. Power is bottlenecked by the smaller arm — adding samples to the bigger one barely helps.</>}
      />

      <VIS.TrapProblem
        id="wt-q13"
        difficulty="hard"
        mode="single"
        title="Asymmetric allocation"
        scenario={<>You're running 99/1 traffic split (1% treatment). Variances are equal. What does that buy you?</>}
        options={[
          {key:"a", text:"Almost nothing — the 1% arm bottlenecks SE; equal-allocation 50/50 is roughly 25× more powerful at the same total traffic.", correct:true},
          {key:"b", text:"Same power as 50/50 because total traffic is the same.", correct:false},
          {key:"c", text:"More power because control has tighter mean estimate.", correct:false},
          {key:"d", text:"Less Type I error.", correct:false},
        ]}
        trap={<>(b) ignores that SE is set by the harmonic mean of the n's, not the arithmetic mean. (c) is true but irrelevant — the SE is dominated by the small arm. (d) confuses allocation with alpha.</>}
        lens={<>Power is maximized at 50/50 under equal variance. 99/1 splits make sense ONLY when you need to limit blast radius of a risky treatment — they buy safety, not statistical efficiency.</>}
      />

      <VIS.TrapProblem
        id="wt-q14"
        difficulty="hard"
        mode="single"
        title="Variance shifted by treatment"
        scenario={<>Treatment introduces a new feature that 10% of users adopt heavily; var_B is 3× var_A. What does Student's pooled SE do?</>}
        options={[
          {key:"a", text:"Pools the variances toward an average, understating var_B's contribution and overstating significance on the treatment side.", correct:true},
          {key:"b", text:"Correctly weights by sample size, so it's fine.", correct:false},
          {key:"c", text:"Overstates the SE, making the test conservative.", correct:false},
          {key:"d", text:"Has no effect because the means are unchanged.", correct:false},
        ]}
        trap={<>(b) confuses pooling with the SE formula — pooling assumes a SHARED variance, which is the bug. (c) inverts the bias direction. (d) misses that variance changes propagate into the denominator of the t-statistic.</>}
        lens={<>This is the canonical Welch motivation. Whenever the treatment changes user BEHAVIOR (and so changes variance), Student's pooled SE is biased; Welch gives the correct test.</>}
      />

      <VIS.TrapProblem
        id="wt-q15"
        difficulty="medium"
        mode="single"
        title="Cumulative alpha from many tests"
        scenario={<>You run 100 independent A/B tests, each at alpha=0.05. Expected number of false positives (under all-nulls)?</>}
        options={[
          {key:"a", text:"5 — alpha · number of tests.", correct:true},
          {key:"b", text:"0.05 — alpha is a probability, not a count.", correct:false},
          {key:"c", text:"95 — power · number of tests.", correct:false},
          {key:"d", text:"Less than 5 due to dependence between tests.", correct:false},
        ]}
        trap={<>(b) confuses per-test with family-wise. (c) inverts alpha and power. (d) is plausible-sounding but the tests are stated independent.</>}
        lens={<>5 false positives per 100 nulls is the cost of alpha=0.05. This motivates FDR or Bonferroni when you're running many tests on the same dataset, and explains why "best of N" launch criteria are biased.</>}
      />

      <VIS.TrapProblem
        id="wt-q16"
        difficulty="medium"
        mode="single"
        title="CUPED's role"
        scenario={<>CUPED uses a pre-period covariate. What does it do?</>}
        options={[
          {key:"a", text:"Reduces SE by removing pre-existing user variance; typical 30-50% SE reduction.", correct:true},
          {key:"b", text:"Increases statistical power by raising alpha.", correct:false},
          {key:"c", text:"Reduces bias from imperfect randomization.", correct:false},
          {key:"d", text:"Replaces the t-test entirely with a regression-based test.", correct:false},
        ]}
        trap={<>(b) confuses power with alpha — CUPED doesn't change alpha. (c) confuses variance reduction with bias correction. (d) is partially true (it does use a regression adjustment) but the EFFECT is variance reduction, not a new test.</>}
        lens={<>CUPED = controlled experiment with pre-experiment data. Subtract a learned linear function of pre-period metric from the outcome; the residual has lower variance, the t-test runs as usual on residuals.</>}
      />

      <VIS.TrapProblem
        id="wt-q17"
        difficulty="hard"
        mode="single"
        title="P-value floor on summary stats"
        scenario={<>n_A = n_B = 30, var_A = var_B = 1, |mean_B - mean_A| = 4. What's a sane p?</>}
        options={[
          {key:"a", text:"Tiny — on the order of 1e-6 — because t ≈ 4/sqrt(2/30) ≈ 15.5 with df ≈ 58.", correct:true},
          {key:"b", text:"~0.05 — the conventional threshold.", correct:false},
          {key:"c", text:"~0.5 — too few samples to tell.", correct:false},
          {key:"d", text:"Exactly 0 — the test is undefined.", correct:false},
        ]}
        trap={<>(b)/(c) under-trust an enormous t. (d) confuses numerical underflow with mathematical zero — scipy returns a finite (very small) p.</>}
        lens={<>An effect that's 15 SEs from zero is extraordinary regardless of df; the p-value floors at the numerical precision of the survival function. Sanity-check: |t| &gt; 5 ≈ "definitely significant" in any practical regime.</>}
      />

      <VIS.TrapProblem
        id="wt-q18"
        difficulty="hard"
        mode="multi"
        title="Things that DO NOT fix peeking inflation"
        scenario={<>Pick the moves that do NOT actually fix the optional-stopping problem.</>}
        options={[
          {key:"a", text:"Adding more users at the end of the test (after you've already peeked).", correct:true},
          {key:"b", text:"Pre-registering the stopping rule and then sticking to it (no peeking).", correct:false},
          {key:"c", text:"Switching to a Bayesian posterior at the end without changing how you stopped.", correct:true},
          {key:"d", text:"Using a mSPRT always-valid p-value from day one.", correct:false},
          {key:"e", text:"Reporting only two-tailed p-values.", correct:true},
        ]}
        trap={<>(c) — Bayesian posteriors aren't immune to optional stopping if the prior is improper or the stopping rule is data-dependent; the conjugate misconception. (e) — two-tailed vs one-tailed is orthogonal to peeking.</>}
        lens={<>The principled fixes: (b) fixed-n with no peeking; (d) sequential tests that account for the stopping rule from the start. Adding samples post-hoc or switching frameworks at the end doesn't undo the bias.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://en.wikipedia.org/wiki/Welch%27s_t-test" target="_blank" rel="noopener"><strong>Wikipedia — Welch's t-test</strong></a> — derivation + Welch-Satterthwaite df.</li>
        <li><a href="https://exp-platform.com/Documents/2013-02-CUPED-ImprovingSensitivityOfControlledExperiments.pdf" target="_blank" rel="noopener"><strong>Deng et al. — CUPED</strong> (WSDM 2013)</a> — variance reduction.</li>

      </ul>
    </VIS.Section>
