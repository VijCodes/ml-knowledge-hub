        <VIS.Section id="sec-walk" title="Walking the system">
          <ol>
            <li><strong>Router prefix-hashes the prompt.</strong> If the <VIS.Term def="System prompt: the fixed instructional preamble prepended to every user message in a chat product. Often 1k-4k tokens of role description, tools, safety policy. Same prefix repeats across millions of sessions — the canonical target for prefix-caching.">system prompt</VIS.Term> is already cached on a replica, route there; otherwise least-loaded. <VIS.Equation tex={String.raw`P(\text{cache hit}) \approx 1 - \prod_i (1 - h_i)`} /></li>
            <li><strong>Tokenize</strong> on CPU using <VIS.Term def="Byte-pair encoding: subword tokenizer that learns a vocabulary of frequent byte sequences. Each model ships with its own BPE vocab; tokenizer mismatches between training and serving silently break prefix-cache keys.">BPE</VIS.Term>; ~2 ms even at 32k tokens. Bytes-in is not the cost.</li>
            <li><strong>Prefix-cache lookup.</strong> Hit -> reuse system-prompt KV blocks, skip those layers of prefill. <VIS.Equation tex={String.raw`C_{\text{prefill}} \to C_{\text{prefill}} \cdot (1 - r_{\text{cached}})`} /></li>
            <li><strong>Chunk + prefill.</strong> Long prompts split into 2k-token tiles via <VIS.Term def="Chunked prefill (split-fuse): break a long prefill into fixed-size token chunks and interleave each chunk with one decode step in the same scheduler tick. Prevents a 32k prefill from starving the decode batch for hundreds of ms.">chunked prefill</VIS.Term> so one 32k prefill cannot starve a decode step. Attention compute scales as <VIS.Equation tex={String.raw`O(L^2 d)`} />.</li>
            <li><strong>KV cache writes</strong> populate paged blocks via the <VIS.Term def="Block allocator: maintains a free list of fixed-size KV cache blocks (typically 16 tokens each). New requests pull blocks on demand and return them on completion. Block-level sharing across requests is what enables prefix-cache hits to avoid recompute.">block allocator</VIS.Term>. <VIS.Equation tex={String.raw`\text{KV bytes} = 2 \cdot n_{\text{layers}} \cdot n_{\text{heads}} \cdot d_{\text{head}} \cdot L \cdot \text{bytes}`} /></li>
            <li><strong>Continuous batcher</strong> admits this request into the live decode batch and may <VIS.Term def="Preemption (in LLM serving): the scheduler evicts the longest-running or lowest-priority request from the running batch to free KV blocks for new arrivals. Preempted requests can be resumed when blocks free up; the state lives in the cache.">preempt</VIS.Term> a finished one.</li>
            <li><strong>Decode loop</strong>: every step reads weights + KV from <VIS.Term def="High-bandwidth memory: stacked DRAM mounted on the GPU package (3.35 TB/s on H100). The bottleneck for decode — every step reads the entire model and KV, and HBM bandwidth divided by bytes-per-token sets the tok/s ceiling.">HBM</VIS.Term>. <VIS.Equation tex={String.raw`\text{TPOT} \approx \frac{\text{bytes/token}}{\text{HBM BW}}`} /></li>
            <li><strong>Speculative drafter</strong> proposes k tokens; verifier accepts a prefix. Expected speedup <VIS.Equation tex={String.raw`\frac{1}{1 - \alpha + \alpha/k}`} /> for <VIS.Term def="Acceptance rate (alpha): the per-token probability that the verifier model agrees with the draft proposal. Drives speculative decoding speedup more than any other knob; distilling the draft on verifier traces is the cheapest way to lift it.">acceptance rate alpha</VIS.Term>.</li>
            <li><strong>Stream tokens</strong> over <VIS.Term def="Server-sent events: a one-way HTTP streaming protocol where the server pushes text/event-stream chunks to the client. Lower overhead than WebSocket for token streaming because the channel is one-directional.">SSE</VIS.Term> as they emerge.</li>
            <li><strong>OOM handler</strong> watches the KV block free list. When low, preempt the longest request and return <VIS.Term def="HTTP 429 Too Many Requests: status code signaling the client should slow down and retry later. The standard backpressure signal in LLM APIs; should be paired with a Retry-After header so clients back off without hammering.">429</VIS.Term> to new arrivals.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. KV cache size — the dominant VRAM consumer</h3>
          <p>For each token, the <VIS.Term def="KV cache: the stored Key and Value tensors from every attention layer, accumulated as the model decodes. Lets the next decode step reuse all prior attention state instead of recomputing it. Grows linearly with sequence length and dominates VRAM at long context.">KV cache</VIS.Term> stores K and V vectors for every layer and every head:</p>
          <VIS.Equation display={true} tex={String.raw`\text{KV bytes per token} \;=\; 2 \cdot n_{\text{layers}} \cdot n_{\text{heads}} \cdot d_{\text{head}} \cdot b`} />
          <p>For a 70B-class model with 80 layers, 64 heads, head-dim 128, FP16 (b=2):</p>
          <VIS.Equation display={true} tex={String.raw`2 \cdot 80 \cdot 64 \cdot 128 \cdot 2 \;=\; 2.6\,\text{MB / token}`} />
          <p>A 32k-token conversation reserves <strong>~84 GB</strong> of KV — more than the weights themselves. FP8 KV halves this to 1.3 MB/token, doubling the number of concurrent streams the same node can hold.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. Prefill FLOPs — quadratic in prompt length</h3>
          <p>Per-layer <VIS.Term def="Self-attention: the operation that lets each token attend to every previous token in the sequence. Compute scales as O(L^2 d) because every pair of positions interacts; this quadratic term is what makes long prompts expensive at prefill time.">self-attention</VIS.Term> does <VIS.Equation tex={String.raw`O(L^2 d)`} /> work; the <VIS.Term def="Feed-forward network: the two-layer MLP applied independently to each token after attention. Holds most of the model's parameters and dominates per-token compute at short context; linear in L.">FFN</VIS.Term> does <VIS.Equation tex={String.raw`O(L d^2)`} />. For prompt length L:</p>
          <VIS.Equation display={true} tex={String.raw`\text{FLOPs}_{\text{prefill}} \;\approx\; n_{\text{layers}} \big( 4 L d^2 + 2 L^2 d \big)`} />
          <p>Doubling L roughly doubles the FFN term but <em>quadruples</em> the attention term. At long context the L^2 piece dominates — this is why prefill is compute-bound and why chunking (process 2k tiles instead of one 32k pass) wins.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. Decode FLOPs — linear, but bandwidth-bound</h3>
          <VIS.Equation display={true} tex={String.raw`\text{FLOPs}_{\text{decode/token}} \;\approx\; 2 N_{\text{params}}`} />
          <p>For a 70B model, ~140 GFLOPs per output token. An H100 supplies 990 TFLOPs FP16. The naive throughput ceiling looks huge — but it is the wrong ceiling.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. Roofline — why decode tok/s is set by HBM bandwidth</h3>
          <p><VIS.Term def="Arithmetic intensity: ratio of FLOPs performed to bytes read from memory for a kernel. Below the GPU's ridge point the workload is bandwidth-bound; above it, compute-bound. Single-stream decode sits at ~1 FLOP/byte versus the H100 ridge of ~300 — firmly BW-bound.">Arithmetic intensity</VIS.Term> for a single decode step:</p>
          <VIS.Equation display={true} tex={String.raw`I \;=\; \frac{\text{FLOPs}}{\text{bytes read}} \;\approx\; \frac{2 N}{2 N} \;=\; 1 \;\text{FLOP/byte}`} />
          <p>H100 ridge point is ~300 FLOP/byte. I = 1 sits two orders of magnitude below the ridge — decode is firmly BW-bound. Steady-state tok/s for a single stream:</p>
          <VIS.Equation display={true} tex={String.raw`\text{tok/s} \;\le\; \frac{\text{HBM BW}}{\text{bytes/token}} \;=\; \frac{3.35\,\text{TB/s}}{140\,\text{GB}} \;\approx\; 24\,\text{tok/s (1 GPU, FP16)}`} />
          <p>With <VIS.Term def="Tensor parallelism: shard each linear layer across multiple GPUs so each GPU holds 1/N of the weights and contributes 1/N of the matmul. Requires an all-reduce per layer; intra-node NVLink makes this affordable. The default intra-node parallelism plan for inference.">TP=8</VIS.Term> the per-token bytes drop 8x; single-stream ceiling rises to ~190 tok/s. Continuous batching amortizes this across many streams via <VIS.Term def="NVLink: NVIDIA's high-speed GPU-to-GPU interconnect (900 GB/s on H100 NVLink4). Makes intra-node tensor parallelism viable by keeping all-reduce latency low. Inter-node falls back to InfiniBand at much lower bandwidth.">NVLink</VIS.Term> all-reduces.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. Continuous-batching gain</h3>
          <p>Let request length distribution have mean <VIS.Equation tex={String.raw`\bar{L}`} /> and max <VIS.Equation tex={String.raw`L_{\max}`} />. Static batching pays for the longest in every batch:</p>
          <VIS.Equation display={true} tex={String.raw`\text{eff}_{\text{static}} \;=\; \frac{\bar{L}}{L_{\max}}`} />
          <p>Continuous batching admits and evicts at each step; effective utilization approaches 1 in the steady state:</p>
          <VIS.Equation display={true} tex={String.raw`\frac{\text{thrpt}_{\text{cont}}}{\text{thrpt}_{\text{static}}} \;\approx\; \frac{L_{\max}}{\bar{L}}`} />
          <p>For typical chat traces (<VIS.Equation tex={String.raw`L_{\max}/\bar{L} \approx 2{-}3`} />) the gain is 2–3x, matching the vLLM paper's reported numbers.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. Quantization speedup (weights + KV)</h3>
          <p>Decode tok/s is BW-bound, so the speedup is bytes ratio:</p>
          <VIS.Equation display={true} tex={String.raw`\text{speedup} \;=\; \frac{\text{bytes/token}_{\text{FP16}}}{\text{bytes/token}_{q}}`} />
          <p>FP16 -> INT8 weights: 2x. FP16 -> FP8 KV: 2x KV capacity (more concurrent streams) at the same TPOT. Combined effect on throughput at fixed VRAM is closer to 3–4x for long-context chat.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Speculative decoding speedup</h3>
          <p>Draft model proposes k tokens, big model verifies them in parallel. Let <VIS.Equation tex={String.raw`\alpha`} /> be the per-token acceptance rate. Expected accepted tokens per verifier call:</p>
          <VIS.Equation display={true} tex={String.raw`E[\text{accepted}] \;=\; \frac{1 - \alpha^{k+1}}{1 - \alpha}`} />
          <p>Speedup over plain decode (ignoring draft cost):</p>
          <VIS.Equation display={true} tex={String.raw`S \;=\; \frac{1 - \alpha^{k+1}}{(1 - \alpha)(1 + c_d)}`} />
          <p>where <VIS.Equation tex={String.raw`c_d`} /> is the draft-model cost ratio. At alpha ~ 0.75, k=4, c_d ~ 0.1 the speedup lands near 2x — and quality is identical to running the big model alone (the verifier guarantees this).</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Little's Law for the decode queue</h3>
          <p>In steady state, <VIS.Term def="Little's Law: in a stable queueing system, L = lambda * W. Mean number in system equals arrival rate times mean time in system. The single most-used formula in capacity planning.">Little's Law</VIS.Term> says mean concurrent streams equals arrival rate times mean session duration:</p>
          <VIS.Equation display={true} tex={String.raw`N \;=\; \lambda \cdot \bar{T}_{\text{session}}`} />
          <p>At <VIS.Equation tex={String.raw`\lambda = 5000\,\text{req/s}`} /> and <VIS.Equation tex={String.raw`\bar{T} = 8\,\text{s}`} />, N = 40k concurrent streams system-wide. With FP16 KV at 1.3 MB/token and a mean 500 output tokens, each stream costs ~650 MB — KV capacity, not weights, sets cluster size.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Prefix cache hit-rate math</h3>
          <p>For N tenants each with one fixed system prompt and <VIS.Term def="Zipfian distribution: empirical power-law distribution where the i-th most-popular item has frequency proportional to 1/i^s. Describes real-world chat-tenant traffic: a few system prompts dominate, the long tail is sparse — perfect for caching.">Zipfian traffic</VIS.Term> <VIS.Equation tex={String.raw`p_i \propto 1/i^s`} />, the cache-hit rate of an <VIS.Term def="Least-recently-used cache: eviction policy that discards the item that has gone the longest without access. Standard choice for prefix-cache because system-prompt access has strong temporal locality across a tenant's sessions.">LRU</VIS.Term> sized for the top-k prompts is:</p>
          <VIS.Equation display={true} tex={String.raw`r_{\text{hit}} \;=\; \sum_{i=1}^{k} \frac{1/i^s}{\sum_{j=1}^{N} 1/j^s}`} />
          <p>For s=1, k=100, N=10k, hit-rate ~ 0.55. Each hit skips the prefill cost on the cached prefix — a ~50% reduction in prefill GPU-hours for a chat product with a small set of dominant system prompts.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. TTFT vs TPOT latency budget</h3>
          <p>End-to-end p95 for a 500-token response:</p>
          <VIS.Equation display={true} tex={String.raw`T_{\text{total}} \;=\; T_{\text{queue}} \;+\; T_{\text{TTFT}} \;+\; 500 \cdot \text{TPOT}`} />
          <p>Budgeting TTFT p95 = 1.2 s and TPOT = 17 ms (60 tok/s/stream): T_total = 1.2 + 500·0.017 = 9.7 s. Doubling the batch size cuts cluster cost in half but raises TTFT (longer prefill queue) and lifts TPOT (more streams sharing BW). The <VIS.Term def="Pareto front: the set of operating points where no axis can improve without another axis getting worse. For LLM serving, the axes are TTFT, TPOT, and cost-per-token — any single-axis 'optimum' is meaningless without the other two.">Pareto front</VIS.Term> is what you actually optimize.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Static batching only."</strong> A 32k-prompt request stalls 31 others. Continuous batching exists exactly to avoid this. Math: §3e.</li>
            <li><strong>"FP16 KV, no quant, max-len contiguous alloc."</strong> A 200-token response reserves 32k of VRAM. KV fragmentation strangles concurrency long before HBM bandwidth is the limit. Math: §3a + §3f.</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-traps" title="Trap drills (25 problems)">

          <h3 style={{marginTop:10, marginBottom:6, fontSize:15, color:"#334155"}}>Business / north-star metrics</h3>
          <VIS.TrapProblem
            id="llm-q1"
            difficulty="medium"
            mode="single"
            title="Which latency metric is the right north star for interactive chat?"
            scenario={<>One number for the team dashboard. Pick it.</>}
            options={[
              {key:"a", text:"p95 TTFT alongside p95 TPOT, tracked as two separate gauges per route.", correct:true},
              {key:"b", text:"Mean end-to-end response time across all requests in 5-minute windows.", correct:false},
              {key:"c", text:"p99 wall-clock from request arrival to the last streamed output token.", correct:false},
              {key:"d", text:"Average sustained tokens-per-second measured across the whole cluster.", correct:false},
            ]}
            trap={<>(b) and (d) average over heterogeneous output lengths — a TTFT regression on short answers hides behind long answers. (c) bundles two phases with different physics into one number; you cannot tell whether prefill (compute) or decode (bandwidth) regressed.</>}
            lens={<>TTFT and TPOT are governed by different hardware limits and respond to different knobs. Track them as separate p95s and alert independently.</>}
            stretch={<>Why might tracking p99 TPOT lead you to the wrong scaling decision compared to p95?</>}
          />
          <VIS.TrapProblem
            id="llm-q2"
            difficulty="medium"
            mode="single"
            title="Cost-per-million-tokens — what should the formula actually measure?"
            scenario={<>Finance wants a single price tag per million tokens served.</>}
            options={[
              {key:"a", text:"GPU-hours times $/hour divided by total output tokens generated each day.", correct:false},
              {key:"b", text:"Energy used in kWh divided by total tokens emitted, normalized per million.", correct:false},
              {key:"c", text:"Total GPU-hours times $/hour divided by request count over the billing period.", correct:false},
              {key:"d", text:"GPU-hours times $/hour over (input + output) tokens, weighted by phase cost.", correct:true},
            ]}
            trap={<>(a) ignores prefill cost on input tokens — input is not free at 32k prompts. (c) per-request collapses heterogeneous lengths. (b) measures energy, not cost; ignores capex and idle.</>}
            lens={<>Prefill cost lives on input tokens (compute-bound); decode cost lives on output tokens (BW-bound). A unified price has to weight them or the math lies for long-prompt workloads.</>}
            stretch={<>How does the right weighting shift between a code-assistant (long input, short output) and a creative-writing tool (short input, long output)?</>}
          />
          <VIS.TrapProblem
            id="llm-q3"
            difficulty="medium"
            mode="multi"
            title="Which SLOs make sense to publish for an LLM API product?"
            scenario={<>Pick SLOs that customers can reason about and you can defend.</>}
            options={[
              {key:"a", text:"Bit-exact reproducibility across deploys for identical (prompt, seed) pairs.", correct:false},
              {key:"b", text:"p95 TTFT under 1.5s for prompts up to 4k tokens on the standard tier.", correct:true},
              {key:"c", text:"Minimum sustained 50 tok/s/stream during the steady-state of a session.", correct:true},
              {key:"d", text:"99.9% availability of the inference endpoint over a rolling 30-day window.", correct:true},
              {key:"e", text:"Identical perplexity scores across consecutive deploys of the same model.", correct:false},
              {key:"f", text:"Sustained 10M tokens/sec aggregate throughput on a single-GPU pricing plan.", correct:false},
            ]}
            trap={<>(a) and (e) are physically impossible with non-deterministic kernels, mixed precision, and quantization. (f) is unphysical at any plan tier. The right SLOs are latency, sustained tok/s, and availability — bounded by physics.</>}
            lens={<>SLOs must be measurable and physically attainable. Quality is usually proxied by held-out evals, not by exact reproducibility.</>}
            stretch={<>If you cannot promise exact reproducibility, how do you give customers stable behavior across deploys?</>}
          />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>Data collection / traffic shaping</h3>
          <VIS.TrapProblem
            id="llm-q4"
            difficulty="medium"
            mode="single"
            title="Which traffic signal best predicts when to add a new decode replica?"
            scenario={<>You are tuning the autoscaler for the decode pool.</>}
            options={[
              {key:"a", text:"GPU utilization percent reported by nvidia-smi on the existing replicas.", correct:false},
              {key:"b", text:"Number of active TCP connections held by the frontend load balancer.", correct:false},
              {key:"c", text:"Decode queue depth combined with p95 TPOT trending above the SLO target.", correct:true},
              {key:"d", text:"CPU utilization percent on the request router and tokenizer hosts.", correct:false},
            ]}
            trap={<>(a) decode is already designed to keep the GPU busy; util sits at 80–95% even when latency is fine. (b) and (d) are frontend signals, not backend health. The backend's pain shows up in queue depth and decode-step slowdown.</>}
            lens={<>Scale on the variable that maps to user pain. For decode that is queue depth plus TPOT; for prefill it is prompt-token rate.</>}
            stretch={<>Why might you want a separate autoscaler per phase rather than one global one?</>}
          />
          <VIS.TrapProblem
            id="llm-q5"
            difficulty="medium"
            mode="single"
            title="How should you sample production traffic for ongoing offline quality eval?"
            scenario={<>You need quality monitoring without leaking PII into eval logs.</>}
            options={[
              {key:"a", text:"Uniform-random 1% of all daily requests, PII-scrubbed before storage.", correct:false},
              {key:"b", text:"Always sample the 1000 most recent production requests in a sliding window.", correct:false},
              {key:"c", text:"Stratify by prompt-length and tenant, plus 200 fixed canary prompts replayed daily.", correct:true},
              {key:"d", text:"Sample only requests that received a thumbs-down feedback signal from users.", correct:false},
            ]}
            trap={<>(a) underweights rare long-context behavior. (b) is recency-biased and unstable across days. (d) is selection-biased toward known failures and gives no signal on average quality.</>}
            lens={<>Stratified sampling plus a fixed golden canary lets you compare deploys apples-to-apples while still observing live distribution shifts.</>}
            stretch={<>How do you keep the canary set fresh without making it a moving target across deploys?</>}
          />
          <VIS.TrapProblem
            id="llm-q6"
            difficulty="hard"
            mode="multi"
            title="Which signals belong in the request-routing decision?"
            scenario={<>The router must pick a replica for an incoming request. Pick valid inputs.</>}
            options={[
              {key:"a", text:"Prefix hash of the system prompt to land near warm KV blocks on the replica.", correct:true},
              {key:"b", text:"Replica-level decode queue depth measured in the last 100ms sliding window.", correct:true},
              {key:"c", text:"Estimated prompt length from the tokenizer, used as a cost proxy for prefill.", correct:true},
              {key:"d", text:"User geographic region only, ignoring the cache state and replica capacity.", correct:false},
              {key:"e", text:"Per-replica KV free-block count reported by the paged allocator each tick.", correct:true},
              {key:"f", text:"User-agent string of the client, used as the sole sharding key for routing.", correct:false},
            ]}
            trap={<>(d) ignores cache and capacity. (f) has no causal link to inference cost or state.</>}
            lens={<>Routing in an LLM cluster blends affinity (prefix) and capacity (queue, blocks). Hashing by tenant alone misses cross-tenant cache sharing on common prefixes.</>}
            stretch={<>How does prefix-hash routing interact with autoscaling when a hot prefix's replica scales out?</>}
          />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>Training / model decisions</h3>
          <VIS.TrapProblem
            id="llm-q7"
            difficulty="medium"
            mode="single"
            title="INT8 weight quant gives a 40% TPOT win but perplexity drifts 6.8 to 7.1. Right call?"
            scenario={<>Decode TPOT improves 40%; held-out perplexity drifts up by 0.3.</>}
            options={[
              {key:"a", text:"Ship INT8 fleet-wide — the TPOT win dominates this small perplexity regression.", correct:false},
              {key:"b", text:"Reject INT8 — any perplexity regression on the held-out set is unacceptable.", correct:false},
              {key:"c", text:"Restrict INT8 to the cheapest pricing tier and keep FP16 for premium customers.", correct:false},
              {key:"d", text:"Run task-level evals (instruction, code, math) before shipping; perplexity is a proxy.", correct:true},
            ]}
            trap={<>(a) trusts perplexity as ground truth — it is a proxy, not the user metric. (b) is over-conservative; small perplexity moves often have no task impact. (c) is a business kludge, not a quality answer.</>}
            lens={<>Perplexity is a coarse proxy. Always pair quantization rollouts with task-level evals on the same prompts your users send.</>}
            stretch={<>Which task families typically degrade most under INT8 weight quantization, and why?</>}
          />
          <VIS.TrapProblem
            id="llm-q8"
            difficulty="hard"
            mode="single"
            title="Speculative drafter has acceptance alpha=0.35 at k=4. What is the right next step?"
            scenario={<>k = 4, alpha = 0.35, draft model costs 12% of the verifier per forward pass.</>}
            options={[
              {key:"a", text:"Raise k to 8 to amortize the verifier cost across a longer proposal window.", correct:false},
              {key:"b", text:"Distill the draft on verifier outputs to lift acceptance alpha toward 0.7+.", correct:true},
              {key:"c", text:"Disable speculative decoding on this workload until a better draft is available.", correct:false},
              {key:"d", text:"Raise sampling temperature so the verifier accepts more of the draft proposals.", correct:false},
            ]}
            trap={<>(a) larger k with low alpha makes the geometric series collapse — more wasted work. (c) is defeatist if a small distillation fixes it. (d) changes the output distribution to chase a system metric — cardinal sin.</>}
            lens={<>Speculative decoding's win is mostly alpha. Distilling the draft on verifier traces is the cheapest lever; tuning k is secondary.</>}
            stretch={<>What is the speedup formula and how does it shape your investment between draft quality and k?</>}
          />
          <VIS.TrapProblem
            id="llm-q9"
            difficulty="medium"
            mode="multi"
            title="Pick the correct serving-time parallelism choices for a 70B model on one 8-GPU node."
            scenario={<>You are picking the intra-node parallelism plan.</>}
            options={[
              {key:"a", text:"Shard each linear layer across all 8 GPUs with TP=8 and NVLink all-reduce.", correct:true},
              {key:"b", text:"Use pipeline parallelism only, placing each pair of transformer layers on one GPU.", correct:false},
              {key:"c", text:"Replicate the full model on each GPU and serve eight fully independent streams.", correct:false},
              {key:"d", text:"Combine intra-node TP=8 with inter-node model replication for added serving capacity.", correct:true},
              {key:"e", text:"Use TP=2 plus pipeline parallel=4 with micro-batches inside the same 8-GPU node.", correct:false},
              {key:"f", text:"Keep weights in FP16 — the precision choice is orthogonal to the parallelism plan.", correct:true},
            ]}
            trap={<>(b) pipeline-only serializes layers; for decode the bubble dominates. (c) the 70B model does not fit on one H100. (e) mixed PP+TP adds bubbles and helps mostly at very large scale.</>}
            lens={<>TP intra-node uses NVLink for the all-reduce; replication across nodes scales capacity. PP earns its keep only when the model is too large for TP within one node.</>}
            stretch={<>Why does the bubble in pipeline parallelism hurt decode more than prefill?</>}
          />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>Monitoring / observability</h3>
          <VIS.TrapProblem
            id="llm-q10"
            difficulty="medium"
            mode="single"
            title="SM-busy is 92% on decode but TPOT regresses 30%. What do you check first?"
            scenario={<>Steady-state telemetry on the decode pool.</>}
            options={[
              {key:"a", text:"HBM bandwidth utilization vs DCGM DRAM-throughput counters across the 8-GPU pool.", correct:true},
              {key:"b", text:"Increase the per-replica batch size since SM is clearly available headroom.", correct:false},
              {key:"c", text:"Restart all replicas as a precaution since this likely indicates a memory leak.", correct:false},
              {key:"d", text:"Lower the sampling temperature parameter to reduce the verifier workload.", correct:false},
            ]}
            trap={<>(b) SM-busy includes time spent waiting on memory, so it looks high while the SM is stalled on HBM. (c) and (d) do not address the physics.</>}
            lens={<>For decode, the right utilization metric is HBM bandwidth, not SM-busy. DCGM DRAM-throughput is the source of truth.</>}
            stretch={<>What change to weight or KV layout would lift effective HBM utilization?</>}
          />
          <VIS.TrapProblem
            id="llm-q11"
            difficulty="medium"
            mode="single"
            title="TTFT p95 spikes from 1.1s to 4s but TPOT is unchanged. Where do you look?"
            scenario={<>Decode is fine. Something on the prefill side or its queue moved.</>}
            options={[
              {key:"a", text:"HBM bandwidth telemetry on the decode pool, since decode is bandwidth-bound.", correct:false},
              {key:"b", text:"Output streamer SSE congestion control and per-connection buffer settings.", correct:false},
              {key:"c", text:"Prefill queue depth over 30s, prompt-length p99, and prefix-cache hit-rate trend.", correct:true},
              {key:"d", text:"Token-streamer SSE buffer size and the keep-alive heartbeat configuration.", correct:false},
            ]}
            trap={<>(a) is decode-side; TPOT would have moved. (b) and (d) affect last-byte timing but not TTFT in the usual sense.</>}
            lens={<>TTFT regressions live on the prefill side: queue depth, prompt-length tail, or a drop in prefix-cache hit-rate (a new system prompt being deployed).</>}
            stretch={<>How would you separate "longer prompts arriving" from "prefix cache evicted"?</>}
          />
          <VIS.TrapProblem
            id="llm-q12"
            difficulty="medium"
            mode="multi"
            title="Which alerts deserve a pager rather than a dashboard?"
            scenario={<>You are tuning paging rules for the on-call rotation.</>}
            options={[
              {key:"a", text:"KV-block free count below 5% sustained for more than two minutes.", correct:true},
              {key:"b", text:"p95 TTFT above the published SLO for more than five consecutive minutes.", correct:true},
              {key:"c", text:"429 response rate above 1% sustained over a five-minute rolling window.", correct:true},
              {key:"d", text:"Average tokens-per-second across the cluster trending down week over week.", correct:false},
              {key:"e", text:"Prefix-cache hit-rate variance across replicas during the warm-up period.", correct:false},
            ]}
            trap={<>(d) is informational, not actionable. (e) is debugging signal but not a customer-visible breach.</>}
            lens={<>Page on customer-visible breaches and saturation that precedes them. Keep informational metrics on dashboards.</>}
            stretch={<>How do you keep the pager from firing on momentary GC pauses or replica restarts?</>}
          />
          <VIS.TrapProblem
            id="llm-q13"
            difficulty="medium"
            mode="single"
            title="Decode tok/s is stable but cost-per-token rose 20% week-over-week. Likely cause?"
            scenario={<>Traffic mix shifted this week; engineering shipped no relevant changes.</>}
            options={[
              {key:"a", text:"Model weight files changed silently due to a stale checkpoint pin in CI.", correct:false},
              {key:"b", text:"Mean prompt length rose ~20%, so prefill GPU cost per request is up week-over-week.", correct:true},
              {key:"c", text:"HBM clock is throttling on a fraction of the nodes due to a thermal regression.", correct:false},
              {key:"d", text:"The request router has become slower due to a network mesh upgrade rollout.", correct:false},
            ]}
            trap={<>(a) and (c) would show up in TPOT or quality metrics. (d) is a fixed CPU cost that does not scale with tokens.</>}
            lens={<>Cost-per-token has two terms: prefill (input tokens) and decode (output tokens). When decode tok/s is flat, the swing came from the input side.</>}
            stretch={<>How would you build a daily "input-token-mix shift" report?</>}
          />
          <VIS.TrapProblem
            id="llm-q14"
            difficulty="hard"
            mode="single"
            title="Which observability primitive separates a tenant-specific regression from a fleet-wide one?"
            scenario={<>You suspect a new system prompt is hurting one tenant.</>}
            options={[
              {key:"a", text:"Cluster-level p99 TTFT histogram aggregated across every tenant and route.", correct:false},
              {key:"b", text:"Per-GPU power draw graphs sampled at one-second resolution across the fleet.", correct:false},
              {key:"c", text:"Total cluster token throughput segmented only by hour of day and day of week.", correct:false},
              {key:"d", text:"TTFT and TPOT p95 histograms broken out by route (tenant or system-prompt hash).", correct:true},
            ]}
            trap={<>(a) (b) (c) aggregate across tenants and hide tenant-level signal.</>}
            lens={<>Always emit latency histograms with a tenant or system-prompt dimension. Otherwise tenant-scoped regressions are invisible.</>}
            stretch={<>How do you bound cardinality when there are millions of system prompts?</>}
          />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>Gotchas / operational pitfalls</h3>
          <VIS.TrapProblem
            id="llm-q15"
            difficulty="hard"
            mode="single"
            title="Prefix-cache hit-rate is 60% in shadow but 5% in prod. Most likely cause?"
            scenario={<>Same model, same code path, hit-rate diverges between shadow and prod.</>}
            options={[
              {key:"a", text:"Production has more users, so unique prefixes scale linearly and dilute the cache.", correct:false},
              {key:"b", text:"HBM is throttling in prod and forcing the allocator to skip prefix-block reuse.", correct:false},
              {key:"c", text:"The production tokenizer normalizes whitespace differently than shadow, breaking hashes.", correct:true},
              {key:"d", text:"The KV blocks are smaller in prod, so each cache entry stores fewer reusable tokens.", correct:false},
            ]}
            trap={<>(a) user count alone should not move hit-rate unless the prefix distribution is very different. (b) (d) do not change the hash.</>}
            lens={<>Prefix-cache keys are token-ID sequences. Any difference in tokenization, including invisible whitespace or BOS handling, evicts the cache by mismatch.</>}
            stretch={<>How would you canary a tokenizer upgrade without flushing the prefix cache fleet-wide?</>}
          />
          <VIS.TrapProblem
            id="llm-q16"
            difficulty="hard"
            mode="single"
            title="A 32k-token prompt arrives at peak. What should the scheduler do?"
            scenario={<>The decode batch is full of short streams running fine at SLO.</>}
            options={[
              {key:"a", text:"Run the full 32k prefill in one scheduler tick to free the long request as fast as possible.", correct:false},
              {key:"b", text:"Chunk the prefill into ~2k-token tiles so each scheduler tick still advances the decode batch.", correct:true},
              {key:"c", text:"Reject the request with HTTP 413 and ask the caller to break the prompt into smaller submissions.", correct:false},
              {key:"d", text:"Lower the decode batch size while the prefill runs so SM pressure stays bounded during the burst.", correct:false},
            ]}
            trap={<>(a) the long prefill monopolizes the SMs, decode steps stall, every other user sees a TPOT spike. (c) discards a paying request unnecessarily. (d) does not address the scheduling problem.</>}
            lens={<>Prefill chunking ("chunked prefill" / "split-fuse" in the literature) is the standard answer. A scheduler tick interleaves chunked prefill with decode steps so neither phase starves the other.</>}
            stretch={<>What is the right chunk size, and what does it depend on?</>}
          />
          <VIS.TrapProblem
            id="llm-q17"
            difficulty="medium"
            mode="multi"
            title="Which of these silently hurts decode tok/s without showing up in standard alerts?"
            scenario={<>Subtle regressions that pass dashboards. Pick the real culprits.</>}
            options={[
              {key:"a", text:"A new system prompt is 2x longer, lifting per-stream KV and shrinking the admitted batch.", correct:true},
              {key:"b", text:"NVLink topology degraded to 50% on one node after a routine hardware swap last Tuesday.", correct:true},
              {key:"c", text:"A library update switched the default attention kernel from a fused path to a slower fallback.", correct:true},
              {key:"d", text:"Marketing renamed the product and shipped new logos on the customer-facing dashboard.", correct:false},
              {key:"e", text:"A heavy tenant's response-length distribution doubled, raising mean session VRAM footprint.", correct:true},
            ]}
            trap={<>(d) is unrelated. The others are real regressions invisible without targeted instrumentation.</>}
            lens={<>The interesting regressions are not "is the GPU broken" — they are "did something about the workload or the stack shift the bytes-per-token math?"</>}
            stretch={<>How would you build a weekly decode-throughput attribution report decomposing the change into batch-size, KV-bytes, and kernel terms?</>}
          />
          <VIS.TrapProblem
            id="llm-q18"
            difficulty="medium"
            mode="single"
            title="The OOM handler keeps preempting one large tenant during peak. Right fix?"
            scenario={<>The OOM logic is correct; the outcome is bad UX for one heavy tenant.</>}
            options={[
              {key:"a", text:"Raise the OOM threshold so the preemption signal fires later in the saturation curve.", correct:false},
              {key:"b", text:"Disable preemption entirely and let the allocator wait on the freelist when blocks run out.", correct:false},
              {key:"c", text:"Force the offending tenant onto INT8 weight quantization so it consumes less memory bandwidth.", correct:false},
              {key:"d", text:"Add per-tenant KV-block quotas so one tenant cannot drive the global free pool to zero.", correct:true},
            ]}
            trap={<>(a) delays the cliff. (b) brings back thrash and 5xx storms. (c) forces a quality change on one tenant for an infra reason.</>}
            lens={<>Resource isolation belongs at the quota layer, not in the eviction policy. Per-tenant quotas keep the OOM handler as a global safety net.</>}
            stretch={<>How do you size quotas so they bind only during contention, not during normal load?</>}
          />
          <VIS.TrapProblem
            id="llm-q19"
            difficulty="hard"
            mode="single"
            title="Speculative decoding is on, but TPOT regresses at high QPS. Likely cause?"
            scenario={<>Low QPS: alpha=0.75, speedup matches theory. High QPS: speedup vanishes entirely.</>}
            options={[
              {key:"a", text:"HBM is throttling on the verifier nodes during the high-QPS interval.", correct:false},
              {key:"b", text:"The draft model shares GPUs with the verifier and steals 30%+ of its bandwidth at high QPS.", correct:true},
              {key:"c", text:"Continuous batching is misconfigured and falling back to a static batching path.", correct:false},
              {key:"d", text:"The tokenizer service is slow on long prompts and stalls the prefill stage.", correct:false},
            ]}
            trap={<>(a) (c) (d) are unrelated mechanisms.</>}
            lens={<>Speculative decoding's compute lives somewhere. Co-locating draft on verifier GPUs steals verifier bandwidth at high QPS. Dedicated draft GPUs or aggressive draft-batching is the fix.</>}
            stretch={<>What is the right utilization split between draft and verifier at steady state?</>}
          />
          <VIS.TrapProblem
            id="llm-q20"
            difficulty="medium"
            mode="single"
            title="Adding a 4k-token safety guardrail prompt halves throughput. What is the mechanism?"
            scenario={<>No code change other than the longer system prompt.</>}
            options={[
              {key:"a", text:"The tokenizer is slower on the longer prompt and stalls the prefill pipeline at the start of each session.", correct:false},
              {key:"b", text:"The output streamer's per-connection buffer is full and back-pressures the decode loop at high rates.", correct:false},
              {key:"c", text:"Per-stream KV grew by several GB across the conversation; the batcher admits roughly half as many streams.", correct:true},
              {key:"d", text:"The model has lost capacity due to silently changed weights during the deployment of the new prompt.", correct:false},
            ]}
            trap={<>(a) (b) are CPU stages. (d) the model did not change.</>}
            lens={<>KV cache per stream grows with sequence length. Longer system prompts compound across the conversation. Prefix-caching the guardrail prefix recovers most of the loss.</>}
            stretch={<>How does FP8 KV change this math?</>}
          />
          <VIS.TrapProblem
            id="llm-q21"
            difficulty="hard"
            mode="multi"
            title="Pick the correct choices for handling a flash crowd (10x traffic spike in 60s)."
            scenario={<>You are picking inference-layer behaviors for a sudden traffic surge.</>}
            options={[
              {key:"a", text:"Return HTTP 429 with Retry-After once KV free blocks drop below a watermark threshold.", correct:true},
              {key:"b", text:"Trigger the autoscaler to add decode replicas and meanwhile shed excess load with 429.", correct:true},
              {key:"c", text:"Cap the maximum output length on new sessions so per-stream KV is bounded for the burst.", correct:true},
              {key:"d", text:"Raise sampling temperature so responses are shorter and consume fewer decode tokens per session.", correct:false},
              {key:"e", text:"Keep admitting all requests and let the OS kill processes if VRAM eventually runs out.", correct:false},
              {key:"f", text:"Increase the static batch size on each replica to absorb the burst into the existing pool.", correct:false},
            ]}
            trap={<>(d) does not control length and changes the output distribution. (e) thrash, 5xx storms, lost requests. (f) static batching is the wrong primitive here.</>}
            lens={<>Flash crowds need explicit backpressure (429), elastic capacity (autoscaler), and a hard cap on per-stream VRAM. Quality knobs are not load-shedding tools.</>}
            stretch={<>How do you signal to clients which knob to tune (rate vs prompt-length vs concurrency)?</>}
          />
          <VIS.TrapProblem
            id="llm-q22"
            difficulty="medium"
            mode="single"
            title="Why ship INT8 weight quant before FP8 KV quant when staging the rollout?"
            scenario={<>You have time to roll out exactly one quantization knob per week.</>}
            options={[
              {key:"a", text:"FP8 KV is unsafe in production and has known accuracy issues on long-context evaluations.", correct:false},
              {key:"b", text:"INT8 is supported on every GPU SKU we run while FP8 hardware support is uneven across clusters.", correct:false},
              {key:"c", text:"INT8 weights move TPOT directly; FP8 KV moves capacity, which is harder to attribute in an A/B.", correct:true},
              {key:"d", text:"The two knobs commute mathematically, so the rollout ordering does not actually matter in practice.", correct:false},
            ]}
            trap={<>(a) FP8 KV is widely used. (b) hardware support varies; INT8 is broader but it is not the main reason. (d) they have different observable signatures, so ordering matters for attribution.</>}
            lens={<>Rolling out one knob at a time with clean attribution beats a big-bang rollout. Pick the knob whose effect is easiest to read on the dashboard first.</>}
            stretch={<>What dashboards would you set up before flipping FP8 KV?</>}
          />
          <VIS.TrapProblem
            id="llm-q23"
            difficulty="hard"
            mode="single"
            title="Requests occasionally return a malformed final token; OOM-handler preemption was logged."
            scenario={<>The OOM handler is supposed to preempt requests safely, without data corruption.</>}
            options={[
              {key:"a", text:"The tokenizer is broken on certain Unicode edge cases that correlate with preemption events.", correct:false},
              {key:"b", text:"HBM has bit errors that surface during the high-pressure preemption window in the allocator.", correct:false},
              {key:"c", text:"Preemption is releasing KV blocks before the partial output has been flushed to the streamer.", correct:true},
              {key:"d", text:"The user supplied a bad prompt that triggers an output the decoder cannot serialize correctly.", correct:false},
            ]}
            trap={<>(a) (b) (d) do not fit the preemption-correlated pattern.</>}
            lens={<>Preemption needs a flush boundary: drain the streamer for that request, finalize the SSE frame, then release blocks. Without it you get truncated last tokens at the boundary.</>}
            stretch={<>What is the right protocol-level signal to the client when you preempt mid-stream?</>}
          />
          <VIS.TrapProblem
            id="llm-q24"
            difficulty="medium"
            mode="single"
            title="Continuous batching makes p99 TPOT 4x worse than p50. What is the mechanism?"
            scenario={<>p50 TPOT meets SLO; p99 TPOT is roughly 4x p50 across a steady-state hour.</>}
            options={[
              {key:"a", text:"Batch composition changes per step; co-batching long streams with bursts yields slower steps.", correct:true},
              {key:"b", text:"HBM is throttling specifically on the long streams during the high-pressure decode steps.", correct:false},
              {key:"c", text:"Continuous batching is fundamentally broken and needs to be replaced with static batching.", correct:false},
              {key:"d", text:"The request router is biased toward sending long streams to one subset of replicas.", correct:false},
            ]}
            trap={<>(b) (c) (d) miss the mechanism. (c) overreacts to a known tradeoff.</>}
            lens={<>Step time scales with batch size and total KV bytes touched. The tail comes from steps where the batcher admitted a burst. Mitigation: cap admissions per step or prioritize streams nearing TPOT-SLO.</>}
            stretch={<>How does prioritizing near-SLO streams trade against fairness?</>}
          />
          <VIS.TrapProblem
            id="llm-q25"
            difficulty="medium"
            mode="multi"
            title="Which reasons to disaggregate prefill and decode into separate pools actually hold up?"
            scenario={<>Pick the justifications that survive scrutiny against the physics and operations.</>}
            options={[
              {key:"a", text:"Prefill is compute-bound and decode is BW-bound, so each phase prefers different parallelism plans.", correct:true},
              {key:"b", text:"A long prefill in the same pool stalls decode steps for unrelated streams during peak load.", correct:true},
              {key:"c", text:"You can autoscale prefill and decode pools independently on their own queue-depth signals.", correct:true},
              {key:"d", text:"Disaggregation cuts total GPU count by definition once both pools are running side by side.", correct:false},
              {key:"e", text:"Disaggregation makes prefix-cache routing easier in every workload regardless of traffic.", correct:false},
              {key:"f", text:"KV migration over NVLink and RDMA is effectively free in bandwidth and latency terms.", correct:false},
            ]}
            trap={<>(d) it does not; can raise cost if pools are under-utilized. (e) you still have to land prefill near the cache. (f) migration costs bandwidth and latency.</>}
            lens={<>Disaggregation is justified by physics (different bottlenecks) and operations (independent scaling). It is not a free win — only worth it once one pool is saturated.</>}
            stretch={<>What is the smallest cluster size where disagg starts to pay?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>VRAM budget = weights + activations + KV.</strong> KV scales with concurrent_streams × seq_len and dominates at long context. Use <VIS.Term def="VRAM headroom: the unallocated fraction of GPU memory after weights, activations, and current KV usage are subtracted. The free pool the block allocator draws from. When headroom hits zero, the OOM handler must preempt or shed load.">VRAM headroom</VIS.Term> alarms. Math: §3a.</li>
            <li><strong>Prefill is compute-bound, decode is BW-bound.</strong> Tune them with different knobs and separate <VIS.Term def="Autoscaler signal: the metric the scaling controller watches to add or remove replicas. Decode pools scale on queue depth and TPOT; prefill pools scale on input-token rate. Mixing them yields wrong scale-up decisions.">autoscaler signals</VIS.Term>. Roofline math: §3d.</li>
            <li><strong>Don't disaggregate before saturating one pool.</strong> Premature disagg adds <VIS.Term def="KV migration: the cross-node transfer of KV cache blocks when a request moves from a prefill pool to a decode pool. Costs RDMA bandwidth and adds a fixed latency to TTFT. Only worth it once the same-pool head-of-line blocking dominates.">KV migration</VIS.Term> latency for no throughput win.</li>
            <li><strong>Speculative decoding speedup is alpha-dominated.</strong> Distill the draft on verifier traces before tuning k. Math: §3g.</li>
            <li><strong>Prefix-cache hit-rate is fragile to tokenizer changes.</strong> Canary tokenizer upgrades behind a feature flag. See trap q15.</li>
            <li><strong>Per-tenant KV quotas</strong> belong at the quota layer; the OOM handler is the global safety net. See trap q18.</li>
            <li><strong>p99 TPOT is sensitive to batcher admission policy.</strong> Continuous batching trades p50 for tail; consider <VIS.Term def="SLO-aware scheduling: prioritize streams whose remaining time-budget against the TPOT SLO is shortest. Borrows from EDF (earliest-deadline-first) scheduling. Reduces tail at the cost of fairness across users.">SLO-aware scheduling</VIS.Term>. See trap q24.</li>
            <li><strong>Watch <VIS.Term def="Head-of-line blocking: one long request at the head of a queue or batch delays every shorter request behind it. The reason continuous batching and prefill chunking exist; mostly absent once both are deployed.">head-of-line blocking</VIS.Term></strong> between prefill and decode in shared pools. Chunked prefill mitigates this without full disaggregation. See trap q16.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2309.06180" target="_blank" rel="noopener"><strong>Kwon et al. — PagedAttention / vLLM</strong></a> (paper).</li>
        <li><a href="https://blog.vllm.ai/2023/06/20/vllm.html" target="_blank" rel="noopener"><strong>vLLM blog</strong></a> — continuous batching + PagedAttention.</li>
        <li><a href="https://arxiv.org/abs/2401.09670" target="_blank" rel="noopener"><strong>DistServe</strong></a> — prefill/decode disaggregation.</li>
        <li><a href="https://arxiv.org/abs/2211.17192" target="_blank" rel="noopener"><strong>Leviathan et al.</strong></a> — speculative decoding.</li>
        <li><a href="https://www.databricks.com/blog/llm-inference-performance-engineering-best-practices" target="_blank" rel="noopener"><strong>Databricks</strong></a> — LLM inference performance engineering.</li>
      </ul>
    </VIS.Section>
  </main>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
