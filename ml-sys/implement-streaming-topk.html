  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // autoGloss: scan a string for terms in window.__VIS_GLOSSARY (set by exporter
  // before vis-components.js loads). Returns a React children array with each
  // matched term wrapped in the same <span class="vis-term"> the Term component
  // emits. First-mention only per call. Longest-match-first so "candidate
  // generation" beats "candidate" alone.
  let _glossPattern = null;
  let _glossLookup = null;
  function _buildGlossPattern() {
    const g = (typeof window !== "undefined" && window.__VIS_GLOSSARY) || {};
    const keys = Object.keys(g).filter(k => k && !k.startsWith("_"));
    if (!keys.length) { _glossPattern = false; return; }
    // Longest first to favor multi-word terms; escape regex metachars.
    keys.sort((a, b) => b.length - a.length);
    const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    // Word-boundary on each side. Allow internal hyphens/spaces; common ML terms
    // like "DP-SGD", "feature cross", "p99 latency" are all matched naturally.
    _glossPattern = new RegExp("(^|[^A-Za-z0-9_])(" + escaped.join("|") + ")(?=[^A-Za-z0-9_]|$)", "g");
    _glossLookup = g;
  }
  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// implement-streaming-topk — coding
// streaming_topk(stream, k): single-pass min-heap of size k. Push when not full;
// otherwise if item > heap[0], heappushpop. Return top-k in DESCENDING order.

const TOPK_CODE = [
  "import heapq",
  "",
  "def streaming_topk(stream, k):",
  "    \"\"\"Single-pass top-K over an iterable. O(N log k) time, O(k) memory.",
  "",
  "    stream: iterable of (score, item) tuples (score is comparable).",
  "    k:      positive int; how many of the LARGEST scores to keep.",
  "    Returns list of (score, item), DESCENDING by score (top-1 first).",
  "    \"\"\"",
  "    if k <= 0:",
  "        return []",
  "    heap = []  # MIN-heap of (score, item). Smallest score sits at heap[0].",
  "    for score, item in stream:",
  "        if len(heap) < k:",
  "            __1__   # not full yet — accept everything",
  "        elif score > __2__:",
  "            __3__   # full and beats current min — replace root in one sift",
  "        # else: score <= current k-th best — discard, don't touch the heap.",
  "    return __4__",
];

const App = () => (
  <main style={{maxWidth: 900, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Coding · Senior MLE"
      title="Implement streaming_topk(stream, k) — single-pass top-K with a min-heap"
      subtitle="Re-ranker ships top-100 of 5K candidates per request. Bounded O(k) memory, O(N log k) time. Hot path."
      byline={[
        {label:"Question type", value:"ML Coding"},
        {label:"Production target", value:"Re-ranker, 5K cands/req, p99 8ms, 30K req/s"},
        {label:"Difficulty", value:"Medium"},
      ]}/>

    <VIS.TLDR>
      Top-K from a <VIS.Term def="An iterable of items consumed once, in order, without random access. You cannot revisit earlier items unless you pay to buffer them.">stream</VIS.Term> wants a <VIS.Term def="Binary heap where the smallest key sits at index 0. Python's heapq is a min-heap; for max-heap behavior, negate the keys.">min-heap</VIS.Term> of size K — counter-intuitive, but the right choice. Keep K best so far; the <VIS.Term def="The element at heap[0]. In a min-heap, this is the smallest currently kept — i.e. the weakest of the top-K so far. It's the eviction candidate.">heap root</VIS.Term> is the WEAKEST of the kept set, ready to evict when a stronger score arrives. Cost: <VIS.Term def="O(N log k): for each of N items, at most one sift through a heap of depth log k. Vs O(N log N) for sort, this is much better when k ≪ N.">O(N log k)</VIS.Term>, <VIS.Term def="O(k) memory — the heap never grows beyond k. Independent of N. The whole reason you don't materialize the full sorted list.">O(k) memory</VIS.Term>. The 3 invariants: <strong>(a)</strong> min-heap for <VIS.Term def="The largest k values in the stream. Note: 'max-K' means 'k largest', not 'use a max-heap'. The DATA STRUCTURE for max-K is a min-heap.">max-K</VIS.Term> (the data-structure / problem-direction inversion is the #1 trap), <strong>(b)</strong> use <VIS.Term def="heapq.heappushpop(h, x): pushes x then pops the smallest, in ONE combined sift. ~30% faster than heappush+heappop and atomic on the heap.">heappushpop</VIS.Term> on replace (one sift, not two), <strong>(c)</strong> sort <VIS.Term def="Largest score first. heapq itself only guarantees heap[0] is the min — the rest of the heap is partially ordered; you must explicitly sort the result.">descending</VIS.Term> at the end (top-1 first).
    </VIS.TLDR>

    <VIS.Section id="sec-setup" title="The production scenario">
      <p>
        You're shipping a <VIS.Term def="Second-stage model that re-orders a few thousand retrieval candidates with a richer model than the retriever. Output is the final slate of items shown to the user.">re-ranker</VIS.Term> that scores 5,000 <VIS.Term def="Items that survived the retrieval stage and are eligible for re-ranking. The re-ranker's job is to pick the best 100 of them.">candidates</VIS.Term> per request, then forwards the top 100 to a <VIS.Term def="Downstream component that assembles the final result page — applies business rules, diversity, ads injection. Wants the top-K already sorted, largest first.">slate-builder</VIS.Term>. End-to-end p99 budget is 8ms; the scorer takes 6ms; top-K must finish in &lt;500&micro;s. <code>sorted(scored)[-100:]</code> works but is wasteful — you're sorting 4,900 items you'll throw away. <VIS.Term def="An algorithm with sub-O(N log N) cost via a bounded auxiliary structure that only tracks the k best seen so far. Each item costs O(log k); total O(N log k).">Single-pass streaming top-K</VIS.Term> with a min-heap is the canonical fix.
      </p>
      <p>
        Bugs we've actually shipped: using a <VIS.Term def="A max-heap stores the LARGEST at the root. If you build one for top-K, every item must be pushed (you can't decide to skip until you've sorted) — defeats the purpose and grows to N.">max-heap</VIS.Term> for top-K (now O(N log N) — you push everything and pop K at the end), calling <VIS.Term def="Re-sorting the entire kept list on every incoming item. Cost is N × k log k = O(N k log k). At 5K items, k=100 that's ~5M comparisons vs the heap's ~33K.">sorted() on every push</VIS.Term> (production took 4s instead of 500&micro;s on first deploy), checking <code>score &gt; heap[0]</code> but then pushing without popping (heap grows <VIS.Term def="Memory usage that scales with N instead of k. The whole point of streaming top-K is bounded memory; lose the bound and you can't process infinite streams or fit in a cache.">unbounded</VIS.Term>, OOMs at high traffic), and forgetting that Python's <code>heapq</code> is a min-heap so <VIS.Term def="A code path that compiles, runs, and passes basic tests but is semantically inverted — e.g. negating scores when you shouldn't, picking smallest-K instead of largest-K. Silent quality regression.">negating scores</VIS.Term> silently selects the WORST K.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-impl" title="The implementation">
      <VIS.CodeFillin
        id="topk-impl"
        difficulty="medium"
        title="streaming_topk — fill in the 4 blanks"
        language="python (heapq)"
        code={TOPK_CODE}
        options={[
          {key:"heap_push",   text:"heapq.heappush(heap, (score, item))", fills:[1]},
          {key:"min_score",   text:"heap[0][0]", fills:[2]},
          {key:"heappushpop", text:"heapq.heappushpop(heap, (score, item))", fills:[3]},
          {key:"sort_desc",   text:"sorted(heap, key=lambda x: -x[0])", fills:[4]},
          // Decoys
          {key:"push_no_pop",   text:"heapq.heappush(heap, (score, item))"},          // wrong at [3]: unbounded growth
          {key:"max_heap_push", text:"heapq.heappush(heap, (-score, item))"},          // max-heap inversion
          {key:"sorted_each",   text:"heap.append((score, item)); heap.sort()"},       // O(N k log k)
          {key:"min_wrong_idx", text:"heap[-1][0]"},                                   // index -1 is some leaf, NOT the min
          {key:"sort_asc",      text:"sorted(heap)"},                                  // ascending order — top-K at end
          {key:"return_heap",   text:"heap"},                                          // unsorted heap order
          {key:"pop_loop",      text:"[heapq.heappop(heap) for _ in range(len(heap))]"}, // ascending pops
        ]}
        trap={<>
          The 3 most-shipped bugs:<br/>
          (1) Checking <code>score &gt; heap[0][0]</code> but using <code>heappush</code> (no pop) — heap grows past k, eventually past memory. You only notice when traffic spikes and the pod OOMs.<br/>
          (2) Calling <code>sorted()</code> on every push — N&times;k log k. At 5K candidates with k=100 that's ~5M comparisons vs the heap's ~33K. First load test showed p99 at 4s instead of 500&micro;s.<br/>
          (3) Reading <code>heap[-1]</code> as "the min." In a min-heap the min is at index 0; index -1 is some leaf (any of the bottom-level nodes). You evict random items and quality silently degrades.
        </>}
        lens={<>
          Reference:
          <pre style={{background:"#f1f5f9", padding:"10px 14px", borderRadius:6, fontSize:13, overflow:"auto"}}>{`def streaming_topk(stream, k):
    if k <= 0: return []
    heap = []
    for score, item in stream:
        if len(heap) < k:
            heapq.heappush(heap, (score, item))
        elif score > heap[0][0]:
            heapq.heappushpop(heap, (score, item))
    return sorted(heap, key=lambda x: -x[0])`}</pre>
          <code>heappushpop</code> is one comparison + one sift, vs <code>heappush</code> + <code>heappop</code> which is two sifts. ~30% faster in the hot path at k=100.
        </>}
        stretch={<>How does this change with <strong>tied scores</strong> + a stable secondary key (e.g. item_id)? Hint: use <code>(score, item_id, item)</code> so the heap has a total order. Or insert a monotonic counter: <code>(score, counter, item)</code>.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-drills" title="Trap drills — 20 bugs you must spot before shipping">
      <VIS.TrapProblem id="stopk-q1" difficulty="medium" mode="single"
        title="Which heap for top-K (k largest)?"
        scenario={<>You want the k LARGEST scores from a stream. Which heap do you build?</>}
        options={[
          {key:"a", text:"Min-heap of size k. The root is the WEAKEST of the kept set — ready to evict when something stronger arrives.", correct:true},
          {key:"b", text:"Max-heap of size k. We want the max, so use a max-heap.", correct:false},
          {key:"c", text:"Min-heap of size N. Then slice the last k.", correct:false},
          {key:"d", text:"Either works — they're symmetric.", correct:false},
        ]}
        trap={<>The data-structure direction is the OPPOSITE of the problem direction. You want max-K, so you keep a min-heap (root = weakest kept = next to evict).</>}
        lens={<>Mnemonic: "the heap's root is your eviction candidate." For max-K, evict the smallest; min-heap.</>}
      />

      <VIS.TrapProblem id="stopk-q2" difficulty="medium" mode="single"
        title="Python heapq is which kind?"
        scenario={<>You write <code>heapq.heappush(h, 5); heapq.heappush(h, 1); heapq.heappush(h, 9); heapq.heappop(h)</code>. What pops?</>}
        options={[
          {key:"a", text:"1 — heapq is a MIN-heap by default.", correct:true},
          {key:"b", text:"9 — heapq pops the max.", correct:false},
          {key:"c", text:"5 — the median.", correct:false},
          {key:"d", text:"Insertion order — 5.", correct:false},
        ]}
        trap={<>Python only ships a min-heap. For max-heap behavior you negate the keys on push and negate again on pop.</>}
        lens={<>If you want max-K of negative numbers, negation still works — the sign-flip is on the COMPARISON key, not the semantic value.</>}
      />

      <VIS.TrapProblem id="stopk-q3" difficulty="medium" mode="single"
        title="Negating to fake a max-heap — when is it wrong?"
        scenario={<>For top-K (largest), some code does <code>heappush(h, (-score, item))</code> and keeps growing. Why is this slower than the min-heap approach?</>}
        options={[
          {key:"a", text:"You've inverted the SIGN but not the size bound — you still push every item, so the heap grows to N and cost becomes O(N log N) with O(N) memory.", correct:true},
          {key:"b", text:"It's faster — negation is free.", correct:false},
          {key:"c", text:"Python's heapq doesn't support negative floats.", correct:false},
          {key:"d", text:"It returns the bottom-K, not top-K.", correct:false},
        ]}
        trap={<>The win of streaming top-K isn't the heap type — it's the SIZE BOUND of k. Negation alone, without bounding, gives you a full sort dressed up as a heap.</>}
        lens={<>Right pattern: min-heap, size capped at k, evict-on-overflow. Negation is for the "find max repeatedly" pattern, not top-K.</>}
      />

      <VIS.TrapProblem id="stopk-q4" difficulty="medium" mode="single"
        title="Where is the min in a min-heap?"
        scenario={<>You see <code>if score &gt; heap[-1][0]:</code>. The code "works" on small tests but evicts wrong items at scale. Why?</>}
        options={[
          {key:"a", text:"heap[-1] is the LAST element of the underlying list — some leaf, NOT the min. heap[0] is the only index with a guaranteed ordering.", correct:true},
          {key:"b", text:"heapq stores items reversed.", correct:false},
          {key:"c", text:"heap[-1] is the max in min-heaps.", correct:false},
          {key:"d", text:"It's correct; the test bug was elsewhere.", correct:false},
        ]}
        trap={<>A heap is partially ordered: ONLY heap[0] is guaranteed. Everything else is in unspecified positions (any of the bottom-level leaves can be the second-smallest, the largest, anything).</>}
        lens={<>"Where is the min/max of a heap?" answer: <code>heap[0]</code>. There is no constant-time access to any other rank.</>}
      />

      <VIS.TrapProblem id="stopk-q5" difficulty="medium" mode="single"
        title="heappushpop vs push+pop"
        scenario={<>What's the difference between <code>heappushpop(h, x)</code> and <code>heappush(h, x); heappop(h)</code>?</>}
        options={[
          {key:"a", text:"heappushpop is ONE combined sift — push, then if heap[0] < x return heap[0] else return x. ~30% faster than two separate calls and never grows past current size.", correct:true},
          {key:"b", text:"No difference; heappushpop is sugar.", correct:false},
          {key:"c", text:"heappushpop pops first, then pushes.", correct:false},
          {key:"d", text:"heappushpop is non-atomic and may interleave.", correct:false},
        ]}
        trap={<>Two-call form briefly grows the heap to size k+1 before shrinking. Heappushpop never exceeds k — important for tight memory budgets and concurrent reads.</>}
        lens={<>heapq.heapreplace is a sibling: pop FIRST then push — assumes heap is non-empty, raises on empty.</>}
      />

      <VIS.TrapProblem id="stopk-q6" difficulty="medium" mode="single"
        title="Time complexity of streaming_topk"
        scenario={<>N items, k ≪ N. What's the dominant cost?</>}
        options={[
          {key:"a", text:"O(N log k) — each of N items triggers at most one O(log k) sift.", correct:true},
          {key:"b", text:"O(N log N) — same as sorting.", correct:false},
          {key:"c", text:"O(N k) — each item compared to all kept.", correct:false},
          {key:"d", text:"O(k log N) — depends only on k.", correct:false},
        ]}
        trap={<>The win is log k vs log N. At N=5000, k=100: log₂(100) ≈ 7 vs log₂(5000) ≈ 12. ~1.7× fewer comparisons per item, on top of skipping items that don't beat heap[0].</>}
        lens={<>Lower bound on comparison-based top-K is Ω(N + k log N) (heap-build + k pops); streaming version gives O(N log k), close in practice.</>}
      />

      <VIS.TrapProblem id="stopk-q7" difficulty="easy" mode="single"
        title="Memory of streaming_topk"
        scenario={<>Stream has N=10M items, k=50. Peak heap memory?</>}
        options={[
          {key:"a", text:"O(k) — at most 50 (score, item) tuples, regardless of N.", correct:true},
          {key:"b", text:"O(N) — heap fills as we go.", correct:false},
          {key:"c", text:"O(log N) — heap depth.", correct:false},
          {key:"d", text:"O(N log k) — same as time.", correct:false},
        ]}
        trap={<>Bounded memory IS the reason to use streaming top-K. If memory were unbounded you'd just collect+sort. At 10M items, sort needs ~80MB for the list alone; streaming needs ~2KB.</>}
        lens={<>This is why top-K is the canonical streaming algorithm — it's correct AND tiny, on infinite streams.</>}
      />

      <VIS.TrapProblem id="stopk-q8" difficulty="medium" mode="single"
        title="Tie-breaking with non-comparable items"
        scenario={<>Stream is <code>(score, doc_dict)</code> where doc_dict is a Python dict. Two items tie on score. heapq compares the second tuple element. What happens?</>}
        options={[
          {key:"a", text:"TypeError: '<' not supported between instances of 'dict' and 'dict'. The tie-break tries to compare dicts.", correct:true},
          {key:"b", text:"Returns silently with arbitrary order.", correct:false},
          {key:"c", text:"Hashes the dicts for comparison.", correct:false},
          {key:"d", text:"Falls back to insertion order.", correct:false},
        ]}
        trap={<>Mid-stream crash on tied scores — typically hours after deploy when traffic finds a tie. Classic production landmine.</>}
        lens={<>Fix: <code>(score, counter, item)</code> with a monotonic counter as a guaranteed-comparable tie-breaker.</>}
      />

      <VIS.TrapProblem id="stopk-q9" difficulty="medium" mode="single"
        title="Worst-case input"
        scenario={<>What input makes streaming_topk's heap operations fire MOST often?</>}
        options={[
          {key:"a", text:"Strictly increasing scores — every new item beats heap[0], every step triggers heappushpop. N-k sifts.", correct:true},
          {key:"b", text:"All equal scores — every item triggers replacement.", correct:false},
          {key:"c", text:"Strictly decreasing scores — every item triggers replacement.", correct:false},
          {key:"d", text:"Random — average is worst.", correct:false},
        ]}
        trap={<>Decreasing scores → after the first k, every new score is &lt; heap[0], so we skip. Increasing scores → every new score beats heap[0], so we replace. Worst case in practice.</>}
        lens={<>Adversarial benchmarks should test sorted-ascending input; this hits the worst-case sift path.</>}
      />

      <VIS.TrapProblem id="stopk-q10" difficulty="medium" mode="single"
        title="Best-case input"
        scenario={<>What input lets streaming_topk skip ALMOST all heap work after the first k items?</>}
        options={[
          {key:"a", text:"Strictly decreasing scores — after filling k, every later score is < heap[0], the elif branch never fires, no sifts.", correct:true},
          {key:"b", text:"Random shuffled — uniform.", correct:false},
          {key:"c", text:"All equal — heap settles instantly.", correct:false},
          {key:"d", text:"Sorted ascending — heap fills fast.", correct:false},
        ]}
        trap={<>Pre-sorted-descending input is the dream case: cost ≈ N comparisons + k log k for the build. Real re-rankers can sometimes pre-sort cheaply for this win.</>}
        lens={<>If your score function correlates with a cheap pre-sort key, sorting first can be faster than naive streaming.</>}
      />

      <VIS.TrapProblem id="stopk-q11" difficulty="medium" mode="single"
        title="Return order"
        scenario={<>Caller says "top-1 first." You return <code>heap</code> directly. What's wrong?</>}
        options={[
          {key:"a", text:"Heap order is partially ordered — heap[0] is min, but [1] and beyond are unspecified. The largest is somewhere deeper, NOT at heap[-1].", correct:true},
          {key:"b", text:"Heap is reverse-sorted by default.", correct:false},
          {key:"c", text:"Nothing — heaps are sorted.", correct:false},
          {key:"d", text:"Heap is in insertion order.", correct:false},
        ]}
        trap={<>Returning the raw heap is a common bug. The downstream slate-builder gets scores in heap-internal order, which looks "almost sorted" but isn't — the bug surfaces as recall-at-1 regressions.</>}
        lens={<>Always sort the result explicitly. <code>sorted(heap, key=lambda x: -x[0])</code> or <code>sorted(heap, reverse=True)</code>.</>}
      />

      <VIS.TrapProblem id="stopk-q12" difficulty="medium" mode="single"
        title="sorted() direction"
        scenario={<>You write <code>return sorted(heap)</code>. The slate-builder shows the WORST items first. What happened?</>}
        options={[
          {key:"a", text:"sorted() is ascending by default. For top-K with 'top-1 first' you need reverse=True or key=lambda x: -x[0].", correct:true},
          {key:"b", text:"heap is already descending; sorted() reverses it.", correct:false},
          {key:"c", text:"You forgot to call heapify first.", correct:false},
          {key:"d", text:"sorted() doesn't accept tuples.", correct:false},
        ]}
        trap={<>"sorted in descending order" is a one-keyword fix — the bug is that people forget which default Python uses.</>}
        lens={<>Reference: <code>sorted(heap, reverse=True)</code> works because tuples sort lexicographically by score first.</>}
      />

      <VIS.TrapProblem id="stopk-q13" difficulty="medium" mode="single"
        title="k larger than stream length"
        scenario={<>k=100 but the stream yields only 30 items. What should streaming_topk return?</>}
        options={[
          {key:"a", text:"All 30 items, sorted descending by score. The function returns up to k — never pads or errors.", correct:true},
          {key:"b", text:"Raise — k cannot exceed N.", correct:false},
          {key:"c", text:"Pad with (None, None) tuples.", correct:false},
          {key:"d", text:"Return 30 in heap order (no sort).", correct:false},
        ]}
        trap={<>The "len(heap) &lt; k" branch keeps accepting until the stream ends, then the final sort returns whatever was kept. No padding, no error.</>}
        lens={<>If caller MUST get k items, that's a caller-side invariant; check it at the boundary, not inside top-K.</>}
      />

      <VIS.TrapProblem id="stopk-q14" difficulty="hard" mode="multi"
        title="Spot ALL bugs in this candidate's code"
        scenario={<>Reviewer sees: (i) <code>heapq.heappush(h, (-score, item))</code> on every iteration, (ii) no size check, (iii) <code>return h</code> (no sort), (iv) k accepted as a float.</>}
        options={[
          {key:"a", text:"(i) negates without bounding — heap grows to N, defeating the streaming property.", correct:true},
          {key:"b", text:"(ii) no size check means O(N) memory.", correct:true},
          {key:"c", text:"(iii) returning heap order is partially ordered, not 'top-1 first'.", correct:true},
          {key:"d", text:"(iv) float k silently allows k=99.7 — len(heap) < 99.7 works, but indexing or slicing semantics drift; precondition check needed.", correct:true},
        ]}
        trap={<>All four. Bounded-size + correct heap direction + explicit final sort + precondition checks. Skipping any one is a shipped bug we've actually traced.</>}
        lens={<>Senior review bar: catch all four in one pass without running the code.</>}
      />

      <VIS.TrapProblem id="stopk-q15" difficulty="medium" mode="single"
        title="When to use sorted() instead of streaming"
        scenario={<>N=200, k=180. Is the streaming algorithm still the right choice?</>}
        options={[
          {key:"a", text:"No — when k is close to N, sorted(stream, reverse=True)[:k] is comparable in cost and clearer. The streaming win is k ≪ N.", correct:true},
          {key:"b", text:"Yes always — streaming is asymptotically better.", correct:false},
          {key:"c", text:"No — streaming is wrong when k > N/2.", correct:false},
          {key:"d", text:"Yes — sorted() is always slower.", correct:false},
        ]}
        trap={<>O(N log k) vs O(N log N): when k ≈ N, log k ≈ log N. The constant factors of heappushpop (plus the elif branch) make plain sort competitive.</>}
        lens={<>Rule of thumb: streaming top-K wins when k/N &lt; ~0.5. Below, sort. Above, also: do you really need 180 of 200? Probably the problem is mis-stated.</>}
      />

      <VIS.TrapProblem id="stopk-q16" difficulty="medium" mode="single"
        title="In-place heap on a pre-loaded list"
        scenario={<>You already have a Python list of 5000 scores. To get top-100, which is fastest in practice?</>}
        options={[
          {key:"a", text:"heapq.nlargest(100, scores) — C-implemented, internally uses the same min-heap-of-size-k pattern.", correct:true},
          {key:"b", text:"sorted(scores, reverse=True)[:100] — clearer.", correct:false},
          {key:"c", text:"Manual heappushpop loop — most flexible.", correct:false},
          {key:"d", text:"heapq.heapify(scores); pop 100 times — uses the full heap.", correct:false},
        ]}
        trap={<>(d) is the "looks right" trap — heapify is O(N) but then you do k pops at O(log N) each, total O(N + k log N). Worse than (a) at typical sizes AND mutates the input.</>}
        lens={<>heapq.nlargest/nsmallest are the production calls. The DIY heap is for streaming or when you can't materialize the list.</>}
      />

      <VIS.TrapProblem id="stopk-q17" difficulty="medium" mode="single"
        title="Updating during iteration"
        scenario={<>You think: "every item, check score &gt; heap[0]; if so, replace." But on the first k items there is no heap[0]. What's the correct gate?</>}
        options={[
          {key:"a", text:"if len(heap) < k: heappush — accept the first k unconditionally. Only after the heap is full do we compare to heap[0].", correct:true},
          {key:"b", text:"Initialize heap[0] = -inf before the loop.", correct:false},
          {key:"c", text:"Pre-fill heap with k zeros.", correct:false},
          {key:"d", text:"Use try/except IndexError on heap[0].", correct:false},
        ]}
        trap={<>Pre-filling with sentinels (e.g. -inf or 0) is the common bug — those sentinels can survive into the result if the stream has mixed signs or fewer than k items.</>}
        lens={<>Two-branch structure: "fill until full, then compete." Sentinel-free.</>}
      />

      <VIS.TrapProblem id="stopk-q18" difficulty="medium" mode="single"
        title="What if stream contains NaN scores?"
        scenario={<>One item has <code>score=float('nan')</code>. How does the heap behave?</>}
        options={[
          {key:"a", text:"NaN compares false to everything (NaN > x, NaN < x, NaN == x all False). The heap invariant breaks — NaN can sit anywhere and silently shadow real items.", correct:true},
          {key:"b", text:"NaN is treated as +inf.", correct:false},
          {key:"c", text:"heapq raises ValueError on NaN.", correct:false},
          {key:"d", text:"NaN sinks to the bottom.", correct:false},
        ]}
        trap={<>Silent quality bug: NaN scores get kept in the top-K (because <code>score &gt; heap[0]</code> is False, so we don't replace; but if NaN entered during the fill phase, it stays). Output looks plausible — just missing some real items.</>}
        lens={<>Defensive: filter or check for NaN at the API boundary. Production scorers should never emit NaN, but they do (div-by-zero, log of 0).</>}
      />

      <VIS.TrapProblem id="stopk-q19" difficulty="hard" mode="single"
        title="Cost of (score, item) tuple vs separate arrays"
        scenario={<>Profiler shows 40% of streaming_topk time in tuple allocation. What's the senior-MLE optimization?</>}
        options={[
          {key:"a", text:"Use (score, index) tuples and keep items in a separate array indexed by stream position. Tuples are smaller (two ints/floats), allocation is faster, and item objects don't move.", correct:true},
          {key:"b", text:"Switch to a max-heap.", correct:false},
          {key:"c", text:"Use numpy.argpartition — different algorithm, but O(N) on arrays.", correct:false},
          {key:"d", text:"Skip the tuple; push score only.", correct:false},
        ]}
        trap={<>Both (a) and (c) are real wins; (a) preserves the streaming API while shrinking the hot tuple; (c) requires materializing the array but is asymptotically faster on dense numeric data.</>}
        lens={<>Production re-rankers often use numpy.argpartition when candidates are batched; streaming heap stays for unknown-length / latency-sensitive paths.</>}
      />

      <VIS.TrapProblem id="stopk-q20" difficulty="hard" mode="single"
        title="Why heappushpop, not heapreplace?"
        scenario={<>Both exist. Why does the canonical streaming top-K use <code>heappushpop</code>, not <code>heapreplace</code>?</>}
        options={[
          {key:"a", text:"heappushpop is push-first-then-pop: if the new item is smaller than the root, it returns the new item unchanged (no sift). heapreplace pops first, so it ALWAYS removes the current root — wrong when the new item is worse.", correct:true},
          {key:"b", text:"heapreplace doesn't exist for tuples.", correct:false},
          {key:"c", text:"heapreplace mutates in place; heappushpop returns a copy.", correct:false},
          {key:"d", text:"They're identical; convention.", correct:false},
        ]}
        trap={<>We already gated on <code>score &gt; heap[0][0]</code> so the new item BEATS the root — at this gate, heapreplace would also work. But heappushpop is the safer primitive: it self-checks. Bugs are cheaper.</>}
        lens={<>Rule: heapreplace if you're SURE the new item beats the root; heappushpop if you want the call itself to do the check. Streaming top-K with explicit gate: either works, heappushpop is idiomatic.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://docs.python.org/3/library/heapq.html#heapq.heappushpop" target="_blank" rel="noopener"><strong>Python heapq — heappushpop</strong></a> — fused push+pop in one sift.</li>
        <li><a href="https://docs.python.org/3/library/heapq.html#heapq.nlargest" target="_blank" rel="noopener"><strong>Python heapq.nlargest</strong></a> — batch API; C-implemented; uses the same min-heap-of-size-k internally.</li>
        <li><a href="https://www.cs.princeton.edu/~rs/talks/QuickselectIsOptimal.pdf" target="_blank" rel="noopener"><strong>Quickselect</strong> (Princeton notes)</a> — O(N) alternative when you can mutate the input array.</li>
        <li><a href="https://numpy.org/doc/stable/reference/generated/numpy.argpartition.html" target="_blank" rel="noopener"><strong>numpy.argpartition</strong></a> — vectorized O(N) top-K for dense numeric arrays.</li>
      </ul>
    </VIS.Section>
  </main>
