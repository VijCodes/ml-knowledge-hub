            <li><strong>GBM scores 100% of non-blocked traffic.</strong> 400 tabular features, ~15ms. Outputs a calibrated fraud probability. See §3b.</li>
            <li><strong>Decision router thresholds the score.</strong> <VIS.Equation tex={String.raw`s > \tau_{\text{decl}} \Rightarrow \text{decline};\; s < \tau_{\text{appr}} \Rightarrow \text{approve};\; \text{else escalate}`} />. See §3d.</li>
            <li><strong>Transformer re-scores the ambiguous band</strong> (~10% of traffic). Reads the card's recent transaction sequence, returns a refined score. Router re-thresholds. See §3c.</li>
            <li><strong>Borderline goes to reviewer queue OR 3DS step-up.</strong> 3DS catches fraud without a hard decline; reviewer queue absorbs the rest. Capacity sizing via Little's Law (§3e).</li>
            <li><strong>Asynchronous label loop</strong>: chargebacks land at T+4–8 weeks. Weekly retrain pulls matured transactions. See §3g.</li>
            <li><strong>Drift monitor watches features in real time.</strong> PSI &gt; 0.25 alerts; arrives before chargebacks do. See §3h.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. Cost of scoring everything with the heavy model</h3>
          <p>Suppose the transformer costs 40ms GPU per transaction. Daily compute if every transaction goes through it:</p>
          <VIS.Equation display={true} tex={String.raw`3\times10^{9}\,\text{txn/day} \times 40\,\text{ms} = 1.2\times10^{11}\,\text{GPU-ms/day} \approx 380\,\text{GPU-years/day}`} />
          <p>Cheap rules + GBM cost ~18ms total, with the transformer reserved for the ~10% ambiguous band:</p>
          <VIS.Equation display={true} tex={String.raw`C_{\text{cascade}} \;=\; C_{\text{rules}} + C_{\text{GBM}} + p_{\text{amb}}\,C_{\text{txf}} \;\approx\; 18 + 0.10\cdot 40 \;=\; 22\,\text{ms/txn}`} />
          <p>Savings vs heaviest-only:</p>
          <VIS.Equation display={true} tex={String.raw`1 - \frac{22}{40} \;\approx\; 45\%\,\text{compute saved per txn},\;\text{or}\;\approx 170\,\text{GPU-years/day}`} />
          <p>And — critically — the rules carry zero GPU cost, so on hard-blocked traffic the savings approach 100%.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. Latency budget split (the 100ms p95)</h3>
          <p>Sequential dependency chain on the hot path:</p>
          <VIS.Equation display={true} tex={String.raw`T_{\text{p95}} \;=\; T_{\text{net}} + T_{\text{feat}} + T_{\text{score}} + T_{\text{route}} + T_{\text{log}}`} />
          <p>A realistic split for the 100ms SLO:</p>
          <VIS.Equation display={true} tex={String.raw`\underbrace{25}_{\text{net in/out}} + \underbrace{20}_{\text{feat fetch}} + \underbrace{15}_{\text{GBM}} + \underbrace{5}_{\text{route + log}} = 65\,\text{ms} \;\Rightarrow\; \approx 35\,\text{ms headroom}`} />
          <p>The 35ms headroom is what funds the transformer call on the ambiguous band — but only because the GBM has already classified 90% of traffic and we save the headroom for the cases where it matters. Calling the transformer on 100% of traffic blows the SLO.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. Why a transformer at all — and only on the ambiguous band</h3>
          <p>GBM treats the 400 features as a bag. Transactions on a stolen card often look benign individually but suspicious as a sequence (e.g., probe-then-spike). Let <VIS.Equation tex={String.raw`\Delta\text{recall}`} /> be the recall lift from sequence modeling on the ambiguous band:</p>
          <VIS.Equation display={true} tex={String.raw`\text{ROI}_{\text{txf}} \;=\; \frac{p_{\text{amb}} \cdot \Delta\text{recall} \cdot \text{fraud\$\, on\, amb}}{C_{\text{txf}}\,\text{compute}}`} />
          <p>Numerically, with <VIS.Equation tex={String.raw`p_{\text{amb}}=0.10`} />, <VIS.Equation tex={String.raw`\Delta\text{recall}\approx 0.15`} />, and average fraud $ on the ambiguous band ~$80, the transformer pays for itself at a few cents per call. Outside the ambiguous band, the GBM's confidence is already high (or low) enough that the transformer's marginal lift is &lt;0.5%, which doesn't clear the compute cost.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. Chargeback vs decline tradeoff (the ROC operating point)</h3>
          <p>Expected loss at decline-threshold τ:</p>
          <VIS.Equation display={true} tex={String.raw`\mathbb{E}[L(\tau)] \;=\; \pi\,(1-\text{TPR}(\tau))\,C_{\text{CB}} \;+\; (1-\pi)\,\text{FPR}(\tau)\,C_{\text{decl}}`} />
          <p>where <VIS.Equation tex={String.raw`\pi \approx 0.001`} /> is the fraud base rate, <VIS.Equation tex={String.raw`C_{\text{CB}}`} /> is the chargeback cost (txn amount + ~$30 issuer fee), and <VIS.Equation tex={String.raw`C_{\text{decl}}`} /> is the expected revenue lost per false decline. Optimum on the ROC:</p>
          <VIS.Equation display={true} tex={String.raw`\left.\frac{d\,\text{TPR}}{d\,\text{FPR}}\right|_{\tau^{*}} \;=\; \frac{(1-\pi)\,C_{\text{decl}}}{\pi\,C_{\text{CB}}}`} />
          <p>With <VIS.Equation tex={String.raw`C_{\text{CB}} \approx \$130`} /> (avg) and <VIS.Equation tex={String.raw`C_{\text{decl}} \approx \$5`} /> (lost margin per false decline), the optimal slope sits around 38 — i.e., declining one true fraud is worth 38 false declines. Merchants with thin margins shift the slope; high-AOV merchants shift it the other way. Hence per-merchant thresholds.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. Reviewer queue sizing (Little's Law)</h3>
          <p>Borderline rate ≈ 0.2% of 3B txn/day = 6M items/day = ~70 items/s. With each reviewer handling ~60 items/h (1 min/item):</p>
          <VIS.Equation display={true} tex={String.raw`N_{\text{rev}} \;=\; \frac{70\,\text{items/s} \cdot 3600\,\text{s}}{60\,\text{items/hr}} \approx 4200\,\text{reviewer-hours/hr} \approx 4200\,\text{reviewers}`} />
          <p>Steady-state queue depth, with target wait <VIS.Equation tex={String.raw`W=5\,\text{min}`} />:</p>
          <VIS.Equation display={true} tex={String.raw`L \;=\; \lambda \cdot W \;=\; 70 \cdot 300 \;=\; 21{,}000\,\text{items}`} />
          <p>If the router pushes more than ~0.2% to the queue, you either grow the pool (slow) or tighten the router (fast). This is the dial regulators care about when reviewer SLAs blow.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. 3DS challenge rate — friction vs catch</h3>
          <p>Let <VIS.Equation tex={String.raw`r_{\text{3DS}}`} /> be the fraction of traffic step-stepped up. Abandonment cost:</p>
          <VIS.Equation display={true} tex={String.raw`\Delta\text{rev}_{\text{3DS}} \;=\; -\,r_{\text{3DS}} \cdot 0.005 \cdot \overline{\text{AOV}} \cdot 3\times 10^{9}`} />
          <p>With <VIS.Equation tex={String.raw`\overline{\text{AOV}} = \$60`} /> and <VIS.Equation tex={String.raw`r_{\text{3DS}}=2\%`} />:</p>
          <VIS.Equation display={true} tex={String.raw`\Delta\text{rev} \;\approx\; -0.02 \cdot 0.005 \cdot 60 \cdot 3\times 10^{9} \;\approx\; -\$18\text{M/day}`} />
          <p>Fraud caught at 3DS (if challenge catches ~70% of attempted fraud):</p>
          <VIS.Equation display={true} tex={String.raw`\$_{\text{caught}} \;\approx\; r_{\text{3DS}} \cdot 0.70 \cdot \pi_{\text{amb}}\cdot \overline{\$_{\text{cb}}}\cdot 3\times 10^{9}`} />
          <p>3DS is positive-ROI only on the ambiguous band where fraud density is ~10–50× baseline. Universally challenging at 2% loses money.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Label-delay loop and effective training window</h3>
          <p>If chargebacks mature over 4–8 weeks, only transactions older than 8 weeks have closed labels:</p>
          <VIS.Equation display={true} tex={String.raw`T_{\text{train,end}} \;=\; T_{\text{now}} - 8\,\text{weeks}`} />
          <p>So the model trained today sees the world as it was 2 months ago. The training-vs-serving gap is:</p>
          <VIS.Equation display={true} tex={String.raw`\text{gap} \;=\; T_{\text{now}} - T_{\text{train,end}} \;=\; 8\,\text{weeks}`} />
          <p>Weekly retrain cadence is the equilibrium between (a) the chargeback maturation window — retraining more often just adds noise from immature labels — and (b) the rate at which new fraud rings appear. Faster cadence requires a partial-label estimator (e.g., delayed-feedback model) or active labeling via reviewer queue.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Drift detection (PSI)</h3>
          <p>Population Stability Index between feature distribution at time t and a reference window:</p>
          <VIS.Equation display={true} tex={String.raw`\text{PSI} \;=\; \sum_{i=1}^{B} (p_i^{(t)} - p_i^{(\text{ref})}) \,\ln\!\left(\frac{p_i^{(t)}}{p_i^{(\text{ref})}}\right)`} />
          <p>Standard bands: PSI &lt; 0.1 = stable; 0.1–0.25 = some drift; &gt;0.25 = material drift, retrain or investigate. PSI is the only signal that arrives before the 8-week chargeback maturation — when issuer-side BIN reissues or a new fraud ring start to shift feature distributions, PSI moves within a day. Chargebacks confirm it weeks later.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Class imbalance and the loss</h3>
          <p>Fraud base rate <VIS.Equation tex={String.raw`\pi \approx 0.001`} />. Plain log-loss is dominated by the negative class. Standard fixes:</p>
          <VIS.Equation display={true} tex={String.raw`L_{\text{weighted}} \;=\; -\,w_{+}\,y\,\log p \;-\; w_{-}\,(1-y)\,\log(1-p),\quad w_{+}/w_{-} \approx 1/\pi`} />
          <p>Or undersample negatives at training time, then recalibrate at scoring time:</p>
          <VIS.Equation display={true} tex={String.raw`p_{\text{adj}} \;=\; \frac{p\cdot \beta}{p\cdot \beta + (1-p)},\quad \beta = \frac{\pi_{\text{prod}}}{\pi_{\text{train}}}`} />
          <p>Without recalibration, your "decline at 0.5" threshold corresponds to a different precision in prod than on training.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Score every txn with the transformer (no GBM, no rules)."</strong> 380 GPU-years/day, blows the 100ms SLO on every request, and gains &lt;1% recall over the cascade. Math: §3a, §3b.</li>
            <li><strong>"Skip the rules engine; the model handles all edge cases."</strong> Rules are deterministic, auditable, and let you ship issuer-mandated blocks (sanctioned-merchant, BIN-country mismatch) within an hour. The model can't be patched that fast and regulators won't accept "the GBM learned it."</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-traps" title="Trap drills — 27 problems across 5 axes">
          <p style={{color:"#475569", marginBottom: 16}}>
            Problems spanning business metrics, data collection, training, monitoring, and operational gotchas. Each must pass the redaction litmus: substitute "fraud model" for any concept name — if a generic-ML candidate gets it from structural cues alone, the problem is broken.
          </p>

          <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Business metrics — what the system is actually optimizing</h3>

          <VIS.TrapProblem
            id="fraud-a1"
            difficulty="hard"
            title="A1 — Picking the north-star metric"
            scenario={<>Leadership wants one headline number. Pick the metric that best summarizes whether the fraud system is healthy this week, given a hard SLA on customer experience and a chargeback-cost line on the P&amp;L.</>}
            options={[
              {key:"a", text:"AUC of the GBM scorer on the latest training fold, reported weekly with a 95% confidence interval."},
              {key:"b", text:"Dollar-weighted net loss rate: (chargeback $ + false-decline opportunity $) divided by gross authorized $, reported on cohorts whose chargeback windows have matured.", correct:true},
              {key:"c", text:"Average model score across all authorized transactions, tracked daily as a population-level health signal."},
              {key:"d", text:"Reviewer queue depth at 5pm Pacific, used as a proxy for how much fraud the model is catching that week."},
            ]}
            trap={<>(a) is a model-quality metric, not a business metric — AUC can stay flat while net loss explodes via decline-rate creep. (c) is a population mean with no decision-relevance — it shifts with traffic mix, not fraud. (d) measures reviewer load, not catch quality.</>}
            lens={<>The business cares about combined dollars lost to fraud plus dollars lost to over-blocking, normalized to authorized volume. AUC is a development metric; net loss rate is the operational one. Cohort-matured chargebacks are the only honest denominator — using today's open cohort understates loss by ~50%.</>}
            stretch={<>If you add a 3DS step-up rate constraint, does the optimal decline threshold rise, fall, or stay the same? Why?</>}
          />

          <VIS.TrapProblem
            id="fraud-a2"
            difficulty="hard"
            title="A2 — Decline-rate budget vs chargeback ratio"
            scenario={<>The risk team sets a chargeback-ratio ceiling of 0.10% (issuer-mandated to keep card-network privileges). The CFO sets a decline-rate ceiling of 3.5% (above this, merchant revenue craters). Pick the option that correctly describes how these two constraints interact.</>}
            options={[
              {key:"a", text:"They are independent — chargeback ratio depends on missed fraud, decline rate depends on the threshold, so they can be tuned separately."},
              {key:"b", text:"Lowering chargeback ratio always lowers decline rate too, because better models catch more fraud with fewer false positives."},
              {key:"c", text:"They trade off along the model's ROC curve at a fixed AUC; pushing chargeback ratio below floor requires accepting a higher decline rate unless the model itself improves.", correct:true},
              {key:"d", text:"Decline rate is a leading indicator of chargeback ratio, so the CFO's constraint dominates and the risk team's constraint is redundant."},
            ]}
            trap={<>(a) treats the two as independent dials; they sit on the same ROC curve and trade off. (b) is the AUC-improves-everything fallacy — it does, but only when AUC actually moves; at fixed AUC the curve is the curve. (d) inverts causality — chargeback ratio is the lagging risk metric, decline rate the leading cost metric, both controlled by the same threshold.</>}
            lens={<>Both constraints are points on the model's ROC curve at the operating threshold. The only ways out of the box are: (i) improve AUC (move the curve up), (ii) add a step-up channel (3DS) that catches fraud without counting as a decline, or (iii) segment thresholds by merchant tier where one or the other constraint is slack. Just retuning τ moves you along the curve.</>}
            stretch={<>If issuer policy tightens the chargeback ratio ceiling to 0.05%, which of the three escape valves above is fastest to ship?</>}
          />

          <VIS.TrapProblem
            id="fraud-a3"
            difficulty="medium"
            title="A3 — Costing a false decline"
            scenario={<>Pick the option whose accounting of false-decline cost is closest to how a payments team actually thinks about it on the P&amp;L.</>}
            options={[
              {key:"a", text:"The fee the processor would have earned on the transaction (about 0.30 plus 1.5% of order value), summed across all false declines in the period."},
              {key:"b", text:"The full order value of the false-declined transaction, since the merchant lost that sale entirely and the processor's incentive must align with the merchant's."},
              {key:"c", text:"Processor margin on the lost transaction plus a multiplier for reduced lifetime value of the angered customer, who declines further cards over the next quarter.", correct:true},

            ]}
            trap={<>(a) under-counts by ignoring downstream LTV loss. (b) over-counts — the processor doesn't earn the full order value. (d) is technically true on the immediate P&amp;L but misses the cohort effect (declined customers churn from the processor too) that mature fraud teams price in.</>}
            lens={<>False-decline cost = margin on the lost transaction + LTV erosion from the customer experience. The second term often dominates: a single bad decline can cost more than several chargebacks because the customer switches processors. Numerical LTV multipliers (often 3–10×) are how the team justifies a lower decline threshold even when chargebacks are within budget.</>}

          <VIS.TrapProblem

            options={[

              {key:"c", text:"Treat all 3DS challenges as approves, since the bank is willing to vouch for the transaction once it completes."},

            trap={<>(b) overcounts and removes the incentive to use 3DS. (c) undercounts and lets the model dump everything into 3DS to clear its decline-rate budget. (d) loses the diagnostic — you can't tell whether the model is too aggressive vs the step-up is too friction-heavy.</>}
            lens={<>Split the counter: hard-decline rate and 3DS-abandonment rate are different levers with different fixes. Hard declines are model-threshold; 3DS abandonment is friction (SMS deliverability, app push UX). Combining them hides which one is hurting you.</>}

            options={[

              {key:"b", text:"Use focal loss — its (1-p)^γ factor naturally up-weights hard positives and is the standard fix for extreme imbalance in dense classification settings such as object detection."},

            lens={<>Weighted log-loss preserves the loss family that gives you calibrated probabilities; post-hoc calibration (Platt for linear, isotonic for monotone) fixes residual mis-calibration on a held-out set. Focal/AUC-pairwise are tempting but downstream policy logic needs probabilities you can threshold by dollar value.</>}

            ]}
            trap={<>(a) tanks decline rate without solving the problem — the model has no ATO signal regardless of threshold. (b) blows the friction budget. (c) misses that the processor still eats the chargeback in many flows.</>}
            lens={<>ATO needs a different feature family — within-account behavioral change, not cross-account anomaly. A separate head (or a separate model entirely) trained on a curated ATO label cohort is the canonical solution. The two heads ensemble at the decision-router.</>}
            stretch={<>How would you build the ATO label cohort given chargeback codes don't reliably distinguish ATO from stolen-card?</>}
          />

          <VIS.TrapProblem
            id="fraud-e2"
            difficulty="hard"
            title="E2 — Adversarial drift from fraudsters"
            scenario={<>Fraud rings probe the model: send small transactions to discover which patterns get approved, then exploit the learned approve-set at scale. Pick the option whose defense is right.</>}
            options={[
              {key:"a", text:"Retrain the GBM daily so the model adapts to the latest probe patterns before fraudsters can exploit them at scale, and rely on rapid iteration to outpace the adversary's learning loop."},
              {key:"b", text:"Increase model regularization so the GBM is less specific to its training distribution and the boundary is harder to probe by fraudsters running small-amount discovery transactions on stolen PANs."},
              {key:"c", text:"Block any card that has been probed within the past hour; one small-amount authorization on a suspicious device is enough signal to ban that PAN for the rest of the day across all merchants."},
              {key:"d", text:"Add randomized 3DS challenges on a 1% slice of borderline traffic so probe outcomes are partially uninformative, and add velocity rules to flag rapid same-card probe sequences in the engine.", correct:true},
            ]}
            trap={<>(a) daily retrain is constrained by chargeback maturation; you'll just train on stale signal. (b) softens the model's distinctions, increasing FPs without disrupting probes. (c) over-blocks innocent test transactions (every $0.01 auth verification is a "probe" by this rule).</>}
            lens={<>Two defenses: (i) randomize the response so probe outcomes have noise (random 3DS on borderline, occasional non-deterministic declines), (ii) detect the probe pattern itself via velocity rules. Adversarial fraud is a game-theoretic problem; standard ML hygiene (more data, retrain faster, regularize) doesn't directly address the adversary's information channel.</>}
            stretch={<>What's the cost of randomizing 1% of borderline 3DS calls, in expected daily revenue?</>}
          />

          <VIS.TrapProblem
            id="fraud-e3"
            difficulty="hard"
            title="E3 — The rules engine vs the model: who wins on disagreement"
            scenario={<>A rule says decline; the GBM says approve with 0.02 fraud probability. Pick the option whose arbitration policy is right for a production fraud system.</>}
            options={[
              {key:"a", text:"Whichever the customer-experience team prefers in any given week — the routing is a product decision driven by user-facing experience, not a modeling decision driven by precision and recall."},
              {key:"b", text:"Average the two by combining the rule-flag (0 or 1) with the model score, weighting by historical precision of each so the system can take advantage of both information sources at once."},
              {key:"c", text:"Model wins on every disagreement because its score is calibrated to the actual fraud rate, while rules are hand-curated and tend to be stale relative to the latest patterns the model has learned."},
              {key:"d", text:"Rules win on hard-block disagreements since they encode regulatory and issuer-mandated blocks the model has no authority to override, and the audit trail is cleaner for compliance review.", correct:true},
            ]}
            trap={<>(c) ignores the audit / regulatory dimension. (b) average-of-binary-and-continuous is an analytical mess. (a) abdicates the engineering decision.</>}
            lens={<>Rules win on hard-block (sanctioned merchant, regulator mandate, issuer-side override). Models win on the soft band where rules don't speak. The arbitration layer formally encodes the precedence — and surfaces disagreements as a metric so you can spot drift in either direction.</>}
            stretch={<>How would you detect a rule that has become obsolete and is now firing on legitimate traffic?</>}
          />

          <VIS.TrapProblem
            id="fraud-e4"
            difficulty="hard"
            title="E4 — Issuer-side reissues"
            scenario={<>An issuer reissues 10M cards with new PANs and the same cardholders. Pick the option whose effect on the fraud system is right.</>}
            options={[
              {key:"a", text:"No effect — the cardholders are the same humans with the same behavior; the PAN is just an identifier and the model is keyed on the underlying behavioral patterns, which are unchanged."},
              {key:"b", text:"The chargeback feed will double-count, since the same chargeback shows up under both the old and the new PAN; mitigate the issue by deduplicating in the chargeback ingestion pipeline."},
              {key:"c", text:"PSI on PAN-derived features will briefly spike during the reissue period; ignore the alert because it is a known calendar event and the underlying feature semantics are unchanged."},
              {key:"d", text:"Per-card velocity features reset to zero on affected cards, breaking recent-history signal until new transactions accumulate; mitigate by joining on a stable cardholder identifier where available.", correct:true},
            ]}
            trap={<>(a) ignores that the model keys on PAN, not human. (b) is a different (real but separate) issue and doesn't capture the main hit. (c) understates the problem — PSI does spike, but ignoring the model behavior is wrong.</>}
            lens={<>Velocity and reputation features are PAN-scoped; reissue wipes them. A stable cardholder identifier (when available via tokenization) lets you carry behavioral history across reissues. Without it, the model is partially blind on reissued cards for several weeks.</>}
            stretch={<>If you don't have a stable cardholder identifier, what bridging feature could you engineer?</>}
          />

          <VIS.TrapProblem
            id="fraud-e5"
            difficulty="hard"
            title="E5 — The on-call playbook for a hard regression"
            scenario={<>Chargeback ratio in cohort-matured data jumps from 0.08% to 0.14% over a single week. Pick the option whose first response is right.</>}
            options={[
              {key:"a", text:"Roll back the most recent model deploy on the assumption that chargeback spikes almost always trace back to a recent change in the scoring stack rather than to issuer-side or fraudster-side shifts."},
              {key:"b", text:"Tighten the decline threshold by 10% globally and pull back on the decline-rate budget until the chargeback spike is understood, accepting some lost revenue as the price of caution."},
              {key:"c", text:"Slice the spike by merchant tier, geography, BIN, and time-of-day to localize the regression, then check whether a recent model or rules change correlates with the affected slice.", correct:true},
              {key:"d", text:"Add 3DS step-up to all borderline transactions across every merchant and wait two weeks for the chargeback maturation to confirm whether the spike was real or a labelling artifact."},
            ]}
            trap={<>(a) rollback first is the cargo cult; the cause might be issuer-side. (b) reduces revenue immediately and may not address the root. (d) adds friction without diagnosis.</>}
            lens={<>Localize before remediating. Spikes in fraud almost always cluster on a slice (one BIN, one merchant, one ring). Slice-and-find collapses the search space; only then do you decide whether to roll back, retrain, or add a rule.</>}
            stretch={<>What slice typically lights up first when an account-takeover ring is the cause?</>}
          />

          <VIS.TrapProblem
            id="fraud-e6"
            difficulty="hard"
            title="E6 — Reviewer queue starvation vs flood"
            scenario={<>The reviewer queue is sitting at 50,000 items and growing; reviewers are processing 60 items/hour. Pick the option whose immediate fix is right.</>}
            options={[
              {key:"a", text:"Hire more reviewers immediately and scale the analyst pool to match steady-state demand, since reviewer capacity is the binding constraint and growing the pool is the cleanest fix."},
              {key:"b", text:"Raise the router's borderline threshold so fewer items enter the queue, prioritize by transaction dollars at risk, and auto-approve low-dollar borderline items under a tracked precision-loss budget.", correct:true},
              {key:"c", text:"Switch the reviewer queue from FIFO to LIFO scheduling on the grounds that the freshest items are the most valuable to review and the older items will simply mature into chargebacks over time anyway."},
              {key:"d", text:"Pause the reviewer queue entirely for the rest of the week and rely on the chargeback feedback loop to catch whatever fraud the model misses, accepting the catch-rate gap as a temporary measure."},
            ]}
            trap={<>(a) is the slow answer (hiring takes weeks). (c) reverses priority but adds no capacity. (d) breaks the calibration loop and the borderline catch.</>}
            lens={<>Inflow control is the only fast lever. Raise τ_borderline, prioritize by $-at-risk, and accept a measured precision loss on the lowest-$ tail. Capacity expansion is the slower parallel track.</>}
            stretch={<>How would you choose the $ cutoff for the auto-approve-low tier without leaking signal to fraudsters?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>The label loop is the hardest part.</strong> Chargebacks are 4–8 weeks late; today's model trains on data ~2 months stale. Drift monitors (§3h) are the only signal that arrives in time.</li>
            <li><strong>Per-merchant thresholds, not global.</strong> The ROC operating point depends on AOV and fraud rate per merchant tier (§3d).</li>
            <li><strong>Feature parity between batch and stream.</strong> Train-serve skew in velocity features is a top regression cause — single feature library + parity tests.</li>
            <li><strong>Account-takeover hides in legitimate features.</strong> A separate ATO head on within-account behavioral change is the canonical fix (E1).</li>
            <li><strong>Rules win on hard-blocks, model wins on soft band.</strong> Surface disagreements between the two as a monitored metric (E3).</li>
            <li><strong>3DS is positive-ROI only on the ambiguous band.</strong> Universal step-up loses money (§3f).</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}

      </ul>
    </VIS.Section>
  </main>
  );
};
