        </VIS.Section>

        <VIS.Section id="sec-walk" title="Walking the decision path">
          <ol>
            <li><strong>Login event hits the rules engine first.</strong> Hard-block known-bot signatures; hard-allow whitelisted device+IP pairs. Keeps deterministic decisions out of the probabilistic scorer. <VIS.Equation tex={String.raw`\text{rules pre-empt} \approx 3\text{-}5\%\text{ of traffic}`} /></li>
            <li><strong>Feature fan-in runs in parallel</strong> against five stores/services. Total feature-fetch latency is bounded by the slowest leg, not the sum. <VIS.Equation tex={String.raw`T_{\text{feat}} = \max_i T_i`} /></li>
            <li><strong>GBM scorer</strong> consumes ~120 features (device, IP, behavior, velocity, graph embedding) and emits a calibrated risk score. <VIS.Equation tex={String.raw`r(x) \in [0,1],\;\hat P(\text{ATO}\mid x) \approx r(x)`} /> after isotonic calibration. See <strong>§3a</strong>.</li>
            <li><strong>Decision router</strong> compares the score to two per-region thresholds. <VIS.Equation tex={String.raw`\text{allow}\;\text{if}\;r < \tau_L,\;\text{step-up}\;\text{if}\;\tau_L \le r < \tau_H,\;\text{block}\;\text{if}\;r \ge \tau_H`} />. Thresholds are chosen by the cost optimization in <strong>§3b</strong>.</li>
            <li><strong>MFA challenge</strong> on borderline cases. Pass = strong real-user positive (and a cheap fresh label); repeated fails = ATO. The MFA queue has its own capacity constraint — see <strong>§3c (Little's Law)</strong>.</li>
            <li><strong>Outcomes feed the label pipeline</strong> across 2-30 day horizons. Labels are joined back to the scored row when they mature. The Bayesian posterior on the label is updated as evidence arrives — see <strong>§3d</strong>.</li>
            <li><strong>Velocity features decay</strong> with explicit half-lives so a 7-day-old failed login does not look like fresh activity. <VIS.Equation tex={String.raw`w(t) = e^{-t/\tau}`} />. See <strong>§3e</strong>.</li>
            <li><strong>Drift monitor (PSI) on the device-fingerprint space</strong> — attackers rotating their fingerprint tooling shows up as a PSI spike before model AUC degrades. See <strong>§3f</strong>.</li>
            <li><strong>Friction monitor</strong> tracks the step-up rate per region and the conversion delta. A sustained step-up spike with no AUC change indicates threshold drift; with AUC change, a real attack wave. See <strong>§3g</strong>.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. Friction-vs-catch expected loss</h3>
          <p>For a given threshold pair <VIS.Equation tex={String.raw`(\tau_L,\tau_H)`} />, the per-login expected loss is:</p>
          <VIS.Equation display={true} tex={String.raw`\mathbb{E}[L] \;=\; \pi\,(1-\text{TPR})\,C_{\text{FN}} \;+\; (1-\pi)\,\text{FPR}\,C_{\text{FP}}^{\text{friction}} \;+\; (1-\pi)\,\rho_{\text{stepup}}\,C_{\text{MFA}}`} />
          <p>where <VIS.Equation tex={String.raw`\pi \approx 10^{-4}`} /> is the base rate of ATO, <VIS.Equation tex={String.raw`C_{\text{FN}}`} /> the loss from a missed ATO (chargeback + remediation + reputational), and <VIS.Equation tex={String.raw`C_{\text{MFA}}`} /> the per-prompt conversion cost. Order of magnitude: <VIS.Equation tex={String.raw`C_{\text{FN}}/C_{\text{MFA}} \sim 10^{4}`} />.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. Optimal-threshold ROC slope</h3>
          <p>Differentiating expected loss with respect to threshold on the ROC curve:</p>
          <VIS.Equation display={true} tex={String.raw`\left.\frac{d\,\text{TPR}}{d\,\text{FPR}}\right|_{\tau^{*}} \;=\; \frac{(1-\pi)\,C_{\text{FP}}}{\pi\,C_{\text{FN}}}`} />
          <p>With <VIS.Equation tex={String.raw`\pi=10^{-4}`} /> and <VIS.Equation tex={String.raw`C_{\text{FN}}/C_{\text{FP}}=10^{4}`} />, the optimal slope is ~1 — meaning the operating point sits where the ROC curve is still steep, far from the upper-left corner that beginners chase.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. MFA queue (Little's Law)</h3>
          <p>If MFA includes a backend review step (e.g., for high-risk step-ups, an analyst sanity-check), the queue must be stable:</p>
          <VIS.Equation display={true} tex={String.raw`L \;=\; \lambda \cdot W`} />
          <p>At 5M logins/min and a target 2% step-up rate, the MFA flux is</p>
          <VIS.Equation display={true} tex={String.raw`\lambda_{\text{mfa}} \;=\; 5\times 10^{6} \cdot 0.02 \;=\; 10^{5}\,\text{/min} \;\approx\; 1.67\times 10^{3}\,\text{/s}`} />
          <p>For a 30s wait-time target, the in-flight depth is <VIS.Equation tex={String.raw`L \le 5\times 10^{4}`} /> — sets the MFA service's concurrency headroom.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. Label-delay Bayesian update</h3>
          <p>At decision time we have a prior <VIS.Equation tex={String.raw`p_0 = r(x)`} />. As evidence <VIS.Equation tex={String.raw`E_t`} /> arrives — password reset at t=3d, chargeback at t=14d, ID-verify-fail at t=21d — the posterior updates:</p>
          <VIS.Equation display={true} tex={String.raw`P(\text{ATO}\mid E_{1:t}) \;=\; \frac{P(E_{1:t}\mid\text{ATO})\,p_0}{P(E_{1:t}\mid\text{ATO})\,p_0 \;+\; P(E_{1:t}\mid\neg\text{ATO})\,(1-p_0)}`} />
          <p>The likelihood ratio for chargeback evidence is huge (<VIS.Equation tex={String.raw`\Lambda \sim 10^{3}`} />) — a single chargeback flips a borderline row to a near-certain positive label. Conversely, a clean 30-day window without dispute is treated as a weak negative (the absence of evidence is evidence of absence, but not strong).</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. Velocity-feature time decay</h3>
          <p>Velocity counters (failed logins, country flips) are exponentially decayed so stale spikes do not dominate:</p>
          <VIS.Equation display={true} tex={String.raw`v(t) \;=\; \sum_{s \le t} e^{-(t-s)/\tau}\,\mathbf{1}[\text{event at }s]`} />
          <p>Half-life choice is empirical. Failed-login counter: <VIS.Equation tex={String.raw`\tau \sim 1\,\text{hour}`} /> (credential-stuffing bursts are short). Country-flip counter: <VIS.Equation tex={String.raw`\tau \sim 24\,\text{hours}`} /> (legitimate travel takes longer). Naive sliding windows leak the boundary; the EWMA form is smooth.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. Drift detection (PSI on device-fp space)</h3>
          <p>For a discretized feature distribution with bins <VIS.Equation tex={String.raw`i=1..k`} />, with reference proportion <VIS.Equation tex={String.raw`p_i`} /> and current proportion <VIS.Equation tex={String.raw`q_i`} />:</p>
          <VIS.Equation display={true} tex={String.raw`\text{PSI} \;=\; \sum_{i=1}^{k} (q_i - p_i)\,\ln\!\left(\frac{q_i}{p_i}\right)`} />
          <p>Convention: PSI &lt; 0.1 = stable; 0.1-0.25 = moderate shift; &gt; 0.25 = major shift (page). The device-fingerprint space is the canary — attackers rotating fingerprinting tooling shows up here days before AUC degrades on delayed labels.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Step-up rate vs ATO catch curve</h3>
          <p>Parameterize by <VIS.Equation tex={String.raw`\tau_L`} />: the step-up rate is</p>
          <VIS.Equation display={true} tex={String.raw`\rho(\tau_L) \;=\; \Pr(r(x) \ge \tau_L) \;=\; (1-\pi)\,\text{FPR}(\tau_L) \;+\; \pi\,\text{TPR}(\tau_L)`} />
          <p>Catch rate (recall on the ATO class) is <VIS.Equation tex={String.raw`\text{TPR}(\tau_L)`} />. The deployment curve plots <VIS.Equation tex={String.raw`\text{TPR}`} /> against <VIS.Equation tex={String.raw`\rho`} />, not against FPR. The product team negotiates against a step-up budget (e.g., 2%) — find the maximum TPR achievable under that budget.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Calibration drift under attack-pattern shift</h3>
          <p>Calibration is checked with a <VIS.Term def="Expected Calibration Error: average gap between predicted probability and observed positive rate across confidence bins. Low ECE means score 0.7 means a real 70% positive rate.">reliability curve</VIS.Term>. Expected Calibration Error:</p>
          <VIS.Equation display={true} tex={String.raw`\text{ECE} \;=\; \sum_{b=1}^{B} \frac{|S_b|}{N}\,\bigl|\,\text{acc}(S_b) - \text{conf}(S_b)\,\bigr|`} />
          <p>Under attack-pattern shift, the GBM's discrimination (AUC) often survives but its calibration breaks — predicted 0.7 stops meaning 70% true. The router's cost math (§3a) assumes <VIS.Equation tex={String.raw`r(x) \approx \hat P`} />, so ECE drift breaks threshold optimality silently. Re-fit the isotonic calibrator weekly on the freshest labeled slice.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Class imbalance and train-time sampling</h3>
          <p>Base rate <VIS.Equation tex={String.raw`\pi \approx 10^{-4}`} /> means a uniform sample is 99.99% negative. Training on the raw distribution wastes capacity. We oversample positives to a target prevalence <VIS.Equation tex={String.raw`\pi'`} />, then correct the bias at score time:</p>
          <VIS.Equation display={true} tex={String.raw`P(\text{ATO}\mid x) \;=\; \frac{p'(x)\,\pi\,(1-\pi')}{p'(x)\,\pi\,(1-\pi') \;+\; (1-p'(x))\,\pi'\,(1-\pi)}`} />
          <p>Without this correction, the scorer reads "0.5" as ATO when the unconditional prior says it is <VIS.Equation tex={String.raw`10^{-4}`} />.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. Time-series cross-validation (not random k-fold)</h3>
          <p>Random k-fold leaks future information into training (attacker techniques that emerge in week N are seen during training on week N-1's fold). Use forward-chaining splits:</p>
          <VIS.Equation display={true} tex={String.raw`\text{fold}_k: \;\text{train}=[t_0, t_k],\;\text{val}=(t_k, t_{k+1}]`} />
          <p>Plus a label-lag gap: drop the last 30 days of the training window so the validation window is not polluted by rows whose labels have not yet matured.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Single ML model, no rules layer."</strong> Compliance and legal mandates can't be probabilistic. Known-bot signature has to be a hard block; a corporate-IP allow-list has to be a hard allow. The model lives <em>after</em> rules. Math: §3a (asymmetric cost).</li>
            <li><strong>"Score offline, cache decisions per user."</strong> ATO is a session-time decision. A cached daily decision keeps a compromised session token valid mid-attack. Score per request. Math: §3e (velocity decay) — the freshest feature is the one that catches credential-stuffing.</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-traps" title="Trap drills">
          <p style={{margin:"0 0 14px 0", fontSize:14, color:"#64748b"}}>
            25 senior-MLE traps across five axes: <strong>business metrics</strong>, <strong>data collection</strong>, <strong>training</strong>, <strong>monitoring</strong>, <strong>gotchas</strong>. Pick one option per problem (unless marked multi); reveal explains why the wrong answers are tempting.
          </p>

          {/* ============================ AXIS A — BUSINESS METRICS ============================ */}

          <VIS.TrapProblem
            id="ato-q1"
            difficulty="hard"
            title="Pick the north-star the threshold router should be tuned against."
            scenario={<>Your PM proposes candidate metrics. One survives perverse-optimization at both extremes; the others reward gaming.</>}
            options={[
              {key:"a", text:"Weekly ROC-AUC of the GBM scorer on the freshest fully-labeled evaluation slice, segmented by region.", correct:false},
              {key:"b", text:"Net dollars per login = fraud loss prevented minus MFA conversion drag, summed across the active threshold pair.", correct:true},
              {key:"c", text:"Recall on chargeback-confirmed ATO labels evaluated at the fixed cutoff score of 0.5 across all regions.", correct:false},
              {key:"d", text:"Step-up challenge rate held under 2% across every region, computed on a rolling seven-day window.", correct:false},
            ]}
            trap={<>(a) ranks well but is cost-blind. (c) freezes a cutoff that is not the cost-optimal one in §3b. (d) drives step-up to zero by allowing everything — the friction metric peaks while fraud loss explodes.</>}
            lens={<>The right north-star expresses both error costs in dollars. The threshold pair falls out of <VIS.Equation tex={String.raw`\arg\min_{\tau_L,\tau_H}\,\mathbb{E}[L]`} />.</>}
          />

          <VIS.TrapProblem
            id="ato-q2"
            difficulty="hard"
            title="Conversion fell 1.4% after a router retune. How do you read it?"
            scenario={<>You raised <VIS.Equation tex={String.raw`\tau_L`} /> for a fresh attack wave. Step-up rate moved 2.1% to 3.8%; weekly conversion fell 1.4%; recall on confirmed ATO climbed from 71% to 84%. The CFO asks whether the retune was worth it.</>}
            options={[
              {key:"a", text:"Convert both effects to dollars per login: fraud loss prevented at the new recall minus conversion-loss dollars at the new step-up rate.", correct:true},
              {key:"b", text:"Roll back the retune — a 1.4% conversion drop is unacceptable and the company tracks conversion as the primary north-star.", correct:false},
              {key:"c", text:"Keep the retune — a thirteen-point recall jump on confirmed ATO is a clear model-quality win that justifies the conversion cost.", correct:false},
              {key:"d", text:"Wait six weeks for the chargeback labels on the retune window to mature before deciding either way on the CFO's question.", correct:false},
            ]}
            trap={<>(b) and (c) each pick one side of the tradeoff. (d) is correct in spirit but inaction during an active attack is itself a cost — §3d's Bayesian update on partial evidence is the senior interim move.</>}
            lens={<>Express the comparison in the same units. Dollars per login adds; conversion percentage and recall points do not.</>}
          />

          <VIS.TrapProblem
            id="ato-q3"
            difficulty="medium"
            title="Which step-up modality is the strongest default?"
            scenario={<>You can challenge borderline logins with one default modality before any per-segment overrides kick in. Pick the cleanest cost-vs-friction profile for a global consumer product.</>}
            options={[
              {key:"a", text:"Device push to a registered, channel-bound device: one-tap friction, phishing-resistant, fails closed when the app is uninstalled.", correct:true},
              {key:"b", text:"SMS one-time password sent to the registered phone number: universal carrier coverage, no app dependency, single tap on receipt.", correct:false},
              {key:"c", text:"TOTP code from a third-party authenticator app: cheap to operate at scale, no carrier dependency, six-digit code typed by the user.", correct:false},
              {key:"d", text:"Magic email link to the registered address: zero device dependency, leverages the email channel the account already trusts.", correct:false},
            ]}
            trap={<>(b) is the easy answer but SMS is SIM-swappable and an attacker who has already taken the SIM defeats it. (c) requires the user to have set up the app. (d) sends a recovery vector through the same email that may itself be the takeover target.</>}
            lens={<>Push beats SMS on both friction (one-tap) and security (channel-bound to a registered device). The fallback hierarchy still matters for users without the app — but the default should be push.</>}
          />

          <VIS.TrapProblem
            id="ato-q4"
            difficulty="hard"
            title="Pick the dashboard the VP of Risk should see daily."
            scenario={<>You can pin one chart on the executive-facing daily risk dashboard. Pick the chart whose movements correspond directly to the levers the VP actually controls.</>}
            options={[
              {key:"a", text:"ROC curve of the most recent retrain on the freshest fully-labeled evaluation slice, refreshed every Monday morning at 6am.", correct:false},
              {key:"b", text:"Step-up rate, catch-rate proxy from the 2-day password-reset signal, and net dollars saved per login, all split by region daily.", correct:true},
              {key:"c", text:"Feature-importance bar chart for the GBM scorer using SHAP values, refreshed each retrain and grouped by feature family.", correct:false},
              {key:"d", text:"Histogram of the scorer's predicted-risk distribution over the last 24 hours, overlaid against the prior-week reference distribution.", correct:false},
            ]}
            trap={<>(a), (c), (d) are model-monitoring artefacts — useful for the ML team but not for an executive whose levers are policy thresholds and budgets.</>}
            lens={<>The executive dashboard surfaces the levers the executive pulls: friction, catch, dollars — split by the natural slicing dimension (region).</>}
          />

          <VIS.TrapProblem
            id="ato-q5"
            difficulty="hard"
            title="Single global threshold or per-region thresholds?"
            scenario={<>Adversary mix varies by country: credential-stuffing concentrated in BR and VN, account-farming concentrated on US west-coast traffic, low-volume baseline noise elsewhere.</>}
            options={[
              {key:"a", text:"Single global threshold tuned against pooled expected loss — simpler change-management surface and easier policy audit by Risk.", correct:false},
              {key:"b", text:"Per-region thresholds because score distribution and ATO base rate differ by region, so the cost-optimal cutpoint moves region by region.", correct:true},
              {key:"c", text:"Single shared threshold paired with one separately retrained scorer model per region, dispatched on the inbound login's geo signal.", correct:false},
              {key:"d", text:"Probabilistic sampling instead of fixed thresholds: step-up with probability proportional to the predicted risk score per request.", correct:false},
            ]}
            trap={<>(a) over-friction in low-risk regions or under-catches in high-risk ones. (c) explodes the maintenance surface and shifts the threshold question into a model-selection question that still does not solve it. (d) injects controlled randomness but the underlying optimal cutpoint still varies by region.</>}
            lens={<>One model, multiple thresholds is the smallest change that captures regional risk-prior differences. §3b's cost-optimal cutpoint depends on <VIS.Equation tex={String.raw`\pi`} />, which is region-specific.</>}
          />

          {/* ============================ AXIS B — DATA COLLECTION ============================ */}

          <VIS.TrapProblem
            id="ato-q6"
            difficulty="hard"
            title="Labels arrive 2-30 days late. How do you train on this week?"
            scenario={<>It is Monday and you want to retrain. Last week's logins are mostly still unlabeled — chargebacks remain pending, password-reset signals are partial, ID-verify outcomes are still in flight.</>}
            options={[
              {key:"a", text:"Train on logins from at least 30 days back, treating that window as the freshest window where labels have fully matured against the 2-30d lag.", correct:true},
              {key:"b", text:"Train on the most recent week using whichever partial labels are available, treating every still-unlabeled row as a confident negative example.", correct:false},
              {key:"c", text:"Use the scorer's own predicted risk as a proxy label for last week's logins and feed that proxy back into this Monday's retrain corpus.", correct:false},
              {key:"d", text:"Skip the retrain this week and wait until all of last week's chargeback labels have matured before fitting any new model weights at all.", correct:false},
            ]}
            trap={<>(b) is the textbook positive-unlabeled mistake — rows that will turn out to be ATO train as negatives, biasing the model toward the attack pattern. (c) creates a self-reinforcing loop. (d) freezes the model under adversarial drift.</>}
            lens={<>The label-maturity gap is non-negotiable. Use a 30-day cutoff for the training window; use the partial-label recent slice for calibration drift checks (§3h), not for model fitting.</>}
          />

          <VIS.TrapProblem
            id="ato-q7"
            difficulty="hard"
            title="Which signal is the cleanest positive label for an ATO row?"
            scenario={<>Four signals correlate with account compromise. Pick the one that is most precise (fewest false positives) when used as a training-time positive label.</>}
            options={[
              {key:"a", text:"The user filed a fraud claim with their issuing bank and the merchant chargeback against the disputed session succeeded.", correct:true},
              {key:"b", text:"The user changed their account password within twenty-four hours of the scored login attempt, by any channel including in-product.", correct:false},
              {key:"c", text:"The login originated from a country code that this account had not previously logged in from in its prior six-month history.", correct:false},
              {key:"d", text:"A risk analyst manually flagged the session as suspicious during the next-day manual-review queue audit of the borderline cohort.", correct:false},
            ]}
            trap={<>(b) catches legitimate password rotations and security-hygiene resets. (c) catches a vacation. (d) carries the analyst's prior into the label and is biased by the score the model already produced.</>}
            lens={<>The cleanest label costs the adversary — a chargeback requires the user to engage their bank, so noise drops near zero. Trade volume for precision at training time; use noisier signals as features.</>}
          />

          <VIS.TrapProblem
            id="ato-q8"
            difficulty="hard"
            title="Chargeback labels — what class of attack are you blind to?"
            scenario={<>The cleanest positive label is a confirmed chargeback. Pick the most important class of ATO that this label channel structurally fails to surface.</>}
            options={[
              {key:"a", text:"ATOs where the attacker drained non-chargeback-eligible value: gift-card balance, loyalty points, free-tier resource abuse, in-product credits.", correct:true},
              {key:"b", text:"ATOs that targeted accounts whose owners had declined to set up multi-factor authentication at any prior point in their account lifetime.", correct:false},
              {key:"c", text:"ATOs that completed on the mobile app channel rather than the desktop web channel during the post-login session activity window.", correct:false},
              {key:"d", text:"ATOs in geographic regions where consumer payment-card penetration is structurally low and dispute infrastructure is undeveloped.", correct:false},
            ]}
            trap={<>(b), (c), (d) name slicing dimensions of the user base, but the label still surfaces those ATOs when value flows through a chargeback-eligible rail. The blind spot is the rail itself, not the user slice.</>}
            lens={<>Compensate by joining secondary positive signals — password reset within 7d combined with device change and location flip. Noisier, but it surfaces the dollar-but-no-chargeback class.</>}
          />

          <VIS.TrapProblem
            id="ato-q9"
            difficulty="hard"
            title="Attackers observe your model. How does data collection adapt?"
            scenario={<>An adversary notices that logins from datacenter IPs get blocked and starts routing through residential proxy networks. The training set so far is dominated by datacenter-IP attacks.</>}
            options={[
              {key:"a", text:"Re-weight and up-sample residential-proxy fraud rows in the training set so the scorer cannot keep relying on the datacenter-IP shortcut feature.", correct:true},
              {key:"b", text:"Drop the IP-type feature from the model entirely so that the scorer has no opportunity to learn the datacenter-vs-residential shortcut at all.", correct:false},
              {key:"c", text:"Train a separate scorer model dedicated to residential-proxy traffic and route inbound logins between models based on the IP-type signal.", correct:false},
              {key:"d", text:"Continue training on the existing distribution because the GBM is expected to adapt naturally over time as fresh labels accumulate.", correct:false},
            ]}
            trap={<>(b) discards a feature that still has signal in the unmoved regime; the right move is to break the shortcut, not the feature. (c) leaks the routing decision back to the attacker (probe each route to find the weaker model). (d) is exactly the gap the adversary is exploiting.</>}
            lens={<>Adversarial drift requires active re-balancing of the training set toward the new regime. Snorkel-style labeling functions over the attack signature help bootstrap before chargebacks confirm the shift.</>}
          />

          <VIS.TrapProblem
            id="ato-q10"
            difficulty="hard"
            title="MFA-pass signal — friend or foe of label quality?"
            scenario={<>Successful MFA challenges look like a cheap, fresh, real-user signal. Pick how this signal should enter the label store before it joins the training corpus.</>}
            options={[
              {key:"a", text:"Treat MFA-pass as a strong negative label and feed it straight into the training set as a high-confidence real-user row at scale.", correct:false},
              {key:"b", text:"Treat MFA-pass as a negative label only after a 7-day no-dispute window, since some ATO classes (SIM swap, MFA fatigue) include MFA bypass.", correct:true},
              {key:"c", text:"Ignore MFA-pass for labeling purposes — restrict the positive and negative training labels strictly to chargeback-confirmed outcomes.", correct:false},
              {key:"d", text:"Treat MFA-pass as a positive label for ATO since the upstream router considered the login borderline enough to require a step-up.", correct:false},
            ]}
            trap={<>(a) treats MFA-pass as ground truth and absorbs SIM-swap and MFA-fatigue ATOs as negatives, training the model to ignore those patterns. (c) leaves a high-quality cheap signal on the floor. (d) confuses model output with ground truth.</>}
            lens={<>MFA-pass is a strong negative <em>after</em> a no-dispute window. The window length is set by the longest plausible time-to-detect for the bypass attack classes (SIM swap typically resolves within 7 days).</>}
          />

          {/* ============================ AXIS C — TRAINING ============================ */}

          <VIS.TrapProblem
            id="ato-q11"
            difficulty="hard"
            title="Class imbalance: 1 ATO per 10,000 logins. Pick the correction."
            scenario={<>Naive uniform sampling produces batches with rarely any positive examples in them. Pick the training-time correction that preserves calibrated probabilities at score time.</>}
            options={[
              {key:"a", text:"Oversample the positive class to ~10% prevalence at train time, then correct the inference score with the standard prior-shift adjustment formula.", correct:true},
              {key:"b", text:"Train on the raw 1-in-10,000 distribution and rely on the boosted-tree loss function alone to handle the imbalance during gradient descent.", correct:false},
              {key:"c", text:"Subsample 99% of the negatives at random until the on-disk dataset becomes roughly balanced, then train on that balanced corpus with no further adjustment.", correct:false},
              {key:"d", text:"Train a one-class anomaly detector on the negatives only, since the positive class is too rare to model with a discriminative classifier at all.", correct:false},
            ]}
            trap={<>(b) wastes capacity learning the dominant class. (c) discards informative negatives — hard-to-classify legitimate logins are exactly what the model needs to see. (d) abandons the high-signal positive examples that exist.</>}
            lens={<>Oversample for batch composition; correct the prior at score time so probabilities remain calibrated (§3i). This decouples sampling strategy from probability interpretation.</>}
          />

          <VIS.TrapProblem
            id="ato-q12"
            difficulty="hard"
            title="Time-series cross-validation or random k-fold?"
            scenario={<>You are setting up the cross-validation harness for the weekly retrain. Pick the split scheme that gives a validation AUC that actually predicts the model's live-production behavior.</>}
            options={[
              {key:"a", text:"Forward-chaining time splits with a 30-day label-maturity gap inserted between each train window and its associated validation window.", correct:true},
              {key:"b", text:"Stratified random k-fold so that the positive-class proportion is preserved in every fold and the rare positives never end up in one fold by chance.", correct:false},
              {key:"c", text:"Random k-fold with the most recent week's rows up-weighted, so freshness is captured without giving up the variance benefits of random splits.", correct:false},
              {key:"d", text:"Single random holdout: train on 80% of rows sampled uniformly across the full corpus, then validate on the remaining 20% from the same time window.", correct:false},
            ]}
            trap={<>(b), (c), (d) all leak future-attack signature into the training set. Random splits mix Week 3 attack rows into Week 1's training data; validation AUC over-estimates production AUC by 10+ points and the model fails its first week live.</>}
            lens={<>Forward chaining respects causality; the label-maturity gap prevents leakage from rows whose labels have not yet matured. Both are required.</>}
          />

          <VIS.TrapProblem
            id="ato-q13"
            difficulty="hard"
            title="The GBM hits 0.985 AUC on the eval set. What do you check first?"
            scenario={<>Your latest weekly retrain reports an evaluation AUC of 0.985 — a thirty-point jump over last week's model. Pick the first thing you verify before anything else happens to that model.</>}
            options={[
              {key:"a", text:"Audit for feature leakage: a point-in-time feature whose computation can see outcome-side data after the decision timestamp it is associated with.", correct:true},
              {key:"b", text:"Ship the new model immediately — a thirty-point AUC jump is exactly the performance gain the team has been chasing for several quarters.", correct:false},
              {key:"c", text:"Run an A/B test in production with 5% of live login traffic for two weeks to validate the AUC gain on real users before any further investigation.", correct:false},
              {key:"d", text:"Retrain the model on a randomly chosen 30% subsample of the current corpus to confirm the AUC is stable across different dataset sizes.", correct:false},
            ]}
            trap={<>(b) and (c) deploy a leak-driven model. (d) confirms the leak generalizes within the broken dataset but does not detect the leak.</>}
            lens={<>A discontinuous AUC jump is almost always a feature-leakage story (point-in-time feature that mixes future signal into past rows). The audit is mechanical: for each feature, can it be computed from data strictly before the decision timestamp?</>}
          />

          <VIS.TrapProblem
            id="ato-q14"
            difficulty="hard"
            title="Calibration post-training — pick the method."
            scenario={<>Your raw GBM scores rank logins well but the values themselves are uncalibrated. The router cost math in §3a requires <VIS.Equation tex={String.raw`r(x) \approx \hat P(\text{ATO}\mid x)`} /> to choose thresholds.</>}
            options={[
              {key:"a", text:"Isotonic regression fit on a held-out, recent, label-matured slice — a non-parametric monotone mapping that handles arbitrary score-to-prob shapes.", correct:true},
              {key:"b", text:"Platt scaling fit on the full training set and then deployed at inference time, on the assumption that the score-to-probability mapping is well-modeled by a sigmoid.", correct:false},
              {key:"c", text:"Min-max normalization of raw scores into the unit interval, on the assumption that a 0-to-1 range is sufficient for downstream probability use.", correct:false},
              {key:"d", text:"Skip calibration entirely because the boosted ensemble's output is already averaged across many sigmoid-output leaves and is therefore probabilistic.", correct:false},
            ]}
            trap={<>(b) over-fits on the training distribution and assumes a sigmoid shape that GBM scores rarely match. (c) preserves rank but destroys probabilistic meaning. (d) is a common GBM misconception — leaf probabilities are biased toward the training prevalence and the boosting ensemble averages them.</>}
            lens={<>Isotonic on a fresh held-out slice is the most robust default. Re-fit weekly under attack-pattern shift (§3h).</>}
          />

          <VIS.TrapProblem
            id="ato-q15"
            difficulty="hard"
            title="Graph neural network or graph embedding fed into the GBM?"
            scenario={<>You want to incorporate the session-graph Sybil-community signal. An end-to-end GNN approach competes with a node2vec-style precomputed embedding consumed as a feature by the existing GBM.</>}
            options={[
              {key:"a", text:"Precompute graph embeddings hourly via node2vec or GraphSAGE and feed them as dense features into the existing calibrated GBM scorer at request time.", correct:true},
              {key:"b", text:"Train a GNN end-to-end as the production scorer, on the basis that joint training of structural features and tabular features yields the highest validation AUC.", correct:false},
              {key:"c", text:"Run the GNN online at request time against the live graph database so that the freshest neighborhood structure is reflected in every login decision.", correct:false},
              {key:"d", text:"Drop the session-graph signal from the model entirely because Sybil-community detection is too noisy and too operationally complex to be worth the maintenance cost.", correct:false},
            ]}
            trap={<>(b) replaces a well-calibrated, fast, explainable GBM with an opaque model the team has no muscle around. (c) blows the 200ms budget — live graph traversal is 50+ms even with materialized neighbor counts. (d) leaves real signal on the table.</>}
            lens={<>Pre-compute structural embeddings hourly; the GBM consumes them like any other dense feature. The decoupling lets you upgrade the embedding model without re-validating the scorer.</>}
          />

          {/* ============================ AXIS D — MONITORING ============================ */}

          <VIS.TrapProblem
            id="ato-q16"
            difficulty="hard"
            title="MFA challenge rate doubles overnight. AUC unchanged. Diagnose."
            scenario={<>Step-up rate jumps from 2.1% to 4.3% in 24 hours and the friction monitor pages. The weekly AUC report shows the scorer's AUC is steady at 0.94 across the same window.</>}
            options={[
              {key:"a", text:"Score distribution has shifted — more rows landing in the borderline band — while rank ordering held. The most likely cause is feature-side input drift.", correct:true},
              {key:"b", text:"The scorer has regressed in quality despite the unchanged AUC, because AUC is rank-only and can hide a calibration break that pushes more rows above the lower threshold.", correct:false},
              {key:"c", text:"A genuine attack wave with novel attacker signatures, which the existing scorer is correctly flagging as borderline-risk and routing into the step-up MFA path.", correct:false},
              {key:"d", text:"Random week-on-week fluctuation arising from a small effective sample size at the tail of the score distribution where the threshold sits.", correct:false},
            ]}
            trap={<>(b) is partially right but the question asks for the most-likely first hypothesis. (c) is plausible but indistinguishable from (a) without further evidence (PSI on inputs, recall on the cheap MFA-pass signal). (d) is a denial response.</>}
            lens={<>AUC stable + score distribution drift = feature distribution drift. Check PSI per feature; the drift monitor is the next stop. Calibration drift (§3h) is the secondary hypothesis.</>}
          />

          <VIS.TrapProblem
            id="ato-q17"
            difficulty="hard"
            title="PSI on device-fingerprint space crosses 0.3. First action?"
            scenario={<>The device-fingerprint distribution has shifted dramatically over the past 24 hours. Pick the first action you take while the rest of the team rolls out.</>}
            options={[
              {key:"a", text:"Investigate the underlying source — UA-string rollout, mobile-SDK version bump, or attacker tooling — because each candidate root cause has a different correct remediation path.", correct:true},
              {key:"b", text:"Trigger an out-of-band retrain on the freshest 24-hour window so the model immediately reflects the new device-fingerprint distribution as the new normal baseline.", correct:false},
              {key:"c", text:"Roll the production scorer back to last week's frozen model snapshot under the assumption that the most recent weights are the source of the distribution shift.", correct:false},
              {key:"d", text:"Tighten the lower threshold to push more borderline cases into the step-up MFA path, on the assumption that more challenges will absorb whatever the shift represents.", correct:false},
            ]}
            trap={<>(b) trains on partial-label data (§3d) and bakes the shift into the model whether benign or adversarial. (c) discards the latest legitimate updates. (d) trades friction for nothing until you know whether the shift is benign or hostile.</>}
            lens={<>PSI is a detector, not a remediator. The first move is root-cause: legitimate platform changes get an allowlist update; adversarial shifts feed Snorkel-style labeling functions before chargebacks confirm.</>}
          />

          <VIS.TrapProblem
            id="ato-q18"
            difficulty="hard"
            title="Pick the alert that should page on-call at 3am."
            scenario={<>You can pick exactly one of these signals to escalate as a pager-grade page. The remaining three become dashboard tiles. Choose the one whose 8-hour delay would actually hurt the user base.</>}
            options={[
              {key:"a", text:"Block-path volume exceeds five times the rolling 7-day regional median for any single region, sustained for at least fifteen minutes of consecutive traffic.", correct:true},
              {key:"b", text:"The daily evaluation-slice AUC of the live scorer drops by approximately 0.01 versus the prior day's evaluation, measured on the standard validation slice.", correct:false},
              {key:"c", text:"The population stability index on a single non-top-50 feature crosses the 0.1 boundary line in the moderate-shift band of the weekly drift monitor report.", correct:false},
              {key:"d", text:"The most recent retrain job reports a final training loss approximately three percent higher than last week's retrain job on the comparable training corpus slice.", correct:false},
            ]}
            trap={<>(b), (c), (d) are dashboard-worthy but rarely page-worthy — they are slow signals with high false-alarm rates. The on-call page must correspond to either a customer-impacting friction spike (mass false-blocks) or an unmitigated active attack.</>}
            lens={<>The page criterion is "if I do nothing for 8 hours, customers are harmed." Block-path spikes meet that bar; AUC dips do not.</>}
          />

          <VIS.TrapProblem
            id="ato-q19"
            difficulty="hard"
            title="The 2-day password-reset proxy for catch rate — when does it lie?"
            scenario={<>The 2-day reset proxy normally correlates well with chargeback-confirmed ATO. Name the regime in which the proxy diverges sharply from the underlying truth it is meant to track.</>}
            options={[
              {key:"a", text:"During a credential-stuffing wave when many legitimate users reset preemptively after a platform-wide breach disclosure, inflating the proxy with no rise in true ATO.", correct:true},
              {key:"b", text:"During a slow weekday afternoon traffic window when overall password-reset volume across the platform is low and the proxy signal becomes noisy and unstable.", correct:false},
              {key:"c", text:"Whenever the GBM scorer is recalibrated with a fresh isotonic mapping, which shifts the borderline cohort and changes which logins enter the proxy's measurement window.", correct:false},
              {key:"d", text:"On users whose accounts had previously logged in only from a single country code, since their reset rate is structurally different from the heavy-travel cohort baseline.", correct:false},
            ]}
            trap={<>(b), (c), (d) name conditions where the proxy is quiet or model-dependent, but not conditions where it diverges from the underlying truth. (a) is the canonical example of proxy break under correlated user behavior.</>}
            lens={<>Proxies fail correlatedly under news-driven events. Always cross-check the proxy against the slower chargeback signal once those labels mature — divergence is itself a feature for the post-mortem.</>}
          />

          <VIS.TrapProblem
            id="ato-q20"
            difficulty="hard"
            title="Train-serve skew check — which one do you wire first?"
            scenario={<>You suspect a feature is being computed differently between the training pipeline (Python notebook) and the serving path (Java microservice). Pick the first check that will surface a real skew rather than a misleading green signal.</>}
            options={[
              {key:"a", text:"Shadow-score 1% of live traffic through both pipelines in parallel and flag any per-row score delta above 1e-3, capturing path-specific bugs end to end.", correct:true},
              {key:"b", text:"Re-implement and re-train the production model directly inside the Java service so that both training and serving live in the same codebase and any discrepancy disappears.", correct:false},
              {key:"c", text:"Re-run the production-deployed model on the original training dataset and confirm the score distribution matches the score distribution observed at training time.", correct:false},
              {key:"d", text:"Audit the unit-test coverage on each feature transform individually and trust the green test suite as proof that the training and serving paths produce identical features.", correct:false},
            ]}
            trap={<>(b) is a re-architecture, not a check. (c) tests a different invariant (model stability across data) and misses path-specific bugs. (d) misses interaction effects between transforms — the most common skew failure is in feature-join order, not in a single transform.</>}
            lens={<>End-to-end shadow scoring is the only check that catches the actual skew. Unit tests are necessary but never sufficient.</>}
          />

          {/* ============================ AXIS E — GOTCHAS ============================ */}

          <VIS.TrapProblem
            id="ato-q21"
            difficulty="hard"
            title="Attacker rotates device after every detection. What stays signal?"
            scenario={<>The adversary rotates the device fingerprint each time a login gets blocked. Device-FP-based features lose much of their discriminative value within hours of any deployment.</>}
            options={[
              {key:"a", text:"Shift weight onto features the attacker cannot cheaply rotate: account-side velocity counters, behavioral biometrics during password entry, and session-graph community membership.", correct:true},
              {key:"b", text:"Keep device fingerprint as the dominant feature in the scorer and accept the freshness lag, since most attacks still complete before the rotation cycle catches up.", correct:false},
              {key:"c", text:"Drop the device-fingerprint feature family from the scorer entirely so the model stops relying on a signal that the attacker has demonstrated can be rotated at will.", correct:false},
              {key:"d", text:"Add more device-fingerprint variants — audio fingerprint, GPU fingerprint, font fingerprint — to outpace the attacker's rotation cycle and restore the feature family's discriminative power.", correct:false},
            ]}
            trap={<>(b) keeps a low-value feature dominant. (c) discards signal that still helps in non-rotating regimes. (d) extends the rotation surface, not the model's coverage.</>}
            lens={<>The senior move is to shift weight onto rotation-resistant features. Behavioral biometrics are particularly valuable here — the attacker can replay device signatures but cannot easily replay the legitimate user's typing rhythm.</>}
          />

          <VIS.TrapProblem
            id="ato-q22"
            difficulty="hard"
            title="MFA fatigue: attacker spams push prompts until the user taps yes."
            scenario={<>Push-based MFA can be defeated by flooding the user with repeated prompts until they tap approve from annoyance. Pick the mitigation that breaks the attack at the protocol level rather than relying on user education.</>}
            options={[
              {key:"a", text:"Rate-limit MFA prompts per account per hour and require a number-match step where the user types a number displayed on the login origin screen.", correct:true},
              {key:"b", text:"Switch all push challenges over to SMS one-time codes, which reduces prompt frequency per attack and forces the attacker through the carrier channel.", correct:false},
              {key:"c", text:"Educate users with in-app banners and onboarding tooltips that they should remain skeptical of unexpected push prompts that arrive while they are not actively logging in.", correct:false},
              {key:"d", text:"Lower the MFA step-up threshold so the router fires fewer prompts overall, reducing the surface area available to the attacker to spam the legitimate user.", correct:false},
            ]}
            trap={<>(b) trades a known-defeated attack for SIM-swap. (c) is policy lipstick on a model gap. (d) accepts more ATO loss to suppress the symptom.</>}
            lens={<>Number-matching breaks the spam-until-taps loop because a tap alone is insufficient. Rate-limiting bounds the attack window. Both knobs sit downstream of the model and do not require a retrain.</>}
          />

          <VIS.TrapProblem
            id="ato-q23"
            difficulty="hard"
            title="Device-FP collision in NAT — the family-router problem."
            scenario={<>Multiple legitimate users behind one residential router share a similar device fingerprint and the same IP. The scorer flags them as a Sybil cluster and over-frictions the household.</>}
            options={[
              {key:"a", text:"Condition the Sybil signal on account-history density — the structural signal's weight drops when each account in the cluster has a long, rich, individual login history.", correct:true},
              {key:"b", text:"Exclude all residential-NAT IPs from the scorer's input feature set, on the basis that the Sybil signal cannot be trusted in the multi-tenant residential routing regime at all.", correct:false},
              {key:"c", text:"Require MFA for every login from any IP that has more than one active account associated with it in the prior 30-day window of session-graph traversal.", correct:false},
              {key:"d", text:"Trust the GBM's built-in tree-based interaction modeling to learn the family-router case during retraining without any explicit feature-engineering intervention from the team.", correct:false},
            ]}
            trap={<>(b) discards a huge slice of legitimate traffic. (c) over-frictions families. (d) assumes the model has seen enough of these benign clusters during training, which is often false.</>}
            lens={<>The fix is feature-engineering: condition on account-tenure and account-history-density. A 5-year-old account with 2000 prior logins from the same NAT IP is benign; a 1-day-old account with 3 logins from a NAT shared with 50 other 1-day-old accounts is the Sybil case.</>}
          />

          <VIS.TrapProblem
            id="ato-q24"
            difficulty="hard"
            title="Pick the change-management policy for the threshold pair."
            scenario={<>The router thresholds <VIS.Equation tex={String.raw`(\tau_L,\tau_H)`} /> directly shape user friction at the dollar level. Threshold changes must be safe and reversible under live traffic.</>}
            options={[
              {key:"a", text:"Roll threshold changes via canary at 1% then 10% then 100% with automatic rollback if step-up rate exceeds 1.5x baseline in any region for 15 consecutive minutes.", correct:true},
              {key:"b", text:"Allow threshold changes to ship at any time without canary or rollback gates, on the basis that they are config-scalar changes rather than versioned application-code releases.", correct:false},
              {key:"c", text:"Require every threshold change to pass through a full one-week A/B test on 50% of traffic before any promotion to the full production region, including emergency adjustments.", correct:false},
              {key:"d", text:"Freeze the threshold pair at its current values and absorb all future adjustments by retraining the scorer model itself rather than touching the router configuration.", correct:false},
            ]}
            trap={<>(b) makes a high-blast-radius config change with no rollback. (c) blocks fast response to active attacks. (d) gives up the cheap lever and forces every adjustment through a slow retrain.</>}
            lens={<>Threshold changes are config + canary + auto-rollback. The same discipline applies to model promotion (shadow eval, then canary).</>}
          />

          <VIS.TrapProblem
            id="ato-q25"
            difficulty="hard"
            title="Why keep the rules engine separate from the scorer model?"
            scenario={<>A junior engineer proposes folding the hard-block and hard-allow rules into the GBM as additional binary features so the scorer alone produces the final decision. Pick the strongest reason to refuse.</>}
            options={[
              {key:"a", text:"Compliance and legal mandates require auditable deterministic outcomes — known-bot signatures and corporate-IP allowlists must produce the same decision every time regardless of feature drift.", correct:true},
              {key:"b", text:"GBM ensembles struggle to fit binary indicator features as cleanly as continuous numeric features and would lose ranking quality if the rule signals were folded in this way.", correct:false},
              {key:"c", text:"Folding the rules into the training set as features would inflate evaluation AUC by leaking the deterministic answer at training time, breaking the validation harness silently.", correct:false},
              {key:"d", text:"The rules engine executes far faster than the GBM scorer, so folding rule features into the model would add latency to every login by routing through the slower scorer path.", correct:false},
            ]}
            trap={<>(b) is technically false — GBMs handle binaries cleanly. (c) confuses feature engineering with leakage. (d) is a real but secondary concern; the primary reason is governance.</>}
            lens={<>The rules layer is the deterministic-decision boundary. It is owned by Risk Policy + Legal, audited separately, and has a different change-management cadence. Conflating it with the model gives up that separation of concerns.</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>Thresholds are config, not code — and they are still high-blast-radius.</strong> Canary + auto-rollback. ROC-slope math: §3b.</li>
            <li><strong>Labels are delayed 2-30 days.</strong> Training cutoff is 30 days back; do not train on partially-labeled recent rows. Bayesian-update math: §3d.</li>
            <li><strong>Random k-fold leaks future attacks into training.</strong> Forward-chaining + label-maturity gap. Math: §3j.</li>
            <li><strong>AUC can be stable while calibration breaks under attack-pattern shift.</strong> Refit isotonic weekly on the freshest matured slice. Math: §3h.</li>
            <li><strong>PSI on device-fp is the canary.</strong> Pages before AUC moves, but root-cause first — benign rollout vs adversarial shift demand different responses. Math: §3f.</li>
            <li><strong>Step-up rate is a budget, not a metric.</strong> Optimize TPR under a step-up budget, not the other way around. Math: §3g.</li>
            <li><strong>MFA-pass is a fresh label, not a free one.</strong> Apply a no-dispute window before treating it as a high-confidence negative. SIM-swap and MFA-fatigue contaminate the raw signal.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://engineering.linkedin.com/blog/2019/03/account-takeover" target="_blank" rel="noopener"><strong>LinkedIn Engineering — Account Takeover Detection</strong></a> — production deployment writeup.</li>

        <li><a href="https://research.fb.com/publications/" target="_blank" rel="noopener"><strong>Meta Research — Integrity / ATO</strong></a> — graph-based Sybil detection.</li>
        <li><a href="https://www.usenix.org/conference/usenixsecurity21" target="_blank" rel="noopener"><strong>USENIX Security — ATO and credential-stuffing track</strong></a> — adversary modeling papers.</li>
      </ul>
    </VIS.Section>
  </main>
  );
};
