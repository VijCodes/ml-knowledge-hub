  function CodeBlock({ lang = "plaintext", children }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureHljsCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js")
        .then(() => _loadScript(`https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/${lang}.min.js`).catch(() => {}))
        .then(() => {
          if (cancelled || !ref.current) return;
          // Reset so hljs re-highlights when `children` or `lang` change
          ref.current.removeAttribute("data-highlighted");
          ref.current.className = "language-" + lang;
          ref.current.textContent = String(Array.isArray(children) ? children.join("") : children);
          window.hljs.highlightElement(ref.current);
        });
      return () => { cancelled = true; };
    }, [lang, children]);
    return h("pre", { style: { margin: "12px 0", borderRadius: 8, overflow: "auto" } },
      h("code", { ref, className: `language-${lang}` }, children));
  }

  function Callout({ kind = "info", title, children }) {
    return h("aside", { className: `vis-callout vis-callout-${kind}`, role: "note" },
      title ? h("strong", { className: "vis-callout-title" }, title) : null,
      children);
  }

  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // autoGloss: scan a string for terms in window.__VIS_GLOSSARY (set by exporter
  // before vis-components.js loads). Returns a React children array with each
  // matched term wrapped in the same <span class="vis-term"> the Term component
  // emits. First-mention only per call. Longest-match-first so "candidate
  // generation" beats "candidate" alone.
  let _glossPattern = null;
  let _glossLookup = null;
  function _buildGlossPattern() {
    const g = (typeof window !== "undefined" && window.__VIS_GLOSSARY) || {};
    const keys = Object.keys(g).filter(k => k && !k.startsWith("_"));
    if (!keys.length) { _glossPattern = false; return; }
    // Longest first to favor multi-word terms; escape regex metachars.
    keys.sort((a, b) => b.length - a.length);
    const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    // Word-boundary on each side. Allow internal hyphens/spaces; common ML terms
    // like "DP-SGD", "feature cross", "p99 latency" are all matched naturally.
    _glossPattern = new RegExp("(^|[^A-Za-z0-9_])(" + escaped.join("|") + ")(?=[^A-Za-z0-9_]|$)", "g");
    _glossLookup = g;
  }
  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// implement-two-tower-step — coding
// Forward both towers, L2-normalize, in-batch negative softmax with temperature.
// New signature: two_tower_step(user_features, item_features_pos, item_features_neg_batch,
//                               user_tower, item_tower, temperature=1.0)

const TT_CODE = [
  "def two_tower_step(user_features, item_features_pos, item_features_neg_batch,",
  "                   user_tower, item_tower, temperature=1.0):",
  "    # user_features:           (B, Du)",
  "    # item_features_pos:       (B, Di)   — one positive per user",
  "    # item_features_neg_batch: (B, N, Di) — pre-mined extra negatives per row (optional set)",
  "",
  "    # 1) forward both towers",
  "    u = user_tower(user_features)            # (B, d)",
  "    i_pos = item_tower(item_features_pos)    # (B, d)",
  "",
  "    B, N, _ = item_features_neg_batch.shape",
  "    i_neg = item_tower(item_features_neg_batch.reshape(B * N, -1)).reshape(B, N, -1)",
  "",
  "    # 2) L2-normalize on the last dim — BEFORE building logits",
  "    u     = __1__",
  "    i_pos = __2__",
  "    i_neg = __3__",
  "",
  "    # 3) in-batch negatives: every other row's positive is a negative for me",
  "    #    logits_inbatch[b, j] = u[b] · i_pos[j]    shape (B, B)",
  "    logits_inbatch = __4__",
  "",
  "    # 4) per-row hard negatives: u[b] vs its own N pre-mined negatives → (B, N)",
  "    logits_hardneg = __5__",
  "",
  "    # 5) concat along the candidate axis: positive is at column 0 of the in-batch block",
  "    #    (diagonal); concat hard negs to the right.   shape (B, B + N)",
  "    logits = torch.cat([logits_inbatch, logits_hardneg], dim=1) / __6__",
  "",
  "    # 6) labels: positive of row b is column b (the diagonal of the in-batch block)",
  "    labels = torch.arange(B, device=u.device)",
  "    loss = __7__",
  "    return loss",
];

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Coding · Senior MLE"
      title="Implement two_tower_step() — in-batch negative contrastive loss"
      subtitle="Forward both towers, L2-normalize, build a (B, B+N) similarity matrix, divide by temperature, softmax-cross-entropy with the diagonal as the positive."
      byline={[
        {label:"Question type", value:"ML Coding"},
        {label:"Signature", value:"two_tower_step(user_features, item_features_pos, item_features_neg_batch, user_tower, item_tower, temperature=1.0)"},
        {label:"Difficulty", value:"Hard"},
      ]}/>

    <VIS.TLDR>
      One step of <VIS.Term def="A retrieval architecture where users and items each get their own encoder (tower); training pushes the user embedding close to its positive item and far from negatives in a shared metric space.">two-tower retrieval training</VIS.Term>: <strong>(1)</strong> forward both towers → <strong>(2)</strong> <VIS.Term def="Divide each embedding vector by its L2 norm so it lies on the unit hypersphere; makes dot product equal cosine similarity and removes magnitude as a confounder.">L2-normalize</VIS.Term> on the last dim → <strong>(3)</strong> build a similarity matrix where the <VIS.Term def="Other rows' positive items act as negatives for me, free of extra data loading; the canonical retrieval objective since SimCLR/DPR.">in-batch positives</VIS.Term> serve as negatives → <strong>(4)</strong> divide by <VIS.Term def="A scalar T that sharpens (T&lt;1) or smooths (T&gt;1) the softmax. Lives in the denominator of logits BEFORE softmax: softmax(z/T).">temperature</VIS.Term> → <strong>(5)</strong> cross-entropy with the diagonal index as the positive label.
    </VIS.TLDR>

    <VIS.Section id="sec-setup" title="The production scenario">
      <p>
        You're training a <VIS.Term def="Dense retrieval = encode query and document into the same vector space, retrieve by nearest neighbor. Replaces or augments sparse BM25 for first-stage retrieval.">dense retriever</VIS.Term> for a homepage feed. <code>user_features</code> is a per-batch tensor of <VIS.Term def="Numeric and embedded categorical features describing the user: recent watches, demographics, dwell-time aggregates, search history.">user context</VIS.Term>; <code>item_features_pos</code> is the item they clicked; <code>item_features_neg_batch</code> is an optional bag of N pre-mined hard negatives per row (from an <VIS.Term def="Approximate nearest neighbor index over a periodically-refreshed embedding table; pulling items whose embeddings are close to the user but were NOT the click. Standard hard-negative source.">ANN index</VIS.Term> or a popularity-stratified sampler).
      </p>
      <p>
        Both towers map their raw features to a <VIS.Term def="A shared low-dimensional vector space (typically d=64 to d=256) where geometric closeness encodes semantic relevance.">shared d-dimensional embedding space</VIS.Term>. The loss is <VIS.Term def="A classification loss applied to similarities: treat each user's positive as the correct class out of (B + N) candidates, minimize negative log-likelihood. Equivalent to InfoNCE.">softmax cross-entropy</VIS.Term> over the candidate axis. We deliberately keep this <VIS.Term def="Single-device version; the multi-rank DDP variant adds a gradient-aware all_gather of item embeddings across ranks for B×world negatives.">single-rank</VIS.Term> to keep the bug surface focused on the loss math, not the collective.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-primer" title="Concept primer — the math behind the code">
      <p>
        The objective is <VIS.Term def="Noise-Contrastive Estimation lower bound on mutual information; the contrastive loss used by CPC, SimCLR, CLIP, and most modern retrievers.">InfoNCE</VIS.Term>: for each user b, treat the <VIS.Term def="The item the user actually interacted with — the click, watch, purchase, dwell event. Defines the supervision signal.">positive item</VIS.Term> as the correct class out of (B + N) candidates, where B candidates come from <VIS.Term def="The positives of OTHER rows in the same minibatch, reused as negatives for free. Trades data-loading cost for a softmax bias.">in-batch negatives</VIS.Term> and N from per-row <VIS.Term def="Negatives mined offline or via an ANN lookup so that they're semantically close to the positive — high gradient per example.">hard negatives</VIS.Term>. Minimize <VIS.Term def="-log(p_positive) under the softmax; equivalent to maximizing the log-likelihood that the positive wins the contrast.">negative log-likelihood</VIS.Term> of the positive class.
      </p>
      <p>
        Embeddings live on the <VIS.Term def="The set of unit-norm vectors in R^d; after L2-normalization, every embedding sits on this manifold. Distance reduces to angle.">unit hypersphere</VIS.Term>, so the <VIS.Term def="u · v when both are unit vectors; equals cos(angle). Bounded in [-1, 1], well-behaved gradients.">cosine similarity</VIS.Term> equals the <VIS.Term def="The standard inner product Σᵢ uᵢvᵢ; on unit vectors it equals cosine, otherwise it conflates angle and magnitude.">dot product</VIS.Term>. The <VIS.Term def="A scalar T that rescales logits before softmax. Small T sharpens the distribution and concentrates gradient on the hardest negative; large T smooths and spreads gradient.">temperature parameter</VIS.Term> controls how sharp the resulting distribution is — it is the single most important hyperparameter in contrastive retrieval after the architecture itself.
      </p>
      <p>
        Each tower can be any <VIS.Term def="Feed-forward neural network: stacked Linear + nonlinearity + LayerNorm/BatchNorm. The default tower for tabular feature retrieval.">MLP</VIS.Term>, <VIS.Term def="A small Transformer over a sequence of user actions or item-content tokens; common for video/sequence retrieval.">Transformer encoder</VIS.Term>, or a hybrid that consumes both <VIS.Term def="Continuous floats (e.g., dwell time, age) fed directly into the tower with optional normalization.">dense features</VIS.Term> and <VIS.Term def="Discrete IDs (item_id, country) looked up in a learned embedding table before concatenation with dense features.">embedded categoricals</VIS.Term>. The towers are <VIS.Term def="Separate towers — no weight sharing between user and item sides — because the input modalities differ.">asymmetric</VIS.Term>; this is the classic <VIS.Term def="The retrieval architecture from the YouTube paper: query tower + candidate tower with shared output dimension, trained with sampled or in-batch softmax.">YouTube dual-encoder</VIS.Term> design.
      </p>
      <p>
        At serve time, the trained item tower precomputes <VIS.Term def="A persistent table of embeddings for every candidate item, refreshed periodically; the index that ANN retrieval is built over.">an item embedding table</VIS.Term> stored in an <VIS.Term def="Approximate-nearest-neighbor index — HNSW, IVF-PQ, ScaNN — that returns top-K candidates in sublinear time at the cost of recall.">ANN index</VIS.Term>; the user tower runs online and the top-K is fetched by similarity lookup. The training loss must match this geometry — that's why <VIS.Term def="Required so that training-time similarity (dot product after normalize) matches serve-time cosine ANN lookup; otherwise train-serve skew silently destroys recall.">normalization at train time</VIS.Term> is non-negotiable.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-impl" title="The implementation">
      <VIS.CodeFillin
        id="tt-impl"
        difficulty="hard"
        title="Two-tower step with in-batch + hard negatives — fill in the 7 blanks"
        language="python (PyTorch)"
        code={TT_CODE}
        options={[
          {key:"l2_u",        text:"F.normalize(u, p=2, dim=-1)", fills:[1]},
          {key:"l2_ipos",     text:"F.normalize(i_pos, p=2, dim=-1)", fills:[2]},
          {key:"l2_ineg",     text:"F.normalize(i_neg, p=2, dim=-1)", fills:[3]},
          {key:"sim_inbatch", text:"u @ i_pos.t()", fills:[4]},
          {key:"sim_hardneg", text:"torch.einsum('bd,bnd->bn', u, i_neg)", fills:[5]},
          {key:"temp_div",    text:"temperature", fills:[6]},
          {key:"ce",          text:"F.cross_entropy(logits, labels)", fills:[7]},
          // Decoys
          {key:"no_norm_u",      text:"u  # skip normalization, use raw tower output"},
          {key:"t_in_numerator", text:"torch.cat([logits_inbatch, logits_hardneg], dim=1) * temperature"},
          {key:"t_squared",      text:"temperature ** 2"},
          {key:"hardneg_wrong",  text:"u @ i_neg.reshape(B * N, -1).t()  # (B, B*N), leaks other rows' hardnegs"},
          {key:"detach_item",    text:"u @ i_pos.detach().t()  # stop-grad on item tower"},
        ]}
        trap={<>
          The five most common shipping bugs:<br/>
          (1) <strong>Skipping <code>F.normalize</code></strong> — then "cosine" is raw dot product; popular items grow huge norms and monopolize softmax mass regardless of relevance.<br/>
          (2) <strong>Multiplying by T instead of dividing</strong> — flips temperature semantics. Sharper distribution becomes smoother and vice versa.<br/>
          (3) <strong>Reshaping <code>i_neg</code> to (B*N, d) and matmul-ing with all users</strong> — every row sees every other row's hard negatives. Same item can appear as both positive (for row b) and "hard negative" (for row b' ≠ b), producing contradictory gradients.<br/>
          (4) <strong>Detaching <code>i_pos</code> / <code>i_neg</code></strong> — the item tower never trains; only user tower learns. Loss looks fine for the first few hundred steps because user tower compensates.<br/>
          (5) <strong>Normalizing AFTER matmul</strong> — the matmul has already mixed magnitudes into the logits; row-wise softmax is no longer a cosine softmax.
        </>}
        lens={<>
          <pre style={{background:"#f1f5f9", padding:"10px 14px", borderRadius:6, fontSize:13, overflow:"auto"}}>{`def two_tower_step(user_features, item_features_pos, item_features_neg_batch,
                   user_tower, item_tower, temperature=1.0):
    u = F.normalize(user_tower(user_features), p=2, dim=-1)
    i_pos = F.normalize(item_tower(item_features_pos), p=2, dim=-1)
    B, N, _ = item_features_neg_batch.shape
    i_neg = item_tower(item_features_neg_batch.reshape(B * N, -1)).reshape(B, N, -1)
    i_neg = F.normalize(i_neg, p=2, dim=-1)
    logits_inbatch = u @ i_pos.t()                              # (B, B)
    logits_hardneg = torch.einsum('bd,bnd->bn', u, i_neg)        # (B, N)
    logits = torch.cat([logits_inbatch, logits_hardneg], dim=1) / temperature
    labels = torch.arange(B, device=u.device)
    return F.cross_entropy(logits, labels)`}</pre>
          Note: the positive lives at column <code>b</code> of the in-batch block (the diagonal). Hard negatives are concatenated to the right, so <code>labels = arange(B)</code> is correct without any offset.
        </>}
        stretch={<>How would you extend this to <strong>multi-GPU DDP</strong> with global in-batch negatives? (Wrap <code>i_pos</code> in a gradient-aware <code>all_gather</code>, shift labels by <code>rank * B</code>.)</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-traps" title="20 trap drills — bugs candidates ship">
      <p>Each drill is a single bug in isolation. The goal is to lock in the <em>why</em>, not memorize the fix. The bugs span <VIS.Term def="A class of bugs where the loss decreases and unit tests pass but eval-time metrics (Recall@K) silently regress. The defining feature of contrastive-loss bugs.">soft failures</VIS.Term>, where training appears healthy but downstream <VIS.Term def="The fraction of true positives that appear in the top-K retrieved set; the standard offline metric for retrieval systems.">Recall@K</VIS.Term> drops, and <VIS.Term def="Hard runtime errors — shape mismatch, NaN propagation — that fire immediately. Easier to catch but represent &lt;30% of real contrastive bugs.">loud failures</VIS.Term> that throw at runtime.</p>

      <VIS.TrapProblem
        id="tt-q1"
        difficulty="medium"
        mode="single"
        title="Where does L2-normalize belong?"
        scenario={<>You see two candidate placements for normalization.</>}
        options={[
          {key:"a", text:"Normalize each embedding immediately after the tower, BEFORE building logits.", correct:true},
          {key:"b", text:"Normalize logits along the candidate axis right before softmax.", correct:false},
          {key:"c", text:"Normalize during evaluation only; skip during training.", correct:false},
          {key:"d", text:"Normalize only the user side; leave item embeddings as raw vectors.", correct:false},
        ]}
        trap={<>(b) softmax over a vector that has been L2-normalized along the same axis is mathematically different from softmax of cosine similarities. (d) asymmetric normalization makes magnitude leak from one side only — equivalent to a per-item temperature.</>}
        lens={<>Normalize the embeddings, not the logits. The point of normalization is to make the dot product equal cosine similarity — that only works if BOTH operands are unit vectors and it happens BEFORE the matmul.</>}
      />

      <VIS.TrapProblem
        id="tt-q2"
        difficulty="easy"
        mode="single"
        title="Temperature: numerator or denominator?"
        scenario={<>You have <code>logits = sim</code>. Where does T go for the standard contrastive recipe?</>}
        options={[
          {key:"a", text:"softmax(sim / T) — divide logits by T before softmax.", correct:true},
          {key:"b", text:"softmax(sim * T) — multiply logits by T before softmax.", correct:false},
          {key:"c", text:"softmax(sim) / T — divide probabilities by T after softmax.", correct:false},
          {key:"d", text:"softmax(sim) ** (1/T) — exponentiate probabilities then renormalize.", correct:false},
        ]}
        trap={<>(b) and (d) flip the sharpening direction. (c) breaks the probability simplex; the output no longer sums to 1.</>}
        lens={<>Canonical form is <code>softmax(z / T)</code>. Small T (e.g., 0.05) sharpens the distribution and produces stronger gradients on the top negative; large T (e.g., 1.0) smooths and stabilizes early training.</>}
      />

      <VIS.TrapProblem
        id="tt-q3"
        difficulty="medium"
        mode="single"
        title="Dividing by T² instead of T"
        scenario={<>A teammate writes <code>logits / (T ** 2)</code> "because it stabilized training."</>}
        options={[
          {key:"a", text:"Equivalent — it's just a different choice of T.", correct:true},
          {key:"b", text:"Wrong by a factor of T in the gradient; doubles down on sharpening.", correct:false},
          {key:"c", text:"Causes numerical overflow because logits become huge.", correct:false},
          {key:"d", text:"Breaks gradient flow because of the square.", correct:false},
        ]}
        trap={<>(b)/(c)/(d) all confuse intent vs effect. T<sup>2</sup> is just a reparameterization — if T=0.1, T<sup>2</sup>=0.01, which is a different but valid temperature. The bug is conceptual sloppiness, not numerical.</>}
        lens={<>It's mathematically equivalent to using temperature T' = T<sup>2</sup>. The "stabilization" is just a coincidence of a smaller effective T being better-tuned. The right answer is to make T a tracked hyperparameter, not to layer extra exponents.</>}
      />

      <VIS.TrapProblem
        id="tt-q4"
        difficulty="hard"
        mode="multi"
        title="In-batch negatives vs sampled negatives — when do you choose which?"
        scenario={<>Pick the genuinely true statements.</>}
        options={[
          {key:"a", text:"In-batch negatives are essentially free (no extra data loading or extra item-tower forwards beyond the positives you already have).", correct:true},
          {key:"b", text:"In-batch negatives are biased toward popular items in proportion to their training frequency, so popular items get pushed away more often than rare ones.", correct:true},
          {key:"c", text:"Sampled negatives let you control the negative distribution (e.g., popularity-stratified, hard-neg-mined).", correct:true},
          {key:"d", text:"In-batch negatives strictly dominate sampled negatives in retrieval quality.", correct:false},
          {key:"e", text:"Sampled negatives are required if you want the loss to be a consistent estimator of full-softmax cross-entropy.", correct:false},
        ]}
        trap={<>(d) is wrong: in-batch alone often plateaus because the random other-row positives aren't hard. (e) is wrong: a logQ correction on in-batch can also debias.</>}
        lens={<>The production answer is BOTH: in-batch for cheap broad coverage + a few hard negatives per row (mined from an ANN index) for the high-quality gradient.</>}
      />

      <VIS.TrapProblem
        id="tt-q5"
        difficulty="hard"
        mode="single"
        title="What does <code>i_pos.detach()</code> do to the item tower?"
        scenario={<>A candidate writes <code>logits = u @ i_pos.detach().t()</code>.</>}
        options={[
          {key:"a", text:"Stops gradient flow into the item tower entirely; only the user tower trains.", correct:true},
          {key:"b", text:"Doubles the gradient on the user tower.", correct:false},
          {key:"c", text:"Has no effect at training time, only at eval.", correct:false},
          {key:"d", text:"Equivalent to using a frozen pre-trained item tower.", correct:false},
        ]}
        trap={<>(d) sounds equivalent but isn't: <code>detach</code> stops grad through this op, but if the item tower is used elsewhere (e.g., the hard-neg branch without detach), it still trains there.</>}
        lens={<>This is the "asymmetric two-tower" bug. Catch it by checking <code>item_tower.parameters()</code> grads after backward — they'll be zero. Use <code>requires_grad_(False)</code> on the tower only if you genuinely want a frozen item side.</>}
      />

      <VIS.TrapProblem
        id="tt-q6"
        difficulty="medium"
        mode="single"
        title="Label smoothing on contrastive loss"
        scenario={<>You apply <code>F.cross_entropy(logits, labels, label_smoothing=0.1)</code>.</>}
        options={[
          {key:"a", text:"Spreads 10% of probability mass uniformly across ALL candidates — including the in-batch positives of OTHER rows. Often hurts retrieval.", correct:true},
          {key:"b", text:"Mathematically identical to a smaller learning rate.", correct:false},
          {key:"c", text:"Required to prevent overconfidence and is the production default.", correct:false},
          {key:"d", text:"Smoothes only the positive; negatives are untouched.", correct:false},
        ]}
        trap={<>(c) is a classification-task intuition. In contrastive retrieval the "negatives" include other rows' valid positives — smoothing assigns them positive mass and degrades the signal.</>}
        lens={<>Label smoothing is risky here: you're telling the model that other users' clicks are also somewhat-correct for this user. If you must, smooth only over hard negatives, not over the full (B + N) axis.</>}
      />

      <VIS.TrapProblem
        id="tt-q7"
        difficulty="medium"
        mode="multi"
        title="Batch size and in-batch hard-negative quality"
        scenario={<>You scale B from 256 to 4096. Which statements are true?</>}
        options={[
          {key:"a", text:"Larger B exposes each query to more in-batch candidates, so the chance of a hard negative landing in the batch grows.", correct:true},
          {key:"b", text:"The expected number of false negatives (other rows' positives that are actually relevant to row b) also grows proportionally.", correct:true},
          {key:"c", text:"Larger B always strictly improves Recall@K.", correct:false},
          {key:"d", text:"Larger B reduces gradient variance per step but increases collision risk between similar users.", correct:true},
        ]}
        trap={<>(c) is wrong: you can hit a regime where false-negative collisions dominate the extra hard-negative benefit; this is exactly when you need a logQ correction or de-duplication.</>}
        lens={<>The textbook scaling law: in-batch hardness grows with log(B), but so does the chance of an in-batch false negative. Watch your top-of-eval Recall as you scale.</>}
      />

      <VIS.TrapProblem
        id="tt-q8"
        difficulty="medium"
        mode="single"
        title="Embedding-dim mismatch"
        scenario={<>User tower outputs d=128; item tower outputs d=256. You try <code>u @ i.t()</code>.</>}
        options={[
          {key:"a", text:"RuntimeError on the matmul — shapes (B,128) and (256,B) are incompatible.", correct:true},
          {key:"b", text:"Silently truncates the larger one and trains anyway.", correct:false},
          {key:"c", text:"Broadcasts using the smaller dim.", correct:false},
          {key:"d", text:"Trains, but recall is poor because the spaces don't align.", correct:false},
        ]}
        trap={<>(d) sounds tempting because "different spaces" feels like a soft bug — but PyTorch hard-errors before any training happens.</>}
        lens={<>The towers MUST emit the same dimension because they share a single dot-product metric space. Project both to a common <code>d</code> with a final Linear if upstream dims differ.</>}
      />

      <VIS.TrapProblem
        id="tt-q9"
        difficulty="hard"
        mode="single"
        title="FP16 + softmax: where does NaN come from?"
        scenario={<>You train in FP16. After ~5k steps, loss becomes NaN.</>}
        options={[
          {key:"a", text:"Exponentials in softmax overflow at FP16 max (~65504) when logits get large after T shrinks during training.", correct:true},
          {key:"b", text:"L2-normalize produces NaN when an embedding is exactly zero.", correct:false},
          {key:"c", text:"Cross-entropy underflows when one probability is too small.", correct:false},
          {key:"d", text:"Always a data bug; never a numerical one.", correct:false},
        ]}
        trap={<>(b) is real but rare (towers rarely emit exact zero with bias terms). (c) is exactly what the log-sum-exp trick in <code>F.cross_entropy</code> already handles.</>}
        lens={<>Fix by computing the softmax/cross-entropy in FP32. PyTorch AMP autocast already does this for <code>F.cross_entropy</code> — the bug is usually a hand-rolled log-softmax in FP16. Also: use <code>logits = logits - logits.max(dim=-1, keepdim=True)</code> if you must hand-roll.</>}
      />

      <VIS.TrapProblem
        id="tt-q10"
        difficulty="hard"
        mode="single"
        title="Wrong softmax axis"
        scenario={<>You write <code>F.cross_entropy(logits.t(), labels)</code> instead of <code>F.cross_entropy(logits, labels)</code>.</>}
        options={[
          {key:"a", text:"Softmax now runs over QUERIES per item instead of items per query — the model learns nothing useful.", correct:true},
          {key:"b", text:"Equivalent because softmax is symmetric.", correct:false},
          {key:"c", text:"Raises a shape error.", correct:false},
          {key:"d", text:"Just trains slower.", correct:false},
        ]}
        trap={<>(b) is the trap: softmax is NOT symmetric in axes; (c) doesn't fire because (B+N, B) and labels of shape (B,) still pass shape checks vacuously if B+N == B (and silently break otherwise).</>}
        lens={<>Loss can still go down because per-column softmax is solving a different (also-valid-looking) objective. Always print <code>logits.shape</code> and check axis intent.</>}
      />

      <VIS.TrapProblem
        id="tt-q11"
        difficulty="medium"
        mode="single"
        title="The diagonal label trick"
        scenario={<>Why is <code>labels = torch.arange(B)</code> the correct positive index?</>}
        options={[
          {key:"a", text:"Because the in-batch similarity matrix has row b's positive at column b (the diagonal); hard negatives concatenated AFTER don't shift the index.", correct:true},
          {key:"b", text:"Because cross-entropy expects sorted labels.", correct:false},
          {key:"c", text:"Because of how PyTorch broadcasts labels.", correct:false},
          {key:"d", text:"It's a convention; any labeling works as long as positives are unique.", correct:true},
        ]}
        trap={<>(d) is technically true but (a) is the LOAD-BEARING reason — the column ordering determines the labels.</>}
        lens={<>If you flip the concat order (<code>cat([hardneg, inbatch])</code>), labels must shift to <code>arange(B) + N</code>. The diagonal trick depends on column layout.</>}
      />

      <VIS.TrapProblem
        id="tt-q12"
        difficulty="hard"
        mode="single"
        title="False negatives in the in-batch block"
        scenario={<>Row b's "negative" at column j ≠ b might actually be a positive item for user b (e.g., it's the same item).</>}
        options={[
          {key:"a", text:"This is the in-batch-false-negative problem; a common mitigation is to mask same-item or same-cluster collisions before softmax.", correct:true},
          {key:"b", text:"It's harmless — softmax averages it out.", correct:false},
          {key:"c", text:"Only matters at eval time.", correct:false},
          {key:"d", text:"Fixed automatically by L2-normalization.", correct:false},
        ]}
        lens={<>Production fix: build a binary mask <code>M</code> where <code>M[b, j] = -inf</code> if j is a known positive of b (other than the diagonal), then add <code>M</code> to logits before softmax. The YouTube paper's logQ correction is a probabilistic version.</>}
        trap={<>(b) sounds right because softmax is "smooth" but the gradient on the colliding false-negative pushes the model away from a correct match — exactly the wrong direction.</>}
      />

      <VIS.TrapProblem
        id="tt-q13"
        difficulty="medium"
        mode="single"
        title="Reshape footgun on hard negatives"
        scenario={<>You write <code>u @ i_neg.reshape(B*N, d).t()</code> to compute hard-neg logits.</>}
        options={[
          {key:"a", text:"Now every user sees every other user's hard negatives — same item might appear as positive for one row and 'hard negative' for another.", correct:true},
          {key:"b", text:"Equivalent to the einsum version, just slower.", correct:false},
          {key:"c", text:"Raises a shape error.", correct:false},
          {key:"d", text:"Produces (B, N) logits as desired.", correct:false},
        ]}
        trap={<>(b) and (d) are wrong: the shape is (B, B*N), not (B, N). The candidate axis blows up by a factor of B and contains cross-row leakage.</>}
        lens={<>Use <code>torch.einsum('bd,bnd-&gt;bn', u, i_neg)</code> or <code>(u.unsqueeze(1) * i_neg).sum(-1)</code> to keep the per-row alignment.</>}
      />

      <VIS.TrapProblem
        id="tt-q14"
        difficulty="medium"
        mode="single"
        title="What if temperature is learned?"
        scenario={<>You make T a <code>nn.Parameter</code> initialized to 0.07 (CLIP-style).</>}
        options={[
          {key:"a", text:"Common practice; usually parameterize as <code>log_temp</code> and exponentiate to keep T &gt; 0.", correct:true},
          {key:"b", text:"Doesn't work — temperature must be a fixed hyperparameter.", correct:false},
          {key:"c", text:"Requires manually clipping T after every step.", correct:false},
          {key:"d", text:"Equivalent to scaling the learning rate.", correct:false},
        ]}
        lens={<>CLIP and many follow-ups learn <code>log_T</code>. Cap it (e.g., <code>T &gt; 0.01</code>) to prevent collapse: very small T makes the loss landscape sharp and the gradient on the top negative explode.</>}
        trap={<>(c) sounds reasonable but the log-parameterization makes manual clipping unnecessary.</>}
      />

      <VIS.TrapProblem
        id="tt-q15"
        difficulty="hard"
        mode="multi"
        title="Symptoms of forgotten normalization"
        scenario={<>You forgot <code>F.normalize</code>. Pick all observable symptoms.</>}
        options={[
          {key:"a", text:"Popular items dominate top-K at eval regardless of query — they have the largest embedding norm.", correct:true},
          {key:"b", text:"Loss decreases faster than usual in the first few epochs (the model exploits the magnitude shortcut).", correct:true},
          {key:"c", text:"Recall@10 plateaus early and is much lower than a normalized run.", correct:true},
          {key:"d", text:"Training diverges (NaN) within 100 steps.", correct:false},
          {key:"e", text:"Eval cosine-similarity scores have a much wider dynamic range than expected.", correct:true},
        ]}
        trap={<>(d) is wrong: it's a SOFT failure — the model trains, just to a worse optimum. That's why it slips through unit tests.</>}
        lens={<>Catch it in code review and in pre-deploy Recall@K diffs vs a baseline. Add an assertion: <code>assert torch.allclose(u.norm(dim=-1), torch.ones(B))</code> after the normalization line.</>}
      />

      <VIS.TrapProblem
        id="tt-q16"
        difficulty="medium"
        mode="single"
        title="Should you normalize gradients flowing through F.normalize?"
        scenario={<>A teammate worries that <code>F.normalize</code> "kills the gradient."</>}
        options={[
          {key:"a", text:"It doesn't kill grads; it shapes them — the Jacobian of the normalization projects gradient onto the tangent space of the unit sphere.", correct:true},
          {key:"b", text:"Yes, you must use <code>x / x.norm().detach()</code> to preserve gradients.", correct:false},
          {key:"c", text:"Yes, replace with <code>x / x.norm()</code> manually.", correct:false},
          {key:"d", text:"You should add an <code>eps</code> to prevent zero division, but otherwise gradients flow correctly.", correct:true},
        ]}
        lens={<>(a) and (d) are both correct. PyTorch's <code>F.normalize</code> already includes an <code>eps</code> (default 1e-12) and computes the Jacobian correctly.</>}
        trap={<>(b) is exactly backwards — detaching the norm breaks the tangent-space projection and biases the gradient.</>}
      />

      <VIS.TrapProblem
        id="tt-q17"
        difficulty="hard"
        mode="single"
        title="Hard-negative weighting"
        scenario={<>You concat hard negatives but they're outnumbered by in-batch negatives (B=1024, N=8). Loss is dominated by easy in-batch.</>}
        options={[
          {key:"a", text:"Apply an extra weight to hard-negative logits before softmax, or use a focal-style modulation on the per-row loss.", correct:true},
          {key:"b", text:"Drop the in-batch block entirely.", correct:false},
          {key:"c", text:"Reduce B to make hard-neg share grow proportionally.", correct:true},
          {key:"d", text:"Multiply temperature by N/(B+N).", correct:false},
        ]}
        lens={<>(a) and (c) are both valid. (d) is a magic-constant hack with no justification.</>}
        trap={<>(b) discards free signal — in-batch negatives are still informative even if individually easy.</>}
      />

      <VIS.TrapProblem
        id="tt-q18"
        difficulty="easy"
        mode="single"
        title="Where does the softmax happen in <code>F.cross_entropy</code>?"
        scenario={<>You wonder whether to apply softmax yourself before <code>F.cross_entropy</code>.</>}
        options={[
          {key:"a", text:"<code>F.cross_entropy</code> takes RAW LOGITS and applies log-softmax internally for numerical stability. Don't pre-softmax.", correct:true},
          {key:"b", text:"Apply softmax first; <code>F.cross_entropy</code> expects probabilities.", correct:false},
          {key:"c", text:"Apply log-softmax first; <code>F.cross_entropy</code> expects log-probs.", correct:false},
          {key:"d", text:"Doesn't matter — the internal log-softmax is idempotent.", correct:false},
        ]}
        trap={<>(b)/(c) lead to a double-softmax and a much smoother distribution; loss looks weirdly stable but gradients are dampened.</>}
        lens={<>Rule: in PyTorch, <code>F.cross_entropy</code> = <code>log_softmax</code> + <code>nll_loss</code>. If you want to pre-softmax, use <code>F.nll_loss(log_probs, labels)</code> instead.</>}
      />

      <VIS.TrapProblem
        id="tt-q19"
        difficulty="medium"
        mode="single"
        title="Why <code>einsum</code> over <code>bmm</code>?"
        scenario={<>For per-row hard-neg similarity (B, d) × (B, N, d) → (B, N).</>}
        options={[
          {key:"a", text:"<code>einsum('bd,bnd->bn', u, i_neg)</code> reads more naturally; <code>bmm</code> requires unsqueeze/squeeze and is easier to get wrong.", correct:true},
          {key:"b", text:"<code>einsum</code> is faster.", correct:false},
          {key:"c", text:"<code>bmm</code> doesn't support broadcasting.", correct:false},
          {key:"d", text:"They produce different results.", correct:false},
        ]}
        lens={<>Functionally equivalent; pick the one that makes the indexing intent legible at code-review time. <code>einsum</code> wins on readability for the asymmetric-shape case.</>}
        trap={<>(b) is folklore — performance is identical in modern PyTorch.</>}
      />

      <VIS.TrapProblem
        id="tt-q20"
        difficulty="hard"
        mode="multi"
        title="Pre-deploy gates for a two-tower retrieval model"
        scenario={<>Pick the gates that would catch the bugs above before they ship.</>}
        options={[
          {key:"a", text:"Assert <code>u.norm(dim=-1)</code> and <code>i.norm(dim=-1)</code> are ≈ 1 after the loss function — catches missing normalization.", correct:true},
          {key:"b", text:"Diff Recall@K vs a previous-model baseline on a frozen eval set — catches soft regressions from any of the bugs above.", correct:true},
          {key:"c", text:"Log per-step loss and assert it decreases monotonically.", correct:false},
          {key:"d", text:"Shadow-traffic the new model's top-K against current production and measure top-K Jaccard overlap.", correct:true},
          {key:"e", text:"Check that <code>item_tower.parameters()</code> have non-zero grad after the first backward — catches the detach bug.", correct:true},
        ]}
        trap={<>(c) is wrong: most of these bugs let loss decrease just fine. Loss-monotonicity is a weak signal; only output-metric diffs catch the soft regressions.</>}
        lens={<>Layer cheap assertions (a, e) for the deterministic bugs, and behavioral diffs (b, d) for the soft ones. Both are required.</>}
      />
    </VIS.Section>
