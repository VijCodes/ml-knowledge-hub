`} />
        </VIS.Section>

        <VIS.Section id="sec-walk" title="Walking the pipeline">
          <ol>
            <li><strong>Kafka ingest, partitioned by post-hash.</strong> ~10B posts/day, peak ~200k posts/s. <VIS.Term def="Watermark: in Flink/streaming systems, a timestamp marker asserting 'no events older than this should still arrive'. Lets windowed aggregates close on time despite some out-of-order events.">Watermarks</VIS.Term> bound event-time lateness.</li>
            <li><strong>Entity + hashtag extraction.</strong> NER plus hashtag normalization maps each post to canonical entity-IDs. The bucket key is what we count by. <VIS.Equation tex={String.raw`\text{post} \to \{e_1, e_2, ..., e_k\}`} /></li>
            <li><strong>Topic clustering.</strong> <VIS.Term def="Sentence-BERT: a transformer fine-tuned to produce semantically meaningful sentence-level embeddings via siamese-network training. Cosine distance correlates with human-judged similarity.">Sentence-BERT</VIS.Term> embeddings + <VIS.Term def="Online k-means: streaming variant where centroids are updated incrementally with each new point (or mini-batch), bounded memory. Suits topic clustering where new entities arrive constantly.">online k-means</VIS.Term> coalesce surface synonyms (#FloodChennai, Chennai floods, Chennai rain) into one cluster.</li>
            <li><strong>Geo partition.</strong> Each event-record is keyed by (cluster, country, city). Trends are per-geo from this point on.</li>
            <li><strong>Per-minute counts in Flink.</strong> <VIS.Term def="Tumbling window: fixed-size, non-overlapping time windows (e.g., minute 0-60, 60-120). Each event falls into exactly one window. Simple and the right primitive for per-minute counts.">Tumbling 1-minute windows</VIS.Term> with watermarked late events. Persisted in <VIS.Term def="RocksDB: embedded key-value store used by Flink as its stateful-operator backend. Spills to disk so per-key state can exceed memory; checkpoints to durable storage on a configurable cadence.">RocksDB state</VIS.Term>. <VIS.Equation tex={String.raw`x_{t} = \#\{\text{posts on topic at minute } t\}`} /></li>
            <li><strong>EWMA baseline + running variance.</strong> Per-topic mu, sigma maintained with alpha ~ 0.05 (<VIS.Term def="Welford's online algorithm: numerically stable single-pass running variance. Avoids the catastrophic cancellation of the textbook E[X^2] - E[X]^2 formulation in floating point.">Welford online</VIS.Term> for sigma). See §3a.</li>
            <li><strong>Z-score spike detection.</strong> <VIS.Equation tex={String.raw`z_t = (x_t - \mu_t)/\sigma_t`} />. Threshold ~3 emits a candidate. See §3b.</li>
            <li><strong>Quality filter.</strong> <VIS.Term def="HyperLogLog: a probabilistic cardinality sketch. Estimates the number of distinct items in a stream using ~12 KB per sketch with ~1% relative error. Mergeable across shards.">HyperLogLog</VIS.Term> unique-author count must exceed a per-region floor. Engagement diversity must include replies, not just views. See §3d.</li>
            <li><strong>CIB detector.</strong> Pairwise <VIS.Term def="Pearson correlation: linear-association statistic in [-1, 1]. For two posting-time vectors across the same time bins, high positive correlation = synchronized posting = botnet amplification signature.">Pearson correlation</VIS.Term> on accounts' posting-time vectors; high mean correlation drops the trend. See §3e.</li>
            <li><strong>Velocity ranker.</strong> <VIS.Equation tex={String.raw`s = z \cdot v \cdot d`} /> where v is acceleration and d is a diversity prior. See §3f.</li>
            <li><strong>Cluster-MMR diversifier.</strong> Greedy reranker caps slots per cluster so one news event does not monopolize. See §3g.</li>
            <li><strong>Frontend feed.</strong> Per-(country, locale) top-K cards, 60s TTL with jittered cache to avoid <VIS.Term def="Thundering herd: synchronized cache-miss event where many clients simultaneously hit the origin at TTL expiry. Mitigated by per-node TTL jitter or single-flight request coalescing.">thundering herd</VIS.Term>.</li>
            <li><strong>Drift monitor and weekly retrain.</strong> <VIS.Term def="PSI (Population Stability Index): sum over bins of (p_b - q_b) * ln(p_b/q_b). Measures how much a distribution has shifted between two periods. PSI > 0.25 = significant shift requiring action.">PSI</VIS.Term> on the count histogram triggers retraining of the cluster model and NER. See §3i.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is - the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. EWMA baseline + running variance</h3>
          <p>The per-topic baseline is a streaming EWMA over per-minute counts:</p>
          <VIS.Equation display={true} tex={String.raw`\mu_t \;=\; \alpha\,x_t \;+\; (1-\alpha)\,\mu_{t-1}`} />
          <p>Effective horizon <VIS.Equation tex={String.raw`H \approx 1/\alpha`} />: alpha = 0.05 gives ~20-minute memory. The variance is maintained with the EWMA-Welford recursion:</p>
          <VIS.Equation display={true} tex={String.raw`\sigma^2_t \;=\; (1-\alpha)\,(\sigma^2_{t-1} + \alpha\,(x_t - \mu_{t-1})^2)`} />
          <p>This is O(1) per topic per minute. At ~50M live topics, total state at 16 bytes/topic fits in &lt; 1 GB Flink state — that's the design constraint that rules out keeping a full <VIS.Term def="Sliding window: a window that moves with every new event (or every small time step), so it overlaps with adjacent windows. More expensive than tumbling because each event sits in many windows.">sliding window</VIS.Term> of raw counts per topic.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. z-score spike detection</h3>
          <VIS.Equation display={true} tex={String.raw`z_t \;=\; \frac{x_t - \mu_t}{\sigma_t}, \quad \text{spike} \iff z_t > \tau`} />
          <p>For a quasi-Gaussian baseline (true for established topics), tau = 3 corresponds to a <VIS.Term def="False-alarm rate: probability the test fires when nothing is actually happening. For a one-sided Gaussian z > 3, it's ~0.13% per trial. Multiplied across millions of topics, the per-minute platform total grows fast.">false-alarm rate</VIS.Term> of ~0.13% per minute per topic. With 50M topics that is 65k false alarms per minute — far too many. So tau is per-region calibrated, and downstream quality + CIB filters cut the residual.</p>
          <p>For small counts (<VIS.Term def="Poisson regime: when counts are small (say < 30), the Gaussian approximation to the count distribution breaks down. The Poisson is the correct model: variance equals mean, no separate sigma to estimate.">Poisson regime</VIS.Term>, common in cold cohorts), the variance equals the mean and the z-score becomes <VIS.Equation tex={String.raw`(x - \mu)/\sqrt{\mu}`} />. Use the Poisson form below count ~ 30, the Gaussian form above. Mixing them gives ~10x reduction in false alarms for cold geos.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. Window-size vs staleness tradeoff</h3>
          <p>Window size W is the only knob that trades freshness against noise. Variance of the per-window count under stationary Poisson rate lambda is</p>
          <VIS.Equation display={true} tex={String.raw`\mathrm{Var}(x_W) \;=\; \lambda \cdot W, \quad \text{coef of variation} \;=\; 1/\sqrt{\lambda W}`} />
          <p>1-minute windows: fresh but noisy (<VIS.Term def="Coefficient of variation: sigma / mu. Dimensionless measure of relative spread. For Poisson-distributed counts, CoV = 1/sqrt(lambda*T): bigger windows and busier topics give relatively cleaner counts.">CoV</VIS.Term> ~ 0.3 at lambda=10). 1-hour windows: stable but a real trend takes &gt; 30 min to surface. Production uses 1-minute counts plus an EWMA smoothing across minutes — keeps the freshness of the small window and the stability of a larger horizon.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. Quality filter (unique-author floor)</h3>
          <p>For a trend candidate observed n times across u unique authors, the per-author <VIS.Term def="Gini concentration: 1 - sum(p_i^2). Ranges from 0 (one author wrote everything) to ~1 (every author wrote one post). Standard metric for whether a count comes from a broad audience or a few accounts.">Gini concentration</VIS.Term> is</p>
          <VIS.Equation display={true} tex={String.raw`G \;=\; 1 - \sum_i p_i^2, \quad p_i \;=\; \text{share of posts by author } i`} />
          <p>HyperLogLog gives u in O(1) memory at ~1% relative error. The filter rule is:</p>
          <VIS.Equation display={true} tex={String.raw`\text{keep} \iff u > u_{\min}(\text{region}) \;\text{ and }\; G > G_{\min}`} />
          <p>Calibrated per-region: a city of 1M sets <VIS.Equation tex={String.raw`u_{\min}=200`} />; a city of 50k sets <VIS.Equation tex={String.raw`u_{\min}=15`} />. The right floor is roughly the unique-author count at the 95th percentile of historical non-trends in that region.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. CIB detection via posting-time correlation</h3>
          <p>For each candidate trend, build per-account posting-time vectors over the spike window. Pearson correlation between two accounts a, b is</p>
          <VIS.Equation display={true} tex={String.raw`\rho_{ab} \;=\; \frac{\sum_t (x_{at} - \bar{x}_a)(x_{bt} - \bar{x}_b)}{\sqrt{\sum_t (x_{at} - \bar{x}_a)^2}\sqrt{\sum_t (x_{bt} - \bar{x}_b)^2}}`} />
          <p>Mean pairwise correlation across the top contributors:</p>
          <VIS.Equation display={true} tex={String.raw`\bar{\rho} \;=\; \frac{2}{u(u-1)} \sum_{a < b} \rho_{ab}`} />
          <p>Real trends: <VIS.Equation tex={String.raw`\bar{\rho} \approx 0.1`} />. Botnets: <VIS.Equation tex={String.raw`\bar{\rho} > 0.7`} />. Threshold 0.5 drops most coordinated amplification with low collateral. For trends with u &gt; 1k authors, sample a random subset to bound the O(u^2) cost.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. Velocity ranker (z, acceleration, diversity)</h3>
          <p>z-score alone over-favors short bursts. Adding <VIS.Term def="Velocity in this context: first derivative of z-score with respect to time. A trend whose z is rising captures durability — slow-ramping real events beat single-minute spikes.">velocity</VIS.Term> (first-derivative of z) captures durable <VIS.Term def="Acceleration: second derivative of count, or rate-of-change of velocity. Distinguishes a trend that is still gaining momentum from one that has already plateaued.">acceleration</VIS.Term>:</p>
          <VIS.Equation display={true} tex={String.raw`v_t \;=\; z_t - z_{t-\Delta}, \quad s \;=\; z_t^{0.5} \cdot v_t^{0.5} \cdot d`} />
          <p>The half-power form prevents either signal from dominating. d is a per-cluster diversity prior: a trend whose cluster already has 3 entries in the candidate list gets d &lt; 1. Geometric mean form is well-behaved under ranking and keeps the score interpretable in log space.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Diversity (per-cluster cosine cap)</h3>
          <p>Cluster-level <VIS.Term def="MMR (Maximal Marginal Relevance): greedy reranker that trades relevance against redundancy. At each step picks the candidate maximizing score minus lambda * similarity-to-already-picked. The standard slate-diversity primitive.">MMR</VIS.Term>. For the survivor set S and a candidate i with score s_i in cluster c_i:</p>
          <VIS.Equation display={true} tex={String.raw`\text{next}(S) \;=\; \arg\max_{i \notin S} \Big[ s_i - \lambda \cdot \mathbb{I}[\text{cluster}_i \in \text{clusters}(S)] \cdot \text{sim}(i, S) \Big]`} />
          <p>Per-cluster cap K_c = 2 in production: at most 2 trends from one news event. Without this, an election produces 8 of the top 10 trends and the product looks broken.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Geo-segmentation minimum sample size</h3>
          <p>For a stable z-score, the baseline mu and sigma need enough samples. Under <VIS.Term def="Poisson rate lambda: the average number of events per unit time. For a Poisson process, both the mean and variance equal lambda*T over a window of length T.">Poisson rate lambda</VIS.Term>, sigma/mu = 1/sqrt(lambda T). To achieve relative baseline error &lt; 5%:</p>
          <VIS.Equation display={true} tex={String.raw`\lambda \cdot T \;>\; 400`} />
          <p>For a city posting at 10 posts/min per topic, the per-topic baseline window must exceed 40 minutes. Smaller cities collapse to a larger geo (country) when the per-city baseline is too thin — a fallback hierarchy keeps cold cohorts from generating noise.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Drift monitor (PSI on baseline)</h3>
          <p>Population Stability Index on the per-topic count histogram between today and the rolling 28-day baseline:</p>
          <VIS.Equation display={true} tex={String.raw`\mathrm{PSI} \;=\; \sum_b (p_b - q_b) \cdot \ln(p_b / q_b)`} />
          <p>PSI &lt; 0.1: stable. 0.1-0.25: investigate. &gt; 0.25: retrain the cluster model and NER. World events shift the post-rate distribution; a static cluster model loses recall fast on new entities (people, brands, products).</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. Cold-geo fallback</h3>
          <p>For a geo with thin baseline (sigma undefined), fall back to a one-sample <VIS.Term def="Poisson tail probability: P(X >= x | lambda) for a Poisson random variable. Used to test whether an observed count is improbably large under an assumed background rate. The right tool when sigma is undefined.">Poisson tail</VIS.Term>:</p>
          <VIS.Equation display={true} tex={String.raw`P(X \ge x \mid \lambda_{\text{parent}}) \;<\; \alpha`} />
          <p>Use the country-level rate lambda as the prior. Trend only if the city's count is improbable under the country baseline. This recovers the city's specificity (the trend is local) without inheriting the noise of an under-sampled per-city baseline.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Rank only by raw count, no baseline."</strong> "good morning" trends every day. Trending is unexpected velocity, not high count. Math: §3a, §3b.</li>
          </ul>
        </VIS.Section>

        {/* ============================================================== */}
        {/* PHASE 5 — Trap drills across the 5 axes                        */}
        {/* ============================================================== */}

        <VIS.Section id="sec-traps-business" title="Trap drills - Business metrics">

          <VIS.TrapProblem
            id="trend-q1"
            difficulty="hard"
            mode="single"
            title="Pick the north-star metric for trending."
            scenario={<>Leadership wants one number that says "the trending product is working."</>}
            options={[
              {key:"a", text:"Click-through rate on the trending cards across all platform surfaces.", correct:false},
              {key:"b", text:"Total impressions of trending cards aggregated per day across the platform.", correct:false},
              {key:"c", text:"Median time-to-surface from a genuine event, plus weekly miss rate on a curated event-list.", correct:true},
              {key:"d", text:"Number of unique trends published per day across all regions of the platform.", correct:false},
            ]}
            trap={<>(a) is gameable by clickbait surfaces. (c) is a supply metric and rises with traffic, not quality. (d) rewards noise — a system that emits more trends is not a better trending system. (b) measures the two things the product is for: surface real events quickly and don't miss them.</>}
            lens={<>Time-to-surface plus miss rate against a curated truth-set is the only honest north star. Engagement is a side effect.</>}
            stretch={<>How would you build the curated event-list without biasing it toward what your system already catches?</>}
          />

          <VIS.TrapProblem
            id="trend-q2"
            difficulty="hard"
            mode="single"
            title="The exec dashboard."
            scenario={<>The CEO wants one chart that shows trending quality is improving quarter over quarter.</>}
            options={[
              {key:"a", text:"Per-region precision against a labeled event-truth-set, scored weekly by quality reviewers.", correct:true},
              {key:"b", text:"Average z-score of items that made the trending list per day across all regions.", correct:false},
              {key:"c", text:"Number of unique users who clicked any trending card per week across the platform.", correct:false},
              {key:"d", text:"Mean dwell time on the trending surface across the global platform population.", correct:false},
            ]}
            trap={<>(a) is an internal model number — a higher z is not a better trend. (c) is gated on the audience size. (d) is the dwell-trap from feed: clickbait raises it. (b) reads the quality of what surfaced against an external truth source.</>}
            lens={<>Quality must be measured against an external truth-set, not against the system's own scoring.</>}
            stretch={<>How big does the event-truth-set need to be to have weekly statistical power?</>}
          />

          <VIS.TrapProblem
            id="trend-q3"
            difficulty="medium"
            mode="single"
            title="Pricing the false-positive cost."
            scenario={<>A botnet briefly trends "BUY $XYZ stock". You weigh the cost of a missed real trend against the cost of a false trend.</>}
            options={[
              {key:"a", text:"Tune thresholds to minimize total error rate across both directions equally.", correct:false},
              {key:"b", text:"Tune thresholds where marginal false-trend cost equals marginal missed-trend cost at the opera.", correct:true},
              {key:"c", text:"Pick the threshold that maximizes precision regardless of any recall consequences.", correct:false},
              {key:"d", text:"Pick the threshold that maximizes recall regardless of any precision consequences.", correct:false},
            ]}
            trap={<>(a) treats both errors as equal-cost. (c) misses every emerging real trend. (d) trends garbage. (b) is the Bayes-optimal threshold; for trending, FP is usually 2-5x the cost of FN because of reputational damage.</>}
            lens={<>Trending is a high-FP-cost product. Errors are not symmetric. The operating point reflects the cost ratio, not the error rate.</>}
            stretch={<>How would you elicit the cost ratio from policy stakeholders without forcing them to put a dollar number on reputation?</>}
          />

          <VIS.TrapProblem
            id="trend-q4"
            difficulty="hard"
            mode="multi"
            title="Pick every claim that aligns with a precision-first trending strategy."
            scenario={<>Your VP says "we'd rather miss a trend than trend a fake one."</>}
            options={[
              {key:"a", text:"Raise the z-score threshold from 3 to 4 to cut the residual false-alarm rate.", correct:true},
              {key:"b", text:"Require unique-author floors per region with engagement-diversity gates.", correct:true},
              {key:"c", text:"Disable the CIB detector so all velocity signals get a chance to surface.", correct:false},
              {key:"d", text:"Couple the quality filter and CIB filter in series rather than parallel.", correct:true},
              {key:"e", text:"Train a single end-to-end binary classifier to replace the staged filter chain.", correct:false},
              {key:"f", text:"Add a manual-review queue for top-K candidates per region per minute window.", correct:true},
            ]}
            trap={<>(c) is the opposite of precision-first. (e) collapses interpretable stages into a black box; you lose the precision-cost dials. The others are textbook precision levers.</>}
            lens={<>Precision-first means stacking conservative filters and accepting recall loss as the explicit cost.</>}
            stretch={<>What's the dollar value of a manual-review reviewer per minute of latency saved?</>}
          />

          <VIS.TrapProblem
            id="trend-q5"
            difficulty="medium"
            mode="single"
            title="Personalization vs trending."
            scenario={<>An engineer proposes personalizing the trending list per user based on their interest embedding.</>}
            options={[
              {key:"a", text:"Approve: per-user trending is strictly better than per-region trending in every regime.", correct:false},
              {key:"b", text:"Approve and remove geo segmentation since per-user personalization subsumes it entirely.", correct:false},
              {key:"c", text:"Approve only if the engagement uplift exceeds 2% in a full multi-week A/B test.", correct:false},
              {key:"d", text:"Reject and keep per-region: the product promise is 'what is the city talking about'.", correct:true},
            ]}
            trap={<>(a) collapses the product into 'For You'. (c) defers a product principle to a number — engagement always rises when you personalize, but you broke the contract. (d) loses the locality property. (b) is the senior product framing: trending is a shared lens.</>}
            lens={<>Trending is a shared social signal. Personalization makes it a different product with a different name.</>}
            stretch={<>What product name would you give the personalized version? Why is the distinction important?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-data" title="Trap drills - Data collection">

          <VIS.TrapProblem
            id="trend-q6"
            difficulty="hard"
            mode="single"
            title="What is the bucket key for counting."
            scenario={<>"Chennai floods", "#FloodChennai", and "chennai rain" should bucket together.</>}
            options={[
              {key:"a", text:"Use a topic-cluster ID from a sentence-embedding clusterer, refreshed on a weekly cadence.", correct:true},
              {key:"b", text:"Use the raw hashtag string as the bucket key with case normalization applied.", correct:false},
              {key:"c", text:"Use the lowercased full post text as the bucket key for cluster aggregation.", correct:false},
              {key:"d", text:"Use a fixed dictionary of hand-curated topic keys maintained by a content team.", correct:false},
            ]}
            trap={<>(a) fragments the count across surface forms. (c) makes every post its own bucket. (d) cannot keep up with new entities. (b) is the production pattern: cluster surface forms via embeddings + online k-means, refresh weekly.</>}
            lens={<>Trending counts only make sense in a canonical entity space, not a surface-form space.</>}
            stretch={<>How do you handle a new event whose entities aren't yet in the clusterer?</>}
          />

          <VIS.TrapProblem
            id="trend-q7"
            difficulty="hard"
            mode="single"
            title="Window size for per-minute counts."
            scenario={<>You can pick the streaming window between 30 seconds, 1 minute, 5 minutes, or 1 hour.</>}
            options={[
              {key:"a", text:"30 seconds for maximum freshness despite the higher count variance.", correct:false},
              {key:"b", text:"1 hour to keep baselines reliable across the full topic catalog of the platform.", correct:false},
              {key:"c", text:"5 minutes for stable counts at the cost of some surfacing latency.", correct:false},
              {key:"d", text:"1 minute, smoothed by an EWMA across minutes for stability of the score.", correct:true},
            ]}
            trap={<>(a) gives noisy counts where the CoV exceeds the signal for small lambda. (c) introduces a 5-minute lag between an event and its surfacing. (d) loses the entire freshness premise. (b) is the standard 1-minute + EWMA combo — fresh in latency, stable in score.</>}
            lens={<>Window size and smoothing are decoupled. Pick the freshest window the system can afford; recover stability with EWMA across windows.</>}
            stretch={<>What happens to the EWMA alpha if you change the window from 1 to 2 minutes?</>}
          />

          <VIS.TrapProblem
            id="trend-q8"
            difficulty="medium"
            mode="single"
            title="Handling late events."
            scenario={<>Posts arrive with timestamps up to 10 minutes after their event-time.</>}
            options={[
              {key:"a", text:"Drop any post whose event-time is earlier than the current operator watermark.", correct:false},
              {key:"b", text:"Bucket every post by its arrival-time at the Kafka broker rather than its event-time.", correct:false},
              {key:"c", text:"Set a 10-minute allowed-lateness with side-output for very-late events and watermarked windows.", correct:true},
              {key:"d", text:"Keep all windows open indefinitely so no event is ever dropped from the aggregation.", correct:false},
            ]}
            trap={<>(a) silently drops a slow user's posts. (c) destroys the event-time semantics — your "minute t" counts events that happened at very different real times. (d) is unbounded state. (b) is the Flink-standard pattern: bounded lateness, side-output for the rare super-late, and accept the trade.</>}
            lens={<>Event-time semantics require explicit lateness bounds; arrival-time semantics silently corrupt the baseline.</>}
            stretch={<>How would the EWMA misbehave if you used arrival-time instead?</>}
          />

          <VIS.TrapProblem
            id="trend-q9"
            difficulty="hard"
            mode="single"
            title="Unique-author counting at scale."
            scenario={<>You want a per-(topic, minute) unique-author count across ~50M topics.</>}
            options={[
              {key:"a", text:"Maintain a HyperLogLog sketch (~12 KB per topic, ~1% error) and merge across shards.", correct:true},
              {key:"b", text:"Maintain a hash-set of author IDs per topic for the window across all shards.", correct:false},
              {key:"c", text:"Approximate by sampling random posts and scaling up at query time on read.", correct:false},
              {key:"d", text:"Compute unique authors only at end of day from an offline batch on warehouse data.", correct:false},
            ]}
            trap={<>(a) is exact but blows up memory at 50M topics x thousands of authors per minute. (c) breaks for cold topics that don't get a sample. (d) loses the per-minute freshness. (b) is the standard sketch: 12 KB per topic, ~1% error, mergeable across shards.</>}
            lens={<>When unique-counting at high cardinality you trade exact for sketch. HyperLogLog is the standard.</>}
            stretch={<>What's the failure mode if you pick the sketch's precision parameter too low?</>}
          />

          <VIS.TrapProblem
            id="trend-q10"
            difficulty="hard"
            mode="single"
            title="What constitutes a 'post' for counting."
            scenario={<>The platform has originals, replies, reposts, and quote-reposts.</>}
            options={[
              {key:"a", text:"Count every post-type with equal weight in the production pipeline.", correct:false},
              {key:"b", text:"Count only original posts; ignore reposts and replies across the platform.", correct:false},
              {key:"c", text:"Weight by post-type: originals = 1.0, quote-reposts = 0.5, reposts = 0.2, replies = 0.1.", correct:true},
              {key:"d", text:"Count only replies, since replies indicate engagement at the operating threshold.", correct:false},
            ]}
            trap={<>(a) lets a viral repost-cascade dominate the count from one originating account. (b) loses the broad amplification signal entirely. (d) is too narrow. (c) is the production pattern: weight by post-type to balance amplification signal against author-diversity.</>}
            lens={<>Different post-types carry different evidence per unit count. Equal weighting is a bug, not a default.</>}
            stretch={<>What goes wrong when the weights are calibrated against an event-set from a different time period?</>}
          />

          <VIS.TrapProblem
            id="trend-q11"
            difficulty="hard"
            mode="single"
            title="Label collection for the truth-set."
            scenario={<>You need a labeled set of "this was a real trend" to evaluate the system.</>}
            options={[
              {key:"a", text:"Use clicks on trending cards as positive labels in the production pipeline.", correct:false},
              {key:"b", text:"Skip labels entirely and use anomaly-detection's intrinsic score as the evaluation.", correct:false},
              {key:"c", text:"Use only events that the current trending system surfaced and got high engagement on.", correct:false},
              {key:"d", text:"Have a content-quality team label external news events daily and join to the candidate stream.", correct:true},
            ]}
            trap={<>(a) labels by what the system already surfaced — self-fulfilling. (c) is worse self-fulfilling. (d) gives you a number with no ground truth. (b) is the only protocol that gives an unbiased recall measurement.</>}
            lens={<>For anomaly-detection products, evaluation requires an externally-sourced truth-set. The system's own output cannot serve as labels.</>}
            stretch={<>How do you handle the inherent label disagreement among the content-quality reviewers?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-training" title="Trap drills - Training">

          <VIS.TrapProblem
            id="trend-q12"
            difficulty="hard"
            mode="single"
            title="Picking alpha for the EWMA baseline."
            scenario={<>alpha controls how quickly the baseline forgets the past.</>}
            options={[
              {key:"a", text:"alpha = 0.5; faster forgetting catches real changes sooner at the operating threshold.", correct:false},
              {key:"b", text:"alpha = 0.001 for stable baselines across days across the platform.", correct:false},
              {key:"c", text:"alpha = 0.05, validated against a holdout of historical trends so the baseline is still 'norma.", correct:true},
              {key:"d", text:"Auto-tune alpha per topic from its own data in the production pipeline.", correct:false},
            ]}
            trap={<>(a) lets the baseline absorb the spike itself; z drops to ~0 immediately. (c) memorizes ancient data and reacts to weekly cycles as anomalies. (d) introduces a feedback loop: a topic that just spiked picks a low-alpha and stops detecting future spikes. (b) is the standard ~20-minute horizon.</>}
            lens={<>If alpha is too high, the baseline eats the signal; if too low, it stays surprised by routine cycles. ~20 minutes is the sweet spot for typical post-rates.</>}
            stretch={<>What does the auto-tuned-alpha failure mode look like in production?</>}
          />

          <VIS.TrapProblem
            id="trend-q13"
            difficulty="hard"
            mode="single"
            title="Z-score in cold cohorts."
            scenario={<>A small city has 5 posts/minute average. A trend with 12 posts is z = 3 under the Gaussian assumption.</>}
            options={[
              {key:"a", text:"Switch to a Poisson-tail test below count ~30 and fall back to the Gaussian z above.", correct:true},
              {key:"b", text:"Use the Gaussian z-score and accept the noise in the production pipeline.", correct:false},
              {key:"c", text:"Disable trending entirely for cities below 50 posts/minute average.", correct:false},
              {key:"d", text:"Force sigma to be at least 5 to dampen false alarms across the platform.", correct:false},
            ]}
            trap={<>(a) gives a 1-in-700 per-minute false-alarm rate per topic — multiplied by thousands of topics, you see fakes constantly. (c) abandons every small city. (d) is a hack that loses signal everywhere. (b) is the standard: Poisson for small counts, Gaussian above.</>}
            lens={<>The Gaussian assumption breaks at small counts. Switching to a Poisson-tail recovers the FP rate.</>}
            stretch={<>What's the crossover count where Poisson and Gaussian thresholds agree?</>}
          />

          <VIS.TrapProblem
            id="trend-q14"
            difficulty="hard"
            mode="single"
            title="The clusterer's refresh cadence."
            scenario={<>Your topic-cluster model groups surface forms.</>}
            options={[
              {key:"a", text:"Refresh the cluster model in real time as new entities appear.", correct:false},
              {key:"b", text:"Never refresh; topic clusters are stable on a timescale of years.", correct:false},
              {key:"c", text:"Refresh once a quarter for parameter stability in the production pipeline.", correct:false},
              {key:"d", text:"Refresh weekly; reserve daily entity-merges for hot new entities via a separate hot-path.", correct:true},
            ]}
            trap={<>(a) makes the cluster IDs unstable and breaks the EWMA baselines (which are keyed by cluster ID). (c) makes the system miss a new political figure for 3 months. (d) is wrong on the data — entities appear every day. (b) is the production cadence: stable IDs at weekly refresh, plus a daily hot-merge path for emerging entities.</>}
            lens={<>Stable cluster IDs are a system constraint, not a model preference. Anything keyed by cluster ID inherits its instability.</>}
            stretch={<>What's the contract between the hot-merge path and the weekly retrain?</>}
          />

          <VIS.TrapProblem
            id="trend-q15"
            difficulty="medium"
            mode="single"
            title="Training the CIB detector."
            scenario={<>You want the detector to flag botnets.</>}
            options={[
              {key:"a", text:"Train a deep classifier on raw account-feature vectors, labeled by a moderation team.", correct:false},
              {key:"b", text:"Use a generative model of bot behavior and threshold on the likelihood.", correct:false},
              {key:"c", text:"Use a rule-based pairwise Pearson correlation threshold + graph-based clustering on follower n.", correct:true},
              {key:"d", text:"Defer to the platform's central trust-and-safety model in the production pipeline.", correct:false},
            ]}
            trap={<>(a) is heavy and hard to keep current — bot patterns evolve. (c) is overkill and brittle. (d) couples your pipeline to an org-external dependency. (b) is the standard: a transparent statistical rule + graph signal that updates with each new trend candidate.</>}
            lens={<>Bot-defense rules need to be interpretable so they can be tuned per region as adversaries adapt.</>}
            stretch={<>What's the failure mode when the threshold is set globally instead of per-region?</>}
          />

          <VIS.TrapProblem
            id="trend-q16"
            difficulty="hard"
            mode="single"
            title="Retraining the NER on new entities."
            scenario={<>A new public figure emerges; your NER doesn't recognize them.</>}
            options={[
              {key:"a", text:"Run a daily entity-discovery job that mines high-frequency surface-form n-grams not in the dic.", correct:true},
              {key:"b", text:"Wait for the weekly retrain to pick up the new entity from the labeled corpus.", correct:false},
              {key:"c", text:"Add new entities manually as moderation tickets come in across the platform.", correct:false},
              {key:"d", text:"Skip NER and bucket by hashtag only in the production pipeline.", correct:false},
            ]}
            trap={<>(a) is a week of lost recall on the hottest new entities. (c) doesn't scale. (d) misses every non-hashtagged trend. (b) is the production pattern: an automated discovery loop feeds the weekly retrain so the lag is bounded.</>}
            lens={<>Entity discovery is its own pipeline. The retrain consumes a curated stream of candidate entities; it does not discover them.</>}
            stretch={<>What's the cheapest filter that prevents the discovery job from proposing 'good morning' as a new entity?</>}
          />

          <VIS.TrapProblem
            id="trend-q17"
            difficulty="hard"
            mode="single"
            title="Velocity ranker weighting."
            scenario={<>You pick the weights on z, velocity, and diversity for the ranker.</>}
            options={[
              {key:"a", text:"Equal weights across all three signals across the platform.", correct:false},
              {key:"b", text:"Pick z alone; velocity and diversity are corrections, not signals.", correct:false},
              {key:"c", text:"Sum-of-signals; the largest dominates in the production pipeline.", correct:false},
              {key:"d", text:"Geometric mean with 3 calibrated exponents tuned against the labeled event-set.", correct:true},
            ]}
            trap={<>(a) lets whichever signal has the largest scale dominate, similar to the multi-task balancing issue. (c) is the same problem in additive form. (d) loses the durability signal — bursts dominate emerging trends. (b) is the standard: geometric mean is scale-invariant and the exponents calibrate per-signal contribution.</>}
            lens={<>When combining signals on different scales, geometric mean with calibrated exponents is robust; additive sums are scale-sensitive.</>}
            stretch={<>What does the geometric form imply if any signal is zero?</>}
          />

          <VIS.TrapProblem
            id="trend-q18"
            difficulty="medium"
            mode="single"
            title="Holdout protocol for offline evaluation."
            scenario={<>You want to evaluate a candidate algorithm change.</>}
            options={[
              {key:"a", text:"Replay one full week of historical data and measure precision against the labeled event-set.", correct:true},
              {key:"b", text:"Train on this quarter, evaluate on the same quarter in the production pipeline.", correct:false},
              {key:"c", text:"Evaluate only on cherry-picked top events from the past year.", correct:false},
              {key:"d", text:"Evaluate by comparing against the production system's outputs.", correct:false},
            ]}
            trap={<>(b) trains and tests on overlapping time — the baseline is partly memorizing. (c) gives a flattering number with no statistical content. (d) is the self-fulfilling trap. (a) is the textbook replay-evaluation protocol with held-out time and an external truth-set.</>}
            lens={<>Time-overlapping holdouts contaminate the baseline. Replay on held-out time against an external truth-set is the only honest read.</>}
            stretch={<>How do you handle algorithm changes whose effect requires more than one week to materialize?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-monitor" title="Trap drills - Monitoring">

          <VIS.TrapProblem
            id="trend-q19"
            difficulty="hard"
            mode="single"
            title="Detect a baseline that has gone stale."
            scenario={<>The platform launches a new feature; post-rate distribution shifts globally.</>}
            options={[
              {key:"a", text:"Watch the average z-score across all topics; alert when it drifts.", correct:false},
              {key:"b", text:"Watch the trending list churn rate in the production pipeline.", correct:false},
              {key:"c", text:"Compute PSI between today's count histogram and the rolling 28-day baseline.", correct:true},
              {key:"d", text:"Compare today's top-K trends against yesterday's by Jaccard similarity.", correct:false},
            ]}
            trap={<>(a) is a single aggregate that hides per-segment shifts. (c) is a downstream symptom, not a diagnostic. (d) measures topical volatility, not baseline drift. (b) is the standard PSI-on-distribution alarm — math in §3i.</>}
            lens={<>Distribution drift is detected at the input histogram, not at any downstream metric. PSI is the canonical detector.</>}
            stretch={<>What does a PSI of 0.5 imply about the count distribution shape?</>}
          />

          <VIS.TrapProblem
            id="trend-q20"
            difficulty="hard"
            mode="single"
            title="Per-region precision audit."
            scenario={<>You publish trends to 200 country-locale pairs.</>}
            options={[
              {key:"a", text:"Compute a single global precision number against the truth-set.", correct:false},
              {key:"b", text:"Compute precision only at quarter-end before regulator reports.", correct:false},
              {key:"c", text:"Track precision only in the top-10 highest-volume regions in the production pipeline.", correct:false},
              {key:"d", text:"Compute per-(country, locale) precision; alert when any region falls below a per-region floor.", correct:true},
            ]}
            trap={<>(a) averages out per-region collapses. (c) ignores the smallest cohorts which are most at risk. (d) is too late. (b) is the standard fairness-style audit: per-segment with per-segment floors.</>}
            lens={<>Quality is a per-segment property. Global averages paper over per-segment failures, especially in long-tail regions.</>}
            stretch={<>How do you set the per-region floor for a region with 5 historical events in the truth-set?</>}
          />

          <VIS.TrapProblem
            id="trend-q21"
            difficulty="hard"
            mode="single"
            title="CIB detector calibration over time."
            scenario={<>Your CIB threshold was set 6 months ago. Now adversaries are sub-correlating.</>}
            options={[
              {key:"a", text:"Periodically replay known-bot post-time vectors and recalibrate the threshold to maintain the.", correct:true},
              {key:"b", text:"Lower the threshold globally to catch the new pattern across the platform.", correct:false},
              {key:"c", text:"Add a new feature and retrain a deep model in the production pipeline.", correct:false},
              {key:"d", text:"Trust the static threshold; adversaries cannot evade Pearson correlation.", correct:false},
            ]}
            trap={<>(a) raises FP across legitimate trends. (c) is heavy and gets out of date. (d) is empirically wrong — adversaries do adapt. (b) is the routine maintenance protocol: replay against known truth, hold the FP-rate constant.</>}
            lens={<>Adversarial defenses need calibrated re-tuning, not static thresholds. The FP-rate is what you hold constant.</>}
            stretch={<>What's the right cadence for this recalibration?</>}
          />

          <VIS.TrapProblem
            id="trend-q22"
            difficulty="medium"
            mode="single"
            title="Surfacing an embarrassing trend."
            scenario={<>The trending list publishes a hate-speech rallying phrase.</>}
            options={[
              {key:"a", text:"Roll back to last week's model in the production pipeline at the operating threshold.", correct:false},
              {key:"b", text:"Wait for the next retrain to dilute the offending phrase across the platform.", correct:false},
              {key:"c", text:"Apply a hard policy-blocklist as a post-rank filter; this is a config push, not a model deploy.", correct:true},
              {key:"d", text:"Raise the global z-threshold until the phrase no longer qualifies.", correct:false},
            ]}
            trap={<>(a) loses all recent improvements for one issue. (c) leaves the phrase trending for hours. (d) suppresses everything else too. (b) is the operational pattern: post-rank policy blocklist with a few-minute push window.</>}
            lens={<>Operational removals belong in the post-rank policy filter, not the model. A config push is the right blast radius.</>}
            stretch={<>How would you audit the policy blocklist itself so it's not a backdoor for censoring legitimate trends?</>}
          />

          <VIS.TrapProblem
            id="trend-q23"
            difficulty="hard"
            mode="single"
            title="Detecting model-serving skew between offline and online."
            scenario={<>Offline replay says precision is 95%. Production audits say 78%.</>}
            options={[
              {key:"a", text:"Re-run the offline replay on the latest data across the platform.", correct:false},
              {key:"b", text:"Tighten the z-threshold uniformly to recover precision on the live stream.", correct:false},
              {key:"c", text:"Push a fresh model in the production pipeline at the operating threshold.", correct:false},
              {key:"d", text:"Diff the per-feature input distributions between replay and live; check the entity-cluster IDs.", correct:true},
            ]}
            trap={<>(a) doesn't tell you where they diverge. (c) and (d) treat symptoms. (b) is the diagnostic: feature-distribution diff finds the actual cause, usually a backfill or schema change in the join keys.</>}
            lens={<>Offline-online divergence usually traces to a join-key or feature-distribution mismatch. Diff the inputs before changing the model.</>}
            stretch={<>What's the cheapest divergence detector you can run continuously in production?</>}
          />

          <VIS.TrapProblem
            id="trend-q24"
            difficulty="medium"
            mode="single"
            title="Velocity-ranker dashboard."
            scenario={<>You instrument the ranker.</>}
            options={[
              {key:"a", text:"Track the per-component contribution (z, velocity, diversity) to the final score over time.", correct:true},
              {key:"b", text:"Track the average composite score over time in the production pipeline.", correct:false},
              {key:"c", text:"Track only the number of trends published per minute at the operating threshold.", correct:false},
              {key:"d", text:"Track CPU utilization of the ranker service across the platform.", correct:false},
            ]}
            trap={<>(a) hides component-level shifts. (c) is a volume metric. (d) is an infra metric, not a quality metric. (b) tells you which component is driving the ranking — analogous to per-head contribution monitoring in feed.</>}
            lens={<>For composite rankers, the per-component contribution is the right dashboard. Composite scores hide imbalance.</>}
            stretch={<>What does it mean when the diversity component's share doubles overnight?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-gotchas" title="Trap drills - Gotchas">

          <VIS.TrapProblem
            id="trend-q25"
            difficulty="hard"
            mode="single"
            title="Cold-region geo cohort."
            scenario={<>A small city with 1k posts/day produces wild z-scores because the baseline sigma is tiny.</>}
            options={[
              {key:"a", text:"Trust the z-score; small geos are noisy but the math is right.", correct:false},
              {key:"b", text:"Skip trending for any city below a fixed post-rate floor in the production pipeline.", correct:false},
              {key:"c", text:"Fall back to a Poisson-tail test against the parent country's baseline when the per-city basel.", correct:true},
              {key:"d", text:"Clip sigma at a global minimum to avoid the wild z-scores across the platform.", correct:false},
            ]}
            trap={<>(a) ships fakes. (c) abandons the cohort. (d) loses recall everywhere. (b) is the cold-cohort fallback in §3j — Poisson-tail vs the parent geo's rate.</>}
            lens={<>Sparse cohorts need a fallback hierarchy, not the same algorithm with worse parameters.</>}
            stretch={<>How do you decide when to fall up from city to country to global?</>}
          />

          <VIS.TrapProblem
            id="trend-q26"
            difficulty="hard"
            mode="single"
            title="A real event with a single dominant author."
            scenario={<>A celebrity announces breaking news. Author count is 1 originally, then thousands of replies/reposts.</>}
            options={[
              {key:"a", text:"Apply the unique-author floor uniformly and let the trend fail until amplification is broad.", correct:false},
              {key:"b", text:"Count post-types differently in the unique-author floor: an originator's amplification footpri.", correct:true},
              {key:"c", text:"Whitelist verified accounts to bypass the unique-author floor.", correct:false},
              {key:"d", text:"Disable the unique-author floor for trends with surge velocity above a threshold.", correct:false},
            ]}
            trap={<>(a) misses real breaking news driven by a single source. (c) creates a verified-bypass backdoor. (d) opens the door to bots that ramp velocity. (b) is the right framing: the unique-author count is about the breadth of engagement, including reposters and repliers, not just originators.</>}
            lens={<>The unique-author floor should be measured on the trend's footprint, not on its originators.</>}
            stretch={<>How do you cap the influence of one celebrity's repost-cascade so it doesn't trend without genuine reactions?</>}
          />

          <VIS.TrapProblem
            id="trend-q27"
            difficulty="medium"
            mode="single"
            title="Daily / weekly seasonality."
            scenario={<>"good morning" surges every day at 7am local time. Your z-score flags it daily.</>}
            options={[
              {key:"a", text:"Add a hard blocklist of common phrases in the production pipeline.", correct:false},
              {key:"b", text:"Compare current count against the same hour-of-week baseline, not the rolling EWMA alone.", correct:true},
              {key:"c", text:"Raise the global z-threshold to suppress all morning surges.", correct:false},
              {key:"d", text:"Bucket counts by hour rather than minute across the platform.", correct:false},
            ]}
            trap={<>(a) is a maintenance nightmare. (c) suppresses real morning news too. (d) doesn't address the seasonality. (b) is the standard fix: seasonal baselines (hour-of-week, or hour-of-day with weekday/weekend split).</>}
            lens={<>Seasonality must be in the baseline, not in a downstream filter. Same-hour-of-week is the standard granularity.</>}
            stretch={<>What's the failure mode of a same-hour-of-week baseline on a holiday?</>}
          />

          <VIS.TrapProblem
            id="trend-q28"
            difficulty="hard"
            mode="single"
            title="Cache TTL and thundering herd."
            scenario={<>Trending cards are edge-cached with a 60s TTL. At the top of every minute the cache misses for everyone simultaneously.</>}
            options={[
              {key:"a", text:"Lower the TTL to 10s for fresher data in the production pipeline.", correct:false},
              {key:"b", text:"Add 0-30s jitter to the TTL per edge node so misses don't synchronize.", correct:true},
              {key:"c", text:"Disable edge caching and serve from origin across the platform.", correct:false},
              {key:"d", text:"Pre-publish every minute's trending list to all edge nodes ahead of time.", correct:false},
            ]}
            trap={<>(a) multiplies origin load. (c) collapses on first traffic spike. (d) is expensive and races against the next minute's update. (b) is the cheap fix: TTL jitter spreads the miss across the minute.</>}
            lens={<>Synchronized cache expiry is a thundering herd. Jitter spreads the load across the refresh window.</>}
            stretch={<>What's the right jitter spread relative to the TTL?</>}
          />

          <VIS.TrapProblem
            id="trend-q29"
            difficulty="hard"
            mode="single"
            title="Trending an unsafe topic."
            scenario={<>A trend candidate references content that violates platform policy.</>}
            options={[
              {key:"a", text:"Let the trend surface and rely on individual content moderation per post.", correct:false},
              {key:"b", text:"Drop the candidate at the trending layer using a policy filter keyed by topic-cluster and enti.", correct:true},
              {key:"c", text:"Manually review every trend before publication across the platform.", correct:false},
              {key:"d", text:"Wait for users to report the trend in the production pipeline.", correct:false},
            ]}
            trap={<>(a) amplifies a moderation problem into the trending UI. (c) doesn't scale to ~1000 candidates/min. (d) is too slow. (b) is the production pattern: the trending layer applies its own policy filter, even though individual posts also have moderation.</>}
            lens={<>Trending amplifies; amplification surfaces have their own policy bar, separate from per-post moderation.</>}
            stretch={<>What's the right escalation path when the trending policy filter and the per-post moderation disagree?</>}
          />

          <VIS.TrapProblem
            id="trend-q30"
            difficulty="hard"
            mode="single"
            title="The 'rank by raw count' distractor in production."
            scenario={<>A new engineer proposes simplifying the system to 'just rank by post count in the last hour.'</>}
            options={[
              {key:"a", text:"Approve; raw count is simpler and the EWMA baseline adds complexity for little gain.", correct:false},
              {key:"b", text:"Reject: without a baseline, every daily routine (good morning, good night) outranks every real.", correct:true},
              {key:"c", text:"Approve only for the cold-region fallback path in the production pipeline.", correct:false},
              {key:"d", text:"Approve and add a hand-curated blocklist of common phrases across the platform.", correct:false},
            ]}
            trap={<>(a) misses the existential failure mode. (c) would still flood every cold region with "good morning". (d) does not scale across languages and is a maintenance trap. (b) is the senior framing — the baseline is the product, not an optimization on top of it.</>}
            lens={<>Trending = unexpected velocity vs baseline. Removing the baseline is removing the product, not simplifying it.</>}
            stretch={<>If you really had to ship a baseline-free version for a v0, what's the smallest baseline you could include?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>Baseline alpha is the most-sensitive knob.</strong> Too fast = baseline eats spike; too slow = baseline can't track seasonality. Math: §3a, §3c.</li>
            <li><strong>Cold cohorts need a different test.</strong> The Gaussian z fails at small lambda; fall back to Poisson-tail. Math: §3b, §3j.</li>
            <li><strong>Counts must be keyed by cluster, not surface form.</strong> Otherwise the same trend fragments across hashtags. Math: §3d.</li>
            <li><strong>CIB defense has to track adversaries.</strong> Pearson is interpretable, but the threshold needs regular recalibration. Math: §3e.</li>
            <li><strong>Diversity belongs at the slate layer, not the score.</strong> Cap one cluster's slots to keep the UI varied. Math: §3g.</li>
            <li><strong>Geo segmentation needs a fallback hierarchy.</strong> Thin cities fall up to country. Math: §3h, §3j.</li>
            <li><strong>Drift is detected on the baseline distribution, not on downstream symptoms.</strong> PSI on the count histogram. Math: §3i.</li>
            <li><strong>Cache TTL needs jitter.</strong> 60s synchronized expiry is a thundering herd.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}
