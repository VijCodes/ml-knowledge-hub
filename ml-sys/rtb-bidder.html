            scenario={<>Impressions arrive at 1M/sec; clicks arrive at ~10k/sec with 5min-24h delay. You need (impression, click) pairs for training.</>}
            options={[
              {key:"a", text:"Stream-stream join on impression-id with a 1-hour window — most clicks land within the hour and the residual is negligible.", correct:false},
              {key:"b", text:"Batch join nightly — read both logs from the prior day at midnight, hash-join on impression-id, persist to Parquet.", correct:false},
              {key:"c", text:"Online join at bid time — fetch any prior click for this user from the user-features store as part of feature lookup.", correct:false},
              {key:"d", text:"Stream-stream join on impression-id with a 24h window on the click side, materialized to a daily Parquet partition for training.", correct:true},
            ]}
            trap={<>(b) 1h misses the long tail of clicks (5%+). (c) nightly batch discards impressions whose click landed the next day. (d) online join leaks click feedback into the bid path, breaking causality and inflating pCTR.</>}
            lens={<>Stream-stream join with a window matching the slowest expected label arrival is the canonical pattern. Window choice trades off label completeness against memory in the join state.</>}
            stretch={<>How big is the join state? (Hint: 1M imp/sec x 86400s = 86B imps/day; only the unmatched ones must stay in state, but the worst case is ~86B keys with TTL = 24h.)</>}
          />
                  </VIS.Section>

        <VIS.Section id="sec-q-training" title="Training trap drills">

          <VIS.TrapProblem
            id="rtb-q12"
            difficulty="hard"
            mode="single"
            title="The CTR model has high AUC but is mis-calibrated — pCTR averages 0.04 while realized CTR averages 0.02. Effect on bidding?"
            scenario={<>AUC measures ranking quality; magnitude lives outside it. The bidder multiplies pCTR into a bid, so absolute scale matters as much as rank order in the final auction outcome.</>}
            options={[
              {key:"a", text:"Bids are uniformly inflated by 2x relative to truth, so the bidder over-pays and burns budget faster than the pacer expects.", correct:true},
              {key:"b", text:"Bids are correctly ranked among candidates; over-pays are corrected by the 2nd-price clearing mechanism in the auction outcome.", correct:false},
              {key:"c", text:"The pacer compensates by lowering the multiplier across all bids, so the net effective bid is approximately unchanged.", correct:false},
              {key:"d", text:"Conversions land at the expected rate because rank order is preserved, so outcomes match plan at slightly higher cost per win.", correct:false},
            ]}
            trap={<>(b) 2nd-price corrects for runner-up bid, not for absolute over-payment vs value. (c) pacer corrects steady-state spend rate, not per-bid magnitude. (d) more wins at inflated prices means more spend per conversion — ROI drops.</>}
            lens={<>Bidding is a magnitude problem, not a ranking problem. AUC tells you wins ordering; calibration tells you correct bid level. A 2x calibration error is a 2x cost-per-conversion error before pacing intervenes, and the pacer can only smear the burn across time, not undo it.</>}
            stretch={<>How would you fix calibration without retraining? (Hint: Platt scaling or isotonic regression on a held-out day, applied as a final transform on pCTR.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q13"
            difficulty="hard"
            mode="single"
            title="GBDT vs deep CTR — what is the dominant reason RTB ships GBDTs?"
            scenario={<>Deep CTR models outperform GBDTs in offline evaluation. Production RTB still ships GBDTs across most exchanges.</>}
            options={[
              {key:"a", text:"Deep models overfit small RTB datasets relative to GBDTs because the training distribution is narrower than it appears at scale.", correct:false},
              {key:"b", text:"Calibration is systematically worse for deep models, so the bid amplitude is unreliable even when ranking metrics improve.", correct:false},
              {key:"c", text:"Latency at 1M QPS — a 50ms deep forward pass blows the bid budget where 8ms GBDT inference fits with headroom and slack.", correct:true},
              {key:"d", text:"Feature engineering is easier with GBDTs because they do not require embeddings for categorical inputs to perform competitively.", correct:false},
            ]}
            trap={<>(b) RTB training sets are massive — overfitting is not the dominant constraint. (c) calibration can be repaired with Platt. (d) feature engineering is similar effort with both — deep models prefer embeddings but GBDTs benefit from them too.</>}
            lens={<>Latency budget governs model class at this QPS. AUC headroom of a deep model is moot if the model cannot return within the bid window. Deep models do appear in RTB as offline pre-training that produces embeddings for the GBDT or as second-tier scorers on the top-K candidates after eligibility filtering.</>}
            stretch={<>Where might a deep model fit in the bid path? (Hint: after eligibility filter when the candidate set is small enough; or as offline embedding generator that GBDT consumes.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q14"
            difficulty="hard"
            mode="multi"
            title="Pick all losses appropriate for the CTR head."
            scenario={<>You are training a binary classifier on (impression, click) rows with click rate ~2%.</>}
            options={[
              {key:"a", text:"Binary log-loss with no class reweighting — log-loss is a strictly proper scoring rule and yields calibrated probability output.", correct:true},
              {key:"b", text:"Focal loss with gamma=2 — focuses the gradient on the rare positive class and on harder examples within each minibatch.", correct:false},
              {key:"c", text:"Weighted log-loss with negative downsampling 1:10 and weight 10 on retained negatives — preserves calibration with smaller data.", correct:true},
              {key:"d", text:"Hinge loss — drives margin-based separation between clicks and non-clicks in the cheap GBDT layer of the cascade.", correct:false},
              {key:"e", text:"Ranking loss on (impression, ad) pairs within the same auction — directly optimizes the auction-internal ranking outcome.", correct:false},
            ]}
            trap={<>(b) focal loss breaks calibration — its weighting makes pCTR scores no longer probabilistic. (d) hinge is not a proper scoring rule. (e) ranking loss optimizes order but not magnitude, and RTB needs magnitude for bidding.</>}
            lens={<>RTB needs calibrated probabilities, not just rankings. Log-loss (and weighted variants that preserve calibration) is the right choice. Focal, hinge, and pure ranking losses can each look better on AUC while destroying the calibration that the bid math depends on.</>}
            stretch={<>How would you restore calibration after focal loss? (Hint: Platt or isotonic regression on a held-out day as a post-hoc transform, fit on raw scores.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q15"
            difficulty="hard"
            mode="single"
            title="The CVR model has low AUC (0.65) but high business value. Is this a problem?"
            scenario={<>CVR predicts P(conversion | click). Click-given-impression is itself rare; conversion-given-click is rarer and noisier.</>}
            options={[
              {key:"a", text:"Low AUC implies the model is barely above random; replace it by a constant prior to save compute and use CTR alone for bidding.", correct:false},
              {key:"b", text:"Low AUC reflects intrinsic difficulty — pCVR is multiplied by pCTR so even modest discrimination compounds; calibration matters more.", correct:true},
              {key:"c", text:"Low AUC means the wrong features were used; engineering new features such as per-advertiser embeddings will recover the metric.", correct:false},
              {key:"d", text:"Low AUC indicates label issues; tightening the conversion attribution window to one day will sharpen the training signal.", correct:false},
            ]}
            trap={<>(b) replacing with a constant prior collapses bid differentiation. (c) feature work is not guaranteed to lift CVR AUC — conversion is intrinsically noisy. (d) tightening the attribution window discards real positives and lowers AUC further.</>}
            lens={<>CVR is structurally low-AUC because conversion has weak per-impression signal — most of the value-of-bid math sits in pCTR. CVR's job is to provide a calibrated multiplier; even AUC=0.65 with correct calibration is more valuable than AUC=0.80 with biased calibration. The right gates here are calibration plots and conversion-rate-per-bid-quantile, not headline AUC.</>}
            stretch={<>When would CVR AUC matter more? (Hint: when conversion value varies a lot across advertisers; cross-campaign discrimination needs signal.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q16"
            difficulty="hard"
            mode="single"
            title="Retrain failed validation: held-out AUC dropped from 0.78 to 0.74. What is the first thing to check?"
            scenario={<>Daily retrain produced a candidate that fails the +/- 0.5pp AUC gate. No code or feature changes were deployed.</>}
            options={[
              {key:"a", text:"Whether the model architecture was changed in the candidate retrain via an automated config update or hyperparameter sweep.", correct:false},
              {key:"b", text:"Whether the GBDT learning rate was reduced by the autotuner, causing the model to underfit on the new training window.", correct:false},
              {key:"c", text:"Whether the click log had a delivery outage that lost training rows for one of the days inside the training window.", correct:false},
              {key:"d", text:"Whether the training window included a holiday or anomaly day that shifted input distributions vs the held-out validation day.", correct:true},
            ]}
            trap={<>(b)/(c) no code change means architecture and learning rate are unchanged. (d) outage would lower training-set size but would show up as a different alarm than AUC drop.</>}
            lens={<>When retraining with no code change produces unexpected drops, the first hypothesis is always input-distribution shift on either the training side (anomalous day in the window) or the validation side (anomalous validation day). The check is cheap: plot training-day-by-day AUC contributions and validation-day input distribution against the prior week.</>}
            stretch={<>How would you guard against this systematically? (Hint: anomaly detection on training input distribution that quarantines days exceeding a threshold deviation from the trailing window.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q17"
            difficulty="hard"
            mode="single"
            title="The CTR model has 200 features. Importance is concentrated in the top 5. Should you drop the rest?"
            scenario={<>Top-5 features account for ~80% of GBDT split gain. The remaining 195 contribute the long tail.</>}
            options={[
              {key:"a", text:"Drop everything below the top 20 features to halve inference latency and reduce memory pressure on the per-host feature cache.", correct:false},
              {key:"b", text:"Replace the long tail with a single learned embedding to compress the signal into a fixed-dimension input for the GBDT.", correct:false},
              {key:"c", text:"Keep them — long-tail features matter for slice-level calibration on small valuable populations and flatten bids when dropped.", correct:true},
              {key:"d", text:"Drop them and apply L1 regularization to the GBDT split-gain to recover the lost signal in a sparser feature representation.", correct:false},
            ]}
            trap={<>(b) latency win is real but small — GBDTs are I/O-bound on feature fetch, not on tree traversal. The bid-amplitude loss on niche slices dominates. (c) GBDTs do not consume embeddings as cleanly as deep models; this is more deep-model territory. (d) L1 on GBDT split-gain is not standard and does not address the original concern.</>}
            lens={<>Feature importance measured globally hides slice-specific value. A long-tail feature that contributes 0.1% globally might be 30% of the signal on a $10M-spend campaign. The decision rule is to drop features whose marginal slice-level calibration impact is zero on every business-critical slice — not global importance.</>}
            stretch={<>How would you measure slice-level impact? (Hint: per-slice calibration delta when the feature is zeroed out at serving time; alternatively a permutation-importance test stratified by slice.)</>}
          />
                  </VIS.Section>

        <VIS.Section id="sec-q-monitoring" title="Monitoring trap drills">

          <VIS.TrapProblem
            id="rtb-q18"
            difficulty="hard"
            mode="single"
            title="p99 bid latency creeps from 35ms to 48ms over a week. Win rate is unchanged. Severity?"
            scenario={<>SSP cap is 100ms; internal budget is 50ms. p99 is now 48ms; closer to the deadline.</>}
            options={[
              {key:"a", text:"High severity — slack against the 50ms internal budget is gone; p99.9 will trip the deadline and the bidder cancels good bids.", correct:true},
              {key:"b", text:"Low severity — win rate is flat so the bidder is still functioning correctly; the alert can wait until the win-rate metric moves.", correct:false},
              {key:"c", text:"Medium severity — investigate when convenient but no immediate action because no contractual SLA was breached on the exchange.", correct:false},
              {key:"d", text:"Low severity — p99 latency under the SSP cap of 100ms means the bidder is comfortably within deadline across the fleet.", correct:false},
            ]}
            trap={<>(b)/(c) win rate is a lagging signal; by the time p99.9 starts tripping the SSP cap the no-bid rate has already climbed. (d) confusing the SSP cap with the internal budget — there is a ~50ms RTT between them.</>}
            lens={<>Latency monitoring is about distance to the cliff, not about flat business metrics. A p99 of 48ms means p99.9 is likely already past 50ms; some fraction of bids are being cancelled by the request gate or timing out at the SSP. The win-rate signal lags by hours-to-days because it only moves when the gate's no-bid rate is large enough to matter.</>}
            stretch={<>What is the first place to look for the regression? (Hint: per-stage p99 — feature fetch, model inference, eligibility filter. Look for a single hop whose p99 moved more than the rest.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q19"
            difficulty="hard"
            mode="single"
            title="A new exchange partner is added; pCTR drifts down 20% within hours. Most plausible cause?"
            scenario={<>No model push, no infrastructure change. KS-test on pCTR scores trips the drift monitor.</>}
            options={[
              {key:"a", text:"The new partner's inventory is from a different user population — feature distributions shift and the model extrapolates badly.", correct:true},
              {key:"b", text:"The CTR model has decayed because of accumulated staleness and the new partner's traffic is the slice that exposes the gap.", correct:false},
              {key:"c", text:"The new partner uses a slightly different bid-response format causing some bids to be dropped silently by the partner's parser.", correct:false},
              {key:"d", text:"The new partner has lower-quality inventory and the true CTR is genuinely 20% lower than other exchanges in the bidder's mix.", correct:false},
            ]}
            trap={<>(b) staleness on its own does not produce a step-change. (c) protocol drops would show up in win rate, not pCTR. (d) plausible but should not be assumed without comparing feature distributions first.</>}
            lens={<>A step-change in pCTR coincident with a new traffic source is a covariate-shift signal: the model has not seen this user population during training, so its predictions are out-of-distribution. The fix is either to retrain including the new partner's traffic (if sample size allows) or to gate the new partner with a higher pacing-multiplier-floor until distributions stabilize.</>}
            stretch={<>How would you confirm covariate shift versus genuine quality difference? (Hint: compare realized CTR vs pCTR on the new partner; if realized matches predicted, partner quality is the explanation; if realized is higher than predicted, the model is mis-extrapolating.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q20"
            difficulty="hard"
            mode="multi"
            title="The pacer is overshooting daily budgets by 15% on a few campaigns. Pick all the diagnostic checks you'd run."
            scenario={<>Most campaigns hit their daily budgets within 2%; a subset overshoots by 10-20% repeatedly.</>}
            options={[
              {key:"a", text:"Per-campaign actual-vs-target spend curves to see whether overshoot is concentrated late in the day or spread across hours.", correct:true},
              {key:"b", text:"Cross-DC consistency on the pacing state — whether the eventually-consistent global counter lags beyond its 200ms budget.", correct:true},
              {key:"c", text:"PID controller integral term — whether overshoot is sustained (integral saturating) or transient noise around the setpoint.", correct:true},
              {key:"d", text:"Whether the offending campaigns share a targeting predicate that creates competitive bursts during a daypart window.", correct:true},
              {key:"e", text:"Whether the CTR model has decayed and is over-predicting clicks for the specific campaigns experiencing the overshoot pattern.", correct:false},
            ]}
            trap={<>(e) CTR over-prediction would inflate bids uniformly across campaigns; pacing-specific overshoot on a subset points elsewhere.</>}
            lens={<>Pacing failures decompose into controller dynamics (PID gain), state consistency (global counter lag), and arrival dynamics (campaign-specific bursts). The diagnostic flow walks each in turn; CTR-model issues only matter if every campaign is overshooting.</>}
            stretch={<>What is the bidirectional coupling between pacing and bid amplitude? (Hint: pacing multiplier shades the bid; if the multiplier is too low, win rate drops and budget under-delivers; if too high, overshoot.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q21"
            difficulty="hard"
            mode="single"
            title="Drift monitor alerts on feature 'user_country' KS distance 0.18. Other features clean. What do you do?"
            scenario={<>Drift threshold is 0.15. Other features show normal noise. No exchange partner change.</>}
            options={[
              {key:"a", text:"Trigger an emergency retrain immediately because the model has become stale on this feature given the distribution change.", correct:false},
              {key:"b", text:"Suppress the alert and raise the threshold to 0.20 for this feature to reduce noise in the drift-monitor alarms.", correct:false},
              {key:"c", text:"Investigate whether the user_country distribution shifted because of a real population change before changing anything.", correct:true},
              {key:"d", text:"Drop user_country from the model and retrain without it so the model becomes robust to country-distribution shifts going forward.", correct:false},
            ]}
            trap={<>(b) drift alerts trigger investigation, not automatic intervention. (c) raising the threshold hides the signal. (d) drops a real feature without addressing the cause.</>}
            lens={<>Drift is a hypothesis, not a verdict. The KS test says the distribution shifted; the response depends on whether the shift reflects real-world change (advertiser onboarding, geographic expansion) or a data-pipeline bug (a country-code field truncated upstream). The first 30 minutes are diagnostic; only after confirming the cause does an intervention follow.</>}
            stretch={<>How would you tell pipeline bug from real-world shift? (Hint: pipeline bugs typically show step-changes at deploy-window boundaries; real-world shifts have ramps.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q22"
            difficulty="hard"
            mode="single"
            title="Realized CTR per-bucket diverges from pCTR on one user-cohort. Action?"
            scenario={<>For a cohort defined by 'mobile + low-screen-density', realized CTR is 1.5x pCTR. Other cohorts match.</>}
            options={[
              {key:"a", text:"Retrain immediately on the cohort-skewed window and roll the new model out within the day to capture the divergence.", correct:false},
              {key:"b", text:"Apply a per-cohort calibration correction at serve time while scheduling a retrain that includes recent rows from the cohort.", correct:true},
              {key:"c", text:"Increase the bid on the diverging cohort by 1.5x manually to compensate for the predicted-versus-realized CTR gap.", correct:false},
              {key:"d", text:"Treat the divergence as noise until it persists for at least 7 consecutive days before any model or serve-time change.", correct:false},
            ]}
            trap={<>(b) full retrain is expensive and may not target the cohort. (c) manual bid override breaks the pacer and degrades over time. (d) waiting 7 days leaves spend on the table.</>}
            lens={<>Per-cohort calibration mismatch is the classic "model is right on average, wrong on slices" failure. Layered fix: a fast per-cohort isotonic correction at serve time (low risk), plus a slower retrain that addresses the root cause. Manual bid overrides are last resort and should expire.</>}
            stretch={<>How do you size the per-cohort correction's confidence interval? (Hint: bootstrap on cohort observations; gate the correction at significance and minimum sample size.)</>}
          />
                  </VIS.Section>

        <VIS.Section id="sec-q-gotchas" title="Operational gotcha drills">

          <VIS.TrapProblem
            id="rtb-q23"
            difficulty="hard"
            mode="single"
            title="A campaign's pacing token bucket reads zero but the campaign still wins impressions. Cause?"
            scenario={<>The eligibility filter drops campaigns with bucket level zero. Yet the impression log shows wins for this campaign during the zero-bucket window.</>}
            options={[
              {key:"a", text:"The eligibility filter has a regression that ignores the token-bucket level when scoring per-campaign predicates.", correct:false},
              {key:"b", text:"The hourly pacer refilled the bucket mid-window and the impression log is stale relative to the actual bucket state.", correct:false},
              {key:"c", text:"Eventual consistency on the per-DC bucket state — a different DC saw bucket>0 at the same moment and won impressions before sync.", correct:true},
              {key:"d", text:"The campaign was duplicated in the campaign store under a different id and the duplicate is still winning impressions concurrently.", correct:false},
            ]}
            trap={<>(b) is possible but unlikely without a regression. (c) refill would update the bucket level, not leave it at zero. (d) duplicate-id is rare and would show in spend reports.</>}
            lens={<>Cross-DC consistency is the dominant operational source of pacing surprises. Each DC's bucket is a local approximation; global reconciliation happens at a 200ms-1s lag, so wins during the lag window are possible. The bidder accepts this slop in exchange for staying within the 50ms bid budget; the overshoot bound is the lag x peak spend rate.</>}
            stretch={<>How would you bound the worst-case overshoot? (Hint: overshoot is bounded by max-spend-rate-per-DC times consistency-lag times num-DCs.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q24"
            difficulty="hard"
            mode="single"
            title="The retrain job fails silently and no model is pushed for 3 days. First signal in production?"
            scenario={<>The daily push pipeline reports success because the no-op path returned 0; no model artifact was published. Production is running the 3-day-old model.</>}
            options={[
              {key:"a", text:"Win rate plummets within hours because the model is stale on the most recent user-feature distribution of the exchange.", correct:false},
              {key:"b", text:"Bid latency increases because the older model artefact is bigger than the candidate that would have been pushed today.", correct:false},
              {key:"c", text:"Realized CTR on the production model drifts downward as inputs shift; the score-histogram KS triggers within 24-48h of staleness.", correct:true},
              {key:"d", text:"The pacer fires an immediate alert about budget burn because stale models bid less efficiently against shifted inventory.", correct:false},
            ]}
            trap={<>(b) staleness shows as gradual drift, not a step change. (c) model size is unchanged. (d) pacer responds to spend rate, which is unchanged in the short term.</>}
            lens={<>Silent retrain failures are caught by upstream model-freshness monitors (alert if no new model in 24h) and by downstream score-distribution KS. Relying on business metrics is too slow because staleness drift is gradual. The freshness alert is the cheap and direct fix.</>}
            stretch={<>What other invariants should the push pipeline enforce? (Hint: model fingerprint check, eval metric within range, canary traffic exposure before full rollout.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q25"
            difficulty="hard"
            mode="single"
            title="A bidder host has a stuck thread holding the eligibility-filter lock. Symptom?"
            scenario={<>One host out of 500 has 8x normal p99 because of an internal contention bug. Other hosts are healthy.</>}
            options={[
              {key:"a", text:"The affected host's no-bid rate spikes as the request gate cancels in-flight work; the load balancer ejects it via health check.", correct:true},
              {key:"b", text:"The host wins fewer impressions but maintains normal p99 because the lock-contended thread backs up traffic slowly over time.", correct:false},
              {key:"c", text:"All hosts slow down because the eligibility-filter state is shared across the fleet via a global Redis-backed coordination layer.", correct:false},
              {key:"d", text:"Pacing diverges on this host because it updates the global pacing state more slowly than the rest of the bidder fleet.", correct:false},
            ]}
            trap={<>(b) the lock holding inflates p99 directly. (c) eligibility filter state is per-host or per-DC, not fleet-wide. (d) pacing is updated by the impression log, not directly by the host.</>}
            lens={<>The first-line defense against single-host failures is the request gate cancelling on deadline and the load balancer ejecting on health-check failure. Both are designed exactly for this case: a tail-host that drags p99 without taking down the fleet.</>}
            stretch={<>What is the cost of slow health-check ejection? (Hint: any traffic routed to the bad host during the check interval becomes no-bids; the SLO budget for one bad host should bound the check interval.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q26"
            difficulty="hard"
            mode="single"
            title="An advertiser exports their conversion pixel late — conversion events for yesterday land 36 hours later. Effect on retrain?"
            scenario={<>The CVR training pipeline cuts off conversions at 14 days after click; the daily retrain ran at T+24h.</>}
            options={[
              {key:"a", text:"The retrain that ran at T+24h permanently mislabels yesterday's clicks as non-converting; all downstream retrains inherit the bias.", correct:false},
              {key:"b", text:"Within the 14-day cutoff the late conversions still land before the next retrain that uses that day; the impact is one cycle of stale.", correct:true},
              {key:"c", text:"The cutoff window must be tightened to 48h to handle this advertiser's late pixel and to keep training labels consistent.", correct:false},
              {key:"d", text:"Late conversions are discarded entirely from the training pipeline to keep the training data internally consistent week-over-week.", correct:false},
            ]}
            trap={<>(b) tomorrow's retrain picks up the conversions because the cutoff is 14 days. (c) tightening the cutoff makes the bias worse, not better. (d) discarding real positives lowers CVR signal.</>}
            lens={<>Delayed-feedback cutoffs are designed so any retrain looks far enough back that late arrivals are still captured by the next training pass. One day of staleness is the worst case for any single late arrival; nothing is permanently lost.</>}
            stretch={<>How would you accelerate recovery from a one-day staleness blip? (Hint: importance-weight recent rows when late conversions land; or run a backfill retrain off-cycle.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q27"
            difficulty="hard"
            mode="single"
            title="Feature freshness — the user_recent_clicks feature is stale by 6h on 5% of hosts. Mitigation?"
            scenario={<>A subset of feature-cache replicas missed their refresh cycle. Affected hosts serve a stale value of the per-user click counter.</>}
            options={[
              {key:"a", text:"Drop all requests served by stale hosts to no-bid until the per-host feature cache refresh cycle completes successfully again.", correct:false},
              {key:"b", text:"Increase the cache refresh frequency uniformly across the fleet to halve the worst-case staleness on the affected feature.", correct:false},
              {key:"c", text:"Tag each feature value with its freshness timestamp; the model consumes staleness as a feature via its own categorical bucket.", correct:true},
              {key:"d", text:"Train without the feature so freshness ceases to matter for either the cheap or deep tier of the bidder cascade.", correct:false},
            ]}
            trap={<>(b) no-bid throws away winnable inventory. (c) higher refresh frequency raises load without solving the failure case. (d) drops a useful feature.</>}
            lens={<>Freshness is a feature — letting the model see whether a value is fresh or stale lets it adapt its weighting on the fly. This is more robust than pretending all values are equally fresh and assuming the cache layer always succeeds.</>}
            stretch={<>What would alert you that freshness has degraded? (Hint: a freshness-distribution dashboard, alert when the p95 of feature-staleness exceeds the SLO.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q28"
            difficulty="hard"
            mode="single"
            title="A new advertiser onboards with $1M daily budget targeting a tiny audience. First-day delivery is 10% of plan. Why?"
            scenario={<>Pacing pushes the multiplier high to spend; CTR predictions on this audience are uncertain (small training history); win rate is low.</>}
            options={[
              {key:"a", text:"The CTR model is cold on this audience — high prediction variance leads the bid calculator to bid conservatively under uncertainty.", correct:true},
              {key:"b", text:"The pacing controller is broken because it cannot drive spend up to the daily target for this campaign on this slice.", correct:false},
              {key:"c", text:"The audience size is genuinely too small and the daily budget will never spend regardless of any model or pacing intervention.", correct:false},
              {key:"d", text:"The eligibility filter is excluding the advertiser because of a brand-safety mismatch flagged by the upstream audit job.", correct:false},
            ]}
            trap={<>(b) the pacer is doing what it can; the bottleneck is upstream. (c) is possible but should be diagnosed via available inventory not assumed. (d) would show as zero eligibility, not 10% delivery.</>}
            lens={<>Cold-start cases need explicit exploration — Thompson sampling or epsilon-greedy on bid amplitude — to break out of low-confidence under-bidding. Pacing alone cannot fix it because pacing scales an already-low bid by the multiplier. The bidder needs to bid up to learn.</>}
            stretch={<>How much exploration is justified? (Hint: explore budget bounded by the regret-vs-learning tradeoff; typically 5-10% of the cold campaign's daily budget for the first few days.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q29"
            difficulty="hard"
            mode="single"
            title="Network-side: the exchange tightens its HTTP cap from 100ms to 70ms. Effect on the bid stack?"
            scenario={<>RTT to the exchange is 50ms; the previous internal budget was 50ms.</>}
            options={[
              {key:"a", text:"No change because models and feature lookups run inside the cap and the budget margin absorbs the 30ms reduction in HTTP cap.", correct:false},
              {key:"b", text:"The pacer compensates by lowering bid multipliers proportionally so that internal latency stays beneath the new threshold.", correct:false},
              {key:"c", text:"The retrain cycle absorbs the new cap by training a smaller model artefact that fits the tighter internal budget after rollout.", correct:false},
              {key:"d", text:"Internal budget falls to ~20ms; the cascade no longer fits and feature reads must shrink or the model tier must be cheapened.", correct:true},
            ]}
            trap={<>(b) the cap is the budget; tightening eats slack. (c) pacing is orthogonal to latency. (d) retrain frequency does not change effective bid latency.</>}
            lens={<>Latency budget is the hardest constraint on bid stack shape. A 30ms cap reduction is enough to invalidate the architecture; mitigations are reducing feature-fetch round trips, pre-computing more features offline, or moving to a single-shot scoring model with both heads in one forward pass.</>}
            stretch={<>How might you co-locate features with the model? (Hint: shared-memory feature cache on the same host, or feature embedding baked into the model artifact for static features.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q30"
            difficulty="hard"
            mode="single"
            title="A reviewer asks why CTR and CVR run in parallel instead of sequentially with an early skip when pCTR is small. Best response?"
            scenario={<>Suggestion: when pCTR is below 0.001, the bid is effectively zero regardless of CVR. The reviewer wants to short-circuit the CVR call on those rows.</>}
            options={[
              {key:"a", text:"Sequential is strictly better and the team should switch the bid path to run CTR first and CVR only when pCTR exceeds a floor.", correct:false},
              {key:"b", text:"CVR depends on CTR output structurally, so the two scoring stages must run sequentially regardless of the latency cost.", correct:false},
              {key:"c", text:"Sequential introduces a race condition in the bid calculator because the two model outputs would now arrive at different times.", correct:false},
              {key:"d", text:"Sequential adds dependent latency; the bid stack runs them in parallel inside the budget, trading 8ms for marginal compute saved.", correct:true},
            ]}
            trap={<>(b) sequential adds latency. (c) CTR and CVR are conditionally independent given features — they consume the same inputs in parallel. (d) sequencing eliminates parallelism, not race conditions.</>}
            lens={<>Latency budget governs parallelism choices. When two stages can run independently, serializing only pays when (a) the second stage can be skipped most of the time and (b) the latency budget has slack. RTB has neither — most candidates need both models and the budget is already tight.</>}
            stretch={<>Where might short-circuiting work in RTB? (Hint: between the eligibility filter and the model stage — if eligibility drops a campaign, models never run for it.)</>}
          />
                  </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>Calibration is the load-bearing model property.</strong> AUC headroom is irrelevant if pCTR x pCVR magnitudes are biased — the bid math compounds errors multiplicatively. Use <VIS.Term def="Post-hoc transform that fits a sigmoid to map raw model scores to calibrated probabilities, using a held-out set. Cheap to apply and reversible; the standard fallback when raw model outputs are well-ranked but mis-magnitude.">Platt scaling</VIS.Term> or <VIS.Term def="Post-hoc transform that fits a piecewise-constant monotone function from raw scores to calibrated probabilities. More flexible than Platt scaling — captures non-sigmoidal score-probability shapes — at the cost of needing more held-out data to avoid overfitting.">isotonic regression</VIS.Term> as a serve-time correction. Math: §3c.</li>
            <li><strong>Delayed feedback dominates CVR loss.</strong> Naive log-loss on recent rows under-estimates pCVR systematically; either wait for the conversion window to close or use a delayed-feedback model. Math: §3e.</li>
            <li><strong>Pacing is a controller.</strong> The PID's integral term prevents sustained overshoot; without it the multi-DC bidder oscillates around the daily budget curve. The <VIS.Term def="The pattern of total spend across hours of the day for a campaign. Often heavily skewed: 60% in primetime, 20% in shoulder hours, 20% overnight. The hourly pacer's target curve encodes the desired dayparting shape and the PID controller chases it.">dayparting curve</VIS.Term> matters here. Math: §3f.</li>
            <li><strong>p99 slack is the bid stack's real budget.</strong> A p99 of 48ms against a 50ms internal cap means p99.9 is already over the cliff. Track distance-to-cliff alongside the business metrics. Math: §3a.</li>
            <li><strong>Cookieless drift is silent at first.</strong> Per-user features lose cardinality before win rate moves; KS-test on feature distributions catches it weeks earlier than a business-metric alert. <VIS.Term def="Statistical shift in the input distribution P(X) while the conditional P(Y|X) stays fixed. The model is still locally accurate but the training distribution under-represents the new regime, so predictions extrapolate badly on the new slice.">Covariate shift</VIS.Term> is the formal name for this regime. Math: §3h, §3j.</li>
            <li><strong>Auction dynamics are exogenous.</strong> Win-rate moves on a single advertiser overnight, with all internal knobs stable, usually trace to a competing <VIS.Term def="Demand-Side Platform — buyer-side service that bids on impressions on behalf of advertisers. Multiple DSPs compete in each SSP-run auction; entry, exit, or budget exhaustion by a competing DSP shifts the clearing price independently of any change in the home DSP's stack.">DSP</VIS.Term> exiting or pausing.</li>
          </ul>
        </VIS.Section>

      </React.Fragment>
    )}

    <VIS.Section id="sec-further" title="Further reading">

      </ul>
    </VIS.Section>
