  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// rtb-bidder — INTERACTIVE PRACTICE + STUDY ARTIFACT
// Phase 1: drag pieces onto the canvas, connect them with arrows.
// Phase 2 (after "Reveal model design"): pre-rendered correct DAG.
// Phase 3-5: walk + math + trap drills.

const PIECES = [
  // sources
  { id:"bid_request_handler", category:"data", shape:"stream_source", label:"Bid request\nhandler\n1M QPS, 100ms cap",
    tooltip:"SSP HTTP entry point. Hard cap: 100ms wall-clock total, ~50ms after network. Cancels in-flight work that exceeds remaining budget — emits no-bid 200 rather than time-out at the exchange." },
  // feature lookup
  { id:"user_features", category:"infra", shape:"store", label:"User features\n(per-DC cache)\n<2ms read",
    tooltip:"Per-datacenter in-memory cache of user-side features (cohorts, recency, frequency caps). Pre-warmed; no cross-region call on the bid path." },
  { id:"contextual_features", category:"infra", shape:"store", label:"Contextual\nfeatures\n(URL, slot, geo)",

function loadExcalidraw() {
  if (window.__excalidrawLoaded) return window.__excalidrawLoaded;
  window.__excalidrawLoaded = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js";
    s.async = false;
    s.onload = () => resolve(window.ExcalidrawLib);
    s.onerror = reject;
    document.head.appendChild(s);
  });
  return window.__excalidrawLoaded;
}

// ============================================================================
// Phase 1: INTERACTIVE — drag pieces, draw arrows, hit Reveal for scoring.
// ============================================================================
function ExcalidrawCanvas({ pieces, expectedPieces, expectedEdges, onReveal }) {
  const containerRef = React.useRef(null);
  const [lib, setLib] = React.useState(null);
  const [api, setApi] = React.useState(null);
  const [placedIdMap, setPlacedIdMap] = React.useState({});
  const [revealed, setRevealed] = React.useState(false);
  const [report, setReport] = React.useState(null);
  React.useEffect(() => { loadExcalidraw().then(setLib).catch(console.error); }, []);
  function addPiece(piece) {
    if (!api || !lib || revealed || placedIdMap[piece.id]) return;
    const idx = Object.keys(placedIdMap).length;
    const x = 60 + (idx % 4) * 250;
    const y = 60 + Math.floor(idx / 4) * 150;
    const color = CATEGORY_COLOR[piece.category] || "#f1f5f9";
    const shape = piece.shape || "service";
    const specs = {
      service:       { type:"rectangle", w:210, h:90,  fillStyle:"solid",       strokeStyle:"solid",  strokeWidth:1, roundness:null },
      source:        { type:"ellipse",   w:230, h:100, fillStyle:"solid",       strokeStyle:"solid",  strokeWidth:1, roundness:null },
      stream_source: { type:"ellipse",   w:230, h:100, fillStyle:"hachure",     strokeStyle:"dashed", strokeWidth:2, roundness:null },
      queue:         { type:"rectangle", w:230, h:75,  fillStyle:"hachure",     strokeStyle:"dashed", strokeWidth:2, roundness:{type:3} },
      control:       { type:"diamond",   w:210, h:140, fillStyle:"cross-hatch", strokeStyle:"solid",  strokeWidth:2, roundness:null },
      store:         { composite:"cylinder", w:190, h:140 },
    };
    const spec = specs[shape] || specs.service;
    let generated, anchorEl;
    if (spec.composite === "cylinder") {
      const W = spec.w, H = spec.h, lipH = 26;
      const groupId = `g-${piece.id}-${Date.now()}`;
      const common = { backgroundColor: color, strokeColor:"#1e293b", fillStyle:"solid", roughness:1, strokeWidth:1, groupIds:[groupId] };
      const bodyArr = lib.convertToExcalidrawElements([{
        type:"rectangle", x, y: y + lipH/2, width: W, height: H - lipH, ...common,
        label: { text: piece.label, fontSize:14, textAlign:"center", verticalAlign:"middle" },
        customData: { pieceId: piece.id },
      }]);
      const topEllipse = lib.convertToExcalidrawElements([{ type:"ellipse", x, y, width:W, height:lipH, ...common }])[0];
      const bottomEllipse = lib.convertToExcalidrawElements([{ type:"ellipse", x, y: y + H - lipH, width:W, height:lipH, ...common }])[0];
      generated = [...bodyArr, topEllipse, bottomEllipse];
      anchorEl = bodyArr.find((e) => e.type === "rectangle");
    } else {
      const skeleton = {
        type: spec.type, x, y, width: spec.w, height: spec.h, backgroundColor: color, strokeColor:"#1e293b",
        fillStyle: spec.fillStyle, strokeStyle: spec.strokeStyle, strokeWidth: spec.strokeWidth, roughness:1,
        label: { text: piece.label, fontSize:14, textAlign:"center", verticalAlign:"middle" },
        customData: { pieceId: piece.id },
      };
      if (spec.roundness) skeleton.roundness = spec.roundness;
      generated = lib.convertToExcalidrawElements([skeleton]);
      anchorEl = generated.find((e) => e.type === spec.type) || generated[0];
    }
    const next = [...api.getSceneElements(), ...generated];
    api.updateScene({ elements: next });
    setPlacedIdMap({ ...placedIdMap, [piece.id]: anchorEl.id });
  }
  function reveal() {
    if (!api) return;
    const elements = api.getSceneElements();
    const directElemToPiece = {};
    elements.forEach((el) => { if (el.customData && el.customData.pieceId) directElemToPiece[el.id] = el.customData.pieceId; });
    function resolvePieceId(elementId) {
      if (directElemToPiece[elementId]) return directElemToPiece[elementId];
      const el = elements.find((e) => e.id === elementId);
      if (!el || !el.groupIds || el.groupIds.length === 0) return null;
      for (const gid of el.groupIds) {
        const tagged = elements.find((e) => e.groupIds && e.groupIds.includes(gid) && e.customData && e.customData.pieceId);
        if (tagged) return tagged.customData.pieceId;
      }
      return null;
    }
    const placedPieces = Array.from(new Set(Object.values(directElemToPiece)));
    const userEdges = [];
    elements.forEach((el) => {
      if (el.type === "arrow" && el.startBinding && el.endBinding) {
        const src = resolvePieceId(el.startBinding.elementId);
        const tgt = resolvePieceId(el.endBinding.elementId);
        if (src && tgt) userEdges.push([src, tgt]);
      }
    });
    const correctPicks = placedPieces.filter((p) => expectedPieces.includes(p));
    const distractors = placedPieces.filter((p) => !expectedPieces.includes(p));
    const missingPieces = expectedPieces.filter((p) => !placedPieces.includes(p));
    const correctEdges = userEdges.filter(([s,t]) => expectedEdges.some(([es,et]) => es===s && et===t));
    const wrongEdges   = userEdges.filter(([s,t]) => !expectedEdges.some(([es,et]) => es===s && et===t));
    const missingEdges = expectedEdges.filter(([s,t]) => !userEdges.some(([us,ut]) => us===s && ut===t));
    setReport({ placedCount: placedPieces.length, correctPickCount: correctPicks.length, expectedPickCount: expectedPieces.length,
      distractors, missingPieces, edgeCount: userEdges.length, correctEdgeCount: correctEdges.length,
      expectedEdgeCount: expectedEdges.length, wrongEdges, missingEdges });
    setRevealed(true);
    if (onReveal) onReveal();
  }
  function reset() { if (api) api.updateScene({ elements: [] }); setPlacedIdMap({}); setReport(null); setRevealed(false); }
  if (!lib) return React.createElement("div", { style:{padding:24, color:"#64748b"} }, "Loading Excalidraw canvas...");
  const Excalidraw = lib.Excalidraw;
  function lookupLabel(pieceId) { return pieces.find((p) => p.id === pieceId)?.label?.split("\n")[0] || pieceId; }
  return React.createElement("div", null,
    React.createElement("div", { style:{display:"flex", flexWrap:"wrap", gap:8, padding:"12px 14px", background:"#ffffff", border:"1px dashed #cbd5e1", borderRadius:8, marginBottom:10}},
      React.createElement("div", { style:{width:"100%", fontSize:13, color:"#475569", fontWeight:600, marginBottom:4}}, "Palette — click to drop a piece onto the canvas (hover for description)"),
      pieces.map((p) => React.createElement("button", { key: p.id, type:"button", onClick: () => addPiece(p),
        disabled: revealed || !!placedIdMap[p.id],
        "data-rv-info": p.tooltip || undefined,
        "aria-label": p.tooltip ? `${p.label.split("\n")[0]} — ${p.tooltip}` : undefined,
        style:{ padding:"6px 10px", fontSize:13, cursor: placedIdMap[p.id] ? "default" : "pointer",
          background: placedIdMap[p.id] ? "#f1f5f9" : "#ffffff", opacity: placedIdMap[p.id] ? 0.5 : 1,
          border:"1px solid #cbd5e1", borderLeft:`4px solid ${{data:"#0ea5e9", model:"#8b5cf6", infra:"#f59e0b", monitor:"#10b981"}[p.category] || "#94a3b8"}`,
          borderRadius:6, whiteSpace:"nowrap" } }, p.label.split("\n")[0]))
    ),
    React.createElement("div", { ref: containerRef, style:{ height:600, border:"1px solid #cbd5e1", borderRadius:8, background:"#fefce8", position:"relative", overflow:"hidden", marginBottom:10 }},
      React.createElement(Excalidraw, { excalidrawAPI: (a) => setApi(a),
        initialData: { elements:[], appState:{ viewBackgroundColor:"#fefce8", currentItemRoughness:1 } },
        UIOptions: { canvasActions: { saveToActiveFile:false, loadScene:false, export:false, toggleTheme:false } } })),
    React.createElement("div", { style:{fontSize:13, color:"#64748b", marginBottom:8}}, "Tip: click a palette piece to drop it on the canvas, drag to position, use the arrow tool to connect."),
    !revealed ? React.createElement("button", { type:"button", onClick: reveal,
      style:{background:"#2563eb", color:"#fff", border:"none", padding:"10px 18px", borderRadius:8, fontWeight:600, cursor:"pointer"} },
      Object.keys(placedIdMap).length > 0 ? "Reveal model design" : "Skip & reveal solution") : null,
    revealed && report ? React.createElement("div", { style:{marginTop:12}},
      React.createElement("div", { style:{background:"#eff6ff", border:"1px solid #93c5fd", color:"#1e3a8a", padding:"10px 14px", borderRadius:8, fontSize:14, marginBottom:10}},
        `Pieces correct: ${report.correctPickCount} / ${report.expectedPickCount}. Connections correct: ${report.correctEdgeCount} / ${report.expectedEdgeCount}.`),
      report.distractors.length > 0 ? React.createElement("div", { style:{background:"#fee2e2", borderLeft:"4px solid #dc2626", color:"#7f1d1d", padding:"10px 14px", borderRadius:8, margin:"8px 0", fontSize:14}},
        React.createElement("strong", {style:{display:"block", marginBottom:4}}, "Pieces that don't belong:"),
        report.distractors.map(lookupLabel).join(", ")) : null,
      report.missingPieces.length > 0 ? React.createElement("div", { style:{background:"#fef3c7", borderLeft:"4px solid #d97706", color:"#78350f", padding:"10px 14px", borderRadius:8, margin:"8px 0", fontSize:14}},
        React.createElement("strong", {style:{display:"block", marginBottom:4}}, "Missing pieces:"),
        report.missingPieces.map(lookupLabel).join(", ")) : null,
      report.missingEdges.length > 0 ? React.createElement("div", { style:{background:"#fef3c7", borderLeft:"4px solid #d97706", color:"#78350f", padding:"10px 14px", borderRadius:8, margin:"8px 0", fontSize:14}},
        React.createElement("strong", {style:{display:"block", marginBottom:4}}, "Missing connections:"),
        report.missingEdges.map(([s,t]) => `${lookupLabel(s)} -> ${lookupLabel(t)}`).join("; ")) : null,
      report.wrongEdges.length > 0 ? React.createElement("div", { style:{background:"#fee2e2", borderLeft:"4px solid #dc2626", color:"#7f1d1d", padding:"10px 14px", borderRadius:8, margin:"8px 0", fontSize:14}},
        React.createElement("strong", {style:{display:"block", marginBottom:4}}, "Wrong connections:"),
        report.wrongEdges.map(([s,t]) => `${lookupLabel(s)} -> ${lookupLabel(t)}`).join("; ")) : null,
      React.createElement("button", { type:"button", onClick: reset,
        style:{background:"#64748b", color:"#fff", border:"none", padding:"8px 14px", borderRadius:6, fontWeight:600, fontSize:13, cursor:"pointer", marginTop:8} }, "Try again")
    ) : null
  );
}

            <li><strong>Bid request handler</strong> stamps a 50ms deadline. Anything that exceeds remaining budget is cancelled and a no-bid 200 is returned. Timing out at the <VIS.Term def="Supply-Side Platform — the exchange-side service that aggregates publisher inventory and runs the per-impression auction. Imposes the 100ms HTTP cap and tracks DSP reliability metrics that affect future auction participation.">SSP</VIS.Term> is worse than no-bid because it costs reputation with the exchange.</li>
            <li><strong>Feature lookup (parallel).</strong> User + contextual features come from <VIS.Term def="Per-datacenter Redis or RocksDB cache holding pre-computed user and contextual feature vectors. Refreshed from a global pipeline at a 1-minute cadence; reads stay under 2ms via co-location with the bidder process.">per-DC caches</VIS.Term>, &lt;2ms each. No cross-region calls. <VIS.Equation tex={String.raw`t_{\text{features}} \approx 2\,\text{ms}`} /></li>
            <li><strong>Eligible-campaign filter.</strong> <VIS.Term def="Reverse mapping from feature predicates (geo, device, hour-of-day) to the set of campaigns that target them. At RTB scale stored as a posting-list per predicate; the intersection of posting lists for a single impression's predicates yields ~10^2 candidates.">Inverted index</VIS.Term> by targeting predicate AND budget-pacing predicate (token-bucket &gt; 0). Reduces ~10^5 campaigns to ~10^2 in &lt;3ms.</li>
            <li><strong>CTR and CVR models run in parallel</strong> on the survivor set. <VIS.Term def="Gradient-Boosted Decision Trees. Sequentially fits shallow trees on residuals of the prior model. Production-favoured at RTB scale for sub-10ms inference, native handling of missing values, and forgiving feature engineering compared with deep nets.">GBDTs</VIS.Term> at ~8ms — a deep model would not fit. Output is <VIS.Term def="A probabilistic score whose value matches empirical event rate. P=0.04 means the event happens roughly 4% of the time on similar inputs. Required for bid arithmetic because pCTR is multiplied directly into the bid amount.">calibrated probability</VIS.Term>. See §3b.</li>
            <li><strong>Bid calculator</strong> composes <VIS.Equation tex={String.raw`\text{bid} = \text{floor} \cdot m_{\text{pacing}} \cdot p_{\text{CTR}} \cdot \text{eCPC}`} /> and applies <VIS.Term def="Bid shading: scaling the truthful bid by a factor in [0.7,1.0] to compensate for hybrid (1st/2nd-price) auctions and dynamic floors. Fitted from observed win-rate-vs-bid curves; flatter curves shade more, steeper curves shade less.">2nd-price shading</VIS.Term>. No-bid if expected value &lt; floor. See §3c.</li>
            <li><strong>Response handler</strong> writes back within deadline; logs the bid record for later joining.</li>
            <li><strong>Impression log</strong> arrives 100ms-5s after the response (<VIS.Term def="Asynchronous SSP-to-DSP callback confirming that the bid won the auction and the impression rendered. Source of truth for actual spend; lag of 100ms-5s. Some exchanges send loss-notices too, but most only signal wins.">win-notice</VIS.Term>). Updates the actual-spend side of the pacing controller.</li>
            <li><strong>Click and conversion logs</strong> join asynchronously by impression-id. Click lag: 5min-24h. Conversion lag: 1d-14d. These label the training rows. See §3e for <VIS.Term def="Phenomenon where the label for an impression (did it convert?) arrives long after the prediction. Naive training on rows with the label window still open under-estimates pCVR because un-arrived conversions look like negatives.">delayed-feedback</VIS.Term>.</li>
            <li><strong>Daily retrain</strong> joins impression+click+conv into a training set, re-fits CTR/CVR, validates on a <VIS.Term def="A day of data sliced out of the training window and reserved for offline evaluation of the candidate retrain. Must be later than the latest training day to avoid leakage; the AUC delta on this day is the offline canary gate.">held-out day</VIS.Term>, pushes via <VIS.Term def="A traffic split where the candidate model serves a small fraction (1-5%) of bid requests while the production model serves the rest. Compared on online win-rate, pacing-error, and score-distribution KS before promotion.">canary</VIS.Term>. See §3g.</li>
            <li><strong>Drift + p99 monitors</strong> close the loop: <VIS.Term def="Kolmogorov-Smirnov test — measures the maximum absolute difference between two empirical CDFs. Used to detect feature- or score-distribution drift between training and serving distributions. Alert threshold typically 1.36/sqrt(n) for p&lt;0.05.">KS-test</VIS.Term> on feature distributions and pCTR scores, per-stage p99 alarms. See §3h.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. p99 latency split — what fits in 50ms?</h3>
          <p>The internal budget is the SSP cap minus round-trip network. With 100ms HTTP cap and ~50ms RTT, ~50ms remains. Sequential additions:</p>
          <VIS.Equation display={true} tex={String.raw`t_{\text{budget}} = 50\,\text{ms} - \underbrace{2}_{\text{features}} - \underbrace{3}_{\text{eligible}} - \underbrace{\max(8,8)}_{\text{pCTR}\,\|\,\text{pCVR}} - \underbrace{4}_{\text{bid calc}} - \underbrace{2}_{\text{response}} = 31\,\text{ms slack}`} />
          <p>Slack absorbs <VIS.Term def="The latency at the 99th percentile of the response-time distribution. p99 jitter is the variability of that tail caused by garbage collection pauses, network microbursts, cache misses, and tail-of-tail interference. Designing to median latency leaves the bidder vulnerable to p99 spikes.">p99 jitter</VIS.Term> (GC, network microbursts). A deep CTR at 50ms would consume the entire budget; <VIS.Term def="A serving pattern that runs a cheap model first on every input and only escalates to an expensive model on uncertain cases. Trades a small accuracy hit for a large compute saving. RTB inverts this slightly: parallel cheap GBDTs are the rule because there is no budget for any deep stage at all.">cascading</VIS.Term> by serving cheap GBDTs is the load-bearing decision.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. Little's Law on the request queue</h3>
          <p>For stability at 1M QPS with 50ms processing time and N parallel workers:</p>
          <VIS.Equation display={true} tex={String.raw`L = \lambda \cdot W \;\Rightarrow\; N \cdot \text{util} = 10^{6} \cdot 0.050 = 5\times 10^{4}\,\text{in-flight}`} />
          <p>At 60% target <VIS.Term def="Fraction of available server capacity actively serving requests. Higher utilization reduces hardware cost but lengthens queues non-linearly via Kingman's formula. RTB targets ~60% because the queue-length curve blows up past ~80% and breaks p99 SLAs.">utilization</VIS.Term> (headroom for p99), the fleet needs <VIS.Equation tex={String.raw`N \ge 5\times 10^{4} / 0.6 \approx 84{,}000`} /> concurrent request slots. Spread across 6 DCs and ~30 cores per box, that is roughly 500 bidder hosts. Tighter utilization saves cost but lengthens the queue and breaks p99 — <VIS.Term def="W_q ~ rho/(1-rho) — the canonical approximation for the mean wait time in a stable single-server queue. Predicts the non-linear blow-up of queue length as utilization rho approaches 1. Drives the 60-70% utilization target across high-QPS serving systems.">Kingman's formula</VIS.Term> says <VIS.Equation tex={String.raw`W_q \propto \rho/(1-\rho)`} /> blows up as <VIS.Equation tex={String.raw`\rho \to 1`} />.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. Bid optimization — expected value of an impression</h3>
          <p>Expected value of winning an impression — the <VIS.Term def="The amount the bidder would pay if bidding its honest belief about the impression's value. In a pure second-price auction, this is the dominant strategy because the actual payment is set by the runner-up bid, so over-bidding cannot improve outcomes while risking unprofitable wins.">truthful bid</VIS.Term> equals this quantity in a second-price world:</p>
          <VIS.Equation display={true} tex={String.raw`\mathbb{E}[V] = p_{\text{CTR}} \cdot p_{\text{CVR}} \cdot v_{\text{conv}} - c_{\text{floor}}`} />
          <p>Where <VIS.Equation tex={String.raw`v_{\text{conv}}`} /> is advertiser-supplied conversion value (eCPC target × conversions-per-click). The truthful bid in a 2nd-price auction is</p>
          <VIS.Equation display={true} tex={String.raw`b^{*} = p_{\text{CTR}} \cdot p_{\text{CVR}} \cdot v_{\text{conv}}`} />
          <p>The 20%-20% <VIS.Term def="When two independent estimators each carry a multiplicative bias of 20%, the product carries a bias of (1.2)*(1.2)-1 = 44%. Magnitude errors compound — the more stages stacked into the bid, the more aggressively the bidder needs calibration controls on each.">calibration trap</VIS.Term>: a small bias in each estimator compounds. <VIS.Equation tex={String.raw`(1.2)(1.2)(1.0) = 1.44`} /> — a 44% overbid from two seemingly-modest mis-calibrations. This is why <em>calibration</em>, beyond AUC, is the gating offline metric.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. 2nd-price auction equilibrium and shading</h3>
          <p>In a pure 2nd-price auction with <VIS.Term def="Each bidder knows its own valuation but treats other bidders' valuations as independent random draws. The standard assumption behind Vickrey's truthful-bidding result. In practice RTB violates this — advertiser values are correlated through shared market signals — which is one reason production bidders shade their bids.">private values</VIS.Term>, truthful bidding is dominant: bidder pays the runner-up's bid <VIS.Equation tex={String.raw`b_{(2)}`} />, so its surplus is <VIS.Equation tex={String.raw`v - b_{(2)}`} /> independent of own bid (provided it wins). In practice exchanges run <VIS.Term def="Reserve prices below which the auction will yield no winner. Set by the SSP per impression based on inventory quality, time of day, and recent fill rates. Dynamic floors break the pure-Vickrey assumption — a bidder slightly above the floor pays the floor, not the runner-up bid.">dynamic floors</VIS.Term> and hybrid (1st/2nd) mechanics. Optimal shaded bid against a hybrid:</p>
          <VIS.Equation display={true} tex={String.raw`b_{\text{shaded}} = \alpha \cdot b^{*}, \quad \alpha \in [0.7, 1.0]`} />
          <p>where <VIS.Equation tex={String.raw`\alpha`} /> is fit from observed win-rate vs bid curves. A campaign with steep win-curve (many competitors at the floor) shades less; flat win-curve shades more.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. CVR label delay — the delayed-feedback problem</h3>
          <p>Let <VIS.Equation tex={String.raw`D`} /> be the time from click to conversion, with <VIS.Term def="Cumulative Distribution Function. F_D(d) = P(D &lt;= d) — the fraction of conversions that have arrived by d days after the click. Heavy-tailed in advertising; even d=14 days leaves a few percent of conversions still to land.">CDF</VIS.Term> <VIS.Equation tex={String.raw`F_D(\cdot)`} />. At training time <VIS.Equation tex={String.raw`t`} />, only conversions with <VIS.Equation tex={String.raw`D \le t - t_{\text{click}}`} /> are observed. Naive log-loss under-estimates pCVR systematically:</p>
          <VIS.Equation display={true} tex={String.raw`\hat{p}_{\text{CVR}}^{\text{naive}} = p_{\text{CVR}} \cdot F_D(t - t_{\text{click}})`} />
          <p>For a click 1 day old when conversion CDF reaches 50% by day 3, the naive estimator under-shoots by ~50%. Mitigation: a <VIS.Term def="Chapelle 2014 — jointly learns the conversion probability p(C|click) and the delay distribution F_D(d) so that recent clicks contribute to training without being treated as negatives. Equivalent to an EM-style correction on the missing-label problem.">delayed-feedback model</VIS.Term> that jointly learns <VIS.Equation tex={String.raw`p_{\text{CVR}}`} /> and <VIS.Equation tex={String.raw`F_D`} /> (Chapelle 2014), or <VIS.Term def="A reweighting scheme that scales each training row by 1/probability-of-observation. For CVR under delay, the weight is 1/F_D(t-t_click) — rows whose conversion window is half-closed get 2x weight to correct for the missing positives.">importance-weight</VIS.Term> recent rows by <VIS.Equation tex={String.raw`1/F_D`} />.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. Pacing as a PID controller</h3>
          <p>The pacer is a feedback loop, not a filter. Let <VIS.Equation tex={String.raw`s(t)`} /> be cumulative spend and <VIS.Equation tex={String.raw`s^{*}(t)`} /> the target spend curve from the hourly pacer. <VIS.Term def="A continuous loop where the controller observes the current state, computes an error against a setpoint, and applies a correction. PID = Proportional + Integral + Derivative. RTB uses PID on the spend-error so the bid multiplier reacts to where the campaign actually is relative to plan, not where it should ideally be.">Feedback control</VIS.Term> error:</p>
          <VIS.Equation display={true} tex={String.raw`e(t) = s(t) - s^{*}(t)`} />
          <p>Pacing multiplier <VIS.Equation tex={String.raw`m(t)`} /> shades the bid:</p>
          <VIS.Equation display={true} tex={String.raw`m(t) = \text{clip}\!\left(1 - k_p\,e(t) - k_i \int_0^{t} e(s)\,ds - k_d\,\dot{e}(t),\; 0,\;1\right)`} />
          <p>The <VIS.Term def="The accumulated error over time in a PID controller. Drives the controller to zero steady-state error: even a small persistent gap between target and actual spend builds up the integral and forces a corrective bias on the multiplier. Without it, the system can settle at a constant non-zero error.">integral term</VIS.Term> prevents sustained overshoot — without it, six DCs each thinking they have budget bid aggressively at noon, overshoot, then all throttle simultaneously, producing a delivery ripple visible in the daily curve.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Retrain cadence vs label freshness</h3>
          <p>Two competing costs: (a) <VIS.Term def="The degradation of model performance over time as the real-world data distribution drifts away from the training distribution. In RTB, staleness rates depend on user-behaviour velocity, advertiser churn, and seasonal cycles. CTR drifts fast; CVR drifts slow.">staleness</VIS.Term> — error grows linearly with days-since-retrain at rate <VIS.Equation tex={String.raw`\beta`} />; (b) compute — each retrain costs <VIS.Equation tex={String.raw`C_r`} /> dollars. Optimal cadence <VIS.Equation tex={String.raw`T^{*}`} /> minimizes total cost per day:</p>
          <VIS.Equation display={true} tex={String.raw`\text{cost}(T) = \tfrac{1}{2}\beta T + \tfrac{C_r}{T} \;\Rightarrow\; T^{*} = \sqrt{2 C_r / \beta}`} />
          <p>For typical RTB systems <VIS.Equation tex={String.raw`T^{*}`} /> lands at 1 day for CTR (fast drift), 1 week for CVR (slow drift + heavy label delay). A retrain faster than the <VIS.Term def="The time span over which a meaningful fraction of conversion labels arrive — typically 7-14 days for performance ads. Retraining more frequently than this horizon adds variance from incomplete labels faster than it captures genuine signal.">label-delay horizon</VIS.Term> adds noise faster than signal.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Drift detection (KS-test)</h3>
          <p>Compare a feature's training-time distribution <VIS.Equation tex={String.raw`F_{\text{train}}`} /> with the serving-time empirical distribution <VIS.Equation tex={String.raw`\hat{F}_{\text{serve}}`} />. Kolmogorov-Smirnov statistic:</p>
          <VIS.Equation display={true} tex={String.raw`D_{\text{KS}} = \sup_{x} \left| F_{\text{train}}(x) - \hat{F}_{\text{serve}}(x) \right|`} />
          <p>Alert when <VIS.Equation tex={String.raw`D_{\text{KS}} > 1.36 / \sqrt{n}`} /> (p &lt; 0.05). The most common cause in RTB is an exchange partner change or a privacy update — cookies expire en masse, the user-id feature loses <VIS.Term def="The number of distinct values a categorical feature can take. High cardinality (millions of user-ids) provides per-entity signal; low cardinality forces the model to fall back on coarser features. Cookie deprecation collapses user-id cardinality and degrades the most informative feature in the GBDT.">cardinality</VIS.Term>, pCTR collapses to its prior.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Capacity sizing — daily QPS to fleet</h3>
          <p>Wall-clock counts: at 1M <VIS.Term def="Queries-per-second. The instantaneous request rate the bidder sees from all upstream SSPs. RTB peaks are typically 2-3x the daily average; fleet capacity is sized to peak QPS times the desired utilization headroom.">QPS</VIS.Term> the bidder must handle every second of every day:</p>
          <VIS.Equation display={true} tex={String.raw`\text{daily reqs} = 10^{6}\,\text{QPS} \cdot 86400\,\text{s} \approx 8.6\times 10^{10}/\text{day}`} />
          <p>At 1ms of GBDT compute per (request, model) and two parallel models, daily GBDT-CPU-ms:</p>
          <VIS.Equation display={true} tex={String.raw`8.6\times 10^{10} \cdot 2 \cdot 1\,\text{ms} = 1.7\times 10^{11}\,\text{CPU-ms} \approx 5{,}300\,\text{CPU-years/day}`} />
          <p>That sounds huge but fans out across ~500 servers × 30 cores = 15k cores, comfortably within budget. A deep model at 50ms per call would need 50× this fleet — not viable.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. Cookieless cohort signal value</h3>
          <p>With ~30% of impressions <VIS.Term def="An impression where the bidder cannot identify the user via a third-party cookie or device id. Caused by privacy frameworks (ITP, ATT) or by users opting out. Per-user features collapse to a coarser cohort or contextual signal on this slice of traffic.">cookieless</VIS.Term>, the marginal AUC contribution of user-id-derived features drops. Replacement: <VIS.Term def="Coarser group-level identifiers (Chrome Topics API, Apple's SKAdNetwork) that bucket users into ~hundreds of interest categories. Each cohort identifies thousands of users at once, preserving some click-prediction signal while preventing per-user tracking.">cohort embeddings</VIS.Term> (Topics API, FLEDGE) plus contextual upweighting. Information-theoretic bound on remaining lift:</p>
          <VIS.Equation display={true} tex={String.raw`I(\text{click}; \text{cohort}) \le H(\text{click}) - H(\text{click}\mid \text{cohort}) \approx 0.4 \cdot I(\text{click}; \text{user-id})`} />
          <p>Cohorts retain roughly 40% of the per-user <VIS.Term def="A measure of how much one variable tells you about another. I(click; user-id) is the average reduction in uncertainty about click given the user-id. High values mean per-user signal is rich; cookieless cohorts retain ~40% of this signal because they reflect coarser group-level behaviour.">mutual information</VIS.Term>. The bidder must reweight CTR feature importance accordingly during retrain, or the model silently over-relies on a feature that is missing 30% of the time.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Score every impression with a deep model."</strong> 50ms per call on 1M QPS exhausts the entire bid budget. GBDT cascade is the load-bearing decision. Math: §3a, §3i.</li>
            <li><strong>"No pacing — bid on every eligible impression."</strong> A hot campaign burns its daily budget in the first dayparting peak and delivers zero conversions during evening prime time. Math: §3f.</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-q-business" title="Business-metric trap drills">

          <VIS.TrapProblem
            id="rtb-q1"
            difficulty="hard"
            mode="single"
            title="Which north-star metric should the bidder optimize against?"
            scenario={<>Product wants one number to grade the bidder weekly. The advertiser cares about cost-per-acquisition; the publisher cares about revenue per mille; the exchange cares about fill rate.</>}
            options={[
              {key:"a", text:"Daily win rate measures auction competitiveness vs other DSPs in the same exchange and is the most direct quality gauge.", correct:false},
              {key:"b", text:"Average CPM paid measures whether the bidder over-pays for impressions relative to floor and is a tight efficiency proxy.", correct:false},
              {key:"c", text:"Advertiser ROI weighted by spend-share — net conversion value over spend, attributed within the daily window for each campaign.", correct:true},
              {key:"d", text:"pCTR AUC on a held-out day is the direct quality measure of the largest input to the bid stack and the best north star.", correct:false},
            ]}
            trap={<>(a) Win rate goes up whenever the bidder over-pays — it is a competitiveness gauge, not value. (c) Lower CPM looks like savings but can hide pacing failure (bid less, win less, miss the budget). (d) AUC measures ranking quality on a single input; the bid stacks three estimators and is paced — improvements in pCTR AUC can shift CVR calibration silently.</>}
            lens={<>The bidder serves advertisers — whose primary signal is ROI. Internal gates such as pCTR AUC and pacing-error tracking are diagnostic, not north-star. Ship-go criteria should sit on advertiser-visible value; everything else is a leading indicator.</>}
            stretch={<>What is the failure mode of ROI as a single weekly metric? (Hint: heavy-tail conversion delays mean week-1 ROI is biased low; week-3 ROI is closer to truth but too slow for a weekly cycle. Mitigation: report both, gate on week-3 cohort.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q2"
            difficulty="hard"
            mode="single"
            title="Win rate jumps from 4% to 9% overnight on one advertiser. What is the most likely cause?"
            scenario={<>Recent state: stable model artefact, stable pacing config, advertiser spend on plan, other advertisers' win rates flat. Diagnose the exogenous mover.</>}
            options={[
              {key:"a", text:"The CTR model improved calibration via a silent canary, lowering bid amplitude and lifting win rate via floor compression.", correct:false},
              {key:"b", text:"A competing DSP exited or throttled in overlapping auctions, lowering the second-price clearing level on this advertiser's inventory.", correct:true},
              {key:"c", text:"The exchange relaxed brand-safety filters and exposed more inventory matching this advertiser's targeting predicates.", correct:false},
              {key:"d", text:"User-feature drift on the served population raised pCTR uniformly across all advertisers in this exchange.", correct:false},
            ]}
            trap={<>(b) calibration improvement would not be overnight without a push. (c) supply-side filter change would affect multiple advertisers. (d) uniform pCTR drift would shift other advertisers' win rates too.</>}
            lens={<>Auction outcomes depend on competitor behaviour as much as your own. Single-advertiser overnight win-rate moves with all internal knobs unchanged is almost always exogenous: a competitor pulled back, paused, or exhausted budget. The diagnostic is to inspect clearing-price distributions on the overlapping inventory.</>}
            stretch={<>How would you detect competitor exit programmatically? (Hint: track the gap between your bid and the clearing price on won impressions; a widening gap means cheaper wins, which means less competition.)</>}
          />

          <VIS.TrapProblem
            id="rtb-q3"
            difficulty="hard"
            mode="multi"
            title="Pick all the metrics that should gate a CTR-model canary push."
            scenario={<>The candidate model has higher offline AUC than production. Choose the gates that the canary must pass before full rollout.</>}
            options={[
              {key:"a", text:"Online win-rate within +/- 1pp of control — guards against calibration shift that changes bid amplitude on overlapping auctions.", correct:true},
              {key:"b", text:"Pacing-error variance on a 24h rolling window inside control range — calibration drift surfaces directly via pacer dynamics.", correct:true},
              {key:"c", text:"Offline AUC delta strictly above 0.5pp on the held-out day prior to exposure on live exchange traffic.", correct:true},
              {key:"d", text:"Score-histogram KS distance to control under the alert threshold across major user buckets and slot types.", correct:true},
              {key:"e", text:"Conversion lift on canary traffic significant at p<0.05 within the first 6 hours of exposure to the candidate model.", correct:false},
              {key:"f", text:"Advertiser-side weekly ROI on canary traffic exceeds control by at least 2% before promoting the candidate to full rollout.", correct:false},
            ]}
            trap={<>(e) 6h is below the conversion-delay distribution; significance under-cooked. (f) waiting for advertiser-weekly ROI defeats the point of a canary — gate on leading indicators not lagging ones.</>}
            lens={<>Canary gates must be (a) sensitive to within-hours signal, (b) immune to label-delay bias, and (c) tied to bid amplitude or distribution rather than to long-horizon outcome. Pacing error and score-histogram drift are the canonical canary-level signals because they expose calibration changes immediately.</>}
            stretch={<>How long must the canary run before week-3 ROI is well-estimated? (Hint: the conversion-delay CDF; need enough wall-clock for the long tail to settle.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q4"
            difficulty="hard"
            mode="single"
            title="An advertiser asks for a single bid-cap to limit overspend. Where does the cap belong?"
            scenario={<>They want hard guarantees that no single auction pays more than $X CPM, even if the model says otherwise.</>}
            options={[
              {key:"a", text:"In the bid calculator, post-shading, clipping the final bid at the cap so the auction sees the clipped value.", correct:true},
              {key:"b", text:"In the eligible-campaign filter, dropping the campaign from the candidate set whenever pCTR x eCPC exceeds the cap.", correct:false},
              {key:"c", text:"In the hourly pacer, lowering the refill rate so the bucket prevents high-priced wins indirectly.", correct:false},
              {key:"d", text:"In the response handler, downgrading bids above the cap to no-bid after the fact.", correct:false},
            ]}
            trap={<>(b) dropping eligibility loses inventory the advertiser wants. (c) pacing indirection is best-effort, not a hard cap. (d) no-bid throws away winnable impressions at or below the cap.</>}
            lens={<>Hard guarantees live where they can be enforced atomically and locally. The bid calculator is the last point at which the bid number exists before it leaves the bidder; clipping there is exact. Pacing and eligibility are statistical controls, not hard caps.</>}
            stretch={<>What is the downside of a hard cap? (Hint: censors the learning signal — the bidder never observes whether a cap-exceeding bid would have won, so the pCTR-bid-win curve gets one-sided beyond the cap.)</>}
          />

          <VIS.TrapProblem
            id="rtb-q5"
            difficulty="hard"
            mode="single"
            title="Advertiser ROI is flat week-over-week. Which diagnostic do you run first?"
            scenario={<>Steady state: stable model, stable pacing config, no exchange events. Spend on plan; conversion volume on plan. Advertiser unhappy because ROI is flat.</>}
            options={[
              {key:"a", text:"Retrain CTR on the most recent 14 days of data to refresh staleness in the per-user features and ad-slot interactions.", correct:false},
              {key:"b", text:"Raise the bid-shading parameter alpha by 5% to win more impressions and lift conversion volume on this advertiser's targeting.", correct:false},
              {key:"c", text:"Broaden the eligibility filter to include wider targeting predicates and grow the candidate pool for this advertiser.", correct:false},
              {key:"d", text:"Decompose ROI = win-rate x pCTR-realized x pCVR-realized x value/spend; identify which factor moved vs the prior month.", correct:true},
            ]}
            trap={<>(b)/(c)/(d) are interventions. ROI flatness with all knobs stable is a measurement question first — find which factor of the decomposition is responsible before changing anything.</>}
            lens={<>Diagnostics before interventions. A multiplicative decomposition of ROI tells you whether the bottleneck is competitiveness (win rate), calibration (pCTR vs realized CTR), value (eCPC vs realized), or pacing. Each implies a different fix; intervening blind risks making the wrong factor worse.</>}
            stretch={<>What is the unit of analysis for "realized" pCTR? (Hint: pCTR is a prediction; realized CTR is observed clicks / observed impressions on the same slice — drift between them is calibration error.)</>}
          />
                  </VIS.Section>

        <VIS.Section id="sec-q-data" title="Data-collection trap drills">

          <VIS.TrapProblem
            id="rtb-q6"
            difficulty="hard"
            mode="single"
            title="How should the training set for CVR be built, given the 1-14d conversion delay?"
            scenario={<>You retrain CVR daily. Each training row is (impression, click, conversion). Conversions trickle in for up to 14 days after the click.</>}
            options={[
              {key:"a", text:"Use clicks from the last 30 days; positive iff conversion landed by the retrain cutoff; treat unlabeled clicks as negatives.", correct:false},
              {key:"b", text:"Use clicks at least 14 days old; the conversion window is essentially complete and residual unconverted clicks are true negatives.", correct:true},
              {key:"c", text:"Use clicks from only the last 7 days and discard the older window to keep the model fresh against drift on user behaviour.", correct:false},
              {key:"d", text:"Use clicks from the last 30 days; for unlabeled clicks impute the conversion label by sampling from the prior pCVR distribution.", correct:false},
            ]}
            trap={<>(a) marking unlabeled recent clicks as negative is the delayed-feedback bias — labels are missing, not negative. (c) too-short window loses tail-of-delay positives. (d) imputing from a prior leaks the prior into the training signal and cannot improve over chance.</>}
            lens={<>The right training set respects label availability. A click whose conversion window has not closed is unlabeled, not negative. The simplest correct approach is a delay-aware cutoff: include clicks only when their conversion window is essentially complete. For freshness, layer a delayed-feedback model on top that jointly learns conversion probability and delay CDF (Chapelle 2014).</>}
            stretch={<>What is the cost of waiting 14 days? (Hint: model staleness — drift on the most recent 14 days never enters training. Mitigation: importance weighting recent rows by 1/F_D plus monitoring.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q7"
            difficulty="hard"
            mode="single"
            title="A user-id feature has 30% coverage post-cookie deprecation. How do you handle it at training time?"
            scenario={<>Pre-deprecation the feature was present on 95% of rows and was the highest-importance feature in the GBDT. Post-deprecation it is missing on 30% of rows.</>}
            options={[
              {key:"a", text:"Train two models — one on rows with user-id, one without — and route at serve time by feature availability per request.", correct:true},
              {key:"b", text:"Fill missing user-id with a sentinel value and rely on the GBDT to bucket missingness as its own categorical branch.", correct:false},
              {key:"c", text:"Drop the user-id feature entirely so the same schema applies across the cookie-present and cookieless slices of traffic.", correct:false},
              {key:"d", text:"Train on only rows where user-id is present and serve the same model on all traffic regardless of availability at bid time.", correct:false},
            ]}
            trap={<>(b) sentinel imputation lets the tree learn that "missing" is its own bucket but cannot recover the per-user signal that was there for the other 70%. (c) drops a high-importance feature unconditionally. (d) introduces serve-time covariate shift — the 30% missing-id slice is unseen at train time.</>}
            lens={<>Cohort routing — separate models per feature-availability regime — preserves signal where it exists and avoids covariate shift where it does not. The cost is two model pipelines instead of one; the benefit is calibrated bids on both slices.</>}
            stretch={<>How would you decide whether to merge the two models? (Hint: compare per-slice AUC and calibration; if the no-id model converges close enough to the with-id model on shared features, merging is fine.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q8"
            difficulty="hard"
            mode="single"
            title="Where does sampling bias enter the training data?"
            scenario={<>Training rows come from won impressions. You only observe outcomes (clicks, conversions) on impressions where this bidder won the auction.</>}
            options={[
              {key:"a", text:"Label noise — wins are a noisy proxy for true value because of auction stochasticity and competitor variance per impression.", correct:false},
              {key:"b", text:"Train-serve skew — training features differ from serving features because of timing differences in the win-notice pipeline.", correct:false},
              {key:"c", text:"Selection bias — wins concentrate where the bidder predicted high pCTR, so retrains reinforce its own past confidence.", correct:true},
              {key:"d", text:"Class imbalance — wins are much rarer than losses so positives dominate the training set and require class reweighting.", correct:false},
            ]}
            trap={<>(b) auction noise is real but is not the headline bias here. (c) timing skew is a separate issue, not what's described. (d) wins are not the positive class — clicks within wins are.</>}
            lens={<>The training set is a non-uniform sample of the bidding space: the bidder sees outcomes only where it confidently bid high enough to win. This is a self-reinforcing loop — high-pCTR predictions get more wins, which get more labeled rows, which sharpen pCTR there while leaving the low-confidence space under-sampled. Mitigation: random exploration on a fraction of bids, or importance-weight by inverse win-probability.</>}
            stretch={<>What is the connection to bandits? (Hint: this is the off-policy / exposure-bias problem; counterfactual estimators with propensity scores are the formal fix.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q9"
            difficulty="hard"
            mode="multi"
            title="A new feature 'time since last impression for this user x advertiser' is proposed. Pick the leakage concerns to verify first."
            scenario={<>The feature looks at the user's prior interaction with the same advertiser, computed at bid time from a per-user store.</>}
            options={[
              {key:"a", text:"Point-in-time correctness — at training time the feature must reflect only events strictly before the impression timestamp.", correct:true},
              {key:"b", text:"Train-serve schema parity — offline computation must use the same window and store backend as serving to avoid feature skew.", correct:true},
              {key:"c", text:"Sparsity by impression count — for fresh users the feature is missing; the train set must mirror the serving missing-rate.", correct:true},
              {key:"d", text:"Cardinality risk — high-cardinality categorical features hurt GBDT generalization and require target encoding to be useful.", correct:false},
              {key:"e", text:"Privacy disclosure — exposing time-since-interaction in the bid response can leak user history to the exchange downstream.", correct:true},
            ]}
            trap={<>(d) GBDTs handle high cardinality fine — the canonical worry for this feature is not cardinality.</>}
            lens={<>Time-windowed user features are the highest-risk class for offline-online gap. Point-in-time joins, schema parity, and missing-rate calibration are the three programmatic gates. Privacy disclosure is a separate adversarial-input concern: the feature value should never appear in any bid-response or downstream log accessible to the exchange.</>}
            stretch={<>Cheap approximation of point-in-time joins? (Hint: lag every windowed aggregate by 1 day at training time and accept the small information loss in exchange for guaranteed train-serve consistency.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q10"
            difficulty="hard"
            mode="single"
            title="Click logs are missing for ~7% of impressions on iOS post-ATT. Should missing clicks be coded as negatives or unlabeled?"
            scenario={<>iOS App Tracking Transparency suppresses click-tracking for users who opted out. Click events stay absent from the click log for the affected slice of traffic.</>}
            options={[
              {key:"a", text:"Treat them as negatives — absence of click evidence is the standard signal for a non-click impression event in this pipeline.", correct:false},
              {key:"b", text:"Impute clicks by sampling from the average CTR for the ad slot, so the slice's expected click count matches its baseline.", correct:false},
              {key:"c", text:"Train as usual and rely on the GBDT to handle the slice via the device-type feature and per-slot calibration headroom.", correct:false},
              {key:"d", text:"Treat impressions on the affected slice as unlabeled and exclude them from CTR training rather than supply them as negatives.", correct:true},
            ]}
            trap={<>(b) missing-not-at-random labels become systematic negatives that depress pCTR on that slice. (c) sample-imputation leaks the prior. (d) the missingness is correlated with the device feature, so the tree learns "iOS-with-ATT has zero clicks" — false.</>}
            lens={<>Missing-not-at-random labels must be excluded, never silently coerced to negative. CTR on the affected slice is then served from a fallback (the device-type prior at the leaf level), and the bidder accepts a slightly higher calibration error on that slice in exchange for not poisoning the rest of training.</>}
            stretch={<>How would you check whether your CTR model has been poisoned by past silent-negative treatment? (Hint: compute realized CTR per device slice on the wins; if iOS realized CTR is much higher than pCTR, the model under-bids that slice.)</>}
          />
          
          <VIS.TrapProblem
            id="rtb-q11"
            difficulty="hard"
            mode="single"
            title="Where does the impression log join with the click log?"
