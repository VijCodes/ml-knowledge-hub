      service:       { type:"rectangle", w:200, h:80,  fillStyle:"solid",       strokeStyle:"solid",  strokeWidth:1, roundness:null },
      stream_source: { type:"ellipse",   w:230, h:90,  fillStyle:"hachure",     strokeStyle:"dashed", strokeWidth:2, roundness:null },
      queue:         { type:"rectangle", w:220, h:80,  fillStyle:"hachure",     strokeStyle:"dashed", strokeWidth:2, roundness:{type:3} },
      control:       { type:"diamond",   w:210, h:140, fillStyle:"cross-hatch", strokeStyle:"solid",  strokeWidth:2, roundness:null },
      store:         { composite:"cylinder", w:190, h:130 },
    };

    const skeletons = [];
    const anchorIdByPiece = {};

    pieces.forEach((piece) => {
      const pos = positions[piece.id];
      if (!pos) return;
      const color = CATEGORY_COLOR[piece.category] || "#f1f5f9";
      const spec = specs[piece.shape] || specs.service;
      const anchorId = `node-${piece.id}`;
      anchorIdByPiece[piece.id] = anchorId;

      if (spec.composite === "cylinder") {
        const W = spec.w, H = spec.h, lipH = 24;
        const groupId = `g-${piece.id}`;
        const common = {
          backgroundColor: color, strokeColor:"#1e293b",
          fillStyle:"solid", roughness:1, strokeWidth:1, groupIds:[groupId],
        };
        skeletons.push({
          type:"rectangle", id: anchorId,
          x: pos.x, y: pos.y + lipH/2, width: W, height: H - lipH, ...common,
          label: { text: piece.label, fontSize:13, textAlign:"center", verticalAlign:"middle" },
        });
        skeletons.push({ type:"ellipse", x: pos.x, y: pos.y,                width:W, height:lipH, ...common });
        skeletons.push({ type:"ellipse", x: pos.x, y: pos.y + H - lipH,     width:W, height:lipH, ...common });
      } else {
        const sk = {
          type: spec.type, id: anchorId,
          x: pos.x, y: pos.y, width: spec.w, height: spec.h,
          backgroundColor: color, strokeColor:"#1e293b",
          fillStyle: spec.fillStyle, strokeStyle: spec.strokeStyle, strokeWidth: spec.strokeWidth, roughness:1,
          label: { text: piece.label, fontSize:13, textAlign:"center", verticalAlign:"middle" },
        };
        if (spec.roundness) sk.roundness = spec.roundness;
        skeletons.push(sk);
      }
    });

    function shapeCenter(pieceId) {
      const pos = positions[pieceId];
      const piece = pieces.find((p) => p.id === pieceId);
      const spec = piece ? (specs[piece.shape] || specs.service) : specs.service;
      const W = spec.composite === "cylinder" ? spec.w : spec.w;
      const H = spec.composite === "cylinder" ? spec.h : spec.h;
      return { cx: pos.x + W/2, cy: pos.y + H/2 };
    }
    edges.forEach(([src, tgt]) => {
      const srcId = anchorIdByPiece[src];
      const tgtId = anchorIdByPiece[tgt];
      if (!srcId || !tgtId) return;
      if (!positions[src] || !positions[tgt]) return;
      const a = shapeCenter(src);
      const b = shapeCenter(tgt);
      skeletons.push({
        type:"arrow",
        x: a.cx, y: a.cy,
        points: [[0, 0], [b.cx - a.cx, b.cy - a.cy]],
        strokeColor:"#334155", strokeWidth:1.5, roughness:1,
        start: { id: srcId },
        end:   { id: tgtId },
      });
    });

    const elements = lib.convertToExcalidrawElements(skeletons);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        try {
          api.updateScene({ elements });
          setTimeout(() => { try { api.scrollToContent(elements, { fitToContent: true }); } catch (e) {} }, 50);
        } catch (e) { console.error("PreRenderedDiagram updateScene failed:", e); }
      });
    });
  }, [lib, api, pieces, positions, edges]);

  if (!lib) return React.createElement("div", { style:{padding:24, color:"#64748b"} }, "Loading reference diagram...");
  const Excalidraw = lib.Excalidraw;
  return React.createElement("div",
    { style:{ height: 800, border:"1px solid #cbd5e1", borderRadius:8, background:"#fefce8", position:"relative", overflow:"hidden", marginBottom:10 } },
    React.createElement(Excalidraw, {
      excalidrawAPI: (a) => setApi(a),
      viewModeEnabled: true,
      zenModeEnabled: false,
      gridModeEnabled: false,
      initialData: { elements:[], appState:{ viewBackgroundColor:"#fefce8", currentItemRoughness:1 } },
      UIOptions: { canvasActions: { saveToActiveFile:false, loadScene:false, export:false, toggleTheme:false, clearCanvas:false } },
    })
  );
}

        <VIS.Section id="sec-walk" title="Walking the pipeline">
          <ol>
            <li><strong>Two retrieval paths converge into L0.</strong> Follows-graph lookup (set membership, microseconds) plus ANN over the user embedding (<VIS.Equation tex={String.raw`O(\log N)`} /> in HNSW). Union, dedupe, pass ~500 candidates to L1. See §3a for the scoring-load math.</li>
            <li><strong>L1 light DLRM scores all 500 in parallel.</strong> Single shared user-tower forward, batched item-tower forwards. <VIS.Equation tex={String.raw`T_{L1} \approx 500 \cdot 1\text{ms} / B_{\text{batch}}`} /></li>
            <li><strong>Diversifier trims top-100.</strong> MMR is greedy: at each step pick the candidate that maximizes <VIS.Equation tex={String.raw`r_i - \lambda \cdot \max_{j \in S} \text{sim}(i,j)`} />. λ is a per-surface dial. See §3c.</li>
            <li><strong>L2 deep multi-task model scores ~100 survivors.</strong> Heads for pDwell, pComment, pShare, pHide. Combined score is a calibrated linear blend. See §3e.</li>
            <li><strong>Freshness boost.</strong> Multiplicative decay <VIS.Equation tex={String.raw`s' = s \cdot e^{-t/\tau}`} /> with τ ~ a few hours. See §3i.</li>
            <li><strong>Ads blender</strong> inserts paid items at allowed slots subject to ad-load (max 4 in top-50). VCG-priced. See §3j.</li>
            <li><strong>Logging loop</strong> joins impressions with engagement events; position-debiased labels feed daily L1 and hourly L2 retrains. Calibration runs after each L2 push. See §3f, §3g.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is - the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. Candidate-gen scale (the load)</h3>
          <p>At 2B DAU, each user makes ~10 feed requests per day. Each request retrieves ~500 candidates:</p>
          <VIS.Equation display={true} tex={String.raw`N_{\text{cand-scores/day}} \;=\; 2 \times 10^{9} \cdot 10 \cdot 500 \;=\; 10^{13}`} />
          <p>If we tried a single deep model at 5 ms/candidate:</p>
          <VIS.Equation display={true} tex={String.raw`10^{13} \cdot 5\,\text{ms} \;=\; 5\times 10^{10}\,\text{GPU-s/day} \;\approx\; 1\,600\,\text{GPU-years/day}`} />
          <p>L1 at 1 ms saves an order of magnitude; the L1-then-L2 cascade saves another. The cascade is the cost lever — not an optimization, a precondition.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. Little's Law for retrieve -&gt; rank -&gt; serve</h3>
          <p>Each stage is a queue. For p99 latency budget <VIS.Equation tex={String.raw`W`} /> and request arrival rate <VIS.Equation tex={String.raw`\lambda`} />:</p>
          <VIS.Equation display={true} tex={String.raw`L \;=\; \lambda \cdot W`} />
          <p>At peak, ~500K req/s. Total p99 budget 100 ms, allocated:</p>
          <VIS.Equation display={true} tex={String.raw`W = \underbrace{15}_{\text{L0}} + \underbrace{25}_{\text{L1}} + \underbrace{5}_{\text{div}} + \underbrace{30}_{\text{L2}} + \underbrace{10}_{\text{post}} + \underbrace{15}_{\text{net+assembly}} \;=\; 100\,\text{ms}`} />
          <p>In-flight requests at each stage:</p>
          <VIS.Equation display={true} tex={String.raw`L_{L1} = 5\times 10^{5} \cdot 0.025 \approx 12{,}500\;\text{in-flight}`} />
          <p>That sizes the L1 fleet: replicas × QPS-per-replica must clear 500K/s without queueing. Headroom &lt;30% guarantees p99 missing.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. MMR diversification</h3>
          <p>Greedy reranker. Given relevance scores <VIS.Equation tex={String.raw`r_i`} /> from L1 and a similarity kernel <VIS.Equation tex={String.raw`\text{sim}(i,j)`} /> (item-embedding cosine or publisher one-hot):</p>
          <VIS.Equation display={true} tex={String.raw`\text{next}(S) \;=\; \arg\max_{i \notin S} \Big[ r_i \;-\; \lambda \cdot \max_{j \in S} \text{sim}(i,j) \Big]`} />
          <p>λ = 0 -&gt; pure relevance (filter bubble). λ = 1 -&gt; pure diversity (random feel). Production sits in λ ∈ [0.3, 0.6] tuned per surface. The key property: MMR runs AFTER L1 so the relevance signal in <VIS.Equation tex={String.raw`r_i`} /> is unchanged — you can A/B test λ without retraining.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. DPP determinant-based diversity</h3>
          <p>For a kernel matrix <VIS.Equation tex={String.raw`K \in \mathbb{R}^{n\times n}`} /> built from item embeddings (<VIS.Equation tex={String.raw`K_{ij} = r_i r_j \cos(e_i, e_j)`} />), a subset <VIS.Equation tex={String.raw`S`} /> is sampled with probability:</p>
          <VIS.Equation display={true} tex={String.raw`P(S) \;\propto\; \det(K_S)`} />
          <p>The determinant geometrically equals the squared volume spanned by the rows; near-duplicate items collapse the volume to zero, so DPP <em>automatically</em> penalizes redundancy across all embedding dimensions at once. Greedy MAP-inference is <VIS.Equation tex={String.raw`O(K^2 n)`} />. DPP beats MMR when multiple diversity axes (creator × topic × format) interact non-additively.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. Multi-task heads + score combination</h3>
          <p>L2 emits H heads: pDwell, pClick, pComment, pShare, pHide. Each is a calibrated probability. Final score is a weighted blend:</p>
          <VIS.Equation display={true} tex={String.raw`s \;=\; \sum_{h \in H} w_h \cdot p_h \;-\; w_{\text{hide}} \cdot p_{\text{hide}}`} />
          <p>Weights <VIS.Equation tex={String.raw`w_h`} /> come from an offline value-model that maps short-term actions to long-term retention. Each head trains with its own loss (binary cross-entropy for click/share, MSE-in-log for dwell):</p>
          <VIS.Equation display={true} tex={String.raw`\mathcal{L} \;=\; \sum_h \alpha_h \cdot \mathcal{L}_h(\hat{p}_h, y_h)`} />
          <p>The hide head matters disproportionately: one hide is a stronger negative signal than 10 missed clicks. Setting <VIS.Equation tex={String.raw`w_{\text{hide}}`} /> too low is the most common quality regression in feed.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. Position bias and IPS reweighting</h3>
          <p>Items shown at position k have observation probability <VIS.Equation tex={String.raw`q_k`} /> that decays sharply (top slot 1.0, slot 20 ~0.1). Naive training over-weights top slots. Inverse-propensity weighting corrects:</p>
          <VIS.Equation display={true} tex={String.raw`\hat{\mathcal{L}}_{\text{IPS}} \;=\; \frac{1}{N} \sum_{i} \frac{1}{q_{k_i}} \cdot \ell(\hat{p}_i, y_i)`} />
          <p>Propensities <VIS.Equation tex={String.raw`q_k`} /> are estimated from a small "result randomization" treatment (e.g., shuffle top-20 for 1% of traffic) to break the position-engagement confound.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Calibration after weighted sampling</h3>
          <p>Training uses negative-downsampling — keep all positives, sample 1/N of negatives. The model's raw output is biased upward. Recalibrate:</p>
          <VIS.Equation display={true} tex={String.raw`p_{\text{cal}} \;=\; \frac{p_{\text{raw}}}{p_{\text{raw}} + (1 - p_{\text{raw}}) / w}`} />
          <p>where <VIS.Equation tex={String.raw`w = N`} /> is the negative-downsample rate. Isotonic regression on a held-out unbiased slice gives the final mapping. Without this, score combination across heads is meaningless: pDwell and pShare live on different scales.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Engagement vs diversity (Pareto)</h3>
          <p>For each diversity λ there is an engagement E(λ) and a diversity D(λ). The empirical curve is concave:</p>
          <VIS.Equation display={true} tex={String.raw`\max_{\lambda} \;\; E(\lambda) \;\text{ subject to }\; D(\lambda) \ge D_{\min}`} />
          <p>The Lagrangian gives the operating point:</p>
          <VIS.Equation display={true} tex={String.raw`\mathcal{L}(\lambda, \mu) \;=\; E(\lambda) + \mu (D(\lambda) - D_{\min})`} />
          <p>Production tunes <VIS.Equation tex={String.raw`D_{\min}`} /> (the floor), not λ directly. Engineering teams own E; policy owns <VIS.Equation tex={String.raw`D_{\min}`} />. Separating the dials prevents engineering from quietly trading away diversity for a 0.1% engagement win.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Freshness decay</h3>
          <p>Multiplicative half-life model:</p>
          <VIS.Equation display={true} tex={String.raw`s'(t) \;=\; s \cdot 2^{-t/T_{1/2}}`} />
          <p>For news-style items <VIS.Equation tex={String.raw`T_{1/2} \approx 3\,\text{h}`} />; evergreen content <VIS.Equation tex={String.raw`T_{1/2} \approx 72\,\text{h}`} />. Per-item half-lives come from clicking the engagement-vs-age curve and fitting the decay constant. Without per-class half-lives, evergreen tutorials disappear while news items linger.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. Fairness as a constraint, not a loss</h3>
          <p>For each protected publisher group g with exposure floor <VIS.Equation tex={String.raw`\phi_g`} />, the post-rank pass solves:</p>
          <VIS.Equation display={true} tex={String.raw`\max_{x \in \{0,1\}^n} \sum_i s_i x_i \quad \text{s.t.} \quad \sum_{i \in g} x_i \ge \phi_g \cdot K \;\; \forall g`} />
          <p>where <VIS.Equation tex={String.raw`K = 50`} /> is the page size. The constraint enforces a per-page floor; engagement-only ranking would set <VIS.Equation tex={String.raw`\phi_g = 0`} /> and concentrate exposure on the top-publisher tail. Putting <VIS.Equation tex={String.raw`\phi_g`} /> into the L2 loss instead would make A/B testing publisher floors require model retrains — slow and confounded with model changes.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Single deep model on all 500."</strong> 1,600 GPU-years/day at scale. The L1 -&gt; L2 cascade is the cost lever. Math: §3a.</li>
            <li><strong>"No diversifier, rank by engagement only."</strong> Filter bubble within a week; publisher-Gini approaches 0.9 (i.e. a handful of accounts capture most impressions). Engagement maximizes short-term metrics and tanks 90-day retention. Math: §3h.</li>
          </ul>
        </VIS.Section>

        {/* ============================================================== */}
        {/* PHASE 5 — Trap drills across the 5 axes                        */}
        {/* ============================================================== */}

        <VIS.Section id="sec-traps-business" title="Trap drills — Business metrics">

          <VIS.TrapProblem
            id="nf-q1"
            difficulty="hard"
            mode="single"
            title="Pick the north-star metric for a 2B-DAU feed."
            scenario={<>Leadership wants one headline number to grade the feed against quarter-over-quarter.</>}
            options={[
              {key:"a", text:"Average dwell time per session, averaged across all users.", correct:false},
              {key:"b", text:"7-day rolling DAU/MAU ratio plus 90-day retention cohort survival.", correct:true},
              {key:"c", text:"Total impressions served per day across the platform.", correct:false},
              {key:"d", text:"Click-through rate on the top-3 slots of the feed.", correct:false},
            ]}
            trap={<>(a) is the canonical proxy trap: dwell maximizes when the feed serves outrage and clickbait, which tanks retention within a quarter. (c) is a supply metric, not a value metric. (d) optimizes a single surface position, not the product. (b) is the only metric that captures both whether users return and whether they keep returning — engagement is a leading indicator of (b), never a substitute.</>}
            lens={<>Engagement is a means to retention. Whenever the proxy diverges from the goal, the proxy wins in short-term A/B tests and the goal loses on the 90-day cohort.</>}
            stretch={<>If 7-day retention rises 0.3% but dwell drops 5%, do you ship?</>}
          />

          <VIS.TrapProblem
            id="nf-q2"
            difficulty="hard"
            mode="single"
            title="The feed PM asks for ranking by total engagement-events per impression."
            scenario={<>Their pitch: "comments + shares + likes + dwell, weighted equally and summed."</>}
            options={[
              {key:"a", text:"Ship it as-is; equal weights are the unbiased starting point.", correct:false},
              {key:"b", text:"Train per-event multi-task heads with calibrated probabilities, blend with retention-tied weights.", correct:true},
              {key:"c", text:"Sum every event into a single integer label and train one regression head.", correct:false},
              {key:"d", text:"Drop dwell as noisy, keep only the high-signal click events for training.", correct:false},
            ]}
            trap={<>(a) weights signals equally despite different long-horizon values: a single hide is worth (negatively) more than 10 likes. (c) loses calibration and prevents per-head A/B testing. (d) throws away the broadest-coverage signal. (b) is the FAANG pattern: per-head losses, per-head calibration, blended with value-model weights — §3e.</>}
            lens={<>Different engagement events have different long-horizon values. A model that blurs them together is calibration-blind.</>}
            stretch={<>How would you measure the long-horizon weight of a "share" relative to a "like"?</>}
          />

          <VIS.TrapProblem
            id="nf-q3"
            difficulty="medium"
            mode="single"
            title="Revenue vs UX tradeoff on ad load."
            scenario={<>Ads team proposes lifting the 4-ads-in-top-50 cap to 6. Their model predicts +8% revenue.</>}
            options={[
              {key:"a", text:"Lift the cap to 6 and read weekly platform revenue over 4 weeks.", correct:false},
              {key:"b", text:"Couple ad pricing into the L2 loss so the ranker jointly optimizes revenue and engagement.", correct:false},
              {key:"c", text:"Run matched-cohort holdouts at cap=4 vs cap=6, read at the 90-day retention horizon.", correct:true},
              {key:"d", text:"Keep the cap at 4 indefinitely; ads are universally negative for engagement.", correct:false},
            ]}
            trap={<>(a) measures the wrong horizon: ad load lifts revenue immediately, costs sessions slowly. (b) couples ad business logic into the ranker — every ad policy change becomes a model retrain. (d) is an absolutist take that ignores measurement. (c) gives a defensible long-horizon read on the retention cost.</>}
            lens={<>Ads are a constraint, not a target. They go in the post-rank blender so the cap is a product dial, not a model dial.</>}
            stretch={<>What if the 90-day cohort effect is +0.2% retention? Do you accept the +8% revenue lift?</>}
          />

          <VIS.TrapProblem
            id="nf-q4"
            difficulty="hard"
            mode="multi"
            title="Pick every claim that aligns with a retention-as-north-star strategy."
            scenario={<>You own the feed and report DAU and 30-day retention as your business metrics.</>}
            options={[
              {key:"a", text:"Hide events should weigh more strongly than positive events of equal frequency.", correct:true},
              {key:"b", text:"A 5% dwell lift should auto-ship if statistical significance is reached.", correct:false},
              {key:"c", text:"Diversity floor is part of the product, not the ranker.", correct:true},
              {key:"d", text:"Per-publisher exposure caps should be tunable without retraining L2.", correct:true},
              {key:"e", text:"All engagement events should be summed into a single training label.", correct:false},
              {key:"f", text:"Cohort survival curves are the canonical evaluation harness.", correct:true},
            ]}
            trap={<>(b) is the proxy trap. (e) destroys calibration and prevents per-head A/B testing. The others encode the principle: business-rule dials live outside the model so they can be tuned independently.</>}
            lens={<>Retention as north star forces you to keep policy dials outside the model. Every "X must be tunable without retraining" claim is in service of this.</>}
            stretch={<>If retention is north star, why bother optimizing engagement at all?</>}
          />

          <VIS.TrapProblem
            id="nf-q5"
            difficulty="hard"
            mode="single"
            title="A single dashboard number for personalization narrowing."
            scenario={<>The exec team wants one metric they can read on Monday and decide if the feed is over-concentrating per user.</>}
            options={[
              {key:"a", text:"Average count of unique publishers served per user across a 7-day window.", correct:false},
              {key:"b", text:"Population-level Herfindahl index on publisher exposure across all users.", correct:false},
              {key:"c", text:"Total publishers active on the platform during the past 7 days.", correct:false},
              {key:"d", text:"Mean of per-user publisher Herfindahl indices, computed within each user's 7-day feed.", correct:true},
            ]}
            trap={<>(a) is monotonic in volume — power users always look diverse. (b) is the global Gini and is satisfied by giving each user 100% of one publisher and varying the publisher across users (per-user bubble, global diversity). (d) is a supply metric, not a personalization metric. (c) measures whether any given user's feed is concentrated, which is what "filter bubble" means.</>}
            lens={<>Diversity is per-user, not global. Global metrics paper over per-user bubbles.</>}
            stretch={<>How does this metric interact with the diversity λ in MMR?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-data" title="Trap drills — Data collection">

          <VIS.TrapProblem
            id="nf-q6"
            difficulty="hard"
            mode="single"
            title="Logging the impressions."
            scenario={<>You need to build labeled training rows from served pages.</>}
            options={[
              {key:"a", text:"Log only items the user engaged with; non-engaged items are noise.", correct:false},
              {key:"b", text:"Log every impression with slot position and feature snapshot; join with engagement events downstream.", correct:true},
              {key:"c", text:"Log only the top-10 slots; below that, engagement is too rare to matter.", correct:false},
              {key:"d", text:"Log only sessions longer than 30 seconds to filter casual visits.", correct:false},
            ]}
            trap={<>(a) gives you no negatives — the model learns "everything is engaging." (c) introduces selection bias on slot. (d) drops the cold-start signal and biases toward power users. (b) is the standard pattern: log everything served, join with engagement, downsample negatives at train time if needed.</>}
            lens={<>Negatives come from the impression log, not from the absence of engagement events. Position and slot are mandatory features for debiasing.</>}
            stretch={<>If you must downsample for storage, do you downsample impressions or engagement events?</>}
          />

          <VIS.TrapProblem
            id="nf-q7"
            difficulty="hard"
            mode="single"
            title="Negative sampling for L1 retrieval training."
            scenario={<>You train the two-tower with positives (clicks) and need negatives.</>}
            options={[
              {key:"a", text:"Sample random items from the full catalog; this gives broad coverage of the embedding space.", correct:false},
              {key:"b", text:"Use only in-batch negatives drawn from other users' positive items in the same batch.", correct:false},
              {key:"c", text:"Mix in-batch negatives with hard negatives mined from the served-but-not-engaged slate.", correct:true},
              {key:"d", text:"Use only items the user explicitly hid as negatives, since hides are the highest-signal label.", correct:false},
            ]}
            trap={<>(a) gives easy negatives; the model learns trivial decision boundaries. (b) alone produces "sampled softmax" with selection bias toward popular items. (d) over-indexes on a tiny, biased slice. (c) is the production pattern at Meta/YouTube: in-batch for cheap volume, hard negatives from the served-but-not-engaged slate for boundary sharpening.</>}
            lens={<>Random negatives teach what the user does not want in general; served-but-not-engaged teach what the user does not want now. Both signals are needed.</>}
            stretch={<>What's the failure mode if you only use served-but-not-engaged as negatives?</>}
          />

          <VIS.TrapProblem
            id="nf-q8"
            difficulty="hard"
            mode="single"
            title="Position bias correction."
            scenario={<>Clicks on slot 1 are 10x clicks on slot 20. The L2 model treats this as a relevance gap.</>}
            options={[
              {key:"a", text:"Add slot position as a feature; the model will learn to discount it during training.", correct:false},
              {key:"b", text:"Inverse-propensity weight with propensities estimated from a 1% position-randomization treatment.", correct:true},
              {key:"c", text:"Drop the top-3 slots from the training data so the position effect is removed.", correct:false},
              {key:"d", text:"Split into two specialist models: one trained on top-3 slots, one on rest-of-page slots.", correct:false},
            ]}
            trap={<>(a) bakes the bias in: at serving time the model has no slot info, so it leaks the bias through correlated features. (c) throws away the strongest signal. (d) doubles maintenance and still suffers from in-bucket position bias. (b) gives an unbiased gradient — math in §3f.</>}
            lens={<>Position bias is a confound between observation probability and engagement probability. You can only break it by randomizing position on a slice of traffic.</>}
            stretch={<>Why can't you just learn the position propensity from organic traffic?</>}
          />

          <VIS.TrapProblem
            id="nf-q9"
            difficulty="medium"
            mode="single"
            title="Label freshness for hourly L2 retrains."
            scenario={<>Engagement events arrive with a long tail (some shares come hours later).</>}
            options={[
              {key:"a", text:"Hold each impression for a 24-hour window so every late engagement event is captured before labeling.", correct:false},
              {key:"b", text:"Restrict the model to click events only, since clicks arrive within seconds and the join is exact.", correct:false},
              {key:"c", text:"Close the join window at 1 hour, accept the late-event undercount, retrain hourly on the closed window.", correct:true},
              {key:"d", text:"Skip the retrain whenever the join window is incomplete to avoid biased gradients.", correct:false},
            ]}
            trap={<>(a) makes the training data 24 hours stale — the model can't react to today's trending items. (c) discards 80% of the engagement value (shares, comments, dwell). (d) breaks the hourly cadence. (b) is the standard tradeoff: short window for freshness, accept that late events miss the cut, and remember the bias when reading offline AUC.</>}
            lens={<>Freshness vs completeness is a window-size tradeoff. Short windows beat long windows because feed model decay is faster than label decay.</>}
            stretch={<>How would you correct for the late-event undercount in your offline evaluation?</>}
          />

          <VIS.TrapProblem
            id="nf-q10"
            difficulty="hard"
            mode="single"
            title="Dwell as a satisfaction proxy."
            scenario={<>Your L2 has a strong pDwell head. Senior reviewers complain the feed feels worse this quarter.</>}
            options={[
              {key:"a", text:"Raise the pDwell weight to amplify the strongest engagement signal in the model.", correct:false},
              {key:"b", text:"Replace dwell with click-through rate, since CTR is a cleaner positive signal.", correct:false},
              {key:"c", text:"Remove the pDwell head entirely from the multi-task model and retrain.", correct:false},
              {key:"d", text:"Lower pDwell weight, lean on share/comment/hide, validate on a long-cohort retention readout.", correct:true},
            ]}
            trap={<>(a) doubles down on the proxy that is being gamed by clickbait. (c) is even worse — CTR is the canonical clickbait optimizer. (d) loses an informative signal. (b) is the textbook response: reduce reliance on the easily-gamed proxy without discarding it, and validate on the goal metric.</>}
            lens={<>Dwell mismatches satisfaction when content optimizes for dwell. The fix is to weight it down and triangulate with signals that are harder to game (share, hide).</>}
            stretch={<>Which engagement signal is hardest to game by content optimization?</>}
          />

          <VIS.TrapProblem
            id="nf-q11"
            difficulty="medium"
            mode="single"
            title="Logging schema for retrain pipelines."
            scenario={<>Production logs grow to 50 TB/day. Storage cost dominates.</>}
            options={[
              {key:"a", text:"Log the rendered page only; reconstruct features at training time from a feature store.", correct:false},
              {key:"b", text:"Log the model input feature vector at inference time alongside the impression record.", correct:true},
              {key:"c", text:"Log a summary digest and recompute features when needed.", correct:false},
              {key:"d", text:"Drop logging on tail features that have low coverage.", correct:false},
            ]}
            trap={<>(a) introduces train-serve skew: the feature store at training time may differ from what was actually served (e.g., a feature backfill). (c) loses fidelity and re-introduces skew. (d) silently kills the model's coverage on minority slices. (b) is the standard pattern: pay the storage cost for exact reproducibility of what the model saw.</>}
            lens={<>Train-serve skew is the silent feed-model killer. Logging the exact feature vector at inference is the only watertight defense.</>}
            stretch={<>What's the cheapest compression you can apply without breaking reproducibility?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-training" title="Trap drills — Training">

          <VIS.TrapProblem
            id="nf-q12"
            difficulty="hard"
            mode="single"
            title="Multi-task loss balancing."
            scenario={<>Your L2 has 4 heads: dwell, click, comment, share. The dwell head's loss is 100x the share head's loss.</>}
            options={[
              {key:"a", text:"Apply equal weights and let the larger loss dominate the gradient as a strong learning signal.", correct:false},
              {key:"b", text:"Train each head as a fully separate model with its own data slice and parameters.", correct:false},
              {key:"c", text:"Normalize each head by an EMA of its loss magnitude, then weight by downstream business value.", correct:true},
              {key:"d", text:"Keep only the head with the largest loss; the others contribute too little signal to be worth modeling.", correct:false},
            ]}
            trap={<>(a) makes dwell dominate the gradient — share and comment heads underfit. (c) loses the shared-tower parameter savings and the cross-head regularization. (d) silently drops the other heads. (b) is the GradNorm-style fix: normalize loss magnitudes first, then weight by downstream business value.</>}
            lens={<>Equal-weighted multi-task losses are dominated by the head with the largest scale, regardless of its information content.</>}
            stretch={<>What goes wrong if you EMA-normalize and the head magnitudes drift slowly over time?</>}
          />

          <VIS.TrapProblem
            id="nf-q13"
            difficulty="hard"
            mode="single"
            title="Calibration after negative downsampling."
            scenario={<>You downsample negatives 1:100 for training. Production raw scores look high.</>}
            options={[
              {key:"a", text:"Lower the decision threshold on the head until the rate of triggers matches what production expects.", correct:false},
              {key:"b", text:"Switch training to use the full negative set; that removes the sampling bias entirely at the source.", correct:false},
              {key:"c", text:"Apply the closed-form sampling correction, then fit isotonic regression on a held-out unbiased slice.", correct:true},
              {key:"d", text:"Use the raw scores; the relative ranking order is what matters and absolute scale does not.", correct:false},
            ]}
            trap={<>(a) is a hack that breaks score combination across heads. (c) is unaffordable at 10^13 rows/day. (d) is wrong: head blending and ads-blender VCG pricing both require calibrated probabilities. (b) is the textbook two-stage fix — formula in §3g.</>}
            lens={<>Whenever you downsample, you owe the model a recalibration. Skipping it means any downstream consumer that expects probabilities (ad blender, score blender) is silently broken.</>}
            stretch={<>What if w varies per training batch instead of being fixed at 100?</>}
          />

          <VIS.TrapProblem
            id="nf-q14"
            difficulty="hard"
            mode="single"
            title="Where should the diversity objective live."
            scenario={<>An engineer proposes adding a Jaccard-similarity penalty to the L2 training loss to enforce diversity.</>}
            options={[
              {key:"a", text:"Approve: a unified loss for relevance and diversity gives the cleanest end-to-end gradient signal.", correct:false},
              {key:"b", text:"Move it to a post-rank diversifier; diversity is a list-level property that needs the full slate.", correct:true},
              {key:"c", text:"Approve: multi-task losses are flexible enough to absorb any product-level rule the team needs.", correct:false},
              {key:"d", text:"Skip it: the L2 has too few parameters to learn a useful diversity signal in this regime.", correct:false},
            ]}
            trap={<>(a) ignores that L2 scores items independently — it cannot see what else is in the same slate. (c) hand-waves the fundamental issue. (d) is wrong on the wrong dimension. (b) is the senior framing: diversity is a slate property, so it belongs in a post-rank step.</>}
            lens={<>L2 scores items independently. Slate-level properties (diversity, ad cap, civic quota) must live in a stage that sees the slate.</>}
            stretch={<>Could a list-wise L2 (one that scores the slate jointly) absorb diversity? At what cost?</>}
          />

          <VIS.TrapProblem
            id="nf-q15"
            difficulty="medium"
            mode="single"
            title="L1 vs L2 retrain cadence."
            scenario={<>L1 retrains daily, L2 retrains hourly.</>}
            options={[
              {key:"a", text:"L2 retrains hourly because its parameters change less per batch and so converge faster overall.", correct:false},
              {key:"b", text:"Both should retrain on the same cadence for consistency between the retrieval and ranking layers.", correct:false},
              {key:"c", text:"L1 should retrain hourly so it can track trending items as they emerge across the platform.", correct:false},
              {key:"d", text:"L2 retrains hourly to track fresh signals; L1 retrains daily because its embedding tables are huge to push.", correct:true},
            ]}
            trap={<>(a) is backwards. (c) ignores cost asymmetry: L1 has billion-row embedding tables, L2 has a few hundred MB. (d) would burn engineering effort with little quality gain because L1 only narrows the pool — L2 does the fine ranking. (b) is the standard FAANG cadence.</>}
            lens={<>Retrain cadence is set by where the quality knob lives, not by parameter count. The model nearest the user gets the fastest update.</>}
            stretch={<>What if your trending content has a half-life shorter than 1 hour?</>}
          />

          <VIS.TrapProblem
            id="nf-q16"
            difficulty="hard"
            mode="single"
            title="Overfitting on a viral event."
            scenario={<>A celebrity death drives 10x normal traffic to one publisher for 24 hours. Your hourly retrains pick it up.</>}
            options={[
              {key:"a", text:"Let the model adapt freely; tracking the breaking event is the entire point of hourly retraining.", correct:false},
              {key:"b", text:"Cap each publisher's training-row share per batch and clip their per-publisher gradient contribution.", correct:true},
              {key:"c", text:"Pause hourly retrains for the duration of the event so anomalies do not contaminate the parameters.", correct:false},
              {key:"d", text:"Add a manual blocklist for the surging publisher until traffic patterns normalize across the platform.", correct:false},
            ]}
            trap={<>(a) bakes a 24-hour spike into the parameters; recovery takes days. (c) loses the freshness benefit for everything else. (d) doesn't generalize. (b) is the production-standard defense: cap per-publisher influence per training step.</>}
            lens={<>Hourly retrains are vulnerable to short-term anomalies. Per-publisher caps on training-row share are the cheap insurance policy.</>}
            stretch={<>How would this interact with the per-page publisher cap at serving time?</>}
          />

          <VIS.TrapProblem
            id="nf-q17"
            difficulty="medium"
            mode="single"
            title="Regularizing the user-tower embedding."
            scenario={<>User-tower embeddings drift across hourly retrains; the ANN index built last night sees a different embedding space than today's queries.</>}
            options={[
              {key:"a", text:"Rebuild the full ANN index every hour to keep the index space synchronized with the live tower.", correct:false},
              {key:"b", text:"Stop retraining the user-tower and instead update only the item-tower on the hourly cadence.", correct:false},
              {key:"c", text:"Replace dense embeddings with raw user-ID lookups so the retrieval space cannot drift across builds.", correct:false},
              {key:"d", text:"Anchor the user-tower with a regularizer that penalizes drift from the index-time embedding snapshot.", correct:true},
            ]}
            trap={<>(a) costs hours of compute per rebuild and is wasteful. (c) freezes 50% of the model. (d) discards the dense retrieval premise. (b) is the standard trick: a stop-gradient anchor to the index-time embedding, retrained nightly with the index.</>}
            lens={<>ANN-index lifetime drives embedding-stability requirements. The retrieval space and the retraining space must agree.</>}
            stretch={<>What if you rebuild the index every 4 hours — what does the anchor regularizer become?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-monitor" title="Trap drills — Monitoring">

          <VIS.TrapProblem
            id="nf-q18"
            difficulty="hard"
            mode="single"
            title="Detect filter-bubble drift."
            scenario={<>Your retention numbers are flat but you suspect the feed is narrowing.</>}
            options={[
              {key:"a", text:"Track aggregate publisher count served per day across the entire platform population.", correct:false},
              {key:"b", text:"Track total impressions served by the system to gauge whether feed activity is rising or falling.", correct:false},
              {key:"c", text:"Track per-user publisher Herfindahl over a 7-day window and alert on quantile-level drift.", correct:true},
              {key:"d", text:"Track the count of unique items served to the platform within each 24-hour reporting window.", correct:false},
            ]}
            trap={<>(a), (b), (d) are platform-volume metrics — they detect supply shifts, not personalization narrowing. (c) catches the per-user concentration, which is the real filter-bubble signal — math in §3h.</>}
            lens={<>Narrowing happens per-user even when the global supply looks fine. Quantile drift on a per-user concentration metric is the canonical filter-bubble alarm.</>}
            stretch={<>What's the right alerting quantile and threshold?</>}
          />

          <VIS.TrapProblem
            id="nf-q19"
            difficulty="hard"
            mode="single"
            title="Calibration monitoring."
            scenario={<>Your L2's pClick is supposed to be a probability. How do you know it still is in production?</>}
            options={[
              {key:"a", text:"Track the average predicted score over time and alert when it moves beyond a sigma band.", correct:false},
              {key:"b", text:"Track AUC daily; a drop signals that the model is no longer separating positives from negatives.", correct:false},
              {key:"c", text:"Track variance of pCTR predictions across the served slate and watch for unusual spread.", correct:false},
              {key:"d", text:"Track predicted-vs-observed click rate per score decile and alert on per-decile miscalibration.", correct:true},
            ]}
            trap={<>(a) gives a single number that hides per-decile collapse. (b) AUC is rank-invariant — calibration can drift without AUC changing. (c) variance is unrelated to calibration. (d) is the standard reliability-diagram alarm split by score bin.</>}
            lens={<>Calibration is a per-decile property. Aggregate averages can be calibrated while individual deciles are wildly off.</>}
            stretch={<>If your AUC is stable but the top decile is miscalibrated, what is most likely wrong?</>}
          />

          <VIS.TrapProblem
            id="nf-q20"
            difficulty="medium"
            mode="single"
            title="Train-serve skew alarm."
            scenario={<>Offline AUC has held flat for 6 weeks. Production CTR is sliding.</>}
            options={[
              {key:"a", text:"Re-run offline evaluation on a fresher slice; the offline harness is most likely measuring incorrectly.", correct:false},
              {key:"b", text:"Compare per-feature distributions at serving vs training on the same window and alert on population shifts.", correct:true},
              {key:"c", text:"Push a fresh model snapshot under the assumption the current one has gone stale relative to traffic.", correct:false},
              {key:"d", text:"Increase the retrain frequency from hourly to every 15 minutes to catch any creeping drift.", correct:false},
            ]}
            trap={<>(a) wastes a day. (c) and (d) push more of the same skewed pipeline. (b) is the diagnostic: a feature-level distribution shift between training and serving usually points to a feature-store backfill or upstream change.</>}
            lens={<>Offline-online divergence is almost always feature skew. Always have a feature-distribution alarm before you have a model-quality alarm.</>}
            stretch={<>What's the cheapest skew detector — KS test, PSI, or KL?</>}
          />

          <VIS.TrapProblem
            id="nf-q21"
            difficulty="hard"
            mode="single"
            title="Fairness audit cadence."
            scenario={<>Regulators require quarterly fairness reports across publisher classes.</>}
            options={[
              {key:"a", text:"Compute publisher exposure metrics once at quarter-end, just before the regulator report is due.", correct:false},
              {key:"b", text:"Track per-class exposure share on the same dashboard as engagement; snapshot the dashboard for regulators.", correct:true},
              {key:"c", text:"Run a special offline fairness audit job once per quarter that scans the past 90 days of logs.", correct:false},
              {key:"d", text:"Trust the runtime constraint solver to enforce the floors and skip the periodic exposure audit entirely.", correct:false},
            ]}
            trap={<>(a) and (c) discover problems too late. (d) ignores implementation bugs in the constraint code. (b) puts fairness on the same monitoring rail as engagement, with snapshots when needed.</>}
            lens={<>Fairness audits should run on the same daily cadence as engagement audits, not on the regulator's reporting cadence.</>}
            stretch={<>What if a single class is borderline-violating the floor for a single day — alert or wait?</>}
          />

          <VIS.TrapProblem
            id="nf-q22"
            difficulty="hard"
            mode="single"
            title="Clickbait drift detection."
            scenario={<>The L2 starts ranking clickbait higher because pDwell rises and pHide is slow to react.</>}
            options={[
              {key:"a", text:"Have a senior team manually review the weekly top-ranked items and flag suspect content for action.", correct:false},
              {key:"b", text:"Lower the pDwell weight permanently and accept the engagement hit as the cost of avoiding clickbait drift.", correct:false},
              {key:"c", text:"Track the per-head contribution to final score over time; alert when the dwell head's share dominates.", correct:true},
              {key:"d", text:"Train a separate clickbait classifier and subtract its score from the L2 output during ranking.", correct:false},
            ]}
            trap={<>(a) does not scale. (c) discards information without diagnosis. (d) is a separate model with its own labeling problem. (b) is a head-contribution monitor — if dwell-share of the final score balloons, the proxy is being gamed and the head weights need rebalancing.</>}
            lens={<>Track per-head contribution to the final score over time. A shift means the proxy is being optimized against, not the goal.</>}
            stretch={<>How would you instrument per-head contribution without a 10% performance hit?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-gotchas" title="Trap drills — Gotchas">

          <VIS.TrapProblem
            id="nf-q23"
            difficulty="hard"
            mode="single"
            title="Civic-lane starvation."
            scenario={<>You reserve 1 civic slot per 50 items but production civic exposure is at zero on weekends.</>}
            options={[
              {key:"a", text:"Lower the relevance threshold for civic content at the ranker stage so more civic items survive.", correct:false},
              {key:"b", text:"Add a civic-only retrieval path in L0 so the slot reservation always has candidates to fill from.", correct:true},
              {key:"c", text:"Drop the civic-lane requirement; the constraint is misaligned with weekend traffic mix anyway.", correct:false},
              {key:"d", text:"Surface a default civic placeholder when the slot is unfilled so the lane is never empty visually.", correct:false},
            ]}
            trap={<>The lane is downstream of retrieval. If L0 returns no civic candidates (because the user's embedding is far from civic items), no downstream stage can produce them. (b) is the canonical retrieve-then-rank insight: every constraint needs a retrieval guarantee.</>}
            lens={<>Slot-level constraints cannot be honored unless retrieval guarantees the supply. Reserve dedicated retrieval lanes for any constraint that has a hard slot.</>}
            stretch={<>How would you size a civic-only retrieval path?</>}
          />

          <VIS.TrapProblem
            id="nf-q24"
            difficulty="hard"
            mode="single"
            title="Diversity A/B confound."
            scenario={<>You want to A/B the MMR λ. The proposal: train two L2s with different diversity penalties.</>}
            options={[
              {key:"a", text:"Approve as-is; the diversity penalty is built into each model so the comparison is end-to-end.", correct:false},
              {key:"b", text:"Approve but add user-level traffic randomization across the two arms to break selection confounds.", correct:false},
              {key:"c", text:"Approve only if both arms are trained on identical data so the only difference is the penalty term.", correct:false},
              {key:"d", text:"Hold L2 identical across arms and vary λ only in the MMR step; otherwise you compare models, not knobs.", correct:true},
            ]}
            trap={<>Training two L2s introduces dozens of nuisance differences (init, batch order, data freshness). (b) is the textbook clean A/B: vary one knob at a time, hold model constant.</>}
            lens={<>To A/B a constraint, vary the constraint and only the constraint. The model is a shared substrate.</>}
            stretch={<>How would you design the experiment if MMR λ is a function of the user's content history?</>}
          />

          <VIS.TrapProblem
            id="nf-q25"
            difficulty="hard"
            mode="single"
            title="Ads pricing leak into organic ranker."
            scenario={<>An engineer proposes feeding the ad CPM into the L2 score so high-bid ads naturally outrank organic.</>}
            options={[
              {key:"a", text:"Approve; coupling CPM into the score is the simplest way to monetize and produces a unified ranking.", correct:false},
              {key:"b", text:"Hold L2 organic-only and let the ads blender apply CPM-aware pricing in a post-rank stage downstream.", correct:true},
              {key:"c", text:"Approve but scale the CPM contribution logarithmically so high-bid ads don't dominate the top slots.", correct:false},
              {key:"d", text:"Approve but apply the CPM boost only to bids above the platform mean to limit revenue distortion.", correct:false},
            ]}
            trap={<>(a), (c), (d) all couple business pricing into the relevance signal — every CPM change becomes a ranking change. (b) is the production-standard separation: organic L2 ranks for engagement, ads blender prices and blends in a post-rank stage.</>}
            lens={<>Pricing belongs downstream of relevance. Couple them and every revenue lever becomes a model change.</>}
            stretch={<>What if you want ads to compete with organic on quality, not price?</>}
          />

          <VIS.TrapProblem
            id="nf-q26"
            difficulty="hard"
            mode="single"
            title="Cold-start user."
            scenario={<>A brand-new user with no history shows up. Your two-tower has no embedding.</>}
            options={[
              {key:"a", text:"Return a static popular feed of the platform's top items until the user accumulates engagement signal.", correct:false},
              {key:"b", text:"Seed with a demographic-prior embedding from signup metadata; transition to learned after one session.", correct:true},
              {key:"c", text:"Maintain a separate cold-start model with its own architecture trained on first-session signal cohorts.", correct:false},
              {key:"d", text:"Defer the feed render entirely until enough engagement signal has been collected to personalize properly.", correct:false},
            ]}
            trap={<>(a) abandons personalization on the riskiest cohort. (c) doubles maintenance. (d) bricks the product on first login. (b) is the standard trick: use a low-dimensional prior embedding from registration metadata, then transition to the learned embedding as signals accrue.</>}
            lens={<>Cold-start is a curriculum problem: each new signal should move the embedding from prior toward posterior, smoothly.</>}
            stretch={<>How many engagement events before you switch fully to the learned embedding?</>}
          />

          <VIS.TrapProblem
            id="nf-q27"
            difficulty="medium"
            mode="single"
            title="Hot publisher emergency."
            scenario={<>A publisher's content suddenly contains coordinated misinformation. You need them off the feed within minutes.</>}
            options={[
              {key:"a", text:"Train and push a new L2 model with a learned suppression head for the offending publisher signal.", correct:false},
              {key:"b", text:"Apply a hard post-rank policy filter keyed by publisher ID; this is a config push, not a model deploy.", correct:true},
              {key:"c", text:"Wait for the next hourly retrain to dilute the publisher's training-row share gradually over time.", correct:false},
              {key:"d", text:"Reduce the MMR λ globally to spread exposure away from the surging publisher across all surfaces.", correct:false},
            ]}
            trap={<>(a) takes hours. (c) takes hours and still partially serves the content. (d) doesn't remove the content, just spreads it. (b) is the production reality: the post-rank policy filter is a config knob with a few-minute push window.</>}
            lens={<>Operational removals belong in the post-rank policy filter, which is a config push rather than a model deploy.</>}
            stretch={<>What's the audit trail you need for a takedown like this?</>}
          />

          <VIS.TrapProblem
            id="nf-q28"
            difficulty="hard"
            mode="single"
            title="Feature lookup latency tail."
            scenario={<>p99 feature-store lookup is 40 ms — half your latency budget. p50 is 5 ms.</>}
            options={[
              {key:"a", text:"Replicate the feature store closer to the ranker to cut round-trip time on the slow lookups.", correct:false},
              {key:"b", text:"Drop the slow-lookup features from the model so the feature fetch is bounded by the fast features.", correct:false},
              {key:"c", text:"Cache the user vector at session start; fall back to a partial-feature score path when lookup misses p95.", correct:true},
              {key:"d", text:"Raise the latency budget by 30 ms to accommodate the slow path and re-tune downstream SLAs.", correct:false},
            ]}
            trap={<>(a) helps p50, barely moves p99 (tail is usually a coordination effect, not RTT). (c) drops information. (d) is a non-answer. (b) is the standard tail-tolerant design: per-session feature cache plus a degraded-but-fast fallback path so p99 is bounded.</>}
            lens={<>p99 lookup latency cannot be optimized away with more replicas — it has to be hedged with caching and fallback scoring paths.</>}
            stretch={<>How do you ensure the fallback path doesn't silently degrade quality at scale?</>}
          />

          <VIS.TrapProblem
            id="nf-q29"
            difficulty="hard"
            mode="single"
            title="Calibration drift after upstream feature change."
            scenario={<>The data team renames a feature and backfills history. Your L2 calibration goes off the next day.</>}
            options={[
              {key:"a", text:"Roll the L2 back to last week's snapshot until the feature-store team produces a stable backfill plan.", correct:false},
              {key:"b", text:"Re-fit the isotonic calibration on a fresh held-out slice with the new feature; the head stays as-is.", correct:true},
              {key:"c", text:"Retrain the full L2 from scratch on the new schema; calibration drifts mean the head is also stale.", correct:false},
              {key:"d", text:"Disable the renamed feature in the model config so the pipeline ignores the upstream change entirely.", correct:false},
            ]}
            trap={<>(a) loses a week of improvements. (c) is overkill for a calibration drift. (d) loses signal. (b) is the cheap fix: calibration is a thin post-hoc layer that can be rebuilt in minutes.</>}
            lens={<>Calibration drift is fixable without retraining the underlying model. Always separate the calibration layer so you can rebuild it independently.</>}
            stretch={<>When IS retraining the head warranted vs just recalibrating?</>}
          />

          <VIS.TrapProblem
            id="nf-q30"
            difficulty="hard"
            mode="single"
            title="Engagement-event leakage across users."
            scenario={<>Your two-tower training pipeline accidentally lets one user's positive examples appear as negatives in another user's batch.</>}
            options={[
              {key:"a", text:"Treat it as harmless; in-batch negatives are drawn uniformly so the sampling distribution stays balanced.", correct:false},
              {key:"b", text:"Reject any batch where the same item appears as both a positive and negative across different users.", correct:false},
              {key:"c", text:"Diagnose first: cross-user negatives are valid when item-utility is user-specific, otherwise they are noise.", correct:true},
              {key:"d", text:"Promote User A's positive to a positive label for User B too, so the popular item gets the broadest signal.", correct:false},
            ]}
            trap={<>(a) is glib. (c) discards the entire training batch. (d) introduces leakage in the other direction. (b) is the senior framing: it depends on whether item-utility is user-specific. For personalization-heavy domains, it's correct; for popularity-driven items, it injects noise.</>}
            lens={<>Cross-user label sharing depends on whether the relevance signal is fundamentally personal or shared. Both architectures are deployed at FAANG.</>}
            stretch={<>How would you measure whether item utility is more "personal" or "shared" in your data?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>Cascade is the cost knob.</strong> Single-deep on 500 candidates costs 1,600 GPU-years/day. Math: §3a.</li>
            <li><strong>Diversity belongs in a post-rank stage, never in the L2 loss.</strong> A list-level property cannot live in an item-level model. Math: §3c, §3j.</li>
            <li><strong>Calibrate after every weighted-sampling pipeline.</strong> Otherwise head blending and ad-blender VCG pricing are silently broken. Math: §3g.</li>
            <li><strong>Position bias requires randomization.</strong> You cannot estimate propensities from organic traffic alone. Math: §3f.</li>
            <li><strong>Per-user diversity is the real metric.</strong> Global Herfindahl can be flat while every individual feed narrows. Math: §3h.</li>
            <li><strong>Constraint A/B requires a fixed model.</strong> Vary the constraint, not the model. Otherwise nuisance differences confound the read.</li>
            <li><strong>Slot constraints need retrieval guarantees.</strong> A civic-lane reservation is useless if L0 returns no civic candidates.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}
