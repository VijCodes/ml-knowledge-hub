        <VIS.Section id="sec-walk" title="Walking the pipeline">
          <ol>
            <li><strong>Ingest 20ms PCM frames.</strong> Each <VIS.Term def="Frame: a fixed-length window of audio samples processed as one unit. 20ms at 16kHz = 320 samples. The atomic unit for streaming encoders.">frame</VIS.Term> is 320 samples at 16kHz. Streamed over WebRTC/gRPC; per-session sticky.</li>
            <li><strong>VAD gates silence.</strong> Sub-3ms classifier; silent frames skip the encoder entirely. <VIS.Term def="VAD (voice activity detection): tiny classifier that labels each frame speech/non-speech. High-recall operating point preferred — missing speech costs more than wasted compute on silence.">VAD</VIS.Term> runs at high recall to avoid dropping soft speech. <VIS.Equation tex={String.raw`C_{\text{frame}} = C_{\text{VAD}} + p_{\text{speech}} \cdot C_{\text{enc}}`} /></li>
            <li><strong>Optional <VIS.Term def="Noise suppression: front-of-pipeline denoiser (RNNoise, DeepFilterNet). Helps on noisy traffic but over-suppression can treat soft speech as noise; engage conditionally on an SNR estimate.">noise suppression</VIS.Term>.</strong> Engaged for noisy domains (call-center hold music, mobile-in-car). Adds ~5ms. See §3i.</li>
            <li><strong><VIS.Term def="Log-mel frontend: STFT → mel filterbank → log magnitudes → per-utterance mean/variance normalization. The 80-dim feature standard since DeepSpeech.">Log-mel frontend</VIS.Term>.</strong> 80 mel filterbanks, log magnitudes, per-utterance <VIS.Term def="CMVN (cepstral mean and variance normalization): subtracts per-utterance mean and divides by per-utterance std of log-mel features. Reduces channel/speaker variability.">CMVN</VIS.Term>. Standard since 2015.</li>
            <li><strong>Streaming Conformer encoder.</strong> <VIS.Term def="Chunked attention: attention restricted to a fixed-size window of frames (e.g., 80ms) plus bounded left context. Enables streaming while preserving most of the WER of bidirectional attention.">Chunked attention</VIS.Term> with bounded <VIS.Term def="Left context: previously-seen frames the encoder can attend to. In streaming, left context is unbounded in principle but capped in practice for memory.">left context</VIS.Term>; emits frame-level <VIS.Term def="Acoustic embedding: dense vector representation of a frame produced by the encoder. The interface between acoustic front-end and decoder.">acoustic embeddings</VIS.Term> every 20ms. See §3a.</li>
            <li><strong>RNN-T decoder + <VIS.Term def="Beam search: time-synchronous decode that keeps the top-K hypotheses at each step. K=8 typical for ASR; larger beams give diminishing returns and add latency.">beam search</VIS.Term>.</strong> Per-stream <VIS.Term def="KV cache: per-stream stored key/value tensors from the prediction network and any attention layers, accumulating across frames. The dominant per-stream VRAM cost.">KV cache</VIS.Term>. Time-synchronous beam over hypotheses. <VIS.Equation tex={String.raw`O(\text{beam} \cdot |V| \cdot T)`} /> See §3c.</li>
            <li><strong><VIS.Term def="Partial emit: pushes the top-1 hypothesis to the client while the user is still speaking. Stabilized when the top-1 prefix doesn't change for N consecutive frames.">Partial emit</VIS.Term> streamer</strong> pushes the top-1 hypothesis when it stabilizes (no token-change for N frames). p95 first-partial &lt;300ms. See §3b.</li>
            <li><strong>Endpointer</strong> watches a <VIS.Term def="Silence accumulator: running counter of consecutive non-speech frames. Resets on each speech frame; fires endpoint when it crosses τ_end.">silence accumulator</VIS.Term>: if no speech for τ_end ms, declares utterance end. Tuning per product: assistant 400ms, captioning 800ms. See §3e.</li>
            <li><strong>LM rescore</strong> fires at endpoint only. Beam <VIS.Term def="Nbest: the top-N beam hypotheses retained at endpoint for LM rescoring. Typically N=8–32. Wider N gives the LM more variety to choose from but costs rescore compute.">nbest</VIS.Term> → <VIS.Term def="Shallow fusion: log-linear interpolation of acoustic and language model scores at decode time. α·log p_AM + β·log p_LM. Cheap, no joint training required.">shallow fusion</VIS.Term> log-linear with neural LM. Big WER win on domain vocab. <VIS.Equation tex={String.raw`s = \alpha \log p_{\text{AM}} + \beta \log p_{\text{LM}}`} /></li>
            <li><strong>Final emit</strong> sends the rescored top-1 to downstream consumers + the retrain <VIS.Term def="Label bus: streaming pipe of (audio, corrected-transcript) pairs from production used to retrain the model. The closed-loop label source.">label bus</VIS.Term>.</li>
            <li><strong>Retrain loop</strong>: weekly <VIS.Term def="LoRA adapter: low-rank adaptation. Small low-rank matrices added to frozen base-model weights. Cheap to train, easy to roll back, popular for weekly domain refreshes.">LoRA adapter</VIS.Term> on corrected transcripts, quarterly full encoder retrain. See §3g.</li>
            <li><strong>Drift monitor</strong> watches WER on <VIS.Term def="Shadow set: versioned held-out audio sliced by accent/SNR/domain. Replayed against the live model continuously to catch regressions without waiting for human-labeled production traffic.">shadow set</VIS.Term>, RTF on production, partial-emit p95, mel-bin <VIS.Term def="PSI (Population Stability Index): drift metric comparing two distributions (training vs production). PSI > 0.25 commonly triggers alerts on tabular and audio-feature distributions.">PSI</VIS.Term>. See §3h.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. Word error rate (WER)</h3>
          <p>The canonical ASR metric is <VIS.Term def="Edit-distance-normalized error rate: edit distance (Levenshtein) between hypothesis and reference, divided by reference length. The standard ASR scoring rule.">edit-distance-normalized error rate</VIS.Term>:</p>
          <VIS.Equation display={true} tex={String.raw`\text{WER} = \frac{S + D + I}{N}`} />
          <p>where <em>S</em> = substitutions, <em>D</em> = deletions, <em>I</em> = insertions on the aligned hypothesis vs reference of <em>N</em> reference words. WER &gt; 1 is possible (more insertions than reference words — e.g. hallucinations on background music). Always report per-segment WER sliced by accent / SNR / speaker rate — aggregate WER hides the tail.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. Streaming latency budget</h3>
          <p>First-partial-emit latency decomposes as:</p>
          <VIS.Equation display={true} tex={String.raw`T_{\text{partial}} = T_{\text{frame\_wait}} + T_{\text{VAD}} + T_{\text{frontend}} + T_{\text{enc\_chunk}} + T_{\text{decode\_step}} + T_{\text{stabilize}}`} />
          <p>Plugging realistic numbers on an A10: 20 + 3 + 2 + 80 + 15 + 60 = 180ms typical, p95 ≈ 290ms. The dominant term is <strong><VIS.Term def="Encoder chunk wait: time the system must buffer audio before the streaming encoder can run its next attention chunk. The largest fixed cost in the partial-emit budget.">encoder chunk wait</VIS.Term></strong> — Conformer's chunked attention needs 60–80ms of audio before it can emit. Cutting <VIS.Term def="Chunk size: number of frames the streaming encoder processes per attention step. Smaller chunk = lower latency, worse WER; bigger chunk = vice versa.">chunk size</VIS.Term> hurts WER (§3a); raising it blows the SLA.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. RNN-T loss + beam search complexity</h3>
          <p>RNN-T marginalizes over all valid alignments of length-<em>U</em> labels onto <em>T</em> encoder frames:</p>
          <VIS.Equation display={true} tex={String.raw`\mathcal{L}_{\text{RNN-T}} = -\log \sum_{a \in \mathcal{B}^{-1}(y)} \prod_{t,u} p(a_{t,u} \mid x_{1:t}, y_{1:u-1})`} />
          <p>Where <em>B</em> collapses the <VIS.Term def="Blank alignment: an emit-or-stay path through the (T,U) lattice where blank means stay on the same label. RNN-T marginalizes over all such paths via dynamic programming.">blank alignment</VIS.Term> to the label sequence. Beam search at inference is <VIS.Term def="Time-synchronous decoding: beam advances one encoder frame at a time, expanding hypotheses in lockstep. Contrast with label-synchronous decoding in pure attention models.">time-synchronous</VIS.Term>:</p>
          <VIS.Equation display={true} tex={String.raw`\text{cost} = O(\text{beam} \cdot |V| \cdot T)`} />
          <p>With beam=8, |V|=5000, T=300 frames per utterance: 1.2 × 10⁷ ops per stream — cheap compared to the encoder pass. Log-sum-exp pruning keeps numerically stable: <VIS.Equation tex={String.raw`\text{lse}(x_1, \ldots, x_n) = \max_i x_i + \log \sum_i e^{x_i - \max_j x_j}`} />.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. LM shallow-fusion rescoring</h3>
          <p>At endpoint, rescore the nbest beam with a log-linear interpolation:</p>
          <VIS.Equation display={true} tex={String.raw`s(\hat{y} \mid x) = \alpha \log p_{\text{AM}}(\hat{y} \mid x) + \beta \log p_{\text{LM}}(\hat{y}) + \gamma |\hat{y}|`} />
          <p>α, β, γ tuned by grid on a dev set. γ is a length-bonus that offsets the LM's bias toward shorter sequences. Typical wins: 1–3% absolute WER on domain vocabulary (product names, drug names, ticker symbols) the acoustic model under-represents.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. Endpointer threshold tuning</h3>
          <p>Endpointer fires when silence accumulator exceeds τ_end. The cost function trades two errors:</p>
          <VIS.Equation display={true} tex={String.raw`\mathbb{E}[L(\tau)] = \pi_{\text{slow}} \cdot \Pr(\text{cutoff} \mid \tau) \cdot C_{\text{cutoff}} + (1 - \pi_{\text{slow}}) \cdot \mathbb{E}[\Delta T(\tau)] \cdot C_{\text{latency}}`} />
          <p>τ = 200ms: voice-assistant feels snappy, but 8% of elderly callers get cut off mid-sentence. τ = 800ms: nobody is cut off, but every interaction adds 600ms before the LM rescore fires. Product-specific tuning is mandatory — there is no single right number.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. VAD precision-recall tradeoff</h3>
          <p>VAD false-positive = wasted encoder compute on silence. VAD false-negative = speech missed entirely (worse — content is permanently lost). The asymmetric cost forces high-recall operating points:</p>
          <VIS.Equation display={true} tex={String.raw`\tau_{\text{VAD}}^* = \arg\min_\tau \; \pi \cdot (1 - \text{TPR}(\tau)) \cdot C_{\text{miss}} + (1 - \pi) \cdot \text{FPR}(\tau) \cdot C_{\text{wasted}}`} />
          <p>With C_miss ≫ C_wasted (typical 10×), the optimum sits well to the left of the EER point. Most production VADs run at FPR ≈ 20%, TPR ≈ 99%.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Retrain cadence</h3>
          <p>Correction-loop volume per week:</p>
          <VIS.Equation display={true} tex={String.raw`N_{\text{corrected/week}} \approx \rho \cdot \lambda \cdot 7 \cdot 86400`} />
          <p>where ρ is the human-correction fraction. For 1k QPS streams × avg-30s × 5% correction rate, that's ~10k corrected utterances/week — enough for a LoRA adapter on the encoder but not a full retrain. Full retrain every quarter, when a 100k-hour fresh slice has accumulated.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Real-time factor (RTF) and partial-emit drift</h3>
          <p>RTF measures compute per unit audio:</p>
          <VIS.Equation display={true} tex={String.raw`\text{RTF} = \frac{T_{\text{compute}}}{T_{\text{audio}}}`} />
          <p>RTF &lt; 1 is the streaming-feasibility bound; in practice you want RTF &lt; 0.3 to leave headroom for surges. The drift signal is the joint <em>(WER↑, RTF flat, partial-emit-rate↓)</em> — pure WER lift on a shadow set is necessary but not sufficient.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Noise-suppression cost</h3>
          <p>Engaging noise suppression buys WER in noisy domains but costs latency + risks <em>over-suppression</em> (treating soft speech as noise). Net change:</p>
          <VIS.Equation display={true} tex={String.raw`\Delta \text{WER} = \Delta \text{WER}_{\text{noisy}} - p_{\text{soft}} \cdot \Delta \text{WER}_{\text{oversup}}`} />
          <p>On call-center traffic (high noise, mostly adult speakers) net is positive; on home-assistant traffic (kids, whispers) net is often negative. Run noise suppression conditionally on a noise-floor estimator, not unconditionally.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. Streaming vs non-streaming tradeoff</h3>
          <p>A full-utterance attention encoder-decoder typically beats RNN-T by ~1.5% absolute WER but emits only after end-of-speech:</p>
          <VIS.Equation display={true} tex={String.raw`T_{\text{first-token, non-stream}} = T_{\text{utterance}} + T_{\text{decode}} \approx 2{-}5\,\text{s}`} />
          <p>That's a non-starter for live captioning (people want to see text within 300ms). The streaming model loses 1.5% WER and gains 5–10× responsiveness. The right answer depends entirely on the product surface — there is no globally-correct choice.</p>

        </VIS.Section>

        <VIS.Section id="sec-traps" title="Trap drills — design tradeoffs">
          <p style={{color:"#64748b", fontSize:14, marginBottom:14}}>Senior-level production traps across business, data, training, monitoring, and gotchas. Pick the strongest option; reveal the trap explanation.</p>

          <h3 style={{marginTop:18, color:"#1f3a5f"}}>A. Business — latency / accuracy / product fit</h3>

          <VIS.TrapProblem
            id="asr-q1"
            difficulty="hard"
            title="A1 — Picking the north-star metric"
            scenario={<>Leadership asks for one number to report weekly across three products: call-center transcription (post-call), live captioning, and voice-assistant intent. Pick the metric that summarizes whether the ASR stack is healthy.</>}
            options={[
              {key:"a", text:"Aggregate WER averaged across all three product surfaces, weighted by traffic volume."},
              {key:"b", text:"Per-product WER and per-product partial-emit-p95 reported side-by-side; product owners care about different dimensions and a single average hides the regression that matters.", correct:true},
              {key:"c", text:"AUC of the endpointer's silence-vs-speech classifier on the latest shadow set, treated as the headline number weekly."},
              {key:"d", text:"Average real-time-factor across all three products on the shared A10 pool, reported daily as a capacity-and-quality proxy."},
            ]}
            trap={<>(a) collapses three products with different SLAs into one number; a live-captioning latency regression gets masked by good post-call WER. (c) endpointer AUC is a component metric. (d) RTF tracks compute headroom, not transcription quality.</>}
            lens={<>Each product surface has its own dominant axis: post-call transcription cares about WER; live captioning cares about partial-emit latency; voice-assistant cares about endpoint-to-intent latency. A multi-axis dashboard sliced per product is the only honest summary.</>}
            stretch={<>If you had to pick exactly ONE number for an executive readout, which would it be and why?</>}
          />

          <VIS.TrapProblem
            id="asr-q2"
            difficulty="hard"
            title="A2 — Latency budget for live captioning"
            scenario={<>Product wants first-partial &lt;300ms p95. The current Conformer chunk size is 80ms; reducing it to 40ms saves 40ms of chunk-wait but raises WER by 0.6% absolute. Pick the option that captures the right framing.</>}
            options={[
              {key:"a", text:"Reduce chunk size to 40ms — the SLA is a hard product gate and missing it loses users faster than a 0.6% WER bump."},
              {key:"b", text:"Keep chunk size at 80ms — a 0.6% WER regression is permanent across all users while latency only feels bad to a subset."},
              {key:"c", text:"Reduce chunk only on the live-captioning surface via per-surface model variants; preserve the 80ms chunk for post-call transcription where partial-emit latency does not exist as a constraint.", correct:true},
              {key:"d", text:"Reduce chunk to 60ms as a compromise between latency and WER; ship a single global model so the serving stack stays simple."},
            ]}
            trap={<>(a) and (b) are global decisions that ignore product-surface differences. (d) is shape-matching a compromise instead of routing each surface to its own optimum. The cost of two model variants (storage, eval, retrain) is small compared to a permanent regression on either axis.</>}
            lens={<>The same encoder weights can be served with two different chunk sizes — only the inference-time attention mask changes. Two serving configs, one weight checkpoint, two products satisfied.</>}
            stretch={<>What if voice-assistant intent wants an even tighter chunk (≤30ms)? How small can you go before the encoder representation collapses?</>}
          />

          <VIS.TrapProblem
            id="asr-q3"
            difficulty="medium"
            title="A3 — Costing a missed final transcript"
            scenario={<>The endpointer occasionally fails to fire — the user finishes speaking but the system never emits a final transcript. Pick the accounting that captures the cost.</>}
            options={[
              {key:"a", text:"Cost is the compute wasted on the dangling stream until the gRPC connection times out (typically 30s)."},
              {key:"b", text:"Cost is zero on the ASR P&L because the user reconnects and tries again; the dropped utterance is just retry traffic."},
              {key:"c", text:"Cost is the full downstream business action lost — if a voice-assistant utterance never finalizes, the user got no answer; if a call-center transcript never lands, the CRM record is incomplete and the agent's compliance audit fails.", correct:true},
              {key:"d", text:"Cost is bounded by the SLA penalty owed to the contract holder, calculated as a per-minute rebate on the missing minutes of transcription."},
            ]}
            trap={<>(a) measures the wrong thing — compute is cheap compared to a user retrying. (b) treats retries as free; they are not (UX, lost intent, compliance gaps). (d) is a contractual measurement but missed transcripts often cost more than the contractual rebate.</>}
            lens={<>The downstream business action is the right unit. A missing transcript in a call-center compliance setting is a regulatory issue; a missing transcript in a voice-assistant flow is a failed intent and likely a lost session.</>}
            stretch={<>How would you instrument "missed final" detection given the endpointer is the thing that's broken?</>}
          />

          <VIS.TrapProblem
            id="asr-q4"
            difficulty="hard"
            title="A4 — Should ASR errors be corrected by an LLM downstream?"
            scenario={<>A teammate proposes routing the final transcript through a small LLM that fixes obvious ASR errors before downstream consumption. Pick the option that captures the right framing.</>}
            options={[
              {key:"a", text:"Yes — a downstream LLM is cheaper than retraining ASR and can correct most ASR errors using broader context the acoustic model cannot see."},
              {key:"b", text:"Yes for post-call transcription where 100ms of extra latency is acceptable; no for live captioning and voice-assistant where the latency budget is gone before the LLM call returns. Always retain raw ASR for audit/compliance.", correct:true},
              {key:"c", text:"No — an LLM hallucinates plausible-but-wrong corrections and degrades the transcript for compliance use cases."},
              {key:"d", text:"Replace the entire RNN-T+beam stack with a generative LLM that takes log-mel features and emits text directly; this collapses two stages into one."},
            ]}
            trap={<>(a) ignores the latency surfaces. (c) overstates hallucination risk — bounded edit-distance prompts cap the failure mode. (d) is shape-matching a unification that current LLMs cannot do at streaming latency or RTF&lt;1.</>}
            lens={<>Post-hoc LLM correction is a real tool for batch surfaces; it's the wrong tool for streaming. The compliance angle is real — always preserve raw ASR alongside corrected output and log the diff.</>}
            stretch={<>If the downstream LLM corrects a medical drug name from "Lipitor" to "Lipinor", who owns the bug — ASR, LLM, or the correction pipeline?</>}
          />

          <VIS.TrapProblem
            id="asr-q5"
            difficulty="medium"
            title="A5 — SLA for first-partial-emit"
            scenario={<>The product team wants to publish a customer-facing SLA on first-partial latency. Pick the option that captures the right SLA shape.</>}
            options={[
              {key:"a", text:"Mean first-partial latency under 200ms, since the average user experience is what matters for adoption."},
              {key:"b", text:"p95 first-partial latency under 300ms measured from speech-onset (VAD trigger), not from connection open, since long silences before speech aren't the ASR's fault.", correct:true},
              {key:"c", text:"p99 first-partial latency under 200ms, since tail-latency users churn the fastest and the SLA should bind on them."},
              {key:"d", text:"p50 first-partial latency under 100ms, since this is achievable on the current hardware without changes."},
            ]}
            trap={<>(a) mean hides tail issues. (c) p99&lt;200ms is unachievable on current hardware (encoder chunk wait alone is 80ms). (d) p50 is a vanity number that doesn't bind on the experience that hurts.</>}
            lens={<>p95 is the standard latency SLA shape — tight enough to bind on the painful tail, loose enough to be achievable. Measuring from VAD trigger (not connection open) attributes silence to the user, not the system.</>}
            stretch={<>How does the SLA change for code-switch scenarios where VAD fires late on a non-dominant language?</>}
          />

          <h3 style={{marginTop:24, color:"#1f3a5f"}}>B. Data — corpus, accents, code-switching, labels</h3>

          <VIS.TrapProblem
            id="asr-q6"
            difficulty="hard"
            title="B1 — Choosing a training corpus"
            scenario={<>You have budget for one of four corpus expansions. Production WER is 6% on US English, 14% on Indian English, 18% on code-switched Hindi-English. Pick the strongest data investment.</>}
            options={[
              {key:"a", text:"5,000 hours of additional clean read-speech US English to lower the headline 6% WER toward 4%."},
              {key:"b", text:"5,000 hours of Indian-English conversational speech with native-speaker transcription, plus 2,000 hours of code-switched Hindi-English; allocate to where the regression vs target is largest.", correct:true},
              {key:"c", text:"50,000 hours of unlabeled YouTube audio for self-supervised pretraining of the encoder, regardless of language mix."},
              {key:"d", text:"Synthetic TTS-generated data covering the three weakest accents at 10,000 hours each, since TTS scales cheaply."},
            ]}
            trap={<>(a) optimizes the dimension you've already won. (c) generic SSL helps but won't close an accent-specific 8% gap as fast as targeted labeled data. (d) TTS data has known distribution issues — speaker diversity, prosody, channel conditions all collapse compared to real speech.</>}
            lens={<>WER gaps close fastest with labeled in-distribution data for the failure mode. SSL is a multiplier on top of the labeled base, not a substitute. TTS data is a supplement, not a substitute either — collapses on the long tail of speaker variability.</>}
            stretch={<>If the budget were 10× smaller, would you change the allocation?</>}
          />

          <VIS.TrapProblem
            id="asr-q7"
            difficulty="hard"
            title="B2 — Labeling cost vs label noise"
            scenario={<>Three labeling vendors: (1) crowd transcribers at $0.10/min, WER 5%; (2) professional transcribers at $1.20/min, WER 0.5%; (3) ASR-bootstrap then human-corrected at $0.30/min, WER 2%. Pick the option whose use of these sources is right.</>}
            options={[
              {key:"a", text:"Use vendor 1 only — the 5% labeling WER averages out across millions of utterances, and the cost saving funds 10× more data."},
              {key:"b", text:"Use vendor 2 only — clean labels are non-negotiable for an ASR retrain corpus where every transcription error becomes a model error."},
              {key:"c", text:"Bootstrap with vendor 3 for the bulk of the corpus; use vendor 2 for the held-out eval set + a stratified domain-vocabulary subset where label noise costs the most; never use vendor 1 for ASR.", correct:true},
              {key:"d", text:"Use a blend of vendors 1 and 2 weighted by their inverse WER to maximize labeled hours per dollar."},
            ]}
            trap={<>(a) 5% label noise is a hard ceiling — your trained model cannot beat the labels it learned from. (b) is the right shape but blows the budget; you get 10× less data. (d) is naive — vendor 1's noise concentrates in the long tail (rare words, accents) which is exactly where you need labels.</>}
            lens={<>Eval sets need clean labels; training sets can tolerate moderate noise if the noise is unbiased. ASR-bootstrap+correct is the standard tradeoff at scale — the bootstrap reduces human effort 5× without injecting much new bias.</>}
            stretch={<>Why is 5% labeling WER especially toxic for ASR compared to, say, image classification?</>}
          />

          <VIS.TrapProblem
            id="asr-q8"
            difficulty="hard"
            title="B3 — Code-switching coverage"
            scenario={<>Pick the option that correctly describes how to build training coverage for Hindi-English code-switching when most labeled corpora are monolingual.</>}
            options={[
              {key:"a", text:"Concatenate Hindi and English monolingual utterances at the data-loader level so the model sees both languages in the same minibatch; this is equivalent to seeing code-switched audio."},
              {key:"b", text:"Mine genuine code-switched audio from conversational corpora (call-center, social-media) and pay for high-quality transcription with explicit code-switch boundary tagging; supplement with TTS-synthesized switches as a regularizer.", correct:true},
              {key:"c", text:"Train two monolingual models (Hindi-only, English-only) and route per-utterance based on the language router; treat code-switching as a router problem rather than a model problem."},
              {key:"d", text:"Add a language-ID auxiliary head to the encoder and train it on monolingual data; the head will generalize to code-switched audio at inference time."},
            ]}
            trap={<>(a) does not generate code-switch transitions — the model never sees the cross-language acoustic transition. (c) breaks on mid-utterance switches (router fires too late). (d) auxiliary heads don't generalize to a phenomenon never seen in training.</>}
            lens={<>Code-switch is a phenomenon you have to train on directly. Boundary tagging in labels lets the model learn the transition rather than treating it as monolingual chunks separated by a hard cut.</>}
            stretch={<>How does the tokenizer choice (BPE vs unigram vs grapheme) interact with code-switch quality?</>}
          />

          <VIS.TrapProblem
            id="asr-q9"
            difficulty="medium"
            title="B4 — Domain vocabulary coverage"
            scenario={<>Production WER on generic English is 6%, but on pharma call-center traffic the WER on drug names is 35%. Pick the highest-leverage fix.</>}
            options={[
              {key:"a", text:"Retrain the encoder from scratch with a corpus that overrepresents pharma audio, even at the cost of degrading other domains."},
              {key:"b", text:"Add a domain-specific LM trained on pharma text (FDA labels, drug lists) and shallow-fuse during rescore; supplement with a small LoRA adapter on the encoder for acoustic adaptation if WER stays high.", correct:true},
              {key:"c", text:"Build a post-hoc dictionary lookup that fuzzy-matches the top-1 transcript against a drug-name list and replaces high-confidence matches."},
              {key:"d", text:"Raise the beam size from 8 to 64 so more hypotheses survive, improving the chance the correct drug name appears in nbest."},
            ]}
            trap={<>(a) destroys headline WER for one domain win. (c) fuzzy match adds homophone errors (Lipitor / Lipinor / Lipidor). (d) larger beam helps mildly but the missing word usually isn't in the nbest because the acoustic model never saw it.</>}
            lens={<>Domain vocab is the textbook use case for shallow-fusion LM rescoring — cheap, targeted, no encoder retrain required. The LoRA adapter is the next escalation if LM alone doesn't close the gap.</>}
            stretch={<>What text sources are you allowed to use to train the pharma LM under HIPAA?</>}
          />

          <VIS.TrapProblem
            id="asr-q10"
            difficulty="hard"
            title="B5 — Augmentation strategy"
            scenario={<>Pick the augmentation policy whose mix is best aligned with the production failure modes (background noise, distant mic, accent variation).</>}
            options={[
              {key:"a", text:"SpecAugment-only (frequency masking + time masking + time warping) — it's the cheapest, generalizes broadly, and avoids needing a noise corpus."},
              {key:"b", text:"SpecAugment + room-impulse-response convolution + additive noise (MUSAN-style at varied SNRs) + speed perturbation; engage each at independent low probability rather than stacking deterministically.", correct:true},
              {key:"c", text:"Heavy noise-mixing at low SNR (0–5dB) on 100% of training audio so the model becomes maximally noise-robust."},
              {key:"d", text:"Pitch shift + tempo shift to simulate accent variation; skip noise/reverb since the model can learn those from the clean corpus."},
            ]}
            trap={<>(a) SpecAugment helps but doesn't simulate reverb or noise. (c) over-aggressive low-SNR collapses WER on clean traffic. (d) pitch/tempo doesn't simulate accent — accent is a phoneme-realization shift, not a frequency shift.</>}
            lens={<>The augmentation mix should mirror the production noise/channel distribution. Independent low-probability sampling preserves clean-audio behavior while exposing the model to distortions during the steps where they're sampled.</>}
            stretch={<>How would you tune the noise-SNR distribution if production audio has a bimodal SNR (clean studio vs noisy mobile)?</>}
          />

          <h3 style={{marginTop:24, color:"#1f3a5f"}}>C. Training — RNN-T vs CTC vs attention, streaming, regularization</h3>

          <VIS.TrapProblem
            id="asr-q11"
            difficulty="hard"
            title="C1 — RNN-T vs CTC vs attention encoder-decoder"
            scenario={<>You're picking the decoder family for a brand-new streaming ASR system. Pick the option whose tradeoff framing is correct.</>}
            options={[
              {key:"a", text:"Attention encoder-decoder — lowest WER on benchmarks, so any latency cost is worth paying."},
              {key:"b", text:"CTC — simplest loss, fastest training, and the monotonic blank-emit assumption is fine because speech is monotonic."},
              {key:"c", text:"RNN-T — streaming-natural, competitive WER, prediction network conditions on emitted-token history so it captures linguistic dependence that CTC's conditional-independence assumption misses.", correct:true},
              {key:"d", text:"Hybrid CTC-attention — the joint loss is the strongest reported in recent papers, so this should be the default."},
            ]}
            trap={<>(a) breaks streaming (§3j). (b) CTC's conditional independence over tokens hurts WER on long utterances. (d) hybrid CTC-attention is strong for non-streaming offline ASR but the attention branch breaks streaming.</>}
            lens={<>RNN-T is the production-default for streaming ASR for exactly the reason in (c) — it's the cheapest path to streaming + competitive WER. CTC remains useful as a co-training auxiliary on the same encoder.</>}
            stretch={<>What's the WER gap between RNN-T-only and CTC+RNN-T co-training? When does the gain stop being worth the training complexity?</>}
          />

          <VIS.TrapProblem
            id="asr-q12"
            difficulty="hard"
            title="C2 — Chunked attention vs causal attention"
            scenario={<>Pick the option whose reasoning about Conformer streaming attention is correct.</>}
            options={[
              {key:"a", text:"Causal attention (look only at past frames) — strictly streaming, no future leakage, lowest latency. Always the right choice."},
              {key:"b", text:"Chunked attention with bounded left and right context — model sees ~80ms of future per chunk, gaining substantial WER vs pure-causal at the cost of one chunk-size of added latency.", correct:true},
              {key:"c", text:"Full bidirectional attention with a streaming wrapper at inference time that masks future positions; the model gets the benefit of bidirectional training and the streaming property at inference."},
              {key:"d", text:"Use causal attention in early layers and bidirectional in late layers — the early causal layers preserve streaming and the late bidirectional layers add accuracy."},
            ]}
            trap={<>(a) pure-causal sacrifices ~1.5% WER for marginal latency wins; the chunk-size lookahead is usually worth it. (c) train-serve mismatch — bidirectional training does not transfer to causal-mask inference. (d) the bidirectional late layers cannot stream without seeing future frames; the wrapper would block.</>}
            lens={<>Chunked attention is the standard streaming-Conformer compromise: a small fixed lookahead per chunk gives most of the WER of full bidirectional with bounded latency. Pure-causal is reserved for ultra-tight latency surfaces.</>}
            stretch={<>How does chunk size interact with batch efficiency on GPU?</>}
          />

          <VIS.TrapProblem
            id="asr-q13"
            difficulty="hard"
            title="C3 — Label smoothing in RNN-T"
            scenario={<>Pick the option whose treatment of label smoothing in RNN-T training is right.</>}
            options={[
              {key:"a", text:"Apply standard label smoothing ε=0.1 over the full RNN-T joiner output (V+1 tokens including blank), identical to cross-entropy ASR."},
              {key:"b", text:"Apply label smoothing only over non-blank tokens, leaving the blank symbol's probability mass untouched; smoothing the blank degrades the monotonic emit behavior.", correct:true},
              {key:"c", text:"Skip label smoothing entirely; RNN-T's marginalization over alignments already regularizes the output distribution and additional smoothing degrades convergence."},
              {key:"d", text:"Use uniform label smoothing on all tokens but raise ε to 0.3 to compensate for the very large output vocabulary (V≈5000)."},
            ]}
            trap={<>(a) smoothing the blank pushes mass into emitting tokens at frames that should be silent; the emit-rate distribution gets distorted. (c) RNN-T does benefit from smoothing; convergence isn't the problem. (d) ε=0.3 is far too aggressive and washes out the legitimate signal.</>}
            lens={<>RNN-T's blank token is structurally different from a vocabulary token — it's the "no-emit-this-frame" decision. Smoothing it leaks probability into spurious emits. Restricting smoothing to non-blank tokens is the standard fix.</>}
            stretch={<>What's the analogous issue with label smoothing in CTC?</>}
          />

          <VIS.TrapProblem
            id="asr-q14"
            difficulty="hard"
            title="C4 — Knowledge distillation from a non-streaming teacher"
            scenario={<>You have a strong non-streaming attention encoder-decoder teacher (WER 4%) and want to train a streaming RNN-T student. Pick the right distillation setup.</>}
            options={[
              {key:"a", text:"Standard knowledge distillation: minimize KL between student and teacher token-distributions at each output position."},
              {key:"b", text:"Frame-level distillation on encoder hidden states only; do not distill the decoder distributions because they are aligned differently (streaming RNN-T vs non-streaming attention).", correct:true},
              {key:"c", text:"Pseudo-label distillation: have the teacher transcribe unlabeled audio at scale, then train the student on the pseudo-labels as if they were ground truth."},
              {key:"d", text:"Sequence-level distillation by sampling teacher hypotheses and training the student to maximize their likelihood; this aligns the two models' output distributions over sequences."},
            ]}
            trap={<>(a) position-aligned distillation doesn't work — teacher and student emit on different frames. (c) pseudo-labels are useful but they discard the teacher's distribution; you lose the dark-knowledge signal that distillation is meant to capture. (d) sequence-level is fine but expensive and the alignment mismatch still bites.</>}
            lens={<>The cleanest signal that transfers across a streaming/non-streaming gap is at the encoder level (acoustic representation), not the decoder level. Pseudo-labels are a useful supplement but not a substitute for hidden-state distillation.</>}
            stretch={<>What if the teacher's encoder is also non-streaming (bidirectional)? Does hidden-state distillation still work?</>}
          />

          <VIS.TrapProblem
            id="asr-q15"
            difficulty="medium"
            title="C5 — Optimizer choice"
            scenario={<>You're training a 300M Conformer from scratch on 100k hours. Pick the optimizer setup that's standard at this scale.</>}
            options={[
              {key:"a", text:"AdamW with linear warmup over the first 25k steps to peak LR ≈ 1e-3, then inverse-square-root decay; gradient clipping at norm 5.0.", correct:true},
              {key:"b", text:"SGD with Nesterov momentum 0.9, fixed LR 0.1, cosine decay over the full schedule; matches what works for ResNets on ImageNet."},
              {key:"c", text:"LAMB optimizer at very large batch (~32k frames per step) to push hardware utilization, regardless of convergence properties at smaller batch."},
              {key:"d", text:"Lion optimizer with weight decay 0.1; recent papers show Lion beats AdamW on transformer training at all scales."},
            ]}
            trap={<>(b) SGD doesn't work well on the transformer/Conformer family. (c) LAMB at extreme batch sizes hurts ASR convergence; the optimization landscape is sharper than it is for vision. (d) Lion is a recent contender but not yet the production default for ASR; the WER variance vs AdamW is in the noise.</>}
            lens={<>AdamW with warmup-then-inverse-square-root is the production recipe across Whisper, USM, Conformer-CTC, and most internal ASR stacks. Gradient clipping is non-optional — early-training loss spikes will NaN the run otherwise.</>}
            stretch={<>What changes at the 1B+ parameter scale?</>}
          />

          <VIS.TrapProblem
            id="asr-q16"
            difficulty="hard"
            title="C6 — Streaming-aware encoder during training"
            scenario={<>Pick the option whose handling of the streaming/non-streaming train-serve gap is correct.</>}
            options={[
              {key:"a", text:"Train with full bidirectional attention; apply the streaming mask only at inference. The model will gracefully degrade to streaming behavior."},
              {key:"b", text:"Train with the same chunked-attention mask used at inference; the model never sees future frames it won't have at serving time, eliminating train-serve skew on the attention pattern.", correct:true},
              {key:"c", text:"Train with random chunk sizes drawn from a uniform distribution each batch; the model becomes chunk-size invariant and can be served at any chunk."},
              {key:"d", text:"Two-stage training: first phase bidirectional, second phase causal-only fine-tune; the bidirectional pretraining bootstraps representation quality, then the causal fine-tune fixes streaming."},
            ]}
            trap={<>(a) is the classic skew bug; bidirectional-trained models lose 2–4% WER under causal/chunked inference. (c) variable chunk during training is a regularizer but adds variance and is not the default. (d) the bidirectional → causal fine-tune still leaves residual skew.</>}
            lens={<>Train-time attention mask must match serve-time attention mask. This is the streaming-ASR equivalent of "train-serve skew is the most common bug at scale."</>}
            stretch={<>If you must support two chunk sizes at serving (40ms and 80ms), what's the training strategy?</>}
          />

          <h3 style={{marginTop:24, color:"#1f3a5f"}}>D. Monitoring — WER drift, RTF, partial-emit health</h3>

          <VIS.TrapProblem
            id="asr-q17"
            difficulty="hard"
            title="D1 — Detecting WER drift in production"
            scenario={<>You want a continuous WER signal in production. Pick the option whose monitoring design is right.</>}
            options={[
              {key:"a", text:"Have human transcribers correct a sampled subset of production traffic daily; compute WER against the corrections."},
              {key:"b", text:"Versioned shadow eval set sliced by accent / SNR / domain, replayed daily against the live model; combine with online human-correction sampling on a smaller fraction for trend detection.", correct:true},
              {key:"c", text:"Compare the model's confidence scores (softmax entropy) over time; rising entropy means rising WER."},
              {key:"d", text:"Track the difference between top-1 and top-2 beam hypotheses as a self-supervised drift signal; widening gap means the model is more certain and WER is improving."},
            ]}
            trap={<>(a) human-only is too slow and expensive to alert on. (c) and (d) confidence ≠ correctness for ASR — overconfident wrong transcripts are common, especially on hallucinated music/noise.</>}
            lens={<>Held-out shadow sets give you immediate signal with no humans in the loop; online correction sampling catches drift the shadow set doesn't cover. Both are needed.</>}
            stretch={<>How do you build the shadow set without leaking future data into the training corpus?</>}
          />

          <VIS.TrapProblem
            id="asr-q18"
            difficulty="medium"
            title="D2 — Real-time-factor (RTF) alerting"
            scenario={<>Pick the right alerting setup for RTF on a multi-tenant ASR fleet.</>}
            options={[
              {key:"a", text:"Alert when fleet-average RTF exceeds 0.5; this is the canonical capacity threshold."},
              {key:"b", text:"Alert on p95 RTF per language pool with a 0.5 threshold; per-stream tail behavior matters more than fleet-average because one slow stream stalls others on the same GPU.", correct:true},
              {key:"c", text:"Alert only on RTF ≥ 1.0; below 1.0 the system keeps up with real-time and no user is harmed."},
              {key:"d", text:"Alert on RTF variance over the last hour; high variance indicates noisy batching but the mean is sufficient health signal."},
            ]}
            trap={<>(a) fleet-average hides hot pools. (c) waiting for RTF ≥ 1.0 means the queue is already backing up — by the time the alert fires, partials have already breached SLA. (d) variance is interesting but not actionable.</>}
            lens={<>p95 RTF per pool is the canonical alerting shape: it catches tail behavior before the queue depth explodes. 0.5 leaves enough headroom for a 2× burst before SLA breach.</>}
            stretch={<>What's the relationship between RTF tail and partial-emit p95?</>}
          />

          <VIS.TrapProblem
            id="asr-q19"
            difficulty="hard"
            title="D3 — Partial-emit-rate as a leading indicator"
            scenario={<>Pick the option that captures why partial-emit-rate matters as a monitoring signal.</>}
            options={[
              {key:"a", text:"Partial-emit-rate measures throughput; falling rate means GPUs are underutilized and capacity should be reduced to save cost."},
              {key:"b", text:"Partial-emit-rate is a leading indicator of streaming health: it falls before WER or RTF when the encoder stalls, beam search degenerates, or the decoder gets stuck in a low-confidence loop.", correct:true},
              {key:"c", text:"Partial-emit-rate is uncorrelated with model quality; only final-emit WER is the production signal that matters."},
              {key:"d", text:"Partial-emit-rate is a user-experience metric only; engineering monitoring should focus on RTF and GPU utilization instead."},
            ]}
            trap={<>(a) reads the signal backward. (c) ignores that a stuck decoder can produce a final transcript that looks normal but had no partials emitted — the user perceives a freeze. (d) treats engineering and UX as separable; they aren't here.</>}
            lens={<>Falling partial-emit-rate is one of the earliest signals that something is wrong upstream of the final transcript. Page on it; don't wait for WER or RTF to catch up.</>}
            stretch={<>How would you distinguish "decoder stuck" from "user is silent" in the same signal?</>}
          />

          <VIS.TrapProblem
            id="asr-q20"
            difficulty="hard"
            title="D4 — Acoustic-feature drift detection"
            scenario={<>Pick the right approach to detect drift in input audio characteristics.</>}
            options={[
              {key:"a", text:"Track log-mel bin mean and variance per channel over a rolling 24h window; alert on Population Stability Index (PSI) > 0.25 against the training-corpus distribution.", correct:true},
              {key:"b", text:"Track only the audio bitrate and codec mix; mel-bin tracking is too high-dimensional to alert on usefully."},
              {key:"c", text:"Track the SNR estimate per stream and alert when it falls; SNR shift is the main cause of drift in real-world ASR."},
              {key:"d", text:"Compare the FFT magnitude spectrum directly against training data via an L2 distance; this is more sensitive than mel-bin distributions."},
            ]}
            trap={<>(b) misses acoustic drift (room change, mic change). (c) SNR is a useful summary but a single scalar misses bin-specific shifts (e.g. high-frequency cutoff from a new codec). (d) raw FFT is too noisy and varies even within sessions of the same speaker.</>}
            lens={<>Mel-bin PSI is the standard ASR feature-drift signal — coarse enough to be stable, fine enough to catch real channel changes. SNR is a useful complement, not a replacement.</>}
            stretch={<>What PSI threshold would you set for an alert vs a page?</>}
          />

          <VIS.TrapProblem
            id="asr-q21"
            difficulty="medium"
            title="D5 — Train-serve skew on log-mel features"
            scenario={<>WER is 7% offline on the held-out set but 11% in production at launch. Pick the most likely cause to investigate first.</>}
            options={[
              {key:"a", text:"The production audio is from a different speaker population than the held-out set; this is genuine OOD drift, not a bug."},
              {key:"b", text:"The production frontend computes log-mel with a slightly different mel-filter or normalization (e.g. global mean instead of per-utterance) than the training-time frontend; the encoder receives systematically shifted features.", correct:true},
              {key:"c", text:"The production GPU runs FP16 inference while training was BF16; the precision mismatch caused a uniform WER regression."},
              {key:"d", text:"The production beam size is 4 vs 8 at training-time evaluation; smaller beam loses ~4% absolute WER."},
            ]}
            trap={<>(a) is possible but 4% absolute is a big jump for plain OOD. (c) FP16/BF16 differences are usually &lt;0.5% WER. (d) beam-4 vs beam-8 is &lt;1% WER on a competent decoder.</>}
            lens={<>Frontend-config skew is the #1 cause of "offline WER good, production WER bad" launches in ASR. Lock the frontend config in a single shared library used by both training and serving; never re-implement.</>}
            stretch={<>What's the minimal regression test that would catch this before launch?</>}
          />

          <h3 style={{marginTop:24, color:"#1f3a5f"}}>E. Gotchas — homophones, code-switch, music, double-speak</h3>

          <VIS.TrapProblem
            id="asr-q22"
            difficulty="hard"
            title="E1 — Homophone errors in domain vocabulary"
            scenario={<>The model emits "their" where the reference says "there"; in a legal-transcription product these are not interchangeable. Pick the strongest fix.</>}
            options={[
              {key:"a", text:"Increase the beam size so the alternative homophone always appears in nbest, then pick the higher-LM-score variant."},
              {key:"b", text:"Retrain the acoustic encoder on more legal-corpus audio so it learns to disambiguate the homophones acoustically."},
              {key:"c", text:"Shallow-fuse a domain LM trained on legal text during rescoring; the LM picks the contextually-correct homophone using surrounding words.", correct:true},
              {key:"d", text:"Add a post-hoc rule that always replaces 'their' with 'there' in legal-product outputs because 'there' is more frequent in that corpus."},
            ]}
            trap={<>(a) beam already contains both; the issue is which the model picks, not which appears. (b) homophones are acoustically identical — the encoder cannot distinguish them. (d) rule-based replacement makes the opposite error more common.</>}
            lens={<>Homophones are by definition acoustically indistinguishable; only contextual LM evidence can disambiguate. This is the textbook win-case for shallow-fusion LM rescoring.</>}
            stretch={<>What's the analogous fix for near-homophones like "lipitor / lipinor" (drug-name confusion)?</>}
          />

          <VIS.TrapProblem
            id="asr-q23"
            difficulty="hard"
            title="E2 — Hallucinated transcripts on background music"
            scenario={<>The call-center hold-music period generates phantom transcripts like "thank you for listening" that aren't being spoken. Pick the right fix.</>}
            options={[
              {key:"a", text:"Train the encoder on more music data labeled as silence so it learns that music ≠ speech."},
              {key:"b", text:"Tighten the VAD threshold to filter music as silence before it reaches the encoder; supplement with a music-detection auxiliary head that suppresses decoder emits when music is detected.", correct:true},
              {key:"c", text:"Raise the LM weight β at rescoring time so unlikely sequences like 'thank you for listening' get suppressed."},
              {key:"d", text:"Add a confidence threshold on each emitted token and drop tokens with confidence below 0.6."},
            ]}
            trap={<>(a) helps but only at retrain cadence; you need a tactical fix now. (c) the LM thinks 'thank you for listening' is highly likely — that's exactly why it gets emitted. (d) the model is confidently wrong on music hallucinations; confidence thresholding misses them.</>}
            lens={<>Music hallucination is a VAD problem at root — the encoder is being asked to transcribe non-speech. A music-aware gate (either tighter VAD or an explicit music classifier) prevents the encoder from ever generating tokens during music periods.</>}
            stretch={<>What happens with a sung-vocal song where music and speech overlap?</>}
          />

          <VIS.TrapProblem
            id="asr-q24"
            difficulty="hard"
            title="E3 — Two speakers talking over each other"
            scenario={<>In conversational call-center traffic, customer and agent occasionally talk over each other for 1–3 seconds. The current model emits garbled overlapping tokens. Pick the right architectural response.</>}
            options={[
              {key:"a", text:"Re-train the ASR model on overlapped-speech audio so it learns to emit both transcripts in sequence."},
              {key:"b", text:"Add upstream speaker diarization / source separation that splits the audio into per-speaker channels; run ASR on each channel independently and merge timestamps downstream.", correct:true},
              {key:"c", text:"Detect overlap via energy in two frequency bands and emit a special [overlap] token, leaving downstream consumers to resolve."},
              {key:"d", text:"Increase the beam size so multi-speaker hypotheses are retained in nbest, then post-process to interleave."},
            ]}
            trap={<>(a) single-channel single-stream ASR cannot emit two simultaneous transcripts — the output format doesn't allow it. (c) the [overlap] token loses content the downstream needs. (d) beam doesn't model two simultaneous speakers as separate hypotheses.</>}
            lens={<>Overlapping speech is a source-separation problem that must be solved upstream of ASR. Diarization + per-channel ASR is the production-default pattern; some recent multi-speaker ASR systems do this jointly but they're not yet mainstream.</>}
            stretch={<>How does this change if the call is already two-channel (one channel per speaker) at the codec level?</>}
          />

          <VIS.TrapProblem
            id="asr-q25"
            difficulty="medium"
            title="E4 — Endpointer cuts off slow speakers"
            scenario={<>Production reports that elderly callers get cut off mid-sentence; endpointer τ_end = 300ms. Pick the response.</>}
            options={[
              {key:"a", text:"Raise τ_end globally to 800ms so nobody gets cut off."},
              {key:"b", text:"Detect speaker-rate features (recent inter-token gap, average phoneme duration) per session and adapt τ_end dynamically — longer threshold for slow speakers, shorter for fast.", correct:true},
              {key:"c", text:"Keep τ_end at 300ms but add a 500ms grace-period after the endpoint fires; if any speech arrives within the grace period, retract the endpoint."},
              {key:"d", text:"Train a separate endpointer model per age group and route based on a voice-age classifier."},
            ]}
            trap={<>(a) adds 500ms to every interaction for everyone. (c) retraction is messy — the LM rescore has already fired, the final transcript has been emitted, and downstream consumers may have already acted. (d) voice-age inference is fragile and ethically fraught.</>}
            lens={<>Dynamic τ_end based on per-session speech-rate features is the standard pattern. It doesn't penalize fast speakers and doesn't cut off slow ones.</>}
            stretch={<>How would you bootstrap the speech-rate estimator in the first few seconds before any tokens have been emitted?</>}
          />

          <VIS.TrapProblem
            id="asr-q26"
            difficulty="hard"
            title="E5 — Mid-utterance code-switching"
            scenario={<>A Hindi-English speaker says "मुझे एक latte चाहिए"; the system transcribes the English word correctly but the Hindi tokens are garbled. Pick the strongest fix.</>}
            options={[
              {key:"a", text:"Train one model per language and route based on the first 500ms of audio; treat code-switching as a router routing decision."},
              {key:"b", text:"Train a single multilingual model with shared encoder and per-language output heads, plus code-switched training data (real + augmented); the shared encoder learns cross-lingual phone representations that handle mid-utterance switches.", correct:true},
              {key:"c", text:"Use the English-only model and treat Hindi tokens as out-of-vocabulary; emit them phonetically transliterated to Latin script."},
              {key:"d", text:"Detect code-switch transitions via a language-ID head and switch decoders mid-utterance; flush the beam at each transition."},
            ]}
            trap={<>(a) per-language routing fires too late for mid-utterance switches. (c) phonetic transliteration loses meaning and breaks downstream NLP. (d) decoder-switching mid-utterance loses the beam state and the prediction-network history; quality collapses.</>}
            lens={<>Multilingual shared-encoder ASR is the production-default for code-switching. The shared encoder lets the model leverage cross-lingual phonetic similarity, and code-switched training data teaches it the transitions.</>}
            stretch={<>What's the right tokenizer for a multilingual code-switched model — language-specific BPE, shared BPE, or grapheme?</>}
          />

          <VIS.TrapProblem
            id="asr-q27"
            difficulty="hard"
            title="E6 — Profanity and content filtering"
            scenario={<>The product team wants profanity masked in the final transcript for live-captioning compliance. Pick the right place in the pipeline.</>}
            options={[
              {key:"a", text:"Train the ASR model to never emit profanity tokens; remove them from the training corpus."},
              {key:"b", text:"Mask profanity in a post-ASR filter on the final transcript, never in the model itself; keep the raw transcript stored for audit and only render the masked version to end users.", correct:true},
              {key:"c", text:"Add a profanity-classifier auxiliary head to the encoder that fires alongside the decoder; suppress emits when it triggers."},
              {key:"d", text:"Train the LM rescorer to down-weight profanity so beam search prefers the non-profane alternative; this is the cleanest contextual fix."},
            ]}
            trap={<>(a) breaks the acoustic model — it cannot represent something it can't emit, and downstream forensics needs the raw transcript. (c) suppressing emits mid-stream desynchronizes the decoder. (d) the alternative is wrong — when the speaker said the word, the correct transcript contains it.</>}
            lens={<>ASR is a faithful-transcription system; content filtering is a separate concern. Mask in a post-processor, keep the raw for audit. This separation also lets policy change without retraining.</>}
            stretch={<>How does this interact with regional language norms (a word that's profane in one variant but neutral in another)?</>}
          />

          <VIS.TrapProblem
            id="asr-q28"
            difficulty="medium"
            title="E7 — Number formatting"
            scenario={<>The model emits "two thousand twenty six" instead of "2026"; downstream voice-assistant intent parsing breaks. Pick the right fix.</>}
            options={[
              {key:"a", text:"Train the ASR model on a corpus where all numbers are written as digits; the model will learn the digit form."},
              {key:"b", text:"Run an inverse-text-normalization (ITN) post-processor after final emit that converts spelled-out numbers, dates, currencies, and addresses into formatted form; keep the raw spelled-out output for audit.", correct:true},
              {key:"c", text:"Add a digit-formatting auxiliary head that fires per utterance and rewrites numbers."},
              {key:"d", text:"Have the LM rescorer prefer hypotheses with digit form; this aligns the beam with the desired output format."},
            ]}
            trap={<>(a) the model speaks the words that were spoken; written-form variation is a downstream concern. (c) per-utterance rewrite is brittle and tangled with the decoder. (d) the LM never sees digit form spoken so it can't prefer it.</>}
            lens={<>ITN is a standard post-ASR stage; it's well-studied, has off-the-shelf libraries (NeMo, WeNet), and keeps ASR focused on its job of faithful transcription. Pair with text-normalization (TN) on the training-data side so the ASR sees consistent spelled-out form.</>}
            stretch={<>How does ITN handle ambiguous cases like "two thousand twenty six" (year vs quantity)?</>}
          />

          <VIS.TrapProblem
            id="asr-q29"
            difficulty="hard"
            title="E8 — Whisper-style backbones vs in-house Conformer"
            scenario={<>A teammate proposes replacing the in-house Conformer with a Whisper-v3 backbone fine-tuned on domain data. Pick the option whose framing of the tradeoff is right.</>}
            options={[
              {key:"a", text:"Whisper is non-streaming by design; it transcribes 30-second chunks at a time. Adopting it breaks the streaming SLA and is a non-starter for live-captioning and voice-assistant surfaces; it may be useful as a non-streaming offline transcriber for post-call.", correct:true},
              {key:"b", text:"Whisper-v3 has lower WER than the in-house Conformer; adopting it across all surfaces is strictly better even at slightly higher latency."},
              {key:"c", text:"Whisper is open-weight; replacing the in-house model saves training cost and the WER difference is acceptable for all product surfaces."},
              {key:"d", text:"Fine-tune Whisper-v3 on the domain corpus, then distill into a streaming RNN-T student; this gets the best of both worlds with no architectural change downstream."},
            ]}
            trap={<>(b) and (c) ignore Whisper's 30-second-chunk architecture. (d) is a genuinely interesting strategy but is a multi-quarter project, not a one-step replacement.</>}
            lens={<>Whisper is excellent for non-streaming offline ASR (podcasts, post-call, captioning of recorded content). It is not a drop-in replacement for streaming systems. Knowing which architectures fit which product surfaces is the senior-level skill here.</>}
            stretch={<>Could you adapt Whisper to stream via overlapping windowed decoding? What are the failure modes?</>}
          />

          <VIS.TrapProblem
            id="asr-q30"
            difficulty="hard"
            title="E9 — Speaker accent regression after retrain"
            scenario={<>After a weekly retrain, headline WER drops from 7.2% to 6.8% but Indian-English WER rises from 14% to 16%. Pick the right response.</>}
            options={[
              {key:"a", text:"Ship — headline WER improved and that's the metric that's tracked at the leadership level."},
              {key:"b", text:"Roll back — any regression on a tracked subgroup blocks the release regardless of headline gains; investigate the data mix and try again.", correct:true},
              {key:"c", text:"Ship behind a feature flag and let the regression surface in production telemetry over a week before deciding."},
              {key:"d", text:"Ship and add a downstream LLM correction layer specifically for Indian-English transcripts to compensate for the regression."},
            ]}
            trap={<>(a) violates per-segment-WER governance; the headline win was bought by a subgroup loss. (c) "let it ride in production" loses real users on the regressed segment. (d) adds a band-aid for a controllable upstream issue.</>}
            lens={<>Per-segment-WER governance is the senior-MLE discipline that catches "headline-up subgroup-down" regressions. If a tracked subgroup regresses, you don't ship — you investigate the data mix or training schedule and try again.</>}
            stretch={<>What's the right way to weight subgroup vs aggregate metrics when they conflict?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Non-streaming — emit only after utterance ends."</strong> Lower WER but breaks the partial-emit SLA. Wrong shape for live captioning / voice assistant. Math: §3j.</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>Train-time attention mask must match serve-time.</strong> Bidirectional-trained models lose 2–4% WER under causal/chunked inference. See §3a / asr-q16.</li>
            <li><strong>Frontend config is the #1 launch bug source.</strong> Lock log-mel parameters in a shared library across train + serve. See asr-q21.</li>
            <li><strong>Endpointer tuning is product-specific.</strong> No single τ_end is correct across captioning, assistant, and post-call. Math: §3e.</li>
            <li><strong>Per-segment WER trumps aggregate WER.</strong> A headline-up subgroup-down regression should block the release. See asr-q30.</li>
            <li><strong>Music + non-speech kill ASR via hallucinations.</strong> VAD + music-detect gate is non-optional. See asr-q23.</li>
            <li><strong>Code-switching is a training-data problem, not a routing problem.</strong> Need genuine code-switched audio with boundary tags. See asr-q8, asr-q26.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}

    </VIS.Section>
  </main>
