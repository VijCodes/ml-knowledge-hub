        <VIS.Section id="sec-walk" title="Walking the design">
          <ol>
            <li><strong>Signup arrives with zero behavioral signal.</strong> The only features are demographics (age-bucket, locale, language) and signup channel (organic, paid-ad, referral). These prime a popularity baseline conditioned on the prior: <VIS.Equation tex={String.raw`p(\text{item}\mid u_{\text{new}}) \approx p(\text{item}\mid \text{locale}, \text{channel})`} />.</li>
            <li><strong>Interest-elicitation widget</strong> asks the user to pick 3-5 from a curated grid of interests. Each prompt costs friction (~3-5% drop-off per prompt) but buys information. See §3f for value-of-prompt math.</li>
            <li><strong>Interest→embedding model</strong> maps the explicit picks + demographic prior into a 128-d warm-start embedding compatible with the production two-tower retrieval index. <VIS.Equation tex={String.raw`\hat{u}_0 = f_{\theta}([\text{picks};\text{demo};\text{channel}])`} /></li>
            <li><strong>Thompson sampling bandit</strong> over per-interest-cluster arms picks the next slot. Posterior is wide on day 1 (so it explores), tightens with every impression. See §3b.</li>
            <li><strong>Engagement log bus</strong> closes the loop: each impression updates the bandit's posterior in near-real-time and feeds the weekly retrain.</li>
            <li><strong>Transition logic</strong> retires the onboarding stack once interaction count crosses a threshold AND posterior variance falls below a target. <VIS.Equation tex={String.raw`\text{handoff} \iff N_{\text{int}} \ge N^{*} \;\land\; \mathrm{tr}(\Sigma) \le \sigma^{*}`} />. See §3e.</li>
            <li><strong>Cohort drift monitor</strong> watches new-cohort behavior vs trained-cohort baseline; regression widens exploration via the epsilon schedule.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. Retention-vs-friction tradeoff</h3>
          <p>Expected lifetime retention factorizes through the onboarding funnel:</p>
          <VIS.Equation display={true} tex={String.raw`\mathbb{E}[R] \;=\; p_{\text{signup}} \cdot p_{\text{complete}} \cdot p_{\text{engage}}^{(w1)} \cdot p_{\text{retain}}^{(D7\mid w1)}`} />
          <p>Each interest prompt multiplies the funnel by <VIS.Equation tex={String.raw`(1-\delta)`} /> for some drop-off <VIS.Equation tex={String.raw`\delta \approx 0.03\text{-}0.05`} /> while raising <VIS.Equation tex={String.raw`p_{\text{engage}}^{(w1)}`} /> via a better warm-start. Marginal prompt is worth adding while:</p>
          <VIS.Equation display={true} tex={String.raw`\frac{\partial p_{\text{engage}}}{\partial k} \cdot p_{\text{complete}}^{(k-1)} \;>\; \delta \cdot p_{\text{engage}}^{(k-1)}`} />
          <p>Empirically the curve flattens around 3-5 prompts — past that, friction wins.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. Thompson-sampling posterior update</h3>
          <p>Each interest-cluster arm has a Beta posterior on click probability:</p>
          <VIS.Equation display={true} tex={String.raw`\theta_a \sim \text{Beta}(\alpha_a, \beta_a), \qquad \alpha_a \leftarrow \alpha_a + \text{clicks},\; \beta_a \leftarrow \beta_a + \text{impressions}-\text{clicks}`} />
          <p>At each request, sample one <VIS.Equation tex={String.raw`\tilde{\theta}_a`} /> per arm and pick the argmax. Posterior variance falls as <VIS.Equation tex={String.raw`\mathrm{Var}(\theta_a) = \alpha_a\beta_a/[(\alpha_a+\beta_a)^2(\alpha_a+\beta_a+1)]`} /> — roughly <VIS.Equation tex={String.raw`O(1/n)`} /> in impressions on that arm. The bandit naturally explores wide arms and exploits narrow ones with no hand-tuned epsilon.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. Explore-exploit regret bound (LinUCB)</h3>
          <p>If reward is approximately linear in a d-dimensional context, LinUCB gives a sublinear regret bound:</p>
          <VIS.Equation display={true} tex={String.raw`R_T \;=\; O\!\left(d\sqrt{T \log T}\right)`} />
          <p>Interpretation: per-user cumulative regret over <VIS.Equation tex={String.raw`T`} /> impressions grows much slower than <VIS.Equation tex={String.raw`T`} />. For our 10-20 onboarding slots and d~16 demographic+channel features:</p>
          <VIS.Equation display={true} tex={String.raw`R_{20} \;\lesssim\; 16\sqrt{20 \log 20} \;\approx\; 124\ \text{regret-units}`} />
          <p>Practical implication: even a moderately-context-aware bandit recoups the cost of exploration well within the onboarding window. Thompson with Beta arms is preferred when context features are weak; LinUCB when they're strong.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. Cold-start ramp curve</h3>
          <p>Posterior tightness on the warm-start embedding evolves with interactions:</p>
          <VIS.Equation display={true} tex={String.raw`\Sigma_n \;\approx\; \Sigma_0 \cdot \left(I + \frac{n}{n_0}\right)^{-1}`} />
          <p>For <VIS.Equation tex={String.raw`n_0 \approx 5`} /> (prior strength from interest picks), <VIS.Equation tex={String.raw`\mathrm{tr}(\Sigma_{10}) \approx \mathrm{tr}(\Sigma_0)/3`} />. By <VIS.Equation tex={String.raw`n=20`} />, the embedding has shrunk ~5× — tight enough that the prod two-tower ranker can take over without quality regression.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. Transition threshold (when to stop exploring)</h3>
          <p>The handoff predicate combines a count gate and a variance gate:</p>
          <VIS.Equation display={true} tex={String.raw`\text{handoff} \iff N_{\text{int}} \ge N^{*} \;\land\; \mathrm{tr}(\Sigma) \le \sigma^{*}`} />
          <p>Setting <VIS.Equation tex={String.raw`N^{*}`} /> too low hands off a still-noisy embedding to a ranker that assumes a strong prior — quality regresses. Too high keeps the user on the exploration policy past the point where it pays. Empirical sweet spot lands near <VIS.Equation tex={String.raw`N^{*} \in [10, 20]`} />, but the variance gate is what makes it adaptive to users who sparsely interact.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. Value-of-interest-prompt (mutual information)</h3>
          <p>Each interest prompt is an experiment whose value is the mutual information it provides about the user's eventual steady-state embedding:</p>
          <VIS.Equation display={true} tex={String.raw`I(u_{*} ; \text{pick}_k \mid \text{pick}_{1:k-1}) \;=\; H(u_{*}\mid \text{pick}_{1:k-1}) - H(u_{*}\mid \text{pick}_{1:k})`} />
          <p>For a curated grid of interests chosen to be <em>cluster centroids of the item embedding space</em>, the first 1-2 picks deliver the bulk of the information; the curve flattens after 3-5. The prompt-budget is set where marginal MI equals friction cost:</p>
          <VIS.Equation display={true} tex={String.raw`\frac{\partial I}{\partial k} \;=\; \log\!\left(\frac{1}{1-\delta}\right)`} />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Onboarding-completion metric math</h3>
          <p>The north-star metric is D7 retention conditional on signup; D30 is the long-term proxy.</p>
          <VIS.Equation display={true} tex={String.raw`R_{D7} \;=\; \mathbb{E}[\mathbb{1}\{\text{user opens app on day 7}\} \mid \text{signed up day 0}]`} />
          <p>For a launch with control = popularity-only:</p>
          <VIS.Equation display={true} tex={String.raw`\Delta R_{D7} \;=\; R_{D7}^{(\text{onboarding})} - R_{D7}^{(\text{control})}`} />
          <p>Sample-size for detecting a 2pp lift at <VIS.Equation tex={String.raw`\alpha=0.05, \beta=0.2`} /> with <VIS.Equation tex={String.raw`p\approx 0.30`} />:</p>
          <VIS.Equation display={true} tex={String.raw`n \;\approx\; \frac{2 \cdot p(1-p) \cdot (z_{\alpha/2}+z_{\beta})^2}{(\Delta p)^2} \;\approx\; 4{,}100\ \text{users/arm}`} />
          <p>200k signups/day clears this within a few hours — but the D7 metric itself needs a 7-day wait per cohort.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Retrain cadence + bandit prior refresh</h3>
          <p>The interest→embedding MLP and per-arm priors are retrained weekly on cohort outcomes:</p>
          <VIS.Equation display={true} tex={String.raw`\alpha_a^{(\text{prior})} \leftarrow \bar{r}_a \cdot \kappa, \qquad \beta_a^{(\text{prior})} \leftarrow (1 - \bar{r}_a) \cdot \kappa`} />
          <p>where <VIS.Equation tex={String.raw`\bar{r}_a`} /> is the observed click rate on arm <VIS.Equation tex={String.raw`a`} /> across last week's cohort and <VIS.Equation tex={String.raw`\kappa`} /> is a pseudo-count controlling prior strength. Daily retrain is wasteful (cohort noise); monthly is stale (trend drift); weekly is the equilibrium.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Cohort-regression drift detection</h3>
          <p>Let <VIS.Equation tex={String.raw`p^{(\text{new})}_t`} /> be the new-user-cohort engagement distribution at week t and <VIS.Equation tex={String.raw`p^{(\text{trained})}`} /> the steady-state distribution. Population-stability index:</p>
          <VIS.Equation display={true} tex={String.raw`\text{PSI} \;=\; \sum_i \big(p^{(\text{new})}_i - p^{(\text{trained})}_i\big) \log\!\frac{p^{(\text{new})}_i}{p^{(\text{trained})}_i}`} />
          <p>PSI &gt; 0.25 flags a cohort regression. Common causes: a UI change altered widget completion, a paid-ad campaign brought in an off-distribution cohort, or the popularity table got stale.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. Exploration-starvation failure mode</h3>
          <p>Niche tastes have small priors. Under pure greedy exploitation, they never get pulled because their posterior mean is below the population mean. Thompson naturally protects against this via posterior-width sampling — but only if priors are not over-tightened by the weekly retrain. Stability requires:</p>
          <VIS.Equation display={true} tex={String.raw`\kappa^{(\text{prior})} \;\ll\; n^{(\text{cohort})}`} />
          <p>Otherwise the prior dominates and the bandit collapses to deterministic greedy on the popular arms.</p>

        </VIS.Section>

        <VIS.Section id="sec-traps-bm" title="Trap drills — business metrics">
          <VIS.TrapProblem
            id="nuo-q1"
            difficulty="hard"
            mode="multi"
            title="Which metrics should be on the onboarding scorecard?"
            scenario={<>Each option is a candidate north-star or guardrail metric for the onboarding launch. Pick those that capture lifetime retention without rewarding short-term gimmicks.</>}
            options={[
              {key:"a", text:"D7 retention measured per signup cohort against a holdout control that sees the popularity-only baseline — captures the engagement window where onboarding either compounds or doesn't.", correct:true},
              {key:"b", text:"Click-through rate on the first slate of impressions — proxy mismatch: an aggressive thumbnail wins CTR without moving retention.", correct:false},
              {key:"c", text:"D30 retention as the long-horizon decision metric, accepting the 30-day measurement lag in exchange for catching late-stage churn that D7 misses.", correct:true},
              {key:"d", text:"Time-to-first-engagement (first like / save / follow) as an early indicator that correlates with D7 ahead of the 7-day wait.", correct:true},
              {key:"e", text:"Interest-widget completion rate as a guardrail — flags UI regressions that silently break the whole funnel even when downstream metrics look noisy.", correct:true},
              {key:"f", text:"Total impressions delivered per new user in the first session — more impressions equals more engagement, by construction.", correct:false},
            ]}
            trap={<>
              (b) is the classic proxy-mismatch trap: CTR moves with thumbnail or copy tweaks that have nothing to do with whether the user comes back. (f) is a counted-not-caused metric — total impressions rise when the user is forced through extra slots, not when they actually engage.<br/><br/>
              The correct set pairs a long-horizon outcome metric (D7, D30) with leading indicators (time-to-first-engagement) and a funnel guardrail (widget completion). The combination is what catches both "we're hurting retention" and "we broke the UI and don't know it yet."
            </>}
            lens={<>The scorecard pattern: <strong>one outcome metric far enough out to be honest, one leading indicator to decide before the outcome lands, and one funnel guardrail to catch silent breakage.</strong> Anything that rewards within-session behavior (CTR, impressions, dwell on first item) without tying back to a return visit is a gimmick magnet.</>}
            stretch={<>At 200k signups/day you can power a 2pp D7 lift detection within hours, but the D7 metric itself takes 7 days per cohort. How do you make the launch-decision cycle faster than the metric horizon?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-data" title="Trap drills — data collection">
          <VIS.TrapProblem
            id="nuo-q2"
            difficulty="hard"
            mode="multi"
            title="Which cold-start data choices hold up?"
            scenario={<>Each option is a data-collection or labeling choice for the onboarding stack. Pick those that yield clean signal for the bandit and the interest→embedding model without introducing leakage or bias.</>}
            options={[
              {key:"a", text:"Use signup-channel features (organic vs paid-ad vs referral) as a strong prior — paid-ad cohorts behave measurably differently from organic and the channel is known at t=0 before any interaction.", correct:true},
              {key:"b", text:"Treat first-impression clicks as the engagement label and feed them straight into bandit updates and the weekly retrain — clicks are the cleanest binary signal available.", correct:false},
              {key:"c", text:"Use dwell-time-past-threshold or save/share as the engagement label and demote raw click — clicks reward bait, deeper engagement signals correlate with D7.", correct:true},
              {key:"d", text:"Treat the curated interest grid as a closed set sampled from item embedding cluster centroids so that picks remain interpretable as a linear combination of clusters.", correct:true},
              {key:"e", text:"Use age and gender as features in the warm-start embedding pipeline — they carry signal and the model needs every bit of it during cold start.", correct:false},
              {key:"f", text:"Log the full impression slate (not just clicks) so the bandit can compute unbiased counterfactual reward estimates and the retrain corpus has true exposure denominators.", correct:true},
            ]}
            trap={<>
              (b) is the click-label trap — clicks are correlated with retention but corrupted by bait-y thumbnails and accidental taps. The right label is a deeper engagement signal (dwell, save, share). (e) is the demographic-targeting trap: age and gender carry signal but using them in personalization invites disparate-treatment legal exposure and stereotyping failures. The senior move is to use demographics for the <em>prior</em> (popularity baseline) but not as features in the per-user warm-start.<br/><br/>
              Logging the impression slate (f) is non-negotiable — without exposure denominators, you cannot debias click rates or estimate counterfactual reward.
            </>}
            lens={<>Cold-start data work splits into <strong>signals available at t=0 (channel, locale, device)</strong>, <strong>signals bought via friction (interest picks)</strong>, and <strong>signals earned via interaction (clicks, dwell, save)</strong>. Each has a different bias profile. The senior bug-prevention move: never use protected demographics as a personalization feature; use them only to set the prior.</>}
            stretch={<>Paid-ad cohorts often have worse D7 even with better day-1 engagement. What does that imply for whether to use signup-channel as a feature vs as a cohort-stratifier in the experiment?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-train" title="Trap drills — training">
          <VIS.TrapProblem
            id="nuo-q3"
            difficulty="hard"
            mode="multi"
            title="Which training choices keep the onboarding stack stable?"
            scenario={<>Each option is a training-loop decision for the interest→embedding MLP, the bandit priors, or the transition logic. Pick those that hold up under cohort drift and small-sample noise.</>}
            options={[
              {key:"a", text:"Initialize the warm-start embedding as a weighted sum of cluster-centroid embeddings, weighted by the interest picks — gives the dense ranker a first vector in the same space it expects.", correct:true},
              {key:"b", text:"Set the popularity-prior weight at a fixed value and never decay it through the onboarding session — popularity is the safest default and decaying it introduces variance.", correct:false},
              {key:"c", text:"Decay the popularity-prior weight as a function of interactions-seen, transferring weight from prior to learned posterior so the user is not held hostage to popularity as their signal accumulates.", correct:true},
              {key:"d", text:"Cap the bandit prior pseudo-count kappa so a strong weekly-retrain prior cannot dominate a week's worth of within-session impressions — protects niche-taste exploration.", correct:false},
              {key:"e", text:"Cap the bandit prior pseudo-count well below typical cohort impression counts so the within-session likelihood can override stale priors when an arm is mispriced — protects niche-taste exploration.", correct:true},
              {key:"f", text:"Time the handoff to dense retrieval on a fixed interaction count for every user — predictable behavior, easy to debug.", correct:false},
              {key:"g", text:"Time the handoff using both an interaction count AND a posterior-variance gate so sparse-interactor users do not get prematurely thrown to a ranker that assumes a tight prior.", correct:true},
            ]}
            trap={<>
              (b) is the static-prior trap: a fixed popularity weight is correct at t=0 and wrong by t=10. (d) sounds protective but is the wrong direction — capping <VIS.Equation tex={"\\kappa"} /> isn't the issue; capping it <em>below</em> session impression counts is. The phrasing in (d) doesn't pin that down and the option is wrong as written. (f) is the rigid-handoff trap: users have very different interaction densities, and a fixed N hands off too late for power users and too early for slow ones.
            </>}
            lens={<>Two patterns dominate: <strong>decay-the-prior-with-evidence</strong> and <strong>two-gate-the-transition</strong>. Both are about not letting one stage outlive its usefulness. The bandit prior controls how stale knowledge interacts with fresh — if it's too strong, niche arms starve; if it's too weak, every cohort relearns from scratch.</>}
            stretch={<>A new user opens the app 6 times in week 1 but never clicks anything substantive. By the count gate they qualify for handoff, but the posterior is still wide. What should the system do?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-mon" title="Trap drills — monitoring">
          <VIS.TrapProblem
            id="nuo-q4"
            difficulty="hard"
            mode="multi"
            title="Which monitoring signals would catch onboarding regressing without you noticing?"
            scenario={<>Each option is a monitoring or alerting choice. Pick those that detect onboarding-specific regressions before they show up in the headline D7 number.</>}
            options={[
              {key:"a", text:"Track the new-user-cohort engagement distribution against the trained-cohort baseline weekly using PSI; alert when PSI > 0.25 to catch shifts before D7 lands.", correct:true},
              {key:"b", text:"Alert only when the headline D7 retention drops by more than 1pp week-over-week — the metric that matters is the metric to watch.", correct:false},
              {key:"c", text:"Track interest-widget completion rate per signup-channel cohort, because a UI bug or copy regression often hits one channel disproportionately before showing up in aggregate.", correct:true},
              {key:"d", text:"Track per-bandit-arm exposure share with a floor; alert if any arm's exposure stays below the floor for two consecutive cohorts to catch exploration starvation.", correct:true},
              {key:"e", text:"Track P50 model latency on the interest→embedding service as the primary onboarding health signal — latency drives drop-off and is observable in real time.", correct:false},
              {key:"f", text:"Track posterior-variance distribution at handoff time per cohort; a rightward shift means the system is handing off noisier embeddings to the dense ranker.", correct:true},
            ]}
            trap={<>
              (b) is the lagging-metric trap: by the time aggregate D7 moves a point, you've already shipped a week of regressed cohorts. (e) is the proxy trap: latency matters, but it's a generic service health signal, not an onboarding-quality signal. Plenty of onboarding regressions are latency-clean.<br/><br/>
              The correct set monitors the funnel (widget completion), the policy (exposure share), the embedding quality (posterior variance), and the cohort drift (PSI). Together they catch regressions ahead of the headline.
            </>}
            lens={<>Monitoring rule for time-bounded systems: <strong>your alert horizon must be shorter than your decision horizon.</strong> D7 is too slow to alert on. Funnel completion, exposure share, and posterior tightness are all observable within a session and act as early-warning leading indicators.</>}
            stretch={<>You ship a UI tweak that improves widget completion by 4pp but PSI on the new cohort spikes to 0.30. Both signals are real. Which one wins, and what's the next experiment?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha" title="Trap drills — gotchas">
          <VIS.TrapProblem
            id="nuo-q5"
            difficulty="hard"
            mode="multi"
            title="Which onboarding-specific gotchas are real, and how do they break the system?"
            scenario={<>Each option describes a failure mode that bites onboarding stacks specifically. Pick those that match the math of cold-start + exploration + handoff, and reject the ones that sound plausible but don't actually happen here.</>}
            options={[
              {key:"a", text:"Over-personalizing too early — locking a user into the cluster their first 1-2 clicks suggest before the posterior is wide enough to be wrong about it. Mitigated by widening the exploration policy on day 1.", correct:true},
              {key:"b", text:"Demographic-targeting as a personalization feature creates disparate-treatment risk and stereotyping failures even when correlated with engagement. Mitigation: use demographics only as the popularity prior, not as a per-user feature.", correct:true},
              {key:"c", text:"Niche-taste exploration starvation when the weekly-retrain pseudo-count is so large that within-session evidence cannot move the posterior off the popular arms. Mitigation: cap the pseudo-count below session impression counts.", correct:true},
              {key:"d", text:"Handing off to dense retrieval on a fixed interaction count, regardless of posterior tightness, sends sparse-interactor users into a ranker that assumes a strong prior and underperforms popularity for them. Mitigation: two-gate the transition.", correct:true},
              {key:"e", text:"Serving the global top-50 for everyone is fine because it captures most of the variance — personalization within the onboarding window is a small lift relative to a popularity baseline.", correct:false},
              {key:"f", text:"Withholding personalized recommendations until 100 interactions accumulates enough signal for the dense ranker — the cleanest engineering, and the steady-state model is the highest-quality option.", correct:false},
            ]}
            trap={<>
              (e) and (f) are the two distractor designs from the palette, restated. (e) collapses cohort retention to the popular-cluster mean and forfeits the only window where personalization compounds. (f) abandons the 5-30 day engagement window when 70%+ of churn happens — by interaction 100 most users are already gone.<br/><br/>
              The correct set is the four real gotchas: premature personalization, demographic-feature misuse, exploration starvation, and rigid handoff. Each one has a known mitigation rooted in the math sections above.
            </>}
            lens={<>The unifying theme: <strong>onboarding is the rare ML system where doing nothing personalized loses badly</strong> (because of the engagement window) <strong>and doing too much personalized loses too</strong> (because the signal is too thin to lock in). The right design holds the posterior wide on purpose, then tightens it on evidence.</>}
            stretch={<>If your platform's churn shape is bimodal — most users churn by D1 or stay past D30, with very few in between — does the marginal value of an interest-elicitation prompt go up or down? Why?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Give every new user the global top-50."</strong> Locale- and interest-agnostic top-50 collapses every new cohort to the popular-cluster mean. Math: §3a (warm-start variance), §3f (zero information gain from no elicitation).</li>
            <li><strong>"Wait for 100 interactions before recommending."</strong> Abandons the 5-30 day window when 70%+ of churn happens; D7 retention collapses. Math: §3a.</li>
            <li><strong>LinUCB vs Thompson, loaded together.</strong> Both are valid — LinUCB wins when context features are strong and reward is approximately linear; Thompson wins when context is weak and you need robustness to model misspecification. Picking both as "the bandit" is a confusion of choices, not a stack.</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>The popularity-prior weight must decay with interactions.</strong> A fixed weight is right at t=0 and wrong at t=10. Math: §3d.</li>
            <li><strong>Two-gate the transition</strong> (count AND posterior variance). A fixed count handoff penalizes sparse interactors. Math: §3e.</li>
            <li><strong>Exploration starvation is a prior-pseudocount problem.</strong> Cap <VIS.Equation tex={String.raw`\kappa`} /> well below session impression counts. Math: §3j.</li>
            <li><strong>Demographics in the prior, not the per-user feature.</strong> Disparate-treatment risk + stereotyping failures. Math: §3a (using demographics for <VIS.Equation tex={String.raw`p(\text{item}\mid \text{locale}, \text{channel})`} /> is safe; using them as MLP inputs is not).</li>
            <li><strong>Alert horizon must be shorter than D7.</strong> PSI, widget completion, exposure-share floor, posterior-variance distribution — all observable within a session. Math: §3i.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}
