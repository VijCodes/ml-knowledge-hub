        <VIS.Section id="sec-walk" title="Walking the design">
          <ol>
            <li><strong>Query-type router</strong> classifies modality (text / image / both), detects language, optionally grabs a category hint from the URL. ~5ms. <VIS.Equation tex={String.raw`P(\text{type} \mid q) = \text{softmax}(W_r \phi(q))`} /></li>
            <li><strong>Encoders run in parallel.</strong> For text queries: dense encoder + BM25; for image queries: CLIP image side; for both: fusion produces one query vector. <VIS.Equation tex={String.raw`q_{\text{fused}} = \alpha\,q_{\text{text}} + (1-\alpha)\,q_{\text{img}}`} /></li>
            <li><strong>ANN over shared CLIP space.</strong> Image and text both project to the same 768-d coordinate system because the encoders were trained with InfoNCE alignment. See §3b.</li>
            <li><strong>Hybrid recall.</strong> BM25 ranks merge with dense via Reciprocal Rank Fusion. See §3a.</li>
            <li><strong>Filter cascade.</strong> Category first (cheap prune via index sharding), then facets (price, brand, size). Pre-filter vs post-filter is a recall-vs-latency dial. See §3d.</li>
            <li><strong>Personalization re-rank.</strong> GBDT or two-tower scores top-200 with user features. See §3e.</li>
            <li><strong>Diversify.</strong> MMR avoids 10 near-duplicate SKUs. See §3f.</li>
            <li><strong>Click + dwell logs</strong> feed a retrain loop with position-bias correction; an offline eval pipeline produces nDCG@10 against human + LLM judges; drift monitor watches modality mix and recall@K. See §3g–§3j.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. Hybrid retrieval recall — RRF</h3>
          <p>BM25 score scales are not comparable to dense cosine scores. <VIS.Term def="Reciprocal Rank Fusion. A scale-free way to combine multiple ranked lists: each candidate's fused score is the sum of 1/(k + rank_r) across retrievers. Robust to score-scale differences across BM25, dense, and image rankers.">Reciprocal Rank Fusion</VIS.Term> sidesteps the scale issue by using rank position:</p>
          <VIS.Equation display={true} tex={String.raw`\text{RRF}(d) \;=\; \sum_{r \in \{\text{BM25, dense, image}\}} \frac{1}{k + \text{rank}_r(d)}, \qquad k \approx 60`} />
          <p>An item at rank-5 in BM25 and rank-50 in dense scores higher than an item at rank-1 in just one list — exactly the behaviour you want for <VIS.Term def="Queries that appear fewer than ~10 times per day. By Zipf's law these account for ~50% of total queries but each is individually rare. Dense embeddings often miss them; BM25 catches them because rare tokens are exactly what TF-IDF rewards.">tail queries</VIS.Term> where one channel is weak.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. Shared embedding space — CLIP InfoNCE</h3>
          <p>The text and image encoders are trained jointly with a <VIS.Term def="A loss family that pulls paired (anchor, positive) embeddings together and pushes unpaired (anchor, negative) embeddings apart. The basis for self-supervised representation learning.">contrastive loss</VIS.Term> so that paired (image, caption) embeddings are near each other and unpaired pairs are far. The canonical form is <VIS.Term def="Information Noise-Contrastive Estimation. The CLIP / SimCLR loss: for each anchor, treat the matched positive as the numerator and all other in-batch items as the denominator — a softmax over similarity scores. Larger batches give harder negatives.">InfoNCE</VIS.Term>:</p>
          <VIS.Equation display={true} tex={String.raw`\mathcal{L}_{\text{InfoNCE}} \;=\; -\frac{1}{N}\sum_{i=1}^{N} \log \frac{\exp(\langle u_i, v_i \rangle / \tau)}{\sum_{j=1}^{N} \exp(\langle u_i, v_j \rangle / \tau)}`} />
          <p>After convergence, a text query <VIS.Equation tex={String.raw`u_q`} /> and a candidate product image embedding <VIS.Equation tex={String.raw`v_d`} /> can be compared by <VIS.Term def="The cosine of the angle between two vectors; equal to their dot product after L2-normalization. Standard distance for embedding retrieval because it's scale-invariant.">cosine</VIS.Term> in one shared space — the whole reason this stack can hit one index instead of two.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. Latency-budget arithmetic</h3>
          <p>The p99 budget decomposes additively across serial stages and as the max across parallel stages:</p>
          <VIS.Equation display={true} tex={String.raw`T_{p99} \;=\; T_{\text{route}} + \max(T_{\text{text}}, T_{\text{image}}) + T_{\text{ANN}} + T_{\text{filter}} + T_{\text{rerank}} + T_{\text{render}}`} />
          <p>Plugging in the budget: <VIS.Equation tex={String.raw`5 + 20 + 30 + 5 + 25 + 15 = 100\,\text{ms}`} />. Any stage that exceeds budget steals from another — moving the re-ranker to top-100 saves ~12ms but costs 1–2% nDCG.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. Faceted-filter selectivity</h3>
          <p>Let <VIS.Equation tex={String.raw`s`} /> be the joint <VIS.Term def="The fraction of catalog rows that pass a filter. A facet like 'brand=Nike' might have s=0.02 (2% of products). Joint selectivity multiplies across facets if they're independent.">selectivity</VIS.Term> of all facets (fraction of catalog that passes). With <VIS.Term def="Apply the facet constraint BEFORE the ANN search by restricting which index shards/posting-lists are searched. Fast when selectivity is moderate; risks empty results when selectivity is tiny.">pre-filter</VIS.Term>, ANN searches inside a sub-index of size <VIS.Equation tex={String.raw`sN`} />:</p>
          <VIS.Equation display={true} tex={String.raw`\Pr[\text{empty result}] \;\approx\; (1-s)^{N \cdot \text{recall@K}}`} />
          <p>If facets are rare (<VIS.Equation tex={String.raw`s = 10^{-5}`} />, e.g. "size 14 mens, lime green, leather, under $50"), pre-filter often returns zero. <VIS.Term def="Apply the facet AFTER the ANN search by dropping non-matching items from the top-K. Wastes some recall but never returns zero if any matches exist anywhere in the top-K.">Post-filter</VIS.Term> is safer: search 100M, then drop. Production split: pre-filter on category (high s) + post-filter on rare facets.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. Personalization weight</h3>
          <p>Final score blends a relevance and a personalization head:</p>
          <VIS.Equation display={true} tex={String.raw`s(q, d, u) \;=\; (1-\beta)\,s_{\text{rel}}(q,d) \;+\; \beta\,s_{\text{pers}}(d, u)`} />
          <p>For <VIS.Term def="Queries where the user already knows what they want — usually a model number, exact product name, or unique identifier. Personalization should be ~off; the right answer is the same for everyone.">navigational queries</VIS.Term> (user typed a model number), <VIS.Equation tex={String.raw`\beta \to 0`} /> — they know what they want. For <VIS.Term def="Queries where the user is browsing or shopping for ideas ('sneakers', 'gift for mom'). Personalization helps because user history narrows the relevant subset.">exploratory queries</VIS.Term> ("sneakers"), <VIS.Equation tex={String.raw`\beta`} /> is higher because user-history disambiguates. β is itself a feature, learned per (query-intent, surface).</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. Diversification — MMR</h3>
          <p>Greedy selection of next item <VIS.Equation tex={String.raw`d^{*}`} /> from candidate set C given already-chosen set S:</p>
          <VIS.Equation display={true} tex={String.raw`d^{*} \;=\; \arg\max_{d \in C \setminus S}\;\lambda\,s(q,d) \;-\; (1-\lambda)\,\max_{d' \in S}\,\text{sim}(d, d')`} />
          <p>Where <VIS.Equation tex={String.raw`\text{sim}(d,d')`} /> uses brand + color + image-hash buckets, not raw embedding cosine (which would over-diversify and split close-but-not-duplicate SKUs).</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Position-bias correction</h3>
          <p>Click probability factors as relevance × examination:</p>
          <VIS.Equation display={true} tex={String.raw`P(\text{click} \mid q, d, k) \;=\; P(\text{rel} \mid q, d)\,\cdot\,P(\text{exam} \mid k)`} />
          <p>where <VIS.Equation tex={String.raw`k`} /> is the position. Training the re-ranker on raw clicks teaches it that "position 1 is good" — exactly the <VIS.Term def="The tendency of users to click items shown higher on the page regardless of relevance. A re-ranker trained on raw clicks learns to predict 'high position' rather than 'relevant', so position-bias correction is mandatory for honest training.">position bias</VIS.Term> the production system imposed. Correction: weight each training row by <VIS.Equation tex={String.raw`1/P(\text{exam} \mid k)`} /> estimated via <VIS.Term def="An A/B-style experiment where two ranking policies' results are interleaved into one list and click-through is compared. Used to estimate examination probability per position without an explicit eye-tracking study.">interleaving experiments</VIS.Term>.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Recall vs precision @ K</h3>
          <VIS.Equation display={true} tex={String.raw`\text{Recall@K} \;=\; \frac{|\text{rel} \cap \text{top-K}|}{|\text{rel}|}, \quad \text{Precision@K} \;=\; \frac{|\text{rel} \cap \text{top-K}|}{K}`} />
          <p>Retrieval optimises recall@K (K=500–1000) so the re-ranker has the right items to score. Re-ranking optimises <VIS.Term def="normalized Discounted Cumulative Gain at 10. A ranking quality metric that rewards relevant items appearing earlier in the list, normalized by the best possible ordering. Standard production metric for search ranking.">nDCG@10</VIS.Term> (precision-weighted, position-discounted). Mixing them — e.g., tuning retrieval on nDCG@10 — produces a retriever that's biased toward easy queries.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Head vs tail query distribution</h3>
          <p>Query frequencies follow a <VIS.Term def="A power-law where the r-th most-frequent item has probability proportional to 1/r^α. Common in natural language: a small head of frequent terms and a long tail of rare ones. Search queries follow this distribution.">Zipf law</VIS.Term>:</p>
          <VIS.Equation display={true} tex={String.raw`P(q_r) \;\propto\; \frac{1}{r^{\alpha}}, \qquad \alpha \approx 1`} />
          <p>The top 1% of queries account for ~50% of traffic; the tail ~50% of queries each appear &lt;10×/day. Dense embeddings dominate the <VIS.Term def="The top few percent of queries by frequency. Easy to optimize because there are abundant click logs per query, but covers only a fraction of total user intent.">head</VIS.Term>; BM25 catches tail queries because rare tokens are exactly what <VIS.Term def="Term Frequency × Inverse Document Frequency. Classical text-retrieval weighting: a word counts more if it's frequent in the document and rare in the corpus. BM25 is the production refinement.">TF-IDF</VIS.Term> rewards. Evaluating only on the head hides the tail-quality regression that BM25 ablations cause.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. CTR with position-bias-corrected ranking signal</h3>
          <p>Counterfactual estimator for offline policy evaluation:</p>
          <VIS.Equation display={true} tex={String.raw`\hat{\text{CTR}}(\pi_{\text{new}}) \;=\; \frac{1}{N}\sum_{i=1}^{N} \frac{\pi_{\text{new}}(d_i \mid q_i)}{\pi_{\text{old}}(d_i \mid q_i)}\, c_i`} />
          <p>where <VIS.Equation tex={String.raw`c_i`} /> is the observed click and the ratio is the <VIS.Term def="Inverse Propensity Score. Reweight each logged event by 1 / P(action under logging policy). Removes the bias from off-policy evaluation, at the cost of higher variance when probabilities are tiny.">inverse-propensity weight</VIS.Term>. Without <VIS.Term def="Inverse Propensity Scoring. Same idea as IPS weight: divide by the logging policy's probability of the action, so the expectation equals the on-policy expectation. Used for offline policy evaluation.">IPS</VIS.Term>, an offline replay over logs flatters policies that resemble the logging policy.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Separate stacks for image and text — no shared space."</strong> You can't answer "this color + that shape" because there's no joint coordinate system to add vectors in. Doubles index storage. Math: §3b.</li>
            <li><strong>"No BM25 — neural retrieval handles everything."</strong> Dense embeddings miss exact-token tail queries (model SKUs, niche brand names). Hybrid BM25+dense via RRF is the production pattern. Math: §3a, §3i.</li>
          </ul>
        </VIS.Section>

        {/* ============================================================== */}
        {/* PHASE 5 — Trap drills across 5 axes                            */}
        {/* ============================================================== */}

        <VIS.Section id="sec-traps-business" title="Trap drills — Business metrics">

          <VIS.TrapProblem
            id="mmps-q1"
            difficulty="hard"
            mode="single"
            title="Pick the north-star metric for product search at a 100M-SKU marketplace."
            scenario={<>Leadership wants one headline number that ranks search experiments quarter over quarter.</>}
            options={[
              {key:"a", text:"Search-result CTR on the top-3 slots.", correct:false},
              {key:"b", text:"Add-to-cart-then-purchase rate per search session, with 30-day buyer retention as a guardrail.", correct:true},
              {key:"c", text:"Average dense-embedding cosine between query and clicked product.", correct:false},
              {key:"d", text:"Number of queries served per second at peak.", correct:false},
            ]}
            trap={<>(a) is a proxy: clickbait thumbnails and aggressive ads lift it without lifting purchase. (c) is an internal model metric, not a value metric. (d) is a supply number. (b) ties the metric to the act that generates revenue plus a long-horizon guardrail so optimization can't trade retention for short-term CTR.</>}
            lens={<>Clicks are means; buyers coming back is the end. Most search regressions show up as a CTR lift and a retention dip.</>}
            stretch={<>What surfaces would you add to the guardrail set if the marketplace also runs a B2B side?</>}
          />

          <VIS.TrapProblem
            id="mmps-q2"
            difficulty="medium"
            mode="single"
            title="The PM wants to ship a personalization model that boosts session revenue +6%."
            scenario={<>The model leans heavily on user purchase history. Offline replay shows the +6%.</>}
            options={[
              {key:"a", text:"Ship immediately; revenue lift on offline replay is the signal.", correct:false},
              {key:"b", text:"A/B test live with a randomized holdout and read at the 30-day cohort horizon.", correct:true},
              {key:"c", text:"Move the personalization signal into retrieval rather than re-rank to capture more lift.", correct:false},
              {key:"d", text:"Reject the proposal; personalization always over-fits in production.", correct:false},
            ]}
            trap={<>(a) ignores that offline replay over logs flatters policies similar to the logging policy unless inverse-propensity-weighted. (c) restricts retrieval to items the user already bought — narrows discovery. (d) is an absolutist take. (b) is the canonical online verification with a long-horizon read.</>}
            lens={<>Offline replay over historical logs is biased toward the policy that produced the logs. The truth lives in live traffic at long horizons.</>}
            stretch={<>What if the 30-day cohort effect is flat but revenue is +6%? Do you ship?</>}
          />

          <VIS.TrapProblem
            id="mmps-q3"
            difficulty="hard"
            mode="single"
            title="A vendor pitches replacing the whole stack with a single LLM 'agentic search' layer."
            scenario={<>They claim end-to-end LLM understanding will lift conversion 20%. The LLM call is ~300ms per query.</>}
            options={[
              {key:"a", text:"Replace the stack — the conversion lift dominates the engineering cost.", correct:false},
              {key:"b", text:"Adopt the LLM only as a query-rewrite step in front of the existing retrieval, and gate on the latency budget.", correct:true},
              {key:"c", text:"Reject LLMs in search; they hallucinate product names.", correct:false},
              {key:"d", text:"Use the LLM as the final re-ranker on top-200 candidates.", correct:false},
            ]}
            trap={<>(a) trades a 3× latency regression for an unverified lift, and exposes 1B queries/day to LLM cost. (c) is reflexive. (d) at 300ms blows the budget — top-200 LLM scoring is 60s, not feasible. (b) gives the LLM a narrow, cacheable role (query rewriting) while keeping the latency-sensitive path classical.</>}
            lens={<>LLMs in search live where they are cacheable and offline-able — query rewriting and synthetic-eval generation — not in the per-query critical path.</>}
            stretch={<>How would you cache LLM query rewrites? What's the hit-rate prior for head queries?</>}
          />

          <VIS.TrapProblem
            id="mmps-q4"
            difficulty="hard"
            mode="multi"
            title="Select every claim consistent with conversion as the north star."
            scenario={<>Search is graded on add-to-cart-to-purchase rate with a 30-day buyer-retention guardrail.</>}
            options={[
              {key:"a", text:"Ad slots should be tunable without retraining the re-ranker.", correct:true},
              {key:"b", text:"A 5% CTR lift with flat purchase rate should auto-ship.", correct:false},
              {key:"c", text:"Diversification floor lives in a post-rank product policy, not the model loss.", correct:true},
              {key:"d", text:"Personalization β is a product dial, not a constant baked into training.", correct:true},
              {key:"e", text:"All engagement events (click, add, dwell, purchase) should sum into one label.", correct:false},
              {key:"f", text:"Cohort survival on 30-day retention is part of the standard release gate.", correct:true},
            ]}
            trap={<>(b) is the CTR proxy trap. (e) destroys per-head calibration and prevents independent A/B. The others encode policy-outside-model so the dial moves without a model retrain.</>}
            lens={<>Anything that has to be A/B-tested at product-policy speed must live outside the model. Anything inside the model retrains on weekly cadence.</>}
            stretch={<>Where does seller economics (commission rate) live — inside the model, or post-rank?</>}
          />

          <VIS.TrapProblem
            id="mmps-q5"
            difficulty="medium"
            mode="single"
            title="Diversity vs relevance — pick the per-query metric."
            scenario={<>The team wants one number that flags when top-10 results are over-concentrated on one brand.</>}
            options={[
              {key:"a", text:"Mean number of unique brands across all served sessions in a day.", correct:false},
              {key:"b", text:"Top-10 brand-Herfindahl index averaged across served queries.", correct:true},
              {key:"c", text:"Total brands present in the catalog.", correct:false},
              {key:"d", text:"Average cosine distance between top-10 embeddings per query.", correct:false},
            ]}
            trap={<>(a) is a supply metric. (c) measures catalog, not surface. (d) over-diversifies and splits close-but-not-duplicate SKUs because embedding distance doesn't equal brand difference. (b) measures concentration on the actual displayed slate.</>}
            lens={<>Diversity is a per-query property of the displayed slate, not of the catalog or of population averages.</>}
            stretch={<>How does this metric interact with MMR λ?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-data" title="Trap drills — Data collection">

          <VIS.TrapProblem
            id="mmps-q6"
            difficulty="hard"
            mode="single"
            title="Building training labels for the re-ranker."
            scenario={<>You need positive and negative (query, product) pairs from 1B-impressions/day click logs.</>}
            options={[
              {key:"a", text:"Treat every click as positive, every non-click on the same page as negative.", correct:false},
              {key:"b", text:"Treat clicks weighted by position-examination as positive, treat skipped-above-clicked as hard negatives.", correct:true},
              {key:"c", text:"Use purchases as positives and random in-catalog products as negatives.", correct:false},
              {key:"d", text:"Sample 1% of clicks uniformly to keep the training set small.", correct:false},
            ]}
            trap={<>(a) bakes position bias into the labels. (c) gives mostly easy negatives — the model learns nothing about confusable products. (d) drops tail-query coverage. (b) corrects position bias via examination weights and uses skipped-above-clicked as confusable negatives — the standard production recipe.</>}
            lens={<>Negatives are where the model learns. Random negatives are too easy; impression-non-clicks bias toward position-1 winners.</>}
            stretch={<>How would you decide between skipped-above-clicked vs in-batch negatives?</>}
          />

          <VIS.TrapProblem
            id="mmps-q7"
            difficulty="hard"
            mode="single"
            title="Image queries are 3% of traffic but 30% of high-value ones."
            scenario={<>Your training set is sampled uniformly from clicks. The image-query slice trains poorly.</>}
            options={[
              {key:"a", text:"Live with it — 3% of traffic isn't worth a separate pipeline.", correct:false},
              {key:"b", text:"Stratified-sample to over-represent image queries in the training set; reweight loss back to traffic-proportional only at eval.", correct:true},
              {key:"c", text:"Drop image queries from training entirely; serve them from a separate image-only model.", correct:false},
              {key:"d", text:"Up-weight every click on an image query by 10× in the loss.", correct:false},
            ]}
            trap={<>(a) leaves the high-value slice underserved. (c) re-introduces separate stacks — the very thing the shared-space design avoids. (d) inflates noisy clicks too. (b) is the standard imbalance recipe: oversample for gradient coverage, reweight only at eval to recover true population behaviour.</>}
            lens={<>Sample for gradient quality during training; weight for population fidelity at eval. These are different needs.</>}
            stretch={<>How do you keep the model from over-fitting to the over-sampled slice?</>}
          />

          <VIS.TrapProblem
            id="mmps-q8"
            difficulty="medium"
            mode="single"
            title="Eval set construction with no relevance labels for multimodal queries."
            scenario={<>You have click logs but no human-curated (query, product) relevance grades for image queries.</>}
            options={[
              {key:"a", text:"Skip offline eval; rely on online A/B only.", correct:false},
              {key:"b", text:"Use an LLM-as-judge on a stratified sample plus periodic human-judge audits, calibrated to a small golden set.", correct:true},
              {key:"c", text:"Use the dense-cosine score itself as the relevance label.", correct:false},
              {key:"d", text:"Use purchases as the only label and train on those.", correct:false},
            ]}
            trap={<>(a) leaves you blind between A/B tests, which take weeks. (c) is circular — the model's own embedding scoring itself. (d) gives sparse labels heavy on the head. (b) is the modern pattern: LLM-judge agrees with humans at ~75-85% on relevance grading and lets you score 10⁴+ (query, product) pairs cheaply, calibrated to a small human-graded golden set.</>}
            lens={<>Modern eval is human-grounded golden set, LLM-extrapolated to volume, A/B-validated at the end. Each step is cheaper than the last.</>}
            stretch={<>How would you detect LLM-judge calibration drift?</>}
          />

          <VIS.TrapProblem
            id="mmps-q9"
            difficulty="hard"
            mode="single"
            title="Selecting hard-negative mining for CLIP fine-tune."
            scenario={<>You need hard negatives to fine-tune CLIP on product images so semantically-close-but-different SKUs separate.</>}
            options={[
              {key:"a", text:"Sample random products from the catalog as negatives.", correct:false},
              {key:"b", text:"Mine same-category, similar-attribute products that the current model already places nearby in embedding space.", correct:true},
              {key:"c", text:"Use other items in the same training batch as negatives, no mining.", correct:false},
              {key:"d", text:"Use products the user explicitly disliked (down-vote) as negatives.", correct:false},
            ]}
            trap={<>(a) gives easy negatives — model learns nothing past random. (c) is in-batch and useful but doesn't give you the confusable pairs. (d) is sparse and biased toward power users who actually press down-vote. (b) is the textbook hard-negative recipe: re-mine quarterly as the model improves.</>}
            lens={<>The model learns from the pairs it currently confuses, not from the ones it already separates.</>}
            stretch={<>How often must you re-mine? What signals the mining set has gone stale?</>}
          />

          <VIS.TrapProblem
            id="mmps-q10"
            difficulty="medium"
            mode="single"
            title="Sellers upload product images shot against a white studio backdrop. Buyer queries are phone snaps on a couch."
            scenario={<>Image-query recall is good for studio look-alikes and bad for in-the-wild snaps.</>}
            options={[
              {key:"a", text:"Live with it; image-search is best-effort.", correct:false},
              {key:"b", text:"Augment training pairs by compositing product cutouts onto random real-world backgrounds before fine-tuning.", correct:true},
              {key:"c", text:"Force users to crop their query image to remove backgrounds.", correct:false},
              {key:"d", text:"Add a foreground-segmentation pre-step on every query image and drop the background pixels.", correct:false},
            ]}
            trap={<>(a) leaves a known regression. (c) hurts UX. (d) is a runtime cost on every query and brittle on cluttered scenes. (b) closes the train-serve image-domain gap by exposing the encoder to background variation during training, where it's cheap.</>}
            lens={<>Train-serve skew that can be fixed in training is always cheaper than fixing it at serve time on every query.</>}
            stretch={<>How would you validate the augmentation actually closes the gap?</>}
          />

          <VIS.TrapProblem
            id="mmps-q11"
            difficulty="hard"
            mode="single"
            title="A multilingual catalog has the same SKU listed under titles in 30 languages."
            scenario={<>Buyers search in any language. BM25 over per-language indexes doesn't cross languages.</>}
            options={[
              {key:"a", text:"Maintain 30 separate per-language BM25 indexes and pick by query language.", correct:false},
              {key:"b", text:"Translate every title at index time to a canonical English representation, then index once.", correct:false},
              {key:"c", text:"Use a multilingual dense encoder (LaBSE, multilingual-E5) and keep BM25 only on the user's detected language.", correct:true},
              {key:"d", text:"Drop BM25 entirely; multilingual dense alone covers cross-lingual.", correct:false},
            ]}
            trap={<>(a) breaks cross-language recall. (b) loses linguistic nuance and is brittle on translation errors. (d) loses exact-token tail-query coverage. (c) lets dense carry cross-lingual recall while BM25 handles language-local tail tokens — the production pattern.</>}
            lens={<>Multilingual dense for semantic cross-language, BM25 for in-language token-exactness. Each picks up what the other drops.</>}
            stretch={<>What's the failure mode of LaBSE on low-resource languages?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-training" title="Trap drills — Training">

          <VIS.TrapProblem
            id="mmps-q12"
            difficulty="hard"
            mode="single"
            title="Fine-tuning off-the-shelf CLIP on the product domain."
            scenario={<>Stock CLIP was trained on web image-caption pairs. Your products are 90% apparel and home goods.</>}
            options={[
              {key:"a", text:"Use stock CLIP unchanged; web pretraining covers your domain.", correct:false},
              {key:"b", text:"Fine-tune both towers on (product image, product title+attributes) pairs with InfoNCE and hard-negative mining.", correct:true},
              {key:"c", text:"Replace CLIP with a from-scratch image encoder trained only on product images.", correct:false},
              {key:"d", text:"Freeze the vision tower and fine-tune only the text tower.", correct:false},
            ]}
            trap={<>(a) leaves the domain gap unfixed — CLIP's web pretraining is generic. (c) throws away the strongest prior on the planet. (d) leaves the image side stuck in web-domain coordinates. (b) preserves the pretraining and adapts both sides to the product distribution.</>}
            lens={<>Fine-tune both sides of an aligned model unless you have a reason to fix one. Asymmetric fine-tunes drift the shared space.</>}
            stretch={<>What happens to the original web-image generality after fine-tune?</>}
          />

          <VIS.TrapProblem
            id="mmps-q13"
            difficulty="hard"
            mode="single"
            title="Choosing the InfoNCE temperature τ."
            scenario={<>Lower τ sharpens the softmax; higher τ smooths it.</>}
            options={[
              {key:"a", text:"Use τ = 1 as a neutral default.", correct:false},
              {key:"b", text:"Treat τ as a learnable parameter, initialized at the CLIP-paper default (around 0.07).", correct:true},
              {key:"c", text:"Set τ very small (0.001) to force sharp separation between positives and negatives.", correct:false},
              {key:"d", text:"Anneal τ from 1.0 down to 0 over training.", correct:false},
            ]}
            trap={<>(a) is too smooth — gradients are tiny. (c) collapses the embedding distribution and destabilizes training. (d) is unnecessary mechanism. (b) is what every CLIP-family paper does: τ is learnable so it adapts to the batch's hardest-negative regime.</>}
            lens={<>τ controls the gradient signal's sharpness. Letting the model pick its own τ avoids hand-tuning a hyperparam that depends on batch composition.</>}
            stretch={<>What batch sizes are needed for InfoNCE to be effective?</>}
          />

          <VIS.TrapProblem
            id="mmps-q14"
            difficulty="medium"
            mode="single"
            title="The re-ranker over-fits the head distribution and regresses tail queries."
            scenario={<>nDCG@10 on head queries +3%, on tail -2% after a re-ranker retrain.</>}
            options={[
              {key:"a", text:"Ship — the head dominates traffic so net is positive.", correct:false},
              {key:"b", text:"Stratify the training set by query-frequency bucket and weight buckets equally during gradient steps.", correct:true},
              {key:"c", text:"Train only on tail queries to fix the regression.", correct:false},
              {key:"d", text:"Use a smaller model to reduce over-fitting.", correct:false},
            ]}
            trap={<>(a) ignores that tail queries are where the brand gets built — buyers who can't find the obscure item leave. (c) destroys head performance. (d) reduces expressivity without addressing the imbalance. (b) is the standard recipe: equal gradient share per frequency bucket, then reweight to traffic-proportional at eval.</>}
            lens={<>Long-tail regressions are usually a sampling problem, not a model-capacity problem.</>}
            stretch={<>What's the right number of frequency buckets?</>}
          />

          <VIS.TrapProblem
            id="mmps-q15"
            difficulty="hard"
            mode="single"
            title="Negative sampling strategy for the re-ranker."
            scenario={<>The re-ranker scores (query, product) pairs. You're choosing the negatives.</>}
            options={[
              {key:"a", text:"Use random in-batch products as negatives, scaled by batch size.", correct:false},
              {key:"b", text:"Mix three slices: in-batch negatives, ANN-retrieved hard negatives, and skipped-above-clicked impression negatives.", correct:true},
              {key:"c", text:"Use only ANN-retrieved nearest neighbors as negatives — those are the hardest.", correct:false},
              {key:"d", text:"Use only impression negatives — those are real on-policy data.", correct:false},
            ]}
            trap={<>(a) gives easy negatives, model plateaus. (c) chases hard negatives that may be true positives, training on label noise. (d) inherits the logging-policy's bias. (b) blends easy gradient signal (in-batch), hard discrimination (ANN), and on-policy realism (impression) — the three-source production recipe.</>}
            lens={<>No single negative source covers easy, hard, and on-policy. The mix is the recipe.</>}
            stretch={<>How would you re-balance the mix if eval regresses on confusable-brand queries?</>}
          />

          <VIS.TrapProblem
            id="mmps-q16"
            difficulty="medium"
            mode="single"
            title="Picking the retrain cadence."
            scenario={<>The CLIP encoder, the re-ranker GBDT, and the BM25 vocabulary all change at different speeds.</>}
            options={[
              {key:"a", text:"Retrain everything weekly on the same cadence.", correct:false},
              {key:"b", text:"CLIP quarterly, re-ranker daily, BM25 vocabulary continuous; gate every push on offline + online metrics.", correct:true},
              {key:"c", text:"Continuous training of all three components on a streaming feature store.", correct:false},
              {key:"d", text:"Retrain only when a drift monitor alarms.", correct:false},
            ]}
            trap={<>(a) wastes GPU on CLIP (which is stable) and starves the re-ranker (which depends on fresh click data). (c) destabilizes CLIP's shared space — the index keeps having to be rebuilt. (d) is reactive and causes preventable regressions. (b) matches cadence to the natural data-change rate of each component.</>}
            lens={<>Cadence follows the data-change rate of each component, not the team's release rhythm.</>}
            stretch={<>What signals shorter-than-quarterly CLIP cadence?</>}
          />

          <VIS.TrapProblem
            id="mmps-q17"
            difficulty="hard"
            mode="single"
            title="The personalization re-ranker shows feature-leakage from a future-state column."
            scenario={<>nDCG offline is great. Online A/B shows zero lift.</>}
            options={[
              {key:"a", text:"Ship — offline is the trusted ground truth.", correct:false},
              {key:"b", text:"Audit every feature for label-time leakage via point-in-time joins; rebuild the offline eval with strict temporal cutoffs.", correct:true},
              {key:"c", text:"Add more features to close the offline-online gap.", correct:false},
              {key:"d", text:"Train longer; the model is underfit.", correct:false},
            ]}
            trap={<>(a) ignores the canonical offline-good-online-flat smell. (c) compounds the problem. (d) is unrelated. (b) is the diagnostic — features built without point-in-time correctness leak the label and inflate offline metrics. Real fix lives in the feature pipeline.</>}
            lens={<>Offline-good-online-flat is almost always feature leakage, not model capacity.</>}
            stretch={<>Which features are highest risk for temporal leakage?</>}
          />

          <VIS.TrapProblem
            id="mmps-q18"
            difficulty="hard"
            mode="single"
            title="Distillation of the cross-attention re-ranker into a faster model."
            scenario={<>The cross-attention model is +1.5% nDCG but +15ms latency. You need to recover the latency.</>}
            options={[
              {key:"a", text:"Quantize the cross-attention model to INT8 and accept the 0.3% nDCG drop.", correct:false},
              {key:"b", text:"Distill the cross-attention model into a GBDT or two-tower student with soft-label supervision, deploy the student.", correct:true},
              {key:"c", text:"Reduce the re-rank set from top-200 to top-50.", correct:false},
              {key:"d", text:"Drop the re-ranker entirely; ANN alone is good enough.", correct:false},
            ]}
            trap={<>(a) preserves architecture cost. (c) loses recall coverage. (d) gives back the +1.5%. (b) is the standard distillation play — the student inherits the teacher's preferences without the inference cost.</>}
            lens={<>Distillation moves cost from serve-time to train-time. It only works when the teacher's lift is large enough that the student keeps most of it.</>}
            stretch={<>What student architecture would you pick if the teacher is a 6-layer cross-attention transformer?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-monitor" title="Trap drills — Monitoring">

          <VIS.TrapProblem
            id="mmps-q19"
            difficulty="hard"
            mode="single"
            title="Recall@K on a holdout drops 4% week-over-week with no model change."
            scenario={<>Same model weights, same ANN index. Recall fell.</>}
            options={[
              {key:"a", text:"Recall@K is noisy; wait two more weeks.", correct:false},
              {key:"b", text:"Audit catalog turnover: new SKUs since last reindex are absent from the ANN; trigger an incremental index build.", correct:true},
              {key:"c", text:"Roll back to last week's weights.", correct:false},
              {key:"d", text:"Lower the ANN recall threshold to admit more candidates.", correct:false},
            ]}
            trap={<>(a) lets a real regression compound. (c) doesn't help when weights haven't changed. (d) trades latency for masking. (b) is the diagnostic: 100M-SKU catalogs see 1-5% weekly turnover; the ANN must keep up or recall on new SKUs is zero.</>}
            lens={<>When nothing about the model changed and recall regressed, the data moved — usually the index.</>}
            stretch={<>What incremental-indexing strategy keeps p99 stable during the rebuild?</>}
          />

          <VIS.TrapProblem
            id="mmps-q20"
            difficulty="hard"
            mode="single"
            title="Image-query rate spikes from 3% to 12% of traffic over a week."
            scenario={<>No product launch explains it. Latency is stable. nDCG is stable.</>}
            options={[
              {key:"a", text:"Treat it as noise; image-query is small in absolute terms.", correct:false},
              {key:"b", text:"Investigate: a client-side change (new visual-search button) is shifting query mix, audit if the image-query model is sized for the new load and revisit cache hit rates.", correct:true},
              {key:"c", text:"Rate-limit image queries to the old 3% level.", correct:false},
              {key:"d", text:"Retrain the image encoder on the new mix.", correct:false},
            ]}
            trap={<>(a) misses an upstream behaviour shift. (c) breaks the feature. (d) is premature — the encoder is the same; the mix changed. (b) is the operational diagnostic: large mix shifts almost always trace back to a client UI change and stress different parts of the stack.</>}
            lens={<>Distribution shifts that aren't matched by latency or quality regressions are still infrastructure events. Sizing assumptions break silently.</>}
            stretch={<>What metric would you add to alert on image-query rate shifts faster?</>}
          />

          <VIS.TrapProblem
            id="mmps-q21"
            difficulty="medium"
            mode="single"
            title="The faceted-filter usage rate is rising but nDCG@10 is falling."
            scenario={<>Users apply more facets per query; the result quality on those queries is worse.</>}
            options={[
              {key:"a", text:"Ignore it; facets are user choice, not search quality.", correct:false},
              {key:"b", text:"Check if rare-facet combinations are returning near-empty result sets; switch those queries from pre-filter to post-filter mode.", correct:true},
              {key:"c", text:"Hide rare facets from the UI.", correct:false},
              {key:"d", text:"Remove the facet UI entirely.", correct:false},
            ]}
            trap={<>(a) misreads user-applied facets as opt-in noise; they're a search constraint. (c)/(d) damage product UX. (b) is the production fix: rare-facet combinations produce near-empty pre-filtered ANN searches, and switching to post-filter recovers recall at small latency cost.</>}
            lens={<>Facet usage IS a search signal. When facet usage and quality move opposite ways, the filter side of the stack is broken, not the model.</>}
            stretch={<>What's a clean threshold to flip from pre-filter to post-filter at?</>}
          />

          <VIS.TrapProblem
            id="mmps-q22"
            difficulty="hard"
            mode="single"
            title="A drift monitor alerts on head-vs-tail recall divergence."
            scenario={<>Head queries: recall@500 = 0.95. Tail queries: recall@500 dropped from 0.78 to 0.62.</>}
            options={[
              {key:"a", text:"Investigate the BM25 index — tail recall depends on it, and a stopword-list change can collapse it.", correct:true},
              {key:"b", text:"Retrain the dense encoder on more tail data.", correct:false},
              {key:"c", text:"Increase K from 500 to 1000.", correct:false},
              {key:"d", text:"Accept it; tail queries are not the priority.", correct:false},
            ]}
            trap={<>(b) is slow and may not be the issue. (c) inflates latency without fixing the cause. (d) abandons tail. (a) is the diagnostic: tail recall is BM25-dominated, and small lexical-index changes (stopwords, stemming, vocabulary cuts) silently kill it.</>}
            lens={<>Head and tail respond to different retrievers. A divergence is a sharp signal about which retriever is broken.</>}
            stretch={<>What's a defensive guardrail metric you'd add on BM25 changes?</>}
          />

          <VIS.TrapProblem
            id="mmps-q23"
            difficulty="medium"
            mode="single"
            title="The drift monitor's golden set shows 0.5% recall@K drop over a month."
            scenario={<>It's small but consistent. Nothing changed in the model. The catalog turned over.</>}
            options={[
              {key:"a", text:"Re-mine the golden set with fresh queries and re-judged labels; the existing one has gone stale.", correct:true},
              {key:"b", text:"Retrain the model to chase the regression.", correct:false},
              {key:"c", text:"Lower the alert threshold so it stops firing.", correct:false},
              {key:"d", text:"Tell the team the monitor is broken.", correct:false},
            ]}
            trap={<>(b) chases the eval, not the data. (c) hides the signal. (d) is dismissive. (a) is the operational truth: golden sets age out at the same rate as the catalog — quarterly refresh is the production cadence.</>}
            lens={<>An eval set is a data artifact; like any data artifact it goes stale and must be refreshed.</>}
            stretch={<>What's a cheaper way to refresh than re-grading from scratch?</>}
          />

          <VIS.TrapProblem
            id="mmps-q24"
            difficulty="hard"
            mode="single"
            title="A monitor alerts that personalization β is saturating at 1.0 for some user cohorts."
            scenario={<>The blend has gone fully personalized for those users. Diversity-of-result complaints rise.</>}
            options={[
              {key:"a", text:"It's fine — the model picked the right β.", correct:false},
              {key:"b", text:"Cap β below 1.0 in serving config and audit the personalization-vs-relevance loss balance.", correct:true},
              {key:"c", text:"Retrain the personalization model on smaller data.", correct:false},
              {key:"d", text:"Disable personalization entirely.", correct:false},
            ]}
            trap={<>(a) accepts a filter-bubble outcome. (c) doesn't address the loss-balance. (d) is over-correction. (b) is product-policy: a hard ceiling on β plus a loss-side audit to find why the model wants more personalization than the product allows.</>}
            lens={<>β is a product dial. The model can recommend a value; the product enforces a range.</>}
            stretch={<>How would you A/B different β ceilings?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-traps-gotchas" title="Trap drills — Gotchas">

          <VIS.TrapProblem
            id="mmps-q25"
            difficulty="hard"
            mode="single"
            title="A buyer queries 'red sneakers' and gets pink, orange, and burgundy results."
            scenario={<>Color terms in the query don't map cleanly to color in the embeddings.</>}
            options={[
              {key:"a", text:"Add a color-keyword post-filter that constrains results to products tagged with the queried color.", correct:true},
              {key:"b", text:"Retrain the encoder with more red-themed images.", correct:false},
              {key:"c", text:"Lower the ANN recall threshold to broaden results.", correct:false},
              {key:"d", text:"Accept it; color is a fuzzy concept.", correct:false},
            ]}
            trap={<>(b) is slow and may not produce a sharp color separator. (c) makes it worse. (d) abandons a fixable correctness issue. (a) is the operational fix: when an attribute exists as structured data (color tag), constrain on the structured data rather than hoping the embedding got the semantics right.</>}
            lens={<>Structured attributes beat embeddings for exact-match constraints. Embeddings are for similarity, not equality.</>}
            stretch={<>Where does this color-filter live — pre-ANN, post-ANN, or in re-rank?</>}
          />

          <VIS.TrapProblem
            id="mmps-q26"
            difficulty="hard"
            mode="single"
            title="A buyer searches with an image of a watch and gets headphones in the top results."
            scenario={<>The query image is a dark watch on a white background. The headphone product images are also dark on white.</>}
            options={[
              {key:"a", text:"Retrain CLIP with more apparel pairs.", correct:false},
              {key:"b", text:"Apply foreground-background segmentation as a training-time augmentation and use category-aware re-ranking at serve time.", correct:true},
              {key:"c", text:"Drop image queries below a confidence threshold.", correct:false},
              {key:"d", text:"Force the user to pick a category before image search.", correct:false},
            ]}
            trap={<>(a) doesn't target the failure mode. (c) breaks the feature. (d) hurts UX. (b) addresses the actual issue: studio-background dominates the image embedding because both watch and headphones share white-with-dark-object — augment training to break the spurious correlation, and let the re-ranker use category as a hard prior.</>}
            lens={<>Image-similarity failures cluster around spurious correlations the encoder picked up. Augmentation breaks them.</>}
            stretch={<>How would you detect future spurious-correlation failures?</>}
          />

          <VIS.TrapProblem
            id="mmps-q27"
            difficulty="hard"
            mode="single"
            title="A buyer applies 'brand: NIKE' as a facet but the catalog has 'Nike', 'NIKE', 'nike Inc.'"
            scenario={<>The faceted filter is case-sensitive and matches none of the SKUs.</>}
            options={[
              {key:"a", text:"Tell sellers to standardize their brand strings.", correct:false},
              {key:"b", text:"Normalize brand strings at index time to a canonical form via a brand-resolver; the facet UI shows the canonical name.", correct:true},
              {key:"c", text:"Make the facet filter substring-match instead of exact-match.", correct:false},
              {key:"d", text:"Drop brand from the facet set.", correct:false},
            ]}
            trap={<>(a) is unenforceable across millions of sellers. (c) makes 'Niketown' match 'Nike' — false matches. (d) removes a useful facet. (b) is the data-quality fix: facet integrity comes from a canonical entity resolver, not from string-equality on raw seller input.</>}
            lens={<>Facets ride on entity resolution. Without it, every facet is fragile.</>}
            stretch={<>What's the staleness/maintenance cost of the brand-resolver?</>}
          />

          <VIS.TrapProblem
            id="mmps-q28"
            difficulty="hard"
            mode="single"
            title="A buyer searches 'iPhone 15 case' and gets generic 'phone case' results in the top-3."
            scenario={<>BM25 matches 'case'; the dense encoder treats 'iPhone 15 case' and 'phone case' as near-synonyms.</>}
            options={[
              {key:"a", text:"Add a model-number entity recognizer; require model-number-matching products in the top-10 when one is detected.", correct:true},
              {key:"b", text:"Increase the BM25 weight in the RRF fusion.", correct:false},
              {key:"c", text:"Retrain the dense encoder with more model-number pairs.", correct:false},
              {key:"d", text:"Ban generic 'phone case' results from the catalog.", correct:false},
            ]}
            trap={<>(b) helps but doesn't fully fix — dense still injects generic candidates that BM25 ranked low. (c) is slow and incomplete. (d) is over-reach. (a) is the targeted fix: navigational queries with a recognized entity should hard-require entity-matching results, then dense fills the surrounding slots.</>}
            lens={<>Navigational queries deserve hard constraints. Treating them like exploratory queries is a known UX failure.</>}
            stretch={<>How do you separate navigational from exploratory at query time?</>}
          />

          <VIS.TrapProblem
            id="mmps-q29"
            difficulty="medium"
            mode="single"
            title="The diversifier strips out near-identical SKUs that were intentional bundles (same product, multiple sizes)."
            scenario={<>MMR over brand+color collapses 'Nike Air 1 size 9' and 'Nike Air 1 size 10' into one slot.</>}
            options={[
              {key:"a", text:"Disable the diversifier; near-duplicates are user choice.", correct:false},
              {key:"b", text:"Define a 'product family' grouping in the catalog and have the diversifier operate at family-level, not SKU-level.", correct:true},
              {key:"c", text:"Lower MMR λ so diversification is weaker.", correct:false},
              {key:"d", text:"Remove size from the diversifier's similarity computation.", correct:false},
            ]}
            trap={<>(a) brings back the duplicate problem. (c) under-diversifies everything. (d) is the right intuition but the wrong granularity — fixes size but not color-variant or material-variant collapse. (b) puts the diversifier at the right unit of analysis (product family) so size/color variants don't double-count.</>}
            lens={<>Diversity must be defined at the unit of meaningful choice. SKU-level diversity over-splits; brand-level under-diversifies.</>}
            stretch={<>How do you discover product families if the catalog doesn't have them?</>}
          />

          <VIS.TrapProblem
            id="mmps-q30"
            difficulty="hard"
            mode="single"
            title="A new CLIP fine-tune ships, the ANN index is rebuilt from new embeddings — and recall@K drops 8%."
            scenario={<>Offline-eval on the old index showed +1.2% with the new model.</>}
            options={[
              {key:"a", text:"Roll back; the new model is worse.", correct:false},
              {key:"b", text:"Audit the index build: the new model's embedding norms shifted, IVF-PQ centroids were stale, and the index needed full re-train of its quantizer.", correct:true},
              {key:"c", text:"Retrain the model with more data.", correct:false},
              {key:"d", text:"Increase ANN search effort (ef_search) to recover recall.", correct:false},
            ]}
            trap={<>(a) loses real model gains. (c) doesn't target the cause. (d) trades latency to mask the issue. (b) is the production failure mode: ANN quantizers (IVF-PQ centroids) are trained on the previous model's embedding distribution; a new model needs the quantizer re-fit.</>}
            lens={<>ANN indexes are coupled to the embedding distribution. A new encoder + same quantizer is an unmodelled distribution shift inside the index.</>}
            stretch={<>What's a release-gate metric that catches this before traffic hits the new index?</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>Hybrid retrieval is non-negotiable for tail queries.</strong> BM25 covers exact tokens; dense covers semantics. Drop either and the tail collapses. Math: §3a, §3i.</li>
            <li><strong>Shared embedding space is what makes multimodal queries cheap.</strong> Without InfoNCE alignment, you're back to two index stacks. Math: §3b.</li>
            <li><strong>Faceted-filter mode is a recall-vs-latency dial.</strong> Pre-filter on cheap-and-common (category), post-filter on rare-and-restrictive. Math: §3d.</li>
            <li><strong>Click logs need position-bias correction.</strong> Training on raw clicks teaches the model the production policy. Math: §3g.</li>
            <li><strong>Eval set ages out at catalog-turnover rate.</strong> Refresh quarterly or the metric stops measuring quality. Trap: mmps-q23.</li>
            <li><strong>ANN quantizers are coupled to the encoder.</strong> New model means new quantizer. Trap: mmps-q30.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2103.00020" target="_blank" rel="noopener"><strong>Radford et al. — CLIP</strong></a> — the InfoNCE-aligned image-text encoder that makes shared-space multimodal search practical.</li>
        <li><a href="https://medium.com/pinterest-engineering/multitask-multilingual-multimodal-search-at-pinterest-ce06e4f5e3a2" target="_blank" rel="noopener"><strong>Pinterest Engineering — multimodal search at scale</strong></a> — production patterns for billion-item visual search.</li>
        <li><a href="https://eugeneyan.com/writing/system-design-for-discovery/" target="_blank" rel="noopener"><strong>Eugene Yan — System Design for Discovery</strong></a> — two-stage retrieve + re-rank is the field's settled pattern.</li>
        <li><a href="https://plg.uwaterloo.ca/~gvcormac/cormacksigir09-rrf.pdf" target="_blank" rel="noopener"><strong>Cormack et al. — Reciprocal Rank Fusion</strong></a> — the formal foundation for late-fusion ranking across heterogeneous retrievers.</li>
        <li><a href="https://research.facebook.com/publications/embedding-based-retrieval-in-facebook-search/" target="_blank" rel="noopener"><strong>Facebook — Embedding-based retrieval at scale</strong></a> — hard-negative mining, hybrid retrieval, and index sharding in production.</li>
      </ul>
    </VIS.Section>
  </main>
  );
};
