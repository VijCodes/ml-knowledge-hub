<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Class-weighted loss — ml-fund concept visual (G20 hover-gloss + 25 trap drills)

const W_SPEC = {
  width: 600, height: 280,
  encoding: {
    x: { field: "nc", type: "quantitative", title: "Class size n_c (count of samples)" },
    y: { field: "w",  type: "quantitative", title: "Class weight w_c = N / (k · n_c)" },
    color: { field: "class", type: "nominal" }
  },
  mark: { type: "circle", size: 120 }
};
const W_DATA = (() => {
  const N = 1000, k = 2;
  const rows = [];
  for (let nc = 10; nc <= 990; nc += 30) {
    rows.push({ nc, w: N / (k * nc), class: "minority" });
    rows.push({ nc: N - nc, w: N / (k * (N - nc)), class: "majority" });
  }
  return rows;
})();

const GRAD_SPEC = {
  width: 600, height: 240,
  encoding: {
    x: { field: "regime", type: "nominal", title: "Loss treatment" },
    y: { field: "contrib", type: "quantitative", title: "Total gradient contribution" },
    color: { field: "class", type: "nominal",
             scale: { domain:["majority","minority"], range:["#0f172a","#dc2626"] } }
  },
  mark: { type: "bar" }
};
const GRAD_DATA = [
  { regime: "Plain BCE",         class: "majority", contrib: 99 },
  { regime: "Plain BCE",         class: "minority", contrib: 1 },
  { regime: "Class-weighted",    class: "majority", contrib: 50 },
  { regime: "Class-weighted",    class: "minority", contrib: 50 },
];

const App = () => (
  <main style={{maxWidth:880,margin:"2em auto",padding:"0 16px",fontSize:16,lineHeight:1.65}}>
    <VIS.Hero pill="ML Fund · Concept" title="Class-weighted loss"
      subtitle={<>Multiply each class's per-sample loss by an inverse-frequency weight so the rare class contributes as much gradient as the common one — the first thing to reach for under moderate <VIS.Term def="A classification task where one class is much rarer than another (e.g., 99% no-fraud, 1% fraud). Plain cross-entropy lets the common class dominate the gradient.">class imbalance</VIS.Term>.</>}
      byline={[
        {label:"Audience",value:"smart but new to ML"},
        {label:"Default for",value:"moderate imbalance (90/10–99/1)"},
      ]}/>

    <VIS.TLDR>
      Set <code>w_c = N / (k · n_c)</code> for each class c (N = total samples, k = number of classes, n_c = samples in class c) and multiply that class's per-sample <VIS.Term def="The standard classification loss: -log(p) on the predicted probability of the true class. Treats every sample equally regardless of class frequency.">cross-entropy</VIS.Term> by w_c before averaging. Each class then contributes the same total <VIS.Term def="The signal the optimizer follows to update weights during backprop. Class-weighted loss rebalances how much gradient each class supplies, not what the model predicts.">gradient</VIS.Term>. Preserves probability <VIS.Term def="The property that predicted probabilities match observed frequencies. P(y=1 | model says 0.7) ≈ 0.7 across many samples. Resampling breaks this; weighting preserves it.">calibration</VIS.Term> unlike resampling.
    </VIS.TLDR>

    <VIS.Section id="sec-thought" title="Beat 1 — A concrete thought experiment">
      <p>
        Imagine a fraud dataset with N=1000 transactions: 990 legitimate, 10 fraudulent. Each <VIS.Term def="The chunk of samples processed together in one forward/backward pass; the gradient is summed over the batch before the optimizer step.">batch</VIS.Term> contains roughly 99 legit examples for every 1 fraud example. Under plain <VIS.Term def="Binary cross-entropy. The standard loss for two-class prediction: -[y·log(p) + (1-y)·log(1-p)].">BCE</VIS.Term>, the legit class supplies ~99× as much gradient signal per batch. The model's easiest move is to predict "legit always" — it gets 99% accuracy for free, and the 1% fraud signal drowns in <VIS.Term def="Random fluctuation in gradient estimates from sampling, batch composition, and SGD. Loud signal from the dominant class can drown soft signal from the rare class.">noise</VIS.Term>.
      </p>
      <p>
        Class-weighted loss is the smallest intervention that fixes this: leave the data alone, leave the model alone, just multiply the rare class's per-sample loss by <strong>99</strong> and the common class's by <strong>1</strong>. Now each class contributes the same total gradient per batch. The model can ignore fraud only at the cost of as much loss as misclassifying every legit transaction. This is the classic <VIS.Term def="Approach that explicitly accounts for asymmetric error costs — false negatives often hurt more than false positives in fraud, medical diagnosis, anomaly detection. Class weights are the loss-side knob for this.">cost-sensitive learning</VIS.Term> setup, the loss-level lever.
      </p>
      <VIS.VegaLite spec={GRAD_SPEC} data={GRAD_DATA}/>
      <p>
        Above: gradient contribution per class under plain BCE (99:1) vs class-weighted BCE (50:50). Same data, same model, same <VIS.Term def="The algorithm that updates weights using gradient estimates — SGD, Adam, AdamW, etc. Class weighting changes the loss the optimizer sees, not the optimizer itself.">optimizer</VIS.Term>. Only the per-sample loss scalar changed. The shift is visible in headline metrics — <VIS.Term def="Recall = true positives / (true positives + false negatives). The fraction of actual positives the model catches. Class weighting directly increases this on the rare class.">recall</VIS.Term> on the rare class rises sharply, often at some cost to <VIS.Term def="Precision = true positives / (true positives + false positives). Of the samples the model flags as positive, how many actually are. Often dips when recall is pushed up.">precision</VIS.Term>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-formal" title="Beat 2 — Name and formal definition">
      <p>
        The weights are the canonical <VIS.Term def="Setting a class's weight inversely proportional to how often it appears: rare classes get larger weights, common classes get smaller ones. Default in sklearn's class_weight='balanced'.">inverse-frequency weights</VIS.Term>:
      </p>
      <VIS.Equation display tex="w_c \;=\; \frac{N}{k \cdot n_c}" />
      <p>
        with N = total samples, k = number of classes, n_c = count of class c. A class with half the average frequency gets weight 2; a class with twice the average gets weight 0.5. The k factor normalizes so weights average to 1 across classes — the overall loss <VIS.Term def="The absolute size of the loss number, which affects how large the gradients are. Adam handles this via adaptive moments, but SGD does not — so scale matters for learning-rate selection.">scale</VIS.Term> is preserved, and your <VIS.Term def="The hyperparameter that controls how large each optimizer step is. If you change the loss scale by 100x, you'd otherwise need to rescale the learning rate to keep the training dynamic identical.">learning rate</VIS.Term> stays compatible with the unweighted baseline.
      </p>
      <VIS.VegaLite spec={W_SPEC} data={W_DATA}/>
      <p>
        Above: the weight curve as class size n_c sweeps from 10 to 990 in a binary problem with N=1000. The minority and majority points trace the same hyperbola — each class gets the weight that brings its total contribution to N/k = 500. The full loss expression is:
      </p>
      <VIS.Equation display
        tex="\mathcal{L} \;=\; -\frac{1}{N}\sum_{i=1}^N w_{y_i}\,\big[\, y_i \log p_i + (1-y_i)\log(1-p_i)\,\big]" />
      <p>
        Standard <VIS.Term def="Loss function used for two-class problems: -[y·log(p) + (1-y)·log(1-p)] where p is the predicted probability of class 1.">binary cross-entropy</VIS.Term> with a per-class scalar w<sub>y_i</sub> attached to every sample by its true label.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-where" title="Beat 3 — Where to set it (PyTorch / sklearn / XGBoost)">
      <VIS.Mermaid chart={`
flowchart TB
  P["PyTorch BCEWithLogitsLoss(pos_weight=99)"]
  S["sklearn class_weight='balanced'"]
  X["XGBoost scale_pos_weight=99"]
  R["Same effect: each rare-class sample contributes 99x more gradient"]
  P --> R
  S --> R
  X --> R
  style R fill:#dcfce7,stroke:#16a34a
      `}/>
      <p>
        Every major framework exposes this as a one-liner. The PyTorch flavor uses <code>pos_weight</code> (the ratio n_neg/n_pos for the positive class); sklearn computes inverse-frequency weights automatically from <code>class_weight='balanced'</code>; the <VIS.Term def="Gradient-boosted tree libraries — XGBoost, LightGBM, CatBoost. Each builds an ensemble of decision trees fit sequentially to the gradient of the loss; class weighting plugs into the same loss as deep nets.">tree-boosting libraries</VIS.Term> call it <code>scale_pos_weight</code>. All three produce the same per-sample gradient scaling.
      </p>
      <VIS.Callout kind="info" title="Inverse frequency vs custom weights">
        <code>w_c = N / (k · n_c)</code> is the default, but the weight is a knob you tune. If a domain expert says a <VIS.Term def="When a model predicts negative but the true label is positive — a missed fraud, a missed disease. Often costlier than the symmetric false positive, especially in safety-critical applications.">false negative</VIS.Term> costs 10× a <VIS.Term def="When a model predicts positive but the true label is negative — a legitimate transaction flagged as fraud. Cheap to investigate but erodes user trust at scale.">false positive</VIS.Term>, set w_pos to 10× the inverse-frequency baseline and adjust. The mechanism is "scale per-class loss"; inverse frequency is one popular schedule, not the only one.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-vs-resample" title="Beat 4 — Why prefer this over resampling">
      <VIS.Callout kind="ok" title="Preserves calibration">
        <VIS.Term def="Drawing more samples from one class than another to balance per-batch class counts. Oversampling repeats minority rows; undersampling discards majority rows. Both alter the empirical prior.">Resampling</VIS.Term> changes the <VIS.Term def="The marginal class probability the model sees during training. Plain BCE on the natural data preserves it; resampling pushes it toward 50/50 and biases predicted probabilities upward for the rare class.">prior</VIS.Term> distribution — predicted probabilities no longer reflect real-world rates and need <VIS.Term def="Recalibrating model scores after training: Platt scaling (fit a sigmoid on val set) or isotonic regression (fit a monotone step function). Required for oversampled models if you want probabilities at real-world rates.">post-hoc calibration</VIS.Term>. Class-weighted loss only changes the loss scalar; the data distribution stays natural and predicted probabilities stay calibrated.
      </VIS.Callout>
      <VIS.Callout kind="ok" title="No data duplication or discarding">
        <VIS.Term def="Drawing minority-class samples more often per epoch (with replacement) to balance batch class counts. Cheap, but duplicates can make the model memorize specific minority examples.">Oversampling</VIS.Term> duplicates minority rows — the model often <VIS.Term def="When a model memorizes training-set quirks (including duplicate rows) instead of learning the underlying signal. Oversampling amplifies overfitting risk on the minority class.">overfits</VIS.Term> exact copies. <VIS.Term def="Discarding majority-class rows to balance per-batch counts. Throws away signal — the model effectively trains on a much smaller dataset.">Undersampling</VIS.Term> throws away majority rows; the model sees less data. Weighting uses every row exactly once.
      </VIS.Callout>
      <VIS.Callout kind="info" title="Composable with everything else">
        Class weighting is orthogonal to <VIS.Term def="A loss (Lin 2017) that down-weights easy samples per-sample by (1-p_t)^γ — handles the EASY/HARD axis, while class weighting handles the COMMON/RARE axis.">focal loss</VIS.Term>, to <VIS.Term def="A synthetic-oversampling technique that linearly interpolates between minority samples and their k-nearest neighbors to create new minority points. Different from naive duplication.">SMOTE</VIS.Term>, and to <VIS.Term def="Choosing the probability cutoff at which a model's score becomes a positive prediction. Class weighting changes WHERE the model spends gradient; thresholds change WHERE the operating point sits at deployment.">threshold tuning</VIS.Term>. Stack as needed.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Breaks down at extreme imbalance (&lt; 0.1%)">
        At 99.9/0.1, even with weighting the model rarely sees a positive in a batch — the gradient estimate is too <VIS.Term def="High-variance gradient estimates from rare positives in small batches. Even with per-class weighting, an estimator built from very few positives per batch is unreliable.">noisy</VIS.Term>. Reach for focal loss, <VIS.Term def="Strategy that explicitly mines the hardest negative examples (where the model is most wrong) and trains on those, rather than letting easy negatives dilute the gradient. Pre-focal-loss workhorse.">hard-negative mining</VIS.Term>, or larger batch sizes that guarantee positives per step.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Doesn't fix label noise or weak features">
        Class weighting changes the loss budget across classes — it cannot manufacture signal. If the rare class is rare AND poorly separable, weighting alone will fall short; collect features that distinguish it. Common companions: <VIS.Term def="Splitting data into train/val/test groups that respect time, customer, or geography, so the validation simulates deployment. Crucial when class imbalance is correlated with time (e.g., fraud campaigns).">time-aware splits</VIS.Term> and tighter <VIS.Term def="The procedure for labeling examples — adjudicator agreement, label-confidence thresholds, double-blind review. The signal class weighting amplifies is only as good as the labels feeding it.">label QA</VIS.Term>.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-five interview-grade trap problems. Each pairs the correct answer with three confusingly-similar decoys. Bias toward mechanism (axis C) and application (axis B), with identity (A), intuition (D), operations (E), and failure (F) mixed in.
      </p>

      <VIS.TrapProblem
        id="cwl-q1"
        difficulty="medium"
        title="Q1 — What does class-weighted loss multiply, exactly?"
        scenario={<><em>Discriminating insight:</em> separate "what the model predicts" from "what the loss says about those predictions". The weight enters at the loss-summation step.</>}
        options={[
          {key:"a", text:"It multiplies the predicted probability for the rare class so its sigmoid output looks larger and the model's threshold becomes easier to clear."},
          {key:"b", text:"It multiplies each sample's per-sample loss by a scalar that depends on the sample's TRUE class label, before summing into the batch loss.", correct:true},
          {key:"c", text:"It multiplies the gradient at the optimizer step by a per-batch scalar derived from the rare class's running-average prediction confidence."},
          {key:"d", text:"It multiplies the learning rate by the inverse class frequency so the optimizer takes larger steps when the batch is dominated by rare examples."},
        ]}
        trap={<>(a) tampers with predictions — class weighting never does that. (c) places the multiplication at the optimizer; it lives in the loss. (d) confuses class weights with learning-rate schedules.</>}
        lens={<>(b). The weight w_{`{y_i}`} attaches to every sample by its TRUE label. It scales -log(p) before the batch average. Nothing else in the pipeline changes.</>}
      />

      <VIS.TrapProblem
        id="cwl-q2"
        difficulty="medium"
        title="Q2 — In a binary problem with N=1000, 990 negatives and 10 positives, what is w_pos under inverse-frequency weighting?"
        scenario={<><em>Discriminating insight:</em> apply w_c = N / (k · n_c) with N=1000, k=2, n_pos=10.</>}
        options={[
          {key:"a", text:"99 — because there are 99 negatives for every positive, the positive class gets weight 99 to match."},
          {key:"b", text:"50 — substituting gives 1000 / (2 · 10) = 50; the k=2 normalization keeps weights averaging to 1 across classes.", correct:true},
          {key:"c", text:"100 — the positive class gets weight equal to N / n_pos = 1000 / 10 = 100 with no further normalization."},
          {key:"d", text:"0.01 — the weight is inversely proportional to the prior, and the positive prior is 0.01."},
        ]}
        trap={<>(a) is the PyTorch <code>pos_weight</code> convention (n_neg/n_pos = 99), not the inverse-frequency w_c. (c) drops the k factor. (d) reverses the direction — rare classes get LARGER weights, not smaller.</>}
        lens={<>(b). w_pos = N / (k · n_pos) = 1000 / (2 · 10) = 50. w_neg = 1000 / (2 · 990) ≈ 0.505. The weights average to 1 across classes; the rare class's gradient contribution multiplies by ~99× relative to the common class — same RATIO as PyTorch's pos_weight=99, just on a different absolute scale.</>}
        stretch={<>How does this differ from PyTorch's pos_weight=99?</>}
      />

      <VIS.TrapProblem
        id="cwl-q3"
        difficulty="hard"
        title="Q3 — Why does class-weighted loss preserve probability calibration where oversampling breaks it?"
        scenario={<><em>Discriminating insight:</em> calibration depends on the model seeing the natural class prior during training. Which technique changes that prior?</>}
        options={[
          {key:"a", text:"Class weighting preserves calibration because cross-entropy is invariant under positive scalar multiplication; oversampling changes the loss function shape."},
          {key:"b", text:"Both preserve calibration; mis-calibration claims about oversampling are due to insufficient training epochs in the cited studies."},
          {key:"c", text:"Class weighting leaves the empirical class prior P(y=c) in the training data unchanged; oversampling pushes it toward 50/50, so the model's outputs reflect the resampled prior, not reality.", correct:true},
          {key:"d", text:"Class weighting uses a calibrated softmax internally; oversampling uses a sharpened softmax that compresses predicted probabilities toward 0 and 1."},
        ]}
        trap={<>(a) gets the right answer for the wrong reason — invariance under scalar multiplication isn't the mechanism. (b) denies a well-documented effect. (d) invents a softmax variant.</>}
        lens={<>(c). The model's predicted probabilities track the prior it sees during training. Oversampling rebalances that prior; weighting leaves it intact. To deploy an oversampled model at real-world rates, you need post-hoc calibration (Platt or isotonic). Weighting skips that step.</>}
      />

      <VIS.TrapProblem
        id="cwl-q4"
        difficulty="medium"
        title="Q4 — In PyTorch's BCEWithLogitsLoss, what value should pos_weight take for a 99:1 negative:positive split?"
        scenario={<><em>Discriminating insight:</em> PyTorch's pos_weight is defined as the ratio n_neg / n_pos — a different convention from the inverse-frequency formula w_c = N / (k · n_c).</>}
        options={[
          {key:"a", text:"99 — the ratio of negatives to positives, so each positive contributes 99× more gradient than each negative.", correct:true},
          {key:"b", text:"50 — half the dataset size divided by the number of positives, matching the inverse-frequency formula w_c = N / (k · n_c)."},
          {key:"c", text:"0.01 — the empirical prior of the positive class; the loss should down-weight the over-represented class instead."},
          {key:"d", text:"1.98 — the ratio of class frequencies (0.99 / 0.5) scaled by the binary-classification normalizer."},
        ]}
        trap={<>(b) uses the inverse-frequency formula but pos_weight is a different convention. (c) reverses direction. (d) invents an arithmetic.</>}
        lens={<>(a). The PyTorch docs are explicit: pos_weight is n_neg / n_pos. The negative class gets implicit weight 1; the positive class gets weight 99. Numerically equivalent to inverse-frequency weighting at the gradient-ratio level, but the absolute scale differs.</>}
      />

      <VIS.TrapProblem
        id="cwl-q5"
        difficulty="hard"
        title="Q5 — At what imbalance regime does class-weighted loss stop being sufficient?"
        scenario={<><em>Discriminating insight:</em> weighting fixes the per-class gradient ratio. It leaves per-batch positive counts and the variance of the gradient estimate untouched.</>}
        options={[
          {key:"a", text:"At any imbalance beyond 70:30 — class weighting is mathematically unstable when class ratios exceed 2:1 by a wide margin."},
          {key:"b", text:"Around 90:10 — weighting causes the model to overshoot on the rare class and predict it everywhere; the F1 drops below baseline."},
          {key:"c", text:"At extreme imbalance (e.g., 99.9:0.1 or denser): batches rarely contain a positive, so the gradient estimate is too noisy regardless of per-class weights.", correct:true},
          {key:"d", text:"Class weighting works at any imbalance; the limiting factor is feature quality, not the loss formulation itself."},
        ]}
        trap={<>(a) and (b) invent failure modes at moderate imbalance. (d) over-claims; the noise issue is real at extreme imbalance.</>}
        lens={<>(c). With 1-in-1000 positives and batch size 64, most batches have zero positives. Weighting can't help if the gradient estimator never sees the rare class. Common fixes: larger batches with guaranteed positives, focal loss, hard-negative mining, or two-stage cascades.</>}
        stretch={<>What's the minimum batch size that guarantees ≥1 positive at 99.9:0.1?</>}
      />

      <VIS.TrapProblem
        id="cwl-q6"
        difficulty="medium"
        title="Q6 — How does class-weighted loss differ from focal loss?"
        scenario={<><em>Discriminating insight:</em> identify the AXIS each technique operates on — class label vs sample-level confidence.</>}
        options={[
          {key:"a", text:"Class weighting and focal loss are equivalent when γ = log(N / n_minority); they implement the same gradient rescaling via different reparameterizations."},
          {key:"b", text:"Class weighting scales by class (per-class scalar, fixed for the run); focal loss scales by per-sample confidence (1-p_t)^γ that adapts every step.", correct:true},
          {key:"c", text:"Class weighting works on multi-class problems; focal loss is binary-only and cannot be extended to softmax outputs."},
          {key:"d", text:"Focal loss replaces cross-entropy with a hinge-shaped objective; class weighting keeps cross-entropy but scales it per-class. The two are incompatible."},
        ]}
        trap={<>(a) invents an equivalence. (c) reverses the truth — focal loss has multi-class formulations. (d) misstates focal loss.</>}
        lens={<>(b). Class weighting and focal loss compose: αFL combines a per-class α with the per-sample (1-p_t)^γ. They are orthogonal axes — class vs sample, frequency vs confidence.</>}
      />

      <VIS.TrapProblem
        id="cwl-q7"
        difficulty="hard"
        title="Q7 — A 95:5 binary fraud model is calibrated with class weights w_pos=10, w_neg=0.526. Test AUROC is 0.91 but recall@precision=0.8 is 0.42. What changes the recall, given fixed weights?"
        scenario={<><em>Discriminating insight:</em> class weights tune training-time gradient allocation. Recall at a precision target is a deployment-time operating-point choice, controlled by the threshold.</>}
        options={[
          {key:"a", text:"Raise w_pos to ~20 and retrain — the higher weight will boost recall by directly increasing the rare class's gradient contribution.",},
          {key:"b", text:"Sweep the decision threshold lower; class weights affect training, but recall@precision is determined by the operating-point threshold on the calibrated score.", correct:true},
          {key:"c", text:"Apply SMOTE on top of class weights; the synthetic minority samples will increase recall regardless of the operating point."},
          {key:"d", text:"Switch from BCE to focal loss with γ=5 — focal loss's confidence-adaptive weighting directly optimizes recall@precision."},
        ]}
        trap={<>(a) conflates training-time weight tuning with deployment-time threshold tuning. (c) adds complexity without addressing the operating-point. (d) recommends focal loss when the diagnosis is threshold, not training.</>}
        lens={<>(b). The model's score distribution is set at training time; the operating point is set at deployment time. AUROC=0.91 says the score ranks well — the right move is to lower the threshold until recall hits target, then re-check precision. Tuning w_pos retrains the model without addressing the decision rule.</>}
      />

      <VIS.TrapProblem
        id="cwl-q8"
        difficulty="medium"
        title="Q8 — Which sklearn argument applies inverse-frequency class weights automatically?"
        scenario={<><em>Discriminating insight:</em> sklearn has multiple weight-related arguments; only one computes inverse-frequency w_c automatically from y_train.</>}
        options={[
          {key:"a", text:"sample_weight=np.ones(N) at fit time — the framework auto-rebalances when all sample weights are uniform."},
          {key:"b", text:"class_weight='balanced' at constructor time — sklearn computes w_c = N / (k · n_c) from the y vector internally.", correct:true},
          {key:"c", text:"fit_params={'rebalance': True} — passes a flag to the estimator's fit method to enable automatic class rebalancing."},
          {key:"d", text:"GridSearchCV(scoring='balanced_accuracy') — the scorer infers and applies class weights during model selection."},
        ]}
        trap={<>(a) sample_weight is per-sample; ones means no weighting. (c) invents an argument. (d) scoring is for evaluation, not training-time weighting.</>}
        lens={<>(b). class_weight='balanced' computes inverse-frequency weights via N / (k · n_c). You can also pass a dict {`{0: 1, 1: 50}`} for custom weights. The argument is at constructor time on LogisticRegression, SVC, RandomForestClassifier, etc.</>}
      />

      <VIS.TrapProblem
        id="cwl-q9"
        difficulty="hard"
        title="Q9 — A team applies class_weight='balanced' AND oversamples the minority class to 50:50. What's the most likely problem?"
        scenario={<><em>Discriminating insight:</em> compounding compensations can overshoot. The minority class now contributes both via oversampling AND via inverse-frequency weight.</>}
        options={[
          {key:"a", text:"Double-counting: oversampling already balances per-batch counts, so the additional inverse-frequency weight over-amplifies the (already balanced) minority class.", correct:true},
          {key:"b", text:"Incompatibility: class_weight and oversampling cannot be used together because sklearn raises an exception at fit time when both are configured."},
          {key:"c", text:"Probability collapse: predicted probabilities become bimodal at 0 and 1 because the loss surface is dominated by the rare-class gradient."},
          {key:"d", text:"Convergence stall: the optimizer oscillates because the two corrections cancel and the effective gradient is near zero."},
        ]}
        trap={<>(b) sklearn allows both. (c) and (d) are plausible-sounding artifacts but not the typical mode.</>}
        lens={<>(a). Pick one lever. If you oversample to 50:50, set class_weight=None. If you keep natural ratios, use class_weight='balanced'. Stacking both over-weights the minority class and biases predictions strongly upward — calibration breaks and precision drops.</>}
      />

      <VIS.TrapProblem
        id="cwl-q10"
        difficulty="medium"
        title="Q10 — What's the right baseline to validate a class-weighted-loss implementation?"
        scenario={<><em>Discriminating insight:</em> class weighting is a per-class scalar multiplication of the per-sample loss. The cleanest sanity check sets all weights equal.</>}
        options={[
          {key:"a", text:"Set every w_c to 1.0; verify the loss value and gradients match plain cross-entropy exactly on a small fixed batch.", correct:true},
          {key:"b", text:"Compare AUROC against a published benchmark — class weighting is validated by hitting the SOTA number on the standard dataset."},
          {key:"c", text:"Train for one epoch and verify that the minority class's predicted probability rises monotonically; class-weighted loss is monotonic by construction."},
          {key:"d", text:"Run on a perfectly balanced 50:50 dataset and confirm class_weight='balanced' produces the same loss as class_weight=None to within float32 epsilon."},
        ]}
        trap={<>(b) end-to-end accuracy isn't a unit test. (c) "monotonic" is meaningless here. (d) is plausible but slow; (a) is faster and more direct.</>}
        lens={<>(a). The cleanest unit test: all w_c = 1, run a tiny tensor through both your weighted loss and plain CE, assert allclose. Catches bugs in indexing, broadcasting, label-to-weight lookup, and reduction order.</>}
      />

      <VIS.TrapProblem
        id="cwl-q11"
        difficulty="hard"
        title="Q11 — In a 3-class problem (n_0=700, n_1=200, n_2=100, N=1000), what is w_2 under inverse-frequency weighting?"
        scenario={<><em>Discriminating insight:</em> apply w_c = N / (k · n_c) with k=3 and n_2=100.</>}
        options={[
          {key:"a", text:"10.0 — equal to N / n_2, ignoring the k normalization."},
          {key:"b", text:"3.33 — substituting N=1000, k=3, n_2=100 gives 1000 / (3 · 100) ≈ 3.33.", correct:true},
          {key:"c", text:"0.1 — the empirical prior of class 2, used directly as the weight."},
          {key:"d", text:"7.0 — the ratio of the most-common class size (700) to class 2 (100)."},
        ]}
        trap={<>(a) drops k. (c) reverses direction. (d) uses a max-ratio that doesn't appear in the formula.</>}
        lens={<>(b). w_2 = 1000 / (3 · 100) ≈ 3.33. Verify the others: w_0 ≈ 0.476, w_1 ≈ 1.667. Weighted average across classes (n_c·w_c)/N = 1 — the k factor normalizes the overall loss scale.</>}
      />

      <VIS.TrapProblem
        id="cwl-q12"
        difficulty="hard"
        title="Q12 — A model trained with class_weight='balanced' on a 99:1 dataset has predicted probabilities that average 0.5 instead of 0.01. Most likely cause?"
        scenario={<><em>Discriminating insight:</em> 'balanced' weights make the model see an effective 50:50 distribution in terms of gradient contribution, so it learns probabilities matching a 50:50 prior rather than the natural 99:1 prior.</>}
        options={[
          {key:"a", text:"A training bug — class weighting should leave the average predicted probability essentially unchanged when implemented correctly."},
          {key:"b", text:"Working as designed: 'balanced' makes the model behave as if the dataset were 50:50, so outputs reflect the balanced prior. Recalibrate post-hoc for real-world rates.", correct:true},
          {key:"c", text:"The base rate is too low for class weighting; switch to focal loss with γ=2 to recover the natural probability."},
          {key:"d", text:"Random initialization noise; retrain with a different seed and the average should converge to the natural 0.01 prior."},
        ]}
        trap={<>(a) and (d) deny a well-documented effect. (c) misattributes the cause to imbalance extremity.</>}
        lens={<>(b). 'balanced' weights effectively present a 50:50 dataset to the loss. Predictions track the loss-implied prior, not the data prior. For ranking metrics (AUROC) this is fine; for probability outputs at real-world rates, apply post-hoc calibration (Platt or isotonic) on a held-out set with the natural prior.</>}
        stretch={<>What does this imply for calibration claims vs oversampling?</>}
      />

      <VIS.TrapProblem
        id="cwl-q13"
        difficulty="medium"
        title="Q13 — In XGBoost, which parameter implements class weighting for binary classification?"
        scenario={<><em>Discriminating insight:</em> XGBoost has scale_pos_weight, max_delta_step, and weight (per-sample) — only one is the binary-class-weight knob.</>}
        options={[
          {key:"a", text:"scale_pos_weight — a scalar applied to the positive class's gradient contribution; set to sum(neg) / sum(pos).", correct:true},
          {key:"b", text:"max_delta_step — limits the per-step weight update; set to a small value to compensate for class imbalance."},
          {key:"c", text:"objective='binary:weighted' — a special objective function that auto-computes inverse-frequency weights from the label vector."},
          {key:"d", text:"reg_alpha — the L1 regularization strength; raise it to penalize predictions of the majority class."},
        ]}
        trap={<>(b) max_delta_step helps stability under imbalance but isn't the class-weight knob. (c) invents an objective. (d) is unrelated.</>}
        lens={<>(a). scale_pos_weight is XGBoost's direct analog of PyTorch's pos_weight. Set it to n_neg / n_pos. The DMatrix's per-row weight parameter handles sample-level weighting; scale_pos_weight handles class-level.</>}
      />

      <VIS.TrapProblem
        id="cwl-q14"
        difficulty="hard"
        title="Q14 — Class weighting raises the rare class's gradient. What metric is it MOST likely to improve, holding everything else fixed?"
        scenario={<><em>Discriminating insight:</em> rebalancing gradient toward the rare class shifts the operating point — the model becomes more willing to predict it.</>}
        options={[
          {key:"a", text:"Accuracy — by definition, classifying more samples correctly is the headline benefit of class weighting."},
          {key:"b", text:"Recall on the rare class — the model is now penalized harder for missing rare positives, so it predicts them more often (at some precision cost).", correct:true},
          {key:"c", text:"Specificity — the model becomes more selective and rejects more negatives, improving the true-negative rate."},
          {key:"d", text:"Calibration — predicted probabilities better match observed frequencies, since the loss is now better balanced across classes."},
        ]}
        trap={<>(a) accuracy often DROPS under class weighting (more false positives on the rare class). (c) reverses the effect — the model predicts the rare class MORE, not less. (d) is the opposite — see Q12.</>}
        lens={<>(b). Class weighting trades precision for recall on the rare class. If the cost asymmetry is real (false negatives expensive), this is the right trade — and you can recover precision with threshold tuning at deployment.</>}
      />

      <VIS.TrapProblem
        id="cwl-q15"
        difficulty="hard"
        title="Q15 — A team uses 'balanced' weights but the rare class's recall stays at 5%. What's the most diagnostic next step?"
        scenario={<><em>Discriminating insight:</em> if a strong intervention has no effect, either the implementation is broken, the features can't separate the rare class, or another bottleneck dominates.</>}
        options={[
          {key:"a", text:"Increase the class weight to 10× the 'balanced' value to brute-force rare-class recall upward via a heavier gradient."},
          {key:"b", text:"Switch to a deeper model with more parameters; rare-class recall responds to model capacity once weights are set."},
          {key:"c", text:"Compute training-set recall for the rare class. If train recall is also 5%, features lack signal; if train recall is 95%, it's overfitting or implementation.", correct:true},
          {key:"d", text:"Apply SMOTE in addition to class weights — synthetic minority samples will improve recall when 'balanced' alone underperforms."},
        ]}
        trap={<>(a), (b), (d) jump to fixes without diagnosing. (c) splits the failure modes apart.</>}
        lens={<>(c). Train vs val recall is the diagnostic. Train-low says features can't separate the class; collect more features or revisit labels. Train-high val-low says overfitting on minority — fewer parameters, more regularization, more data. Without the split, blind fixes are guesses.</>}
        stretch={<>What if class_weight=None gives the same train-recall? What does that say?</>}
      />

      <VIS.TrapProblem
        id="cwl-q16"
        difficulty="medium"
        title="Q16 — Class weights are computed from the training set. What happens if the deployment-time class prior shifts?"
        scenario={<><em>Discriminating insight:</em> w_c is fitted to training data. If the world shifts (fraud rate doubles next quarter), the weight is now mismatched to the deployment distribution.</>}
        options={[
          {key:"a", text:"Class weights are robust to prior shift by design; they normalize against any deployment distribution automatically."},
          {key:"b", text:"The model's ranking (AUROC) is largely preserved; the operating-point threshold needs to be re-tuned for the new prior — re-weighting is not always required.", correct:true},
          {key:"c", text:"The model becomes uncalibrated and useless; retrain from scratch with new weights every time the deployment prior changes by more than 5%."},
          {key:"d", text:"The model's predicted probabilities become anti-correlated with the true label; retrain immediately to avoid catastrophic predictions."},
        ]}
        trap={<>(a) overclaims robustness. (c) and (d) overstate the failure.</>}
        lens={<>(b). The score ranking is set by the features and the model; AUROC is invariant to class-frequency shifts. The decision threshold (and calibration) is what needs adjusting. Periodic threshold re-tuning on recent labeled data is the standard playbook.</>}
      />

      <VIS.TrapProblem
        id="cwl-q17"
        difficulty="hard"
        title="Q17 — In multi-class softmax cross-entropy, class weights are applied: which expression is correct?"
        scenario={<><em>Discriminating insight:</em> softmax CE for sample i with true class y_i is -log(p_{`{i,y_i}`}). The class weight attaches to that scalar.</>}
        options={[
          {key:"a", text:"L_i = -w_{y_i} · log(p_{i,y_i}) — the weight of sample i's TRUE class multiplies its negative-log-likelihood.", correct:true},
          {key:"b", text:"L_i = -sum_c w_c · log(p_{i,c}) — sum over all classes weighted by their respective class weights."},
          {key:"c", text:"L_i = -log(w_{y_i} · p_{i,y_i}) — the weight is applied inside the logarithm, multiplying the predicted probability."},
          {key:"d", text:"L_i = -log(p_{i,y_i})^{w_{y_i}} — the weight is the exponent on the cross-entropy term."},
        ]}
        trap={<>(b) sums over all classes; CE only uses the true class. (c) puts the weight inside the log, which would shift it by a constant log(w_c). (d) invents an exponent.</>}
        lens={<>(a). The weight is a scalar multiplier on the per-sample loss term. Same shape as binary; just replace BCE with the softmax-CE expression -log(p_{`{i,y_i}`}). PyTorch CrossEntropyLoss(weight=…) does exactly this.</>}
      />

      <VIS.TrapProblem
        id="cwl-q18"
        difficulty="hard"
        title="Q18 — A team's class-weighted-loss model shows HIGHER training-loss curves than plain CE. They conclude class weighting is broken. What's the flaw in the conclusion?"
        scenario={<><em>Discriminating insight:</em> class-weighted loss is a different objective. The loss VALUE under weighting lives on a different scale than plain CE — different units.</>}
        options={[
          {key:"a", text:"They're computing the loss incorrectly; with weights summing to 1, weighted CE should always be within 5% of plain CE on any dataset."},
          {key:"b", text:"They're comparing apples to oranges: weighted CE is a different scalar function. The valid comparison is downstream metrics (recall, F1, AUROC), not the loss value.", correct:true},
          {key:"c", text:"Plain CE is always lower than weighted CE because the inverse-frequency weights amplify per-sample loss; the comparison is by construction unfair."},
          {key:"d", text:"They forgot to disable weight decay on the rare-class neurons; with weight decay on, class weighting cannot reduce training loss."},
        ]}
        trap={<>(a) makes up a tolerance. (c) is technically possible but isn't the conceptual flaw. (d) invents a neuron-level mechanism.</>}
        lens={<>(b). The two losses are different objectives. Comparing their absolute values is meaningless. Compare the metric you actually care about — usually rare-class recall or F1 — across runs with weighted vs unweighted CE. That's the apples-to-apples comparison.</>}
      />

      <VIS.TrapProblem
        id="cwl-q19"
        difficulty="medium"
        title="Q19 — In a deep-learning training loop, where in code is the class weight applied?"
        scenario={<><em>Discriminating insight:</em> the weight enters between the model forward pass and the optimizer step — specifically at the loss-computation step.</>}
        options={[
          {key:"a", text:"Inside the optimizer.step() call — the optimizer applies the weight when updating model parameters from the gradient."},
          {key:"b", text:"At loss-computation time: passed as a tensor to the loss (e.g., CrossEntropyLoss(weight=w)) which scales the per-sample loss before reduction.", correct:true},
          {key:"c", text:"At data-loading time — the DataLoader's sampler is configured to draw rare-class rows more often per epoch via WeightedRandomSampler."},
          {key:"d", text:"At the final softmax — the logits for the rare class are scaled by w_c before softmax normalization and loss computation."},
        ]}
        trap={<>(a) the optimizer is loss-agnostic. (c) is over/undersampling, not class weighting. (d) logit scaling is a different technique.</>}
        lens={<>(b). The weight is a constructor argument to the loss function. Loss → backward() → optimizer.step() — the optimizer never sees the weight directly; it just sees the gradients of the weighted loss.</>}
      />

      <VIS.TrapProblem
        id="cwl-q20"
        difficulty="hard"
        title="Q20 — A binary class-weighted model has AUROC 0.92 but the precision-recall curve is dominated by the rare class threshold sensitivity. Best operational fix?"
        scenario={<><em>Discriminating insight:</em> AUROC is class-frequency-invariant; PR curves and operating-point selection depend strongly on the threshold. Class weights affect training; thresholds affect deployment.</>}
        options={[
          {key:"a", text:"Re-train with w_pos halved to flatten the precision-recall curve; halving the class weight stabilizes the PR shape."},
          {key:"b", text:"Switch to ROC-AUC as the operating metric; PR curves under class imbalance are unreliable and should be discarded."},
          {key:"c", text:"Pick the threshold on a held-out validation set at the precision target you need; class weights are training-time, thresholds are deployment-time.", correct:true},
          {key:"d", text:"Apply SMOTE — synthetic minority samples will smooth the PR curve and reduce threshold sensitivity."},
        ]}
        trap={<>(a) re-trains when the issue is threshold. (b) discards the right metric for imbalance. (d) adds complexity instead of solving the threshold question.</>}
        lens={<>(c). Class weights set the score distribution. The operating point is a separate decision: scan the PR curve on a held-out set, pick threshold τ that hits the precision target, monitor over time. Class-weight tuning and threshold tuning are different levers — use each for its job.</>}
      />

      <VIS.TrapProblem
        id="cwl-q21"
        difficulty="hard"
        title="Q21 — Sample weights are also a thing in sklearn. When do you use sample_weight vs class_weight?"
        scenario={<><em>Discriminating insight:</em> class_weight assigns weight by CLASS LABEL (one value per class). sample_weight assigns weight per ROW (one value per sample).</>}
        options={[
          {key:"a", text:"They are aliases — sklearn translates class_weight to sample_weight internally; either argument has identical effect."},
          {key:"b", text:"Use class_weight for class imbalance (per-class scalar); use sample_weight for per-row weighting (e.g., per-customer importance, recency, label confidence).", correct:true},
          {key:"c", text:"Always prefer sample_weight — it generalizes class_weight and is faster on GPU; class_weight is deprecated since sklearn 1.0."},
          {key:"d", text:"sample_weight is for regression; class_weight is for classification. They cannot both be passed to a classifier."},
        ]}
        trap={<>(a) and (c) overstate their equivalence. (d) is false — both work on classifiers.</>}
        lens={<>(b). class_weight is the right tool when ALL samples of a class share the same weight (imbalance). sample_weight is per-row — use it for recency decays, per-customer importance, or label-confidence weighting. They compose: sklearn multiplies them together internally.</>}
      />

      <VIS.TrapProblem
        id="cwl-q22"
        difficulty="medium"
        title="Q22 — In semantic segmentation with 95% background pixels, would you reach for class-weighted CE first?"
        scenario={<><em>Discriminating insight:</em> 95% background is dense but well shy of extreme dense-detection. Multiple losses (Dice, weighted CE, focal) are reasonable; weighted CE is the simplest first move.</>}
        options={[
          {key:"a", text:"No — class-weighted CE is for tabular binary problems only; segmentation requires Dice loss by convention."},
          {key:"b", text:"Yes — weighted CE with inverse-frequency pixel-class weights is the simplest first move; if it underperforms, try Dice or focal or a combination.", correct:true},
          {key:"c", text:"No — segmentation requires focal loss at γ=5 to handle the per-pixel imbalance; weighted CE always under-performs."},
          {key:"d", text:"Yes — segmentation always uses class-weighted CE; Dice and focal are research-only and rarely used in production."},
        ]}
        trap={<>(a) and (c) over-restrict. (d) overclaims weighted CE's dominance.</>}
        lens={<>(b). For dense problems, weighted CE is a sensible baseline that's cheap to try. If region overlap is the failure mode, switch to Dice; if easy-pixel dominance is the failure mode, try focal. Combinations (focal+Dice, weighted CE+Dice) are common in production segmentation.</>}
      />

      <VIS.TrapProblem
        id="cwl-q23"
        difficulty="hard"
        title="Q23 — A team's class-weighted model trains for 50 epochs; the rare-class recall improves for 20 epochs, then DEGRADES through epoch 50. Diagnosis?"
        scenario={<><em>Discriminating insight:</em> overfitting on the heavily-weighted rare class is the most common failure mode of class weighting under long training.</>}
        options={[
          {key:"a", text:"Class weighting becomes numerically unstable past epoch 20 because the inverse-frequency weight accumulates in the optimizer state."},
          {key:"b", text:"The rare class is being overfit — its heavy weight makes the model memorize the few rare-class training examples; val recall drops as generalization breaks.", correct:true},
          {key:"c", text:"The optimizer's learning rate decay has reached zero by epoch 20, so no further learning is possible; this is unrelated to class weighting."},
          {key:"d", text:"Class weighting requires a warmup schedule; without it, weights are too large in late epochs and saturate the loss landscape."},
        ]}
        trap={<>(a) invents an accumulation effect. (c) is plausible but not the typical mode. (d) invents a required schedule.</>}
        lens={<>(b). Heavy weight on the rare class amplifies its gradient — but also amplifies the gradient on rare-class noise and quirks. Standard fixes: early stopping on val recall, more rare-class data, stronger regularization (dropout, weight decay), or lighter class weights.</>}
      />

      <VIS.TrapProblem
        id="cwl-q24"
        difficulty="hard"
        title="Q24 — In a streaming-learning setup where the class prior shifts daily, how should class weights be set?"
        scenario={<><em>Discriminating insight:</em> static inverse-frequency weights computed from a fixed snapshot drift as the data distribution evolves.</>}
        options={[
          {key:"a", text:"Compute weights once from the initial training set and freeze; recomputing during streaming will cause the model to oscillate."},
          {key:"b", text:"Recompute weights on a rolling window (e.g., last 7 days) and refresh the loss function periodically; static weights drift out of sync with the prior.", correct:true},
          {key:"c", text:"Disable class weighting entirely under streaming; the prior shift makes inverse-frequency weights unreliable in any form."},
          {key:"d", text:"Use Bayesian-updated class weights: maintain a posterior over each class's frequency and sample weights from it each batch."},
        ]}
        trap={<>(a) freezes against a moving distribution. (c) over-rejects the technique. (d) overcomplicates with no demonstrated benefit.</>}
        lens={<>(b). Rolling-window class weights are the standard playbook for streaming. Recompute n_c on the trailing window, refresh w_c, continue training. Monitor val recall; if it slides, the window length or weight refresh cadence is wrong.</>}
      />

      <VIS.TrapProblem
        id="cwl-q25"
        difficulty="hard"
        title="Q25 — Single-sentence: how does class-weighted loss differ from random oversampling?"
        scenario={<><em>Discriminating insight:</em> class weighting changes the loss; oversampling changes the data the model sees. The two operate on different layers of the training stack.</>}
        options={[
          {key:"a", text:"Random oversampling is a special case of class weighting where the weight equals the oversampling ratio; they are mathematically identical."},
          {key:"b", text:"Class weighting multiplies each sample's loss by a per-class scalar (data unchanged); random oversampling draws minority-class rows more often per epoch (loss unchanged).", correct:true},
          {key:"c", text:"Class weighting requires balanced batches; random oversampling generates balanced batches automatically, so the two are interchangeable in practice."},
          {key:"d", text:"They are equivalent under gradient descent but differ under Adam due to how adaptive moments interact with per-sample loss scaling."},
        ]}
        trap={<>(a), (c), (d) try to nest one inside the other or invent equivalence conditions. The two operate on different layers (loss vs data) — that's the whole point.</>}
        lens={<>(b). Class weighting is a loss-level intervention; oversampling is a data-level intervention. They compose, but they are not substitutes. Weighting preserves calibration and uses every row once; oversampling alters the prior and duplicates rare rows.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://scikit-learn.org/stable/modules/generated/sklearn.utils.class_weight.compute_class_weight.html" target="_blank" rel="noopener">
          scikit-learn — <em>compute_class_weight</em> (docs)</a>
          — the canonical inverse-frequency formula, with the n_samples / (n_classes · np.bincount(y)) implementation. Read the source.</li>
        <li><a href="https://machinelearningmastery.com/cost-sensitive-learning-for-imbalanced-classification/" target="_blank" rel="noopener">
          Jason Brownlee — <em>Cost-Sensitive Learning for Imbalanced Classification</em> (blog)</a>
          — practitioner walkthrough of class weights vs resampling vs threshold-moving, with worked sklearn examples. Start here if you've never tried any of them.</li>
        <li><a href="https://pytorch.org/docs/stable/generated/torch.nn.BCEWithLogitsLoss.html" target="_blank" rel="noopener">
          PyTorch — <em>BCEWithLogitsLoss</em> (docs)</a>
          — the pos_weight argument, with the formula and a numerical-stability note on why you should NOT use BCELoss + manual sigmoid. Skim this before writing your own loss.</li>
        <li><a href="https://arxiv.org/abs/1708.02002" target="_blank" rel="noopener">
          Lin et al. — <em>Focal Loss for Dense Object Detection</em> (ICCV 2017, paper)</a>
          — Section 3 of the focal-loss paper is the cleanest published comparison of class-weighted CE vs the per-sample alternative; read it to understand when each earns its keep.</li>
        <li><a href="https://www.youtube.com/watch?v=YPYB8XSRefM" target="_blank" rel="noopener">
          StatQuest — <em>Imbalanced Data, ROC, and PR Curves</em> (~15 min, video)</a>
          — Josh Starmer's whiteboard walk through what changes (and doesn't) when classes are imbalanced. Pair with this concept page for the operating-point intuition.</li>
        <li><a href="https://imbalanced-learn.org/stable/user_guide.html" target="_blank" rel="noopener">
          imbalanced-learn — <em>User Guide</em> (docs)</a>
          — the alternatives to class weighting (SMOTE, ADASYN, BalancedRandomForest, RUSBoost). Useful for knowing when class weighting alone is insufficient.</li>
      </ul>
    </VIS.Section>
