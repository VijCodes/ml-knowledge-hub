<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 16
// TimeWeaver (Dual-Stream Temporal Network) — MDPI Systems 2025
// Unique mechanism: TWO PARALLEL ENCODERS — one stream consumes absolute
// timestamps + item identities, the other stream consumes relative
// inter-event intervals. The two stream outputs are FUSED at a late layer
// (concatenation + projection or gated mix) before the next-item head.
// Temporal-trio caution (this batch):
//   - TimeRoPE    = POSITIONAL-ENCODING layer (architectural, single stream)
//   - TimeWeaver  = DUAL-STREAM architecture (two parallel encoders fused late) [THIS]
//   - Time-aware Prompting = PROMPT-engineering layer (LLM input text)
// "Temporal info matters" is the generic version; TimeWeaver is specifically
// about *dual streams with late fusion*, not just any time-aware attention.
// Anchor that survives §2a redaction: "two parallel temporal streams
// (absolute timestamp vs relative interval) fused at a late layer; one stream
// alone is insufficient because absolute and interval signals capture
// different patterns (taste drift vs bursts/sessions)."

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Time-aware sequential rec"
      title="TimeWeaver — dual-stream temporal network"
      subtitle="Two parallel encoders: one consumes ABSOLUTE timestamps with item content, the other consumes RELATIVE inter-event intervals. The streams are fused at a late layer. The dual streams separate &lsquo;when in calendar time&rsquo; from &lsquo;how long since the last event&rsquo;."
      byline={[
        {label: "Paper", value: "&lsquo;TimeWeaver: Time-Aware Sequential Recommender System via Dual-Stream Temporal Network&rsquo; (MDPI Systems 2025)"},
        {label: "Surface", value: "Sequential recsys with bursty session patterns (sessions then dormant periods) — e-commerce, streaming, finance"},
        {label: "Anchor that survives redaction", value: "TWO parallel temporal streams (absolute timestamp vs relative interval) fused late — one stream alone misses either taste drift or burst structure"},
      ]}/>

    <VIS.TLDR>
      Sequential rec baselines (SASRec, BERT4Rec) either ignore time entirely or stuff it into a single signal. TimeWeaver argues the time signal has TWO distinct pieces: ABSOLUTE timestamps (what calendar moment? captures seasonality and taste drift) and RELATIVE inter-event intervals (how long since the last event? captures bursts and sessions). It builds TWO parallel encoders — one per signal — and fuses them at a late layer. Senior trap: this is NOT &ldquo;use time in attention&rdquo; (single-stream variants like TimeRoPE or TiSASRec already do that), and NOT &ldquo;ensemble two recommenders.&rdquo; The two streams share a tokenisation but have separate temporal encodings; late fusion preserves both signals through depth.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — two parallel temporal streams, late fusion">
      <VIS.Mermaid chart={`flowchart TB
  EV["Event sequence (item ids + timestamps)"]
  ABS["Absolute-time stream encoder (uses calendar timestamp)"]
  REL["Relative-interval stream encoder (uses inter-event delta)"]
  FUSE["Late fusion (concat or gated mix)"]
  HEAD["Next-item head"]
  EV --> ABS
  EV --> REL
  ABS --> FUSE
  REL --> FUSE
  FUSE --> HEAD`} />
      <ul>
        <li><strong>Absolute-time stream.</strong> Takes the calendar timestamp (hour-of-day, day-of-week, week-of-year). Captures seasonality, taste drift, calendar effects.</li>
        <li><strong>Relative-interval stream.</strong> Takes the delta between consecutive events (seconds, minutes, days since previous). Captures bursts, sessions, dormancy.</li>
        <li><strong>Shared item tokenisation.</strong> Both streams consume the same item-id token sequence; only the temporal encodings differ.</li>
        <li><strong>Late fusion.</strong> Concatenation followed by a projection, OR a gated mix that lets the model learn how much each stream contributes per layer.</li>
        <li><strong>Next-item head.</strong> Standard sequential-rec head on the fused representation.</li>
      </ul>
      <p>A single stream that tries to do both jobs has to allocate capacity between calendar effects and burst structure; the dual-stream design lets each stream specialise.</p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How TimeWeaver differs from neighbours">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Stream count</th>
          <th style={{textAlign:"left", padding:8}}>Time encoded as</th>
          <th style={{textAlign:"left", padding:8}}>Fusion point</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>SASRec / BERT4Rec</td><td style={{padding:8}}>Single</td><td style={{padding:8}}>None (integer position only)</td><td style={{padding:8}}>N/A</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>TimeRoPE</td><td style={{padding:8}}>Single</td><td style={{padding:8}}>Rotation angle (continuous)</td><td style={{padding:8}}>Position function</td></tr>
          <tr><td style={{padding:8}}>TiSASRec</td><td style={{padding:8}}>Single</td><td style={{padding:8}}>Learned O(L^2) attention bias</td><td style={{padding:8}}>Attention logits</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}><strong>TimeWeaver</strong></td><td style={{padding:8}}><strong>Dual (absolute + interval)</strong></td><td style={{padding:8}}><strong>Separate encodings per stream</strong></td><td style={{padding:8}}><strong>Late layer (concat or gated)</strong></td></tr>
          <tr><td style={{padding:8}}>Ensemble of two recsys</td><td style={{padding:8}}>Two independent models</td><td style={{padding:8}}>Whatever each model uses</td><td style={{padding:8}}>Score-level (logit blending)</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the axis. Pick, then reveal.</p>

      <VIS.TrapProblem id="tw-p1" difficulty="hard"
        title="P1 — TimeWeaver vs TimeRoPE: what is the load-bearing difference?"
        scenario={<><em>Discriminating insight: TimeRoPE puts time at the position function (single stream, rotation angle). TimeWeaver builds TWO parallel encoders — one for absolute timestamps and one for relative intervals — and fuses them late. The mechanisms live at different layers and have different capacities.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"TimeWeaver runs TWO parallel encoders (absolute time, relative interval) and fuses them at a late layer. TimeRoPE is a single-stream modification of the position function. TimeWeaver has more capacity and more parameters but separates the two temporal signals explicitly.", correct:true},
          {key:"b", text:"They are equivalent."},
          {key:"c", text:"TimeWeaver is a special case of TimeRoPE."},
          {key:"d", text:"TimeRoPE has two streams as well."},
        ]}
        trap={<>(b)(c)(d) collapse the dual-stream distinction.</>}
        lens={<>Single-stream position math vs two parallel encoders + late fusion.</>}
        stretch={<>What does the late-fusion choice (concat vs gated) buy?</>}
      />

      <VIS.TrapProblem id="tw-p2" difficulty="hard"
        title="P2 — TimeWeaver vs ensembling two recsys: definitional boundary"
        scenario={<><em>Discriminating insight: an ensemble runs two INDEPENDENT models and blends scores at the logit. TimeWeaver shares the item tokenisation and most parameters between streams; only the temporal encoding differs, and the streams interact through the fused intermediate representation, not just at the output.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"An ensemble runs two independent recsys and blends scores at the output. TimeWeaver shares item tokenisation and most architecture; only the temporal encoding differs across streams, and the streams interact through a fused intermediate representation, not at the score level.", correct:true},
          {key:"b", text:"They are equivalent."},
          {key:"c", text:"TimeWeaver is just an ensemble of two SASRecs."},
          {key:"d", text:"Ensembling is strictly better than dual-stream."},
        ]}
        trap={<>(b)(c)(d) collapse the architectural distinction.</>}
        lens={<>Shared tokenisation + late fusion ≠ score-level ensemble.</>}
        stretch={<>What does score-level ensembling miss that late fusion captures?</>}
      />

      <VIS.TrapProblem id="tw-p3" difficulty="medium"
        title="P3 — Without TimeWeaver, what is the realistic fallback?"
        scenario={<><em>Discriminating insight: fallbacks include single-stream time-aware variants (TimeRoPE, TiSASRec), timestamp concatenation to input embedding (cheap, weak), or an ensemble of two recommenders (expensive, score-level). TimeWeaver sits at &ldquo;dual stream, shared tokenisation, late fusion.&rdquo;</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Single-stream variants like TimeRoPE or TiSASRec (cheaper, less capacity), timestamp concatenation to input embedding (cheap, weak), or an ensemble of two recsys (expensive, score-level fusion only). TimeWeaver is the dual-stream-with-shared-tokenisation point on the menu.", correct:true},
          {key:"b", text:"Random ordering is at parity."},
          {key:"c", text:"Skip time-aware modelling entirely."},
          {key:"d", text:"Use a single linear model for everything."},
        ]}
        trap={<>(b)(c) absurd. (d) lacks capacity.</>}
        lens={<>TimeWeaver occupies the dual-stream+shared-tokenisation corner.</>}
        stretch={<>When does single-stream beat dual-stream?</>}
      />

      <VIS.TrapProblem id="tw-p4" difficulty="hard"
        title="P4 — Compose TimeWeaver with TimeRoPE inside the relative-interval stream"
        scenario={<><em>Discriminating insight: TimeRoPE is a position-function intervention; TimeWeaver is an architectural intervention. Inside the relative-interval stream, you can use TimeRoPE-style rotation on the relative timestamps. The mechanisms compose cleanly because they occupy different layers.</em><br/>What does the stack achieve?</>}
        options={[
          {key:"a", text:"Use TimeRoPE inside the relative-interval stream so that stream&apos;s attention encodes continuous time-delta natively; TimeWeaver&apos;s dual-stream architecture wraps around it. The mechanisms compose because they live at different layers (position function vs architecture).", correct:true},
          {key:"b", text:"They cannot coexist."},
          {key:"c", text:"They are mathematically identical."},
          {key:"d", text:"Composition forces a softmax change."},
        ]}
        trap={<>(b)(c)(d) misread the layers.</>}
        lens={<>Different layers compose; same layer would collide.</>}
        stretch={<>What if TimeRoPE goes in the absolute stream instead?</>}
      />

      <VIS.TrapProblem id="tw-p5" difficulty="medium"
        title="P5 — When does TimeWeaver stop helping?"
        scenario={<><em>Discriminating insight: TimeWeaver&apos;s value comes from having BOTH calendar effects AND burst structure to capture. On a domain with only calendar effects (e.g., weekly grocery purchases) or only burst structure (e.g., short-session gaming) the second stream becomes redundant; a single-stream variant matches at lower cost.</em><br/>Where is the boundary?</>}
        options={[
          {key:"a", text:"Domains that have only one of the two temporal patterns (only calendar effects, or only bursts) gain nothing from the second stream. A single-stream time-aware variant (TimeRoPE/TiSASRec) matches TimeWeaver at lower parameter and compute cost.", correct:true},
          {key:"b", text:"TimeWeaver always wins."},
          {key:"c", text:"TimeWeaver only works on uniform sequences."},
          {key:"d", text:"Temporal patterns are irrelevant."},
        ]}
        trap={<>(b)(c)(d) miss the dual-pattern premise.</>}
        lens={<>Both calendar AND burst patterns must be present.</>}
        stretch={<>How would you decide single vs dual stream from data?</>}
      />

      <VIS.TrapProblem id="tw-p6" difficulty="hard"
        title="P6 — Pick the architecture for a streaming-music sequential recommender"
        scenario={<><em>Discriminating insight: streaming music has BOTH calendar effects (workout playlists at 7am, party music on Friday nights) AND burst structure (binge listening sessions then days of silence). TimeWeaver fits because both temporal patterns matter; single-stream variants miss one or the other.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"TimeWeaver — both calendar (time-of-day, day-of-week) and burst (session vs dormant) patterns matter for music. Dual streams let each specialise. Single-stream variants compromise one pattern in service of the other.", correct:true},
          {key:"b", text:"SASRec — ignores time entirely."},
          {key:"c", text:"BM25 — no sequence modelling."},
          {key:"d", text:"Static collaborative filtering — no temporal."},
        ]}
        trap={<>(b)(c)(d) under-specify the temporal need.</>}
        lens={<>Both calendar and burst patterns → dual stream.</>}
        stretch={<>How to ablate the two streams to confirm both matter?</>}
      />

      <VIS.TrapProblem id="tw-p7" difficulty="hard"
        title="P7 — Sounds reasonable: &ldquo;just concatenate hour-of-day and time-delta to the embedding&rdquo;"
        scenario={<><em>Discriminating insight: concatenating both features to the input embedding makes ONE encoder do both jobs, sharing capacity. TimeWeaver&apos;s claim is that the two signals interfere when they share an encoder and benefit from separate parameter pools. The shortcut empirically underperforms on bursty + seasonal data.</em><br/>Why is the shortcut wrong?</>}
        options={[
          {key:"a", text:"Concatenating both temporal features to one encoder forces the encoder to allocate capacity between calendar effects and burst structure. TimeWeaver&apos;s claim is that the two signals are captured better by separate streams with their own parameter pools; ablations support this.", correct:true},
          {key:"b", text:"The shortcut is strictly better."},
          {key:"c", text:"The shortcut and dual stream are equivalent."},
          {key:"d", text:"Concatenation cannot work in transformers."},
        ]}
        trap={<>(b)(c) collapse the parameter-pool argument. (d) overstates.</>}
        lens={<>Capacity sharing forces compromise; separate streams avoid it.</>}
        stretch={<>What ablation isolates parameter-pool effects from architecture?</>}
      />

      <VIS.TrapProblem id="tw-p8" difficulty="hard"
        title="P8 — TimeWeaver&apos;s anchor (dual streams + late fusion): pitch it"
        scenario={<><em>Discriminating insight: the anchor is &ldquo;two parallel temporal encoders (absolute timestamp and relative interval), fused at a late layer; shared item tokenisation.&rdquo; The pitch should name all three pieces.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"TimeWeaver builds two parallel transformer encoders — one consumes absolute timestamps with item content, the other consumes relative inter-event intervals with item content. Their representations are fused at a late layer (concatenate + project, or gated mix). The item tokenisation is shared. This separates &lsquo;when in calendar time&rsquo; from &lsquo;how long since the last event&rsquo;.", correct:true},
          {key:"b", text:"TimeWeaver is a single encoder with a time-aware attention bias."},
          {key:"c", text:"TimeWeaver is an ensemble of two SASRecs."},
          {key:"d", text:"TimeWeaver is a position-function modification of RoPE."},
        ]}
        trap={<>(b) collapses to single-stream. (c) collapses to ensemble. (d) confuses with TimeRoPE.</>}
        lens={<>Dual streams, shared tokenisation, late fusion — all three.</>}
        stretch={<>What is the smallest valid TimeWeaver — one transformer layer per stream?</>}
      />

      <VIS.TrapProblem id="tw-p9" difficulty="hard" multiSelect
        title="P9 — When NOT to use TimeWeaver. Select all that apply."
        scenario={<><em>Discriminating insight: TimeWeaver needs (i) BOTH calendar effects and burst structure in the data, (ii) compute budget for two parallel encoders, (iii) timestamps reliable enough for both absolute and relative encodings. It is wrong for single-pattern domains, tight compute budgets, and untimestamped data.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Domain with only calendar effects (e.g., monthly subscription renewal). Burst stream is wasted parameters.", correct:true},
          {key:"b", text:"Tight compute budget where a single-stream model meets latency but dual streams do not.", correct:true},
          {key:"c", text:"Untimestamped data where neither stream has signal.", correct:true},
          {key:"d", text:"Cross-domain transfer where the temporal distribution differs between train and serve.", correct:true},
          {key:"e", text:"Cold-start surface where most users have one or zero historical events (neither stream has sequence to encode).", correct:true},
        ]}
        trap={<>All five fail the dual-pattern + timestamp + compute premise in different ways. The watch-out is mistaking single-pattern domains for the canonical fit.</>}
        lens={<>Dual pattern + compute budget + reliable timestamps.</>}
        stretch={<>How would you decide between single and dual stream up front?</>}
      />

      <VIS.TrapProblem id="tw-p10" difficulty="hard"
        title="P10 — Why late fusion, not early fusion?"
        scenario={<><em>Discriminating insight: early fusion (concatenate both temporal signals at the input layer) forces one encoder to disentangle them through depth; late fusion lets each stream specialise and only mix near the head. TimeWeaver argues that the specialisation through depth is worth the parameter cost; the empirical lift comes from late, not early, fusion.</em><br/>Why late fusion?</>}
        options={[
          {key:"a", text:"Early fusion forces a single encoder to disentangle two interleaved signals through depth. Late fusion lets each stream specialise — absolute-time stream learns calendar features, relative-interval stream learns burst features — and only mix near the head. Empirically, late fusion has the bigger lift.", correct:true},
          {key:"b", text:"Late fusion is a latency optimisation."},
          {key:"c", text:"Early fusion has no parameter cost."},
          {key:"d", text:"Late fusion is mathematically equivalent to early fusion."},
        ]}
        trap={<>(b)(c)(d) misread the disentanglement argument.</>}
        lens={<>Specialisation through depth is the load-bearing property.</>}
        stretch={<>What ablation isolates fusion timing from stream design?</>}
      />

      <VIS.TrapProblem id="tw-p11" difficulty="hard"
        title="P11 — Fusion layer composition"
        scenario={<><em>Discriminating insight: simple concat-then-project loses dynamic control over how much each stream contributes. A gated mix (sigmoid gate per dimension) lets the model learn per-context weighting — useful when bursts dominate at one time-of-day and calendar effects dominate at another. The choice between concat-project and gated mix is empirical but gated wins more often on heterogeneous traffic.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Concat-project is simpler and works on homogeneous traffic. A gated mix (sigmoid gate per dimension) lets the model learn per-context weighting — useful when bursts dominate at some times and calendar dominates at others. Gated mix wins more often on heterogeneous traffic.", correct:true},
          {key:"b", text:"They are equivalent."},
          {key:"c", text:"Gated mix always loses recall."},
          {key:"d", text:"Concat-project requires three streams."},
        ]}
        trap={<>(b)(c)(d) misread the fusion family.</>}
        lens={<>Gated mix gives dynamic weighting; concat-project does not.</>}
        stretch={<>What feature would the gate condition on?</>}
      />

      <VIS.TrapProblem id="tw-p12" difficulty="hard"
        title="P12 — What does TimeWeaver deliberately drop vs single-stream?"
        scenario={<><em>Discriminating insight: TimeWeaver doubles the encoder parameter count and roughly doubles compute. Single-stream variants pay less but force one encoder to do both jobs. The trade is &ldquo;more compute for cleaner specialisation.&rdquo;</em><br/>What does TimeWeaver forfeit?</>}
        options={[
          {key:"a", text:"Compute efficiency. TimeWeaver runs two parallel encoders; single-stream variants run one. Roughly 2x compute and parameter cost for the dual-stream specialisation gain.", correct:true},
          {key:"b", text:"TimeWeaver forfeits the use of timestamps."},
          {key:"c", text:"TimeWeaver forfeits the next-item head."},
          {key:"d", text:"TimeWeaver forfeits item embeddings."},
        ]}
        trap={<>(b)(c)(d) misread the trade.</>}
        lens={<>Compute is the deliberate sacrifice for stream specialisation.</>}
        stretch={<>What if you halve each stream&apos;s depth to match single-stream compute?</>}
      />

      <VIS.TrapProblem id="tw-p13" difficulty="hard"
        title="P13 — Most fragile knob"
        scenario={<><em>Discriminating insight: the time-interval encoding (log vs linear vs quantile for the relative-interval stream) dominates fragility — mis-set encoding collapses the burst stream to noise. Fusion-gate initialisation is next (a saturated gate ignores one stream entirely). Embedding dim is most robust.</em><br/>Rank fragility.</>}
        options={[
          {key:"a", text:"Time-interval encoding choice (log vs linear vs quantile) is most fragile — mis-set collapses the burst stream to noise. Fusion-gate initialisation is next (a saturated gate ignores one stream). Embedding dim is most robust within typical ranges.", correct:true},
          {key:"b", text:"Embedding dim is most fragile."},
          {key:"c", text:"Number of heads is most fragile."},
          {key:"d", text:"Batch size is most fragile."},
        ]}
        trap={<>(b)(c)(d) miss the stream-specific mechanism.</>}
        lens={<>Interval encoding gates the burst stream; gate init gates fusion balance.</>}
        stretch={<>How to detect a saturated fusion gate at training time?</>}
      />

      <VIS.TrapProblem id="tw-p14" difficulty="medium"
        title="P14 — Data assumption violations"
        scenario={<><em>Discriminating insight: TimeWeaver assumes timestamps are MEANINGFUL on BOTH axes — calendar-valid for the absolute stream AND reflective of true inter-event spacing for the relative stream. If events are batch-ingested with a single near-uniform ingest timestamp instead of the true event time, the relative-interval stream sees uniform deltas (nothing to learn) even though the absolute stream still looks fine.</em><br/>Which violation is most direct?</>}
        options={[
          {key:"a", text:"Batch ingestion that overwrites the true event timestamp with a near-uniform ingest timestamp. The absolute-time stream still learns calendar patterns from the (wrong but plausible) timestamps, while the relative-interval stream sees near-uniform deltas and contributes nothing.", correct:true},
          {key:"b", text:"Off-by-one on item-id indexing."},
          {key:"c", text:"Different tokenizer at inference."},
          {key:"d", text:"Mismatched batch sizes."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Batch-ingest collapses the relative stream silently.</>}
        stretch={<>How to detect batch-ingest collapse from training metrics alone?</>}
      />

      <VIS.TrapProblem id="tw-p15" difficulty="hard"
        title="P15 — Intuitive but wrong: &ldquo;just add an LSTM on the time intervals&rdquo;"
        scenario={<><em>Discriminating insight: bolting an LSTM onto time intervals is a single-stream temporal augmentation; it does NOT separate calendar effects from burst structure. TimeWeaver&apos;s claim is the SEPARATION of streams, not the addition of any temporal capacity.</em><br/>Why is the shortcut wrong?</>}
        options={[
          {key:"a", text:"An LSTM on time intervals adds temporal capacity to the same encoder. TimeWeaver&apos;s value is the SEPARATION of absolute and relative signals into distinct streams; adding capacity inside a single stream does not deliver the separation.", correct:true},
          {key:"b", text:"LSTMs cannot encode time intervals."},
          {key:"c", text:"LSTMs are equivalent to dual-stream transformers."},
          {key:"d", text:"The shortcut is strictly better."},
        ]}
        trap={<>(b)(c)(d) misread the separation argument.</>}
        lens={<>Separation matters more than capacity.</>}
        stretch={<>What ablation proves separation is the load-bearing element?</>}
      />

      <VIS.TrapProblem id="tw-p16" difficulty="hard"
        title="P16 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: assuming &ldquo;TimeWeaver is just a bigger SASRec&rdquo; cascades into (i) collapsing the two streams into one (loses the separation), (ii) using early fusion (loses the specialisation), (iii) under-investing in interval-encoding choice (collapses the burst stream).</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: the dual-stream separation, the late-fusion timing, and the interval-encoding choice. Each is load-bearing; remove any one and TimeWeaver regresses toward a single-stream time-aware baseline or worse.", correct:true},
          {key:"b", text:"Only the separation."},
          {key:"c", text:"Only the fusion timing."},
          {key:"d", text:"Nothing — TimeWeaver is just a bigger SASRec."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>Three load-bearing pieces — separation, late fusion, interval encoding.</>}
        stretch={<>Which piece does the original paper most underspecify?</>}
      />

      <VIS.TrapProblem id="tw-p17" difficulty="medium"
        title="P17 — Senior vs junior framing"
        scenario={<><em>Discriminating insight: a junior responds to flat lift over single-stream by adding more layers. A senior first inspects the fusion gate&apos;s learned weights — if the gate has saturated toward one stream, the other stream is dead and adding layers will not help. The gate&apos;s health is the TimeWeaver-specific diagnostic.</em><br/>Which lever first?</>}
        options={[
          {key:"a", text:"Inspect the fusion-gate weight distribution per layer. If the gate is saturated toward one stream (mean gate value &lt; 0.1 or &gt; 0.9 across most dimensions), the other stream is dead and parameter count is wasted. Fix the gate initialisation or rebalance training data before adding capacity.", correct:true},
          {key:"b", text:"Add more layers."},
          {key:"c", text:"Increase embedding dim."},
          {key:"d", text:"Switch to single-stream."},
        ]}
        trap={<>(b)(c) generic. (d) abandons the architecture.</>}
        lens={<>Fusion gate health is the TimeWeaver-specific diagnostic.</>}
        stretch={<>Dashboard panel that surfaces gate saturation over time?</>}
      />

      <VIS.TrapProblem id="tw-p18" difficulty="hard"
        title="P18 — Plausible-misattribution: NDCG drift after timezone migration"
        scenario={<><em>Discriminating insight: a team migrated event ingestion from local-timezone timestamps to UTC. NDCG drifted down 5% the following week. Engineers blame &ldquo;model drift&rdquo;. The actual cause: the absolute-time stream encodes calendar features (hour-of-day, day-of-week) that were trained on LOCAL timezones; UTC shifts every hour-of-day feature by 5-8 hours depending on user region. The relative-interval stream is unaffected because deltas are timezone-invariant.</em><br/>NDCG fell after a timezone migration. Most likely cause?</>}
        options={[
          {key:"a", text:"Model drift — retrain on recent data.", correct:false},
          {key:"b", text:"Absolute-time stream was trained on local-timezone calendar features (hour-of-day, day-of-week). UTC migration shifts every hour-of-day by 5-8 hours per region; the trained calendar pattern no longer matches the serving distribution. The relative-interval stream is timezone-invariant and unaffected. Fix: retrain the absolute stream with per-region timezone offsets as features, or revert to local time.", correct:true},
          {key:"c", text:"Cache TTL changed.", correct:false},
          {key:"d", text:"GPU thermal throttling.", correct:false},
        ]}
        trap={<>(a) seductive — drift is the default suspect. (c)(d) generic infra decoys.</>}
        lens={<>Calendar features are timezone-dependent; intervals are timezone-invariant.</>}
        stretch={<>What CI test catches timezone bugs in the absolute stream?</>}
      />

      <VIS.TrapProblem id="tw-p19" difficulty="hard"
        title="P19 — Production gotcha: dual-stream training data parity"
        scenario={<><em>Discriminating insight: TimeWeaver assumes both streams see the same item sequences with matched timestamps. If a preprocessing bug feeds one stream a filtered sequence (e.g., drop events with &lt; 1s gap as &lsquo;duplicates&rsquo;) and the other the full sequence, the streams desynchronise — fusion mixes apples and oranges per index position.</em><br/>What is the discipline?</>}
        options={[
          {key:"a", text:"Both streams must see byte-for-byte matched event sequences with matched timestamps. CI-check sequence-length and timestamp-hash parity between streams; any preprocessing filter must apply to both streams or neither. Desynchronised streams break late fusion silently.", correct:true},
          {key:"b", text:"Stream parity is not important."},
          {key:"c", text:"Each stream should see different sequences."},
          {key:"d", text:"Skip parity checks."},
        ]}
        trap={<>(b)(c)(d) miss the parity contract.</>}
        lens={<>Late fusion needs stream parity; CI-check sequence hashes.</>}
        stretch={<>What CI test catches per-stream preprocessing drift?</>}
      />

      <VIS.TrapProblem id="tw-p20" difficulty="hard"
        title="P20 — Failure on Friday: NDCG fell after a fusion-layer refactor"
        scenario={<><em>Discriminating insight: a team refactored the fusion layer from gated mix to concat-project &ldquo;for simplicity&rdquo;. The model was trained with gated mix and the gate had learned to weight calendar 70/30 over interval at peak hours. Concat-project gives equal weight; recall at peak hours dropped sharply. The fix is to retrain with concat-project or revert.</em><br/>3am page: NDCG down 8% after a fusion-layer simplification. Diagnosis?</>}
        options={[
          {key:"a", text:"The refactor changed the fusion mechanism from gated mix (learned per-context weights) to concat-project (fixed weights). Calendar effects dominate at peak hours; the learned gate captured this asymmetry, the new fusion does not. Roll back the refactor or retrain with concat-project from scratch.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Cache TTL changed."},
          {key:"d", text:"Index disk full."},
        ]}
        trap={<>(b)(c)(d) miss the fusion-mechanism mechanism.</>}
        lens={<>Fusion choice is part of the trained model, not a swappable layer.</>}
        stretch={<>Runbook entry for fusion-layer refactors?</>}
      />

      <VIS.TrapProblem id="tw-p21" difficulty="medium"
        title="P21 — Library default that bites: shared positional encoding across streams"
        scenario={<><em>Discriminating insight: open-source TimeWeaver implementations sometimes share positional encoding parameters across the two streams &ldquo;for efficiency&rdquo;. This couples the two encoders through their position layer and erodes the separation TimeWeaver depends on. Each stream should have its own position parameters.</em><br/>Where does the default break TimeWeaver?</>}
        options={[
          {key:"a", text:"Default parameter sharing across the two streams&apos; positional encodings couples them, eroding the separation that TimeWeaver depends on. Give each stream its own position parameters; the parameter cost is small relative to the encoder.", correct:true},
          {key:"b", text:"Default LR is wrong."},
          {key:"c", text:"Default batch size is wrong."},
          {key:"d", text:"Default optimizer is wrong."},
        ]}
        trap={<>(b)(c)(d) generic knobs.</>}
        lens={<>Stream separation must extend through the position layer.</>}
        stretch={<>What ablation isolates position-sharing effects?</>}
      />

      <VIS.TrapProblem id="tw-p22" difficulty="hard" ordered
        title="P22 — Order the TimeWeaver rollout"
        scenario={<><em>Discriminating insight: rollout is (1) audit data for BOTH calendar AND burst patterns, (2) build single-stream baselines (SASRec/TimeRoPE), (3) add second stream + late fusion, (4) ablate stream removal to confirm both matter, (5) tune fusion (concat vs gated) and interval encoding, (6) shadow A/B vs single-stream. Adding the second stream before confirming both patterns exist is the classic mistake.</em><br/>Order.</>}
        options={[
          {key:"a", text:"Audit data for calendar AND burst patterns → single-stream baseline → add second stream + late fusion → stream-ablation to confirm both contribute → tune fusion mechanism and interval encoding → shadow A/B", correct:true},
          {key:"b", text:"Skip the audit."},
          {key:"c", text:"Skip the ablation."},
          {key:"d", text:"Tune fusion before training."},
        ]}
        trap={<>(b)(c)(d) lose stage diagnostics.</>}
        lens={<>Audit → baseline → second stream → ablate → tune → ramp.</>}
        stretch={<>Why ablate before tuning?</>}
      />

      <VIS.TrapProblem id="tw-p23" difficulty="hard"
        title="P23 — Smallest input that breaks TimeWeaver&apos;s claimed advantage"
        scenario={<><em>Discriminating insight: a domain with only ONE temporal pattern (e.g., monthly subscription renewals — pure calendar, no bursts) collapses the relative-interval stream to noise. The second stream contributes nothing; a single-stream variant matches TimeWeaver at half the cost.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"A domain with only one temporal pattern — e.g., monthly subscription renewals (pure calendar, no bursts). The relative-interval stream sees a near-constant 30-day delta and contributes nothing. A single-stream model matches TimeWeaver at half the cost. TimeWeaver&apos;s premise is violated.", correct:true},
          {key:"b", text:"Streaming music with both binge sessions and calendar effects (canonical fit)."},
          {key:"c", text:"100M users."},
          {key:"d", text:"Catalog of 50M items."},
        ]}
        trap={<>(b) canonical fit. (c)(d) scale red herrings.</>}
        lens={<>One temporal pattern collapses one stream.</>}
        stretch={<>What hybrid approach falls back to single-stream when one pattern is missing?</>}
      />

      <VIS.TrapProblem id="tw-p24" difficulty="hard"
        title="P24 — Paper-named failure: interval-encoding choice"
        scenario={<><em>Discriminating insight: the TimeWeaver paper itself flags time-interval encoding (log vs linear) as the dominant failure mode for the relative-interval stream. Linear encoding compresses the long-tail of large gaps; log encoding is the safer default but compresses fine-grained burst structure. The fix is empirical tuning on a held-out set, not architecture.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Time-interval encoding (log vs linear) is the paper-named failure mode. Linear compresses long-tail gaps; log compresses fine burst structure. The fix is empirical tuning on a held-out set — neither encoding wins universally, and the choice depends on the burst-gap distribution.", correct:true},
          {key:"b", text:"Fusion mechanism is the dominant failure."},
          {key:"c", text:"Number of heads is the dominant failure."},
          {key:"d", text:"There are no failures."},
        ]}
        trap={<>(b)(c)(d) misread the named failure.</>}
        lens={<>Interval encoding gates the burst stream; tune empirically.</>}
        stretch={<>Diagnostic that picks log vs linear from the gap distribution alone?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://www.mdpi.com/2079-8954/13/10/857" target="_blank" rel="noopener">Anon., <em>TimeWeaver: Time-Aware Sequential Recommender System via Dual-Stream Temporal Network</em> (MDPI Systems 2025)</a> — the canonical paper. Read sections on stream design and ablation before anything else.</li>
        <li><a href="https://arxiv.org/abs/1808.09781" target="_blank" rel="noopener">Kang &amp; McAuley, <em>Self-Attentive Sequential Recommendation (SASRec)</em> (ICDM 2018)</a> — the time-agnostic baseline TimeWeaver compares against.</li>
