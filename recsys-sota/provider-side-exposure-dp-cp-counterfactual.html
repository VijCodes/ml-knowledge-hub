        difficulty="hard"
        title="E3 — PyTorch DataLoader shuffle on exposure logs"
        scenario={<>You're building the exposure model in PyTorch. Training data is the past-week logged exposures: tuples of (user, item, rank, served_timestamp, click). You wrap them in a standard <code>DataLoader(shuffle=True)</code>. The model's offline AUC is 0.87, but propensity predictions at serving time are systematically biased low for items recently launched. What does the shuffle break? <em>Discriminating insight: exposure logs are not IID — item launch dates create temporal structure where newer items have systematically higher propensity (cold-start serving boost) than older items. Uniform shuffling places launch-cohort items adjacent to mature-cohort items, causing the model to average a non-stationary propensity surface; the bias appears as under-predicting recent items because they're under-represented in old training batches.</em></>}
        options={[
          {key:"a", text:"Exposure logs are temporally structured — item launch dates create non-stationarity in P(shown at rank R | t). Uniform shuffling averages launch-cohort propensities with mature-cohort propensities, producing a model that predicts the time-averaged propensity rather than the current-week propensity. Recent items, whose true propensity is shifted by the cold-start boost in the serving policy, get systematically under-predicted. Fix: stratified sampling by launch-cohort, or condition the exposure model on item-age explicitly.", correct:true},
          {key:"b", text:"Shuffle breaks gradient noise variance assumed by Adam — switch to SGD with a higher batch size."},
          {key:"c", text:"Shuffle reveals label leakage from the click signal — the model is memorizing user-item pairs across shards."},
          {key:"d", text:"DataLoader's prefetch buffer holds stale exposures from previous epochs — disable prefetch and the bias resolves."},
        ]}
        trap={<>(b) is plausible-sounding optimizer noise but doesn't explain the recent-item-specific bias. (c) is the leakage reflex; would show across all items, not recent ones. (d) is fabricated infra-bug; <code>DataLoader</code> doesn't hold cross-epoch state.</>}
        lens={<>Exposure logs have implicit temporal structure (launch dates, policy changes, seasonality). The IID-assumption violation appears as systematic bias on the temporally-distinct cohort. Senior MLEs condition the exposure model on time-since-launch or use time-stratified sampling. Library choice is downstream — the structural insight is the temporal non-stationarity.</>}
        stretch={<>How does this interact with the SUTVA / positivity assumptions discussed in C5 and F1?</>}
      />

      <VIS.TrapProblem
        id="pe-e4"
        difficulty="hard"
        mode="ordered"
        title="E4 — Rollout order for counterfactual augmentation"
        scenario={<>Phases: (a) build & validate exposure model, (b) generate counterfactual augmented dataset, (c) train ranker on augmented data, (d) shadow scoring with new ranker, (e) mirror traffic ramp, (f) full deploy. Order them. <em>Discriminating insight: exposure model validation MUST come before any augmentation — otherwise you're augmenting on garbage.</em></>}
        options={[
          {key:"a", text:"Build & validate exposure model (must be calibrated; positivity must hold).", order:1},
          {key:"b", text:"Generate counterfactual augmented dataset.", order:2},
          {key:"c", text:"Train ranker on augmented data.", order:3},
          {key:"d", text:"Shadow scoring with new ranker.", order:4},
          {key:"e", text:"Mirror traffic ramp.", order:5},
          {key:"f", text:"Full deploy.", order:6},
          {key:"g", text:"Skip exposure model validation — train and ship."},
        ]}
        trap={<>(g) is the time-pressure mistake that produces F2/F3 failures.</>}
        lens={<>The exposure model is upstream of every downstream guarantee. Skipping its validation is the most common production failure for this technique.</>}
        stretch={<>What's the exposure-model validation step that takes the LEAST time but catches the MOST issues?</>}
      />

      <VIS.TrapProblem
        id="pe-e5"
        difficulty="hard"
        title="E5 — Reproducibility: the TOIS 2024 paper's results"
        scenario={<>You can't reproduce the TOIS 2024 paper's '5% provider-side fairness lift.' Which experimental property must match? <em>Discriminating insight: their exposure-matrix sparsity, their exposure-model calibration quality, and their propensity-clipping threshold — none of which are typically published.</em></>}
        multiSelect
        options={[
          {key:"a", text:"Their exposure-matrix sparsity profile (long-tail distribution shape).", correct:true},
          {key:"b", text:"Their exposure-model calibration (ECE, per-segment).", correct:true},
          {key:"c", text:"Their propensity-clipping threshold and synthetic-to-real ratio.", correct:true},
          {key:"d", text:"Their GPU vendor."},
          {key:"e", text:"Their random seed."},
        ]}
        trap={<>(d), (e) are minor.</>}
        lens={<>Fairness benchmarks rarely transfer because the exposure profile is data-specific and the calibration is rarely published. Treat 5% lifts as upper bounds.</>}
        stretch={<>Design a reproducible counterfactual augmentation benchmark. What does it standardize?</>}
      />

      <VIS.TrapProblem
        id="pe-e6"
        difficulty="hard"
        title="E6 — Monitoring exposure-matrix sparsity"
        scenario={<>Pick the right monitor for catching positivity violations before they break augmentation. <em>Discriminating insight: per-(item, rank) propensity histogram with a min-propensity threshold — generic 'coverage metrics' miss the cells that are critically near zero.</em></>}
        options={[
          {key:"a", text:"Per-(item, rank) propensity histogram with a min-propensity alarm. If any cell drops below the clipping threshold, alarm. This catches structural exposure failures BEFORE the augmentation produces unbounded-variance labels.", correct:true},
          {key:"b", text:"Aggregate click-through rate."},
          {key:"c", text:"Daily NDCG."},
          {key:"d", text:"Latency."},
        ]}
        trap={<>(b), (c), (d) are downstream symptoms or unrelated.</>}
        lens={<>The right monitor watches the propensity SUPPORT (the cells the augmentation needs), not the realized clicks. Senior monitoring move: watch the CAUSE (sparsity) not the EFFECT (label noise).</>}
        stretch={<>What's the right alarm threshold? Why is per-(item, rank) needed rather than just per-item?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      <VIS.TrapProblem
        id="pe-f1"
        difficulty="hard"
        title="F1 — Edge case: zero-exposure new sellers"
        scenario={<>A new seller joins the marketplace. Zero past exposure. What's the augmentation's behavior? <em>Discriminating insight: propensity is exactly zero — IPW blows up; augmentation must fall back to a structural prior (e.g., feature-based extrapolation from similar sellers).</em></>}
        options={[
          {key:"a", text:"Counterfactual augmentation cannot generate synthetic labels for zero-propensity cells (division by zero). Fall back to a feature-based exposure model that extrapolates from similar sellers, OR explicit cold-start exploration traffic for new sellers. Standard augmentation is silent on this case and silently drops new sellers from the training set — exactly the wrong behavior for the fairness goal.", correct:true},
          {key:"b", text:"Augmentation handles zero exposure natively."},
          {key:"c", text:"Drop new sellers from training."},
          {key:"d", text:"This isn't a real edge case."},
        ]}
        trap={<>(b) is false. (c) is what augmentation would silently do, which is the failure mode. (d) is wrong.</>}
        lens={<>The positivity-violation edge case is the most common production failure of counterfactual augmentation — and it's especially ironic because new-seller fairness is often the GOAL of using the method.</>}
        stretch={<>How do you allocate exploration budget across new sellers efficiently?</>}
      />

      <VIS.TrapProblem
        id="pe-f2"
        difficulty="hard"
        title="F2 — Adversarial: an attacker games the exposure model"
        scenario={<>An adversarial seller manipulates features to inflate their propensity in the exposure model (e.g., self-clicks to look more "served"). What's the attack's effect on the augmentation? <em>Discriminating insight: inflated propensity makes counterfactual labels too small (the IPW ratio shrinks) — adversary appears LESS preferred than they actually are; the system under-ranks them.</em></>}
        options={[
          {key:"a", text:"Inflated propensity reduces the IPW ratio P(rank 1) / P(rank R), making the counterfactual labels smaller. The ranker learns the attacker is less preferred than they actually are. Counterintuitively, the attacker's manipulation HURTS their ranking. Defense: validate exposure model on adversarial features; don't include self-clicks.", correct:true},
          {key:"b", text:"Attacker ranking improves."},
          {key:"c", text:"No effect."},
          {key:"d", text:"System crashes."},
        ]}
        trap={<>(b) is the naive answer (attacker expects 'more exposure = more rank'). (c), (d) are wrong.</>}
        lens={<>The augmentation's IPW formula INVERTS the naive intuition — feature manipulation that inflates exposure hurts ranking. Senior insight: counterfactual augmentation has counterintuitive robustness properties.</>}
        stretch={<>Could an adversary game the system in the OTHER direction (deflated propensity)? What would that attack look like?</>}
      />

      <VIS.TrapProblem
        id="pe-f3"
        difficulty="hard"
        title="F3 — Reverse engineering: fairness audit passes, real outcomes still skew"
        scenario={<>Symptom: fairness audit on the augmented training set shows balanced exposure across protected groups. After deploying, realized exposure remains skewed. Which augmentation-specific cause? <em>Discriminating insight: covariate shift between training and serving distributions — the augmentation samples ranks differently than serving does.</em></>}
        options={[
          {key:"a", text:"The augmentation step generated synthetic samples by sampling counterfactual ranks from a UNIFORM distribution over (1..K), but the serving policy produces ranks via propensity-weighted draws (heavy mass on top ranks for highly-relevant items). The ranker trained on uniform-rank augmented data has a flat prior over rank-conditional preference; at serving, it sees rank distributions concentrated at the top — its propensity calibration is wrong precisely on the ranks that matter. Fix: sample counterfactual ranks via the serving policy's propensity distribution (propensity-weighted-rank augmentation), not uniformly.", correct:true},
          {key:"b", text:"Generic training-serving covariate shift — the training distribution always differs from serving; standard fix is domain-adaptation."},
          {key:"c", text:"The fairness audit was computed on the augmented training set, which doesn't reflect the deployed model's outputs — switch the audit to live-traffic measurements."},
          {key:"d", text:"The exposure model is stale (sibling E1) — refit it against current serving logs and the realized skew resolves."},
        ]}
        trap={<>(b) is the redaction-failing answer — "generic covariate shift" is true of every training-data technique and survives substituting "counterfactual augmentation" with "any training-side fix." The augmentation-specific lever is the rank-sampling distribution choice (uniform vs propensity-weighted). (c) is a real audit issue but doesn't explain the realized skew. (d) is a different failure (E1) and would have a different symptom signature.</>}
        lens={<>Counterfactual augmentation's design lever is the rank-sampling distribution. Uniform-rank is the default in many implementations and is the most common silent failure. Senior MLEs match the augmentation's rank distribution to the serving policy's — not because of generic covariate shift, but because the IPW formula is rank-specific.</>}
        stretch={<>How would you choose between propensity-weighted-rank and serving-policy-replay-rank as the augmentation sampling distribution?</>}
      />

      <VIS.TrapProblem
        id="pe-f4"
        difficulty="hard"
        title="F4 — Paper-named failure: DP noise + augmentation interaction"
        scenario={<>The DP-CP variant adds Gaussian noise to the exposure model output for differential privacy. The TOIS 2024 paper warns about a specific interaction. Name it. <em>Discriminating insight: DP noise on propensity inflates IPW variance — synthetic labels' effective variance is dominated by the DP epsilon at small epsilon (strict privacy).</em></>}
        options={[
          {key:"a", text:"DP Gaussian noise on the exposure model's propensity output propagates through the IPW formula (1/propensity) as multiplicative noise. At strict privacy (small epsilon), the synthetic-label variance grows unboundedly — training becomes unstable. The paper recommends a clipping threshold + ratio of DP-noised augmentation to clean augmentation to bound the variance contribution.", correct:true},
          {key:"b", text:"DP has no effect on augmentation."},
          {key:"c", text:"Privacy and accuracy are independent."},
          {key:"d", text:"DP improves augmentation."},
        ]}
        trap={<>(b), (c), (d) miss the propagation mechanism.</>}
        lens={<>DP noise stacks multiplicatively through the IPW step — this is what makes the DP-CP variant nontrivial vs vanilla counterfactual augmentation. Knowing this distinguishes the technique from its non-private cousin.</>}
        stretch={<>What's the right epsilon-vs-utility curve? At what point does DP make augmentation worse than vanilla supervised?</>}
      />

      <VIS.TrapProblem
        id="pe-f5"
        difficulty="hard"
        title="F5 — Community-found: SIGIR 2024 augmentation paper's negative result"
        scenario={<>The SIGIR 2024 counterfactual exposure augmentation paper reports a regime where the technique UNDERPERFORMS vanilla supervised. Name it. <em>Discriminating insight: when exposure-model error variance dominates true-preference variance — the augmentation injects more noise than signal.</em></>}
        options={[
          {key:"a", text:"When the exposure model's error variance exceeds the true preference signal variance — common in poorly-instrumented marketplaces or new product surfaces. The augmentation's synthetic labels are then noise-dominated; vanilla supervised on biased-but-low-variance labels beats augmentation. The paper recommends: only deploy augmentation when exposure-model R-squared is above a domain-specific threshold.", correct:true},
          {key:"b", text:"Augmentation always works."},
          {key:"c", text:"Negative results are unusual in this literature."},
          {key:"d", text:"This claim is wrong."},
        ]}
        trap={<>(b), (c), (d) are false.</>}
        lens={<>The technique has known failure regimes named in the literature. Senior MLEs read the negative results, not just the headline lifts.</>}
        stretch={<>What's the R-squared threshold the paper recommends? What's it sensitive to?</>}
      />

      <VIS.TrapProblem
        id="pe-f6"
        difficulty="hard"
        title="F6 — Multi-objective: augmenting one objective at a time"
        scenario={<>You have 3 objectives (click, conversion, return-customer). Do you build 3 exposure models? <em>Discriminating insight: exposure is per-(user, item, rank) — not per-objective; one exposure model is enough, but the IPW step is applied per-objective.</em></>}
        options={[
          {key:"a", text:"One exposure model — exposure is a function of (user, item, rank), not of the objective. Apply the same IPW propensity ratio to each objective's label.", correct:true},
          {key:"b", text:"Per-objective exposure models — because the serving policy may have weighted slots differently per objective (e.g., conversion-optimized vs click-optimized slots received different real-time bid pressure), the realized propensity surface differs per objective."},
          {key:"c", text:"Two-tier exposure model — one shared backbone capturing position bias, and per-objective heads capturing objective-specific selection effects (e.g., conversion items get re-ranked at the final stage)."},
          {key:"d", text:"Single exposure model, per-objective IPW clipping thresholds — the variance of synthetic labels scales differently per objective (sparse conversion vs dense clicks), so the clipping must adapt per objective."},
        ]}
        trap={<>(b) is a defensible-but-wrong position — real teams debate this when serving policies do mix objectives at the slot level. But the answer remains "one exposure model" because exposure is observed once per (user, item, rank), not per objective. (c) is over-engineered — the position-bias backbone is correct but per-objective heads double-fit the same data. (d) is partially correct (per-objective clipping IS often used) but the question is about modeling, not variance control.</>}
        lens={<>Exposure is a property of the SERVING policy, not the objective. One exposure model serves all objectives.</>}
        stretch={<>What if one objective is observed only post-conversion (e.g., return-customer)? Does the exposure model need a different conditioning?</>}
      />

      <VIS.TrapProblem
        id="pe-f7"
        difficulty="hard"
        title="F7 — Conformal on augmented samples with synthetic provider exposure"
        scenario={<>Counterfactual-augmentation-unique setup: you compute conformal non-conformity scores on the union of (real logged samples) plus (augmented samples whose <em>provider</em> exposure was synthesized via the propensity formula rather than logged from real serving). Marginal coverage on real samples drops below 1-alpha. Why is this a conformal-augmentation interaction, not a generic train/eval split bug? <em>Discriminating insight: augmented samples have systematically lower non-conformity than real ones because their "served-provider" was selected by the propensity model's argmax-like behavior, which always picks high-confidence cells; the marginal conformal quantile is pulled down toward augmented samples, so the threshold is too tight for real samples whose provider exposure includes long-tail providers the propensity model assigned low scores to. The fix is exchangeability-aware: separate the conformal quantile on a real-only slice OR re-weight augmented non-conformity scores by an inverse-augmentation density-ratio.</em></>}
        options={[
          {key:"a", text:"Augmented samples synthesize provider exposure via the propensity formula, which concentrates on high-propensity cells — their non-conformity is systematically lower than real samples whose provider exposure includes long-tail providers. The mixed quantile is pulled toward the augmented mass; real-sample coverage falls below 1-alpha. Fix: compute the conformal quantile on a real-only slice, or weight augmented non-conformity by an inverse-augmentation density ratio.", correct:true},
          {key:"b", text:"Augmented samples are higher-noise than real samples (IPW variance from sibling D5) — their non-conformity is wider, pulling the quantile up; the fix is augmentation-noise-aware nonconformity weighting."},
          {key:"c", text:"Conformal is incompatible with any augmentation — only IPS-corrected non-augmented data preserves exchangeability; remove augmentation from the calibration pipeline."},
          {key:"d", text:"The fairness rerank stage (downstream) re-orders real samples but not augmented; the post-rerank conformal violation is induced by the rerank, not the augmentation."},
        ]}
        trap={<>(b) inverts the direction — augmented samples have <em>lower</em>, not higher, non-conformity because they're synthetic-of-the-model. (c) overshoots: augmentation IS compatible with conformal under exchangeability-aware quantile construction. (d) attributes to a different pipeline stage; the symptom is present even without rerank.</>}
        lens={<>This is the augmentation-specific conformal interaction. Conformal's exchangeability requirement is violated by augmentation in a particular direction: synthetic provider exposure narrows the non-conformity distribution. The fix is to either compute coverage on a real-only slice (clean but data-expensive) or apply a density-ratio reweighting (Tibshirani-style, but on the augmentation density rather than covariate-shift density). Distinguishes from the generic "augmentation breaks held-out" sibling cp-c5/cp-f8/pdc-f8.</>}
        stretch={<>Sketch the density-ratio estimator. What does it condition on?</>}
      />

      <VIS.TrapProblem
        id="pe-f8"
        difficulty="hard"
        title="F8 — Compounding bias: augmentation on augmentation"
        scenario={<>You ship augmentation once, then a year later retrain. The retrained model's serving traffic is now affected by the previous augmentation. Do you compound? <em>Discriminating insight: the new logged data was generated under the augmented model's policy; building a new exposure model on it requires accounting for the augmented policy, not assuming a single-policy log.</em></>}
        options={[
          {key:"a", text:"The new logs reflect the augmented policy's exposure decisions. Building a new exposure model on these logs gives propensities for the augmented policy, not for the user's true preference. Counterfactual augmentation on the new logs would then de-bias against the augmented policy, NOT against the original biased policy. This is correct but the cumulative chain of fixes can drift; senior MLEs version-control the exposure model and the augmentation generation.", correct:true},
          {key:"b", text:"No compounding; augmentation is one-shot."},
          {key:"c", text:"You have to undo the previous augmentation."},
          {key:"d", text:"Logs are policy-agnostic."},
        ]}
        trap={<>(b), (c), (d) misunderstand the policy-log dependence.</>}
        lens={<>Counterfactual augmentation is policy-relative. Re-applying it requires tracking the policy chain. Senior versioning move: log the exposure model used for each augmentation pass.</>}
        stretch={<>Sketch the versioning schema. What's the audit trail for "this label was generated by augmentation v3 on top of policy v7"?</>}
      />

    </VIS.Section>
