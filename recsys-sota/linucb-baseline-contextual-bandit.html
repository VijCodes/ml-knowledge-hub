<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// LinUCB — Baseline contextual bandit (Li et al., WWW 2010; production baseline 2024-2025)
// v2 redo — 31 trap problems spanning A-F axes; concept-anchored on
// per-arm ridge regression, closed-form UCB bonus, linearity assumption,
// matrix-inversion scaling, and what LinUCB STILL beats vs neural extensions.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Bandits &amp; online learning"
      title="LinUCB (baseline contextual bandit)"
      subtitle={<>Closed-form, per-arm <VIS.Term def="Linear regression with an L2 (lambda) penalty on weights; equivalent to a Gaussian prior on coefficients. Stays well-defined even when there is little data.">ridge regression</VIS.Term> with an explicit <VIS.Term def="An additive term that grows when the model is uncertain about an arm and shrinks as the arm accumulates pulls; the engine of principled exploration.">confidence bonus</VIS.Term> alpha sqrt(x A^-1 x). The production <VIS.Term def="A simple, well-understood model used as the reference point against which more complex models must prove a meaningful lift.">baseline</VIS.Term> that strict-better <VIS.Term def="Bandit algorithms that replace LinUCB's linear reward model with a neural network (e.g. NeuralUCB), gaining expressiveness but losing tight closed-form confidence intervals.">neural variants</VIS.Term> are measured against.</>}
      byline={[
        {label: "Paper", value: "Li et al., A Contextual-Bandit Approach to Personalized News Article Recommendation (WWW 2010)"},
        {label: "Year (paper)", value: "2010"},
        {label: "Status", value: "Production baseline through 2024-2025"},
      ]}/>

    <VIS.TLDR>
      LinUCB maintains a <VIS.Term def="An estimate of the reward-coefficient vector with a Gaussian penalty that shrinks unseen features toward zero.">ridge-regression estimate</VIS.Term> &theta;<sub>a</sub> per arm and adds an exploration <VIS.Term def="A confidence-interval-based bonus added to predicted reward; rewards arms whose features lie in under-sampled directions.">UCB bonus</VIS.Term> &alpha;&radic;(x<sup>T</sup>A<sub>a</sub><sup>-1</sup>x) that shrinks as the arm accumulates pulls in feature direction x. The principled exploration (vs &epsilon;-greedy) plus closed-form updates make it the dominant baseline through the neural-bandit era. Source: <a href="https://dl.acm.org/doi/10.1145/3543873.3587684" target="_blank" rel="noopener">WWW 2010 / production survey 2024</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        Per <VIS.Term def="One of the K candidate actions / items a bandit can choose between on each step; e.g. one news article.">arm</VIS.Term> a, maintain A<sub>a</sub> = &lambda;I + &Sigma; x x<sup>T</sup> (<VIS.Term def="Sum of outer products X^T X. Captures how much evidence the model has seen in each feature direction.">Gram matrix</VIS.Term>) and b<sub>a</sub> = &Sigma; r x. The estimator is &theta;<sub>a</sub> = A<sub>a</sub><sup>-1</sup>b<sub>a</sub>. At step t with <VIS.Term def="The feature vector x available at decision time (user, time-of-day, etc.) used to score arms.">context</VIS.Term> x, score each arm by predicted reward plus a confidence bonus, pull the <VIS.Term def="Argument of the maximum — the arm with the highest score.">argmax</VIS.Term>.
      </p>
      <VIS.Equation display tex={`p_a(x) = \\hat{\\theta}_a^{\\top} x \\;+\\; \\alpha \\sqrt{x^\\top A_a^{-1} x}, \\quad \\hat{\\theta}_a = A_a^{-1} b_a`}/>
      <p>
        After observing reward r, <VIS.Term def="An incremental update that adds the outer product xx^T to A; cost O(d^2) instead of recomputing from scratch.">rank-1 update</VIS.Term>: A<sub>a</sub> &larr; A<sub>a</sub> + x x<sup>T</sup>; b<sub>a</sub> &larr; b<sub>a</sub> + r&middot;x. Optionally maintain A<sub>a</sub><sup>-1</sup> incrementally via the <VIS.Term def="A linear-algebra identity that updates an inverse matrix after a rank-1 perturbation in O(d^2) instead of re-inverting in O(d^3).">Sherman-Morrison identity</VIS.Term>, avoiding repeated O(d&sup3;) <VIS.Term def="Computing the matrix inverse from scratch; cubic in matrix size d, so it dominates cost as d grows.">inversion</VIS.Term>.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  X["Context x_t"] --> S["For each arm a: score = theta_a . x + alpha sqrt(x A_a^-1 x)"]
  S --> P["Pull argmax arm a*"]
  P --> R["Observe reward r_t"]
  R --> U["Rank-1 update: A_a += xx^T; b_a += r x"]
  U --> S
  style P fill:#fef3c7,stroke:#d97706
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — How it differs from siblings">
      <p>
        <strong>vs &epsilon;-greedy:</strong> <VIS.Term def="Exploration rule that picks a random arm with probability epsilon and the greedy arm otherwise; ignores how confident the model is about each arm.">&epsilon;-greedy</VIS.Term> explores at a fixed rate regardless of confidence. LinUCB explores arms whose <VIS.Term def="A range that, with stated probability, contains the true parameter value; in LinUCB it shrinks as data accumulates in the relevant feature direction.">confidence interval</VIS.Term> is wide — proportional to under-explored feature directions, decaying with use.
      </p>
      <p>
        <strong>vs Thompson Sampling (TS):</strong> TS samples &theta;&sim;<VIS.Term def="The probability distribution over parameters after combining the prior with observed data; expresses remaining uncertainty.">posterior</VIS.Term>; LinUCB takes the <VIS.Term def="Given the same inputs and state, always returns the same arm; no randomness in the decision rule.">deterministic</VIS.Term> upper bound. TS is often empirically competitive; LinUCB has tighter theoretical guarantees and is deterministic (easier to debug).
      </p>
      <p>
        <strong>vs NeuralUCB:</strong> <VIS.Term def="Neural Upper Confidence Bound. Replaces LinUCB's linear reward model with a neural net; bonus is computed from gradient-feature covariance rather than a closed-form ridge inverse.">NeuralUCB</VIS.Term> lifts the linear assumption to a neural network and computes bonuses from gradient-feature <VIS.Term def="Matrix capturing how features co-vary; the inverse of the Gram matrix (up to lambda) drives LinUCB's bonus.">covariance</VIS.Term>. More flexible but loose confidence bounds (<VIS.Term def="A network with far more parameters than training points; classical confidence bounds become very wide.">over-parameterized</VIS.Term> nets); also more expensive.
      </p>
      <p>
        <strong>vs <VIS.Term def="Multi-Objective Contextual Bandit. Bandit framework that handles K objectives with constraint floors via dual ascent on Lagrange multipliers.">MOCB</VIS.Term> / constrained bandits:</strong> LinUCB has no constraint mechanism — fairness/diversity floors must come from a <VIS.Term def="A downstream stage that re-orders or filters the bandit's outputs to enforce business rules the bandit itself cannot express.">post-filter</VIS.Term>.
      </p>
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}><th style={{textAlign:"left",padding:8}}>Property</th><th style={{textAlign:"left",padding:8}}>&epsilon;-greedy</th><th style={{textAlign:"left",padding:8}}>LinUCB</th><th style={{textAlign:"left",padding:8}}>Lin-TS</th><th style={{textAlign:"left",padding:8}}>NeuralUCB</th></tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>Reward model</td><td style={{padding:8}}>None</td><td style={{padding:8}}><strong>Linear in context</strong></td><td style={{padding:8}}>Linear w/ posterior</td><td style={{padding:8}}>Neural net</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>Exploration source</td><td style={{padding:8}}>Random &epsilon;</td><td style={{padding:8}}><strong>Closed-form UCB bonus</strong></td><td style={{padding:8}}>Posterior sample</td><td style={{padding:8}}>Net-gradient bonus</td></tr>
          <tr><td style={{padding:8}}>Per-step cost</td><td style={{padding:8}}>O(d)</td><td style={{padding:8}}><strong>O(d&sup2;) with SM update</strong></td><td style={{padding:8}}>O(d&sup3;) per sample</td><td style={{padding:8}}>Forward pass</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>Theory</td><td style={{padding:8}}>Weak</td><td style={{padding:8}}><strong>O(sqrt(T) regret)</strong></td><td style={{padding:8}}>O(sqrt(T))</td><td style={{padding:8}}>Loose bounds</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick it">
      <p>
        Pick LinUCB when: (1) the reward genuinely looks linear (or close to linear) in your <VIS.Term def="Features manually crafted from raw inputs (cross terms, polynomials, time-since-publish). Carries domain knowledge into a linear model.">engineered context features</VIS.Term>, OR (2) you need a strong, <VIS.Term def="A system whose internals can be inspected and reasoned about under failure — logs, intermediate values, traceable decisions.">debuggable</VIS.Term>, low-cost baseline against which to measure <VIS.Term def="Online experiments comparing a neural-bandit variant against the LinUCB baseline on live traffic.">neural-bandit experiments</VIS.Term>, OR (3) <VIS.Term def="The number of components d in the context vector x; per-arm cost scales as d^2 (or d^3 without Sherman-Morrison).">feature dimension d</VIS.Term> is moderate so A<sup>-1</sup> stays cheap. Skip when reward is strongly non-linear in context AND interactions can't be hand-engineered.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  Q1{"Are features hand-engineered + reward looks linear?"}
  Q1 -->|Yes| L["LinUCB"]
  Q1 -->|No| Q2{"Strong feature interactions?"}
  Q2 -->|Yes| N["NeuralUCB / DCN-bandit"]
  Q2 -->|No| Q3{"Need posterior uncertainty?"}
  Q3 -->|Yes| TS["Thompson Sampling"]
  Q3 -->|No| L
  style L fill:#dcfce7,stroke:#16a34a
      `} />
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations &amp; gotchas">
      <p>
        <strong><VIS.Term def="The assumption that reward is a linear function of context features; rarely exactly true in production, but often a workable approximation after feature engineering.">Linearity</VIS.Term> rarely holds exactly.</strong> <VIS.Term def="A derived feature combining two raw features (e.g. user_segment * item_category); recovers interaction signal that a linear model in raw features misses.">Cross features</VIS.Term> can be hand-engineered to recover most non-linearity (LinUCB with explicit x_user * x_item terms still wins many production benchmarks). <strong>O(d&sup2;) per arm</strong> for incremental updates; d &gt; 1000 starts to bite. <strong>Per-arm separate A and b</strong> means new arms have no <VIS.Term def="Initializing a new arm's parameters from related arms (same topic / publisher) instead of from scratch; cuts the cold-start exploration tax.">warm-start</VIS.Term>; you re-initialize A = &lambda;I and explore from scratch (<VIS.Term def="The extra exploration cost incurred when a new arm has no history; LinUCB's bonus is huge for fresh arms.">cold-start tax</VIS.Term>). <strong>&alpha; tuning</strong> drives the <VIS.Term def="The difference between optimal cumulative reward and what your policy actually accumulated; the standard bandit objective.">regret</VIS.Term>-realized-reward tradeoff; too small under-explores; too large is plain random over feature direction. <strong><VIS.Term def="Reward distribution that drifts over time (seasonality, news cycle, taste change). Violates LinUCB's implicit i.i.d. assumption.">Non-stationarity</VIS.Term></strong>: vanilla LinUCB averages forever — no <VIS.Term def="Down-weighting old observations so the model adapts to a drifting world; implemented via discount factor gamma or sliding window.">forgetting</VIS.Term>; sliding window or <VIS.Term def="LinUCB variant where A_a is multiplied by gamma<1 each step, so old observations decay; needed under non-stationarity.">discounted variants</VIS.Term> needed.
      </p>
      <VIS.Callout kind="gotcha" title="Per-arm matrices make new-arm cold-start a STRUCTURAL problem">
        Each new arm = a fresh A and b. The <VIS.Term def="The alpha sqrt(x A^-1 x) term added to predicted reward; large when the arm is uncertain in direction x, small when the arm has been pulled often along x.">UCB bonus</VIS.Term> is initially huge (A = lambda I, A^-1 = (1/lambda) I, sqrt term big), so LinUCB pulls new arms aggressively. That sounds good — but if a million new items appear daily, the bandit explores them all, sinking real <VIS.Term def="Click-Through Rate. Fraction of impressions that lead to a click; the central calibration target for ads and feed ranking.">CTR</VIS.Term>. This is why <VIS.Term def="Thompson Sampling variant where the prior on a new arm is set from related arms or current-population statistics, controlling cold-arm exploration rate.">dynamic-prior TS</VIS.Term> exists: shape the cold-arm exploration RATE.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        31 problems across taxonomy axes A-F. <VIS.Term def="Replacing the algorithm's name with a neutral placeholder so candidates cannot pattern-match on the brand; tests genuine mechanism understanding.">Redact</VIS.Term> "LinUCB" to "Model X" — generic-ML or generic-bandits candidates should not be able to answer correctly. Each is anchored to a property LinUCB owns (per-arm <VIS.Term def="Ridge regression solved separately for each arm a, with its own A_a and b_a; lets each arm respond differently to the same features.">per-arm ridge</VIS.Term>, <VIS.Term def="A bonus computed by an exact algebraic formula (alpha sqrt(x A^-1 x)), not by sampling or simulation.">closed-form UCB bonus</VIS.Term>, Sherman-Morrison update, linearity assumption, deterministic exploration).
      </p>

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Identity &amp; comparison</h3>

      {/* A1 — LinUCB vs eps-greedy discriminator: confidence-shrinking exploration */}
      <VIS.TrapProblem
        id="linucb-a1"
        difficulty="hard"
        title="A1 — LinUCB vs ε-greedy"
        scenario={<>Both ε-greedy and LinUCB explore. A skeptic says "with ε = 0.05 and enough traffic, ε-greedy will eventually learn the right arm too — what's LinUCB's real advantage?"</>}
        options={[
          {key:"a", text:"LinUCB's exploration is CONFIDENCE-PROPORTIONAL: the bonus alpha sqrt(x A^-1 x) shrinks toward zero as the arm accumulates pulls in feature direction x. So well-learned arms stop getting random exploration; under-learned feature regions stay exploratory. Eps-greedy explores at the SAME rate after a billion impressions as on day one — wasting probe traffic on already-confident arms. The cumulative regret bound improves from O(T^(2/3)) (eps-greedy) to O(sqrt(T)) (LinUCB).", correct:true},
          {key:"b", text:"LinUCB is mathematically equivalent to ε-greedy."},
          {key:"c", text:"LinUCB has the same regret bound as ε-greedy."},
          {key:"d", text:"LinUCB explores more in absolute terms."},
        ]}
        trap={<>(d) is the seductive "more principled = more aggressive" intuition; LinUCB explores LESS on well-known arms.</>}
        lens={<><VIS.Term def="Exploration that decreases as the model becomes more certain; LinUCB's bonus shrinks per feature direction with use.">Confidence-shrinking exploration</VIS.Term> is the discriminator. Eps-greedy never stops; LinUCB does.</>}
        stretch={<>How does &alpha; choice affect the eventual <VIS.Term def="Cumulative shortfall in reward vs the best-in-hindsight policy.">regret</VIS.Term>?</>}
      />

      {/* A2 — LinUCB vs Thompson Sampling */}
      <VIS.TrapProblem
        id="linucb-a2"
        difficulty="hard"
        title="A2 — LinUCB vs Thompson Sampling (linear)"
        scenario={<>Both LinUCB and Linear-TS reach O(sqrt(T)) regret on linear-reward problems. Pick the production discriminator that survives the redaction test.</>}
        options={[
          {key:"a", text:"LinUCB is DETERMINISTIC given (x_t, A_a, b_a, alpha); TS samples theta from the posterior, so the same context can yield different arms on retry. Determinism matters in production: cache-friendly, reproducible debugging, easy A/B grouping. TS's stochasticity is empirically helpful in some misspecified settings, but trades reproducibility for that.", correct:true},
          {key:"b", text:"LinUCB has lower regret on every problem."},
          {key:"c", text:"TS cannot handle contextual features."},
          {key:"d", text:"They're identical algorithms in disguise."},
        ]}
        trap={<>(b) is overconfident; the comparison is problem-dependent. (a) is the production-side discriminator.</>}
        lens={<>Determinism vs <VIS.Term def="Behavior with built-in randomness; same inputs can yield different outputs across runs.">stochasticity</VIS.Term> is the operational discriminator that survives "both have similar regret" parity.</>}
        stretch={<>When does TS empirically outperform LinUCB?</>}
      />

      {/* A3 — counterfactual: no LinUCB */}
      <VIS.TrapProblem
        id="linucb-a3"
        difficulty="medium"
        title="A3 — Counterfactual: no LinUCB"
        scenario={<>If LinUCB didn't exist, what's the realistic fallback for personalized news ranking with engineered contextual features, and concrete cost?</>}
        options={[
          {key:"a", text:"Either (i) ε-greedy on per-arm linear regression — same regression, dumber exploration, ~30-50% more cumulative regret over typical horizons; (ii) Upper-confidence-bound algorithms without context (UCB1) — ignores features, misses personalization entirely. The realistic counterfactual is option (i): you keep the linear model and lose the exploration cleverness.", correct:true},
          {key:"b", text:"Deep learning from day one — no fallback needed."},
          {key:"c", text:"Random ranking."},
          {key:"d", text:"There's no contextual alternative."},
        ]}
        trap={<>(b) is the trendy answer; (a) is honest about the 2010-era choices.</>}
        lens={<>The closed-form UCB bonus is the cleverness; without it you keep the regressor and lose the <VIS.Term def="Exploration that follows from the theory of confidence intervals rather than a heuristic constant; tight bounds, provable regret.">principled exploration</VIS.Term>.</>}
        stretch={<>What was the 2010 deep-bandit alternative?</>}
      />

      {/* A4 — composition: LinUCB inside MOCB */}
      <VIS.TrapProblem
        id="linucb-a4"
        difficulty="hard"
        title="A4 — Composition: LinUCB as the per-objective scorer in MOCB"
        scenario={<>MOCB uses K per-objective scorers + dual ascent on constraints. What survives when you plug LinUCB in as the per-objective scorer, and what about LinUCB's properties carries over?</>}
        options={[
          {key:"a", text:"LinUCB's closed-form per-arm A and b carry over per-objective; the UCB bonus is computed per objective and per arm; only the scalarization layer is new. What DOES NOT carry over cleanly: LinUCB's O(sqrt(T)) regret bound. The combined system inherits the constrained-bandit O(sqrt(T)) regret + O(sqrt(T)) cumulative-violation bound from MOCB's analysis, not LinUCB's standalone bound.", correct:true},
          {key:"b", text:"LinUCB cannot compose with MOCB."},
          {key:"c", text:"Per-objective LinUCB is mathematically forbidden."},
          {key:"d", text:"Nothing changes — LinUCB's bound is unchanged."},
        ]}
        trap={<>(d) is the natural miss — the standalone bound doesn't survive composition.</>}
        lens={<>Per-objective ridge structure composes cleanly; standalone <VIS.Term def="Theoretical upper bound on cumulative regret as T grows; LinUCB achieves O(sqrt(T)).">regret bound</VIS.Term> does not. Re-derive bounds after composition.</>}
        stretch={<>What's the regret-violation trade after composition?</>}
      />

      {/* A5 — boundary: when does LinUCB stop being viable */}
      <VIS.TrapProblem
        id="linucb-a5"
        difficulty="hard"
        title="A5 — Boundary: where LinUCB stops being viable"
        scenario={<>At what feature dimension d does LinUCB's O(d&sup2;) per-update cost (with Sherman-Morrison) actually start to bite at typical recsys QPS, and what's the operational signal you've crossed that line?</>}
        options={[
          {key:"a", text:"Around d ~ 1000-2000 features, A_a^-1 storage (d^2 floats per arm) and the rank-1 update cost dominate latency at high QPS. Operational signal: tail latency starts tracking arm-pull rate; A_a^-1 memory grows linearly with active arms. Below d ~ 500 you're fine; between 500 and 2000 hashed/random features help; beyond 2000 either hash to a smaller space or move to NeuralUCB / DCN-bandit.", correct:true},
          {key:"b", text:"d is always fine — LinUCB has no scaling limit."},
          {key:"c", text:"d > 10 already breaks LinUCB."},
          {key:"d", text:"d affects regret only, not latency."},
        ]}
        trap={<>(b), (c), (d) all misread the d^2 cost; (a) requires connecting feature count to per-update cost.</>}
        lens={<>O(d^2) per update is the practical ceiling. <VIS.Term def="Project features into a lower-dimensional space via hashing (feature hashing / random projection) before fitting.">Hash to lower d</VIS.Term> before reaching for neural bandits.</>}
        stretch={<>How much do <VIS.Term def="Randomly projected or kernel-approximating features that let you fit a linear model on a non-linear manifold cheaply.">random features</VIS.Term> buy you?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>B. Application</h3>

      {/* B1 — pick LinUCB when it actually wins */}
      <VIS.TrapProblem
        id="linucb-b1"
        difficulty="hard"
        title="B1 — Pick the right tool"
        scenario={<>Surface: news front-page slot, ~5k editorial articles per day, context = (user demographics + time-of-day + last-3-clicks one-hot), d = 350 features after hand-engineering. Reward is click. Reward looks linear in context (validated offline R^2 = 0.61 on a held-out week). What ships first?</>}
        options={[
          {key:"a", text:"LinUCB. d = 350 is well within Sherman-Morrison range; reward IS linear in your features (R^2 = 0.61 is strong evidence); closed-form is easy to debug and prove on senior review; horizon ~5k arms is small. Lift from NeuralUCB is conditional on non-linear interactions you haven't found yet — measure that gap first, don't pay for it upfront.", correct:true},
          {key:"b", text:"NeuralUCB — deep learning always wins."},
          {key:"c", text:"Random ranking baseline."},
          {key:"d", text:"Static popularity ranker."},
        ]}
        trap={<>(b) is the trendy miss — linear evidence + moderate d is LinUCB's home territory.</>}
        lens={<><VIS.Term def="Coefficient of determination. Fraction of outcome variance explained by the model; values close to 1 mean a tight fit.">R^2</VIS.Term> in your linear model is the gating evidence. If linearity is borne out, LinUCB is the right tool.</>}
        stretch={<>How would you measure NeuralUCB's lift over LinUCB before committing?</>}
      />

      {/* B2 — "linearity isn't a real constraint" reflex */}
      <VIS.TrapProblem
        id="linucb-b2"
        difficulty="hard"
        title="B2 — Sounds prudent, isn't"
        scenario={<>An engineer says "LinUCB's linearity assumption is the problem — we should use NeuralUCB because real reward is non-linear in features." Why is this often the wrong reflex, and what's a cheaper first move?</>}
        options={[
          {key:"a", text:"Most apparent non-linearity is actually missing cross features. Hand-engineer (or use polynomial / 2nd-order interactions of) the high-impact cross features (e.g. user_segment * item_category, time_of_day * weekend), then re-fit LinUCB. The 'linearity in features' assumption becomes 'linearity in transformed features' — and you keep closed-form updates, calibration, and debuggability. Move to NeuralUCB only when crosses don't close the gap.", correct:true},
          {key:"b", text:"Always use NeuralUCB — linearity is never true."},
          {key:"c", text:"Linearity is a hard constraint on input space."},
          {key:"d", text:"LinUCB can't represent any non-linear reward."},
        ]}
        trap={<>(b) is the lazy answer; (a) requires recognizing crosses recover most non-linearity cheaply.</>}
        lens={<>"Linear in features" includes linear-in-engineered-features. <VIS.Term def="Pairwise products of two original features; recovers second-order interaction signal at the cost of d^2 new dimensions.">Crosses</VIS.Term> convert most non-linear reward to linear scoring before you give up debuggability.</>}
        stretch={<>Which cross feature would you try first in news ranking?</>}
      />

      {/* B3 — PM pitch */}
      <VIS.TrapProblem
        id="linucb-b3"
        difficulty="hard"
        title="B3 — One-sentence PM pitch (LinUCB-specific)"
        scenario={<>You're proposing to KEEP LinUCB after a NeuralUCB POC. PM asks "why not just use the newer thing?" Pick the pitch that COULD NOT be made about any random bandit.</>}
        options={[
          {key:"a", text:"LinUCB's closed-form A and b mean every prediction has an exact ridge confidence interval — we can prove correctness on senior review, log per-arm A^-1 to diagnose any regression, and warm-start new arms by inheriting A from sibling items. NeuralUCB's confidence is gradient-derived and provably loose in over-parameterized nets, which means we'd be explaining 'why are we paying for more exploration' to ops every week.", correct:true},
          {key:"b", text:"It's a proven baseline."},
          {key:"c", text:"It's simpler."},
          {key:"d", text:"It uses contextual bandits."},
        ]}
        trap={<>(b), (c), (d) survive redaction — apply to any baseline. (a) hinges on LinUCB-specific (closed-form ridge + provably-tight UCB bonus).</>}
        lens={<>The <VIS.Term def="A one-sentence justification for keeping (or building) something — must survive a non-ML stakeholder asking 'why not the newer thing?'.">PM pitch</VIS.Term> must require LinUCB's specific mechanism. Debuggability via A^-1 + <VIS.Term def="A confidence-bonus term that matches the actual posterior uncertainty closely; tight bonuses avoid over-exploration.">tight bonus</VIS.Term> is LinUCB's irreducible value.</>}
        stretch={<>How would you DEMO that debuggability in five minutes?</>}
      />

      {/* B4 — when LinUCB is wrong */}
      <VIS.TrapProblem
        id="linucb-b4"
        difficulty="medium"
        title="B4 — Where LinUCB is the wrong choice"
        scenario={<>Surface: ranking video ads where the strongest signal is the FOUR-way interaction (advertiser_id × user_country × time_of_day × device_type). Hand-engineering all crosses is intractable. What ships?</>}
        options={[
          {key:"a", text:"Move to NeuralUCB or a DCN-style cross-network bandit. LinUCB's 'linear in features' becomes 'linear in 4-way crosses' which is exponential in arity; you can't enumerate. NeuralUCB lets the network discover the crosses; the looser bonus is the tax you pay for not knowing the crosses upfront.", correct:true},
          {key:"b", text:"LinUCB with second-order crosses."},
          {key:"c", text:"LinUCB with first-order features."},
          {key:"d", text:"&epsilon;-greedy is fine."},
        ]}
        trap={<>(b) misses that 4-way crosses are exponentially bigger than 2-way; (c) is even further off.</>}
        lens={<><VIS.Term def="Cross features built from 3 or more original features (e.g. user x country x time-of-day); enumeration scales exponentially in arity.">High-arity crosses</VIS.Term> break LinUCB's hand-engineering economy. Pay for <VIS.Term def="A learned, dense representation produced by a neural network rather than hand-engineered features.">neural representation</VIS.Term> when arity exceeds 2-3.</>}
        stretch={<>What ablation would prove crosses-not-features are the signal?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>C. Mechanism</h3>

      {/* C1 — architectural choice: per-arm matrices */}
      <VIS.TrapProblem
        id="linucb-c1"
        difficulty="hard"
        title="C1 — Why per-arm A_a and b_a, not a shared parameter?"
        scenario={<>LinUCB maintains a separate A_a and b_a per arm. A reviewer says "isn't this wasteful — why not one big &theta; with arm-id as a feature?"</>}
        options={[
          {key:"a", text:"Per-arm theta_a allows each arm to have its OWN coefficient mapping; arm 17 may respond to 'time_of_day' while arm 18 ignores it. A shared theta + arm-id-as-feature forces every arm to share the same context coefficients, only shifting an intercept. The reviewer's suggestion collapses LinUCB to a 'context-aware popularity ranker' — much less expressive. The cost (K per-arm matrices) is what BUYS arm-specific responses to context.", correct:true},
          {key:"b", text:"Per-arm matrices are mathematically required."},
          {key:"c", text:"Shared theta has the same regret bound."},
          {key:"d", text:"There's no difference."},
        ]}
        trap={<>(d) the equivalence miss; (a) requires noticing the difference between intercept-only vs full-context arm response.</>}
        lens={<>Per-arm theta = per-arm response to features. Shared theta = global response only. LinUCB's <VIS.Term def="How rich a hypothesis class the model can fit; here, the variety of context responses each arm can have.">expressiveness</VIS.Term> lives in the per-arm choice.</>}
        stretch={<>When does a hybrid (shared + per-arm) variant win?</>}
      />

      {/* C2 — loss: ridge regression on per-arm slice */}
      <VIS.TrapProblem
        id="linucb-c2"
        difficulty="hard"
        title="C2 — Why ridge, not OLS"
        scenario={<>Why does LinUCB use ridge regression (A = lambda I + sum xx^T) rather than ordinary least squares (A = sum xx^T)?</>}
        options={[
          {key:"a", text:"The lambda I regularizer guarantees A is invertible even when the arm has zero or very few pulls (cold start). With OLS, A is singular until you have d linearly independent pulls — for a new arm, A^-1 doesn't exist and the UCB bonus is undefined. Ridge gives a sane prior on theta = 0 with shrinking confidence as data arrives. lambda also controls the initial exploration aggressiveness.", correct:true},
          {key:"b", text:"Ridge is more accurate than OLS."},
          {key:"c", text:"OLS has no closed form."},
          {key:"d", text:"Ridge is faster to compute."},
        ]}
        trap={<>(b) is sometimes wrong; (a) requires understanding the cold-start invertibility issue.</>}
        lens={<>Ridge regularizes <VIS.Term def="Whether a matrix has an inverse; requires non-zero determinant. Ridge's lambda*I guarantees invertibility from step 1.">invertibility</VIS.Term>; <VIS.Term def="Ordinary Least Squares. Linear regression with no penalty; closed form (XᵀX)⁻¹Xᵀy fails when XᵀX is singular.">OLS</VIS.Term> breaks for new arms. The lambda is also your initial UCB-bonus knob.</>}
        stretch={<>How does lambda interact with alpha?</>}
      />

      {/* C3 — what's added vs OLS-based bandit; what's dropped */}
      <VIS.TrapProblem
        id="linucb-c3"
        difficulty="medium"
        title="C3 — Added vs OLS + epsilon-greedy"
        scenario={<>vs OLS-based ε-greedy bandit, what does LinUCB add and what's dropped?</>}
        options={[
          {key:"a", text:"Adds: (i) ridge regularization lambda I, (ii) closed-form UCB bonus alpha sqrt(x A^-1 x), (iii) per-arm A^-1 maintenance. Drops: random epsilon-exploration (replaced by deterministic confidence-driven exploration). The arm-selection rule changes from 'argmax with prob 1-eps else random' to 'argmax of mean + UCB bonus'.", correct:true},
          {key:"b", text:"Adds neural networks."},
          {key:"c", text:"Drops the linear regression."},
          {key:"d", text:"Adds Thompson sampling."},
        ]}
        trap={<>(b), (d) confuse with sibling techniques; (a) gets the precise delta.</>}
        lens={<>LinUCB = OLS bandit + ridge + closed-form UCB - epsilon. <VIS.Term def="Contains everything the other method has, plus more — here, LinUCB's exploration dominates eps-greedy's random probing.">Strict superset</VIS.Term> on exploration; same scoring backbone.</>}
        stretch={<>What's the regret bound delta?</>}
      />

      {/* C4 — hyperparameter sensitivity: alpha */}
      <VIS.TrapProblem
        id="linucb-c4"
        difficulty="hard"
        title="C4 — Which hyperparameter most breaks LinUCB production"
        scenario={<>Rank operational risk if mis-set: (i) ridge lambda, (ii) UCB scale alpha, (iii) feature normalization choice, (iv) Sherman-Morrison numerical stability. Highest-risk?</>}
        options={[
          {key:"a", text:"(ii) alpha. Too small: under-explores, sub-optimal arms persist, cumulative regret unbounded; too large: bonus dominates the mean and LinUCB behaves like random sampling weighted toward under-pulled feature directions. (i) lambda is a one-time prior choice; (iii) normalization is set-and-forget; (iv) numerical stability of SM updates is a known issue with mature playbooks.", correct:true},
          {key:"b", text:"(i) ridge lambda."},
          {key:"c", text:"(iii) feature normalization."},
          {key:"d", text:"(iv) numerical stability."},
        ]}
        trap={<>(a) requires identifying alpha as the operational knob; (i), (iii), (iv) are real but mature.</>}
        lens={<>The <VIS.Term def="The alpha multiplier on the UCB bonus; the single hyperparameter that dials exploration vs exploitation in LinUCB.">exploration-coefficient</VIS.Term> is the production knob. Tune by <VIS.Term def="Estimated cumulative regret computed from logged data, typically via inverse-propensity replay.">realized-regret eval</VIS.Term> over a held-out week.</>}
        stretch={<>What's a safe default alpha for d = 100 features?</>}
      />

      {/* C5 — data assumption: stationarity */}
      <VIS.TrapProblem
        id="linucb-c5"
        difficulty="medium"
        title="C5 — Data assumption: stationarity"
        scenario={<>Vanilla LinUCB averages ALL pulls equally. Your reward distribution drifts (seasonal, news cycle). What specifically breaks, and what's the fix?</>}
        options={[
          {key:"a", text:"theta_a is the ridge solution over the WHOLE history; data 6 months old gets equal weight to last week. As the reward distribution drifts, theta lags behind; the UCB bonus shrinks (A grows monotonically) so the bandit also EXPLORES LESS as it ages. Combined: confident-but-wrong arm selection on stale evidence. Fix: discount past data via discounted-LinUCB (A *= gamma per step) or sliding-window-LinUCB.", correct:true},
          {key:"b", text:"Nothing — LinUCB is robust to drift."},
          {key:"c", text:"Only the exploration bonus changes."},
          {key:"d", text:"theta becomes unbounded."},
        ]}
        trap={<>(b) is the assumption-blind miss; (a) requires noticing the monotone growth of A.</>}
        lens={<><VIS.Term def="Property that the reward distribution does not change over time. LinUCB assumes it implicitly by averaging all history equally.">Stationarity</VIS.Term> is the silent assumption. Discount or window to handle <VIS.Term def="A gradual change in the data-generating distribution; left unaddressed it causes confident-wrong predictions.">drift</VIS.Term>; vanilla LinUCB gets confidently wrong over time.</>}
        stretch={<>What's a reasonable discount gamma for daily-drift signals?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>D. Intuition traps</h3>

      {/* D1 — "neural bandits always win" intuition */}
      <VIS.TrapProblem
        id="linucb-d1"
        difficulty="hard"
        title="D1 ⭐ — Intuitive but wrong"
        scenario={<>Intuition: "Replacing LinUCB with NeuralUCB in any contextual-bandit setting must improve cumulative reward — neural nets are more expressive." Why is this exactly wrong in many production cases?</>}
        options={[
          {key:"a", text:"NeuralUCB's confidence bonus is derived from gradient-feature covariance and is PROVABLY LOOSE for over-parameterized networks; the practical effect is over-exploration. On problems where reward is genuinely (or near-)linear in features, the looser bonus means MORE wasted probes than LinUCB's tight closed-form bonus, and cumulative REGRET is HIGHER not lower despite the more expressive model. Expressiveness without tight uncertainty = expensive miscalibration.", correct:true},
          {key:"b", text:"Neural nets always win in regret."},
          {key:"c", text:"LinUCB is mathematically a special case of NeuralUCB."},
          {key:"d", text:"Reward expressiveness alone determines regret."},
        ]}
        trap={<>(d) is the intuition; (a) requires noticing that exploration tightness matters more than predictive expressiveness for cumulative regret.</>}
        lens={<>Regret = <VIS.Term def="Reward lost because the model picked an arm whose predicted value was wrong relative to the true best arm.">misprediction</VIS.Term> + <VIS.Term def="Reward sacrificed by deliberately picking sub-optimal arms to learn about them; the price of information.">exploration cost</VIS.Term>. Better predictions with looser bonus can be net-worse.</>}
        stretch={<>How would you empirically test whether to switch?</>}
      />

      {/* D2 — wrong-assumption cascade */}
      <VIS.TrapProblem
        id="linucb-d2"
        difficulty="hard"
        multiSelect
        title="D2 ⭐ — Wrong-assumption cascade"
        scenario={<>You assume "LinUCB is a simple linear regression with extra exploration — I can drop it in anywhere." Which downstream decisions does this WRONG assumption silently break? Select all.</>}
        options={[
          {key:"a", text:"Memory budget — A^-1 per arm is d^2 floats; with 100k arms and d=200 that's ~30 GB just for the matrices, not 'a simple regression'.", correct:true},
          {key:"b", text:"Cold start — vanilla LinUCB explodes-then-shrinks bonus on new arms, pulling them aggressively; if you have churn the bandit acts erratic until lambda dominates.", correct:true},
          {key:"c", text:"Calibration — UCB scores are NOT calibrated probabilities; reusing them for downstream pricing or thresholds gives garbage results.", correct:true},
          {key:"d", text:"Latency — LinUCB is somehow much slower than a neural network at serving."},
          {key:"e", text:"Algorithm convergence — LinUCB mathematically does not converge."},
        ]}
        trap={<>(d), (e) are unanchored; (a)-(c) are real cascades.</>}
        lens={<>Per-arm matrices, cold-start aggressive exploration, <VIS.Term def="The UCB score is mean + bonus, not a probability — reusing it as a calibrated probability for thresholding or pricing is wrong.">UCB-not-probability</VIS.Term> — three real landmines in 'just a regression' framing.</>}
        stretch={<>Which has bitten the most teams in practice?</>}
      />

      {/* D3 — junior vs senior */}
      <VIS.TrapProblem
        id="linucb-d3"
        difficulty="hard"
        title="D3 — Junior vs senior fix on degraded LinUCB"
        scenario={<>LinUCB CTR is declining month-over-month. Junior MLE: "more features, retrain weekly." Senior MLE reaches for what FIRST?</>}
        options={[
          {key:"a", text:"Check whether A_a has grown to the point where the UCB bonus is too SMALL — i.e., LinUCB has stopped exploring under the original alpha. Long-horizon LinUCB without discounting loses adaptivity. Senior fix: switch to discounted or sliding-window LinUCB so the bonus stays alive; raise alpha as a stopgap; only after that consider feature changes.", correct:true},
          {key:"b", text:"Add neural feature crosses."},
          {key:"c", text:"Increase batch size."},
          {key:"d", text:"Switch to TS."},
        ]}
        trap={<>Junior's reflex doesn't address the structural fact that vanilla LinUCB loses exploration over time.</>}
        lens={<>Senior MLE looks for <VIS.Term def="Drift that comes from the algorithm's own dynamics (A_a growing forever), not from external data changes; invisible to feature monitoring.">STRUCTURAL drift</VIS.Term>: is A <VIS.Term def="Always increasing, never decreasing; A_a grows with every pull because xx^T is positive semidefinite.">monotonically growing</VIS.Term>? Is alpha now too small relative to A_t?</>}
        stretch={<>What's a metric that detects this before CTR drops?</>}
      />

      {/* D4 — symptom misattribution */}
      <VIS.TrapProblem
        id="linucb-d4"
        difficulty="hard"
        title="D4 — Plausible misattribution"
        scenario={<>Symptom: a small subset of arms (about 2%) get disproportionate exposure, dominate CTR but also dominate user complaints ('seeing the same article over and over'). Most likely root cause in LinUCB?</>}
        options={[
          {key:"a", text:"These arms have built up large A_a (many pulls in dominant feature directions); their UCB bonus is now tiny, but their theta_a^T x is high. LinUCB lacks any explicit diversity/repeat-suppression mechanism — it scores by mean+bonus, so 'best arm wins until it isn't best'. Fix is NOT inside LinUCB; bolt on a per-user dedupe or diversity reranker downstream.", correct:true},
          {key:"b", text:"alpha too high."},
          {key:"c", text:"lambda too low."},
          {key:"d", text:"Feature normalization off."},
        ]}
        trap={<>(b), (c), (d) all knob-tuning miss the structural fact that LinUCB has no anti-repetition.</>}
        lens={<>LinUCB optimizes <VIS.Term def="Reward measured per individual decision; ignores effects of repeated exposure to the same item across a session or day.">single-step reward</VIS.Term>; <VIS.Term def="The same item appearing repeatedly across a user's sessions; LinUCB has no native mechanism to suppress it.">long-tail repetition</VIS.Term> is invisible to it. Always pair with a <VIS.Term def="A reranker that enforces topic/source spread within a list; common bolt-on for bandits.">diversity layer</VIS.Term>.</>}
        stretch={<>What diversity reranker would you choose?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>E. Operations</h3>

      {/* E1 — production gotcha: SM numerical drift */}
      <VIS.TrapProblem
        id="linucb-e1"
        difficulty="hard"
        title="E1 — Production gotcha: Sherman-Morrison drift"
        scenario={<>After 6 months of running LinUCB with incremental Sherman-Morrison updates to A_a^-1, scores for the most-pulled arms start producing NaN. What's happening, and what's the fix?</>}
        options={[
          {key:"a", text:"Sherman-Morrison maintains A^-1 incrementally as a rank-1 update; floating-point error accumulates over millions of updates and A_a^-1 drifts from the true inverse. For most-pulled arms (millions of updates) the cumulative drift exceeds the matrix's condition number, producing NaN or wildly wrong UCB bonuses. Fix: periodically (e.g., monthly) recompute A_a^-1 from A_a by full inversion; track the residual ||A * A^-1 - I||_F and trigger a re-inversion when above threshold.", correct:true},
          {key:"b", text:"Reward distribution shift."},
          {key:"c", text:"Memory leak."},
          {key:"d", text:"Garbage collection issue."},
        ]}
        trap={<>(b), (c), (d) are all generic; (a) is LinUCB-specific operational reality.</>}
        lens={<>Sherman-Morrison is a <VIS.Term def="An algorithmic speedup that improves runtime/memory but introduces floating-point error not present in the exact computation.">numerical optimization</VIS.Term> with a maintenance cost. Schedule the recomputation.</>}
        stretch={<>What residual threshold triggers a re-inversion?</>}
      />

      {/* E2 — Failure on Friday */}
      <VIS.TrapProblem
        id="linucb-e2"
        difficulty="hard"
        title="E2 ⭐ — Failure on Friday"
        scenario={<>Friday 3am page: LinUCB CTR collapses on the news front page. Investigation: Thursday a content team added 50k new articles (a backlog drop). Latency, GPU, ranker QPS all unchanged. Why is this LinUCB-specific?</>}
        options={[
          {key:"a", text:"50k new arms = 50k fresh A_a = lambda I, A_a^-1 = (1/lambda) I. Each fresh arm has a HUGE UCB bonus (alpha sqrt(x A^-1 x) scales as 1/sqrt(lambda)). LinUCB aggressively pulls every new arm. With 50k probes on under-CTR content, observed CTR collapses until lambda dominates per-arm. Fix: warm-start new arms by inheriting A from sibling arms (same topic / publisher) OR rate-limit how many new arms enter the catalog per day.", correct:true},
          {key:"b", text:"Generic catalog drift — retrain."},
          {key:"c", text:"GPU OOM."},
          {key:"d", text:"Latency spike."},
        ]}
        trap={<>(b), (c), (d) are all generic; (a) is LinUCB's specific cold-arm exploration behavior.</>}
        lens={<>Per-arm <VIS.Term def="When a new arm has no history, LinUCB's UCB bonus is huge by construction, causing aggressive exploration.">cold-start</VIS.Term> is structurally aggressive; warm-start or <VIS.Term def="Cap how many new arms enter the catalog per day so the bandit isn't overwhelmed by simultaneous cold-start exploration.">rate-limit</VIS.Term>. The signal is large UCB bonus per fresh arm.</>}
        stretch={<>What warm-start strategy preserves the regret bound?</>}
      />

      {/* E3 — library default */}
      <VIS.TrapProblem
        id="linucb-e3"
        difficulty="medium"
        title="E3 — Library default to override"
        scenario={<>Which reference-implementation default for LinUCB is most likely to bite you?</>}
        options={[
          {key:"a", text:"The exploration coefficient alpha. Reference implementations often hard-code alpha = 1.0 (a textbook value). At production reward scale (e.g. CTR in [0, 1]), alpha = 1.0 swamps the mean prediction; effective behavior is near-random for many arms. Tune alpha from a held-out replay of the past month's log; expect alpha in [0.05, 0.5] for CTR-scale rewards.", correct:true},
          {key:"b", text:"lambda default."},
          {key:"c", text:"Random seed."},
          {key:"d", text:"Feature normalization."},
        ]}
        trap={<>Standard defaults; (a) is the production-specific one that's regularly wrong.</>}
        lens={<>alpha scales with <VIS.Term def="The numeric span of rewards (e.g. [0,1] for CTR, [0,100] for ratings); alpha values that work for one range over- or under-explore another.">reward range</VIS.Term>; library defaults assume unit-scale reward. Always re-tune.</>}
        stretch={<>How do you estimate alpha from a week of logs?</>}
      />

      {/* E4 — rollout */}
      <VIS.TrapProblem
        id="linucb-e4"
        difficulty="hard"
        mode="ordered"
        title="E4 — Rollout sequence: random -> LinUCB"
        scenario={<>Migrate from random ranking to LinUCB on a personalized surface. Order the phases. Items that don't belong are not ranked.</>}
        options={[
          {key:"a", text:"Backfill per-impression feature vectors x_t and rewards in logs.", order:1},
          {key:"b", text:"Offline replay LinUCB on the historical log with several alpha values; pick the alpha that minimizes inverse-propensity-corrected regret on a held-out week.", order:2},
          {key:"c", text:"Shadow-serve LinUCB scores alongside random; verify A_a^-1 stability over a week.", order:3},
          {key:"d", text:"1% live ramp with a kill switch on cumulative CTR delta.", order:4},
          {key:"e", text:"Full ramp; monitor A^-1 residual + alpha re-tune monthly.", order:5},
          {key:"f", text:"Replace random with LinUCB on day 1."},
          {key:"g", text:"Tune alpha after rollout."},
        ]}
        trap={<>(f), (g) skip the offline tuning that LinUCB needs.</>}
        lens={<><VIS.Term def="Re-running a policy over logged interactions, using importance weighting (IPS) to estimate its online performance without serving traffic.">Offline replay</VIS.Term> is the critical phase. alpha tuned post-launch can crash CTR before you measure it.</>}
        stretch={<>What's the <VIS.Term def="Inverse Propensity Score estimator. Reweights logged rewards by the inverse of the logging policy's probability of choosing the same arm; unbiased under full support.">IPS estimator</VIS.Term> for LinUCB regret?</>}
      />

      {/* E5 — reproducibility */}
      <VIS.TrapProblem
        id="linucb-e5"
        difficulty="medium"
        title="E5 — Paper-to-production reproducibility"
        scenario={<>The 2010 paper reports CTR lift on Yahoo Today Module. Which detail is hardest to reproduce in your news app?</>}
        options={[
          {key:"a", text:"The exact feature-engineering pipeline. The paper hashes user + article features into a fixed-dim representation; your features (user_id, item_id, demographics) are NOT the same vector space. Re-running with 'comparable' features rarely matches the paper's lift; LinUCB's reported gain is a function of features at least as much as algorithm.", correct:true},
          {key:"b", text:"alpha."},
          {key:"c", text:"lambda."},
          {key:"d", text:"Random seed."},
        ]}
        trap={<>(a) requires recognizing that bandit results live or die on features.</>}
        lens={<>LinUCB's published <VIS.Term def="The performance gain (CTR, reward) a new method delivers relative to the baseline; the headline number in papers and dashboards.">lift</VIS.Term> is a function of <VIS.Term def="The pipeline that turns raw signals into model-ready features (hashing, cross terms, normalizations); often the dominant driver of bandit performance.">feature engineering</VIS.Term>; reproducibility requires the SAME features, which are usually not available.</>}
        stretch={<>What's the cheapest way to validate on your data?</>}
      />

      {/* E6 — eval contamination */}
      <VIS.TrapProblem
        id="linucb-e6"
        difficulty="hard"
        title="E6 — Eval contamination"
        scenario={<>An offline LinUCB-vs-NeuralUCB benchmark uses an IPS replay over the LinUCB-collected log. NeuralUCB looks worse by a noticeable margin. How is this contaminated?</>}
        options={[
          {key:"a", text:"The historical log was generated by LinUCB; arms LinUCB liked were over-represented; arms LinUCB disliked have near-zero log mass. IPS reweighting needs every arm to have non-zero logging probability; under LinUCB the support is concentrated. NeuralUCB might propose arms with near-zero log support, where IPS variance is infinite. The 'NeuralUCB looks worse' is partially an artifact of IPS variance, not true performance. Fix: replay on an epsilon-greedy-collected log with broader support; OR use doubly-robust estimators.", correct:true},
          {key:"b", text:"Sample size too small."},
          {key:"c", text:"Wrong random seed."},
          {key:"d", text:"NeuralUCB is just worse."},
        ]}
        trap={<>(d) is the confident-wrong answer; (a) requires the IPS-support insight.</>}
        lens={<><VIS.Term def="Evaluating one policy from logs collected by a different policy; requires support overlap to be unbiased.">Off-policy eval</VIS.Term> requires <VIS.Term def="Every arm the new policy might choose must have non-zero probability under the logging policy; otherwise IPS variance is unbounded.">support match</VIS.Term>. LinUCB-collected logs are poor for evaluating any non-LinUCB challenger.</>}
        stretch={<>How would you collect a fair offline log?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      {/* F1 — edge case: single context feature */}
      <VIS.TrapProblem
        id="linucb-f1"
        difficulty="medium"
        title="F1 — Edge case: d = 1 feature"
        scenario={<>You configure LinUCB with d = 1 (a single context feature). What does it collapse to?</>}
        options={[
          {key:"a", text:"With d = 1, A_a is a scalar (1x1 matrix) and theta_a is a scalar coefficient on the one feature. LinUCB becomes a 'context-aware UCB1' — separate UCB1 statistics binned by the single context value. It's not broken, just degenerate; you've lost the contextual personalization claim and could use plain UCB1 with per-context-value buckets.", correct:true},
          {key:"b", text:"LinUCB crashes at d = 1."},
          {key:"c", text:"Becomes Thompson sampling."},
          {key:"d", text:"Loses UCB bonus."},
        ]}
        trap={<>(a) requires reasoning about the degenerate case; (b), (c), (d) miss.</>}
        lens={<><VIS.Term def="Showing that a complex algorithm collapses to a simpler known one under a special parameter setting; a good sanity / unit test.">Reduction sanity-check</VIS.Term>: d = 1 LinUCB = bucketed <VIS.Term def="The classical context-free UCB algorithm; picks the arm maximizing empirical mean + sqrt(2 log t / n_a).">UCB1</VIS.Term>. Useful as a unit test.</>}
        stretch={<>What's a unit test that asserts this reduction?</>}
      />

      {/* F2 — adversarial */}
      <VIS.TrapProblem
        id="linucb-f2"
        difficulty="hard"
        title="F2 — Adversarial attack on the linearity assumption"
        scenario={<>Design an adversarial reward function that makes LinUCB systematically under-perform a random ranker, while remaining valid (reward in [0, 1]).</>}
        options={[
          {key:"a", text:"Construct a reward that is HIGHLY non-linear in features but each per-arm marginal reward LOOKS linear when projected onto any single feature. Example: r = (x_1 XOR x_2) for binary features. LinUCB fits a linear theta and predicts a constant (cannot recover XOR); UCB bonus is symmetric so it doesn't prefer any arm; effective behavior is random — but biased by the WRONG linear fit. A random ranker without an opinion is at least unbiased; LinUCB is confidently wrong.", correct:true},
          {key:"b", text:"Use a constant reward."},
          {key:"c", text:"Add Gaussian noise."},
          {key:"d", text:"Increase d."},
        ]}
        trap={<>(a) requires the XOR-canonical insight; (b), (c), (d) are weaker.</>}
        lens={<><VIS.Term def="Exclusive-or. The canonical example of a function no linear model can represent (no hyperplane separates the two classes).">XOR</VIS.Term> is the canonical linearity-breaker. Any pure non-linear reward is invisible to LinUCB.</>}
        stretch={<>How would you DETECT this in production?</>}
      />

      {/* F3 — reverse engineering */}
      <VIS.TrapProblem
        id="linucb-f3"
        difficulty="hard"
        title="F3 — Reverse engineering: 'arm-pull distribution skews toward exactly 3 arms'"
        scenario={<>Symptom: over a month, 3 specific arms receive a disproportionate share of pulls; cumulative regret rises. theta values for those 3 arms are NOT obviously higher. Which LinUCB design choice causes this?</>}
        options={[
          {key:"a", text:"The UCB bonus alpha sqrt(x A^-1 x) for those arms is structurally LARGER because their A matrices happen to be near-singular in the direction of the typical context x — many pulls in correlated directions inflate the bonus on perpendicular directions. The result is positive-feedback over-exploration of those arms. Fix: feature-direction monitoring; check eigenvalue distribution of A per arm; pre-normalize feature space so all directions accumulate evidence at similar rates.", correct:true},
          {key:"b", text:"alpha too high."},
          {key:"c", text:"Reward shift."},
          {key:"d", text:"Random chance."},
        ]}
        trap={<>(a) requires understanding that A^-1's eigenvalues drive bonus magnitudes; (b)-(d) miss.</>}
        lens={<>Bonus magnitude tracks A^-1's <VIS.Term def="The full set of eigenvalues of a matrix; characterizes its directional behavior beyond a single scalar like the determinant.">spectrum</VIS.Term>, not just pull count. Monitor <VIS.Term def="The scaling factors along the principal directions of a matrix; large = strong signal, near-zero = under-explored direction.">eigenvalues</VIS.Term>.</>}
        stretch={<>What pre-processing prevents this?</>}
      />

      {/* F4 — paper-named failure */}
      <VIS.TrapProblem
        id="linucb-f4"
        difficulty="hard"
        title="F4 — Paper-named failure mode"
        scenario={<>The 2010 paper names one specific regime where the linear reward assumption breaks predictively in news data. Which?</>}
        options={[
          {key:"a", text:"Breaking-news regime: when articles have time-varying reward distributions (a story trends, then dies), LinUCB's stationary theta lags the trend. The paper acknowledges this and recommends pairing LinUCB with a freshness boost (engineered feature: 'hours since publication') so the linearity assumption captures the trend slope.", correct:true},
          {key:"b", text:"Long-tail items — LinUCB handles those fine."},
          {key:"c", text:"Power-law feature distributions."},
          {key:"d", text:"Cold-start users — paper claims no issue."},
        ]}
        trap={<>The paper's actual named issue (time-varying reward) is non-obvious if you didn't read §6.</>}
        lens={<>Trending content violates stationarity locally; engineered <VIS.Term def="Features like 'hours since publication' that turn time-varying reward into a slope a linear model can capture.">freshness features</VIS.Term> patch the linearity assumption.</>}
        stretch={<>What freshness feature shape works best?</>}
      />

      {/* F5 — community-found follow-up: NeuralUCB and corruption robustness */}
      <VIS.TrapProblem
        id="linucb-f5"
        difficulty="hard"
        title="F5 — Community-found weakness"
        scenario={<>Post-2020 literature critiques LinUCB on ONE specific failure mode that NeuralUCB / corrupted-bandit variants address. Which?</>}
        options={[
          {key:"a", text:"LinUCB's ridge regression assumes i.i.d. reward noise; under adversarial corruption (a fraction of rewards are arbitrary) the ridge estimator's bias scales linearly with corruption fraction. Robust variants (e.g. NeurIPS 2024 'Robust Neural Contextual Bandit against Adversarial Corruptions') use heavy-tailed loss or trimmed mean to bound bias. The vanilla LinUCB has no such robustness.", correct:true},
          {key:"b", text:"LinUCB cannot handle binary rewards."},
          {key:"c", text:"LinUCB requires Gaussian features."},
          {key:"d", text:"There are no such follow-ups."},
        ]}
        trap={<>(d) confidently denies the literature; (b), (c) are factually wrong.</>}
        lens={<><VIS.Term def="A setting where an adversary can arbitrarily corrupt some fraction of rewards; breaks classical least-squares estimators.">Adversarial corruption</VIS.Term> is the modern weakness; <VIS.Term def="Loss functions (Huber, trimmed mean, heavy-tailed log-likelihood) that bound the influence of any single outlier point on the estimate.">robust loss functions</VIS.Term> are the fix.</>}
        stretch={<>What's the corruption-rate threshold where you switch to robust variants?</>}
      />

      {/* F6 — ridge regularization tuning under non-stationarity */}
      <VIS.TrapProblem
        id="linucb-f6"
        difficulty="hard"
        title="F6 — Ridge tuning under non-stationary rewards"
        scenario={<>LinUCB's A_a = lambda*I + sum x x^T fixes lambda at init. After 4 months in production the reward function for "Promoted" arm has clearly shifted (CTR distribution moved by ~30%). A junior MLE proposes increasing lambda to "increase exploration." What is actually happening with lambda under non-stationarity, and what's the right fix?</>}
        options={[
          {key:"a", text:"lambda is a STATIC prior that controls the per-arm bonus only at early-stage (when sum x x^T is small relative to lambda*I). Once an arm has 10M pulls, sum x x^T DWARFS lambda*I, so changing lambda has near-zero effect on the bonus — the issue is that A is over-confident from a STALE world. Fix: time-decay the matrix itself (gamma*A_a + x x^T with gamma<1) so old data shrinks; lambda alone cannot drive forgetting once arms are mature.", correct:true},
          {key:"b", text:"Increasing lambda is the textbook fix for drift."},
          {key:"c", text:"lambda always controls exploration, regardless of pull count."},
          {key:"d", text:"Non-stationarity is impossible in LinUCB by construction."},
        ]}
        trap={<>(b) is the seductive textbook quote ("lambda is a regularizer; bigger = more exploration") that ignores how lambda's grip on A vanishes with sample size.</>}
        lens={<>lambda controls early-stage bonus; mature arms need <VIS.Term def="Multiplicative shrinkage of A_a (gamma<1) each step so old data contributes less; the actual mechanism for adapting to drift.">DECAY</VIS.Term>, not bigger lambda. The right knob is forgetting (<VIS.Term def="LinUCB with A_a multiplied by gamma each step; old observations are exponentially down-weighted.">discounted LinUCB</VIS.Term>), not the prior.</>}
        stretch={<>What gamma corresponds to a 90-day half-life on rewards?</>}
      />

      {/* F7 — what 'still beats LinUCB' really means */}
      <VIS.TrapProblem
        id="linucb-f7"
        difficulty="hard"
        title="F7 — Why LinUCB is still the production baseline in 2024-2025"
        scenario={<>2024 industry surveys consistently report LinUCB as the production baseline against which neural bandits are measured. What's the deeper reason?</>}
        options={[
          {key:"a", text:"Three combined properties: (i) closed-form, debuggable, log-able per-arm A and b (you can prove what the bandit will do for ANY x); (ii) tight UCB bonus (provably-tight confidence intervals — no over-exploration); (iii) trivial to extend with engineered cross features. The combination makes it the 'IDE-friendly bandit'; replacing it requires the challenger to beat all three properties, not just predictive accuracy.", correct:true},
          {key:"b", text:"It's the most accurate."},
          {key:"c", text:"It's the cheapest to train."},
          {key:"d", text:"It's the oldest."},
        ]}
        trap={<>(b) often false; (c) misses the operational story; (d) tautological. (a) is the real reason.</>}
        lens={<><VIS.Term def="Properties about running the system in production (debug, log, extend, prove correctness) rather than its raw predictive accuracy.">Operational properties</VIS.Term> (debuggability, tight bonus, <VIS.Term def="How easy it is to add features, crosses, or composition layers without breaking the model's analysis.">extensibility</VIS.Term>) beat predictive accuracy in baseline selection. LinUCB's enduring lead is about <VIS.Term def="A trait of the algorithm that holds up under scrutiny by an experienced reviewer — provable, observable, debuggable.">senior-review friendliness</VIS.Term>, not just regret.</>}
        stretch={<>What single operational property would NeuralUCB need to dethrone LinUCB?</>}
      />

    </VIS.Section>
