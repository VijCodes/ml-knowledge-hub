      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// BSARec — Beyond Self-Attention for Sequential Recommendation (AAAI 2024)
// v2 redo — ~36 trap problems spanning A-F taxonomy axes.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Lifelong sequence (Fourier inductive bias)"
      title="BSARec — Beyond Self-Attention"
      subtitle={<>Self-attention + a learnable <VIS.Term def="A representation of a signal in terms of its constituent frequencies (sinusoids of different periods). Reached via FFT; reverted via inverse FFT (iFFT).">Fourier-domain</VIS.Term> filter in parallel — combats <VIS.Term def="GNN/transformer failure where stacking many layers makes every token representation converge toward the global average; distinguishing power collapses.">over-smoothing</VIS.Term> on long sequences while preserving global mixing.</>}
      byline={[
        {label: "Paper", value: "Shin et al., AAAI 2024"},
        {label: "Year", value: "2024"},
        {label: "Domain", value: "Mid-length sequential rec"},
      ]}/>

    <VIS.TLDR>
      Plain <VIS.Term def="Self-Attentive Sequential Recommendation (Kang & McAuley, 2018). Causal transformer over item-only sequences with BCE loss; the standard sequential-recsys baseline.">SASRec</VIS.Term> <VIS.Term def="Attention mechanism where each token attends to every other token in the same sequence; output is a softmax-weighted average of value vectors. Intrinsically low-pass.">self-attention</VIS.Term> OVER-SMOOTHS hidden states on long sequences (200-500 events): repeated weighted-averaging causes <VIS.Term def="Failure mode where deep transformer/GNN layers drive all token representations toward a single point, erasing the per-position information that NDCG depends on.">token homogenization</VIS.Term>, hurting <VIS.Term def="Normalized Discounted Cumulative Gain. Ranking metric that rewards relevant items appearing near the top of the list.">NDCG</VIS.Term>. BSARec adds a <strong>parallel Fourier-domain learnable filter</strong> (<VIS.Term def="Fast Fourier Transform. Algorithm that converts a length-L signal into its L frequency-domain coefficients in O(L log L). Requires power-of-2 length for the classic radix-2 form.">FFT</VIS.Term> → learnable mask → <VIS.Term def="Inverse FFT. Converts a frequency-domain representation back into the original-length time/position signal.">iFFT</VIS.Term>) that preserves <VIS.Term def="Components of a signal that change rapidly across positions — in recsys, these correspond to recent taste shifts, novelty signals, and abrupt behavioral changes.">high-frequency</VIS.Term> taste-shift signals self-attention would smooth away. Output = α·attention + (1-α)·filter, with α learned per layer. Source: <a href="https://arxiv.org/abs/2312.10325" target="_blank" rel="noopener">arXiv:2312.10325</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        BSARec is a <VIS.Term def="A bias built into the architecture (not learned from data) that biases the model toward particular kinds of patterns — here, preserving high-frequency structure that self-attention smooths away.">attentive inductive bias</VIS.Term> for sequential recsys. Each <VIS.Term def="Sequence model built from stacked self-attention plus feed-forward blocks; the architectural family BSARec retrofits.">transformer</VIS.Term> block now has TWO paths in parallel: the standard <VIS.Term def="Function that turns a vector of scores into a probability distribution; in attention, it produces the convex-combination weights that make attention intrinsically a low-pass averaging operation.">softmax</VIS.Term>-attention path AND a learnable <VIS.Term def="Operation that suppresses some frequency components while preserving others; here applied element-wise on the FFT coefficients via a trainable per-frequency mask.">frequency filter</VIS.Term> path.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  H["Sequence hidden states (length L)"]
  H --> A["Path 1: standard self-attention"]
  H --> F["Path 2: FFT then learnable freq-mask then iFFT"]
  A --> M["alpha-weighted mix"]
  F --> M
  M --> O["Output to next block"]
  style A fill:#dbeafe,stroke:#1e40af
  style F fill:#fef3c7,stroke:#d97706
      `} />
      <p>
        α ∈ [0,1] is learned per layer. Early layers tend to favor filter (preserve detail); deep layers favor attention (mix globally). The filter mask itself is a per-frequency gain, initialized as a soft <VIS.Term def="Filter that preserves low frequencies (slow trends) and attenuates high frequencies (fast changes). Repeated softmax averaging is implicitly low-pass — the failure mode BSARec attacks.">low-pass</VIS.Term> and free to drift toward <VIS.Term def="Filter that preserves high frequencies (abrupt changes) and attenuates low frequencies (slow trends). The complement of low-pass; what BSARec's learnable mask grows toward when over-smoothing is the bottleneck.">high-pass</VIS.Term> or <VIS.Term def="Filter that preserves a contiguous band of frequencies and attenuates the rest. Useful when the relevant taste-shift signal lives in a known periodicity range.">band-pass</VIS.Term> during training.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — How it differs from siblings">
      <p>
        <strong>vs SASRec / <VIS.Term def="BERT-style masked-item sequential recommender (Sun et al. 2019). Bidirectional transformer trained with cloze masking; same self-attention backbone as SASRec, same over-smoothing failure mode.">BERT4Rec</VIS.Term>:</strong> Plain self-attention over item sequences. BSARec adds the Fourier inductive bias on the SAME backbone.
      </p>
      <p>
        <strong>vs <VIS.Term def="Filter-enhanced MLP for sequential rec (Zhou et al. WWW 2022). Replaces self-attention entirely with FFT-based filtering plus MLP-mixer blocks; the pure-filter sibling BSARec is explicitly designed against.">FMLP-Rec</VIS.Term> (sibling):</strong> FMLP-Rec REPLACES self-attention with <VIS.Term def="Architecture that mixes information using only multi-layer perceptrons — one across tokens, one across channels — instead of self-attention.">MLP-mixer</VIS.Term> + Fourier filter. BSARec AUGMENTS self-attention with a filter — keeps long-range attention, adds the high-freq path.
      </p>
      <p>
        <strong>vs <VIS.Term def="Hierarchical Sequential Transduction Units (Meta 2024). A custom-attention recsys family designed for trillion-parameter, ultra-long-sequence training; addresses scale, not the SASRec-scale over-smoothing BSARec targets.">HSTU</VIS.Term>:</strong> HSTU's contribution is custom attention + heterogeneous tokens + huge-scale training. BSARec's contribution is an inductive-bias FIX for over-smoothing at standard SASRec scale. Much smaller delta, different problem.
      </p>
      <p>
        <strong>vs <VIS.Term def="ByteDance long-sequence recsys transformer (Sun et al. RecSys 2025). Compresses the whole user history via global tokens + segment retrieval so attention can operate on 10⁴–10⁶ events.">LONGER</VIS.Term> / <VIS.Term def="Two-stage user-behavior-modeling family (Pi et al.). Retrieves a short relevant sub-sequence from a very long history before applying attention; the retrieval-based answer to ultra-long sequences.">TWIN</VIS.Term>:</strong> Those scale to 10⁴-10⁶ events via compression or retrieval. BSARec stays at SASRec-scale (200-500) but fixes the quality plateau in that range.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick it">
      <p>
        Pick BSARec when sequence length 200-500 (where SASRec/BERT4Rec plateau), small-to-medium training data, want an incremental architectural improvement over a known baseline without changing the pipeline. Don't pick for ultra-long sequences (over 5k — use LONGER/TWIN/HSTU), very short (under 50 — over-smoothing isn't the <VIS.Term def="The single failure mode that, if fixed, would unlock the next quality step — versus other failures whose fixes give nothing. BSARec only helps when over-smoothing is the binding constraint.">binding constraint</VIS.Term>), or content-rich items (use <VIS.Term def="Hierarchical LLM recommender (ByteDance). Two-tier design with one LLM over item content and one over the user sequence; the choice when items have rich text/image content rather than just IDs.">HLLM</VIS.Term>). The diagnostic is whether deeper SASRec layers produce monotonically higher inter-position <VIS.Term def="Similarity measure equal to the dot product of two unit vectors; ranges in [-1, 1]. Tracking it across layers is the standard probe for token homogenization.">cosine similarity</VIS.Term> — the smoking gun of over-smoothing.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  D["Sequence-length assessment"]
  D --> Q1{"Length 200-500?"}
  Q1 -->|No, shorter| SAS["SASRec is fine"]
  Q1 -->|No, longer| Long["LONGER / TWIN / HSTU"]
  Q1 -->|Yes| Q2{"Over-smoothing diagnosed?"}
  Q2 -->|No| SAS2["SASRec is fine"]
  Q2 -->|Yes| BSA["BSARec"]
  style BSA fill:#dcfce7,stroke:#16a34a
      `} />
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations & gotchas">
      <p>
        <strong>Over-smoothing isn't always the bottleneck:</strong> on short sequences, the filter contributes noise. <strong>FFT padding gotchas:</strong> FFT requires power-of-2 sequence length; production sequences vary; <VIS.Term def="Filling unused positions in a fixed-length tensor (zeros, repeat, or special token). Choice of left-pad vs right-pad interacts with causal masking and FFT correctness.">padding strategy</VIS.Term> interacts with <VIS.Term def="Attention mask that prevents each position from attending to future positions; enforces left-to-right autoregressive sequence modeling.">causal masking</VIS.Term>. <strong>α drift during training</strong>: deep-layer α can drift to 1, undoing the filter's contribution. <strong>Real-valued FFT (<VIS.Term def="Real-valued FFT. Half-spectrum FFT for real-valued inputs; saves memory but the inverse step (irfft) needs the original length passed explicitly or it silently truncates.">rfft</VIS.Term>) output-length:</strong> if you forget to pass <code>output_length=L</code> to the inverse step, the last tokens are silently zero-padded post-iFFT and NDCG degrades quietly on long sequences. <strong>Domain transfer:</strong> the learned filter is domain-specific — generic <VIS.Term def="Initializing weights from a related domain's solution rather than from scratch; here, seeding the filter mask from the target domain's empirical frequency spectrum.">warm-start</VIS.Term> from one domain may not transfer.
      </p>
      <VIS.Callout kind="gotcha" title="The short-sequence trap">
        On users with under ~30 events, sequences have no meaningful frequency content; the learned filter overfits to noise; new-user cohorts regress. Gate the filter contribution (α=0) when sequence length is below threshold.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">

          {key:"a", text:"No — sessions of length 5 don't have over-smoothing problems (no depth to smooth across); the filter has no frequency content to learn from; FFT padding overhead is pure waste. Stay on SASRec or use a recency-only ranker.", correct:true},
          {key:"b", text:"Yes — BSARec always lifts NDCG."},
          {key:"c", text:"Yes — flash sales have lifelong behavior."},
          {key:"d", text:"Maybe — depends on GPU budget."},
        ]}
        trap={<>(c) misreads "session"; (b), (d) are non-anchored.</>}
        lens={<>BSARec's value depends on having a sequence long enough to over-smooth. Short sessions kill the value proposition.</>}
        stretch={<>What's the minimum effective length?</>}
      />

      {/* ============== C. Mechanism ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>C. Mechanism</h3>

      {/* axis: C1 */}
      <VIS.TrapProblem
        id="bsarec-c1"
        difficulty="hard"
        title="C1 — Why a Fourier filter specifically?"
        scenario={<>Why does the inductive bias use a Fourier filter, not (say) a depthwise convolution or a band-stop attention?</>}
        options={[
          {key:"a", text:"Self-attention's over-smoothing is exactly a low-pass operation in the frequency domain (repeated averaging filters out high frequencies). The Fourier filter is the most direct dual: it operates directly in the frequency domain where the smoothing happens, letting it surgically restore frequencies attention removed. Depthwise conv is a coarser low/high-pass approximation; band-stop attention conflates the filter with attention weights.", correct:true},
          {key:"b", text:"Fourier is mathematically equivalent to convolution."},
          {key:"c", text:"FFT is faster."},
          {key:"d", text:"Fourier is the only learnable filter."},
        ]}
        trap={<>(b) is true but doesn't explain the choice (you could use convolution). (c), (d) are misreads.</>}
        lens={<>The frequency-domain framing matches the failure mode (low-pass over-smoothing). Direct attack on the problem.</>}
        stretch={<>What's the relationship between filter bandwidth and over-smoothing depth?</>}
      />

      {/* axis: C2 */}
      <VIS.TrapProblem
        id="bsarec-c2"
        difficulty="hard"
        title="C2 — Loss-shape consequences"
        scenario={<>BSARec uses the same next-item BCE/sampled-softmax loss as SASRec. Why doesn't the loss need to change?</>}
        options={[
          {key:"a", text:"The filter is a drop-in module inside the transformer block — output shape unchanged, output semantics unchanged. The loss operates on the final next-item prediction; the architectural change is internal. This is the design point: BSARec is an inductive-bias retrofit, not a new training paradigm.", correct:true},
          {key:"b", text:"BSARec uses a different loss."},
          {key:"c", text:"The filter requires a separate loss."},
          {key:"d", text:"Loss must always change with architecture."},
        ]}
        trap={<>(b), (c), (d) are wrong.</>}
        lens={<>Drop-in retrofit is the commercial appeal. Pipeline unchanged.</>}
        stretch={<>Would an auxiliary loss on the filter path help?</>}
      />

      {/* axis: C3 */}
      <VIS.TrapProblem
        id="bsarec-c3"
        difficulty="hard"
        title="C3 — What's dropped vs FMLP-Rec"
        scenario={<>FMLP-Rec uses pure filter (no attention); BSARec uses both paths. What does FMLP-Rec FORFEIT that BSARec keeps?</>}
        options={[
          {key:"a", text:"Long-range global token mixing. The Fourier filter operates LOCALLY in spectrum (each frequency is processed independently); attention's softmax mixes ANY positions, with learned weighting on each pair. Pure-filter loses this; BSARec's hybrid preserves it. Empirical: FMLP-Rec wins on smaller-scale data; BSARec wins when long-range patterns dominate.", correct:true},
          {key:"b", text:"FMLP-Rec drops the loss."},
          {key:"c", text:"Position embeddings."},
          {key:"d", text:"Causal masking."},
        ]}
        trap={<>(b), (c), (d) miss the long-range argument.</>}
        lens={<>Filter is per-frequency local; attention is per-position global. They capture different patterns. Hybrid preserves both.</>}
        stretch={<>For which signals is filter sufficient — periodicities?</>}
      />

      {/* axis: C4 */}
      <VIS.TrapProblem
        id="bsarec-c4"
        difficulty="hard"
        title="C4 — Which knob is catastrophic if mis-set?"
        scenario={<>Rank: (a) filter initialization, (b) α initialization, (c) FFT size, (d) high-pass band width.</>}
        options={[
          {key:"a", text:"FFT size > α initialization > filter initialization > band width. FFT requires size at least sequence length AND power-of-2 — mis-set silently truncates the inverse step or fails. α init at 0 or 1 prevents one path from training. Filter init is more forgiving (it's learnable). Band width tunes effect strength.", correct:true},
          {key:"b", text:"All equal."},
          {key:"c", text:"Filter init is most critical."},
          {key:"d", text:"Band width is most critical."},
        ]}
        trap={<>(c), (d) underweight FFT size mis-sets.</>}
        lens={<>FFT discipline + α range are the silent failure modes. Filter init and band width are tunable.</>}
        stretch={<>What's the FFT-size automated check?</>}
      />

      {/* axis: C5 */}
      <VIS.TrapProblem
        id="bsarec-c5"
        difficulty="medium"
        title="C5 — Short sequences"
        scenario={<>Your platform has many short-history users (under 30 events). What breaks in BSARec?</>}
        options={[
          {key:"a", text:"Short sequences have no meaningful frequency content (you can't talk about a 'period' in a 5-event sequence). The filter overfits to noise on these users; α-mixing makes it worse, not better. New-user / short-history cohort regresses.", correct:true},
          {key:"b", text:"Filter handles short sequences gracefully."},
          {key:"c", text:"Filter is content-aware."},
          {key:"d", text:"Nothing breaks."},
        ]}
        trap={<>(b), (c), (d) are over-generous.</>}
        lens={<>Filter needs frequency content. Short = no content = noise. Gate via sequence-length threshold.</>}
        stretch={<>What's the right threshold — 30, 50, 100?</>}
      />

      {/* ============== D. Intuition traps ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>D. Intuition traps</h3>

      {/* axis: D1 */}
      <VIS.TrapProblem
        id="bsarec-d1"
        difficulty="hard"
        title="D1 — 'More layers = always better'"
        scenario={<>SASRec at 2 layers gives X NDCG. At 6 layers gives X+0.01. At 12 layers gives X-0.02. Why?</>}
        options={[
          {key:"a", text:"Over-smoothing: repeated self-attention layers progressively averages hidden states across positions; after enough depth, tokens become indistinguishable from each other ('token homogenization'). Capacity grows with depth, but distinguishing power shrinks; net effect is regression.", correct:true},
          {key:"b", text:"Random."},
          {key:"c", text:"Overfitting."},
          {key:"d", text:"Gradient instability."},
        ]}
        trap={<>(c) is partially right but misses the specific failure mode. (b), (d) are dismissive.</>}
        lens={<>Over-smoothing is depth-driven, monotonic. Distinct from overfitting (which is data-driven).</>}
        stretch={<>How do you measure token homogenization?</>}
      />

      {/* axis: D1b */}
      <VIS.TrapProblem
        id="bsarec-d1b"
        difficulty="hard"
        title="D1b — 'Just initialize attention to be high-pass'"
        scenario={<>A senior engineer pushes back: "The low-pass-filter primitive is a hack. Why not initialize the attention weights so the softmax behaves like a high-pass filter at init? Then a plain SASRec recovers BSARec's behavior for free." Why doesn't this work?</>}
        options={[
          {key:"a", text:"Softmax-attention is fundamentally an averaging operation — its outputs are convex combinations of value vectors, which is intrinsically low-pass. No init scheme can make a softmax-weighted average high-pass; the inductive bias of 'mix nearby tokens toward each other' is structural, not parametric. Even if you initialize the logits to amplify differences, training drags them back toward smoothing because the loss rewards consistent token representations. BSARec's contribution is precisely that the high-pass inductive bias must come from a SEPARATE primitive (the low-pass filter that lets attention specialize on high-freq), not from re-parametrizing attention.", correct:true},
          {key:"b", text:"Attention init doesn't matter — the optimizer finds the same minimum either way."},
          {key:"c", text:"You could initialize attention high-pass, but the rfft compute cost is higher than just adding a filter."},
          {key:"d", text:"High-pass attention init works, but the BSARec paper didn't try it."},
        ]}
        trap={<>(b) over-trusts optimizer-finds-anything. (c) is a cost argument, not a structural argument — and it's wrong: filtering IS cheaper than re-init experiments. (d) implies the design is arbitrary; it isn't.</>}
        lens={<>Inductive biases that are STRUCTURAL (averaging vs differencing) cannot be patched by initialization or training. BSARec's design choice — adding a separate frequency-domain primitive rather than reshaping attention — is the correct response to a structural limitation. This is the same lesson as "you cannot init a CNN to behave like a transformer" or "you cannot init a linear layer to be non-linear."</>}
        stretch={<>What other recsys primitives have this "structural-not-parametric" property?</>}
      />

      {/* axis: D2 */}
      <VIS.TrapProblem
        id="bsarec-d2"
        difficulty="hard"
        title="D2 — 'FMLP-Rec is strictly better, replaces attention'"
        scenario={<>An engineer says "FMLP-Rec replaces attention with filter — strictly better, lower cost." Cascade of wrong assumptions if you take this on faith?</>}
        multiSelect
        options={[
          {key:"a", text:"FMLP-Rec works on short sequences where over-smoothing isn't the binding constraint, but loses global mixing — long-range patterns it cannot capture; quality regression follows.", correct:true},
          {key:"b", text:"FMLP-Rec's training-data efficiency is worse on rich-signal domains.", correct:true},
          {key:"c", text:"BSARec's combination empirically beats FMLP-Rec when long-range patterns matter.", correct:true},
          {key:"d", text:"FMLP-Rec is mathematically equivalent to BSARec."},
        ]}
        trap={<>(d) is wrong — they make different trade-offs.</>}
        lens={<>Pure-filter and hybrid are different points on the long-range-vs-detail trade. Neither strictly dominates.</>}
        stretch={<>What domain favors pure filter — strongly periodic?</>}
      />

      {/* axis: D3 */}
      <VIS.TrapProblem
        id="bsarec-d3"
        difficulty="hard"
        title="D3 — Junior says 'add capacity'; senior says diagnose"
        scenario={<>SASRec at L=500 plateaus. Junior: "more params, bigger model." What's the senior move?</>}
        options={[
          {key:"a", text:"Diagnose first. Measure token similarity across positions, across layers. If cosine-similarity grows monotonically with depth, over-smoothing is the cause and BSARec is the fix. If it doesn't, capacity may be the real issue. Adding params blindly is the recipe answer.", correct:true},
          {key:"b", text:"Agree — add capacity."},
          {key:"c", text:"Reduce LR."},
          {key:"d", text:"Switch to BERT4Rec."},
        ]}
        trap={<>(b), (c), (d) are recipe / unfocused.</>}
        lens={<>Senior diagnoses before architecting. Over-smoothing has a specific signature.</>}
        stretch={<>What does the smoothing curve actually look like?</>}
      />

      {/* axis: D4 */}
      <VIS.TrapProblem
        id="bsarec-d4"
        difficulty="hard"
        title="D4 — 'Music BSARec gives nothing — must be hyperparams'"
        scenario={<>BSARec improves NDCG on movie-rec by 3% but gives nothing on music-rec. A teammate: "must be the hyperparameters." Most likely real cause?</>}
        options={[
          {key:"a", text:"Music sessions have very different temporal autocorrelation than movie sessions — the FREQUENCIES the filter learns to preserve may be domain-specific. The filter init was generic; per-domain init (warm-start the filter mask from a domain-specific frequency analysis of training sequences) is the real fix.", correct:true},
          {key:"b", text:"Hyperparameter tuning."},
          {key:"c", text:"Music users are different."},
          {key:"d", text:"BSARec doesn't work for music."},
        ]}
        trap={<>(b) treats symptom; (c), (d) misframe.</>}
        lens={<>The filter is domain-specific. Cross-domain transfer needs per-domain init.</>}
        stretch={<>How do you do the frequency analysis on a new domain?</>}
      />

      {/* ============== E. Operations ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>E. Operations</h3>

      {/* axis: E1 */}
      <VIS.TrapProblem
        id="bsarec-e1"
        difficulty="hard"
        title="E1 — FFT padding + causal masking interaction"
        scenario={<>Production sequences vary in length (200-500). FFT requires power-of-2 length. You pad to 512. What silently breaks?</>}
        options={[
          {key:"a", text:"Padding strategy (left-pad vs right-pad with mask) interacts with causal-attention masking. If you LEFT-PAD with zeros, attention still sees them with zero contribution but the filter sees them as part of the spectrum — adding spurious frequency components. RIGHT-PADDING is safer but requires the inverse-FFT to truncate correctly; misalignment causes off-by-one bugs that don't blow up loss but quietly degrade NDCG.", correct:true},
          {key:"b", text:"Padding never matters."},
          {key:"c", text:"FFT handles padding transparently."},
          {key:"d", text:"Causal masking is irrelevant."},
        ]}
        trap={<>(b), (c), (d) are over-trustful.</>}
        lens={<>Padding + FFT + causal masking is the classic BSARec footgun. Off-by-one bugs are silent.</>}
        stretch={<>What's the right unit test?</>}
      />

      {/* axis: E2 (Failure-on-Friday — BSARec-specific) */}
      <VIS.TrapProblem
        id="bsarec-e2"
        difficulty="hard"
        title="E2 — Friday 3am: new-user cohort NDCG -5%"
        scenario={<>BSARec ships Thursday. Friday 3am page: feed engagement steady, but <strong>new-user cohort (first-week users, sessions under 30 events) has NDCG -5%</strong>. Latency, eval, util fine. Why specifically BSARec?</>}
        options={[
          {key:"a", text:"Short sequences don't have meaningful frequency content (cannot define periodicities in 30 points); the learned filter overfits to noise on these users, harming them. The fix is to gate the filter contribution (set α=0) when sequence length is below threshold, or train a separate short-sequence head.", correct:true},
          {key:"b", text:"Calibration drift on new users."},
          {key:"c", text:"Cold-start in content."},
          {key:"d", text:"Random noise."},
        ]}
        trap={<>(b), (c), (d) miss the filter-on-short-sequence specifics.</>}
        lens={<>BSARec's specific short-sequence failure is the filter overfitting noise. Length-gated α is the surgical fix.</>}
        stretch={<>What's the right α-gate function?</>}
      />

      {/* axis: E3 */}
      <VIS.TrapProblem
        id="bsarec-e3"
        difficulty="medium"
        title="E3 — Default rfft / ifft mis-config"
        scenario={<>Open-source BSARec uses real-valued FFT (rfft). You deploy with PyTorch defaults. Performance is below paper. Most likely cause?</>}
        options={[
          {key:"a", text:"Complex-valued ifft expects a specific output-length encoding; misconfiguring (forgetting to pass output_length=L) truncates the last few tokens silently — they're padded with zeros after inverse-FFT instead of being correctly inverted. NDCG drops on long sequences; passes unit tests on short ones.", correct:true},
          {key:"b", text:"PyTorch FFT is slow."},
          {key:"c", text:"FFT requires GPU."},
          {key:"d", text:"rfft is wrong."},
        ]}
        trap={<>(b), (c), (d) are non-specific.</>}
        lens={<>rfft/ifft output-length is the specific BSARec footgun. Test on long sequences explicitly.</>}
        stretch={<>How would you unit-test the FFT roundtrip?</>}
      />

      {/* axis: E4 */}
      <VIS.TrapProblem
        id="bsarec-e4"
        difficulty="medium"
        title="E4 — Simple rollout"
        scenario={<>BSARec rollout is "drop-in over SASRec → shadow → mirror → ramp." Why is this simpler than other lifelong-seq migrations?</>}
        options={[
          {key:"a", text:"BSARec is an internal architectural change with the same output shape, same input format, same loss as SASRec. No upstream pipeline change (no clustering ETL like TWIN V2; no precompute like HLLM; no cache invalidation like LONGER). Standard 4-step rollout works without coordination across teams.", correct:true},
          {key:"b", text:"All migrations are equally simple."},
          {key:"c", text:"BSARec is harder than SASRec to migrate."},
          {key:"d", text:"Rollout doesn't matter."},
        ]}
        trap={<>(b), (c), (d) miss the architectural-locality argument.</>}
        lens={<>Local architectural changes have simpler rollouts than upstream-pipeline changes. BSARec's commercial appeal includes this.</>}
        stretch={<>What if you want to update the FFT size for new max-length sequences?</>}
      />

      {/* axis: E5 */}
      <VIS.TrapProblem
        id="bsarec-e5"
        difficulty="hard"
        title="E5 — Hidden benchmark detail"
        scenario={<>Paper reports +2-4% NDCG over SASRec on Beauty, Sports, Yelp. What hidden detail must you reproduce?</>}
        options={[
          {key:"a", text:"Those benchmarks have sequence-length distributions centered ~200-300. Results on shorter (under 50) or longer (over 1000) benchmarks aren't reported. The +2-4% claim is regime-specific. On a benchmark with mostly under-50 sequences, BSARec wouldn't beat SASRec.", correct:true},
          {key:"b", text:"Specific seed."},
          {key:"c", text:"GPU model."},
          {key:"d", text:"PyTorch version."},
        ]}
        trap={<>(b), (c), (d) are generic.</>}
        lens={<>The paper's "+2-4% NDCG" claim has a hidden length distribution. Reproduce only inside that band.</>}
        stretch={<>What would you report at length under 50?</>}
      />

      {/* axis: E6 */}
      <VIS.TrapProblem
        id="bsarec-e6"
        difficulty="hard"
        title="E6 — Next-item leave-one-out rewards BSARec"
        scenario={<>Standard recsys benchmarks use next-item leave-one-out. Why does this evaluation pattern over-credit BSARec?</>}
        options={[
          {key:"a", text:"Leave-one-out eval rewards models that preserve HIGH-FREQUENCY signal (recent taste shifts) — exactly what BSARec is designed for. Coverage/diversity metrics (NOT in standard eval) may show BSARec is NARROWER than SASRec — over-recommending the user's recent taste shifts. Standard NDCG metrics miss this.", correct:true},
          {key:"b", text:"Leave-one-out is the correct eval."},
          {key:"c", text:"BSARec is broken on leave-one-out."},
          {key:"d", text:"NDCG doesn't apply to BSARec."},
        ]}
        trap={<>(b) is overcredulous. (c), (d) are wrong.</>}
        lens={<>The eval pattern aligns with BSARec's strength. Add diversity/coverage to detect narrowness.</>}
        stretch={<>How do you measure narrowness?</>}
      />

      {/* ============== F. Failure modes ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      {/* axis: F1 */}
      <VIS.TrapProblem
        id="bsarec-f1"
        difficulty="medium"
        title="F1 — Edge case: flat-taste user"
        scenario={<>Construct a user history where the filter has nothing to do.</>}
        options={[
          {key:"a", text:"A user who's clicked the SAME category for a year (no taste shifts, no high-frequency content, perfectly stationary). The filter has nothing distinct to preserve; the filter path contributes pure noise; BSARec's gain over SASRec is zero (or slightly negative). Detection: per-user filter-path-output norm; flat sequences should auto-reduce α.", correct:true},
          {key:"b", text:"Empty history."},
          {key:"c", text:"Random history."},
          {key:"d", text:"BSARec never regresses."},
        ]}
        trap={<>(b), (c), (d) misframe.</>}
        lens={<>Flat-taste user = no frequency content = BSARec wastes capacity. Adaptive α gating is the answer.</>}
        stretch={<>What's the per-user diagnostic for flat-taste?</>}
      />

      {/* axis: F2 */}
      <VIS.TrapProblem
        id="bsarec-f2"
        difficulty="hard"
        title="F2 — Adversarial: perfect periodicity"
        scenario={<>A user history is perfectly periodic with period 7 (daily ritual). What happens?</>}
        options={[
          {key:"a", text:"The filter sees a strong frequency peak at f=1/7 and AMPLIFIES it (the learnable mask becomes a band-pass at that frequency); attention captures the long-range trend. Combined effect over-recommends 'rituals' and under-recommends explorations. Real users with weekly cycles can suffer this; the model amplifies the cycle to user-locking.", correct:true},
          {key:"b", text:"Filter ignores periodicity."},
          {key:"c", text:"Period 7 is too short."},
          {key:"d", text:"No effect."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>The filter is double-edged: signal-preserving AND signal-amplifying. Strong periodicities can lock the user into a loop.</>}
        stretch={<>How would you regularize against ritual amplification?</>}
      />

      {/* axis: F3 */}
      <VIS.TrapProblem
        id="bsarec-f3"
        difficulty="hard"
        title="F3 — Reverse engineering: long-seq NDCG drops late in training"
        scenario={<>Training loss decreases; but at inference time, NDCG on long sequences (over 500) is WORSE than at L=300. Most likely BSARec-specific cause?</>}
        options={[
          {key:"a", text:"Deeper layers' α drifts toward 1 (pure attention) during late-stage training — undoing BSARec's contribution; the over-smoothing reasserts. Diagnostic: track α per layer during training; alarm if any layer's α exits the [0.2, 0.8] range. Fix: α regularization toward 0.5 with weight-decay.", correct:true},
          {key:"b", text:"FFT instability."},
          {key:"c", text:"Gradient explosion."},
          {key:"d", text:"Calibration drift."},
        ]}
        trap={<>(b), (c), (d) are generic.</>}
        lens={<>α drift is BSARec's silent failure mode. Monitor explicitly.</>}
        stretch={<>What regularization specifically?</>}
      />

      {/* axis: F4 */}
      <VIS.TrapProblem
        id="bsarec-f4"
        difficulty="medium"
        title="F4 — Paper-named regimes"
        scenario={<>What does the paper itself flag as non-gain regimes?</>}
        multiSelect
        options={[
          {key:"a", text:"Sequences under 100 — over-smoothing isn't the binding constraint.", correct:true},
          {key:"b", text:"Sequences over 500 — BSARec's gains stabilize (not 'keep growing'); other regimes (compression) dominate.", correct:true},
          {key:"c", text:"GPU-poor environments."},
          {key:"d", text:"All domains except movies."},
        ]}
        trap={<>(c) is deployment; (d) is not a paper claim.</>}
        lens={<>Paper-named bounds: 100-500 sequence length. Outside it, other methods dominate.</>}
        stretch={<>What's the post-500 dropoff curve?</>}
      />

      {/* axis: F5 */}
      <VIS.TrapProblem
        id="bsarec-f5"
        difficulty="hard"
        title="F5 — Domain-conditional filter init follow-ups"
        scenario={<>Follow-up work proposes domain-conditional filter init (warm-start filter mask from a domain-specific frequency analysis). What does this attack about BSARec's choice?</>}
        options={[
          {key:"a", text:"BSARec's random filter init wastes early training cycles re-learning the dominant frequencies of the domain. Domain-conditional init starts with a good prior, converging faster and to a better optimum. The original BSARec's random init is a simplicity choice; domain-conditional is a quality-and-speed improvement.", correct:true},
          {key:"b", text:"Random init is mathematically optimal."},
          {key:"c", text:"Domain-conditional init doesn't work."},
          {key:"d", text:"Filter init is irrelevant."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>Domain priors accelerate filter learning. BSARec's generic init leaves quality on the table.</>}
        stretch={<>How would you do the frequency analysis automatically?</>}
      />

      {/* axis: D2b — extra cascade */}
      <VIS.TrapProblem
        id="bsarec-d2b"
        difficulty="hard"
        title="D2b — 'Drop in BSARec, keep all existing eval'"
        scenario={<>You swap SASRec for BSARec. You keep all existing NDCG@10 eval. What might you miss?</>}
        multiSelect
        options={[
          {key:"a", text:"Diversity/coverage metrics — BSARec is narrower than SASRec (over-amplifies recent taste); NDCG only measures relevance.", correct:true},
          {key:"b", text:"Cohort-level analysis — short-sequence cohorts may regress while overall NDCG looks flat.", correct:true},
          {key:"c", text:"Long-tail discovery — narrowness reduces exploration.", correct:true},
          {key:"d", text:"NDCG is sufficient."},
        ]}
        trap={<>(d) is over-trustful.</>}
        lens={<>BSARec wins on relevance, may lose on diversity/discovery. Eval must include both axes.</>}
        stretch={<>What's the right diversity metric to add?</>}
      />

      {/* axis: E2b */}
      <VIS.TrapProblem
        id="bsarec-e2b"
        difficulty="hard"
        title="E2b — Friday: long-history users — NDCG slowly drops over days"
        scenario={<>BSARec ships. Initial NDCG strong on long-history users. Over 2 weeks, their NDCG slowly drifts down 1.5%. Most BSARec-specific cause?</>}
        options={[
          {key:"a", text:"α drift in deep layers — during continued online fine-tuning (not part of the original training), α drifts toward 1, reverting to plain SASRec behavior and re-introducing over-smoothing. The fix is α freezing or α regularization during online updates.", correct:true},
          {key:"b", text:"Data shift."},
          {key:"c", text:"Random noise."},
          {key:"d", text:"User churn."},
        ]}
        trap={<>(b), (c), (d) are non-anchored.</>}
        lens={<>α is the watchdog parameter. Online updates without α discipline regress quietly.</>}
        stretch={<>What's the right freeze-or-regularize trade?</>}
      />

    </VIS.Section>

          <a href="https://arxiv.org/abs/2312.10325" target="_blank" rel="noopener"><strong>Shin et al. — BSARec: Beyond Self-Attention</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, AAAI 2024)</span>
          <br/>The BSARec paper. Read §3 (filter design), §4 (α-mixing), §5 (over-smoothing diagnosis). Loss is the same <VIS.Term def="Binary cross-entropy. Per-position yes/no loss pushing the predicted probability toward the true label (0 or 1); SASRec's standard objective.">BCE</VIS.Term> / <VIS.Term def="Softmax computed over a sub-sampled candidate pool (e.g. 1000 items) instead of the full catalog; trades exact normalization for speed.">sampled-softmax</VIS.Term> as SASRec — the architectural change is internal to each block.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2202.08791" target="_blank" rel="noopener"><strong>Zhou et al. — FMLP-Rec</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, WWW 2022)</span>
          <br/>The pure-filter (no attention) sibling. Read alongside BSARec to make the augment-vs-replace trade concrete. The clean <VIS.Term def="Removing one component of a model in a controlled experiment to measure its contribution; the standard tool for attributing a quality lift to a specific architectural change.">ablation</VIS.Term> is BSARec with α=0 (pure attention) vs α=1 (pure filter) vs the learned mix.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1808.09781" target="_blank" rel="noopener"><strong>Kang &amp; McAuley — SASRec</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICDM 2018)</span>
          <br/>The baseline BSARec retrofits. The architectural starting point.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2003.10866" target="_blank" rel="noopener"><strong>Oono &amp; Suzuki — On Over-smoothing in GNNs</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, 2020)</span>
          <br/>Over-smoothing theory from the GNN literature. The same mechanism BSARec attacks in sequence transformers.
        </li>
        <li>
          <a href="https://eugeneyan.com/writing/recsys2023/" target="_blank" rel="noopener"><strong>Eugene Yan — RecSys notes</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Practitioner perspective on inductive-bias retrofits to standard sequential recsys backbones. Useful counterpoint to <VIS.Term def="Deep Learning Recommendation Model. Meta's classic feature-crosses + MLP recsys; the discriminative non-sequential alternative to BSARec/SASRec.">DLRM</VIS.Term>-style discriminative-only architectures.
        </li>
      </ul>
    </VIS.Section>
  </main>
);
