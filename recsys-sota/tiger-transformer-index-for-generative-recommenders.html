  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// TIGER — Transformer Index for Generative Recommenders.
// Rajput et al. NeurIPS 2023; productionized 2024. Replaces ANN retrieval with autoregressive Semantic ID generation.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Generative recommendation (HSTU family)"
      title="TIGER — Transformer Index for Generative Recommenders"
      subtitle="Quantize item content with RQ-VAE into discrete Semantic IDs, then autoregressively generate the next item's ID. Generation IS the retrieval — no ANN index."
      byline={[
        {label: "Paper", value: "Rajput et al., NeurIPS 2023"},
        {label: "Year", value: "2024"},
        {label: "Domain", value: "Generative retrieval"},
      ]}/>

    <VIS.TLDR>
      Unlike <VIS.Term def="Two-tower retrieval: user-tower and item-tower each produce an embedding; nearest neighbours of the user embedding under an ANN index (HNSW, IVF-PQ, ScaNN) form the candidate set.">two-tower + HNSW retrieval</VIS.Term>, TIGER has <strong>no ANN index</strong> — a seq2seq transformer autoregressively generates the next item's <VIS.Term def="A tuple of discrete codebook indices produced by Residual-Quantized VAE (RQ-VAE) on a content embedding. Two semantically similar items share a Semantic ID prefix.">Semantic ID</VIS.Term>. Items with similar semantics share ID prefixes, giving generalization a random-ID embedding table cannot. Source: <a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener">arXiv:2305.05065</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        TIGER converts every item in the catalog into a short tuple of discrete tokens (typically K=3–4 codes from codebooks of size 256–4096 each) via <VIS.Term def="Residual-Quantized VAE — encode a content embedding, quantize to the nearest codebook entry, subtract, quantize the residual against a second codebook, repeat K times. Each stage adds resolution.">RQ-VAE</VIS.Term> applied to a content embedding (text, image, or both). A transformer is then trained to take the user's history (also tokenized) and emit the Semantic ID of the next item, one code at a time, via standard auto-regressive decoding.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  C["Item content (text/image)"] --> CE["Content embedding"]
  CE --> RQ["RQ-VAE encode"]
  RQ --> SID["Semantic ID (c1, c2, c3, c4)"]
  H["User history (tokenized)"] --> T["Seq2seq transformer"]
  SID -.codebook.-> T
  T --> Y["Generated next ID c1, c2, c3, c4"]
  style T fill:#dbeafe,stroke:#1e40af,stroke-width:2px
      `} />
      <p>
        At serving time, beam search (with a <VIS.Term def="A decoding constraint that masks any token that would not extend a prefix to a valid catalog item — prevents the model from emitting a Semantic ID that no item has.">trie-constrained decoder</VIS.Term>) walks down the codebook tree, restricting candidates to actually-existing items.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <p>
        <strong>Two-tower + ANN (the baseline).</strong> User-tower and item-tower each map to a continuous embedding; the item embeddings are indexed in HNSW / ScaNN / IVF-PQ; retrieval = approximate nearest neighbour search. The index must be rebuilt or updated as the catalog churns; cold-start items get random IDs and must be back-filled.
      </p>
      <p>
        <strong>TIGER (the delta).</strong> No index. Retrieval is generation: the decoder emits codes one at a time. Because Semantic IDs are <em>content-derived</em>, two semantically similar items have similar prefixes — a brand-new item inherits useful behaviour from the existing items that share its prefix. This is the cold-start property a random-ID embedding table fundamentally cannot offer.
      </p>
      <p>
        <strong>What changes operationally.</strong> Index maintenance becomes codebook maintenance: when content distributions shift, you re-train RQ-VAE, which produces a new codebook — and now <em>every</em> downstream model that learned dependencies on specific codes is suddenly miscalibrated. The maintenance burden moves rather than disappears.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick it / where it wins">
      <p>
        TIGER wins when (a) you have rich <strong>content signal</strong> (text descriptions, images) to encode, (b) you face severe <strong>cold-start</strong> (e.g. fast-moving e-commerce catalogs, fresh news), and (c) ANN index maintenance is already a pain point. It is the wrong tool when items are ID-only (no content), when catalog is small enough that an HNSW rebuild is trivial, or when generation latency is unacceptable for your QPS.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Limitations & gotchas">
      <p>
        Three persistent failure modes. <strong>Semantic ID collisions</strong> — when two distinct items quantize to the same tuple, the decoder cannot disambiguate them. <strong>Hallucinated items</strong> — without constrained decoding, the model happily emits Semantic IDs that no item carries; constrained decoding is mandatory, not optional. <strong>Codebook drift</strong> — re-training RQ-VAE produces a new codebook, breaking learned dependencies; rolling out a new codebook requires either dual-running both vocabularies during a migration window or back-fitting the new codes through transfer learning.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twelve scenarios on TIGER's discriminating signals: when generative retrieval wins, when ANN still wins, and the specific failure modes that distinguish the three "wrong items got served" causes in production.</p>

      <VIS.TrapProblem
        id="tiger-p1"
        difficulty="hard"
        title="P1 — Hallucinated item triage"
        scenario={<>Your TIGER recommender returns an item ID that <strong>does not exist</strong> in the catalog. The on-call eng asks for a one-line cause. Constrained decoding IS enabled. The catalog was last refreshed <strong>4 hours ago</strong>; an inventory deletion fired then. What's the most likely cause?</>}
        options={[
          {key:"a", text:"The model hallucinated a Semantic ID — constrained decoding has a bug."},
          {key:"b", text:"The Semantic ID was valid 4 hours ago but the underlying item was deleted; the decoder's trie is stale.", correct:true},
          {key:"c", text:"Beam search returned a low-probability path; raise temperature."},
          {key:"d", text:"The user's history embedding is corrupt."},
        ]}
        trap={<>(a) is the panic answer — the question stipulates constrained decoding is on. (c) and (d) are red herrings. The clue is "inventory deletion 4 hours ago"; the trie that backs constrained decoding is a state artifact and must be refreshed in lockstep with the catalog.</>}
        lens={<>Constrained decoding only constrains to whatever the trie was built from. Trie freshness ≤ ID validity. The fix is either tightening trie refresh cadence or adding a post-decode existence check.</>}
        stretch={<>How would you distinguish this from a true hallucination if the trie's freshness signal is missing?</>}
      />

      <VIS.TrapProblem
        id="tiger-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Hallucinated vs cold-start vs collision"
        scenario={<>Three production incidents over two weeks. (1) TIGER returns an item not in the catalog. (2) A brand-new item shows up frequently in recommendations despite zero interaction history. (3) Two distinct items appear interchangeably for the same query, even though their content differs substantially. Match each incident to its likely cause. Select all true statements.</>}
        options={[
          {key:"a", text:"(1) is hallucination — fix with constrained decoding + trie freshness checks.", correct:true},
          {key:"b", text:"(2) is the cold-start advantage working correctly — the new item inherited useful behaviour from the prefix of similar items.", correct:true},
          {key:"c", text:"(3) is a Semantic ID collision — two items quantized to the same tuple.", correct:true},
          {key:"d", text:"All three incidents are the same root cause: codebook drift."},
          {key:"e", text:"(2) is a bug — new items with no history should never be recommended."},
        ]}
        trap={<>(d) is the lazy "one cause to rule them all" answer; the three failure modes are structurally distinct. (e) is the engineering reflex that misses TIGER's headline feature — cold-start generalization via shared prefixes is intentional and is a primary reason to pick TIGER over two-tower.</>}
        lens={<>Three distinct failures: hallucination (decoder produces invalid ID), cold-start generalization (new item gets useful behaviour from prefix — feature, not bug), collision (two items share an ID — fix by increasing K or codebook size). Diagnosing the wrong one wastes engineering time and can lead to "fixing" the feature.</>}
        stretch={<>What single metric would distinguish (2) from (3) at scale?</>}
      />

      <VIS.TrapProblem
        id="tiger-p3"
        difficulty="hard"
        title="P3 — Codebook drift rollout"
        scenario={<>Eight months in, content distribution has shifted (new product categories launched). You retrain RQ-VAE and get a new codebook with different code-to-item assignments. The downstream sequence model has learned dependencies on the old codes. What's the safest rollout?</>}
        options={[
          {key:"a", text:"Hot-swap the codebook; the downstream model will adapt within a few epochs of online learning."},
          {key:"b", text:"Dual-vocabulary period: serve both old and new codes in parallel, retrain the seq model with both, then deprecate old.", correct:true},
          {key:"c", text:"Freeze the codebook forever; never retrain RQ-VAE."},
          {key:"d", text:"Hash old codes to new codes by content similarity at swap time."},
        ]}
        trap={<>(a) catastrophically breaks downstream the moment of swap. (c) is brittle as the catalog shifts. (d) sounds clever but content-similarity hashing introduces silent errors at every collision.</>}
        lens={<>Vocabulary changes are migrations, not config flips. The standard pattern is dual-vocabulary for one training cycle, validate that the new-vocab model matches old-vocab quality, then deprecate. Skipping this step is the #1 source of "the model is suddenly bad and we don't know why" post-mortems in generative-retrieval shops.</>}
        stretch={<>What's the minimum overlap period if you control retraining cadence?</>}
      />

      <VIS.TrapProblem
        id="tiger-p4"
        difficulty="medium"
        title="P4 — Codebook sizing"
        scenario={<>You're tuning RQ-VAE codebook size. Catalog size <strong>50M items</strong>. K=4 codebooks. At codebook size <strong>256</strong> per level, you observe collision rate 6.2%. At <strong>1024</strong>, 0.4%. At <strong>4096</strong>, 0.02% — but the seq model's perplexity is HIGHER at 4096 than 1024. Why?</>}
        options={[
          {key:"a", text:"Bug — bigger vocab should always improve perplexity."},
          {key:"b", text:"Larger codebooks mean each code is seen less frequently in training; the seq model's embeddings are under-fit.", correct:true},
          {key:"c", text:"4096 codes exceed the transformer's softmax capacity."},
          {key:"d", text:"Collision rate has no relationship to perplexity."},
        ]}
        trap={<>(a) misreads how vocab size interacts with data sparsity. (c) confuses parameter count with a real capacity bound. (d) is wrong — both are functions of the vocabulary design.</>}
        lens={<>Vocabulary size trades off collision rate against per-code training signal. The sweet spot is the smallest codebook that drives collisions below your tolerance — beyond that, codes go under-trained and downstream perplexity rises. 1024 is a common landing point for catalogs in the 10–100M range.</>}
        stretch={<>If catalog grew to 500M, would the sweet spot scale linearly?</>}
      />

      <VIS.TrapProblem
        id="tiger-p5"
        difficulty="hard"
        multiSelect
        title="P5 — When NOT to use TIGER"
        scenario={<>Four product surfaces. (i) A 5k-item premium streaming catalog with rich text + image. (ii) A 200M-item marketplace with extreme catalog churn (50% daily turnover). (iii) An ads ranker with strong query × creative × geo signal and short user history. (iv) A long-form video feed with ~10k weekly-active items and dense engagement. Which of (i)-(iv) is TIGER NOT well-suited for? Select all that apply.</>}
        options={[
          {key:"a", text:"(i) — catalog too small; an HNSW index over 5k items rebuilds in seconds; TIGER's content-generalization advantage is wasted.", correct:true},
          {key:"b", text:"(ii) — codebook drift becomes intolerable at 50% daily turnover.", correct:true},
          {key:"c", text:"(iii) — short history + cross-dominated signal is HSTU/DLRM territory, not generative retrieval.", correct:true},
          {key:"d", text:"(iv) — engagement loops at moderate catalog size are the cleanest TIGER fit."},
        ]}
        trap={<>The naïve read picks ONLY (i) ("small catalog → don't bother"); the harder cases (ii) and (iii) are also TIGER mismatches for different reasons. (d) is the trap option pretending to be wrong — it's actually a GOOD TIGER fit.</>}
        lens={<>Three real TIGER mismatches: tiny catalogs (no maintenance pain), extreme churn (codebook drift kills you), and short-history / cross-dominated surfaces (different architecture wins). The cleanest TIGER fit is moderate-to-large catalog with strong content + cold-start pain.</>}
        stretch={<>What single signal moves (ii) from "wrong" to "right" for TIGER?</>}
      />

      <VIS.TrapProblem
        id="tiger-p6"
        difficulty="hard"
        title="P6 — Latency at 10k QPS"
        scenario={<>Spec: 10k QPS, p99 retrieval latency budget <strong>50ms</strong>, beam width 50, K=4 codebooks. Single A100 currently does ~280 inferences/sec at this beam width. What's the cleanest path to budget?</>}
        options={[
          {key:"a", text:"Shrink the model 10×; quality regression is acceptable."},
          {key:"b", text:"Batch requests in the decoder + KV-cache the user-history encoding across the beam; both compound and typically buy 5-10× throughput.", correct:true},
          {key:"c", text:"Reduce K from 4 to 1 — single-code Semantic IDs decode in one step."},
          {key:"d", text:"Replace TIGER with two-tower; the latency budget is unachievable."},
        ]}
        trap={<>(a) gives up quality without trying engineering. (c) destroys the hierarchical-semantic property that makes TIGER worth using. (d) is premature surrender.</>}
        lens={<>Beam decoding is inherently batchable across the beam; the user-history encoding is the same for all beams and reusable. These two optimizations together are how production TIGER deployments hit latency budgets without quality sacrifice.</>}
        stretch={<>At what catalog size does batching stop being enough?</>}
      />

      <VIS.TrapProblem
        id="tiger-p7"
        difficulty="hard"
        title="P7 — Content embedding choice"
        scenario={<>You're choosing the content encoder feeding RQ-VAE. Options: (a) CLIP image+text, (b) a domain-fine-tuned BERT, (c) raw catalog metadata (title + category + price) one-hot. Catalog is fashion e-commerce. Which choice does TIGER's cold-start property depend on most?</>}
        options={[
          {key:"a", text:"(c) — domain-specific metadata is most stable and predictable."},
          {key:"b", text:"(a) — CLIP captures visual similarity that drives fashion discovery; prefixes will cluster by visual category, giving the cold-start property real teeth.", correct:true},
          {key:"c", text:"(b) — fine-tuned BERT always beats CLIP for retrieval."},
          {key:"d", text:"Doesn't matter — RQ-VAE's quantization smooths over encoder choice."},
        ]}
        trap={<>(a) gives up the generalization story. (c) is a recency bias on language models. (d) badly underestimates how much downstream depends on encoder quality.</>}
        lens={<>TIGER's cold-start magic is entirely downstream of the content embedding's semantic structure. For fashion (visual-driven discovery), CLIP-style image+text dramatically outperforms text-only. Garbage in, garbage out — RQ-VAE faithfully quantizes whatever signal you give it, including the absence of signal.</>}
        stretch={<>For news headlines, would the same recommendation hold?</>}
      />

      <VIS.TrapProblem
        id="tiger-p8"
        difficulty="medium"
        title="P8 — Constrained decoding implementation"
        scenario={<>Engineering review: a junior eng's TIGER decoder enforces validity by generating freely, then filtering invalid IDs from the beam. Beam width 50, K=4 codes. What's the principled objection?</>}
        options={[
          {key:"a", text:"None — filter-after-generate is mathematically equivalent to constraining."},
          {key:"b", text:"Most of the beam collapses to invalid IDs at deep codebooks; you exhaust the budget without finding valid completions. Constrain at each step instead.", correct:true},
          {key:"c", text:"Filtering increases memory usage."},
          {key:"d", text:"It violates the chain rule of probability."},
        ]}
        trap={<>(a) ignores that early codebook positions have huge branching; filtering after the fact wastes 90%+ of beam compute on dead branches. (d) is mathematically nonsensical.</>}
        lens={<>Constrained decoding must be applied per-step — masking invalid extensions at each codebook position — not after-the-fact. The standard implementation walks a prefix trie of valid Semantic IDs; the decoder's softmax is masked to legal extensions only.</>}
        stretch={<>How does the trie's memory cost scale with catalog size?</>}
      />

      <VIS.TrapProblem
        id="tiger-p9"
        difficulty="hard"
        title="P9 — Diversity collapse"
        scenario={<>Live A/B: TIGER ships, NDCG +3.1%, but user satisfaction surveys flag <strong>"too similar items in feed"</strong>. Logs show top-50 recommendations share the first two Semantic ID codes 78% of the time. What's the structural cause?</>}
        options={[
          {key:"a", text:"Beam search is deterministic; switch to sampling to add diversity."},
          {key:"b", text:"Semantic ID prefixes ARE semantic clusters; high prefix overlap = high content similarity. Diversity has to be enforced explicitly at beam-time via prefix-diversity penalties or MMR.", correct:true},
          {key:"c", text:"Catalog has too few items; expand inventory."},
          {key:"d", text:"User history is too narrow; broaden it."},
        ]}
        trap={<>(a) helps marginally but doesn't fix the cause. (c) and (d) shift blame to data when the cause is decoding.</>}
        lens={<>The very property that gives TIGER its cold-start power (similar items share prefixes) makes naïve beam search converge to a single semantic cluster. Production deployments add explicit diversity at decoding — prefix-diversity penalty, MMR-style re-ranking, or first-code constraints across the beam.</>}
        stretch={<>How does a prefix-diversity penalty interact with the cold-start property?</>}
      />

      <VIS.TrapProblem
        id="tiger-p10"
        difficulty="hard"
        title="P10 — Catalog churn refresh strategy"
        scenario={<>Your catalog adds ~50k new items / day and removes ~30k. The RQ-VAE codebook is fixed (re-trained quarterly). How do you handle new items between codebook refreshes?</>}
        options={[
          {key:"a", text:"Block new items until next codebook refresh."},
          {key:"b", text:"Encode new items with the existing RQ-VAE encoder and assign Semantic IDs from existing codebooks; this is the entire point of having content-derived IDs.", correct:true},
          {key:"c", text:"Hash new items to random Semantic IDs."},
          {key:"d", text:"Train a separate model for new items only."},
        ]}
        trap={<>(a) defeats the cold-start advantage. (c) breaks the semantic-prefix property that makes generalization work. (d) doubles infra without solving the integration problem.</>}
        lens={<>RQ-VAE's encoder is reusable: you encode a new item's content embedding through the existing codebooks and get a valid Semantic ID. This is what makes TIGER cold-start-friendly — new items inherit useful behaviour via shared prefixes the moment they're encoded.</>}
        stretch={<>What QUALITY of the cold-start ID degrades as the catalog drifts away from the codebook's training distribution?</>}
      />

      <VIS.TrapProblem
        id="tiger-p11"
        difficulty="hard"
        title="P11 — Cold-start vs hallucination signal"
        scenario={<>You build a single online monitor to alert on "wrong items in results." False-positive rate is too high — the alert fires constantly on cold-start items doing exactly what TIGER is designed to do. How do you fix the monitor?</>}
        options={[
          {key:"a", text:"Lower the alert threshold."},
          {key:"b", text:"Split the monitor into two: (1) ID-not-in-catalog (hallucination / trie-stale), (2) ID-in-catalog-but-item-has-low-history (cold-start). Only (1) is a true bug.", correct:true},
          {key:"c", text:"Disable the monitor."},
          {key:"d", text:"Treat all unfamiliar items as hallucinations."},
        ]}
        trap={<>(a) and (c) trade one problem for another. (d) is the bug that motivated the question.</>}
        lens={<>The two failure modes have orthogonal signatures: hallucination produces IDs that don't resolve to a catalog row; cold-start produces valid IDs of recently-added items. Conflating them either swamps on-call with noise or hides real bugs. Split the alert.</>}
        stretch={<>What's a third signature that would deserve its own alert?</>}
      />

      <VIS.TrapProblem
        id="tiger-p12"
        difficulty="hard"
        title="P12 — Generation IS retrieval — but what about ranking?"
        scenario={<>A peer asks: "TIGER generates an item. Why do we still need a ranker?" In a production stack with TIGER for retrieval and a separate DLRM ranker, why hasn't the ranker been deprecated?</>}
        options={[
          {key:"a", text:"It should be deprecated; TIGER's likelihood IS a ranking score."},
          {key:"b", text:"TIGER ranks under a generative likelihood that's not aligned with the business objective (e.g. monetization, calibrated CTR for an auction); the ranker reshapes the candidate set under the business loss.", correct:true},
          {key:"c", text:"The ranker handles edge cases TIGER can't."},
          {key:"d", text:"Latency reasons."},
        ]}
        trap={<>(a) is the maximalist generative-retrieval take; it's wrong because likelihood ≠ business objective. (c) and (d) are vague.</>}
        lens={<>TIGER's score is P(next item | history) under the training corpus. Business value (calibrated CTR, watch-time, revenue) is a different objective. The ranker exists to align candidates with the business loss — and to do calibration that the generative model can't easily produce. OneRec is the architecture that tries to absorb both into one model.</>}
        stretch={<>What about TIGER would have to change to make a separate ranker truly unnecessary?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener"><strong>Rajput et al. — Recommender Systems with Generative Retrieval (NeurIPS 2023)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The TIGER paper. Read the cold-start and ablation sections — they motivate every production decision.</li>
        <li><a href="https://eugeneyan.com/writing/recsys-llm/" target="_blank" rel="noopener"><strong>Eugene Yan — Generative recommenders survey</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Best practitioner overview of where TIGER fits among HSTU, OneRec, and Semantic ID variants.</li>
        <li><a href="https://arxiv.org/abs/2203.01941" target="_blank" rel="noopener"><strong>Tay et al. — Differentiable Search Index (DSI)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The IR precursor — generative retrieval over docids, the idea TIGER ports to items.</li>
        <li><a href="https://github.com/EdoardoBotta/RQ-VAE-Recommender" target="_blank" rel="noopener"><strong>Open-source RQ-VAE recommender</strong></a> <span style={{color:"#64748b", fontSize:14}}>(code)</span><br/>One of the cleanest community reimplementations; useful for understanding constrained decoding.</li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
