  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// HSTU — Hierarchical Sequential Transduction Units (Meta, ICML 2024).
// Generative recommendation. Trillion-parameter sequential transducer that replaces DLRM-style cross-feature MLPs.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Generative recommendation (HSTU family)"
      title="HSTU — Hierarchical Sequential Transduction Units"
      subtitle="Reformulate recommendation as next-action prediction over a heterogeneous user-action token sequence — a single transducer that scales as a power law in compute."
      byline={[
        {label: "Paper", value: "Zhai et al., ICML 2024 (Meta)"},
        {label: "Year", value: "2024"},
        {label: "Domain", value: "Generative recommendation"},
      ]}/>

    <VIS.TLDR>
      Unlike <VIS.Term def="Deep Learning Recommendation Model — the canonical industrial recommender that crosses sparse features (user×item×context) through a stack of MLPs. Engineered cross-features dominate signal.">DLRM</VIS.Term> which interleaves dense MLPs over hand-engineered <VIS.Term def="A derived feature combining two or more raw signals, e.g. user_country×item_category, that an MLP cannot easily induce on its own.">cross-features</VIS.Term>, HSTU treats a user's action history as a token sequence and uses a custom attention variant (pointwise + aggregated norm) to scale generatively. 5.3–15.2× faster than FlashAttention2 at 8k context. Source: <a href="https://arxiv.org/abs/2402.17152" target="_blank" rel="noopener">arXiv:2402.17152</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        HSTU is a <VIS.Term def="A model that maps an input sequence to an output sequence — like an encoder-decoder, but here a single causal stack predicts the next event from past events.">sequence transducer</VIS.Term> over a user's <VIS.Term def="A unified vocabulary that includes item IDs, action types (click / watch / purchase / dwell), contextual events, and timestamps — every interaction becomes a token.">heterogeneous action-token stream</VIS.Term>. Instead of "score (user, candidate item) with a deep MLP using engineered crosses," HSTU asks "given everything the user has done so far, what is the next action and on which item?"
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  H["User action history (10^3 to 10^5 tokens)"]
  H --> E["Token + position embedding"]
  E --> S["HSTU stack (custom attention)"]
  S --> P["Next-action distribution"]
  P --> R["Score candidate items"]
  style S fill:#dbeafe,stroke:#1e40af,stroke-width:2px
      `} />
      <p>
        The "hierarchical" bit refers to the action vocabulary being multi-level (event type → item → sub-action) and to the layer-wise mixing of pointwise and aggregated normalization that lets the same architecture handle both very long and very short user histories.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <p>
        <strong>DLRM (the baseline).</strong> A wide table of sparse embeddings (user_id, item_id, ~hundreds of categorical features) is crossed via feature interactions (often hand-designed: "user × item_category × hour_of_day"), then fed through MLPs. Strength: cross-features carry hard-won business signal. Weakness: the architecture has no native scaling law — doubling parameters typically yields sub-linear quality gains, and the engineering surface is huge.
      </p>
      <p>
        <strong>HSTU (the delta).</strong> Replace the entire cross + MLP machinery with a single transducer over the action sequence. Crosses are <em>induced</em> by attention rather than declared. Critically, the authors show empirical power-law scaling in compute — doubling FLOPs reliably improves quality, the way it does for LLMs. The custom attention variant (combining pointwise and aggregated normalization) is what makes 8k-token serving tractable on commodity GPUs.
      </p>
      <p>
        <strong>What you give up.</strong> The MLP-with-crosses formulation lets you bake in domain knowledge ("ads from advertisers the user has clicked before should get a bonus"). HSTU's generative loss doesn't naturally surface those crosses; recovering them is what motivated <VIS.Term def="Meituan's variant that adds DLRM cross-features back into the HSTU token stream via Group-Layer Normalization. Discussed in its own visual.">MTGR</VIS.Term>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick it / where it wins">
      <p>
        Pick HSTU when (a) you have <strong>long user histories</strong> (10³–10⁵ events) so the sequence model has something to chew on, (b) you control a GPU serving stack that can afford auto-regressive scoring or precomputation, and (c) the dominant signal in your surface is <em>engagement loops</em> — what the user has done recently predicts what they want next. Short-history surfaces (search, ads with strong contextual covariates, cold-start-heavy catalogs) are NOT where HSTU's scaling law pays off.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Limitations & gotchas">
      <p>
        HSTU's biggest weakness is the very thing that makes it scale: by collapsing cross-features into a generative loss, it loses the surgical personalization that DLRM's hand-tuned crosses delivered. Calibration is also harder — DLRM's pointwise sigmoid is trivially calibrated post-hoc, while HSTU's generative softmax requires temperature scaling on the next-action distribution and is less stable across cohorts. Plan for a <VIS.Term def="A re-scaling layer fit on a held-out set that maps raw model scores to calibrated click / conversion probabilities. Required for downstream auction logic.">calibration head</VIS.Term> and an MTGR-style cross-feature recovery before going to production.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twelve scenario-rooted problems. Each tests senior judgment on HSTU vs the DLRM baseline — when scaling helps, when crosses still matter, when the latency budget breaks the recipe. Decoys are the "textbook reflex" wrong answer.
      </p>

      <VIS.TrapProblem
        id="hstu-p1"
        difficulty="hard"
        title="P1 — Search surface migration"
        scenario={<>A mature DLRM ranker serves a vertical search product (e-commerce queries → product results). Median user emits <strong>~12 events / month</strong>. Strong contextual covariates: query terms, query-time of day, user location. Tech lead wants to migrate to HSTU on the strength of the Meta paper's scaling claims. Latency budget: <strong>p99 80ms</strong>. Which is the right call?</>}
        options={[
          {key:"a", text:"Migrate. HSTU's scaling law beats DLRM's engineered crosses in every published benchmark."},
          {key:"b", text:"Stay on DLRM. With ~12 events/month the user sequence is too short for HSTU's strength to manifest, and crosses dominate signal in keyword search.", correct:true},
          {key:"c", text:"Migrate but truncate sequences to 8 tokens to fit the latency budget."},
          {key:"d", text:"Run HSTU as a candidate generator and keep DLRM as the ranker."},
        ]}
        trap={<>(a) is the paper-led reflex. HSTU's gains are demonstrated on engagement surfaces (feed, video) with <em>long</em> action histories, not 12-event/month search. (c) defeats the purpose — at 8 tokens HSTU is just a tiny transformer with no scaling advantage. (d) is plausible but doesn't address the underlying mismatch: search ranking signal is dominated by query×item match, which is exactly the kind of cross HSTU induces poorly without help.</>}
        lens={<>HSTU is the wrong tool when the dominant signal is contextual covariate × candidate (search), not the user's longitudinal action stream (feed). Sequence length is the diagnostic: if &lt;100 events per user, the scaling law has nothing to grip.</>}
        stretch={<>What signal length would change your answer? Why 100, not 50 or 500?</>}
      />

      <VIS.TrapProblem
        id="hstu-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Properties lost vs DLRM"
        scenario={<>You migrate a production feed ranker from a DLRM-with-crosses to vanilla HSTU. Three weeks post-launch, the product team flags multiple regressions. Which of the following are <em>real</em> properties you lose by going to vanilla HSTU? Select all that apply.</>}
        options={[
          {key:"a", text:"Surgical, hand-tuned cross-feature personalization (e.g. 'boost items from advertisers the user has clicked before').", correct:true},
          {key:"b", text:"Post-hoc score calibration via Platt scaling on a pointwise sigmoid.", correct:true},
          {key:"c", text:"Ability to scale the model parametrically with compute."},
          {key:"d", text:"Easy attribution of which feature drove a given prediction (feature-importance interpretability).", correct:true},
          {key:"e", text:"Ability to incorporate item content embeddings."},
        ]}
        trap={<>(c) is the trap — candidates sometimes pick it because HSTU "is a sequence model" and assume scaling is sacrificed; in fact, scaling is the <em>headline</em> property HSTU adds. (e) is the inverse trap: both architectures handle content embeddings; nothing about HSTU prevents it.</>}
        lens={<>HSTU gives up (a) crosses, (b) trivial pointwise calibration, and (d) clean feature-importance attribution. Mitigations: MTGR-style cross-token injection for (a); a separate calibration head trained on logged data for (b); attention-rollout or attribution probes for (d).</>}
        stretch={<>Of the three losses, which is hardest to recover and why?</>}
      />

      <VIS.TrapProblem
        id="hstu-p3"
        difficulty="hard"
        title="P3 — Attention variant choice"
        scenario={<>An infra engineer asks why HSTU doesn't just use FlashAttention2. The HSTU paper reports <strong>5.3–15.2× speedups</strong> at 8k sequence length. Which design choice is the primary driver of that speedup?</>}
        options={[
          {key:"a", text:"Sparse attention pattern that limits each token to attend to a fixed window of recent neighbors."},
          {key:"b", text:"A custom kernel combining pointwise and aggregated normalization so the softmax-attention fused op runs in one pass over a heterogeneous action vocabulary.", correct:true},
          {key:"c", text:"Distillation from a larger teacher model."},
          {key:"d", text:"FP4 weight quantization on the attention projections."},
        ]}
        trap={<>(a) is the "obvious" answer — sparse attention exists in the literature but HSTU is NOT primarily sparse; it's dense with a different normalization scheme. (c) and (d) are unrelated to the attention speedup.</>}
        lens={<>HSTU's speedup comes from the custom normalization that handles heterogeneous action tokens in a single fused op, avoiding the per-query softmax overhead that dominates FlashAttention2 at 8k. The shape of the win is "better algorithm constants," not "asymptotically sparser."</>}
        stretch={<>At what sequence length does the speedup vanish, and why?</>}
      />

      <VIS.TrapProblem
        id="hstu-p4"
        difficulty="medium"
        title="P4 — Reading the scaling curve"
        scenario={<>You plot validation NDCG vs training FLOPs on a log-log axis for HSTU at three model sizes (40M, 400M, 4B params), each trained on the same 50B-event corpus. The points fall on an almost-straight line with slope ~0.10. What's the operational implication?</>}
        options={[
          {key:"a", text:"Doubling FLOPs gives roughly a fixed-percentage NDCG lift; you can plan compute purchases against expected quality."},
          {key:"a2", text:"Doubling FLOPs gives a roughly linear absolute NDCG lift; quality scales with compute in a planning-friendly way.", correct:true},
          {key:"b", text:"The model has saturated — further scaling will hit diminishing returns."},
          {key:"c", text:"You should switch to a Mixture-of-Experts to break the scaling regime."},
        ]}
        trap={<>(b) misreads the chart — a straight line on log-log IS the scaling regime, NOT saturation. Saturation would look like the slope flattening. (c) is unjustified speculation absent a saturation signal.</>}
        lens={<>A linear log-log relationship with positive slope is the power-law signature; in the regime where it holds, each doubling of compute gives a roughly constant absolute lift. This is what enables capacity planning ("budget X FLOPs to hit Y NDCG"), which is the actual reason HSTU's scaling matters to industry.</>}
        stretch={<>If the slope dropped from 0.10 to 0.03 above 4B params, what would you check first?</>}
      />

      <VIS.TrapProblem
        id="hstu-p5"
        difficulty="hard"
        multiSelect
        title="P5 — Serving HSTU at p99 80ms"
        scenario={<>You've trained a 1B-param HSTU. Eval looks great. Production serving budget is <strong>p99 80ms</strong> for scoring 500 candidate items per request, on A100 GPUs. The vanilla forward pass takes 220ms. Which of the following actually buy you the latency budget back? Select all that apply.</>}
        options={[
          {key:"a", text:"Precompute the user-history representation once per request and reuse it across all 500 candidates.", correct:true},
          {key:"b", text:"KV-cache the attention activations and reuse across candidates.", correct:true},
          {key:"c", text:"Switch from BF16 to FP4 weight quantization for the attention projections.", correct:true},
          {key:"d", text:"Truncate user history to the most recent 64 tokens regardless of available history."},
          {key:"e", text:"Replace HSTU with a smaller MLP-based DLRM for the latency-sensitive path."},
          {key:"f", text:"Re-run training with shorter sequences so eval matches serving."},
        ]}
        trap={<>(d) is the seductive shortcut — it hits the budget but DESTROYS the model's main advantage (long history). (e) is a non-answer that throws away the migration. (f) confuses training-time and serving-time choices: shortening at train time abandons the data scale that HSTU is built for.</>}
        lens={<>The three correct moves preserve the model and shave latency: (a) shared user-history encoding is the single biggest win because the history is the long part; (b) KV-cache reuse compounds with (a); (c) FP4 weights cut compute and memory bandwidth without changing the math materially. Truncation is the lazy answer that gives back the migration.</>}
        stretch={<>Which of (a), (b), (c) is incompatible with online learning where embeddings update mid-day?</>}
      />

      <VIS.TrapProblem
        id="hstu-p6"
        difficulty="hard"
        title="P6 — Calibration regression"
        scenario={<>Post-HSTU-launch, the ads auction team reports their predicted-CTR-vs-realized-CTR calibration plot diverges sharply above the 95th-percentile score. DLRM had been calibrated by a Platt scaler trained nightly. Why does the same Platt scaler not work for HSTU?</>}
        options={[
          {key:"a", text:"HSTU's tokenizer changes between runs, breaking score stability."},
          {key:"b", text:"HSTU's output is a generative softmax over the action vocabulary, not a pointwise sigmoid, so a 1-D logistic re-scaling has the wrong functional form.", correct:true},
          {key:"c", text:"Platt scaling requires more data than HSTU has seen."},
          {key:"d", text:"FP4 quantization in the attention head adds noise that defeats calibration."},
        ]}
        trap={<>(a) and (d) are red herrings — neither is the structural reason. (c) confuses data volume with shape. The real answer is about the OUTPUT shape: a generative model's score for "click on candidate i" comes from a normalized softmax across the action vocabulary, which has very different tails than a pointwise sigmoid.</>}
        lens={<>For HSTU you typically need either a temperature-scaled softmax + isotonic re-mapping over the score distribution, or a small calibration network that takes (user features, score) and predicts realized CTR. A flat Platt sigmoid assumes one-dimensional monotone re-scaling; HSTU's scores violate that.</>}
        stretch={<>How would you A/B-test the calibration fix without exposing users to mis-calibrated auctions?</>}
      />

      <VIS.TrapProblem
        id="hstu-p7"
        difficulty="hard"
        title="P7 — Cold-start cohort"
        scenario={<>Your HSTU recommender serves a feed with a long tail of new users. Users with &lt;5 lifetime actions show NDCG that is <strong>22% lower</strong> than users with 1000+ actions — a much bigger gap than DLRM exhibited. Your manager says "increase the embedding dim." What's actually going on?</>}
        options={[
          {key:"a", text:"Embedding dim is undersized; doubling it will close the gap."},
          {key:"b", text:"HSTU's quality is fundamentally sequence-length-driven; for short histories there's little for attention to pool over and the model degrades to a sparse-feature classifier without the engineered crosses DLRM had.", correct:true},
          {key:"c", text:"The vocabulary needs to include cold-start tokens explicitly."},
          {key:"d", text:"Calibration is broken in the cold-start cohort."},
        ]}
        trap={<>(a) treats this as a capacity bug; in fact the gap is structural to the architecture. (c) and (d) might be marginally helpful but are not the dominant cause.</>}
        lens={<>HSTU's advantage compounds with sequence length. At &lt;5 actions, you're essentially feeding a tiny prefix to a model designed for long context — and you've also dropped the DLRM crosses that previously carried cold-start signal. Fix: hybrid serving (DLRM for cold cohort, HSTU for warm) or MTGR-style cross injection so the architecture has something to chew on when sequence is short.</>}
        stretch={<>How would you draw the decision boundary between "use HSTU" and "use DLRM" if forced to pick per-request?</>}
      />

      <VIS.TrapProblem
        id="hstu-p8"
        difficulty="medium"
        title="P8 — Loss choice for ranking surface"
        scenario={<>You're using HSTU as a ranker for a video feed. The native HSTU loss is next-token cross-entropy over the action vocabulary. Your ranking metric is NDCG@10 over a set of 500 candidates. Which training-time choice most directly aligns the loss with the eval?</>}
        options={[
          {key:"a", text:"Continue with vanilla next-action cross-entropy; the model already maximizes likelihood."},
          {key:"b", text:"Add an auxiliary in-batch contrastive loss that ranks positives above sampled negatives drawn from the candidate distribution at serving time.", correct:true},
          {key:"c", text:"Switch to MSE on watch-time."},
          {key:"d", text:"Add a regularization term on attention entropy."},
        ]}
        trap={<>(a) is the "if it ain't broke" answer, but next-token CE doesn't encode the candidate set the serving system actually scores against — so the model is unaware of negatives it will see in production. (c) and (d) miss the loss-vs-eval mismatch entirely.</>}
        lens={<>Aligning the train-time negative distribution with serving-time candidates is the canonical fix for generative-ranker mismatch. In-batch or sampled-softmax negatives drawn from the live candidate pool make the loss surface look like the eval surface.</>}
        stretch={<>What goes wrong if the in-batch negatives all come from popular items?</>}
      />

      <VIS.TrapProblem
        id="hstu-p9"
        difficulty="hard"
        multiSelect
        title="P9 — Diagnosing a regressing online metric"
        scenario={<>HSTU launched, offline NDCG +4%, online watch-time <strong>−1.2%</strong>. A/B significant. Tech lead suggests "it's noise; ramp up." Which checks should you run before agreeing to ramp? Select all that apply.</>}
        options={[
          {key:"a", text:"Verify that the offline eval set is a fair sample of the live distribution (not over-represented by power users).", correct:true},
          {key:"b", text:"Check calibration of the production model; mis-calibration can flip auction outcomes even with good ranking.", correct:true},
          {key:"c", text:"Inspect the candidate generator — HSTU may rank well over its own retrieved set but be starved of diversity.", correct:true},
          {key:"d", text:"Increase model size by 4× — the launch may have been undersized."},
          {key:"e", text:"Roll back; offline ≠ online by construction."},
        ]}
        trap={<>(d) is a guess at the wrong layer of the stack. (e) is over-correction — a 1.2% regression at significance warrants <em>investigation</em>, not panic-rollback. The real failure modes for an offline-positive / online-negative migration are nearly always eval distribution, calibration, or candidate-set mismatch.</>}
        lens={<>Three correct: eval distribution mismatch, calibration drift, candidate-generator mismatch. Any one of these can flip the sign of offline vs online. Diagnose before either rolling back or scaling up.</>}
        stretch={<>What single online experiment cleanly separates a calibration regression from a ranking regression?</>}
      />

      <VIS.TrapProblem
        id="hstu-p10"
        difficulty="hard"
        title="P10 — Where the FLOP budget actually goes"
        scenario={<>Profiling shows that during a 1B-param HSTU forward pass, <strong>62% of FLOPs</strong> are in the attention block, <strong>30%</strong> in the feed-forward block, and <strong>8%</strong> in embedding lookups. A junior eng proposes "shrink the embedding table — that's where the parameter count is." Why is this the wrong knob?</>}
        options={[
          {key:"a", text:"Embedding tables hold most parameters but contribute few FLOPs; shrinking saves memory, not latency.", correct:true},
          {key:"b", text:"Embedding tables are required for vocabulary coverage and cannot be shrunk."},
          {key:"c", text:"Shrinking embeddings breaks calibration."},
          {key:"d", text:"Embedding FLOPs are higher than the profiler reports because of cache misses."},
        ]}
        trap={<>(b) is overstated — embeddings can absolutely be shrunk; the question is whether it helps latency. (c) and (d) are unrelated.</>}
        lens={<>FLOPs and parameters are different budgets. Embeddings are a memory bandwidth / capacity story; attention is the compute story. For latency wins, target the attention block (KV-cache reuse, FP4, sparser patterns) — not the parameter-fat but FLOP-light embedding tables.</>}
        stretch={<>When would shrinking the embedding table actually help latency?</>}
      />

      <VIS.TrapProblem
        id="hstu-p11"
        difficulty="medium"
        title="P11 — Heterogeneous action vocabulary"
        scenario={<>You design the HSTU token vocabulary. Three colleagues propose schemas. (i) One token per (action_type, item_id) pair — explodes vocab. (ii) Separate token streams for actions vs items, fused at attention. (iii) Item ID as token, action type as a per-token feature added to the embedding. Which is most aligned with HSTU's design?</>}
        options={[
          {key:"a", text:"(i) — explicit pair tokens maximize the model's expressiveness."},
          {key:"b", text:"(ii) — separate streams keep the semantics clean and compose at attention."},
          {key:"c", text:"(iii) — single stream with action type as an additive feature; that's exactly the heterogeneous-token design.", correct:true},
          {key:"d", text:"Doesn't matter — all three are mathematically equivalent."},
        ]}
        trap={<>(a) inflates vocab combinatorially and starves rare pairs of data. (b) sounds elegant but breaks the temporal ordering invariants that HSTU's attention relies on. (d) is the "everything is equivalent under enough compute" cop-out.</>}
        lens={<>HSTU's "heterogeneous" token is exactly schema (iii): one token per event, with action type / context as additive features. This preserves a single temporal axis (which attention can pool over) while keeping vocab manageable.</>}
        stretch={<>How does this choice interact with KV-caching across requests?</>}
      />

      <VIS.TrapProblem
        id="hstu-p12"
        difficulty="hard"
        title="P12 — Why DLRM still wins on ads"
        scenario={<>An ads team running a mature DLRM evaluates HSTU on their surface. Offline metrics: HSTU −0.8% AUC vs DLRM. The ads surface has very short user history (most queries are anonymous), strong query × creative × geo crosses, and is auction-driven (calibration matters). What's the most parsimonious explanation?</>}
        options={[
          {key:"a", text:"HSTU's scaling law is overhyped; DLRM is just better."},
          {key:"b", text:"The ads surface violates every assumption HSTU was built for — short sequences, cross-dominated signal, calibration-sensitive — so the baseline's strengths exactly match the gap.", correct:true},
          {key:"c", text:"The HSTU model was under-trained; train it 10× longer."},
          {key:"d", text:"The DLRM cross features leak future information."},
        ]}
        trap={<>(a) is over-broad. (c) is a guess without evidence. (d) is the kind of conspiracy-thinking that wastes investigation time.</>}
        lens={<>This is the textbook "right tool for the surface" question. HSTU wins on feed-style surfaces with long histories. Ads (short, contextual, calibration-sensitive) is exactly where DLRM's strengths live. The lesson: architecture choice should be a function of surface properties, not a hype gradient.</>}
        stretch={<>What ONE change to the ads surface (data, infra, or product) would tilt the comparison toward HSTU?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2402.17152" target="_blank" rel="noopener"><strong>Zhai et al. — Actions Speak Louder than Words (ICML 2024)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The HSTU paper itself. Read sections on the attention variant and the scaling-law experiments.</li>
        <li><a href="https://ai.meta.com/research/publications/" target="_blank" rel="noopener"><strong>Meta AI research index</strong></a> <span style={{color:"#64748b", fontSize:14}}>(landing)</span><br/>The follow-on blog posts and engineering notes — searchable by HSTU / generative recommendation.</li>
        <li><a href="https://eugeneyan.com/writing/recsys-llm/" target="_blank" rel="noopener"><strong>Eugene Yan — LLM-style recommenders</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Practitioner's lens on the generative-recommendation wave; situates HSTU vs TIGER vs OneRec.</li>
        <li><a href="https://arxiv.org/abs/1906.00091" target="_blank" rel="noopener"><strong>Naumov et al. — DLRM paper</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, the baseline)</span><br/>Read this before HSTU. The crosses + MLP recipe is what HSTU is responding to.</li>
      </ul>
    </VIS.Section>
  </main>
);
