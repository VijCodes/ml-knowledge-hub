<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 11
// MAFCDR — Meta-Adversarial Cross-Domain Cold-Start Recommendation (DSE 2024)
// Unique mechanism: ADVERSARIAL DOMAIN DISCRIMINATOR is bolted onto the SOURCE-DOMAIN
// encoder INSIDE the MAML meta-training loop, forcing the SHARED LATENT to be
// DOMAIN-INVARIANT before MAML inner-loop adapts to a cold TARGET user/item.
// Cross-visual caution (meta-learning trio):
//   - MAFCDR = adversarial domain discriminator + cross-domain (THIS visual)
//   - CFSM   = content-feature prior + double-tower mutual attention (no domain shift)
//   - PAM    = popularity-trajectory stratification at meta-task sampling
// Don't let "MAML inner-loop sensitivity" / "few-shot variance" be the punchline here;
// the punchline is GRADIENT-REVERSAL on a domain head INSIDE the meta-loop.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Cold-start (cross-domain)"
      title="MAFCDR — Meta-Adversarial Cross-Domain Cold-Start"
      subtitle="A domain-adversarial discriminator with gradient reversal sits INSIDE the MAML meta-loop so the encoder that feeds the inner-loop is already domain-invariant when the cold target user/item arrives."
      byline={[
        {label: "Paper", value: "Wang et al., DSE 2024 (Springer 10.1007/s41019-024-00245-y)"},
        {label: "Surface", value: "Cold target domain, plentiful source domain, shared user/item modality"},
        {label: "Anchor that survives redaction", value: "Adversarial domain head INSIDE MAML — not MAML alone, not DANN alone"},
      ]}/>

    <VIS.TLDR>
      Vanilla <VIS.Term def="Model-Agnostic Meta-Learning — trains an initialization that adapts to a new task with very few gradient steps.">MAML</VIS.Term> for cold-start assumes source and target tasks share the same feature distribution. Cross-domain, they don&apos;t — a movie-encoder feature axis can be book-domain noise. MAFCDR runs <VIS.Term def="A small classifier head trained to predict which domain a feature vector came from; the encoder is trained to FOOL it via gradient reversal, producing domain-invariant features.">domain-adversarial training</VIS.Term> <em>inside</em> the MAML outer loop, so the meta-initialization MAML ships to the target inner loop is already <strong>domain-confused</strong>. Three architectural commitments make this work: (1) multi-level feature attention re-weights raw features <em>before</em> any cross-domain mixing; (2) <VIS.Term def="A layer that flips the gradient sign on backward pass — so minimizing the discriminator&apos;s loss MAXIMIZES it for the encoder, forcing domain-indistinguishable features.">gradient reversal</VIS.Term> on the domain head decorrelates the shared latent from domain ID; (3) MAML&apos;s second-order inner loop adapts the domain-invariant encoder on the cold target. The adversary is what stabilizes the target adaptation — not bigger embeddings, not more meta-tasks.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — three blocks, composed in series">
      <VIS.Mermaid chart={`flowchart TB
  S["Source-domain features"]
  T["Target-domain features (cold)"]
  S --> A["Multi-level feature attention"]
  T --> A
  A --> ENC["Shared encoder"]
  ENC --> ADV["Domain discriminator head"]
  ADV -.gradient reversal.-> ENC
  ENC --> META["MAML outer loop"]
  META --> INIT["Domain-invariant meta-init"]
  INIT --> INNER["MAML inner loop on cold target"]
  INNER --> R["Adapted target ranker"]`} />
      <ul>
        <li><strong>Multi-level feature attention</strong> — re-weights raw features at three granularities (atomic field, field group, user/item profile) <em>before</em> they enter the shared encoder. Pre-attention prevents one domain&apos;s feature mass from dominating the shared latent.</li>
        <li><strong>Meta-adversarial encoder</strong> — a domain-classifier head is trained against the encoder via gradient reversal. The encoder&apos;s loss combines task loss on the source domain and <em>negative</em> domain-classification loss.</li>
        <li><strong>MAML adaptation</strong> — the now-invariant encoder feeds the standard second-order MAML inner loop on the cold target user/item task.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from MAML / DANN / shared-encoder CDR">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Domain shift</th>
          <th style={{textAlign:"left", padding:8}}>Feature reweighting</th>
          <th style={{textAlign:"left", padding:8}}>Cold-target loop</th>
          <th style={{textAlign:"left", padding:8}}>Adversary in meta?</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>MAML-Rec</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Ignored</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>None</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Second-order</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>No</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>DANN (vanilla)</td><td style={{padding:8}}>Gradient reversal</td><td style={{padding:8}}>None</td><td style={{padding:8}}>Standard supervised</td><td style={{padding:8}}>N/A (no meta-loop)</td></tr>
          <tr><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Naive shared-encoder CDR</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Hoped-away</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>None</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Fine-tune</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>No</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}><strong>MAFCDR</strong></td><td style={{padding:8}}><strong>Adversary INSIDE meta-loop</strong></td><td style={{padding:8}}><strong>3-level attention pre-encoder</strong></td><td style={{padding:8}}><strong>MAML on invariant init</strong></td><td style={{padding:8}}><strong>YES — load-bearing</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the question-axis it draws from. Pick, then reveal.</p>

      {/* axis: A1 */}
      <VIS.TrapProblem
        id="mafcdr-p1" difficulty="hard"
        title="P1 — MAFCDR vs vanilla MAML-Rec: what is the load-bearing addition?"
        scenario={<><em>Discriminating insight: MAML alone assumes source and target share the feature distribution. Cross-domain, that is false. MAFCDR&apos;s adversary is INSIDE the meta-loop, so the initialization MAML ships to the inner loop is already domain-invariant.</em><br/>Your CDR cold-start uses MAML-Rec and the cold-target NDCG@10 swings &plusmn;6% across seeds. What does MAFCDR add that fixes this?</>}
        options={[
          {key:"a", text:"A domain-discriminator head with gradient reversal INSIDE the MAML outer loop, forcing the meta-initialization to be domain-invariant. Variance drops because the inner loop no longer chases domain-correlated axes.", correct:true},
          {key:"b", text:"A larger inner-loop learning rate so MAML adapts faster on cold-target shots."},
          {key:"c", text:"Second-order Hessian terms to stabilize MAML."},
          {key:"d", text:"More source tasks per meta-batch."},
        ]}
        trap={<>(b) addresses adaptation speed, not the variance source. (c) MAML is already second-order. (d) more tasks cannot cure domain-mismatched features.</>}
        lens={<>The variance source is the encoder shipping domain-correlated axes into the inner loop. Adversarial decorrelation INSIDE the meta-loop is the fix.</>}
        stretch={<>Where would you start the gradient-reversal coefficient schedule?</>}
      />

      {/* axis: A2 */}
      <VIS.TrapProblem
        id="mafcdr-p2" difficulty="hard"
        title="P2 — MAFCDR vs vanilla DANN"
        scenario={<><em>Discriminating insight: DANN is supervised domain-adversarial — one shared encoder, one task head, one domain head, no meta-loop. MAFCDR places that DANN-style adversary INSIDE the outer loop of MAML, so the artifact decorrelated is the META-INITIALIZATION, not a single-task fit.</em><br/>Why not just slap DANN on top of your cold-start fine-tuner?</>}
        options={[
          {key:"a", text:"DANN decorrelates the encoder for ONE source-target pair fitted directly; it has no few-shot adaptation step. MAFCDR keeps the adversary but puts it in the meta-loop so the artifact shipped is a domain-invariant INITIALIZATION that the MAML inner loop adapts.", correct:true},
          {key:"b", text:"DANN does not support gradient reversal."},
          {key:"c", text:"DANN cannot be combined with attention layers."},
          {key:"d", text:"They are mathematically equivalent."},
        ]}
        trap={<>(b) DANN literally is gradient reversal. (c) trivially false. (d) DANN has no meta-loop, MAFCDR does.</>}
        lens={<>DANN ships a fitted encoder; MAFCDR ships a meta-initialization. The difference matters when the target has under 10 interactions.</>}
        stretch={<>What would MAML stacked on DANN (no adversary in meta-loop) miss?</>}
      />

      {/* axis: A3 */}
      <VIS.TrapProblem
        id="mafcdr-p3" difficulty="medium"
        title="P3 — Counterfactual: no MAFCDR, what do you use?"
        scenario={<><em>Discriminating insight: without MAFCDR, the practical fallback is shared two-tower + per-domain fine-tune. That leaks domain-correlated features into the cold target until enough target interactions accumulate to wash them out — exactly the regime where you cannot wait.</em><br/>Quantify the gap.</>}
        options={[
          {key:"a", text:"Cold-target NDCG@10 stays roughly flat for the first ~50 target interactions per user/item because the shared encoder uses source-domain-correlated axes; MAFCDR closes that gap by shipping a domain-invariant init from day zero.", correct:true},
          {key:"b", text:"No difference; MAML-Rec and MAFCDR perform identically."},
          {key:"c", text:"MAFCDR is strictly worse on the cold target."},
          {key:"d", text:"The gap is in latency, not recall."},
        ]}
        trap={<>(b) ignores the domain-shift premise. (c) backwards. (d) MAFCDR adds training cost, not serving latency.</>}
        lens={<>The cold-start window is exactly when domain-correlated features hurt most.</>}
        stretch={<>Sketch the NDCG@10-vs-#-interactions curve.</>}
      />

      {/* axis: A4 */}
      <VIS.TrapProblem
        id="mafcdr-p4" difficulty="hard"
        title="P4 — Stacking MAFCDR with RQ-VAE Semantic IDs"
        scenario={<><em>Discriminating insight: if the RQ-VAE codebook is trained source-only, the Semantic IDs already carry domain bias; the adversary then has to fight the IDs as well as the encoder.</em><br/>What breaks if you stack carelessly?</>}
        options={[
          {key:"a", text:"Semantic IDs trained source-only become a side-channel for domain identity. Fix: train RQ-VAE on source+target catalog union, OR add the ID embedding to the adversary&apos;s decorrelation target.", correct:true},
          {key:"b", text:"Semantic IDs are unaffected; MAFCDR works as-is."},
          {key:"c", text:"The MAML inner loop diverges because of codebook collisions."},
          {key:"d", text:"RQ-VAE is incompatible with MAML."},
        ]}
        trap={<>(b) ignores the leak. (c) unrelated mechanism. (d) false.</>}
        lens={<>Domain leaks through any source-only-trained representation; the adversary must see them all.</>}
        stretch={<>Where else can domain leak (item IDs, side info, tokenizers)?</>}
      />

      {/* axis: A5 */}
      <VIS.TrapProblem
        id="mafcdr-p5" difficulty="medium"
        title="P5 — Boundary: when does MAFCDR stop being worth it?"
        scenario={<><em>Discriminating insight: MAFCDR pays off when source &gt;&gt; target AND domains share non-trivial feature overlap. Content-alien domains (books → grocery) leave the adversary nothing useful to make invariant; warm targets make MAML alone sufficient.</em><br/>Where is the boundary?</>}
        options={[
          {key:"a", text:"MAFCDR wins when (i) source >> target in interactions, (ii) domains share genuine feature overlap, and (iii) target is still cold (under ~50 interactions/user). Outside this band, prefer MAML-Rec or naive shared-encoder CDR.", correct:true},
          {key:"b", text:"MAFCDR always wins."},
          {key:"c", text:"MAFCDR wins when target >> source."},
          {key:"d", text:"MAFCDR is independent of domain overlap."},
        ]}
        trap={<>(b) ignores cost. (c) backwards. (d) ignores the mechanism.</>}
        lens={<>Adversary needs a signal; meta-loop needs few-shot.</>}
        stretch={<>What diagnostic estimates attention-mass overlap before training?</>}
      />

      {/* axis: B1 */}
      <VIS.TrapProblem
        id="mafcdr-p6" difficulty="hard"
        title="P6 — Pick the technique for THIS scenario"
        scenario={<><em>Discriminating insight: 50M source-domain (movies) interactions, 200k target-domain (books) interactions, only 3-8 per cold target user. Plausible feature overlap (both narrative content). Cold + plentiful source + overlap = MAFCDR&apos;s sweet spot.</em><br/>Pick the senior choice.</>}
        options={[
          {key:"a", text:"MAFCDR — plentiful source, cold target with under 10 shots per user, plausible feature overlap. Domain-adversarial inside the meta-loop is exactly the regime designed for.", correct:true},
          {key:"b", text:"Fine-tune a source-only two-tower on the target; the source data dominates."},
          {key:"c", text:"Train a fresh book-domain DLRM from scratch; ignore the movie data."},
          {key:"d", text:"Cross-domain CF without meta-learning."},
        ]}
        trap={<>(b) leaks domain bias into cold targets. (c) wastes the 50M source rows. (d) no few-shot mechanism.</>}
        lens={<>Cold-target + plentiful source + overlap = MAFCDR.</>}
        stretch={<>At what target sample size would you drop the adversary?</>}
      />

      {/* axis: B2 — sounds reasonable, isn't */}
      <VIS.TrapProblem
        id="mafcdr-p7" difficulty="hard"
        title="P7 — Sounds reasonable: just use a bigger source-shared embedding"
        scenario={<><em>Discriminating insight: bigger embeddings give MORE capacity to encode domain-correlated axes — the opposite of what cold-target adaptation needs. The fix is decorrelation, not capacity.</em><br/>A teammate proposes doubling embedding dim from 64 to 128 to help cold-start. Why is this wrong for MAFCDR&apos;s problem?</>}
        options={[
          {key:"a", text:"Bigger embeddings expand capacity for domain-correlated subspaces, so the inner loop has MORE chances to latch onto source-only features. The right move is to keep dim modest and use the adversary to decorrelate.", correct:true},
          {key:"b", text:"Bigger embeddings always help cold-start."},
          {key:"c", text:"Embedding dim is independent of cold-start."},
          {key:"d", text:"Halve the dim instead; smaller is always better."},
        ]}
        trap={<>(b) common textbook intuition that fails here. (c) ignores the mechanism. (d) overcorrects.</>}
        lens={<>Capacity-shortage vs domain-leak require opposite fixes.</>}
        stretch={<>What metric distinguishes capacity-bound from domain-leak failures?</>}
      />

      {/* axis: B3 — customer/business framing */}
      <VIS.TrapProblem
        id="mafcdr-p8" difficulty="medium"
        title="P8 — One-sentence business case to a PM"
        scenario={<><em>Discriminating insight: the business case is &quot;new books-on-our-app users get good recommendations from day 1 by borrowing structure from our movie users&quot; — NOT scaling laws or meta-learning jargon.</em><br/>Pick the right pitch.</>}
        options={[
          {key:"a", text:"New cold-start users in our books vertical get day-1 recommendations as good as users with months of history, by borrowing structural patterns from our mature movies vertical without contaminating book taste with movie taste.", correct:true},
          {key:"b", text:"We train a bigger neural network for cold-start."},
          {key:"c", text:"We apply scaling laws to recommendation."},
          {key:"d", text:"We use second-order gradients."},
        ]}
        trap={<>(b)(c)(d) jargon that does not name the business win.</>}
        lens={<>Day-1 quality for new users — not the technique name.</>}
        stretch={<>What metric does the PM watch?</>}
      />

      {/* axis: B4 — when NOT to use */}
      <VIS.TrapProblem
        id="mafcdr-p9" difficulty="hard" multiSelect
        title="P9 — When NOT to use MAFCDR. Select all that apply."
        scenario={<><em>Discriminating insight: MAFCDR loses when the adversary has nothing to learn (truly disjoint domains), the meta-loop has nothing to do (warm target), or the adversary destabilizes training (very small batches, noisy domain labels).</em><br/>Pick the situations where you would NOT use MAFCDR.</>}
        options={[
          {key:"a", text:"Source and target are content-alien (books → grocery). No invariance signal.", correct:true},
          {key:"b", text:"Target is already warm (200+ interactions/user). MAML&apos;s few-shot premise is gone.", correct:true},
          {key:"c", text:"Per-task batch is under 8 in the meta-loop; adversary fluctuates wildly.", correct:true},
          {key:"d", text:"Source is plentiful and feature overlap is genuine; target is cold."},
          {key:"e", text:"Domain labels are noisy/uncertain (mixed-domain users), making the adversary chase noise.", correct:true},
        ]}
        trap={<>(d) is MAFCDR&apos;s sweet spot, not a do-not-use.</>}
        lens={<>Adversary needs signal AND stability; meta-loop needs few-shot.</>}
        stretch={<>How would you detect (e) before training?</>}
      />

      {/* axis: C1 */}
      <VIS.TrapProblem
        id="mafcdr-p10" difficulty="hard"
        title="P10 — Why three-level attention BEFORE the adversary?"
        scenario={<><em>Discriminating insight: if attention sits AFTER the shared encoder, the encoder has already mixed domain-correlated mass and the adversary has to undo that mixing. Pre-encoder attention lets you re-weight raw features so the encoder sees less domain-correlated mass to begin with.</em><br/>Why pre-encoder attention is load-bearing.</>}
        options={[
          {key:"a", text:"Multi-level attention BEFORE the encoder re-weights raw features at three granularities so the encoder receives less domain-correlated mass; the adversary then only has to decorrelate the residual instead of fighting a fully-mixed latent.", correct:true},
          {key:"b", text:"Attention is faster pre-encoder."},
          {key:"c", text:"Post-encoder attention is mathematically equivalent."},
          {key:"d", text:"Multi-level attention is decorative."},
        ]}
        trap={<>(b) latency, not mechanism. (c) false. (d) ignores ablations.</>}
        lens={<>Re-weight before mixing &gt; decorrelate after mixing.</>}
        stretch={<>Toy 2-feature case where post-encoder attention cannot undo the mixing?</>}
      />

      {/* axis: C2 — loss */}
      <VIS.TrapProblem
        id="mafcdr-p11" difficulty="hard"
        title="P11 — Total loss decomposition"
        scenario={<><em>Discriminating insight: the encoder receives task-loss gradient (positive) plus NEGATIVE domain-classifier gradient (via reversal layer), weighted by lambda. The domain head receives ONLY the domain-classification gradient with normal sign.</em><br/>Which is the correct loss for the encoder?</>}
        options={[
          {key:"a", text:"L_encoder = L_task(source) − λ · L_domain. The reversal layer makes minimizing L_encoder MAXIMIZE L_domain — encoder learns features the discriminator cannot classify by domain.", correct:true},
          {key:"b", text:"L_encoder = L_task(source) + λ · L_domain — encoder COOPERATES with the domain head."},
          {key:"c", text:"L_encoder = L_task(target) − λ · L_domain — task loss on target, not source."},
          {key:"d", text:"L_encoder = L_task + L_domain (no λ, no sign flip)."},
        ]}
        trap={<>(b) cooperation defeats the purpose. (c) target is cold; task loss on target is sparse. (d) misses sign and schedule.</>}
        lens={<>Sign flip + λ schedule are the entire adversarial mechanism.</>}
        stretch={<>How does λ evolve over training? Why start small?</>}
      />

      {/* axis: C3 — what's dropped vs baseline */}
      <VIS.TrapProblem
        id="mafcdr-p12" difficulty="medium"
        title="P12 — What MAFCDR DROPS vs naive shared-encoder CDR"
        scenario={<><em>Discriminating insight: naive shared-encoder CDR keeps a single fitted-on-source encoder and FINE-TUNES on target. MAFCDR drops the fine-tune step — it ships a meta-initialization that the MAML inner loop adapts.</em><br/>What does MAFCDR drop?</>}
        options={[
          {key:"a", text:"The standard target-domain FINE-TUNE step. MAFCDR ships a meta-initialization that is adapted via MAML&apos;s few-shot inner loop, not via fine-tuning. This is what makes day-1 cold-target performance possible.", correct:true},
          {key:"b", text:"The shared encoder."},
          {key:"c", text:"The domain discriminator (it is only used at inference)."},
          {key:"d", text:"The attention block."},
        ]}
        trap={<>(b)(c)(d) all still present.</>}
        lens={<>The replaced piece is fine-tune, not the encoder.</>}
        stretch={<>What goes wrong if you keep fine-tune AND MAML?</>}
      />

      {/* axis: C4 — hyperparam */}
      <VIS.TrapProblem
        id="mafcdr-p13" difficulty="hard"
        title="P13 — Most fragile hyperparameter"
        scenario={<><em>Discriminating insight: λ (the gradient-reversal coefficient) is the most fragile. Too low and the adversary is decorative; too high and the encoder is starved of task signal and collapses into a near-uniform representation. The paper schedules λ to grow from 0 over training.</em><br/>Rank by production breakage if mis-set 2x.</>}
        options={[
          {key:"a", text:"λ (gradient-reversal coefficient) >> MAML inner LR >> embedding dim >> attention temperature. λ at 2x can collapse representation; the others degrade gracefully.", correct:true},
          {key:"b", text:"Embedding dim is the most fragile."},
          {key:"c", text:"Batch size is the most fragile."},
          {key:"d", text:"All hyperparameters are equally fragile."},
        ]}
        trap={<>(b)(c)(d) miss the adversarial-instability mechanism.</>}
        lens={<>The adversary&apos;s strength is the dominant fragility.</>}
        stretch={<>Sketch the λ warmup schedule.</>}
      />

      {/* axis: C5 — data assumption */}
      <VIS.TrapProblem
        id="mafcdr-p14" difficulty="medium"
        title="P14 — Data assumption violations"
        scenario={<><em>Discriminating insight: MAFCDR assumes every example has a clean domain label and per-task batches are large enough for the discriminator. Mixed-domain users (same person reads books AND watches movies in one session) cause the adversary to chase noise.</em><br/>Which violation breaks MAFCDR most directly?</>}
        options={[
          {key:"a", text:"Mixed-domain users with ambiguous domain labels — the adversary cannot learn a stable boundary, so gradient reversal pushes the encoder toward random rather than invariant features.", correct:true},
          {key:"b", text:"Slightly different feature dimensions across domains."},
          {key:"c", text:"Slightly mismatched click rates across domains."},
          {key:"d", text:"Different time zones."},
        ]}
        trap={<>(b)(c)(d) all tolerable; (a) attacks the adversary&apos;s premise.</>}
        lens={<>The adversary needs a learnable domain boundary.</>}
        stretch={<>What if you only have domain labels for 70% of examples?</>}
      />

      {/* axis: D1 — intuitive but wrong */}
      <VIS.TrapProblem
        id="mafcdr-p15" difficulty="hard"
        title="P15 — Intuitive but wrong: adversarial training helps everywhere"
        scenario={<><em>Discriminating insight: in WITHIN-domain recsys, the adversary has no useful target to fight — domain is constant. Forcing decorrelation against constant noise degrades the encoder.</em><br/>You add MAFCDR&apos;s adversary to a single-domain Netflix system. What happens?</>}
        options={[
          {key:"a", text:"Performance regresses. With a constant domain label, the adversary&apos;s loss is degenerate and the gradient-reversal term injects noise into the encoder, hurting the within-domain task.", correct:true},
          {key:"b", text:"Performance improves uniformly."},
          {key:"c", text:"Performance is unchanged."},
          {key:"d", text:"Performance becomes more stable across seeds."},
        ]}
        trap={<>(b)(c)(d) miss that the adversary needs a real domain to fight.</>}
        lens={<>Domain-adversarial training requires differing domains.</>}
        stretch={<>Same logic — when is contrastive InfoNCE useless?</>}
      />

      {/* axis: D2 — wrong-assumption cascade */}
      <VIS.TrapProblem
        id="mafcdr-p16" difficulty="hard"
        title="P16 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: &quot;MAFCDR is just MAML + DANN&quot; cascades into three downstream errors: wrong loss decomposition, wrong artifact (fine-tuned encoder vs meta-init), wrong evaluation surface (within-domain lift vs cold-target few-shot lift).</em><br/>If you assume MAFCDR = MAML+DANN naively, what breaks?</>}
        options={[
          {key:"a", text:"All three: loss composition, deployed artifact, and evaluation surface. The adversary&apos;s placement in the OUTER meta-loop changes what you ship and how you measure it.", correct:true},
          {key:"b", text:"Just the loss."},
          {key:"c", text:"Just the evaluation."},
          {key:"d", text:"Nothing breaks; they ARE equivalent."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>Where the adversary lives in the loop nesting determines the deployed artifact.</>}
        stretch={<>Where would the adversary go for a 3-domain CDR?</>}
      />

      {/* axis: D3 — senior vs junior */}
      <VIS.TrapProblem
        id="mafcdr-p17" difficulty="medium"
        title="P17 — Senior vs junior framing"
        scenario={<><em>Discriminating insight: junior reaches for &quot;more cold-target data&quot;; senior reaches for &quot;remove domain leak in the meta-init&quot;. Cold-target data is the problem to solve, not the lever.</em><br/>Cold-target NDCG@10 is +2% on weekly retrains but flat day-1. Which lever first?</>}
        options={[
          {key:"a", text:"Audit the meta-initialization for domain leak. If the source-trained encoder ships axes correlated with domain ID, the inner loop adapts toward them with very few target shots. Fix the adversary, not the data volume.", correct:true},
          {key:"b", text:"Wait for more cold-target data to accumulate."},
          {key:"c", text:"Raise the inner-loop learning rate."},
          {key:"d", text:"Switch to first-order MAML."},
        ]}
        trap={<>(b) the junior lever. (c)(d) tweak symptoms.</>}
        lens={<>Day-1 cold-start failure is a meta-init quality problem.</>}
        stretch={<>What diagnostic exposes domain leak in a meta-init?</>}
      />

      {/* axis: D4 — plausible misattribution */}
      <VIS.TrapProblem
        id="mafcdr-p18" difficulty="hard"
        title="P18 — Plausible misattribution"
        scenario={<><em>Discriminating insight: target-domain regression LOOKS like MAML&apos;s known second-order instability, but the actual cause is λ set too aggressively — encoder collapsed and the meta-init became near-uniform.</em><br/>Cold-target NDCG falls 5% week-over-week. Three plausible causes — which is most likely?</>}
        options={[
          {key:"a", text:"λ schedule was bumped last week; encoder representation collapsed because the adversary overwhelmed the task loss. Roll back λ first; if NDCG recovers, you have confirmed.", correct:true},
          {key:"b", text:"MAML inner-loop LR drift; restart with default."},
          {key:"c", text:"Cold-target distribution shift; collect more data."},
          {key:"d", text:"Item-side cache invalidation issue."},
        ]}
        trap={<>(b)(c)(d) plausible but ignore the recent change.</>}
        lens={<>Always check what changed; for MAFCDR, λ is the dominant fragility.</>}
        stretch={<>What logged signal would confirm representation collapse?</>}
      />

      {/* axis: E1 — production gotcha */}
      <VIS.TrapProblem
        id="mafcdr-p19" difficulty="hard"
        title="P19 — Production gotcha: adversary at serving time"
        scenario={<><em>Discriminating insight: the discriminator is a TRAINING-TIME ARTIFACT. It does not ship. Teams that accidentally keep the discriminator in the serving graph add latency for zero benefit and risk the discriminator being run on stale domain labels.</em><br/>What is the deployment discipline?</>}
        options={[
          {key:"a", text:"Strip the domain discriminator from the serving graph at export time. It exists only to push gradients through the reversal layer during training; at serving you ship the encoder + ranker only.", correct:true},
          {key:"b", text:"Ship the discriminator; it is needed to choose between source/target rankers at inference."},
          {key:"c", text:"Keep the discriminator and use it as a feature."},
          {key:"d", text:"The discriminator&apos;s output is used for re-ranking."},
        ]}
        trap={<>(b)(c)(d) misunderstand the adversary&apos;s role.</>}
        lens={<>Training-time-only components must be stripped from serving graphs.</>}
        stretch={<>How would you assert this in CI?</>}
      />

      {/* axis: E2 — Failure on Friday */}
      <VIS.TrapProblem
        id="mafcdr-p20" difficulty="hard"
        title="P20 — Failure on Friday: cold-target NDCG craters overnight"
        scenario={<><em>Discriminating insight: a domain-label schema change (e.g., a third sub-domain was added but the discriminator head still has only 2 outputs) causes the adversary to mis-classify systematically; gradient reversal then pushes the encoder AWAY from a now-incorrect target, distorting the meta-init.</em><br/>3am page: cold-target NDCG@10 −18%, MAML inner-loop loss looks fine, item engagement diversity unchanged. Diagnosis?</>}
        options={[
          {key:"a", text:"A new domain category was added upstream but the discriminator&apos;s output dimension was not updated. Gradient reversal is pushing the encoder against a stale 2-class boundary, corrupting the meta-init. Fix: bump the discriminator&apos;s output dim and retrain; gate releases on a schema-version check.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Cold-target data volume dropped."},
          {key:"d", text:"Inner-loop LR was changed."},
        ]}
        trap={<>(b)(c)(d) generic — not MAFCDR-specific.</>}
        lens={<>The adversary&apos;s output schema must track the domain label schema.</>}
        stretch={<>What test detects label-schema drift before training?</>}
      />

      {/* axis: E3 — implementation specifics */}
      <VIS.TrapProblem
        id="mafcdr-p21" difficulty="medium"
        title="P21 — Library default that bites: gradient clipping after reversal"
        scenario={<><em>Discriminating insight: a common bug is to apply global gradient clipping to the COMBINED gradient AFTER the reversal layer; this clips the reversed gradient asymmetrically, weakening the adversary.</em><br/>Where does the silent default break MAFCDR?</>}
        options={[
          {key:"a", text:"Global gradient clipping applied AFTER the reversal layer clips the negated domain-gradient asymmetrically, silently weakening the adversary. Fix: clip task-grad and domain-grad separately, then combine.", correct:true},
          {key:"b", text:"Default Adam β values are wrong for MAFCDR."},
          {key:"c", text:"Default dropout is too low."},
          {key:"d", text:"Default learning-rate schedule is the issue."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Reversal-layer interactions with clipping are the standard MAFCDR footgun.</>}
        stretch={<>Where else does the reversal layer cause subtle bugs?</>}
      />

      {/* axis: E4 — rollout */}
      <VIS.TrapProblem
        id="mafcdr-p22" difficulty="hard" ordered
        title="P22 — Order the rollout phases"
        scenario={<><em>Discriminating insight: rollout for MAFCDR is (1) source-only MAML baseline, (2) ADD discriminator with λ=0 (no-op sanity), (3) ramp λ on schedule, (4) shadow-score cold-target output against source baseline, (5) traffic ramp on cold-target users.</em><br/>Put these in order.</>}
        options={[
          {key:"a", text:"Source-only MAML baseline → add discriminator at λ=0 → ramp λ on schedule → shadow-score cold-target → traffic ramp", correct:true},
          {key:"b", text:"Add discriminator at full λ → train → ramp traffic."},
          {key:"c", text:"Skip the source-only baseline; ramp λ directly on combined data."},
          {key:"d", text:"Shadow-score first, then train."},
        ]}
        trap={<>(b) misses the λ=0 sanity check. (c) loses the diagnostic. (d) ordering nonsense.</>}
        lens={<>λ=0 sanity catches adversary-induced regressions early.</>}
        stretch={<>What does the λ=0 metric look like vs source-only MAML?</>}
      />

      {/* axis: F1 — edge case */}
      <VIS.TrapProblem
        id="mafcdr-p23" difficulty="hard"
        title="P23 — Smallest input that breaks MAFCDR&apos;s claimed advantage"
        scenario={<><em>Discriminating insight: when source and target are nearly identical (domain shift is negligible), the adversary has no useful boundary to learn, λ noise dominates, and MAFCDR underperforms MAML-Rec.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"Source and target drawn from the SAME distribution (e.g., movies-US vs movies-EU after license filters) — the adversary&apos;s loss floors near random, gradient reversal injects noise, and MAFCDR regresses below MAML-Rec.", correct:true},
          {key:"b", text:"Source much larger than target — MAFCDR&apos;s sweet spot, not an edge case."},
          {key:"c", text:"Target has 100k users."},
          {key:"d", text:"Source has 50M interactions."},
        ]}
        trap={<>(b) sweet spot, not edge. (c)(d) describe the standard regime.</>}
        lens={<>MAFCDR&apos;s edge is genuine domain shift; near-IID breaks it.</>}
        stretch={<>What measure of domain shift would you use as a gate?</>}
      />

      {/* axis: F5 — community-found / follow-up */}
      <VIS.TrapProblem
        id="mafcdr-p24" difficulty="hard"
        title="P24 — Most direct follow-up to the stability gap"
        scenario={<><em>Discriminating insight: MAFCDR&apos;s named weakness is adversarial-training instability. Likely follow-ups: replace the discriminator with a 1-Lipschitz Wasserstein critic, soften domain labels into a probabilistic mixture, or move the adversary to feature-CRITIC pairs at multiple layers.</em><br/>Which addresses the stability gap the paper itself names?</>}
        options={[
          {key:"a", text:"Replace the discriminator with a 1-Lipschitz Wasserstein critic and remove gradient reversal; the Wasserstein formulation gives smoother gradients and is less prone to representation collapse.", correct:true},
          {key:"b", text:"Add more attention heads."},
          {key:"c", text:"Increase embedding dim."},
          {key:"d", text:"Use ReLU instead of GELU."},
        ]}
        trap={<>(b)(c)(d) unrelated to the stability gap.</>}
        lens={<>Adversarial-training stability fixes are the natural follow-up direction.</>}
        stretch={<>What does the Wasserstein critic give up in exchange?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://link.springer.com/article/10.1007/s41019-024-00245-y" target="_blank" rel="noopener">Wang et al., <em>A Meta-Adversarial Framework for Cross-Domain Cold-Start Recommendation</em> (DSE 2024)</a> — primary source.</li>
        <li><a href="https://arxiv.org/abs/1505.07818" target="_blank" rel="noopener">Ganin &amp; Lempitsky, <em>Domain-Adversarial Training of Neural Networks</em> (DANN, ICML 2015)</a> — the gradient-reversal mechanism MAFCDR places inside the meta-loop.</li>
        <li><a href="https://arxiv.org/abs/1703.03400" target="_blank" rel="noopener">Finn, Abbeel, Levine, <em>Model-Agnostic Meta-Learning</em> (MAML, ICML 2017)</a> — the meta-loop MAFCDR wraps.</li>
