  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// LLaRA — Large Language-Recommendation Assistant.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · LLM-augmented recommendation"
      title="LLaRA — Large Language-Recommendation Assistant"
      subtitle="Hybrid prompts that fuse item text with collaborative-filtering ID embeddings, ramped in by curriculum."
      byline={[
        {label: "Paper", value: "Liao et al., SIGIR 2024"},
        {label: "URL", value: "arxiv.org/abs/2312.02445"},
      ]}/>

    <VIS.TLDR>
      LLaRA fuses a frozen sequential recommender's <strong>ID embeddings</strong> with item <strong>text</strong> inside an LLM's prompt — via a thin adapter — and trains the LLM to predict the next item.
      The key trick is <strong>curriculum learning</strong>: start text-only so the LLM doesn't immediately ignore the brand-new ID token type, then gradually mix in the collaborative-signal embedding.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Two camps had grown apart by late 2023. <VIS.Term def="Sequential recommendation models like SASRec or GRU4Rec — predict the next item from a user's behavior sequence using learned ID embeddings.">Sequential recommenders</VIS.Term> (SASRec, GRU4Rec) learned ID embeddings that encode <VIS.Term def="The pattern that users with similar past behavior tend to like similar future items — what you learn from interaction data without using item content.">collaborative-filtering signal</VIS.Term> beautifully but were blind to world knowledge. Pure-text LLM recommenders (GPT-4 prompted with item titles) could reason but ignored what users actually clicked.
      </p>
      <p>
        LLaRA bolts the two together. For each item in a user's history, it injects BOTH the item's text AND a special <code>&lt;ITEM_EMB&gt;</code> placeholder whose embedding is an adapter-mapped projection of the sequential recommender's learned ID embedding.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  SEQ["Frozen SASRec<br/>item ID embedding"]
  TXT["Item title text"]
  ADP["Adapter MLP"]
  SEQ --> ADP
  ADP --> EMB["Soft token in LLM vocab"]
  TXT --> TOK["BPE tokens"]
  EMB --> PROMPT["Hybrid prompt"]
  TOK --> PROMPT
  PROMPT --> LLM["LLM (LoRA fine-tuned)"]
  LLM --> PRED["Next item prediction"]
  style ADP fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style LLM fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `} />
    </VIS.Section>

    <VIS.Section id="sec-differs" title="How it differs">
      <table style={{width: "100%", borderCollapse: "collapse", fontSize: 14}}>
        <thead><tr style={{background: "#1f3a5f", color: "white"}}>
          <th style={{padding: 8, textAlign: "left"}}>Approach</th>
          <th style={{padding: 8, textAlign: "left"}}>Item representation</th>
          <th style={{padding: 8, textAlign: "left"}}>Uses world knowledge</th>
          <th style={{padding: 8, textAlign: "left"}}>Uses CF signal</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding: 8}}>SASRec / GRU4Rec</td><td style={{padding: 8}}>learned ID embedding</td><td style={{padding: 8}}>no</td><td style={{padding: 8}}>yes</td></tr>
          <tr style={{background: "#e8f0fa"}}><td style={{padding: 8}}>GPT-4 prompted text-only rec</td><td style={{padding: 8}}>title string</td><td style={{padding: 8}}>yes</td><td style={{padding: 8}}>no (lost)</td></tr>
          <tr><td style={{padding: 8}}><strong>LLaRA</strong></td><td style={{padding: 8}}><strong>title + adapter-projected ID embedding</strong></td><td style={{padding: 8}}><strong>yes</strong></td><td style={{padding: 8}}><strong>yes</strong></td></tr>
          <tr style={{background: "#e8f0fa"}}><td style={{padding: 8}}>LC-Rec</td><td style={{padding: 8}}>VQ collaborative tokens IN vocab</td><td style={{padding: 8}}>yes (via shared vocab)</td><td style={{padding: 8}}>yes</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick LLaRA">
      <ul>
        <li><strong>You already have a strong sequential recommender</strong> (SASRec/BST/etc.) and don't want to throw away its ID embeddings.</li>
        <li><strong>Item text is informative</strong> (titles, descriptions, genres) — books, movies, news, products.</li>
        <li><strong>Latency budget can absorb LLM forward pass</strong> — typically offline candidate generation or chat/conversational surfaces, not low-latency feed ranking.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations">
      <VIS.Callout kind="gotcha" title="Curriculum is load-bearing">
        Without curriculum, the LLM sees an unfamiliar token type (<code>&lt;ITEM_EMB&gt;</code>) and the gradient signal teaches it to IGNORE that token in favor of text it already understands. Papers report 4-7% Hit@1 drops when curriculum is removed.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Latency">
        Inference is dominated by the LLM forward pass (~70B param LLaMA in original paper). Per-request latency 200ms+ — not viable for low-latency feed ranking without distillation.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Adapter alignment is finicky">
        The MLP adapter must map a small (e.g. 64-dim) ID embedding into the LLM's (4096-dim) token space such that gradient flow is stable. Bad initialization → adapter outputs noise → LLM ignores the ID signal forever.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-problems" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>Twelve senior-MLE traps on LLaRA's design choices.</p>

      <VIS.TrapProblem
        id="llara-p1"
        difficulty="hard"
        title="P1 — You skip the curriculum and train hybrid from step 0. What goes wrong?"
        scenario={<>You're reproducing LLaRA on MovieLens. To save time, you skip the curriculum and train the hybrid (text + ID-adapter token) prompt from step 0. After 3 epochs of LoRA fine-tuning, Hit@1 is 6% LOWER than the text-only baseline. What is the most likely root cause?</>}
        options={[
          {key:"a", text:"LoRA rank is too low — increase it."},
          {key:"b", text:"At step 0 the adapter is random; the <ITEM_EMB> token contributes noise, so the LLM's gradient signal teaches it to weight the ID token at near-zero. Once the adapter learns useful projections later, the LLM still ignores them.", correct:true},
          {key:"c", text:"Text overwhelms ID — drop text from the prompt."},
          {key:"d", text:"The LLM is undertrained."},
        ]}
        trap={<>(a) LoRA rank doesn't fix this. (c) overcorrects — text is informative. (d) is a generic answer. The actual mechanism is subtle: the LLM doesn't have prior knowledge that <code>&lt;ITEM_EMB&gt;</code> means anything. If it sees random vectors there during the first hundreds of steps, the gradient toward "predict next item correctly" pushes attention weights AWAY from that token. By the time the adapter has learned, the LLM has already learned to ignore the slot.</>}
        lens={<>This is the canonical LLaRA failure mode and the entire reason the curriculum exists. The fix: start text-only (the LLM trusts text), then gradually mix in the ID-adapter token with a slowly increasing probability. By the time it's at 100% the adapter has learned a useful projection AND the LLM has learned to attend to it.</>}
        stretch={<>If you couldn't use a curriculum, what's the next-best fix to prevent the LLM from ignoring the ID token?</>}
      />

      <VIS.TrapProblem
        id="llara-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Curriculum schedule ablation"
        scenario={<>You run a careful ablation on the curriculum schedule. Four variants over 5 epochs total. Which schedules are likely to outperform "step 0 = 100% hybrid"? Select all that apply.</>}
        options={[
          {key:"a", text:"Epoch 1 text-only, epoch 2 50% hybrid, epoch 3-5 100% hybrid.", correct:true},
          {key:"b", text:"Per-step linear ramp: P(hybrid) = step/total_steps.", correct:true},
          {key:"c", text:"Always 100% hybrid but freeze the adapter weights for the first 1000 steps."},
          {key:"d", text:"Pre-train the adapter alone (frozen LLM) for 500 steps to align, then jointly fine-tune.", correct:true},
          {key:"e", text:"Random schedule — pick text or hybrid at each step uniformly."},
        ]}
        trap={<>(c) sounds like it would help by giving the LLM time to learn, but if the adapter is frozen at RANDOM init, the LLM still learns to ignore it. (e) destroys the gradient of "trust text first" because half of all updates use the noisy hybrid. The three correct variants all share the property of giving the adapter time to produce non-noise outputs before the LLM commits to its attention weights.</>}
        lens={<>The principle: avoid showing the LLM a noisy hybrid signal early. Either ramp in the hybrid (a, b) or pre-align the adapter before unfreezing the joint loss (d). All three preserve the property that "when the LLM first decides whether to attend to <code>&lt;ITEM_EMB&gt;</code>, the signal there is informative."</>}
        stretch={<>If your adapter was a parameter-free deterministic projection (e.g. random matrix), would the curriculum still matter?</>}
      />

      <VIS.TrapProblem
        id="llara-p3"
        difficulty="hard"
        title="P3 — Latency budget: can you ship LLaRA on a feed?"
        scenario={<>Mobile news-feed ranking. p99 latency budget for ranking is 80ms. Candidate generation has narrowed to 200 items per request. The LLaRA prototype uses LLaMA-2-7B with LoRA; on an A100 a single forward pass over a 1K-token prompt is ~150ms. Can you ship this directly to the feed?</>}
        options={[
          {key:"a", text:"Yes — A100 is fast enough."},
          {key:"b", text:"Yes if you batch the 200 candidates."},
          {key:"c", text:"No — 150ms per request already exceeds the 80ms p99 budget, and you'd need to score 200 candidates. Use LLaRA for offline candidate generation or distill to a smaller model.", correct:true},
          {key:"d", text:"Yes, just use INT8 quantization."},
        ]}
        trap={<>(a) ignores the budget arithmetic. (b) helps amortize but doesn't change the single-request latency floor — and you still need to fit within 80ms per request. (d) INT8 helps a bit (~1.5×) but not enough to bridge 150ms → &lt;80ms.</>}
        lens={<>LLaRA's natural deployment surface is NOT low-latency feed ranking. Three viable paths: (1) use it for offline candidate generation (run nightly, cache top-K per user), (2) use it for chat/conversational surfaces where users expect 1-3s latency, (3) distill its output to a smaller model that fits the feed budget.</>}
        stretch={<>If you HAD to ship LLaRA inline at 80ms p99, what's the smallest LLM that might fit, and what do you give up?</>}
      />

      <VIS.TrapProblem
        id="llara-p4"
        difficulty="medium"
        title="P4 — What does the adapter actually do?"
        scenario={<>Junior on your team asks: "The SASRec ID embedding is 64-dim and the LLM's token embedding is 4096-dim. Why do we need an adapter at all? Can't we just zero-pad?"</>}
        options={[
          {key:"a", text:"Zero-padding is fine; dimensions match after padding."},
          {key:"b", text:"The adapter (1-2 layer MLP) learns to project the SASRec geometry into the LLM's token space — it aligns two embedding manifolds that were trained for different objectives. Zero-padding wouldn't preserve the LLM's expected semantic geometry.", correct:true},
          {key:"c", text:"Adapter exists for parameter-efficiency only."},
          {key:"d", text:"It's a residual-only path; the LLM ignores it."},
        ]}
        trap={<>(a) is a beginner-trap answer: dimensions matching ≠ semantically aligned. (c) confuses adapter with LoRA. (d) is just wrong.</>}
        lens={<>The LLM's embedding space has a specific learned geometry — "similar tokens have similar embeddings" with that similarity defined by the LLM's pretraining task. SASRec's ID embedding has a DIFFERENT geometry — "users who clicked similar things have similar embeddings." The adapter learns to map SASRec geometry → LLM-compatible geometry such that the LLM's next-token-prediction circuit can use it.</>}
        stretch={<>What goes wrong if your adapter is too DEEP (say a 6-layer MLP)?</>}
      />

      <VIS.TrapProblem
        id="llara-p5"
        difficulty="hard"
        title="P5 — Sequential recommender quality"
        scenario={<>You use a poorly-trained SASRec (NDCG@10 = 0.18, well below SOTA of 0.31 on the same data) as the source for LLaRA's ID embeddings. After full LLaRA training, the hybrid model UNDERPERFORMS pure-text LLaRA by 2%. What happened?</>}
        options={[
          {key:"a", text:"Hybrid is always better than text-only — your eval is wrong."},
          {key:"b", text:"LLaRA inherits the upstream sequential recommender's quality. A weak SASRec produces noisy ID embeddings; the adapter cannot manufacture signal that wasn't there. Garbage in, garbage out.", correct:true},
          {key:"c", text:"The curriculum overcompensated; remove it."},
          {key:"d", text:"You need a bigger LLM."},
        ]}
        trap={<>(a) is unwarranted confidence in the architecture. (c) and (d) are mechanical tweaks unrelated to the upstream data quality.</>}
        lens={<>LLaRA is multiplicative in upstream quality: a great SASRec + great LLM = great LLaRA; weak SASRec + great LLM = weak LLaRA, sometimes WORSE than text-only because the noise injection hurts. Before scaling LLaRA, make sure your sequential recommender is competitive on its own — that's a prerequisite, not an aside.</>}
        stretch={<>What's a quick offline check that the SASRec embeddings are "good enough" to plug into LLaRA?</>}
      />

      <VIS.TrapProblem
        id="llara-p6"
        difficulty="medium"
        multiSelect
        title="P6 — Cold-start: which signals does LLaRA combine?"
        scenario={<>A brand-new item (no clicks yet) arrives in the catalog. Which of LLaRA's two input channels can still produce a usable representation? Select all that apply.</>}
        options={[
          {key:"a", text:"Text channel (title + description) — fully usable; LLM understands new text immediately.", correct:true},
          {key:"b", text:"ID channel — SASRec needs interaction data; ID embedding for new items is the random-init or fallback vector.", correct:true},
          {key:"c", text:"Both channels work equally well for new items."},
          {key:"d", text:"Neither — LLaRA is offline-only and can't see new catalog items."},
        ]}
        trap={<>(c) is wrong. (d) is wrong — LLaRA can score any item whose text it can read.</>}
        lens={<>LLaRA's text channel gives it a cold-start advantage over pure SASRec — for new items, the text-only signal still carries information about genre, topic, etc. that the LLM can map to user preferences. The ID channel for new items is dead weight (random init); production systems often fall back to text-only for items below a click threshold and graduate them to hybrid once SASRec has seen them.</>}
        stretch={<>What's the simplest "graduation" policy for moving an item from text-only to hybrid?</>}
      />

      <VIS.TrapProblem
        id="llara-p7"
        difficulty="hard"
        title="P7 — What loss does LLaRA minimize?"
        scenario={<>You're implementing LLaRA from the paper. The next-item prediction is over a vocabulary of N items. What loss do you train against?</>}
        options={[
          {key:"a", text:"Cross-entropy over the full N-item softmax — each item is a class."},
          {key:"b", text:"The LLM's standard next-token cross-entropy — the target item's TITLE TOKENS are the labels. The LLM generates 'The Matrix' character-by-character.", correct:true},
          {key:"c", text:"Triplet loss between (user, positive item, negative item) embeddings."},
          {key:"d", text:"Contrastive InfoNCE between user and positive item embeddings."},
        ]}
        trap={<>(a) is the SASRec-native loss but LLaRA doesn't use it. (c) and (d) are common recsys losses but not what LLaRA uses. The LLaRA paper is explicit: the LLM is trained to GENERATE the target item's title using its standard language-modeling loss. You retrieve by checking which catalog item's title matches the generation.</>}
        lens={<>LLaRA treats recommendation as text generation, not classification. The LLM learns: given the user's history (text + ID-adapter tokens), predict the title-token-sequence of the next item. At inference, you generate tokens and match the result against the catalog (often constrained-decoding with a trie). This means the LLM stays in its native task — no new head, no new loss.</>}
        stretch={<>What happens if two different items have the same title? How does LLaRA disambiguate?</>}
      />

      <VIS.TrapProblem
        id="llara-p8"
        difficulty="hard"
        multiSelect
        title="P8 — Ablation: what fraction of LLaRA's lift comes from each piece?"
        scenario={<>You run a clean ablation on a 50K-item movie catalog. Baselines: text-only LLM (no ID), SASRec alone, LLaRA full, LLaRA without curriculum, LLaRA with random adapter (no MLP, just random projection). Results (Hit@1): text-only LLM = 21.3%, SASRec = 18.7%, LLaRA full = 26.8%, no-curriculum = 22.0%, random-adapter = 20.9%. Which conclusions are supported? Select all that apply.</>}
        options={[
          {key:"a", text:"LLaRA's lift over text-only LLM (+5.5%) is real — the ID channel adds signal.", correct:true},
          {key:"b", text:"Curriculum is responsible for ~half of LLaRA's lift over the no-curriculum variant (26.8% vs 22.0%).", correct:true},
          {key:"c", text:"The adapter MLP matters — random projection (20.9%) underperforms text-only baseline.", correct:true},
          {key:"d", text:"SASRec is broken — fix it before considering LLaRA."},
          {key:"e", text:"LLM size is the bottleneck — try a 70B model."},
        ]}
        trap={<>(d) misreads — SASRec at 18.7% on its own is reasonable for this task; what matters is whether LLaRA exceeds the better baseline (text-only LLM at 21.3%). It does, by 5.5pp. (e) is unwarranted speculation; the ablation gives no data on LLM size.</>}
        lens={<>Three clean conclusions: (a) the hybrid design helps net of the LLM. (b) the curriculum matters — without it you almost lose the lift entirely. (c) the adapter must be learned; a random projection actively HURTS because it injects noise the LLM can't ignore. Each of the three pieces is load-bearing.</>}
        stretch={<>If random-adapter UNDERPERFORMS text-only by 0.4pp, what does that tell you about LLM brittleness to noisy soft tokens?</>}
      />

      <VIS.TrapProblem
        id="llara-p9"
        difficulty="medium"
        title="P9 — Inference at serving time"
        scenario={<>At serving time, the user's last 10 items each need their ID embedding looked up, adapted, and inserted into the prompt. The frozen SASRec embedding table is 50K items × 64 dims = 12.8MB. What's the typical serving setup?</>}
        options={[
          {key:"a", text:"Re-run SASRec at serving time to compute the embedding."},
          {key:"b", text:"Cache the SASRec embedding table in RAM next to the LLM; lookup is O(1) per item.", correct:true},
          {key:"c", text:"Re-compute the SASRec embedding for the user's full history at each request."},
          {key:"d", text:"Skip the ID channel at serving — use text-only inference."},
        ]}
        trap={<>(a) and (c) burn cycles for no reason — the embeddings are frozen. (d) loses the whole point of LLaRA.</>}
        lens={<>The standard pattern is to dump the frozen SASRec embedding table to disk after pretraining, then load it into RAM at serving time. Looking up 10 item embeddings is a few microseconds; the LLM forward pass dominates everything else. The adapter MLP is tiny (a few MB of weights) and runs inline.</>}
        stretch={<>What if SASRec is retrained weekly — do you regenerate the embedding table at the same cadence?</>}
      />

      <VIS.TrapProblem
        id="llara-p10"
        difficulty="hard"
        title="P10 — Why not LC-Rec instead?"
        scenario={<>A teammate argues: "LC-Rec is strictly better — it puts collaborative tokens IN the LLM vocabulary, avoiding the adapter altogether and giving the LLM full attention over IDs and text uniformly. Why are we doing LLaRA?"</>}
        options={[
          {key:"a", text:"LLaRA is simpler — no vocab expansion."},
          {key:"b", text:"LLaRA reuses an existing trained sequential recommender's ID embeddings; LC-Rec must retrain the LLM tokenizer + embedding table from scratch on collaborative tokens. Pick LLaRA when you've already invested in SASRec/BST; pick LC-Rec when starting fresh.", correct:true},
          {key:"c", text:"LC-Rec doesn't actually work."},
          {key:"d", text:"LLaRA is faster at inference."},
        ]}
        trap={<>(a) trivializes the choice. (c) is unjustified. (d) is empirically false — LC-Rec has comparable inference cost.</>}
        lens={<>The honest tradeoff is about reuse vs greenfield. If your stack already has a high-quality sequential recommender (years of tuning, online A/B wins), LLaRA lets you layer LLM reasoning on top without throwing it away. If you're starting fresh and want a single unified model, LC-Rec is cleaner. Most production teams have the former situation.</>}
        stretch={<>What happens to LLaRA if you SWAP the underlying SASRec for a different sequential model — do you retrain everything?</>}
      />

      <VIS.TrapProblem
        id="llara-p11"
        difficulty="hard"
        title="P11 — Distillation path"
        scenario={<>LLaRA is offline-only in your stack; you want feed-grade latency. You decide to distill. What's the most defensible distillation target?</>}
        options={[
          {key:"a", text:"Distill to a small LLM (e.g. 1B params)."},
          {key:"b", text:"Distill to a SASRec-shaped model — teacher provides soft labels (logit distribution over next items), student trains on those soft labels. You keep LLaRA's world-knowledge signal but pay only SASRec serving cost.", correct:true},
          {key:"c", text:"Skip distillation; use prompt caching."},
          {key:"d", text:"Distill to a frozen embedding lookup table."},
        ]}
        trap={<>(a) keeps you in LLM territory — 1B is still too slow for feed at 80ms p99 with hundreds of candidates. (c) prompt caching helps but doesn't fix the per-token-generation cost. (d) loses too much expressivity.</>}
        lens={<>Cross-architecture distillation from LLM-teacher to SASRec-student is the standard pattern. The student keeps the cheap architecture (a small transformer over IDs) but learns from teacher logits that have absorbed the LLM's world knowledge. Production teams typically run this nightly: LLaRA scores offline, those soft labels train the lightweight feed-ranker.</>}
        stretch={<>If the catalog churns daily, can you still afford nightly distillation?</>}
      />

      <VIS.TrapProblem
        id="llara-p12"
        difficulty="medium"
        multiSelect
        title="P12 — Diagnostics for a stalled LLaRA training"
        scenario={<>Your LLaRA training has plateaued. Validation Hit@1 hasn't improved in 3 epochs, sitting at the text-only baseline. Which diagnostics would you run? Select all that apply.</>}
        options={[
          {key:"a", text:"Probe the LLM's attention weights on <ITEM_EMB> tokens — are they near zero?", correct:true},
          {key:"b", text:"Plot the adapter's output norm distribution vs the LLM's text-token embedding norm distribution.", correct:true},
          {key:"c", text:"Disable the ID channel and check if Hit@1 stays flat — confirms ID isn't contributing.", correct:true},
          {key:"d", text:"Just train longer."},
          {key:"e", text:"Restart training from scratch with a different seed.", correct:true},
        ]}
        trap={<>(d) is the no-op answer. The four diagnostics each test a different hypothesis: attention probe (does LLM read the ID?), norm check (is the adapter producing inputs the LLM can use?), ablation (is the ID adding anything?), seed sensitivity (was this a bad init that locked into ignoring IDs?).</>}
        lens={<>The most informative single diagnostic is the attention probe: if the LLM's attention weights on <code>&lt;ITEM_EMB&gt;</code> are near zero, the LLM has learned to ignore the ID channel — which is the classic curriculum-missing or adapter-misaligned failure. Fix the adapter init or rerun with curriculum.</>}
        stretch={<>If attention weights on <code>&lt;ITEM_EMB&gt;</code> are HIGH but Hit@1 is still flat, what does that suggest?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2312.02445" target="_blank" rel="noopener"><strong>Liao et al. — LLaRA: Large Language-Recommendation Assistant</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, SIGIR 2024)</span><br/>The original. Read sections 3 (hybrid prompt design + curriculum) and 4 (ablations). Section 4.3 has the curriculum ablation that motivates rule (1) of this visual.</li>
        <li><a href="https://arxiv.org/abs/2311.09049" target="_blank" rel="noopener"><strong>Zheng et al. — LC-Rec: Integrating Collaborative Semantics for Recommendation</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, ICDE 2024)</span><br/>The competing approach. Read for contrast — LC-Rec puts collaborative tokens IN the LLM vocab; LLaRA keeps them adjacent via an adapter.</li>
        <li><a href="https://arxiv.org/abs/1808.09781" target="_blank" rel="noopener"><strong>Kang & McAuley — Self-Attentive Sequential Recommendation (SASRec)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, ICDM 2018)</span><br/>The default upstream sequential recommender for LLaRA. Required background — if you can't explain SASRec, you can't reason about LLaRA's ID channel.</li>
        <li><a href="https://lilianweng.github.io/posts/2023-10-23-llm-eval/" target="_blank" rel="noopener"><strong>Lilian Weng — LLM-Powered Evaluation</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Useful framing for the "LLM as recommender vs LLM as judge" distinction. Helps think about evaluation choices for LLaRA-style systems.</li>
        <li><a href="https://eugeneyan.com/writing/llm-patterns/" target="_blank" rel="noopener"><strong>Eugene Yan — Patterns for Building LLM-based Systems & Products</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Practitioner survey covering adapter-based fusion patterns. Section on "RAG" applies — LLaRA is a structured variant of retrieval-augmented prompting.</li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
