  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."

  //   options={[

  //     {key:"b", text:"...", correct:true},

  //

  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,

  //

    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    //   single  → string | null
    //   multi   → Set<string>

    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)

        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }

    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// LightGCN++ — Lee et al. ACM TORS 2025
// v2 redo — 30+ trap problems spanning A-F axes. GNN recsys.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · GNN recs · 2025"
      title="LightGCN++ — Revisiting LightGCN"
      subtitle="Fix LightGCN's pooling inconsistency and embedding-norm inflexibility with three learnable knobs: scaled-norm, weighted neighbor aggregation, and tailored layer-wise pooling."
      byline={[
        {label: "Paper", value: "Lee et al., ACM TORS 2025"},
        {label: "Year", value: "2025"},
        {label: "Domain", value: "GNN-based recsys"},
      ]}/>

    <VIS.TLDR>
      <VIS.Term def="A Graph Convolutional Network for collaborative filtering that drops nonlinearity and feature transformations, keeping only neighborhood aggregation. He et al. SIGIR 2020.">LightGCN</VIS.Term>'s uniform sum/mean pooling across layers empirically inflates dominant components — the <VIS.Term def="Dense vector representation of a discrete item (word, user, product). Learned so that similar items have similar vectors.">embedding</VIS.Term> norm grows with depth and high-degree nodes dominate. LightGCN++ adds three learnable knobs: (1) scaled-norm regularization, (2) frequency-aware neighbor weighting, (3) layer-wise learned pooling scalars. Recovers 4-7% <VIS.Term def="Normalized Discounted Cumulative Gain. Ranking metric that rewards relevant items appearing near the top of the list.">NDCG</VIS.Term>@20 across standard benchmarks (Yelp, Gowalla, <VIS.Term def="Public review-fraud benchmark of Amazon product reviews; a dense, heterophilic fraud graph where fraudulent reviewers connect mostly to benign products.">Amazon</VIS.Term>-Book) — drop-in upgrade wherever LightGCN was the retriever in a <VIS.Term def="Two-stage recsys pipeline: a cheap retrieval narrows millions of items to a shortlist, then a heavier ranker reorders that shortlist.">retrieve-rank</VIS.Term> stack. Source: <a href="https://dl.acm.org/doi/10.1145/3760763" target="_blank" rel="noopener">ACM TORS 2025</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        LightGCN++ keeps LightGCN's <strong>core architectural simplification</strong> (no nonlinearity, no feature transformation, just neighborhood propagation in the <VIS.Term def="Family of models that learn node/edge embeddings by iteratively aggregating from neighbors.">GNN</VIS.Term> style) but fixes three empirical pathologies the original ignored: (a) <VIS.Term def="Dense vector representation of a discrete item (word, user, product). Learned so that similar items have similar vectors.">embeddings</VIS.Term> grow unboundedly with layer depth, (b) every neighbor contributes equally regardless of frequency, (c) uniform sum/mean pooling across <VIS.Term def="Graph distance in edges: hop-1 = direct neighbors, hop-2 = neighbors of neighbors.">hop</VIS.Term>-indexed layers concentrates information in dominant components. The fix sits inside the <VIS.Term def="Layerwise neighborhood averaging with learned weights; transductive (needs full graph at train time).">GCN</VIS.Term> family — not a graph-<VIS.Term def="Sequence model built from stacked self-attention + feed-forward blocks. Order-agnostic without positional encodings; the default architecture for sequences.">transformer</VIS.Term> swap.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  E0["Layer-0 embed"] --> A1["Aggregate (weighted)"]
  A1 --> E1["Layer-1 embed"]
  E1 --> A2["Aggregate (weighted)"]
  A2 --> E2["Layer-2 embed"]
  E2 --> A3["Aggregate (weighted)"]
  A3 --> E3["Layer-3 embed"]
  E0 --> P["Layer-wise<br/>learned pooling"]
  E1 --> P
  E2 --> P
  E3 --> P
  P --> Out["Final embed<br/>(scaled-norm)"]
  style P fill:#dbeafe,stroke:#1e40af
  style Out fill:#dcfce7,stroke:#16a34a
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — How it differs from LightGCN / SimGCL / SGL">
      <p>
        <strong>LightGCN.</strong> Uniform mean over k-<VIS.Term def="Graph distance in edges: hop-1 = direct neighbors, hop-2 = neighbors of neighbors.">hop</VIS.Term> neighborhoods; mean-pool layer outputs across the bipartite user-item graph. Simple — too simple — and a step back from <VIS.Term def="Layerwise neighborhood averaging with learned weights; transductive (needs full graph at train time).">GCN</VIS.Term>-style learnable weights.
      </p>
      <p>
        <strong>SimGCL.</strong> Adds <VIS.Term def="Loss that pulls positive pairs together and pushes negatives apart in embedding space (e.g. InfoNCE).">contrastive</VIS.Term> noise (uniform random in <VIS.Term def="Dense vector representation of a discrete item (word, user, product). Learned so that similar items have similar vectors.">embedding</VIS.Term> space) to LightGCN. Targets <VIS.Term def="Recommenders over-recommend already-popular items because they have more training signal, starving the long tail.">popularity bias</VIS.Term>, not pooling. Stacks with LightGCN++.
      </p>
      <p>
        <strong>SGL (self-supervised GCL).</strong> Generates two augmented views (node/edge dropout) and <VIS.Term def="Loss that pulls positive pairs together and pushes negatives apart in embedding space (e.g. InfoNCE).">contrastive</VIS.Term> loss. Different lever from LightGCN++ — operates on views, not on aggregation weights.
      </p>
      <p>
        <strong>LightGCN++.</strong> Same architectural skeleton as LightGCN, but with three learnable scalars per layer + frequency-aware aggregation + norm scaling — closer in spirit to a tweaked <VIS.Term def="Layerwise neighborhood averaging with learned weights; transductive (needs full graph at train time).">GCN</VIS.Term> than to a graph transformer.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick it">
      <p>
        Drop-in upgrade for any production stack where LightGCN is the <VIS.Term def="Retrieval via dot-product (or cosine) between learned dense embeddings of queries and items; usually served by an ANN index.">dense retrieval</VIS.Term> backbone in a <VIS.Term def="Two-stage recsys pipeline: a cheap retrieval narrows millions of items to a shortlist, then a heavier ranker reorders that shortlist.">retrieve-rank</VIS.Term> pipeline. Free 4-7% <VIS.Term def="Normalized Discounted Cumulative Gain. Ranking metric that rewards relevant items appearing near the top of the list.">NDCG</VIS.Term>@20 at near-zero engineering cost (the three new hyperparameters add ~10 lines of code). Avoid only when (i) you can't afford the slight hyperparameter-tuning increase, (ii) your dataset is too small (knob tuning needs ~100k+ users to stabilize), (iii) you're already on a graph-<VIS.Term def="Sequence model built from stacked self-attention + feed-forward blocks. Order-agnostic without positional encodings; the default architecture for sequences.">transformer</VIS.Term> that subsumes these tricks (GraphFormers); rolling out via <VIS.Term def="Run a new model alongside production; record its predictions but ignore them at serving. First migration phase.">shadow scoring</VIS.Term> first is the standard pattern.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations & gotchas">
      <p>
        The original "simplicity" claim of LightGCN is weakened. Three new hyperparameters, each with a 2-3× range, means an ablation table that's easy to mis-report. The frequency-aware weighting accentuates popular items — explicit re-balancing or <VIS.Term def="Recommenders over-recommend already-popular items because they have more training signal, starving the long tail.">popularity bias</VIS.Term> correction may be needed. The fix lives upstream of any <VIS.Term def="Final-stage recsys: take the candidate set and apply a heavier scorer / diversification logic to produce the user-facing list.">reranking</VIS.Term> step.
      </p>
      <VIS.Callout kind="gotcha" title="Popularity inflation">
        The frequency-aware neighbor weighting was designed to fix LightGCN's mean-pool over-smoothing — but it also inflates high-degree items' contribution. <VIS.Term def="Normalized Discounted Cumulative Gain. Ranking metric that rewards relevant items appearing near the top of the list.">NDCG</VIS.Term>@20 on top-of-funnel goes up, but long-tail recall drops. Re-balance with a <VIS.Term def="Recommenders over-recommend already-popular items because they have more training signal, starving the long tail.">popularity bias</VIS.Term>-debiasing term or accept the head-of-distribution bias.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        30+ problems spanning the 6-axis taxonomy. Each must pass redaction: substitute "LightGCN++" with "Method X" — if generic <VIS.Term def="Family of models that learn node/edge embeddings by iteratively aggregating from neighbors.">GNN</VIS.Term> knowledge suffices, it's concept-as-costume.
      </p>

      {/* ============== A. Identity & comparison ============== */}
      <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Identity & comparison</h3>

      <VIS.TrapProblem
        id="lgpp-a1"
        difficulty="hard"
        title="A1 — LightGCN vs LightGCN++"
        scenario={<>Pick the three architectural deltas LightGCN++ adds to LightGCN.</>}
        multiSelect
        options={[
          {key:"a", text:"Frequency-aware neighbor weighting (replaces uniform 1/sqrt(d_i*d_j) normalization).", correct:true},
          {key:"b", text:"Layer-wise learned pooling scalars (replaces uniform mean across layers).", correct:true},
          {key:"c", text:"Scaled-norm regularization on final embedding (replaces unbounded growth with depth).", correct:true},

        trap={<>(d) inverts the design philosophy — LightGCN++ preserves the no-MLP simplicity. (e) is a different paper.</>}

      <VIS.TrapProblem

        options={[
          {key:"a", text:"No. SimGCL targets *popularity bias* via contrastive uniform-noise augmentation. LightGCN++ targets *pooling consistency* and *embedding-norm inflexibility*. They attack different pathologies; they can be stacked.", correct:true},
          {key:"b", text:"Yes, LightGCN++ replaces SimGCL."},
          {key:"c", text:"SimGCL replaces LightGCN++."},

        trap={<>(b)/(c)/(d) miss the separable-mechanism point.</>}
        lens={<>Different levers on the same skeleton. Stacking gives compound improvements.</>}

      <VIS.TrapProblem
        id="lgpp-a3"
        difficulty="medium"
        title="A3 — LightGCN++ vs graph-transformer (GraphFormers)"
        scenario={<>Graph-transformers (GraphFormers, NodeFormer) handle messages via attention. Does LightGCN++ compete with them?</>}
        options={[
          {key:"a", text:"Different scale regimes. Graph-transformers are expensive (attention is quadratic in neighborhood); LightGCN++ stays linear and is the choice when you need to serve graphs with 100M+ users and tight latency budgets. Graph-transformers win on small-to-medium graphs where attention is affordable.", correct:true},
          {key:"b", text:"They are competitive at all scales."},
          {key:"c", text:"LightGCN++ replaces graph-transformers."},
          {key:"d", text:"Graph-transformers always win."},
        ]}
        trap={<>(b)/(c)/(d) miss the scale-regime distinction.</>}
        lens={<>The choice is regime-specific. LightGCN++'s value proposition is "linear, fast, drop-in" — not "best on small graphs."</>}

      <VIS.TrapProblem
        id="lgpp-a4"

        options={[

          {key:"b", text:"Yes, it adds back nonlinearity."},
          {key:"c", text:"Yes, it adds feature transformation."},
          {key:"d", text:"Yes to both."},

        trap={<>(b)/(c)/(d) mistake the design philosophy.</>}

      {/* ============== B. Application ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>B. Application</h3>

      <VIS.TrapProblem
        id="lgpp-b1"

        title="B1 — Production LightGCN: when to upgrade"

        options={[
          {key:"a", text:"LightGCN++ — 4-7% NDCG@20 with ~10 lines of code and one tuning sprint. Graph transformers cost orders more for similar lift on production-scale graphs. Feature store helps elsewhere but doesn't address retrieval quality directly.", correct:true},

          {key:"d", text:"Rewrite in Rust."},

        trap={<>(b) over-engineers. (c) leaves lift on the table. (d) is a joke.</>}
        lens={<>The LightGCN → LightGCN++ migration is the highest-ROI move in GNN recsys for 2025. Easy to implement, immediate gain, no architectural shift.</>}
        stretch={<>What's the rollback if the knob-tuning sprint reveals the lift is dataset-specific?</>}
      />

      <VIS.TrapProblem
        id="lgpp-b2"
        difficulty="hard"
        title="B2 — 'LightGCN++ is too complex'"
        scenario={<>A junior eng says "LightGCN was attractive because it was minimal — LightGCN++ ruins that." Why is the junior partly right and partly wrong?</>}
        options={[
          {key:"a", text:"Partly right — three new hyperparameters add tuning effort. Partly wrong — the *architectural* simplicity (no nonlinearity, no feature transformation) is preserved; the new knobs are learnable scalars, not new layers. Code complexity increases by ~10 lines; conceptual complexity by one notion ('per-layer pooling weight').", correct:true},

          {key:"c", text:"Junior is fully right."},
          {key:"d", text:"Complexity is irrelevant."},

        trap={<>(b)/(c) accept binary framing. (d) handwaves.</>}

      <VIS.TrapProblem
        id="lgpp-b3"

        scenario={<>One-sentence pitch that requires knowing the *pooling-inconsistency* fix — fails redaction.</>}
        options={[
          {key:"a", text:"'LightGCN uniformly pools its k-layer embeddings — empirically this inflates dominant components and caps NDCG. LightGCN++ adds three learnable scalars (per-layer pooling weights, neighbor weighting, norm scaling) that fix the pooling pathology specifically — 4-7% lift on standard benchmarks with no architectural change.'", correct:true},
          {key:"b", text:"'Better GNN.'"},
          {key:"c", text:"'Drop-in upgrade.'"},
          {key:"d", text:"'Free NDCG.'"},

        trap={<>(b)/(c)/(d) all survive redaction.</>}
        lens={<>The pitch must hinge on pooling-inconsistency as the diagnosis. Drop that and the argument is "another GNN tweak."</>}

      <VIS.TrapProblem
        id="lgpp-b4"
        difficulty="hard"
        title="B4 — When NOT to use LightGCN++"
        scenario={<>Pick all scenarios where LightGCN++ is the wrong choice.</>}
        multiSelect
        options={[
          {key:"a", text:"Dataset < 50k users (knob tuning is too noisy).", correct:true},
          {key:"b", text:"Production already on a graph transformer (which subsumes these fixes).", correct:true},
          {key:"c", text:"Production where you can't afford a 1-sprint tuning cycle for three knobs.", correct:true},
          {key:"d", text:"Production on LightGCN with stable hyperparameters."},
          {key:"e", text:"GNN-based recs at any scale."},
        ]}
        trap={<>(d)/(e) are the sweet spot.</>}

      <VIS.TrapProblem
        id="lgpp-b5"
        difficulty="medium"
        title="B5 — Cold-start: does LightGCN++ help?"
        scenario={<>For brand-new users with zero interactions, does LightGCN++ change cold-start behavior vs LightGCN?</>}
        options={[
          {key:"a", text:"No — cold-start users have empty neighborhoods regardless of aggregation strategy. The three knobs (norm, weighting, pooling) operate on existing edges; no edges → nothing to scale, weight, or pool. Cold-start is upstream of all three.", correct:true},

          {key:"c", text:"It makes cold-start worse."},

        lens={<>LightGCN++ is a propagation-side fix. Cold-start needs content-side signal (item content tower, fallback to popularity). Not addressed by either LightGCN or LightGCN++.</>}

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>C. Mechanism</h3>

      <VIS.TrapProblem
        id="lgpp-c1"
        difficulty="hard"
        title="C1 — Why per-layer pooling weights?"
        scenario={<>LightGCN++'s key change is replacing uniform mean-pool across layers with learned per-layer scalars α₀, α₁, ..., αₖ. Why does this help?</>}
        options={[

          {key:"b", text:"Uniform mean is mathematically wrong."},
          {key:"c", text:"Learned scalars are required by Shannon's theorem."},
          {key:"d", text:"Mean-pool doesn't converge."},
        ]}
        trap={<>(b)/(c)/(d) miss the depth-vs-personalization argument.</>}
        lens={<>The shallow-vs-deep tradeoff is the load-bearing fact. Shallow = personalized, sharp; deep = smoothed, global. Uniform pool throws away the choice.</>}
        stretch={<>What if your task needs more smoothing (e.g. cold-start)? Would α schedule differ?</>}
      />

      <VIS.TrapProblem
        id="lgpp-c2"
        difficulty="hard"
        title="C2 — Frequency-aware neighbor weighting: what changes?"
        scenario={<>LightGCN normalizes by 1/sqrt(d_i × d_j). LightGCN++ replaces this with what, and why?</>}
        options={[
          {key:"a", text:"A frequency-aware weighting that down-weights popular nodes' contribution to neighbors (and vice versa) — empirically, LightGCN over-smooths popular items because they appear in every user's neighborhood, dominating the aggregate. The frequency-aware weighting decouples 'this user has many interactions' from 'this item should dominate every user's embedding.'", correct:true},
          {key:"b", text:"Removes normalization entirely."},
          {key:"c", text:"Uses uniform 1/d."},
          {key:"d", text:"Uses raw counts."},
        ]}
        trap={<>(b)/(c)/(d) misread.</>}
        lens={<>The popularity-pollution-of-neighborhoods is the LightGCN pathology being fixed. The new weighting still normalizes, just with a popularity-tilted prior.</>}
        stretch={<>What's the side-effect on long-tail items? Up-weight or down-weight?</>}
      />

      <VIS.TrapProblem
        id="lgpp-c3"
        difficulty="hard"
        title="C3 — Scaled-norm regularization"
        scenario={<>Why does LightGCN++ regularize the embedding norm with a learned scale?</>}
        options={[
          {key:"a", text:"LightGCN's embeddings grow unboundedly with layer depth (each propagation step adds a 1/sqrt(d) re-scaled neighbor mean, which doesn't strictly shrink). Norm growth makes the final scores increasingly sensitive to high-degree nodes. Scaled-norm constrains the growth, giving the model explicit control over score-scale.", correct:true},
          {key:"b", text:"Embeddings must be unit-norm by physics."},
          {key:"c", text:"Scaled-norm prevents overfitting."},
          {key:"d", text:"It's required for backprop."},
        ]}
        trap={<>(b)/(c)/(d) miss the depth-norm-growth argument.</>}
        lens={<>Embedding norm = score sensitivity to degree. The paper measures the growth empirically and proposes the scalar fix.</>}
        stretch={<>What goes wrong if you simply L2-normalize after each layer?</>}
      />

      <VIS.TrapProblem
        id="lgpp-c4"
        difficulty="hard"
        title="C4 — Hyperparameter sensitivity"
        scenario={<>Rank by "production-breaking if mis-set": (a) layer count K, (b) per-layer pooling weights α, (c) norm-scale s, (d) neighbor-weight β.</>}
        mode="ordered"
        options={[
          {key:"a", text:"Layer count K (too few → undertrained; too many → over-smoothing; LightGCN++ doesn't fix this; affects every downstream metric).", order:1},
          {key:"b", text:"Per-layer pooling weights α (specific to LightGCN++; wrong values undo the paper's gain).", order:2},
          {key:"c", text:"Norm scale s (specific to LightGCN++; affects score magnitude and ranking).", order:3},
          {key:"d", text:"Neighbor weight β (more robust; small range of valid values)."},
        ]}
        trap={<>Candidates rank the LightGCN++-specific knobs at top, but K dominates as in any GNN — it gates the whole stack.</>}
        lens={<>K is the gating hyperparameter; LightGCN++'s knobs are second-order. Tune K first; then α, s, β.</>}
        stretch={<>What's the right K for LightGCN++? Same as LightGCN?</>}
      />

      <VIS.TrapProblem
        id="lgpp-c5"
        difficulty="hard"
        title="C5 — Data assumptions"
        scenario={<>Which assumption(s) does LightGCN++ rely on?</>}
        multiSelect
        options={[
          {key:"a", text:"User-item bipartite graph structure (otherwise the propagation doesn't apply).", correct:true},
          {key:"b", text:"Sufficient interaction density for knobs to stabilize (~50k+ users).", correct:true},
          {key:"c", text:"Implicit feedback (clicks, watches); explicit ratings need a different head.", correct:true},
          {key:"d", text:"Item content features available."},
          {key:"e", text:"Time-decay on interactions."},
        ]}
        trap={<>(d)/(e) are unnecessary — LightGCN(++) is content-free.</>}
        lens={<>The bipartite-graph + implicit-feedback assumption is the LightGCN family's defining shape. Content is a bonus (often added via initialization).</>}
        stretch={<>How would you incorporate content features into LightGCN++?</>}
      />

      <VIS.TrapProblem
        id="lgpp-c6"
        difficulty="hard"
        title="C6 — Architectural choice: why scalar knobs, not vector?"
        scenario={<>Why are LightGCN++'s knobs scalars per layer, not vectors per dimension?</>}
        options={[
          {key:"a", text:"Scalars preserve LightGCN's permutation-invariant simplicity and add 3K parameters (where K = layers); vectors per dimension would add 3K×d parameters and reintroduce a transformation matrix — closer to GCN/NGCF, defeating the purpose. Scalars are the minimal extension.", correct:true},
          {key:"b", text:"Vectors don't work mathematically."},
          {key:"c", text:"Scalars are faster."},
          {key:"d", text:"Pytorch only supports scalars."},
        ]}
        trap={<>(b)/(c)/(d) miss the minimal-extension argument.</>}
        lens={<>Design philosophy: smallest change that achieves the goal. Scalars; not vectors; not matrices.</>}
        stretch={<>What lift would vectors give? Worth the cost?</>}
      />

      {/* ============== D. Intuition traps ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>D. Intuition traps</h3>

      <VIS.TrapProblem
        id="lgpp-d1"
        difficulty="hard"
        title="D1 — 'LightGCN is too simple, add MLPs'"
        scenario={<>Junior says "LightGCN is too simple, just add a 2-layer MLP between layers." Why does LightGCN++ explicitly *not* do this?</>}
        options={[
          {key:"a", text:"He et al. 2020's LightGCN ablation showed MLPs *hurt* the GCN-for-recs setting — they introduce label-noise overfitting and don't add the structural inductive bias propagation already provides. LightGCN++ honors this empirical finding; the issue isn't 'too simple,' it's 'wrong knobs.'", correct:true},
          {key:"b", text:"MLPs are slow."},
          {key:"c", text:"MLPs are deprecated."},
          {key:"d", text:"Junior is right."},
        ]}
        trap={<>(b)/(c)/(d) miss the empirical-finding argument.</>}
        lens={<>The "MLPs hurt" finding is paper-cited. LightGCN++ preserves the no-MLP design because the original ablation was correct.</>}
        stretch={<>When would MLPs help GCNs? Different task?</>}
      />

      <VIS.TrapProblem
        id="lgpp-d2"
        difficulty="hard"
        title="D2 — 'Per-layer pooling weights is just attention'"
        scenario={<>A teammate calls per-layer pooling "just attention over layers." Why is this incorrect?</>}
        options={[
          {key:"a", text:"Attention is *content-dependent* — weights vary by input. LightGCN++'s per-layer weights α are *learned scalars*, shared across all examples — they're more like learnable hyperparameters than attention. The label is misleading because attention would add k×d parameters per layer.", correct:true},
          {key:"b", text:"It is exactly attention."},
          {key:"c", text:"Attention is unrelated to pooling."},
          {key:"d", text:"Per-layer pooling is non-differentiable."},
        ]}
        trap={<>(b) accepts the imprecision. (c)/(d) misread.</>}
        lens={<>Content-dependent vs content-independent is the distinction. LightGCN++ is the latter; attention is the former. Confusing them under-states LightGCN++'s simplicity.</>}
        stretch={<>What if you DID make per-layer weights content-dependent? Would the lift increase?</>}
      />

      <VIS.TrapProblem
        id="lgpp-d3"
        difficulty="hard"
        title="D3 — Wrong-assumption cascade"
        scenario={<>Lead assumes "LightGCN's uniform pooling is theoretically optimal because of symmetry." Downstream wrong consequences?</>}
        multiSelect
        options={[
          {key:"a", text:"Will miss the empirical finding that shallower layers carry more personalization signal than deeper ones.", correct:true},
          {key:"b", text:"Will skip LightGCN++ migration as 'theoretically equivalent.'", correct:true},
          {key:"c", text:"Will explain regressions as 'data drift' instead of pooling pathology.", correct:true},
          {key:"d", text:"Will correctly read the LightGCN++ paper."},
          {key:"e", text:"Will ship LightGCN++ on day 1."},
        ]}
        trap={<>(d)/(e) invert.</>}
        lens={<>The "theoretical optimality of uniform pooling" is a common misreading. The LightGCN paper presents uniform pool as an empirical default; LightGCN++ shows it's empirically suboptimal.</>}
        stretch={<>What's the cheap experiment to convince the lead?</>}
      />

      <VIS.TrapProblem
        id="lgpp-d4"
        difficulty="hard"
        title="D4 — Cause looks like A, actually B"
        scenario={<>After LightGCN++ rollout, NDCG@20 is up 5% but long-tail recall drops 8%. Team blames the per-layer pooling. Real cause is...</>}
        options={[
          {key:"a", text:"The frequency-aware neighbor weighting (not the pooling weights) was tuned for head-of-distribution items and incidentally inflated popular-item contribution — long-tail items now see neighborhoods dominated by popular items. Fix the weighting's frequency exponent or add a popularity-debiasing term; don't touch the pooling.", correct:true},
          {key:"b", text:"Per-layer pooling broke long-tail."},
          {key:"c", text:"K is too small."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(b) misattributes. (c)/(d) miss the popularity argument.</>}
        lens={<>The frequency weighting is the popularity-inflating knob. Symptom-to-cause must distinguish which of the three knobs is responsible.</>}
        stretch={<>How would you instrument which of the three knobs is causing what?</>}
      />

      <VIS.TrapProblem
        id="lgpp-d5"
        difficulty="medium"
        title="D5 — 'LightGCN++ is a marginal paper'"
        scenario={<>Skeptic: "4-7% NDCG on academic benchmarks is too small to bother." Why does the paper still matter for production?</>}
        options={[
          {key:"a", text:"Production retrievers serve trillions of impressions; 4-7% NDCG on top-of-funnel translates to materially better candidates for downstream rankers. The migration is ~10 lines of code. The cost-benefit is unique: tiny effort, large fleetwide impact.", correct:true},
          {key:"b", text:"4-7% is huge in academia."},
          {key:"c", text:"Production doesn't care about NDCG."},
          {key:"d", text:"Skeptic is right."},
        ]}
        trap={<>(b)/(c)/(d) miss the cost-benefit framing.</>}
        lens={<>Margin × scale × low-cost = high-ROI production move. LightGCN++ is the canonical example.</>}
        stretch={<>What's the expected revenue lift from 5% retrieval NDCG?</>}
      />

      {/* ============== E. Operations ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>E. Operations</h3>

      <VIS.TrapProblem
        id="lgpp-e1"
        difficulty="hard"
        title="E1 — Knob-tuning order"
        scenario={<>You're tuning LightGCN++'s three new knobs. What's the right order?</>}
        options={[
          {key:"a", text:"Fix K from prior LightGCN tuning. Tune α (per-layer pooling) first — biggest individual lift. Then β (neighbor weighting) — interacts with α. Then s (norm scale) — robust, smallest range. The order minimizes joint search space.", correct:true},
          {key:"b", text:"Tune all three simultaneously."},
          {key:"c", text:"Tune randomly."},
          {key:"d", text:"Use default values."},
        ]}
        trap={<>(b) explodes search space. (c)/(d) leave gain on table.</>}
        lens={<>Sequential tuning by individual-lift order is the paper's recommendation. Joint tuning would need 3D grid search; sequential is 3 × 1D.</>}
        stretch={<>What if α and β interact strongly? Iterate?</>}
      />

      <VIS.TrapProblem
        id="lgpp-e2"
        difficulty="hard"
        title="E2 — Friday 3am: NDCG flat after LightGCN++ rollout"
        scenario={<>You shipped LightGCN++ Thursday. Friday's NDCG is flat (no lift). Code is correct. Diagnose.</>}
        options={[
          {key:"a", text:"Knobs initialized to LightGCN-equivalent values (α uniform, β = 1, s = 1). The code is correct, the knobs haven't been *tuned*. The lift comes from tuning, not from the architectural change alone. Run the tuning sweep — the paper's gain is conditional on tuned knobs.", correct:true},
          {key:"b", text:"LightGCN++ is broken."},
          {key:"c", text:"GPU corruption."},
          {key:"d", text:"Hyperparameter drift."},
        ]}
        trap={<>(b) over-attributes; (c)/(d) generic.</>}
        lens={<>The default-knob trap. Many teams "ship LightGCN++" and forget that the lift is in the tuning, not the model.</>}
        stretch={<>What's the right rollout: ship-then-tune, or tune-then-ship?</>}
      />

      <VIS.TrapProblem
        id="lgpp-e3"
        difficulty="hard"
        title="E3 — Default that bites: layer count K"
        scenario={<>You inherit LightGCN configured with K=3. LightGCN++'s paper uses K=4. What might happen if you don't re-tune K?</>}
        options={[
          {key:"a", text:"The per-layer pooling weights α are most beneficial at K=3-4 (the depth where shallow-vs-deep tradeoff matters most). At K=2 there's not enough depth-variance for α to help. The paper's gain is conditional on K being in the sweet spot.", correct:true},
          {key:"b", text:"K doesn't matter."},
          {key:"c", text:"K=3 always works."},
          {key:"d", text:"Larger K is always better."},
        ]}
        trap={<>(b)/(c)/(d) miss the K-α interaction.</>}
        lens={<>K and α interact. Re-tune K when adopting LightGCN++; don't inherit blindly.</>}
        stretch={<>Would α tune away the K mismatch? Or are they orthogonal?</>}
      />

      <VIS.TrapProblem
        id="lgpp-e4"
        difficulty="hard"
        mode="ordered"
        title="E4 — Order the LightGCN→LightGCN++ migration phases"
        scenario={<>Phases: (a) implement +3 knobs (10 lines), (b) ablate each knob in offline eval, (c) joint tune α, β, s, (d) shadow-score in prod, ramp 1%→10%→100%, (e) ship to 100% without ablation. Non-essential get no order.</>}
        options={[
          {key:"a", text:"Implement +3 knobs (10 LOC) with LightGCN-equivalent defaults.", order:1},
          {key:"b", text:"Ablate each knob in offline eval (verify each contributes).", order:2},
          {key:"c", text:"Joint-tune α, β, s on validation set.", order:3},
          {key:"d", text:"Shadow-score in prod, ramp 1%→10%→100%.", order:4},
          {key:"e", text:"Ship to 100% without ablation."},
        ]}
        trap={<>(e) is the catastrophic shortcut.</>}
        lens={<>Ablation is what proves the lift is real and not eval-noise. Skipping it is how teams ship "LightGCN++" with no gain and blame the paper.</>}
        stretch={<>What's the right rollback if shadow scoring shows regression?</>}
      />

      <VIS.TrapProblem
        id="lgpp-e5"
        difficulty="hard"
        title="E5 — Reproducibility"
        scenario={<>You can't reproduce Lee 2025's 4-7% NDCG@20 on Amazon-Book. Everything matches. What likely differs?</>}
        options={[
          {key:"a", text:"Data-split / leak-protection — the paper uses time-aware leave-one-out (last interaction held out, future leakage prevented). If your reproduction uses random-split, scores will differ by 2-5% even with identical code. Reproducibility in recsys is dominated by data-split methodology, not code.", correct:true},
          {key:"b", text:"Code is wrong."},
          {key:"c", text:"GPU difference."},
          {key:"d", text:"Random seed."},
        ]}
        trap={<>(b)/(c)/(d) miss the data-split argument.</>}
        lens={<>Recsys reproducibility is data-split-dependent. Always match the paper's split methodology, not just code.</>}
        stretch={<>How would you write a recsys reproducibility checklist?</>}
      />

      {/* ============== F. Failure modes ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      <VIS.TrapProblem
        id="lgpp-f1"
        difficulty="hard"
        title="F1 — Adversarial: graph injection"
        scenario={<>Attacker injects fake users with millions of interactions. How does LightGCN++ fare vs LightGCN?</>}
        options={[
          {key:"a", text:"Comparably vulnerable. The frequency-aware weighting *helps slightly* (down-weights ultra-high-degree fake users) but doesn't structurally defend. Both methods need an upstream anti-spam layer; neither is robust to graph injection by design.", correct:true},
          {key:"b", text:"LightGCN++ is fully robust."},
          {key:"c", text:"LightGCN is more robust."},
          {key:"d", text:"Neither is affected."},
        ]}
        trap={<>(b)/(c)/(d) overclaim or underclaim.</>}
        lens={<>Anti-spam is upstream of propagation. LightGCN++'s knob helps marginally; it's not a defense.</>}
        stretch={<>What's the right defense layer? Heuristics? GNN-based?</>}
      />

      <VIS.TrapProblem
        id="lgpp-f2"
        difficulty="hard"
        title="F2 — Symptom → architectural cause"
        scenario={<>Production NDCG drops on items with degree > 100k. Cause?</>}
        options={[
          {key:"a", text:"The frequency-aware weighting's exponent β was set too high; ultra-high-degree items are down-weighted aggressively, leaving them under-represented in user neighborhoods. Lower β; or use a piecewise weighting (less aggressive in the tail).", correct:true},
          {key:"b", text:"Items have noisy embeddings."},
          {key:"c", text:"Random."},
          {key:"d", text:"GPU error."},
        ]}
        trap={<>(b)/(c)/(d) miss the knob argument.</>}
        lens={<>Knob-symptom mapping. The frequency exponent is exactly the knob that affects high-degree contribution.</>}
        stretch={<>What's the right per-decile diagnostic to show this?</>}
      />

      <VIS.TrapProblem
        id="lgpp-f3"
        difficulty="hard"
        title="F3 — Paper-admitted failures"
        scenario={<>Which limitations does Lee 2025 *explicitly admit*?</>}
        multiSelect
        options={[
          {key:"a", text:"Extra hyperparameters — the original LightGCN simplicity claim is weakened.", correct:true},
          {key:"b", text:"Knob tuning requires sufficient validation data (~50k+ users).", correct:true},
          {key:"c", text:"Frequency-aware weighting can inflate popular-item bias if not re-balanced.", correct:true},
          {key:"d", text:"Method only works on bipartite graphs."},
          {key:"e", text:"Method requires GPUs."},
        ]}
        trap={<>(d) is actually a *given* of the family. (e) is false.</>}
        lens={<>The paper is honest. Senior signal: read the limitations.</>}
        stretch={<>Which limitation is hardest to engineer around?</>}
      />

      <VIS.TrapProblem
        id="lgpp-f4"
        difficulty="hard"
        title="F4 — Community critique: 'just three more hyperparams'"
        scenario={<>A 2026 follow-up argues "LightGCN++ adds three hyperparameters to fix something a single learnable normalization layer could have fixed." Strongest form of the critique?</>}
        options={[
          {key:"a", text:"The three knobs implicitly parametrize a single underlying transformation (the pooling-aware aggregation). A unified parameterization (e.g. a learnable LayerNorm-style operator) might subsume all three with fewer hyperparameters and a cleaner story. The critique is that the paper trades simplicity for fragmentation.", correct:true},
          {key:"b", text:"LightGCN++ doesn't work."},
          {key:"c", text:"GCNs are obsolete."},
          {key:"d", text:"Three knobs is too many."},
        ]}
        trap={<>(b)/(c)/(d) are over-broad.</>}
        lens={<>The critique has merit: the three knobs are not orthogonal in spirit. Future work may unify.</>}
        stretch={<>Sketch the unified parameterization. What would it lose?</>}
      />

      <VIS.TrapProblem
        id="lgpp-f5"
        difficulty="hard"
        title="F5 — Edge case: graph with isolated components"
        scenario={<>Your graph has many isolated subgraphs (segments of users who never interact across segments). LightGCN++ behavior?</>}
        options={[
          {key:"a", text:"Within each component, propagation works normally. Across components, no signal flows (by definition). LightGCN++ doesn't change this — neither knob bridges components. Fix is upstream: graph stitching (e.g. via shared categorical attributes) or training multiple LightGCN++ models per component.", correct:true},
          {key:"b", text:"LightGCN++ stitches components."},
          {key:"c", text:"It crashes."},
          {key:"d", text:"It works fine."},
        ]}
        trap={<>(b) is wishful. (c)/(d) miss the structural limit.</>}
        lens={<>Propagation can't cross disconnected components. Topology is upstream of any aggregation scheme.</>}
        stretch={<>What's the cheapest stitching heuristic that preserves LightGCN++ semantics?</>}
      />

      <VIS.TrapProblem
        id="lgpp-f6"
        difficulty="hard"
        title="F6 — Symptom: knob α inverts in sign during training"
        scenario={<>Per-layer pooling weight α₂ (for layer 2) ends up negative after training. What does this mean?</>}
        options={[
          {key:"a", text:"Layer 2's embeddings carry signal that, when subtracted from shallower layers, improves NDCG — this is a known phenomenon in over-smoothed GNNs: deeper layers concentrate global signal that washes out personalization. Negative α₂ removes the over-smoothing contribution. It's not a bug; it's the knob doing exactly what it was designed to do.", correct:true},
          {key:"b", text:"Negative α is a bug."},
          {key:"c", text:"α must be positive by physics."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(b)/(c)/(d) misread the result.</>}
        lens={<>Learnable scalars can take any real value. The paper specifically allows negative values for this case.</>}
        stretch={<>Should you clip α to be non-negative? When?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://dl.acm.org/doi/10.1145/3760763" target="_blank" rel="noopener"><strong>Lee et al. — Revisiting LightGCN</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(ACM TORS 2025)</span>
          <br/>The LightGCN++ paper. Read §3 (pathology diagnosis), §4 (three fixes), §6 (ablations on Yelp, Gowalla, <VIS.Term def="Public review-fraud benchmark of Amazon product reviews; a dense, heterophilic fraud graph where fraudulent reviewers connect mostly to benign products.">Amazon</VIS.Term>-Book).
        </li>
        <li>
          <a href="https://arxiv.org/abs/2002.02126" target="_blank" rel="noopener"><strong>He et al. — LightGCN</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(SIGIR 2020)</span>
          <br/>The original. Read alongside to understand what's being fixed.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2010.10783" target="_blank" rel="noopener"><strong>Wu et al. — SGL (Self-supervised GCL)</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(SIGIR 2021)</span>
          <br/>Sibling improvement focused on <VIS.Term def="Loss that pulls positive pairs together and pushes negatives apart in embedding space (e.g. InfoNCE).">contrastive</VIS.Term> augmentation, not pooling.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2112.08679" target="_blank" rel="noopener"><strong>Yu et al. — SimGCL</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(SIGIR 2022)</span>
          <br/><VIS.Term def="Recommenders over-recommend already-popular items because they have more training signal, starving the long tail.">Popularity bias</VIS.Term> debiasing GCL — stacks with LightGCN++.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
