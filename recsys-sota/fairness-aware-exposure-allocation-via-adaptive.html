        ]}
        trap={<>(b), (c), (d) misdiagnose the expected dynamic.</>}
        lens={<>Every fairness fix produces winners and losers. The losers ALWAYS complain. Plan the comms, not just the code.</>}
        stretch={<>What's the right rollout ramp to give majority-group sellers time to adapt?</>}
      />

      <VIS.TrapProblem
        id="fa-e3"
        difficulty="hard"
        title="E3 — Implementation specific: LP solver choice"
        scenario={<>You implement the constrained LP. Pick the right solver for K=10 slates at 100k QPS. <em>Discriminating insight: K=10 means 10 binary variables — small enough for closed-form OR a hand-rolled greedy; commercial LP solvers are overkill.</em></>}
        options={[
          {key:"a", text:"For K=10 with 3-5 group constraints, the LP has 10 binary variables and a few constraints — solve via a greedy approximation (det-greedy with adaptive floor) or even a closed-form for small group counts. Commercial LP solvers (Gurobi, CBC) add latency and licensing overhead with no quality gain at this size. Save the solvers for K larger than 50 with complex slate-interaction constraints.", correct:true},
          {key:"b", text:"Always use Gurobi."},
          {key:"c", text:"Use scipy.linprog."},
          {key:"d", text:"No solver needed; ranking is the answer."},
        ]}
        trap={<>(b), (c) over-engineer. (d) misses the constraint.</>}
        lens={<>Small-K LP has closed-form approximations; pay for solvers only when K and constraints justify it.</>}
        stretch={<>At what K does it become worth licensing a commercial solver?</>}
      />

      <VIS.TrapProblem
        id="fa-e4"
        difficulty="hard"
        mode="ordered"
        title="E4 — Adaptive reranker rollout order"
        scenario={<>Phases: (a) train demand model + audit, (b) build & validate floor function f, (c) shadow rerank (log only), (d) mirror serve (both ranker and reranker score; ranker serves; track delta), (e) traffic ramp, (f) full deploy. Order. <em>Discriminating insight: the demand model and floor function must be validated BEFORE any shadow rerank — they are the new components, and shadow logs depend on them.</em></>}
        options={[
          {key:"a", text:"Train demand model + audit (group-imputation, calibration, drift).", order:1},
          {key:"b", text:"Build & validate floor function f.", order:2},
          {key:"c", text:"Shadow rerank.", order:3},
          {key:"d", text:"Mirror serve.", order:4},
          {key:"e", text:"Traffic ramp.", order:5},
          {key:"f", text:"Full deploy.", order:6},
          {key:"g", text:"Skip demand-model audit; ship and audit if alerts fire."},
        ]}
        trap={<>(g) is the time-pressure mistake that produces F-axis failures.</>}
        lens={<>The demand model is upstream of every downstream guarantee. Validate FIRST. Senior insight: rollout order = data-flow order.</>}
        stretch={<>What's the cheapest demand-model audit that catches the most issues?</>}
      />

      <VIS.TrapProblem
        id="fa-e5"
        difficulty="hard"
        title="E5 — Reproducibility: SIGIR 2024 paper's utility-recovery claim"
        scenario={<>The SIGIR 2024 paper claims "12% utility recovery vs static on one-sided queries." You see 4%. Which experimental property must match? <em>Discriminating insight: the proportion of one-sided queries in their evaluation, their demand-model quality, and their base_floor value — all data-specific.</em></>}
        multiSelect
        options={[
          {key:"a", text:"Proportion of one-sided queries in eval set (higher = more headroom for utility recovery).", correct:true},
          {key:"b", text:"Demand-model R-squared on a held-out demand truth set.", correct:true},
          {key:"c", text:"base_floor value (higher base_floor = less adaptive headroom).", correct:true},
          {key:"d", text:"Slate size K (interacts with attention curve).", correct:true},
          {key:"e", text:"Random seed."},
        ]}
        trap={<>(e) is minor.</>}
        lens={<>Fairness lifts rarely transfer because the eval set's demand-heterogeneity profile is data-specific. Treat headline numbers as upper bounds.</>}
        stretch={<>How would you design a transferable benchmark? What does it standardize?</>}
      />

      <VIS.TrapProblem
        id="fa-e6"
        difficulty="hard"
        title="E6 — Per-query F_g volatility — adaptive-specific leading indicator"
        scenario={<>The team already monitors aggregate fairness, NDCG, and KL of input distributions (the cross-visual canonical leading indicator). Pick the <em>adaptive-reranker-specific</em> leading indicator that the input-KL monitor cannot capture. <em>Discriminating insight: per-query F_g volatility — the variance of F_g(q) across queries within the same query cluster — is unique to adaptive. High intra-cluster volatility means the demand model is over-fitting noise (similar queries get wildly different floor values), or the floor function f is over-sensitive to small demand fluctuations. Neither symptom shows up in input-KL (which measures the input distribution shape) or in fairness metrics (which lag by hours).</em></>}
        options={[
          {key:"a", text:"Per-query F_g volatility: var(F_g(q)) computed across queries within the same query-embedding cluster. High intra-cluster volatility means the demand model is over-fitting noise OR the floor function is over-sensitive — both produce reranking instability that aggregate metrics miss. Adaptive-specific: a static reranker has F_g constant by definition, so this signal is only meaningful here.", correct:true},
          {key:"b", text:"Daily marginal fairness metric across all groups — captures the audit-relevant property directly."},
          {key:"c", text:"Weekly NDCG on the served slate — captures user-utility regression before fairness shifts."},
          {key:"d", text:"p99 LP solver latency — captures infrastructure-side failures of the constrained optimization."},
        ]}
        trap={<>(b)(c)(d) are real, useful adaptive-reranker monitors — but they're all <em>lagging</em>. (b) needs labels (hours-to-days). (c) needs user behavior (slow). (d) only fires on infrastructure-side issues (sibling fa-e1), not on adaptive-floor pathologies. Only per-query F_g volatility is leading AND adaptive-specific (no equivalent in static rerankers).</>}
        lens={<>The monitor stack is layered: input-KL (cross-technique leading indicator), per-query F_g volatility (adaptive-specific leading indicator), aggregate fairness + NDCG (lagging effect indicators). Senior dashboards have all three layers; if forced to choose the adaptive-specific layer, F_g volatility is the canonical pick.</>}
        stretch={<>What clustering of queries makes F_g volatility a stable signal? Embedding-cluster, intent-class, or template-based?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      <VIS.TrapProblem
        id="fa-f1"
        difficulty="hard"
        title="F1 — Edge case: query with no inventory in a group"
        scenario={<>A query has zero items from group G in the candidate set. What does the LP do? <em>Discriminating insight: F_g(q) must auto-relax to 0 — otherwise the LP is infeasible. Adaptive variant handles this; static variant fails.</em></>}
        options={[
          {key:"a", text:"Adaptive floor F_g(q) detects zero supply (S_g(q)=0) and relaxes to 0 — no constraint to enforce. Static reranker with constant F_g > 0 has an infeasible LP and either crashes or defaults to ranker output (silently violating the static contract).", correct:true},
          {key:"b", text:"Both fail."},
          {key:"c", text:"Both succeed."},
          {key:"d", text:"LP is irrelevant here."},
        ]}
        trap={<>(b), (c), (d) miss the adaptive vs static divergence at infeasibility.</>}
        lens={<>Adaptive's input-aware floor handles infeasibility gracefully; static fails. This is one of adaptive's silent operational wins.</>}
        stretch={<>How should the system handle the related case of S_g(q) very small but nonzero (1-2 items)?</>}
      />

      <VIS.TrapProblem
        id="fa-f2"
        difficulty="hard"
        title="F2 — Adversarial: query stuffing to manipulate adaptive floor"
        scenario={<>An adversarial seller floods the query log with queries designed to inflate demand_g for their group. Effect on adaptive? <em>Discriminating insight: the adaptive floor for their group rises — exposure goes up — adversary wins.</em></>}
        options={[
          {key:"a", text:"Synthetic queries that increase demand_g for the adversary's group will raise F_g(q) for related queries, granting more exposure. The defense is two-sided: (1) bot-detect synthetic queries before they enter the demand-model training, (2) cap F_g(q) at a multiple of the base_floor to bound adversarial gains. Adaptive's flexibility is also its attack surface — static rerankers are immune to this specific attack.", correct:true},
          {key:"b", text:"Adversary cannot affect adaptive."},
          {key:"c", text:"Adversary's exposure drops."},
          {key:"d", text:"This is impossible."},
        ]}
        trap={<>(b), (c), (d) miss the attack mechanism.</>}
        lens={<>Adaptive's input-sensitivity is also its adversarial vulnerability. Senior MLEs add bot-detection to the demand pipeline AND cap the floor function.</>}
        stretch={<>Could the same attack work against counterfactual augmentation (sibling)? Why or why not?</>}
      />

      <VIS.TrapProblem
        id="fa-f3"
        difficulty="hard"
        title="F3 — Reverse engineering: fairness metric improves but provider satisfaction drops"
        scenario={<>Symptom: aggregate fairness metric improves; provider-satisfaction survey scores DROP. Which adaptive-specific cause? <em>Discriminating insight: adaptive relaxed the floor on one-sided queries — providers in the dominant group on those queries see no change; providers in the minority group on those queries see LESS exposure than under static rerank.</em></>}
        options={[
          {key:"a", text:"Adaptive's relaxation on one-sided queries REDUCES minority-group exposure on those specific queries (vs the static reranker which would have padded them). The marginal fairness metric improves (overall exposure is more demand-matched, which the new metric values) BUT individual minority-group providers feel LESS supported because they used to get token slots they no longer get. The fairness story is more nuanced than a single metric reveals.", correct:true},
          {key:"b", text:"Survey is unreliable."},
          {key:"c", text:"Adaptive is broken."},
          {key:"d", text:"This pattern is impossible."},
        ]}
        trap={<>(b), (c), (d) miss the marginal-vs-individual distinction.</>}
        lens={<>Aggregate fairness metrics CAN improve while individual experiences worsen — the adaptive variant is especially prone to this because relaxation produces visible per-query losers among minority providers.</>}
        stretch={<>Design a fairness metric that captures both aggregate and provider-level satisfaction. Is one such metric sufficient?</>}
      />

      <VIS.TrapProblem
        id="fa-f4"
        difficulty="hard"
        title="F4 — Paper-named failure: 'demand-relaxation hides utility loss'"
        scenario={<>The SIGIR 2024 paper specifically warns about a failure mode where adaptive's relaxation hides large utility losses on specific queries. Name the mechanism. <em>Discriminating insight: when base_floor is high AND demand is mildly heterogeneous, the relaxation is small but cumulative utility loss on the heterogeneous-demand queries is large; the aggregate metric averages it away.</em></>}
        options={[
          {key:"a", text:"With a high base_floor and mild demand heterogeneity, the adaptive relaxation is small (F_g doesn't drop much from base_floor) but the cumulative utility loss on the heterogeneous queries is large — and aggregate metrics average it across all queries. The paper recommends per-query utility-loss tracking, not just aggregate. Otherwise you ship a 'low-utility-loss-on-average' system that actively hurts 30% of queries.", correct:true},
          {key:"b", text:"Adaptive always preserves utility."},
          {key:"c", text:"Aggregate metrics are always sufficient."},
          {key:"d", text:"This is not a real failure mode."},
        ]}
        trap={<>(b), (c), (d) miss the marginal-vs-per-query distinction.</>}
        lens={<>The named failure is per-query utility loss masked by aggregation. The fix is per-query monitoring, not a better aggregate metric.</>}
        stretch={<>What's the right per-query utility-loss threshold to alarm on?</>}
      />

      <VIS.TrapProblem
        id="fa-f5"
        difficulty="hard"
        title="F5 — Community-found: the imputation feedback loop"
        scenario={<>A 2025 follow-up paper documents a specific failure: imputed group labels create a feedback loop with adaptive reranking. Mechanism? <em>Discriminating insight: imputed labels seed the demand model; the reranker then enforces floors on imputed groups; future labels are now collected under the imputed-based exposure policy; the imputation model retrained on those labels reinforces its own errors.</em></>}
        options={[
          {key:"a", text:"Group imputation seeds the demand model. Adaptive reranking enforces floors on the IMPUTED labels — items wrongly imputed as group G receive group-G's exposure. Future click logs reflect the wrongly-imputed exposure. Retraining the imputation model on those logs cements the misimputation. The loop: bad imputation → wrong exposure → wrong labels → confirms bad imputation. Break the loop with periodic ground-truth re-anchoring (human-labeled audit set).", correct:true},
          {key:"b", text:"Imputation is always correct."},
          {key:"c", text:"Feedback loops are impossible here."},
          {key:"d", text:"Imputation is unrelated."},
        ]}
        trap={<>(b), (c), (d) miss the loop.</>}
        lens={<>The loop is the most insidious failure mode — it gets WORSE over time, not better. Periodic ground-truth re-anchoring is the canonical fix.</>}
        stretch={<>How often does the human-labeled audit set need to be refreshed? How do you size it?</>}
      />

      <VIS.TrapProblem
        id="fa-f6"
        difficulty="hard"
        title="F6 — Multi-group with intersectional groups"
        scenario={<>You define groups by cuisine. The paper extends to intersectional groups (cuisine x price tier). Why does adaptive struggle here? <em>Discriminating insight: intersectional explodes the number of constraints; the LP becomes harder; the floor function needs many more inputs.</em></>}
        options={[
          {key:"a", text:"15 intersectional groups (5 cuisine x 3 price) need 15 per-query demand estimates; sparse cells get noisy demand, the floor function collapses them to base, defeating the adaptive layer on the rare intersections.", correct:true},
          {key:"b", text:"Intersectional uses sparse-LP optimization which scales O(g log g) — handles the cuisine x price expansion within p99 budget without sample-size issues."},
          {key:"c", text:"Drop intersectional and use cuisine as a proxy — protected-attribute correlations carry intersectional signal implicitly."},
          {key:"d", text:"Use ECOS or OSQP — they exploit the structured-sparsity of intersectional constraints, beating Gurobi at small group counts."},
        ]}
        trap={<>(b) confuses LP scaling (which IS tractable at g=15) with demand-model sample-size (which is the actual bottleneck). (c) is the implicit-correlation reflex — it gives up the intersectional fairness goal entirely. (d) is the solver-choice misdirection from sibling fa-e3; solver speed is not the limiting factor.</>}
        lens={<>Intersectional fairness is harder because the demand model has fewer samples per intersection. Senior MLEs decide on group granularity based on per-cell sample size.</>}
        stretch={<>What's the right diagnostic to decide whether to add an intersectional group dimension?</>}
      />

      <VIS.TrapProblem
        id="fa-f7"
        difficulty="hard"
        title="F7 — Silent regression: legal floor violated on a long-tail query"
        scenario={<>A regulator audits a long-tail query. Adaptive relaxed F_g below the legal minimum. What went wrong? <em>Discriminating insight: base_floor was not set to the LEGAL minimum — adaptive's relaxation went below it.</em></>}
        options={[
          {key:"a", text:"The legal minimum should have been encoded as base_floor (the value below which adaptive never relaxes). If the team set base_floor to the BUSINESS minimum (lower than legal), adaptive's relaxation goes legal-violating on queries where the function f returns base_floor. Fix: base_floor = max(legal_minimum, business_minimum). Always set the legal floor as the absolute lower bound.", correct:true},
          {key:"b", text:"Adaptive cannot violate legal floors."},
          {key:"c", text:"Legal floors don't apply."},
          {key:"d", text:"This is a bug in the LP solver."},
        ]}
        trap={<>(b), (c), (d) miss the base_floor configuration error.</>}
        lens={<>The senior move: encode legal constraints as HARD base_floor, not as monitoring alarms. Configuration over code.</>}
        stretch={<>How would you audit base_floor configuration against legal requirements automatically?</>}
      />

      <VIS.TrapProblem
        id="fa-f8"
        difficulty="hard"
        title="F8 — Compounding with downstream auction"
        scenario={<>Reranked slate feeds a second-price auction where bids depend on rank position. What complication does adaptive introduce vs static? <em>Discriminating insight: adaptive's per-query floors change the available rank distribution per query — bidder strategies that assumed stable rank semantics now need to adapt.</em></>}
        options={[
          {key:"a", text:"With adaptive reranking, the per-query distribution of items by rank position now depends on the query's demand profile. Bidders that calibrated their bids assuming stable rank semantics (e.g., rank 3 is 1/3 as valuable as rank 1) now face a moving target. The mitigation is to expose 'fairness-adjusted rank' as a separate field bidders can read, OR to communicate the rerank's impact via the auction's price-to-bid translation.", correct:true},
          {key:"b", text:"No effect on the auction."},
          {key:"c", text:"Static has the same issue."},
          {key:"d", text:"Auctions don't depend on rank."},
        ]}
        trap={<>(b), (c), (d) miss the auction-bidder coupling.</>}
        lens={<>Reranking and auctions interact. Senior MLEs surface the rerank's effect to auction bidders so they can adapt.</>}
        stretch={<>What's the right communication channel? Per-query 'rerank applied' signal? Per-position calibration?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://biasinrecsys.github.io/sigir2024/" target="_blank" rel="noopener"><strong>Fairness-Aware Exposure Allocation via Adaptive Reranking</strong></a>{" "}

        </li>
        <li>
          <a href="https://arxiv.org/abs/1706.06368" target="_blank" rel="noopener"><strong>Zehlike et al. — FA*IR: A Fair Top-K Ranking Algorithm</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(CIKM 2017)</span>
          <br/>The canonical static-reranker baseline against which adaptive is the natural improvement.
        </li>
        <li>
          <a href="https://dl.acm.org/doi/10.1145/3643670" target="_blank" rel="noopener"><strong>Counterfactual Explanation for Fairness in Recommendation</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(TOIS 2024)</span>

        </li>
      </ul>
    </VIS.Section>
  </main>
);
