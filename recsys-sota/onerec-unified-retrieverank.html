<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// OneRec — Unifying Retrieve and Rank (Kuaishou 2025; V2 Aug 2025)
// v3 — gate-clean rewrite. Confusingly-similar plausible-wrong decoys; corrects evenly distributed a/b/c/d.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Unified retrieve+rank"
      title="OneRec — Unifying Retrieve and Rank with Generative Recommender"
      subtitle="End-to-end encoder-decoder + iterative DPO over watch-time. Collapses L0/L1/L2 funnel into one model. V2 cuts compute 94%."
      byline={[
        {label: "Paper", value: "Cai et al., Kuaishou 2025; V2 Aug 2025"},
        {label: "Year", value: "2025"},
        {label: "Domain", value: "End-to-end generative recsys"},
      ]}/>

    <VIS.TLDR>
      <VIS.Term def="Unified retrieve+rank model. Single backbone serves both retrieval and ranking via task-template prompts; eliminates retrieval-ranker train/serve skew.">OneRec</VIS.Term> generates a LIST of next items (not one item) via <VIS.Term def="Architecture with an encoder summarizing the input and a decoder generating output token by token while cross-attending to the encoder.">encoder-decoder</VIS.Term> over user history → <VIS.Term def="Generates one token at a time, each conditioned on the tokens produced so far.">autoregressive</VIS.Term> list decode of <VIS.Term def="Discrete K-tuple code derived from item content (via RQ-VAE). Similar items share prefix codes; replaces random hashed IDs.">Semantic IDs</VIS.Term>. <VIS.Term def="DPO run in multiple rounds: collect on-policy preferences, run DPO, redeploy, repeat. Keeps preference data fresh as the policy evolves.">Iterative DPO</VIS.Term> aligns the generator to maximize <VIS.Term def="Total time a user spends watching a recommended item. Used as the engagement reward signal in OneRec and other video recsys.">watch-time</VIS.Term>. Replaces a 3-stage <VIS.Term def="Multi-stage retrieval/ranking pipeline; each stage shrinks the candidate set and uses a heavier model.">cascade</VIS.Term> (retrieval → coarse rank → fine rank) with a single model. Deployed in Kuaishou's main feed: +1.6% watch-time at 10.6% the cost. V2's <VIS.Term def="OneRec V2 design: decoder cross-attends to user context only at chosen layers/steps; skipped steps reuse cached summaries. Cuts compute ~94%.">Lazy Decoder-Only</VIS.Term> reduces compute 94%. Source: <a href="https://arxiv.org/abs/2502.18965" target="_blank" rel="noopener">arXiv:2502.18965</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        OneRec is one model. Input: user history. Output: a list of K next items (Semantic IDs decoded autoregressively). No separate retrieval, coarse rank, fine rank — the generative decode IS all three. Trained in two stages: (1) supervised <VIS.Term def="Cross-entropy. Loss function for multi-class prediction; penalizes the model when the predicted class probability is low for the true class.">CE</VIS.Term> on next-item prediction, (2) iterative <VIS.Term def="Direct Preference Optimization. Trains a model on (winning, losing) pairs of outputs to align it with preferences — no separate reward model.">DPO</VIS.Term> using watch-time as the preference signal.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  H["User history"]
  H --> M["OneRec encoder-decoder"]
  M --> L["List of K Semantic IDs"]
  L --> U["User feed"]
  M -.->|"realized watch-time"| R["Reward model"]
  R -.->|"DPO iterations"| M
  style M fill:#dbeafe,stroke:#1e40af,stroke-width:2px
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — Cascade vs OneRec vs HSTU vs TIGER">
      <p>
        <strong>Cascade (traditional).</strong> Retrieval (<VIS.Term def="Recsys architecture: separate user-encoder tower and item-encoder tower; dot-product their outputs to score (user, item) pairs.">two-tower</VIS.Term> + <VIS.Term def="Hierarchical Navigable Small World. Graph-based ANN: layered proximity graph, greedy descent at each layer. RAM-heavy, log-time.">HNSW</VIS.Term> over 100M items → top 10K) → coarse rank (light <VIS.Term def="Deep Learning Recommendation Model. Meta's classic recsys architecture: feature crosses + MLP top.">DLRM</VIS.Term> on 10K → top 500) → fine rank (heavy DLRM on 500 → top 100). Three models, three teams, three deploys, three monitors.
      </p>
      <p>
        <strong>OneRec.</strong> One model. End-to-end from history → final list of K items. Watch-time-driven DPO collapses the entire optimization onto a single objective.
      </p>
      <p>
        <strong>vs <VIS.Term def="Hierarchical Sequential Transduction Units. Meta 2024 paper: sequence-modeling architecture for recommendation that scales past DLRM's plateau.">HSTU</VIS.Term>.</strong> HSTU is the ranker step only; OneRec absorbs <VIS.Term def="First stage of recsys: retrieve a few hundred items from the full catalog (millions). Usually ANN or two-tower.">retrieval</VIS.Term> and <VIS.Term def="Final-stage recsys: take the candidate set and apply a heavier scorer / diversification logic to produce the user-facing list.">ranking</VIS.Term> together. OneRec is the more aggressive unification.
      </p>
      <p>
        <strong>vs <VIS.Term def="Transformer Index for GEnerative Recommenders. Google 2023 paper: emits items by generating semantic-ID code tuples instead of softmaxing over millions of items.">TIGER</VIS.Term>.</strong> TIGER is the retrieval step only (one item at a time). OneRec generates a LIST and adds preference alignment.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick OneRec">
      <p>
        Pick OneRec when (a) you own the whole stack (no team boundaries forcing modularity), (b) watch-time / DPO-able preference signal is available, (c) you can absorb auto-regressive list decode latency (or precompute user vectors), (d) the cascade has accumulated operational debt worth paying off.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations & gotchas">
      <p>
        OneRec's biggest risks: <strong><VIS.Term def="Model trained to predict a scalar reward (e.g., watch-time) from (state, action) pairs. Supplies the supervisory signal for PPO/DPO.">reward model</VIS.Term> bias</strong> (DPO chases whatever the reward model encodes, including <VIS.Term def="Users click higher-ranked items more often regardless of relevance. Must be corrected to avoid feedback loops.">position</VIS.Term>/<VIS.Term def="Recommenders over-recommend already-popular items because they have more training signal, starving the long tail.">popularity biases</VIS.Term>), <strong><VIS.Term def="When a new user or item has no interaction history, so embedding tables and behavioral features have nothing to learn from.">cold-start</VIS.Term> regression</strong> (no preference signal for DPO on new items/users), <strong>auto-regressive decode latency</strong>, <strong><VIS.Term def="Loss or metric defined over an entire ranked list (e.g., NDCG, mean watch-time per list) rather than per-item pairs.">list-wise</VIS.Term> eval mismatch</strong> (standard <VIS.Term def="Normalized Discounted Cumulative Gain. Ranking metric that rewards relevant items appearing near the top of the list.">NDCG</VIS.Term>@10 doesn't directly map to mean-watch-time over a generated list).
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        40+ trap problems. Each must require knowing OneRec's specific design (unified retrieve+rank + iterative DPO over watch-time + Lazy Decoder-Only) to answer.
      </p>

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Identity & comparison</h3>

      {/* A1 */}
      <VIS.TrapProblem
        id="onerec-a1"
        difficulty="hard"
        title="A1 — OneRec vs HSTU: where is the architectural delta?"
        scenario={<>Both are generative recsys. Pick the actual architectural delta.</>}
        options={[
          {key:"a", text:"HSTU replaces the heavy ranker over an upstream retrieved set; OneRec decodes the full list and absorbs retrieval into one DPO-aligned model.", correct:true},
          {key:"b", text:"HSTU and OneRec are the same architecture trained on different objectives; the deployed inference graph is identical."},
          {key:"c", text:"OneRec is a ranker over a retrieval-shortlist; HSTU does end-to-end list generation and merges retrieval into ranking."},
          {key:"d", text:"HSTU and OneRec both rank a candidate set, but HSTU uses DPO over watch-time while OneRec uses next-item cross-entropy."},
        ]}
        trap={<>(b) flattens the difference; (c) inverts roles; (d) swaps the loss functions.</>}
        lens={<>HSTU stays inside the cascade (replaces the heavy ranker). OneRec collapses the cascade. The org-level cost/benefit shifts: HSTU keeps separate teams; OneRec forces a re-org.</>}
        stretch={<>Could you wrap HSTU inside OneRec? What would it look like?</>}
      />

      {/* A2 */}
      <VIS.TrapProblem
        id="onerec-a2"
        difficulty="hard"
        title="A2 — OneRec vs TIGER: what separates them?"
        scenario={<>OneRec and TIGER both decode Semantic IDs autoregressively. Discriminator?</>}
        options={[
          {key:"a", text:"TIGER decodes a list of K Semantic IDs and uses DPO; OneRec decodes one ID per query and trains supervised cross-entropy."},
          {key:"b", text:"TIGER decodes one Semantic ID per query (retrieval only); OneRec decodes a list of K IDs and adds iterative DPO over watch-time.", correct:true},
          {key:"c", text:"TIGER and OneRec are interchangeable; the only difference is the size of the Semantic-ID codebook used at decode time."},
          {key:"d", text:"TIGER includes a separate fine-ranker; OneRec runs without any retrieval-side tokenization of items into Semantic IDs."},
        ]}
        trap={<>(a) inverts the truth; (c) flattens the architectural difference; (d) misreads OneRec's reuse of Semantic IDs.</>}
        lens={<>OneRec inherits TIGER's Semantic-ID trick AND adds list-wise generation + preference alignment. TIGER could be seen as a OneRec ablation (no DPO, single-item decode).</>}
        stretch={<>Why is list-wise generation harder than per-item retrieval?</>}
      />

      {/* A3 */}
      <VIS.TrapProblem
        id="onerec-a3"
        difficulty="hard"
        title="A3 — The recurring production cost OneRec actually eliminates"
        scenario={<>If you ran the standard pre-OneRec baseline (retrieval → coarse rank → fine rank, each a separate model), one recurring production cost dominates the headline savings. Pick it.</>}
        options={[
          {key:"a", text:<>Index-sync drift — retrieval's <VIS.Term def="Approximate Nearest Neighbor. Family of algorithms (HNSW, IVF, ScaNN) that find close vectors much faster than exact search at small recall cost.">ANN</VIS.Term> index and ranking's item embeddings are trained on different snapshots; drift forces a nightly re-sync pipeline that OneRec eliminates by sharing the Semantic-ID space.</>, correct:true},
          {key:"b", text:"Offline staleness — each stage's training data lags production by ~24h, but the lag is identical to OneRec's reward-model refresh cycle so net cost is unchanged."},
          {key:"c", text:"GPU memory pressure — three transformer-based stages compete for HBM on the same serving host; OneRec uses one transformer but with the same combined memory footprint."},
          {key:"d", text:"Monitoring fanout — three stages need three dashboards, three SLOs, three pagers; OneRec still needs all three plus a generation-quality dashboard, so this cost rises rather than falls."},
        ]}
        trap={<>(b) claims offline staleness is unchanged — it actually compounds across stages; (c) memory is roughly the same magnitude; (d) inverts the monitoring direction — OneRec reduces dashboards, not adds.</>}
        lens={<>Index-sync drift is the specific recurring cost the unified Semantic-ID space eliminates. The 3-stage baseline has 3 separately-trained item representations; reconciling them is a continuous operational tax that OneRec removes by construction.</>}
        stretch={<>What does the cascade still do better than OneRec?</>}
      />

      {/* A4 */}
      <VIS.TrapProblem
        id="onerec-a4"
        difficulty="hard"
        title="A4 — Should you stack OneRec and HSTU?"
        scenario={<>Does it make sense to stack OneRec and HSTU?</>}
        options={[
          {key:"a", text:"Yes — HSTU handles retrieval and OneRec then ranks; this preserves the cascade's per-stage observability while gaining HSTU's efficiency."},
          {key:"b", text:"Yes — OneRec handles retrieval and HSTU then ranks; this matches each architecture's published strengths and uses both fully."},
          {key:"c", text:"Yes — pair them with HSTU as fine ranker over OneRec-generated lists; this adds a calibration safety net for downstream auctions."},
          {key:"d", text:"No — they target the same stage (full-pipeline collapse vs ranker replacement), so stacking re-introduces the cascade OneRec is meant to eliminate.", correct:true},
        ]}
        trap={<>(a), (b), (c) all imagine a clean stage split that doesn't exist — both architectures want to subsume ranking.</>}
        lens={<>OneRec subsumes HSTU. The composition that makes sense: TIGER (retrieval) + HSTU (ranking) as cascade, OR OneRec alone.</>}
        stretch={<>What component of OneRec is HSTU-like internally?</>}
      />

      {/* A5 */}
      <VIS.TrapProblem
        id="onerec-a5"
        difficulty="hard"
        title="A5 — Surface profile where OneRec's advantage shrinks"
        scenario={<>OneRec gains shrink in which surface profile?</>}
        options={[
          {key:"a", text:"Multi-objective surfaces — retrieval wants recall+diversity, ranking wants CTR; collapsing into one DPO objective forces one trade-off that fits neither stage well.", correct:true},
          {key:"b", text:"Surfaces with a small catalog — the unified decode trivializes a tiny item pool and OneRec's gain over cascade collapses to noise."},
          {key:"c", text:"Surfaces with very long user histories — encoder cost dominates, so the cascade outpaces OneRec's history-aware decode at scale."},
          {key:"d", text:"Surfaces with abundant GPU budget — extra compute lets the cascade match OneRec's quality and removes the headline efficiency win."},
        ]}
        trap={<>(b), (c), (d) are conditions under which OneRec wins more, not less.</>}
        lens={<>Multi-objective optimization is the place where the cascade's modularity actually helps. OneRec's single DPO objective is the cleanest win when there's one dominant objective (watch-time).</>}
        stretch={<>How would you extend OneRec to multi-objective?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>B. Application</h3>

      {/* B1 */}
      <VIS.TrapProblem
        id="onerec-b1"
        difficulty="hard"
        title="B1 — Greenfield startup vs FAANG-scale incumbent"
        scenario={<>You're CTO of a 50-person video startup. Your competitor is a FAANG-scale incumbent with 200 ranker engineers. Should you build OneRec or a cascade?</>}
        options={[
          {key:"a", text:"Cascade — you'll need to A/B test ranker swaps independently; the incumbent's modular team structure is exactly the playbook you should copy at startup scale."},
          {key:"b", text:"OneRec — you have no legacy cascade to protect and a single team can own a single model; the incumbent's 200 engineers make migration politically harder than technically.", correct:true},
          {key:"c", text:"DLRM cascade — it's the proven baseline at every scale; OneRec's claimed wins haven't been reproduced outside Kuaishou, so the safe move is the standard stack."},
          {key:"d", text:"Either works — at 50 people you're under the org-friction threshold where the choice matters, so pick whichever your team has more experience with."},
        ]}
        trap={<>(a), (c), (d) ignore that OneRec's adoption is org-shaped, and the incumbent's headcount is a migration cost, not a model advantage.</>}
        lens={<>OneRec is a greenfield-friendly architecture. Incumbents have committed costs in cascades + team specializations that make migration politically harder than technically.</>}
        stretch={<>What's the *incumbent's* path to OneRec? Phased? Skunkworks?</>}
      />

      {/* B2 */}
      <VIS.TrapProblem
        id="onerec-b2"
        difficulty="hard"
        title="B2 — Does DPO automatically calibrate the model?"
        scenario={<>An ML lead says "Since we use DPO, the model is calibrated by construction." How would you respond?</>}
        options={[
          {key:"a", text:"True — DPO matches preferred-vs-dispreferred ratios to true reward differences, so the softmax outputs are already calibrated to P(click)."},
          {key:"b", text:"True after enough iterations — each DPO round narrows the gap between predicted and observed preference, eventually delivering calibrated absolute probabilities."},
          {key:"c", text:<>False — DPO aligns ranking (which item is better than which) but leaves the softmax on an arbitrary scale; downstream <VIS.Term def="Predicted probability that a user clicks an item; the canonical calibrated output of a CTR model used in ad auctions.">P(click)</VIS.Term> consumers need a separate calibration head.</>, correct:true},
          {key:"d", text:"True for video surfaces only — watch-time as the DPO signal happens to be near-Bernoulli on short-form video, which incidentally calibrates the head."},
        ]}
        trap={<>(a), (b), (d) all misread DPO as a calibration method instead of a ranking optimizer.</>}
        lens={<>DPO is a *ranking* optimization, not a calibration. The output probabilities are still on an arbitrary scale; calibration is orthogonal.</>}
        stretch={<>How would you calibrate OneRec's output for an auction?</>}
      />

      {/* B3 */}
      <VIS.TrapProblem
        id="onerec-b3"
        difficulty="medium"
        title="B3 — One-line VP pitch — what's the actual unlock?"
        scenario={<>VP asks: "Why OneRec over the cascade we already run?" Each candidate pitch below claims a specific mechanism. Pick the one that names OneRec's actual unlock.</>}
        options={[
          {key:"a", text:"It runs one large LLM that scores every item end-to-end; we drop the ANN retrieval index entirely and let the LLM's logits handle candidate selection in a single forward pass."},
          {key:"b", text:<>It trains one shared encoder for both retrieve and rank with two task heads; the shared encoder eliminates the <VIS.Term def="Synonym for two-tower: separate user and item encoder towers whose outputs are dot-producted to score (user, item) pairs.">twin-tower</VIS.Term> train/serve embedding drift that hits our <VIS.Term def="How closely predicted probabilities match true frequencies. A model predicting 0.7 should be right 70% of the time.">calibration</VIS.Term>.</>},
          {key:"c", text:<>It <VIS.Term def="Train a small 'student' model to match a large 'teacher' model's outputs (logits or features), often with temperature softening.">distills</VIS.Term> the fine-ranker's logits into the retrieval scorer each night; retrieval stops drifting from ranking because the teacher signal keeps them in lock-step — that's the cascade-killer.</>},
          {key:"d", text:"It generates the list autoregressively from one backbone and DPO-aligns that backbone to watch-time directly; no inter-stage proxy losses survive, so the metric we ship to users is the metric the model optimizes.", correct:true},
        ]}
        trap={<>(a) is the "<VIS.Term def="Umbrella term for recsys approaches that wrap or distill an LLM as the scorer/generator rather than using a classic ID-embedding model.">LLM-rec</VIS.Term>sys" misread — OneRec still uses Semantic-ID retrieval, just inside the decoder; (b) is the shared-encoder twin-tower shape, not OneRec; (c) is the <VIS.Term def="Distill the heavy ranker's logits into the retrieval scorer each cycle so retrieval and ranking stay aligned without re-syncing indexes.">ScalingNote distillation</VIS.Term> pattern, a different paper.</>}
        lens={<>The unlock is preference-alignment to the business metric (watch-time) via DPO on one backbone — not size, not shared encoders, not distillation. The other three are real techniques from adjacent papers; only (d) is OneRec's actual mechanism.</>}
        stretch={<>If the VP says "we don't have logged watch-time preferences at session granularity" — what 30-day data prerequisite unlocks the DPO loop?</>}
      />

      {/* B4 */}
      <VIS.TrapProblem
        id="onerec-b4"
        difficulty="hard"
        title="B4 — Surface where OneRec is the worst fit"
        scenario={<>Pick the surface where OneRec is the worst fit among these options.</>}
        options={[
          {key:"a", text:<>Ads ranking where the auction needs calibrated <VIS.Term def="Click-Through Rate. Fraction of impressions that lead to a click; the central calibration target for ads and feed ranking.">CTR</VIS.Term> and the business metric is bid-CTR, so OneRec's DPO over watch-time misaligns with what the auction actually pays for.</>, correct:true},
          {key:"b", text:"Short-form video feed with abundant watch-time data and a single dominant engagement metric that the DPO objective tracks closely."},
          {key:"c", text:"Long-form video where session watch-time is dense and the user's preference signal accumulates cleanly over a day of viewing."},
          {key:"d", text:"Music recommendations where listen-through and skip events provide a watch-time-equivalent signal that DPO can rank-align on."},
        ]}
        trap={<>(b), (c), (d) all have watch-time-friendly metrics where OneRec's DPO objective is well-matched.</>}
        lens={<>OneRec's DPO objective is fixed at training time. Surfaces where the business metric is dynamic (ads bids, multi-tenant) need more flexible alignment.</>}
        stretch={<>Could you re-train OneRec daily to track shifting objectives?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>C. Mechanism</h3>

      {/* C1 */}
      <VIS.TrapProblem
        id="onerec-c1"
        difficulty="hard"
        title="C1 — Why iterative DPO instead of one-shot DPO?"
        scenario={<>Why does OneRec use *iterative* DPO (multiple rounds of preference data → DPO → reward update → repeat)?</>}
        options={[
          {key:"a", text:"Iterative DPO converges faster than one-shot because each round halves the loss; wall-clock is the primary motivation for iterating rounds."},
          {key:"b", text:<>Each DPO round shifts the policy, which samples different items and produces different watch-time observations; iterating refreshes preferences to match the new policy's behavior (<VIS.Term def="Training data sampled from the current policy. DPO/PPO benefit because preferences reflect actions the deployed model would actually take.">on-policy</VIS.Term> data).</>, correct:true},
          {key:"c", text:"One-shot DPO is mathematically incapable of converging on watch-time rewards; iteration is the only way the optimizer can reach a stable solution at all."},
          {key:"d", text:"Iterative DPO is a regularizer — each round adds noise to gradients which prevents over-fitting to the initial reward model in a way single-shot cannot."},
        ]}
        trap={<>(a), (c), (d) all invent reasons; the real driver is on-policy preference data freshness.</>}
        lens={<>This is the same iterative-<VIS.Term def="Reinforcement Learning from Human Feedback. Train a reward model from human preferences, then optimize policy against it (usually with PPO).">RLHF</VIS.Term> logic as in LLMs. On-policy preference data is more useful than off-policy as the model evolves.</>}
        stretch={<>How many iterations did OneRec use? When do you stop?</>}
      />

      {/* C2 */}
      <VIS.TrapProblem
        id="onerec-c2"
        difficulty="hard"
        title="C2 — What does picking watch-time over CTR as the reward signal give up?"
        scenario={<>OneRec uses watch-time rather than CTR as the reward signal for DPO. What does this give up compared to CTR?</>}
        options={[
          {key:"a", text:"Watch-time has higher variance per impression than CTR, so DPO gradients are noisier and require ~10x more preference pairs to reach the same convergence."},
          {key:"b", text:"Watch-time is not observable on muted-autoplay surfaces, so DPO silently trains on missing data and degrades on those slices over time."},
          {key:"c", text:<>Watch-time conflates 'good content' with 'manipulative content' (cliffhangers, loops); DPO can't distinguish them, so weak moderation lets <VIS.Term def="Content engineered to maximize watch-time or clicks (cliffhangers, loops, ragebait) regardless of user satisfaction.">engagement-bait</VIS.Term> win.</>, correct:true},
          {key:"d", text:"CTR captures intent better at all surfaces, so substituting watch-time always loses signal regardless of moderation strength."},
        ]}
        trap={<>(a) is a tractable engineering issue; (b) is a data plumbing claim; (d) over-generalizes — the real cost is the bait/quality confound.</>}
        lens={<>The reward signal IS the alignment target. Bad reward signal → bad model. Watch-time has trade-offs; OneRec needs separate moderation policy as a guardrail.</>}
        stretch={<>What reward signal would you use for a kids' content surface?</>}
      />

      {/* C3 — MULTI select. G6 skips. Trim G1. */}
      <VIS.TrapProblem
        id="onerec-c3"
        difficulty="hard"
        title="C3 — What does OneRec drop relative to the cascade?"
        scenario={<>OneRec drops things the cascade has. Pick all real drops.</>}
        multiSelect
        options={[
          {key:"a", text:"Per-stage observability — cascade lets you inspect retrieval output, coarse-rank survivors, and fine-rank winners; OneRec is one decode.", correct:true},
          {key:"b", text:"Per-stage A/B testing — cascade lets you swap a ranker without touching retrieval; OneRec changes are necessarily model-wide.", correct:true},
          {key:"c", text:"Per-stage latency SLA — cascade gives each stage its own budget; OneRec has one decode budget for the whole list.", correct:true},
          {key:"d", text:"Item embeddings — OneRec has no item representation and scores items only by raw catalog IDs at decode time."},
          {key:"e", text:"Watch-time signals — OneRec drops them from the loop because the DPO objective replaces watch-time entirely."},
        ]}
        trap={<>(d) is wrong: OneRec uses Semantic IDs (item embeddings). (e) inverts: watch-time IS OneRec's signal.</>}
        lens={<>The three real drops are operational. Cascade's modularity has value precisely as separation of concerns. OneRec trades that for cost + simplicity.</>}
        stretch={<>Which of these drops can be recovered with logging tricks?</>}
      />

      {/* C4 */}
      <VIS.TrapProblem
        id="onerec-c4"
        difficulty="hard"
        title="C4 — DPO temperature β at the extremes"
        scenario={<>DPO has a <VIS.Term def="DPO's KL-strength hyperparameter. Low β → policy can drift from SFT (reward-hack risk); high β → policy stays near SFT (no learning).">temperature β</VIS.Term> that controls how aggressively the policy diverges from the <VIS.Term def="Supervised Fine-Tuning. Train a pretrained model on labeled (input, target) pairs to specialize it.">SFT</VIS.Term> prior. What goes wrong at β → 0 or β → ∞?</>}
        options={[
          {key:"a", text:"β → 0 freezes the SFT prior so no DPO learning happens; β → ∞ lets the policy drift to reward-hack with degenerate generations."},
          {key:"b", text:<>Both extremes are safe — the implicit <VIS.Term def="Asymmetric measure of distance between two distributions. Used as a regularizer in VAEs to keep latents near a prior.">KL</VIS.Term> term keeps the policy close to SFT regardless of β, and the only effect is slower convergence.</>},
          {key:"c", text:"β acts only on the reward-model gradient, not the policy; so β extremes change reward-model fit speed but leave the deployed OneRec policy unchanged."},
          {key:"d", text:<>β → 0 lets the policy drift arbitrarily from SFT chasing reward (degenerate lists, e.g. all-popular) — classic <VIS.Term def="Policy exploits flaws in the reward model to score high without doing the intended task. Symptom of an under-constrained optimizer.">reward hacking</VIS.Term>; β → ∞ pins the policy to SFT so no preference alignment happens.</>, correct:true},
        ]}
        trap={<>(a) inverts the β → 0 vs β → ∞ semantics; (b) misreads the KL role; (c) misattributes β.</>}
        lens={<>β tunes prior-vs-reward balance. Classic DPO failure: β too low → reward hacking; β too high → no learning.</>}
        stretch={<>How would you pick β empirically for OneRec?</>}
      />

      {/* C5 */}
      <VIS.TrapProblem
        id="onerec-c5"
        difficulty="hard"
        title="C5 — Where V2's 94% compute cut actually comes from"
        scenario={<>OneRec V2 cuts compute 94% versus V1 at matched quality. Each option below proposes a specific source of that saving. Pick the one V2 actually uses.</>}
        options={[

          {key:"a", text:<>List <VIS.Term def="Scalar dividing logits before softmax at decode time. Higher T → more diverse samples; lower T → more deterministic argmax-like decoding.">decode temperature</VIS.Term> / <VIS.Term def="Top-p decoding: sample the next token from the smallest set whose cumulative probability exceeds p. Adds controlled diversity.">nucleus sampling</VIS.Term> — autoregressive decode tends to repeat patterns; raising sampling temperature or using nucleus diversifies without retraining.</>, correct:true},
          {key:"b", text:"Retrain OneRec from scratch with a diversity-aware loss; sampling tweaks at decode time cannot break out of a converged homogeneous policy."},
          {key:"c", text:<>Bolt an <VIS.Term def="Maximal Marginal Relevance. Greedy reranker: each step picks the candidate maximizing (relevance − λ × similarity to already-chosen).">MMR</VIS.Term> re-ranker after the decode step — this is the classic cascade move and restores diversity at the cost of an extra ranking stage.</>},
          {key:"d", text:"Run more DPO iterations — more preference signal converges the policy onto items users actually watch and naturally widens the generated list."},
        ]}
        trap={<>(b) is overkill, (c) re-introduces cascade, (d) typically reduces diversity further. The OneRec-specific knob is decode sampling.</>}
        lens={<>OneRec's list-wise output is sensitive to decode-time sampling. Tune sampling before architectural changes.</>}
        stretch={<>How would you trade off list-diversity vs predicted watch-time?</>}
      />

      {/* D2b — MULTI. Trim G1. */}
      <VIS.TrapProblem
        id="onerec-d2b"
        difficulty="hard"
        title="D2b — 'OneRec is just RLHF for recsys' — what failure modes does this miss?"
        scenario={<>This framing hides which OneRec-specific failure modes?</>}
        multiSelect
        options={[
          {key:"a", text:"Watch-time reward is implicit and doesn't separate quality from engagement-bait, so DPO can amplify clickbait at the expense of user satisfaction.", correct:true},
          {key:"b", text:"List-wise output: standard RLHF generates a single response; OneRec generates a list and list interactions (diversity, order) need separate handling.", correct:true},
          {key:"c", text:"Production scale: implicit-feedback DPO at billions of pairs has different stability dynamics than LLM-RLHF at 10K human-labeled pairs.", correct:true},
          {key:"d", text:"Same backbone architecture as ChatGPT — irrelevant to the failure modes since architecture and training-objective failures are orthogonal here."},
        ]}
        trap={<>(d) is irrelevant to the failure modes the framing hides.</>}
        lens={<>The "RLHF for recsys" framing under-counts the implicit-feedback, list-wise, and production-scale specifics that make OneRec hard.</>}
        stretch={<>Which of these failure modes was hardest for the OneRec team?</>}
      />

      {/* A4b */}
      <VIS.TrapProblem
        id="onerec-a4b"
        difficulty="hard"
        title="A4b — Source of OneRec's Semantic-ID vocabulary"
        scenario={<>OneRec uses Semantic IDs as its output vocabulary. Where do they come from?</>}
        options={[
          {key:"a", text:"From random hashing — items hashed into a fixed codebook keep tokenization cheap and avoid coupling OneRec's vocabulary to any content encoder."},
          {key:"b", text:<>From an <VIS.Term def="Residual-Quantized VAE. Stacks K codebooks; each level quantizes the residual error from the previous level. Produces hierarchical semantic IDs.">RQ-VAE</VIS.Term> trained on item content (TIGER's recipe); OneRec inherits TIGER's content tokenization and adds list-wise generation + DPO on top.</>, correct:true},
          {key:"c", text:"From manually curated category labels assigned at content-moderation time; this gives OneRec a clean human-readable vocabulary for the decoder."},
          {key:"d", text:"From a separate BERT encoder applied to item titles; the BERT embeddings are quantized to short codes that serve as Semantic IDs in OneRec."},
        ]}
        trap={<>(a), (c), (d) invent plausible-but-wrong tokenization paths; the actual one is TIGER's RQ-VAE.</>}
        lens={<>OneRec composes TIGER's content tokenization with its own list-wise generation + DPO. The Semantic-ID layer is shared.</>}
        stretch={<>What if you swap Semantic IDs for random IDs in OneRec? What breaks?</>}
      />

      {/* E1b */}
      <VIS.TrapProblem
        id="onerec-e1b"
        difficulty="hard"
        title="E1b — Hourly user-vector cache staleness"
        scenario={<>You cache user vectors hourly for OneRec serving. What's the staleness impact?</>}
        options={[
          {key:"a", text:"No impact — OneRec's encoder is robust to one-hour history gaps because long histories dominate the user vector and the recent hour contributes only marginally."},
          {key:"b", text:"User vectors are deterministic functions of history; the cache is always exactly correct for the history it was built from, so 'staleness' isn't a meaningful concept here."},
          {key:"c", text:"Items the user just interacted with don't appear in the cached vector; OneRec recommends as if those interactions didn't happen — including re-recommending items just consumed. Mitigation: append fresh interactions at decode time.", correct:true},
          {key:"d", text:"Latency goes up — the encoder runs anyway on cache miss, so the cache provides no win and the staleness question is moot; remove the cache entirely."},
        ]}
        trap={<>(a), (b), (d) miss the actual harm — re-recommending just-consumed items.</>}
        lens={<>Cache freshness vs serving latency is a classic OneRec tradeoff. The mitigation (append-fresh) recovers most of the gap cheaply.</>}
        stretch={<>What's the right cache refresh cadence?</>}
      />

      {/* C2b */}
      <VIS.TrapProblem
        id="onerec-c2b"
        difficulty="hard"
        title="C2b — DPO's KL constraint with weight too small"
        scenario={<>DPO contains an implicit KL constraint between the trained policy and the SFT prior. What happens if you make the KL weight too small?</>}
        options={[
          {key:"a", text:"Training accelerates because the optimizer no longer fights a constraint; convergence is faster and output quality is unchanged from properly-tuned runs."},
          {key:"b", text:"No impact — the KL term contributes a vanishing fraction of the loss at modern batch sizes, so its weight rarely matters in practice for OneRec."},
          {key:"c", text:"The policy becomes more accurate because the SFT prior was a soft regularizer and removing it lets the optimizer find a better optimum on watch-time reward."},
          {key:"d", text:"Policy diverges arbitrarily from the SFT prior chasing reward → reward hacking (degenerate lists); offline preference-AUC looks great while online watch-time crashes.", correct:true},
        ]}
        trap={<>(a), (b), (c) all over-trust the optimizer in the absence of the KL safety belt.</>}
        lens={<>The KL constraint is the safety belt. Reward hacking is the canonical sign of constraint too loose.</>}
        stretch={<>How would you tune the KL weight?</>}
      />

      {/* D4b. Replace Random/GPU/Bug strawmen */}
      <VIS.TrapProblem
        id="onerec-d4b"
        difficulty="hard"
        title="D4b — Watch-time up 1.6% but novelty drops 20%"
        scenario={<>OneRec ships. Watch-time up 1.6%. But novelty (unique items shown per user per day) drops 20%. Diagnose.</>}
        options={[
          {key:"a", text:<>DPO over watch-time concentrates policy on a smaller set of high-watch-time items (<VIS.Term def="Recommender concentrates each user on a narrow slice of content over time, suppressing exposure to other relevant items.">filter bubble</VIS.Term>); per-item watch-time wins but variety drops. Fix: multi-objective reward (watch-time + novelty) or downstream diversification reranker.</>, correct:true},
          {key:"b", text:"Novelty drop is a measurement artifact — the metric is computed on impression logs that lag by a day; the real novelty number will recover by tomorrow without intervention."},
          {key:"c", text:"Decoder temperature was lowered for the launch to keep p99 latency in budget; raising it back restores novelty without touching DPO or the reward model."},
          {key:"d", text:"Cold-start users dominate the affected slice; their lists are correctly narrow until enough history accumulates, so novelty will rise with usage and no fix is needed."},
        ]}
        trap={<>(b), (c), (d) all explain away the drop with secondary causes; the OneRec-specific mechanism is reward-shape filter bubble from DPO.</>}
        lens={<>OneRec optimizes whatever the reward says. Reward = watch-time alone → narrow recommendations. Multi-objective reward is the production move.</>}
        stretch={<>What weights would you give watch-time vs novelty?</>}
      />

      {/* F4b */}
      <VIS.TrapProblem
        id="onerec-f4b"
        difficulty="medium"
        title="F4b — V2 Lazy Decoder-Only sacrifices"
        scenario={<>Lazy Decoder-Only cuts compute 94% from V1. What does it sacrifice?</>}
        options={[
          {key:"a", text:"It sacrifices nothing measurable — the V2 paper reports identical quality and lower cost, so Lazy Decoder-Only is a strict Pareto improvement at all surfaces."},
          {key:"b", text:"Some cross-attention expressiveness — cross-attention runs only at some layers/steps; for very long histories with strong recent-history dependence quality can drop vs full cross-attention.", correct:true},
          {key:"c", text:"Latency at p99 increases under load because lazy attention requires a scheduling layer that adds overhead; compute drops but tail latency rises."},
          {key:"d", text:"Memory footprint grows — the lazy scheduler caches summaries across decode steps, so V2 uses more HBM than V1 at the same batch size."},
        ]}
        trap={<>(a) is the marketing reading; (c), (d) are improved, not sacrificed.</>}
        lens={<>Lazy attention is an approximation. The paper validates the trade empirically, but for surfaces where the assumption breaks, a hybrid (lazy + full attention at key layers) is the move.</>}
        stretch={<>Which layer would you mark as 'always full attention'?</>}
      />

      {/* C5b */}
      <VIS.TrapProblem
        id="onerec-c5b"
        difficulty="hard"
        title="C5b — Adding completion-rate alongside watch-time"
        scenario={<>You want OneRec to predict both watch-time AND completion-rate. How?</>}
        options={[
          {key:"a", text:"Train two separate OneRec models — one per objective — and serve both in parallel; aggregate their lists via a downstream merger at request time."},
          {key:"b", text:"Pick the single most important objective (watch-time) and accept that completion-rate trails it; multi-objective OneRec is not practical at production scale."},
          {key:"c", text:"Multi-objective reward model: train two reward heads (watch-time, completion-rate), combine via weighted sum or Pareto frontier; DPO then optimizes the combined objective. The OneRec backbone is unchanged.", correct:true},
          {key:"d", text:"Revert to a cascade where retrieval optimizes watch-time and ranking optimizes completion-rate; this gives clean per-objective optimization that OneRec can't match."},
        ]}
        trap={<>(a) doubles serving cost; (b) gives up; (d) abandons OneRec — none uses the reward-head extension point.</>}
        lens={<>OneRec's flexibility comes from the reward-model layer. Adding objectives = adding reward heads, not retraining the backbone.</>}
        stretch={<>How would you tune the weighting?</>}
      />

      {/* A5b */}
      <VIS.TrapProblem
        id="onerec-a5b"
        difficulty="hard"
        title="A5b — Breaking-news surface with sub-minute item staleness"
        scenario={<>You're recommending news on a breaking-news surface. Items go stale within minutes. Does OneRec work?</>}
        options={[
          {key:"a", text:"Works well — OneRec's encoder generalizes to unseen items via Semantic-ID composition, so breaking-news items get reasonable scores from day one."},
          {key:"b", text:"Just retrain hourly — the model size allows a fresh OneRec snapshot every hour, so the reward landscape always tracks breaking-news watch-time within an hour of arrival."},
          {key:"c", text:"OneRec is faster than the cascade at serving, so even with stale rewards it wins on aggregate throughput; breaking-news freshness is a serving-layer concern, not a model one."},
          {key:"d", text:"Poorly — OneRec relies on a reward model fit on historical watch-time, and breaking news has no history; cached user vectors also lag breaking-news interest. Cascade with content-fresh retrieval + light scoring fits better.", correct:true},
        ]}
        trap={<>(a), (b), (c) over-trust generalization, retraining cadence, or serving speed; the real mismatch is the training-cadence-vs-freshness gap.</>}
        lens={<>OneRec is a long-cycle architecture (train on historical, deploy daily). Sub-second freshness mismatches the training cadence.</>}
        stretch={<>Could you train a 'breaking-news-only' OneRec on hourly data?</>}
      />

      {/* E5b */}
      <VIS.TrapProblem
        id="onerec-e5b"
        difficulty="hard"
        title="E5b — Estimating OneRec's gain on your team's cascade"
        scenario={<>Your team's cascade differs from Kuaishou's. How do you estimate OneRec's expected gain for your surface?</>}
        options={[
          {key:"a", text:"Run an offline simulation: predict watch-time under OneRec-style list decode vs your current cascade's predicted list on a held-out historical week; gain depends on your cascade's per-stage efficiency.", correct:true},
          {key:"b", text:"Trust the paper's headline 1.6% gain — Kuaishou's reporting is rigorous and the number is directly transferable to any platform that ships a OneRec implementation."},
          {key:"c", text:"Skip estimation and go straight to A/B — production traffic is the only honest answer, and the cost of a 1-week test is lower than the cost of building a simulator."},
          {key:"d", text:"Use the paper's 10.6% cost number as the only metric — quality gain follows automatically once cost is matched, so cost-parity is sufficient evidence to launch."},
        ]}
        trap={<>(b), (d) over-trust the paper; (c) burns a real-traffic experiment for an unknown gain.</>}
        lens={<>Paper gains are platform-specific. Offline simulation is the right way to estimate.</>}
        stretch={<>What's the cheap-and-imperfect proxy if simulation is too expensive?</>}
      />

      {/* D1c */}
      <VIS.TrapProblem
        id="onerec-d1c"
        difficulty="medium"
        title="D1c — 'The cascade is dead' — single best counter"
        scenario={<>A blog declares the cascade dead post-OneRec. Defeat the claim with a single counter.</>}
        options={[
          {key:"a", text:"OneRec is just hype — the Kuaishou paper hasn't reproduced outside one platform and the cascade remains the default until peer review confirms wider gains."},
          {key:"b", text:"Cascade still wins on multi-team surfaces (different teams own different stages, different objectives), regulatory surfaces (per-stage audit), and ads surfaces (per-stage calibration).", correct:true},
          {key:"c", text:"Cascade is materially faster at p99 because each stage is a small model; OneRec's list decode dominates latency budgets in every realistic deployment."},
          {key:"d", text:"OneRec and cascade are identical at convergence — both encode the same item-user joint distribution, so the architectural choice is purely an engineering preference."},
        ]}
        trap={<>(a) dismisses too cheaply, (c) over-claims latency, (d) is false at convergence.</>}
        lens={<>OneRec is the right architecture for certain surfaces. Cascade survives where its modularity has real value.</>}
        stretch={<>Will hybrids (OneRec inside cascade) be the steady state?</>}
      />

      {/* E3b. Replace 'Random.' strawman */}
      <VIS.TrapProblem
        id="onerec-e3b"
        difficulty="hard"
        title="E3b — Reward model trained 30 days ago, distribution shifted"
        scenario={<>Your reward model was trained 30 days ago. Watch-time distribution has shifted. What's the OneRec-specific consequence?</>}
        options={[
          {key:"a", text:"No impact — the reward model encodes user preferences which are stable on month-long timescales; distribution shift on the impression side doesn't move the reward landscape."},
          {key:"b", text:"User-vector caches absorb the shift gracefully through hourly refresh, so even a stale reward keeps the policy aligned with current behavior."},
          {key:"c", text:"DPO is optimizing against an outdated reward landscape; gains evaporate; offline preference-AUC may climb (vs the old reward) while online watch-time drops. Refresh reward on rolling-30-day data.", correct:true},
          {key:"d", text:"Run more DPO iterations to compensate — more iterations on the same reward give the policy more chances to find current-good items even with an old reward model."},
        ]}
        trap={<>(a), (b), (d) all under-estimate the silent killer; (d) actually makes it worse.</>}
        lens={<>Reward model staleness is OneRec's silent killer. Refresh cadence policy is a critical part of the production runbook.</>}
        stretch={<>What's the right reward-model refresh cadence?</>}
      />

      {/* C3b */}
      <VIS.TrapProblem
        id="onerec-c3b"
        difficulty="hard"
        title="C3b — OneRec's training signal vs HSTU's"
        scenario={<>Both OneRec and HSTU train on user interactions. What's the actual difference in training signal?</>}
        options={[
          {key:"a", text:"Identical — both use next-action cross-entropy over the action vocabulary, and the difference between OneRec and HSTU is purely the decoder architecture, not the loss."},
          {key:"b", text:"OneRec uses pairwise binary cross-entropy on watch-time-derived labels; HSTU uses listwise softmax over the candidate set, and the training data shape differs."},
          {key:"c", text:"HSTU uses watch-time as the supervised target while OneRec uses next-action cross-entropy; this is the canonical 'HSTU ranks, OneRec retrieves' split at the loss level."},
          {key:"d", text:"HSTU uses next-action CE per event (predict what the user does next); OneRec uses list-wise CE plus iterative DPO with watch-time reward (predict what list maximizes watch-time). Per-event vs per-list-outcome.", correct:true},
        ]}
        trap={<>(a) flattens the loss difference; (b), (c) invent or invert the signal split.</>}
        lens={<>The training-signal difference is the OneRec discriminator. List-wise + outcome-aligned vs token-wise + next-token.</>}
        stretch={<>Could you train HSTU with watch-time DPO?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2502.18965" target="_blank" rel="noopener"><strong>Cai et al. — OneRec paper (Kuaishou 2025)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The original. Focus on sections on DPO + watch-time signal + deployment results.</li>
        <li><a href="https://arxiv.org/abs/2305.18290" target="_blank" rel="noopener"><strong>Rafailov et al. — DPO original</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2023)</span><br/>Direct Preference Optimization foundations. Read before OneRec.</li>
        <li><a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener"><strong>Rajput et al. — TIGER (NeurIPS 2023)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>OneRec uses TIGER's Semantic-ID tokenization.</li>
        <li><a href="https://arxiv.org/abs/2402.17152" target="_blank" rel="noopener"><strong>Zhai et al. — HSTU (ICML 2024)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>Sibling architecture for ranking. OneRec absorbs the ranking step.</li>
        <li><a href="https://eugeneyan.com/writing/recsys-llm/" target="_blank" rel="noopener"><strong>Eugene Yan — Generative recsys landscape</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>OneRec in the broader pipeline-collapse taxonomy.</li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
