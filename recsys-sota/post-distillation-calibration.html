        title="E3 — Implementation specific: training/inference temperature mismatch"
        scenario={<>HuggingFace and other KD trainers have a default that silently breaks calibration if not handled. Name it. <em>Discriminating insight: T applied inside the KL loss during training but NOT applied to inference outputs — the deployed logits are on the un-corrected scale.</em></>}
        options={[
          {key:"a", text:"The distillation temperature is applied during training (logits divided by T inside the KL loss) but the student's inference call returns RAW logits (not divided by T). Many pipelines forget to apply T at inference — the deployed student outputs logits on the wrong scale. Either apply T at inference OR refit Platt on the raw outputs that production actually sees.", correct:true},
          {key:"b", text:"The default temperature is 100."},
          {key:"c", text:"The trainer auto-calibrates."},
          {key:"d", text:"There's no temperature parameter."},
        ]}
        trap={<>(b), (c), (d) are false.</>}
        lens={<>The training-vs-inference T mismatch is the most common silent bug in distillation pipelines. The fix is mechanically trivial (apply T consistently OR refit the calibrator on what production actually outputs) but the bug survives a year in many teams.</>}
        stretch={<>Which is preferred: apply T at inference, or refit calibrator on raw output? Why?</>}
      />

      <VIS.TrapProblem
        id="pdc-e4"
        difficulty="hard"
        mode="ordered"
        title="E4 — Distillation deploy rollout order"
        scenario={<>Phases: (a) train student via KD, (b) refit Platt on held-out student outputs, (c) shadow-score (no serve), (d) mirror auction (both teacher and student score; teacher serves), (e) traffic ramp, (f) retire teacher. Order them. <em>Discriminating insight: Platt refit MUST come before shadow scoring — otherwise the shadow numbers are uncalibrated and meaningless.</em></>}
        options={[
          {key:"a", text:"Train student via KD.", order:1},
          {key:"b", text:"Refit Platt on held-out student outputs.", order:2},
          {key:"c", text:"Shadow-score student (no serve).", order:3},
          {key:"d", text:"Mirror auction (both score; teacher serves).", order:4},
          {key:"e", text:"Traffic ramp.", order:5},
          {key:"f", text:"Retire teacher.", order:6},
          {key:"g", text:"Skip the refit; ship and refit if alerts fire."},
        ]}
        trap={<>(g) is the time-pressure mistake. Many teams skip the refit until ramp; mirror auction numbers are then garbage.</>}
        lens={<>Calibrator refit is upstream of every comparison step. Without it, shadow scoring and mirror auction comparisons are not apples-to-apples.</>}
        stretch={<>If mirror auction shows the student under-bidding even AFTER the refit, what's the next step?</>}
      />

      <VIS.TrapProblem
        id="pdc-e5"
        difficulty="hard"
        title="E5 — Reproducibility: can't replicate the OpenReview KD survey ECE claim"
        scenario={<>The OpenReview 2024 KD survey claims 'ECE drops from 3% to 0.4% after post-distill refit.' You see 3% to 1.2%. Which experimental property must match? <em>Discriminating insight: temperature, student/teacher size ratio, and held-out distribution — the gap is dominated by these, not by the calibrator family.</em></>}
        multiSelect
        options={[
          {key:"a", text:"Distillation temperature T — the survey's T may be larger than yours, amplifying the scale shift and the refit's headroom.", correct:true},
          {key:"b", text:"Student-to-teacher parameter ratio — smaller ratio means larger capacity-induced miscalibration.", correct:true},
          {key:"c", text:"Held-out set's segment composition — if their held-out is from a high-traffic segment, the refit is more effective.", correct:true},
          {key:"d", text:"Random seed."},
          {key:"e", text:"GPU vendor."},
        ]}
        trap={<>(d), (e) are irrelevant.</>}
        lens={<>Distillation benchmarks rarely transfer because T, size ratio, and held-out properties are usually unpublished. Treat survey numbers as upper bounds on your own.</>}
        stretch={<>How would you design a transferable benchmark for post-distill calibration?</>}
      />

      <VIS.TrapProblem
        id="pdc-e6"
        difficulty="hard"
        title="E6 — Monitoring for post-distill staleness"
        scenario={<>Pick the leading indicator that catches stale post-distill calibration fastest. <em>Discriminating insight: student logit distribution KL vs the refit-time distribution — catches it BEFORE the realized labels show up.</em></>}
        options={[
          {key:"a", text:"KL divergence between today's student logit distribution and the distribution at refit time. If KL exceeds a threshold, the student has drifted from the calibrator's fit region; refit before ECE shows up on the dashboard.", correct:true},
          {key:"b", text:"Daily marginal ECE."},
          {key:"c", text:"Weekly Brier."},
          {key:"d", text:"Volume of clicks."},
        ]}
        trap={<>(b), (c) lag by hours-to-days. (d) is downstream.</>}
        lens={<>Monitor the CAUSE (student distribution shift) not the EFFECT (ECE on labels). KL on logits is the canonical leading indicator. This is a distillation-specific extension of the general "monitor inputs not labels" senior heuristic.</>}
        stretch={<>What's a good KL threshold? How would you calibrate it?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      <VIS.TrapProblem
        id="pdc-f1"
        difficulty="hard"
        title="F1 — Edge case: distilling with very small held-out set"
        scenario={<>Your held-out set has 500 positives. Refit Platt — what specific failure mode kicks in? <em>Discriminating insight: Platt's MLE on small N over-confidences extreme probabilities — exactly the tails where distillation already broke things.</em></>}
        options={[
          {key:"a", text:"Small-N Platt MLE over-confidences extreme probabilities (a known property of Platt; the original 1999 paper introduces Laplace smoothing for this reason). The distilled student already has tail miscalibration; small-N refit amplifies it. Use Platt with Laplace smoothing OR isotonic with a Bayesian prior.", correct:true},
          {key:"b", text:"Nothing — Platt is robust at small N."},
          {key:"c", text:"Isotonic always wins at small N."},
          {key:"d", text:"Calibration is impossible below 1k."},
        ]}
        trap={<>(b) is false. (c) inverts. (d) overgeneralizes.</>}
        lens={<>Platt's small-N pathology stacks with distillation's tail damage. Senior MLEs reach for Laplace-smoothed Platt OR Bayesian isotonic when held-out is small. This is THE concrete case where 'just use isotonic' is wrong.</>}
        stretch={<>What's the Laplace smoothing target value, and how is it derived?</>}
      />

      <VIS.TrapProblem
        id="pdc-f2"
        difficulty="hard"
        title="F2 — Adversarial: attack that breaks distilled calibration specifically"
        scenario={<>Design an attack on the calibration set that degrades the distilled student more than it would degrade the teacher's calibration. <em>Discriminating insight: inject high-score items into the held-out — the student's narrower tails get pooled aggressively by isotonic, far more than the teacher's broader tails would.</em></>}
        options={[
          {key:"a", text:"Inject a small number of high-score positive examples into the post-distill held-out set. The student's narrower-tailed logit distribution means isotonic's pool-adjacent-violators step collapses a large fraction of the student's top decile into a single calibrated value — far more aggressive than the same attack on the teacher's wider tails.", correct:true},
          {key:"b", text:"Random noise to the held-out."},
          {key:"c", text:"Empty held-out set."},
          {key:"d", text:"Wrong labels."},
        ]}
        trap={<>(b), (c), (d) hurt every calibrator equally. The asymmetric vulnerability is the student's narrower tails.</>}
        lens={<>Narrower student tails make the student MORE vulnerable to the same data-poisoning attack. Distillation doesn't just shift calibration — it changes the attack surface.</>}
        stretch={<>What monitor would catch this attack faster than a reliability diagram?</>}
      />

      <VIS.TrapProblem
        id="pdc-f3"
        difficulty="hard"
        title="F3 — Reverse engineering: student is wildly miscalibrated despite fresh refit"
        scenario={<>Symptom: refit Platt on fresh held-out student outputs, ECE is still 4%. Marginal reliability looks flat after refit, but per-decile reliability is wildly off. Which distillation-specific cause? <em>Discriminating insight: the student's logit distribution has become bimodal due to the small capacity + the teacher's two-cluster structure — Platt's sigmoid cannot fit bimodal targets.</em></>}
        options={[
          {key:"a", text:"The student's capacity loss collapsed the teacher's nuanced logit distribution into a bimodal one. Platt's sigmoid family cannot fit a bimodal score-vs-probability curve — the marginal looks flat (averaging over the bimodality) but per-decile is broken. Switch to isotonic OR refit a two-piece sigmoid.", correct:true},
          {key:"b", text:"Refit needs more data."},
          {key:"c", text:"Distillation always fails."},
          {key:"d", text:"GPU bug."},
        ]}
        trap={<>(b) over-attributes to data. (c), (d) are wrong.</>}
        lens={<>Distillation can change the SHAPE of the score-vs-probability curve, not just its scale. When shape changes, the calibrator FAMILY may need to change too. Senior insight: don't just refit Platt — verify Platt is still the right family for the student.</>}
        stretch={<>How would you detect bimodality in the student's score-vs-prob curve before refitting?</>}
      />

      <VIS.TrapProblem
        id="pdc-f4"
        difficulty="hard"
        title="F4 — Paper-named failure: 'temperature mismatch at inference'"
        scenario={<>The OpenReview 2024 KD survey calls out a specific failure mode: temperature applied during training, NOT applied at inference. What's the symptom, and why is this distillation-specific? <em>Discriminating insight: the student's deployed logits are T*scaled relative to where the KL loss expected them — the calibrator fit on training-side outputs is wrong for inference-side outputs.</em></>}
        options={[
          {key:"a", text:"Training divides logits by T inside the KL loss; inference does not. The deployed student's logits are therefore on a scale T-times-larger than the training-time calibration set saw. The calibrator is systematically wrong by a factor proportional to T. Fix: refit on the inference-time output distribution, OR apply T at inference and refit on the corrected scale.", correct:true},
          {key:"b", text:"Temperature mismatch is unrelated to calibration."},
          {key:"c", text:"This is a general ML bug."},
          {key:"d", text:"It only affects very large T."},
        ]}
        trap={<>(b), (c), (d) miss the specific mechanism.</>}
        lens={<>This is the most common production bug in distillation — and it's named in the survey precisely because every team rediscovers it independently. Refit on what production actually outputs.</>}
        stretch={<>If you must apply T at inference for some other reason (e.g., to match a downstream API), how does the refit change?</>}
      />

      <VIS.TrapProblem
        id="pdc-f5"
        difficulty="hard"
        title="F5 — Community-found: 'self-distillation' and calibration"
        scenario={<>A 2024 follow-up paper claims self-distillation (student equals teacher size) STILL needs post-hoc calibration refit. Why, given there's no capacity shift? <em>Discriminating insight: even at identical size, the temperature softening and KL gradient bias the student's logit operating point away from the teacher's.</em></>}
        options={[
          {key:"a", text:"Self-distillation still uses T larger than 1 KL targets, which shifts the student's logit operating point even though architecture is identical. The student converges to a different local optimum than the teacher (one that better matches softmax(teacher/T), not teacher) — and that optimum has a different logit distribution.", correct:true},
          {key:"b", text:"Self-distillation is a no-op."},
          {key:"c", text:"Calibration is preserved at same size."},
          {key:"d", text:"This claim is wrong; refit isn't needed."},
        ]}
        trap={<>(b), (c), (d) miss the temperature-as-scale-mover insight.</>}
        lens={<>Capacity is one cause of scale shift; temperature is another. Even with capacity fixed, temperature alone forces a calibration refit. This rules out 'just match sizes' as a workaround.</>}
        stretch={<>Could you avoid the refit by setting T=1 for self-distillation? Would the distillation still provide its claimed benefit?</>}
      />

      <VIS.TrapProblem
        id="pdc-f6"
        difficulty="hard"
        title="F6 — Multi-objective: refit calibration on which head?"
        scenario={<>Teacher has 3 heads (P(click), P(watch beyond 30s), P(share)) with per-head Platts. Distill into a multi-head student. Refit policy? <em>Discriminating insight: each head's logit distribution shifts independently — must refit each Platt separately on the student's head outputs.</em></>}
        options={[
          {key:"a", text:"Each head's logit distribution shifts independently under distillation (different temperatures may apply per-head, different KL weights, different label sparsities). Refit a separate Platt per head on the student's outputs. Do NOT share calibrator parameters across heads.", correct:true},
          {key:"b", text:"Share one calibrator across heads."},
          {key:"c", text:"Refit only the click head."},
          {key:"d", text:"Recombine, then calibrate the sum."},
        ]}
        trap={<>(b) under-fits. (c) ignores other heads. (d) is the multi-objective gotcha from the sibling visual — wrong here because each head is consumed separately, not summed.</>}
        lens={<>Per-head independence after distillation. The multi-objective gotcha (composed calibration is not calibrated composition) is orthogonal — this is just about preserving each head's individual calibration.</>}
        stretch={<>If consumers DO use weighted-sum across heads, does (d) become right? Sketch the right architecture.</>}
      />

      <VIS.TrapProblem
        id="pdc-f7"
        difficulty="hard"
        title="F7 — Silent regression: refit succeeded offline, fails online"
        scenario={<>Offline: refit Platt, ECE drops from 3% to 0.4%. Online: ECE stays at 2.5%. Why? <em>Discriminating insight: held-out is offline-logged (biased by teacher's policy); online traffic is served by student (different distribution); refit calibrated to the wrong distribution.</em></>}
        options={[
          {key:"a", text:"The held-out set was logged when the teacher was serving — it represents the teacher's served distribution. After the student deploys, the online distribution shifts (different items get scored, different rank positions are realized). The refit Platt is calibrated for the teacher's served distribution, not the student's. Fix: refit on a reserved exploration slice OR IPS-weight the refit.", correct:true},
          {key:"b", text:"Online ECE is always higher than offline."},
          {key:"c", text:"Platt is wrong; switch to isotonic."},
          {key:"d", text:"More data."},
        ]}
        trap={<>(b) is the seductive folk belief. (c), (d) misdiagnose.</>}
        lens={<>Offline-online gap in calibration tracking is a logged-data selection-bias problem stacked on top of the distillation problem. Both need addressing: refit on a fresh slice AND ideally from an exploration policy.</>}
        stretch={<>How much exploration traffic do you need? Order of magnitude per segment.</>}
      />

      <VIS.TrapProblem
        id="pdc-f8"
        difficulty="hard"
        title="F8 — Conformal-prediction interplay"
        scenario={<>You add a conformal layer on top of the refit Platt for risk-aware bidding. After the next distillation, the conformal coverage drops from 90% to 78%. Why? <em>Discriminating insight: the conformal nonconformity scores are computed against the student's predictions; new student = new score distribution = stale conformal quantile.</em></>}
        options={[
          {key:"a", text:"Conformal's coverage quantile is computed over the calibration set's nonconformity scores. Those scores depend on the student's outputs. A new student produces new nonconformity scores; the old quantile is at the wrong percentile. Re-compute the conformal quantile on the new student's held-out outputs every time you distill.", correct:true},
          {key:"b", text:"Conformal is distribution-free; coverage cannot drop."},
          {key:"c", text:"This is a Platt problem, not conformal."},
          {key:"d", text:"Coverage drift is random."},
        ]}
        trap={<>(b) is the distribution-free misreading from sibling A4. (c), (d) misdiagnose.</>}
        lens={<>Distribution-free does not mean refit-free. Every model change is a calibration event for every calibration layer in the stack — Platt, isotonic, conformal.</>}
        stretch={<>What's the cheapest single refit pass that handles both Platt and conformal in one shot?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://openreview.net/pdf?id=3cbJzdR78B" target="_blank" rel="noopener"><strong>A Comprehensive Survey on Knowledge Distillation</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(OpenReview 2024)</span>
          <br/>The canonical reference; names the temperature-mismatch failure mode and the post-hoc refit recipe.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1503.02531" target="_blank" rel="noopener"><strong>Hinton, Vinyals, Dean — Distilling the Knowledge in a Neural Network</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2014 workshop)</span>
          <br/>Origin paper; introduces the temperature-scaled KL loss whose scale shift is the root cause of post-distill miscalibration.
        </li>
        <li>
          <a href="https://eugeneyan.com/writing/system-design-for-discovery/" target="_blank" rel="noopener"><strong>Eugene Yan — System design for discovery</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog, 2024)</span>
          <br/>Practical lens on where post-hoc calibration sits in a production recsys stack.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
