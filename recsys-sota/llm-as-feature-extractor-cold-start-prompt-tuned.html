  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// LLM as feature extractor — cold-start meta-learned prompt tuning.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Cold-start LLM personalization"
      title="LLM-as-feature-extractor with meta-learned soft prompts"
      subtitle="Per-user soft prompt embeddings adapted by Reptile/MAML — cold-start personalization in a few gradient steps."
      byline={[
        {label: "Paper", value: "Wei et al., arXiv 2507.16672 (2025)"},
        {label: "Tooling", value: "Reptile / MAML on a frozen LLM"},
      ]}/>

    <VIS.TLDR>
      Per-user fine-tuning of a 7B+ LLM is cost-prohibitive; vanilla prompting gives no real personalization.
      <strong>Meta-learned soft prompts</strong> split the difference: learn an initialization for a small (e.g. 100-token) prompt embedding such that
      a few gradient steps on a new user's signals adapt it to that user. The LLM stays frozen; only the user-prompt embedding moves.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        The setup: each <strong>user</strong> is treated as a <VIS.Term def="A single instance of the kind of problem you want to learn to solve quickly. In meta-learning, you have many tasks; the goal is to learn an initialization that adapts well to a new task after only a few gradient steps.">meta-learning task</VIS.Term>. The features attached to a user (questionnaire answers, browsing history, profile attributes) are the per-task data. The model is a frozen LLM; the learnable piece is a small soft-prompt embedding (e.g. 100 tokens × 4096-dim = 400K params) that is PREPENDED to every prompt the LLM sees for that user.
      </p>
      <p>
        The <VIS.Term def="A meta-learning algorithm (Nichol et al. 2018, OpenAI). Like MAML but skips second-order derivatives: train on each task for k inner steps, then move the initialization toward the trained weights. Cheaper than MAML, often comparable quality.">Reptile</VIS.Term> / <VIS.Term def="Model-Agnostic Meta-Learning (Finn et al. 2017). Optimizes an initialization such that one or a few gradient steps on a new task give good performance — requires second-order derivatives through the inner loop.">MAML</VIS.Term> meta-objective: find a soft-prompt initialization θ* such that for any new user, K gradient steps on their few signals produce a personalized prompt that the LLM uses to score items well.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  THETA["Meta-learned soft-prompt init"]
  THETA --> USER["Per-user signals<br/>(questionnaire, profile)"]
  USER --> ADAPT["K gradient steps"]
  ADAPT --> PERS["Personalized soft prompt"]
  PERS --> LLM["Frozen LLM"]
  ITEM["Item candidates"] --> LLM
  LLM --> SCORE["Per-user item scores"]
  style THETA fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style LLM fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `} />
    </VIS.Section>

    <VIS.Section id="sec-differs" title="How it differs">
      <table style={{width: "100%", borderCollapse: "collapse", fontSize: 14}}>
        <thead><tr style={{background: "#1f3a5f", color: "white"}}>
          <th style={{padding: 8, textAlign: "left"}}>Approach</th>
          <th style={{padding: 8, textAlign: "left"}}>Per-user cost</th>
          <th style={{padding: 8, textAlign: "left"}}>Personalization quality</th>
          <th style={{padding: 8, textAlign: "left"}}>Cold-start friendly?</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding: 8}}>Per-user LLM fine-tune</td><td style={{padding: 8}}>$$ ($100s)</td><td style={{padding: 8}}>excellent</td><td style={{padding: 8}}>no (needs data)</td></tr>
          <tr style={{background: "#e8f0fa"}}><td style={{padding: 8}}>Vanilla prompting</td><td style={{padding: 8}}>~free</td><td style={{padding: 8}}>none</td><td style={{padding: 8}}>yes (degenerate)</td></tr>
          <tr><td style={{padding: 8}}>RAG with user history</td><td style={{padding: 8}}>~free</td><td style={{padding: 8}}>limited by retrieval</td><td style={{padding: 8}}>weak — needs history</td></tr>
          <tr style={{background: "#e8f0fa"}}><td style={{padding: 8}}><strong>Meta-learned soft prompt</strong></td><td style={{padding: 8}}><strong>$ (K grad steps, ~ms)</strong></td><td style={{padding: 8}}><strong>per-user calibrated</strong></td><td style={{padding: 8}}><strong>YES — works on questionnaire alone</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick this">
      <ul>
        <li><strong>Cold-start with structured signals.</strong> Onboarding questionnaires, profile attributes, demographic forms — small but informative per-user data.</li>
        <li><strong>Hundreds of thousands of users at minimum.</strong> Meta-learning needs MANY tasks (users) to learn a good initialization.</li>
        <li><strong>Latency budget can afford K inner-loop steps.</strong> Typically K=5-10, fitting in tens of ms on a single GPU; not viable on CPU.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations">
      <VIS.Callout kind="gotcha" title="LLM stays full-size at serving">
        Soft prompts are small (~MB) but the underlying LLM (~7B-70B params) still runs at every request. Personalization cost is the inner-loop steps, not the prompt size.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Meta-overfitting to user-task distribution">
        If your meta-training users are heavily skewed (e.g. urban, English-speaking, age 25-40), the meta-initialization adapts WELL on similar users and POORLY on different ones — a quiet population-fairness failure.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Reptile/MAML training is finicky">
        Inner-loop LR, K (number of inner steps), and outer-loop interpolation rate all need tuning. Small misconfig → init memorizes one prototype user instead of generalizing.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-problems" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>Twelve senior-MLE prompts on meta-learned soft prompts vs RAG, fine-tuning, and adapter approaches for cold-start.</p>

      <VIS.TrapProblem
        id="metaprompt-p1"
        difficulty="hard"
        title="P1 — Meta-learned soft prompts vs RAG-personalized prompting: when does each fail catastrophically?"
        scenario={<>You're choosing between (A) meta-learned soft prompts, K=5 inner steps, on user questionnaire (10-20 items), and (B) RAG with user history retrieved at prompt time (top-5 most similar past interactions). Both target cold-start personalization. Identify the failure mode that hits each approach hardest.</>}
        options={[
          {key:"a", text:"Meta-learned soft prompts fail catastrophically when the meta-training user distribution is heavily skewed and a new user falls outside the support of that distribution; RAG fails when the user has no relevant history to retrieve (the literal cold-start case).", correct:true},
          {key:"b", text:"Both fail identically — same data signal, same architecture."},
          {key:"c", text:"Meta-learned soft prompts fail when inner-loop LR is wrong; RAG fails when the LLM is too small."},
          {key:"d", text:"Meta-learned soft prompts fail when user history is large; RAG fails when it's small."},
        ]}
        trap={<>(b) ignores that the two approaches have orthogonal failure modes. (c) is a generic tuning answer. (d) reverses the dependency — meta-learning works fine on small data and RAG works fine on LARGE data.</>}
        lens={<>The failure modes are complementary. Meta-learning ASSUMES the meta-training distribution covers the test-time user — outside it, the initialization is no longer a good starting point. RAG ASSUMES the user has interactions to retrieve — without any, RAG degrades to popularity-based generic prompts. In TRUE cold-start (a user with zero history) meta-learning wins because questionnaire signals still give it adaptation gradient; RAG has nothing to retrieve.</>}
        stretch={<>If a user gives a questionnaire AND has 50 prior interactions, which approach wins?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Reptile vs MAML — what to pick when?"
        scenario={<>You're implementing the meta-learning algorithm. Pick all statements that are CORRECT about Reptile vs MAML in this context.</>}
        options={[
          {key:"a", text:"MAML requires second-order derivatives through the inner loop; Reptile only uses first-order updates and is significantly cheaper.", correct:true},
          {key:"b", text:"Reptile typically matches MAML's quality on practical tasks at lower compute cost.", correct:true},
          {key:"c", text:"MAML always produces better initializations than Reptile."},
          {key:"d", text:"Reptile's outer-loop update is: θ ← θ + ε(θ' - θ), where θ' is the K-step trained weights — a moving average toward task-trained weights.", correct:true},
          {key:"e", text:"MAML's inner loop must use SGD; Reptile can use Adam."},
        ]}
        trap={<>(c) is the textbook overstatement of MAML's advantage — Nichol et al. (Reptile paper) showed they're comparable in practice. (e) is just wrong; both algorithms are agnostic to inner-loop optimizer choice (though SGD is the common default).</>}
        lens={<>For LLM soft-prompt meta-learning, Reptile is the practical default because (a) you cannot afford MAML's second-order memory for the 400K-parameter prompt × K inner-loop steps × full LLM forward pass, and (b) Reptile's quality is comparable on a wide range of tasks per the original Reptile paper.</>}
        stretch={<>If you have unlimited memory and time, does MAML reliably beat Reptile?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p3"
        difficulty="hard"
        title="P3 — Inner-loop K: 1, 5, or 50?"
        scenario={<>You're sweeping the number of inner-loop adaptation steps K. K=1: under-adapts, indistinguishable from no personalization. K=50: per-user latency 500ms, plus the soft prompt drifts away from the meta-init and forgets generalization. K=5: 50ms per-user, clear lift over baseline. What's the principle at play?</>}
        options={[
          {key:"a", text:"K should always be 1 — single-step is optimal."},
          {key:"b", text:"K balances adaptation depth (need enough to specialize to user) against generalization (too many steps over-fits to user-specific noise + drifts past the meta-init's basin). The sweet spot is workload-specific but typically 3-10.", correct:true},
          {key:"c", text:"K should always be 50 — more steps = better."},
          {key:"d", text:"K is irrelevant — only the meta-init matters."},
        ]}
        trap={<>(a) and (c) are extremes. (d) is wrong — adaptation is the entire point.</>}
        lens={<>The K-sweep U-curve is the meta-learning version of the bias-variance tradeoff. Too few inner steps = no personalization (high bias). Too many = overfit to user-specific noise + you've left the basin of generalization the meta-init established (high variance). Production setups typically pick K=3-10 based on a held-out personalization benchmark.</>}
        stretch={<>If user signals are NOISY (e.g. accidental clicks), does the optimal K go up or down?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p4"
        difficulty="medium"
        title="P4 — Soft prompt size: 10 tokens or 1000?"
        scenario={<>You're sizing the soft prompt. Tradeoff: more tokens give more capacity but also more parameters to adapt in K steps. What's the typical production sweet spot for a LLaMA-7B-style backbone?</>}
        options={[
          {key:"a", text:"10 tokens — minimal overhead."},
          {key:"b", text:"100 tokens (~400K params for hidden=4096) — enough capacity, fast inner loop, fits comfortably in K=5 adaptation budget.", correct:true},
          {key:"c", text:"1000 tokens — maximize capacity."},
          {key:"d", text:"Same size as the user's signals (10-20 tokens)."},
        ]}
        trap={<>(a) under-specifies. (c) blows up the inner-loop cost AND requires more data than the user has to meaningfully adapt 4M params. (d) is a non-principled heuristic.</>}
        lens={<>~100 tokens is the empirical sweet spot in the literature (P-tuning v2, Prompt-Tuning, soft-prompt-recsys variants). It's enough to encode user-level conditioning without becoming a meaningful fine-tuning surface. The 400K params can be moved in K=5 inner steps even from sparse user signals.</>}
        stretch={<>If you wanted to scale soft prompts to user-PER-CONTEXT (different prompt for shopping vs browsing), what changes?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p5"
        difficulty="hard"
        multiSelect
        title="P5 — Meta-overfitting: detect and mitigate"
        scenario={<>Your meta-training set has 500K users, 80% urban-US, 18% other Western, 2% rest. Production launches globally. Within a week, you notice cold-start NDCG@10 is 0.42 for US users but 0.18 for rural-Indian users. Which interventions help? Select all that apply.</>}
        options={[
          {key:"a", text:"Resample the meta-training distribution to be more geographically/demographically balanced.", correct:true},
          {key:"b", text:"Train separate meta-initializations per major region.", correct:true},
          {key:"c", text:"Add a 'region' feature to the soft-prompt input — the meta-learner can condition adaptation on region.", correct:true},
          {key:"d", text:"Increase K for users in under-represented regions.", correct:true},
          {key:"e", text:"Use a bigger LLM — capacity will fix it."},
        ]}
        trap={<>(e) misdiagnoses — the issue is the meta-distribution, not LLM capacity. The four other interventions each address a different dimension of meta-overfitting: data balance, multi-init mixture, conditional adaptation, more steps for underdog cohorts.</>}
        lens={<>Meta-overfit to a skewed task distribution is the dark side of meta-learning. The principled fix is rebalancing the meta-training distribution — but it requires labeled cohort attributes. Multi-region inits and region-conditional adaptation are practical mitigations when full rebalancing isn't feasible.</>}
        stretch={<>If you can't get attribute labels for new-region users, can meta-learning self-correct over time as more new-region users sign up?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p6"
        difficulty="hard"
        title="P6 — User-task definition"
        scenario={<>Your meta-learning setup defines "task = one user." For each user, the support set is their first 10 questionnaire signals and the query set is their next 10. Result: meta-trained init adapts well to known users but a new user's 10 signals produce noisy soft prompts that don't transfer to their next 10. What's the most likely root cause?</>}
        options={[
          {key:"a", text:"K is too small."},
          {key:"b", text:"Support and query come from the SAME 20 signals — both reflect the same noise. At meta-train time the model overfits to whatever predicts query from support inside a fixed-user, NOT to true generalization across users. Use disjoint user splits.", correct:true},
          {key:"c", text:"The LLM is too small."},
          {key:"d", text:"Soft prompt is too small."},
        ]}
        trap={<>(a), (c), (d) are all generic capacity/tuning answers. The real bug is leakage: within-user support and query sets are correlated (same individual = same long-term preferences), so the meta-model learns "predict same-user signals from same-user signals" rather than "generalize to new users."</>}
        lens={<>This is the canonical meta-learning trap on user-tasks. The fix is task-level splits: meta-train on a disjoint set of users from meta-eval. Within a user, support/query can still come from the same individual but the meta-train/meta-eval USER POPULATIONS must be disjoint. Otherwise you measure same-user transfer (easy) instead of cross-user generalization (hard, the real metric).</>}
        stretch={<>How does this generalize to other meta-learning task definitions (e.g. task = one merchant, task = one geography)?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p7"
        difficulty="hard"
        title="P7 — Inference path: when do you run the inner loop?"
        scenario={<>A user logs in. You need recommendations within 100ms. Inner-loop adaptation takes 50ms on GPU. Two architectures: (A) run inner loop on every request, (B) cache the adapted soft prompt per user with TTL. Pick the right tradeoff for a returning user.</>}
        options={[
          {key:"a", text:"Always (A) — fresh adaptation per request."},
          {key:"b", text:"Use (B) for returning users. Adapt on first session, cache the per-user soft prompt (small, ~MB), TTL based on signal freshness (e.g. 24h). Re-adapt when new high-signal events (purchase, dwell-time spike) arrive.", correct:true},
          {key:"c", text:"Always (B) — adapt once and never re-adapt."},
          {key:"d", text:"Skip adaptation for returning users."},
        ]}
        trap={<>(a) wastes 50ms per request. (c) misses real preference changes. (d) loses personalization for repeat users.</>}
        lens={<>The standard pattern is event-driven re-adaptation: cache the adapted soft prompt; re-run the inner loop on signal-changing events (new questionnaire, new purchase) or on a TTL. This amortizes the 50ms adaptation cost across many serving requests while keeping the prompt fresh.</>}
        stretch={<>What's the latency if you needed to adapt on EVERY request (no caching) and you had 1000 QPS per replica?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p8"
        difficulty="medium"
        title="P8 — What does the meta-loss look like?"
        scenario={<>You're implementing Reptile for soft-prompt meta-learning. The per-user inner loop runs K=5 SGD steps on the user's support set. What's the outer-loop update to the meta-initialization θ?</>}
        options={[
          {key:"a", text:"Backprop through the K inner steps (second-order)."},
          {key:"b", text:"θ ← θ + ε · (θ_K - θ), where θ_K is the post-inner-loop weights and ε is the meta-LR. NO second-order derivatives needed.", correct:true},
          {key:"c", text:"Average the K intermediate weights."},
          {key:"d", text:"Reinitialize θ to a random point."},
        ]}
        trap={<>(a) describes MAML, not Reptile. (c) and (d) misunderstand the algorithm.</>}
        lens={<>Reptile's elegance is precisely that the outer-loop update is a moving average toward the task-adapted weights. No second-order math, no expensive memory for K inner-loop activations. The intuition is "find weights that are NEAR good weights for many tasks, on average."</>}
        stretch={<>Why does this converge to a useful initialization rather than just an average of task-specific solutions?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p9"
        difficulty="hard"
        title="P9 — Soft prompts vs adapter layers vs LoRA"
        scenario={<>You're choosing the parameter-efficient personalization mechanism: (a) soft prompts (per-user prompt tokens), (b) adapter MLPs inserted in the LLM, (c) LoRA per-user low-rank updates to attention. Which is most amenable to meta-learning over millions of users?</>}
        options={[
          {key:"a", text:"Soft prompts — smallest per-user state (~MB), easiest to cache, fastest inner loop. Adapter and LoRA per-user state is larger and harder to swap at serving time.", correct:true},
          {key:"b", text:"Adapter MLPs — best capacity."},
          {key:"c", text:"LoRA — best quality."},
          {key:"d", text:"All are equivalent."},
        ]}
        trap={<>(b) and (c) are correct that adapter/LoRA give more capacity, but at scale (millions of users) the per-user state explodes: LoRA per-user might be 50MB; that times 1M users = 50TB to store the personalization layer. Soft prompts at ~MB each scale to billions of users.</>}
        lens={<>Soft prompts win on scale economics: tiny per-user state, fast to swap in/out of the LLM context, fast to adapt in K inner steps. Adapter and LoRA are better when you have FEW personalization targets (e.g. per-team, not per-user) but not when you're scaling to user-level.</>}
        stretch={<>If you only had 10K personalization targets, which would you pick?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p10"
        difficulty="hard"
        multiSelect
        title="P10 — When does this approach NOT work?"
        scenario={<>Identify scenarios where meta-learned soft prompts are NOT the right tool. Select all that apply.</>}
        options={[
          {key:"a", text:"You have only 1000 total users (insufficient meta-training distribution).", correct:true},
          {key:"b", text:"User signals are entirely behavioral logs with no structured component — sequential recommenders generally win here.", correct:true},
          {key:"c", text:"You can't afford a GPU at serving time — the inner-loop requires gradient computation.", correct:true},
          {key:"d", text:"Per-user signals are very few (1-2 features); the adaptation gradient is too weak to move 100-token soft prompts meaningfully.", correct:true},
          {key:"e", text:"You have plenty of users and structured profile signals — the textbook fit."},
        ]}
        trap={<>(e) is the textbook FIT, not a failure mode. The four scenarios that defeat meta-learned soft prompts: too few users (no meta-training), wrong signal type (unstructured behavioral), no GPU at serving, or signals too sparse to drive adaptation.</>}
        lens={<>The honest tool boundary: meta-learned soft prompts shine in the "many users × structured per-user signals × GPU-served" intersection. Outside that, simpler tools (sequential recommenders for behavioral, embedding-based personalization for CPU-served, etc.) win.</>}
        stretch={<>If you have a small user base (~1000 users) but want LLM-based personalization, what's the alternative?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p11"
        difficulty="hard"
        title="P11 — Why not just RAG?"
        scenario={<>A skeptic argues: "Why not just retrieve the user's past interactions at prompt time, stuff them in the context, and let the LLM personalize on the fly? Why the meta-learning machinery?"</>}
        options={[
          {key:"a", text:"RAG works equally well — meta-learning is over-engineered."},
          {key:"b", text:"RAG requires past interactions, which cold-start users LACK. Meta-learned prompts work from structured signals (questionnaire, profile) that exist BEFORE the user has any interactions. Different problem.", correct:true},
          {key:"c", text:"RAG is slower at inference."},
          {key:"d", text:"RAG can't be personalized."},
        ]}
        trap={<>(a) ignores cold-start. (c) is sometimes true but minor. (d) is wrong — RAG IS a personalization technique.</>}
        lens={<>RAG and meta-learned soft prompts solve different problems. RAG personalizes from RETRIEVED past interactions — strong when history exists. Meta-learned prompts personalize from STRUCTURED signals — strong at cold-start. In practice they compose: use meta-prompts for the first N interactions, transition to RAG once interaction history accumulates.</>}
        stretch={<>What's the transition rule from "meta-prompt only" to "meta-prompt + RAG"?</>}
      />

      <VIS.TrapProblem
        id="metaprompt-p12"
        difficulty="hard"
        title="P12 — Privacy: soft prompts as user fingerprints"
        scenario={<>Your per-user soft prompts are stored in a cache. Each prompt is 100 tokens × 4096 dims = 1.6MB of floats. A security review asks whether these constitute personally-identifiable data.</>}
        options={[
          {key:"a", text:"No — they're just floats."},
          {key:"b", text:"YES — soft prompts are learned from user signals and can be inverted (membership-inference, attribute-inference attacks). Treat them as PII for storage, access control, and right-to-erasure compliance.", correct:true},
          {key:"c", text:"Only if they're labeled with the user ID."},
          {key:"d", text:"No — soft prompts are output of a deterministic function."},
        ]}
        trap={<>(a), (c), and (d) all underestimate that ML-derived per-user artifacts CAN encode and leak source signals. Inversion attacks on embeddings and soft prompts are an active research area.</>}
        lens={<>Per-user model artifacts (soft prompts, adapter weights, user embeddings) are derived from user data and can leak that data via inversion attacks. Treat them as PII: same access controls, same right-to-erasure (delete the prompt when the user requests data deletion), and document the privacy posture for compliance review.</>}
        stretch={<>If a user invokes right-to-erasure, what besides the soft prompt do you need to delete?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2507.16672" target="_blank" rel="noopener"><strong>Wei et al. — Meta-Learning for Cold-Start Personalization in Prompt-Tuned LLMs</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, arXiv 2025)</span><br/>The source paper for this visual. Read sections 3 (meta-learning formulation for soft prompts) and 4 (cold-start eval).</li>
        <li><a href="https://arxiv.org/abs/1803.02999" target="_blank" rel="noopener"><strong>Nichol, Achiam, Schulman — On First-Order Meta-Learning Algorithms (Reptile)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, OpenAI 2018)</span><br/>The Reptile paper — required background for problem P2 and P8. The "no second-order math" trick is the entire reason this approach scales.</li>
        <li><a href="https://arxiv.org/abs/1703.03400" target="_blank" rel="noopener"><strong>Finn, Abbeel, Levine — Model-Agnostic Meta-Learning for Fast Adaptation of Deep Networks (MAML)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, ICML 2017)</span><br/>The MAML paper. Read after Reptile — the second-order formulation that Reptile approximates first-order.</li>
        <li><a href="https://arxiv.org/abs/2104.08691" target="_blank" rel="noopener"><strong>Lester, Al-Rfou, Constant — The Power of Scale for Parameter-Efficient Prompt Tuning</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, EMNLP 2021)</span><br/>The original soft-prompt-tuning paper. Read for soft-prompt sizing intuition (relevant to problem P4).</li>
        <li><a href="https://lilianweng.github.io/posts/2018-11-30-meta-learning/" target="_blank" rel="noopener"><strong>Lilian Weng — Meta-Learning: Learning to Learn Fast</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>The clearest practitioner intro to meta-learning. Covers Reptile, MAML, ProtoNet — read this BEFORE the original papers if you're new to the area.</li>
      </ul>
    </VIS.Section>
  </main>
