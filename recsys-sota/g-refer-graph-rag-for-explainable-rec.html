<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 17
// G-Refer — Graph-RAG for Explainable Recommendation (WWW 2025)
//
// Anchor (survives §2a redaction):
//   AFTER the recommender chose an item, G-Refer retrieves KG PATHS that
//   connect user history to that recommended item, then prompts an LLM to
//   GENERATE a natural-language EXPLANATION grounded in those paths.
//   Post-hoc, grounded, audit-friendly explanation generation.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA &middot; Graph-RAG for explanation"
      title="G-Refer &mdash; Graph-RAG for explainable recommendation"
      subtitle="The recommender already chose the item. G-Refer retrieves KG paths connecting user history to that item, then asks an LLM to generate a natural-language explanation grounded in those paths. Post-hoc, retrieval-grounded, verifiable against the KG."
      byline={[
        {label: "Paper", value: "G-Refer: Improving LLM Explanations with Graph Retrieval Augmented Generation for Recommendation (WWW 2025)"},
        {label: "Surface", value: "Recommender stacks that need verifiable, audit-friendly explanations &mdash; regulated e-commerce, lending, medical, content moderation"},
        {label: "Anchor that survives redaction", value: "Post-hoc retrieval of KG paths between user history and the already-recommended item; LLM generates an explanation grounded in those paths"},
      ]}/>

    <VIS.TLDR>
      Asking an LLM to explain &ldquo;why I recommended this item&rdquo; from parametric memory alone produces plausible-sounding hallucinations &mdash; the LLM doesn&apos;t know your KG, your user, or what actually drove the recommendation. G-Refer treats explanation as a separate post-hoc stage: after the recommender picks an item, retrieve concrete KG paths that connect items in the user&apos;s history to the recommended item, then prompt the LLM to write the explanation strictly grounded in those paths. Senior trap: NOT K-RagRec (which uses retrieval to PICK the item), NOT ML-KDGATMoco (which uses the KG to LEARN embeddings), and NOT a fine-tuned LLM that memorises KG facts (still hallucinates, stales).
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is &mdash; post-hoc path retrieval, grounded explanation">
      <VIS.Mermaid chart={`flowchart TB
  REC["Upstream recommender (any model)"]
  USER["User history (items)"]
  ITEM["Chosen item"]
  KG["Domain knowledge graph"]
  PATHS["Retrieve paths: history -> item"]
  RANK["Rank paths by relevance"]
  PROMPT["Explanation prompt with paths"]
  LLM["LLM (explanation only)"]
  EXP["Grounded explanation text"]
  REC --> ITEM
  USER --> PATHS
  ITEM --> PATHS
  KG --> PATHS
  PATHS --> RANK
  RANK --> PROMPT
  PROMPT --> LLM
  LLM --> EXP`} />
      <ul>
        <li><strong>Recommendation comes first.</strong> Any recommender (DLRM, HSTU, two-tower, LLM-rec) picks the item. G-Refer is downstream &mdash; does NOT influence the choice. Key boundary vs K-RagRec.</li>
        <li><strong>Path retrieval.</strong> Given user&apos;s recent items and chosen item, enumerate KG paths connecting them (e.g., &ldquo;movie A &mdash; same director as &mdash; movie X &mdash; same genre as &mdash; chosen movie&rdquo;). Constrain depth (3-5 hops); rank by learned scorer.</li>
        <li><strong>Grounded generation.</strong> Prompt instructs the LLM to write the explanation using ONLY entities and relations from the retrieved paths. The output cites paths the way RAG outputs cite passages.</li>
        <li><strong>Verifiability.</strong> Every claim traces back to a concrete KG path. Compliance auditors can replay the path; users can challenge the relation. Hallucinations are bounded to the path set.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How G-Refer differs from its neighbours">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Stage</th>
          <th style={{textAlign:"left", padding:8}}>KG role</th>
          <th style={{textAlign:"left", padding:8}}>Output</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>Vanilla LLM explanation</td><td style={{padding:8}}>Post-rec</td><td style={{padding:8}}>None</td><td style={{padding:8}}>Free-text (hallucinated)</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>Fine-tune LLM on KG triples</td><td style={{padding:8}}>Post-rec</td><td style={{padding:8}}>Baked into weights</td><td style={{padding:8}}>Free-text (still hallucinates, stales)</td></tr>
          <tr><td style={{padding:8}}>K-RagRec</td><td style={{padding:8}}>Pre-rec (retrieval)</td><td style={{padding:8}}>Influences item choice</td><td style={{padding:8}}>Item (not explanation)</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>ML-KDGATMoco</td><td style={{padding:8}}>Training</td><td style={{padding:8}}>Representation learning</td><td style={{padding:8}}>Embeddings</td></tr>
          <tr><td style={{padding:8}}><strong>G-Refer</strong></td><td style={{padding:8}}><strong>Post-rec (explanation)</strong></td><td style={{padding:8}}><strong>Path retrieval for grounding</strong></td><td style={{padding:8}}><strong>Grounded explanation text</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill &mdash; 23 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the axis. Pick, then reveal.</p>

      <VIS.TrapProblem id="gr-p1" difficulty="hard"
        title="P1 &mdash; G-Refer vs vanilla LLM explanation: load-bearing difference?"
        scenario={<><em>Discriminating insight: vanilla LLM explanations come from parametric memory &mdash; LLM doesn&apos;t know your KG, your user, or what drove the recommendation. G-Refer constrains the explanation to KG paths actually connecting user history to the chosen item.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Vanilla LLM explanations come from parametric memory &mdash; the LLM has no knowledge of your KG, your user, or the recommendation driver, so it hallucinates plausible-but-unverifiable rationales. G-Refer retrieves KG paths connecting user history to the chosen item and instructs the LLM to ground the explanation in those paths only.", correct:true},
          {key:"b", text:"They are equivalent."},
          {key:"c", text:"Vanilla LLM is strictly better."},
          {key:"d", text:"G-Refer drops the LLM entirely."},
        ]}
        trap={<>(b)(c)(d) miss the grounding mechanism.</>}
        lens={<>Parametric memory vs path-grounded generation.</>}
        stretch={<>What metric measures grounding fidelity?</>}
      />

      <VIS.TrapProblem id="gr-p2" difficulty="hard"
        title="P2 &mdash; G-Refer vs K-RagRec (sibling-batch caution)"
        scenario={<><em>Discriminating insight: K-RagRec retrieves KG subgraphs BEFORE the LLM decides the item; the retrieval influences the recommendation. G-Refer retrieves KG paths AFTER the item is chosen; retrieval grounds post-hoc explanation. Different stages, outputs, consumers.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"K-RagRec retrieves before the recommendation and influences which item is picked (output: item). G-Refer retrieves after the recommendation and grounds the post-hoc explanation (output: explanation text). Pre-decision retrieval vs post-decision grounding.", correct:true},
          {key:"b", text:"They are the same paper."},
          {key:"c", text:"Both decide the item."},
          {key:"d", text:"Both only do explanation."},
        ]}
        trap={<>(b)(c)(d) collapse the stage distinction.</>}
        lens={<>Pre-rec retrieval (K-RagRec) vs post-rec grounding (G-Refer).</>}
        stretch={<>Can they compose?</>}
      />

      <VIS.TrapProblem id="gr-p3" difficulty="hard"
        title="P3 &mdash; G-Refer vs ML-KDGATMoco (sibling-batch caution)"
        scenario={<><em>Discriminating insight: ML-KDGATMoco uses the KG at TRAINING to learn entity embeddings via multi-level contrast. G-Refer uses the KG at INFERENCE (after recommendation) to retrieve paths for explanation. Same KG, different stage, different output.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"ML-KDGATMoco learns entity embeddings at training via multi-level contrast over the KG. G-Refer retrieves paths from the KG at inference (post-recommendation) to ground LLM explanations. Same KG asset, different lifecycle stage, different output (embeddings vs explanations).", correct:true},
          {key:"b", text:"They are equivalent."},
          {key:"c", text:"Both learn embeddings."},
          {key:"d", text:"Both generate explanations."},
        ]}
        trap={<>(b)(c)(d) blur the stage and output.</>}
        lens={<>Training-time learning vs inference-time retrieval.</>}
        stretch={<>Can ML-KDGATMoco embeddings improve G-Refer&apos;s path scorer?</>}
      />

      <VIS.TrapProblem id="gr-p4" difficulty="medium"
        title="P4 &mdash; Without G-Refer, what is the realistic fallback?"
        scenario={<><em>Discriminating insight: fallbacks are vanilla LLM explanation (hallucinated), fine-tune LLM on KG triples (still hallucinates plus stales), template-filled rationales (rigid, unscalable), or no explanation at all (compliance fail).</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Vanilla LLM explanation (hallucinates from parametric memory), fine-tune LLM on KG triples (still hallucinates and stales), template rationales (rigid), or no explanation (compliance fail). G-Refer occupies the grounded-generation corner.", correct:true},
          {key:"b", text:"There is no fallback."},
          {key:"c", text:"Skip recommendation entirely."},
          {key:"d", text:"GPT-4 always wins."},
        ]}
        trap={<>(b)(c)(d) absurd or generic.</>}
        lens={<>Each fallback drops grounding, quality, or both.</>}
        stretch={<>When are template rationales enough?</>}
      />

      <VIS.TrapProblem id="gr-p5" difficulty="hard"
        title="P5 &mdash; When does G-Refer stop helping?"
        scenario={<><em>Discriminating insight: needs (i) a KG that connects user history to recommended item, (ii) consumed explanations, (iii) latency budget for post-hoc retrieval + LLM call, (iv) warm history. Cold-start users with no history collapse the path-retrieval premise.</em><br/>Where is the boundary?</>}
        options={[
          {key:"a", text:"KGs too sparse to contain history-to-item paths (nothing to ground in), domains where explanations are not consumed (pure throughput surfaces), latency-strict surfaces where the post-hoc LLM call kills the budget, and cold-start users with no history (no source nodes for path retrieval).", correct:true},
          {key:"b", text:"It always wins."},
          {key:"c", text:"It only works on movies."},
          {key:"d", text:"It only works with GPT-4."},
        ]}
        trap={<>(b)(c)(d) miss the premises.</>}
        lens={<>KG coverage + explanation demand + latency budget + warm history.</>}
        stretch={<>How to detect &lsquo;KG too sparse for paths&rsquo; offline?</>}
      />

      <VIS.TrapProblem id="gr-p6" difficulty="hard"
        title="P6 &mdash; Pick the architecture for an e-commerce surface needing GDPR-grade explanation audit"
        scenario={<><em>Discriminating insight: GDPR Article 22 requires meaningful information about the logic of automated decisions. Vanilla LLM explanations cannot be audited; templates are too rigid. G-Refer is the canonical fit &mdash; every explanation traces to a concrete KG path an auditor can replay.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"G-Refer &mdash; GDPR Article 22 needs auditable logic; G-Refer&apos;s path-grounding makes every explanation traceable to a concrete KG path. Vanilla LLM hallucinates; templates are too rigid; fine-tuning bakes facts into opaque weights (still hallucinates).", correct:true},
          {key:"b", text:"Vanilla LLM explanation."},
          {key:"c", text:"Skip explanation entirely."},
          {key:"d", text:"BM25 over product descriptions."},
        ]}
        trap={<>(b)(c)(d) miss the audit premise.</>}
        lens={<>Auditable explanation -&gt; path-grounded generation -&gt; G-Refer.</>}
        stretch={<>What does the auditor see &mdash; the path or the explanation?</>}
      />

      <VIS.TrapProblem id="gr-p7" difficulty="hard"
        title="P7 &mdash; Sounds reasonable: &ldquo;just feed the whole user history and item into the LLM, no KG needed&rdquo;"
        scenario={<><em>Discriminating insight: feeding history+item without KG retrieval gives the LLM no information about why the item was chosen. LLM still hallucinates connections (&ldquo;you liked X so you&apos;ll like Y because both are exciting&rdquo;) with no traceable basis.</em><br/>Why is the shortcut wrong?</>}
        options={[
          {key:"a", text:"History+item alone tells the LLM nothing about the actual relational connection &mdash; it still hallucinates a plausible rationale. KG path retrieval supplies the connection (&ldquo;same director&rdquo;, &ldquo;same sub-category&rdquo;, &ldquo;co-purchased by similar users&rdquo;) so the LLM is constrained to a real basis.", correct:true},
          {key:"b", text:"History+item is sufficient."},
          {key:"c", text:"LLMs cannot hallucinate with enough context."},
          {key:"d", text:"KG is decorative."},
        ]}
        trap={<>(b)(c)(d) misjudge LLM hallucination behaviour.</>}
        lens={<>Without retrieved connection, the LLM invents one.</>}
        stretch={<>How to measure invented-connection rate?</>}
      />

      <VIS.TrapProblem id="gr-p8" difficulty="hard"
        title="P8 &mdash; Pitch G-Refer&apos;s anchor"
        scenario={<><em>Discriminating insight: anchor = &ldquo;after the recommender picks the item, retrieve KG paths connecting user history to that item, rank by relevance, then prompt an LLM to generate an explanation grounded strictly in those paths&rdquo;. Name post-hoc + path retrieval + ranking + grounded generation.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"G-Refer is post-hoc: after any recommender chooses an item, retrieve KG paths connecting user-history nodes to the chosen item, rank paths by a learned relevance scorer, then prompt an LLM to write the explanation using ONLY entities and relations from the retrieved paths. Every claim traces to a concrete path; hallucinations are bounded by the path set.", correct:true},
          {key:"b", text:"G-Refer decides which item to recommend."},
          {key:"c", text:"G-Refer fine-tunes the LLM on KG triples."},
          {key:"d", text:"G-Refer is K-RagRec."},
        ]}
        trap={<>(b) wrong stage. (c) wrong update path. (d) wrong purpose.</>}
        lens={<>Post-hoc &middot; path retrieval &middot; ranking &middot; grounded generation.</>}
        stretch={<>Which piece is the paper most underspecific about?</>}
      />

      <VIS.TrapProblem id="gr-p9" difficulty="hard" multiSelect
        title="P9 &mdash; When NOT to use G-Refer. Select all that apply."
        scenario={<><em>Discriminating insight: needs KG covering history-to-item paths, consumed explanations, latency budget, warm users. Wrong for throughput surfaces, cold-start, latency-tight ads pipelines, KG-less domains.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Pure throughput surface (autoplay feed) where users never read explanations &mdash; G-Refer adds latency for no consumer.", correct:true},
          {key:"b", text:"Cold-start user with empty history &mdash; no source nodes for path retrieval.", correct:true},
          {key:"c", text:"Latency-tight ads pipeline at 30ms p99 &mdash; LLM call blows the budget.", correct:true},
          {key:"d", text:"Domain with no KG asset.", correct:true},
          {key:"e", text:"E-commerce justification for a regulated marketplace with a curated product KG."},
        ]}
        trap={<>(e) is the canonical fit.</>}
        lens={<>KG coverage + explanation demand + latency budget + warm history.</>}
        stretch={<>What is the minimum KG coverage threshold?</>}
      />

      <VIS.TrapProblem id="gr-p10" difficulty="hard"
        title="P10 &mdash; Why retrieve PATHS specifically, not entities or subgraphs?"
        scenario={<><em>Discriminating insight: paths carry directionality and intermediate relations &mdash; &ldquo;A -- same-director -- X -- sequel-of -- B&rdquo; reads as a sentence. Subgraphs lack canonical reading order; entities alone return facts but no connections.</em><br/>Why paths?</>}
        options={[
          {key:"a", text:"Paths carry directional, ordered chains of relations that read like sentences &mdash; the LLM paraphrases them into explanation prose with minimal reordering. Subgraphs lack a canonical reading order; entity-only retrieval returns facts but no connections. Paths are the right structure for the explanation modality.", correct:true},
          {key:"b", text:"Paths are cheaper."},
          {key:"c", text:"Subgraphs and paths are equivalent."},
          {key:"d", text:"Entities already encode paths."},
        ]}
        trap={<>(b)(c)(d) miss the ordering argument.</>}
        lens={<>Paths map naturally to explanation prose.</>}
        stretch={<>Optimal path length for human readability?</>}
      />

      <VIS.TrapProblem id="gr-p11" difficulty="hard"
        title="P11 &mdash; Path ranking: why is it load-bearing?"
        scenario={<><em>Discriminating insight: typical KG yields hundreds of paths between history and item. LLM cannot read all. Path ranking selects the few likely to constitute compelling explanation. A bad ranker returns trivial paths.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"A typical KG produces hundreds of candidate paths between history and item; the LLM&apos;s context budget admits only a handful. The ranker must select paths with rare, predictive relations over trivial paths (&ldquo;both are items&rdquo;). A weak ranker is the dominant explanation-quality regression mode.", correct:true},
          {key:"b", text:"Ranking is decorative."},
          {key:"c", text:"All paths are equally informative."},
          {key:"d", text:"Random selection works."},
        ]}
        trap={<>(b)(c)(d) miss the path-budget argument.</>}
        lens={<>Path ranker is the explanation-quality gate.</>}
        stretch={<>What features should the path scorer use?</>}
      />

      <VIS.TrapProblem id="gr-p12" difficulty="hard"
        title="P12 &mdash; What does G-Refer deliberately drop vs fine-tuning the LLM on KG?"
        scenario={<><em>Discriminating insight: fine-tuning bakes KG facts into weights, no retrieval at inference. But LLM still hallucinates (weights leak), and KG updates require retraining. G-Refer drops parametric facts; accepts retrieval round-trip for verifiability + freshness.</em><br/>What does G-Refer forfeit?</>}
        options={[
          {key:"a", text:"Inference simplicity. Fine-tuning gives one LLM call per explanation; G-Refer adds a path-retrieval + path-ranking step before the LLM call. The gain is verifiability (every claim traces to a path) and KG-update freshness without retraining; the loss is per-explanation latency.", correct:true},
          {key:"b", text:"G-Refer forfeits the LLM."},
          {key:"c", text:"G-Refer forfeits the KG."},
          {key:"d", text:"G-Refer forfeits the recommendation task."},
        ]}
        trap={<>(b)(c)(d) misread the trade.</>}
        lens={<>Retrieval latency in exchange for verifiability + freshness.</>}
        stretch={<>What latency budget keeps G-Refer viable?</>}
      />

      <VIS.TrapProblem id="gr-p13" difficulty="hard"
        title="P13 &mdash; Most fragile knob"
        scenario={<><em>Discriminating insight: path-ranker relevance scoring dominates fragility. Bad scorer returns trivial paths; LLM writes trivial explanation. Path-depth cap secondary (3-5 safe). LLM size robust above 7B.</em><br/>Rank fragility.</>}
        options={[
          {key:"a", text:"Path-ranker relevance scoring is most fragile &mdash; a bad scorer returns trivial paths and the LLM writes trivial explanations. Path-depth cap is next (3-5 is the safe range; deeper paths exceed prompt budget). LLM choice is robust above 7B; temperature robust.", correct:true},
          {key:"b", text:"LLM size is most fragile."},
          {key:"c", text:"Tokeniser choice is most fragile."},
          {key:"d", text:"Batch size is most fragile."},
        ]}
        trap={<>(b)(c)(d) miss the ranker mechanism.</>}
        lens={<>Path ranker is the explanation-quality gate.</>}
        stretch={<>How to evaluate the path ranker offline?</>}
      />

      <VIS.TrapProblem id="gr-p14" difficulty="hard"
        title="P14 &mdash; Plausible-misattribution: explanation quality dropped after the ranker upgrade"
        scenario={<><em>Discriminating insight: team upgraded path ranker from BM25-over-relation-text to a learned scorer fine-tuned on click-through. The learned scorer optimised &ldquo;path picked -&gt; user clicks explanation&rdquo;, favouring short clickbaity paths. Audit quality regressed because objective is misaligned.</em><br/>Diagnosis?</>}
        options={[
          {key:"a", text:"The new ranker optimises click-through on explanations, which favours clickbaity short paths over informative ones. Audit quality regressed because the scoring objective is misaligned with the audit objective. Fix: train the path scorer on auditor-rated path informativeness, not on explanation CTR.", correct:true},
          {key:"b", text:"GPU thermal throttling.", correct:false},
          {key:"c", text:"LLM context window changed.", correct:false},
          {key:"d", text:"Tokeniser drift.", correct:false},
        ]}
        trap={<>(b)(c)(d) infra decoys.</>}
        lens={<>Ranker objective must match the explanation quality target.</>}
        stretch={<>How to collect auditor-rated path labels at scale?</>}
      />

      <VIS.TrapProblem id="gr-p15" difficulty="hard"
        title="P15 &mdash; Intuitive but wrong: &ldquo;an explanation that mentions the KG is grounded enough&rdquo;"
        scenario={<><em>Discriminating insight: mentioning the KG is not grounding. LLM can name entities from training memory while inventing relations between them. True grounding requires the explanation to use only entities and relations from RETRIEVED paths, plus a post-generation verifier.</em><br/>Why is the naive view wrong?</>}
        options={[
          {key:"a", text:"Mentioning the KG is not grounding &mdash; the LLM can name entities from training memory while inventing relations between them. True grounding requires the explanation to use only entities and relations from the retrieved paths AND a post-generation verifier that confirms every claim appears in the path set.", correct:true},
          {key:"b", text:"Any KG mention is grounding."},
          {key:"c", text:"Verification is optional."},
          {key:"d", text:"LLMs cannot hallucinate when KG is mentioned."},
        ]}
        trap={<>(b)(c)(d) miss the verification requirement.</>}
        lens={<>Mention -&gt; grounding requires path-presence verification.</>}
        stretch={<>What does the verifier check exactly?</>}
      />

      <VIS.TrapProblem id="gr-p16" difficulty="hard"
        title="P16 &mdash; Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: assuming &ldquo;G-Refer is RAG with KG instead of docs&rdquo; cascades into retrieving subgraphs instead of paths (loses ordering), skipping path ranking (LLM drowns), skipping verification (hallucinations resurface).</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: path-vs-subgraph retrieval (ordering), path ranker (quality gate), and post-generation verifier (grounding contract). Removing any one collapses G-Refer into KG-flavoured hallucination.", correct:true},
          {key:"b", text:"Only the verifier."},
          {key:"c", text:"Only the ranker."},
          {key:"d", text:"Nothing &mdash; it is just RAG with a KG."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>Path retrieval + ranker + verifier are jointly load-bearing.</>}
        stretch={<>Which piece does the paper underspecify?</>}
      />

      <VIS.TrapProblem id="gr-p17" difficulty="medium"
        title="P17 &mdash; Senior vs junior framing on poor explanation quality"
        scenario={<><em>Discriminating insight: junior bumps LLM size; senior first audits the path set &mdash; informative or trivial? Bigger LLM cannot rescue trivial paths.</em><br/>Which lever first?</>}
        options={[
          {key:"a", text:"Audit the retrieved path set: are paths informative (rare predictive relations) or trivial (&ldquo;both items&rdquo;)? A bigger LLM cannot rescue a trivial path. Improve the path scorer/ranker first; then tune LLM and prompt.", correct:true},
          {key:"b", text:"Bump LLM size immediately."},
          {key:"c", text:"Add more in-context examples."},
          {key:"d", text:"Switch to a different recommender."},
        ]}
        trap={<>(b)(c) generic. (d) wrong stage.</>}
        lens={<>Path quality first; LLM is downstream.</>}
        stretch={<>Dashboard panel for path informativeness?</>}
      />

      <VIS.TrapProblem id="gr-p18" difficulty="hard"
        title="P18 &mdash; Plausible-misattribution: explanation fidelity dropped after a KG relation rename"
        scenario={<><em>Discriminating insight: KG vendor renamed &lsquo;directed_by&rsquo; -&gt; &lsquo;director&rsquo;. Path retriever works; LLM uses the new name. But the post-generation VERIFIER matches against a CANONICAL relation alphabet that has not been updated. Verification rejects valid claims; fidelity metric craters.</em><br/>Diagnosis?</>}
        options={[
          {key:"a", text:"The post-generation verifier matches explanation claims against a stored relation alphabet. The KG vendor renamed relations; retrieval and LLM updated correctly, but the verifier&apos;s alphabet was not refreshed, so it rejects valid grounded claims. Fix: re-sync the verifier&apos;s relation alphabet with the KG schema (or use alias mapping).", correct:true},
          {key:"b", text:"Index staleness in the path retriever.", correct:false},
          {key:"c", text:"GPU thermal throttling.", correct:false},
          {key:"d", text:"LLM context truncation.", correct:false},
        ]}
        trap={<>(b)(c)(d) wrong components or generic.</>}
        lens={<>Verifier relation-alphabet must track KG schema.</>}
        stretch={<>CI test for verifier-alphabet drift?</>}
      />

      <VIS.TrapProblem id="gr-p19" difficulty="hard"
        title="P19 &mdash; Production gotcha: explanation latency vs recommendation latency"
        scenario={<><em>Discriminating insight: G-Refer&apos;s post-hoc retrieval + LLM call adds latency on top of recommender. Inline at top-of-feed usually infeasible. Generate lazily on-demand when user taps &ldquo;why this?&rdquo;.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Generate explanations lazily on user demand (&ldquo;why this?&rdquo; tap) rather than eagerly for every recommendation. Cache popular history-item path-prompt combinations. Inline eager generation is usually infeasible &mdash; LLM latency dominates the recommendation budget.", correct:true},
          {key:"b", text:"Always generate explanations eagerly."},
          {key:"c", text:"Latency is not a concern."},
          {key:"d", text:"G-Refer must be inline."},
        ]}
        trap={<>(b)(c)(d) miss the latency budget.</>}
        lens={<>Lazy-on-demand + caching is the production pattern.</>}
        stretch={<>What cache-hit-rate threshold for eager vs lazy?</>}
      />

      <VIS.TrapProblem id="gr-p20" difficulty="hard"
        title="P20 &mdash; Failure on Friday: explanation fidelity cratered after a path-depth bump"
        scenario={<><em>Discriminating insight: team bumped path-depth cap from 4 to 7 &ldquo;for richer explanations&rdquo;. KG yielded weakly-connected 7-hop chains; LLM compressed them into vague generalisations (&ldquo;loosely related items in the broader entertainment ecosystem&rdquo;). Fidelity dropped because vague language is hard to verify.</em><br/>3am page: fidelity down 30%. Diagnosis?</>}
        options={[
          {key:"a", text:"Deep paths (6-7 hops) are weakly connected and the LLM compresses them into vague generalisations that are hard to verify. The fidelity metric measures whether claims trace to specific path edges; vague language has no specific basis. Cap path depth at 4-5 and prefer dense short paths.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Cache TTL changed."},
          {key:"d", text:"LLM tokenizer drift."},
        ]}
        trap={<>(b)(c)(d) miss the path-depth-to-vagueness mechanism.</>}
        lens={<>Deep paths invite vague compression by the LLM.</>}
        stretch={<>Runbook entry for path-depth bumps?</>}
      />

      <VIS.TrapProblem id="gr-p21" difficulty="medium"
        title="P21 &mdash; Library default that bites: NetworkX default path enumerator"
        scenario={<><em>Discriminating insight: NetworkX&apos;s all_simple_paths defaults to unweighted, undirected enumeration with no depth cap. On a million-node KG, this never returns.</em><br/>Where does the default break?</>}
        options={[
          {key:"a", text:"NetworkX all_simple_paths with no cutoff and undirected mode never returns on a million-node KG. Set cutoff=5 and use a directed view (or a custom BFS with a relation-aware filter). The default fails by hanging, not by erroring &mdash; the worst failure mode.", correct:true},
          {key:"b", text:"Default learning rate is wrong."},
          {key:"c", text:"Default batch size is wrong."},
          {key:"d", text:"Default optimizer is wrong."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Path enumerator defaults can hang silently.</>}
        stretch={<>CI test for path-enumeration timeout?</>}
      />

      <VIS.TrapProblem id="gr-p22" difficulty="hard" ordered
        title="P22 &mdash; Order the G-Refer rollout"
        scenario={<><em>Discriminating insight: rollout is (1) confirm KG covers history-to-item paths, (2) build path enumerator with depth cap, (3) train path relevance scorer on auditor-rated labels, (4) write explanation prompt with path slots, (5) build post-generation verifier, (6) lazy-on-demand serving with caching, (7) auditor review.</em><br/>Order.</>}
        options={[
          {key:"a", text:"Confirm KG covers history-to-item paths -&gt; build path enumerator (depth cap 4-5) -&gt; train path relevance scorer on auditor labels -&gt; write explanation prompt with path slots -&gt; build post-generation verifier with KG-aligned relation alphabet -&gt; lazy-on-demand serving with caching -&gt; auditor review of sample explanations", correct:true},
          {key:"b", text:"Skip the verifier."},
          {key:"c", text:"Ship inline eager generation without latency analysis."},
          {key:"d", text:"Train the path scorer on click-through."},
        ]}
        trap={<>(b)(c)(d) lose grounding or latency safety.</>}
        lens={<>KG audit -&gt; retriever -&gt; scorer -&gt; prompt -&gt; verifier -&gt; serving -&gt; review.</>}
        stretch={<>Why audit KG coverage first?</>}
      />

      <VIS.TrapProblem id="gr-p23" difficulty="hard"
        title="P23 &mdash; Smallest input that breaks the claimed advantage"
        scenario={<><em>Discriminating insight: a brand-new user with empty history has no source nodes for path enumeration. Retrieval returns nothing; LLM has nothing to ground in; falls back to vanilla hallucination. Cold-start is the canonical counter-example.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"A brand-new user with empty history. Path enumeration has no source nodes; retrieval returns nothing; the LLM has nothing to ground in; the system either falls back to hallucinated vanilla explanation or to a content-only attribute summary. G-Refer&apos;s mechanism does not apply to cold-start.", correct:true},
          {key:"b", text:"E-commerce justification with curated KG (canonical fit)."},
          {key:"c", text:"100M users."},
          {key:"d", text:"Catalog of 50M items."},
        ]}
        trap={<>(b) canonical fit. (c)(d) scale red herrings.</>}
        lens={<>Warm history is the source-node premise.</>}
        stretch={<>Minimum history-length where G-Refer becomes viable?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://dl.acm.org/doi/10.1145/3696410.3714835" target="_blank" rel="noopener">Wang et al., <em>G-Refer: Improving LLM Explanations with Graph RAG for Recommendation</em> (WWW 2025)</a> &mdash; the canonical paper. Sections on path ranking and grounding verification are the must-reads.</li>
        <li><a href="https://arxiv.org/abs/2005.11401" target="_blank" rel="noopener">Lewis et al., <em>Retrieval-Augmented Generation for Knowledge-Intensive NLP</em> (NeurIPS 2020)</a> &mdash; the foundational RAG paper.</li>
        <li><a href="https://eugeneyan.com/writing/llm-patterns/" target="_blank" rel="noopener">Eugene Yan &mdash; <em>Patterns for Building LLM-based Systems and Products</em> (blog)</a> &mdash; the best practitioner framing of RAG, grounding, hallucination mitigation.</li>
        <li><a href="https://github.com/RManLuo/Awesome-LLM-KG" target="_blank" rel="noopener">Awesome LLM + KG (curated list)</a> &mdash; index of KG-grounded LLM work.</li>
        <li><a href="https://lilianweng.github.io/posts/2024-07-07-hallucination/" target="_blank" rel="noopener">Lilian Weng &mdash; <em>Extrinsic Hallucinations in LLMs</em> (blog)</a> &mdash; the practitioner taxonomy G-Refer aims to bound.</li>
        <li><a href="https://gdpr-info.eu/art-22-gdpr/" target="_blank" rel="noopener">GDPR Article 22 (text)</a> &mdash; the regulatory premise behind G-Refer&apos;s audit-grade use case.</li>
      </ul>
    </VIS.Section>
