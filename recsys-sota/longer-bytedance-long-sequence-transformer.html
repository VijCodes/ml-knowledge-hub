        ]}
        trap={<>(b) would shift CTR predictions broadly, not specifically fresh-creative CVR. (c) is the generic cold-start answer and doesn't anchor in LONGER's merge mechanism. (d) is unrelated to creative age.</>}
        lens={<>The failure traces specifically to the merge layer's similarity metric on under-trained fresh embeddings. It's the exact failure mode passing the redaction test — replace "LONGER" with "Model X" and you'd need to know there's a merge layer to even consider this hypothesis.</>}
        stretch={<>Could you "warm-start" fresh embeddings to avoid this?</>}
      />

      {/* axis: E3 (implementation specifics) */}
      <VIS.TrapProblem
        id="longer-e3"
        difficulty="medium"
        title="E3 — Default config that silently halves throughput"
        scenario={<>You deploy LONGER via the open-source HuggingFace launcher. Throughput is half of what the paper reports. What's the silent default to check?</>}
        options={[
          {key:"a", text:"Unified GPU sync requires NCCL above a specific version AND identical sparse+dense layout across ranks; the default launcher silently falls back to 2-phase sync (sparse-then-dense), halving step time without raising an error.", correct:true},
          {key:"b", text:"Mixed precision not enabled by default."},
          {key:"c", text:"Gradient checkpointing on by default."},
          {key:"d", text:"Sequence parallelism off."},
        ]}
        trap={<>(b), (c), (d) are plausible perf defaults to check but are not the LONGER-specific contribution. The unified GPU sync IS the optimization that breaks silently.</>}
        lens={<>The paper's claim depends on the unified-sync optimization; reproducibility hinges on it. If your launcher silently degrades, your perf claim is false.</>}
        stretch={<>How would you validate that unified sync is active in production?</>}
      />

      {/* axis: E4 (rollout) */}
      <VIS.TrapProblem
        id="longer-e4"
        difficulty="hard"
        title="E4 — Migration order with cache TTL"
        scenario={<>Order: (i) shadow-only, (ii) mirror with logged comparisons, (iii) 1% ramp KV-cache OFF, (iv) KV-cache ON short TTL, (v) full ramp. Is this the right order?</>}
        options={[
          {key:"a", text:"Yes — verify model first, then verify perf without cache, THEN turn on cache with short TTL (so any merge-invalidation bug surfaces fast), then ramp. Putting cache-on before perf-without-cache makes cache bugs look like model bugs.", correct:true},
          {key:"b", text:"No — cache on from step 1; cache misses skew the comparison."},
          {key:"c", text:"No — skip shadow; mirror is enough."},
          {key:"d", text:"No — full ramp first."},
        ]}
        trap={<>(b) is the latency-optimization-first answer; it makes cache bugs invisible by entangling them with model bugs. (c), (d) ignore standard rollout discipline.</>}
        lens={<>KV-cache is LONGER's most fragile dependency. Verify model without it, then enable with short TTL (which mitigates any invalidation bug by limiting blast radius), then lengthen.</>}
        stretch={<>What metric decides "TTL is safe to lengthen"?</>}
      />

      {/* axis: E5 (reproducibility) */}
      <VIS.TrapProblem
        id="longer-e5"
        difficulty="hard"
        title="E5 — The hidden experimental detail behind 5x"
        scenario={<>The paper reports LONGER is 5x faster than baseline transformer at L=8k. Which detail must you match to reproduce?</>}
        options={[
          {key:"a", text:"The baseline does NOT use FlashAttention2 — comparing LONGER against a vanilla attention baseline. Reproducing the gap against an FA2 baseline cuts the speedup to ~2x (which is still meaningful but not 5x).", correct:true},
          {key:"b", text:"Match the GPU model exactly."},
          {key:"c", text:"Use the exact same dataset."},
          {key:"d", text:"Match the seed."},
        ]}
        trap={<>(b), (c), (d) are reproducibility hygiene but don't explain the gap.</>}
        lens={<>"X is N-times faster than baseline" claims must always specify the baseline. The 5x is real for vanilla attention; against a FA2-tuned baseline, the gap shrinks substantially. Honest comparison.</>}
        stretch={<>Does the merge layer benefit from FA2 internally?</>}
      />

      {/* axis: E6 (eval contamination) */}
      <VIS.TrapProblem
        id="longer-e6"
        difficulty="hard"
        title="E6 — Why a random 1% eval slice misses LONGER's wins"
        scenario={<>Offline benchmark on a random 1% slice shows LONGER ~flat vs SIM. But online A/B shows +1.5% CVR. Why does offline miss the win?</>}
        options={[
          {key:"a", text:"LONGER's gains concentrate on diverse-interest long-tail users (~5-10% of traffic). A random 1% slice underrepresents this cohort; their gain is washed out by the dominant cohort's flat performance.", correct:true},
          {key:"b", text:"Offline never matches online; ignore offline."},
          {key:"c", text:"The 1% is too small a sample for any signal."},
          {key:"d", text:"Offline data leaks into training."},
        ]}
        trap={<>(b) abdicates the diagnosis. (c) is plausible but doesn't anchor in LONGER's actual gain pattern.</>}
        lens={<>Offline eval must be cohort-stratified for LONGER — the long-tail cohort is where the win lives. Random slicing is a silent under-measurement.</>}
        stretch={<>What's the right eval stratification — by history length, history diversity, or interest entropy?</>}
      />

      {/* ============== F. Failure modes ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      {/* axis: F1 (edge case) */}
      <VIS.TrapProblem
        id="longer-f1"
        difficulty="medium"
        title="F1 — Edge case: user with under 100 events"
        scenario={<>Construct the shortest user-history length that makes LONGER regress below SASRec on offline metrics. Name the architectural reason.</>}
        options={[
          {key:"a", text:"Under ~100 events: token-merge has nothing to merge, the global-token bottleneck degenerates to 'average of 100 tokens' which is no better than mean-pool, and the inner-transformer sees a sequence indistinguishable from SASRec's input but with extra parameters that overfit. Threshold around L=100.", correct:true},
          {key:"b", text:"Under 10 events."},
          {key:"c", text:"Under 5000 events."},
          {key:"d", text:"Never regresses."},
        ]}
        trap={<>(d) is the marketing read; (b) understates; (c) overstates the threshold.</>}
        lens={<>LONGER's value scales with sequence length. Below the threshold, you're paying overhead for no compression benefit. The paper acknowledges this; ByteDance routes short-history users to a separate small-history ranker.</>}
        stretch={<>How would you detect a short-history user at inference time and route them away?</>}
      />

      {/* axis: F2 (adversarial test) */}
      <VIS.TrapProblem
        id="longer-f2"
        difficulty="hard"
        title="F2 — Adversarial: a maximally-degrading sequence"
        scenario={<>Design a user history that maximally degrades LONGER while leaving SASRec unaffected.</>}
        options={[
          {key:"a", text:"A user whose entire history is one repeated action ([click_X] x 10000). Token-merge collapses them all into ONE merged token; the global token becomes a copy of that action; inner attention sees effectively 1 distinct token. SASRec attends over the raw 10k tokens (slow but informative). The attack is a single-mode interest profile, exploited by the merge layer.", correct:true},
          {key:"b", text:"Random sequence of unrelated items."},
          {key:"c", text:"Sequence with the rarest items only."},
          {key:"d", text:"Empty sequence."},
        ]}
        trap={<>(b) is the opposite — random sequences merge little (low similarity), so LONGER fully utilizes them. (c) and (d) miss the merge-collapse mechanism.</>}
        lens={<>The attack exposes LONGER's assumption that merged tokens carry useful "summary" signal. When the sequence is single-mode, there's nothing to summarize and merge becomes deletion.</>}
        stretch={<>How would you defend against this in production?</>}
      />

      {/* axis: F3 (reverse engineering) */}
      <VIS.TrapProblem
        id="longer-f3"
        difficulty="hard"
        title="F3 — Symptom: global-token norm grows, attention weights flatten"
        scenario={<>During scaling experiments, the global-token's representation norm grows unbounded across training, while downstream attention weights to it flatten. Which LONGER-specific cause explains this?</>}
        options={[
          {key:"a", text:"Bottleneck saturation — every sequence's information is getting squeezed into the SAME direction in global-token space; as similarity-across-users grows, downstream attention loses ability to discriminate. Diagnostic: cosine similarity of global tokens across diverse users — if above 0.95, the bottleneck has collapsed.", correct:true},
          {key:"b", text:"Standard transformer training instability."},
          {key:"c", text:"Layer-norm misconfiguration."},
          {key:"d", text:"Gradient explosion."},
        ]}
        trap={<>(b), (c), (d) would also cause symptoms but wouldn't selectively show in the global-token direction.</>}
        lens={<>The symptom is specific to having a single summary slot that all sequences pass through. Multi-token (K&gt;1) variants spread the load across slots and avoid this collapse mode.</>}
        stretch={<>Detect this BEFORE NDCG drops — what's the early warning?</>}
      />

      {/* axis: F4 (paper-named) */}
      <VIS.TrapProblem
        id="longer-f4"
        difficulty="medium"
        title="F4 — Regimes the paper itself flags"
        scenario={<>Which regimes does the LONGER paper explicitly note as degradation territory?</>}
        multiSelect
        options={[
          {key:"a", text:"Ultra-cold-start cohorts where the user has no prior history at all (the global token has nothing to summarize).", correct:true},
          {key:"b", text:"Surfaces where the candidate set distribution differs sharply from train (no candidate-aware loss term).", correct:true},
          {key:"c", text:"GPU-poor environments."},
          {key:"d", text:"Multi-modal item content (text+image)."},
        ]}
        trap={<>(c) is a deployment concern, not a paper-named degradation. (d) is unrelated.</>}
        lens={<>Paper-named regimes are the most honest weaknesses — they're not adversarial. Cold-start and candidate-set-shift are real LONGER limitations from the source.</>}
        stretch={<>How would you mitigate the candidate-set-shift problem in production?</>}
      />

      {/* axis: F5 (community-found) */}
      <VIS.TrapProblem
        id="longer-f5"
        difficulty="hard"
        title="F5 — Multi-token follow-ups expose LONGER's choice"
        scenario={<>A follow-up paper proposes K=8 global tokens (multi-bottleneck). It shows LONGER's single-token underperforms on a specific user cohort. Without looking up the paper, predict the cohort.</>}
        options={[
          {key:"a", text:"Diverse-interest users (the user shops across 5+ unrelated categories). One global-token cannot summarize K independent interest modes; multi-token specializes one slot per mode. These users are exactly where LONGER's bottleneck collapses.", correct:true},
          {key:"b", text:"Short-history users."},
          {key:"c", text:"Users with high catalog churn."},
          {key:"d", text:"Cold-start users."},
        ]}
        trap={<>(b), (c), (d) are LONGER weaknesses but unrelated to the single-token bottleneck specifically.</>}
        lens={<>Multi-token follow-ups attack the EXACT architectural choice (K=1) and target the EXACT cohort where that choice hurts. The argument is mechanistic, not empirical.</>}
        stretch={<>If you adopt K=8, what new failure mode appears?</>}
      />

      {/* axis: F1 — high-noise data */}
      <VIS.TrapProblem
        id="longer-f1b"
        difficulty="hard"
        title="F1b — Adversarial: many thin clusters (latency attack)"
        scenario={<>Inject behaviors that span many micro-clusters thinly (e.g., 1 click each on 10000 different items, each from a different category). What happens?</>}
        options={[
          {key:"a", text:"Token-merge similarity is uniformly low (no adjacent similar pairs); merge layer barely fires, sequence stays near-full L; inner-transformer cost spikes; KV-cache bloats. Latency-attack surface even without bad model output.", correct:true},
          {key:"b", text:"Merge layer fires aggressively."},
          {key:"c", text:"Global token saturates."},
          {key:"d", text:"No effect."},
        ]}
        trap={<>(b) reverses the merge logic. (c), (d) miss the latency dimension.</>}
        lens={<>LONGER's worst-case compute is unmerged O(L²); for diverse sequences, the compression doesn't engage. A malicious actor can construct such histories to spike serving cost — defend by capping post-merge sequence length and falling back to retrieval-then-attention above threshold.</>}
        stretch={<>What's the right cap, and what fallback do you use above it?</>}
      />

      {/* axis: F3 — second variant */}
      <VIS.TrapProblem
        id="longer-f3b"
        difficulty="hard"
        title="F3b — Loss looks fine, online metric flat"
        scenario={<>Training loss decreases normally, offline NDCG improves with scale, but online CVR is flat. Diagnose the most LONGER-specific cause.</>}
        options={[
          {key:"a", text:"The merge layer is overfitting to in-distribution sequences during training but produces inconsistent merge decisions at serving time on out-of-distribution histories — silent train/serve skew localized at the merge layer. Diagnostic: log the count and identity of merged-token-groups; compare offline-train to online-serving distributions.", correct:true},
          {key:"b", text:"Standard offline-online gap; ignore."},
          {key:"c", text:"Calibration drift."},
          {key:"d", text:"GPU thermal throttling."},
        ]}
        trap={<>(b) abdicates diagnosis. (c) would shift predictions broadly, not specifically the offline-online gap. (d) is irrelevant.</>}
        lens={<>Merge is a learned operator that can train/serve skew. Monitor merge stats as a first-class production metric, not just downstream NDCG.</>}
        stretch={<>What's the merge-stats dashboard a senior would build?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/2505.04421" target="_blank" rel="noopener"><strong>Sun et al. — LONGER: Scaling Up Long Sequence Modeling in Industrial Recommenders</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, RecSys 2025)</span>
          <br/>The LONGER paper. Read §3 (architecture: global token + merge + InnerTransformer), §4 (unified GPU sync), §5 (industrial deployment).
        </li>
        <li>
          <a href="https://arxiv.org/abs/2210.09461" target="_blank" rel="noopener"><strong>Bolya et al. — Token Merging (ToMe)</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICLR 2023)</span>
          <br/>The ViT-side ancestor of LONGER's token-merge layer. Useful for understanding the merge primitive divorced from the recsys context.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2004.05150" target="_blank" rel="noopener"><strong>Beltagy et al. — Longformer</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, 2020)</span>
          <br/>The alternating local+global attention pattern LONGER claims to beat on industrial CVR. Reading both back-to-back makes the architectural choice concrete.
        </li>
        <li>
          <a href="https://eugeneyan.com/writing/recsys2024/" target="_blank" rel="noopener"><strong>Eugene Yan — RecSys 2024 / 2025 notes</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Practitioner perspective on where LONGER, HSTU, TWIN V2 fit in the industrial-recsys landscape.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2407.16357" target="_blank" rel="noopener"><strong>Si et al. — TWIN V2</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, CIKM 2024)</span>
          <br/>The retrieval-then-attention sibling. Compare against LONGER for the two opposite design philosophies on long sequences.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
