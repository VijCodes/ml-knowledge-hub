        trap={<>(b)(c)(d) generic.</>}
        lens={<>S gates the memory horizon and noise amplification.</>}
        stretch={<>How to set S per surface?</>}
      />

      <VIS.TrapProblem id="pm-p13" difficulty="hard"
        title="P13 &mdash; Per-user vs global S?"
        scenario={<><em>Discriminating insight: per-user S is theoretically ideal but per-user reward streams are too sparse to estimate reliably. Practical regime is global S per surface or cohort.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Global S per surface (or per coarse cohort) is the practical regime. Per-user S is theoretically appealing but per-user reward streams are too sparse to estimate reliably; estimates would be high-variance and the front would jitter per user. Use global S with optional shrinkage to a coarse prior.", correct:true},
          {key:"b", text:"Per-user S is always required."},
          {key:"c", text:"S is the same for all surfaces."},
          {key:"d", text:"S is decorative."},
        ]}
        trap={<>(b)(c)(d) miss the data-density argument.</>}
        lens={<>Per-user is data-starved; global is robust.</>}
        stretch={<>What cohort granularity is the right compromise?</>}
      />

      <VIS.TrapProblem id="pm-p14" difficulty="hard"
        title="P14 &mdash; Plausible-misattribution: long-tail recall regressed after a S retune"
        scenario={<><em>Discriminating insight: team retuned S from 60 to 14 days &ldquo;to be more responsive&rdquo;. Share objective firing roughly monthly now decays to near-zero between firings. Front collapsed toward click + dwell; long-tail items dependent on share signal cratered.</em><br/>Diagnosis?</>}
        options={[
          {key:"a", text:"S=14 days is shorter than the typical firing interval of the share objective (~30 days), so share decays to near-zero between firings. The front collapses to click + dwell; long-tail items dependent on share signal lose support. Fix: set S per-objective with S_i &gt;= 2x typical firing interval, or shrink S upward.", correct:true},
          {key:"b", text:"GPU thermal throttling.", correct:false},
          {key:"c", text:"Catalog drift.", correct:false},
          {key:"d", text:"Cache TTL changed.", correct:false},
        ]}
        trap={<>(b)(c)(d) infra decoys.</>}
        lens={<>S must exceed objective firing interval.</>}
        stretch={<>How to detect &lsquo;S too small for objective i&rsquo;?</>}
      />

      <VIS.TrapProblem id="pm-p15" difficulty="hard"
        title="P15 &mdash; Intuitive but wrong: &ldquo;decay user features too, then we don&apos;t need PMORS&rdquo;"
        scenario={<><em>Discriminating insight: feature decay decays INPUTS; PMORS decays per-objective WEIGHTS in the Pareto sweep. Different layers. Decaying inputs cannot fix stale-objective crowding because crowding happens at the fusion stage.</em><br/>Why is the naive view wrong?</>}
        options={[
          {key:"a", text:"Feature decay reduces the influence of old INPUTS; PMORS reduces the influence of stale OBJECTIVES in the Pareto sweep. The two layers are orthogonal. Decaying features cannot fix stale-objective crowding because crowding happens at the multi-objective fusion stage, not the feature stage.", correct:true},
          {key:"b", text:"They are equivalent."},
          {key:"c", text:"Feature decay strictly subsumes PMORS."},
          {key:"d", text:"Layer matters do not."},
        ]}
        trap={<>(b)(c)(d) miss the layer separation.</>}
        lens={<>Feature decay vs objective-weight decay are different layers.</>}
        stretch={<>What does composing them look like?</>}
      />

      <VIS.TrapProblem id="pm-p16" difficulty="hard"
        title="P16 &mdash; Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: assuming &ldquo;PMORS is exp decay on objectives, S arbitrary&rdquo; cascades into picking S without reference to firing intervals, using per-user S (data-starved), skipping front-drift monitoring.</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: S calibration (must exceed objective firing intervals), global-vs-per-user S (per-user is data-starved), and front-drift monitoring (jitter passes silently). Each is load-bearing for stable PMORS deployment.", correct:true},
          {key:"b", text:"Only S calibration."},
          {key:"c", text:"Only monitoring."},
          {key:"d", text:"Nothing &mdash; it is just exp decay."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>S calibration + global S + drift monitoring jointly load-bearing.</>}
        stretch={<>Which is most often overlooked?</>}
      />

      <VIS.TrapProblem id="pm-p17" difficulty="medium"
        title="P17 &mdash; Senior vs junior framing on weak PMORS lift"
        scenario={<><em>Discriminating insight: junior lowers S; senior first audits objective firing rate &mdash; if shares fire once a quarter, no S helps.</em><br/>Which lever first?</>}
        options={[
          {key:"a", text:"Audit objective firing rates: if any objective fires too rarely (e.g., once per quarter), the decay clock has no meaningful signal and no S setting helps. Then audit Pareto front sampling density. Only then tune S. Lower S without an audit amplifies noise on already-sparse objectives.", correct:true},
          {key:"b", text:"Lower S immediately."},
          {key:"c", text:"Switch to Value Model."},
          {key:"d", text:"Switch to MMoE."},
        ]}
        trap={<>(b)(c)(d) generic or off-topic.</>}
        lens={<>Firing-rate audit -&gt; Pareto density -&gt; S tuning.</>}
        stretch={<>Dashboard panel for objective firing rate?</>}
      />

      <VIS.TrapProblem id="pm-p18" difficulty="hard"
        title="P18 &mdash; Plausible-misattribution: front oscillation alert fired daily"
        scenario={<><em>Discriminating insight: small S + bursty reward stream causes daily oscillation. Each spike pushes the front; decay erases it; front returns. Fix: smooth reward stream with a moving average before decay, or raise S above burst-quiet cycle.</em><br/>Diagnosis?</>}
        options={[
          {key:"a", text:"S is small relative to the reward stream&apos;s burst-quiet cycle. Each burst pushes the front, the rapid decay erases the push, and the front returns &mdash; daily oscillation. Fix: smooth the reward stream with a moving average before applying decay, or raise S above the burst-quiet cycle length.", correct:true},
          {key:"b", text:"GPU thermal throttling.", correct:false},
          {key:"c", text:"Catalog drift.", correct:false},
          {key:"d", text:"Cache TTL.", correct:false},
        ]}
        trap={<>(b)(c)(d) infra decoys.</>}
        lens={<>Bursty reward + small S = oscillation.</>}
        stretch={<>What moving-average window is right pre-decay smoother?</>}
      />

      <VIS.TrapProblem id="pm-p19" difficulty="hard"
        title="P19 &mdash; Production gotcha: cold-start objectives"
        scenario={<><em>Discriminating insight: freshly-launched objective has no reward history; decay clock undefined; formula returns NaN or zero. Initialise newly-launched objectives at full weight with a GRACE WINDOW during which decay does not apply.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Newly-launched objectives have no reward history; the decay clock is undefined. Initialise w_i = w_i^0 with a grace window (e.g., first 2x typical firing interval) during which decay is suspended. Without the grace window, the new objective decays out of the front before accumulating evidence.", correct:true},
          {key:"b", text:"New objectives should start at zero weight."},
          {key:"c", text:"New objectives need no special handling."},
          {key:"d", text:"Decay should apply immediately."},
        ]}
        trap={<>(b)(c)(d) miss the cold-start problem.</>}
        lens={<>Grace window for fresh objectives.</>}
        stretch={<>How long is the grace window?</>}
      />

      <VIS.TrapProblem id="pm-p20" difficulty="hard"
        title="P20 &mdash; Failure on Friday: NDCG cratered after a Sunday holiday with zero share reward"
        scenario={<><em>Discriminating insight: on holiday Sunday with zero share reward, share objective accumulated 24 extra hours of decay. With S=7 days, w_share dropped by 14% in one day. Pareto front shifted abruptly Monday; long-tail share-driven items lost ranking. Fix: gate decay on event-time, not wall-clock.</em><br/>3am page: NDCG down 18% Monday. Diagnosis?</>}
        options={[
          {key:"a", text:"Calendar-based decay tracks wall-clock time, not events. A Sunday holiday with zero share reward added 24 hours of decay with no balancing reward; w_share dropped sharply; the Pareto front shifted Monday morning. Fix: gate decay on event-time (decay only between successive events, or per-event-day) rather than wall-clock time.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Cache TTL changed."},
          {key:"d", text:"Index disk full."},

        trap={<>(b)(c)(d) miss the calendar-vs-event-time mechanism.</>}

      />

      <VIS.TrapProblem id="pm-p21" difficulty="medium"

        options={[
          {key:"a", text:"scipy Pareto solvers&apos; default tolerance is too coarse when weights span orders of magnitude (active 1.0 vs decayed 0.01). The solver treats the decayed objective as numerical noise and collapses to the active corner. Fix: tighten tolerance explicitly or renormalise weights into a common range pre-solve.", correct:true},
          {key:"b", text:"Default learning rate is wrong."},
          {key:"c", text:"Default batch size is wrong."},
          {key:"d", text:"Default optimizer is wrong."},

        trap={<>(b)(c)(d) generic.</>}

      <VIS.TrapProblem id="pm-p22" difficulty="hard" ordered
        title="P22 &mdash; Order the PMORS rollout"
        scenario={<><em>Discriminating insight: rollout = instrument reward streams, measure firing rates and pick S per surface, implement decay with grace windows, gate on event-time, Pareto solver with tight tolerance, shadow vs vanilla, front-drift dashboard.</em><br/>Order.</>}
        options={[
          {key:"a", text:"Instrument reward streams + last-active timestamps -&gt; measure firing rates and pick S per surface -&gt; implement decay with grace windows -&gt; gate decay on event-time -&gt; Pareto solver with tight tolerance -&gt; shadow vs vanilla Pareto on long-tail recall -&gt; front-drift dashboard", correct:true},
          {key:"b", text:"Skip the grace window."},

      <VIS.TrapProblem id="pm-p23" difficulty="hard"
        title="P23 &mdash; Smallest input that breaks the claimed advantage"
        scenario={<><em>Discriminating insight: stationary objectives (every objective fires at constant rate; importance never drifts) collapse PMORS lift. Decay fires uniformly; ratios constant; front identical to vanilla.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"Stationary objectives &mdash; every objective fires at the same constant rate; importance does not drift; w_i ratios stay constant under any S. The Pareto front is identical to vanilla Pareto; PMORS adds machinery for zero lift.", correct:true},

          {key:"c", text:"100M users."},
          {key:"d", text:"Catalog of 50M items."},

        title="P24 &mdash; Paper-named failure: S mis-set on bursty reward"

        options={[
          {key:"a", text:"S mis-set relative to bursty reward streams. Too small + bursty -&gt; front oscillation; too large + bursty -&gt; no recency advantage. Recommended fix: per-objective S_i = 2x typical firing interval of objective i, with a moving-average pre-decay smoother for very-bursty streams.", correct:true},
          {key:"b", text:"GPU thermal throttling is the dominant failure."},
          {key:"c", text:"Embedding dimensionality is the dominant failure."},
          {key:"d", text:"There are no failures."},

        trap={<>(b)(c)(d) misread the named failure.</>}
        lens={<>S calibration to firing interval is the named failure.</>}
        stretch={<>How does the paper recommend setting S?</>}
      />

      <VIS.TrapProblem id="pm-p25" difficulty="medium"
        title="P25 &mdash; Compose PMORS with a Value Model"
        scenario={<><em>Discriminating insight: PMORS needs per-objective scores; Value Model produces a single v. To compose: expose Value Model&apos;s per-objective heads at serve and feed PMORS, OR keep PMORS over a multi-task baseline and use Value Model elsewhere.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"PMORS needs per-objective scores; the Value Model produces a single value v at serve. To compose: expose the Value Model&apos;s per-objective heads at serve time and feed those scores into a PMORS Pareto-with-decay layer, OR keep PMORS over a multi-task baseline (MMoE/PLE) and use the Value Model elsewhere. Naive &lsquo;PMORS over v&rsquo; does not work.", correct:true},
          {key:"b", text:"They cannot compose at all."},
          {key:"c", text:"PMORS replaces the Value Model."},
          {key:"d", text:"v is a per-objective score."},

        trap={<>(b)(c)(d) misread the layer interface.</>}

      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/html/2312.16868v2" target="_blank" rel="noopener">Anon., <em>Pareto-based Multi-Objective Recommender System with Forgetting Curve</em> (2024)</a> &mdash; the canonical paper. Sections on Ebbinghaus calibration and front-drift monitoring are the must-reads.</li>

        <li><a href="https://arxiv.org/abs/2407.03580" target="_blank" rel="noopener">Hu et al., <em>Deep Pareto Reinforcement Learning for Multi-Objective Recommender Systems (DeepPRL)</em> (arXiv 2024)</a> &mdash; the static-front RL neighbour PMORS contrasts with.</li>
        <li><a href="https://medium.com/pinterest-engineering/evolution-of-multi-objective-optimization-at-pinterest-home-feed-06657e33cd10" target="_blank" rel="noopener">Pinterest &mdash; <em>Evolution of Multi-Objective Optimization at Pinterest Home Feed</em> (2026)</a> &mdash; the Value Model sibling; useful to see when PMORS-style decay loses to learned in-model fusion.</li>
