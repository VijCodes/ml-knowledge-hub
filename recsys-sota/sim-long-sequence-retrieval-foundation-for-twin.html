  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// SIM (Search-based Interest Model) — foundational long-sequence retrieval for CTR.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Lifelong sequence models"
      title="SIM — Search-based Interest Model (foundation for TWIN)"
      subtitle="Two-stage attention over a user's lifetime: cheap category retrieval first, expensive attention second."
      byline={[
        {label: "Paper", value: "Pi et al., CIKM 2020"},
        {label: "Use", value: "Industry baseline through 2024"},
      ]}/>

    <VIS.TLDR>
      Instead of attending over a user's last K events (like <VIS.Term def="Deep Interest Network — applies attention from the candidate item over a user's recent behavior sequence (typically K=100-1000).">DIN</VIS.Term>),
      SIM keeps the entire <strong>lifelong</strong> history (often 10K-50K events) and uses a two-stage shortlist:
      a hard category filter (<strong>GSU</strong>) followed by candidate-conditioned attention (<strong>ESU</strong>).
      You get most of the signal of attending over everything at 1% of the FLOPs.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        A user's lifelong behavior sequence is <em>too long</em> to attend over directly — 50K events × 64-dim embedding × ~256 candidates per request blows the latency budget by 100×.
        <VIS.Term def="Search-based Interest Model — Alibaba 2020. Two-stage attention over lifelong user history: hard or soft retrieval first, then candidate-conditioned attention over the shortlist.">SIM</VIS.Term> solves this with a two-stage architecture:
      </p>
      <ol>
        <li><strong><VIS.Term def="General Search Unit — the first stage of SIM. Retrieves a short relevant subsequence from the user's lifelong history using a cheap signal (typically category match between candidate and history items).">GSU (General Search Unit)</VIS.Term></strong> — given a candidate item, retrieve the K' (~100-200) most relevant events from the user's lifelong history. SIM-Hard uses inverted-index lookup on category/tag id; SIM-Soft uses a coarse embedding similarity.</li>
        <li><strong><VIS.Term def="Exact Search Unit — the second stage of SIM. Runs full candidate-conditioned attention (DIN-style) over the K' items retrieved by GSU.">ESU (Exact Search Unit)</VIS.Term></strong> — run the expensive DIN-style attention over the short K' shortlist.</li>
      </ol>

      <VIS.Mermaid chart={`
flowchart TB
  U["Lifelong history<br/>10K-50K events"]
  C["Candidate item"]
  C --> GSU["GSU: hard or soft retrieval"]
  U --> GSU
  GSU --> SHORT["Shortlist K' = 100-200"]
  C --> ESU["ESU: DIN-style attention"]
  SHORT --> ESU
  ESU --> INT["User interest vector"]
  INT --> CTR["CTR head"]
  style GSU fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style ESU fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `} />
      <p style={{color: "#475569", fontSize: 14}}>The GSU is the latency win: it turns an O(N) attention into O(K') by pre-filtering N→K' with a cheap index.</p>
    </VIS.Section>

    <VIS.Section id="sec-differs" title="How it differs from DIN and YouTubeDNN">
      <table style={{width: "100%", borderCollapse: "collapse", fontSize: 14}}>
        <thead><tr style={{background: "#1f3a5f", color: "white"}}>
          <th style={{padding: 8, textAlign: "left"}}>Approach</th>
          <th style={{padding: 8, textAlign: "left"}}>History length</th>
          <th style={{padding: 8, textAlign: "left"}}>Retrieval signal</th>
          <th style={{padding: 8, textAlign: "left"}}>Compute per candidate</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding: 8}}>YouTubeDNN avg-pool</td><td style={{padding: 8}}>~50 (truncated)</td><td style={{padding: 8}}>none — flat avg</td><td style={{padding: 8}}>O(1)</td></tr>
          <tr style={{background: "#e8f0fa"}}><td style={{padding: 8}}>DIN</td><td style={{padding: 8}}>last 100-1000</td><td style={{padding: 8}}>attention</td><td style={{padding: 8}}>O(K) with K=100-1000</td></tr>
          <tr><td style={{padding: 8}}><strong>SIM-Hard</strong></td><td style={{padding: 8}}><strong>10K-50K (lifelong)</strong></td><td style={{padding: 8}}>category-id inverted index</td><td style={{padding: 8}}>O(K') with K'≈100</td></tr>
          <tr style={{background: "#e8f0fa"}}><td style={{padding: 8}}><strong>SIM-Soft</strong></td><td style={{padding: 8}}>lifelong</td><td style={{padding: 8}}>coarse embedding sim</td><td style={{padding: 8}}>O(N) coarse + O(K') exact</td></tr>
          <tr><td style={{padding: 8}}>TWIN</td><td style={{padding: 8}}>lifelong</td><td style={{padding: 8}}>shared QK projection</td><td style={{padding: 8}}>O(N) but cheap</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick SIM">
      <ul>
        <li><strong>Pre-TWIN baseline.</strong> Most production CTR systems should start here before TWIN V2 — SIM-Hard is a one-week build on top of an inverted-index store you probably already have.</li>
        <li><strong>CPU-only serving.</strong> SIM-Hard's GSU is a category-id lookup — no GPU needed. ESU runs on ~K'=100 items so a small MLP+attention fits comfortably on CPU.</li>
        <li><strong>Catalog with strong category structure.</strong> E-commerce, news, video — anywhere items have meaningful taxonomy that overlaps with intent.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations">
      <VIS.Callout kind="gotcha" title="Hard-search blind spot">
        SIM-Hard's category match misses semantic neighbors with different categories. A user who watches Marvel movies (category=Action) won't have Pixar (category=Animation) surfaced by GSU even if they'd love it. TWIN's shared-QK-projection retrieval recovers this.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Category-tree drift">
        Your retrieval quality is now bottlenecked by your category taxonomy. When the catalog team adds 200 new sub-categories overnight, GSU recall changes silently. Monitor "items eligible at GSU stage" alongside CTR.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-problems" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>Twelve senior-MLE prompts on SIM and its tradeoffs vs DIN / TWIN.</p>

      <VIS.TrapProblem
        id="sim-p1"
        difficulty="hard"
        title="P1 — CPU-only serving, 50K history, 30ms p99"
        scenario={<>Short-form video CTR ranker. You serve on CPU only (no GPU in the ranking tier). User lifelong history p99 = 50K events. Latency budget for the user-interest module is 30ms p99 per request, ~256 candidates scored per request. Three options on the table.</>}
        options={[
          {key:"a", text:"DIN over last 1000 events — proven, simple, gives you most of the signal."},
          {key:"b", text:"SIM-Hard with category-id inverted index, K'=100 ESU shortlist.", correct:true},
          {key:"c", text:"TWIN V2 — better retrieval quality, recovers semantic neighbors."},
          {key:"d", text:"Avg-pool over the full 50K — embarrassingly parallel on CPU."},
        ]}
        trap={<>(c) is the textbook "best" model but TWIN V2 needs full QK attention over N events per candidate — that's 50K × 256 candidates × 64-dim per request. Without a GPU you blow the latency budget by ~100×. (a) truncates to 1K which abandons the lifelong signal that's the entire reason to consider these models. (d) avg-pooling 50K events drops the per-candidate signal — every candidate gets the same user vector.</>}
        lens={<>SIM-Hard is the right CPU-budget answer. GSU is a single inverted-index lookup per (user, candidate-category) — microseconds. ESU runs DIN-style attention over K'=100 items, which fits comfortably in 30ms p99 on CPU. Upgrade to TWIN later when you can afford the GPU tier.</>}
        stretch={<>If you could add ONE GPU instance to the ranking tier, would you spend it on TWIN or on a deeper ranker? Why?</>}
      />

      <VIS.TrapProblem
        id="sim-p2"
        difficulty="hard"
        title="P2 — Cold-category items get zero GSU retrieval"
        scenario={<>SIM-Hard in production for 6 months. PM complains: a new merchant category ("vintage watches") launched 2 weeks ago has 10× lower CTR than existing comparable categories. Investigation: items in this category never appear in any user's GSU shortlist, so ESU never sees them as relevant history. Root cause + fix?</>}
        options={[
          {key:"a", text:"Bug in inverted index — rebuild it nightly."},
          {key:"b", text:"GSU is keyed on user history × candidate category; no user has 'vintage watches' history yet, so no shortlist contains them — cold-category cold-start. Add a fallback path (SIM-Soft embedding retrieval or broader parent-category match).", correct:true},
          {key:"c", text:"Add more training data for the new category."},
          {key:"d", text:"Reduce K' from 100 to 50 to force tighter matches."},
        ]}
        trap={<>(a) blames infra when the design is doing exactly what it was specified to do. (c) and (d) don't address that GSU has STRUCTURAL recall=0 for any user-category pair where the user has never interacted with that category. The first time anyone sees vintage watches, they don't have vintage-watch history, so GSU returns empty, so ESU has nothing to attend over, so the user-interest signal collapses to a zero vector.</>}
        lens={<>This is the canonical hard-search blind spot. The cure is a fallback retrieval path: SIM-Soft (coarse embedding similarity) catches the user who has "luxury accessories" history even without "vintage watches" specifically. Production deployments typically run BOTH in parallel and union the shortlists.</>}
        stretch={<>If you could only deploy one of SIM-Hard or SIM-Soft (not both), which catches more long-tail items and which has lower latency?</>}
      />

      <VIS.TrapProblem
        id="sim-p3"
        difficulty="medium"
        multiSelect
        title="P3 — What does the GSU actually retrieve?"
        scenario={<>Junior on your team is reading the SIM paper for the first time. They ask: "For SIM-Hard with category-id matching, when a candidate item arrives, what does the GSU return?" Select all that apply.</>}
        options={[
          {key:"a", text:"The K' most recent items in the user's lifelong history whose category matches the candidate's category.", correct:true},
          {key:"b", text:"The K' items most similar to the candidate by full embedding distance."},
          {key:"c", text:"The K' items in the user's history with highest historical CTR."},
          {key:"d", text:"Items keyed by category-id; a recency or relevance ranking inside that bucket gives the final K'.", correct:true},
        ]}
        trap={<>(b) describes SIM-Soft, not SIM-Hard. (c) confuses GSU (per-user index) with a global popularity prior. Both (a) and (d) describe correct variants of the hard-search policy — recency is the canonical implementation.</>}
        lens={<>SIM-Hard maintains a per-user inverted index: category-id → list-of-events-by-recency. At query time you take the candidate's category, look up the user's history under that key, and return the top-K' by recency. The ESU then attends over those K'.</>}
        stretch={<>Why might "top-K' by recency" be a worse policy than "top-K' by attention score from a cheap teacher model"?</>}
      />

      <VIS.TrapProblem
        id="sim-p4"
        difficulty="hard"
        title="P4 — SIM-Soft index drift"
        scenario={<>SIM-Soft in production. The coarse embedding used for GSU retrieval is from a model trained 4 months ago and has not been refreshed. The ESU attention model is retrained weekly. You notice the gap between training NDCG and serving NDCG is widening by ~0.5pp per week. What's the most likely cause?</>}
        options={[
          {key:"a", text:"ESU is overfitting — add dropout."},
          {key:"b", text:"GSU embedding has drifted from the catalog distribution; ESU is trained on whatever GSU surfaces today, but the index serves yesterday's neighbors. Refresh the index OR co-train GSU+ESU.", correct:true},
          {key:"c", text:"User behavior has shifted — collect more data."},
          {key:"d", text:"Latency budget is being missed — investigate the serving stack."},
        ]}
        trap={<>(a) and (c) are generic answers that don't engage with SIM's two-stage structure. (d) is unrelated. The widening gap is a classic GSU/ESU coupling bug: ESU's training-time and serving-time inputs come from different GSU distributions because the GSU model is frozen while ESU keeps moving.</>}
        lens={<>Two-stage retrievers fail when the stages drift apart. Fixes: (1) refresh the GSU embedding/index on the same cadence as ESU; (2) co-train — let ESU's gradient flow back into GSU; (3) retrieval-augmented training — at train time, sample from the LIVE serving GSU output, not a precomputed one.</>}
        stretch={<>Why can't you just freeze the GSU AND the ESU together?</>}
      />

      <VIS.TrapProblem
        id="sim-p5"
        difficulty="hard"
        title="P5 — Memory: how much does lifelong history cost?"
        scenario={<>1B active users, mean lifelong history = 8K events, p99 = 50K. Each event = (item_id int64, category_id int32, timestamp int32, action_type int8) = 20 bytes. SIM-Hard stores per user an inverted index: category → recency-ordered event list. Avg 200 distinct categories per user, ~40 events per category. What's the rough memory cost to serve SIM-Hard from RAM at this scale?</>}
        options={[
          {key:"a", text:"~16 TB raw, easily fits in a single replica."},
          {key:"b", text:"~16 TB raw — need ~30 sharded replicas of 1TB-class boxes with index overhead, hot/cold tiering, and replication factor 3.", correct:true},
          {key:"c", text:"~160 GB — single beefy box."},
          {key:"d", text:"~1.6 PB — only feasible on disk."},
        ]}
        trap={<>Math check: 1B users × 8K events × 20 bytes = 160 TB raw. Wait — let me redo: 1B × 8K × 20 = 1.6e11 × 1000 = 1.6e14 bytes? Actually: 1e9 × 8e3 × 20 = 1.6e14 bytes = 160 TB. With inverted-index overhead (~2×) and replication factor 3, ~1 PB. (a) and (c) lowball by 100-1000×. (d) overshoots replication-aware estimate; with hot/cold tiering only the recent slice needs RAM.</>}
        lens={<>The real production trick is hot/cold tiering: keep last 90 days of history per user in RAM (~10% of events), spill older history to NVMe with a cache. SIM benefits because GSU's category-keyed lookup has high locality — a user typically interacts with a stable set of categories so their RAM-resident slice covers ~90% of GSU hits.</>}
        stretch={<>If you couldn't afford hot/cold tiering, what's the next compression trick worth trying?</>}
      />

      <VIS.TrapProblem
        id="sim-p6"
        difficulty="medium"
        title="P6 — Bias-variance lens on SIM vs DIN"
        scenario={<>You're comparing DIN (K=1000 attention) vs SIM (lifelong + K'=100 ESU) on the same training data. SIM has access to far more events per user but attends over fewer at scoring time. Which framing is most accurate?</>}
        options={[
          {key:"a", text:"SIM has lower bias — it sees more of the user's interest distribution via lifelong history."},
          {key:"b", text:"SIM has lower variance — averaging over a fixed shortlist reduces noise vs sampling from a long sequence."},
          {key:"c", text:"SIM trades a tiny bias hit (GSU misses) for a large variance hit reduction (lifelong signal stabilizes long-term preferences)."},
          {key:"d", text:"SIM reduces irreducible noise by capturing the user's true latent interest more completely than DIN's last-K window can.", correct:true},
        ]}
        trap={<>(a) is partially right but vague — what BIAS exactly? (b) confuses ESU's K' with classical variance. (c) gets the direction right but the magnitudes wrong — GSU's bias hit is small only when category structure is good; on long-tail it's significant.</>}
        lens={<>The cleanest framing: DIN's K-event truncation throws away the user's stable long-term interests; SIM keeps them. This is closer to "reducing the label noise" (the score is more reflective of the user's true preference) than to bias or variance specifically. The classical bias-variance frame doesn't map perfectly to retrieval-then-rank pipelines.</>}
        stretch={<>If a user's interests change EVERY DAY (high non-stationarity), does SIM's lifelong advantage still hold?</>}
      />

      <VIS.TrapProblem
        id="sim-p7"
        difficulty="hard"
        multiSelect
        title="P7 — Migrating from DIN to SIM: what to watch"
        scenario={<>You're shipping a SIM-Hard rollout to replace a DIN-K=200 baseline. The A/B test setup: 50/50 traffic split, primary metric = revenue/session, secondary = CTR. Which of the following should you instrument BEFORE the A/B starts? Select all that apply.</>}
        options={[
          {key:"a", text:"GSU shortlist size distribution per request (mean/p50/p99) — diagnoses cold-category failures.", correct:true},
          {key:"b", text:"Long-tail item exposure rate vs DIN — SIM may concentrate impressions on high-history users' favorite categories.", correct:true},
          {key:"c", text:"Per-category CTR delta — surfaces where SIM helps vs hurts.", correct:true},
          {key:"d", text:"Model file size on disk."},
          {key:"e", text:"GPU memory headroom — SIM is more memory-hungry than DIN."},
          {key:"f", text:"Index freshness lag (event → indexed) at p99 — stale index = stale shortlist.", correct:true},
        ]}
        trap={<>(d) is irrelevant to an A/B comparison. (e) is wrong — SIM-Hard actually has lower runtime memory than DIN at scoring time (K'=100 vs K=200); the index is bigger but lives in a separate store. (b) is the subtle one that catches juniors: SIM's lifelong-history advantage benefits power users disproportionately; long-tail items can lose exposure even when the global CTR goes up.</>}
        lens={<>Four worth instrumenting: shortlist-size, long-tail-exposure, per-category delta, index-freshness. Together they give you a fairness + freshness + per-segment picture that single-number aggregate metrics will miss.</>}
        stretch={<>If long-tail exposure drops 20% but revenue/session goes up 3%, do you ship?</>}
      />

      <VIS.TrapProblem
        id="sim-p8"
        difficulty="hard"
        title="P8 — GSU recall is the ceiling"
        scenario={<>You measure that on a held-out set, GSU returns the "true positive" relevant historical event in its top-K'=100 only 78% of the time (recall@100). Your ESU then attends over the GSU output. What's the ceiling on the ESU's contribution to NDCG@10?</>}
        options={[
          {key:"a", text:"None — ESU is a strong learner and can compensate."},
          {key:"b", text:"GSU recall@100 = 0.78 caps the full pipeline at ~78% of its theoretical-perfect performance. ESU can only re-rank what it's given.", correct:true},
          {key:"c", text:"NDCG is rank-based; recall doesn't bound it."},
          {key:"d", text:"Depends only on ESU's architecture."},
        ]}
        trap={<>(a) is a confidence-in-the-model fallacy: re-ranking can only re-order; it cannot generate items GSU didn't surface. (c) sounds technical but is wrong — when the relevant item is absent from the shortlist, NDCG WILL be capped because the relevant doc cannot appear in the ranking.</>}
        lens={<>Two-stage pipelines have a fundamental ceiling: stage-2 recall ≤ stage-1 recall. If GSU misses 22% of relevant events, no ESU architecture changes this. The real fix is improving GSU — bigger K', SIM-Soft fallback, or co-training so ESU's gradient pushes GSU toward better recall.</>}
        stretch={<>What's a quick experiment to estimate GSU's recall ceiling without labeled ground truth?</>}
      />

      <VIS.TrapProblem
        id="sim-p9"
        difficulty="medium"
        title="P9 — Why not just increase K in DIN to 50K?"
        scenario={<>A skeptic on your team says: "If lifelong history is so valuable, why not just set K=50000 in DIN and call it a day? Attention is O(K·d), GPUs are fast."</>}
        options={[
          {key:"a", text:"You're right, K=50000 DIN is equivalent — just more expensive."},
          {key:"b", text:"Per-candidate attention over 50K events × ~256 candidates per request × QPS = 100K+ events/ms — impossible at production latency even on H100s. SIM's two-stage decouples shortlist (cheap) from attention (expensive but small).", correct:true},
          {key:"c", text:"DIN's softmax is numerically unstable above K=10K."},
          {key:"d", text:"Attention noise grows with K; SIM denoises via category filter."},
        ]}
        trap={<>(a) is the naive scaling-laws fallacy. (c) is wrong — softmax is fine at any K. (d) is a poetic but unjustified framing.</>}
        lens={<>The math: production CTR rankers score 100-500 candidates per request at 1000+ QPS. K=50000 DIN attention = 50K × 256 candidates × 64-dim × 1000 QPS = 8e11 FLOPs/sec/replica — multiple H100s per replica purely for attention. SIM-Hard's GSU is microseconds; ESU's K'=100 attention is 500× cheaper than K=50K DIN. Same lifelong signal, two orders of magnitude less compute.</>}
        stretch={<>At what K does DIN become cheaper than SIM, if ever?</>}
      />

      <VIS.TrapProblem
        id="sim-p10"
        difficulty="hard"
        title="P10 — SIM vs TWIN under tight GPU budget"
        scenario={<>You have a fixed GPU budget. TWIN V2 promises +1.5% NDCG vs SIM-Hard but costs 4× the GPU at serving time. Your existing CTR pipeline runs DIN. Choose your roadmap.</>}
        options={[
          {key:"a", text:"Skip SIM, go straight to TWIN V2 — better destination."},
          {key:"b", text:"Ship SIM-Hard first (lifelong signal with minimal infra), measure the lift, then decide if TWIN's marginal +1.5% justifies the 4× GPU cost.", correct:true},
          {key:"c", text:"Stay on DIN; the gain isn't worth the migration."},
          {key:"d", text:"Build TWIN and SIM in parallel, A/B between them."},
        ]}
        trap={<>(a) skips the cheap, large win for the expensive, marginal one. (c) leaves money on the table — SIM's lifelong signal is typically a 2-5% lift over DIN. (d) wastes engineering budget by building two architectures simultaneously when one is a prerequisite baseline for the other.</>}
        lens={<>SIM is the right NEXT step from DIN. It captures most of the lifelong-history value (typically 80% of TWIN's headline gain) at 1/10 of TWIN's serving cost. Ship SIM, measure, then justify TWIN's 4× cost from a baseline that already has lifelong-signal value.</>}
        stretch={<>If the +1.5% from TWIN translates to $50M/year revenue, what's the breakeven GPU cost?</>}
      />

      <VIS.TrapProblem
        id="sim-p11"
        difficulty="medium"
        title="P11 — Index update cadence"
        scenario={<>The user-history inverted index for SIM-Hard is updated... how often? Pick the most defensible production choice for a video-streaming CTR ranker.</>}
        options={[
          {key:"a", text:"Real-time (every event): tightest freshness, highest write QPS."},
          {key:"b", text:"Near real-time (every ~5 minutes via micro-batch on Kafka): balances freshness and write cost.", correct:true},
          {key:"c", text:"Nightly batch: simplest, lowest write cost."},
          {key:"d", text:"Weekly: index updates rarely matter for lifelong signal."},
        ]}
        trap={<>(a) is the gold-plated option that doubles your write infra cost for marginal CTR benefit on most workloads. (c) and (d) break session-level personalization: a user who just watched 3 thrillers should have those visible to SIM within minutes, not tomorrow. The right answer is workload-dependent — short-form video (TikTok-class) wants real-time; movie streaming can tolerate 5-min lag.</>}
        lens={<>The 5-min near-real-time sweet spot is industry consensus for "lifelong + responsive" CTR: writes are micro-batched (cheap), the lag is below user-perception threshold, and the index store doesn't melt under per-event writes. Tight feedback loops (search, ads bidding) push to real-time; slower content (LinkedIn feed) can tolerate hourly.</>}
        stretch={<>What's the simplest hack to get "real-time-feeling" without real-time index writes?</>}
      />

      <VIS.TrapProblem
        id="sim-p12"
        difficulty="hard"
        multiSelect
        title="P12 — Evaluating SIM offline before A/B"
        scenario={<>You want offline confidence that SIM-Hard will outperform DIN before burning A/B traffic. What offline experiments would you run? Select all that apply.</>}
        options={[
          {key:"a", text:"Replay-style eval on held-out future days: score both models, compute NDCG@10 against actual clicks.", correct:true},
          {key:"b", text:"Counterfactual eval (IPS-weighted) to debias the logged-policy effect.", correct:true},
          {key:"c", text:"Per-user-segment offline metric — does SIM win on power users (long history) AND tail users (short history)?", correct:true},
          {key:"d", text:"Just look at training loss — lower loss = better model."},
          {key:"e", text:"Latency benchmarking at production QPS to confirm SIM fits the budget.", correct:true},
          {key:"f", text:"Visual inspection of 100 random recommendations."},
        ]}
        trap={<>(d) is the lazy fallback — training loss differences between architectures don't reliably predict A/B outcomes. (f) is fine as a sanity check but never sufficient. The four solid offline experiments stress different failure modes: replay (basic quality), counterfactual (debiased), per-segment (fairness), latency (serving feasibility).</>}
        lens={<>Senior practice is to combine multiple offline signals BEFORE the A/B: replay for relative quality, counterfactual for debiased estimates, per-segment for hidden regressions, and a latency benchmark to confirm serving headroom. Any of the four can kill a launch on its own.</>}
        stretch={<>If counterfactual eval shows SIM wins but replay says they tie, which do you trust more?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2006.05639" target="_blank" rel="noopener"><strong>Pi et al. — Search-based User Interest Modeling with Lifelong Sequential Behavior Data for CTR Prediction</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, CIKM 2020)</span><br/>The original SIM paper. Read sections 3 (architecture) and 4 (offline + online results) — they motivate the GSU/ESU split with concrete latency numbers from Alibaba's display ads.</li>
        <li><a href="https://arxiv.org/abs/2302.02352" target="_blank" rel="noopener"><strong>Chang et al. — TWIN: TWo-stage Interest Network for Lifelong User Behavior Modeling</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, KDD 2023)</span><br/>The direct successor. Read it after SIM — TWIN's "consistency-preserving" shared QK projection is the cure for SIM-Hard's hard-search blind spot.</li>
        <li><a href="https://arxiv.org/abs/2407.16357" target="_blank" rel="noopener"><strong>Si et al. — TWIN V2: Scaling Ultra-Long User Behavior Sequence Modeling for Enhanced CTR Prediction</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, 2024)</span><br/>Production-scale TWIN at Kuaishou. The serving-system section is the best public account of how a lifelong-attention model actually gets to 1B QPS.</li>
        <li><a href="https://arxiv.org/abs/1706.06978" target="_blank" rel="noopener"><strong>Zhou et al. — Deep Interest Network for CTR Prediction</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, KDD 2018)</span><br/>The DIN paper. Required background — SIM's ESU IS DIN, just applied to the GSU shortlist instead of the raw history.</li>
        <li><a href="https://github.com/THUwangcy/ReChorus" target="_blank" rel="noopener"><strong>ReChorus — open-source RecSys benchmark with DIN and SIM implementations</strong></a> <span style={{color:"#64748b", fontSize:14}}>(code)</span><br/>The cleanest small-codebase reference for the two-stage retrieval pattern. Read the SIM module to see how the inverted-index lookup is implemented on a single GPU.</li>
      </ul>
    </VIS.Section>
  </main>
);
