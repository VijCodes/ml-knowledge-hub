      <VIS.TrapProblem
        id="nucb-e4"
        difficulty="hard"
        mode="ordered"
        title="E4 — Rollout sequence: LinUCB -> NeuralUCB-Delay"
        scenario={<>Migrate from LinUCB to NeuralUCB-Delay. Order the phases. Items that don't belong are not ranked.</>}
        options={[
          {key:"a", text:"Audit delay distribution: confirm max delay D and 99th percentile.", order:1},
          {key:"b", text:"Train shadow NeuralUCB on logged data; use last-layer-feature bonus; verify offline regret vs LinUCB.", order:2},
          {key:"c", text:"Enable buffered IW updates on shadow; confirm bias correction.", order:3},
          {key:"d", text:"1% traffic ramp; monitor predicted-vs-realized drift and per-arm pull distribution.", order:4},
          {key:"e", text:"Full ramp; weekly U recompute; monthly delay-distribution audit.", order:5},
          {key:"f", text:"Day-1 swap of LinUCB for full-gradient NeuralUCB."},
          {key:"g", text:"Enable IW after full ramp."},
        ]}
        trap={<>(f), (g) skip delay handling.</>}
        lens={<>Delay audit + IW BEFORE ramp. Otherwise you're shipping bias.</>}
        stretch={<>What's the exit criterion from shadow?</>}
      />

      {/* E5 — reproducibility */}
      <VIS.TrapProblem
        id="nucb-e5"
        difficulty="medium"
        title="E5 — Paper-to-production reproducibility"
        scenario={<>The ICML 2020 paper reports regret bounds in synthetic environments. Which detail is hardest to reproduce in production?</>}
        options={[
          {key:"a", text:"The full-gradient g(x) used in the paper's experiments. The paper assumes the theoretical bonus; production approximations (last-layer, random feature) deviate measurably from the paper's regret curves. The empirical regret curves are conditional on the full-gradient computation, which production cannot afford.", correct:true},
          {key:"b", text:"Learning rate."},
          {key:"c", text:"Network width."},
          {key:"d", text:"Number of steps."},
        ]}
        trap={<>(a) requires recognizing the gradient choice IS the experiment.</>}
        lens={<>The paper's regret curves are full-gradient curves. Production curves with last-layer features look different.</>}
        stretch={<>Which 2024 paper publishes reproducible last-layer regret?</>}
      />

      {/* E6 — eval contamination */}
      <VIS.TrapProblem
        id="nucb-e6"
        difficulty="hard"
        title="E6 — Eval contamination"
        scenario={<>An offline benchmark says NeuralUCB beats LinUCB by 22% NDCG on the YouTube-like dataset. How is this likely contaminated?</>}
        options={[
          {key:"a", text:"NDCG is a RANKING metric on a fixed held-out set; LinUCB and NeuralUCB are BANDITS optimizing cumulative reward. The metric ignores exploration cost entirely. NeuralUCB's better predictive accuracy at the end of training translates to higher NDCG, but ignore the regret it accumulated to get there. Honest comparison: cumulative reward over the training horizon, not endpoint NDCG.", correct:true},
          {key:"b", text:"NDCG is always trustworthy."},
          {key:"c", text:"LinUCB doesn't have NDCG."},
          {key:"d", text:"Sample size too small."},
        ]}
        trap={<>(b) is the convenience claim; (a) requires distinguishing exploration cost from final accuracy.</>}
        lens={<>Bandit eval must include exploration cost. Final-prediction-accuracy benchmarks are misleading for bandits.</>}
        stretch={<>What's the right offline bandit metric?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      {/* F1 — edge case: width m -> infinity */}
      <VIS.TrapProblem
        id="nucb-f1"
        difficulty="hard"
        title="F1 — Edge case: m → infinity"
        scenario={<>What does NeuralUCB converge to in the infinite-width limit?</>}
        options={[
          {key:"a", text:"The Neural Tangent Kernel (NTK) bandit. At infinite width, the network behavior is exactly linear in theta with features g(x) = grad_theta f, and the network's function class is a fixed RKHS defined by the NTK. NeuralUCB becomes Kernel-UCB with the NTK kernel. This is the theoretical reference point against which all finite-width practical NeuralUCBs are measured.", correct:true},
          {key:"b", text:"LinUCB on raw x."},
          {key:"c", text:"epsilon-greedy."},
          {key:"d", text:"Thompson sampling."},
        ]}
        trap={<>(a) requires the NTK insight; (b) is the surface miss.</>}
        lens={<>Infinite-width limit IS Kernel-UCB with NTK. Finite-width production is an approximation.</>}
        stretch={<>Which kernel does the NTK reduce to for ReLU networks?</>}
      />

      {/* F2 — adversarial */}
      <VIS.TrapProblem
        id="nucb-f2"
        difficulty="hard"
        title="F2 — Adversarial reward corruption"
        scenario={<>An attacker injects fake clicks on specific (user, item) pairs. NeuralUCB's MSE loss treats every observation equally. What's the impact, and what does Robust-NeuralUCB (NeurIPS 2024) do differently?</>}
        options={[
          {key:"a", text:"Vanilla NeuralUCB: ridge / MSE estimator's bias scales linearly with corruption fraction; theta drifts toward the attacker's preferred predictions. Robust-NeuralUCB replaces MSE with a Huber or trimmed loss; the influence function of corrupt samples is bounded; bias scales as o(corruption fraction) under mild conditions. Same architecture, different loss head.", correct:true},
          {key:"b", text:"Vanilla NeuralUCB is robust by default."},
          {key:"c", text:"Robust variant uses a different network."},
          {key:"d", text:"Corruption is impossible in bandits."},
        ]}
        trap={<>(b) is the lazy claim; (d) confidently wrong.</>}
        lens={<>The robustness lives in the loss, not the architecture. Huber/trimmed loss bounds influence.</>}
        stretch={<>What's the corruption threshold where the bound holds?</>}
      />

      {/* F3 — Bayesian NN vs NeuralUCB confidence comparison */}
      <VIS.TrapProblem
        id="nucb-f3"
        difficulty="hard"
        title="F3 — Bayesian NN vs NeuralUCB confidence"
        scenario={<>Your colleague proposes replacing NeuralUCB with a Bayesian Neural Network (BNN — variational posterior over weights, sample-based predictive variance) and using BNN's posterior variance as the exploration bonus. "Same idea, more principled." Where does BNN-bonus differ from NeuralUCB-bonus in regret behavior, and which design choice in BNN training secretly controls exploration tightness?</>}
        options={[
          {key:"a", text:"NeuralUCB's bonus comes from frequentist confidence on a single MAP estimate via the gradient-feature covariance U; BNN's bonus comes from Bayesian posterior variance dependent on (i) prior choice, (ii) variational family (mean-field vs full-rank), (iii) KL weight. Critically, mean-field BNN systematically UNDER-estimates posterior variance — well-known pathology — so mean-field-BNN-as-bandit will UNDER-explore (the opposite failure mode from NeuralUCB's over-exploration). The KL weight beta is the secret knob: it functions as BNN's analog of gamma but with no published regret-preserving setting. NeuralUCB has theoretical bonus calibration; BNN has heuristic calibration.", correct:true},
          {key:"b", text:"BNN and NeuralUCB are mathematically identical."},
          {key:"c", text:"BNN always has a tighter bonus."},
          {key:"d", text:"BNN cannot be used for bandits."},
        ]}
        trap={<>(b) the false-equivalence; (c) ignores mean-field under-estimation; (d) over-strong — BNN bandits exist but lack matched theory.</>}
        lens={<>Source of uncertainty differs: NeuralUCB = frequentist gradient covariance; BNN = Bayesian posterior shape. Mean-field BNN under-explores; KL weight is the hidden bandit knob with no published regret bound.</>}
        stretch={<>Is full-rank BNN tractable at production net size?</>}
      />

      {/* F4 — paper-named */}
      <VIS.TrapProblem
        id="nucb-f4"
        difficulty="hard"
        title="F4 — Paper-named failure mode"
        scenario={<>The ICML 2020 NeuralUCB paper specifically warns about ONE failure mode the regret bound does NOT cover. Which?</>}
        options={[
          {key:"a", text:"Distribution shift in context features. The bound assumes contexts are drawn from a stationary distribution; if x_t's distribution shifts (seasonal, traffic), neither theta nor U keeps up — the bound is silent. The paper's empirical experiments use stationary synthetic envs to avoid this. Production deployments must either (i) periodically retrain on recent data with discounting, or (ii) explicitly model the shift.", correct:true},
          {key:"b", text:"K = 1 case."},
          {key:"c", text:"Same-step reward."},
          {key:"d", text:"Linear reward."},
        ]}
        trap={<>(b), (c), (d) are unrelated; (a) is the actual paper-named limit.</>}
        lens={<>Stationary context is the silent assumption. Real recsys violates it; mitigations are operational.</>}
        stretch={<>How does the delay variant interact with this assumption?</>}
      />

      {/* F5 — community follow-up */}
      <VIS.TrapProblem
        id="nucb-f5"
        difficulty="hard"
        title="F5 — Community-found follow-up"
        scenario={<>The 2024 NeurIPS 'Robust Neural Contextual Bandit against Adversarial Corruptions' paper specifically addresses one failure mode of NeuralUCB. Which?</>}
        options={[
          {key:"a", text:"NeuralUCB's MSE estimator has bias linear in adversarial corruption fraction. Many recsys reward streams (clicks, ratings) include systematic noise (bot clicks, troll ratings). The robust variant uses a robust loss with bounded influence functions; achieves regret + violation guarantees under a fraction of corrupted rewards. Vanilla NeuralUCB has no such bound.", correct:true},
          {key:"b", text:"NeuralUCB cannot handle binary rewards."},
          {key:"c", text:"There are no such follow-ups."},
          {key:"d", text:"NeuralUCB requires Gaussian noise."},
        ]}
        trap={<>(c) confidently wrong.</>}
        lens={<>Adversarial corruption is the named weakness; robust losses are the named fix.</>}
        stretch={<>What's the corruption rate threshold where vanilla NeuralUCB fails badly?</>}
      />

      {/* F6 — catastrophic forgetting on retrain */}
      <VIS.TrapProblem
        id="nucb-f6"
        difficulty="hard"
        title="F6 — Catastrophic forgetting on periodic retrain"
        scenario={<>You retrain NeuralUCB nightly on the past 7 days of data. Rare-but-high-value arms that were active 30 days ago no longer get explored. Why?</>}
        options={[
          {key:"a", text:"The training set excludes data older than 7 days; the network forgets the gradient-feature regions associated with those rare arms; theta no longer predicts them well; U_t's accumulated rows for those features are stale. The bonus for those arms is computed at the new theta but with old U — empirically the bonus is too small to revive them. Fix: keep a replay buffer with rare-arm samples; OR use a periodic refresh of U from a longer history.", correct:true},
          {key:"b", text:"Random forgetting."},
          {key:"c", text:"Mathematical convergence."},
          {key:"d", text:"GPU floating-point error."},
        ]}
        trap={<>(a) requires the catastrophic-forgetting + stale-U insight.</>}
        lens={<>Retrain windows interact with bandit memory. Replay buffer keeps rare arms exploreable.</>}
        stretch={<>What replay sampling preserves rare-arm coverage?</>}
      />

      {/* F7 — last-layer feature theoretical gap */}
      <VIS.TrapProblem
        id="nucb-f7"
        difficulty="hard"
        title="F7 — Last-layer-feature approximation: theoretical gap"
        scenario={<>Production NeuralUCB usually uses last-layer features for the bonus instead of full grad_theta f. What does this approximation lose?</>}
        options={[
          {key:"a", text:"Last-layer features capture only the SENSITIVITY OF THE OUTPUT TO THE LAST LAYER's WEIGHTS; the bonus only knows about uncertainty in those weights. Uncertainty about earlier-layer parameters is invisible. Net effect: bonus underestimates true uncertainty when the network is changing its representations (e.g. early training, distribution shift). The published regret bound for full-gradient NeuralUCB does NOT carry over; the practical empirical performance is often better (tighter bonus), but no clean theory.", correct:true},
          {key:"b", text:"Nothing is lost."},
          {key:"c", text:"Lower memory only."},
          {key:"d", text:"Same theory applies."},
        ]}
        trap={<>(d) is the optimistic miss; (a) requires noticing what's invisible.</>}
        lens={<>Last-layer = uncertainty about output-head only; representation uncertainty is invisible. Better empirics, worse theory.</>}
        stretch={<>Is there a 2024 paper that closes this theoretical gap?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1911.04462" target="_blank" rel="noopener"><strong>Zhou et al. — NeuralUCB</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(ICML 2020)</span>
          <br/>Primary source. Read §3 (algorithm), §4 (NTK-based regret bound), §6 (empirical comparison to LinUCB).
        </li>
        <li>
          <a href="https://proceedings.neurips.cc/paper_files/paper/2024/file/22862040c1781356c8c3df4d00e5811b-Paper-Conference.pdf" target="_blank" rel="noopener"><strong>Robust Neural Contextual Bandit against Adversarial Corruptions</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2024)</span>
          <br/>Corruption-robust variant. Read §3 (robust loss), §5 (regret bound under corruption fraction).
        </li>
        <li>
          <a href="https://arxiv.org/abs/2008.04026" target="_blank" rel="noopener"><strong>Neural Thompson Sampling</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(arXiv 2020)</span>
          <br/>Sibling for the posterior-sampling alternative. Same backbone, stochastic exploration.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2207.06820" target="_blank" rel="noopener"><strong>Delayed-Feedback Contextual Bandits</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(survey)</span>
          <br/>Catalog of delay-aware variants and their assumptions; the lineage NeuralUCB-Delay sits in.
        </li>
        <li>
          <a href="https://tor-lattimore.com/downloads/book/book.pdf" target="_blank" rel="noopener"><strong>Lattimore &amp; Szepesv&aacute;ri — Bandit Algorithms</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(textbook)</span>
          <br/>Kernel bandits chapter — the cleanest reference for the NTK-bandit limit NeuralUCB reduces to.
        </li>
      </ul>
    </VIS.Section>
  </main>
);
