  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."

  //   options={[

  //     {key:"b", text:"...", correct:true},

  //

  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,

  //

    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    //   single  → string | null
    //   multi   → Set<string>

    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)

        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }

    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Bayesian HPO — concept visual + 25 trap drills (G22 hover-gloss in prose only)

const SURROGATE_SPEC = {
  width: 600, height: 280,
  encoding: {
    x: { field: "x", type: "quantitative", title: "Hyperparameter x (e.g. log learning rate)",
         axis: { orient: "bottom" } }
  },
  layer: [
    { mark: { type: "area", color: "#bfdbfe", opacity: 0.55 },
      encoding: {
        y: { field: "lo", type: "quantitative", title: "Predicted val loss" },
        y2: { field: "hi" } } },
    { mark: { type: "line", color: "#2563eb", strokeWidth: 3 },
      encoding: { y: { field: "mu", type: "quantitative" } } },
    { mark: { type: "line", color: "#0f172a", strokeWidth: 2, strokeDash: [4, 3] },
      encoding: { y: { field: "true", type: "quantitative" } } },
    { mark: { type: "point", color: "#dc2626", filled: true, size: 90 },
      encoding: { y: { field: "obs", type: "quantitative" } } }
  ]
};
const SURROGATE_DATA = (() => {
  const obs = [{ x: 0.1, y: 0.9 }, { x: 0.35, y: 0.45 }, { x: 0.55, y: 0.30 }, { x: 0.85, y: 0.75 }];
  const truth = x => 0.6 + 0.5 * Math.sin(6 * x - 0.5) - 0.35 * Math.exp(-20 * (x - 0.55) ** 2);
  const out = [];
  for (let i = 0; i <= 50; i++) {
    const x = i / 50;
    const minD = Math.min(...obs.map(o => Math.abs(o.x - x)));
    const sigma = 0.05 + 0.45 * (1 - Math.exp(-12 * minD * minD));
    const mu = truth(x) + 0.05 * Math.sin(10 * x);
    const o = obs.find(p => Math.abs(p.x - x) < 0.011);
    out.push({ x, mu, lo: mu - sigma, hi: mu + sigma, true: truth(x), obs: o ? o.y : null });
  }
  return out;
})();

const ACQ_SPEC = {
  width: 600, height: 220,
  encoding: {
    x: { field: "x", type: "quantitative", title: "Hyperparameter x" },
    y: { field: "val", type: "quantitative", title: "Acquisition value (higher = better next pick)" },
    color: { field: "fn", type: "nominal", title: "Acquisition",
             scale: { domain: ["EI", "UCB", "PI"], range: ["#16a34a", "#dc2626", "#d97706"] } }
  },
  mark: { type: "line", strokeWidth: 3 }
};
const ACQ_DATA = (() => {
  const out = [];
  for (let i = 0; i <= 50; i++) {
    const x = i / 50;
    const d = Math.min(Math.abs(x - 0.55), Math.abs(x - 0.35));
    const sigma = 0.05 + 0.45 * (1 - Math.exp(-15 * d * d));
    const mu = 0.3 + 0.2 * Math.cos(8 * x);
    const ei = sigma * Math.exp(-((mu - 0.2) ** 2) / 0.1);
    const ucb = 2.0 * sigma - mu + 0.6;
    const pi = Math.exp(-((mu - 0.2) ** 2) / 0.05);
    out.push({ x, val: ei, fn: "EI" });
    out.push({ x, val: ucb * 0.5, fn: "UCB" });
    out.push({ x, val: pi, fn: "PI" });
  }
  return out;
})();

const App = () => (
  <main style={{ maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65 }}>
    <VIS.Hero pill="ML Fund · Concept" title="Bayesian hyperparameter optimization"
      subtitle={<>When each training run is expensive, fit a cheap <VIS.Term def="A small, cheap model fit to the (hyperparameter, val-loss) points we've already paid for. Its predictions guide where to sample next without spending another full training run.">surrogate</VIS.Term> to the loss landscape and pick the next trial smartly.</>}
      byline={[{ label: "L2", value: "HPO" }, { label: "L3", value: "Bayesian" }]} />

    <VIS.TLDR>
      Fit a <VIS.Term def="A distribution over functions: at any input x it gives both a mean prediction and an uncertainty band. The dominant Bayesian-HPO surrogate up to ~200 trials; cost is cubic in trial count.">Gaussian Process</VIS.Term> or a <VIS.Term def="Tree-structured Parzen Estimator. Models two densities — p(x | loss below quantile) and p(x | loss above) — and picks x maximizing their ratio. Optuna's default; scales linearly with trial count.">TPE</VIS.Term> over observed (hyperparameter, val-loss) points, then maximize an <VIS.Term def="A scoring function over candidate hyperparameter points that trades off exploit (low predicted mean) vs explore (high predicted uncertainty). Examples: Expected Improvement, UCB, Probability of Improvement.">acquisition function</VIS.Term> — <VIS.Term def="Expected Improvement: E[max(f_best minus f(x), 0)] under the surrogate posterior. The default acquisition for GP-BHPO; closed-form for a Gaussian posterior.">EI</VIS.Term>, <VIS.Term def="Upper Confidence Bound: mu(x) minus kappa times sigma(x) for minimization. Larger kappa shifts toward explore. Has regret guarantees under the GP-UCB analysis (Srinivas 2010).">UCB</VIS.Term>, or <VIS.Term def="Probability of Improvement: P(f(x) below f_best minus xi) under the posterior. Pure-greedy when xi=0; tends to over-exploit.">PI</VIS.Term> — to pick the next trial. The acquisition encodes the <VIS.Term def="The core HPO dilemma: exploit known-good regions vs explore uncertain ones. The surrogate's uncertainty band is what makes principled exploration possible.">exploit-vs-explore</VIS.Term> tradeoff in closed form.
    </VIS.TLDR>

    <VIS.Section id="sec-loop" title="Beat 1 — The Bayesian HPO loop">
      <VIS.Mermaid chart={`
flowchart TD
  S["1. Seed: random or Sobol sample 5-10 HP configs"]
  T["2. Train + evaluate each yields (HP, val_loss) points"]
  M["3. Fit surrogate (GP or TPE) over all points so far"]
  A["4. Maximize acquisition (EI/UCB/PI) to pick next HP"]
  R["5. Stop on budget or convergence"]
  S --> T --> M --> A --> T
  A --> R
  style M fill:#dbeafe,stroke:#2563eb
  style A fill:#dcfce7,stroke:#16a34a
      `} />
      <p>
        Step 3 produces a <VIS.Term def="The distribution over the function values after seeing the data. For a GP, the posterior at any x is itself Gaussian with closed-form mean and variance — that's what makes EI tractable.">posterior</VIS.Term> over the val-loss surface — at every candidate point we have a predicted mean and an <VIS.Term def="The surrogate's predicted standard deviation at a point. High where we have no nearby observations; low where we do. The lever that powers exploration.">uncertainty band</VIS.Term>. Step 4 collapses that posterior into a single scalar per candidate via the acquisition, and we pick the <VIS.Term def="The input value that maximizes a function — here, the next HP to try. Computed by the inner-loop optimizer over the acquisition surface.">argmax</VIS.Term>. The <VIS.Term def="The first few trials, chosen without surrogate guidance (random / Sobol / Latin hypercube) to give the surrogate something to fit. Typically 5-10 trials.">warm-up phase</VIS.Term> matters: a GP fit to one point is nearly useless. <VIS.Term def="A low-discrepancy quasi-random sequence — fills space more evenly than uniform random over small samples. Common warm-up sampler in BoTorch / Ax.">Sobol sampling</VIS.Term> is a common warm-up alternative to uniform random because it spreads the seed points more evenly.
      </p>
      <VIS.VegaLite spec={SURROGATE_SPEC} data={SURROGATE_DATA} />
      <p>
        Solid blue = surrogate <VIS.Term def="The mean of the surrogate posterior at each x. The GP's best point estimate; used by acquisition functions as the exploit signal.">posterior mean</VIS.Term>; shaded band = plus-or-minus one sigma uncertainty; dashed black = (unknown) true loss; red dots = trials we've actually paid for. Notice the uncertainty band collapses near <VIS.Term def="The (HP, val-loss) pairs we've already paid for by training and evaluating. The surrogate is fit to interpolate (or near-interpolate, under noise) these.">observed points</VIS.Term> and balloons in unexplored regions — the surrogate naturally tells you where it doesn't know. Each new <VIS.Term def="One complete (HP-config, train, evaluate, record val-loss) cycle. The unit of BHPO progress and the thing whose cost we're trying to minimize the count of.">trial</VIS.Term> shrinks the band locally and refines the global argmax estimate.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-acq" title="Beat 2 — Acquisition functions: how exploit vs explore gets encoded">
      <p>
        Three classic acquisitions, all built from the surrogate's (mu, sigma) at each candidate. Let f-star be the best observed loss so far (for minimization):
      </p>
      <VIS.Equation display tex="\mathrm{EI}(x) = \mathbb{E}\!\left[\max(f^{*} - f(x),\, 0)\right] = \sigma(x)\,\big[\,z\,\Phi(z) + \phi(z)\,\big],\;\; z = \tfrac{f^{*} - \mu(x)}{\sigma(x)}" />
      <VIS.Equation display tex="\mathrm{UCB}(x) = \mu(x) - \kappa\,\sigma(x), \qquad \mathrm{PI}(x) = \Phi\!\left(\tfrac{f^{*} - \mu(x) - \xi}{\sigma(x)}\right)" />
      <p>
        Each has its own personality. <VIS.Term def="EI equals sigma times (z Phi(z) + phi(z)). The integral-of-improvement over the posterior. Naturally trades off mean and uncertainty without an explicit knob; the default in most GP-BHPO libraries.">EI</VIS.Term> trades exploit and explore automatically via the closed-form expression — no hyperparameter needed in the simplest form. <VIS.Term def="UCB has an explicit explore knob kappa. kappa toward 0 = pure greedy on the mean; kappa toward infinity = pure variance hunt. Sweeps over time often used for theoretical regret bounds.">UCB</VIS.Term> has an explicit knob kappa — larger kappa = more explore. <VIS.Term def="PI is the probability of beating the best-so-far, ignoring magnitude. Tends to lock onto small marginal improvements near the incumbent; rarely the right choice without a tuned xi slack.">PI</VIS.Term> is the most exploit-leaning — it doesn't reward by how much you improve, only by the probability of any improvement, so it tends to stall near the incumbent.
      </p>
      <VIS.VegaLite spec={ACQ_SPEC} data={ACQ_DATA} />
      <p>
        Same surrogate state, three acquisitions, three different argmaxes. The choice of acquisition is itself a hyperparameter, and the <VIS.Term def="Maximizing the acquisition function over the HP search space. Done by L-BFGS restarts, CMA-ES, or just random sampling plus best-of-N. Cheap compared to a training run, so accuracy matters more than speed here.">inner optimization</VIS.Term> over the acquisition surface — typically done by <VIS.Term def="A quasi-Newton optimizer that uses a low-memory approximation of the Hessian. Default inner-loop optimizer for smooth acquisition surfaces; fast and gradient-based.">multistart L-BFGS</VIS.Term> or random sampling — is the inner loop that decides what to try next. The acquisition's <VIS.Term def="The peak of the acquisition surface — the HP point the surrogate currently believes is most worth evaluating next. Recomputed every iteration after refit.">argmax</VIS.Term> is what gets handed back to step 2 as the next config to train.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-surrogates" title="Beat 3 — GP vs TPE: when to pick which surrogate">
      <p>
        A GP gives a <VIS.Term def="A consistent joint distribution over the function values at every set of input points: any finite collection is multivariate Gaussian. The mathematical backbone of GP regression.">joint Gaussian posterior</VIS.Term> over the loss surface — clean, calibrated, with closed-form EI/UCB. But fitting a GP requires inverting an n-by-n <VIS.Term def="The Gram matrix K[i,j] = k(x_i, x_j) of pairwise kernel evaluations between observed points. GP inference needs its inverse, costing O(n cubed) flops and O(n squared) memory.">kernel matrix</VIS.Term>, which is <VIS.Term def="O(n cubed) compute and O(n squared) memory in the number of observed points. The scaling wall that retires GP-BHPO past 200 trials and motivated TPE / Hyperband for larger budgets.">O(n cubed) per fit</VIS.Term>. By 200 trials the GP fit dominates the per-trial cost.
      </p>
      <p>
        TPE sidesteps the cubic scaling. It models p(x | loss below gamma-quantile) as l(x) and p(x | loss at or above gamma-quantile) as g(x) with <VIS.Term def="A nonparametric density estimator: place a small kernel (often Gaussian) at each observed point and sum. TPE uses Parzen estimators for the good-vs-bad densities.">Parzen estimators</VIS.Term>, then picks x to maximize l(x)/g(x) — which turns out to be proportional to EI under mild assumptions. The cost is linear in trial count and it handles <VIS.Term def="Hyperparameters that take a discrete set of values (e.g. optimizer in {SGD, Adam, AdamW}). GPs need a kernel hack for these; TPE handles them natively via per-leaf Parzen estimators.">categorical hyperparameters</VIS.Term> natively, including <VIS.Term def="Hyperparameters that only exist conditional on others (e.g. 'dropout rate' only matters if 'use dropout' is true). TPE's tree-structured search space encodes this natively.">conditional / hierarchical search spaces</VIS.Term> where some HPs only exist if a parent HP takes a certain value. <VIS.Term def="Open-source HPO library from PFN. Default sampler is TPE; supports pruning, distributed trials, and a clean Python API. The de-facto choice for Python ML HPO today.">Optuna</VIS.Term> defaults to TPE for exactly these reasons.
      </p>
      <VIS.Callout kind="info" title="Rough decision rule">
        Up to 200 trials, mostly continuous HPs, smooth-ish surface: GP + EI. Larger budgets, many categorical HPs, conditional search spaces: TPE. Pausable trials (epochs as the budget axis): <VIS.Term def="Successive-halving bandit: start many trials with a tiny budget, kill the worst half at each rung, escalate budget to survivors. Beats Bayesian HPO when trials can be paused — no surrogate fit needed.">Hyperband / ASHA</VIS.Term>, which doesn't need a surrogate at all.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-pitfalls" title="Beat 4 — Practical pitfalls">
      <VIS.Callout kind="gotcha" title="Acquisition isn't free of priors — the kernel choice IS the prior">
        The GP's <VIS.Term def="The covariance function k(x, x') that encodes which input pairs should have correlated function values. Smoothness assumption of the surrogate; Matern-5/2 is the most common BHPO default.">kernel</VIS.Term> (Matern-5/2 by default for BHPO; RBF is too smooth and over-extrapolates) determines what 'nearby' means, and therefore what the surrogate thinks is plausible. If your true loss surface is jagged on a log-LR axis, a smooth kernel on a linear-LR axis will mislead the acquisition for many trials.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Always search log-space for scale-y hyperparameters">
        Learning rate, weight decay, regularization strength — these are exponential in their effect, so the surrogate should see them in <VIS.Term def="Searching log(x) rather than x for hyperparameters whose effect spans orders of magnitude. Critical for LR, weight decay, and most regularization knobs; the surrogate's smoothness assumption only makes sense on the right axis.">log space</VIS.Term>. Otherwise the surrogate wastes capacity modeling a near-flat region and a steep cliff that the log-transform would straighten.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="The val set IS being optimized — keep a separate test set">
        After 100+ BHPO trials, the search has effectively trained against val-set noise. The reported best-val number is biased optimistic. Always reserve a held-out <VIS.Term def="A held-out set never seen by BHPO. The unbiased generalization estimate after the search is done — required because BHPO over-optimizes the val set across many trials.">final test set</VIS.Term> for the post-search number you report.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Random search is a surprisingly strong baseline">
        For 30 or fewer trials and a search space with a few highly-relevant HPs and many irrelevant ones, <VIS.Term def="Bergstra and Bengio 2012: sampling each HP independently from its prior beats grid search because few HPs actually matter and random covers each axis with O(N) effective samples, not O(N to the d).">random search</VIS.Term> often matches or beats BHPO. The BHPO advantage shows up at larger trial budgets, and shrinks as the search space dimension grows.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{ color: "#475569", marginBottom: 16 }}>
        Twenty-five interview-grade trap problems, each built around a confusingly-similar decoy a candidate with ~80% understanding could plausibly defend. Coverage spans identity (A), application (B), mechanism (C), intuition (D), operations (E), and failure modes (F).
      </p>

      <VIS.TrapProblem id="bhpo-q1" difficulty="medium"
        title="Q1 — What is the surrogate in Bayesian HPO actually modeling? (A)"
        scenario={<><em>Discriminating insight:</em> the surrogate is a cheap stand-in for an expensive function. Name the function precisely — inputs, outputs, and what 'cheap' buys you.</>}
        options={[
          { key: "a", text: "The training loss as a function of model parameters (weights), used to skip the gradient descent step entirely." },
          { key: "b", text: "The validation loss (or any expensive metric) as a function of hyperparameters, so we can score candidates without paying for a full training run.", correct: true },
          { key: "c", text: "The posterior over model weights given the training data, integrated to give a Bayesian predictive distribution at inference time." },
          { key: "d", text: "The distribution of gradients across mini-batches, used to set the learning-rate schedule adaptively during training." }
        ]}
        trap={<>(a) confuses HPO-level surrogate with training-loop optimization — Bayesian HPO does not replace SGD. (c) describes Bayesian deep learning (weight posteriors), not Bayesian HPO. (d) is adaptive optimizer territory (Adam), unrelated.</>}
        lens={<>(b). The surrogate is a model of (HP to val-metric). It's cheap to query (microseconds per candidate) so we can maximize the acquisition function over thousands of candidates before paying for one real training run.</>} />

      <VIS.TrapProblem id="bhpo-q2" difficulty="hard"
        title="Q2 — What does Expected Improvement compute? (C)"
        scenario={<><em>Discriminating insight:</em> EI's name is literal. Identify both the random quantity and the expectation under which it's taken.</>}
        options={[
          { key: "a", text: "The probability that f(x) is below the current best observed loss, ignoring how much below." },
          { key: "b", text: "mu(x) minus kappa times sigma(x), with kappa tuned to balance exploration." },
          { key: "c", text: "E[max(f-star minus f(x), 0)] under the surrogate posterior at x, where f-star is the best observed loss.", correct: true },
          { key: "d", text: "The KL divergence between the surrogate posterior at x and the posterior conditioned on observing y at x." }
        ]}
        trap={<>(a) describes Probability of Improvement (PI), which is the most common confusion — same family, but PI ignores improvement magnitude and EI rewards it. (b) is UCB. (d) is entropy / information-gain acquisitions (e.g. predictive entropy search), not EI.</>}
        lens={<>(c). EI integrates the magnitude of improvement weighted by its probability under the surrogate. The closed form sigma times (z Phi(z) + phi(z)) means EI naturally grows with both small mu (exploit) and large sigma (explore) without an explicit knob.</>} />

      <VIS.TrapProblem id="bhpo-q3" difficulty="medium"
        title="Q3 — Bayesian HPO vs random search at a 20-trial budget. (B)"
        scenario={<><em>Discriminating insight:</em> small budgets, few-but-impactful HPs. What was the headline finding of Bergstra and Bengio 2012?</>}
        options={[
          { key: "a", text: "Bayesian HPO always dominates random search regardless of trial budget; the surrogate fit overhead is negligible compared to one training run." },
          { key: "b", text: "At small budgets and search spaces with a few effective HPs, random search is a surprisingly strong baseline — BHPO's advantage grows with trial count.", correct: true },
          { key: "c", text: "Random search beats BHPO universally; the surrogate's smoothness assumption breaks on realistic loss surfaces." },
          { key: "d", text: "Grid search is the only baseline that scales — random search has too high variance to be defensible." }
        ]}
        trap={<>(a) over-claims BHPO; the warm-up alone wastes trials on a tiny budget. (c) flips reality — BHPO does win at larger budgets. (d) is the opposite of the 2012 finding: random beats grid because few HPs matter and random gives each axis O(N) effective samples.</>}
        lens={<>(b). On a 20-trial budget, the BHPO surrogate has barely had time to leave warm-up. The clean comparison is at 50+ trials, where the surrogate's accumulated information starts to pay off.</>} />

      <VIS.TrapProblem id="bhpo-q4" difficulty="hard"
        title="Q4 — Why does the GP fit cost dominate at 200+ trials? (C)"
        scenario={<><em>Discriminating insight:</em> name the matrix operation that scales badly with the number of observed points.</>}
        options={[
          { key: "a", text: "Sampling from the GP posterior at the candidate set is O(n squared) and saturates memory bandwidth past 200 points." },
          { key: "b", text: "Hyperparameter marginalization over the kernel lengthscales becomes intractable as the dimension grows." },
          { key: "c", text: "Fitting requires inverting the n-by-n kernel (Gram) matrix — O(n cubed) flops and O(n squared) memory in the number of observed trials.", correct: true },
          { key: "d", text: "The acquisition optimization over the candidate set scales factorially because the EI gradient is non-convex." }
        ]}
        trap={<>(a) is real but secondary — sampling is cheaper than fitting. (b) is real but applies regardless of trial count. (d) is wrong — acquisition optimization is bounded by the inner-loop budget, not by trial count.</>}
        lens={<>(c). The Cholesky of the n-by-n kernel matrix is the cubic bottleneck. Sparse GP approximations (FITC, SVGP) buy you some headroom, but past a few hundred trials TPE / Hyperband become more practical.</>} />

      <VIS.TrapProblem id="bhpo-q5" difficulty="hard"
        title="Q5 — TPE: what densities and what does it maximize? (C)"
        scenario={<><em>Discriminating insight:</em> TPE flips the conditional. Identify which density gets which conditioning event, and what ratio drives selection.</>}
        options={[
          { key: "a", text: "It fits p(loss | x) directly with a regression tree and picks the x minimizing predicted loss." },
          { key: "b", text: "It fits l(x) = p(x | loss below gamma-quantile) and g(x) = p(x | loss at or above gamma-quantile) with Parzen estimators, picks x maximizing l(x)/g(x).", correct: true },
          { key: "c", text: "It fits a Gaussian mixture over (x, loss) jointly and samples from the conditional distribution at the predicted-best loss." },
          { key: "d", text: "It uses a random forest as the surrogate and queries the per-leaf empirical loss distribution to pick candidates." }
        ]}
        trap={<>(a) describes a generic regression-surrogate approach (e.g. SMAC's random forest), not TPE. (c) is plausible-sounding but wrong — TPE conditions x on the loss, not the other way around. (d) is SMAC, not TPE.</>}
        lens={<>(b). The 'tree-structured' part refers to the conditional structure of the search space (hierarchical HPs), not to decision trees. The l(x)/g(x) ratio is proportional to EI under mild assumptions — TPE is doing approximate EI via density ratios.</>} />

      <VIS.TrapProblem id="bhpo-q6" difficulty="medium"
        title="Q6 — Why search learning rate in log space? (E)"
        scenario={<><em>Discriminating insight:</em> the surrogate assumes nearby HPs give similar losses. What does 'nearby' mean for an HP whose effects span orders of magnitude?</>}
        options={[
          { key: "a", text: "Log space is a numerical-stability hack; on modern GPUs with bf16 it makes no measurable difference." },
          { key: "b", text: "Linear-space search is fine; the surrogate's kernel lengthscale adapts automatically to any scale via marginal-likelihood fitting." },
          { key: "c", text: "LR's effect is exponential in its value, so a smooth surrogate on a linear axis wastes capacity modeling a flat region next to a cliff — log straightens it.", correct: true },
          { key: "d", text: "Log space ensures the EI integral has a closed form; linear space requires numerical quadrature." }
        ]}
        trap={<>(a) trivializes a real geometry point. (b) overstates kernel adaptation — lengthscales adapt some, but not enough to bridge a 4-decade scale on a linear axis. (d) is fiction; EI is closed-form regardless of axis transform.</>}
        lens={<>(c). The smoothness prior of the GP/TPE works only on the axis where the function actually IS smooth. Log-LR makes the response-curve gentle; linear LR makes it look like a step.</>} />

      <VIS.TrapProblem id="bhpo-q7" difficulty="medium"
        title="Q7 — How does UCB encode the exploit-vs-explore tradeoff? (D)"
        scenario={<><em>Discriminating insight:</em> UCB has an explicit knob. Name it and describe both endpoints of the tradeoff.</>}
        options={[
          { key: "a", text: "Via the kernel lengthscale: small lengthscales = more explore, large = more exploit." },
          { key: "b", text: "Via kappa in mu minus kappa sigma (minimization): kappa toward 0 collapses to pure exploit on the mean; kappa toward infinity collapses to pure variance hunt.", correct: true },
          { key: "c", text: "Via the warm-up budget: more warm-up trials = more explore baked in before the surrogate takes over." },
          { key: "d", text: "Via the quantile gamma in the TPE good/bad split — UCB and TPE share this hyperparameter under the hood." }
        ]}
        trap={<>(a) confuses kernel hyperparameters with acquisition hyperparameters — orthogonal levers. (c) confuses warm-up (a meta-strategy) with the acquisition's own tradeoff knob. (d) confuses UCB with TPE — different acquisitions.</>}
        lens={<>(b). kappa is THE explicit explore knob in UCB. EI hides the same tradeoff inside its closed form (sigma contribution vs mu contribution); UCB exposes it.</>} />

      <VIS.TrapProblem id="bhpo-q8" difficulty="hard"
        title="Q8 — A bug: the surrogate keeps revisiting the same point. Why? (F)"
        scenario={<><em>Discriminating insight:</em> What property of the GP posterior near observed points should prevent revisits, and what acquisition pathology would override it?</>}
        options={[
          { key: "a", text: "The GP is overfitting; reduce the kernel amplitude to suppress posterior variance away from data." },
          { key: "b", text: "sigma collapses to ~0 at observed points, so any reasonable acquisition (EI, UCB with kappa above 0) gives ~0 there. PI with xi=0 and a noisy objective can still pick near-incumbents — switch to EI or set xi above 0.", correct: true },
          { key: "c", text: "The acquisition has multiple local maxima; switch from L-BFGS to grid search for the inner loop." },
          { key: "d", text: "The observed loss values are deterministic; add noise to the y values to force the surrogate to explore." }
        ]}
        trap={<>(a) treats a symptom by breaking the surrogate. (c) is a real concern but doesn't explain WHY the maxima sit on observations. (d) suggests breaking the data — and noise jitter for numerical stability is unrelated to the revisit issue.</>}
        lens={<>(b). sigma goes to 0 at observed points by construction. EI and UCB-with-kappa-above-0 are zero or negative there. PI with xi=0 evaluates Phi(0) = 0.5 right next to the incumbent, which under noise can win. EI or PI-with-xi-slack fixes it.</>} />

      <VIS.TrapProblem id="bhpo-q9" difficulty="medium"
        title="Q9 — Validation set keeps improving across 200 trials. Should you trust the final number? (F)"
        scenario={<><em>Discriminating insight:</em> who/what is the BHPO loop optimizing against, and what does that imply for generalization?</>}
        options={[
          { key: "a", text: "Yes — the val set was held out, so any improvement on it is unbiased generalization signal." },
          { key: "b", text: "No — BHPO effectively trains against val-set noise across many trials; reserve a separate, never-seen test set for the final number.", correct: true },
          { key: "c", text: "Yes, provided you used K-fold CV inside each trial — the cross-validation cancels out any val-set bias." },
          { key: "d", text: "No — but the fix is to use a larger val set, not a separate test set. Once val is big enough the bias vanishes." }
        ]}
        trap={<>(a) is the classic mistake. (c) overstates K-fold's protection — every fold is still used by BHPO. (d) helps but doesn't fix it; bias grows with trial count regardless of val size, just slower.</>}
        lens={<>(b). The val set is in the loop. The only way to get an unbiased generalization estimate is a set the loop never saw. This is the BHPO equivalent of train/val/test discipline.</>} />

      <VIS.TrapProblem id="bhpo-q10" difficulty="hard"
        title="Q10 — Choosing the Matern-5/2 over RBF as the GP kernel. Why? (C)"
        scenario={<><em>Discriminating insight:</em> what does the kernel choice encode about the assumed function smoothness, and why is 'too smooth' a problem for loss landscapes?</>}
        options={[
          { key: "a", text: "Matern-5/2 is faster to invert than RBF, halving the per-trial cost." },
          { key: "b", text: "RBF assumes infinitely-differentiable functions, which overstates smoothness on realistic loss surfaces; Matern-5/2 (twice-differentiable) is a better prior for BHPO.", correct: true },
          { key: "c", text: "RBF can have negative eigenvalues in finite-precision arithmetic; Matern-5/2 is numerically stable." },
          { key: "d", text: "Matern-5/2 is non-stationary while RBF is stationary, letting Matern handle scale-dependent variance better." }
        ]}
        trap={<>(a) is fiction — cost is dominated by n. (c) gets the symptom (numerical issues) but wrong cause; both are positive-definite. (d) reverses it — both are stationary in the standard parameterization.</>}
        lens={<>(b). The RBF prior asserts the loss is C-infinity; in practice losses have sharp features near regime boundaries (e.g. LR cliff into divergence). Matern-5/2 with k=2 derivatives is the empirical sweet spot for BHPO surrogates.</>} />

      <VIS.TrapProblem id="bhpo-q11" difficulty="medium"
        title="Q11 — Categorical HPs (optimizer in {SGD, Adam, AdamW}) in a GP. (E)"
        scenario={<><em>Discriminating insight:</em> GPs need a kernel. What does it even mean for two categorical values to be 'close'?</>}
        options={[
          { key: "a", text: "Encode categories as one-hot vectors and use the standard RBF kernel; the GP handles the rest." },
          { key: "b", text: "GPs handle categorical HPs natively via the marginal-likelihood fit; no special encoding required." },
          { key: "c", text: "GPs need a custom kernel for categoricals (e.g. Hamming or per-category indicator). TPE handles them natively via per-leaf Parzen estimators — often a cleaner choice when many HPs are categorical.", correct: true },
          { key: "d", text: "Convert each category to its empirical-best-loss rank and treat it as continuous; the surrogate is then well-defined." }
        ]}
        trap={<>(a) sort-of-works but the RBF semantics on a one-hot are weird (all categories equidistant). (b) is false. (d) introduces label leakage — the encoding depends on the very losses you're optimizing.</>}
        lens={<>(c). This is one of TPE's headline advantages over GPs: hierarchical / categorical search spaces are first-class. Optuna picked TPE as default partly for this reason.</>} />

      <VIS.TrapProblem id="bhpo-q12" difficulty="hard"
        title="Q12 — Multi-fidelity BHPO: when does Hyperband beat plain BHPO? (B)"
        scenario={<><em>Discriminating insight:</em> what new dimension does multi-fidelity unlock, and what's the prerequisite on your trials for it to apply?</>}
        options={[
          { key: "a", text: "When the search space is high-dimensional, Hyperband's bracketing reduces effective dimension." },
          { key: "b", text: "When trials are pausable (the budget axis = epochs / data fraction / image resolution), Hyperband can early-kill bad configs and reallocate compute — no surrogate fit needed.", correct: true },
          { key: "c", text: "When categorical HPs dominate — Hyperband's discrete branching handles them more naturally than GPs." },
          { key: "d", text: "When the val set is small — Hyperband's repeated sampling averages out val noise more aggressively than BHPO." }
        ]}
        trap={<>(a) overclaims a dimension-reduction property Hyperband doesn't have. (c) confuses Hyperband with TPE. (d) is unrelated — Hyperband doesn't repeated-sample, it successive-halves.</>}
        lens={<>(b). Hyperband (and ASHA) require that training can be paused and a partial result is informative about the full result. When that holds, killing bad configs early is strictly cheaper than letting them run, and you don't need a surrogate at all.</>} />

      <VIS.TrapProblem id="bhpo-q13" difficulty="medium"
        title="Q13 — Parallelizing BHPO across 8 workers. What breaks? (E)"
        scenario={<><em>Discriminating insight:</em> the canonical BHPO loop is sequential — surrogate fit, pick next, train, repeat. Parallel workers all need a next pick at once.</>}
        options={[
          { key: "a", text: "Nothing breaks; just let all 8 workers pull the argmax of the same acquisition — they'll find slightly different local maxima." },
          { key: "b", text: "BHPO is inherently sequential; you must serialize the workers (1 trial at a time) to preserve the convergence guarantees." },
          { key: "c", text: "Use a 'fantasy' / Kriging-believer trick: after picking x_1 for worker 1, condition the surrogate on the predicted y at x_1 and pick x_2 from the conditioned posterior. Repeat 8 times.", correct: true },
          { key: "d", text: "Use UCB with kappa = sqrt(log(t/n_workers)) — the kappa adjustment compensates for parallelism." }
        ]}
        trap={<>(a) sounds right but in practice all 8 collapse onto the same EI peak. (b) is over-cautious — there are parallel BHPO algorithms. (d) sounds plausible but garbles two unrelated formulas.</>}
        lens={<>(c). The 'kriging-believer' / fantasy-imputation trick (and its principled cousin q-EI) lets you propose a batch without the workers stepping on each other. Most production BHPO libraries (Ax, BoTorch, Optuna) implement it.</>} />

      <VIS.TrapProblem id="bhpo-q14" difficulty="hard"
        title="Q14 — A trial diverged (loss = NaN). How do you feed it to the surrogate? (F)"
        scenario={<><em>Discriminating insight:</em> the surrogate is a regression over (x, y). A NaN y is not a valid regression target. What's the principled fix?</>}
        options={[
          { key: "a", text: "Drop the trial entirely; the surrogate only sees successful trials, which keeps the posterior well-defined." },
          { key: "b", text: "Impute a large finite value (e.g. 10x worst observed) so the surrogate learns to avoid that region; explicitly modeling failure as a separate classifier (constrained BHPO) is the more principled fix.", correct: true },
          { key: "c", text: "Impute the mean of all observed losses so the trial has no net effect on the surrogate." },
          { key: "d", text: "Re-run the trial with a different random seed; surrogates can't handle censored data." }
        ]}
        trap={<>(a) lets BHPO keep proposing in the divergence region. (c) actively pulls the surrogate's mean toward the failed zone — worst of both worlds. (d) wastes compute and doesn't generalize.</>}
        lens={<>(b). Crash regions are real information. Either impute aggressively (cheap) or fit a separate feasibility classifier and multiply EI by P(feasible) — the constrained-BHPO formulation. BoTorch / Ax both support this.</>} />

      <VIS.TrapProblem id="bhpo-q15" difficulty="medium"
        title="Q15 — The surrogate's posterior mean predicts loss=0.21 at x. What does that mean? (D)"
        scenario={<><em>Discriminating insight:</em> the surrogate is a regressor. What's the right interpretation of its prediction at a point we haven't measured?</>}
        options={[
          { key: "a", text: "The model trained at x is guaranteed to achieve val-loss = 0.21." },
          { key: "b", text: "The point estimate of val-loss at x is 0.21 — but the uncertainty sigma(x) is the load-bearing companion number, and pure-mean decisions ignore it.", correct: true },
          { key: "c", text: "There's a 50% chance the val-loss at x is below 0.21; this is the median, not the mean." },
          { key: "d", text: "x has been observed with val-loss = 0.21; the GP interpolates exactly through training points." }
        ]}
        trap={<>(a) treats a surrogate prediction as ground truth. (c) confuses mean and median (under Gaussian posterior they coincide, but the framing 'there's a 50% chance' is the wrong reading). (d) confuses the predicted value with an observation.</>}
        lens={<>(b). Always read mu alongside sigma. A mu=0.21 with sigma=0.3 is barely a prediction; a mu=0.21 with sigma=0.02 is a strong one. Acquisition functions use BOTH for exactly this reason — pure-mean greedy ignores half the information.</>} />

      <VIS.TrapProblem id="bhpo-q16" difficulty="hard"
        title="Q16 — Closed-form EI requires what posterior shape? (C)"
        scenario={<><em>Discriminating insight:</em> EI = sigma times (z Phi(z) + phi(z)) has Phi and phi in it. What posterior shape makes those the right functions to use?</>}
        options={[
          { key: "a", text: "Heavy-tailed (Student-t) posterior — the t-density is what shows up in the closed form." },
          { key: "b", text: "Gaussian posterior at the candidate point. Phi and phi are the standard-normal CDF and PDF; the closed form follows from integrating the truncated normal.", correct: true },
          { key: "c", text: "Any unimodal posterior — only unimodality matters, not the specific family." },
          { key: "d", text: "Discrete posterior over a finite candidate grid — the closed form is a sum over grid points." }
        ]}
        trap={<>(a) confuses heavy-tailed alternatives for the standard form. (c) overclaims — only Gaussian gives the closed form; other unimodals need quadrature. (d) confuses the inner acquisition optimization with the posterior shape.</>}
        lens={<>(b). The GP posterior at any x is Gaussian by definition. EI is the expected value of max(f-star minus f(x), 0) under that Gaussian, which integrates to sigma times (z Phi(z) + phi(z)) by truncated-Gaussian identities. Non-Gaussian surrogates (deep ensembles, BNNs) need numerical EI.</>} />

      <VIS.TrapProblem id="bhpo-q17" difficulty="medium"
        title="Q17 — When does BHPO under-perform random search? (B)"
        scenario={<><em>Discriminating insight:</em> identify regimes where the surrogate's smoothness assumption hurts more than it helps.</>}
        options={[
          { key: "a", text: "When the budget is huge (10,000+ trials); the surrogate fit becomes the bottleneck." },
          { key: "b", text: "Tiny budgets (10 or fewer trials), highly-rugged or discrete loss surfaces, very high-dim search spaces, or trials so cheap that random's parallelism wins.", correct: true },
          { key: "c", text: "When using TPE rather than a GP; TPE has weaker guarantees than random search." },
          { key: "d", text: "BHPO never under-performs random search; the surrogate's information accumulation makes it strictly better." }
        ]}
        trap={<>(a) is partly real (cubic GP) but the fix is TPE / Hyperband, not random. (c) is false — TPE has shown strong empirical results. (d) is the over-confident textbook reading.</>}
        lens={<>(b). BHPO's smoothness prior pays off when the surface IS smooth and trials are expensive. Outside that regime — tiny budgets, rugged surfaces, very high dims, or cheap trials — random's variance-reduction-by-parallelism wins.</>} />

      <VIS.TrapProblem id="bhpo-q18" difficulty="hard"
        title="Q18 — Asynchronous BHPO with stragglers. Whose trial-result do you condition on first? (E)"
        scenario={<><em>Discriminating insight:</em> async = worker finishes whenever it finishes. The order of incoming results is the order of surrogate updates.</>}
        options={[
          { key: "a", text: "Wait for all in-flight trials to return before refitting the surrogate; preserves sequential-BHPO semantics." },
          { key: "b", text: "Refit on each return as it arrives; for the in-flight trials still running, use fantasy / kriging-believer imputation so they don't block surrogate updates.", correct: true },
          { key: "c", text: "Only refit on the fastest 50% of trials; stragglers add stale information that biases the posterior." },
          { key: "d", text: "Disable the surrogate when stragglers are present; fall back to random search until all workers report." }
        ]}
        trap={<>(a) wastes idle workers. (c) drops legitimate signal. (d) over-reacts; surrogates handle async fine with fantasy imputation.</>}
        lens={<>(b). The same trick that powers batch-BHPO powers async-BHPO: when a worker reports, condition on its result; for workers still running, treat their pending x with an imputed y so the surrogate has a consistent state. This is what Ax / BoTorch / Optuna do.</>} />

      <VIS.TrapProblem id="bhpo-q19" difficulty="medium"
        title="Q19 — Probability of Improvement (PI) tends to do what failure mode? (F)"
        scenario={<><em>Discriminating insight:</em> PI rewards probability, not magnitude. Predict the behavior.</>}
        options={[
          { key: "a", text: "Over-explores — PI's variance bonus is unbounded, so it picks the highest-sigma point regardless of mean." },
          { key: "b", text: "Over-exploits — PI rewards any improvement equally, so it locks onto small marginal gains near the incumbent and stops exploring.", correct: true },
          { key: "c", text: "Becomes equivalent to UCB with kappa=1 in the large-n limit, by a CLT argument." },
          { key: "d", text: "Diverges numerically because Phi(z) saturates at 1 and gradients vanish in the inner-loop optimization." }
        ]}
        trap={<>(a) flips PI's bias. (c) is fiction. (d) confuses sigmoid-saturation pathologies with PI's actual issue.</>}
        lens={<>(b). PI with xi=0 cares only that f(x) is below f-star. A point with mu slightly below f-star and tiny sigma wins. xi above 0 (require improvement of at least xi) partially fixes it, but in practice EI is the safer default.</>} />

      <VIS.TrapProblem id="bhpo-q20" difficulty="hard"
        title="Q20 — Search-space design matters more than acquisition. Why? (B)"
        scenario={<><em>Discriminating insight:</em> what fraction of HPs in a typical search space actually matter, and what does that imply for where BHPO spends compute?</>}
        options={[
          { key: "a", text: "All HPs matter roughly equally; the surrogate just learns the irrelevant ones have small lengthscales, no manual pruning needed." },
          { key: "b", text: "A few HPs (LR, batch size, weight decay) usually dominate. A bloated space wastes the surrogate's capacity on irrelevant axes and slows convergence — prune aggressively.", correct: true },
          { key: "c", text: "The acquisition function determines convergence; search-space design is a minor implementation detail." },
          { key: "d", text: "More HPs = more degrees of freedom = better optimum; never prune the search space pre-search." }
        ]}
        trap={<>(a) overstates GP lengthscale adaptation. (c) inverts the practitioner's experience. (d) is the over-confident over-parameterization fallacy.</>}
        lens={<>(b). Empirically, 3-5 HPs dominate any given model class. Pre-pruning the space (informed by ablation studies or prior runs) is one of the highest-leverage moves in production BHPO.</>} />

      <VIS.TrapProblem id="bhpo-q21" difficulty="medium"
        title="Q21 — Surrogate posterior collapse at observed points: feature or bug? (D)"
        scenario={<><em>Discriminating insight:</em> sigma goes to 0 at observed x. Is this the right behavior for a Bayesian surrogate over noisy training runs?</>}
        options={[
          { key: "a", text: "Always a bug — the surrogate should retain uncertainty even at observed points to allow re-sampling under noise." },
          { key: "b", text: "Always a feature — observed points have known values, so the posterior should be a delta there." },
          { key: "c", text: "Depends on noise: noise-free interpolation (sigma toward 0) is right when val-loss is deterministic; noisy GP (sigma toward noise-floor) is right when val-loss is stochastic due to seed / data-shuffle variance.", correct: true },
          { key: "d", text: "Bug only if the kernel is RBF; Matern-5/2 naturally retains uncertainty at observations." }
        ]}
        trap={<>(a) and (b) are false dichotomies. (d) is fiction — kernel choice doesn't change interpolation behavior at observed points without a noise term.</>}
        lens={<>(c). The right move is a noisy GP with a fitted noise variance — sigma at observed points collapses to the noise floor, not zero. Otherwise BHPO under-samples seed variance and reports an over-confident best.</>} />

      <VIS.TrapProblem id="bhpo-q22" difficulty="hard"
        title="Q22 — Inner-loop acquisition optimization. What does it actually solve? (C)"
        scenario={<><em>Discriminating insight:</em> 'maximize the acquisition function' implies an optimizer. What kind, and over what?</>}
        options={[
          { key: "a", text: "A convex QP over the acquisition; closed-form solution via the GP's Cholesky factor." },
          { key: "b", text: "A non-convex continuous (or mixed) optimization over the HP search space, typically solved by multistart L-BFGS / CMA-ES / random sampling + best-of-N. Cheap relative to a training run.", correct: true },
          { key: "c", text: "A discrete enumeration over the trials so far — pick the existing trial with the highest acquisition for the next refit." },
          { key: "d", text: "A reinforcement-learning policy trained to maximize cumulative regret across many BHPO problems." }
        ]}
        trap={<>(a) confuses GP fitting (which has linear algebra) with acquisition optimization (which doesn't). (c) confuses re-evaluation with picking a new x. (d) describes learned acquisitions (a research area), not the practical inner loop.</>}
        lens={<>(b). The inner loop is a normal continuous optimization. Because each evaluation of the acquisition is microseconds, you can afford many restarts — accuracy matters more than speed here.</>} />

      <VIS.TrapProblem id="bhpo-q23" difficulty="medium"
        title="Q23 — You have prior beliefs (LR ~ 1e-3, weight decay ~ 1e-4). Where do they go? (E)"
        scenario={<><em>Discriminating insight:</em> name the BHPO-level component that should consume prior beliefs.</>}
        options={[
          { key: "a", text: "Hard-code them as the first trial of the warm-up — the surrogate will inherit them as a strong anchor." },
          { key: "b", text: "Use a narrower search-space range centered on the prior, and / or supply a Gaussian / log-Normal prior on each HP so warm-up sampling and TPE / GP search both pull toward it.", correct: true },
          { key: "c", text: "Bake them into the GP's kernel lengthscale via the marginal-likelihood prior." },
          { key: "d", text: "Skip the warm-up entirely — your prior beliefs are already the equivalent of 10 warm-up trials." }
        ]}
        trap={<>(a) gives one trial of signal then noise. (c) is too subtle a place for explicit beliefs. (d) skips information aggregation; one prior is not 10 noisy trials.</>}
        lens={<>(b). Both Optuna and Ax let you specify per-HP priors (log-Uniform vs log-Normal etc.); the warm-up sampler and the TPE / GP both respect them. This is one of the biggest practical wins over generic random search.</>} />

      <VIS.TrapProblem id="bhpo-q24" difficulty="hard"
        title="Q24 — Mixing exploit-heavy and explore-heavy strategies across the budget. Why might you do that? (B)"
        scenario={<><em>Discriminating insight:</em> early vs late in a fixed budget — what's the right exploit/explore split, and why does it shift?</>}
        options={[
          { key: "a", text: "Always keep the same acquisition; switching mid-run invalidates the surrogate's convergence guarantees." },
          { key: "b", text: "Explore-heavy early (UCB with large kappa or EI with the surrogate still wide), exploit-heavy late (UCB with small kappa or pure-greedy on mu) once the surrogate's narrowed in on the basin.", correct: true },
          { key: "c", text: "Always explore-heavy — the goal of HPO is to map the surface, not to find the optimum." },
          { key: "d", text: "Always exploit-heavy — the surrogate's job is to find the best point fast, not to characterize uncertainty." }
        ]}
        trap={<>(a) appeals to nonexistent guarantees. (c) confuses HPO with active learning. (d) is the greedy fallacy — you'll miss the better basin.</>}
        lens={<>(b). Early budget = high information value of exploration (cheap to learn); late budget = high value of exploitation (need to refine). UCB-kappa schedules and EI's natural sigma-decay both encode this; some tuners (Ax) expose the schedule directly.</>} />

      <VIS.TrapProblem id="bhpo-q25" difficulty="hard"
        title="Q25 — One BHPO sentence to senior leadership. What's the load-bearing claim? (A)"
        scenario={<><em>Discriminating insight:</em> compress BHPO to the one claim that distinguishes it from random search and from grid search. Avoid jargon a non-MLE PM would miss.</>}
        options={[
          { key: "a", text: "'BHPO is guaranteed to find the global optimum; random search and grid search are not.'" },
          { key: "b", text: "'BHPO uses a cheap model of past trial results to pick smarter next-trial hyperparameters — turning each expensive training run into a posterior update instead of an isolated guess.'", correct: true },
          { key: "c", text: "'BHPO replaces SGD with Bayesian inference over model weights, yielding calibrated uncertainty in predictions.'" },
          { key: "d", text: "'BHPO is grid search but with adaptive grid spacing chosen by a neural network.'" }
        ]}
        trap={<>(a) over-claims convergence — BHPO has no global-optimum guarantee in finite trials. (c) confuses HPO with Bayesian deep learning. (d) is a folk-model description that gets the architecture wrong.</>}
        lens={<>(b). The load-bearing claim is information accumulation across trials. Random search throws information away each trial; BHPO compounds it via the surrogate. That's the whole pitch — and it's what determines when BHPO is worth its complexity (expensive trials, smooth-ish surfaces, 50 or more trial budgets).</>}
        stretch={<>Follow-up: when would you NOT pick BHPO for the same audience?</>} />
    </VIS.Section>
  </main>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
