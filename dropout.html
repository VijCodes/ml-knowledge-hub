<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Dropout — row 7 — fingerprint: dropout
const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Fund · Concept"
      title="Dropout"
      subtitle={<>The simplest <VIS.Term def="Any technique that biases training toward simpler hypotheses to reduce variance — weight decay, early stopping, dropout, augmentation.">regularizer</VIS.Term> that's also the strangest: randomly delete half the network at every step, then average the survivors at inference.</>}
      byline={[
        {label: "L2", value: "Regularization"},
        {label: "L3", value: "Dropout"},
        {label: "Origin", value: "Srivastava et al. 2014"},
      ]}/>

    <VIS.TLDR>
      During training, multiply each pre-activation by an independent <VIS.Term def="A 0/1 random vector drawn fresh each forward pass. Zeroes out a fraction p of units; the remaining units are scaled.">Bernoulli mask</VIS.Term> that zeroes out a fraction <code>p</code> of units (per sample, per layer, per step). At inference, keep all units but scale activations by <code>(1−p)</code> — or use{" "}
      <VIS.Term def="Variant where the mask divides by (1-p) during training so the expectation matches the inference pass; no scaling needed at eval.">inverted dropout</VIS.Term> so the inference pass needs no adjustment. The stochastic mask approximates training a different{" "}
      <VIS.Term def="A network identical to the full one except that the masked units are deleted. Each forward pass uses a different one of these 2^N possibilities.">thinned subnetwork</VIS.Term> each step and averaging an{" "}
      <VIS.Term def="The collection of all 2^N subnetworks induced by dropout masks. Inference approximates the geometric mean of their predictions.">exponential ensemble</VIS.Term> at test time — for the cost of one network.
    </VIS.TLDR>

    <VIS.Section id="sec-mech" title="What happens per training step">
      <VIS.Mermaid chart={`
flowchart LR
  IN["Input layer (8 units)"]
  H1["Hidden layer (8 units)"]
  H2["Hidden layer (8 units)"]
  OUT["Output"]
  IN --> H1 --> H2 --> OUT
  M1["Bernoulli mask p=0.5"] -.-> H1
  M2["Bernoulli mask p=0.5"] -.-> H2
  style M1 fill:#fef3c7,stroke:#d97706
  style M2 fill:#fef3c7,stroke:#d97706
      `}/>
      <p>
        Each <VIS.Term def="One pass of an input through the network producing predictions; gradients are computed in a matched backward pass.">forward pass</VIS.Term> uses a freshly sampled mask. The masks differ across the{" "}
        <VIS.Term def="The chunk of samples processed together in one optimizer step. Each sample in the batch sees its own independent dropout mask.">minibatch</VIS.Term>, across layers, and across steps — every sample sees a different subnetwork. Over many steps the model learns features that are{" "}
        <VIS.Term def="A feature works on its own without needing other specific features to also fire. Co-adapted features collapse if any partner is dropped.">non-co-adapted</VIS.Term>: each unit must carry its own weight because its partners might be zeroed any step.
      </p>
      <p>
        The clean mathematical statement: with <VIS.Term def="A 0/1 random vector drawn fresh each forward pass. Zeroes out a fraction p of units; the remaining units are scaled.">mask</VIS.Term> <code>m ∼ Bernoulli(1−p)</code>, the output is <code>y = (m ⊙ x) / (1 − p)</code> during training and <code>y = x</code> at inference. The <code>1/(1−p)</code> divisor is the <VIS.Term def="Variant where the mask divides by (1-p) during training so the expectation matches the inference pass; no scaling needed at eval.">inverted-dropout</VIS.Term> trick: it makes <code>E[y_train] = x = y_inference</code> so no eval-time rescale is needed.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-why" title="Why it works — three mental models">
      <p>
        <strong>Ensemble view.</strong> A network with N dropout units defines <code>2^N</code> distinct subnetworks. Each step we sample one uniformly and take a gradient step on its loss. At inference, the deterministic full network with weights scaled by <code>(1−p)</code> approximates the <VIS.Term def="Geometric mean of subnetwork predictions; close to the arithmetic mean when the predictions are similar. Cheap to compute via a single forward pass.">geometric-mean prediction</VIS.Term> of the whole ensemble — a free{" "}
        <VIS.Term def="A method that trains multiple models and averages their predictions to reduce variance. Bagging and dropout are both instances.">ensemble</VIS.Term> for one network's compute budget.
      </p>
      <p>
        <strong>Noise-injection view.</strong> Multiplying activations by <VIS.Term def="A 0/1 random vector drawn fresh each forward pass. Zeroes out a fraction p of units; the remaining units are scaled.">Bernoulli noise</VIS.Term> is a form of input perturbation deep inside the network. For linear layers this can be shown to be equivalent to a scaled <VIS.Term def="A penalty on squared weights added to the loss. Pushes weights toward zero smoothly; equivalent to a Gaussian prior on weights.">L2 penalty</VIS.Term> on the weights — but only in the linear toy case. For nonlinear nets the equivalence breaks; dropout is strictly stochastic and acts differently at every step.
      </p>
      <p>
        <strong>Bayesian view.</strong> Leaving dropout on at inference and averaging <code>M</code> stochastic forward passes —{" "}
        <VIS.Term def="Monte-Carlo Dropout. Run M dropout-on forward passes at inference and average them; approximates a Bayesian posterior over weights.">MC dropout</VIS.Term> — approximates a <VIS.Term def="Distribution over model weights given training data. The mean is a point prediction; the spread captures epistemic uncertainty.">Bayesian posterior</VIS.Term> over weights (Gal & Ghahramani 2016). This is a separate inference protocol, NOT standard dropout — most production systems disable masks at eval.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-tune" title="Tuning — where dropout lives in 2026">
      <p>
        Classic settings:{" "}
        <code>p = 0.5</code> on hidden{" "}
        <VIS.Term def="Fully-connected (dense) layer where every input unit connects to every output unit. The original target of dropout in Srivastava 2014.">FC layers</VIS.Term>, <code>p = 0.1–0.2</code> on input layers (more aggressive masking destroys raw input signal). Dropping <em>too much</em> creates a high-bias regime — the surviving subnetwork is too small to fit the data — so per-layer <code>p</code> is itself a{" "}
        <VIS.Term def="A knob that controls model capacity or training dynamics, set before training and tuned on validation data (not learned by gradient descent).">hyperparameter</VIS.Term> traded off against capacity.
      </p>
      <p>
        Modern caveats that change where dropout shows up:
      </p>
      <ul>
        <li><strong>BatchNorm interaction.</strong> Dropout placed before{" "}
          <VIS.Term def="Batch Normalization. Normalizes each feature across the batch dimension; standard for CNNs.">BatchNorm</VIS.Term> creates a{" "}
          <VIS.Term def="Train-time activations have variance reduced by the dropout mask, but BN's running statistics see the unmasked inference pass; the mismatch hurts test accuracy.">variance shift</VIS.Term> between training and inference — Li et al. 2019 showed test accuracy drops measurably. Fix: put dropout AFTER BN, or replace BN with{" "}
          <VIS.Term def="Per-token feature-vector normalization (subtract mean, divide by std, then learned affine). Composes cleanly with dropout.">LayerNorm</VIS.Term> which is per-sample and unaffected.</li>
        <li><strong>Conv layers.</strong> Adjacent pixels in a feature map are highly correlated, so dropping single activations barely regularizes — neighbors carry the same signal.{" "}
          <VIS.Term def="Drops entire feature-map channels at once (whole filters) rather than individual activations. Preserves spatial structure while still regularizing conv stacks.">SpatialDropout</VIS.Term> drops entire channels;{" "}
          <VIS.Term def="Drops contiguous spatial regions of a feature map rather than i.i.d. pixels. Designed for conv nets where i.i.d. pixel dropout is too weak.">DropBlock</VIS.Term> drops contiguous blocks. Plain dropout on conv features is usually a net negative.</li>
        <li><strong>Transformers.</strong> Dropout on attention weights and on residual streams (<code>0.1</code> typical) is still standard for fine-tuning, but modern pretrained{" "}
          <VIS.Term def="A model with an encoder/decoder stack of self-attention layers — GPT, BERT, T5, Llama. Pretrained transformers use dropout sparingly.">LLMs</VIS.Term> often use <code>p = 0</code> during pretraining because{" "}
          <VIS.Term def="Per-token feature-vector normalization (subtract mean, divide by std, then learned affine). Composes cleanly with dropout.">LayerNorm</VIS.Term> plus deep{" "}
          <VIS.Term def="Identity-plus-residual connections (x + F(x)) used in ResNets and transformers. They implicitly regularize by providing gradient shortcuts and reducing effective depth.">residual connections</VIS.Term> handle the regularization implicitly.</li>
        <li><strong>Schedule.</strong> Dropout is usually <em>off</em> for{" "}
          <VIS.Term def="The phase of training where weights are computed by gradient descent, masks active, batchnorm in training mode. Distinct from eval/inference mode.">training mode</VIS.Term> only — frameworks toggle it via <code>model.train()</code> / <code>model.eval()</code>. Forgetting this toggle is one of the most common silent bugs in research code.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-five trap problems spanning identity, mechanism, application, intuition, operations, and failure modes. Each option below is a real-but-wrong belief held by someone with about 80% understanding; the correct option is also a single belief. Reveal the lens to see the mechanism.
      </p>

      <VIS.TrapProblem
        id="dropout-q1"
        difficulty="medium"
        title="Q1 — What exactly is being randomized each forward pass?"
        scenario={<><em>Discriminating insight:</em> what unit of randomness does standard dropout introduce, and at what granularity? You are reviewing a junior engineer's PyTorch implementation and need to spec the contract precisely.</>}
        options={[
          {key:"a", text:"One mask is sampled per training step and shared across every sample in the minibatch and every layer with dropout."},
          {key:"b", text:"A fresh Bernoulli mask is sampled independently per sample, per layer, per step; different samples in a batch see different subnetworks.", correct:true},
          {key:"c", text:"The mask is sampled once at the start of an epoch and held fixed for that epoch so gradients are deterministic within a sweep."},
          {key:"d", text:"A single Gaussian noise vector is added to each layer's activations and resampled at every forward pass through the network."},
        ]}
        trap={<>(a) confuses dropout with the cheaper shared-mask variant some custom CUDA kernels use; standard PyTorch does NOT do this. (c) describes early variance-reduction tricks rather than dropout. (d) describes Gaussian noise injection, a sibling but distinct method.</>}
        lens={<>Per-sample, per-layer, per-step Bernoulli masks are the standard contract. Sharing masks across the batch reduces gradient variance but also reduces the regularization signal — most frameworks default to independent.</>}
        stretch={<>What would happen to test accuracy if you accidentally shared one mask across the whole batch?</>}
      />

      <VIS.TrapProblem
        id="dropout-q2"
        difficulty="medium"
        title="Q2 — Inference-time scaling: why is (1-p) the right factor?"
        scenario={<><em>Discriminating insight:</em> what quantity does the (1-p) scaling preserve between training and inference? You are deriving the equation on a whiteboard for a candidate.</>}
        options={[
          {key:"a", text:"It preserves the variance of activations so BatchNorm running stats stay valid during the train-to-eval switch."},
          {key:"b", text:"It preserves the maximum activation magnitude so downstream nonlinearities like ReLU stay in their unsaturated regime."},
          {key:"c", text:"It preserves the expected activation: E[mask * x] equals (1-p) * x at training, so multiplying inference activations by (1-p) matches.", correct:true},
          {key:"d", text:"It preserves the L2 norm of the activation vector so gradient magnitudes stay comparable between the two modes."},
        ]}
        trap={<>(a) and (d) confuse first-moment (mean) preservation with second-moment (variance/norm) preservation; (1-p) corrects the mean but actually shifts variance. (b) is unrelated — ReLU saturation is irrelevant.</>}
        lens={<>Expected value preservation: E[m ⊙ x] = (1-p)·x because each unit survives with probability (1-p). Variance is not preserved — it actually grows during training, which is one source of the dropout+BN conflict.</>}
        stretch={<>What is the variance of (m ⊙ x) when m is Bernoulli(1-p) and x is fixed?</>}
      />

      <VIS.TrapProblem
        id="dropout-q3"
        difficulty="medium"
        title="Q3 — Inverted dropout: what is being inverted?"
        scenario={<><em>Discriminating insight:</em> what does the framework do at training time so that inference needs no scaling step? You are explaining the PyTorch default behavior to a teammate porting code from a 2015 paper.</>}
        options={[
          {key:"a", text:"It divides each surviving activation by (1-p) during training; expectation matches inference, which then runs the network unchanged.", correct:true},
          {key:"b", text:"It inverts the mask polarity so zeros become ones; this gives the same effect with fewer floating-point operations on modern hardware."},
          {key:"c", text:"It runs the inference pass with mask probability p inverted to (1-p) so the train and eval distributions are symmetric."},
          {key:"d", text:"It inverts the order of dropout and activation so the nonlinearity sees the unmasked input first, then masking happens after."},
        ]}
        trap={<>(b) confuses sign-inversion with magnitude-rescaling. (c) is a made-up symmetric story that sounds plausible. (d) describes an ordering choice that exists but is not what "inverted" refers to.</>}
        lens={<>Inverted dropout scales by 1/(1-p) at training; this absorbs the rescale into training so the inference graph stays untouched. Every modern framework (PyTorch, TF, JAX) defaults to this variant.</>}
        stretch={<>Under inverted dropout, what is E[y_train] when input is x?</>}
      />

      <VIS.TrapProblem
        id="dropout-q4"
        difficulty="hard"
        title="Q4 — Why does dropout approximate an ensemble?"
        scenario={<><em>Discriminating insight:</em> what kind of average does the inference-time weight-rescaled forward pass approximate? You are sketching a slide for an ML reading group.</>}
        options={[
          {key:"a", text:"It approximates the arithmetic mean of all 2^N subnetwork predictions because expectations of sums equal sums of expectations under linearity."},
          {key:"b", text:"It approximates the median prediction over subnetworks since masking is symmetric and the median is robust to dropped paths."},
          {key:"c", text:"It approximates a single canonical subnetwork — the one that survives the most-likely mask — because dropout converges to its mode."},
          {key:"d", text:"It approximates the geometric mean of the 2^N subnetworks; this equals the arithmetic mean only when subnetwork predictions are nearly identical.", correct:true},
        ]}
        trap={<>(a) is the intuitive answer and the one most candidates state — but the rescaled forward pass corresponds to the geometric mean, not the arithmetic mean. (b) and (c) are plausible-sounding but wrong characterizations of the approximation.</>}
        lens={<>For softmax outputs, the rescaled deterministic pass approximates the geometric mean of subnetwork predictions (Baldi & Sadowski 2013). The arithmetic mean would require averaging M sampled forward passes — that is MC dropout, not standard dropout.</>}
        stretch={<>Under what conditions are the geometric and arithmetic means close to equal here?</>}
      />

      <VIS.TrapProblem
        id="dropout-q5"
        difficulty="medium"
        title="Q5 — Plain dropout on conv feature maps: why is it weak?"
        scenario={<><em>Discriminating insight:</em> what property of conv feature maps makes pixel-level dropout a poor regularizer? You are reviewing an FCN segmentation architecture with i.i.d. dropout after every conv block.</>}
        options={[
          {key:"a", text:"Conv layers have fewer parameters than FC layers, so the variance-reduction gain from dropout is small in absolute terms."},
          {key:"b", text:"Spatial neighbors in a conv feature map are highly correlated; zeroing one pixel leaves redundant signal in adjacent pixels.", correct:true},
          {key:"c", text:"Conv kernels apply the same weights to every spatial location, so dropping pixels effectively drops weights at random."},
          {key:"d", text:"Pooling layers immediately downstream average over dropped pixels, recovering the unmasked feature map before the next layer."},
        ]}
        trap={<>(a) gets the parameter-count direction right but confuses parameter count with redundancy. (c) describes weight sharing but draws the wrong conclusion. (d) overstates what pooling does — it shrinks, not recovers.</>}
        lens={<>Spatial correlation is the key. Adjacent activations encode overlapping receptive fields; dropping pixel (i,j) leaves pixel (i+1,j) carrying nearly the same signal. SpatialDropout and DropBlock fix this by dropping whole channels or contiguous blocks respectively.</>}
        stretch={<>How does DropBlock's block-size hyperparameter affect the bias-variance tradeoff?</>}
      />

      <VIS.TrapProblem
        id="dropout-q6"
        difficulty="hard"
        title="Q6 — Dropout placed directly before BatchNorm: what breaks?"
        scenario={<><em>Discriminating insight:</em> what train/test inconsistency does dropout-before-BN create? You are debugging a 2% test accuracy drop on a CNN that worked fine when dropout was disabled.</>}
        options={[
          {key:"a", text:"Variance shift: training-time activations are scaled down by the mask, but BN's running variance stats see the un-masked inference distribution; the mismatch corrupts normalization.", correct:true},
          {key:"b", text:"Gradient explosion: dropout zeros amplify gradients through BN's normalization since 1/std becomes very large for sparse inputs."},
          {key:"c", text:"Mode collapse: the network learns to ignore the BN affine parameters because dropout already centers the activations around zero on average."},
          {key:"d", text:"Train-eval drift: BN's momentum parameter accumulates incorrect mean estimates because dropout makes the input mean drift across epochs."},
        ]}
        trap={<>(b) misidentifies the failure mode as gradient-related. (c) confuses BN's affine learnable parameters with the normalization itself. (d) describes a mean-shift story but the actual issue is variance, not mean.</>}
        lens={<>Li et al. 2019 named this the variance shift. Training-time variance is reduced by the mask; running stats track the inference-mode (unmasked) variance. The two diverge by a factor proportional to (1-p). Fix: dropout AFTER BN, or use LayerNorm.</>}
        stretch={<>Would the same issue arise if you swapped BN for GroupNorm? Why or why not?</>}
      />

      <VIS.TrapProblem
        id="dropout-q7"
        difficulty="medium"
        title="Q7 — MC dropout vs standard dropout: what is the difference at inference?"
        scenario={<><em>Discriminating insight:</em> what changes between the two protocols at evaluation time? A teammate proposes using dropout for uncertainty estimates on a classifier in production.</>}
        options={[
          {key:"a", text:"MC dropout uses a different mask distribution at inference time — a Gaussian rather than the Bernoulli used during training."},
          {key:"b", text:"MC dropout leaves dropout masks active at inference, runs M stochastic forward passes, and averages the M predictions; standard dropout disables masks at eval.", correct:true},
          {key:"c", text:"MC dropout retrains the network with twice the number of epochs and a halved learning rate to converge the posterior."},
          {key:"d", text:"MC dropout requires a second held-out calibration pass to set the inference-time temperature parameter for the softmax."},
        ]}
        trap={<>(a) is a plausible-sounding distinction but the mask family doesn't change. (c) describes a fully different training protocol. (d) confuses MC dropout with temperature scaling for calibration.</>}
        lens={<>MC dropout = dropout left ON at inference, M samples averaged. It approximates a Bayesian posterior over weights and gives an uncertainty estimate (variance across the M passes). Standard dropout is deterministic at inference.</>}
        stretch={<>What does the variance across the M MC samples measure — epistemic, aleatoric, or both?</>}
      />

      <VIS.TrapProblem
        id="dropout-q8"
        difficulty="hard"
        title="Q8 — Is dropout exactly equivalent to L2 regularization?"
        scenario={<><em>Discriminating insight:</em> when and why does the apparent dropout↔L2 equivalence break? You are explaining an ML theory paper to a study group.</>}
        options={[
          {key:"a", text:"They are exactly equivalent in deep nonlinear networks because both shrink the effective parameter count by the same dropout rate p."},
          {key:"b", text:"They are equivalent for linear regression with squared loss; for nonlinear networks dropout is stochastic and the equivalence breaks.", correct:true},
          {key:"c", text:"They are never equivalent — dropout regularizes activations while L2 regularizes weights, so they operate on different objects entirely."},
          {key:"d", text:"They are equivalent in expectation only when batch size grows large enough for the central limit theorem to kick in on the mask distribution."},
        ]}
        trap={<>(a) overstates the equivalence to nonlinear models. (c) is too strong — the linear case really does give an L2-like penalty in expectation. (d) invokes CLT but the equivalence doesn't depend on batch size.</>}
        lens={<>Wager, Wang & Liang 2013 showed that for linear regression dropout is equivalent in expectation to a scaled L2 penalty. For nonlinear networks the expectation calculation breaks; dropout introduces stochasticity that L2 cannot replicate.</>}
        stretch={<>What dropout p gives the same effective penalty as a given L2 coefficient in the linear case?</>}
      />

      <VIS.TrapProblem
        id="dropout-q9"
        difficulty="medium"
        title="Q9 — Why is co-adaptation the named failure mode dropout targets?"
        scenario={<><em>Discriminating insight:</em> what specifically does dropout discourage that vanilla SGD allows? You are answering a senior interview question on regularization intuition.</>}
        options={[
          {key:"a", text:"It prevents weight magnitudes from drifting toward infinity by clipping any unit whose magnitude exceeds the dropout threshold."},
          {key:"b", text:"It prevents the optimizer from getting stuck in saddle points by injecting stochastic perturbations that escape flat regions."},
          {key:"c", text:"It prevents units from forming brittle multi-unit detectors that only fire when several specific partner units also fire.", correct:true},
          {key:"d", text:"It prevents the loss landscape from forming local minima by smoothing the loss surface through Bernoulli noise convolution."},
        ]}
        trap={<>(a) confuses dropout with weight clipping. (b) overstates dropout's role in optimization geometry. (d) is a plausible-sounding smoothing story but not the mechanism Srivastava named.</>}
        lens={<>Co-adaptation: features learn to rely on each other being present together. Dropout breaks this by randomly removing partners, so each feature must be useful on its own. This is the core narrative of the original 2014 paper.</>}
        stretch={<>How would you empirically measure whether a layer's features are co-adapted?</>}
      />

      <VIS.TrapProblem
        id="dropout-q10"
        difficulty="hard"
        title="Q10 — A training loss curve increases when dropout is enabled. What is happening?"
        scenario={<><em>Discriminating insight:</em> what kind of mismatch would cause training loss to rise rather than fall? You inherit a codebase and notice <code>p=0.5</code> dropout with a strange ascending training curve.</>}
        options={[
          {key:"a", text:"Dropout is being applied during the loss computation as well as the forward pass, double-counting the masking penalty."},
          {key:"b", text:"The optimizer is stuck because the random masks prevent the gradient signal from accumulating consistently across steps."},
          {key:"c", text:"The training loss is being reported from an eval-mode forward pass on the batch; the eval network is at a different operating point than the train-mode one."},
          {key:"d", text:"The dropout layer was added after the final classification head, so its mask is randomly zeroing logits before the softmax loss step.", correct:true},
        ]}
        trap={<>(a) is a fabricated mechanism. (b) is too vague — random masks do not prevent gradient accumulation. (c) describes a real observation but explains a divergence, not an increase in training loss.</>}
        lens={<>Dropping logits with p=0.5 means half of the time the correct class's logit gets zeroed; the softmax becomes near-uniform and CE loss skyrockets. Rule of thumb: never put dropout after the final logit-producing linear layer.</>}
        stretch={<>What about dropout on the embedding lookup at the start — is that ever a good idea?</>}
      />

      <VIS.TrapProblem
        id="dropout-q11"
        difficulty="medium"
        title="Q11 — Modern transformer pretraining often uses p=0. Why?"
        scenario={<><em>Discriminating insight:</em> what other mechanisms in a modern transformer make heavy dropout less necessary? You are reading a Llama-style pretraining recipe and the dropout rate is reported as zero.</>}
        options={[
          {key:"a", text:"Modern transformers train on so much data that overfitting is no longer possible and any regularization just slows convergence."},
          {key:"b", text:"FlashAttention kernels do not support dropout because the masked softmax breaks the fused-kernel memory-access pattern."},
          {key:"c", text:"LayerNorm plus deep residual connections plus massive datasets handle the regularization implicitly; explicit dropout adds noise without further gain.", correct:true},
          {key:"d", text:"Dropout cannot coexist with mixed-precision training in BFloat16 because the masked positions create NaN gradients in the backward pass."},
        ]}
        trap={<>(a) is half-right (data scale helps) but overstates "overfitting is impossible." (b) is a plausible hardware story but not the dominant reason. (d) is fabricated; BFloat16 and dropout compose fine.</>}
        lens={<>The combination of huge corpora, LayerNorm stabilization, and deep residual stacks acts as implicit regularization. Fine-tuning recipes still use small dropout (0.05-0.1) because the data-to-parameter ratio shrinks, but pretraining at scale rarely needs it.</>}
        stretch={<>For a 7B-parameter model fine-tuned on 10k examples, would you turn dropout back on? What rate?</>}
      />

      <VIS.TrapProblem
        id="dropout-q12"
        difficulty="medium"
        title="Q12 — Setting p too high produces what symptom?"
        scenario={<><em>Discriminating insight:</em> what failure mode appears as the dropout rate climbs toward 1? You are sweeping p over [0.1, 0.3, 0.5, 0.7, 0.9] and plotting train and validation loss.</>}
        options={[
          {key:"a", text:"Train loss rises and validation loss rises with it; the surviving subnetwork is too small to fit the data, producing a high-bias regime.", correct:true},
          {key:"b", text:"Train loss falls but validation loss falls faster; the strong masking overcorrects and the network underfits the training distribution."},
          {key:"c", text:"Train loss is unchanged but validation loss falls; the masking only affects the held-out evaluation pass through changed batch statistics."},
          {key:"d", text:"Train loss diverges to infinity while validation loss stays flat; the optimizer cannot find any direction to descend in the masked subspace."},
        ]}
        trap={<>(b) flips the direction; high dropout makes val loss rise too (high bias). (c) misplaces the effect — dropout is applied at train time. (d) overstates the divergence.</>}
        lens={<>Too much dropout reduces effective capacity below what the data requires. Both train and validation loss climb together — the classic high-bias signature. The sweet spot is where validation loss minimizes; tune p as you would any other capacity knob.</>}
        stretch={<>How would the optimal p shift if you doubled the model width while keeping the dataset fixed?</>}
      />

      <VIS.TrapProblem
        id="dropout-q13"
        difficulty="hard"
        title="Q13 — Dropout on the input layer vs hidden layers: why use lower p on inputs?"
        scenario={<><em>Discriminating insight:</em> what is different about the input layer that makes <code>p=0.5</code> dangerous there? Srivastava 2014 recommends <code>p_input ≈ 0.1-0.2</code> versus <code>p_hidden ≈ 0.5</code>.</>}
        options={[
          {key:"a", text:"Input features carry irreplaceable raw signal; zeroing half of them at every step destroys information that no upstream layer can reconstruct.", correct:true},
          {key:"b", text:"Input layers have higher learning rates set by the default optimizer schedule, and combining high LR with high dropout causes training to oscillate."},
          {key:"c", text:"Input layers usually have fewer units than hidden layers, so a given p drops a larger absolute number of useful units in the input vector."},
          {key:"d", text:"Input layers receive gradients of larger magnitude during backprop, so the variance injected by dropout is amplified more there than in hidden layers."},
        ]}
        trap={<>(b) invents an LR-coupling story. (c) flips the direction — input layers often have MORE units, not fewer. (d) is the wrong direction for gradient magnitudes through a deep net.</>}
        lens={<>Hidden layers have redundant distributed representations — dropping one unit leaves others carrying related signal. Inputs are unique observations; you cannot recover the dropped pixel or feature from another input position. So input dropout is a much harsher information bottleneck per unit.</>}
        stretch={<>How does this argument change for image inputs versus categorical tabular features?</>}
      />

      <VIS.TrapProblem
        id="dropout-q14"
        difficulty="medium"
        title="Q14 — Calling model.eval() forgotten in PyTorch: what symptom do you see?"
        scenario={<><em>Discriminating insight:</em> what specific operational signal points to a forgotten eval-mode switch? You are debugging non-deterministic validation accuracy that shifts run-to-run.</>}
        options={[
          {key:"a", text:"Validation accuracy is identical across runs but is uniformly lower than expected because gradients are still being accumulated during the val pass."},
          {key:"b", text:"Validation accuracy varies across runs of the same checkpoint because dropout masks are still being sampled stochastically at inference.", correct:true},
          {key:"c", text:"Validation accuracy reports as NaN because the BatchNorm running statistics have not been frozen for the inference pass."},
          {key:"d", text:"Validation accuracy is identical across runs because dropout has no effect when the model parameters are frozen via torch.no_grad context."},
        ]}
        trap={<>(a) confuses eval-mode with no_grad; they are independent flags. (c) overstates BN behavior; missing eval makes BN use batch stats, but rarely NaN. (d) conflates no_grad with eval-mode — the most common interview mistake on this question.</>}
        lens={<>model.eval() flips dropout off and BN to running-stats mode. Without it, val accuracy varies across runs (dropout is still sampling) and BN uses the val minibatch's stats instead of the running average. Together they produce noisy, slightly biased val numbers.</>}
        stretch={<>What does <code>torch.no_grad()</code> do differently from <code>model.eval()</code>?</>}
      />

      <VIS.TrapProblem
        id="dropout-q15"
        difficulty="hard"
        title="Q15 — What does the rescaled inference pass actually compute?"
        scenario={<><em>Discriminating insight:</em> what does the rescaled deterministic forward pass actually compute versus what an explicit ensemble would compute? You are answering a follow-up after a candidate said "dropout averages 2^N models at inference."</>}
        options={[
          {key:"a", text:"The deterministic pass computes the maximum prediction across the 2^N subnetworks because softmax is invariant under constant shifts of the logits."},
          {key:"b", text:"The deterministic pass computes the exact arithmetic mean of the 2^N subnetwork predictions by linearity of expectation through every layer."},
          {key:"c", text:"The deterministic pass is the network at the median-mass configuration; it does not approximate any moment of the ensemble distribution at all."},
          {key:"d", text:"The deterministic pass approximates the geometric mean of softmax outputs over subnetworks; explicit M-sample averaging recovers the arithmetic mean.", correct:true},
        ]}
        trap={<>(a) and (c) make up distributional roles that the rescaled pass does not have. (b) is the textbook-junior version of the answer — the linearity argument fails because softmax is nonlinear.</>}
        lens={<>Linearity of expectation does NOT survive the softmax. The rescaled pass approximates a geometric-mean ensemble (a quantity weighted by log-probabilities, not probabilities). MC dropout recovers the arithmetic mean by Monte Carlo over M masks.</>}
        stretch={<>Why does the rescaled pass become exact for a single linear layer with no softmax?</>}
      />

      <VIS.TrapProblem
        id="dropout-q16"
        difficulty="medium"
        title="Q16 — DropConnect vs Dropout: what is dropped?"
        scenario={<><em>Discriminating insight:</em> what mathematical object does each method zero out? You are surveying related regularizers for a literature review section.</>}
        options={[
          {key:"a", text:"Dropout zeroes the input embedding entries while DropConnect zeroes the output logit entries; they operate at opposite ends of the network."},
          {key:"b", text:"Dropout zeroes activations (output of a unit); DropConnect zeroes weights (individual entries of the weight matrix between layers).", correct:true},
          {key:"c", text:"Dropout zeroes activations during training only; DropConnect zeroes activations during both training and inference for hard regularization."},
          {key:"d", text:"Dropout uses Bernoulli noise while DropConnect uses Gaussian noise on the same activations; the noise family is the only difference between them."},
        ]}
        trap={<>(a) fabricates an input/output dichotomy. (c) invents an inference-time difference that does not exist. (d) confuses dropout with Gaussian noise injection.</>}
        lens={<>DropConnect (Wan et al. 2013) generalizes dropout: zero individual weight entries rather than whole activations. Slightly more general, slightly less effective in practice because each weight matters less than each unit's output.</>}
        stretch={<>Why is DropConnect rarely used in modern practice despite being a strict generalization?</>}
      />

      <VIS.TrapProblem
        id="dropout-q17"
        difficulty="hard"
        title="Q17 — Variance of activations under dropout: which statement is exact?"
        scenario={<><em>Discriminating insight:</em> compute the exact variance of <code>m ⊙ x</code> where <code>m ∼ Bernoulli(1-p)</code> and <code>x</code> is a fixed scalar.</>}
        options={[
          {key:"a", text:"Var(m * x) equals p * x^2 because the mean is (1-p)*x and the second moment is (1-p)*x^2, leaving p*(1-p)^2*x^2 after simplification."},
          {key:"b", text:"Var(m * x) equals (1-p) * x^2 because the mask survives with probability (1-p) and contributes its full magnitude squared on those occasions."},
          {key:"c", text:"Var(m * x) equals p * (1-p) * x^2 from Bernoulli variance p*(1-p) multiplied by x^2 since x is a deterministic scalar.", correct:true},
          {key:"d", text:"Var(m * x) equals (1-p)^2 * x^2 because variance of a scaled random variable scales by the square of its scale factor, here (1-p)."},
        ]}
        trap={<>(a) writes a wrong arithmetic intermediate. (b) confuses E[m*x] with Var. (d) confuses the mean-rescaling factor with the variance.</>}
        lens={<>Var(m) = p(1-p) for Bernoulli(1-p); multiplying by the deterministic scalar x scales variance by x². So Var(m * x) = p(1-p)x². This is exactly the train-vs-eval variance gap that the BN interaction exploits.</>}
        stretch={<>Under inverted dropout (divide by 1-p), what does this variance become?</>}
      />

      <VIS.TrapProblem
        id="dropout-q18"
        difficulty="medium"
        title="Q18 — When does dropout HURT validation accuracy?"
        scenario={<><em>Discriminating insight:</em> in what regime does dropout flip from helpful to harmful? You are tuning a 6M-parameter model on 200k labeled examples for a tabular regression task.</>}
        options={[
          {key:"a", text:"When the dataset is much larger than the model capacity, dropout adds noise without buying any variance reduction; validation accuracy drops.", correct:true},
          {key:"b", text:"When the batch size is small (under 32) because per-batch mask variance dominates the gradient signal-to-noise ratio at the optimizer level."},
          {key:"c", text:"When the optimizer is Adam rather than SGD because Adam's second-moment estimate is corrupted by the Bernoulli noise in activations."},
          {key:"d", text:"When the learning rate is too low because dropout's effective signal requires LR above a critical threshold to propagate through the network."},
        ]}
        trap={<>(b) overstates the role of batch size. (c) is plausible-sounding but Adam's second moment is on gradients, not activations, and dropout works fine with Adam. (d) is a fabricated LR-coupling story.</>}
        lens={<>Dropout reduces variance at the cost of bias. When you have plenty of data per parameter, variance is already low — adding dropout just raises bias. The cleanest signal: tune p on validation; if p=0 wins, drop the dropout.</>}
        stretch={<>Roughly what data-to-parameter ratio puts you in the "drop the dropout" regime?</>}
      />

      <VIS.TrapProblem
        id="dropout-q19"
        difficulty="hard"
        title="Q19 — Dropout and weight decay: are they redundant?"
        scenario={<><em>Discriminating insight:</em> what does each method regularize, and where do their effects overlap or stack? You are designing the regularization budget for a fine-tuning recipe.</>}
        options={[
          {key:"a", text:"They are redundant in the linear case but additive in deep nets; combining them often gives more than either alone because they constrain different geometries.", correct:true},
          {key:"b", text:"They are exactly equivalent in any architecture, so using both is double-counting and one should always be turned off to avoid over-regularization."},
          {key:"c", text:"They are opposites: weight decay shrinks weights toward zero while dropout enlarges effective weights through the inverted scaling factor."},
          {key:"d", text:"They are independent because weight decay targets the optimizer step while dropout targets the activation forward pass; combining them is mathematically meaningless."},
        ]}
        trap={<>(b) overstates the linear equivalence to all architectures. (c) misreads inverted dropout as a magnitude inflation rather than a mean-correction. (d) is too strong — independence at one level doesn't mean they don't both shape the learned function.</>}
        lens={<>In nonlinear nets dropout's stochastic mask and weight decay's deterministic shrinkage shape the function class differently. Empirically combining them helps; many modern recipes use small weight decay (1e-4) and small dropout (0.05-0.1) simultaneously.</>}
        stretch={<>If you doubled weight decay, would you tune dropout up or down to keep the bias-variance balance?</>}
      />

      <VIS.TrapProblem
        id="dropout-q20"
        difficulty="medium"
        title="Q20 — Recurrent dropout: why is naive dropout broken for RNNs?"
        scenario={<><em>Discriminating insight:</em> what about RNN architecture makes plain dropout destructive across timesteps? You are reviewing an LSTM-based time-series model with i.i.d. dropout applied at every recurrence step.</>}
        options={[
          {key:"a", text:"RNNs share weights across timesteps, so applying dropout to weights at every step zeros different weights each time and destroys the recurrence relation."},
          {key:"b", text:"Resampling a fresh mask at every timestep injects independent noise into the hidden state, which compounds across the sequence and washes out long-range signal.", correct:true},
          {key:"c", text:"RNNs require the loss gradient to flow back through time without interruption, so any masking at all in the forward pass blocks backprop-through-time."},
          {key:"d", text:"RNNs use tanh activations which saturate when their input is multiplied by a Bernoulli mask, freezing gradients near zero in the saturation region."},
        ]}
        trap={<>(a) is half-right (weight sharing) but draws the wrong conclusion. (c) is too strong — masking doesn't block BPTT. (d) is fabricated; tanh saturation has nothing to do with Bernoulli inputs specifically.</>}
        lens={<>Gal & Ghahramani 2016 (variational dropout) showed the fix: share the dropout mask ACROSS timesteps within one sequence, resampling only between sequences. This stops the noise from compounding while still regularizing.</>}
        stretch={<>How does this argument apply to transformer self-attention across tokens? Same problem?</>}
      />

      <VIS.TrapProblem
        id="dropout-q21"
        difficulty="hard"
        title="Q21 — Reproducibility under dropout: which knob controls it?"
        scenario={<><em>Discriminating insight:</em> what determines whether two runs with the same hyperparameters produce the same weights? You are setting up a reproducibility test for a paper submission.</>}
        options={[
          {key:"a", text:"The random seed controlling dropout mask sampling, since data shuffling and weight init are deterministic by default in modern frameworks."},
          {key:"b", text:"Three coupled seeds — weight initialization, data shuffling order, and dropout mask sampling — must all be set; modern frameworks expose them separately.", correct:true},
          {key:"c", text:"Only the dropout-mask seed matters because weight init and data order are absorbed into the optimizer's first-momentum estimate after a few steps."},
          {key:"d", text:"None of the seeds matter once a model reaches convergence because gradient descent on convex losses always reaches the same global optimum."},
        ]}
        trap={<>(a) gets one of the three but states the others as deterministic-by-default, which is wrong. (c) hand-waves seed independence away. (d) invokes convexity that does not apply to deep nets.</>}
        lens={<>Three seeds: init, shuffle, dropout. Plus framework-level flags like <code>torch.use_deterministic_algorithms(True)</code> for kernel-level non-determinism. Even with all three seeds set, GPU kernel reductions can introduce small numerical drift.</>}
        stretch={<>What about cuDNN benchmark mode — when does turning it on hurt reproducibility?</>}
      />

      <VIS.TrapProblem
        id="dropout-q22"
        difficulty="medium"
        title="Q22 — Dropout after the softmax — what happens?"
        scenario={<><em>Discriminating insight:</em> what mathematical property of the softmax output gets broken? You see a Stack Overflow snippet placing dropout on the post-softmax probability vector.</>}
        options={[
          {key:"a", text:"The softmax output sums to 1 across classes; dropout zeros entries and rescales the survivors so the vector no longer sums to 1 in expectation.", correct:true},
          {key:"b", text:"The softmax output is differentiable everywhere; dropout introduces a discrete mask whose derivative is undefined at the boundary between zero and one."},
          {key:"c", text:"The softmax output is bounded in [0,1]; dropout's inverted-dropout scaling factor 1/(1-p) can push survivors above 1, breaking the probability interpretation."},
          {key:"d", text:"The softmax output ranks classes by score; dropout zeroes some scores and changes the argmax, invalidating the classification decision."},
        ]}
        trap={<>(b) confuses dropout's gradient (defined and equal to the mask) with non-differentiability. (c) is partly right (1/(1-p) can push above 1) but the deeper structural break is sum-to-1. (d) is a downstream consequence, not the root issue.</>}
        lens={<>Post-softmax dropout breaks the probability simplex — the output is no longer a valid distribution. If you want post-softmax regularization, use label smoothing or temperature scaling instead. Dropout belongs before the final logit-producing layer, not after softmax.</>}
        stretch={<>Could you fix this by renormalizing the masked softmax output to sum to 1?</>}
      />

      <VIS.TrapProblem
        id="dropout-q23"
        difficulty="hard"
        title="Q23 — Why does dropout sometimes IMPROVE calibration?"
        scenario={<><em>Discriminating insight:</em> what about the dropout-induced predictive distribution makes it less overconfident? You are explaining a calibration plot from a medical-imaging classifier.</>}
        options={[
          {key:"a", text:"Dropout makes the network train on a slightly underfitting subnetwork at every step, leaving the final ensemble less confident; reduced overconfidence improves expected calibration error.", correct:true},
          {key:"b", text:"Dropout zeros logits at random, which pushes softmax outputs closer to uniform on average; uniform distributions have low calibration error by construction."},
          {key:"c", text:"Dropout improves calibration only when combined with temperature scaling; alone it has no effect on calibration metrics like ECE or Brier score."},
          {key:"d", text:"Dropout's noise injection serves as a Lipschitz regularizer that bounds the gradient of the softmax with respect to its inputs, capping confidence growth."},
        ]}
        trap={<>(b) confuses raw entropy with calibration; uniform predictions are not well-calibrated unless the data is also uniform. (c) is too strong — dropout helps calibration alone, more with TS. (d) invokes Lipschitz but the link to calibration isn't direct.</>}
        lens={<>Modern deep nets are notoriously overconfident (Guo et al. 2017). Dropout's ensemble-averaging effect produces softer predictions — confidence on wrong examples drops more than confidence on correct ones, improving Expected Calibration Error.</>}
        stretch={<>How does temperature scaling compare to dropout as a post-hoc calibration tool?</>}
      />

      <VIS.TrapProblem
        id="dropout-q24"
        difficulty="medium"
        title="Q24 — Where should dropout sit relative to the activation function?"
        scenario={<><em>Discriminating insight:</em> what changes when dropout sits before vs after ReLU? You are reviewing a PR that swapped the order on a vision MLP.</>}
        options={[
          {key:"a", text:"Before ReLU: half the inputs to ReLU are zeroed, which produces more dead-ReLU units; after ReLU is the conventional choice and rarely changes results materially.", correct:true},
          {key:"b", text:"Before ReLU is strictly worse because it doubles the masking effect — once by the mask and once by ReLU clamping negatives to zero."},
          {key:"c", text:"After ReLU is strictly worse because dropping post-activation values destroys the sparse pattern that ReLU explicitly created during the forward pass."},
          {key:"d", text:"It doesn't matter mathematically because ReLU and the Bernoulli mask are both element-wise zero-or-keep operations, so they commute exactly in all cases."},
        ]}
        trap={<>(b) and (c) overstate the difference; in practice it is small. (d) is wrong because they don't commute when ReLU has a negative input that mask happens to pass.</>}
        lens={<>After-ReLU is the dominant convention in code today. Before-ReLU is mathematically valid but slightly increases dead-unit fraction. The empirical difference is small enough that most papers don't explicitly justify their choice.</>}
        stretch={<>How does this answer change for GELU instead of ReLU?</>}
      />

      <VIS.TrapProblem
        id="dropout-q25"
        difficulty="hard"
        title="Q25 — Is dropout still worth using in 2026?"
        scenario={<><em>Discriminating insight:</em> in what current regimes does dropout still pay its way? A staff engineer asks whether to keep it in the standard fine-tuning recipe.</>}
        options={[
          {key:"a", text:"Always — dropout was the regularizer of the 2010s and remains the default first-line regularizer for every architecture in production today."},
          {key:"b", text:"Never — modern architectures with LayerNorm, residual connections, and pretraining-scale data have rendered explicit dropout obsolete in all settings."},
          {key:"c", text:"Fine-tuning small data, last-mile transformer fine-tunes, and MC-dropout uncertainty pipelines; rarely useful in from-scratch pretraining at frontier scale.", correct:true},
          {key:"d", text:"Only in conv nets and recurrent models since transformers handle regularization implicitly via attention's softmax-induced sparsity over query-key pairs."},
        ]}
        trap={<>(a) and (b) are the two over-strong narratives. (d) flips the modern consensus — transformer fine-tuning is exactly where small dropout still matters; conv-net dropout is the weakest application.</>}
        lens={<>In 2026 dropout shows up in: small-data fine-tuning (small p on attention and residual streams), MC-dropout uncertainty estimation, and as a default in many tabular and recsys pipelines. It is rarer in frontier-scale pretraining where data abundance and LayerNorm dominate.</>}
        stretch={<>For a 70B-parameter LoRA fine-tune on 50k examples, would you enable dropout? Where and how much?</>}
      />
    </VIS.Section>
