<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>visualize</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
           margin: 0; background: #ffffff; color: #0f172a; }
    /* Mobile-responsive baseline. All visuals load this block — they should
       degrade gracefully down to a 360px viewport. */
    img, svg, video, canvas { max-width: 100%; height: auto; }
    table { border-collapse: collapse; }
    pre  { max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    code { word-break: break-word; }
    @media (max-width: 720px) {
      body { overflow-x: hidden; }
      main { padding-left: 14px !important; padding-right: 14px !important; }
      h1   { font-size: 26px !important; line-height: 1.2 !important; }
      h2   { font-size: 20px !important; line-height: 1.25 !important; }
      h3   { font-size: 17px !important; }
      /* Tables: scroll horizontally rather than overflow the viewport. */
      table { display: block; max-width: 100%; overflow-x: auto;
              -webkit-overflow-scrolling: touch; white-space: nowrap; }
      /* Mermaid + Vega SVGs: keep within viewport. */
      .vis-mermaid, .vis-vega { max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .vis-mermaid svg, .vis-vega svg { max-width: 100%; height: auto; }
      /* Trap problem buttons: thumb-friendly tap targets. */
      .vis-trap button, .vis-trap-option { min-height: 44px; }
      /* TrapProblem options: stack readably; allow long options to wrap. */
      .vis-trap-option { white-space: normal; }
      /* Hero byline can wrap to multiple lines without breaking layout. */
      .rv-hero .rv-byline { gap: 8px 14px; }
      /* Tooltip max-width capped to viewport. */
      .vis-term-tip { max-width: calc(100vw - 24px); }
    }
    /* Touch devices (no hover): make jargon-glossed terms more visibly tappable. */
    @media (hover: none) {
      .vis-term { text-decoration: underline dotted;
                  text-decoration-color: #2563eb;
                  text-underline-offset: 3px; }
    }
  </style>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js" async></script>
  <script>window.__VIS_GLOSSARY = {
  "_meta": {
    "purpose": "Shared cache of jargon→plain-English glosses. Used by /visualize and trap-drill authors. Append new terms as encountered. Keep glosses ≤25 words, no jargon-in-jargon.",
    "updated": "2026-05-19"
  },
  "ablation": "Controlled experiment that removes one component of a model to measure its contribution; standard tool for attributing a model's lift to specific mechanisms.",
  "AdamW": "Adam optimizer with decoupled weight decay; default optimizer for transformer training.",
  "adversarial corruption": "A setting where an adversary arbitrarily corrupts a fraction of rewards; breaks classical least-squares estimators.",
  "affine map": "Transform of the form y = a·x + b: a scale plus a bias. Composes naturally with conv, so a frozen BN can be fused into the preceding conv.",
  "affine transform": "Per-channel y = γ·x + β with learnable γ and β; the second half of BN/LayerNorm's transform.",
  "aHash": "Average-hash for images. Resize to 8x8 grayscale, threshold each pixel against the mean to produce 64 bits. Cheaper than pHash but less robust to gamma/contrast changes.",
  "aleatoric uncertainty": "Uncertainty from inherent noise in the data. Not reducible with more data.",
  "all-reduce": "The NCCL collective that sums each tensor across all ranks and broadcasts the result. Cost scales with tensor size and the number of ranks; sub-linear in well-tuned setups.",
  "alpha-spending": "Sequential-testing technique that pre-allocates total Type-I-error budget across interim peeks via a spending function (O'Brien-Fleming, Pocock), so peeking does not inflate the false-positive rate.",
  "Amazon (dataset)": "Public review-fraud benchmark of Amazon product reviews; a dense, heterophilic fraud graph where fraudulent reviewers connect mostly to benign products.",
  "AML": "Anti-Money-Laundering. The compliance domain of detecting and reporting laundering activity in financial systems.",
  "AMP": "Automatic Mixed Precision. PyTorch context manager (torch.cuda.amp.autocast) runs ops in fp16 where safe and fp32 where needed. Paired with GradScaler to prevent fp16 gradient underflow.",
  "anchor boxes": "Fixed bounding boxes laid over an image at multiple scales. Each is a binary classification candidate (object vs background) in single-stage detection.",
  "ANN": "Approximate Nearest Neighbor. Family of algorithms (HNSW, IVF, ScaNN) that find close vectors much faster than exact search at small recall cost.",
  "anti-redundancy": "Avoiding near-duplicate items in the same ranked list (e.g. five very similar sushi places). MTGR captures this via the prefix.",
  "API": "Order of operations and what each PyTorch call mutates: zero_grad timing, .backward() additivity, scaler method semantics, retain_graph misuse.",
  "argmax": "Argument of the maximum — the input that gives the largest output value.",
  "ATE": "Average Treatment Effect. Population-average causal effect of a treatment.",
  "attention rollout": "Interpretability technique: multiply attention matrices across layers to attribute output to input tokens.",
  "attention weights": "Per-key scalars produced by softmax(Q·K^T/sqrt(d)); they tell the transformer how much each token contributes to a query's output.",
  "attention-mask": "Boolean mask applied to attention scores before softmax to zero out forbidden positions (e.g., future tokens in causal LMs, padding, or out-of-window neighbors).",
  "AUC": "Area Under the ROC Curve. Probability that a random positive scores higher than a random negative. Threshold-free ranking metric.",
  "auction": "Real-time ad-bidding system that ranks ads by bid × predicted CTR; consumes calibrated probability, not raw logits.",
  "AUPRC": "Area Under the Precision-Recall Curve. More informative than AUC for class-imbalanced problems.",
  "autograd": "PyTorch's automatic differentiation engine. Tracks operations on tensors with requires_grad=True, builds the graph on the fly, and computes gradients via reverse-mode auto-diff on .backward().",
  "autoregressive": "Generates a sequence one element at a time, each conditioned on what's already been emitted; classic next-token prediction.",
  "backpressure": "Control loop that throttles incoming load when downstream capacity is exceeded (e.g., raise confidence threshold to send fewer posts to humans during surge).",
  "backprop": "Backpropagation: chain-rule pass computing gradients of the loss w.r.t. each weight; consumed by SGD/AdamW for parameter updates.",
  "backpropagation": "The math trick that figures out, for every weight in the model, which direction to nudge it to reduce the loss. It's what makes gradient descent practical on deep networks.",
  "backward": "The reverse-mode autograd pass that walks the computational graph from the loss back to every parameter, accumulating into param.grad. Each call ADDS to .grad; it does not overwrite.",
  "backward hooks": "DDP registers per-parameter hooks fired during .backward(). When a parameter's grad is ready, the hook bucks it for NCCL all-reduce. Hooks run regardless of caller intent — model.no_sync() is the only escape valve.",
  "batch": "The chunk of samples processed in one forward/backward pass. Gradient is summed over the batch before the optimizer step.",
  "batch dimension": "The N dimension of the input tensor — one of the N independent samples drawn together each step. BN reduces over this axis (per channel).",
  "BatchBALD": "Bayesian Active Learning by Disagreement, batch-corrected. Acquires K queries that JOINTLY maximize mutual information with model parameters.",
  "BatchNorm": "Batch Normalization. Normalize each feature across the batch dimension; standard for CNNs, awkward for variable-length sequences.",
  "Bayesian framing (Ridge)": "Each weight has a prior; learning updates that prior. Bayesian linear regression with a zero-mean Gaussian prior on weights gives Ridge.",
  "Bayesian-decision-theoretic": "Bayesian decision theory: choose the action that maximizes expected utility under the posterior.",
  "BCE": "Binary cross-entropy. Loss function for yes/no prediction; pushes the predicted probability toward the true label (0 or 1).",
  "beam search": "Decoding heuristic that keeps the top-B partial sequences at each step; trades compute for higher-quality outputs vs greedy decoding.",
  "Benjamini-Hochberg": "FDR-controlling multiple-comparisons correction; rejects ordered p_(i) when p_(i) <= (i/m)*q. Less conservative than Bonferroni.",
  "BERT": "Bidirectional Encoder Representations from Transformers. Pretrained text encoder; classic backbone for text classification (~50ms inference).",
  "BERT4Rec": "BERT-style masked-item recsys. Bidirectional transformer trained with cloze masking on item sequences; pointwise scoring head.",
  "Beta(1,1)": "Two-parameter Beta distribution on [0,1] commonly used as a conjugate prior for click-through-rate; Beta(1,1) is uniform.",
  "bf16": "16-bit float with 8-bit exponent (vs FP16's 5). Wider range, lower precision; preferred for ML training stability.",
  "BFloat16": "16-bit float with 8-bit exponent (vs FP16's 5). Wider range, lower precision; preferred for ML training stability.",
  "BIN": "Bank Identification Number. First 6-8 digits of a card; identifies the issuer. Used as a fraud feature.",
  "BN": "Batch Normalization (Ioffe & Szegedy 2015). Normalizes each feature using the mean/variance computed over the current batch dimension; learnable affine γ, β. Train and eval use different statistics.",
  "BN running stats": "BatchNorm's per-batch statistics. Each forward computes mean/var over the local micro-batch; gradient accumulation does NOT merge these across micro-batches. Effective BN batch = micro-batch, not effective batch.",
  "Bonferroni": "Multiple-testing correction tightening alpha to alpha/m across m tests. Conservative; controls family-wise error rate.",
  "BOS": "Beginning-of-sequence token. Special vocabulary index that seeds the decoder before any output has been emitted.",
  "BPR": "Bayesian Personalized Ranking. Pairwise loss for recsys: predicted score of an observed item should exceed that of an unobserved item.",
  "calibrated": "A model's predicted probability matches the true frequency (a 0.8 prediction is right 80% of the time). Re-calibrate as data shifts.",
  "calibration": "How closely predicted probabilities match true frequencies. A model predicting 0.7 should be right 70% of the time.",
  "candidate generation": "First stage of recsys: retrieve a few hundred items from the full catalog (millions). Usually ANN or two-tower.",
  "candidate slate": "The set of items considered for display in one user-facing list. MTGR orders the slate; retrieval produces it.",
  "Canonical item": "The chosen representative of a near-duplicate cluster. Downstream systems (search index, recommender, feed) reference the canonical id and treat the rest as aliases.",
  "Canonicalization": "Picking one representative per cluster — usually highest resolution, earliest first-seen, or most engaged. Downstream search/recs index only the canonical id.",
  "CARE-GNN": "Camouflage-Resistant GNN (Dou et al., CIKM 2020). Filters low-similarity neighbors per relation; assumes homophily-with-camouflage.",
  "cascade": "Multi-stage retrieval/ranking pipeline; each stage shrinks the candidate set and uses a heavier model.",
  "catalog churn": "Rate at which new items enter (and old items retire) in the catalog; news and short-video can see 10k-50k new items per hour.",
  "CATE": "Conditional Average Treatment Effect. Treatment effect conditional on covariates — the per-user/per-context lift.",
  "causal mask": "Mask applied to attention so each position can only attend to earlier positions; enforces left-to-right autoregressive structure.",
  "CE": "Cross-entropy. Loss function for multi-class prediction; penalizes the model when the predicted class probability is low for the true class.",
  "chain rule": "The calculus rule for differentiating composed functions: d(f∘g)/dx = f'(g(x)) · g'(x). Autograd applies this recursively along the computational graph; dividing any node's value by k divides every downstream gradient by k.",
  "chargeback delay": "Gap between a fraudulent transaction and the chargeback that confirms it as fraud; typically 30-60 days. Bounds how fresh production labels can be.",
  "class-weighted BCE": "Per-class weighted binary cross-entropy. Multiplies the loss for the rare class by a fixed scalar > 1. Doesn't adapt to per-sample confidence.",
  "class-weighted CE": "Cross-entropy with a fixed per-class scalar weight. Up-weights the rare class; doesn't depend on per-sample confidence.",
  "CLIP": "Contrastive Language-Image Pretraining. Joint image-text encoder producing aligned embeddings via contrastive loss.",
  "clip_grad_norm_": "torch.nn.utils.clip_grad_norm_. Rescales every parameter's .grad so the global L2 norm across all params is ≤ max_norm. Standard transformer-training stabilizer.",
  "closed-form solution": "A solution expressible as a finite algebraic formula, with no iterative optimization required.",
  "cloze": "Fill-in-the-blank training: mask a token inside a sequence and ask the model to recover it from both-side context. Forces a bidirectional representation.",
  "Cluster purity": "Quality metric for a clustering: per-cluster, the fraction of items whose true class equals the most common class in the cluster. Averaged over clusters.",
  "cluster tree": "Hierarchical clustering organized as a tree (depth 3-5) where each node is a centroid; descending picks the closest child at each level. Enables log-time retrieval.",
  "CNN": "Convolutional Neural Network. Stacks convolution + nonlinearity + pooling; standard backbone for image tasks before ViT.",
  "co-occurrence encoding": "DyGFormer's headline lever: each neighbor token is tagged with how many times that neighbor appears in BOTH endpoints' histories, making shared-neighbor structure a first-class learnable feature.",
  "code": "One entry in a codebook — a learned vector that an input snaps to during quantization. Identified by its integer index.",
  "code utilization": "Fraction of codes (or entropy of code-assignments) actually used. Low utilization signals codebook collapse.",
  "codebook": "Learned dictionary of discrete vectors (codes). An encoder snaps its output to the nearest code; that code's index becomes a token.",
  "codebook collapse": "VQ/RQ-VAE failure: most codebook entries go unused; encoder maps all inputs to a few popular codes. Sign of broken quantization.",
  "codebook drift": "Across catalog updates or retraining, codebook entries shift; the same item gets a different Semantic ID, breaking downstream consumers.",
  "codebook size": "Codes per codebook (|V|, e.g. 256). Larger → finer reconstruction but less prefix-sharing across items.",
  "coefficient (linear model)": "Learned scalar weight w_j that multiplies feature x_j inside a linear model; the vector of all coefficients is the parameter w.",
  "cold pair": "Pair (U, V) with no shared neighbors in their recent histories; DyGFormer's co-occurrence counts are all zero, so the model degrades to a vanilla neighbor-sequence transformer (TGAT-with-patching).",
  "cold-arm": "A new arm has no interaction history; the bandit has no per-arm posterior data and falls back on the prior to decide pull probability.",
  "cold-start": "When a new user or item has no interaction history, so embedding tables and behavioral features have nothing to learn from.",
  "collinear columns": "Feature columns that are highly correlated (often near-linearly dependent). Inflate OLS variance and motivate Ridge or PCA.",
  "commitment loss": "VQ-VAE term that pulls encoder outputs toward their chosen code; prevents the encoder from drifting away from the codebook.",
  "computational graph": "The DAG that autograd builds during forward. Each Tensor has a grad_fn pointing to the op that produced it; .backward() walks this graph in reverse, applying chain rule to populate .grad on leaf tensors.",
  "concentration parameter (Beta)": "The alpha+beta sum of a Beta distribution; sets how informative the prior is. Larger = stronger prior = longer for data to override.",
  "confidence interval": "A range that, with stated probability, contains the true parameter value; shrinks as evidence accumulates.",
  "confidence router": "Routes inputs based on cheap-model output confidence: high confidence → auto-action, low confidence → escalate to expensive model or human.",
  "confidence-shrinking exploration": "Exploration that decreases as the model becomes more certain; LinUCB's bonus shrinks per feature direction with use.",
  "conformal prediction": "Distribution-free method that produces prediction sets with guaranteed coverage (e.g., 95%) under exchangeability.",
  "consistency-preserving hash": "TWIN V1's retrieval primitive: single-level hash designed so that semantically similar items collide more often than uniform hashing.",
  "constrained decoding": "Mask the decoder's logits at each step so it can only emit tokens that lead to a valid sequence (e.g., a real catalog item).",
  "constraint region": "Feasible region of weights with penalty bounded by t; bounds how large weights can grow. The shape of this region drives sparsity vs shrinkage.",
  "content embedding": "Dense vector derived from item content (text, image, audio) rather than ID alone. TWIN V2's clustering uses these to make clusters semantically meaningful.",
  "context (bandit)": "The feature vector x available at decision time (user, time-of-day, etc.) used to score arms.",
  "contextual bandit": "Online decision algorithm: choose an action given context, observe reward, update; trades exploration vs exploitation.",
  "contrastive": "A training signal that uses a positive (true) example alongside many negatives, so the model must rank the positive above the rest rather than predict an absolute label.",
  "contrastive loss": "Loss that pulls positive pairs together and pushes negatives apart in embedding space (e.g. InfoNCE).",
  "conv layer": "Layer using sliding-window kernels with shared weights over spatial positions; the workhorse of image models.",
  "convex (loss)": "A function whose graph holds water — any line segment between two points stays above the graph. Has a unique global minimum (no local traps).",
  "cost-of-error": "The business/safety cost of a misclassification — varies by policy (false negative on self-harm vs false positive on spam).",
  "counterfactual": "What would have happened under an alternative system. Used to weigh the lift of a candidate policy against the realistic fallback.",
  "cross-attention": "Attention layer where queries come from one sequence (e.g., decoder) and keys/values from another (e.g., encoder). Connects two streams.",
  "cross-entropy": "Standard classification loss: -log(p_t) where p_t is the predicted probability for the correct class. Treats every sample equally.",
  "cross-hop attention": "Attention across tokens that represent different graph hops, so the transformer can mix hop-1 and hop-2 evidence about the same center.",
  "cross-hop reasoning": "Combining evidence from different hop distances (e.g. a fraud neighbor at hop 1 plus benign mules at hop 2) to decide about the center.",
  "cross-validation": "Holding out part of the training data K times to estimate generalization error before any final test-set evaluation.",
  "CSAM": "Child Sexual Abuse Material. Highest-priority moderation category; detected via perceptual-hash matches against known-bad databases.",
  "CTR": "Click-Through Rate. Fraction of impressions that lead to a click; the central calibration target for ads and feed ranking.",
  "CUPED": "Controlled experiment Using Pre-Experiment Data. Variance reduction by adjusting outcomes with a pre-period covariate; variance shrinks by 1 - rho-squared.",
  "DAG": "Directed Acyclic Graph. Nodes connected by directed edges with no cycles; used to model causal structure or computation graphs.",
  "DAU": "Daily Active Users. The headline scale metric for consumer surfaces; Kuaishou main feed = hundreds of millions DAU.",
  "DDP": "DistributedDataParallel. PyTorch's data-parallel wrapper: replicates the model on each GPU, synchronizes gradients via NCCL all-reduce at every .backward() call.",
  "dead codes": "Codebook entries that no encoder output ever snaps to; symptom of collapse. Fixed by periodic re-init near active encoder regions.",
  "decode temperature": "Scalar dividing logits before softmax at decode time. Higher T → more diverse samples; lower T → more deterministic argmax-like decoding.",
  "decoder": "Neural net that maps a latent vector (or token sequence) back to the output space (reconstructed input, next item).",
  "decoder-only transformer": "Transformer with only the decoder stack (GPT-style); generates outputs one token at a time conditioned on what's been emitted so far.",
  "deep classifier": "An expensive deep-learning model (transformer-based) used in the second tier of a cascade, after cheap heuristics have screened obvious cases.",
  "Deep SVDD": "Deep Support Vector Data Description. One-class anomaly detector: maps inliers to a tight hypersphere; outliers fall outside.",
  "dense classification": "ML setup where every pixel/anchor is a candidate class. Background dominates ~99.99% and drowns foreground signal under plain CE.",
  "dense retrieval": "Retrieval via dot-product (or cosine) between learned dense embeddings of queries and items; usually served by an ANN index.",
  "discounted LinUCB": "LinUCB with A_a multiplied by gamma<1 each step; old observations are exponentially down-weighted to handle drift.",
  "distributed": "DDP gradient sync, no_sync placement, all-reduce cost, SyncBN, gradient-as-bucket-view memory.",
  "distributed training": "Splitting a training step across multiple GPUs/nodes — e.g. PyTorch DDP. Vanilla BN computes stats per-device; SyncBN pools globally.",
  "diurnal": "Time-of-day periodicity in user behavior (e.g., 6-9am CTR ~2x 2-4am CTR for news). A prior fitted in one phase mis-applies in another.",
  "diverse beam search": "Beam-search variant (Vijayakumar et al.) that partitions beams into groups and adds a between-group penalty so later groups avoid earlier groups' tokens.",
  "diversification reranker": "Post-ranking layer that swaps items to spread categories/topics across the list. Patches intra-list redundancy that pointwise rankers miss.",
  "DLRM": "Deep Learning Recommendation Model. Meta's classic recsys architecture: feature crosses + MLP top.",
  "doubly robust": "Off-policy estimator with both an outcome model and a propensity model; unbiased if EITHER is correct.",
  "DP-FTRL": "Variant of DP-SGD with correlated noise across steps via tree-aggregation; better privacy-utility trade for long training.",
  "DP-SGD": "Differentially-Private SGD. Per-sample gradient clipping + Gaussian noise; provides (ε,δ)-DP privacy guarantee at some utility cost.",
  "DPO": "Direct Preference Optimization. Trains a model on (winning, losing) pairs of outputs to align it with preferences — no separate reward model.",
  "DPP": "Determinantal Point Process. Probabilistic model that prefers diverse subsets; selecting a new item discounts items similar to those already chosen.",
  "drift": "When the data distribution at serving time diverges from the training distribution; model accuracy silently degrades.",
  "DROCC": "Deep Robust One-Class Classification. Adversarially trains a one-class detector by perturbing points along a radius-r shell.",
  "DyGFormer": "Dynamic Graph Transformer. Transformer over patches of temporal neighbor sequences (no per-node memory, stateless per call).",
  "dynamic masking": "Attention mask that adapts per-request (here: prevents cross-feature tokens from attending to future emitted items in MTGR).",
  "dynamically": "GradScaler's scale-adjustment policy: if any gradient is inf/nan, halve the scale and skip the step; if N steps pass with no overflow, double the scale. Auto-tunes k against the workload.",
  "e-commerce ranking": "Ranking items on a shopping surface (search, category page, recommendations). Loaded with crosses (price×budget, brand×history).",
  "ECE": "Expected Calibration Error. Average gap between predicted probability and true frequency, binned over the predicted-probability axis.",
  "effective batch": "The batch size that the optimizer 'sees' — micro_batch × accum_steps × num_gpus. Determines the noise floor of SGD and the right setting for LR / weight-decay / warmup.",
  "effective Bayesian sample size": "For Beta(a,b), the prior is worth a+b pseudo-observations; data dominates when n exceeds a+b.",
  "eigenvalue": "Scaling factor associated with an eigenvector; large eigenvalue = strong signal in that direction.",
  "eigenvector": "A direction in feature space whose vectors are scaled (not rotated) by XᵀX; the corresponding scaling factor is the eigenvalue.",
  "elastic shift": "Reviewer scheduling that scales pool size up/down across time zones to match incoming load; common in 24/7 global moderation ops.",
  "EMA": "Exponential Moving Average. Smoothed running estimate that updates as new ← (1-m)·old + m·sample. BN uses EMA over per-batch stats during training.",
  "EMA codebook update": "Update each codebook entry as an exponential moving average of the encoder outputs assigned to it. Stabilizes VQ/RQ-VAE training.",
  "embedding": "Dense vector representation of a discrete item (word, user, product). Learned so that similar items have similar vectors.",
  "Empirical Bayes": "Bayesian framework where the prior's parameters are estimated from data rather than chosen subjectively; a point estimate of the hyper-prior replaces a full posterior over it.",
  "encoder": "Neural net that maps raw input (image, text, item) into a dense latent vector consumed by downstream layers.",
  "encoder-decoder": "Transformer with separate encoder (reads input) and decoder (writes output) stacks; T5-style; classic for sequence-to-sequence tasks.",
  "engagement-bait": "Content engineered to maximize watch-time or clicks (cliffhangers, loops, ragebait) regardless of user satisfaction.",
  "EOS": "End-of-sequence token. The special vocabulary index that marks a finished output; emitting it freezes a beam from further expansion.",
  "epistemic uncertainty": "Uncertainty from the model not knowing what it doesn't know. Reducible with more data; captured by ensembles or Bayesian methods.",
  "epoch": "One full pass over the training data. Most training runs span many epochs; fine-tuning is often only a few.",
  "epsilon-greedy": "Exploration rule that picks a random arm with probability epsilon and the greedy arm otherwise; ignores model confidence.",
  "ESU": "Exact Search Unit. TWIN V2's target-attention module that scores the small GSU-retrieved subset against the candidate item; replaces full-sequence attention.",
  "ETA": "End-to-end Target Attention (Chen et al. 2021). Soft retrieval over the full history online via SimHash-LSH; O(L) per request, no offline structure.",
  "ETL": "Stage of the data pipeline where raw catalog/event tables are normalized, joined, and written to feature stores. Acronym for Extract-Transform-Load.",
  "exploration logging": "Logging policy that deliberately injects randomization so off-policy estimators have support across many actions.",
  "exploration vs exploitation": "Tradeoff in online learning: try new actions to gather data vs pick the best-known action to maximize reward now.",
  "exposure bias": "When the data only contains items the system already showed users; new items never get the chance to prove themselves.",
  "factorized softmax": "Decompose softmax over a huge vocabulary into smaller softmaxes (e.g. one per code position) to make it tractable.",
  "false negative": "Model classifies as 'safe' something that's actually a violation; the costliest error class for high-harm policies like self-harm.",
  "false positive": "Model classifies as 'violation' something that's actually safe; costlier for low-harm policies like spam (annoys real users).",
  "Faster R-CNN": "Two-stage object detector: region-proposal network shortlists ~1k boxes, then a classifier head refines. Two stages provide implicit hard-negative filtering.",
  "FastText": "Fast text classifier using subword n-grams; trains and serves in milliseconds. Common cheap-tier text moderation model.",
  "feature cross": "Combining two raw features into a single signal (e.g. user-id × category). Captures interactions a single-feature model misses.",
  "feature store": "Low-latency key-value store that returns per-entity feature windows (e.g., last 200 neighbors) at inference time; the canonical backing service for stateless models like DyGFormer.",
  "FedAvg": "Federated Averaging. Server averages client model weights; the canonical federated-learning aggregator.",
  "federated learning": "Train a shared model across many clients without centralizing their data; each client computes gradients locally, server aggregates.",
  "feed surface": "Product surface that shows a long ranked list (home feed, search results). Has many slots, so intra-list ordering matters.",
  "FIFO": "First-In-First-Out queue. Items processed strictly in arrival order, no priority — wrong choice when policies have different urgency.",
  "filter bubble": "Recommender concentrates each user on a narrow slice of content over time, suppressing exposure to other relevant items.",
  "fine-tuning": "Continue training a model (or just its head) on a smaller, task-specific dataset starting from pretrained weights.",
  "FlashAttention2": "FA2. GPU-optimized exact softmax-attention kernel; tiles QK^T to keep work in SRAM. Standard 2024 baseline for transformer attention speed.",
  "FLOPs": "Floating-point operations. Standard unit of compute used in scaling-law plots and model-cost comparisons.",
  "Focal loss": "Down-weights well-classified examples via (1-p)^γ; sharpens loss on hard examples. Used for class-imbalanced detection.",
  "Fourier time-encoding": "TGAT's phi(dt) = [cos(omega_1 dt), sin(omega_1 dt), ..., cos(omega_d dt), sin(omega_d dt)] with learnable frequencies omega; encodes irregular event-time gaps so attention can weigh recency.",
  "FP16": "16-bit floating point (IEEE half). Default training/inference precision for modern transformer kernels on Ampere+.",
  "FP4": "4-bit floating point quantization. Reduces weight+activation memory ~8× vs BF16; aggressive low-precision serving format.",
  "FP8": "8-bit floating point. Half the bits of FP16; trades precision for compute/memory savings, available on H100+.",
  "FraudGPT": "LLM continually pretrained on financial-fraud text (typology vocabularies like 'structuring', 'smurfing', etc.) then SFT'd for case generation.",
  "FraudGT": "Lin et al., ICAIF 2024. Label-free graph transformer over k-hop subgraphs; an alternative to GAGA when neighbor labels are PII.",
  "freshness feature": "Feature like 'hours since publication' that turns time-varying reward into a slope a linear model can capture.",
  "FSDP": "Fully Sharded Data Parallel. PyTorch's ZeRO-style sharded-state DDP variant: shards parameters, gradients, and optimizer state across ranks. Accumulation works identically — the sharding is transparent below the .grad layer.",
  "GADBench": "Fair-eval benchmark suite for graph anomaly detection (Tang et al., NeurIPS 2024). Enforces temporal splits, realistic labeled-fraction, and well-tuned tabular baselines.",
  "GAGA": "Group AGgregation transformer (Wang et al., WWW 2023). Encodes per-(hop, class) neighbor groups as transformer tokens; targets heterophilic fraud graphs.",
  "GAT": "Graph Attention Network. GNN that learns per-edge attention weights over node features; attention is over feature similarity, not class labels.",
  "Gaussian prior (weights)": "Normal distribution acting as a prior on weights; expresses 'small weights more likely than large' and is mathematically equivalent to an L2 penalty.",
  "GBDT": "Gradient-Boosted Decision Trees (XGBoost, LightGBM, CatBoost). Sequentially fits trees to the residuals of previous trees; the dominant tabular baseline.",
  "GCN": "Graph Convolutional Network. Layerwise neighborhood averaging with learned weights; transductive (needs full graph at train time).",
  "GCV (Ridge)": "Generalized Cross-Validation. Closed-form approximation to leave-one-out CV using the trace of the influence (hat) matrix; cheap to evaluate per α.",
  "GDPR": "EU General Data Protection Regulation. Restricts cross-user use of personal data — including using one user's fraud label as a feature scoring another user.",
  "generative recsys": "Recommendation systems where the model GENERATES the next item's identifier (or token sequence) instead of scoring a candidate list.",
  "GLN": "Group-Layer Normalization. LayerNorm variant that normalizes within separate groups of features; preserves scale separation between heterogeneous token types.",
  "GNMT": "Google Neural Machine Translation (Wu et al. 2016). Introduced the ((5+L)/6)^α length penalty and the now-standard coverage penalty for beam search.",
  "GNN": "Graph Neural Network. Family of models that learn node/edge embeddings by iteratively aggregating from neighbors.",
  "golden-set": "A small set of items with verified ground-truth labels, used to audit reviewer accuracy and detect label drift over time.",
  "gotchas": "BatchNorm batch size, linear LR scaling rule, dropout under accumulation, mixed-size micro-batches, deterministic seeding across accumulation.",
  "gradient (focal loss)": "The signal that updates weights during backprop. Focal loss reduces this signal for confident-correct samples without altering predictions.",
  "gradient-blocking stage boundary": "When stages of a cascade are trained independently, gradients from the final business metric can't flow back to the retrieval scorer. OneRec eliminates this.",
  "GradScaler": "torch.cuda.amp.GradScaler. The AMP helper object that owns the dynamic loss-scale k and exposes scale/unscale_/step/update methods that wrap the optimizer.",
  "graduation (bandit)": "When an arm has accumulated enough pulls that its own data dominates the prior; it exits the cold-start regime.",
  "Gram matrix": "Sum of outer products X^T X. Captures how much evidence the model has seen in each feature direction.",
  "GraphSAGE": "Inductive GNN: each node aggregates features from sampled neighbors; works on unseen nodes (unlike transductive GCN).",
  "greedy decoding": "Decoding rule that picks the single highest-prob token at each step. Beam search reduces to greedy when beam_width=1.",
  "GroupNorm": "Group Normalization (CV). Splits channels into G groups and normalizes within each group; works with small batch sizes where BN fails.",
  "GRU": "Gated Recurrent Unit. Compact RNN cell with update + reset gates; cheaper than LSTM and the canonical memory updater inside TGN.",
  "GSU": "General Search Unit. TWIN V2's online retrieval module: walks the per-user cluster tree top-down using the candidate item as query to fetch a relevant subset.",
  "Gumbel-softmax": "Differentiable approximation to sampling from a categorical distribution; lets you backprop through discrete choices via reparameterization.",
  "hallucination (decoder)": "Decoder emits a token sequence (Semantic ID) that does not correspond to any real item in the catalog.",
  "Hamming distance": "Number of bit positions where two equal-length binary strings differ. Used as the comparison metric for pHash/SimHash signatures.",
  "HARKing": "Hypothesizing After Results are Known. Promoting a post-hoc finding to a primary metric — a major p-hacking pattern.",
  "HBM": "High-Bandwidth Memory. Stacked DRAM used on GPUs (H100, A100); the bandwidth bottleneck for memory-bound kernels.",
  "HE": "Homomorphic Encryption. Compute on ciphertexts without decrypting; allows two parties to compute a joint function without revealing inputs.",
  "heterophilic graph": "Graph where edges predominantly cross class labels (fraud-to-benign). Mules, structured-laundering rings, and review-fraud are heterophilic.",
  "hierarchical Bayes": "Full Bayes with multiple layers of priors (parameters drawn from hyper-priors); the un-collapsed version of Empirical Bayes.",
  "hierarchical code": "Code where earlier positions capture coarse semantics, later positions capture fine residuals. Structure that RQ-VAE produces.",
  "hit-rate": "Fraction of users whose top-K list contains at least one item they actually interacted with.",
  "HITL": "Human-In-The-Loop. ML system that escalates uncertain cases to a human reviewer before acting; combines model speed with human judgment.",
  "HNSW": "Hierarchical Navigable Small World. Graph-based ANN: layered proximity graph, greedy descent at each layer. RAM-heavy, log-time.",
  "holdout (experimentation)": "Permanent slice of users excluded from all experiments. Used to measure the cumulative effect of every shipped experiment against an untreated baseline.",
  "hop": "Graph distance in edges: hop-1 = direct neighbors, hop-2 = neighbors of neighbors.",
  "HSTU": "Hierarchical Sequential Transduction Units. Meta 2024 paper: sequence-modeling architecture for recommendation that scales past DLRM's plateau.",
  "human-in-the-loop": "Workflow where uncertain model predictions are sent to a human reviewer; reviewer decisions feed back as training labels.",
  "hyper-prior": "A prior over the parameters of another prior. Here: a Beta fit to the distribution of per-arm posterior means across incumbents, used as the prior for new arms.",
  "i.i.d.": "Independent and Identically Distributed. The assumption that samples are drawn from one common distribution.",
  "incumbent (bandit)": "An established arm that already has enough pull history for its posterior to be data-dominated rather than prior-dominated.",
  "incumbent eligibility": "Minimum pull count (or posterior-confidence threshold) an arm must reach before it's treated as a stable incumbent in the hyper-prior fit.",
  "inductive bias": "Built-in assumption a model makes about data structure (e.g. locality, recency); shapes what it learns easily.",
  "inference latency": "Time between when an input arrives and when the model returns a prediction; usually budgeted at the p99 tail.",
  "InfoNCE": "Contrastive loss: pulls positive (anchor, target) pairs together, pushes negatives apart, normalized over a batch of candidates.",
  "InstanceNorm": "Per-sample, per-channel normalization. Originally for style transfer; widely used as a generative-model normalizer.",
  "INT8": "8-bit integer quantization. Reduces memory + compute ~4× vs FP32 at small accuracy cost; common at inference.",
  "inter-rater agreement": "Statistical measure (Cohen's kappa, etc.) of how often two reviewers label the same item the same way; proxy for label quality.",
  "intercept (linear model)": "Constant offset b in y = wᵀx + b. By convention not penalized by L2 (regularizing it would bias predictions away from the mean of y).",
  "internal covariate shift": "Hypothesized shift in the distribution of intermediate activations as upstream layers update. BN was originally pitched as a fix; Santurkar et al. 2018 showed loss-landscape smoothing is closer to the real cause.",
  "intra-list dependencies": "How items in one ranked list interact (anti-redundancy, position effects). Pointwise scorers can't see them; list-generators can.",
  "intra-list diversity": "Spread of categories/topics within a single ranked list. High diversity = less redundancy; valuable for exploration.",
  "IPS": "Inverse Propensity Score. Same as IPW; widely used in counterfactual recsys evaluation.",
  "IPW": "Inverse Propensity Weighting. Reweights samples by 1/probability-of-being-observed; corrects for selection bias.",
  "Isotonic regression": "Monotonic, non-parametric calibration method. Fits a piecewise-constant nondecreasing mapping from score to probability. More flexible than Platt scaling when the score-probability relationship is non-sigmoidal.",
  "isotonic regression": "Post-hoc calibration: fit a free-form monotonic step function from score to probability. More flexible than Platt.",
  "iterative DPO": "DPO run in multiple rounds: collect on-policy preferences, run DPO, redeploy, repeat. Keeps preference data fresh as the policy evolves.",
  "IVF-PQ": "Inverted File + Product Quantization. ANN: cluster space into K cells, encode each vector as a PQ code; lookup = nearest centroids + PQ distances.",
  "Jaccard": "Jaccard similarity J(A,B) = |A∩B| / |A∪B|. Standard measure of set similarity; used over shingle sets to define text near-duplication.",
  "JODIE": "Kumar et al., KDD 2019. Dynamic-graph embedding model with separate user/item RNNs that project future embeddings; an early stateful temporal-graph baseline alongside TGN.",
  "K-means": "Clustering algorithm: pick K centroids, assign each point to nearest, recompute centroids; repeat until stable.",
  "K-RagRec": "Knowledge-RAG Recommender. Uses retrieval-augmented generation: an LLM is grounded on retrieved item snippets to produce recommendations.",
  "KL divergence": "Asymmetric measure of distance between two distributions. Used as a regularizer in VAEs to keep latents near a prior.",
  "knowledge distillation": "Train a small 'student' model to match a large 'teacher' model's outputs (logits or features), often with temperature softening.",
  "KV-cache": "Cached Key/Value tensors from prior transformer steps; lets autoregressive decoding skip recomputing past attention.",
  "KYC": "Know-Your-Customer. Customer onboarding verification: document checks, face match, sanctions screening.",
  "L2 ball": "Geometric region of an L2 budget Σw²≤t. Smooth, round, no axis-aligned corners — the root cause of L2's smooth-shrinkage behavior.",
  "label smoothing": "Replace hard 0/1 targets with (ε, 1-ε); discourages over-confidence and helps calibration of softmax outputs.",
  "labeled-group token": "GAGA's input unit: one transformer token per (hop, class) bucket aggregating that bucket's neighbor features (fraud@h1, benign@h1, unlabeled@h1, ...).",
  "Lasso": "The L1 penalty α·Σ|w|. Produces sparse coefficients because its diamond-shaped constraint region has corners on the axes.",
  "latent space": "Vector space the encoder maps inputs into. Geometry here defines what 'similar' means downstream.",
  "LayerNorm": "Per-token feature-vector normalization (subtract mean, divide by std, then learned affine). Stabilizes deep transformer training.",
  "Lazy Decoder-Only": "OneRec V2 design: decoder cross-attends to user context only at chosen layers/steps; skipped steps reuse cached summaries. Cuts compute ~94%.",
  "LDAM": "Label-Distribution-Aware Margin loss. Adds a class-dependent margin to logits; pushes the boundary away from rare-class points.",
  "leave-last-out": "Eval protocol: for each user, hold out their most recent interaction as the test target, train on the rest.",
  "length normalization": "Divide a sequence's cumulative log-prob by a function of its length so beam search doesn't systematically prefer short outputs. Wu et al. use ((5+L)/6)^α.",
  "length penalty": "The α exponent in length normalization ((5+L)/6)^α. α=0.6 (GNMT default) balances brevity-bias vs over-long outputs in translation.",
  "lifelong sequence": "User behavior history spanning 10^4-10^6 events (months-to-years), too long for standard transformer attention; motivates retrieve-then-attend architectures.",
  "LightGBM": "Microsoft's gradient-boosted decision tree library; fast histogram-based splits and leaf-wise growth. Standard tabular fraud baseline.",
  "linear attention": "Attention that replaces softmax with a kernel feature map so cost is O(n) in sequence length instead of O(n²).",
  "linear LR scaling rule": "Goyal et al. 2017 rule: when you scale effective batch by k, scale base LR by k to keep convergence trajectory similar. Plus a linear warmup over the first ~5 epochs.",
  "link prediction": "Task of predicting whether a (u, v) edge will occur (often at a future time t). Canonical evaluation task for dynamic-graph models; scored with MRR over corrupted negatives.",
  "LinUCB": "Linear Upper Confidence Bound. Contextual bandit assuming linear reward; picks the action with the highest (mean + confidence-bound) estimate.",
  "Lipschitz": "Bounded-derivative property: f is L-Lipschitz if |f(x)-f(y)| <= L*|x-y|. Smaller Lipschitz constant on the gradient means the loss landscape doesn't curve sharply.",
  "list-wise": "Loss or metric defined over an entire ranked list (e.g., NDCG, mean watch-time per list) rather than per-item pairs.",
  "listwise loss": "Loss computed over the whole ranked list at once (e.g. NDCG-based) instead of one item at a time. Captures list-level objectives.",
  "LLM-rec": "Umbrella term for recsys approaches that wrap or distill an LLM as the scorer/generator rather than using a classic ID-embedding model.",
  "Lloyd's algorithm": "Standard iterative procedure for k-means: assign points to nearest centroid, update centroids to cluster mean, repeat until stable.",
  "log-prob": "Logarithm of a probability. Sums during sequence scoring (since log(p1·p2·...) = log p1 + log p2 + ...), avoiding the underflow of multiplying many small probabilities.",
  "log-softmax": "F.log_softmax(x). Combines softmax + log in one numerically-stable op; output is log-probabilities (≤ 0). Standard input to beam-search ranking.",
  "LONGER": "ByteDance long-sequence transformer for recsys (Sun et al. RecSys 2025); compresses whole sequence via global-token + token-merge rather than retrieving a subset.",
  "LongER": "ByteDance long-sequence transformer for recsys; memory-efficient attention focused on long user histories.",
  "LoRA": "Low-Rank Adaptation. Fine-tune a model by adding small low-rank weight deltas (A·B) instead of updating full weight matrices.",
  "loss": "The scalar tensor produced by the loss function — usually F.cross_entropy(logits, y). Calling .backward() on it triggers autograd to populate .grad on every leaf parameter.",
  "loss contour": "Set of weights at which the loss takes a constant value; in 2D these are concentric ellipses around the OLS solution.",
  "Loss scaling": "A power-of-two multiplier (typically 2^15 = 32768 initially) applied to the loss before .backward(). Shifts gradient magnitudes up into fp16's representable range; .unscale_() reverses it before the optimizer sees them.",
  "LSH": "Locality-Sensitive Hashing. Hash family where similar vectors collide with high probability; used for cheap approximate nearest neighbor.",
  "LSH banding": "LSH technique that partitions a signature into b bands of r rows; two items become candidates if they agree on at least one full band. Collision probability is P=1-(1-s^r)^b — the S-curve.",
  "Mamba": "State-space model with selective scan; processes sequences in linear time (O(L)) versus transformer's quadratic (O(L²)).",
  "MAML": "Model-Agnostic Meta-Learning. Trains a model whose parameters can be fine-tuned to a new task in a few gradient steps.",
  "MAP estimation": "Maximum a Posteriori estimation. Pick the parameters that maximize posterior probability under a chosen prior.",
  "MC dropout": "Monte-Carlo Dropout. Leave dropout on at inference and sample M forward passes; approximates a Bayesian posterior over weights.",
  "MCC": "Merchant Category Code. 4-digit code (e.g., 5411 = grocery) categorizing what kind of merchant accepted a transaction.",
  "MDE": "Minimum Detectable Effect. Smallest true effect a fixed-n experiment can detect at given alpha and power; scales like sqrt(2*sigma^2 / n).",
  "membership inference": "Privacy attack that guesses whether a specific record was in the training set by querying the trained model.",
  "metadata": "Side information about each item (genre, brand, category, author tags) that lives outside the interaction sequence and is supplied by the catalog.",
  "method-of-moments": "Fit a distribution's parameters by matching its theoretical moments (mean, variance) to the empirical sample moments. Closed-form, no optimization.",
  "micro-batch": "The unit of data processed in one forward + backward pass on one GPU. Sized to fit VRAM, not to be statistically optimal. Multiple micro-batches accumulate gradients into one effective batch.",
  "millions-of-item softmax": "Computing softmax over the entire item catalog (millions of classes). Memory- and compute-prohibitive; usually approximated.",
  "MinHash": "Hash-based estimator of Jaccard similarity over set-valued items. Build a signature of k random permutations of shingles; probability two signatures agree on a position equals the Jaccard similarity of the underlying sets.",
  "MiniLM": "Small distilled transformer (~22M params, 6 layers) producing sentence embeddings at a fraction of T5's compute.",
  "mirror serving": "Both old and new models score every request; the old one still serves users. Used to fit new calibration heads.",
  "mixed precision": "Mixed-precision training: forward + loss in fp16, weights and optimizer state in fp32, dynamic loss-scaling to keep fp16 gradients in representable range. Standard on Ampere+ GPUs.",
  "MMoE": "Multi-gate Mixture-of-Experts. Each task has its own gate over a shared pool of experts; cheaper than fully task-specific networks.",
  "MMR": "Maximal Marginal Relevance. Greedy reranker: each step picks the candidate maximizing (relevance − λ × similarity to already-chosen).",
  "MNAR": "Missing Not At Random. The probability that a value is missing depends on the value itself (e.g., users only rate items they chose to see).",
  "MobileNet": "Lightweight convolutional neural network designed for fast image inference on mobile/edge devices; ~10ms latency typical.",
  "MOCB": "Multi-Objective Contextual Bandit. Bandit framework handling K objectives with constraint floors via dual ascent on Lagrange multipliers.",
  "mode collapse": "When a generative model concentrates probability on a few outputs and stops covering the long tail of valid choices.",
  "model parameters": "The set of weights/biases that the optimizer updates. .grad is allocated per-parameter; for a 7B model that's ~7B float32 grads = 28GB just for .grad storage.",
  "model.no_sync()": "DDP context manager that disables the gradient-sync hook for the wrapped backward pass. Grads accumulate locally; the final un-wrapped backward triggers one all-reduce over the summed grads.",
  "modulating factor": "The (1 - p_t)^γ multiplier in focal loss. Scales each sample's loss by how confident the model is about the right answer.",
  "MoE": "Mixture-of-Experts. Multiple expert subnetworks + a gate that routes each input to one or few experts. Scales params without paying full FLOPs.",
  "Money-mule": "Account that knowingly or unknowingly relays funds for fraudsters. Mules connect fraud accounts to benign accounts — the textbook heterophilic pattern.",
  "money-mule fraud": "Fraud typology where mule accounts (often benign or coerced) relay funds from victims to fraudsters; produces heterophilic edge patterns.",
  "MovieLens": "Public movie-rating dataset (1M-25M ratings). Most-cited public recsys benchmark; small relative to industry data.",
  "MPC": "Multi-Party Computation. Cryptographic protocol where parties jointly compute a function over private inputs, revealing only the output.",
  "MPNN": "Message-Passing Neural Network. Generic GNN family where each node aggregates messages from neighbors layer by layer; assumes homophily by default.",
  "MRR": "Mean Reciprocal Rank. 1 / position of first relevant item, averaged across queries. Sensitive to top-1 only.",
  "MTGR": "Meituan Generative Ranking. Decoder-only transformer that emits a ranked list of items autoregressively; captures intra-list dependencies natively.",
  "multi-head self-attention": "Transformer layer that runs H parallel attention heads and concatenates them; each head can specialise (e.g. one tracks hop-1 fraud counts).",
  "multicollinear": "Two or more input features are highly correlated. Design matrix becomes near-singular and OLS estimates explode in magnitude with opposite signs.",
  "mutex layer": "Mutually-exclusive experiment layer. Co-occurring experiments on the same surface are placed in one layer and a user is assigned at most one variant per layer.",
  "NDCG": "Normalized Discounted Cumulative Gain. Ranking metric that rewards relevant items appearing near the top of the list.",
  "negative sampling": "Train the model to score observed (positive) items above a sub-sample of random non-observed (negative) items; avoids full softmax.",
  "negative transfer": "When training on multiple tasks hurts each task's accuracy compared to training them separately. The shared params get pulled in conflicting directions.",
  "NeuralUCB": "Neural Upper Confidence Bound. Replaces LinUCB's linear reward model with a neural net; bonus comes from gradient-feature covariance.",
  "no corners (L2 ball)": "Points on a constraint surface where one of the coordinates is zero. L1's diamond has corners on the axes; L2's ball has none.",
  "non-IID": "Non-Independent-and-Identically-Distributed. Clients in federated learning have different data distributions; breaks IID assumptions FedAvg relies on.",
  "non-stationarity": "Reward distribution that drifts over time (seasonality, news cycle, taste change); violates the i.i.d. assumption.",
  "normal-equation matrix": "Matrix XᵀX appearing in the OLS closed form. Its eigen-spectrum decides whether OLS is well-conditioned; multicollinear features make it near-singular.",
  "nucleus sampling": "Top-p decoding: sample the next token from the smallest set whose cumulative probability exceeds p. Adds controlled diversity.",
  "numerical": "Loss scaling, division by accum_steps, fp16 underflow, gradient norm explosion. Decisions about WHAT NUMBER gets fed to autograd.",
  "O'Brien-Fleming boundary": "Sequential-testing alpha-spending function that front-loads conservatism; early peeks barely consume alpha, almost all is spent near the planned end.",
  "off-policy eval": "Estimating a target policy's value using data logged under a different (behavior) policy. Needs IPS or doubly-robust correction.",
  "off-policy evaluation": "Evaluating one policy from logs collected by a different policy; requires support overlap to be unbiased.",
  "offline replay": "Offline counterfactual evaluation: re-score historical traffic logs under the candidate policy to estimate online lift before A/B.",
  "offline user-tower precompute": "Pre-run the encoder on a user's history offline so serving only runs the decoder. Standard latency trick for encoder-decoder recsys.",
  "OLS": "Ordinary Least Squares. Minimize squared residuals with no penalty; closed form is (XᵀX)⁻¹Xᵀy, which fails when XᵀX is singular.",
  "on-policy": "Training data sampled from the current policy. DPO/PPO benefit because preferences reflect actions the deployed model would actually take.",
  "One Metric Decision": "Discipline of locking the primary metric in the spec before unblinding. Secondaries are diagnostic, not decision-grade.",
  "OneRec": "Unified retrieve+rank model. Single backbone serves both retrieval and ranking via task-template prompts; eliminates retrieval-ranker train/serve skew.",
  "online learning": "Updates the model continuously as new data arrives, rather than retraining on the full historical batch.",
  "ONNX": "Open Neural Network Exchange. Framework-neutral graph format for shipping models between training and inference runtimes.",
  "operational debt": "Accrued maintenance cost from years of multi-team pipelines: model staleness, index drift, monitor sprawl, hand-tuned reweighting per stage.",
  "over-smoothing": "GNN/transformer failure where stacking too many layers makes every node/token representation converge toward the global mean; per-layer mixing erases distinctions.",
  "oversampling": "Sampling strategy that draws minority-class examples more often per epoch to balance per-batch class counts. Cheap alternative to focal loss.",
  "P(click)": "Predicted probability that a user clicks an item; the canonical calibrated output of a CTR model used in ad auctions.",
  "P5": "Pretrain-Personalize-Prompt-Predict-Plan. Early generative recsys paper that frames all recsys tasks as text-to-text via a single seq2seq model.",
  "p99 latency": "The 99th percentile of response times. 1% of requests are slower; tail latency, often dominates SLA pain.",
  "pairwise scoring": "Score (user, item_i) vs (user, item_j) pairs; loss rewards correct ordering between pairs. BPR is the canonical example.",
  "partial pooling": "Hierarchical-Bayes sharing of strength across groups: each group's estimate is shrunk toward the global mean, weighted by its sample size.",
  "patching": "ViT-style trick: pack P consecutive tokens into one patch-token via a learned linear projection on their concatenation; cuts attention cost from O(N^2) to O((N/P)^2).",
  "PC-GNN": "Pick-and-Choose GNN (Liu et al., WWW 2021). Rebalances class frequencies at the sampling layer; orthogonal to homophily/heterophily.",
  "PEFT": "Parameter-Efficient Fine-Tuning. Umbrella for techniques (LoRA, adapters, prefix-tuning) that fine-tune small fraction of params.",
  "penalty (loss term)": "Term added to the loss whose role is to discourage certain solutions (here: large weights).",
  "per-category priors": "Hyper-priors fitted per category from category-local incumbents; addresses global-prior bias when categories differ systematically.",
  "perceptual hash": "Hash that's similar for visually similar images (unlike cryptographic hash which is brittle). Used to detect known-bad reposts despite minor edits.",
  "pHash": "Perceptual hash for images. Computed via 32x32 DCT, lowpass-filter, threshold each coefficient at its median to produce a 64-bit signature. Two images are near-duplicate when Hamming distance < ~8 bits.",
  "PII": "Personally Identifiable Information. Data tied to a specific person (name, label, account id); cross-user use is regulated by GDPR/CCPA.",
  "Platt scaling": "Post-hoc calibration: fit a sigmoid mapping from raw model score to calibrated probability. Simple, monotonic.",
  "PLE": "Progressive Layered Extraction. Multi-task architecture with shared and task-specific experts at every layer; mitigates negative transfer.",
  "PM (product manager)": "Product Manager. Non-technical stakeholder; pitches must hinge on business value, not algorithmic novelty.",
  "Pocock boundary": "Sequential-testing alpha-spending function that spreads alpha roughly uniformly across peeks; useful when early stopping matters.",
  "pointwise scoring": "Score each (user, item) independently; ignores how items interact in the ranked list. Classic DLRM/HSTU framing.",
  "policy lane": "A category of moderation policy with its own threshold, SLA, and review pool — e.g., self-harm vs spam vs intellectual-property.",
  "policy threshold": "Per-policy confidence cutoff that decides auto-action vs escalation; tuned separately because each policy has different cost-of-error.",
  "popularity bias": "Recommenders over-recommend already-popular items because they have more training signal, starving the long tail.",
  "population mismatch": "When two groups (e.g., incumbents and new arms) come from systematically different reward distributions, breaking i.i.d. assumptions.",
  "position bias": "Users click higher-ranked items more often regardless of relevance. Must be corrected to avoid feedback loops.",
  "positional encoding": "Vector added to each token to encode its position so attention (which is order-agnostic) can use order. In GAGA, position = hop distance.",
  "posterior": "The probability distribution over parameters after combining the prior with observed data; expresses remaining uncertainty.",
  "posterior (bandit)": "Updated belief distribution over an arm's reward parameter after combining prior with observed pulls.",
  "posterior collapse": "VAE failure: encoder ignores the latent, decoder reconstructs from its prior alone, latents stop carrying info.",
  "PPO": "Proximal Policy Optimization. Reinforcement-learning algorithm; takes small policy-update steps to avoid catastrophic regression.",
  "PQ": "Product Quantization. Split a vector into K equal subspaces and quantize each independently; used for compact ANN indexes (Faiss).",
  "preference-AUC": "AUC computed over (preferred, dispreferred) pairs: probability the model scores the preferred item higher. Standard DPO offline metric.",
  "prefix conditioning": "At decode step t, generate next item conditioned on the items already emitted (the prefix). Lets the model see the partial list.",
  "prefix similarity": "Two Semantic IDs are similar to the extent their leading codes match. The core property RQ-VAE gives downstream consumers.",
  "pretraining": "A first training phase on auxiliary objectives over the same (or related) data, before the supervised fine-tune stage. Builds general-purpose representations the downstream head can reuse.",
  "prior (Bayesian)": "Prior probability distribution over parameters expressing beliefs before seeing data; combined with the likelihood gives the posterior.",
  "prompt template": "Fixed textual scaffold with slots (user history, candidate item) filled at runtime. Lets one LLM serve many tasks via task prefixes.",
  "propensity score": "Probability that a unit received the treatment (or that an item was shown). Used in IPW corrections.",
  "ProtoNet": "Prototypical Networks. Few-shot classifier: build a centroid per class from support examples, classify a query by nearest centroid.",
  "PTQ": "Post-Training Quantization. Quantize weights/activations of an already-trained model without retraining.",
  "push notification": "One-item-per-user message surface (e.g. mobile alerts). Single-slot ranking; MTGR's autoregressive prefix is empty here.",
  "QAT": "Quantization-Aware Training. Insert fake-quant ops during training so the model learns to be robust to inference-time quantization noise.",
  "rank-1 update": "An incremental update that adds the outer product xx^T to a matrix; cost O(d^2) instead of recomputing from scratch.",
  "ranked list": "Ordered list of items shown to the user. Order matters because users read top-down and clicks concentrate at the top.",
  "recall@K": "Fraction of relevant items captured in the top-K retrieved list.",
  "RecLLM": "Generative recsys that turns an LLM into a conversational recommender; user history and item descriptions are fed in as prompt text.",
  "reconstruction loss": "Distance (usually MSE) between encoder input and decoder output. Drives the autoencoder to preserve information.",

  "retrain": "Refresh model weights on new data; usually periodic (weekly/daily) for systems where labels arrive from human reviewers.",
  "retrieve-rank": "Two-stage recsys pipeline: a cheap retrieval narrows millions of items to a shortlist, then a heavier ranker reorders that shortlist.",
  "reward hacking": "Policy exploits flaws in the reward model to score high without doing the intended task. Symptom of an under-constrained optimizer.",

  "RLHF": "Reinforcement Learning from Human Feedback. Train a reward model from human preferences, then optimize policy against it (usually with PPO).",
  "RMSNorm": "Root-Mean-Square Norm. LayerNorm variant that drops the mean-subtract; faster and competitive in quality. Used in LLaMA-style transformers.",
  "RNN": "Recurrent Neural Network. Sequence model that maintains a hidden state updated by each input; GRU/LSTM are gated variants. Used inside TGN as the per-node memory updater.",
  "robust loss function": "Loss that bounds the influence of any single outlier (Huber, trimmed mean, heavy-tailed log-likelihood) on the estimate.",
  "rotary embeddings": "RoPE. Encode position by rotating Q/K vectors by angle proportional to position; replaces additive position embeddings.",
  "RQ-VAE": "Residual-Quantized VAE. Stacks K codebooks; each level quantizes the residual error from the previous level. Produces hierarchical semantic IDs.",
  "running statistics (BN)": "The running_mean and running_var buffers maintained as EMAs of per-batch statistics during training; used unchanged at eval.",
  "sampled softmax": "Softmax over a sub-sampled candidate pool (e.g., 1000 items) instead of millions; trades exact normalization for speed.",

  "Shapley value": "Game-theoretic feature attribution: average marginal contribution of a feature across all subsets; used for per-feature credit.",
  "Sherman-Morrison drift": "Cumulative floating-point error in incrementally maintained A^-1; periodic full re-inversion is required after millions of updates.",
  "Sherman-Morrison identity": "A linear-algebra identity that updates an inverse matrix after a rank-1 perturbation in O(d^2) instead of re-inverting in O(d^3).",
  "Shingle": "A contiguous run of k tokens (e.g., k=5 words). Documents are represented as sets of shingles; near-duplicates share most shingles even with small edits.",
  "shrinkage": "Pulling estimated coefficients toward a baseline (usually zero), trading a little bias for a lot of variance reduction.",
  "SIM": "Search-based Interest Model (Pi et al. 2020). Uses HARD categorical hashing (shop_id, category_id) to retrieve a candidate-relevant subset of lifelong history. TWIN V2's predecessor.",

  "T-Finance": "Public financial fraud graph benchmark of transfer transactions; near-homophilic relative to Amazon, so GAGA's heterophily premise fits less well.",
  "TabBERT": "BERT-style MLM pretraining on tabular transaction sequences (mask cells, predict). Used for fraud sequence modeling.",

  "tensor": "Multi-axis array stored in row-major or channels-first order. For images, shape (N, C, H, W): batch, channels, height, width.",

  "TGAT": "Temporal Graph Attention (Xu et al., ICLR 2020). Inductive temporal-graph model; runs attention over each endpoint's recent neighbors with a learned Fourier time-encoding. No per-node memory.",
  "TGB": "Temporal Graph Benchmark (Huang et al., NeurIPS 2023). Standard suite of dynamic-graph link-prediction and node-property tasks with leakage-safe temporal splits; DyGFormer's 5-15% MRR lift is measured here.",
  "TGN": "Temporal Graph Network. Each node carries an RNN-style memory updated as events arrive; supports temporal attention over neighbor history.",
  "Thompson sampling": "Bandit algorithm: maintain a posterior over reward parameters, sample from it, act greedily on the sample.",
  "throttle": "Slow or pause processing of low-priority work to free capacity for high-priority work — used during surge to protect SLA on critical lanes.",
  "TIGER": "Transformer Index for GEnerative Recommenders. Google 2023 paper: emits items by generating semantic-ID code tuples instead of softmaxing over millions of items.",
  "top-k": "Return the K highest-scoring items from a ranked list.",
  "top-k sampling": "Sampling decoder: at each step, sample from the top-K most likely tokens; trades determinism for output diversity.",

  "train vs eval mode (PyTorch)": "The .train() vs .eval() flag on a module. Controls whether BN updates running stats and uses batch stats vs frozen running stats, and whether dropout is active.",
  "transducer": "Sequence model that maps an input sequence to per-position outputs (one output per input position). HSTU is a transducer.",
  "transformer": "Sequence model built from stacked self-attention + feed-forward blocks. Order-agnostic without positional encodings; the default architecture for sequences.",
  "tree-walk": "Greedy top-down traversal of a cluster tree: at each level, pick the child whose centroid is most similar to the query. O(depth x branching) per retrieval.",
  "trie": "Prefix tree. Each path from root to leaf spells a valid sequence; used to enforce valid Semantic-ID decoding.",
  "trim quantile": "Robust statistic computed after discarding the top and bottom q% of samples; bounds influence of outliers on a fit.",
  "TWIN V2": "Two-stage Interest Network V2 (Si et al. CIKM 2024). Offline hierarchical clustering + online GSU tree-walk + ESU target-attention for lifelong-sequence CTR at Kuaishou.",
  "twin-tower": "Synonym for two-tower: separate user and item encoder towers whose outputs are dot-producted to score (user, item) pairs.",
  "two-tower": "Recsys architecture: separate user-encoder tower and item-encoder tower; dot-product their outputs to score (user, item) pairs.",
  "typology": "In AML, the named pattern of laundering (e.g., trade-based, layering, smurfing). Detectors are usually typology-anchored.",
  "UCB": "Upper Confidence Bound. Bandit rule that picks the action with the highest (mean + uncertainty) estimate; explicit exploration.",
  "UCB1": "The classical context-free UCB algorithm; picks the arm maximizing empirical mean + sqrt(2 log t / n_a).",
  "underflow": "Floating-point result smaller than the smallest representable value, rounded to 0. Multiplying many probabilities <1 underflows fp32 quickly; log space avoids it.",
  "uniform prior": "Flat prior assigning equal density to every parameter value; Beta(1,1) is the canonical example for CTR.",
  "Union-Find": "Data structure that maintains a partition of items into disjoint sets under merge operations. Near-O(alpha(n)) per op via path compression and union-by-rank. Used to build near-duplicate clusters from a stream of verified pairs.",
  "uplift modeling": "Estimates conditional treatment effect (CATE) — the per-user change in outcome from receiving a treatment.",
  "ViT": "Vision Transformer. Applies transformer attention to image patches; more accurate than CNNs but heavier (~80ms inference typical).",
  "VLM": "Vision-Language Model. Jointly trained on images and text; can describe images, answer questions about them, or embed both modalities.",

  "WWW 2023": "The Web Conference 2023 — the top venue for web-scale ML and graph-mining papers; GAGA was published there.",
  "XOR": "Exclusive-or. The canonical example of a function no linear model can represent.",

  "α-balancing": "Per-class scalar weight α in focal loss; multiplies the per-sample modulating factor (1-p_t)^γ. Equivalent in spirit to class-weighted BCE.",
  "β temperature": "DPO's KL-strength hyperparameter. Low β → policy can drift from SFT (reward-hack risk); high β → policy stays near SFT (no learning).",
  "ε (BN)": "Small constant (~1e-5) added inside BN's denominator √(σ² + ε). Prevents divide-by-zero and bounds the gradient w.r.t. variance."
}

  <script>

  if (!window.React) {

    return;

  const h = React.createElement;

  // Lazy-load a CDN script; cache the load Promise so repeats are cheap.
  const _scriptCache = new Map();
  function _loadScript(src) {
    if (_scriptCache.has(src)) return _scriptCache.get(src);
    const p = new Promise((resolve, reject) => {
      const existing = document.querySelector(`script[data-vis-cdn="${src}"]`);
      if (existing) return existing.addEventListener("load", resolve);
      const s = document.createElement("script");
      s.src = src; s.async = false; s.dataset.visCdn = src;
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    _scriptCache.set(src, p);
    return p;
  }

  let _katexCssInjected = false;
  function _ensureKatexCss() {
    if (_katexCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css";
    document.head.appendChild(link);
    _katexCssInjected = true;
  }

  let _hljsCssInjected = false;
  function _ensureHljsCss() {
    if (_hljsCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css";
    document.head.appendChild(link);
    _hljsCssInjected = true;

    const ref = React.useRef(null);

    React.useEffect(() => {
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js")
        .then(() => {

              theme: "default",
              securityLevel: "loose",

          // Mermaid sizes foreignObjects to the font em-box, which does NOT include
          // descender depth. Grow each foreignObject by 12px (6 top + 6 bottom) so
          // descenders render fully. Also grow rectangle node fills to match so the
          // colored box doesn't show a thin sliver above/below the text.
          const svgEl = ref.current.querySelector("svg");
          if (!svgEl) return;
          svgEl.querySelectorAll("foreignObject").forEach((fo) => {
            const h = parseFloat(fo.getAttribute("height") || "0");
            const y = parseFloat(fo.getAttribute("y") || "0");
            fo.setAttribute("height", String(h + 12));
            fo.setAttribute("y", String(y - 6));

          svgEl.querySelectorAll("g.node > rect").forEach((rect) => {
            const h = parseFloat(rect.getAttribute("height") || "0");
            const y = parseFloat(rect.getAttribute("y") || "0");
            rect.setAttribute("height", String(h + 12));
            rect.setAttribute("y", String(y - 6));

          // top and bottom vertices outward from the centroid by 6px each.
          svgEl.querySelectorAll("g.node > polygon").forEach((poly) => {
            const pts = (poly.getAttribute("points") || "").trim().split(/\s+/)
              .map((p) => p.split(",").map(parseFloat));
            if (pts.length < 3 || pts.some((p) => p.length < 2 || p.some(isNaN))) return;
            const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;
