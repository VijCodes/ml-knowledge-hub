      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },

const GA_CODE = [
  "def train_step_with_accumulation(model, batches, accum_steps, optimizer, scaler):",
  "    \"\"\"One optimizer step over `accum_steps` micro-batches under AMP.",
  "",
  "    Args:",
  "        model:        nn.Module (possibly DDP-wrapped).",
  "        batches:      iterable of `accum_steps` micro-batches; each fits on one GPU.",
  "        accum_steps:  effective_batch / micro_batch  (e.g. 256/32 = 8).",
  "        optimizer:    e.g. AdamW over model.parameters().",
  "        scaler:       torch.cuda.amp.GradScaler — manages fp16 loss-scale.",
  "    Returns:",
  "        running_loss (float) — sum of per-micro-batch losses (already divided).",
  "    \"\"\"",
  "    running_loss = 0.0",
  "",
  "    # NOTE: zero_grad sits OUTSIDE the loop. .grad must accumulate across the",
  "    # `accum_steps` micro-batches; zeroing inside would discard prior steps.",
  "    optimizer.zero_grad(set_to_none=True)",
  "",
  "    for i, micro_batch in enumerate(batches):",
  "        is_last = (i == accum_steps - 1)",
  "",
  "        # 1) Skip DDP all-reduce on all-but-last micro-batch. Wraps the WHOLE",
  "        #    forward+backward; the gradient sync hook only fires on .backward().",
  "        sync_ctx = contextlib.nullcontext() if is_last else model.no_sync()",
  "        with sync_ctx:",
  "            # 2) AMP autocast covers forward + loss ONLY. Backward stays under",
  "            #    autograd's control; do NOT wrap backward in autocast.",
  "            with torch.cuda.amp.autocast(dtype=torch.float16):",
  "                logits = model(micro_batch['x'])",
  "                loss   = F.cross_entropy(logits, micro_batch['y'])",
  "",
  "            # 3) Divide loss BEFORE backward so per-micro-batch contributions",
  "            #    AVERAGE into .grad instead of summing.",
  "            loss = __1__",
  "            running_loss += loss.item()",
  "",
  "            # 4) AMP-scaled backward — multiplies loss by 2^k before .backward()",
  "            #    so fp16 grads do not underflow. Accumulates into .grad.",
  "            __2__",
  "",
  "    # After all micro-batches: unscale -> clip -> step -> update -> zero.",
  "    # 5) Unscale BEFORE clipping. Otherwise you clip 2^k-scaled grads (no-op).",
  "    __3__",
  "",
  "    torch.nn.utils.clip_grad_norm_(model.parameters(), max_norm=1.0)",
  "",
  "    # 6) scaler.step(optimizer) inspects .grad for inf/nan (skip step if so),",
  "    #    then calls optimizer.step() internally.",
  "    __4__",
  "",
  "    # 7) Update the loss scale (grow if no overflow, halve if overflow).",
  "    __5__",
  "",
  "    # 8) Zero grads for the next accumulation cycle.",
  "    __6__",
  "",
  "    return running_loss",
];

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Coding · Senior MLE"
      title="Implement train_step_with_accumulation() — effective batch 256 on one A100"
      subtitle="Fine-tune wants batch 256 for stable convergence, but only 32 fits in VRAM. Accumulate 8 micro-batches under AMP + DDP, then step once."
      byline={[
        {label:"Question type", value:"ML Coding"},
        {label:"Production target", value:"7B model fine-tune, A100 40GB, fp16 AMP, DDP across 8 GPUs"},
        {label:"Difficulty", value:"Hard"},
      ]}/>

    <VIS.TLDR>
      Gradient accumulation simulates a larger batch by running multiple forward/backward passes and <strong>summing gradients into <code>.grad</code></strong> before a single optimizer step. The four invariants: <strong>(a)</strong> divide <VIS.Term def="The scalar tensor produced by the loss function — usually F.cross_entropy(logits, y). Calling .backward() on it triggers autograd to populate .grad on every leaf parameter.">loss</VIS.Term> by <code>accum_steps</code> <em>before</em> <VIS.Term def="The reverse-mode autograd pass that walks the computational graph from the loss back to every parameter, accumulating into param.grad. Each call ADDS to .grad; it does not overwrite.">backward</VIS.Term> (or you sum gradients instead of averaging — effective LR is 8× higher than configured), <strong>(b)</strong> <code>optimizer.step()</code> + <VIS.Term def="The PyTorch idiom for clearing accumulated gradients. With set_to_none=True it frees the .grad tensors entirely so the next backward writes fresh memory — faster than zeroing in place.">zero_grad()</VIS.Term> ONLY after the last micro-batch, <strong>(c)</strong> with <VIS.Term def="Automatic Mixed Precision. PyTorch context manager (torch.cuda.amp.autocast) runs ops in fp16 where safe and fp32 where needed. Paired with GradScaler to prevent fp16 gradient underflow.">AMP</VIS.Term> you must <VIS.Term def="GradScaler method that divides every parameter's .grad in place by the current loss-scale, returning grads to their true magnitudes. Required before any inspection (clipping, manual logging) of grads.">scaler.unscale_</VIS.Term> before <VIS.Term def="torch.nn.utils.clip_grad_norm_. Rescales every parameter's .grad so the global L2 norm across all params is ≤ max_norm. Standard transformer-training stabilizer.">clip_grad_norm_</VIS.Term> (clipping scaled-by-65536 grads truncates nothing), <strong>(d)</strong> under <VIS.Term def="DistributedDataParallel. PyTorch's data-parallel wrapper: replicates the model on each GPU, synchronizes gradients via NCCL all-reduce at every .backward() call.">DDP</VIS.Term>, wrap all-but-the-last micro-batch in <VIS.Term def="DDP context manager that disables the gradient-sync hook for the wrapped backward pass. Grads accumulate locally; the final un-wrapped backward triggers one all-reduce over the summed grads.">model.no_sync()</VIS.Term> so you pay all-reduce once per optimizer step, not 8 times.
    </VIS.TLDR>

    <VIS.Section id="sec-setup" title="The production scenario">
      <p>
        You're fine-tuning a <strong>7B-param decoder on 8× A100 40GB</strong> under <VIS.Term def="Mixed-precision training: forward + loss in fp16, weights and optimizer state in fp32, dynamic loss-scaling to keep fp16 gradients in representable range. Standard on Ampere+ GPUs.">mixed precision</VIS.Term> with the <VIS.Term def="Adam optimizer with decoupled weight decay; default optimizer for transformer training.">AdamW</VIS.Term> optimizer. Activations + grads + optimizer state for the target batch (256) would need ~62GB per GPU; only batch 32 fits per GPU. The convergence ablation says effective batch below 64 hurts test loss. Solution: <strong>micro-batch 32 × accum 8 × 8 GPUs = effective batch 2048</strong>; or micro-batch 32 × accum 8 × 1 GPU = effective 256 on the single-node fallback. The same recipe ports cleanly to <VIS.Term def="Fully Sharded Data Parallel. PyTorch's ZeRO-style sharded-state DDP variant: shards parameters, gradients, and optimizer state across ranks. Accumulation works identically — the sharding is transparent below the .grad layer.">FSDP</VIS.Term> with no accumulation-layer changes.
      </p>
      <p>
        The <VIS.Term def="The unit of data processed in one forward + backward pass on one GPU. Sized to fit VRAM, not to be statistically optimal. Multiple micro-batches accumulate gradients into one effective batch.">micro-batch</VIS.Term> is the unit that fits in VRAM. The <VIS.Term def="The batch size that the optimizer 'sees' — micro_batch × accum_steps × num_gpus. Determines the noise floor of SGD and the right setting for LR / weight-decay / warmup.">effective batch</VIS.Term> is what the optimizer sees, and it controls convergence dynamics. Gradient accumulation is the bridge: you trade <em>throughput</em> (8× the forward passes per step) for <em>statistical batch size</em>.
      </p>
      <p>
        The most-shipped bugs cluster in five axes. <strong>Numerical:</strong> forgetting to divide by <code>accum_steps</code> (gradients sum, not average → 8× effective LR). <strong>API:</strong> calling <code>optimizer.step()</code> or <code>zero_grad()</code> inside the loop. <strong>Distributed:</strong> running all-reduce on every micro-batch (8× the comm; 30%+ throughput regression at 8 GPUs). <strong>AMP:</strong> clipping scaled grads, or wrapping <code>.backward()</code> in <code>autocast</code>. <strong>Gotchas:</strong> <VIS.Term def="BatchNorm's per-batch statistics. Each forward computes mean/var over the local micro-batch; gradient accumulation does NOT merge these across micro-batches. Effective BN batch = micro-batch, not effective batch.">BN running stats</VIS.Term> only see the micro-batch, and the <VIS.Term def="Goyal et al. 2017 rule: when you scale effective batch by k, scale base LR by k to keep convergence trajectory similar. Plus a linear warmup over the first ~5 epochs.">linear LR scaling rule</VIS.Term> applies to the <em>effective</em> batch.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-primer" title="Concept primer — what accumulates into .grad">
      <p>
        <strong>What <code>.backward()</code> actually does.</strong> PyTorch builds a <VIS.Term def="The DAG that autograd builds during forward. Each Tensor has a grad_fn pointing to the op that produced it; .backward() walks this graph in reverse, applying chain rule to populate .grad on leaf tensors.">computational graph</VIS.Term> on every forward pass and traverses it in reverse on <code>.backward()</code>, depositing <strong>∂loss/∂param</strong> into each parameter's <code>.grad</code> via <VIS.Term def="The math trick that figures out, for every weight in the model, which direction to nudge it to reduce the loss. It's what makes gradient descent practical on deep networks.">backpropagation</VIS.Term>. Critically, the deposit is <strong>additive</strong>: <code>p.grad += new_grad</code>. This additivity is what makes accumulation work — call <code>.backward()</code> N times without zeroing, and <code>.grad</code> holds the sum of N per-micro-batch gradients. Each call uses <VIS.Term def="PyTorch's automatic differentiation engine. Tracks operations on tensors with requires_grad=True, builds the graph on the fly, and computes gradients via reverse-mode auto-diff on .backward().">autograd</VIS.Term> to walk the graph; the engine is dtype-agnostic and accumulation-agnostic.
      </p>
      <p>
        <strong>Why divide the loss.</strong> <VIS.Term def="Stochastic Gradient Descent. The base update rule p -= lr · grad over a random mini-batch; the family includes Adam, AdamW, RMSProp etc. as adaptive variants.">SGD</VIS.Term>'s update is <code>p -= lr · g</code>, where <code>g</code> is conventionally the <em>mean</em> gradient over the batch (<VIS.Term def="Cross-entropy. Loss function for multi-class prediction; penalizes the model when the predicted class probability is low for the true class.">cross-entropy</VIS.Term> returns mean by default). If you accumulate without scaling, you sum 8 means — your <code>g</code> is 8× larger than the optimizer's hyperparameters were tuned for. Dividing the per-micro-batch loss by <code>accum_steps</code> before <code>.backward()</code> is the fix: <code>(L₁ + L₂ + … + L₈)/8</code> via <VIS.Term def="The calculus rule for differentiating composed functions: d(f∘g)/dx = f'(g(x)) · g'(x). Autograd applies this recursively along the computational graph; dividing any node's value by k divides every downstream gradient by k.">chain rule</VIS.Term> deposits <code>(g₁ + g₂ + … + g₈)/8</code> into <code>.grad</code>, which equals the true mean gradient over all 256 examples (when each micro-batch has equal size). The <VIS.Term def="The set of weights/biases that the optimizer updates. .grad is allocated per-parameter; for a 7B model that's ~7B float32 grads = 28GB just for .grad storage.">model parameters</VIS.Term> see one consistent averaged step.
      </p>
      <p>
        <strong>AMP and loss scaling.</strong> Under <VIS.Term def="16-bit floating point (IEEE half). Default training/inference precision for modern transformer kernels on Ampere+.">fp16</VIS.Term>, gradients with magnitude below ~6×10⁻⁸ <VIS.Term def="When a number's magnitude falls below the smallest representable value for the float format, it gets rounded to zero — silently losing all signal. fp16's subnormal range is ~6e-8; fp32 is ~1.4e-45.">underflow</VIS.Term> to zero. <VIS.Term def="A power-of-two multiplier (typically 2^15 = 32768 initially) applied to the loss before .backward(). Shifts gradient magnitudes up into fp16's representable range; .unscale_() reverses it before the optimizer sees them.">Loss scaling</VIS.Term> multiplies the loss by 2^k before <code>.backward()</code>; chain rule scales every grad by 2^k; you divide by 2^k before the optimizer step. <VIS.Term def="torch.cuda.amp.GradScaler. The AMP helper object that owns the dynamic loss-scale k and exposes scale/unscale_/step/update methods that wrap the optimizer.">GradScaler</VIS.Term> manages k <VIS.Term def="GradScaler's scale-adjustment policy: if any gradient is inf/nan, halve the scale and skip the step; if N steps pass with no overflow, double the scale. Auto-tunes k against the workload.">dynamically</VIS.Term> — grows it when grads stay finite, halves it on overflow. <VIS.Term def="16-bit float with 8-bit exponent (vs FP16's 5). Wider range, lower precision; preferred for ML training stability.">bf16</VIS.Term> avoids underflow entirely (same exponent range as fp32) so GradScaler is unnecessary there. Under accumulation, the same <code>scale</code> applies to all 8 backwards; <code>scaler.update()</code> runs ONCE per optimizer step (per accumulation cycle), not per micro-batch.
      </p>
      <p>
        <strong>DDP gradient sync.</strong> A DDP-wrapped model installs <VIS.Term def="DDP registers per-parameter hooks fired during .backward(). When a parameter's grad is ready, the hook bucks it for NCCL all-reduce. Hooks run regardless of caller intent — model.no_sync() is the only escape valve.">backward hooks</VIS.Term> on every parameter; when a grad becomes available, the hook all-reduces it across ranks. Naive accumulation triggers 8 all-reduces per optimizer step — 7 of them wasted, since you'll re-sum the local grads on the 8th backward anyway. <code>model.no_sync()</code> disables the hook for one backward; wrap the first 7, leave the last bare, and you pay <VIS.Term def="The NCCL collective that sums each tensor across all ranks and broadcasts the result. Cost scales with tensor size and the number of ranks; sub-linear in well-tuned setups.">all-reduce</VIS.Term> once per accumulation cycle.
      </p>
      <p>
        <strong>BatchNorm caveat.</strong> <VIS.Term def="Batch Normalization (Ioffe & Szegedy 2015). Normalizes each feature using the mean/variance computed over the current batch dimension; learnable affine γ, β. Train and eval use different statistics.">BN</VIS.Term> computes statistics over the micro-batch only. Accumulation does NOT enlarge BN's effective batch — it still normalizes over 32, not 256. If BN matters and you want it to see batch 256, use <VIS.Term def="DDP-aware BN that all-reduces mean/var across ranks during the forward pass. Replaces per-GPU stats with global ones; mandatory when per-GPU batch is small (segmentation, detection).">SyncBatchNorm</VIS.Term> AND ensure your micro-batch is at least the size BN wants. Most modern decoders use <VIS.Term def="Layer Normalization. Normalize each token's features across the hidden dimension; per-sample, batch-independent. Standard inside transformers; immune to accumulation's small-batch BN issue.">LayerNorm</VIS.Term>, which is per-token and immune to this. The <VIS.Term def="Saved by BN at train time and used at eval. Exponential moving averages of per-batch mean/var across training; freezes at the final value and replaces per-batch stats at inference.">BN running stats</VIS.Term> ALSO update only on micro-batch statistics — they never see batch 256 even at convergence.
      </p>
    </VIS.Section>

    </VIS.Section>

    <VIS.Section id="sec-traps" title="22 trap drills — bugs that ship">
      <p>Each drill isolates one bug. The bugs cluster across five axes: <VIS.Term def="Loss scaling, division by accum_steps, fp16 underflow, gradient norm explosion. Decisions about WHAT NUMBER gets fed to autograd.">numerical</VIS.Term>, <VIS.Term def="Order of operations and what each PyTorch call mutates: zero_grad timing, .backward() additivity, scaler method semantics, retain_graph misuse.">API</VIS.Term>, <VIS.Term def="DDP gradient sync, no_sync placement, all-reduce cost, SyncBN, gradient-as-bucket-view memory.">distributed</VIS.Term>, <VIS.Term def="autocast scope, GradScaler unscale/step/update lifecycle, fp16 vs bf16 differences in scaling needs.">AMP</VIS.Term>, and <VIS.Term def="BatchNorm batch size, linear LR scaling rule, dropout under accumulation, mixed-size micro-batches, deterministic seeding across accumulation.">gotchas</VIS.Term>.</p>

      <VIS.TrapProblem
        id="ga-q1"
        difficulty="medium"
        mode="single"
        title="Why divide loss by accum_steps?"
        scenario={<>You profile a fine-tune run with <code>accum_steps=8</code>, no division of the loss, base LR 1e-4. Around step 80 the loss explodes. Why?</>}
        options={[
          {key:"a", text:"Because gradients in PyTorch ADD into .grad across backwards; without dividing the loss, the optimizer sees the sum of 8 micro-batch grads, equivalent to an 8× LR step.", correct:true},
          {key:"b", text:"Because fp16 overflow accumulates over 8 micro-batches.", correct:false},
          {key:"c", text:"Because BatchNorm running statistics drift over the accumulation cycle.", correct:false},
          {key:"d", text:"Because gradient clipping caps the norm and 8× clipping is too aggressive.", correct:false},
        ]}
        trap={<>(b) is plausible-sounding but wrong: GradScaler halves the scale on any overflow regardless of accumulation. (c) is real but milder, not catastrophic. (d) is backwards — clipping limits, doesn't amplify.</>}
        lens={<>The fix is one character: <code>loss = loss / accum_steps</code> before <code>.backward()</code>. Equivalent: <code>scaler.scale(loss / accum_steps).backward()</code>.</>}
      />

      <VIS.TrapProblem
        id="ga-q2"
        difficulty="hard"
        mode="single"
        title="Where does zero_grad() belong?"
        scenario={<>You see <code>optimizer.zero_grad()</code> in three places in a teammate's diff: before the loop, inside the loop, and after the loop. Which placement is correct for accumulation?</>}
        options={[
          {key:"a", text:"Before the loop only — once per accumulation cycle.", correct:false},
          {key:"b", text:"Inside the loop, before each backward — keeps each grad fresh.", correct:false},
          {key:"c", text:"After the optimizer step — at the end of each accumulation cycle, clearing grads for the next cycle.", correct:true},
          {key:"d", text:"Both before and after the loop — defensive coding.", correct:false},
        ]}
        trap={<>(a) works for the FIRST cycle then breaks because no one zeroes after the step → grads from cycle 1 leak into cycle 2. (b) defeats the whole point of accumulation. (d) is harmless but redundant.</>}
        lens={<>Equivalent: zero AT the top of the loop's caller. The invariant is "zero once per optimizer.step()", not "zero once per backward".</>}
      />

      <VIS.TrapProblem
        id="ga-q3"
        difficulty="hard"
        mode="single"
        title="Why .backward() without retain_graph?"
        scenario={<>A teammate adds <code>retain_graph=True</code> to every <code>.backward()</code> "to keep the graph available across micro-batches." What's the cost?</>}
        options={[
          {key:"a", text:"None — retain_graph just makes the graph reusable.", correct:false},
          {key:"b", text:"It keeps every forward's activation memory alive until the last backward, blowing up VRAM proportional to accum_steps.", correct:true},
          {key:"c", text:"It changes the gradient values by retaining intermediate buffers.", correct:false},
          {key:"d", text:"It forces double-precision arithmetic.", correct:false},
        ]}
        trap={<>(a) is the common misconception. (c) is wrong: same grads. (d) is unrelated. The cost is VRAM — you're now holding 8 micro-batches' activations simultaneously, undoing the entire point of accumulation.</>}
        lens={<>retain_graph is for <strong>double-backward</strong> use cases (computing higher-order gradients, e.g. influence functions, MAML). For accumulation, each forward builds its own graph; <code>retain_graph=False</code> (the default) is correct.</>}
      />

      <VIS.TrapProblem
        id="ga-q4"
        difficulty="hard"
        mode="multi"
        title="DDP no_sync — pick the true statements"
        scenario={<>You're running 8-GPU DDP with <code>accum_steps=8</code> and want to skip 7 of the 8 all-reduces per optimizer step.</>}
        options={[
          {key:"a", text:"Wrap the FIRST 7 micro-batches' forward+backward in model.no_sync(); leave the 8th un-wrapped so its backward triggers all-reduce over the summed local grads.", correct:true},
          {key:"b", text:"Wrap ALL 8 micro-batches in model.no_sync(); manually all-reduce after the loop.", correct:false},
          {key:"c", text:"no_sync only affects DDP's gradient-sync hook; the local grads still accumulate into .grad as usual.", correct:true},
          {key:"d", text:"Calling all-reduce only on the last backward is mathematically equivalent to all-reducing each one — DDP averages, and average(sum) == sum(average).", correct:true},
          {key:"e", text:"no_sync also disables the loss-scaler.", correct:false},
        ]}
        trap={<>(b) skips DDP's averaging entirely — your ranks drift. (e) is unrelated: GradScaler is per-rank and has nothing to do with no_sync.</>}
        lens={<>The savings scale with accum_steps × num_gpus. At 8×8 you're skipping 56 of 64 all-reduces per optimizer step; for 7B params this is ~30% throughput.</>}
      />

      <VIS.TrapProblem
        id="ga-q5"
        difficulty="hard"
        mode="single"
        title="Clip before or after unscale?"
        scenario={<>Your run diverges 200 steps in despite <code>clip_grad_norm_(params, 1.0)</code>. You're using AMP. What's wrong?</>}
        options={[
          {key:"a", text:"max_norm=1.0 is too tight for fine-tuning.", correct:false},
          {key:"b", text:"clip_grad_norm_ is called BEFORE scaler.unscale_, so it sees grads scaled by ~2¹⁵; norms in the millions easily fit under 1.0 only because the threshold is dwarfed — clipping is a no-op.", correct:true},
          {key:"c", text:"max_norm should be expressed in fp16 units.", correct:false},
          {key:"d", text:"clip_grad_norm_ does not work with AMP.", correct:false},
        ]}
        trap={<>The bug is silent: clipping a scaled grad with a scaled threshold would be equivalent; but you're clipping a scaled grad against an UNscaled threshold (1.0). Once you <code>unscale_</code>, the real grad norm might be 5000 — far above 1.0, but you already past the clip.</>}
        lens={<>Order is fixed: <code>scaler.unscale_(opt) → clip_grad_norm_ → scaler.step(opt) → scaler.update()</code>. Memorize this rectangle.</>}
      />

      <VIS.TrapProblem
        id="ga-q6"
        difficulty="hard"
        mode="single"
        title="scaler.step() vs optimizer.step() — what's the difference?"
        scenario={<>Why does the recipe say <code>scaler.step(optimizer)</code> instead of <code>optimizer.step()</code>?</>}
        options={[
          {key:"a", text:"scaler.step inspects .grad for inf/nan and SKIPS the parameter update if any are found, then returns the scaler-controlled flag for scaler.update() to halve k.", correct:true},
          {key:"b", text:"scaler.step is faster.", correct:false},
          {key:"c", text:"optimizer.step does not work under autocast.", correct:false},
          {key:"d", text:"scaler.step automatically unscales the grads internally.", correct:false},
        ]}
        trap={<>(d) is half-true: scaler.step DOES call unscale_ if you haven't already, but the canonical recipe unscales explicitly so you can clip in between. (c) is wrong: optimizer.step happens outside autocast in the recipe anyway.</>}
        lens={<>The skip-on-overflow semantics matter: under fp16, the first 100 steps often have occasional overflows while loss-scale calibrates. scaler.step preserves training stability across these.</>}
      />

      <VIS.TrapProblem
        id="ga-q7"
        difficulty="medium"
        mode="single"
        title="When does scaler.update() run?"
        scenario={<>Where in the accumulation loop should <code>scaler.update()</code> appear?</>}
        options={[
          {key:"a", text:"Inside the loop, after each scaler.scale(loss).backward().", correct:false},
          {key:"b", text:"After scaler.step(), once per accumulation cycle.", correct:true},
          {key:"c", text:"Before scaler.scale(loss).backward(), to set the scale for this micro-batch.", correct:false},
          {key:"d", text:"Only after a warmup of 100 steps.", correct:false},
        ]}
        trap={<>(a) is the destructive bug: scaler.update halves k on overflow and doubles after a grace period. Calling it 8× more often shifts dynamics and can crater k to 1 → fp16 underflow returns. (c) is double-wrong: same call site, plus scale should be CONSTANT across the 8 micro-batches of one cycle.</>}
        lens={<>One scaler.update per optimizer.step. The same invariant as zero_grad.</>}
      />

      <VIS.TrapProblem
        id="ga-q8"
        difficulty="hard"
        mode="single"
        title="autocast scope — wraps what, exactly?"
        scenario={<>Which region of code should <code>with torch.cuda.amp.autocast(dtype=torch.float16):</code> wrap?</>}
        options={[
          {key:"a", text:"Just the forward pass through the model.", correct:false},
          {key:"b", text:"The forward pass AND the loss computation, but NOT the backward call.", correct:true},
          {key:"c", text:"The forward, loss, and backward — everything between zero_grad and step.", correct:false},
          {key:"d", text:"Just model(input); wrap the loss separately.", correct:false},
        ]}
        trap={<>(c) is wrong: wrapping backward inside autocast is a known footgun — the grads inherit autocast's dtype rules in ways autograd doesn't expect. PyTorch's own docs say "do not wrap backward in autocast." (a)/(d) miss the loss, which often has its own fp16-unsafe ops (log, softmax) that autocast promotes to fp32.</>}
        lens={<>Rule of thumb: autocast wraps "ops whose dtype you want PyTorch to choose." backward propagates the dtype decisions made on forward, so it doesn't need its own context.</>}
      />

      <VIS.TrapProblem
        id="ga-q9"
        difficulty="medium"
        mode="single"
        title="bf16 vs fp16 — does anything change?"
        scenario={<>You switch from fp16 to bf16 autocast. What part of the recipe simplifies?</>}
        options={[
          {key:"a", text:"Nothing — both formats need GradScaler.", correct:false},
          {key:"b", text:"bf16 has the same exponent range as fp32, so gradient underflow is not a concern. You drop GradScaler entirely: no scaler.scale, no scaler.unscale_, no scaler.update.", correct:true},
          {key:"c", text:"bf16 needs DOUBLE the loss-scaling because it has less mantissa precision.", correct:false},
          {key:"d", text:"bf16 cannot be used with gradient accumulation.", correct:false},
        ]}
        trap={<>(c) confuses bf16's tradeoff: bf16 has WIDER exponent (no underflow) but LESS mantissa (more rounding error). Scaling fixes underflow, not rounding. Scaling bf16 is pointless.</>}
        lens={<>On Ampere+ for transformers, bf16 is now the default. The accumulation recipe collapses to: divide loss by accum_steps, .backward(), step, zero_grad. Five lines disappear.</>}
      />

      <VIS.TrapProblem
        id="ga-q10"
        difficulty="hard"
        mode="multi"
        title="What does BatchNorm see under accumulation?"
        scenario={<>You're training a ResNet with BN and <code>accum_steps=8</code>, micro_batch=4. Which statements are true?</>}
        options={[
          {key:"a", text:"BN normalizes over the micro-batch of 4 — accumulation does NOT enlarge BN's effective batch.", correct:true},
          {key:"b", text:"BN's running mean/var also updates only on the local micro-batch; over 8 micro-batches it updates 8 times.", correct:true},
          {key:"c", text:"To get BN to see batch-256 statistics, you'd need to merge stats explicitly (Welford / Chan) or use SyncBatchNorm across enough devices.", correct:true},
          {key:"d", text:"For decoders that use LayerNorm, this issue disappears entirely.", correct:true},
          {key:"e", text:"Accumulation transparently fixes BN's small-batch instability.", correct:false},
        ]}
        trap={<>(e) is the seductive false belief — "I'm doing batch 256 effectively, so BN is fine." It is not. BN's normalization is a per-forward op; accumulation cannot retroactively re-normalize.</>}
        lens={<>This is why small-batch detection/segmentation work always pairs accumulation with SyncBN. For text (LayerNorm) you're immune; this trap rarely fires.</>}
      />

      <VIS.TrapProblem
        id="ga-q11"
        difficulty="medium"
        mode="single"
        title="Linear LR scaling rule — what batch?"
        scenario={<>Your config has <code>lr=1e-4, micro_batch=32, accum_steps=8, num_gpus=8</code>. The linear-scaling rule (Goyal et al.) recommends LR proportional to which batch size?</>}
        options={[
          {key:"a", text:"The micro-batch: 32.", correct:false},
          {key:"b", text:"The per-step batch on one GPU: 32 × 8 = 256.", correct:false},
          {key:"c", text:"The global effective batch: 32 × 8 × 8 = 2048.", correct:true},
          {key:"d", text:"The micro-batch times the number of GPUs: 32 × 8 = 256.", correct:false},
        ]}
        trap={<>(b)/(d) confuse the layer at which gradients are averaged. The optimizer sees gradients averaged over ALL 2048 examples per step (after DDP all-reduce + accum-mean); that's the batch that matters.</>}
        lens={<>Practical rule: if you grew effective batch by 4× (e.g., went from 512 to 2048), grow base LR by 4× too. Add a warmup over the first ~5 epochs; the rule fails without it.</>}
      />

      <VIS.TrapProblem
        id="ga-q12"
        difficulty="hard"
        mode="single"
        title="Mixed-size micro-batches at the tail"
        scenario={<>Your dataloader's last accumulation cycle has 7 full micro-batches of 32 + 1 short micro-batch of 11. What goes wrong if you naively divide each loss by <code>accum_steps=8</code>?</>}
        options={[
          {key:"a", text:"Nothing — averaging by accum_steps is still correct.", correct:false},
          {key:"b", text:"The 11-sample micro-batch is under-weighted relative to its true share of examples: its 11 samples count as 1/8 of the gradient instead of 11/(7·32+11) = 11/235.", correct:true},
          {key:"c", text:"PyTorch's autograd handles this automatically.", correct:false},
          {key:"d", text:"The optimizer.step() will raise a size-mismatch error.", correct:false},
        ]}
        trap={<>(a) is the lazy answer that ships. The error is small but systematic; under long training it biases the model toward whatever class-distribution the short tails over-represent.</>}
        lens={<>The fix: weight each micro-batch's loss by its sample count divided by the cycle's total samples — <code>loss * micro_n / total_n</code> — or drop the tail micro-batch.</>}
      />

      <VIS.TrapProblem
        id="ga-q13"
        difficulty="medium"
        mode="single"
        title="Dropout under accumulation"
        scenario={<>Does dropout behave the same under accumulation as without?</>}
        options={[
          {key:"a", text:"Yes — dropout is per-forward; each micro-batch gets an independent mask.", correct:true},
          {key:"b", text:"No — dropout masks are correlated across micro-batches and must be re-seeded.", correct:false},
          {key:"c", text:"No — accumulation disables dropout.", correct:false},
          {key:"d", text:"Only if you explicitly call model.train() between micro-batches.", correct:false},
        ]}
        trap={<>(d) sounds plausible but is wrong: model.train() is a state flag, not a per-forward op. (b) is a subtle misconception: each forward draws fresh masks; "correlated across micro-batches" is a statistical claim that's only true if your RNG is seeded that way.</>}
        lens={<>For exact reproducibility across runs, you DO need to seed deterministically. But the dropout machinery itself is per-forward and accumulation-transparent.</>}
      />

      <VIS.TrapProblem
        id="ga-q14"
        difficulty="hard"
        mode="single"
        title="set_to_none=True vs False"
        scenario={<>What's the practical difference between <code>zero_grad(set_to_none=True)</code> and <code>zero_grad(set_to_none=False)</code>?</>}
        options={[
          {key:"a", text:"No difference — both zero the gradients.", correct:false},
          {key:"b", text:"set_to_none=True DEALLOCATES the .grad tensors. Next backward writes into fresh memory (faster), and the optimizer skips params whose .grad is None entirely (avoids spurious weight-decay on never-updated params).", correct:true},
          {key:"c", text:"set_to_none=False is faster because no allocation.", correct:false},
          {key:"d", text:"set_to_none=True is incompatible with AMP.", correct:false},
        ]}
        trap={<>(c) sounds reasonable but is wrong: zeroing in place writes 0 to every element of grad; the next backward then ADDS into it. With set_to_none, the next backward allocates and writes — same cost, no zero-write.</>}
        lens={<>Default changed to True in recent PyTorch versions. The "weight-decay-on-zero-grad" bug is real: a frozen embedding still gets decayed if its .grad is 0 instead of None.</>}
      />

      <VIS.TrapProblem
        id="ga-q15"
        difficulty="hard"
        mode="multi"
        title="When does the scaler skip a step?"
        scenario={<>Under <code>scaler.step(optimizer)</code>, in which cases is the parameter update silently skipped?</>}
        options={[
          {key:"a", text:"Any parameter has inf in its (unscaled) .grad.", correct:true},
          {key:"b", text:"Any parameter has nan in its (unscaled) .grad.", correct:true},
          {key:"c", text:"The loss itself is nan.", correct:true},
          {key:"d", text:"The grad norm exceeds clip_grad_norm_'s max_norm.", correct:false},
          {key:"e", text:"The model is in eval() mode.", correct:false},
        ]}
        trap={<>(d) is a real thing but clip_grad_norm_ caps the norm; it doesn't skip the step. (e) is unrelated. The scaler only protects against fp16-overflow artifacts.</>}
        lens={<>The skip is silent by default — call <code>scaler.get_scale()</code> over training to log when k halves; a sustained drop signals a deeper instability.</>}
      />

      <VIS.TrapProblem
        id="ga-q16"
        difficulty="medium"
        mode="single"
        title="Effective batch and warmup"
        scenario={<>You're going from <code>accum_steps=1</code> to <code>accum_steps=8</code> on the same hardware. Which schedule change is most important?</>}
        options={[
          {key:"a", text:"Increase weight_decay by 8×.", correct:false},
          {key:"b", text:"Extend warmup proportionally so the per-effective-step LR ramp matches the 8× larger batch's variance budget.", correct:true},
          {key:"c", text:"Halve dropout to compensate for less per-step regularization.", correct:false},
          {key:"d", text:"Disable gradient clipping.", correct:false},
        ]}
        trap={<>(a)/(c) confuse regularization with optimization. (d) is a separate axis. The risk at large effective batch is early-training instability from LR too high on under-warmed-up weights.</>}
        lens={<>Goyal et al. 2017's prescription: linear LR scaling + linear warmup over ~5 epochs. The warmup is what saved ImageNet-1-hour from divergence at batch 8192.</>}
      />

      <VIS.TrapProblem
        id="ga-q17"
        difficulty="hard"
        mode="single"
        title="Gradient checkpointing and accumulation"
        scenario={<>Does activation checkpointing change the accumulation recipe?</>}
        options={[
          {key:"a", text:"No — accumulation is unchanged; each micro-batch's backward does a re-forward, costing ~33% more wall-time, but the .grad arithmetic is identical.", correct:true},
          {key:"b", text:"Yes — you must call .backward() twice per micro-batch.", correct:false},
          {key:"c", text:"Yes — gradient scaling is doubled.", correct:false},
          {key:"d", text:"Yes — DDP no_sync stops working with checkpointing.", correct:false},
        ]}
        trap={<>(d) is a half-truth: there are known DDP+checkpoint+find_unused_parameters interactions, but no_sync itself is unaffected by checkpointing.</>}
        lens={<>The composition is multiplicative for VRAM: checkpointing roughly halves activation memory, letting you grow micro-batch and shrink accum_steps. Pick the smallest accum_steps that still hits the convergence-target effective batch.</>}
      />

      <VIS.TrapProblem
        id="ga-q18"
        difficulty="hard"
        mode="single"
        title="Drop-last vs partial-tail handling"
        scenario={<>Your dataloader has 1000 samples; micro_batch=32; accum_steps=8; so one optimizer step uses 256 samples. The last 232 samples form an incomplete cycle. Best handling?</>}
        options={[
          {key:"a", text:"Drop the incomplete tail — drop_last=True on the DataLoader.", correct:false},
          {key:"b", text:"Do a final partial step that uses fewer accum_steps and rescale the loss division accordingly, OR drop_last=True. Most production code chooses drop_last for simplicity.", correct:true},
          {key:"c", text:"Pad the last cycle with zeros so it has 8 micro-batches.", correct:false},
          {key:"d", text:"Repeat random samples to fill the cycle.", correct:false},
        ]}
        trap={<>(c)/(d) inject distribution shift. (a) is correct in many cases but loses up to 8% of the epoch's data; for tiny fine-tune sets, you may prefer partial last steps with corrected scaling.</>}
        lens={<>Whatever you pick, document it. Mismatch between drop_last across train/eval scripts is a classic source of "metric A on n_eff_train ≠ metric A on n_eff_eval" headaches.</>}
      />

      <VIS.TrapProblem
        id="ga-q19"
        difficulty="medium"
        mode="single"
        title="grad-norm logging under accumulation"
        scenario={<>When should you log <code>grad_norm = clip_grad_norm_(...)</code> for monitoring?</>}
        options={[
          {key:"a", text:"After every micro-batch backward.", correct:false},
          {key:"b", text:"After scaler.unscale_, once per accumulation cycle — the value reflects the FULL effective-batch gradient.", correct:true},
          {key:"c", text:"Before any backward — to log expected grad.", correct:false},
          {key:"d", text:"Only when scaler.step skips an update.", correct:false},
        ]}
        trap={<>(a) logs the partial sum at 1/8, 2/8, …, 8/8 of the accumulation; the curve is monotonically growing and tells you nothing about the optimizer's step. The interesting quantity is the post-unscale, post-summation grad norm.</>}
        lens={<>Pair with <code>scaler.get_scale()</code> in the same log line — when grad norm spikes and scale halves on the same step, you've caught a near-divergence in the act.</>}
      />

      <VIS.TrapProblem
        id="ga-q20"
        difficulty="hard"
        mode="multi"
        title="Property-tests for an accumulation recipe"
        scenario={<>You're about to ship a refactor that changes the accumulation loop. Which property tests catch the bug families?</>}
        options={[
          {key:"a", text:"Equivalence at accum_steps=1: with accum_steps=1, the loop must produce IDENTICAL param updates as a vanilla train_step. Catches mis-scaling.", correct:true},
          {key:"b", text:"Linearity in N: doubling accum_steps with halved LR should produce a near-identical loss trajectory (Goyal et al. equivalence).", correct:true},
          {key:"c", text:"Determinism: same seed, same data order, same hyperparams → bit-identical loss curve. Catches non-deterministic RNG seeding under accumulation.", correct:true},
          {key:"d", text:"DDP-vs-single-GPU equivalence: 1-GPU run with accum_steps=K and K-GPU run with accum_steps=1 must give identical effective-batch grads. Catches missing no_sync / wrong scaling.", correct:true},
          {key:"e", text:"Monotonically decreasing loss: every step's loss < previous step.", correct:false},
        ]}
        trap={<>(e) is wrong — loss is noisy step-to-step under SGD. A "must decrease every step" assertion fires on healthy runs.</>}
        lens={<>(a) is the strongest single test because most bugs survive at accum_steps=1 (the no_sync path, the BN path) but mis-scaling fires immediately. (d) is the canary for the distributed bug.</>}
      />

      <VIS.TrapProblem
        id="ga-q21"
        difficulty="hard"
        mode="single"
        title="What if a single micro-batch overflows in fp16?"
        scenario={<>Under AMP, one of your 8 micro-batches' backward produces an inf gradient. What does the recipe do?</>}
        options={[
          {key:"a", text:"That micro-batch's .grad is set to zero; the others contribute normally.", correct:false},
          {key:"b", text:"The inf propagates into .grad (since accumulation is additive); scaler.step then sees inf, skips optimizer.step entirely, scaler.update halves the loss-scale. The whole cycle's work is discarded — but the next cycle uses a smaller k.", correct:true},
          {key:"c", text:"Only that micro-batch is rerun with a smaller loss-scale.", correct:false},
          {key:"d", text:"The trainer crashes.", correct:false},
        ]}
        trap={<>(a) is the comfortable lie. Once inf is in .grad, no per-micro-batch tracking exists to roll it back. (c) would be lovely but PyTorch's API doesn't support it.</>}
        lens={<>This is why scaler-skipped steps cluster at the start of training: until k self-tunes, single-micro-batch overflows kill whole cycles. After ~100 steps the rate drops to noise.</>}
      />

      <VIS.TrapProblem
        id="ga-q22"
        difficulty="hard"
        mode="single"
        title="gradient_as_bucket_view — what does it buy?"
        scenario={<>Your DDP wrapper has <code>gradient_as_bucket_view=True</code>. What's the effect under accumulation?</>}
        options={[
          {key:"a", text:"Faster all-reduce by skipping copies between .grad and DDP's flat communication bucket — but it forbids in-place mutations of .grad (e.g., manual .grad.zero_() instead of optimizer.zero_grad).", correct:true},
          {key:"b", text:"Doubles VRAM by keeping a separate bucket.", correct:false},
          {key:"c", text:"Disables no_sync.", correct:false},
          {key:"d", text:"Forces grads to fp16.", correct:false},
        ]}
        trap={<>(b) is backwards: gradient_as_bucket_view SAVES memory by aliasing. The footgun is that any code that does <code>p.grad = new_tensor</code> instead of <code>p.grad.copy_(new_tensor)</code> breaks the aliasing silently.</>}
        lens={<>Worth flipping on for large models; budget a day to audit any custom optimizer / scheduler / FSDP-glue code for non-idiomatic grad-handling.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://pytorch.org/docs/stable/notes/amp_examples.html#gradient-accumulation" target="_blank" rel="noopener"><strong>PyTorch — AMP + Gradient Accumulation</strong></a> — the canonical recipe; matches the reference above. Read the surrounding "Working with multiple models, losses, and optimizers" section too.</li>
