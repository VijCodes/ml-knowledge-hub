<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// L1 regularization (Lasso) — row 5 — fingerprint: l1-regularization-lasso

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px"}}>
    <VIS.Hero pill="ML Fund" title="L1 regularization (Lasso)"
      subtitle={<>A <VIS.Term def="A term added to the training loss that discourages large coefficients so the model generalizes instead of memorizing.">penalty</VIS.Term> that doesn't just shrink weights — it kills them.</>}
      byline={[{label:"L2",value:"Regularization"},{label:"L3",value:"L1"},{label:"Origin",value:"Tibshirani 1996"}]}/>
    <VIS.TLDR>
      <VIS.Term def="Least Absolute Shrinkage and Selection Operator — Tibshirani's 1996 estimator that adds an absolute-value penalty to least squares.">Lasso</VIS.Term> adds <code>α·Σ|w|</code> to the loss. The absolute-value{" "}
      <VIS.Term def="The shape of the |w|≤t constraint region — a rotated square whose corners sit exactly on the coordinate axes.">geometry</VIS.Term> pushes most weights to <em>exactly</em> zero —{" "}
      <VIS.Term def="A model where most of the weights are zero. Cheaper to store and run; reveals which features actually matter.">sparse model</VIS.Term>,
      automatic{" "}
      <VIS.Term def="The process of picking which input columns to keep and which to drop, based on their predictive value.">feature selection</VIS.Term>,
      cheaper{" "}
      <VIS.Term def="The forward-pass cost paid every time the model serves a prediction in production.">inference</VIS.Term>. Distinct from{" "}
      <VIS.Term def="Ridge regression — adds α·Σw² to the loss; shrinks weights smoothly toward zero but never sets them exactly to zero.">L2 (Ridge)</VIS.Term>, which uses a smooth circular constraint and produces small-but-nonzero coefficients.
    </VIS.TLDR>
    <VIS.Section id="sec-math" title="The penalty">
      <VIS.Equation display tex="\mathcal{L}_{\text{L1}}(w) \;=\; \mathcal{L}_{\text{fit}}(w) \;+\; \alpha \sum_{j=1}^{d} |w_j|"/>
      <p>
        <VIS.Term def="The regularization strength — a scalar that scales the penalty against the data-fit term. Bigger value, more aggressive shrinkage.">α</VIS.Term> controls how aggressively weights are killed. Larger α → more zeros, simpler model, higher{" "}
        <VIS.Term def="Systematic error from a model too rigid to capture the true signal — underfitting territory.">bias</VIS.Term>. The penalty is{" "}
        <VIS.Term def="A function whose epigraph is a convex set — any local minimum is also a global minimum, which makes optimization tractable.">convex</VIS.Term> but not{" "}
        <VIS.Term def="Possessing a derivative at every point — L1 fails this at w=0 because |w| has a kink there.">differentiable</VIS.Term> at <code>w=0</code>, which is why the optimum can <em>sit on</em> the kink.
      </p>
    </VIS.Section>
    <VIS.Section id="sec-why-sparse" title="Why does L1 zero weights and L2 doesn't?">
      <VIS.Mermaid chart={`
flowchart LR
  A["Loss contour<br/>(elliptical bowl)"]
  A --> B{"Which constraint region?"}
  B -->|L1: diamond<br/>(pointy corners on axes)| C["Optimum sits ON an axis<br/>→ weight = 0"]
  B -->|L2: circle<br/>(smooth)| D["Optimum sits anywhere<br/>→ weight is small but nonzero"]
  style C fill:#dcfce7,stroke:#16a34a
  style D fill:#fef3c7,stroke:#d97706
      `}/>
      <p>
        It's pure geometry. The diamond's corners <em>are</em> the axes; an{" "}
        <VIS.Term def="A point on the boundary of a convex set whose supporting tangent first touches the loss contour — generic optima of constrained convex problems live here.">extreme point</VIS.Term> of the L1 ball lies exactly on a coordinate axis, so the{" "}
        <VIS.Term def="The point where two surfaces meet at a single line — for the loss-contour vs constraint-region picture, the contour just grazes the diamond corner.">tangency</VIS.Term> sets that coordinate to zero. The smooth{" "}
        <VIS.Term def="The L2 unit ball — the set of weight vectors with ||w||₂ ≤ t — boundary has zero curvature singularities, so it has no corners.">circle</VIS.Term> has no corners, so its tangent to the loss ellipse generically lies off-axis. This is why L1 produces <em>exact</em> zeros while L2 only does smooth{" "}
        <VIS.Term def="Multiplying every weight by a factor smaller than one — what L2 does — pulls magnitudes down without ever fully erasing them.">shrinkage</VIS.Term>.
      </p>
    </VIS.Section>
    <VIS.Section id="sec-optim" title="Optimizing a non-smooth loss">
      <p>
        Because <code>|w|</code> is not differentiable at zero, vanilla{" "}
        <VIS.Term def="Stochastic gradient descent — takes a step opposite to the gradient computed on a mini-batch of examples.">SGD</VIS.Term> can chatter around the kink instead of clean-snapping a coefficient to zero. Three standard fixes:
      </p>
      <ul>
        <li>
          <VIS.Term def="A generalization of the gradient at non-smooth points — the set of slopes of all supporting tangent lines. For |w| at w=0, the subgradient is the interval [-1, 1].">Subgradient</VIS.Term> descent — pick any element of the subdifferential; converges but slowly.
        </li>
        <li>
          <VIS.Term def="Optimizing one coordinate at a time while holding the others fixed — for L1 each 1D subproblem has a closed-form soft-threshold solution.">Coordinate descent</VIS.Term> — the workhorse inside scikit-learn's Lasso; each coordinate update is a closed-form{" "}
          <VIS.Term def="An operator that shrinks small values toward zero and snaps anything inside ±λ to exactly zero — the closed-form proximal operator of L1.">soft-threshold</VIS.Term>.
        </li>
        <li>
          <VIS.Term def="A gradient step on the smooth part followed by applying the proximal operator of the non-smooth penalty — for L1 this reduces to gradient-step-then-soft-threshold.">Proximal gradient</VIS.Term> methods — {" "}
          <VIS.Term def="Iterative Shrinkage-Thresholding Algorithm — proximal gradient for L1; O(1/k) convergence.">ISTA</VIS.Term> and its accelerated cousin{" "}
          <VIS.Term def="Fast ISTA — Nesterov-accelerated proximal gradient; O(1/k²) convergence.">FISTA</VIS.Term>.
        </li>
      </ul>
      <p>
        Each method exploits the fact that the penalty is{" "}
        <VIS.Term def="A function f(x+y) ≤ f(x)+f(y) where each coordinate contributes independently — Σ|wⱼ| trivially separates.">separable</VIS.Term> across coordinates and convex.
      </p>
    </VIS.Section>
    <VIS.Section id="sec-when" title="When to reach for L1">
      <VIS.Callout kind="info" title="The 'high-d, sparse-truth' regime">
        Use L1 when you suspect most features are noise — text/{" "}
        <VIS.Term def="A representation of a document as a vector of word counts or TF-IDF scores; typically tens of thousands of dimensions, most zero per document.">bag-of-words</VIS.Term>,{" "}
        <VIS.Term def="High-dimensional biological data — single-nucleotide polymorphisms or gene-expression columns often number in the millions, while sample size stays in the thousands.">genomics</VIS.Term>, sparse{" "}
        <VIS.Term def="Structured row-by-column data with mixed feature types — the classic spreadsheet regime where most features may be uninformative.">tabular</VIS.Term> data. L1 gives you both regularization AND a feature shortlist.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Correlated features behave badly under L1">
        If two features are highly{" "}
        <VIS.Term def="Two columns whose values move together — their Pearson r is far from zero, so the model treats them as near-substitutes.">correlated</VIS.Term>, L1 typically keeps one and zeros the other — somewhat arbitrarily. This wrecks{" "}
        <VIS.Term def="The property that re-running feature selection on a bootstrap resample tends to pick the same columns — L1 lacks this on correlated groups.">stability of selection</VIS.Term> across resamples. Reach for{" "}
        <VIS.Term def="A regularizer that combines L1 and L2 penalties — gives sparsity (from L1) but stable selection on correlated features (from L2).">Elastic Net</VIS.Term>{" "}
        (L1 + L2 blend) instead. Sparsity survives; selection becomes group-aware.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="L1 is not free in the dense-truth regime">
        When the true signal is{" "}
        <VIS.Term def="Most features carry some signal — the opposite of sparse-truth; L1's inductive bias of 'mostly zero' actively hurts here.">dense</VIS.Term>, L1's pressure to zero coefficients pays a{" "}
        <VIS.Term def="The amount of bias deliberately added by a regularizer — the cost you pay to reduce variance. For L1 in dense-truth, this is paid but the variance reward is small.">bias tax</VIS.Term> that L2 doesn't. Cross-validate before defaulting to it.
      </VIS.Callout>
      <VIS.Callout kind="info" title="Always standardize first">
        L1 is{" "}
        <VIS.Term def="Treats every coefficient's |wⱼ| with the same α — so features measured on different scales get penalized unequally relative to their predictive value.">scale-sensitive</VIS.Term>: a feature measured in millimetres is penalized 1000× less than the same feature in kilometres. Z-score{" "}
        <VIS.Term def="Subtracting the mean and dividing by the standard deviation so every column has mean zero and unit variance.">standardization</VIS.Term> before fitting is non-negotiable.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-five trap problems. Each scenario carries discriminating detail that points to the right answer — but every wrong option is a position a competent practitioner could plausibly defend. Pick, reveal, study the lens.
      </p>

      <VIS.TrapProblem
        id="l1-q1"
        difficulty="medium"
        title="Q1 — Why does L1 produce exact zeros while L2 only shrinks?"
        scenario={<><em>Discriminating insight:</em> geometry of the constraint region drives sparsity, beyond mere magnitude of the penalty. A teammate claims both regularizers ultimately do the same thing — one is just "sharper" than the other. Pick the framing that captures the actual mechanism.</>}
        options={[
          {key:"a", text:"L1 applies a per-step threshold so any weight whose gradient is smaller than α gets clipped to zero during training."},
          {key:"b", text:"L1 shrinks weights faster than L2 because |w| has a larger derivative magnitude than w² for small w."},
          {key:"c", text:"The L1 ball has corners on the coordinate axes; tangency of the loss contour with a corner forces that coordinate to be exactly zero.", correct:true},
          {key:"d", text:"L1 has a steeper penalty curve at the origin, so optimization overshoots through zero and the optimizer rests on the other side."},
        ]}
        trap={<>(a) confuses the result (zeros) with a threshold mechanism that exists in proximal-gradient updates but is not what makes the optimum sparse. (b) compares slopes locally but misses that the optimum is a constrained tangency, not a gradient-magnitude race. (d) is plausible but wrong — the optimum is stationary, not an overshoot artifact.</>}
        lens={<>L1's exact-zero property is geometric. The constraint set <code>||w||₁ ≤ t</code> is a rotated square whose corners sit on the axes. The level set of the data-fit loss generically first touches that boundary at a corner, snapping the touched coordinate to zero. L2's circular boundary has no corners, so its tangency is generically off-axis.</>}
        stretch={<>What shape replaces the diamond when you switch to an L½ "penalty"?</>}
      />

      <VIS.TrapProblem
        id="l1-q2"
        difficulty="medium"
        title="Q2 — Two features perfectly correlated: what does L1 do?"
        scenario={<><em>Discriminating insight:</em> selection arbitrariness on correlated features rather than loss of sparsity. You fit a Lasso on a dataset with two near-identical columns (Pearson r ≈ 0.99). Across bootstrap resamples, the picked column flips.</>}
        options={[
          {key:"a", text:"Lasso drops both columns because the penalty doubles when correlated features are both kept in the active set."},
          {key:"b", text:"Lasso falls back to an L2-like smooth shrinkage on the correlated block, so both stay small and nonzero."},
          {key:"c", text:"Lasso keeps both at half magnitude, splitting the coefficient evenly between the correlated pair."},
          {key:"d", text:"Lasso keeps exactly one of the two, but which one is largely arbitrary and can flip across resamples.", correct:true},
        ]}
        trap={<>(a) misreads the penalty — there is no double-charging of correlated columns. (b) describes Elastic Net behavior rather than Lasso. (c) is the Ridge intuition: Ridge splits coefficients on correlated columns; Lasso picks one and zeros the rest.</>}
        lens={<>On highly correlated features Lasso picks one and zeros the other; which one survives depends on tiny perturbations in the data. Sparsity survives; selection is unstable. Elastic Net mixes in an L2 term to group-shrink correlated columns together.</>}
        stretch={<>What changes if you decorrelate features with PCA first?</>}
      />

      <VIS.TrapProblem
        id="l1-q3"
        difficulty="hard"
        title="Q3 — Where exactly is the L1 loss non-differentiable?"
        scenario={<><em>Discriminating insight:</em> the kink lives only on coordinate axes rather than across the whole parameter space. An interviewer asks whether you can apply standard gradient descent to a Lasso objective. The candidate hesitates.</>}
        options={[
          {key:"a", text:"It is non-differentiable everywhere because the absolute-value function lacks a continuous derivative on its domain."},
          {key:"b", text:"It is non-differentiable wherever the data-fit loss has non-zero curvature, since curvature interacts with the penalty kink."},
          {key:"c", text:"It is non-differentiable along any line through the origin, regardless of which weight is zero."},
          {key:"d", text:"It is non-differentiable exactly on the hyperplanes where some coordinate equals zero — the subgradient is set-valued there.", correct:true},
        ]}
        trap={<>(a) overgeneralizes — |w| is smooth everywhere except at w=0. (b) imports curvature into a question about smoothness. (c) confuses "axis-aligned hyperplanes" with arbitrary lines through the origin.</>}
        lens={<>The function <code>|wⱼ|</code> is non-differentiable exactly at <code>wⱼ=0</code>. So the L1 objective is non-smooth on the union of axis hyperplanes; at those points the subdifferential is the interval <code>[-α, α]</code>. Everywhere else the gradient exists in the usual sense.</>}
        stretch={<>How does coordinate descent dodge the non-smoothness entirely?</>}
      />

      <VIS.TrapProblem
        id="l1-q4"
        difficulty="hard"
        title="Q4 — Why is coordinate descent so popular for Lasso?"
        scenario={<><em>Discriminating insight:</em> closed-form per-coordinate update comes from separability, beyond parallelism or convexity alone. A new hire asks why scikit-learn's Lasso uses coordinate descent rather than a generic convex solver.</>}
        options={[
          {key:"a", text:"Each one-dimensional subproblem has a closed-form soft-threshold solution because the penalty is separable across coordinates.", correct:true},
          {key:"b", text:"Coordinate descent parallelizes across coordinates, exploiting modern multi-core CPUs that generic solvers cannot use."},
          {key:"c", text:"Coordinate descent is the only optimizer guaranteed to converge for non-smooth convex losses, so it is the safest default."},
          {key:"d", text:"It avoids matrix factorization entirely, making it cheaper than any first-order method on the full gradient."},
        ]}
        trap={<>(b) inverts reality — vanilla coordinate descent is inherently sequential because each update depends on the latest others. (c) overclaims; proximal gradient methods also converge. (d) is partly true for some problems but does not explain the preference.</>}
        lens={<>The L1 penalty is separable: <code>Σⱼ|wⱼ|</code> couples to each coordinate alone. Holding the others fixed, the 1-D problem in <code>wⱼ</code> is least-squares plus <code>α|wⱼ|</code>, whose minimizer is the soft-threshold of the partial residual. Cheap, closed-form, no line search.</>}
        stretch={<>What goes wrong if features are not standardized before coordinate descent?</>}
      />

      <VIS.TrapProblem
        id="l1-q5"
        difficulty="medium"
        title="Q5 — Genomics: 50 samples, 20,000 SNPs — pick a regularizer"
        scenario={<><em>Discriminating insight:</em> p ≫ n combined with believed-sparse truth, beyond high dimensionality alone. You have 50 patient samples and 20,000 SNP columns. Domain prior: at most a few dozen SNPs actually drive the phenotype.</>}
        options={[
          {key:"a", text:"L1 — the regime is high-dimensional with sparse truth, and the model output doubles as a feature shortlist.", correct:true},
          {key:"b", text:"L2 — with only 50 samples you need maximum variance reduction and stable coefficients across resamples."},
          {key:"c", text:"No regularization, but use 50-fold cross-validation to keep variance under control."},
          {key:"d", text:"Dropout-style ensembling over 100 random feature subsets to approximate Bayesian shrinkage."},
        ]}
        trap={<>(b) is the right reflex for dense-truth but wrong for sparse-truth — L2 will keep all 20,000 SNPs nonzero. (c) ignores that 50 samples × 20,000 features cannot be fit without regularization. (d) is creative but doesn't deliver the biologically meaningful shortlist the domain demands.</>}
        lens={<>L1 is the canonical move for p ≫ n with believed-sparse truth. You get both regularization and an automatic shortlist of nonzero SNPs that biologists can chase up in the lab. Validate selection stability with a bootstrap.</>}
        stretch={<>If the truth is "a handful of correlated SNP blocks" rather than independent SNPs, what changes?</>}
      />

      <VIS.TrapProblem
        id="l1-q6"
        difficulty="medium"
        title="Q6 — How does α relate to the constraint radius t?"
        scenario={<><em>Discriminating insight:</em> Lagrangian-vs-constraint equivalence and the direction of the relationship. Two Lasso formulations are equivalent: penalty form <code>L+α·||w||₁</code> and constraint form <code>min L s.t. ||w||₁ ≤ t</code>.</>}
        options={[
          {key:"a", text:"Larger α corresponds to smaller t — a stiffer penalty means a smaller feasible region for the weights.", correct:true},
          {key:"b", text:"α and t move in the same direction: tighter penalty corresponds to a larger feasible diamond around the origin."},
          {key:"c", text:"α and t are unrelated — penalty form trades off against the data fit while constraint form just bounds the weights."},
          {key:"d", text:"The relationship is data-independent: there is a fixed formula t = 1/α that holds for any dataset."},
        ]}
        trap={<>(b) reverses the duality. (c) misses that the two forms are equivalent via KKT conditions. (d) overclaims a fixed mapping; the implicit t depends on the data and the unregularized optimum.</>}
        lens={<>Penalty and constraint forms are KKT-dual. Bigger α pushes the optimum closer to the origin, equivalent to shrinking the feasible diamond ‖w‖₁ ≤ t. The exact α↔t map depends on the dataset, but the monotone direction is universal: α↑ ⇔ t↓.</>}
        stretch={<>Which form do you reach for if you have a hard budget on the L1 norm of deployed weights?</>}
      />

      <VIS.TrapProblem
        id="l1-q7"
        difficulty="hard"
        title="Q7 — Does L1 perform sparse recovery in linear regression?"
        scenario={<><em>Discriminating insight:</em> recovery requires design-matrix conditions beyond sparsity of the truth alone. A statistician asks whether running Lasso suffices to recover the true active set when only a handful of true coefficients are nonzero.</>}
        options={[
          {key:"a", text:"Yes — any time the true vector is sparse, Lasso recovers the correct support with high probability."},
          {key:"b", text:"No — exact support recovery additionally requires conditions on the design matrix such as the irrepresentability condition.", correct:true},
          {key:"c", text:"Yes — but only when the sample size matches the ambient dimension exactly, regardless of the design matrix."},
          {key:"d", text:"No — Lasso never recovers the true support, only a biased estimate of the nonzero coefficient magnitudes."},
        ]}
        trap={<>(a) skips the design-matrix conditions famously analyzed by Zhao and Yu. (c) invents a sample-size rule that doesn't exist. (d) is too pessimistic — Lasso does recover support under the right conditions.</>}
        lens={<>Sparse recovery requires more than sparsity of the truth. Conditions like the irrepresentability condition or the restricted eigenvalue property on the design matrix are needed. When correlated active and inactive features mix, Lasso can pick the wrong support even with infinite samples.</>}
        stretch={<>Which post-hoc procedure debiases the magnitudes of the surviving Lasso coefficients?</>}
      />

      <VIS.TrapProblem
        id="l1-q8"
        difficulty="medium"
        title="Q8 — Why standardize features before Lasso?"
        scenario={<><em>Discriminating insight:</em> uniform penalty per coefficient means non-uniform penalty per unit-of-feature when scales differ. Your team trains Lasso on a mix of dollars, counts, and percentages; small-scale features keep getting zeroed.</>}
        options={[
          {key:"a", text:"The penalty α·|wⱼ| applies the same α to every coefficient, so features measured on larger scales are penalized less per real-world unit.", correct:true},
          {key:"b", text:"Standardization changes the loss landscape from non-convex to convex, which is required for Lasso to converge."},
          {key:"c", text:"It removes the intercept from the model, which is what enables the absolute-value penalty to apply cleanly to every coefficient."},
          {key:"d", text:"Standardization is needed only when using coordinate descent; proximal gradient methods are scale-invariant by construction."},
        ]}
        trap={<>(b) Lasso is convex regardless of scaling. (c) confuses standardization with intercept handling. (d) wrong — both methods are scale-sensitive.</>}
        lens={<>The penalty treats every <code>|wⱼ|</code> identically. If feature j is measured in millimetres and feature k in kilometres, the same predictive impact is encoded by a 10⁶× larger coefficient for j — and gets penalized 10⁶× more. Z-score every column first.</>}
        stretch={<>Why is the intercept typically excluded from the L1 penalty?</>}
      />

      <VIS.TrapProblem
        id="l1-q9"
        difficulty="hard"
        title="Q9 — Two L1 models with the same support, different magnitudes — why?"
        scenario={<><em>Discriminating insight:</em> Lasso's bias acts on retained coefficients themselves, distinct from selection variability. You refit ordinary least squares on the support that Lasso selected. The coefficient magnitudes grow noticeably.</>}
        options={[
          {key:"a", text:"OLS overfits the support and inflates magnitudes; the Lasso magnitudes are closer to the truth on the selected features."},
          {key:"b", text:"Standardization rescales Lasso coefficients but leaves OLS coefficients unchanged, so the visible scales differ even when the truths match."},
          {key:"c", text:"The discrepancy is a numerical artifact of coordinate descent stopping before full convergence on the active set."},
          {key:"d", text:"Lasso introduces a bias toward zero on the retained coefficients; refitting OLS on the support removes that shrinkage bias.", correct:true},
        ]}
        trap={<>(a) gets the direction of bias backwards. (b) confuses scale-of-display with bias. (c) blames the optimizer for a structural property of the estimator.</>}
        lens={<>Lasso shrinks every surviving coefficient toward zero — that's the "shrinkage" half of LASSO. Refitting OLS on the active set is the standard de-biasing trick (sometimes called Relaxed Lasso). You keep the sparsity pattern but recover unbiased magnitudes.</>}
        stretch={<>When would you deliberately skip the debiasing step in a high-noise setting?</>}
      />

      <VIS.TrapProblem
        id="l1-q10"
        difficulty="medium"
        title="Q10 — What is the proximal operator of α·|w|?"
        scenario={<><em>Discriminating insight:</em> the soft-threshold operator is the closed-form prox of L1, and it explains the exact-zero behavior at every iteration. A practitioner implementing ISTA from scratch needs the per-step update for the L1 part.</>}
        options={[
          {key:"a", text:"Identity-minus-step: w − α·sign(w), applied unconditionally to every coordinate."},
          {key:"b", text:"The hard-threshold: keep w if |w| > α, else set w to zero — this matches the geometric corner story exactly."},
          {key:"c", text:"The soft-threshold: sign(w) · max(|w| − α, 0), which shrinks toward zero and snaps anything inside ±α to exactly zero.", correct:true},
          {key:"d", text:"The sigmoid σ(w/α), which smoothly interpolates between zero and w as α decreases."},
        ]}
        trap={<>(a) is what you might guess from differentiating |w| naively. (b) is the prox of the L0 "norm", not L1. (d) is unrelated to convex proximal calculus.</>}
        lens={<>Soft-thresholding: <code>prox_{`{α|·|}`}(w) = sign(w)·max(|w|−α, 0)</code>. Anything inside the band <code>[-α, α]</code> snaps to zero; everything else moves α closer to zero. ISTA = gradient step on the smooth loss, then per-coordinate soft-threshold.</>}
        stretch={<>What does the prox look like for the group-Lasso penalty?</>}
      />

      <VIS.TrapProblem
        id="l1-q11"
        difficulty="medium"
        title="Q11 — Why does the Lasso path show some coefficients re-enter the model?"
        scenario={<><em>Discriminating insight:</em> path non-monotonicity arises from correlated active-set swaps rather than numerical noise. You plot the regularization path of coefficients as α decreases and notice a feature that left the active set returns later.</>}
        options={[
          {key:"a", text:"Numerical noise from the coordinate-descent solver — the path should be monotone in exact arithmetic."},
          {key:"b", text:"Coefficient sign flips due to floating-point loss of precision near the kink at zero."},
          {key:"c", text:"Active-set swaps as correlated features trade places when the relative penalty cost changes along the path.", correct:true},
          {key:"d", text:"An artifact of the warm-start strategy; cold-starting at each α removes the re-entry behavior entirely."},
        ]}
        trap={<>(a) and (b) blame the solver for an inherent property. (d) confuses an efficiency trick with a structural property.</>}
        lens={<>The Lasso solution path is piecewise-linear in α but the active set evolves non-monotonically. As α drops, correlated features can trade places in the active set; LARS makes the breakpoints explicit. The re-entries are real, not numerical.</>}
        stretch={<>What property of the design matrix guarantees a monotone path?</>}
      />

      <VIS.TrapProblem
        id="l1-q12"
        difficulty="medium"
        title="Q12 — Choosing α: which validation procedure?"
        scenario={<><em>Discriminating insight:</em> the right α depends on out-of-sample error rather than in-sample loss or sparsity targets. A junior engineer asks how to pick α for production deployment.</>}
        options={[
          {key:"a", text:"Pick the α that maximizes the count of zeroed coefficients on the training set."},
          {key:"b", text:"Pick the α whose Lasso training loss equals the OLS training loss on a tiny validation subset."},
          {key:"c", text:"Use k-fold cross-validation on the original training data and pick the α that minimizes mean out-of-fold loss.", correct:true},
          {key:"d", text:"Pick the α at which the regularization path first stabilizes its active set across five resamples of the test set."},
        ]}
        trap={<>(a) optimizes the wrong objective — sparsity is a feature, not a target. (b) ties tuning to training loss equality, an arbitrary criterion. (d) leaks the test set into model selection.</>}
        lens={<>K-fold CV on the training data is the standard. Pick α minimizing out-of-fold loss; report final performance on a fully held-out test set. Some authors prefer the "1-SE rule": the most regularized α within one standard error of the CV minimum, for a parsimonious model.</>}
        stretch={<>When would AIC/BIC on the Lasso be preferred over CV?</>}
      />

      <VIS.TrapProblem
        id="l1-q13"
        difficulty="hard"
        title="Q13 — When does L2 strictly beat L1 on test error?"
        scenario={<><em>Discriminating insight:</em> dense-truth regimes punish L1's sparsity bias. You compare Lasso and Ridge on a controlled simulation; Ridge wins on test MSE.</>}
        options={[
          {key:"a", text:"L1 always beats L2 when features outnumber samples, so the result must be a bug in the simulation."},
          {key:"b", text:"The true coefficient vector is dense — every feature carries some signal — so L1's pressure to zero coefficients introduces unnecessary bias.", correct:true},
          {key:"c", text:"Ridge is computationally faster, so its CV-selected hyperparameter is better tuned than the L1 hyperparameter."},
          {key:"d", text:"Ridge uses orthogonal features by default, which gives it an unfair structural advantage over Lasso."},
        ]}
        trap={<>(a) overclaims L1's universality. (c) confuses optimization speed with statistical efficiency. (d) invents an "orthogonal features by default" property that doesn't exist.</>}
        lens={<>L1's inductive bias is "most weights are zero." In a dense-truth world, zeroing coefficients costs predictive signal that L2 keeps. The bias of L1 dominates; the variance reduction of L2 is enough to win. Choose the regularizer that matches your prior about the truth.</>}
        stretch={<>What does Elastic Net buy you in this regime?</>}
      />

      <VIS.TrapProblem
        id="l1-q14"
        difficulty="medium"
        title="Q14 — Bayesian interpretation of the L1 penalty"
        scenario={<><em>Discriminating insight:</em> Laplace prior corresponds to L1, distinct from the Gaussian prior of L2. A colleague says all regularizers are equivalent to Gaussian priors; you push back specifically on Lasso.</>}
        options={[
          {key:"a", text:"L1 corresponds to a Gaussian prior with mean zero and a variance that scales inversely with α."},
          {key:"b", text:"L1 corresponds to a horseshoe prior, whose half-Cauchy mixing distribution induces sparsity by construction."},
          {key:"c", text:"L1 corresponds to a uniform prior on the L1 ball of radius t, equivalent to the hard constraint form."},
          {key:"d", text:"L1 corresponds to a Laplace (double-exponential) prior on each coefficient, peaked at zero with heavier tails than Gaussian.", correct:true},
        ]}
        trap={<>(a) is the Ridge prior. (b) names a real sparsity-inducing prior but a different one from L1. (c) confuses MAP with a flat prior; the constraint form has its own dual representation while the penalty form is Laplace MAP.</>}
        lens={<>Adding <code>α·|w|</code> to the negative log-likelihood is equivalent to MAP estimation under a Laplace prior <code>p(w) ∝ exp(−α·|w|)</code> on each coefficient. The Laplace peak at zero is what produces sparse MAP estimates; horseshoe priors do similar work with different tail behavior.</>}
        stretch={<>What's the prior corresponding to Elastic Net?</>}
      />

      <VIS.TrapProblem
        id="l1-q15"
        difficulty="hard"
        title="Q15 — Subgradient at zero: which set?"
        scenario={<><em>Discriminating insight:</em> the subdifferential of |w| at zero is the interval [-1, 1] rather than a single value. A candidate is asked to characterize optimality of a coefficient that Lasso has set to zero.</>}
        options={[
          {key:"a", text:"The subgradient at zero is the singleton {0}, the natural limit of derivatives from either side."},
          {key:"b", text:"The subgradient at zero is the open interval (-1, 1); the closed endpoints correspond to non-stationary points."},
          {key:"c", text:"The subgradient at zero is empty because the absolute-value function is not classically differentiable there."},
          {key:"d", text:"The subgradient at zero is the closed interval [-1, 1]; optimality requires the negative data-fit gradient to lie in α times this interval.", correct:true},
        ]}
        trap={<>(a) averages the two one-sided slopes, which loses the set structure. (b) excludes endpoints that the convex-analysis definition includes. (c) confuses non-differentiable with non-subdifferentiable.</>}
        lens={<>For <code>f(w) = |w|</code>, the subdifferential at zero is <code>[−1, 1]</code>. KKT optimality at <code>wⱼ = 0</code> reads <code>−∂L_fit/∂wⱼ ∈ α·[−1, 1]</code> — the data-fit gradient must fit inside the penalty's slack interval, which is exactly the condition for the coordinate to stay zero.</>}
        stretch={<>How does this KKT condition map onto the soft-threshold formula?</>}
      />

      <VIS.TrapProblem
        id="l1-q16"
        difficulty="medium"
        title="Q16 — What does Elastic Net add over Lasso on correlated features?"
        scenario={<><em>Discriminating insight:</em> grouping effect comes from the L2 term in addition to L1's sparsity. A team that depends on stable feature selection for downstream reporting switches from Lasso to Elastic Net.</>}
        options={[
          {key:"a", text:"It combines L1 with L2; the L2 term induces a grouping effect that splits coefficients across correlated features rather than picking one arbitrarily.", correct:true},
          {key:"b", text:"It replaces the L1 penalty with an L2 penalty, so it stops zeroing coefficients entirely while retaining shrinkage."},
          {key:"c", text:"It uses orthogonalization of features as a preprocessing step, removing correlation entirely before applying L1."},
          {key:"d", text:"It applies L1 to coefficient magnitudes and L2 to coefficient signs, which stabilizes which features survive across resamples."},
        ]}
        trap={<>(b) misses that Elastic Net still produces sparsity. (c) invents a preprocessing step that isn't part of Elastic Net. (d) splits L1/L2 across magnitudes and signs in a way no estimator does.</>}
        lens={<>Elastic Net's loss is <code>L_fit + α·(ρ·||w||₁ + (1−ρ)/2 · ||w||²₂)</code>. The L2 term grouping pulls correlated features toward each other; the L1 term still produces sparsity. You trade a tunable ρ for stable selection on correlated columns.</>}
        stretch={<>How do you tune both α and ρ together?</>}
      />

      <VIS.TrapProblem
        id="l1-q17"
        difficulty="hard"
        title="Q17 — Why does adding L1 to a deep network rarely zero weights cleanly?"
        scenario={<><em>Discriminating insight:</em> Adam-style adaptive optimizers smear the kink; the geometry argument needs a clean proximal step. Your team trains a Transformer with L1 added to the loss and finds weights are small but stay slightly above zero.</>}
        options={[
          {key:"a", text:"Mini-batch noise alone is sufficient to prevent any L1 estimator from producing exact zeros, regardless of optimizer choice."},
          {key:"b", text:"Adaptive optimizers like Adam scale gradients per parameter and add momentum, so they never sit a weight exactly on the kink the way coordinate descent does.", correct:true},
          {key:"c", text:"Deep networks have non-convex losses, which makes the L1 penalty itself non-convex and therefore unable to zero weights."},
          {key:"d", text:"Float32 representation rounds all small-magnitude weights to nonzero values, so exact zeros are impossible in modern frameworks."},
        ]}
        trap={<>(a) overgeneralizes — proximal-SGD does produce exact zeros even with mini-batch noise. (c) confuses convexity of the penalty with convexity of the overall loss. (d) is factually wrong — float32 represents zero exactly.</>}
        lens={<>L1 is still convex even when the overall loss isn't, but adaptive optimizers smear the gradient through a per-parameter scaling and momentum buffer. There's no clean snap onto the axis. Use proximal-SGD or a hard pruning step if you want true sparsity in a deep network.</>}
        stretch={<>How does this connect to the "magnitude pruning + finetune" practice in model compression?</>}
      />

      <VIS.TrapProblem
        id="l1-q18"
        difficulty="medium"
        title="Q18 — Logistic regression with L1: what survives the penalty?"
        scenario={<><em>Discriminating insight:</em> L1's geometric argument applies to the parameter space rather than the loss family. A classmate insists L1 only produces sparsity for squared-error regression.</>}
        options={[
          {key:"a", text:"Sparsity is specific to squared-error regression and disappears for any other likelihood, including logistic."},
          {key:"b", text:"Logistic + L1 produces sparsity only when classes are perfectly separable; otherwise the kink at zero is smoothed out by the log-likelihood."},
          {key:"c", text:"Logistic + L1 produces exact-zero coefficients for the same geometric reason as Lasso: the L1 ball's corners sit on the axes regardless of the data-fit term.", correct:true},
          {key:"d", text:"Sparsity occurs but is much weaker because the logistic gradient never exceeds 1 in magnitude, so the soft-threshold rarely activates."},
        ]}
        trap={<>(a) confines L1's argument to one likelihood. (b) injects a separability condition that doesn't apply. (d) confuses gradient magnitude with whether the optimum sits at a corner.</>}
        lens={<>The geometric argument is about the constraint set, not the data-fit loss. Any convex smooth loss combined with the L1 ball produces tangencies at the diamond's corners, hence exact zeros. Scikit-learn's <code>LogisticRegression(penalty="l1")</code> uses exactly this.</>}
        stretch={<>Why is the path piecewise-linear for Lasso but piecewise-smooth for L1 logistic?</>}
      />

      <VIS.TrapProblem
        id="l1-q19"
        difficulty="hard"
        title="Q19 — Stability selection: what does it fix?"
        scenario={<><em>Discriminating insight:</em> the instability fixed is selection variability rather than coefficient bias or convergence. You wrap Lasso in Meinshausen and Bühlmann's stability-selection procedure for a high-stakes genomics paper.</>}
        options={[
          {key:"a", text:"It reduces the bias of coefficient magnitudes by averaging across bootstrap fits, similar to bagging."},
          {key:"b", text:"It accelerates convergence of coordinate descent by warm-starting from bootstrap-aggregated coefficients."},
          {key:"c", text:"It controls family-wise error rate over which features Lasso reports as active by aggregating selection frequencies across resamples.", correct:true},
          {key:"d", text:"It replaces Lasso's L1 penalty with a Bayesian model average over L1 and L2 priors, stabilizing predictions."},
        ]}
        trap={<>(a) describes a debiasing intent that stability selection doesn't target. (b) confuses warm-starting with a selection guarantee. (d) invents an averaging procedure unrelated to stability selection.</>}
        lens={<>Stability selection runs Lasso on many subsamples, records the fraction of fits each feature appears in the active set, and reports features whose selection frequency clears a threshold. This controls the expected number of false positives in the active set under mild conditions.</>}
        stretch={<>How does the threshold relate to a familywise-error bound?</>}
      />

      <VIS.TrapProblem
        id="l1-q20"
        difficulty="medium"
        title="Q20 — Group Lasso: when do you reach for it?"
        scenario={<><em>Discriminating insight:</em> structured sparsity at the level of feature groups, distinct from individual-coefficient sparsity. You one-hot-encode a categorical with 17 levels and want the entire categorical either in or out of the model.</>}
        options={[
          {key:"a", text:"Plain Lasso suffices because L1 will keep at most one one-hot column when the variable is uninformative."},
          {key:"b", text:"Group Lasso replaces <code>Σ|wⱼ|</code> with <code>Σ_g ||w_g||₂</code>, zeroing entire groups together rather than picking individual columns inside a group.", correct:true},
          {key:"c", text:"Group Lasso adds an L1 penalty on the group means but lets within-group sparsity follow ordinary Lasso's behavior."},
          {key:"d", text:"Group Lasso applies an L0 penalty per group and an L1 penalty within each group, combining both into a single mixed objective."},
        ]}
        trap={<>(a) misses that plain L1 can keep some one-hot columns and drop others — exactly the behavior you want to avoid. (c) and (d) garble the actual penalty form.</>}
        lens={<>Group Lasso uses <code>Σ_g ||w_g||₂</code> (a sum of L2 norms across groups, not squared). Each group enters or leaves together. The L2-inside-L1 structure means within-group coefficients are smoothly shrunk, but the group is zeroed atomically.</>}
        stretch={<>What's the prox operator of a single group penalty?</>}
      />

      <VIS.TrapProblem
        id="l1-q21"
        difficulty="hard"
        title="Q21 — Adaptive Lasso: what does the weighting fix?"
        scenario={<><em>Discriminating insight:</em> the oracle property — consistent selection without the irrepresentability condition. A reviewer asks why your method beats vanilla Lasso for asymptotic recovery.</>}
        options={[
          {key:"a", text:"It scales α with sample size, allowing the penalty to vanish asymptotically and yield unbiased coefficients."},
          {key:"b", text:"It adapts α per fold during cross-validation, removing variance in the final hyperparameter choice."},
          {key:"c", text:"It learns the weights via a meta-gradient on the validation loss, treating the regularizer as a hyperparameter network."},
          {key:"d", text:"It weights each coefficient's penalty inversely to a pilot estimate, achieving the oracle property without requiring the irrepresentability condition.", correct:true},
        ]}
        trap={<>(a) describes one ingredient (decaying α) but misses the per-coordinate reweighting. (b) describes a CV trick. (c) imports a meta-learning idea that is foreign to adaptive Lasso.</>}
        lens={<>Adaptive Lasso uses <code>α · Σ |wⱼ|/|ŵⱼ|^γ</code> where <code>ŵⱼ</code> is a pilot estimate (typically OLS or Ridge). Coefficients with large pilots are barely penalized; near-zero pilots are crushed. The result: oracle-property consistency without irrepresentability.</>}
        stretch={<>Why must the pilot estimator be root-n consistent?</>}
      />

      <VIS.TrapProblem
        id="l1-q22"
        difficulty="medium"
        title="Q22 — Warm starts along the regularization path"
        scenario={<><em>Discriminating insight:</em> reusing previous solutions exploits piecewise-linearity beyond plain continuity. You compute the full Lasso path over 100 values of α; the production library does it 50× faster than naive cold-starts.</>}
        options={[
          {key:"a", text:"Each α is solved by reusing the solution at the previous α as a warm start; the path is nearly piecewise-linear so updates are tiny.", correct:true},
          {key:"b", text:"The library precomputes a closed-form solution at α = 0 and analytically shifts it for every other α."},
          {key:"c", text:"It batches all α values into a single tensor and solves them in parallel with a custom GPU kernel."},
          {key:"d", text:"It approximates the path by interpolating between two anchor solutions at α_max and α_min."},
        ]}
        trap={<>(b) overpromises closed-form for arbitrary α. (c) is a real optimization but not what gives the path-algorithm its speedup. (d) confuses interpolation with optimization.</>}
        lens={<>The Lasso path is piecewise-linear in α; LARS and glmnet exploit this by warm-starting the optimizer at each α with the previous solution. Most steps move only a handful of coordinates, so total work for the whole path is comparable to a few cold-start fits.</>}
        stretch={<>What breaks warm-starting in logistic Lasso?</>}
      />

      <VIS.TrapProblem
        id="l1-q23"
        difficulty="hard"
        title="Q23 — Lasso for prediction vs Lasso for selection"
        scenario={<><em>Discriminating insight:</em> a model can be a great predictor and an unreliable feature-selector at the same time. Your stakeholder asks if they can read the surviving Lasso features as a causal story.</>}
        options={[
          {key:"a", text:"Yes — any feature with nonzero Lasso coefficient is statistically guaranteed to be causally relevant to the outcome."},
          {key:"b", text:"No, with caveats — Lasso optimizes predictive risk; the active set under correlation and design-matrix violations can be unreliable as a causal claim.", correct:true},
          {key:"c", text:"Yes — Lasso's L1 penalty is equivalent to a causal-discovery procedure as long as cross-validation picks α."},
          {key:"d", text:"No — Lasso's predictions are also unreliable whenever the active set is unstable across resamples."},
        ]}
        trap={<>(a) and (c) overclaim causal interpretation. (d) over-rotates pessimism; prediction can still be good even when selection wobbles.</>}
        lens={<>Selection consistency and predictive accuracy are separate properties. Lasso can give excellent prediction (the convex combination of correlated features it picks may still capture the signal) while picking a different active set every resample. Causal reading requires more (stability selection, knockoffs, domain priors).</>}
        stretch={<>What does the knockoff filter add on top of Lasso for valid selection?</>}
      />

      <VIS.TrapProblem
        id="l1-q24"
        difficulty="medium"
        title="Q24 — KKT conditions for an active L1 coefficient"
        scenario={<><em>Discriminating insight:</em> the data-fit gradient on an active coefficient equals exactly α·sign(w), pinned to that single value rather than the entire interval. You verify your Lasso implementation by checking optimality conditions on the active set.</>}
        options={[
          {key:"a", text:"On the active set the gradient of the data-fit loss equals zero; α plays no role for active coefficients."},
          {key:"b", text:"On the active set the gradient equals α times the magnitude of the active coefficient, scaled by the sample size."},
          {key:"c", text:"On the active set the gradient equals α times the soft-thresholded coefficient itself, recursively."},
          {key:"d", text:"On the active set the gradient of the data-fit loss equals α times the sign of the active coefficient.", correct:true},
        ]}
        trap={<>(a) confuses unregularized OLS with Lasso. (b) invents a magnitude scaling. (c) garbles the soft-threshold's role in the proximal update with the KKT condition.</>}
        lens={<>For active coefficients (<code>wⱼ ≠ 0</code>), KKT says <code>∂L_fit/∂wⱼ = −α·sign(wⱼ)</code>. For inactive ones, <code>|∂L_fit/∂wⱼ| ≤ α</code>. These two together fully characterize a Lasso optimum and are how solvers detect convergence.</>}
        stretch={<>How do these conditions become the soft-threshold update?</>}
      />

      <VIS.TrapProblem
        id="l1-q25"
        difficulty="hard"
        title="Q25 — A practitioner reports L1 helps even when truth is dense — why?"
        scenario={<><em>Discriminating insight:</em> implicit regularization can still reduce variance even when the inductive bias misaligns with the truth. A senior engineer reports L1 generalizes better than no regularization on a dense-truth problem with n ≈ d.</>}
        options={[
          {key:"a", text:"Even when the truth is dense, L1's shrinkage still reduces variance enough to outweigh its bias when n is comparable to d.", correct:true},
          {key:"b", text:"L1 must be silently behaving like L2 because of numerical smoothing inside the optimizer."},
          {key:"c", text:"L1 doesn't actually help on dense truth; the practitioner is reporting a within-noise difference that won't replicate."},
          {key:"d", text:"L1 is equivalent to data augmentation in this regime, which is what's actually doing the work."},
        ]}
        trap={<>(b) invents optimizer behavior. (c) ignores that variance reduction can win on its own. (d) imports an unrelated mechanism.</>}
        lens={<>L1 still applies shrinkage even when it doesn't zero the right coefficients. In the n ≈ d regime, unregularized estimators have high variance; any well-tuned shrinkage helps. The bias-variance tradeoff is the right frame: L1's bias is suboptimal for dense truth but its variance reduction can still net positive at finite n.</>}
        stretch={<>At what n/d ratio would you expect L2 to overtake L1 in this dense-truth regime?</>}
      />

    </VIS.Section>
  </main>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
