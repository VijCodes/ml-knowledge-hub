  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."

  //   options={[

  //     {key:"b", text:"...", correct:true},

  //

  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,

  //

    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    //   single  → string | null
    //   multi   → Set<string>

    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)

        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }

    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Mutual information for feature ranking — fingerprint: mutual-information-for-feature-ranking
const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Fund · Concept"
      title="Mutual information for feature ranking"
      subtitle={<>The non-linear cousin of <VIS.Term def="A correlation coefficient measuring the strength of a linear relationship between two variables, valued in [-1, 1].">Pearson correlation</VIS.Term> — captures any dependence, not just monotone trends, and is zero iff the feature and target are statistically independent.</>}
      byline={[
        {label: "L2", value: "Features"},
        {label: "L3", value: "Mutual information"},
        {label: "API", value: "sklearn.feature_selection.mutual_info_classif"},
      ]}/>

    <VIS.TLDR>
      <VIS.Term def="A measure of statistical dependence between two random variables. Equals zero iff they are independent; grows as one becomes more predictable from the other. Measured in nats (natural log) or bits (log base 2).">Mutual information (MI)</VIS.Term>{" "}
      between a feature <code>X</code> and the target <code>Y</code> is the <VIS.Term def="The expected log-ratio of two probability distributions; quantifies how distinguishable they are. Always non-negative; zero iff the two distributions are equal.">KL divergence</VIS.Term> between the joint <code>p(x,y)</code> and the product of marginals <code>p(x)p(y)</code>. It quantifies how far the pair is from being independent and catches any non-linear, non-monotone dependence that Pearson misses entirely.
    </VIS.TLDR>

    <VIS.Section id="sec-thought" title="A scenario you can simulate in your head">
      <p>
        Imagine you have a tabular dataset with 50 candidate <VIS.Term def="A column of measurements (a single input variable) used to predict the target.">features</VIS.Term> and a binary <VIS.Term def="The variable you want to predict — the label or response.">target</VIS.Term> for credit-default prediction. Feature <code>X₁</code> is monthly income — roughly linear with default risk. Feature <code>X₂</code> is age — U-shaped: very young and very old applicants both default more than middle-aged ones. Feature <code>X₃</code> is a random hash — pure noise.
      </p>
      <p>
        If you rank features by <VIS.Term def="The signed strength of a linear association between two variables; the standardized covariance.">Pearson correlation</VIS.Term> with the target, <code>X₁</code> scores high, <code>X₃</code> scores near zero, and <code>X₂</code> ALSO scores near zero — because the upward arm and the downward arm cancel. You would discard age. That's a bug, not a feature: age is one of your strongest predictors. <VIS.Term def="A measure of dependence between two random variables. MI(X,Y) = 0 iff X and Y are statistically independent. Captures non-linear relationships that correlation misses.">Mutual information</VIS.Term> ranks age above noise, regardless of the shape of the relationship.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  D["Tabular data<br/>50 features, target Y"] --> P["Score features"]
  P --> R1["Pearson correlation"]
  P --> R2["Mutual information"]
  R1 --> O1["Misses U-shaped age<br/>Misses Y = X squared"]
  R2 --> O2["Catches any dependence<br/>linear or not"]
  style O1 fill:#fee2e2,stroke:#dc2626
  style O2 fill:#dcfce7,stroke:#16a34a
      `}/>
      <p style={{color:"#475569", fontSize:14}}>The decision is whether to keep a feature on the basis of "does Y vary when X varies" — not on the basis of a specific functional shape.</p>
    </VIS.Section>

    <VIS.Section id="sec-define" title="The formal definition">
      <p>
        Mutual information is the <VIS.Term def="The expected log-ratio of two probability distributions; quantifies how distinguishable they are. Always non-negative; zero iff the two distributions are equal.">Kullback-Leibler divergence</VIS.Term> between the <VIS.Term def="The probability distribution over pairs (x, y) — how often each combination of feature value and target value appears.">joint distribution</VIS.Term> <code>p(x,y)</code> and the product of <VIS.Term def="The probability distribution of a single variable obtained by summing or integrating the joint over the other. p(x) ignores y; p(y) ignores x.">marginals</VIS.Term> <code>p(x)p(y)</code>:
      </p>
      <VIS.Equation display tex="I(X;Y) \;=\; \int\!\!\int p(x,y)\,\log\!\frac{p(x,y)}{p(x)\,p(y)}\,dx\,dy"/>
      <p>
        For discrete variables, replace the integrals with sums. Read the integrand pointwise: when <code>p(x,y)</code> equals <code>p(x)p(y)</code> the log is zero, contributing nothing. When the joint is larger than the product of marginals at a point — that pair co-occurs more than independence would predict — the contribution is positive. MI sums these signed surprises, weighted by how often each pair actually shows up.
      </p>
      <p>
        Equivalent expressions, each a different lens. As an <VIS.Term def="A measure of uncertainty in a probability distribution. High entropy = uniform / unpredictable; low entropy = peaked / predictable. Measured in nats or bits.">entropy</VIS.Term> reduction:
      </p>
      <VIS.Equation display tex="I(X;Y) \;=\; H(Y) - H(Y\mid X) \;=\; H(X) - H(X\mid Y)"/>
      <p>
        Reading it left-to-right: MI is how much uncertainty about <code>Y</code> drops when you observe <code>X</code>. If <code>X</code> tells you nothing new about <code>Y</code>, <code>H(Y\|X) = H(Y)</code> and MI is zero. If <code>X</code> determines <code>Y</code>, <code>H(Y\|X) = 0</code> and MI equals <code>H(Y)</code> — its maximum.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-properties" title="Properties you'll actually use">
      <VIS.Mermaid chart={`
flowchart TB
  MI["I(X;Y)"]
  P1["Non-negative<br/>I(X;Y) >= 0"]
  P2["Symmetric<br/>I(X;Y) = I(Y;X)"]
  P3["Zero iff independent<br/>X perp Y"]
  P4["Invariant to monotone<br/>transforms of X or Y"]
  MI --> P1
  MI --> P2
  MI --> P3
  MI --> P4
  style P3 fill:#dbeafe,stroke:#1d4ed8
  style P4 fill:#fef3c7,stroke:#d97706
      `}/>
      <p>
        The <strong>monotone-invariance</strong> property is the practical superpower: scaling, log-transforming, or rank-transforming a feature does NOT change its MI with the target. Pearson r flips wildly under such transforms; MI doesn't. This is why MI is the standard choice when features arrive on radically different scales (income in dollars, age in years, "has_account" in {0,1}) and you don't want to standardize first.
      </p>
      <p>
        The <strong>zero-iff-independent</strong> property is the strongest statement in this corner of statistics. Pearson r = 0 means "no linear trend." MI = 0 means "no dependence of any kind, anywhere in the joint distribution." The two are not in the same league.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-sklearn" title="Practical use with scikit-learn">
      <VIS.CodeBlock lang="python">{`from sklearn.feature_selection import mutual_info_classif, mutual_info_regression
import pandas as pd

# Classification target (binary or multi-class)
mi_scores = mutual_info_classif(X, y, discrete_features='auto', random_state=0)
ranked = pd.Series(mi_scores, index=X.columns).sort_values(ascending=False)
print(ranked.head(20))

# For continuous targets, use mutual_info_regression instead.
# Both functions return MI in NATS (natural log).`}</VIS.CodeBlock>
      <p>
        Under the hood sklearn uses the <VIS.Term def="A non-parametric estimator that infers entropy from distances to the k-th nearest neighbor of each point. Robust to unknown densities; biased on tiny samples.">Kraskov k-NN entropy estimator</VIS.Term> (Kraskov, Stögbauer & Grassberger 2004) for continuous features. The <code>discrete_features</code> flag tells the estimator which columns are categorical so the right entropy formula is used. Default <code>'auto'</code> treats integer-typed columns as discrete — fine for most tabular pipelines but worth checking on engineered features.
      </p>
      <p>
        Output is a vector of MI scores in <VIS.Term def="The natural unit of information when entropy is computed with the natural log. 1 nat = 1/ln(2) bits ≈ 1.44 bits.">nats</VIS.Term>, one per feature. There is no absolute "good MI" threshold — you compare features against each other (relative ranking) or against a permutation null (statistical significance). A common workflow is to keep features whose MI exceeds the 95th percentile of a <VIS.Term def="A test that shuffles the target column to break any dependence with features, then re-computes the statistic. The shuffled distribution is the null.">permutation null</VIS.Term> built by shuffling <code>y</code>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-watch" title="Watch-outs">
      <VIS.Callout kind="gotcha" title="MI on continuous data is ESTIMATED, not computed">
        For continuous features, the integral above is intractable; sklearn's k-NN estimator approximates it. On small samples (under a few thousand rows) the estimate is noisy enough that the per-feature ranking is unstable run-to-run. <VIS.Term def="Resampling the data with replacement and re-running the statistic to get a confidence interval.">Bootstrap</VIS.Term> the estimate or use it only for top-k selection rather than fine-grained ordering.
      </VIS.Callout>
      <VIS.Callout kind="info" title="MI is a UNIVARIATE filter">
        Like all <VIS.Term def="Feature selection methods that score each feature against the target independently — cheap to compute, blind to feature interactions.">filter methods</VIS.Term>, MI scores each feature alone. Two features that are individually noise but useful together (think XOR of two binary columns) both get dropped. For interaction-aware selection, use a <VIS.Term def="Feature selection methods that wrap a model and evaluate feature subsets by re-fitting; expensive but interaction-aware. Examples: RFE, sequential selection.">wrapper method</VIS.Term> (recursive feature elimination) or an <VIS.Term def="Methods where the model itself yields a feature importance score during training; e.g., gradient-boosted trees, L1-regularized linear models.">embedded method</VIS.Term> (tree feature importance, L1 logistic regression).
      </VIS.Callout>
      <VIS.Callout kind="warn" title="High cardinality inflates MI for discrete features">
        A 1000-unique-value categorical feature can score high MI by sheer overfitting of the empirical joint — the estimator sees each level a handful of times and overestimates the joint density at those points. <VIS.Term def="Sample-size-adjusted MI that subtracts the expected MI under the null of independence. Reduces bias for high-cardinality features.">Adjusted mutual information (AMI)</VIS.Term> or a <VIS.Term def="A correction that subtracts the expected statistic under a chance-only null model from the raw statistic.">chance-adjusted normalization</VIS.Term> fixes this — but sklearn's <code>mutual_info_classif</code> does NOT apply it by default for feature ranking. Be wary of ID-like columns.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to reach for MI">
      <VIS.Mermaid chart={`
flowchart TB
  Q["Need feature ranking?"]
  Q --> A1{"Relationship<br/>monotone and linear?"}
  A1 -->|Yes| P["Pearson r is fine<br/>cheaper to compute"]
  A1 -->|No or unknown| A2{"Many features<br/>need a fast filter?"}
  A2 -->|Yes| MI["Use MI<br/>mutual_info_classif"]
  A2 -->|No, can afford fitting| W["Wrapper or embedded<br/>RFE, tree importance"]
  style MI fill:#dcfce7,stroke:#16a34a
  style P fill:#dbeafe,stroke:#1d4ed8
      `}/>
      <p>
        MI shines as a cheap, model-free first-pass filter for high-dimensional tabular data when the functional form of feature-target dependence is unknown. After MI prunes the obvious noise, run a wrapper or embedded method on the survivors to capture interactions.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-five trap problems spanning definition, properties, estimation, sklearn API, comparison to correlation, and pipeline integration. Each wrong option is a real-but-not-quite-right belief held by someone with about 80% understanding; the correct option is also a single belief. Reveal the lens after committing to an answer.
      </p>

      <VIS.TrapProblem
        id="mi-q1"
        difficulty="medium"
        title="Q1 — What does I(X;Y) = 0 imply?"
        scenario={<><em>Discriminating insight:</em> what is the precise statement when mutual information equals zero? You are answering a fundamentals question at a phone screen.</>}
        options={[
          {key:"a", text:"X and Y are uncorrelated in the Pearson sense — their covariance is zero but they may still be statistically dependent."},
          {key:"b", text:"X and Y have the same marginal distribution but happen to be sampled from disjoint regions of their support."},
          {key:"c", text:"X and Y are deterministically related but the relationship is constant, so observing one tells you nothing new about the other."},
          {key:"d", text:"X and Y are statistically independent: the joint distribution factorizes exactly as p(x,y) = p(x)p(y).", correct:true},
        ]}
        trap={<>(a) confuses zero correlation with zero MI — correlation can be zero while MI is large (the U-shape case). (b) is a fabricated story unrelated to the definition. (c) describes a constant function, which still has MI = 0 only because there is no variation, but the framing is wrong.</>}
        lens={<>MI = 0 iff p(x,y) = p(x)p(y) everywhere — full statistical independence. This is the strongest such statement in elementary probability. Correlation = 0 is a much weaker statement.</>}
        stretch={<>Construct two variables with Pearson r exactly zero and MI as large as you like.</>}
      />

      <VIS.TrapProblem
        id="mi-q2"
        difficulty="medium"
        title="Q2 — Pearson r vs MI on Y = X²"
        scenario={<><em>Discriminating insight:</em> X is uniform on [-1, 1] and Y = X². What do Pearson correlation and MI report?</>}
        options={[
          {key:"a", text:"Pearson r is zero by symmetry; MI is large (in fact maximal given H(Y)) because Y is fully determined by X.", correct:true},
          {key:"b", text:"Pearson r is close to 1 because Y is a deterministic function of X; MI is also close to its maximum because the relationship is exact."},
          {key:"c", text:"Pearson r is around 0.5 because the quadratic creates a moderate linear trend on half the support; MI matches this magnitude."},
          {key:"d", text:"Both are zero because the relationship is non-monotone and neither statistic can detect it without binning the data first."},
        ]}
        trap={<>(b) ignores the symmetry: the positive and negative arms cancel in the covariance. (c) invents a moderate r number. (d) is wrong about MI — MI requires no binning and detects exactly this case.</>}
        lens={<>By symmetry E[XY] = 0 so Pearson r = 0, even though Y is a deterministic function of X. MI is H(Y) because given X you know Y exactly. This is the canonical "MI catches what Pearson misses" demonstration.</>}
        stretch={<>What if X is uniform on [0, 1] instead of [-1, 1]? Does Pearson r stay at zero?</>}
      />

      <VIS.TrapProblem
        id="mi-q3"
        difficulty="medium"
        title="Q3 — Units of mutual information"
        scenario={<><em>Discriminating insight:</em> what does the unit of MI depend on? You are reading a paper that reports MI = 0.47 between two features.</>}
        options={[
          {key:"a", text:"MI is dimensionless and the number 0.47 is comparable across any two papers regardless of how the authors computed it."},
          {key:"b", text:"MI is in the same units as Y itself (dollars, years, etc.) since it inherits dimension from the variable being predicted."},
          {key:"c", text:"MI is always in bits because information theory was developed for binary communication channels."},
          {key:"d", text:"MI is in bits if the log base is 2 and in nats if the log base is e; sklearn reports nats by default. 1 nat ≈ 1.44 bits.", correct:true},
        ]}
        trap={<>(a) ignores the log base. (b) confuses information units with the variable's physical units. (c) is the textbook Shannon convention but not how scikit-learn or most ML libraries report it.</>}
        lens={<>MI's unit comes from the log base. sklearn's mutual_info_* functions use natural log → nats. Multiply by 1/ln(2) ≈ 1.44 to convert to bits. Always check the docstring before comparing across libraries.</>}
        stretch={<>Why do information theorists prefer bits while ML practitioners often work in nats?</>}
      />

      <VIS.TrapProblem
        id="mi-q4"
        difficulty="hard"
        title="Q4 — Why is MI symmetric in its arguments?"
        scenario={<><em>Discriminating insight:</em> what algebraic property makes I(X;Y) = I(Y;X)? You are deriving the equation on a whiteboard.</>}
        options={[
          {key:"a", text:"It is symmetric only when X and Y have the same support; otherwise asymmetric terms remain after integration."},
          {key:"b", text:"It is symmetric because the KL divergence is symmetric in its two arguments, so any KL-based quantity inherits symmetry."},
          {key:"c", text:"It is approximately symmetric for large samples by the law of large numbers but exact symmetry requires infinite data."},
          {key:"d", text:"The integrand log[p(x,y) / (p(x)p(y))] is symmetric under swapping x and y, and the joint p(x,y) is also symmetric, so the integral is unchanged.", correct:true},
        ]}
        trap={<>(a) is wrong — symmetry holds regardless of supports. (b) is the trap-of-the-day — KL divergence is famously asymmetric in its two arguments; MI's symmetry comes from a different algebraic argument. (c) confuses estimator behavior with the population quantity.</>}
        lens={<>The integrand is symmetric in (x, y) because p(x,y) = p(y,x) and the denominator p(x)p(y) is symmetric. Note this does NOT follow from KL symmetry — KL is asymmetric in its two arguments. MI's symmetry is structural, not inherited.</>}
        stretch={<>How does this symmetry interact with the directed-information generalization used in time series?</>}
      />

      <VIS.TrapProblem
        id="mi-q5"
        difficulty="medium"
        title="Q5 — What does mutual_info_classif assume about feature types?"
        scenario={<><em>Discriminating insight:</em> a teammate passes a mixed-type DataFrame (some categorical, some continuous) to sklearn's MI function. What happens?</>}
        options={[
          {key:"a", text:"It silently converts everything to one-hot encodings and computes MI on the resulting binary columns; the original feature ranking is lost."},
          {key:"b", text:"It treats every column as continuous and applies the k-NN estimator uniformly, which is statistically correct but slower."},
          {key:"c", text:"It raises a ValueError because MI requires either fully continuous or fully discrete inputs; you must split the DataFrame and call it twice."},
          {key:"d", text:"The discrete_features parameter controls the assumption; 'auto' treats integer dtypes as discrete and others as continuous, applying different entropy estimators per column.", correct:true},
        ]}
        trap={<>(a) is fabricated behavior. (b) ignores the discrete_features parameter, which is exactly the knob designed for this case. (c) overstates the constraint — the function handles mixed types.</>}
        lens={<>discrete_features='auto' inspects dtype: integer columns get the discrete formula, others get the k-NN estimator. For engineered features that are stored as floats but logically discrete (e.g., one-hot floats), pass an explicit boolean mask.</>}
        stretch={<>What goes wrong if you mark a continuous column as discrete=True?</>}
      />

      <VIS.TrapProblem
        id="mi-q6"
        difficulty="hard"
        title="Q6 — Why does high cardinality inflate MI?"
        scenario={<><em>Discriminating insight:</em> a 10,000-unique-value categorical column (user_id) scores higher MI than every real feature. What is happening?</>}
        options={[
          {key:"a", text:"User IDs genuinely encode user-level preferences that are highly predictive of any target; the MI score is statistically valid."},
          {key:"b", text:"With many levels each seen few times, the empirical joint p(x,y) overfits the sample, inflating MI even when X and Y are population-level independent.", correct:true},
          {key:"c", text:"The k-NN estimator has a known bug on integer columns above 1000 unique values; downgrade scikit-learn to fix it."},
          {key:"d", text:"High-cardinality columns increase H(X), and MI is bounded above by H(X), so the maximum possible MI is just larger; this is desired behavior."},
        ]}
        trap={<>(a) sometimes is true (real leakage) but the inflation happens even on independent data. (c) invents a bug. (d) confuses the population bound with the estimator's bias on finite samples.</>}
        lens={<>For population-independent X and Y, sample-based MI on a high-cardinality X is non-zero and grows with cardinality at fixed sample size. The fix is a chance-adjusted variant (adjusted MI) or simply excluding ID-like columns from filter selection.</>}
        stretch={<>What does the expected MI under independence (E[I] under permutation null) scale like in cardinality?</>}
      />

      <VIS.TrapProblem
        id="mi-q7"
        difficulty="medium"
        title="Q7 — Monotone transforms and MI"
        scenario={<><em>Discriminating insight:</em> you log-transform a feature before passing it to mutual_info_classif. What changes?</>}
        options={[
          {key:"a", text:"The MI score increases because the log-transform makes the distribution more Gaussian, which the k-NN estimator handles better."},
          {key:"b", text:"The MI score decreases by a factor proportional to the variance shrinkage from the log; you must un-shrink to recover the true population MI."},
          {key:"c", text:"The MI score is unchanged in the population; sample estimates may shift slightly due to k-NN's distance metric being scale-sensitive.", correct:true},
          {key:"d", text:"The MI score is undefined after a log because the integral diverges at zero; you must shift the data away from the origin first."},
        ]}
        trap={<>(a) and (b) attribute behavior to the estimator that the population MI doesn't have. (d) is wrong — even though log(0) diverges, the integral can still be finite over the variable's support.</>}
        lens={<>Population MI is invariant under any invertible (in particular monotone) transform of either argument. The k-NN estimator's small-sample behavior depends on the metric, so log-transforming may produce small numerical differences but not change the rank order.</>}
        stretch={<>Is MI also invariant under one-to-one transforms that are NOT monotone? (Hint: yes.)</>}
      />

      <VIS.TrapProblem
        id="mi-q8"
        difficulty="hard"
        title="Q8 — MI as a univariate filter — what does it miss?"
        scenario={<><em>Discriminating insight:</em> what kind of useful feature combination is invisible to per-feature MI ranking? You are auditing a filter-only feature selection pipeline.</>}
        options={[
          {key:"a", text:"Features whose individual MI with Y is zero but whose joint MI with Y is large — classic XOR-style interactions, including any pair where Y depends on X1 XOR X2.", correct:true},
          {key:"b", text:"Features whose MI with Y is large but redundant with another high-MI feature; filter MI cannot detect redundancy across columns."},
          {key:"c", text:"Features that are causally upstream of Y but mediated by an unobserved confounder; MI is only correlational so causal structure is invisible."},
          {key:"d", text:"Features that have heavy-tailed distributions; the k-NN estimator's bias in the tails systematically under-weights their MI scores."},
        ]}
        trap={<>(b) is also a real limitation but mutual_info_classif still reports both as high; the failure mode is different. (c) is a true statement about MI but not the univariate-filter blind spot. (d) confuses estimator artifacts with the conceptual gap.</>}
        lens={<>The XOR case is the killer: I(X1;Y) = I(X2;Y) = 0 individually, but I(X1,X2;Y) = log 2. Per-feature filters drop both. Joint MI or wrapper/embedded methods are needed to capture interactions.</>}
        stretch={<>How would you efficiently detect such pairs without a quadratic search?</>}
      />

      <VIS.TrapProblem
        id="mi-q9"
        difficulty="medium"
        title="Q9 — MI vs F-score (ANOVA) for classification"
        scenario={<><em>Discriminating insight:</em> sklearn offers both mutual_info_classif and f_classif. When does the choice matter? You are selecting features for a binary classifier on 100k rows.</>}
        options={[
          {key:"a", text:"f_classif is always preferred because it has a known null distribution; MI does not, so its p-values are unreliable for feature selection."},
          {key:"b", text:"They give nearly identical rankings on any real dataset because both ultimately measure linear separability between class means."},
          {key:"c", text:"f_classif assumes Gaussian within-class distributions and measures mean separation; MI is distribution-free and captures non-linear or non-Gaussian dependence.", correct:true},
          {key:"d", text:"MI is preferred only for multi-class targets; for binary classification f_classif is mathematically equivalent and cheaper to compute."},
        ]}
        trap={<>(a) overstates f_classif's reliability — its assumptions are routinely violated. (b) confuses two genuinely different statistics. (d) is fabricated; both work for binary and multi-class.</>}
        lens={<>f_classif is a one-way ANOVA F-statistic: ratio of between-class variance to within-class variance, assuming Gaussian within-class. MI makes no distributional assumption. Use MI when class-conditional distributions are skewed, multi-modal, or unknown.</>}
        stretch={<>What does chi2 measure that's different from both?</>}
      />

      <VIS.TrapProblem
        id="mi-q10"
        difficulty="hard"
        title="Q10 — MI estimation: what is the Kraskov estimator doing?"
        scenario={<><em>Discriminating insight:</em> what mathematical trick lets the k-NN estimator approximate MI without binning? You are reviewing the Kraskov, Stögbauer, Grassberger 2004 algorithm.</>}
        options={[
          {key:"a", text:"It bins the data adaptively using a histogram with bin widths chosen to balance bias and variance, then applies the discrete MI formula to the bins."},
          {key:"b", text:"It approximates the joint with a kernel density estimate (KDE) and integrates the MI integrand numerically over the data points."},
          {key:"c", text:"It fits a Gaussian copula to the joint and computes the closed-form MI of the copula, which exists analytically for any Gaussian."},
          {key:"d", text:"It estimates each entropy term H(X), H(Y), H(X,Y) from the distance to the k-th nearest neighbor of each point; differences of these estimates give MI.", correct:true},
        ]}
        trap={<>(a) describes histogram-based MI, an older approach. (b) describes KDE-based MI, also different. (c) is the Gaussian-copula method, a different technique. The k-NN method avoids all of those.</>}
        lens={<>Kraskov: for each point, find its k-th nearest neighbor distance in joint space, then count neighbors within that distance along each marginal axis. Differences of digamma functions of these counts give MI directly — no density estimation, no binning.</>}
        stretch={<>How does the choice of k trade off bias vs variance in the estimator?</>}
      />

      <VIS.TrapProblem
        id="mi-q11"
        difficulty="medium"
        title="Q11 — Effect of sample size on MI estimates"
        scenario={<><em>Discriminating insight:</em> you re-run mutual_info_classif on a 500-row vs a 50,000-row sample of the same dataset. The MI scores differ. Why?</>}
        options={[
          {key:"a", text:"k-NN entropy estimates are biased upward on small samples; the 500-row estimate is systematically larger than the 50k-row estimate even when both target the same population MI.", correct:true},
          {key:"b", text:"The 500-row sample is more representative of the population because larger samples introduce more noise; trust the smaller estimate."},
          {key:"c", text:"MI estimates have no relationship to sample size; the difference is entirely due to random variation in the row selection."},
          {key:"d", text:"Larger samples make the joint distribution more peaked, which decreases the entropy and therefore decreases MI; both estimates are valid for their sample size."},
        ]}
        trap={<>(b) is contrary to standard sampling theory. (c) ignores estimator bias. (d) conflates population MI with sample MI.</>}
        lens={<>k-NN entropy estimators have a finite-sample upward bias that decreases as 1/N. Always report sample size alongside MI scores. For run-to-run stability tests, bootstrap or compare against a permutation null at the same N.</>}
        stretch={<>Why does bias decrease as 1/N? (Hint: leading-order term in the bias expansion.)</>}
      />

      <VIS.TrapProblem
        id="mi-q12"
        difficulty="medium"
        title="Q12 — Normalized MI: when is it appropriate?"
        scenario={<><em>Discriminating insight:</em> you want to compare MI scores across datasets with different target entropies. Raw MI is misleading. What do you use?</>}
        options={[
          {key:"a", text:"Cohen's kappa between the feature and the target after both have been thresholded at their medians; this normalizes for marginal balance."},
          {key:"b", text:"Pearson r between the feature and the target after the feature has been rank-transformed; this combines monotone-invariance with [-1, 1] bounding."},
          {key:"c", text:"Cross-entropy loss of a logistic regression trained on the feature alone; this is the natural ML normalization."},
          {key:"d", text:"Normalized MI such as I(X;Y) / sqrt(H(X) H(Y)) or I(X;Y) / max(H(X), H(Y)) — bounded in [0, 1] and comparable across datasets with different marginals.", correct:true},
        ]}
        trap={<>(a) is a different statistic for binary agreement. (b) is just Spearman's rho, which is still linear-trend-restricted. (c) measures a different quantity (predictive performance, not pure dependence).</>}
        lens={<>Normalized MI variants — I/sqrt(H(X)H(Y)) (NMI sqrt), I/max(H(X), H(Y)) (NMI max), or 2 I / (H(X)+H(Y)) — all give a [0, 1] number where 1 means perfect dependence. Use sqrt or max for feature-selection comparison.</>}
        stretch={<>Why is NMI(X, Y) generally NOT a metric (no triangle inequality)?</>}
      />

      <VIS.TrapProblem
        id="mi-q13"
        difficulty="hard"
        title="Q13 — MI and causality"
        scenario={<><em>Discriminating insight:</em> a feature has high MI with the target. What does that tell you about causation? You are presenting feature-selection results to a stakeholder who asks "so this drives the outcome?"</>}
        options={[
          {key:"a", text:"High MI implies causation in the limit of infinite samples because spurious correlations vanish asymptotically."},
          {key:"b", text:"High MI implies non-causation, since correlation is necessary but not sufficient for causation and MI is just a stronger form of correlation."},
          {key:"c", text:"MI is a purely associational measure; it tells you the feature and target are statistically dependent but cannot distinguish cause, effect, common cause, or selection bias.", correct:true},
          {key:"d", text:"MI measures the direction of dependence X to Y via the asymmetry I(X;Y) vs I(Y;X), so causal direction is implied."},
        ]}
        trap={<>(a) is wrong about spurious correlation vanishing. (b) inverts the statement. (d) is wrong because MI is symmetric — there is no asymmetry to read direction from.</>}
        lens={<>MI is symmetric and associational. It cannot distinguish X causes Y, Y causes X, common cause Z, or selection bias. For causal feature selection use causal discovery (PC algorithm, do-calculus) or domain knowledge. The stakeholder's question is genuinely answerable only via intervention.</>}
        stretch={<>Read the Pearl ladder of causation. Which rung is MI on?</>}
      />

      <VIS.TrapProblem
        id="mi-q14"
        difficulty="medium"
        title="Q14 — MI on time series features"
        scenario={<><em>Discriminating insight:</em> what subtlety arises when using MI to rank lag features in a time-series setting? You are forecasting sales with 30 lagged features.</>}
        options={[
          {key:"a", text:"Lag features are highly autocorrelated; many of them carry the same signal and MI's univariate filter picks them all as high-scoring redundantly.", correct:true},
          {key:"b", text:"MI cannot be computed on time series because the temporal ordering violates the i.i.d. assumption that underlies the k-NN estimator."},
          {key:"c", text:"MI assigns higher scores to features further in the past because longer-range dependencies have larger information content by definition."},
          {key:"d", text:"MI exactly equals the partial autocorrelation function value at the same lag, making it redundant with classic time-series tools."},
        ]}
        trap={<>(b) overstates the i.i.d. requirement — the estimator works fine, you just have to be careful about validation. (c) is fabricated. (d) confuses MI with PACF.</>}
        lens={<>Univariate MI ranks every lag highly when they're correlated with each other (the autocorrelation chain). Use a wrapper or embedded method (LASSO on lags, tree-based importance) to pick a non-redundant set. Or do MI sequentially with conditional MI.</>}
        stretch={<>What is conditional mutual information I(X;Y|Z) and how does it fix this?</>}
      />

      <VIS.TrapProblem
        id="mi-q15"
        difficulty="hard"
        title="Q15 — Permutation null for MI significance"
        scenario={<><em>Discriminating insight:</em> how do you tell whether a feature's MI score is statistically significant? You have one feature with MI = 0.05 nats and want to decide if it's worth keeping.</>}
        options={[
          {key:"a", text:"Compare to the asymptotic chi-squared distribution of 2N*I under the null of independence; reject if the test statistic exceeds the 95th percentile."},
          {key:"b", text:"Compute MI on a 50% holdout and accept the feature if both halves agree on the score to within 10%; the consistency itself is the significance test."},
          {key:"c", text:"Shuffle the target column to break the dependence, recompute MI, repeat 1000 times to build a null distribution, and check the observed MI's percentile.", correct:true},
          {key:"d", text:"Use Bonferroni correction on the MI score: divide by the number of features tested and accept those above the 0.05/D threshold."},
        ]}
        trap={<>(a) is technically a real test (G-test) but assumes large N and discrete variables. (b) describes a stability check, distinct from a significance test. (d) confuses MI's units with a p-value.</>}
        lens={<>The permutation null is the standard non-parametric significance test for MI: shuffle Y → recompute MI → repeat → compare. It works for any estimator (k-NN, histogram) and any feature type. The 95th-percentile threshold gives a per-feature alpha = 0.05.</>}
        stretch={<>How would you handle multiple-testing correction across 1000 candidate features?</>}
      />

      <VIS.TrapProblem
        id="mi-q16"
        difficulty="medium"
        title="Q16 — MI in a CV pipeline — leakage risk"
        scenario={<><em>Discriminating insight:</em> you compute MI on the full dataset to select features, then run cross-validation on the selected subset. What is wrong with this?</>}
        options={[
          {key:"a", text:"Nothing — MI is a filter method so it cannot leak information across folds the way wrapper methods do."},
          {key:"b", text:"Computing MI on the full dataset (including the held-out folds) uses the target values from the validation set, leaking validation information into selection.", correct:true},
          {key:"c", text:"MI cannot be combined with CV at all because the estimator's bias depends on the sample size, which changes per fold."},
          {key:"d", text:"The risk is small enough to ignore as long as the dataset has more than 10,000 rows; below that, refit the MI scores per fold."},
        ]}
        trap={<>(a) is the trap-of-the-day: filter methods CAN leak if they touch Y outside the training fold. (c) overstates the constraint. (d) hand-waves a real bug away.</>}
        lens={<>Any selection that touches Y (including MI) must live INSIDE the CV loop. Compute MI on the training fold only, apply the resulting feature mask to both train and validation. sklearn's Pipeline + SelectKBest with mutual_info_classif does this correctly when wrapped in cross_val_score.</>}
        stretch={<>What about computing MI on X-only feature interactions (no Y) — still risky?</>}
      />

      <VIS.TrapProblem
        id="mi-q17"
        difficulty="hard"
        title="Q17 — Deterministic transform of a feature: how does MI change?"
        scenario={<><em>Discriminating insight:</em> you transform feature X through a deterministic function f to get X' = f(X), then compute I(X'; Y). How does it compare to I(X; Y)?</>}
        options={[
          {key:"a", text:"I(X'; Y) ≥ I(X; Y) because feature engineering can only add information; that's the whole point of doing it."},
          {key:"b", text:"I(X'; Y) = I(X; Y) regardless of f because MI is invariant under any transform of either argument."},
          {key:"c", text:"I(X'; Y) ≤ I(X; Y) by the data processing inequality; deterministic transforms can only preserve or destroy information, never manufacture it.", correct:true},
          {key:"d", text:"The comparison depends on f's smoothness; smooth transforms preserve MI while discontinuous ones increase it via discretization."},
        ]}
        trap={<>(a) violates the data processing inequality — deterministic transforms cannot manufacture information. (b) is wrong unless f is invertible. (d) is fabricated.</>}
        lens={<>By the data processing inequality, I(X; Y) ≥ I(f(X); Y) for any deterministic f. Invertible f → equality. Lossy f (binning, thresholding, projecting) → strict inequality. Feature engineering helps a MODEL exploit information, but the information itself can only stay the same or decrease.</>}
        stretch={<>Why does adding noise (X' = X + epsilon) decrease MI with Y even though it is a stochastic, rather than deterministic, function of X?</>}
      />

      <VIS.TrapProblem
        id="mi-q18"
        difficulty="medium"
        title="Q18 — Continuous Y in mutual_info_regression"
        scenario={<><em>Discriminating insight:</em> what differs between mutual_info_classif and mutual_info_regression at the algorithm level? You are picking the right one for a continuous target.</>}
        options={[
          {key:"a", text:"They are aliases — mutual_info_regression simply re-exports mutual_info_classif with the discrete_features default flipped."},
          {key:"b", text:"They use different estimators: classif handles a discrete target with a per-class entropy formula, regression uses a fully k-NN-based estimator treating Y as continuous.", correct:true},
          {key:"c", text:"Classif rounds Y to integers before computing MI; regression keeps the float values but applies a Box-Cox transform first."},
          {key:"d", text:"Regression uses the squared-correlation R² as a proxy for MI under a Gaussian assumption; the API is for convenience, not statistical rigor."},
        ]}
        trap={<>(a) is wrong — they are different implementations. (c) and (d) describe behaviors that the functions do not have.</>}
        lens={<>mutual_info_regression treats Y as continuous and uses the Kraskov k-NN estimator on the (X, Y) joint. mutual_info_classif treats Y as a discrete class label and uses a hybrid: for continuous X it conditions on Y's discrete value. Always match the function to your target's type.</>}
        stretch={<>What if Y is integer-valued but you want to treat it as continuous (e.g., count regression)?</>}
      />

      <VIS.TrapProblem
        id="mi-q19"
        difficulty="hard"
        title="Q19 — Upper bound on MI"
        scenario={<><em>Discriminating insight:</em> what is the maximum possible value of I(X; Y) for a given pair? You are sanity-checking an MI score that seems suspiciously large.</>}
        options={[
          {key:"a", text:"MI is unbounded above; very large values indicate strong dependence and there is no theoretical ceiling."},
          {key:"b", text:"MI is bounded above by min(H(X), H(Y)); it cannot exceed the entropy of the less-informative variable.", correct:true},
          {key:"c", text:"MI is bounded above by 1 nat for any pair of variables, regardless of their entropies, by an information-theoretic identity."},
          {key:"d", text:"MI is bounded above by log(N) where N is sample size; this is a finite-sample bound that vanishes in the population limit."},
        ]}
        trap={<>(a) is wrong — there's a tight bound. (c) confuses MI with normalized MI. (d) confuses estimator behavior with the population quantity.</>}
        lens={<>I(X; Y) ≤ min(H(X), H(Y)). When X determines Y (and H(Y) ≤ H(X)), MI achieves H(Y) — its ceiling. If your MI score exceeds the marginal entropy of either variable, you have a bug, an estimator artifact, or you forgot what units you're in.</>}
        stretch={<>What's the corresponding bound for continuous variables where differential entropy can be negative?</>}
      />

      <VIS.TrapProblem
        id="mi-q20"
        difficulty="medium"
        title="Q20 — MI vs information gain in decision trees"
        scenario={<><em>Discriminating insight:</em> what is the relationship between mutual information and the information-gain split criterion in a decision tree? You see both terms thrown around in the same paper.</>}
        options={[
          {key:"a", text:"Information gain is the same as mutual information between the candidate split feature (binarized at the split point) and the target.", correct:true},
          {key:"b", text:"They are unrelated — information gain uses cross-entropy while MI uses KL divergence, and the two coincide only under uniform priors."},
          {key:"c", text:"Information gain is the negative log-likelihood improvement from a split; MI is the joint entropy of feature and target. The two are inversely related."},
          {key:"d", text:"They were equivalent in ID3 but C4.5 redefined information gain as a normalized ratio, breaking the equivalence."},
        ]}
        trap={<>(b) and (c) garble the definitions. (d) confuses information gain ratio (Quinlan's normalization) with information gain proper.</>}
        lens={<>Information gain at a tree split IS the mutual information between the (binary) split indicator and the target — averaged over the parent node's distribution. That's why tree-based feature importance correlates strongly with MI ranks on many tabular problems.</>}
        stretch={<>What does C4.5's gain ratio normalize, and why?</>}
      />

      <VIS.TrapProblem
        id="mi-q21"
        difficulty="hard"
        title="Q21 — Negative MI estimates from k-NN"
        scenario={<><em>Discriminating insight:</em> mutual_info_classif occasionally returns a tiny negative number for a feature. Is this a bug? You are debugging a feature-selection script.</>}
        options={[
          {key:"a", text:"Yes, it is a bug — MI is non-negative by definition and any negative value indicates a numerical-precision failure in the implementation."},
          {key:"b", text:"No — the k-NN estimator can produce slightly negative estimates near MI ≈ 0; sklearn clips to zero by default. A small negative pre-clip is normal noise.", correct:true},
          {key:"c", text:"Yes — it means the feature and target are anti-correlated, which the estimator encodes as a negative score by convention."},
          {key:"d", text:"No — MI is bounded in [-1, 1] like a correlation coefficient, and negative values indicate dependence in the opposite direction."},
        ]}
        trap={<>(a) confuses estimator output with the population quantity. (c) and (d) invent a directional MI which does not exist.</>}
        lens={<>Population MI is non-negative. The Kraskov estimator can produce small negative values when the true MI is near zero because the digamma-based formula has finite-sample fluctuations. sklearn clips to max(0, estimate). Treat any tiny negative as "estimate of zero" and move on.</>}
        stretch={<>How would you build a one-sided test that exploits this clipping behavior?</>}
      />

      <VIS.TrapProblem
        id="mi-q22"
        difficulty="medium"
        title="Q22 — MI for class-imbalanced classification"
        scenario={<><em>Discriminating insight:</em> a 99/1 imbalanced binary target. How does MI behave compared to accuracy-based filters? You are picking a feature ranker for fraud detection.</>}
        options={[
          {key:"a", text:"MI is dominated by the majority class and gives nearly zero scores for every feature; you must oversample first to get useful rankings."},
          {key:"b", text:"MI is invalid under class imbalance because the entropy estimator divides by p(y) which approaches zero for the minority class."},
          {key:"c", text:"MI handles imbalance gracefully because it measures dependence over the full joint, rather than classification accuracy; rare-class signal is weighted by its joint probability.", correct:true},
          {key:"d", text:"MI exactly equals AUC under imbalance because both are rank-based statistics that ignore class proportions."},
        ]}
        trap={<>(a) confuses MI with accuracy. (b) is fabricated — the estimator handles small p(y) fine. (d) is wrong; MI and AUC are different statistics.</>}
        lens={<>MI weights pairs (x, y) by their joint probability p(x, y), so the minority class contributes less in absolute terms BUT proportionally to its prevalence. There's no class-imbalance pathology specific to MI — unlike accuracy, which trivially picks "predict majority."</>}
        stretch={<>Why might MI still under-rank a feature that's perfectly predictive of the minority class only?</>}
      />

      <VIS.TrapProblem
        id="mi-q23"
        difficulty="hard"
        title="Q23 — MI between two features (feature-to-feature, target-blind)"
        scenario={<><em>Discriminating insight:</em> you want to detect redundant features by computing pairwise MI between features while setting Y aside. What does a high pairwise MI tell you?</>}
        options={[
          {key:"a", text:"The two features carry redundant information about each other; keeping both adds parameter cost without improving model capacity for predicting Y."},
          {key:"b", text:"The two features are jointly more informative about Y than either alone, by linearity of the chain rule for MI."},
          {key:"c", text:"High pairwise MI between features means high collinearity which destabilizes any linear model's coefficients regardless of Y."},
          {key:"d", text:"High pairwise MI is statistically expected under the null; only target-conditional MI tells you anything actionable."},
        ]}
        trap={<>(b) flips the implication — pairwise MI between features says nothing direct about joint informativeness for Y. (c) is true but narrower (linear-model-specific) than the general statement. (d) is wrong.</>}
        lens={<>I(X1; X2) high means X1 and X2 carry overlapping information about EACH OTHER. They may still be jointly more informative about Y (if their overlap doesn't fully explain their MI with Y), but the redundancy diagnosis is correct. mRMR (minimum-redundancy-maximum-relevance) uses exactly this distinction.</>}
        stretch={<>Write down the mRMR objective in one line using I(X_i; Y) and I(X_i; X_j).</>}
      />

      <VIS.TrapProblem
        id="mi-q24"
        difficulty="medium"
        title="Q24 — MI for sparse one-hot features"
        scenario={<><em>Discriminating insight:</em> you one-hot encode a 50-level categorical column and pass the 50 binary columns to mutual_info_classif. What is the expected behavior?</>}
        options={[
          {key:"a", text:"MI ranks each one-hot column according to its marginal frequency; the most frequent level always scores highest by construction."},
          {key:"b", text:"Each binary column is treated as a separate feature; rare levels with strong target dependence may score high, common levels with weak dependence may score low.", correct:true},
          {key:"c", text:"MI cannot be computed on sparse binary inputs because the k-NN estimator's distance metric degenerates to Hamming, which sklearn does not support."},
          {key:"d", text:"sklearn detects the one-hot pattern and aggregates the 50 columns back into a single categorical for MI; the per-column scores are all equal."},
        ]}
        trap={<>(a) and (d) describe behaviors that the function does not have. (c) is wrong — sklearn handles binary discrete features fine.</>}
        lens={<>Each one-hot column is an independent binary feature for the estimator. A rare level with strong target signal CAN score high; a frequent level with weak signal can score low. Often it's better to pass the original categorical (with discrete_features=True) than to one-hot first, to get one MI score per category.</>}
        stretch={<>What's the relationship between the original-categorical MI and the sum of per-level MIs after one-hot?</>}
      />

      <VIS.TrapProblem
        id="mi-q25"
        difficulty="hard"
        title="Q25 — When does MI fail as a feature ranker?"
        scenario={<><em>Discriminating insight:</em> in what realistic regime is MI the WRONG tool, even though it sounds attractive? You are advising a team on whether to add MI to their selection pipeline.</>}
        options={[
          {key:"a", text:"Tiny samples (under a few hundred rows) with continuous features: k-NN MI estimates are noisy enough that the rank order is unstable and the chosen subset varies wildly run-to-run.", correct:true},
          {key:"b", text:"Any classification problem with more than 10 classes; MI's discrete-target formula scales as O(C²) and becomes computationally infeasible."},
          {key:"c", text:"Datasets where features are standardized to mean zero and unit variance; the k-NN distances become degenerate after standardization."},
          {key:"d", text:"Any problem where the model is a tree-based ensemble, because tree models do their own implicit MI ranking internally during training."},
        ]}
        trap={<>(b) overstates compute; even 100-class MI is feasible. (c) is wrong; standardization is fine. (d) is the trap-of-the-day — tree internals don't replace a global filter pass.</>}
        lens={<>Small samples are MI's enemy. With under a thousand rows the k-NN estimator's bias + variance dominate the per-feature signal, making the ranking unstable. Use simpler filters (Pearson on top of monotone transforms, chi-square on binned features) when N is small, then upgrade to MI once data scales.</>}
        stretch={<>At roughly what N does k-NN MI become reliable enough for fine-grained ranking?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://scikit-learn.org/stable/modules/generated/sklearn.feature_selection.mutual_info_classif.html" target="_blank" rel="noopener">
            scikit-learn — <em>mutual_info_classif</em> documentation</a>
            — the canonical reference for the sklearn API, including the discrete_features parameter and the k-NN estimator citation.</li>

        <li><a href="https://machinelearningmastery.com/information-gain-and-mutual-information/" target="_blank" rel="noopener">
            Jason Brownlee — <em>Information Gain and Mutual Information for Machine Learning</em> (blog)</a>

            Chris Olah — <em>Visual Information Theory</em> (blog)</a>
            — the best visual intuition for entropy, cross-entropy, KL, and MI on the internet. Start here if any of the terms still feel abstract.</li>
        <li><a href="https://www.youtube.com/watch?v=YtebGVx-Fxw" target="_blank" rel="noopener">
            StatQuest — Mutual Information clearly explained (~12 min, video)</a>
            — Josh Starmer's whiteboard walkthrough with concrete examples. Good as a first or last pass.</li>

            Cover & Thomas — <em>Elements of Information Theory</em>, Ch. 2 (textbook)</a>

    </VIS.Section>
