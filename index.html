<!doctype html>
<html><head><title>ML Knowledge Hub — Senior MLE Explainers</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
<style>
body{font-family:Inter,system-ui,sans-serif;max-width:780px;margin:2em auto;padding:0 16px;color:#0f172a}
h1{font-size:32px;letter-spacing:-0.02em;margin-bottom:8px}
.sub{color:#475569;margin-bottom:32px}
ul{list-style:none;padding:0}
li{padding:10px 0;border-bottom:1px solid #e2e8f0}
a{color:#2563eb;text-decoration:none;font-weight:500}
a:hover{text-decoration:underline}
.badge{display:inline-block;background:#dbeafe;color:#1e40af;font-size:11px;padding:2px 8px;border-radius:999px;margin-right:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px}
.q{background:#fef9c3;color:#78350f}
</style></head><body>
<h1>ML Knowledge Hub</h1>
<p class="sub">Practitioner-grade ML explainers, interview-style trap problems, and system-design canvases for senior MLE prep. Each opens a self-contained HTML page with Mermaid / Vega-Lite / KaTeX diagrams and hover-glossed jargon.</p>
<ul id="list"></ul>
<script>
const visuals = [
  ["bias-variance-decomposition","Bias-variance decomposition","Concept"],
  ["model-complexity-curve","Model complexity curve","Concept"],
  ["overfitting-diagnosis","Overfitting diagnosis","Concept"],
  ["l1-regularization-lasso","L1 regularization (Lasso)","Concept"],
  ["l2-regularization-ridge","L2 regularization (Ridge)","Concept"],
  ["l1-vs-l2-geometry","L1 vs L2 geometry","Concept"],
  ["dropout","Dropout","Concept"],
  ["early-stopping","Early stopping","Concept"],
  ["k-fold-cross-validation","k-fold CV","Concept"],
  ["time-series-cv","Time-series CV","Concept"],
  ["data-leakage-in-cv","Data leakage in CV","Concept"],
  ["random-search-beats-grid","Random search beats grid","Concept"],
  ["bayesian-hpo","Bayesian HPO","Concept"],
  ["mutual-information-for-feature-ranking","Mutual information for feature ranking","Concept"],
  ["recursive-feature-elimination","Recursive Feature Elimination","Concept"],
  ["mcar-mar-mnar-taxonomy","MCAR / MAR / MNAR taxonomy","Concept"],
  ["missingness-as-a-feature","Missingness as a feature","Concept"],
  ["class-weighted-loss","Class-weighted loss","Concept"],
  ["focal-loss","Focal loss","Concept"],
  ["smote-oversampling","SMOTE oversampling","Concept"],
  ["auprc-vs-auroc-for-imbalanced-data","AUPRC vs AUROC for imbalanced","Concept"],
  ["batchnorm","BatchNorm","Concept"],
  ["layernorm","LayerNorm","Concept"],
  ["curse-of-dimensionality-distance-loses-meaning","Curse of dimensionality","Concept"],
  ["train-val-test-methodology","Train/Val/Test methodology","Concept"],
  ["pipeline-order-for-leakage-prevention","Pipeline order for leakage prevention","Concept"],
  ["diagnose-overfitting-prime-video","Diagnose overfitting on Prime Video (Q1, 2.5/5)","Question"],
  ["handle-class-imbalance-end-to-end","End-to-end class imbalance (Q2, 2.8/5)","Question"],
  ["l1-vs-l2-production-tradeoff","L1 vs L2 in production (Q11, 1.5/5)","Question"],
];
document.getElementById("list").innerHTML = visuals.map(([fp,title,type]) =>
  `<li><span class="badge ${type==='Question'?'q':''}">${type}</span><a href="${fp}.html">${title}</a></li>`
).join("");
</script></body></html>
