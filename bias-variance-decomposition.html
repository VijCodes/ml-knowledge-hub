<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>visualize</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
           margin: 0; background: #ffffff; color: #0f172a; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js" async></script>
  <script>
// vis-components.js — design-system JSX components for the /visualize skill.
// Exposed as window.VIS.{Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle}.
// window.RV is aliased to window.VIS for report-viewer back-compat.
// Available globally to any visual.jsx without imports.
// (CSS class prefix kept as "rv-" — internal namespace; preserves report-viewer interop.)

(function () {
  "use strict";

  if (!window.React) {
    console.warn("[vis-components] React not loaded yet; skipping setup");
    return;
  }
  const h = React.createElement;

  // Lazy-load a CDN script; cache the load Promise so repeats are cheap.
  const _scriptCache = new Map();
  function _loadScript(src) {
    if (_scriptCache.has(src)) return _scriptCache.get(src);
    const p = new Promise((resolve, reject) => {
      const existing = document.querySelector(`script[data-vis-cdn="${src}"]`);
      if (existing) return existing.addEventListener("load", resolve);
      const s = document.createElement("script");
      s.src = src; s.async = false; s.dataset.visCdn = src;
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    _scriptCache.set(src, p);
    return p;
  }

  let _katexCssInjected = false;
  function _ensureKatexCss() {
    if (_katexCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css";
    document.head.appendChild(link);
    _katexCssInjected = true;
  }

  let _hljsCssInjected = false;
  function _ensureHljsCss() {
    if (_hljsCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css";
    document.head.appendChild(link);
    _hljsCssInjected = true;
  }

  // ----- Styles, injected once ----- //
  (function injectStyles() {
    if (document.getElementById("rv-components-styles")) return;
    const css = `
      .rv-hero {
        background: radial-gradient(120% 90% at 20% 0%, #dbeafe 0%, #ffffff 60%);
        padding: 28px 28px 22px; border-radius: 16px; margin-bottom: 20px;
        border: 1px solid #e2e8f0;
      }
      .rv-hero h1 {
        font-size: 38px; line-height: 1.1; letter-spacing: -0.02em;
        font-weight: 700; margin: 10px 0 6px; color: #0f172a;
      }
      .rv-hero .rv-sub {
        font-size: 16px; color: #475569; margin: 0; max-width: 60ch;
      }
      .rv-hero .rv-byline {
        font-size: 12px; color: #64748b; margin-top: 14px;
        display: flex; gap: 14px; flex-wrap: wrap;
      }
      .rv-hero .rv-byline span strong { color: #1e293b; font-weight: 600; }

      .rv-pill {
        display: inline-block; padding: 2px 10px; border-radius: 999px;
        background: #2563eb; color: #fff; font-size: 11px; font-weight: 600;
        letter-spacing: 0.6px; text-transform: uppercase;
      }

      .rv-tag {
        display: inline-block; padding: 1px 8px; border-radius: 999px;
        font-size: 11px; font-weight: 600; vertical-align: middle;
      }
      .rv-tag-green  { background: #dcfce7; color: #166534; }
      .rv-tag-yellow { background: #fef9c3; color: #854d0e; }
      .rv-tag-red    { background: #fee2e2; color: #991b1b; }
      .rv-tag-blue   { background: #dbeafe; color: #1e40af; }
      .rv-tag-gray   { background: #e4e4e7; color: #3f3f46; }

      .rv-card {
        border: 1px solid #e4e4e7; border-radius: 10px;
        padding: 14px 16px; margin: 12px 0;
        background: linear-gradient(180deg, #fafafa, #fff);
      }

      .rv-tldr {
        background: #f1f5f9;
        border-left: 4px solid #2563eb;
        border-radius: 0 10px 10px 0;
        padding: 14px 18px; margin: 0 0 24px;
        font-size: 15px; line-height: 1.55; color: #0f172a;
      }
      .rv-tldr .rv-tldr-label {
        display: inline-block; margin-right: 8px;
        font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
        color: #2563eb; text-transform: uppercase;
        vertical-align: 1px;
      }
      .vis-callout {
        border-left: 4px solid; border-radius: 0 8px 8px 0;
        padding: 12px 16px; margin: 14px 0;
      }
      .vis-callout strong { display: block; margin-bottom: 4px; }
      .vis-callout-info   { background: #dbeafe; border-color: #2563eb; color: #1e3a8a; }
      .vis-callout-warn   { background: #fef3c7; border-color: #d97706; color: #78350f; }
      .vis-callout-gotcha { background: #fee2e2; border-color: #dc2626; color: #7f1d1d; }
      .vis-callout-ok     { background: #dcfce7; border-color: #16a34a; color: #14532d; }

      .vis-term {
        text-decoration: underline dotted;
        text-decoration-color: #94a3b8;
        text-underline-offset: 3px;
        cursor: help;
      }
      .vis-term:focus { outline: 2px solid #2563eb; outline-offset: 2px; }
      .vis-term-tip {
        position: fixed; z-index: 10001; max-width: 340px;
        background: #0f172a; color: #f8fafc; font-size: 13px; line-height: 1.45;
        padding: 8px 10px; border-radius: 6px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.22);
        pointer-events: none; white-space: pre-wrap;
      }
    `;
    const tag = document.createElement("style");
    tag.id = "rv-components-styles";
    tag.textContent = css;
    document.head.appendChild(tag);
  })();

  // ----- Components ----- //

  // <RV.Pill>v0.2</RV.Pill>  →  small uppercase pill
  function Pill({ children, color }) {
    const style = color ? { background: color } : null;
    return h("span", { className: "rv-pill", style }, children);
  }

  // <RV.Tag color="green">ok</RV.Tag>  →  status pill
  function Tag({ children, color = "gray" }) {
    return h("span", { className: "rv-tag rv-tag-" + color }, children);
  }

  // <RV.ByLine items={[{label:"Build",value:"2026-05-15"}, ...]} />
  function ByLine({ items = [] }) {
    return h("div", { className: "rv-byline" },
      items.map((it, i) =>
        h("span", { key: i },
          h("strong", null, it.label), " ", it.value
        )
      )
    );
  }

  // Set the browser tab title. Auto-called by RV.Hero; reports without a
  // Hero can call this directly: RV.setTitle("...").
  function setTitle(str) {
    if (typeof str === "string" && str.trim()) document.title = str.trim();
  }

  // <RV.Hero title="..." subtitle="..." pill="v0.2" byline={[...]}>
  //   children (optional, rendered below subtitle)
  // </RV.Hero>
  function Hero({ title, subtitle, pill, byline, accent, children }) {
    React.useEffect(() => { setTitle(title); }, [title]);
    return h("section", { className: "rv-hero" },
      pill ? h(Pill, null, pill) : null,
      h("h1", null,
        accent ? h("span", { className: accent }) : null,
        accent ? " " : null,
        title
      ),
      subtitle ? h("p", { className: "rv-sub" }, subtitle) : null,
      byline && byline.length ? h(ByLine, { items: byline }) : null,
      children
    );
  }

  // <RV.Card><strong>title</strong><p>body</p></RV.Card>
  function Card({ children, className }) {
    return h("div", {
      className: "rv-card" + (className ? " " + className : "")
    }, children);
  }

  // <RV.Section id="sec-foo" title="Foo">...</RV.Section>
  //   — renders <h2 id={id}>{title}</h2> + body. The id is picked up by
  //   the auto-TOC sidebar.
  function Section({ id, title, children }) {
    return h(React.Fragment, null,
      h("h2", { id }, title),
      children
    );
  }

  // <RV.TLDR>One-paragraph headline answer.</RV.TLDR>
  // ALWAYS render this immediately after <RV.Hero>, before any sections.
  // Reader should be able to leave after reading it.
  function TLDR({ children }) {
    return h("aside", { className: "rv-tldr", role: "note" },
      h("span", { className: "rv-tldr-label" }, "TL;DR"),
      children
    );
  }

  function Mermaid({ chart, id }) {
    const ref = React.useRef(null);
    const autoId = React.useId();
    React.useEffect(() => {
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js")
        .then(() => {
          if (!window.mermaid._inited) {
            window.mermaid._inited = true;
            // trusted-author content; "loose" enables click handlers + HTML labels in mermaid
            window.mermaid.initialize({ startOnLoad: false, theme: "default", securityLevel: "loose" });
          }
          return window.mermaid.render((id || "mmd") + "-" + autoId.replace(/:/g, ""), chart);
        })
        .then(({ svg }) => { if (!cancelled && ref.current) ref.current.innerHTML = svg; })
        .catch((e) => { if (ref.current) ref.current.textContent = "[mermaid error] " + e; });
      return () => { cancelled = true; };
    }, [chart, id, autoId]);
    return h("div", { ref, className: "vis-mermaid", style: { margin: "16px 0", textAlign: "center" } });
  }

  function VegaLite({ spec, data }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      let cancelled = false;
      Promise.all([
        _loadScript("https://cdn.jsdelivr.net/npm/vega@5"),
        _loadScript("https://cdn.jsdelivr.net/npm/vega-lite@5"),
        _loadScript("https://cdn.jsdelivr.net/npm/vega-embed@6"),
      ]).then(() => {
        if (cancelled || !ref.current) return;
        const full = data ? { ...spec, data: { values: data } } : spec;
        window.vegaEmbed(ref.current, full, { actions: false, renderer: "svg" });
      }).catch((e) => { if (ref.current) ref.current.textContent = "[vega error] " + e; });
      return () => { cancelled = true; };
    }, [spec, data]);
    return h("div", { ref, className: "vis-vega", style: { margin: "16px 0" } });
  }

  function Equation({ tex, display = false }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureKatexCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js")
        .then(() => {
          if (cancelled || !ref.current) return;
          window.katex.render(tex, ref.current, { displayMode: display, throwOnError: false });
        });
      return () => { cancelled = true; };
    }, [tex, display]);
    const Tag = display ? "div" : "span";
    return h(Tag, { ref, className: "vis-eq" });
  }

  function CodeBlock({ lang = "plaintext", children }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureHljsCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js")
        .then(() => _loadScript(`https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/${lang}.min.js`).catch(() => {}))
        .then(() => {
          if (cancelled || !ref.current) return;
          // Reset so hljs re-highlights when `children` or `lang` change
          ref.current.removeAttribute("data-highlighted");
          ref.current.className = "language-" + lang;
          ref.current.textContent = String(Array.isArray(children) ? children.join("") : children);
          window.hljs.highlightElement(ref.current);
        });
      return () => { cancelled = true; };
    }, [lang, children]);
    return h("pre", { style: { margin: "12px 0", borderRadius: 8, overflow: "auto" } },
      h("code", { ref, className: `language-${lang}` }, children));
  }

  function Callout({ kind = "info", title, children }) {
    return h("aside", { className: `vis-callout vis-callout-${kind}`, role: "note" },
      title ? h("strong", null, title) : null,
      children);
  }

  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Bias-variance decomposition — concept explainer
// row 2 in 'ML Fund' tab
// fingerprint: bias-variance-decomposition

const DECOMP_DIAGRAM = `
flowchart LR
  TOTAL["Total expected error<br/>E[(y - f̂(x))²]"]
  TOTAL --> BIAS["Bias²<br/>(E[f̂] - f)²<br/><i>how wrong on average</i>"]
  TOTAL --> VAR["Variance<br/>E[(f̂ - E[f̂])²]<br/><i>how jumpy across samples</i>"]
  TOTAL --> NOISE["Irreducible noise<br/>σ²<br/><i>baked into the data</i>"]
  style BIAS fill:#fee2e2,stroke:#dc2626
  style VAR fill:#fef3c7,stroke:#d97706
  style NOISE fill:#e0e7ff,stroke:#6366f1
`;

const TRADEOFF_SPEC = {
  width: 600, height: 280,
  layer: [
    { mark: {type: "line", color: "#dc2626", strokeWidth: 3},
      encoding: { x: {field:"capacity", type:"quantitative", title:"Model capacity →"},
                  y: {field:"bias", type:"quantitative", title:"Error"} } },
    { mark: {type: "line", color: "#d97706", strokeWidth: 3},
      encoding: { x: {field:"capacity"}, y: {field:"variance"} } },
    { mark: {type: "line", color: "#0f172a", strokeWidth: 4, strokeDash:[6,3]},
      encoding: { x: {field:"capacity"}, y: {field:"total"} } }
  ]
};

const TRADEOFF_DATA = Array.from({length: 30}, (_, i) => {
  const c = i + 1;
  const bias = 4 / c;
  const variance = c * 0.08;
  return { capacity: c, bias, variance, total: bias + variance + 0.3 };
});

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px"}}>
    <VIS.Hero
      pill="ML Fund"
      title="Bias–variance decomposition"
      subtitle="Why every model's error splits into three named pieces — and why two of them trade off."
      byline={[
        {label: "L2", value: "Bias-Variance"},
        {label: "L3", value: "Decomposition"},
        {label: "Source", value: "Geman et al. 1992"},
      ]}
    />

    <VIS.TLDR>
      Total expected error decomposes into{" "}
      <VIS.Term def="How far the model's average prediction is from the truth. Squared so direction doesn't matter.">bias²</VIS.Term>,{" "}
      <VIS.Term def="How much the model's prediction wobbles between different training sets drawn from the same distribution.">variance</VIS.Term>, and{" "}
      <VIS.Term def="Randomness baked into the data — even a perfect model can't predict it.">irreducible noise</VIS.Term>.
      You can shrink the first two by changing model capacity; the third is a floor.
    </VIS.TLDR>

    <VIS.Section id="sec-decomp" title="The three pieces">
      <VIS.Mermaid chart={DECOMP_DIAGRAM} />
      <p>
        <VIS.Term def="A model that's too simple to capture the true pattern — high error on both train and test.">Underfitting</VIS.Term>{" "}
        is a bias problem.{" "}
        <VIS.Term def="A model that has memorised the training set instead of learning the pattern — low train error, high test error.">Overfitting</VIS.Term>{" "}
        is a variance problem. They pull in opposite directions, which is the whole reason the curve below has a U-shape.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-curve" title="The tradeoff curve">
      <VIS.VegaLite spec={TRADEOFF_SPEC} data={TRADEOFF_DATA} />
      <p>
        Red = bias² (falls with capacity). Amber = variance (rises with capacity). Dashed black = total error (their sum + noise floor). The minimum sits at the{" "}
        <VIS.Term def="The model size where bias and variance are balanced — adding more capacity helps one but hurts the other.">sweet spot</VIS.Term>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-math" title="The math (one line)">
      <VIS.Equation display
        tex="\mathbb{E}\!\left[(y - \hat{f}(x))^2\right] \;=\; \underbrace{\left(\mathbb{E}[\hat{f}] - f\right)^{\!2}}_{\text{bias}^2} \;+\; \underbrace{\mathbb{E}\!\left[(\hat{f} - \mathbb{E}[\hat{f}])^2\right]}_{\text{variance}} \;+\; \sigma^2" />
      <p>
        Expectation is over training sets drawn from the same{" "}
        <VIS.Term def="The 'true' joint distribution of inputs and labels in the real world — we only see samples of it.">data-generating distribution</VIS.Term>.
        σ² is the noise floor — you cannot beat it without changing the labels themselves.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-trap" title="Where this trips people up">
      <VIS.Callout kind="gotcha" title="One model, one training set ≠ the decomposition">
        Bias and variance are properties of the <em>learning algorithm</em> averaged over training sets, not of a single fitted model. A single ResNet on a single CIFAR split has one error value — not a bias and a variance separately. Use the framework to reason about choices (capacity, regularization, ensembling), not to label an existing model.
      </VIS.Callout>
      <VIS.Callout kind="info" title="What moves which knob?">
        <strong>Reduce bias:</strong> bigger model, richer features, more flexible class.{" "}
        <strong>Reduce variance:</strong>{" "}
        <VIS.Term def="Penalties on weights (L1/L2), dropout, early stopping — anything that limits effective capacity.">regularization</VIS.Term>,
        more training data, ensembles (averaging across multiple fits cancels noise but not bias).{" "}
        <strong>Reduce noise:</strong> impossible without better labels.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-example" title="Concrete example">
      <p>
        <VIS.Term def="A model that predicts the label of a new point by copying the label of its single nearest training point.">1-NN classifier</VIS.Term>{" "}
        on noisy data: bias is near zero (it can represent any decision boundary) but variance is enormous (one noisy training point flips a whole region). Train MSE = 0, test MSE explodes — pure variance failure. The cure is more neighbors (k-NN with k {">"} 1), which trades a little bias for a lot of variance reduction.
      </p>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
</body>
</html>
