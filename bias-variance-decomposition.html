<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>visualize</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
           margin: 0; background: #ffffff; color: #0f172a; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js" async></script>
  <script>
// vis-components.js — design-system JSX components for the /visualize skill.
// Exposed as window.VIS.{Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle}.
// window.RV is aliased to window.VIS for report-viewer back-compat.
// Available globally to any visual.jsx without imports.
// (CSS class prefix kept as "rv-" — internal namespace; preserves report-viewer interop.)

(function () {
  "use strict";

  if (!window.React) {
    console.warn("[vis-components] React not loaded yet; skipping setup");
    return;
  }
  const h = React.createElement;

  // Lazy-load a CDN script; cache the load Promise so repeats are cheap.
  const _scriptCache = new Map();
  function _loadScript(src) {
    if (_scriptCache.has(src)) return _scriptCache.get(src);
    const p = new Promise((resolve, reject) => {
      const existing = document.querySelector(`script[data-vis-cdn="${src}"]`);
      if (existing) return existing.addEventListener("load", resolve);
      const s = document.createElement("script");
      s.src = src; s.async = false; s.dataset.visCdn = src;
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    _scriptCache.set(src, p);
    return p;
  }

  let _katexCssInjected = false;
  function _ensureKatexCss() {
    if (_katexCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css";
    document.head.appendChild(link);
    _katexCssInjected = true;
  }

  let _hljsCssInjected = false;
  function _ensureHljsCss() {
    if (_hljsCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css";
    document.head.appendChild(link);
    _hljsCssInjected = true;
  }

  // ----- Styles, injected once ----- //
  (function injectStyles() {
    if (document.getElementById("rv-components-styles")) return;
    const css = `
      .rv-hero {
        background: radial-gradient(120% 90% at 20% 0%, #dbeafe 0%, #ffffff 60%);
        padding: 28px 28px 22px; border-radius: 16px; margin-bottom: 20px;
        border: 1px solid #e2e8f0;
      }
      .rv-hero h1 {
        font-size: 38px; line-height: 1.1; letter-spacing: -0.02em;
        font-weight: 700; margin: 10px 0 6px; color: #0f172a;
      }
      .rv-hero .rv-sub {
        font-size: 16px; color: #475569; margin: 0; max-width: 60ch;
      }
      .rv-hero .rv-byline {
        font-size: 12px; color: #64748b; margin-top: 14px;
        display: flex; gap: 14px; flex-wrap: wrap;
      }
      .rv-hero .rv-byline span strong { color: #1e293b; font-weight: 600; }

      .rv-pill {
        display: inline-block; padding: 2px 10px; border-radius: 999px;
        background: #2563eb; color: #fff; font-size: 11px; font-weight: 600;
        letter-spacing: 0.6px; text-transform: uppercase;
      }

      .rv-tag {
        display: inline-block; padding: 1px 8px; border-radius: 999px;
        font-size: 11px; font-weight: 600; vertical-align: middle;
      }
      .rv-tag-green  { background: #dcfce7; color: #166534; }
      .rv-tag-yellow { background: #fef9c3; color: #854d0e; }
      .rv-tag-red    { background: #fee2e2; color: #991b1b; }
      .rv-tag-blue   { background: #dbeafe; color: #1e40af; }
      .rv-tag-gray   { background: #e4e4e7; color: #3f3f46; }

      .rv-card {
        border: 1px solid #e4e4e7; border-radius: 10px;
        padding: 14px 16px; margin: 12px 0;
        background: linear-gradient(180deg, #fafafa, #fff);
      }

      .rv-tldr {
        background: #f1f5f9;
        border-left: 4px solid #2563eb;
        border-radius: 0 10px 10px 0;
        padding: 14px 18px; margin: 0 0 24px;
        font-size: 15px; line-height: 1.55; color: #0f172a;
      }
      .rv-tldr .rv-tldr-label {
        display: inline-block; margin-right: 8px;
        font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
        color: #2563eb; text-transform: uppercase;
        vertical-align: 1px;
      }
      .vis-callout {
        border-left: 4px solid; border-radius: 0 8px 8px 0;
        padding: 12px 16px; margin: 14px 0;
      }
      .vis-callout-title { display: block; margin-bottom: 4px; }
      .vis-callout-info   { background: #dbeafe; border-color: #2563eb; color: #1e3a8a; }
      .vis-callout-warn   { background: #fef3c7; border-color: #d97706; color: #78350f; }
      .vis-callout-gotcha { background: #fee2e2; border-color: #dc2626; color: #7f1d1d; }
      .vis-callout-ok     { background: #dcfce7; border-color: #16a34a; color: #14532d; }

      .vis-term {
        text-decoration: underline dotted;
        text-decoration-color: #94a3b8;
        text-underline-offset: 3px;
        cursor: help;
      }
      .vis-term:focus { outline: 2px solid #2563eb; outline-offset: 2px; }
      .vis-term-tip {
        position: fixed; z-index: 10001; max-width: 340px;
        background: #0f172a; color: #f8fafc; font-size: 13px; line-height: 1.45;
        padding: 8px 10px; border-radius: 6px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.22);
        pointer-events: none; white-space: pre-wrap;
      }
    `;
    const tag = document.createElement("style");
    tag.id = "rv-components-styles";
    tag.textContent = css;
    document.head.appendChild(tag);
  })();

  // ----- Components ----- //

  // <RV.Pill>v0.2</RV.Pill>  →  small uppercase pill
  function Pill({ children, color }) {
    const style = color ? { background: color } : null;
    return h("span", { className: "rv-pill", style }, children);
  }

  // <RV.Tag color="green">ok</RV.Tag>  →  status pill
  function Tag({ children, color = "gray" }) {
    return h("span", { className: "rv-tag rv-tag-" + color }, children);
  }

  // <RV.ByLine items={[{label:"Build",value:"2026-05-15"}, ...]} />
  function ByLine({ items = [] }) {
    return h("div", { className: "rv-byline" },
      items.map((it, i) =>
        h("span", { key: i },
          h("strong", null, it.label), " ", it.value
        )
      )
    );
  }

  // Set the browser tab title. Auto-called by RV.Hero; reports without a
  // Hero can call this directly: RV.setTitle("...").
  function setTitle(str) {
    if (typeof str === "string" && str.trim()) document.title = str.trim();
  }

  // <RV.Hero title="..." subtitle="..." pill="v0.2" byline={[...]}>
  //   children (optional, rendered below subtitle)
  // </RV.Hero>
  function Hero({ title, subtitle, pill, byline, accent, children }) {
    React.useEffect(() => { setTitle(title); }, [title]);
    return h("section", { className: "rv-hero" },
      pill ? h(Pill, null, pill) : null,
      h("h1", null,
        accent ? h("span", { className: accent }) : null,
        accent ? " " : null,
        title
      ),
      subtitle ? h("p", { className: "rv-sub" }, subtitle) : null,
      byline && byline.length ? h(ByLine, { items: byline }) : null,
      children
    );
  }

  // <RV.Card><strong>title</strong><p>body</p></RV.Card>
  function Card({ children, className }) {
    return h("div", {
      className: "rv-card" + (className ? " " + className : "")
    }, children);
  }

  // <RV.Section id="sec-foo" title="Foo">...</RV.Section>
  //   — renders <h2 id={id}>{title}</h2> + body. The id is picked up by
  //   the auto-TOC sidebar.
  function Section({ id, title, children }) {
    return h(React.Fragment, null,
      h("h2", { id }, title),
      children
    );
  }

  // <RV.TLDR>One-paragraph headline answer.</RV.TLDR>
  // ALWAYS render this immediately after <RV.Hero>, before any sections.
  // Reader should be able to leave after reading it.
  function TLDR({ children }) {
    return h("aside", { className: "rv-tldr", role: "note" },
      h("span", { className: "rv-tldr-label" }, "TL;DR"),
      children
    );
  }

  function Mermaid({ chart, id }) {
    const ref = React.useRef(null);
    const autoId = React.useId();
    React.useEffect(() => {
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js")
        .then(() => {
          if (!window.mermaid._inited) {
            window.mermaid._inited = true;
            // trusted-author content; "loose" enables click handlers + HTML labels in mermaid
            window.mermaid.initialize({ startOnLoad: false, theme: "default", securityLevel: "loose" });
          }
          return window.mermaid.render((id || "mmd") + "-" + autoId.replace(/:/g, ""), chart);
        })
        .then(({ svg }) => { if (!cancelled && ref.current) ref.current.innerHTML = svg; })
        .catch((e) => { if (ref.current) ref.current.textContent = "[mermaid error] " + e; });
      return () => { cancelled = true; };
    }, [chart, id, autoId]);
    return h("div", { ref, className: "vis-mermaid", style: { margin: "16px 0", textAlign: "center" } });
  }

  function VegaLite({ spec, data }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      let cancelled = false;
      Promise.all([
        _loadScript("https://cdn.jsdelivr.net/npm/vega@5"),
        _loadScript("https://cdn.jsdelivr.net/npm/vega-lite@5"),
        _loadScript("https://cdn.jsdelivr.net/npm/vega-embed@6"),
      ]).then(() => {
        if (cancelled || !ref.current) return;
        const full = data ? { ...spec, data: { values: data } } : spec;
        window.vegaEmbed(ref.current, full, { actions: false, renderer: "svg" });
      }).catch((e) => { if (ref.current) ref.current.textContent = "[vega error] " + e; });
      return () => { cancelled = true; };
    }, [spec, data]);
    return h("div", { ref, className: "vis-vega", style: { margin: "16px 0" } });
  }

  function Equation({ tex, display = false }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureKatexCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js")
        .then(() => {
          if (cancelled || !ref.current) return;
          window.katex.render(tex, ref.current, { displayMode: display, throwOnError: false });
        });
      return () => { cancelled = true; };
    }, [tex, display]);
    const Tag = display ? "div" : "span";
    return h(Tag, { ref, className: "vis-eq" });
  }

  function CodeBlock({ lang = "plaintext", children }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureHljsCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js")
        .then(() => _loadScript(`https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/${lang}.min.js`).catch(() => {}))
        .then(() => {
          if (cancelled || !ref.current) return;
          // Reset so hljs re-highlights when `children` or `lang` change
          ref.current.removeAttribute("data-highlighted");
          ref.current.className = "language-" + lang;
          ref.current.textContent = String(Array.isArray(children) ? children.join("") : children);
          window.hljs.highlightElement(ref.current);
        });
      return () => { cancelled = true; };
    }, [lang, children]);
    return h("pre", { style: { margin: "12px 0", borderRadius: 8, overflow: "auto" } },
      h("code", { ref, className: `language-${lang}` }, children));
  }

  function Callout({ kind = "info", title, children }) {
    return h("aside", { className: `vis-callout vis-callout-${kind}`, role: "note" },
      title ? h("strong", { className: "vis-callout-title" }, title) : null,
      children);
  }

  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// GOLD-STANDARD EXAMPLE for /visualize.
// Demonstrates the four-beat pattern:
//   1. Concrete thought experiment FIRST
//   2. Name + formal definition SECOND
//   3. Math THIRD
//   4. Practical implication LAST
// Audience: smart but new-to-ML. Generous prose. Every jargon term has a VIS.Term gloss.

const TRADEOFF_SPEC = {
  width: 600, height: 300,
  encoding: {
    x: { field: "capacity", type: "quantitative", title: "Model capacity (e.g. polynomial degree) →" },
    y: { field: "error", type: "quantitative", title: "Expected error" },
    color: { field: "kind", type: "nominal",
             scale: { domain: ["Bias²","Variance","Total error"],
                      range: ["#dc2626","#d97706","#0f172a"] } },
    strokeDash: { field: "kind", type: "nominal",
                  scale: { domain: ["Bias²","Variance","Total error"],
                           range: [[1,0],[1,0],[6,3]] } }
  },
  mark: { type: "line", strokeWidth: 3 }
};
const TRADEOFF_DATA = Array.from({length:30}, (_,i) => {
  const c = i + 1;
  const bias = 4 / c;
  const variance = c * 0.08;
  return [
    {capacity:c, kind:"Bias²", error: bias},
    {capacity:c, kind:"Variance", error: variance},
    {capacity:c, kind:"Total error", error: bias + variance + 0.3},
  ];
}).flat();

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Fund · Concept"
      title="Bias–variance tradeoff"
      subtitle="Why every model's expected error decomposes into three named pieces, and why two of them pull against each other."
      byline={[
        {label: "Audience", value: "smart but new to ML"},
        {label: "Source", value: "Geman et al. 1992"},
      ]}/>

    <VIS.TLDR>
      Total expected error for a model splits into three named pieces:{" "}
      <VIS.Term def="How wrong the model's average prediction is. Even with infinite data of the same kind, a too-simple model is systematically off — that gap is bias.">bias</VIS.Term>,{" "}
      <VIS.Term def="How much the model's prediction jumps around when re-trained on different samples drawn from the same population. Flexible models tend to wobble more.">variance</VIS.Term>, and an{" "}
      <VIS.Term def="The randomness baked into the data itself — labels we can never predict perfectly because the world is noisy. Sets a floor below which no model can go.">irreducible noise floor</VIS.Term>.
      You can shrink the first two by changing model capacity. You cannot shrink the third.
    </VIS.TLDR>

    <VIS.Section id="sec-experiment" title="Beat 1 — A thought experiment">
      <p>
        Imagine the same prediction problem (say, "given a house's square-footage, predict its price")
        is handed to <strong>100 data scientists</strong>. Each one independently collects their own random sample of
        houses from the same city — same housing market, same underlying patterns — call this their{" "}
        <VIS.Term def="The pool of all possible (features, label) pairs your problem could draw from. We never see all of it; we see samples drawn from it. 'Training set' = one such sample.">data-generating distribution</VIS.Term>.
        Now we run two experiments.
      </p>

      <p>
        <strong>Experiment A — every scientist uses a too-simple model.</strong> They all fit a flat line: "price = constant".
        When we show the 100 fitted lines on the same chart, they're all roughly the same flat line. None of them
        captures that bigger houses cost more — that pattern is in the data, but their model class can't represent it.
        Every one of them is wrong in the same direction. That systematic gap between the average fit and the truth is{" "}
        <VIS.Term def="The systematic error of a learning procedure — what's left after averaging out the noise from any one particular training sample. A too-simple model has high bias; a sufficiently flexible model has low bias.">bias</VIS.Term>. High bias.
      </p>

      <p>
        <strong>Experiment B — every scientist uses a very flexible model.</strong> They all fit a 15th-degree polynomial.
        Each polynomial wriggles through the specific points the scientist happened to sample. When we overlay the 100
        curves, they look wildly different from each other — at the same input square-footage, one scientist's curve
        predicts $400k and another's predicts $900k. On average, across the 100 fits, the predictions are about right;
        but at any one input, the fits disagree by a huge amount. That disagreement-across-fits is{" "}
        <VIS.Term def="The spread of a learning procedure's predictions when re-trained on different samples drawn from the same population. Flexible procedures fit each sample's quirks tightly and wobble more from sample to sample.">variance</VIS.Term>. High variance.
      </p>

      <p>
        The lesson is in the contrast. <strong>Bias is "wrong on average."</strong> <strong>Variance is "different
        every time."</strong> They are not the same thing, and they trade off as you change how flexible the model
        class is.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-name" title="Beat 2 — Naming the pieces">
      <p>
        We now name what we just observed. Given a learning procedure (a fixed model class plus how you train it), and
        a specific input <code>x</code> we want to predict for:
      </p>
      <ul>
        <li>
          <strong>Bias² at x</strong> = the squared difference between (the average prediction across all training
          sets the 100 scientists could have drawn) and (the true value at <code>x</code>).
        </li>
        <li>
          <strong>Variance at x</strong> = the spread of predictions at <code>x</code> across those 100 training sets,
          measured as the average squared deviation from their own average.
        </li>
        <li>
          <strong>Irreducible noise σ²</strong> = the part of the label that's random even given perfect knowledge of <code>x</code>.
          Two houses with identical features and identical neighborhoods can still sell for different prices —
          that's σ².
        </li>
      </ul>
      <p>
        Total expected squared error at <code>x</code> is the sum of these three. The astonishing fact is that this sum
        decomposition is exact — there are no other terms hiding.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-math" title="Beat 3 — The math (one equation)">
      <VIS.Equation display
        tex="\mathbb{E}_{\mathcal{D},\,\varepsilon}\!\big[(y - \hat{f}_{\mathcal{D}}(x))^2\big] \;=\; \underbrace{\big(\mathbb{E}_{\mathcal{D}}[\hat{f}_{\mathcal{D}}(x)] - f(x)\big)^{\!2}}_{\text{bias}^2} \;+\; \underbrace{\mathbb{E}_{\mathcal{D}}\!\big[(\hat{f}_{\mathcal{D}}(x) - \mathbb{E}_{\mathcal{D}}[\hat{f}_{\mathcal{D}}(x)])^2\big]}_{\text{variance}} \;+\; \sigma^2" />

      <p>Mapping the symbols back to the thought experiment:</p>
      <ul>
        <li>
          <VIS.Term def="A mathematical operator that averages a quantity over a probability distribution. 'E[X over D]' means: imagine drawing many samples from D and computing X each time — the long-run average is E[X].">𝔼<sub>𝒟</sub>[·]</VIS.Term>{" "}
          = average over training sets drawn from the same data-generating distribution.
          Concretely: the average over those 100 scientists' fits.
        </li>
        <li>
          <strong>f(x)</strong> = the true (unknown) value at input <code>x</code>.
          <strong> f̂<sub>𝒟</sub>(x)</strong> = what a model fitted on training set 𝒟 predicts at <code>x</code>.
        </li>
        <li>
          <strong>𝔼<sub>𝒟</sub>[f̂<sub>𝒟</sub>(x)]</strong> = the average prediction at <code>x</code>, averaged across the 100 scientists. Used in BOTH the bias term and the variance term.
        </li>
        <li>
          <strong>σ²</strong> = noise variance. Doesn't depend on the model at all — it's a property of the data.
        </li>
      </ul>
      <VIS.Callout kind="info" title="Why this decomposition is useful">
        The three terms are independent knobs. Reducing one doesn't automatically affect the others. That's what
        makes the framework prescriptive: you can diagnose which term dominates and act on the right one.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-curve" title="The classic tradeoff curve">
      <VIS.VegaLite spec={TRADEOFF_SPEC} data={TRADEOFF_DATA} />
      <p>
        Red = bias² (falls as capacity grows). Amber = variance (rises). Dashed black = their sum + noise floor.
        The minimum of the dashed line is the sweet spot — that's the capacity at which adding more flexibility
        hurts more than it helps.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-practical" title="Beat 4 — What to do about it in practice">
      <VIS.Callout kind="info" title="How to diagnose which term dominates">
        <strong>Train error ≪ test error</strong> → variance problem. Model is fitting training-set quirks. Reach for{" "}
        <VIS.Term def="Penalties on weight size (L1 or L2), dropout, early stopping, data augmentation. Any technique that constrains how tightly the model can fit one specific training sample.">regularization</VIS.Term>,
        more data, or an ensemble (averaging across multiple fits cancels variance but not bias).{" "}
        <strong>Train error ≈ test error and both are high</strong> → bias problem. Model class is too simple to
        represent the truth. Reach for a bigger model, richer features, or a different model family.
      </VIS.Callout>

      <VIS.Callout kind="gotcha" title="What the framework does NOT say">
        Bias and variance are properties of the <em>learning algorithm</em> averaged over training sets, not of
        a single fitted model. One ResNet on one CIFAR-10 split has one error number — not a bias and a variance
        separately. Use the framework to reason about choices (capacity, regularization, data size, ensembling),
        not to label an existing model.
      </VIS.Callout>

      <VIS.Callout kind="warn" title="Modern caveat: double descent">
        For very over-parameterized models (large neural nets, LLMs), the test-error curve can dip <em>again</em>{" "}
        past the interpolation threshold —{" "}
        <VIS.Term def="A 2019 finding (Belkin et al.) showing test error has a second dip when models become massively over-parameterized — challenged the classical U-curve intuition.">double descent</VIS.Term>.
        The classical U-curve still holds for moderately-sized models on moderately-sized data — which is most of
        practical ML.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-summary" title="The 30-second summary">
      <p>
        Imagine the same prediction problem solved 100 times by 100 different data scientists, each with their own
        random training sample. <strong>Bias</strong> is how wrong they all are on average. <strong>Variance</strong>{" "}
        is how much they disagree with each other. <strong>Noise</strong> is the part neither they nor any future
        scientist could ever predict. Total error is the sum. Capacity trades off bias for variance, regularization
        trades off variance for bias, and noise sits there waiting for better labels.
      </p>
    </VIS.Section>
  </main>
);
