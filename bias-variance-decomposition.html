        ]}
        trap={<>(a) is the tech lead's instinct and the textbook reading — "train ≈ val, both high → bias problem." But it assumes σ² is small. At 0.4% positives, fraud labels are inherently ambiguous (two expert reviewers often disagree on the same transaction); if σ² ≈ 0.35 AUC, XGBoost won't beat the floor. (e) makes the same mistake — throwing features at a noise-limited problem. The PM was right that labels matter but jumped to "relabel everything"; the cheap version is just measuring σ² first. Three other things are also worth doing as PRIORITY checks before model surgery.</>}
        lens={<>Three correct first moves. <strong>(b)</strong> measure σ² — bias-variance decomposition assumes you know the noise floor. <strong>(c)</strong> use PR-AUC because AUC is rank-based and overstates performance at 0.4% positives. <strong>(d)</strong> check temporal distribution shift — Jan-Mar trained, April val, fraud patterns drift. Only AFTER these checks would picking a new model make sense.</>}
        stretch={<>If inter-rater agreement gives κ = 0.4 (moderate), what's a rough upper bound on achievable AUC?</>}
      />

      <VIS.TrapProblem
        id="bv-p3"
        difficulty="hard"
        title="P3 — You 10× the training data and val loss barely moves"
        scenario={<>Two-tower recommendation model for a streaming video service. 4-layer transformer encoder per tower, 256-dim embedding, InfoNCE loss with 32 in-batch negatives, AdamW <code>lr=1e-4</code>. You scale training from <strong>10M → 100M</strong> user-item interactions (same time window, same architecture, same loss, same hardware). Val NDCG@10: 0.41 → 0.43. Train NDCG@10: 0.42 → 0.44. <strong>Both moved together, barely.</strong> The interactions are binary clicks ("user watched this title"). User dwell-time is captured upstream but currently unused in training. Diagnose.</>}
        options={[
          {key:"a", text:"Variance problem — keep scaling; go to 1B interactions."},
          {key:"b", text:"Bias problem — model is too simple; double embedding dim 256→512."},
          {key:"c", text:"You're at the irreducible noise floor; binary clicks ≠ true preference. Move to dwell-time-weighted soft labels.", correct:true},
          {key:"d", text:"Distribution shift between train and val — investigate the temporal split."},
        ]}
        trap={<>(a) leans on scaling laws — "more data always helps." But scaling laws apply when you're NOT yet at the noise floor; when val AND train both refuse to move together as you add data, you're already at σ². (b) is the bigger-model textbook move — but bias-limited problems show train MOVING with capacity. Here both metrics are stuck. (d) is a sanity-check candidate but doesn't explain why TRAIN ALSO stopped improving.</>}
        lens={<>This is the irreducible noise floor σ². When you scale data and both train AND val plateau together, the labels themselves have inherent noise — binary clicks are notoriously noisy on streaming (accidental clicks, autoplay, partial watches). The fix is BETTER LABELS: use dwell-time as soft labels (or as a positive-weighting), or filter out interactions below a watch-time threshold. The dwell-time field mentioned in the scenario is the clue.</>}
        stretch={<>How would you discriminate this from distribution shift (option d)? What single experiment cleanly separates the two?</>}
      />

      <VIS.TrapProblem
        id="bv-p4"
        difficulty="hard"
        title="P4 — k-NN bias-variance arithmetic"
        scenario={<>k-NN regression on a noisy 2D task (mortgage default rate prediction). Empirically measured at the same input <code>x</code> across many bootstrap training sets: at <strong>k=1</strong>, bias² = 0.01, variance = 0.85. At <strong>k=100</strong>, bias² = 0.42, variance = 0.02. Irreducible noise σ² = 0.05 (estimated from repeat sales of identical properties). Test error = bias² + variance + σ². Which k minimizes test error?</>}
        options={[
          {key:"a", text:"k=1 — bias is lowest, and bias is what matters most for accuracy."},
          {key:"b", text:"k=100 — variance is lowest, and production needs stable predictions."},
          {key:"c", text:"Around k ≈ 15, near the interior minimum where bias and variance are balanced.", correct:true},
          {key:"d", text:"Depends on the loss function — no single k is optimal without specifying loss."},
        ]}
        trap={<>(a) and (b) both pick extremes. At k=1: total = 0.01 + 0.85 + 0.05 = 0.91. At k=100: total = 0.42 + 0.02 + 0.05 = 0.49. (a) is much worse than (b), but neither is the minimum. The classic U-curve has its minimum in the INTERIOR. (d) is a clever-sounding non-answer; squared error is the standard regression loss and the question specifies it via bias²+variance.</>}
        lens={<>Interpolating: at moderate k (around 15), bias² ≈ 0.10 and variance ≈ 0.18 — total ≈ 0.33. The minimum is where ∂(bias² + variance)/∂k = 0, in the interior. Extremes are almost never optimal. k acts as inverse capacity (higher k = simpler model) — this IS the bias-variance U-curve.</>}
        stretch={<>If σ² jumped from 0.05 to 0.50, would the optimal k shift, and which way?</>}
      />

      <VIS.TrapProblem
        id="bv-p5"
        difficulty="hard"
        title="P5 — Random forest: 100 → 1000 trees, variance barely drops"
        scenario={<>Random forest for customer-LTV regression. 100 trees, <code>max_depth=10</code>, <code>mtry=√p</code> (default for regression), bootstrap with replacement, training set fixed at 200k rows. You measure empirical prediction variance ≈ 0.12 across many test inputs. You scale to 1000 trees (10×, same config). Variance now ≈ 0.108 — only a 10% drop. Why such a small improvement?</>}
        options={[
          {key:"a", text:"Bug — more trees should always cut variance proportionally (variance / n)."},
          {key:"b", text:"Trees are highly correlated (ρ ≈ 0.9) because they share the same training data; ensemble variance asymptotes at σ²·ρ.", correct:true},
          {key:"c", text:"Bias dominates — adding trees can't fix bias."},
          {key:"d", text:"mtry is too low — trees are over-decorrelated."},
        ]}
        trap={<>(a) is the textbook ensemble-variance reading — "n trees give σ²/n." That's true ONLY when trees are uncorrelated. (c) confuses what variance tracks (single-tree noise across bootstrap samples) with the test-error implications. (d) reverses the math — mtry TOO LOW gives MORE diversity and LOWER ρ; the issue here is ρ TOO HIGH, which means mtry should go DOWN, not up.</>}
        lens={<>Ensemble variance: Var(avg of n correlated predictions) = σ²·(1-ρ)/n + σ²·ρ. As n → ∞, variance → σ²·ρ, not 0. With ρ ≈ 0.9 (typical for RF on a fixed 200k dataset because trees share most of their bootstrap samples), the floor is ~0.9·σ². 100 → 1000 trees moves you from ~0.901·σ² to ~0.9001·σ² — practically nothing. To actually reduce variance: lower ρ (decorrelate trees) by reducing mtry, deeper subsample fractions, or switch to extra-trees.</>}
        stretch={<>What's the lowest variance you can hope to reach with this ensemble if ρ = 0.9 is fixed by the data?</>}
      />

      <VIS.TrapProblem
        id="bv-p6"
        difficulty="hard"
        multiSelect
        title="P6 — Optuna 5-fold CV 0.92, test set 0.85: explain the 7-point gap"
        scenario={<>Churn prediction. XGBoost. 1M total rows split 80/20 (800k train, 200k test, random split, never touched during tuning). On the 800k train, you run 5-fold stratified CV with <strong>Optuna for 300 trials</strong> tuning (max_depth, learning_rate, min_child_weight, subsample, colsample_bytree). CV result: mean AUC = <strong>0.92</strong>, std across folds = 0.01 (very tight). You finally evaluate on the held-out 200k test set: AUC = <strong>0.85</strong>. A 7-point gap. Which factors plausibly explain it? Select all that apply.</>}
        options={[
          {key:"a", text:"Optuna's 300 trials overfit to the specific CV folds; Bayesian HPO concentrates samples near CV optima.", correct:true},
          {key:"b", text:"Model variance — XGBoost is too flexible; reduce max_depth."},
          {key:"c", text:"Train and test come from different distributions."},
          {key:"d", text:"The tight CV std (0.01) was misleadingly optimistic — feature correlation across folds inflated apparent stability.", correct:true},
          {key:"e", text:"200k test is too small to give a reliable AUC estimate."},
        ]}
        trap={<>(b) is tempting because "AUC gap = variance problem" is the reflex — but XGBoost variance shows up as fold-to-fold std differences, and the CV std was 0.01 (tight). (c) is wrong: random splits rule out distribution shift by construction. (e) is wrong: 200k is plenty for a stable AUC estimate (CI under 0.005). The real story is more subtle: when you tune HPO on CV scores 300 times, you're not measuring model quality — you're measuring "how well can a sampler exploit CV noise."</>}
        lens={<>Two correct: <strong>(a)</strong> HPO overfit to CV folds via Optuna's adaptive sampling, and <strong>(d)</strong> tight CV std masked the fact that fold scores were correlated (not independent draws). Together: CV AUC was optimistic by ~0.05-0.07. Fix: hold out a SECOND validation set just for the final HPO selection, or use nested CV (outer fold drives final score, inner fold drives HPO).</>}
        stretch={<>If you used random search instead of Optuna with the same 300 trials, would the gap shrink? Why?</>}
      />

      <VIS.TrapProblem
        id="bv-p7"
        difficulty="hard"
        multiSelect
        title="P7 — Same data, two seeds: 88% vs 79% test accuracy"
        scenario={<>You train the same DistilBERT architecture for sentiment classification on the same 50k-example labeled dataset with two different random seeds. Config identical: AdamW <code>lr=2e-5</code>, batch=16, max_len=512, 3 epochs, same hardware, same library versions. Result: <strong>Seed 1 = 88% test accuracy. Seed 2 = 79%</strong>. A 9-point gap purely from seed variation. Which of the following are valid diagnoses or fixes? Select all that apply.</>}
        options={[
          {key:"a", text:"Different seeds explored different local minima of the loss landscape — initialization variance.", correct:true},
          {key:"b", text:"Ensemble predictions across 5+ seeds (deep ensemble) — averages out initialization variance.", correct:true},
          {key:"c", text:"This IS the classical bias-variance decomposition acting on training-set resampling."},
          {key:"d", text:"Use SWA (Stochastic Weight Averaging) — average weights along the training trajectory of one seed.", correct:true},
          {key:"e", text:"Train longer (10 epochs instead of 3) — convergence will eliminate seed sensitivity."},
          {key:"f", text:"Switch optimizer to SGD with momentum — Adam-family optimizers are seed-sensitive."},
        ]}
        trap={<>(c) is the textbook bias-variance reflex but technically wrong here — the standard decomposition is over training-SET resampling, not seed. Same data, different seed = different OPTIMIZATION trajectory, not different sample. The framework still applies in spirit but the term "variance" is overloaded. (e) is naively reassuring but actually amplifies divergence in fine-tuning regimes — small datasets + many epochs makes each seed dive into deeper-but-different minima. (f) is unjustified speculation; SGD vs Adam-family doesn't reliably reduce seed variance for transformer fine-tuning.</>}
        lens={<>Three correct: <strong>(a)</strong> the diagnosis (initialization variance), <strong>(b)</strong> deep ensembling across seeds, <strong>(d)</strong> SWA. The 9-point gap is real for transformer fine-tuning on small data — Mosbach et al. (2021) document it as standard. The cure is averaging — across seeds (ensemble) or across the training trajectory (SWA).</>}
        stretch={<>If you only have budget for ONE final model, which is preferable: a single seed picked by val performance, or SWA over the trajectory of one seed?</>}
      />

      <VIS.TrapProblem
        id="bv-p8"
        difficulty="hard"
        title="P8 — Over-regularization U-curve"
        scenario={<>Ridge regression for housing-price prediction. You sweep L2 regularization strength λ over four orders of magnitude. Train and test MSE on the same fixed split: <strong>λ=0</strong> → train 0.10, test 0.85. <strong>λ=0.01</strong> → 0.18, 0.45. <strong>λ=1</strong> → 0.35, 0.40. <strong>λ=100</strong> → 0.80, 0.81. Why does λ=100 make BOTH train AND test worse than λ=1?</>}
        options={[
          {key:"a", text:"Bug — regularization should never make BOTH train and test worse than a smaller λ."},
          {key:"b", text:"High λ shrinks all weights toward zero; the model degenerates to predicting the mean. Bias dominates.", correct:true},
          {key:"c", text:"Test variance is so low at λ=100 you should ship it — production needs stability."},
          {key:"d", text:"Numerical instability at high λ inflates both errors."},
        ]}
        trap={<>(a) misreads the U-curve: bias rises monotonically with λ, but variance also falls — past the sweet spot, bias growth overtakes variance reduction. (c) is a clever-sounding production argument that ignores that test is WORSE at λ=100 than at λ=1. (d) blames math when math is fine.</>}
        lens={<>This is the right end of the bias-variance U-curve. At λ=100, weights are squished so hard the model predicts roughly the training mean for every input — high bias, very low variance, but the bias dominates by miles. Train MSE rising past λ=1 IS the diagnostic: regularization is no longer fixing variance, it's introducing bias. λ=1 is near the sweet spot.</>}
        stretch={<>If you plotted bias² and variance separately across λ, what would each curve look like?</>}
      />

      <VIS.TrapProblem
        id="bv-p9"
        difficulty="hard"
        multiSelect
        title="P9 — Imbalanced data: AUC 0.95 train / 0.91 val. Senior says ship it."
        scenario={<>Fraud detection model, 1% positive rate, 50M total transactions. XGBoost with class-weighting. <strong>Train AUC 0.95, val AUC 0.91, val PR-AUC 0.32</strong>. A senior eng says "tight AUC gap, low variance — ship it." You suspect this isn't the full story. Which additional checks should you do before agreeing to ship? Select all that apply.</>}
        options={[
          {key:"a", text:"Plot precision-recall curves on val — AUC is rank-based and overstates performance on imbalanced data.", correct:true},
          {key:"b", text:"Measure precision at the specific recall you'll deploy (e.g., precision @ recall=0.6).", correct:true},
          {key:"c", text:"Run a calibration check (reliability diagram) — well-ranked ≠ well-calibrated probabilities.", correct:true},
          {key:"d", text:"Switch the primary loss from CE to log-loss to fix the imbalance."},
          {key:"e", text:"Drop XGBoost in favor of logistic regression — XGBoost overfits on imbalanced classes."},
          {key:"f", text:"Increase the class-weight on positives from current value to 100×."},
        ]}
        trap={<>(d) is a category error: CE = log-loss for binary classification. They're the same thing. (e) is broad speculation — XGBoost can handle imbalance fine; the question isn't whether the model overfits, it's whether the metric is honest. (f) is a parameter knob without diagnosis. The trap on this question is mistaking "ship" for "test by which metric" — the senior is judging on AUC, but the relevant operational quality lives in precision-recall + calibration.</>}
        lens={<>Three correct: <strong>(a) PR curves</strong> reveal what AUC hides at 1% positives; <strong>(b) precision-at-deployment-recall</strong> is the business metric; <strong>(c) calibration</strong> matters when downstream decisions are threshold-based or use probabilities directly. The val PR-AUC of 0.32 is the real signal — much weaker than AUC 0.91 suggests, and the senior eng would catch this if they looked.</>}
        stretch={<>If calibration fails (predicted probability of fraud is systematically too high), what's the fix that DOESN'T require retraining?</>}
      />

      <VIS.TrapProblem
        id="bv-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Diverging val: which actions actually help?"
        scenario={<>Transformer for sentiment classification (3-class: positive/neutral/negative). You fine-tune for 15 epochs. <strong>Train accuracy</strong> climbs monotonically: 75% (e1) → 90% (e8) → 99% (e15). <strong>Val accuracy</strong> peaks at epoch 8 at <strong>78%</strong>, then DROPS to <strong>74%</strong> by epoch 15. Gap widens. Config: AdamW <code>lr=3e-5</code>, batch=32, max_len=512, <strong>no warmup, no LR schedule</strong>. Training set: 8k labeled examples. Val set fixed across all epochs (same 1k held-out examples). Which actions would help close or prevent the val gap? Select all that apply.</>}
        options={[
          {key:"a", text:"Take the epoch-8 checkpoint (early stopping at peak val).", correct:true},
          {key:"b", text:"Add dropout 0.1-0.3 in the classification head.", correct:true},
          {key:"c", text:"Add weight decay 0.01 to AdamW.", correct:true},
          {key:"d", text:"Switch optimizer to SGD with momentum=0.9."},
          {key:"e", text:"Increase max_len from 512 to 1024."},
          {key:"f", text:"Reduce training data from 8k to 4k examples."},
          {key:"g", text:"Add LR warmup (500 steps) + linear decay schedule."},
        ]}
        trap={<>(d) and (e) are reflex tweaks that don't address the core issue. (d) SGD vs AdamW is unrelated to the variance gap; AdamW is the standard for transformer fine-tuning. (e) longer sequences don't fix overfit, they consume more compute. (f) is the OPPOSITE of correct — less data amplifies variance. (g) is interesting but actually orthogonal: LR schedule helps stability but a model that overfits at epoch 8 with no schedule will still overfit at epoch 8 with one. The schedule lets you train longer SAFELY but doesn't shrink the gap.</>}
        lens={<>Three correct: <strong>(a) early stopping</strong> is the cheapest fix and you already have the checkpoint. <strong>(b) dropout</strong> adds regularization to the classification head where overfit lives. <strong>(c) weight decay</strong> constrains weight magnitudes globally. These three are the bias-variance variance-reduction toolkit applied to fine-tuning.</>}
        stretch={<>If the val curve weren't diverging but instead was JUST PLATEAUED at 78% while train kept climbing, would the right action change?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-drills" title="Trap drills — 15 short multiple-choice">
      <p style={{color:"#475569", marginBottom: 16}}>
        Fifteen short drills probing different angles of the same concept: identity (what counts as bias/variance), mechanism (why the math works the way it does), arithmetic (point estimates of bias², variance, σ²), intuition (mapping diagnostics to causes), and failure modes (where the textbook decomposition stops applying). Each is single-correct unless marked otherwise.
      </p>

      <VIS.TrapProblem
        id="bv-q11"
        difficulty="hard"
        title="Q11 — Which is variance, not bias?"
        scenario={<>You re-train the SAME architecture on five different bootstrap resamples of the same dataset. The five resulting models give predictions <strong>0.10, 0.55, 0.22, 0.78, 0.41</strong> for the same input <code>x</code>. The true label at <code>x</code> is 0.40. What does the SPREAD across the five predictions measure?</>}
        options={[
          {key:"a", text:"Bias — the predictions don't agree with the truth."},
          {key:"b", text:"Variance — spread across training-set resamples is the definition of variance.", correct:true},
          {key:"c", text:"Noise (σ²) — the labels themselves are randomly varying."},
          {key:"d", text:"Generalization gap — train vs test difference."},
        ]}
        trap={<>(a) confuses "wrong" with "spread." Even though some predictions miss 0.40, the variance is about disagreement <em>among the five</em>, not their distance to truth. (c) confuses model variance with label noise — σ² is a property of the data, not of the models you trained. (d) is about train vs test, a different axis.</>}
        lens={<>Variance at x = E_D[(f̂_D(x) − E_D[f̂_D(x)])²]. The 5 predictions have mean ≈ 0.41 and spread ≈ 0.25 — that spread IS the variance. Bias would be |0.41 − 0.40|² ≈ 0 here; this procedure happens to be nearly unbiased at this input.</>}
      />

      <VIS.TrapProblem
        id="bv-q12"
        difficulty="hard"
        title="Q12 — Identity: deep net memorizes train, generalizes test"
        scenario={<>A 100M-parameter transformer reaches <strong>0% train loss</strong> (perfect memorization) and 18% test error — better than any smaller model. Classical theory predicts variance should explode at the interpolation threshold. What's the closest correct framing?</>}
        options={[
          {key:"a", text:"Classical bias-variance is wrong; ignore the framework for deep nets."},
          {key:"b", text:"This is double descent — variance can drop AGAIN past the interpolation threshold in over-parameterized regimes.", correct:true},
          {key:"c", text:"The model has zero bias and zero variance — perfect generalization."},
          {key:"d", text:"Train loss = 0 always means overfit; the 18% test error proves it."},
        ]}
        trap={<>(a) overcorrects — classical theory still describes most practical ML; it's just incomplete for over-parameterized regimes. (c) ignores σ²: 18% test error means real error, which must be bias + variance + noise. (d) misses that test error 18% may BEAT smaller models — the train=0 isn't itself the problem.</>}
        lens={<>The Belkin et al. 2019 double-descent phenomenon: as capacity grows past the interpolation threshold (params ≥ examples), test error first SPIKES (classical overfit), then DECREASES again. Inductive biases of SGD on huge nets implicitly regularize, pulling variance down.</>}
      />

      <VIS.TrapProblem
        id="bv-q13"
        difficulty="hard"
        title="Q13 — Add features: bias or variance up?"
        scenario={<>Linear regression. You add 50 weakly informative features to a 10-feature baseline (no regularization, fixed training set size 5,000). All else equal, what happens to the expected decomposition components?</>}
        options={[
          {key:"a", text:"Bias up, variance down."},
          {key:"b", text:"Bias down (or flat), variance up.", correct:true},
          {key:"c", text:"Both up."},
          {key:"d", text:"Both down — more features always helps."},
        ]}
        trap={<>(a) reverses the direction — capacity going UP lowers bias, not raises it. (c) and (d) are reflex picks that don't track the actual mechanism: adding feature dimensions while training-set size stays fixed inflates the number of parameters per example, which is the variance lever.</>}
        lens={<>Adding features increases the function class — bias can only go down (or stay flat if features carry no signal). But with fixed n, variance rises because each weight estimate gets noisier. Classical p/n curse-of-dimensionality. Regularization is the standard counter.</>}
      />

      <VIS.TrapProblem
        id="bv-q14"
        difficulty="hard"
        title="Q14 — Arithmetic: total error from components"
        scenario={<>At input <code>x</code>: bias = 0.3 (NOT squared), variance = 0.04, σ² = 0.05. What is the expected squared error at <code>x</code>?</>}
        options={[
          {key:"a", text:"0.39"},
          {key:"b", text:"0.3² + 0.04 + 0.05 = 0.18", correct:true},
          {key:"c", text:"(0.3 + 0.04 + 0.05)² = 0.1521"},
          {key:"d", text:"Cannot compute without knowing the model class."},
        ]}
        trap={<>(a) is the classic algebra slip: candidates add bias directly instead of squaring it. Bias enters as bias², not bias. (c) is the second classic slip: squaring the SUM is not the same as summing the squares. (d) is a confident-sounding non-answer; the decomposition is model-agnostic.</>}
        lens={<>Expected squared error = bias² + variance + σ² = 0.09 + 0.04 + 0.05 = 0.18. The "²" on bias is load-bearing — it's why high-bias procedures get punished super-linearly.</>}
      />

      <VIS.TrapProblem
        id="bv-q15"
        difficulty="hard"
        title="Q15 — Mechanism: why does averaging predictions cut variance?"
        scenario={<>You bag 100 INDEPENDENT (ρ=0) decision trees, each with prediction variance σ² at a given input. What's the variance of the bagged average?</>}
        options={[
          {key:"a", text:"σ² — averaging doesn't change variance."},
          {key:"b", text:"σ²/100 = 0.01·σ²", correct:true},
          {key:"c", text:"σ²·100 — variance accumulates."},
          {key:"d", text:"Zero — averaging cancels all noise."},
        ]}
        trap={<>(a) ignores the n-divisor for independent averages. (c) reverses the direction. (d) over-claims: averaging cuts noise toward 0 only with infinitely many independent samples; bias survives averaging.</>}
        lens={<>Var(average of n iid with var σ²) = σ²/n. With correlation ρ, the formula becomes σ²·ρ + σ²·(1−ρ)/n → σ²·ρ as n→∞. Independence is the magic ingredient. RF/bagging tries to push ρ down via bootstrap + feature subsampling.</>}
      />

      <VIS.TrapProblem
        id="bv-q16"
        difficulty="hard"
        title="Q16 — Diagnose: low train, low val, big test gap"
        scenario={<>Train loss <strong>0.10</strong>. Val loss <strong>0.11</strong>. Test loss (held-out, freshly collected last month) <strong>0.55</strong>. What's the most likely cause?</>}
        options={[
          {key:"a", text:"Variance problem — model is overfitting."},
          {key:"b", text:"Bias problem — model is too simple."},
          {key:"c", text:"Distribution shift between train/val and test.", correct:true},
          {key:"d", text:"Noise — σ² is high."},
        ]}
        trap={<>(a) and (b) both assume bias/variance — but train and val agree, ruling out classical overfit (which would split them). (d) noise affects all three equally, not test alone. The signature "train ≈ val ≫ test" with test collected from a different time window is distribution shift.</>}
        lens={<>Bias-variance assumes train/val/test all drawn from the SAME distribution. When the test set is freshly collected, you've broken the assumption. Diagnose with feature distributions (KS test), label distributions, or a domain classifier between train and test.</>}
      />

      <VIS.TrapProblem
        id="bv-q17"
        difficulty="hard"
        title="Q17 — k-NN: which way does k shift the U-curve?"
        scenario={<>For k-nearest-neighbor regression, INCREASING k pushes the procedure toward which corner of the bias-variance plot?</>}
        options={[
          {key:"a", text:"Low bias, low variance — bigger k is always better."},
          {key:"b", text:"High bias, low variance — averaging over more neighbors stabilizes predictions but flattens signal.", correct:true},
          {key:"c", text:"Low bias, high variance — more neighbors = more options."},
          {key:"d", text:"High bias, high variance — k-NN degrades both ways."},
        ]}
        trap={<>(a) and (d) are both wrong-direction picks. (c) reverses the actual effect — more neighbors smooths predictions, which is exactly what reduces variance.</>}
        lens={<>k acts as INVERSE capacity. k=1 = each test point predicted by one neighbor (high variance, low bias). k=n = predict the global mean (zero variance, max bias). This is the canonical U-curve example.</>}
      />

      <VIS.TrapProblem
        id="bv-q18"
        difficulty="hard"
        title="Q18 — Identity: is dropout a bias-reducer or variance-reducer?"
        scenario={<>Adding dropout (p=0.5) to a fully-connected layer during training. Net effect on the bias-variance decomposition of the procedure?</>}
        options={[
          {key:"a", text:"Reduces bias — dropout makes the model more flexible."},
          {key:"b", text:"Reduces variance at a small cost to bias — dropout is regularization.", correct:true},
          {key:"c", text:"Reduces both bias and variance."},
          {key:"d", text:"Increases both — dropout is just noise."},
        ]}
        trap={<>(a) confuses dropout with adding parameters. Dropout REDUCES effective capacity per forward pass. (c) is the over-promise; regularization always trades a little bias for variance reduction — you can't get both for free. (d) misreads dropout's role: the "noise" IS the regularizer.</>}
        lens={<>Dropout is a variance-reduction technique. At training time it acts like an implicit ensemble over sub-networks; at inference time the weights are scaled. Net: variance drops, bias rises slightly, total error usually drops.</>}
      />

      <VIS.TrapProblem
        id="bv-q19"
        difficulty="hard"
        title="Q19 — Mechanism: why is cross-entropy decomposition messier?"
        scenario={<>Why doesn't the clean bias² + variance + σ² decomposition apply directly to cross-entropy loss in classification?</>}
        options={[
          {key:"a", text:"Cross-entropy is non-convex; decomposition requires convex loss."},
          {key:"b", text:"The decomposition relies on the squared-error identity (a−b)² = a² − 2ab + b² — under CE, the analogous expansion has cross-terms that don't vanish, so 'bias' and 'variance' aren't unique.", correct:true},
          {key:"c", text:"Classification has no notion of bias or variance."},
          {key:"d", text:"Cross-entropy is exactly equivalent — the decomposition transfers directly."},
        ]}
        trap={<>(a) is a plausible-sounding red herring; convexity isn't the issue. (c) overclaims — there ARE classification analogues (Domingos 2000), they're just not unique. (d) is wrong: squared-error is the only loss where the decomposition is canonical.</>}
        lens={<>Squared error decomposes because (y − ŷ)² expands cleanly. For CE the analogous Domingos decomposition introduces a "noise" term that interacts with bias non-additively, and the variance term can be DEFINED in several non-equivalent ways. Use squared-error intuition cautiously for classifiers.</>}
      />

      <VIS.TrapProblem
        id="bv-q20"
        difficulty="hard"
        title="Q20 — Arithmetic: more data, fixed model"
        scenario={<>You hold model class fixed (degree-3 polynomial) and grow the training set from 1,000 → 1,000,000 examples. Which component is MOST affected?</>}
        options={[
          {key:"a", text:"Bias — more data lets the model learn the true function."},
          {key:"b", text:"Variance — more data tightens the fit across resamples.", correct:true},
          {key:"c", text:"σ² — irreducible noise drops with more data."},
          {key:"d", text:"All three drop equally."},
        ]}
        trap={<>(a) confuses "more data" with "more capacity" — bias is set by the model class, which is held fixed. (c) is the most common confusion: σ² is a property of the DATA-GENERATING distribution, not the sample size. Drawing more samples doesn't change how noisy each label is.</>}
        lens={<>Variance ∝ 1/n for most reasonable procedures. With a fixed function class, bias floor is set; more data can only push variance toward zero, not bias. σ² is a property of the joint distribution P(x,y) and stays put.</>}
      />

      <VIS.TrapProblem
        id="bv-q21"
        difficulty="hard"
        multiSelect
        title="Q21 — Which reduce variance, NOT bias? (multi-select)"
        scenario={<>Select all techniques that primarily reduce variance with a small bias cost, not the other way around.</>}
        options={[
          {key:"a", text:"L2 / ridge regularization", correct:true},
          {key:"b", text:"Adding more layers to a neural net"},
          {key:"c", text:"Bagging / random forest", correct:true},
          {key:"d", text:"Early stopping", correct:true},
          {key:"e", text:"Higher-degree polynomial features"},
          {key:"f", text:"Dropout", correct:true},
        ]}
        trap={<>(b) and (e) are CAPACITY INCREASES — they reduce bias, raise variance. Reflex picks from candidates who associate "more knobs" with "more regularization." The four correct items all CONSTRAIN the effective hypothesis class.</>}
        lens={<>Four correct: L2, bagging, early stopping, dropout. All four reduce variance via different mechanisms — weight shrinkage, ensemble averaging, optimization-path truncation, stochastic sub-networks. They all pay a small bias cost.</>}
      />

      <VIS.TrapProblem
        id="bv-q22"
        difficulty="hard"
        title="Q22 — Failure mode: high-dim where decomposition gives wrong intuition"
        scenario={<>In high-dimensional sparse classification (e.g., genome-wide association: 1M SNPs, 5k subjects), the classical bias-variance U-curve breaks down because:</>}
        options={[
          {key:"a", text:"Bias becomes irrelevant — the truth is unknowable in high dimensions."},
          {key:"b", text:"All models have the same variance in high-D."},
          {key:"c", text:"With p ≫ n, the variance term dominates everything; classical capacity ↔ U-curve becomes a monotonic 'more capacity = more variance' line.", correct:true},
          {key:"d", text:"Bias and variance swap roles when p > n."},
        ]}
        trap={<>(a) is poetic but wrong — bias is still defined. (b) is plain false. (d) is a made-up symmetry. The actual phenomenon: in p ≫ n regimes the model can interpolate easily, so variance is the binding constraint everywhere.</>}
        lens={<>When p ≫ n, even a linear model has enough capacity to fit any training set — the bias term becomes near-zero across the meaningful range. The U-curve flattens on the left and the rest is dominated by variance. This is why L1/sparse methods dominate in genomics.</>}
      />

      <VIS.TrapProblem
        id="bv-q23"
        difficulty="hard"
        title="Q23 — Intuition: bagging vs boosting"
        scenario={<>Random Forests (bagging) and Gradient Boosting (sequential) both produce strong tree ensembles. Which primarily reduces VARIANCE and which primarily reduces BIAS?</>}
        options={[
          {key:"a", text:"Bagging reduces bias; boosting reduces variance."},
          {key:"b", text:"Bagging reduces variance; boosting reduces bias.", correct:true},
          {key:"c", text:"Both reduce variance; bias is set by tree depth."},
          {key:"d", text:"Both reduce bias; they're functionally equivalent."},
        ]}
        trap={<>(a) reverses the actual roles — a classic interview trap because both are "ensembles" and candidates fail to distinguish them. (c) and (d) collapse the distinction. The two algorithms occupy different corners of the bias-variance plot.</>}
        lens={<>Bagging averages high-variance, low-bias base learners (deep trees) — reducing variance via ensemble averaging. Boosting sequentially fits weak, high-bias learners (shallow trees) to residuals — reducing bias via additive model expansion. Different mechanisms, complementary failure modes.</>}
      />

      <VIS.TrapProblem
        id="bv-q24"
        difficulty="hard"
        title="Q24 — Identity: which quantity does NOT depend on training data?"
        scenario={<>In the decomposition bias² + variance + σ², which term is a property of the DATA (independent of model choice or training set)?</>}
        options={[
          {key:"a", text:"Bias² — it depends only on the truth f(x)."},
          {key:"b", text:"Variance — it depends only on the input distribution."},
          {key:"c", text:"σ² — it's the inherent label noise, set by the joint distribution P(x,y).", correct:true},
          {key:"d", text:"All three are model-dependent."},
        ]}
        trap={<>(a) is wrong: bias depends on the model's AVERAGE prediction, which is a function of the learning procedure. (b) confuses input variance with prediction variance — only the latter is in the decomposition. (d) overclaims model dependence.</>}
        lens={<>σ² is determined by P(y | x) — even an oracle predictor returning the conditional mean has σ² residual error. Bias and variance are properties of the LEARNING ALGORITHM. This is why "reducing σ²" requires better labels or features, not a better model.</>}
      />

      <VIS.TrapProblem
        id="bv-q25"
        difficulty="hard"
        multiSelect
        title="Q25 — Real-world: which symptoms point at NOISE, not bias or variance? (multi-select)"
        scenario={<>You're stuck at a plateau. Which symptoms suggest you're hitting the σ² floor rather than a bias or variance problem? Select all that apply.</>}
        options={[
          {key:"a", text:"Train and val both stop improving as you scale data 10×.", correct:true},
          {key:"b", text:"Inter-annotator agreement on a sample of 200 labels is κ ≈ 0.35.", correct:true},
          {key:"c", text:"Train accuracy 99%, val accuracy 70%, large gap."},
          {key:"d", text:"Two independently trained models predict different things on the same examples."},
          {key:"e", text:"Identical inputs in your data have different labels.", correct:true},
          {key:"f", text:"Adding 10 more features doesn't help."},
        ]}
        trap={<>(c) is variance, not noise — large train/val gap is the textbook overfit signature. (d) is also variance — disagreement across models = procedure variance. (f) could be many things (irrelevant features, capacity issue) — not specifically noise.</>}
        lens={<>Three correct noise-floor signals: <strong>(a)</strong> simultaneous train/val plateau under data scaling, <strong>(b)</strong> low inter-annotator agreement bounds achievable performance, <strong>(e)</strong> label collisions on identical features are direct empirical σ². When you see these, no model surgery will help — you need better labels.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <p style={{color: "#475569", marginBottom: 12}}>
        Ranked by what builds intuition fastest. Blog posts first — they often beat the original paper for working understanding.
      </p>

        <li>

        </li>
        <li>
          <a href="https://karpathy.github.io/2019/04/25/recipe/" target="_blank" rel="noopener">

          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Practitioner field guide. Karpathy's "overfit first, then regularize" workflow IS the bias-variance tradeoff applied to deep nets — read the "Become one with the data" and "Set up the end-to-end training/evaluation skeleton" sections.

          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(video, ~6 min)</span>

        <li>

          <span style={{color:"#64748b", fontSize:14}}>(paper, arXiv / PNAS 2019)</span>

      </ul>
