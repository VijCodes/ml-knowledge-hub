  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// GOLD-STANDARD EXAMPLE for /visualize.
// Demonstrates the four-beat pattern with a visual element at EVERY beat:
//   1. Thought experiment + scenario chart (Vega-Lite — 100 fits overlaid)
//   2. Name + formal def + archery-target SVG comparison
//   3. Math + decomposition Mermaid diagram
//   4. Practical + decision-tree Mermaid
// Plus mandatory "Further reading" with curated external links.

// --- Vega-Lite for Beat 1: 30 polynomial fits per scenario, overlaid ---
function makeFitData(degree, n_runs=30, seed=42) {
  // Pseudo-random fits: each "run" gets a slightly different sine + noise.
  const out = [];
  for (let r = 0; r < n_runs; r++) {
    for (let i = 0; i <= 30; i++) {
      const x = i / 30;
      let y;
      if (degree === 1) {
        // Flat-ish line: high bias, low variance
        y = 0.5 + 0.05 * Math.sin(r * 0.7);
      } else {
        // Wiggly: low bias, high variance
        const phase = r * 0.5;
        y = 0.5 + 0.4 * Math.sin(2 * Math.PI * x + phase) +
            0.2 * Math.sin(8 * Math.PI * x + phase * 1.3) * 0.5;
      }
      out.push({ x, y, run: r, degree: degree === 1 ? "Too simple" : "Too flexible" });
    }
  }
  // Add "truth" line
  for (let i = 0; i <= 30; i++) {
    const x = i / 30;
    out.push({ x, y: 0.5 + 0.4 * Math.sin(2 * Math.PI * x), run: -1, degree: "Truth" });
  }
  return out;
}
const FITS_DATA = [...makeFitData(1), ...makeFitData(15)];

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Fund · Concept"
      title="Bias–variance tradeoff"
      subtitle={<>Why every model's <VIS.Term def="The average squared difference between predictions and true labels across the data-generating distribution. The thing you actually want to minimize at deployment time.">expected error</VIS.Term> decomposes into three named pieces, and why two of them pull against each other.</>}
      byline={[
        {label: "Audience", value: "smart but new to ML"},
        {label: "Source", value: "Geman et al. 1992"},
      ]}/>

    <VIS.TLDR>
      Total expected error for a model splits into three named pieces:{" "}
      <VIS.Term def="How wrong the model's average prediction is. Even with infinite data of the same kind, a too-simple model is systematically off — that gap is bias.">bias</VIS.Term>,{" "}
      <VIS.Term def="How much the model's prediction jumps around when re-trained on different samples drawn from the same population. Flexible models tend to wobble more.">variance</VIS.Term>, and an{" "}
      <VIS.Term def="The randomness baked into the data itself — labels we can never predict perfectly because the world is noisy. Sets a floor below which no model can go.">irreducible noise floor</VIS.Term>.
      You can shrink the first two by changing <VIS.Term def="The richness of the function class a learning algorithm can express — bigger networks, deeper trees, higher-degree polynomials all add capacity. Higher capacity lowers bias but tends to raise variance.">model capacity</VIS.Term>. You cannot shrink the third without better labels. The decomposition is{" "}
      <VIS.Term def="No remainder term — bias² + variance + σ² accounts for every bit of squared-error loss under the data-generating distribution. Astonishing fact, derived in Geman 1992.">exact</VIS.Term>{" "}for squared-error loss.
    </VIS.TLDR>

    <VIS.Section id="sec-experiment" title="Beat 1 — A thought experiment, watched 60 times">
      <p>
        Imagine the same prediction problem (say, "given a house's square-footage, predict its price") is handed to <strong>30 data scientists</strong>. Each one independently collects their own random sample of houses from the same city — same housing market, same underlying patterns — call this their{" "}
        <VIS.Term def="The pool of all possible (features, label) pairs your problem could draw from. We never see all of it; we see samples drawn from it. 'Training set' = one such sample.">data-generating distribution</VIS.Term>.
        We run the experiment twice: once where they all fit a too-simple model (e.g., a linear{" "}
        <VIS.Term def="A function class of the form f(x) = w·x + b. Tiny capacity — can only represent straight-line trends, so it bakes in bias whenever the truth curves.">linear model</VIS.Term>{" "}
        of degree 1), once where they all fit a too-flexible one (e.g., a{" "}
        <VIS.Term def="Polynomial regression of degree 15 — fits up to a 15th-power term in x. Enormous capacity for a 1D problem; will chase noise in any moderate-size sample.">high-degree polynomial</VIS.Term>). Each thin blue line below is one scientist's fit; the red line is the true relationship.
      </p>

      <VIS.VegaLite spec={FITS_SPEC} data={FITS_DATA} />

      <p>
        Left panel: 30 fits, all <em>too simple</em> (basically flat). They cluster tightly together (low{" "}
        <VIS.Term def="Spread of predictions across training-set redraws. The width of the dart cluster — has nothing to do with how wrong the cluster center is.">variance</VIS.Term>) but every one of them misses the actual ups-and-downs of the truth (high{" "}
        <VIS.Term def="Systematic gap between the average prediction (over training-set redraws) and the true value. Where the dart cluster is centered, regardless of spread.">bias</VIS.Term>).
        <strong>Bias is the gap between the average fit and the truth.</strong>
      </p>
      <p>
        Right panel: 30 fits, all <em>too flexible</em> (high-degree polynomial). They go wildly different places — the same input gets predictions all over the map. On average they're closer to the truth, but at any one input, the disagreement across scientists is huge. <strong>Variance is the spread of fits around their own average.</strong> This is the textbook signature of{" "}
        <VIS.Term def="When a model fits training-set quirks that don't generalize. Symptom: train error much lower than test error. Cause: too much capacity for the amount of signal in the data.">overfitting</VIS.Term>.
      </p>
      <p>
        The lesson is in the contrast. <strong>Bias is "wrong on average."</strong> <strong>Variance is "different every time."</strong> They are not the same thing, and they trade off as you change how flexible the{" "}
        <VIS.Term def="The set of functions a learning algorithm can express — e.g., 'all degree-3 polynomials,' 'all 2-layer MLPs with 64 units,' 'all decision trees of depth ≤ 8.' Choice of class fixes the bias-variance frontier you can reach.">model class</VIS.Term>{" "}is. The opposite failure mode —{" "}
        <VIS.Term def="When a model is so simple it can't capture the real signal. Symptom: train AND test error are both high and close together. Cause: too little capacity.">underfitting</VIS.Term>{" "}— shows up as both train and test error being high together.

    <VIS.Section id="sec-name" title="Beat 2 — Naming the pieces (archery target analogy)">

      </p>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 24, margin: "20px 0" }}>
        <ArcheryTarget
          darts={[[55,-30],[60,-25],[58,-20],[62,-35],[55,-25],[63,-22],[57,-18],[60,-30]]}

        />

      <p>
        Now we can name what we observe. Given a{" "}
        <VIS.Term def="A learning procedure — fixed model class plus the optimizer, loss, and any hyperparameters. Bias and variance are properties of this procedure, not of any single fitted model.">learning algorithm</VIS.Term>{" "}(a fixed model class plus how you train it) and a specific input <code>x</code> we want to predict for:
      </p>
      <ul>
        <li><strong>Bias² at x</strong> = how far the AVERAGE prediction (across all training sets) is from the truth, squared. <em>(Center of the dart cluster ↔ bullseye.)</em></li>
        <li><strong>Variance at x</strong> = the SPREAD of predictions across training sets, measured as the average squared deviation from the cluster center. <em>(How wide the cluster is.)</em></li>
        <li><strong>Irreducible noise σ²</strong> = the part of the label that's random even given perfect knowledge of <code>x</code>. Two identical houses can sell for different prices. Equivalent to the{" "}
          <VIS.Term def="The lowest possible error any predictor can achieve given the available features. Set by σ² in regression; by class overlap in classification. No model can do better.">Bayes error rate</VIS.Term>{" "}for the squared-error setting.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-math" title="Beat 3 — The math (one equation, one decomposition)">
      <VIS.Equation display
        tex="\mathbb{E}_{\mathcal{D},\,\varepsilon}\!\big[(y - \hat{f}_{\mathcal{D}}(x))^2\big] \;=\; \underbrace{\big(\mathbb{E}_{\mathcal{D}}[\hat{f}_{\mathcal{D}}(x)] - f(x)\big)^{\!2}}_{\text{bias}^2} \;+\; \underbrace{\mathbb{E}_{\mathcal{D}}\!\big[(\hat{f}_{\mathcal{D}}(x) - \mathbb{E}_{\mathcal{D}}[\hat{f}_{\mathcal{D}}(x)])^2\big]}_{\text{variance}} \;+\; \sigma^2" />

      <VIS.Mermaid chart={`
flowchart TB
  TOTAL["Total expected error"]
  TOTAL --> B["Bias squared"]
  TOTAL --> V["Variance"]
  TOTAL --> N["Irreducible noise"]
  style B fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style V fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style N fill:#e0e7ff,stroke:#6366f1,stroke-width:2px
      `} />

      <p style={{marginTop: 12}}>
        Each branch maps to one piece of the equation:{" "}
        <span style={{background:"#fee2e2", padding:"2px 6px", borderRadius:4}}><strong>Bias²</strong></span>{" "}
        — how far the dart-cluster center is from the bullseye.{" "}
        <span style={{background:"#fef3c7", padding:"2px 6px", borderRadius:4}}><strong>Variance</strong></span>{" "}
        — how wide the dart-cluster is.{" "}
        <span style={{background:"#e0e7ff", padding:"2px 6px", borderRadius:4}}><strong>σ²</strong></span>{" "}
        — randomness baked into the labels; no model can predict it.
      </p>

      <p>Mapping the symbols back to the thought experiment:</p>
      <ul>
        <li><VIS.Term def="A mathematical operator that averages a quantity over a probability distribution. 'E[X over D]' means: imagine drawing many samples from D and computing X each time — the long-run average is E[X].">𝔼<sub>𝒟</sub>[·]</VIS.Term>{" "}= average over training sets drawn from the same data-generating distribution. Concretely: the average over those 30 scientists' fits.</li>
        <li><strong>f(x)</strong> = the true (unknown) value at input <code>x</code> (the bullseye).</li>
        <li><VIS.Term def="The fitted predictor — read 'f-hat sub D of x' — produced by running the learning algorithm on training set D. Different D, different f̂. The whole point of the decomposition is to study this random object.">f̂<sub>𝒟</sub>(x)</VIS.Term>{" "}= what a model fitted on training set 𝒟 predicts at <code>x</code> (one dart).</li>
        <li><strong>σ²</strong> = noise variance. Doesn't depend on the model — it's a property of the data.</li>
      </ul>
      <p>The astonishing fact: the decomposition is <em>exact</em> for{" "}
        <VIS.Term def="The squared-error loss L(y, ŷ) = (y − ŷ)². The bias-variance decomposition splits cleanly under this loss; under cross-entropy or hinge loss the equivalent decomposition is messier and not unique.">squared-error loss</VIS.Term>. No other terms hide in there.</p>

    <VIS.Section id="sec-curve" title="The classic tradeoff curve (capacity ↔ error)">

        <VIS.Term def="The capacity value where the U-shaped total-error curve is minimized — bias and variance are both moderate. Where regularization or early-stopping aim to put you in practice.">sweet spot</VIS.Term>{" "}— the capacity at which adding more flexibility hurts more than it helps. This is the classical{" "}
        <VIS.Term def="The U-shaped test-error curve as a function of model capacity: bias-dominated underfit on the left, sweet spot in the middle, variance-dominated overfit on the right. The mental model classical ML interviews still test on.">U-curve</VIS.Term>.

    <VIS.Section id="sec-practical" title="Beat 4 — What to do about it in practice">
      <VIS.Mermaid chart={`
flowchart TB
  D["Compare train vs test"]
  D --> Q1{"Big gap?"}
  Q1 -->|Yes| V["Variance problem"]
  Q1 -->|No| Q2{"Both high?"}
  Q2 -->|Yes| B["Bias problem"]
  Q2 -->|No| OK["Healthy"]
  style V fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style B fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style OK fill:#dcfce7,stroke:#16a34a,stroke-width:2px

          <span style={{background:"#fef3c7", padding:"2px 8px", borderRadius:4}}><strong>Variance problem</strong></span>{" "}
          — train ≪ test → model is fitting training-set quirks. Try{" "}
          <VIS.Term def="Any technique that constrains model flexibility to reduce variance — L1, L2, dropout, weight decay, data augmentation, early stopping. Trades a little bias for a lot of variance reduction.">regularization</VIS.Term>{" "}(<VIS.Term def="L1 (Lasso) adds |w| penalty — drives weights to exactly zero via corner solutions in the constraint diamond.">L1</VIS.Term>/<VIS.Term def="L2 (Ridge) adds w² penalty — shrinks all weights smoothly toward zero without driving them to zero.">L2</VIS.Term>/<VIS.Term def="Dropout — randomly zero a fraction of activations during training. Acts as a stochastic ensemble at training time, reduces variance.">dropout</VIS.Term>), more data,{" "}
          <VIS.Term def="Combining many models (bagging, random forest, deep ensembles) — averaging predictions cuts variance, can also nudge bias down if base models are diverse enough.">ensembling</VIS.Term>, or a simpler model.
        </p>
        <p style={{margin:"8px 0"}}>
          <span style={{background:"#fee2e2", padding:"2px 8px", borderRadius:4}}><strong>Bias problem</strong></span>{" "}
          — train ≈ test, both high → model class is too simple to represent the truth. Try a bigger model, richer features, or a different model family.
        </p>
        <p style={{margin:"8px 0"}}>
          <span style={{background:"#dcfce7", padding:"2px 8px", borderRadius:4}}><strong>Healthy</strong></span>{" "}
          — train ≈ test, both low → you're at or near the sweet spot.
        </p>

      <VIS.Callout kind="gotcha" title="What the framework does NOT say">
        Bias and variance are properties of the <em>learning algorithm averaged over training sets</em>, not of a single fitted model. One{" "}
        <VIS.Term def="A 50-layer residual convolutional network from He et al. 2015. Common deep-learning baseline; ~25M parameters; reaches ~94% on CIFAR-10 with standard augmentation.">ResNet</VIS.Term>{" "}on one{" "}
        <VIS.Term def="A 60k-image, 10-class color benchmark — airplane/auto/bird/cat/deer/dog/frog/horse/ship/truck at 32×32 resolution. Classic deep-learning yardstick.">CIFAR-10</VIS.Term>{" "}split has one error number — not a bias and a variance separately. Use the framework to reason about <em>choices</em> (capacity, regularization, data size, ensembling), not to label an existing model.
      </VIS.Callout>

      <VIS.Callout kind="warn" title="Modern caveat: double descent">
        For very{" "}
        <VIS.Term def="When a model has more parameters than training examples — characteristic of modern deep nets and all LLMs. Classical bias-variance theory assumed the opposite regime.">over-parameterized</VIS.Term>{" "}models (large neural nets,{" "}
        <VIS.Term def="Large Language Models — transformer decoders with billions of parameters trained on web-scale text. Both highly over-parameterized and highly under-fit relative to total data.">LLMs</VIS.Term>), the test-error curve can dip <em>again</em> past the{" "}
        <VIS.Term def="The capacity at which a model can perfectly fit (interpolate) every training example — train error hits zero. Classical theory said this was the worst possible spot; modern theory says test error often improves past here.">interpolation threshold</VIS.Term>{" "}—{" "}
        <VIS.Term def="A 2019 finding (Belkin et al.) showing test error has a second dip when models become massively over-parameterized — challenged the classical U-curve intuition.">double descent</VIS.Term>.
        The classical U-curve still holds for moderately-sized models on moderately-sized data — which is most practical ML.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-summary" title="The 30-second summary">
      <p>
        Imagine the same prediction problem solved by 30 different data scientists, each with their own random training sample. <strong>Bias</strong> is how wrong they all are on average. <strong>Variance</strong> is how much they disagree with each other. <strong>Noise</strong> is the part nobody could ever predict. Total error is the sum. Capacity trades off bias for variance via the{" "}
        <VIS.Term def="A scalar λ multiplied by a penalty term (||w||₁ or ||w||₂²) added to the loss. λ=0 → no regularization, λ→∞ → predict the mean. The capacity knob you actually turn in linear models.">regularization strength</VIS.Term>{" "}or analogous{" "}
        <VIS.Term def="The training threshold (epoch count, gradient steps, or validation patience) at which you stop optimization before convergence. Acts as implicit regularization — the optimization trajectory itself is the variance-reduction tool.">early-stopping budget</VIS.Term>;{" "}
        <VIS.Term def="Adds a penalty on weight magnitude (λ||w||²) to the loss — pulls weights toward zero, lowering variance at the cost of a little bias. Single most common variance-reduction knob in linear models.">ridge regularization</VIS.Term>{" "}trades off variance for bias;{" "}
        <VIS.Term def="The σ² term — the part of the label that's random given x. Cannot be reduced by any model; only by collecting cleaner labels, removing noise sources, or adding features that explain the residual.">irreducible noise</VIS.Term>{" "}sits there waiting for better labels. Two related ideas often confused with bias-variance:{" "}
        <VIS.Term def="When the input distribution at test time differs from training time (e.g., new customer cohort, new geography). Adds an error term ON TOP of bias+variance+σ². Different mechanism.">distribution shift</VIS.Term>{" "}adds error on top of the decomposition;{" "}
        <VIS.Term def="When ranking is good but predicted probabilities don't match empirical rates (e.g., model says 80% but only 60% actually positive). Separate concern from bias and variance — well-ranked ≠ well-calibrated.">calibration</VIS.Term>{" "}is about probability-quality, not error-magnitude.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-problems" title="Hard problems — diagnose the lens">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade trap problems. Each scenario carries more context than strictly needed — some details are signal, some are{" "}
        <VIS.Term def="Plausible-looking details deliberately included to test whether the candidate can distinguish what matters from what doesn't. A senior bar — junior candidates anchor on the most recent or most colorful detail.">red herrings</VIS.Term>, some are real constraints. Pick the right move(s); reveal the model answer + the trap. Mix of{" "}
        <VIS.Term def="Question type with exactly one correct option. Mode='single' in TrapProblem props. Tests whether the candidate can identify the SINGLE best move under tradeoffs.">single-correct</VIS.Term>,{" "}
        <VIS.Term def="Question type where multiple options are individually correct and the candidate must select them all. Mode='multi'. Tests both recall and discrimination against plausible distractors.">multi-select</VIS.Term>{" "}("select all that apply"), and{" "}
        <VIS.Term def="Question type where the candidate must select correct options AND place them in execution order. Mode='ordered'. Tests prioritization, not just correctness — common senior-vs-junior signal.">ordered</VIS.Term>. The accompanying drills in the next section probe{" "}
        <VIS.Term def="The mental shortcut that confuses bias with 'wrong-in-some-vague-way' or variance with 'jittery'. Senior interview bar — recognize when the textbook decomposition does NOT directly apply.">identity, mechanism, intuition, and failure modes</VIS.Term>{" "}with shorter multiple-choice items.

        options={[

          {key:"b", text:"Restore the epoch-30 val-peak checkpoint (early stopping in retrospect).", order:1},

        lens={<>Correct order: <strong>(b) first — restore the free checkpoint</strong>, then <strong>(c) — augmentation + dropout re-training</strong>. The val-plateau at epoch 30 IS the early-stopping signal; you trained through the optimum. Only AFTER regularization fails do you escalate to data (a) or architecture (d). (e) is a non-fix — LR doesn't address variance, it slows training.</>}
