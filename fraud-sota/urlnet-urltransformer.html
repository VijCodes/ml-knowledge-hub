<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// URLNet / URLTransformer — Fraud SOTA · Phishing detection (URL layer).
// CONCEPT ANCHOR (B3): CHARACTER-LEVEL CNN or TRANSFORMER directly over the
// raw URL STRING. Token granularity = CHARACTERS (and short subword fragments),
// NOT English words and NOT a fine-tuned text classifier on bag-of-tokens. The
// signal it learns is LEXICAL + SYNTACTIC patterns at character level:
// homoglyph substitutions (paypa1.com / paypa-l.com), brand-suffix tricks
// (paypal.security-update.tk), hex-encoded or IP-as-host URLs, suspicious TLD
// chains, punycode IDN abuse. NOT a screenshot model. NOT an email-content LLM.
// The CHARACTER granularity over the URL string is the unique mechanism.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Phishing detection (URL layer)"
      title="URLNet / URLTransformer — character-level CNN/Transformer on the raw URL string"
      subtitle="A CHARACTER-LEVEL encoder (1D CNN in URLNet 2018; Transformer in URLTransformer 2021+) reads the raw URL character-by-character and learns lexical + syntactic phishing patterns: homoglyphs (paypa1.com), brand-suffix tricks (paypal.security-update.tk), hex/IP hosts, punycode IDN abuse. Beats word-level NLP (URLs have no English words) and beats blocklists (zero-day URLs aren't on any list yet)."
      byline={[
        {label:"Papers", value:"URLNet (Le et al. 2018) — char + word CNN on URL string. URLTransformer / URLBERT (2021+) — char-level / BPE Transformer pretrained on URL corpora."},
        {label:"L3", value:"Character vocabulary (~100 chars); 1D CNN or Transformer encoder; pool to URL embedding; binary phishing head. Trained on millions of labeled URLs (PhishTank, OpenPhish + benign crawl)."},
        {label:"Anchor", value:"CHARACTER granularity over URL string. NOT screenshot. NOT email body. NOT word-level NLP. NOT blocklist."},
      ]}/>

    <VIS.TLDR>
      Phishing URLs evade word-level NLP and blocklists. They contain no English
      sentences (so word embeddings are useless), and zero-day URLs aren&apos;t on
      any blocklist by definition. URLNet / URLTransformer reads the URL one{" "}
      <VIS.Term def="Character: a single Unicode code point in the URL string — letter, digit, dash, dot, slash, percent-encoded byte. The token granularity for URLNet is the character (or short character n-gram), not the English word.">character</VIS.Term>{" "}
      at a time with a{" "}
      <VIS.Term def="1D CNN: one-dimensional convolutional neural network. Slides learned filters of width k over a sequence (here: characters); each filter detects a local character pattern (e.g., 'paypa' followed by '1' instead of 'l'). Stack of such filters yields a feature map; pool to a fixed-length URL embedding.">1D CNN</VIS.Term>{" "}
      (URLNet, 2018) or a{" "}
      <VIS.Term def="Transformer encoder: self-attention + FFN stack. URLTransformer / URLBERT applies it at character or BPE granularity over the URL string, pretrained on millions of unlabeled URLs via masked-character prediction.">Transformer encoder</VIS.Term>{" "}
      (URLTransformer / URLBERT, 2021+). It learns the LEXICAL + SYNTACTIC
      patterns that distinguish phishing: homoglyph substitutions
      (&quot;paypa1.com&quot;, &quot;rn-icrosoft.com&quot;), brand-suffix tricks
      (&quot;paypal.security-update.tk&quot;), hex-encoded or IP-as-host URLs
      (&quot;http://0x7f000001/login&quot;), punycode IDN abuse
      (&quot;xn--paypal-...&quot;), unusual TLD chains, long random subdomain
      strings. Output: phishing probability per URL. NOT a screenshot model
      (visual phishing — different concept). NOT an email-body LLM (LLM
      email scoring — different concept). NOT a word-level NLP model (URLs lack
      English words). NOT a blocklist (catches zero-day URLs blocklist hasn&apos;t
      seen).
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — character-level encoder on URL string">
      <p>
        A phishing URL is a string. It looks roughly like the legit one but with
        small character-level twists designed to fool a human glance: substitute
        &quot;l&quot; with &quot;1&quot; or &quot;I&quot;; substitute &quot;rn&quot; for &quot;m&quot;; add a brand name
        as a subdomain prefix to a free TLD (paypal.security-update.tk);
        IP-as-host; hex-encoded host; long random subdomain; punycode IDN abuse.
        These twists live AT THE CHARACTER LEVEL.
      </p>
      <p>
        URLNet (Le et al., 2018) treats the URL as a sequence of CHARACTERS,
        embeds each via a learned character embedding, runs a 1D CNN with
        filters of widths 3-7 to detect local character patterns, pools, and
        feeds a binary phishing head. URLTransformer / URLBERT (2021+) replaces
        the CNN with a Transformer encoder, often pretrained on millions of
        unlabeled URLs via masked-character prediction.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  U["Raw URL string e.g. http paypa1 com login"]
  U --> T["Character tokenize one char per token"]
  T --> E["Character embedding learned per char"]
  E --> C["1D CNN URLNet OR Transformer URLBERT"]
  C --> P["Pool to URL embedding"]
  P --> H["Binary phishing head"]
  H --> S["Phishing probability"]
  style C fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style P fill:#dbeafe,stroke:#2563eb,stroke-width:2px
      `} />
      <p>Red: character-level encoder. Blue: pooled URL embedding feeding the classifier head.</p>

      <p style={{marginTop:16}}>
        <strong>Why character-level beats word-level NLP and beats blocklists.</strong>{" "}
        Word-level NLP tokenizers (BERT, sentencepiece) trained on English
        Wikipedia have no useful tokens for &quot;paypa1.com&quot; — it shatters into
        garbage subwords; the model sees noise. Character-level treats every
        character as a first-class token, learning that the digit &quot;1&quot; in the
        middle of a brand-shaped string is suspicious. Blocklists (Google Safe
        Browsing, PhishTank) catch URLs only AFTER they&apos;ve been reported;
        zero-day phishing URLs (registered minutes ago) aren&apos;t on any list.
        URLNet / URLTransformer can score a never-seen URL because it learned
        the GENERATIVE PATTERN of phishing-URL construction, not a list of
        known-bad strings.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="URLNet/URLTransformer vs related approaches">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>URLNet / URLTransformer</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Visual phishing (screenshot)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>LLM email-content scoring</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Blocklist (Safe Browsing)</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Input modality</td><td style={{padding:"6px 10px"}}>URL string (characters)</td><td style={{padding:"6px 10px"}}>Rendered screenshot (pixels)</td><td style={{padding:"6px 10px"}}>Email body + headers (text)</td><td style={{padding:"6px 10px"}}>URL string (exact match)</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Granularity</td><td style={{padding:"6px 10px"}}>Per-character</td><td style={{padding:"6px 10px"}}>Per-pixel / perceptual hash</td><td style={{padding:"6px 10px"}}>Word / sentence semantic</td><td style={{padding:"6px 10px"}}>Whole-string lookup</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Catches homoglyph (paypa1.com)</td><td style={{padding:"6px 10px"}}>YES</td><td style={{padding:"6px 10px"}}>Partial (only if rendered page visually clones legit)</td><td style={{padding:"6px 10px"}}>Partial (if URL is in email body)</td><td style={{padding:"6px 10px"}}>NO (zero-day not listed)</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Catches visual clone on benign URL</td><td style={{padding:"6px 10px"}}>NO</td><td style={{padding:"6px 10px"}}>YES</td><td style={{padding:"6px 10px"}}>NO</td><td style={{padding:"6px 10px"}}>NO</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Latency at scoring</td><td style={{padding:"6px 10px"}}>Sub-millisecond</td><td style={{padding:"6px 10px"}}>Seconds (headless render + embed)</td><td style={{padding:"6px 10px"}}>100ms - 2s (LLM API)</td><td style={{padding:"6px 10px"}}>Microsecond lookup</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Zero-day URL</td><td style={{padding:"6px 10px"}}>YES (learned generative pattern)</td><td style={{padding:"6px 10px"}}>YES (if it clones a known brand)</td><td style={{padding:"6px 10px"}}>YES (reasoning over body)</td><td style={{padding:"6px 10px"}}>NO</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 23 trap problems">
      <p style={{color:"#475569", marginBottom:16}}>Every problem turns on the CHARACTER-LEVEL CNN/TRANSFORMER on the URL STRING. Strip the character granularity and you have word-level NLP; strip the URL and you have a generic text classifier; replace the URL with a screenshot and you have visual phishing; replace with email body and you have LLM email scoring.</p>

      <VIS.TrapProblem id="url-p1" difficulty="hard" title="P1 — VP Risk: 'We have Google Safe Browsing. Why train URLNet too?'"
        scenario={<><em>Discriminating insight: blocklists are lagging indicators — they only list URLs already reported. Zero-day phishing URLs (registered minutes ago, blasted via SMS / email) aren&apos;t on any list. URLNet learns the GENERATIVE PATTERN of phishing-URL construction (homoglyph, brand-suffix tricks, IP-as-host) and scores never-seen URLs.</em><br/><br/>Pitch.</>}
        options={[
          {key:"a", text:"Blocklists are enough."},
          {key:"b", text:"Blocklists (Google Safe Browsing, PhishTank, OpenPhish) are LAGGING indicators. A URL appears on a blocklist only AFTER a victim reports it, a crawler finds it, and the list provider verifies + publishes — typically hours to days after first use. Zero-day phishing campaigns operate inside that window: attackers register a domain, send millions of phishing SMS / emails in the first 30-60 minutes, harvest credentials, then abandon the domain BEFORE it&apos;s ever listed. Blocklists miss the entire harvest window. URLNet / URLTransformer learns the GENERATIVE PATTERN of phishing-URL construction at the character level — homoglyph substitution (paypa1.com), brand-suffix trick (paypal.security-update.tk), hex-encoded host, IP-as-host, suspicious TLD chains, long random subdomain. Any URL exhibiting these patterns scores high, EVEN IF NEVER SEEN BEFORE. So the production stack is: blocklist FIRST (microsecond lookup, perfect-precision on known-bad), URLNet SECOND (sub-millisecond model on unknown URLs, catches zero-day), with optional layers (visual phishing on click, LLM email scoring on inbound email) beyond.", correct:true},
          {key:"c", text:"They are equivalent."},
          {key:"d", text:"Skip URL detection."},
        ]}
        trap={<>(a)(c)(d) miss the lag of blocklists vs the generative-pattern reach of URLNet.</>}
        lens={<>Blocklist = lagging known-bad. URLNet = learned phishing-construction patterns; catches zero-day. Layer them.</>}
        stretch={<>What&apos;s the typical zero-day window for phishing campaigns?</>}
      />

      <VIS.TrapProblem id="url-p2" difficulty="hard" title="P2 — State the URLNet recipe."
        scenario={<><em>Discriminating insight: character vocabulary (~100 printable + special chars) → character embedding → 1D CNN with filters of widths 3-7 (or Transformer encoder) → pool → binary phishing head. Trained on labeled URLs (PhishTank/OpenPhish positives + benign crawl negatives).</em><br/><br/>State.</>}
        options={[
          {key:"a", text:"Just run BERT."},
          {key:"b", text:"FOUR-STEP RECIPE. (1) CHARACTER VOCABULARY: enumerate the ~100 characters that appear in URLs (a-z, A-Z, 0-9, dash, dot, slash, colon, percent, plus, ampersand, equals, question mark, hash, tilde, underscore, special). Each character gets an integer index; unknown / non-ASCII characters map to an UNK token (important for punycode + Unicode IDN abuse). (2) CHARACTER EMBEDDING: learned embedding table of size vocab x d (d ~ 32-128). The URL becomes a sequence of d-dim vectors of length up to ~200 characters (pad/truncate). (3) ENCODER. URLNet uses a 1D CNN: parallel convolutional filters of widths 3, 4, 5, 6, 7 (each width has 256-512 filters); max-pool over time per filter; concatenate to a fixed-length URL embedding. URLTransformer / URLBERT replaces this with a Transformer encoder (4-6 layers, hidden 128-256) with positional embeddings; pool the CLS token or mean-pool. (4) HEAD: a 2-3 layer MLP to a sigmoid producing phishing probability. (5) TRAINING: binary cross-entropy on labeled URLs. Positives from PhishTank / OpenPhish / APWG (typically millions of confirmed phishing URLs); negatives from benign crawls (Alexa top-1M, Common Crawl). Heavy class imbalance — use class weighting or focal loss. URLBERT pretrains on hundreds of millions of unlabeled URLs via masked-character prediction first.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use a blocklist."},
        ]}
        trap={<>(a)(c)(d) miss the four steps.</>}
        lens={<>Char vocab → char embedding → 1D CNN or Transformer → pool → binary head. PhishTank positives + benign negatives.</>}
        stretch={<>Why max-pool over time per filter in URLNet?</>}
      />

      <VIS.TrapProblem id="url-p3" difficulty="hard" title="P3 — Why character-level and not word-level (BERT/sentencepiece) on URLs?"
        scenario={<><em>Discriminating insight: URLs have no English words. Word/subword tokenizers trained on natural language shatter URL strings into nonsense fragments; the model sees garbage. Character granularity treats every character as a first-class token, learning that &quot;1&quot; in the middle of a brand-shaped string is suspicious.</em><br/><br/>Why char.</>}
        options={[
          {key:"a", text:"Word-level is better."},
          {key:"b", text:"URLs are NOT English text and word-level tokenizers fail on them. (1) URLs lack natural word boundaries. paypa1.com is one string; a sentencepiece tokenizer trained on Wikipedia might produce a noisy split that loses the contiguous brand-shaped pattern. (2) HOMOGLYPHS are character-level perturbations: paypa1.com differs from paypal.com by ONE character (l vs 1); a character-level model sees this directly as a substitution in position 5; a word-level model sees two completely different token sequences. (3) RARE CHARACTERS carry signal: percent-encoded bytes (%20, %2F), Unicode IDN code points, punctuation chains (dots in subdomains), digits inside brand names — all are character-level signals invisible to word tokenization. (4) VOCABULARY SIZE: character vocab is ~100; word/BPE vocab is 30k+. The character model is smaller, trains faster, generalizes better on the URL distribution. (5) ZERO-DAY URLs include brand-new domain strings; word tokenizers tend to produce UNKs on unfamiliar strings; character tokenizer never produces UNKs (every char is in vocab). URLNet&apos;s 2018 paper explicitly ablates char-only vs word-only vs both; char-only is the strongest single mode on phishing detection.", correct:true},
          {key:"c", text:"They&apos;re equivalent."},
          {key:"d", text:"Use word-level."},
        ]}
        trap={<>(a)(c)(d) miss the URL-string nature.</>}
        lens={<>URLs lack words. Char granularity catches homoglyph + percent-encoded + IDN abuse. Word tokenizers shatter URL strings.</>}
        stretch={<>What does the URLNet paper show on char vs word ablation?</>}
      />

      <VIS.TrapProblem id="url-p4" difficulty="hard" multiSelect title="P4 — Pick TRUE statements about URLNet/URLTransformer (3 correct)"
        scenario={<><em>Discriminating insight: char-level encoder on URL string; learns lexical + syntactic phishing patterns; catches zero-day URLs blocklists miss. NOT a screenshot model, NOT an email-body LLM, NOT a word-level NLP classifier.</em><br/><br/>Pick TRUE.</>}
        options={[
          {key:"a", text:"Operates on the raw URL string at CHARACTER granularity.", correct:true},
          {key:"b", text:"Learns lexical + syntactic phishing patterns (homoglyphs, brand-suffix tricks, IP hosts).", correct:true},
          {key:"c", text:"Catches zero-day URLs that blocklists have not yet seen.", correct:true},
          {key:"d", text:"Operates on a RENDERED SCREENSHOT of the destination page."},
          {key:"e", text:"Operates on the EMAIL BODY + HEADERS via LLM reasoning."},
          {key:"f", text:"A word-level English NLP classifier on URL tokens."},
        ]}
        trap={<>(d) confuses with visual phishing; (e) with LLM email scoring; (f) with word-level NLP.</>}
        lens={<>Char-level URL encoder; lexical/syntactic phishing patterns; zero-day reach. NOT screenshot; NOT email LLM; NOT word-level.</>}
        stretch={<>What&apos;s the typical character vocabulary size?</>}
      />

      <VIS.TrapProblem id="url-p5" difficulty="medium" title="P5 — Distinguish from visual phishing detection (screenshot similarity)."
        scenario={<><em>Discriminating insight: visual phishing renders the page in a headless browser and compares the SCREENSHOT to a template-bank of legit-site screenshots via perceptual hash or CNN embedding similarity. URLNet operates only on the URL string. Different signals: URLNet catches BAD STRINGS even with no rendered page yet; visual phishing catches BENIGN-LOOKING URLS that render a visual clone of a brand.</em><br/><br/>Distinguish.</>}
        options={[
          {key:"a", text:"They are the same."},
          {key:"b", text:"DIFFERENT MODALITIES, DIFFERENT FAILURE MODES, COMPLEMENTARY. URLNet / URLTransformer operates on the URL STRING — a sequence of characters; learns lexical and syntactic patterns of phishing-URL construction (paypa1.com, paypal.security-update.tk, hex hosts). Cost: sub-millisecond. Catches: any URL with a suspicious lexical pattern. Misses: a URL like https://www.legit-looking-domain.com/page that LOOKS innocent in the string but renders a pixel-perfect PayPal clone in the browser. Visual phishing detection operates on the RENDERED SCREENSHOT — fetch the URL in a headless browser, capture the rendered page as an image, compute a perceptual hash or a CNN embedding, compare to a template bank of legitimate-brand screenshots (PayPal homepage, BoA homepage, etc.). Cost: seconds (full page render + embed). Catches: visual brand clones regardless of URL string. Misses: phishing URLs that exfiltrate via API and never render a clone page; URLs that show benign content but POST to phisher backend. COMBINE: URLNet at SMS/email ingest (cheap, blocks obvious lexical bad); visual phishing on user click or in sandboxed re-render (expensive but catches visual clones). Both miss email-body-only social-engineering attacks that don&apos;t even include a URL — that&apos;s the LLM email scoring layer.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Same thing."},
        ]}
        trap={<>(a)(c)(d) collapse the modality difference.</>}
        lens={<>URLNet = URL string, sub-ms, catches lexical patterns. Visual = screenshot, seconds, catches visual clones. Different signals.</>}
        stretch={<>How are the two layered in production?</>}
      />

      <VIS.TrapProblem id="url-p6" difficulty="medium" title="P6 — Distinguish from LLM email-content scoring."
        scenario={<><em>Discriminating insight: LLM email scoring prompts an LLM with the email body + sender + headers and asks for a phishing probability via reasoning. URLNet operates only on the URL string in isolation. Different inputs (URL vs email content) and different reasoning (lexical pattern recognition vs semantic urgency / impersonation reasoning).</em><br/><br/>Distinguish.</>}
        options={[
          {key:"a", text:"They are the same model."},
          {key:"b", text:"DIFFERENT INPUTS, DIFFERENT REASONING MODES. URLNet / URLTransformer takes ONE URL STRING and outputs a phishing probability based on character-level lexical and syntactic patterns it learned during training. It cannot reason about urgency, impersonation tone, or social-engineering content. LLM email scoring takes the FULL EMAIL (subject, body, sender, headers, and any embedded URLs) and prompts an LLM to reason: is this email impersonating a brand? Is the urgency suspicious (act-within-24-hours language)? Does the sender display name conflict with the From: header domain? Are the URLs lexically suspicious AND do they go where they claim? The LLM produces a phishing probability via reasoning, not via a learned pattern recognizer on bytes. URLNet is FAST (sub-millisecond) but BLIND beyond the URL string. LLM is SLOW (100ms - 2s API call) but BROAD (full semantic email understanding). COMBINE: URLNet at the URL layer of any pipeline (SMS, email, browser); LLM at the email-body layer for high-suspicion or unknown senders. URLNet feeds a URL-risk feature into the LLM prompt as a supporting signal.", correct:true},
          {key:"c", text:"Same architecture."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) collapse URL vs email content.</>}
        lens={<>URLNet: URL string only, char patterns. LLM email: full email, semantic reasoning. Combine: URLNet feeds URL feature into LLM prompt.</>}
        stretch={<>What features does the LLM consume beyond URLs?</>}
      />

      <VIS.TrapProblem id="url-p7" difficulty="hard" title="P7 — How does URLNet detect homoglyph substitution (paypa1.com vs paypal.com)?"
        scenario={<><em>Discriminating insight: the 1D CNN&apos;s filters learn that contiguous patterns of the shape [p][a][y][p][a][digit-or-special] preceding a brand-suffix-y context are anomalous. Char embeddings place &apos;l&apos; and &apos;1&apos; in DIFFERENT embedding regions (despite visual similarity to humans); the filter activation differs.</em><br/><br/>Mechanism.</>}
        options={[
          {key:"a", text:"It cannot."},
          {key:"b", text:"CONVOLUTIONAL FILTER ACTIVATION on the substituted character. During training, URLNet sees BENIGN URLs containing the substring paypal (across many genuine paypal.com sub-URLs) and PHISHING URLs containing variations like paypa1, paypa-l, paypall, paypaI. Character embeddings learn that the digit 1 has a very different embedding from the letter l, despite their visual similarity to humans — the embedding space is learned from training-co-occurrence statistics, not from pixel rendering. A 1D CNN filter of width 6 trained on this data activates strongly when the input has [p][a][y][p][a][l] (benign signal) but DIFFERENTLY when input has [p][a][y][p][a][1] (phishing signal). After max-pool, this filter&apos;s activation becomes one dimension of the URL embedding; the downstream MLP head learns to associate this dimension with phishing probability. (2) URLTransformer with self-attention: the encoder learns that the digit 1 in position 5 of a brand-shaped substring attends strongly to surrounding characters that suggest brand-impersonation context; the attention-weighted embedding encodes the substitution. (3) BPE / sentencepiece would shatter paypa1 into noisy fragments — losing the contiguous brand pattern; character granularity preserves it. (4) For human-glance homoglyphs (Cyrillic a vs Latin a), training data must include such substitutions OR the model must use a Unicode-confusable-character feature engineered alongside the char embedding (some URLBERT variants add this explicitly).", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the filter-activation mechanism.</>}
        lens={<>Char embedding puts &apos;1&apos; and &apos;l&apos; far apart. CNN filter on positions 1-6 activates differently. Attention sees the substitution.</>}
        stretch={<>What about Cyrillic homoglyph (Unicode)?</>}
      />

      <VIS.TrapProblem id="url-p8" difficulty="hard" title="P8 — Why does URLNet handle BRAND-SUFFIX TRICKS like paypal.security-update.tk?"
        scenario={<><em>Discriminating insight: the brand name appears as a SUBDOMAIN prefix of a suspicious TLD (the ACTUAL registered domain is security-update.tk, not paypal.*). URLNet learns the DOT-SEPARATED STRUCTURE: brand-name-as-subdomain-of-not-the-brand-registrar-TLD = phishing pattern. Character-level encoder sees the &quot;paypal&quot; followed by dot followed by non-paypal followed by .tk.</em><br/><br/>Mechanism.</>}
        options={[
          {key:"a", text:"It cannot detect this."},
          {key:"b", text:"BRAND-AS-SUBDOMAIN PATTERN. Phishing-URL construction frequently uses paypal.security-update.tk — to a casual human reader, the leftmost token paypal looks like the registered brand; the actual REGISTERED DOMAIN is security-update.tk (the rightmost two dot-separated tokens before the TLD). URLNet&apos;s 1D CNN with filter widths up to 7 spans across dots; filters that fire on patterns like [p][a][y][p][a][l][.] followed by non-paypal characters AND a known-cheap-TLD-suffix (.tk, .ml, .ga, .cf, free TLDs popular with phishing) activate strongly on this construction. The model learns that the BRAND NAME in a SUBDOMAIN POSITION (not the registered domain) of a SUSPICIOUS TLD is a phishing pattern. (2) URLTransformer with self-attention can do this MORE EXPLICITLY: the brand-name characters in the leftmost-subdomain position attend to the TLD characters at the right end of the URL and to the registered-domain characters in between; the attention-weighted embedding represents the brand-suffix relationship. (3) Additional engineered features sometimes added: explicit TLD-risk-score lookup, explicit count of dots, registered-domain extraction via the Public Suffix List; URLBERT in some implementations concatenates these to the char-encoder output. (4) Failure mode: phishing on a NEUTRAL TLD (.com) using brand-as-subdomain (paypal.security-update.com) — the TLD-risk signal is absent; URLNet relies more on the subdomain-position-of-brand pattern alone; performance drops.", correct:true},
          {key:"c", text:"Skip the URL."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the dot-structured pattern.</>}
        lens={<>Brand-as-subdomain of cheap TLD = phishing pattern. CNN filter spans dots; Transformer attention links subdomain to TLD.</>}
        stretch={<>What&apos;s the Public Suffix List role here?</>}
      />

      <VIS.TrapProblem id="url-p9" difficulty="hard" title="P9 — Concept-specific misattribution: URLNet flags a legit corporate URL with a long subdomain chain."
        scenario={<><em>Discriminating insight (concept-specific): legit enterprise URLs (e.g., login.accounts.us-east-1.aws.amazon.com) have LONG subdomain chains that pattern-match phishing-construction features. Mitigations: (1) allowlist of known legit subdomain templates; (2) feature engineering for &quot;cert-issued-to-this-domain&quot; lookup; (3) re-train with more enterprise-URL negatives; (4) threshold calibration per top-level brand. Specific to char-level URL mechanism.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"URLNet-specific cause for false-positive on enterprise URLs. Legit enterprise URLs often have LONG SUBDOMAIN CHAINS (login.accounts.us-east-1.aws.amazon.com; portal-12345.corp.example.com; oauth2.signin.example-bank.com) that pattern-match the SAME character-level features URLNet learned for phishing: many dots, long string, brand-name appearing in non-rightmost position. The CNN filters fire on these features; the head outputs high phishing probability. NOT actually phishing. Mitigations specific to URLNet. (1) ALLOWLIST OF LEGIT SUBDOMAIN TEMPLATES — maintain per-brand allowlist of legit subdomain patterns (login.*.amazon.com; *.signin.example-bank.com); short-circuit before scoring. (2) FEATURE ENGINEERING: extract the REGISTERED DOMAIN via the Public Suffix List; lookup CERTIFICATE-ISSUED-TO and check whether the brand owns the registered domain; concatenate this binary signal to the char-encoder output. (3) RE-TRAIN with MORE ENTERPRISE-URL NEGATIVES — most public training corpora (Common Crawl Alexa-top-1M) over-represent simple consumer URLs and under-represent enterprise multi-subdomain legit URLs; augment training with enterprise URL crawls. (4) PER-BRAND THRESHOLD CALIBRATION — for known-brand-owned domains, raise the phishing threshold; for unknown / suspicious-TLD domains, lower it. (5) HARD-NEGATIVE MINING: collect URLNet&apos;s top false positives on a fresh enterprise corpus; add them as labeled negatives in the next training cycle.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Long subdomain chains = enterprise legit pattern that LOOKS phishing-y to URLNet. Fix: PSL + cert-issued-to + per-brand threshold + hard-negative mining.</>}
        stretch={<>How do you extract registered domain via PSL?</>}
      />

      <VIS.TrapProblem id="url-p10" difficulty="hard" title="P10 — How is URLNet pretrained / does it benefit from URLBERT-style pretraining?"
        scenario={<><em>Discriminating insight: original URLNet (2018) was supervised end-to-end on labeled URLs. URLBERT (2021+) pretrains a Transformer on hundreds of millions of unlabeled URLs via masked-character (or masked-BPE) prediction; then fine-tunes on labeled phishing. Pretraining helps because unlabeled URLs are abundant and labeled phishing is rare relative.</em><br/><br/>Pretraining.</>}
        options={[
          {key:"a", text:"No pretraining."},
          {key:"b", text:"PRETRAINING is a strict improvement for the Transformer variant. (1) URLNet ORIGINAL (Le et al., 2018) is supervised end-to-end: train the char-CNN + head on labeled URLs (PhishTank + benign Alexa-top-1M); no separate pretraining stage. Works well at scale but requires hundreds of thousands of labeled phishing URLs. (2) URLBERT / URLTransformer (2021+) introduces SELF-SUPERVISED PRETRAINING on unlabeled URL corpora. Take hundreds of millions of URLs from Common Crawl, public DNS feeds, and web archives (UNLABELED — no phishing-vs-benign tag). Mask ~15% of characters or BPE tokens per URL; train Transformer to predict the masked tokens from surrounding context. This teaches the encoder GENERAL URL-language statistics: common subdomain patterns, common TLDs, character co-occurrence within URLs. (3) FINE-TUNE on a small labeled phishing dataset with a classification head. Because the pretrained encoder already captures URL-language structure, fine-tuning needs only thousands of labeled phishing URLs (vs millions for from-scratch URLNet). Improves zero-shot generalization to new TLDs and to attack patterns underrepresented in the small labeled set. (4) DOMAIN-SPECIFIC PRETRAINING: some variants pretrain on KNOWN-PHISHING-CORPORA SEPARATELY (e.g., curriculum: pretrain on benign, then continue on a mix, then fine-tune). (5) PRACTICAL: pretraining adds days of GPU but pays off in zero-shot reach on emerging phishing TLDs and homoglyph variants not in the supervised training set.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use a blocklist."},
        ]}
        trap={<>(a)(c)(d) miss the pretraining payoff.</>}
        lens={<>URLNet original = supervised. URLBERT = masked-char pretraining on unlabeled URLs then fine-tune. Wins on zero-shot generalization.</>}
        stretch={<>How much labeled phishing does fine-tune need?</>}
      />

      <VIS.TrapProblem id="url-p11" difficulty="medium" title="P11 — Production: URLNet at SMS / email / browser-link-click ingest."
        scenario={<><em>Discriminating insight: sub-millisecond model fits any ingest layer. Deploy as a Cloud Functions / Lambda / CDN-worker microservice. Input: URL string. Output: phishing probability. Cache hot URLs; refresh model weekly; A/B test new variants.</em><br/><br/>Production.</>}
        options={[
          {key:"a", text:"Infeasible."},
          {key:"b", text:"PERFECT FIT for ingest-layer scoring. (1) DEPLOYMENT: URLNet is a small model — char-CNN with ~5M params, or URLBERT-small with ~30M params. Quantized to int8, the model fits in 5-30 MB; inference is sub-millisecond on CPU, sub-100-microsecond on GPU. Deploy as a Cloud Functions / AWS Lambda / Cloudflare Worker microservice next to the ingest layer. (2) SMS INGEST: telco SMS firewall receives an SMS; extract URL(s); score each via URLNet; if score > threshold, block / quarantine / strip the link / add a warning. (3) EMAIL INGEST: SMTP MTA receives an email; URL extraction (parse body for href + bare URLs); score each; high-score URLs trigger email quarantine. URLNet feeds a URL-risk feature into the upstream LLM email-content scorer or into a Bayesian-spam-filter blend. (4) BROWSER LINK CLICK: Chrome Safe Browsing equivalent on the client side; intercept on click; score via URLNet (or a distilled mobile version); show warning interstitial on high score. (5) CACHE: in-memory LRU cache keyed by URL string; high-traffic phishing URLs scored once per minute. (6) WEEKLY RETRAIN: PhishTank / OpenPhish refresh nightly; retrain weekly on the latest labeled URLs; A/B test the new model vs production; promote on improved precision at fixed recall. (7) MONITORING: per-day FPR on a held-out benign sample (Alexa top-100K resampled); per-day recall on labeled phishing arrival; drift alerts on character-distribution shift (new TLDs surging).", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip URL."},
        ]}
        trap={<>(a)(c)(d) miss the lightweight model + ingest-layer fit.</>}
        lens={<>Tiny model, sub-ms latency. Deploy at SMS / email / browser ingest. Cache; weekly retrain; per-day FPR + recall monitoring.</>}
        stretch={<>What does the cache key look like (URL normalized)?</>}
      />

      <VIS.TrapProblem id="url-p12" difficulty="hard" title="P12 — Concept-specific misattribution: URLNet MISSES a confirmed phishing URL."
        scenario={<><em>Discriminating insight (concept-specific): (1) attacker registered a TYPICAL-LOOKING benign brand name (e.g., login-helper-tools.com) and rendered a brand clone visually — string LOOKS benign; (2) URL embedded in an open redirector (drive.google.com/...?redirect=phisher); (3) URL is in a NEW TLD not in training set; (4) attacker used punycode IDN homoglyph (paypal in Cyrillic). Specific to char-level URL mechanism — char patterns alone insufficient.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"URLNet-specific causes for missed phishing — when the URL STRING alone is insufficient. (1) BENIGN-LOOKING URL HIDING VISUAL CLONE: attacker registers login-helper-tools.com (no obvious lexical phishing signal) and serves a pixel-perfect PayPal clone. URLNet sees a clean string; misses. Mitigation: layer visual phishing detection (screenshot similarity) on URLs that pass URLNet but render brand-clone visuals. (2) OPEN REDIRECTOR ABUSE: phisher uses a legit-brand redirector (drive.google.com/...?next=phisher.example/login). URLNet sees google.com on the front; scores benign. Mitigation: extract and recursively score every URL in query parameters; flag redirector patterns; resolve to final destination URL where policy allows. (3) NEW TLD NOT IN TRAINING SET: attacker uses a newly-released TLD (.zip, .mov launched 2023); training set has no examples; char patterns of the TLD are novel; the model under-fires. Mitigation: feature-engineer TLD-age and TLD-registration-volume from external feeds; weekly retrain incorporating new TLD examples. (4) PUNYCODE / IDN HOMOGLYPH: attacker uses Cyrillic a or other Unicode confusable; the URL on the wire is xn--p1ai-format or full Unicode; if training data lacked such examples, model misses. Mitigation: explicit Unicode-confusable normalization at preprocessing; flag any IDN URL for elevated scoring; pretrain on multilingual URL corpora. (5) ADVERSARIAL CHARACTER SUBSTITUTION: paypa1.com vs paypal.com via character-substitution discovered to evade the specific model — adversarial robustness is a separate research thread (HotFlip-style attacks on URLNet).", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Benign-string visual clone / open redirector / new TLD / punycode / adversarial char-sub. Layer visual + LLM email; PSL + IDN normalization; weekly retrain.</>}
        stretch={<>What does HotFlip on URLNet look like?</>}
      />

      <VIS.TrapProblem id="url-p13" difficulty="medium" multiSelect title="P13 — Decoys: which are NOT URLNet/URLTransformer? (5 correct)"
        scenario={<><em>Discriminating insight: blocklist, screenshot similarity, email-body LLM, word-level NLP on URL tokens, certificate-based fingerprinting are NOT URLNet. Char-level CNN or Transformer on URL string IS.</em><br/><br/>Pick NOT-URLNet.</>}
        options={[
          {key:"a", text:"Google Safe Browsing blocklist lookup.", correct:true},
          {key:"b", text:"Screenshot-similarity model on rendered page.", correct:true},
          {key:"c", text:"LLM scoring of full email body + headers.", correct:true},
          {key:"d", text:"Word-level / BPE BERT trained on Wikipedia, applied to URLs.", correct:true},
          {key:"e", text:"TLS certificate fingerprint matching.", correct:true},
          {key:"f", text:"Character-level CNN or Transformer trained on URL strings."},
        ]}
        trap={<>(a) blocklist; (b) visual; (c) LLM email; (d) word-level; (e) cert fingerprint — all different mechanisms.</>}
        lens={<>URLNet = char-level encoder on URL string. Anything else is a different mechanism or layer.</>}
        stretch={<>What does TLS cert fingerprinting catch that URLNet doesn&apos;t?</>}
      />

      <VIS.TrapProblem id="url-p14" difficulty="hard" title="P14 — Concept-specific misattribution: URL CANONICALIZATION DRIFT between training and serving."
        scenario={<><em>Discriminating insight (concept-specific): URLNet was trained on URLs normalized one way (lowercase, percent-decoded, trailing-slash stripped); production serves URLs normalized differently (or not at all). The TWO ENCODINGS of the same URL produce different model outputs. Specific to char-level mechanism — every preprocessing difference manifests as character-sequence changes.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Random."},
          {key:"b", text:"URL CANONICALIZATION DRIFT is the URLNet-specific equivalent of feature-engineering drift. Because the model operates DIRECTLY on the character sequence, any preprocessing difference between training data and serving input manifests as a different character sequence to the model. Cases. (1) CASE: training data lowercased URLs (http://paypal.com); production receives mixed-case (http://PayPal.com). Char embeddings for P vs p differ; same URL scores differently. (2) PERCENT-ENCODING: training decoded percent-encoded bytes (%20 to space); production left them raw. Character sequence differs at every encoded byte. (3) TRAILING SLASH: training stripped trailing slashes; production left them. One-character difference per URL. (4) PROTOCOL: training stripped the http:// or https:// prefix; production kept it. (5) PORT NUMBERS: training removed default ports (:80, :443); production left them. (6) FRAGMENT: training stripped #fragment; production kept it. (7) IDN: training normalized punycode to Unicode; production left as xn-. EACH OF THESE drifts model performance by 1-10% absolute on AUPRC. Mitigation: (a) DEFINE A URL CANONICAL FORM in writing; (b) APPLY THE SAME NORMALIZATION in both training and serving (shared library); (c) MONITOR a held-out canary URL set and alert on score drift; (d) RETRAIN immediately if normalization changes; (e) DOCUMENT the canonical form in the model card. (8) Subtle case: training included URL query-parameter ORDER as-is; production reorders parameters for caching — char sequence differs; model output differs.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Model is broken."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>URL canonicalization drift — case, percent-encoding, trailing slash, IDN, query-order. Each diff = different char sequence = different score. Shared normalization library.</>}
        stretch={<>What canonical form does Google Safe Browsing define?</>}
      />

      <VIS.TrapProblem id="url-p15" difficulty="hard" title="P15 — Adversarial robustness — what does a HotFlip-style attacker do to URLNet?"
        scenario={<><em>Discriminating insight: HotFlip computes the gradient of the model&apos;s phishing-output with respect to character embeddings; flips the character whose flip MAXIMALLY decreases phishing-score. Iterate until misclassified. URLNet is brittle if not adversarially trained.</em><br/><br/>Adversarial.</>}
        options={[
          {key:"a", text:"URLNet is unbreakable."},
          {key:"b", text:"HOTFLIP-STYLE GRADIENT ATTACK. (1) MECHANISM: attacker has white-box access (or can train a surrogate) to URLNet. For a phishing URL the model correctly flags, compute the GRADIENT of the model&apos;s phishing-output with respect to each character embedding. The character whose embedding-direction gradient most strongly reduces phishing-score is the candidate flip. Flip it to a similar-looking character (digit-to-letter, accented-to-plain, dash-position-shift). Iterate (project onto valid URL characters) until the model misclassifies. (2) BUDGET: typically 1-5 character flips suffice for URLNet without adversarial training. (3) RESULT: paypa1.com (already a phishing URL) becomes paypa1.com with one more substituted character that the original model flags as benign — same human-visible URL, different model score. (4) DEFENSES. (a) ADVERSARIAL TRAINING: at each training step, generate HotFlip adversarial examples; train on the mixture; the model learns robustness to small perturbations. (b) RANDOMIZED SMOOTHING: add character-substitution noise at inference and average predictions; certified robust radius. (c) TRADES loss: optimize natural accuracy AND robust loss jointly. (d) ENSEMBLE: average URLNet, URLBERT, and a separately-trained char-LSTM; attacker must fool all simultaneously. (e) MULTI-LAYER STACK: even if URLNet is fooled, visual phishing on the rendered page and LLM email-content scoring provide redundancy. (5) CAVEAT: real-world attackers rarely use HotFlip directly — they use HEURISTIC perturbations (homoglyph substitution, brand-suffix-trick variations). Adversarial training against HEURISTIC patterns is more impactful than against pure HotFlip gradients.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the gradient-based attack and defenses.</>}
        lens={<>HotFlip = gradient on char embedding; flip lowest-cost char. Defense: adversarial training / randomized smoothing / TRADES / ensemble / multi-layer stack.</>}
        stretch={<>How does randomized smoothing certify robustness?</>}
      />

      <VIS.TrapProblem id="url-p16" difficulty="medium" title="P16 — Junior: 'URLNet is just a sentiment classifier with character tokens'. Refute."
        scenario={<><em>Discriminating insight: half right — uses character tokenization + CNN/Transformer + binary head. Misses the URL-DOMAIN-SPECIFIC structure: phishing-pattern training data (PhishTank + benign crawl), URL canonicalization, Public Suffix List integration, and the SUB-MS-LATENCY constraint that justifies the architecture choice.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Junior is right."},
          {key:"b", text:"Half right; missing URL-domain-specific pieces. (1) Yes — architecturally URLNet is a character-level CNN classifier (URLBERT a char/BPE Transformer); the head is binary. Structurally it&apos;s analogous to a character-level sentiment classifier on movie reviews. (2) BUT the DOMAIN-SPECIFIC differences are the actual mechanism. (a) TRAINING DATA: positives from PhishTank / OpenPhish / APWG (millions of confirmed phishing URLs); negatives from benign URL crawls (Alexa, Common Crawl). Domain knowledge: phishing URLs follow a few generative recipes (homoglyph, brand-suffix, IP-as-host, hex, IDN) — these are NOT sentiment patterns. (b) URL CANONICALIZATION: case, percent-encoding, trailing slash, IDN normalization — all URL-specific. (c) PUBLIC SUFFIX LIST: extracting the REGISTERED DOMAIN from a URL is a URL-specific operation feeding URL-specific features (registered-domain age, cert-issued-to, TLD risk). (d) LATENCY CONSTRAINT: SUB-MILLISECOND per URL at ingest (SMS / email / browser-click); justifies the small char-CNN over a heavier model. (e) ZERO-DAY GENERALIZATION: phishing URL distribution shifts daily as attackers rotate domains; weekly retrain is mandatory. (3) Calling URLNet &quot;just a sentiment classifier&quot; loses the data distribution, the canonical-form discipline, the PSL feature engineering, and the latency / retrain operational constraints — the things that make it work in production.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"They are identical."},
        ]}
        trap={<>(a)(c)(d) miss the URL-domain specifics.</>}
        lens={<>Architecture = char CNN/Transformer + binary head. Domain = PhishTank data + URL canonicalization + PSL + sub-ms latency + weekly retrain.</>}
        stretch={<>How often does the phishing-URL distribution shift?</>}
      />

      <VIS.TrapProblem id="url-p17" difficulty="hard" title="P17 — Skeptic: 'Just use a regex / hand-coded URL features — char CNN is overkill'. Refute."
        scenario={<><em>Discriminating insight: skeptic is RIGHT for a narrow set of fixed patterns (count of dots, presence of digits in brand position, TLD risk score) — handcrafted features catch the obvious. WRONG for the long tail (homoglyph variants, novel TLDs, IDN abuse, brand-suffix variants the regex didn&apos;t anticipate). Char CNN learns the long tail; regex doesn&apos;t generalize.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Skeptic is right."},
          {key:"b", text:"PARTIALLY right; depends on coverage need. (1) HANDCRAFTED FEATURES catch the OBVIOUS: count of dots, count of dashes, length, presence of digits inside brand-position substring, IP-as-host detection, list of suspicious TLDs (regex match for .tk, .ml, .ga), entropy of subdomain string, length of registered domain. A GBDT on these 30-50 features gets to ~85-90% AUPRC on a curated test set. (2) LONG TAIL is where handcrafted fails. (a) HOMOGLYPH VARIANTS the regex didn&apos;t anticipate — paypaI.com (capital I), paypa-l.com (dash injection), paypall.com (double letter). Each requires a separate regex; combinatorial explosion. (b) NEW TLDs released monthly (.zip, .mov, .lat, .quest) — handcrafted TLD lists go stale. (c) IDN / PUNYCODE — handcrafted Unicode-confusable mappings are incomplete; new confusables exist for every script. (d) BRAND-SUFFIX TRICK variants (paypal-support.com, paypal.com.security-update.tk, paypal-com-login.tk) — each requires new regex. (3) URLNet LEARNS the long tail: training data covers thousands of variants; the CNN filters generalize to UNSEEN-IN-TRAINING variants of the same construction. New TLD with phishing-typical character patterns scores high without explicit listing. (4) HYBRID: handcrafted features as ADDITIONAL FEATURES concatenated to the char-CNN embedding (Le et al., 2018 explicitly does this — char-CNN + word-CNN + handcrafted features); GBDT downstream. Best of both. (5) PRODUCTION at major scale (Google, Microsoft) uses HYBRID layers: handcrafted catches the obvious cheaply; URLNet catches the long tail at slight extra cost.", correct:true},
          {key:"c", text:"Always char CNN."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>Handcrafted catches obvious cheaply. Char CNN learns long tail (homoglyph variants, new TLDs, IDN). Hybrid (handcrafted concat to CNN) is production.</>}
        stretch={<>What does the URLNet 2018 paper show on hybrid vs char-only?</>}
      />

      <VIS.TrapProblem id="url-p18" difficulty="hard" title="P18 — How does URLNet handle IDN / punycode (Cyrillic homoglyph)?"
        scenario={<><em>Discriminating insight: IDN URLs arrive in two forms — punycode (xn--paypal-...) or full Unicode (paypal with Cyrillic а). Without explicit handling, the char vocabulary may treat xn-- as a benign prefix and miss the homoglyph. Mitigations: (1) Unicode-confusable normalization before encoding; (2) flag any xn-- prefix as elevated risk; (3) include Unicode characters in vocab; (4) explicit IDN-abuse training examples.</em><br/><br/>IDN.</>}
        options={[
          {key:"a", text:"URLNet handles IDN natively."},
          {key:"b", text:"REQUIRES EXPLICIT HANDLING — IDN abuse is a known URLNet failure mode if untreated. (1) IDN URLs arrive in two forms. (a) PUNYCODE-ENCODED on the wire: xn--paypal-9bc.com (the Cyrillic-substituted paypal in IDN ACE encoding). (b) DECODED UNICODE in browsers / some loggers: paypal.com where the a is Cyrillic U+0430. Without explicit handling, the URLNet char vocabulary trained on ASCII-only URLs treats xn- as a benign-looking prefix and misses the homoglyph; OR it produces UNK tokens for Unicode characters and loses signal. (2) MITIGATIONS. (a) UNICODE-CONFUSABLE NORMALIZATION at preprocessing: use the Unicode Consortium&apos;s confusables list (or libraries like Python&apos;s unicodedata + confusable-homoglyphs) to map Cyrillic / Greek confusable characters to their ASCII counterparts BEFORE encoding to characters. paypal-with-Cyrillic-a becomes paypal-ASCII-a; the model sees a clean string but a separate flag contained-IDN-confusable is concatenated as a feature. (b) PUNYCODE PREFIX FLAG: any URL with xn- in any subdomain gets a binary feature IS-IDN; the model learns to weight this heavily on suspicious-pattern matches. (c) VOCABULARY EXPANSION: include the most common Unicode characters in the char vocab (or use byte-level BPE which handles all Unicode natively). (d) TRAINING DATA AUGMENTATION: explicitly generate IDN-confusable variants of legitimate brand domains as positives in training (paypal with Cyrillic a, microsoft with Greek o); model learns IDN-substitution patterns. (e) BROWSER-LEVEL DEFENSE: Chrome only renders xn- as Unicode if it passes IDN-spoofing heuristics; otherwise shows punycode. URLNet feature: if browser would render as punycode, elevated risk. (3) PRODUCTION: normalize confusables + flag IDN + train on IDN-augmented data + browser-render flag = robust handling. Skip any of these and IDN-abuse phishing slips through.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip IDN."},
        ]}
        trap={<>(a)(c)(d) miss the IDN handling requirement.</>}
        lens={<>IDN = punycode or Unicode form. Normalize confusables + flag xn- + augment training + browser-render flag. Skip any = phishing slips through.</>}
        stretch={<>How is the Unicode confusables list maintained?</>}
      />

      <VIS.TrapProblem id="url-p19" difficulty="medium" title="P19 — Threshold tuning — global vs per-TLD."
        scenario={<><em>Discriminating insight: per-TLD threshold matters. Cheap TLDs (.tk, .ml, .ga) have very high base rate of phishing; lower threshold catches more without spamming alerts. Reputable TLDs (.gov, .edu, .bank) have low base rate; raise threshold to avoid FP on legit edge cases. Per-TLD calibration via isotonic regression.</em><br/><br/>Threshold.</>}
        options={[
          {key:"a", text:"Global threshold only."},
          {key:"b", text:"PER-TLD threshold is the production default. (1) BASE RATE DIFFERS DRAMATICALLY BY TLD. (a) Free/cheap TLDs (.tk, .ml, .ga, .cf, .gq) — Freenom TLDs popular with abusers; phishing base rate 30-60%. A modest URLNet score on a .tk URL is highly suggestive. (b) NEW gTLDs (.zip, .mov, .top, .xyz, .icu) — high phishing base rate (10-25%); moderate threshold. (c) NEUTRAL TLDs (.com, .net, .org) — base rate 0.1-1%; need a stronger URLNet score before flagging to avoid FP volume drowning the review queue. (d) REGULATED TLDs (.gov, .edu, .bank, .insurance) — base rate near zero; require very high URLNet score before flagging; assume FP unless overwhelming. (2) CALIBRATION: per-TLD isotonic regression on the URLNet output, fit on a per-TLD slice of the labeled validation set. Maps the raw URLNet score to a calibrated probability per TLD. (3) THRESHOLD CHOICE: pick threshold per TLD to hit a target precision (e.g., 95% precision) and let recall float; OR target fixed FPR per TLD. (4) HIERARCHICAL: for TLDs with limited validation data, fall back to a TLD-CATEGORY threshold (free / new gTLD / neutral / regulated). (5) MONITORING: per-TLD precision and recall tracked separately; drift alerts per TLD. (6) MULTI-STAGE: low threshold per TLD triggers BROWSER WARNING (low cost FP); high threshold triggers BLOCK (high cost FP). Asymmetric cost.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip thresholds."},
        ]}
        trap={<>(a)(c)(d) miss the per-TLD base-rate variance.</>}
        lens={<>Per-TLD threshold via isotonic regression. Cheap TLD: lower threshold. Regulated TLD: higher threshold. Hierarchical fallback by TLD category.</>}
        stretch={<>What does the isotonic regression input look like per TLD?</>}
      />

      <VIS.TrapProblem id="url-p20" difficulty="hard" title="P20 — Concept-specific misattribution: URL CANONICALIZATION DRIFT after a preprocessing-library bump."
        scenario={<><em>Discriminating insight (concept-specific): URLNet was trained with normalization library version v1.2 (lowercases, percent-decodes, IDN normalizes); v1.3 changed behavior on a corner case (preserves uppercase in path, treats specific Unicode differently). Production now uses v1.3; the model sees subtly different character sequences; AUPRC drops. Specific to char-level mechanism — every preprocessing detail matters.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"URL-CANONICALIZATION-DRIFT after library bump is THE concept-specific misattribution for URLNet — directly anchored on URL-canonicalization drift. (1) CAUSE: URLNet was trained with a normalization pipeline pinned to version v1.2 of a URL library (Python tldextract / urllib / idna combo, or a custom internal library). Pipeline behaviors: lowercase host, percent-decode, IDN-normalize via punycode-to-unicode-and-confusable-map, strip default port, strip trailing slash, sort query params. (2) A LIBRARY UPDATE to v1.3 changed one or more behaviors: (a) preserves uppercase characters in the PATH (not just host) when they were stripped in v1.2; (b) treats a specific Unicode normalization form NFC vs NFKC differently; (c) percent-decodes only safe characters not all bytes; (d) handles a previously-buggy IPv6 host parsing differently. (3) RESULT: production serving applies v1.3 normalization; the model receives a SLIGHTLY DIFFERENT character sequence than what its training data was normalized to. Char embeddings differ at every changed character; CNN filter activations differ; phishing score shifts. (4) IMPACT: AUPRC drops 2-8% silently; per-day FPR creeps up; investigators see strange new false positives on previously-correctly-scored URLs. (5) DIAGNOSIS: maintain a CANARY URL SET (1000 URLs with known scores from training time); replay through current normalization + model; alert on score drift. (6) FIX: PIN the normalization library version in both training and serving; INCLUDE the library version in the model card; AUTOMATE training pipeline to FAIL if normalization library version differs from production; on intentional library bump, RETRAIN with the new normalization and validate.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>URL canonicalization drift on library bump. Pin version both sides; canary URL set; alert on score drift; retrain on intentional bump.</>}
        stretch={<>What does the canary URL set look like?</>}
      />

      <VIS.TrapProblem id="url-p21" difficulty="hard" title="P21 — In one sentence, THE unique mechanism of URLNet/URLTransformer."
        scenario={<><em>Discriminating insight: CHARACTER-LEVEL CNN (URLNet) or TRANSFORMER (URLBERT) directly over the raw URL string. Learns lexical + syntactic phishing patterns (homoglyph, brand-suffix, IP/hex hosts, IDN). Catches zero-day URLs blocklists miss. NOT screenshot. NOT email body. NOT word-level.</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"It is a blocklist."},
          {key:"b", text:"FOUR-COMPONENT MECHANISM. (1) CHARACTER VOCABULARY (~100 chars: a-z A-Z 0-9 dash dot slash colon percent etc.) with learned character embedding (d ~ 32-128); UNK token for non-ASCII (IDN normalized separately). (2) ENCODER. URLNet (Le et al., 2018) uses a 1D CNN with parallel filter widths 3-7, max-pool over time per filter; concatenate to a fixed-length URL embedding (~5M params). URLTransformer / URLBERT (2021+) uses a Transformer encoder (4-6 layers, hidden 128-256, ~30M params), pretrained on hundreds of millions of unlabeled URLs via masked-character or masked-BPE prediction. (3) HEAD: 2-3 layer MLP to sigmoid producing phishing probability. (4) TRAINING DATA: positives from PhishTank / OpenPhish / APWG (millions of confirmed phishing URLs); negatives from benign URL crawls (Alexa top-1M, Common Crawl). Per-TLD threshold via isotonic regression. (5) LEARNS: homoglyph substitutions (paypa1.com), brand-suffix tricks (paypal.security-update.tk), IP-as-host, hex-encoded hosts, IDN/punycode abuse, long random subdomain strings, suspicious-TLD chains. (6) DEPLOYS AT INGEST: sub-millisecond per URL on CPU; deployed at SMS firewall, email MTA, browser link-click. (7) NOT a screenshot model (visual phishing — different layer). NOT an email-content LLM (different layer). NOT a word-level NLP classifier (URLs lack words). NOT a blocklist (catches zero-day URLs not yet listed).", correct:true},
          {key:"c", text:"It is screenshot similarity."},
          {key:"d", text:"It is an LLM email scorer."},
        ]}
        trap={<>(a)(c)(d) miss the char-level URL-string mechanism.</>}
        lens={<>Char vocabulary + CNN or Transformer + binary head + PhishTank training + per-TLD threshold + sub-ms inference. NOT screenshot; NOT email; NOT blocklist; NOT word-level.</>}
        stretch={<>What does the masked-char pretraining add to URLBERT?</>}
      />

      <VIS.TrapProblem id="url-p22" difficulty="medium" title="P22 — When NOT to use URLNet/URLTransformer."
        scenario={<><em>Discriminating insight (concept-specific): (1) phishing channel has no URL (voice phishing / vishing, in-person scam); (2) attacker uses ONLY benign-string URLs hosting visual clones (visual phishing dominates); (3) URL traffic volume too low to justify model maintenance (a few thousand URLs per day — handcrafted features sufficient); (4) regulator demands deterministic rule-based decisions; (5) ALL phishing in your channel is open-redirector via legit brand — URL surface is benign by design. Concept-specific.</em><br/><br/>Skip.</>}
        options={[
          {key:"a", text:"Always use it."},
          {key:"b", text:"Skip URLNet/URLTransformer when: (1) NO URL IN CHANNEL — voice phishing (vishing), SMS scams that ask the victim to call a number instead of clicking a URL, in-person social engineering, gift-card scams in retail. URLNet has no input. (2) VISUAL-CLONE-DOMINANT — if the attack pattern is benign-string URLs (login-helper-tools.com) hosting pixel-perfect brand clones, URLNet sees nothing suspicious in the string and misses. Use VISUAL PHISHING (screenshot similarity) as the primary defense; URLNet only catches the easy lexical cases. (3) LOW VOLUME — if you score only a few thousand URLs/day, the cost of weekly retrain + monitoring exceeds the value over handcrafted features + small GBDT. (4) REGULATOR DEMANDS DETERMINISTIC RULES — heavily-regulated jurisdictions may require auditable rule-based decisions; URLNet&apos;s learned score is harder to defend. Use a rule overlay + URLNet as advisory score. (5) OPEN-REDIRECTOR-DOMINANT — if your phishing is entirely abuse of legit-brand redirectors (drive.google.com?next=phisher.example), URLNet sees google.com (benign); detection must happen at the redirect-resolution layer. (6) PRIVACY CONSTRAINT ON URL LOGGING — if you cannot log full URLs (GDPR / sensitive query strings), URLNet has insufficient training data. (7) ENGLISH-ONLY TRAINING DATA + non-English-script TLD market — model under-performs on local-script URLs; train on local data first.", correct:true},
          {key:"c", text:"Never."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>Skip when no URL channel / visual-clone-dominant / low volume / regulator rules-only / open-redirector-dominant / privacy-blocked URL logging / non-English script.</>}
        stretch={<>What does open-redirector detection look like at the resolution layer?</>}
      />

      <VIS.TrapProblem id="url-p23" difficulty="hard" title="P23 — Combining URLNet with visual phishing detection and LLM email scoring."
        scenario={<><em>Discriminating insight: the three layers operate on DIFFERENT MODALITIES (URL string, rendered screenshot, email content) and catch DIFFERENT failure modes. Layer them: URLNet at ingest (cheap), visual phishing on click or in sandbox (expensive), LLM email scoring on inbound email (slow). Late-fuse via a meta-classifier; each layer reduces load on the next.</em><br/><br/>Combine.</>}
        options={[
          {key:"a", text:"Cannot combine."},
          {key:"b", text:"THREE-LAYER DEFENSE IN DEPTH; each layer catches what the others miss; together they raise the attacker&apos;s bar. (1) URLNET / URLTRANSFORMER (URL layer, sub-ms per URL): catches lexical phishing URLs (homoglyph, brand-suffix, IP host, IDN). Misses benign-string URLs hosting visual clones and email-only social engineering. Deploy: at SMS firewall, email MTA, browser link-click. Filters out 80-95% of phishing URLs cheaply. (2) VISUAL PHISHING DETECTION (page layer, seconds per URL): renders the URL in a headless browser; perceptual-hash or CNN-embedding compare to a template bank of legit-brand pages; flags pixel-perfect brand clones regardless of URL string. Misses non-rendering exfil flows (URL POSTs credentials via API to phisher backend) and email-only social engineering. Deploy: on URLs that pass URLNet but are high-stakes (banking-related sender, financial-keyword email); also on user click in browser. (3) LLM EMAIL-CONTENT SCORING (email layer, 100ms - 2s per email): prompts an LLM with full email body + headers + sender display name; LLM reasons about urgency, impersonation, sender-domain conflict, and whether URLs (if any) go where they claim. Catches email-only social engineering with no URL (or with a URL that already passed URLNet + visual). Misses scams in non-email channels. Deploy: at email gateway. (4) LATE FUSION via META-CLASSIFIER: a small GBDT takes [URLNet score, visual phishing score, LLM email score, sender reputation, recipient cohort, time-of-day] and outputs final phishing probability. Calibrated per channel. (5) OPERATIONAL: URLNet runs FIRST (cheapest); only URLs above a threshold OR in high-stakes categories trigger visual phishing render; LLM email scoring runs in parallel on inbound email. (6) ATTACKER COST: must evade ALL THREE — character-clean URL + visual-distinct rendering + email-body that reads benign to an LLM. Drastically reduces attacker conversion.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the multi-layer architecture.</>}
        lens={<>URL layer (URLNet, cheap) → page layer (visual phishing, expensive) → email layer (LLM, slow). Late-fuse via GBDT meta-classifier. Attacker must evade all three.</>}
        stretch={<>What features does the meta-classifier consume?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/1802.03162" target="_blank" rel="noopener"><strong>Le et al. — URLNet: Learning a URL Representation with Deep Learning for Malicious URL Detection</strong></a> <span style={{color:"#64748b", fontSize:14}}>(arXiv 2018, paper)</span><br/>The reference paper. Char-CNN + word-CNN + handcrafted feature ablation; reports AUPRC on millions of labeled URLs.</li>
        <li><a href="https://arxiv.org/abs/2311.03587" target="_blank" rel="noopener"><strong>URLBERT — A Contrastive and Adversarial Pretrained Model for URL Classification</strong></a> <span style={{color:"#64748b", fontSize:14}}>(arXiv 2023, paper)</span><br/>Char/BPE Transformer with masked-token pretraining on billions of URLs plus contrastive and adversarial fine-tuning. State-of-the-art on multiple phishing benchmarks.</li>
        <li><a href="https://www.phishtank.com/" target="_blank" rel="noopener"><strong>PhishTank</strong></a> <span style={{color:"#64748b", fontSize:14}}>(reference / data)</span><br/>Open community-curated phishing URL corpus. The standard positives source for URLNet training; updates daily.</li>
        <li><a href="https://safebrowsing.google.com/" target="_blank" rel="noopener"><strong>Google Safe Browsing</strong></a> <span style={{color:"#64748b", fontSize:14}}>(reference)</span><br/>The blocklist that URLNet complements. Useful to understand the lagging-indicator problem URLNet solves.</li>
        <li><a href="https://publicsuffix.org/" target="_blank" rel="noopener"><strong>Mozilla Public Suffix List</strong></a> <span style={{color:"#64748b", fontSize:14}}>(reference)</span><br/>The canonical resource for extracting the registered domain from a URL — necessary preprocessing for brand-suffix-trick detection and per-TLD threshold calibration.</li>
        <li><a href="https://www.unicode.org/Public/security/latest/confusables.txt" target="_blank" rel="noopener"><strong>Unicode Confusables List</strong></a> <span style={{color:"#64748b", fontSize:14}}>(reference)</span><br/>The canonical list of visually-confusable Unicode characters. Required for IDN / punycode-abuse normalization in URLNet preprocessing.</li>
      </ul>
    </VIS.Section>

);
