  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Counterfactual explanations for fraud — minimal feature change that flips the decision,
// actionable for customers under GDPR Art. 22 and for analysts in case triage.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Explainability"
      title="Counterfactual explanations for fraud"
      subtitle="The smallest change to a customer's features that would flip a decline to an approve — actionable for the customer under GDPR Art. 22 and informative for analysts."
      byline={[
        {label: "Source", value: "Wachter, Mittelstadt, Russell (2018); Counterfactual Fraud Explanations — FAccT 2024"},
        {label: "Year", value: "2018 / 2024"},
        {label: "L2", value: "Explainability for fraud decisions"},
      ]}/>

    <VIS.TLDR>
      <VIS.Term def="A method that explains a model decision by finding the smallest change to the input that would have produced a different outcome — for example, what would have had to be different for this transaction to be approved.">Counterfactual explanations</VIS.Term> answer a question SHAP cannot: not <em>why was I declined</em> but <em>what would I have to change to be approved next time</em>. They are prescriptive, not descriptive — which is what the EU GDPR <VIS.Term def="The General Data Protection Regulation provision that gives data subjects the right not to be subject to a decision based solely on automated processing, and to obtain meaningful information about the logic of the decision.">Article 22</VIS.Term> right-to-explanation reads as. The engineering challenge is making the counterfactual feasible (not asking the customer to do something illegal) and not gameable (not handing the fraudster the recipe).
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Given a model <code>f</code> and an input <code>x</code> with prediction <code>f(x) = decline</code>, find the nearest <code>x'</code> such that <code>f(x') = approve</code>. <em>Nearest</em> uses a distance that respects feature semantics: small in continuous, single-step in ordinal, single-flip in categorical. The optimization is constrained so the suggested change is realistic and policy-compliant.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  X["Declined customer x"]
  F["Trained fraud model f"]
  X --> F
  F --> P["Prediction: decline"]
  X --> O["Counterfactual search"]
  O --> CF["Nearest x' with f(x') = approve"]
  CF --> N["Customer-facing notice: how to change"]
  CF --> A["Analyst signal: what is the marginal feature"]
  style CF fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style N fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>The blue box is the counterfactual. The yellow box is the artifact — actionable advice for the customer or a marginal-feature read for the analyst.</p>

      <p style={{marginTop: 16}}><strong>Wachter et al. objective:</strong></p>
      <VIS.Equation display tex={"x' = \\arg\\min_{x'} \\; \\lambda \\,(f(x') - y_{\\mathrm{target}})^2 + d(x, x')"} />
      <p>
        Read it as: find <code>x'</code> that simultaneously (i) is predicted close to the target outcome and (ii) is close to the original <code>x</code> under a <VIS.Term def="A function measuring how far two feature vectors are apart. In counterfactual search it is weighted to reflect what features are easy versus hard to change in the real world.">feature-aware distance</VIS.Term>. The weight <code>lambda</code> trades off prediction fidelity versus proximity.
      </p>

      <p style={{marginTop: 16}}><strong>Production constraints layered on top:</strong></p>
      <ul>
        <li><strong>Feasibility constraints</strong> — only mutable features can change (zip code is mutable, date of birth is not).</li>
        <li><strong>Causal consistency</strong> — if changing income, also propagate to downstream features derived from income.</li>
        <li><strong>Sparsity</strong> — change as few features as possible (analyst readability and customer actionability both improve).</li>
        <li><strong>Plausibility</strong> — the counterfactual must lie on the data manifold (no <em>set income to negative ten thousand</em>).</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from SHAP">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>SHAP</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Counterfactual</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Type of answer</td>
            <td style={{padding:"8px 10px"}}>Descriptive — what features drove the score</td>
            <td style={{padding:"8px 10px"}}>Prescriptive — what would change the score</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Form of output</td>
            <td style={{padding:"8px 10px"}}>Per-feature attributions (vector)</td>
            <td style={{padding:"8px 10px"}}>Alternative input (vector)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Best for</td>
            <td style={{padding:"8px 10px"}}>FCRA adverse-action notice</td>
            <td style={{padding:"8px 10px"}}>GDPR Art. 22, customer recourse</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Gaming risk</td>
            <td style={{padding:"8px 10px"}}>Low (descriptive)</td>
            <td style={{padding:"8px 10px"}}>High — must engineer against it</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Compute cost</td>
            <td style={{padding:"8px 10px"}}>Milliseconds with Tree SHAP</td>
            <td style={{padding:"8px 10px"}}>Seconds to minutes per row</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>EU GDPR Article 22</strong> — for automated decisions over EU customers, the legal interpretation increasingly favors actionable rather than descriptive explanations. Counterfactuals are the cleanest match.</li>
        <li><strong>Customer recourse channels</strong> — <em>here is what you can do to get approved next time</em> is what a customer asks for after a decline. SHAP does not answer it directly.</li>
        <li><strong>Analyst marginal-case triage</strong> — for borderline cases, the counterfactual tells the analyst which single feature flip would change the decision; that focuses the investigation.</li>
        <li><strong>Skip for non-recourse decisions</strong> — a fraud-confirmed transaction has no recourse, so a customer-facing counterfactual is wrong. Use SHAP and skip counterfactuals.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Infeasible counterfactuals are a legal and ethical landmine">
        Without constraints, the optimizer happily suggests <em>change your date of birth</em>, <em>move to a different zip code</em>, or <em>change your name</em>. The customer-facing version cannot ship without an explicit mutability allow-list and a downstream causal-consistency check. Treat the mutability schema as a first-class artifact.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Counterfactuals are inherently gameable">
        Telling a real fraudster exactly which features would flip the decision is handing them the model's policy. The fix is policy: counterfactuals are returned only after identity verification (the requester is the real customer), only for one or two specific feature families that are hard to game (e.g., long-term income trajectory, not recent IP), and with rate limits.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Multiple valid counterfactuals exist and they disagree">
        For any decline there are many counterfactuals. Wachter's method returns one; DiCE returns several; competing distance metrics give different answers. Pick a method, fix a metric, version both, and document the choice in the model card — auditors will ask why this counterfactual and not another.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Cost: seconds-to-minutes per row, not real-time">
        The optimization is iterative and slow. For interactive customer-facing UX you either precompute counterfactuals after the decline event (asynchronously) or use prototype methods (CFProto) that amortize the search. Real-time counterfactuals during a transaction are not viable.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Trap problems on feasibility constraints, gameability, multiplicity, recourse-design, and the SHAP-vs-counterfactual choice.
      </p>

      <VIS.TrapProblem
        id="cf-p1"
        difficulty="hard"
        title="P1 — Counterfactual suggests changing date of birth. Why and what to do?"
        scenario={<>Your initial counterfactual implementation returns: <em>change DOB from 1995 to 1985 and decision flips to approve.</em> Marketing is asking how to surface this to the customer. What is the right response?</>}
        options={[
          {key:"a", text:"This is the canonical feasibility failure. DOB is immutable; the counterfactual is mathematically valid but operationally absurd. Fix the optimizer with a feature-mutability schema (allow-list of features the customer can change) and re-run constrained. Document the schema as a versioned artifact in the model card. Never ship the unconstrained output to a customer.", correct:true},
          {key:"b", text:"Surface it with a disclaimer."},
          {key:"c", text:"The optimizer is broken; switch to SHAP."},
          {key:"d", text:"Train a fairer model so it does not depend on DOB."},
        ]}
        trap={<>(b) is a legal and reputational disaster. (c) abandons the right tool. (d) is unrelated.</>}
        lens={<>(a) Feasibility constraints are the price of admission for production counterfactuals. The mutability schema is the artifact.</>}
        stretch={<>What other immutable features must be on the deny-list?</>}
      />

      <VIS.TrapProblem
        id="cf-p2"
        difficulty="hard"
        title="P2 — Counterfactual says 'reduce monthly transaction count from 50 to 5'. Gameable?"
        scenario={<>A counterfactual for a flagged frequent-flyer customer says: <em>reduce monthly transaction count from 50 to 5 and decision flips to approve.</em> The compliance team asks whether to surface this. What is the right call?</>}
        options={[
          {key:"a", text:"Do not surface to the customer in the live system. A real fraudster receiving this counterfactual learns the exact velocity threshold and circumvents it; a real customer cannot meaningfully act on it short of changing their lifestyle. Counterfactuals on velocity/behavior features are high-game, low-recourse. Restrict customer-facing counterfactuals to features that are (i) actionable by genuine customers and (ii) low value to fraudsters (e.g., document-verification completion, long-term income evidence).", correct:true},
          {key:"b", text:"Surface it; transparency is required by GDPR."},
          {key:"c", text:"Surface a noised version."},
          {key:"d", text:"Surface only the top feature."},
        ]}
        trap={<>(b) misreads GDPR — Article 22 requires meaningful information, not policy-revealing exact thresholds. (c) is half-measure with all the downsides. (d) is heuristic without principled gating.</>}
        lens={<>(a) Policy-aware gating: which features can be surfaced and which cannot. Treat the surfacing decision as a separate engineering layer.</>}
        stretch={<>What features in your domain pass both filters?</>}
      />

      <VIS.TrapProblem
        id="cf-p3"
        difficulty="hard"
        title="P3 — Three different counterfactuals for the same customer. Pick one?"
        scenario={<>For one declined customer, your system finds three counterfactuals: (A) increase income by 12 percent and reduce credit-utilization by 8 points; (B) change residence state from CA to NV; (C) acquire one positive trade-line. Pick the right one to surface.</>}
        options={[
          {key:"a", text:"(A) and (C) — both pass mutability, plausibility, and low-gameability. Surface them as alternative paths, ranked by realistic effort. (B) (move state) is technically actionable but disproportionate and legally fraught (it implies state of residence drove the decision, raising fair-lending questions). When multiple feasible counterfactuals exist, surface 2 to 3 alternatives so the customer picks the one that fits their life.", correct:true},
          {key:"b", text:"Always surface the nearest single counterfactual."},
          {key:"c", text:"(B) — moving state is most concrete."},
          {key:"d", text:"Surface all three so the customer chooses."},
        ]}
        trap={<>(b) ignores plausibility and fairness. (c) is the legal landmine. (d) overloads the customer with choices that include the legal landmine.</>}
        lens={<>(a) Multiplicity is a feature: rank by realistic effort, surface 2 to 3, filter the legally fraught one out.</>}
        stretch={<>How would you rank by realistic effort?</>}
      />

      <VIS.TrapProblem
        id="cf-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Production constraints for counterfactual search — pick the must-haves"
        scenario={<>You design the constraint set for a production counterfactual generator. Pick the must-have constraints. Select all that apply.</>}
        options={[
          {key:"a", text:"Mutability allow-list (which features the customer can actually change).", correct:true},
          {key:"b", text:"Causal consistency (if income changes, dependent features like savings ratio update too).", correct:true},
          {key:"c", text:"Sparsity penalty (prefer few-feature changes for readability and recourse).", correct:true},
          {key:"d", text:"Plausibility constraint (counterfactual lies on the data manifold).", correct:true},
          {key:"e", text:"Gameability filter (do not surface features fraudsters can easily flip).", correct:true},
          {key:"f", text:"Always surface the absolute nearest counterfactual regardless of feasibility."},
          {key:"g", text:"Run counterfactual search inline on the decision-time critical path."},
        ]}
        trap={<>(f) is the original Wachter formulation but unshippable. (g) is a latency mistake — counterfactuals are async.</>}
        lens={<>(a) through (e) form the production constraint stack.</>}
        stretch={<>Which constraint is hardest to implement in practice?</>}
      />

      <VIS.TrapProblem
        id="cf-p5"
        difficulty="hard"
        title="P5 — DiCE vs CFProto vs Wachter — which method for production fraud recourse?"
        scenario={<>The team evaluates three counterfactual methods: Wachter et al. (Lagrangian optimization), DiCE (diverse counterfactuals via genetic search), and CFProto (prototype-guided). For a large bank's customer-facing recourse system, which method is the senior default and why?</>}
        options={[
          {key:"a", text:"DiCE for the customer-facing path. It generates diverse, sparse counterfactuals natively, supports actionability constraints out of the box (immutable features, monotonicity, causal links), and the diversity lets you surface 2 to 3 alternatives. Wachter is the simplest baseline but returns one counterfactual at a time and is slow per-row. CFProto is great for image domains; less critical for tabular fraud.", correct:true},
          {key:"b", text:"Wachter — the original method is the canonical choice."},
          {key:"c", text:"CFProto — prototypes guarantee plausibility."},
          {key:"d", text:"All three; ensemble the outputs."},
        ]}
        trap={<>(b) ignores DiCE's structural advantages for actionability. (c) is true in image domains but not the dominant choice for tabular fraud. (d) is unnecessary complexity.</>}
        lens={<>(a) DiCE is the tabular-fraud production default in 2024-2026; pair with explicit mutability and gameability gates.</>}
        stretch={<>When would CFProto win for tabular fraud?</>}
      />

      <VIS.TrapProblem
        id="cf-p6"
        difficulty="hard"
        title="P6 — Counterfactual changes only one feature: 'open a checking account'. Suspicious?"
        scenario={<>Your DiCE-generated counterfactual says: <em>open a checking account with our bank and decision flips.</em> Marketing loves it. What is the right concern?</>}
        options={[
          {key:"a", text:"The counterfactual is technically valid but raises self-dealing and steering concerns: by surfacing a recourse that requires the customer to buy another product from the same bank, you mix a credit decision with a cross-sell. Regulators (CFPB, FCA) treat this as a UDAAP risk. Surface a counterfactual whose recourse does not require purchasing additional products from your institution, or split the explanation from the cross-sell with clear consumer-facing disclosure.", correct:true},
          {key:"b", text:"Ship it — more accounts is good for the customer."},
          {key:"c", text:"Suppress the counterfactual entirely."},
          {key:"d", text:"Replace 'our bank' with 'any bank'."},
        ]}
        trap={<>(b) is the marketing trap. (c) loses legitimate recourse. (d) is too cute and may still be self-dealing if upstream model uses bank-specific features.</>}
        lens={<>(a) Cross-product steering inside automated recourse is a UDAAP issue; design the surfacing layer to avoid it.</>}
        stretch={<>How would you detect self-dealing systematically across all counterfactuals?</>}
      />

      <VIS.TrapProblem
        id="cf-p7"
        difficulty="hard"
        title="P7 — A real fraudster receives a counterfactual and successfully games the model. Triage."
        scenario={<>Six months after launch, you detect a cluster of fraudulent applications that look unusually well-tuned to pass — they almost exactly satisfy the counterfactual thresholds that the legitimate customer-facing flow returns. Triage.</>}
        options={[
          {key:"a", text:"Triage in order: (1) shut down the customer-facing counterfactual for the gameable feature family immediately, (2) audit the leak vector (identity verification bypass, account takeover, screen-scrape, internal data exfiltration), (3) add adversarial-robustness training to the underlying fraud model so threshold-hugging samples remain detectable, (4) shift to broader recourse phrasing rather than exact thresholds for that feature family, (5) cooperate with security on the leak investigation. The counterfactual surfacing decision is reversible; the trust hit if customers learn is not.", correct:true},
          {key:"b", text:"Add gradient masking to make the model harder to invert."},
          {key:"c", text:"Tell customers the counterfactual is 'just a guideline'."},
          {key:"d", text:"Re-train on the new fraud cluster and continue."},
        ]}
        trap={<>(b) is a known-bad defense — gradient masking gives a false sense of security. (c) does not fix the leak. (d) re-trains around the symptom.</>}
        lens={<>(a) Shut down the leaking channel, audit, harden, reframe — in that order.</>}
        stretch={<>What single signal would you watch to detect this cluster sooner next time?</>}
      />

      <VIS.TrapProblem
        id="cf-p8"
        difficulty="hard"
        multiSelect
        title="P8 — Counterfactual vs SHAP — when to surface which?"
        scenario={<>For different fraud scenarios, decide whether to surface a SHAP-style or counterfactual-style explanation. Pick the scenarios where counterfactual is the right primary surface.</>}
        options={[
          {key:"a", text:"EU customer credit-line decline under GDPR.", correct:true},
          {key:"b", text:"FCRA-required US adverse-action notice for a credit denial."},
          {key:"c", text:"Customer asks 'what can I do to get approved next time?'.", correct:true},
          {key:"d", text:"Analyst triaging a borderline review case wants the marginal feature.", correct:true},
          {key:"e", text:"Confirmed-fraud chargeback notice."},
          {key:"f", text:"Internal model-audit review by data science.", correct:false},
        ]}
        trap={<>(b) is FCRA which leans SHAP (descriptive). (e) confirmed fraud has no recourse, so counterfactual is wrong. (f) audit reviews care about descriptive attribution.</>}
        lens={<>(a), (c), (d) are recourse-shaped questions; counterfactual is the right surface.</>}
        stretch={<>Where do FCRA-required notices and GDPR-required notices align or diverge?</>}
      />

      <VIS.TrapProblem
        id="cf-p9"
        difficulty="hard"
        title="P9 — Causal consistency — what goes wrong without it?"
        scenario={<>Your counterfactual generator does not enforce causal consistency. It returns: <em>increase income from 60k to 100k</em> but leaves savings, credit-utilization, and debt-to-income unchanged. What goes wrong?</>}
        options={[
          {key:"a", text:"Without causal consistency, the counterfactual lies on an unrealistic point in feature space — a customer with 100k income would typically have higher savings, lower credit-utilization, and lower debt-to-income. The model may behave unpredictably on this off-manifold point, and the resulting prediction (and therefore the validity of the counterfactual) is not reliable. Fix: implement a structural causal model over features that propagates changes to dependent features when a parent feature is modified.", correct:true},
          {key:"b", text:"Nothing — the model accepts any input."},
          {key:"c", text:"The model predictions are slightly biased but still correct."},
          {key:"d", text:"It is fine if the customer accepts the off-manifold suggestion."},
        ]}
        trap={<>(b) (c) understate the manifold problem. (d) is unprincipled.</>}
        lens={<>(a) Causal consistency keeps counterfactuals on-manifold so the predicted flip is trustworthy.</>}
        stretch={<>How would you discover the causal graph among features?</>}
      />

      <VIS.TrapProblem
        id="cf-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Production counterfactual stack — pick the ingredients"
        scenario={<>You ship customer-facing counterfactuals for an EU consumer credit product. Pick the ingredients a senior would defend. Select all that apply.</>}
        options={[
          {key:"a", text:"DiCE with mutability allow-list, causal-consistency propagation, sparsity penalty, and plausibility constraint.", correct:true},
          {key:"b", text:"Async generation after the decline event, persisted with versioned method + config.", correct:true},
          {key:"c", text:"Gameability gate: deny-list of feature families that fraudsters can flip cheaply.", correct:true},
          {key:"d", text:"Surfacing layer that returns 2 to 3 alternative counterfactuals ranked by realistic effort, and excludes self-dealing recourse paths.", correct:true},
          {key:"e", text:"Always return the absolute nearest counterfactual to maximize transparency."},
          {key:"f", text:"Real-time inline counterfactual computation during the transaction."},
          {key:"g", text:"Quarterly audit comparing surfaced counterfactuals against fraud-cluster patterns.", correct:true},
        ]}
        trap={<>(e) ignores feasibility and gameability. (f) is a latency mistake — counterfactuals are async.</>}
        lens={<>(a) through (d) and (g) form the defensible production stack.</>}
        stretch={<>What is the single most important governance artifact in this stack?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1711.00399" target="_blank" rel="noopener">
            <strong>Wachter, Mittelstadt, Russell — Counterfactual Explanations without Opening the Black Box: Automated Decisions and the GDPR</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, Harvard JOLT 2018)</span>
          <br/>The seminal counterfactual-explanations paper. Sections 3 and 4 are the cleanest framing of the GDPR motivation.
        </li>
        <li>
          <a href="https://interpret.ml/DiCE/" target="_blank" rel="noopener">
            <strong>Microsoft DiCE — Diverse Counterfactual Explanations</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(library docs + tutorials)</span>
          <br/>The reference library for tabular counterfactuals. Tutorials on actionability, sparsity, and diversity are exactly the right entry point.
        </li>
        <li>
          <a href="https://christophm.github.io/interpretable-ml-book/counterfactual.html" target="_blank" rel="noopener">
            <strong>Christoph Molnar — Interpretable Machine Learning, chapter on Counterfactual Explanations</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(open book chapter)</span>
          <br/>The friendliest tutorial. Includes the worked credit-decline example that every paper since cites.
        </li>
        <li>
          <a href="https://dl.acm.org/doi/10.1145/3461702.3462596" target="_blank" rel="noopener">
            <strong>Karimi et al. — A Survey of Algorithmic Recourse</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(survey, ACM FAccT 2021)</span>
          <br/>The reference survey. Read Sections 3 and 5 for the gameability and causal-consistency literature.
        </li>
        <li>
          <a href="https://www.youtube.com/watch?v=tIqzYIbXzpA" target="_blank" rel="noopener">
            <strong>Sandra Wachter — Counterfactual Explanations and the GDPR (talk)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(~45 min video)</span>
          <br/>The author walks through the legal motivation. Best single resource for understanding the regulatory shape of the problem.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
