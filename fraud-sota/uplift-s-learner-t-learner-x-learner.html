<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Uplift / S-learner / T-learner / X-learner — Fraud SOTA · Causal inference for fraud.
// CONCEPT ANCHOR (B3): META-LEARNERS that ESTIMATE THE CATE (Conditional Average Treatment
// Effect) per user. S = single model with treatment-as-feature; T = two separate models
// (treated / control) differenced; X = cross-fitted residual learners (impute counterfactual
// then refit, propensity-reweighted). NOT propensity scoring; NOT plain risk scoring.
// Goal: RANK customers by INCREMENTAL effect of an action (review, hold), not by raw P(fraud).

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Causal inference"
      title="Uplift — S/T/X-learners for per-user treatment effects"
      subtitle="Three meta-learners that estimate the per-customer CATE of an action (review, hold, friction). The right tool when review capacity is the binding constraint and you want to spend it on customers where the action actually moves the outcome."
      byline={[
        {label:"Paper", value:"Künzel et al. X-learner (PNAS 2019); KDD 2024 'Counterfactual Fraud Reviews'"},
        {label:"L3", value:"Meta-learners estimating CATE under unconfoundedness"},
        {label:"Anchor", value:"S: one model, treatment as feature. T: two models, differenced. X: impute counterfactuals → refit on residuals, propensity-weighted."},
      ]}/>

    <VIS.TLDR>
      Risk scoring answers <em>how likely is this fraud?</em> Uplift modeling answers a different, operationally more valuable question:{" "}
      <em>how much does my action change the outcome for this customer?</em> The quantity is the{" "}
      <VIS.Term def="Conditional Average Treatment Effect: tau(x) = E[Y(1) - Y(0) | X=x]. Expected change in outcome from applying the treatment, conditional on features.">CATE</VIS.Term>{" "}
      tau(x) = E[Y(1) - Y(0) | X=x]. Three named recipes — S-learner (one model with treatment as a feature), T-learner (two separate models, treated and control, differenced), X-learner (impute counterfactuals on each arm, fit a second-stage model on the imputed effects, reweight by propensity) — all output a per-user tau-hat(x). Ranking the manual-review queue by tau-hat(x) instead of by P(fraud|x) keeps the capacity-constrained reviewers working on cases where reviewing actually changes the outcome — not on cases the system would catch anyway. Identifiability needs unconfoundedness; finite-sample quality differs sharply across the three when treatment-arm sizes are unbalanced (X-learner wins when one arm is much smaller).
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — three recipes for estimating tau(x)">
      <p>
        Cast the fraud decision as a{" "}
        <VIS.Term def="A formal causal-inference setup: for each unit, two potential outcomes exist — Y(1) under treatment, Y(0) under control — but only one is observed. The treatment effect is the difference, which must be estimated.">potential-outcomes</VIS.Term>{" "}
        problem. For each customer i with features x_i and a binary treatment T (e.g., manual review vs not), define Y(1) = outcome if treated, Y(0) = outcome if not. Only one is observed per customer (the{" "}
        <VIS.Term def="The core challenge of causal inference: for each unit you observe only one of the two potential outcomes, never both.">fundamental problem of causal inference</VIS.Term>). The CATE is tau(x) = E[Y(1) - Y(0) | X=x]. Three meta-learners estimate it.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  D["Historical data: x, T, Y"]
  D --> S["S-learner: one model mu(x,T)"]
  D --> T2["T-learner: mu_0(x), mu_1(x)"]
  D --> X["X-learner: impute then refit (cross-fitted)"]
  S --> Z["per-user tau hat(x)"]
  T2 --> Z
  X --> Z
  Z --> R["rank queue by tau hat(x)"]
  style Z fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style R fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>The blue node is the per-user CATE estimate. The yellow node is the operational decision — the review queue is ordered by uplift, not by raw P(fraud).</p>

      <p style={{marginTop:16}}><strong>S-learner.</strong> Fit ONE model mu(x, T) on the union of treated and control rows, with T as just another feature. Predict tau-hat(x) = mu(x, 1) - mu(x, 0). Cheap, but the model can ignore T if it's weak relative to x — biased toward zero effect.</p>

      <p><strong>T-learner.</strong> Fit TWO separate models: mu_1(x) on treated rows only, mu_0(x) on control rows only. Predict tau-hat(x) = mu_1(x) - mu_0(x). Each model is well-specified on its arm, but when treated/control sizes are unbalanced, the smaller-arm model is noisy — variance dominates.</p>

      <p><strong>X-learner (Künzel et al. 2019).</strong> Two stages: (1) Fit mu_0, mu_1 as in T-learner. (2) Impute counterfactual residuals: for each treated row D_i^1 = Y_i - mu_0(x_i); for each control row D_i^0 = mu_1(x_i) - Y_i. (3) Fit two CATE models tau_1(x) on treated residuals and tau_0(x) on control residuals. (4) Final: tau-hat(x) = e(x) * tau_0(x) + (1 - e(x)) * tau_1(x) where e(x) is the propensity score. The reweighting by propensity is what makes X-learner shine when one arm is small — it borrows strength from the larger arm.</p>

      <VIS.Equation display tex={`\\hat{\\tau}^X(x) = \\hat{e}(x)\\,\\hat{\\tau}_0(x) + (1 - \\hat{e}(x))\\,\\hat{\\tau}_1(x)`} />
      <p>The X-learner final estimator: a propensity-weighted blend of the two arm-specific CATE models. When propensity is near 0 (rarely treated), weight goes to tau_1 (built from control-arm imputations using the well-trained treated model). When propensity is near 1, the reverse.</p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How uplift differs from plain risk scoring">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Uplift (CATE)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Risk score P(fraud|x)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Propensity score</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Estimand</td><td style={{padding:"6px 10px"}}>tau(x) = E[Y(1)-Y(0)|x]</td><td style={{padding:"6px 10px"}}>P(Y=1|x)</td><td style={{padding:"6px 10px"}}>P(T=1|x)</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Decision optimized</td><td style={{padding:"6px 10px"}}>Incremental catch per review</td><td style={{padding:"6px 10px"}}>Total catch above threshold</td><td style={{padding:"6px 10px"}}>Treatment assignment (not decision)</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Needs treatment data</td><td style={{padding:"6px 10px"}}>Yes — both arms</td><td style={{padding:"6px 10px"}}>No</td><td style={{padding:"6px 10px"}}>No outcomes needed</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Identifiability</td><td style={{padding:"6px 10px"}}>Unconfoundedness OR RCT</td><td style={{padding:"6px 10px"}}>Just supervised</td><td style={{padding:"6px 10px"}}>Just supervised on T</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Right when</td><td style={{padding:"6px 10px"}}>Review capacity binding</td><td style={{padding:"6px 10px"}}>Capacity unconstrained</td><td style={{padding:"6px 10px"}}>Input to DR / weighting</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569", marginBottom:16}}>Every problem turns on CATE estimation — strip "per-user treatment effect" and answers collapse to risk scoring or propensity. Discriminating insight per problem.</p>

      <VIS.TrapProblem id="up-p1" difficulty="hard" title="P1 — PM: 'We have a great fraud score. Why also uplift?'"
        scenario={<><em>Discriminating insight: risk score ranks by P(fraud|x); uplift ranks by INCREMENTAL effect of the action. With capacity-constrained reviewers, the top-risk queue contains both 'will be caught either way' and 'review actually changes the outcome'. Uplift removes the first group.</em><br/><br/>Pitch.</>}
        options={[
          {key:"a", text:"Uplift is newer."},
          {key:"b", text:"Risk scoring answers 'how likely is this fraud?' and ranks transactions by P(Y=1|x). With unlimited reviewer capacity that's all you need. But manual review is the binding constraint — 200 cases/day from 50K candidates. The top-200-by-risk queue contains two kinds of cases: ones where review actually changes outcome (e.g., the fraudster abandons when challenged) and ones the system would catch anyway via auto-rules (e.g., later velocity flags). The second group spends review capacity on cases with near-zero incremental effect. Uplift modeling estimates tau(x) = E[Y(1) - Y(0) | x], the per-customer change in outcome from reviewing vs not. Ranking the queue by tau-hat(x) directs scarce capacity to cases where the action moves the needle. The gain is operational efficiency: same review budget catches more incremental fraud.", correct:true},
          {key:"c", text:"Uplift IS risk scoring."},
          {key:"d", text:"They're identical."},
        ]}
        trap={<>(a) recency; (c)(d) collapse the estimand.</>}
        lens={<>Risk = total catch. Uplift = incremental catch under capacity. Different estimands.</>}
        stretch={<>What metric quantifies the gain — Qini, AUUC, or expected lift?</>}
      />

      <VIS.TrapProblem id="up-p2" difficulty="hard" title="P2 — Define the CATE precisely."
        scenario={<><em>Discriminating insight: tau(x) = E[Y(1) - Y(0) | X=x]. Difference of POTENTIAL outcomes conditional on features. NOT a difference of predictions; not a propensity; not a risk score. It is identifiable from observational data only under unconfoundedness.</em><br/><br/>Define.</>}
        options={[
          {key:"a", text:"tau(x) = P(Y=1|x)."},
          {key:"b", text:"tau(x) = E[Y(1) - Y(0) | X=x]. The conditional expectation of the DIFFERENCE of two potential outcomes — Y(1) under treatment, Y(0) under control — given features x. Three things to notice: (1) it's a DIFFERENCE not a ratio or odds; (2) it's POTENTIAL OUTCOMES not observed outcomes — for any given unit we only ever see one; (3) it's CONDITIONAL on x, so it's a per-feature-bucket effect, not the average treatment effect. The CATE is the right object to optimize when you'd take different actions for different customers based on their features. Identifiability from observational data requires unconfoundedness: (Y(1), Y(0)) independent of T given X. With an RCT, T is independent of X by design, so unconfoundedness holds trivially.", correct:true},
          {key:"c", text:"tau(x) = P(T=1|x)."},
          {key:"d", text:"tau(x) is the raw correlation."},
        ]}
        trap={<>(a) risk; (c) propensity; (d) generic.</>}
        lens={<>Difference of potential outcomes conditional on x. Identifiable under unconfoundedness.</>}
        stretch={<>What changes if the treatment is continuous instead of binary?</>}
      />

      <VIS.TrapProblem id="up-p3" difficulty="hard" title="P3 — S-learner: when does it collapse to zero?"
        scenario={<><em>Discriminating insight: S-learner uses T as ONE feature among many. If the learner (e.g., random forest, gradient boosting) deems T unimportant relative to x — regularization or split criterion never picks it — tau-hat(x) = mu(x,1) - mu(x,0) ≈ 0 everywhere. Bias toward zero effect. Tree-based learners are especially prone.</em><br/><br/>Failure mode.</>}
        options={[
          {key:"a", text:"S-learner never collapses."},
          {key:"b", text:"S-learner bias-toward-zero. The model mu(x, T) treats T as just one feature among dozens. If a regularized learner (tree-based gradient boosting with min-samples-leaf; L1-penalized GLM) finds T weak relative to highly informative features in x, it can essentially ignore T — no split uses it, or the L1 penalty zeros its coefficient. Then mu(x, 1) ≈ mu(x, 0) for every x, and tau-hat(x) collapses toward zero everywhere — regardless of the true effect. This is especially common when the true effect is small relative to x's predictive power, when T's marginal correlation with Y is weak in the observational data, or when the learner is deep enough to fit Y from x alone. Diagnostics: feature importance on T; partial dependence plot of mu(x, T) holding x fixed and varying T. Fixes: T-learner separates the arms; or force T into every split (X-BART, causal forests).", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt instead."},
        ]}
        trap={<>(a)(c)(d) miss the regularization-eats-T effect.</>}
        lens={<>S-learner can ignore T if regularizer or splitter doesn't pick it. Bias to zero effect.</>}
        stretch={<>How does this generalize to deep nets?</>}
      />

      <VIS.TrapProblem id="up-p4" difficulty="hard" multiSelect title="P4 — Pick TRUE statements about the T-learner (2 correct)"
        scenario={<><em>Discriminating insight: T-learner fits two models, no information sharing across arms. Each model is well-specified on its own arm but the smaller arm is noisy. Doesn't suffer from the S-learner's bias-to-zero issue, but suffers variance under imbalance.</em><br/><br/>Pick TRUE.</>}
        options={[
          {key:"a", text:"Fits two independent models mu_0 and mu_1, one per arm.", correct:true},
          {key:"b", text:"High variance when treated/control sizes are very unbalanced.", correct:true},
          {key:"c", text:"Requires only one labeled arm."},
          {key:"d", text:"Shares parameters across the arms."},
          {key:"e", text:"Always more accurate than X-learner."},
        ]}
        trap={<>(c)(d) confuse with S/X; (e) wrong.</>}
        lens={<>Two independent models; high variance under imbalance.</>}
        stretch={<>What's the variance penalty exactly?</>}
      />

      <VIS.TrapProblem id="up-p5" difficulty="hard" title="P5 — X-learner: why does it help under treatment-arm imbalance?"
        scenario={<><em>Discriminating insight: X-learner imputes counterfactuals using each arm's model (D_i^1 = Y_i - mu_0(x_i) for treated; D_i^0 = mu_1(x_i) - Y_i for control), then fits CATE models tau_1, tau_0 on the imputed residuals, then PROPENSITY-WEIGHTS them. Borrows strength from the larger arm via the imputation step.</em><br/><br/>Mechanism.</>}
        options={[
          {key:"a", text:"It uses more data."},
          {key:"b", text:"X-learner exploits both arms by IMPUTING the unobserved counterfactual for each unit using the model fit on the OTHER arm, then fitting CATE models on those imputed residuals, and finally PROPENSITY-WEIGHTING them. Step-by-step: (1) fit mu_0, mu_1 as in T-learner. (2) For each treated unit i, the unobserved Y_i(0) is unknown — impute it as mu_0(x_i); the imputed treatment effect is D_i^1 = Y_i - mu_0(x_i). For each control unit, D_i^0 = mu_1(x_i) - Y_i. (3) Fit a regression tau_1(x) on D_i^1 over the treated set; fit tau_0(x) on D_i^0 over the control set. (4) Final: tau-hat(x) = e(x) tau_0(x) + (1 - e(x)) tau_1(x), where e(x) = P(T=1|x) is the propensity. When one arm is small (say, controls are rare), mu_0 is built on the LARGER (treated) arm minus residuals — borrowing strength. Künzel et al. (PNAS 2019) showed this dominates T-learner sharply when arm sizes differ by 5x or more.", correct:true},
          {key:"c", text:"It avoids modeling Y."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the impute-then-refit mechanism.</>}
        lens={<>Impute counterfactual residuals, fit second-stage CATE per arm, propensity-blend.</>}
        stretch={<>What if propensity e(x) is near 0 or 1?</>}
      />

      <VIS.TrapProblem id="up-p6" difficulty="hard" title="P6 — Identifiability: what assumption does uplift NEED?"
        scenario={<><em>Discriminating insight: UNCONFOUNDEDNESS — (Y(1), Y(0)) independent of T given X. All confounders observed. Plus positivity: 0 less than e(x) less than 1 for all x in support. Without these, tau-hat is biased no matter which meta-learner. RCT satisfies both trivially.</em><br/><br/>Assumption.</>}
        options={[
          {key:"a", text:"None."},
          {key:"b", text:"Two key assumptions. (1) UNCONFOUNDEDNESS (a.k.a. ignorability, conditional exchangeability): (Y(1), Y(0)) independent of T given X. Intuitively, after conditioning on the observed features X, the treatment assignment is as good as random — no UNOBSERVED variable drives both T and Y. This fails when, e.g., a reviewer used gut feel (unobserved) to decide who to review and gut feel correlates with fraud. (2) POSITIVITY (overlap): 0 less than e(x) = P(T=1|x) less than 1 for every x in the support of X. Intuitively, every customer profile must have some chance of being treated and some chance of not — otherwise you can't estimate a counterfactual. A randomized controlled trial (RCT) satisfies both by design — T is independent of X, so independent of (Y(1), Y(0)) given X, and propensity is fixed e.g. 0.5. Observational data needs both assumptions explicitly checked, often via DAG analysis and propensity-overlap plots.", correct:true},
          {key:"c", text:"Just IID."},
          {key:"d", text:"Just supervised learning."},
        ]}
        trap={<>(a)(c)(d) miss causal identifiability.</>}
        lens={<>Unconfoundedness + positivity. RCT gets both for free.</>}
        stretch={<>How do you check positivity in practice?</>}
      />

      <VIS.TrapProblem id="up-p7" difficulty="hard" title="P7 — Uplift evaluation: AUUC and Qini — what are they?"
        scenario={<><em>Discriminating insight: AUUC (Area Under Uplift Curve) and Qini are RANKING metrics for CATE estimators — measure how much CUMULATIVE incremental effect the top-k by tau-hat captures. NOT AUROC (which measures P(fraud|x) ranking). Qini uses a baseline of random treatment; positive Qini = uplift beats random.</em><br/><br/>Define.</>}
        options={[
          {key:"a", text:"Same as AUROC."},
          {key:"b", text:"AUUC (Area Under the Uplift Curve) and Qini coefficient are RANKING metrics for CATE estimators on RCT data (or properly weighted observational data). The uplift curve plots: x-axis = fraction of population treated (ranked descending by tau-hat); y-axis = cumulative incremental effect = (avg Y in treated top-k) - (avg Y in control top-k), scaled. AUUC is the area under this curve. Qini is AUUC minus the random-treatment baseline curve. Positive Qini means your CATE estimator ranks units better than random. These differ from AUROC (which ranks by P(Y=1|x)): a model with perfect AUROC can have zero Qini if treatment effect is uncorrelated with outcome probability. For fraud: a customer with high P(fraud) might have low tau (fraudster will succeed anyway despite review), and vice versa. Always evaluate uplift models with AUUC/Qini on held-out RCT data, not AUROC.", correct:true},
          {key:"c", text:"It's accuracy."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a) confuses risk and uplift; (c)(d) miss the curve.</>}
        lens={<>AUUC/Qini = cumulative-effect curve area. Different from AUROC.</>}
        stretch={<>What does a flat uplift curve mean?</>}
      />

      <VIS.TrapProblem id="up-p8" difficulty="medium" title="P8 — Calibration of CATE estimates."
        scenario={<><em>Discriminating insight: Calibration in CATE means tau-hat(x) ≈ tau(x) on average within bins of tau-hat. Use double-robust calibration plots (predicted vs IPW-corrected observed). Plain Platt/isotonic don't apply to CATE — they were designed for probabilities.</em><br/><br/>How.</>}
        options={[
          {key:"a", text:"Use Platt directly."},
          {key:"b", text:"CATE calibration requires its own tooling because Platt/isotonic were built for probabilities P(Y=1|x), not for treatment-effect estimates that can take negative values and are differences of two potential outcomes you never both observe. The standard approach: bin units by tau-hat(x) (e.g., deciles), and within each bin compute a DOUBLY-ROBUST estimate of the average treatment effect using outcome-model + IPW correction. Plot bin-mean predicted vs bin-mean observed. Good calibration: dots on y=x diagonal. Systematic over-estimation of tau-hat: dots fall below diagonal. Reference papers: Dorie et al. ACIC 2017 evaluations, Yadlowsky et al. 2021. Caveat: at extreme propensities (e(x) close to 0 or 1) the IPW correction has high variance — trim or stabilize.", correct:true},
          {key:"c", text:"CATE doesn't need calibration."},
          {key:"d", text:"Just use isotonic."},
        ]}
        trap={<>(a)(c)(d) miss the CATE-specific tooling.</>}
        lens={<>Bin by tau-hat, DR-correct within bin, check vs diagonal.</>}
        stretch={<>What's the variance of the IPW correction at e=0.05?</>}
      />

      <VIS.TrapProblem id="up-p9" difficulty="hard" title="P9 — Observational data has selection bias. Can you still fit T-learner?"
        scenario={<><em>Discriminating insight: Yes you can FIT, but tau-hat is biased without re-weighting because the treated and control populations have different x distributions. Fixes: IPW reweight by 1/e(x) for treated, 1/(1-e(x)) for control; or use X-learner which has built-in propensity-blending; or use DR meta-learner.</em><br/><br/>Bias control.</>}
        options={[
          {key:"a", text:"Just fit it, no problem."},
          {key:"b", text:"T-learner FITS on biased data without protest, but tau-hat(x) is biased unless you correct for the selection. The treated and control populations have different conditional distributions of x (the operational rule that decided who to review is correlated with x), so mu_1 and mu_0 are fit on different sub-populations. The bias appears as systematic over- or under-estimation of tau for x values that are rare in one arm. Fixes: (1) inverse-propensity reweight each training example — weight = 1/e(x) for treated, 1/(1-e(x)) for control. (2) Use X-learner — its final blending step uses propensity to mix arm-specific CATE models, partially correcting. (3) Use DR-Learner (Kennedy 2020) which combines outcome model and propensity in a Neyman-orthogonal score that is consistent if either nuisance is correct. (4) Best: collect RCT exploration data on a small fraction of traffic to validate.", correct:true},
          {key:"c", text:"Can't fit T-learner."},
          {key:"d", text:"Use random forest."},
        ]}
        trap={<>(a) ignores bias; (c)(d) wrong.</>}
        lens={<>Fit but reweight by propensity, or move to X / DR meta-learners.</>}
        stretch={<>When is RCT-on-1% the cleanest fix?</>}
      />

      <VIS.TrapProblem id="up-p10" difficulty="hard" title="P10 — A/B for uplift: how do you validate the model in production?"
        scenario={<><em>Discriminating insight: hold out a fraction of high-tau-hat users to randomize treatment, measure ATE within tau-hat deciles, compare to model predictions. The output is the uplift CURVE on holdout. Can't validate by 'fraud rate among reviewed' alone (that's risk, not uplift).</em><br/><br/>Validation.</>}
        options={[
          {key:"a", text:"Just measure fraud rate."},
          {key:"b", text:"You need an RCT slice for uplift validation. Carve out 5-10% of high-tau-hat candidates and randomize them 50/50 between treatment (review) and control (no review). For each tau-hat decile within this RCT slice, compute the EMPIRICAL average treatment effect: (avg Y in treated) - (avg Y in control). Plot these against the model's predicted tau-hat per decile. Ideal: monotonically increasing empirical effect across deciles, matching predicted. Compute the uplift curve and AUUC on the RCT data and compare to baselines (random treatment, P(fraud|x) ranking). Why not 'fraud rate among reviewed'? That measures P(fraud|x) ranking, not CATE — a model that's perfect at risk but worthless at uplift would still post low fraud-rate-among-reviewed because the high-risk are flagged. The RCT decomposes risk from uplift.", correct:true},
          {key:"c", text:"Use loss."},
          {key:"d", text:"Just AUROC."},
        ]}
        trap={<>(a)(c)(d) measure the wrong thing.</>}
        lens={<>RCT slice + per-decile empirical CATE vs predicted. Risk metrics insufficient.</>}
        stretch={<>How much RCT exposure does a 5% effect at 1% fraud rate need?</>}
      />

      <VIS.TrapProblem id="up-p11" difficulty="hard" title="P11 — Reviewer effect is heterogeneous: 3% catch rate for some, 30% for others. Does this break uplift?"
        scenario={<><em>Discriminating insight: this is treatment-effect heterogeneity in T itself. Solution: include reviewer ID (or reviewer-skill cluster) as a feature in x, so tau(x) becomes conditional on the reviewer assignment. Or fit per-reviewer-tier meta-learners. Otherwise tau-hat averages over reviewer skill.</em><br/><br/>Heterogeneity.</>}
        options={[
          {key:"a", text:"Ignore reviewer."},
          {key:"b", text:"Reviewer skill is a moderator of the treatment effect — a real complication. If 'review' means 'reviewer A reviewing' vs 'reviewer B reviewing' and their catch rates differ 10x, then tau is conditional on reviewer, not just on customer. Two options. (1) Include reviewer ID (or a reviewer-skill embedding) as part of x — then tau(x_customer, x_reviewer) is conditional on both, and you can rank customer-reviewer matchings. This is the principled fix. (2) Stratify the meta-learner — fit separate tau_high, tau_low for the high-skill and low-skill reviewer tiers. Simpler but loses granularity. Ignoring reviewer marginalizes tau over the empirical distribution of reviewer assignments, giving a number that depends on staffing mix at training time and breaks when staffing changes. Routing policy that matches customers to reviewers based on tau(x_cust, x_rev) is a strict generalization of pure customer-ranked uplift.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip uplift."},
        ]}
        trap={<>(a)(c)(d) miss the moderator.</>}
        lens={<>Reviewer is a moderator; include in x or stratify the learner.</>}
        stretch={<>What's the matching-policy generalization?</>}
      />

      <VIS.TrapProblem id="up-p12" difficulty="medium" title="P12 — Reviewer capacity is 200/day, candidate pool is 50K. Tau-hat ranks them. What policy is optimal?"
        scenario={<><em>Discriminating insight: when capacity is fixed and cost-per-review is constant, optimal is greedy top-K by tau-hat. Adds budget-constrained Lagrangian if cost varies. NOT 'all above threshold' (no cap) and NOT 'all above some P(fraud) cutoff' (wrong estimand).</em><br/><br/>Policy.</>}
        options={[
          {key:"a", text:"All above 0.5 risk."},
          {key:"b", text:"With fixed capacity K and uniform review cost, the optimal policy is greedy top-K by tau-hat(x): rank all candidates by predicted uplift, review the highest-K. This maximizes total expected incremental effect under the budget. Threshold-on-P(fraud) is wrong because it ranks by risk, not by incremental effect. Threshold-on-tau-hat (without K) doesn't respect capacity. Generalization: when review cost c(x) varies by case (e.g., document-heavy applications cost 3x), solve the budget-constrained problem max sum tau-hat(x_i) z_i s.t. sum c(x_i) z_i at most B; the LP relaxation gives the Lagrangian dual where you rank by tau-hat / c — a 'bang for the buck' rule. Implementation: precompute tau-hat overnight; at decision time, take the top of the queue until capacity is met; re-rank on staffing changes.", correct:true},
          {key:"c", text:"Random selection."},
          {key:"d", text:"All above 0.9 risk."},
        ]}
        trap={<>(a)(c)(d) miss capacity-constrained optimality.</>}
        lens={<>Greedy top-K by tau-hat under fixed capacity. Bang-for-buck under varying cost.</>}
        stretch={<>What if review cost is stochastic?</>}
      />

      <VIS.TrapProblem id="up-p13" difficulty="hard" title="P13 — S vs T vs X: pick the right learner given the data."
        scenario={<><em>Discriminating insight: S = when treatment effect is moderate to strong AND learner won't drop T. T = when both arms have abundant data AND we trust each model on its arm. X = when arms are imbalanced (one much smaller) OR when we want propensity-borrowing. Decision tree on data shape, not on novelty.</em><br/><br/>Match.</>}
        options={[
          {key:"a", text:"Always X."},
          {key:"b", text:"Match learner to data shape. (S) — use when treatment effect is moderate-strong AND your base learner is unlikely to drop T (linear regression with no L1 on T; gradient boosting where T is a feature with high gain). Cheap and simple. Avoid when T is weak signal relative to x. (T) — use when both arms have large balanced samples (say, 50/50 RCT with 100K+ each arm), the base learner is flexible (forest, GBM, neural net), and you don't expect propensity-weighting to help. Single biggest failure: when arms are unbalanced 95/5, the 5%-arm model has high variance. (X) — use when arms are unbalanced (one arm 10x smaller), or when you want propensity-weighting built in, or when treatment effect is small relative to outcome variance. X dominates T in unbalanced regimes per Künzel et al. (PNAS 2019). Modern default for fraud (where treated arm — reviewed cases — is often much smaller than untreated): X-learner or DR-learner.", correct:true},
          {key:"c", text:"Always S."},
          {key:"d", text:"Pick at random."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>S = simple, low signal-risk. T = balanced abundant. X = unbalanced or propensity-borrowing.</>}
        stretch={<>Where does R-learner fit?</>}
      />

      <VIS.TrapProblem id="up-p14" difficulty="hard" title="P14 — Concept-specific misattribution: tau-hat ≈ 0 everywhere. Why?"
        scenario={<><em>Discriminating insight (concept-specific): (1) S-learner bias-to-zero (learner ignored T); (2) overlap violation — propensity near 0 or 1 in regions; (3) effect is genuinely zero (action ineffective on the population); (4) IPW weights truncated too aggressively. Concept-specific causes, not generic 'model is broken'.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"Several concept-specific causes for tau-hat ≈ 0 everywhere. (1) S-learner bias-to-zero — the learner dropped T as a feature (no split selected it; L1 zeroed its coefficient). Diagnostic: feature importance / partial dependence on T. Fix: T-learner or X-learner, or force T into splits. (2) Overlap violation — propensity e(x) is near 0 or 1 for the population, meaning some customer types are never treated (or always treated). The CATE is non-identified in regions of no overlap; estimators return near-zero by default. Diagnostic: propensity histogram, trim regions with e in [0.05, 0.95]. (3) Genuine null effect — the action really does nothing on the studied population. Diagnostic: run an RCT slice and measure ATE empirically; if it's small, model is correct. (4) IPW weights aggressively truncated — clipping to [0.1, 10] removes the signal in the tails. Diagnostic: re-run without clipping and see if variance explodes (then refit with stabilization).", correct:true},
          {key:"c", text:"Use Platt."},
          {key:"d", text:"Increase batch size."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>S-bias / overlap / true null / over-clipped IPW. Each has a concept-specific diagnostic.</>}
        stretch={<>How would you tell case (1) from case (3)?</>}
      />

      <VIS.TrapProblem id="up-p15" difficulty="medium" title="P15 — DR-learner vs X-learner: which is the 2024 default?"
        scenario={<><em>Discriminating insight: DR-learner uses a doubly-robust pseudo-outcome (consistent if either outcome or propensity is correct) and a single second-stage regression. X-learner uses propensity blending. DR-learner is the modern default for unbiasedness; X-learner for low-data regimes where propensity is hard.</em><br/><br/>Pick.</>}
        options={[
          {key:"a", text:"X always wins."},
          {key:"b", text:"DR-learner (Kennedy 2020): construct a pseudo-outcome psi_i = (T_i - e(x_i)) / (e(x_i)(1-e(x_i))) (Y_i - mu_{T_i}(x_i)) + mu_1(x_i) - mu_0(x_i), then regress psi on x to get tau-hat. The pseudo-outcome is Neyman-orthogonal and the estimator is consistent for tau if EITHER outcome model mu OR propensity e is correctly specified — the doubly-robust property. X-learner uses propensity to BLEND two arm-specific CATE models without an explicit DR pseudo-outcome. DR-learner is the modern default in 2024-2025 because: (1) double robustness gives unbiasedness under one-of-two correctness; (2) cleaner asymptotic theory (rate of convergence, CIs); (3) single second-stage regression is easier to interpret. X-learner remains valuable when propensities are extreme (DR variance explodes) or when sample size is too small for stable IPW. EconML and CausalML implement both.", correct:true},
          {key:"c", text:"They're identical."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the trade-off.</>}
        lens={<>DR-learner = doubly-robust pseudo-outcome. X-learner = propensity-blended T-learner. DR is the modern default.</>}
        stretch={<>When does DR's variance explode and what fixes it?</>}
      />

      <VIS.TrapProblem id="up-p16" difficulty="hard" title="P16 — 'Just rank by P(fraud) — uplift is the same'. Refute."
        scenario={<><em>Discriminating insight: P(fraud) ranks by total outcome; tau ranks by INCREMENTAL outcome change from action. They coincide ONLY if treatment effect is monotone-increasing in P(fraud), which is rarely true (high-risk fraud rings often succeed despite review; mid-risk first-timers abandon under friction).</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Junior is right."},
          {key:"b", text:"P(fraud|x) and tau(x) are correlated but NOT identical — and the gap is where uplift earns its keep. P(fraud|x) is the outcome probability under the current operational regime. tau(x) is the CHANGE in outcome probability from applying the treatment. They coincide only if tau(x) is monotone in P(fraud|x) — equivalently, if reviewing helps proportionally more on higher-risk customers. In fraud this is often the opposite pattern: (a) the top-1% risk includes hardened fraud rings who will succeed regardless of review (high P, low tau); (b) the mid-risk band includes first-time fraudsters who abandon when friction is added (mid P, high tau); (c) some low-risk-by-feature actors with high tau exist (legitimate-looking fraud that review catches). Ranking by P misses (b) and (c), spending capacity on (a) where review is unhelpful. Empirically, the Künzel and KDD-2024 papers show uplift ranking dominates risk ranking by 15-40% in incremental catch at fixed capacity.", correct:true},
          {key:"c", text:"They're identical."},
          {key:"d", text:"Skip uplift."},
        ]}
        trap={<>(a)(c)(d) collapse.</>}
        lens={<>P and tau coincide only under monotone-in-P treatment effect. Rarely holds in fraud.</>}
        stretch={<>How would you produce the histogram showing the gap?</>}
      />

      <VIS.TrapProblem id="up-p17" difficulty="hard" title="P17 — Cross-fitting in X-learner: why is it needed?"
        scenario={<><em>Discriminating insight: imputing counterfactuals using a model fit on the same data that's then used to fit the second-stage tau model creates overfitting bias — the residuals are too small. Cross-fitting (Chernozhukov et al. 2018) splits the data into K folds and uses fold-out models for imputation, restoring asymptotic normality.</em><br/><br/>Mechanism.</>}
        options={[
          {key:"a", text:"Cross-fitting is optional."},
          {key:"b", text:"Cross-fitting is essential for valid inference. If you fit mu_0, mu_1 on the full data, then use those models to impute counterfactuals on the SAME data, the residuals D_i = Y_i - mu_0(x_i) are SYSTEMATICALLY too small (overfitting bias) — they shrink toward zero. The second-stage tau model is then biased toward zero, and standard errors are too small. Cross-fitting (Chernozhukov et al. 2018, Double Machine Learning): split data into K folds (typically K=2 or 5); fit mu_0, mu_1 on folds OTHER than fold k; impute counterfactuals on fold k using those out-of-fold models. Repeat for each k. The second-stage regression on the resulting psi values is asymptotically normal with sqrt(n) rate, valid CIs. Without cross-fitting, you forfeit the asymptotic theory. CausalML, EconML, DoubleML all default to cross-fitted estimators.", correct:true},
          {key:"c", text:"Cross-fitting hurts performance."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the overfitting-bias mechanism.</>}
        lens={<>Cross-fitting kills the overfitting bias in counterfactual imputation. Restores sqrt(n) inference.</>}
        stretch={<>K=2 vs K=5: bias-variance trade-off?</>}
      />

      <VIS.TrapProblem id="up-p18" difficulty="medium" multiSelect title="P18 — Decoys: which are NOT uplift methods? (3 correct)"
        scenario={<><em>Discriminating insight: separate uplift from risk and from non-causal methods. Calibration, focal loss, AUPRC are RISK-side, not uplift. Propensity score alone is not uplift (no outcome).</em><br/><br/>Pick NOT-uplift.</>}
        options={[
          {key:"a", text:"Platt calibration.", correct:true},
          {key:"b", text:"Focal loss.", correct:true},
          {key:"c", text:"AUPRC.", correct:true},
          {key:"d", text:"R-learner."},
          {key:"e", text:"Causal forest."},
        ]}
        trap={<>(a)(b)(c) are risk-side; (d)(e) ARE uplift methods.</>}
        lens={<>R-learner and causal forest are uplift; Platt/focal/AUPRC are risk-side.</>}
        stretch={<>Name two more uplift methods.</>}
      />

      <VIS.TrapProblem id="up-p19" difficulty="hard" title="P19 — Causal forest vs the meta-learners — where does it fit?"
        scenario={<><em>Discriminating insight: causal forest (Wager-Athey 2018) is a non-parametric CATE estimator using honest splits that maximize the heterogeneity in tau, not just outcome variance. NOT a meta-learner pattern; it's an end-to-end tree algorithm. Complementary to S/T/X.</em><br/><br/>Where it fits.</>}
        options={[
          {key:"a", text:"Same as T-learner."},
          {key:"b", text:"Causal forest (Wager and Athey, JASA 2018; grf R package) is a non-parametric CATE estimator that builds a tree ensemble using HONEST SPLITTING: split criterion is the variance of tau-hat across child nodes (heterogeneity in treatment effect), not just outcome variance. The honest splitting splits the sample into a 'split' subsample used to choose splits and an 'estimation' subsample used to compute tau-hat at the leaves — gives valid pointwise CIs. It's NOT a meta-learner pattern (no S/T/X wrapping); it's an end-to-end algorithm. Strengths: discovers heterogeneity automatically, gives asymptotically normal estimates with CIs at every x, handles high-dimensional x well. Weaknesses: less flexible than a deep network for image-like features; harder to incorporate domain priors. Fits alongside S/T/X as a fourth option, often the strongest for tabular fraud data.", correct:true},
          {key:"c", text:"Random forest with T as feature."},
          {key:"d", text:"Identical to S-learner."},
        ]}
        trap={<>(a)(c)(d) collapse.</>}
        lens={<>Causal forest: non-parametric CATE via heterogeneity-maximizing honest splits.</>}
        stretch={<>What's the difference vs DR-learner with random forest base?</>}
      />

      <VIS.TrapProblem id="up-p20" difficulty="hard" title="P20 — Concept-specific misattribution: high tau-hat variance across runs. Cause?"
        scenario={<><em>Discriminating insight (concept-specific): instability is the X-learner / DR-learner failure mode under small effective sample size in one arm — propensity-weighted estimates have variance ∝ 1/(e(x)(1-e(x))). Trim or stabilize propensity weights; or fall back to T-learner; or get more data on the small arm.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model converged badly."},
          {key:"b", text:"High run-to-run variance of tau-hat is the propensity-weighted-estimator failure mode. The variance of an X-learner or DR-learner estimate scales as 1/(e(x)(1-e(x))) at each x. When some x regions have e(x) near 0 or 1 (the rare-treatment / rare-control regions), weights blow up and a single unlucky example dominates the estimate. Diagnostics: (1) plot propensity distribution — heavy mass near 0 or 1 means trouble; (2) bootstrap tau-hat and check per-decile CIs — wide CIs mean weight variance is the cause. Fixes: (1) trim — restrict to x with e(x) in [0.05, 0.95]; (2) stabilize — multiply by overall treatment fraction (Hernán-Robins stabilized weights); (3) collect more data on the rare arm (RCT exploration). Falling back to T-learner removes the propensity dependence at the cost of accepting selection bias.", correct:true},
          {key:"c", text:"Lower learning rate."},
          {key:"d", text:"Use Platt."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Variance ∝ 1/(e(1-e)). Trim / stabilize / collect more rare-arm data.</>}
        stretch={<>What's the Hernán-Robins stabilized weight exactly?</>}
      />

      <VIS.TrapProblem id="up-p21" difficulty="medium" title="P21 — Negative tau: what does it mean operationally?"
        scenario={<><em>Discriminating insight: negative tau-hat(x) means the treatment HURTS this customer's outcome (e.g., reviewing increases fraud — perhaps via abandoned-purchase displacement). Real and common. Don't review the negative-tau queue — or actively avoid friction there.</em><br/><br/>Interpret.</>}
        options={[
          {key:"a", text:"Bug in code."},
          {key:"b", text:"Negative tau-hat(x) is meaningful and operationally actionable. It says the treatment INCREASES bad outcome for this customer type. In fraud, plausible mechanisms: (1) reviewing a legitimate-looking customer surfaces them to the fraudster as a target (low-prob but real); (2) friction (review hold) causes the LEGITIMATE customer to abandon, leaving only fraudsters to complete — increasing the post-review fraud rate; (3) reviewer error rate exceeds the catch rate for benign-looking customers. Operationally: do NOT review the negative-tau queue; consider an OPPOSITE action (frictionless approval) for that segment. A real KDD-2024 finding: 15-20% of customers have small-negative tau, and the operational gain from NOT reviewing them is comparable to the gain from reviewing the top-tau segment.", correct:true},
          {key:"c", text:"Always zero."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the operational meaning.</>}
        lens={<>Negative tau = treatment hurts. Don't review; consider opposite action.</>}
        stretch={<>How would you verify negative tau via a small RCT?</>}
      />

      <VIS.TrapProblem id="up-p22" difficulty="hard" title="P22 — Drift: tau-hat decays over time. Why?"
        scenario={<><em>Discriminating insight: tau depends on BOTH P(Y|x,T) AND on fraudster behavior. Distribution shift in either degrades tau-hat. Fix: rolling-window meta-learner refits; monitor tau-hat-vs-empirical-RCT-slice gap monthly; trigger retraining on excursion.</em><br/><br/>Drift response.</>}
        options={[
          {key:"a", text:"Tau doesn't drift."},
          {key:"b", text:"Tau-hat decays because both the outcome model and the treatment effect itself shift over time. (1) Covariate shift: the input distribution changes (new payment mix, new geo), so the mu_0, mu_1 models are extrapolating. (2) Concept drift in the outcome: P(Y|x, T) changes (fraudsters adapt to the review challenge — e.g., they learn to abandon less and supply better fake docs). (3) Treatment effect drift: the magnitude of tau itself shifts as the population's responsiveness to review changes. Monitoring: maintain a small ongoing RCT slice (1-5% of traffic randomized) so you have continuous unbiased ATE estimates by tau-hat decile; alert when the gap between predicted and observed exceeds tolerance. Retraining: roll the training window (last 90 days), refit S/T/X meta-learner, evaluate Qini on the RCT holdout, deploy on improvement. Don't retrain blindly — verify against the RCT.", correct:true},
          {key:"c", text:"Just retrain weekly."},
          {key:"d", text:"Use a bigger model."},
        ]}
        trap={<>(a) wrong; (c)(d) miss the diagnostic.</>}
        lens={<>Both nuisance and treatment-effect shift. Monitor RCT-slice gap; trigger retrain on excursion.</>}
        stretch={<>What's the smallest RCT slice that gives a usable per-decile CI?</>}
      />

      <VIS.TrapProblem id="up-p23" difficulty="hard" title="P23 — Senior: 'X-learner is just T-learner with propensity reweighting'. Diagnose."
        scenario={<><em>Discriminating insight: PARTIALLY true but misses the imputation step. X-learner doesn't reweight T-learner's predictions; it IMPUTES counterfactual residuals and fits a SECOND-stage tau model per arm, then blends those two CATE models by propensity. The second-stage refit is the substance.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Senior is right."},
          {key:"b", text:"Half-right. Yes, X-learner USES propensity in the final blend. But it's not 'T-learner + reweight'. The substance is the IMPUTATION + SECOND-STAGE REFIT. T-learner stops after mu_0, mu_1 and differences them. X-learner goes two steps further: (1) for each unit, IMPUTE the unobserved counterfactual using the OTHER-arm model (D_i^1 = Y_i - mu_0(x_i) for treated; D_i^0 = mu_1(x_i) - Y_i for control); (2) FIT new regressions tau_1(x), tau_0(x) on these imputed effects, by arm. Only then does step (3) blend them by propensity: tau-hat(x) = e(x) tau_0(x) + (1-e(x)) tau_1(x). The imputation + refit is what borrows strength across arms and reduces variance under imbalance. Pure T-learner reweighting (call it weighted-T) is a different, simpler estimator that doesn't include the second-stage CATE models. Künzel et al. (PNAS 2019) compare X to weighted-T directly; X wins under arm imbalance.", correct:true},
          {key:"c", text:"They're identical."},
          {key:"d", text:"Skip propensity entirely."},
        ]}
        trap={<>(a)(c)(d) miss the second-stage refit.</>}
        lens={<>X = T + impute + second-stage tau refit + propensity-blend. Not just reweighting.</>}
        stretch={<>What's the closed-form weighted-T estimator?</>}
      />

      <VIS.TrapProblem id="up-p24" difficulty="hard" title="P24 — In one sentence, what is THE unique mechanism of uplift meta-learners?"
        scenario={<><em>Discriminating insight: ESTIMATE THE PER-USER CATE tau(x) = E[Y(1) - Y(0) | x] via (S) single-model-with-T-as-feature, (T) two-models-differenced, or (X) impute-counterfactuals-then-refit-propensity-blended. Output is RANKING BY INCREMENTAL EFFECT of action, not by raw outcome probability. Strip "per-user", "treatment effect", or "incremental" and the answer collapses to risk scoring or propensity.</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"It's calibration."},
          {key:"b", text:"ESTIMATE THE PER-USER CONDITIONAL AVERAGE TREATMENT EFFECT tau(x) = E[Y(1) - Y(0) | X=x] using a META-LEARNER recipe: S-learner (one model mu(x, T) with treatment as a feature, tau-hat = mu(x,1) - mu(x,0)); T-learner (two separate models mu_0, mu_1 on each arm, differenced); X-learner (impute counterfactual residuals using the other-arm model, fit second-stage tau models per arm, propensity-blend). Output is a PER-USER ESTIMATE OF INCREMENTAL EFFECT of an action — used to RANK customers under capacity-constrained operations (e.g., manual review queue ordered by tau-hat, not by P(fraud)). Identifiability requires unconfoundedness + positivity; RCT data satisfies both trivially. Failure modes: S-learner bias-to-zero, T-learner variance under imbalance, X-learner variance under extreme propensity. Evaluation: AUUC / Qini on a held-out RCT slice.", correct:true},
          {key:"c", text:"It's propensity scoring."},
          {key:"d", text:"It's plain risk."},
        ]}
        trap={<>(a)(c)(d) miss the CATE estimand.</>}
        lens={<>Per-user CATE via S / T / X meta-learner recipes. Ranks by incremental effect of action.</>}
        stretch={<>Of the three, which would you default to in 2026 production?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/1706.03461" target="_blank" rel="noopener"><strong>Künzel, Sekhon, Bickel, Yu — Metalearners for estimating heterogeneous treatment effects</strong></a> <span style={{color:"#64748b", fontSize:14}}>(PNAS 2019, paper)</span><br/>The original S/T/X-learner paper. Sections 2-4 cover the recipes; simulation studies show when X dominates.</li>
        <li><a href="https://causalml.readthedocs.io/" target="_blank" rel="noopener"><strong>Uber CausalML — library docs + uplift modeling tutorial</strong></a> <span style={{color:"#64748b", fontSize:14}}>(docs)</span><br/>Practitioner-grade implementations of S/T/X/R/DR learners and causal forests with worked examples on marketing data; trivially adapts to fraud.</li>
        <li><a href="https://www.microsoft.com/en-us/research/project/econml/" target="_blank" rel="noopener"><strong>Microsoft EconML — econometric ML library</strong></a> <span style={{color:"#64748b", fontSize:14}}>(docs)</span><br/>DR-learner, DML, orthogonal random forests with valid inference. The 2024 production default. Pair with DoWhy for sensitivity analysis.</li>
        <li><a href="https://arxiv.org/abs/1510.04342" target="_blank" rel="noopener"><strong>Athey & Imbens — Recursive Partitioning for Heterogeneous Causal Effects</strong></a> <span style={{color:"#64748b", fontSize:14}}>(PNAS 2016, paper)</span><br/>Foundational causal-tree paper; precedes causal forest. Read for the honest-splitting idea.</li>
        <li><a href="https://matheusfacure.github.io/python-causality-handbook/" target="_blank" rel="noopener"><strong>Matheus Facure — Causal Inference for the Brave and True</strong></a> <span style={{color:"#64748b", fontSize:14}}>(book / blog)</span><br/>Best practitioner walk-through of CATE estimation in Python with code. Chapters 18-21 cover meta-learners directly.</li>
      </ul>
    </VIS.Section>
  </main>
);
