  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Uplift / S-learner / T-learner / X-learner — meta-learners that estimate per-customer
// treatment effects (e.g., review vs not), used when review capacity is the binding constraint.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Causal inference"
      title="Uplift modeling — S, T, and X-learners"
      subtitle="Meta-learners that estimate the per-customer incremental effect of an action (e.g., a manual fraud review) instead of just scoring fraud probability."
      byline={[
        {label: "Source", value: "Künzel et al. — X-learner (PNAS 2019); KDD 2024 — Counterfactual Fraud Reviews"},
        {label: "Year", value: "2019 / 2024"},
        {label: "L2", value: "Causal inference for fraud / risk"},
      ]}/>

    <VIS.TLDR>
      A risk score answers <em>how likely is this fraud?</em>{" "}
      <VIS.Term def="A modeling approach that estimates the change in outcome caused by an action (treatment) for each individual, rather than just predicting the outcome.">Uplift modeling</VIS.Term>{" "}
      answers a different and operationally more useful question: <em>how much does reviewing this customer change the outcome?</em> When manual-review capacity is the binding constraint, you want to spend it on the customers where review actually moves the needle, not the ones the system would catch anyway.{" "}
      <VIS.Term def="A single model fitted on the union of treated and control data, with treatment as one of the input features. Simplest meta-learner.">S-learner</VIS.Term>,{" "}
      <VIS.Term def="Two separate models — one fitted on treated, one fitted on control — and their predictions are differenced to estimate the per-customer treatment effect.">T-learner</VIS.Term>, and{" "}
      <VIS.Term def="A two-stage meta-learner that imputes counterfactuals on each arm, fits a second-stage model on the imputed effects, and reweights by propensity. Handles severe treatment-arm imbalance better than T-learner.">X-learner</VIS.Term>{" "}
      are three named recipes for that job, ordered roughly by sophistication and by robustness to treatment-arm imbalance.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Pose the problem as a{" "}
        <VIS.Term def="A formal causal-inference setup: for each unit, two outcomes exist — one under treatment, one under control — but only one is observed. The treatment effect is the difference, which must be estimated.">potential-outcomes</VIS.Term>{" "}
        problem. For each customer <code>i</code> with features <code>x_i</code> we want the{" "}
        <VIS.Term def="Conditional Average Treatment Effect — the expected change in outcome from applying the treatment, conditional on the unit's features.">CATE</VIS.Term>:
        the expected change in the fraud outcome if we review them versus if we do not. The three meta-learners are recipes to estimate this from observational or RCT-like data.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  D["Customers with features x"]
  D --> S["S-learner: one model with treatment as a feature"]
  D --> T["T-learner: two separate models, treated vs control"]
  D --> X["X-learner: impute counterfactuals then refit"]
  S --> C["CATE estimate per customer"]
  T --> C
  X --> C
  C --> R["Rank customers by CATE; review the top of the queue"]
  style C fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style R fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>Blue is the estimated per-customer effect. Yellow is the operational decision — the manual-review queue is ordered by uplift, not by risk score.</p>

      <p style={{marginTop: 16}}><strong>The three recipes, concretely:</strong></p>
      <ul>
        <li><strong>S-learner</strong> — fit one model <code>mu(x, t)</code> where the treatment indicator <code>t</code> is just another feature. CATE = <code>mu(x, 1) - mu(x, 0)</code>.</li>
        <li><strong>T-learner</strong> — fit two models, <code>mu_1(x)</code> on treated and <code>mu_0(x)</code> on control. CATE = <code>mu_1(x) - mu_0(x)</code>.</li>
        <li><strong>X-learner</strong> — fit T-learner first; then impute counterfactual outcomes for each arm, fit a second-stage model on the imputed effects, and blend the two using the{" "}
        <VIS.Term def="The probability that a unit was assigned to treatment given its features. Used in causal inference to reweight or stratify so treated and control populations are comparable.">propensity score</VIS.Term> <code>e(x)</code>.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from baseline risk scoring">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Risk score</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Uplift / CATE</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Quantity estimated</td>
            <td style={{padding:"8px 10px"}}>Probability of fraud</td>
            <td style={{padding:"8px 10px"}}>Change in outcome from the action</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Queue ordering</td>
            <td style={{padding:"8px 10px"}}>By predicted risk</td>
            <td style={{padding:"8px 10px"}}>By predicted incremental catch</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Cost-aware?</td>
            <td style={{padding:"8px 10px"}}>No — uses fixed threshold</td>
            <td style={{padding:"8px 10px"}}>Yes — naturally tied to review cost</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Data requirement</td>
            <td style={{padding:"8px 10px"}}>Labeled outcomes</td>
            <td style={{padding:"8px 10px"}}>Outcomes plus treatment assignment</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Best when treatment arms balanced</td>
            <td style={{padding:"8px 10px"}}>Not relevant</td>
            <td style={{padding:"8px 10px"}}>T-learner fine; X-learner needed when one arm is small</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Manual review capacity is the binding constraint</strong> — every reviewed customer crowds out another, so you want to pick those where review most changes outcomes.</li>
        <li><strong>You have a treatment-assignment record</strong> — either an existing RCT (random review assignment) or strong unconfoundedness via{" "}
        <VIS.Term def="An assumption that, conditional on observed features, the treatment assignment is independent of the potential outcomes. Required for valid causal inference from observational data.">unconfoundedness</VIS.Term>{" "}plus a propensity model.</li>
        <li><strong>Use S-learner</strong> if you want a quick baseline and the treatment effect is small relative to outcome variation.</li>
        <li><strong>Use T-learner</strong> if treated and control arms are roughly balanced and large.</li>
        <li><strong>Use X-learner</strong> if one arm is much smaller than the other (typical in fraud, where only a small fraction of customers are reviewed).</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="No RCT, no causal claim (without extra work)">
        Uplift on purely observational data requires unconfoundedness — every variable that affects both treatment and outcome must be in your features. In fraud this is almost never literally true; reviewers pick risky-looking cases, so treatment is correlated with unobservables. The fix is either a real RCT (random review for a small slice) or a carefully argued doubly-robust setup.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Treatment-arm imbalance kills T-learner">
        If only 5 percent of customers are reviewed, the treated-arm model is trained on 20 times less data than the control-arm model. Its predictions are noisier, and the difference <code>mu_1 minus mu_0</code> inherits that noise. X-learner is the principled fix.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Evaluation is harder than for risk scores">
        You cannot just compute AUC on a held-out set — the right metric is the{" "}
        <VIS.Term def="Qini curve / Qini coefficient — measures incremental outcome lift as you treat the top-ranked fraction of the population, used to evaluate uplift models.">Qini curve</VIS.Term>{" "}
        or uplift-by-decile. Many teams ship a uplift model with no real eval and discover later it is no better than the existing risk score.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Cost: expensive to run end-to-end">
        Uplift modeling is more analysis-engineering than ML. The pipeline involves treatment-assignment logging, propensity modeling, multiple model trainings, and uplift-aware evaluation. Treat it as a quarterly investment, not a sprint.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Trap problems on when uplift is the right framing, meta-learner choice under imbalance, evaluation, and the unconfoundedness assumption.
      </p>

      <VIS.TrapProblem
        id="up-p1"
        difficulty="hard"
        title="P1 — Review queue is at capacity. Risk score or uplift?"
        scenario={<>Your manual fraud-review team has a fixed capacity of 5,000 cases per day. The current system ranks customers by predicted fraud probability and sends the top 5,000. Leadership asks whether to switch to uplift. The data team has 6 months of historical reviewed-vs-not records plus outcomes. What is the right framing?</>}
        options={[
          {key:"a", text:"Uplift is the right framing. The constraint is review capacity, so the goal is incremental catch per review (treatment effect), not total fraud probability. Many high-risk customers self-resolve or are caught downstream; reviewing them adds no incremental catch. Customers in the middle band where review actually changes outcomes are the ones you want at the top of the queue.", correct:true},
          {key:"b", text:"Stick with risk score; uplift is academic."},
          {key:"c", text:"Use both — show the operator two columns."},
          {key:"d", text:"Just raise the capacity to 10,000."},
        ]}
        trap={<>(b) ignores the capacity constraint that motivates uplift. (c) confuses the operator with no clear policy. (d) is a cost answer, not a modeling answer.</>}
        lens={<>(a) is the textbook uplift motivation. When you cannot review everyone, rank by incremental impact of review, not by raw risk.</>}
        stretch={<>What single metric would tell you that the uplift switch is paying off in week 1?</>}
      />

      <VIS.TrapProblem
        id="up-p2"
        difficulty="hard"
        title="P2 — Only 5 percent of customers were ever reviewed. S, T, or X-learner?"
        scenario={<>You have outcomes for 50M customers; 2.5M (5 percent) were reviewed (treated), 47.5M were not. Both arms have rich features. Which meta-learner is the senior default?</>}
        options={[
          {key:"a", text:"X-learner. With one arm 20x smaller than the other, T-learner's treated-arm model is trained on 20x less data and is much noisier. X-learner's two-stage imputation borrows strength across arms and reweights by propensity, which is exactly the case the method was designed for.", correct:true},
          {key:"b", text:"T-learner — simplest split, two clean models."},
          {key:"c", text:"S-learner — one model handles imbalance automatically."},
          {key:"d", text:"Forget meta-learners, just train a causal forest."},
        ]}
        trap={<>(b) is the textbook recipe but ignores the 20x arm imbalance. (c) S-learner is a fine baseline but often shrinks the treatment effect when treatment is a weak feature. (d) Causal forest is a fine alternative but is not what the question asks.</>}
        lens={<>(a) X-learner is specifically motivated by treatment-arm imbalance — the dominant case in fraud-review settings.</>}
        stretch={<>If both arms were 25M (balanced), would you still prefer X-learner over T-learner?</>}
      />

      <VIS.TrapProblem
        id="up-p3"
        difficulty="hard"
        title="P3 — S-learner predicts the same CATE for everyone. Why?"
        scenario={<>You fit an S-learner with treatment indicator as a feature. On held-out data, predicted CATE is roughly constant across customers — about 0.02 for everyone. The team is suspicious. What is the most likely cause?</>}
        options={[
          {key:"a", text:"The base learner (often a tree ensemble) regularized the treatment feature toward zero importance because it shares mass with correlated features. S-learner is known to shrink the treatment effect when treatment is a weak signal compared to outcome-predictive features. Switch to T-learner or X-learner so treatment is not in competition with stronger features.", correct:true},
          {key:"b", text:"The CATE is genuinely homogeneous — accept it."},
          {key:"c", text:"You forgot to scale features."},
          {key:"d", text:"The bug is in your evaluation set."},
        ]}
        trap={<>(b) is plausible-sounding but premature. (c) (d) are unrelated.</>}
        lens={<>(a) is the canonical S-learner failure mode. When the treatment is a relatively weak feature, tree ensembles deprioritize it and CATE collapses. T-learner or X-learner separates the arms structurally and avoids the issue.</>}
        stretch={<>Could you fix S-learner by manually upweighting the treatment feature?</>}
      />

      <VIS.TrapProblem
        id="up-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Unconfoundedness — which arguments are valid evidence?"
        scenario={<>You have observational data: which customers were reviewed was decided by an operator using the old risk score plus their judgment. You want to argue unconfoundedness so the uplift model is causally valid. Which of the following are valid lines of argument? Select all that apply.</>}
        options={[
          {key:"a", text:"The old risk score is logged and included as a feature, so the main driver of treatment selection is observed and conditioned on.", correct:true},
          {key:"b", text:"You have a small random-review holdout (10,000 cases per month) that you can use to validate the observational estimates against an RCT-style benchmark.", correct:true},
          {key:"c", text:"Treatment was assigned uniformly at random by policy, so unconfoundedness holds by construction."},
          {key:"d", text:"You collected the operator's notes and engineered features that proxy the qualitative judgments they used.", correct:true},
          {key:"e", text:"Confounding will not bias CATE because the model is non-linear."},
          {key:"f", text:"You ran a sensitivity analysis (Rosenbaum bounds) and the conclusions are stable up to a treatment-odds-ratio shift of 2x.", correct:true},
        ]}
        trap={<>(c) contradicts the scenario (operators used judgment, not random assignment). (e) is wrong — model flexibility does not address confounding.</>}
        lens={<>(a), (b), (d), (f) are all defensible. (b) is the strongest single argument; (f) is the strongest robustness check; (a) and (d) are the structural arguments.</>}
        stretch={<>If you had to pick ONE of these to bring to a leadership review, which is most persuasive?</>}
      />

      <VIS.TrapProblem
        id="up-p5"
        difficulty="hard"
        title="P5 — Evaluation: AUC, Qini, or something else?"
        scenario={<>You finish training an X-learner uplift model. Your team computes its AUC on held-out outcomes and reports it as 0.78. What is wrong with this evaluation, and what should you do instead?</>}
        options={[
          {key:"a", text:"AUC measures ranking on the outcome (fraud probability), not on the treatment effect. An uplift model can have great AUC and zero uplift if it just recovers the risk score. The right evaluation is the Qini curve (or uplift-by-decile lift chart): rank by predicted CATE, compute incremental outcomes per decile against a random or risk-score baseline, and report Qini coefficient or area-under-Qini.", correct:true},
          {key:"b", text:"AUC of 0.78 is fine — ship it."},
          {key:"c", text:"Use precision-recall instead of AUC."},
          {key:"d", text:"Re-run the model with a different seed."},
        ]}
        trap={<>(b) is the lazy answer. (c) PR-AUC is the same category error — still about outcome ranking, not CATE ranking. (d) does not address the metric problem.</>}
        lens={<>(a) is the standard uplift evaluation. Qini is the AUC-equivalent for uplift; uplift-by-decile is the operational read.</>}
        stretch={<>What does a Qini curve below the random baseline mean?</>}
      />

      <VIS.TrapProblem
        id="up-p6"
        difficulty="hard"
        multiSelect
        title="P6 — Negative uplift customers — what do you do?"
        scenario={<>Your trained uplift model flags 8 percent of customers as having NEGATIVE predicted CATE — reviewing them is predicted to increase fraud loss. The team is confused. What is going on, and what actions are reasonable? Select all that apply.</>}
        options={[
          {key:"a", text:"Negative CATE is a real and common phenomenon — reviewing a low-risk loyal customer can flag and freeze legitimate transactions, causing the customer to abandon and the lost behavioral signal hurts the model on subsequent transactions.", correct:true},
          {key:"b", text:"These customers should be explicitly de-prioritized in the review queue; never review a customer with strongly negative predicted CATE.", correct:true},
          {key:"c", text:"Negative CATE must be a bug — set those values to zero."},
          {key:"d", text:"Use the magnitude of negative CATE as a customer-protection signal: surface positive-customer-experience interventions instead.", correct:true},
          {key:"e", text:"Train a calibration model on the negative-CATE subset and clip predictions."},
          {key:"f", text:"Investigate via subgroup analysis whether negative CATE concentrates in specific segments (high-spend loyal, new high-value) — that is a feature, not a bug.", correct:true},
        ]}
        trap={<>(c) treats real signal as noise. (e) calibration does not fix what is genuinely there.</>}
        lens={<>(a), (b), (d), (f) reflect a senior read. Negative CATE is informative; act on it rather than zero it out.</>}
        stretch={<>What confidence interval would you require on a negative CATE before acting on it?</>}
      />

      <VIS.TrapProblem
        id="up-p7"
        difficulty="hard"
        title="P7 — Propensity score is near 0 or 1 for many customers. What breaks?"
        scenario={<>Your propensity model says many customers had a propensity to be reviewed of either below 0.02 or above 0.98. X-learner uses propensities to reweight. What goes wrong and how do you fix it?</>}
        options={[
          {key:"a", text:"Extreme propensities mean those customers have essentially no overlap between treatment arms — for some segments, no one was reviewed; for others, everyone was. The reweighting term <code>1 over e or 1 over (1 minus e)</code> blows up and the CATE estimate has enormous variance there. Fix: clip propensities to a band (say 0.05 to 0.95) and explicitly mark out-of-overlap regions as untrustworthy; do not deploy predictions on them.", correct:true},
          {key:"b", text:"Ignore the propensities and use unweighted X-learner."},
          {key:"c", text:"Throw away those customers entirely."},
          {key:"d", text:"Increase model regularization."},
        ]}
        trap={<>(b) defeats X-learner's purpose. (c) loses signal. (d) does not address the overlap problem.</>}
        lens={<>(a) is the standard overlap-handling recipe. Clip propensities and identify regions with no support — predictions there are not trustworthy.</>}
        stretch={<>How would you detect at deployment time that a customer is in an out-of-overlap region?</>}
      />

      <VIS.TrapProblem
        id="up-p8"
        difficulty="hard"
        title="P8 — Random review holdout — how big does it need to be?"
        scenario={<>Leadership approves a small RCT-style random-review holdout to validate uplift. You currently process 1M decisions per day. What is the right size of the random slice?</>}
        options={[
          {key:"a", text:"Roughly 1 to 3 percent (10k to 30k per day) is the senior default. Big enough to detect moderate uplift differences within a quarter, small enough to not blow review-team capacity. Compute it via a power calculation: target effect size (incremental catch rate you care about), desired precision, and expected variance; then check the cost-vs-precision tradeoff. Iterate as the model matures.", correct:true},
          {key:"b", text:"100 cases per day is enough."},
          {key:"c", text:"50 percent — the cleaner the RCT, the better."},
          {key:"d", text:"Holdouts do not work in production; skip."},
        ]}
        trap={<>(b) is statistically anemic. (c) wastes capacity and revenue. (d) is just wrong.</>}
        lens={<>(a) is the senior cadence. A 1 to 3 percent random slice is enough for validation while preserving operational throughput.</>}
        stretch={<>What is the minimum detectable effect you can hope to measure with a 1 percent holdout?</>}
      />

      <VIS.TrapProblem
        id="up-p9"
        difficulty="hard"
        title="P9 — Uplift model is performing worse than risk score by Qini. Triage."
        scenario={<>You ship the X-learner uplift model into production. After 4 weeks, Qini-versus-baseline is negative — the risk score is beating it. Triage.</>}
        options={[
          {key:"a", text:"Check in order: (1) unconfoundedness violations (operator behavior shifted post-launch), (2) propensity overlap region (deployment may be scoring out-of-distribution customers), (3) treated-arm sample size by segment (cold-start segments may be too thin), (4) the second-stage X-learner regressor (high variance under small treated arm), (5) the Qini computation itself (wrong baseline?). Roll back to risk score while debugging.", correct:true},
          {key:"b", text:"Keep the uplift model running — eventually it will improve."},
          {key:"c", text:"Increase the X-learner's regularization strength."},
          {key:"d", text:"Switch to S-learner immediately."},
        ]}
        trap={<>(b) leaves money on the table. (c) is a knob without diagnosis. (d) randomly picks a different recipe without root cause.</>}
        lens={<>(a) is the senior triage. Roll back, investigate the chain, fix root cause, redeploy.</>}
        stretch={<>Which of the five checks is fastest and gives the most signal?</>}
      />

      <VIS.TrapProblem
        id="up-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Production design — pick the ingredients for an uplift-driven review queue"
        scenario={<>You ship uplift in production for a top-3 payment processor. Pick the ingredients. Select all that apply.</>}
        options={[
          {key:"a", text:"X-learner with random-review holdout (1 to 2 percent) for ongoing validation.", correct:true},
          {key:"b", text:"Propensity-overlap monitoring at scoring time; flag and route out-of-overlap customers to a fallback policy.", correct:true},
          {key:"c", text:"Qini-curve dashboard refreshed weekly with the random-review slice as ground truth.", correct:true},
          {key:"d", text:"Replace the existing risk score entirely with predicted CATE (no fallback)."},
          {key:"e", text:"Cost-aware ranking: rank by predicted CATE divided by expected review cost when reviews vary in cost.", correct:true},
          {key:"f", text:"Threshold-randomization to defeat probing of the uplift policy.", correct:true},
          {key:"g", text:"Re-train weekly with no rollback path."},
        ]}
        trap={<>(d) breaks cold-start and out-of-overlap regions. (g) is reckless without rollback.</>}
        lens={<>(a) (b) (c) (e) (f) form a defensible production stack. The keepers are: validation via random slice, overlap monitoring, Qini dashboarding, cost-awareness, and anti-probing.</>}
        stretch={<>What single metric in week 1 tells you the new uplift policy is paying off?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1706.03461" target="_blank" rel="noopener">
            <strong>Künzel, Sekhon, Bickel, Yu — Meta-learners for Estimating Heterogeneous Treatment Effects (X-learner)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, PNAS 2019)</span>
          <br/>The X-learner paper. Section 4 is the cleanest written motivation for treatment-arm imbalance — required reading.
        </li>
        <li>
          <a href="https://matheusfacure.github.io/python-causality-handbook/landing-page.html" target="_blank" rel="noopener">
            <strong>Matheus Facure — Causal Inference for the Brave and True</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(open-source book / blog)</span>
          <br/>The friendliest practitioner introduction. The meta-learners chapter walks S, T, X with code; the propensity-overlap chapter is gold for the gotchas.
        </li>
        <li>
          <a href="https://econml.azurewebsites.net/" target="_blank" rel="noopener">
            <strong>Microsoft EconML — Python library for heterogeneous treatment effects</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(library docs)</span>
          <br/>Production-grade implementations of S, T, X, DR, DML, and causal forests. The docs double as a tour of the space.
        </li>
        <li>
          <a href="https://causalml.readthedocs.io/" target="_blank" rel="noopener">
            <strong>Uber CausalML — Uplift modeling library</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(library docs)</span>
          <br/>The Uber library with Qini curves and uplift trees built in. The Qini visualization defaults are the right defaults for fraud-review queues.
        </li>
        <li>
          <a href="https://www.uplift-modeling.com/en/latest/" target="_blank" rel="noopener">
            <strong>scikit-uplift — Python uplift toolkit</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(docs, examples)</span>
          <br/>Lightweight toolkit. The tutorial on Qini coefficient interpretation is the best short reference for "is my uplift model actually working?"
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
