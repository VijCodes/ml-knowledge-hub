<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Step-up auth policy via contextual bandit — adaptively choose challenge level
// (no challenge / SMS / biometric / security question) based on risk signal + friction cost.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Adaptive auth"
      title="Step-up auth policy via contextual bandit"
      subtitle="Replace static risk thresholds with a contextual bandit that picks the challenge (none / SMS / biometric / security Q) per session, balancing ATO catch against user-friction cost."
      byline={[
        {label: "Source", value: "Contextual Bandits for Adaptive Step-up Auth, RecSys 2024 Industry"},
        {label: "Year", value: "2024"},
        {label: "L3", value: "Account takeover (ATO)"},
      ]}/>

    <VIS.TLDR>
      A static rule ("if risk score above 0.7, challenge with SMS") over-friction the long tail of legitimate users while still missing some attackers. A{" "}
      <VIS.Term def="A reinforcement-learning setup where each step the agent sees a context vector (user, session, risk signals), picks one of several actions (challenge levels), and observes a reward (caught fraud minus friction cost). It learns a context-conditional policy.">contextual bandit</VIS.Term>{" "}
      learns a context-conditional policy. The senior question is not "is RL better than rules" — it's "how do you explore in a security setting where one wrong 'no challenge' is a real ATO, and how do you handle the reward that arrives weeks late via chargeback?"
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Each login session produces a context vector: user history, behavioral biometrics score, device + IP risk, transaction-context features. The bandit's actions are a small discrete set: <code>no_challenge</code>, <code>sms_otp</code>, <code>biometric_re_auth</code>, <code>security_question</code>, <code>hard_block</code>. The reward combines (i) ATO loss avoided minus (ii) friction cost in user abandonment + support load. The bandit learns which action minimizes expected cost in each context.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  CTX["Session context"]
  POL["Bandit policy"]
  ACT["Action: none / SMS / biometric / Q / block"]
  OUT["Session outcome"]
  REW["Reward: ATO avoided minus friction"]
  CTX --> POL
  POL --> ACT
  ACT --> OUT
  OUT --> REW
  REW --> POL
  style POL fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style REW fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the learned policy that picks an action given context. Yellow = the reward signal that closes the loop. The feedback path is the hard part: ATO outcomes can take days or weeks to surface via chargebacks, while friction outcomes (user gave up, contacted support) surface in seconds.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Static threshold</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Risk score plus rules</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Contextual bandit</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Adapts to per-user context</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Coarsely</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Balances friction vs catch directly</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Manual tuning</td>
            <td style={{padding:"8px 10px"}}>Yes (reward function)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Cold-start on new users</td>
            <td style={{padding:"8px 10px"}}>Easy (always challenge)</td>
            <td style={{padding:"8px 10px"}}>Easy</td>
            <td style={{padding:"8px 10px"}}>Hard — needs exploration policy</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Audit trail</td>
            <td style={{padding:"8px 10px"}}>Trivial</td>
            <td style={{padding:"8px 10px"}}>Easy</td>
            <td style={{padding:"8px 10px"}}>Requires logged policy + counterfactual eval</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Exploration cost</td>
            <td style={{padding:"8px 10px"}}>None</td>
            <td style={{padding:"8px 10px"}}>None</td>
            <td style={{padding:"8px 10px"}}>Real (wrong action sometimes)</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>You have a mature risk-scoring stack already</strong> — bandit consumes its output; bandit is not a replacement for the scoring model.</li>
        <li><strong>The friction cost is meaningful and measurable</strong> — abandonment rates, support tickets, NPS. Without measurable friction the reward function is one-sided.</li>
        <li><strong>You can tolerate exploration cost</strong> — bandit will occasionally take the "wrong" action by design. In security, this is a real expected cost.</li>
        <li><strong>You're willing to invest in counterfactual policy evaluation</strong> — IPS / doubly-robust estimators on logged data. Naive A-B alone won't give a clean read.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Delayed reward: chargebacks lag weeks">
        Friction signals arrive in seconds (abandonment, support ticket). ATO confirmation arrives in days-to-weeks via chargeback. Naive bandit updates over-weight the immediate friction signal and under-react to delayed ATO losses. Need a delayed-reward-aware update rule.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Exploration in security has real cost">
        Epsilon-greedy with epsilon=0.1 on a "no_challenge" action is a real 10% ATO leakage on contexts where the policy might have picked SMS. Constrain exploration to actions that are SAFE in the context (e.g., never explore weakening below the rule baseline).
      </VIS.Callout>
      <VIS.Callout kind="warn" title="GDPR Art. 22: solely automated decisions">
        EU users have a right not to be subject to solely automated decisions with legal/significant effects. A bandit auto-blocking accounts likely qualifies. Constrain the action space in EU to non-block actions, and ensure a human-or-multi-factor downstream step exists for block recommendations.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade traps on bandit setup, reward design, exploration safety, counterfactual eval, and end-to-end deployment.
      </p>

      <VIS.TrapProblem
        id="cba-p1"
        difficulty="hard"
        title="P1 — Bandit picked no_challenge on a high-risk session that became ATO. Diagnose."
        scenario={<>The bandit picked <code>no_challenge</code> on a session whose downstream risk score was 0.82. Two weeks later the account chargebacks $4,000 in fraud. Tech lead says "fire the bandit, go back to rules." What's the real diagnosis?</>}
        options={[
          {key:"a", text:"The bandit's training data is dominated by low-risk no_challenge sessions (the bulk of traffic), so it has under-explored the no_challenge action in high-risk contexts. Combined with delayed chargeback reward, the policy hasn't yet learned that no_challenge is wrong here. Fix: constrain exploration so no_challenge is never chosen above a hard risk-score threshold (safety constraint), AND credit delayed chargebacks to the bandit's update via a chargeback-attribution job.", correct:true},
          {key:"b", text:"Bandit is wrong by design; only rules work for auth."},
          {key:"c", text:"Increase exploration epsilon to 0.3."},
          {key:"d", text:"Add 100x more training data."},
        ]}
        trap={<>(b) is the rules-purist overreaction. (c) makes the problem WORSE — more exploration = more ATO leakage. (d) ignores the structural delayed-reward issue; more data doesn't fix the credit-assignment problem.</>}
        lens={<>(a). Two senior moves: SAFETY CONSTRAINTS that cap the bandit's action space in dangerous contexts ("no_challenge is not available when risk_score above 0.7"), AND a delayed-reward attribution pipeline that credits chargebacks back to the session that should have been challenged. The bandit becomes constrained optimization within a safe envelope, not free exploration.</>}
        stretch={<>How do you decide the safety threshold for "no_challenge is not available"?</>}
      />

      <VIS.TrapProblem
        id="cba-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Reward function design"
        scenario={<>You're designing the bandit's reward. Three signals available: (i) was this session ATO? (chargeback, days later), (ii) did the user abandon at the challenge? (immediate), (iii) did the user open a support ticket? (hours later). Which choices are right?</>}
        options={[
          {key:"a", text:"Combine all three into a weighted reward with weights set by business cost: ATO chargeback dollars, abandonment lifetime-value loss, support ticket cost.", correct:true},
          {key:"b", text:"Use only chargeback as reward — the only signal that matters."},
          {key:"c", text:"Use only abandonment — immediate feedback is the strongest learning signal."},
          {key:"d", text:"Treat the three on different time scales: immediate friction updates flow into the bandit fast; chargeback updates require a delayed-reward attribution pipeline that re-credits sessions weeks later.", correct:true},
          {key:"e", text:"Make weights configurable so finance/fraud-ops can tune trade-off without retraining the model.", correct:true},
        ]}
        trap={<>(b) ignores friction — bandit will over-challenge. (c) ignores ATO — bandit will under-challenge. The trap is picking ONE signal in a multi-cost domain.</>}
        lens={<>Three correct. <strong>(a)</strong> weighted reward with business-grounded weights. <strong>(d)</strong> respect the time-scale gap with delayed attribution. <strong>(e)</strong> separate model from policy — weights are policy levers operations should tune as costs change. Senior signal: rewards are designed, not discovered.</>}
        stretch={<>How do you protect the bandit from a brief weight-misconfiguration that suddenly devalues ATO?</>}
      />

      <VIS.TrapProblem
        id="cba-p3"
        difficulty="hard"
        title="P3 — Counterfactual policy evaluation"
        scenario={<>You want to compare a new bandit policy to the current one without an A/B test. You have logged data from the current policy: contexts, actions, rewards. What's the right evaluation method?</>}
        options={[
          {key:"a", text:"Inverse propensity scoring (IPS) on the logged data: estimate the new policy's value as a re-weighted average of logged rewards where the weight is the ratio of new-policy action-prob to logging-policy action-prob. Add a doubly-robust estimator to reduce variance and handle propensity misspecification.", correct:true},
          {key:"b", text:"Replay the new policy on the logged contexts — its picked actions are its evaluation."},
          {key:"c", text:"Train a reward model and use it as the simulator."},
          {key:"d", text:"You cannot evaluate without A/B; ship behind a small holdout."},
        ]}
        trap={<>(b) is the naive replay — counterfactual rewards are unobserved if the new policy picks an action the logging policy didn't. (c) creates a model-of-a-model that compounds errors. (d) gives up the offline option entirely.</>}
        lens={<>(a). Counterfactual policy evaluation is the standard tool. IPS gives an unbiased estimator under the assumption you know the logging propensities (you should — they're logged). Doubly-robust combines IPS with a learned reward model to reduce variance. Both are core RecSys + bandit literature (Dudik, Bottou, et al.).</>}
        stretch={<>What's the variance pathology of pure IPS that doubly-robust fixes?</>}
      />

      <VIS.TrapProblem
        id="cba-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Exploration policy in security"
        scenario={<>The textbook bandit uses epsilon-greedy or Thompson sampling. In auth, exploration costs are real. Which exploration designs are appropriate?</>}
        options={[
          {key:"a", text:"Constrain exploration to action subsets that are SAFE in each context — never explore no_challenge in high-risk contexts; explore only between sms_otp and biometric_re_auth above the safety threshold.", correct:true},
          {key:"b", text:"Use Thompson sampling instead of epsilon-greedy — better sample efficiency and the exploration is automatically context-aware.", correct:true},
          {key:"c", text:"Use 1% epsilon-greedy globally — exploration is cheap at small epsilon."},
          {key:"d", text:"Schedule exploration during low-traffic windows (3am-5am) to limit user impact.", correct:true},
          {key:"e", text:"Never explore on a flagged-high-risk user; rely on offline counterfactual eval for those.", correct:true},
        ]}
        trap={<>(c) treats exploration as cost-symmetric across contexts. The cost of exploring "no_challenge" on a high-risk session is orders of magnitude bigger than exploring "biometric" on a low-risk one. Global epsilon = uniform stupidity.</>}
        lens={<>Four correct. <strong>(a)</strong> context-aware safe-action sets. <strong>(b)</strong> Thompson sampling for better posterior-informed exploration. <strong>(d)</strong> temporal limiting. <strong>(e)</strong> offline-only learning for the riskiest segment. Together: a constrained-exploration regime that respects the cost structure of auth.</>}
        stretch={<>What changes about (e) if you have a high-recall fraud-detection model running in parallel?</>}
      />

      <VIS.TrapProblem
        id="cba-p5"
        difficulty="medium"
        title="P5 — Cold start on a new user"
        scenario={<>A user registers and logs in for the first time. The bandit has no per-user history. How should the policy behave?</>}
        options={[
          {key:"a", text:"Fall back to a population-level prior policy specifically trained for the no-history context. Add a 'first-login' feature to the context vector so the bandit learns this regime explicitly. As history accumulates, the bandit's posterior tightens.", correct:true},
          {key:"b", text:"Always challenge first-time users with the strictest action."},
          {key:"c", text:"Always let first-time users through with no_challenge — they have no fraud history."},
          {key:"d", text:"Random action — exploration is what cold-start is for."},
        ]}
        trap={<>(b) over-friction the (large) honest first-time population. (c) gives free ATO. (d) is "exploration" with no safety constraint — a P1 + P4 violation.</>}
        lens={<>(a). The general principle: cold-start is a distinct context, not the absence of context. Feature-engineer it explicitly. Use a population prior tuned for that regime. The bandit naturally transitions to per-user as history accumulates.</>}
        stretch={<>How many sessions of per-user history does it typically take for per-user posterior to dominate the population prior?</>}
      />

      <VIS.TrapProblem
        id="cba-p6"
        difficulty="hard"
        title="P6 — Delayed reward attribution pipeline"
        scenario={<>Chargebacks arrive 3-21 days after the session that should have been challenged. You need to credit the chargeback back to the bandit's update for that session. How?</>}
        options={[
          {key:"a", text:"Log every bandit decision with the session_id and the propensity of the chosen action. Maintain a chargeback-attribution job that maps each new chargeback to the session_id that triggered it, looks up the bandit decision, computes an immediate-and-final reward (combining friction signal already observed + the chargeback cost now), and feeds it to the offline batch retraining job.", correct:true},
          {key:"b", text:"Discard sessions older than 24h; only train on immediate-feedback sessions."},
          {key:"c", text:"Approximate the chargeback rate per context and use it as a learned reward; skip the attribution."},
          {key:"d", text:"Wait until all chargebacks have settled before any update — set retraining cadence to monthly."},
        ]}
        trap={<>(b) throws away the ATO signal — pure friction-only learning. (c) creates a reward-model-of-a-model with no ground truth. (d) freezes the model in stale state for a month; under attacker drift this is fatal.</>}
        lens={<>(a). The attribution job is the production discipline. Sessions are logged with everything needed to credit late rewards (action, propensity, context). The retraining job consumes a join of session-log and chargeback-stream. This is the standard pattern at large risk platforms.</>}
        stretch={<>What chargeback dispute / reversal scenario could create double-counting? How do you prevent it?</>}
      />

      <VIS.TrapProblem
        id="cba-p7"
        difficulty="hard"
        title="P7 — A/B test design for bandit vs rules"
        scenario={<>You want to A/B the bandit against the existing rules system. What's the right experiment design?</>}
        options={[
          {key:"a", text:"Stratified hash-based split (e.g., 90% rules / 10% bandit), powered for the delayed chargeback metric not the immediate friction metric. Run for long enough to observe the chargeback-attribution window (at least 30-45 days for credit). Pre-register the primary metric (e.g., total expected cost = chargeback dollars + abandonment dollars). Watch a guardrail: bandit-side ATO rate must not exceed rules-side ATO rate by more than X bps.", correct:true},
          {key:"b", text:"Run 50/50 for 7 days, declare winner by friction rate."},
          {key:"c", text:"A/B by random user hash but only on weekdays."},
          {key:"d", text:"Compare offline counterfactual estimates only; no need for A/B."},
        ]}
        trap={<>(b) too short to see chargebacks; wrong primary metric. (c) systematic time bias. (d) abandoning real A/B verification of a high-stakes policy change.</>}
        lens={<>(a). The senior experimental design respects (i) the time horizon of the slowest signal, (ii) a primary metric grounded in business cost, and (iii) a guardrail to bound regression risk. Pre-registration prevents post-hoc cherry-picking.</>}
        stretch={<>If you can't run 45 days, what's the second-best design?</>}
      />

      <VIS.TrapProblem
        id="cba-p8"
        difficulty="medium"
        title="P8 — Adversarial drift in attacker behavior"
        scenario={<>Attackers learn that no_challenge is more likely on low-velocity, high-account-age sessions. They game the bandit's context by aging a stolen account for 30 days before draining it. What's the right response?</>}
        options={[
          {key:"a", text:"Treat this as expected adversarial co-evolution. Add adversary-resistant features to the context (link-graph signals, device-vs-account-history mismatch, sudden behavioral change vs per-user baseline) that are harder to game than account age alone. Retrain. Monitor for further attacker adaptation.", correct:true},
          {key:"b", text:"Drop the bandit; rules are non-gamable."},
          {key:"c", text:"Increase challenge level globally to compensate."},
          {key:"d", text:"Add a hard rule: any account that was idle for 30 days then drained gets blocked."},
        ]}
        trap={<>(b) is wrong — rules are MORE gamable (they're public via attacker reverse-engineering). (c) over-friction the legitimate population. (d) is a one-off patch that doesn't address the general adversarial-drift problem.</>}
        lens={<>(a). Adversarial drift is the normal operating condition. The bandit's policy isn't broken — its INPUT SPACE was incomplete. Adding orthogonal features that are harder to game is the structural fix. This loop will repeat; the design needs to support continuous feature-engineering + retraining.</>}
        stretch={<>Which class of features is hardest for the attacker to manipulate at scale?</>}
      />

      <VIS.TrapProblem
        id="cba-p9"
        difficulty="hard"
        multiSelect
        title="P9 — Bandit auto-blocks an EU user. Compliance fallout."
        scenario={<>The bandit takes the <code>hard_block</code> action on an EU user. The user complains; the supervisory authority asks for documentation. Which issues apply?</>}
        options={[
          {key:"a", text:"GDPR Article 22 — the user has a right not to be subject to solely automated decisions with significant effects. A bandit-driven hard-block is solely automated.", correct:true},
          {key:"b", text:"You need to be able to document the specific reason the action was taken — the bandit's policy output alone is not a sufficient explanation.", correct:true},
          {key:"c", text:"The action space available to the bandit in EU regions should not include hard_block; a human-or-multi-factor step must intervene before a block is final.", correct:true},
          {key:"d", text:"The bandit is fine in EU as long as the model is trained on consented data."},
          {key:"e", text:"GDPR doesn't apply to fraud-prevention decisions."},
        ]}
        trap={<>(d) and (e) misread GDPR — consent on training data doesn't bypass Art. 22 on automated decisions, and there's no blanket fraud-prevention exemption from Art. 22.</>}
        lens={<>Three correct. <strong>(a)</strong> Art. 22 squarely applies. <strong>(b)</strong> the right to explanation means the bandit's policy must be auditable / interpretable. <strong>(c)</strong> the action space in EU is constrained — block is downstream of a human-or-multi-factor step, not a bandit terminal action. This is the standard EU posture for adaptive auth.</>}
        stretch={<>Which bandit-model class (linear LinUCB vs neural) is easier to defend under the right-to-explanation?</>}
      />

      <VIS.TrapProblem
        id="cba-p10"
        difficulty="hard"
        title="P10 — End-to-end pick for a digital-first bank"
        scenario={<>Digital-first bank, 10M MAU, 80M logins/month, mix of US + EU. ATO loss baseline $30M/yr under rules. Friction baseline: 8% of users who hit a challenge abandon. Pick the architecture for an adaptive step-up policy.</>}
        options={[
          {key:"a", text:"Contextual bandit (Thompson sampling) consuming the risk-score + behavioral biometric + device + session features as context. Action space: no_challenge, sms_otp, biometric_re_auth, security_question, queue-for-review (NOT hard_block as a terminal). Safety constraints: no_challenge unavailable above risk-score threshold; in EU, queue-for-review handled by analyst. Reward: weighted combination of chargeback dollars (delayed, via attribution job), abandonment dollars (immediate), support-ticket cost (hours). Offline evaluation: IPS + doubly-robust on logged data before any policy rollout. A/B: 90/10 stratified, 45-day window, pre-registered primary = total expected cost, guardrail on ATO rate. Continuous retraining weekly; full re-train monthly. Audit: full decision log with propensities for explainability + EU Art. 22 compliance.", correct:true},
          {key:"b", text:"Deep RL with hard-block as a terminal action available globally."},
          {key:"c", text:"Static rules tuned by fraud-ops weekly."},
          {key:"d", text:"Bandit with epsilon-greedy 0.1 exploration on the full action space."},
        ]}
        trap={<>(b) takes on EU Art. 22 risk for marginal gain over a constrained-bandit design. (c) is the status quo — leaves cost on the table. (d) uniformly-aggressive exploration is exactly what P1 + P4 warn against.</>}
        lens={<>(a). The complete senior architecture: constrained Thompson-sampling bandit with safety action-space, business-cost reward, delayed-attribution pipeline, counterfactual offline eval, disciplined A/B with right metric + window + guardrail, EU compliance baked into the action space, full decision auditability. This is what survives security + compliance + product review at a digital-first bank.</>}
        stretch={<>What single guardrail metric should pause the bandit (kill switch) and roll back to rules?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
