<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Visual phishing detection via screenshot similarity — Fraud SOTA · Phishing (page layer).
// CONCEPT ANCHOR (B3): RENDER the suspect URL in a HEADLESS BROWSER to capture
// a SCREENSHOT (an IMAGE — pixels), then compute a PERCEPTUAL HASH or a CNN /
// CLIP IMAGE EMBEDDING and COMPARE to a TEMPLATE BANK of legit-brand screenshots
// (PayPal login, BoA login, Microsoft 365 login, ...). High similarity to a
// brand template + URL not in that brand's registered-domain allowlist =
// PHISHING via visual impersonation. NOT a URL-string model (URLNet). NOT an
// email-body model (LLM email scoring). The PIXEL-SIMILARITY of RENDERED PAGE
// to BRAND TEMPLATES is the unique mechanism.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Phishing detection (page layer)"
      title="Visual phishing via screenshot similarity — render the page, embed the pixels, compare to brand templates"
      subtitle="The phishing kit copies the LOOK of the legit brand page: logo, layout, color, fonts, form structure. Lexical URL analysis (URLNet) catches obvious string patterns but misses benign-looking domains that host visual clones. Visual phishing detection RENDERS the suspect URL in a headless browser, captures the SCREENSHOT, computes a perceptual hash or CNN/CLIP embedding, and compares against a TEMPLATE BANK of legitimate-brand login pages. High similarity to a brand template plus URL not on that brand's allowlist = visual phishing."
      byline={[
        {label:"Papers", value:"Phishpedia (USENIX 2021) — logo detection + screenshot similarity. VisualPhishNet (CCS 2020) — siamese CNN on screenshots. Phish-Intention / PhishCLIP (2023+) — CLIP zero-shot brand recognition."},
        {label:"L3", value:"Headless render → screenshot → image embedding (perceptual hash / Siamese CNN / CLIP) → nearest-neighbor against brand-template bank. Allowlist of legitimate registered domains per brand. Mismatch = phishing."},
        {label:"Anchor", value:"PIXEL similarity of RENDERED screenshot to brand templates. NOT URL string. NOT email body. NOT logo OCR alone."},
      ]}/>

    <VIS.TLDR>
      Phishing kits visually clone brand login pages. A URL like
      &quot;login-helper-tools.com&quot; passes lexical URL detectors but renders a
      pixel-perfect PayPal login page. Visual phishing detection closes this
      gap. The pipeline:{" "}
      <VIS.Term def="Headless browser: a browser (Chromium / Firefox) that renders pages without showing a UI window. Used here to fetch the suspect URL, execute JavaScript, apply CSS, and produce the final rendered DOM as a screenshot — the exact same pixels a human victim would see.">render the URL in a headless browser</VIS.Term>{" "}
      to capture the SCREENSHOT (the same pixels a victim would see); compute a{" "}
      <VIS.Term def="Perceptual hash (pHash, dHash): a fixed-size hash of an image designed so that visually-similar images produce similar hashes (low Hamming distance), unlike a cryptographic hash (which changes drastically on any pixel change). Fast nearest-neighbor over millions of images.">perceptual hash</VIS.Term>{" "}
      or a CNN /{" "}
      <VIS.Term def="CLIP (Contrastive Language-Image Pretraining): OpenAI's image+text encoder trained to map images and captions into a shared embedding space. PhishCLIP uses the image encoder to embed screenshots and the text encoder to embed brand-name prompts (a login page for PayPal) for zero-shot brand recognition.">CLIP image embedding</VIS.Term>;
      nearest-neighbor against a TEMPLATE BANK of legit-brand login screenshots
      (PayPal, BoA, Microsoft, Office 365, Apple ID, Google, ...); if the
      nearest brand template scores above a similarity threshold AND the URL&apos;s
      registered domain is NOT on that brand&apos;s allowlist, flag as VISUAL
      PHISHING. NOT a URL-string model (URLNet — different layer, catches
      lexical patterns; misses benign-string visual clones). NOT an email-body
      LLM (LLM email scoring — different layer; reasons over text not pixels).
      NOT logo-OCR alone (which catches the logo image but misses layout and
      form mimicry). Catches the entire class of phishing where the URL is
      lexically clean but the rendered page is a visual impostor.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — render, embed, retrieve against brand templates">
      <p>
        A phishing kit operator wants to harvest credentials. They register a
        cheap domain (often lexically innocent — login-helper-tools.com,
        secure-mail-app.net) and stand up a page that COPIES the look of the
        target brand&apos;s login page: same logo, same color palette, same form
        layout, same fonts, same supporting text. They send the URL via SMS or
        email; the victim clicks, sees a familiar-looking login, types
        credentials, the kit POSTs them to the attacker.
      </p>
      <p>
        URL-string analysis (URLNet, URLTransformer) sees a clean string and
        passes the URL. Blocklists have never seen this brand-new domain and
        pass it. The signal that does exist is in the PIXELS — the rendered
        page is visually nearly identical to the legitimate brand. Visual
        phishing detection extracts that signal.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  U["Suspect URL"]
  U --> R["Headless browser render"]
  R --> S["Screenshot of full page"]
  S --> E["Image embedding pHash or CNN or CLIP"]
  E --> N["Nearest neighbor search"]
  TB1["Brand template bank PayPal BoA MS Apple"]
  TB1 --> N
  N --> M["Most similar brand match"]
  M --> A["Allowlist check is URL registered domain owned by brand"]
  A -->|No| P["Flag visual phishing"]
  A -->|Yes| B["Pass legit brand page"]
  style E fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style N fill:#dbeafe,stroke:#2563eb,stroke-width:2px
      `} />
      <p>Red: image embedding of the rendered screenshot. Blue: nearest-neighbor search against the brand template bank. The allowlist check distinguishes legit brand pages from impostors.</p>

      <p style={{marginTop:16}}>
        <strong>Why pixel similarity is the right signal for this layer.</strong>{" "}
        The attacker&apos;s GOAL is to convince a human victim that the page is
        the legitimate brand login. Whatever evasion the attacker does at the
        URL or email-content layer, the FINAL RENDERED PAGE must look enough
        like the brand to fool the victim — otherwise the kit doesn&apos;t work.
        So the rendered-page representation contains the irreducible signal of
        visual impersonation. Comparing it to a curated bank of brand templates
        catches the impersonation regardless of URL string, regardless of email
        body, regardless of hosting infrastructure.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Visual phishing vs related approaches">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Visual phishing (screenshot)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>URLNet / URLTransformer</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>LLM email-content scoring</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Logo OCR alone</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Input modality</td><td style={{padding:"6px 10px"}}>Rendered screenshot (pixels)</td><td style={{padding:"6px 10px"}}>URL string</td><td style={{padding:"6px 10px"}}>Email body + headers</td><td style={{padding:"6px 10px"}}>Extracted logo image only</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Catches visual clone on benign URL</td><td style={{padding:"6px 10px"}}>YES</td><td style={{padding:"6px 10px"}}>NO</td><td style={{padding:"6px 10px"}}>NO</td><td style={{padding:"6px 10px"}}>Partial (logo-only)</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Catches logo-replaced phishing (no logo)</td><td style={{padding:"6px 10px"}}>YES (layout signal)</td><td style={{padding:"6px 10px"}}>Partial (URL)</td><td style={{padding:"6px 10px"}}>YES (text)</td><td style={{padding:"6px 10px"}}>NO</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Cost per URL</td><td style={{padding:"6px 10px"}}>Seconds (render + embed)</td><td style={{padding:"6px 10px"}}>Sub-millisecond</td><td style={{padding:"6px 10px"}}>100ms - 2s</td><td style={{padding:"6px 10px"}}>Tens of ms</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Zero-day reach</td><td style={{padding:"6px 10px"}}>YES if brand-clone visual</td><td style={{padding:"6px 10px"}}>YES via learned URL patterns</td><td style={{padding:"6px 10px"}}>YES via reasoning</td><td style={{padding:"6px 10px"}}>YES if logo present</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Misses</td><td style={{padding:"6px 10px"}}>API-exfil flows that render benign content</td><td style={{padding:"6px 10px"}}>Benign-string URLs hosting clones</td><td style={{padding:"6px 10px"}}>Non-email channels</td><td style={{padding:"6px 10px"}}>Logo-removed or layout-only clones</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 23 trap problems">
      <p style={{color:"#475569", marginBottom:16}}>Every problem turns on RENDERING THE PAGE + IMAGE EMBEDDING + NEAREST-NEIGHBOR AGAINST BRAND TEMPLATES + ALLOWLIST CHECK. Strip the render and you have URL-string analysis; strip the brand template bank and you have generic anomaly detection on screenshots; strip the allowlist check and you flag every legit brand page as phishing.</p>

      <VIS.TrapProblem id="vp-p1" difficulty="hard" title="P1 — VP Risk: 'We already have URLNet. Why pay for headless rendering?'"
        scenario={<><em>Discriminating insight: URLNet sees only the URL string and misses the entire class of attacks where the URL is lexically clean but the rendered page is a visual brand impostor (login-helper-tools.com hosting a PayPal clone). Visual phishing closes this gap by examining what the victim actually sees.</em><br/><br/>Pitch.</>}
        options={[
          {key:"a", text:"URLNet is enough."},
          {key:"b", text:"URLNet / URLTransformer scores the URL STRING. It is blind to the rendered page. The class of phishing it MISSES is the one where the URL is lexically innocent (no homoglyph, no brand-suffix trick, no IP-as-host, no suspicious TLD) but the rendered page is a pixel-perfect clone of a brand login. Examples: login-helper-tools.com, secure-mail-app.net, my-account-portal.co. Attackers favor these because (a) they slip past URL classifiers; (b) they look credible enough to humans (no obvious red flag in the address bar); (c) registration costs are low (cheap TLDs or .com via fast-flux registrars). Visual phishing detection RENDERS the suspect URL in a headless browser, captures the SCREENSHOT, and compares pixel-similarity against a TEMPLATE BANK of legitimate brand login pages (PayPal, BoA, Microsoft 365, Apple ID, Google, ...). If the rendered page is visually within similarity threshold of the PayPal template AND the URL&apos;s registered domain is NOT on PayPal&apos;s allowlist, the page is a visual impostor. This catches the brand-clone-on-clean-URL class entirely, regardless of the URL string. COST: seconds per URL (vs sub-millisecond for URLNet) — so deploy as a SECOND-LAYER analyzer on URLs that pass URLNet but fall in a high-stakes context (banking email, sender unknown). The two layers are COMPLEMENTARY: URLNet cheap-and-narrow on URL string; visual phishing expensive-and-broad on the rendered page.", correct:true},
          {key:"c", text:"They are equivalent."},
          {key:"d", text:"Skip phishing detection."},
        ]}
        trap={<>(a)(c)(d) miss the URL-string-blind class of attacks.</>}
        lens={<>URLNet sees only the string. Visual phishing sees what the victim sees. Catches brand-clone-on-clean-URL. Layer as second-stage.</>}
        stretch={<>What share of phishing has a benign-string URL?</>}
      />

      <VIS.TrapProblem id="vp-p2" difficulty="hard" title="P2 — State the visual phishing recipe."
        scenario={<><em>Discriminating insight: headless render → screenshot → image embedding (pHash / Siamese CNN / CLIP) → nearest-neighbor against brand template bank → allowlist check on registered domain. Flag if high similarity AND URL not in brand allowlist.</em><br/><br/>State.</>}
        options={[
          {key:"a", text:"Just take a screenshot."},
          {key:"b", text:"FIVE-STEP RECIPE. (1) HEADLESS RENDER: launch Chromium / Firefox in headless mode; fetch the suspect URL; let JavaScript execute and the page fully load (DOMContentLoaded + a network-idle timeout, typically 3-5 seconds); capture a full-page or above-the-fold screenshot at a fixed viewport (e.g., 1280x800). Handle redirects (follow chain to final URL). Sandboxed environment to prevent malicious payloads from affecting the scanner. (2) IMAGE EMBEDDING. Three common choices. (a) PERCEPTUAL HASH (pHash, dHash): fixed-size hash where similar images have low Hamming distance. Fast (microseconds), small (64-256 bits), but coarse — sensitive to layout shifts. (b) SIAMESE CNN (VisualPhishNet, Phishpedia&apos;s detector): a ResNet-style CNN trained with a contrastive loss so brand-page screenshots cluster by brand. Produces a dense embedding (256-512 dim). (c) CLIP image encoder (PhishCLIP, Phish-Intention): zero-shot brand recognition via the OpenAI CLIP image encoder; embeddings work across thousands of brands without per-brand training. Most flexible. (3) BRAND TEMPLATE BANK: curated set of LEGITIMATE login-page screenshots per brand (often 5-20 templates per brand to cover variants: desktop / mobile, English / localized, before / after redesigns); each template embedded with the same encoder. (4) NEAREST-NEIGHBOR: vector-search the screenshot embedding against the template bank; retrieve top-K matches with similarity scores. (5) ALLOWLIST CHECK + DECISION: extract the registered domain (via Public Suffix List) of the suspect URL; cross-check against the matched brand&apos;s registered-domain allowlist (e.g., PayPal owns paypal.com, paypal.me, paypal-prepaid.com). If matched brand is X AND registered domain is not in X&apos;s allowlist AND similarity is above threshold → VISUAL PHISHING ALERT. If registered domain is in X&apos;s allowlist → legit brand page. (6) TRAINING: brand template bank maintained by a curation pipeline (weekly refresh per brand to keep up with redesigns).", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use a blocklist."},
        ]}
        trap={<>(a)(c)(d) miss the five steps.</>}
        lens={<>Render → embed → nearest-neighbor against brand templates → allowlist check on registered domain.</>}
        stretch={<>How is the template bank curated and refreshed?</>}
      />

      <VIS.TrapProblem id="vp-p3" difficulty="hard" title="P3 — Why does the ALLOWLIST CHECK matter?"
        scenario={<><em>Discriminating insight: without the allowlist check, visiting the REAL paypal.com would flag as phishing because its screenshot matches the PayPal template. The allowlist check distinguishes legit-brand-on-brand-domain from clone-of-brand-on-NON-brand-domain.</em><br/><br/>Allowlist.</>}
        options={[
          {key:"a", text:"Allowlist is optional."},
          {key:"b", text:"WITHOUT THE ALLOWLIST CHECK, every legit visit to paypal.com flags as phishing — the screenshot of the real PayPal login matches the PayPal template by definition (it IS the template, or very close to it). The allowlist distinguishes &quot;visually a PayPal page AND served from a PayPal-owned domain (legit)&quot; from &quot;visually a PayPal page AND served from NOT-PayPal-owned domain (phishing)&quot;. (1) ALLOWLIST CONSTRUCTION per brand: enumerate all REGISTERED DOMAINS owned by the brand. For PayPal: paypal.com, paypal.me, paypal-prepaid.com, paypalobjects.com, plus localized TLDs (paypal.co.uk, paypal.de). Source: brand security team registers official allowlist; or maintained by phishing-defense vendor (Phishpedia, Microsoft Defender) with brand cooperation. (2) REGISTERED DOMAIN EXTRACTION: use Public Suffix List (PSL) to extract the registered domain from any URL. login.accounts.paypal.com → paypal.com (in allowlist → legit). login.accounts.paypal-helper.tk → paypal-helper.tk (NOT in allowlist → phishing if visual match is PayPal). (3) FAILURE WITHOUT ALLOWLIST: model fires on every legit brand visit; alert volume overwhelms reviewers; false-positive rate destroys product. (4) FAILURE WITH POORLY-MAINTAINED ALLOWLIST: legit brand uses a NEW domain (acquired brand, marketing campaign URL) not yet in allowlist → false positive; or attacker registers a typosquat that the brand later acquires — temporary mis-flag. Fix: weekly allowlist refresh + automated detection of brand-owned new registrations. (5) ADVERSARIAL CONSIDERATION: attacker cannot easily get on the allowlist (controlled by brand / vendor); the allowlist is the trust anchor of the whole system. (6) ALTERNATIVES if no allowlist: PUBLIC-SUFFIX-only heuristics (only flag if URL is on a cheap TLD) — much weaker.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip allowlist."},
        ]}
        trap={<>(a)(c)(d) miss the allowlist as trust anchor.</>}
        lens={<>Allowlist distinguishes legit-brand-on-brand-domain from clone-of-brand-on-NON-brand-domain. Maintained per-brand via PSL extraction.</>}
        stretch={<>What does the brand allowlist look like in practice?</>}
      />

      <VIS.TrapProblem id="vp-p4" difficulty="hard" multiSelect title="P4 — Pick TRUE statements about visual phishing detection (4 correct)"
        scenario={<><em>Discriminating insight: renders the suspect URL; embeds the screenshot; compares to brand templates; checks brand allowlist. NOT a URL-string model; NOT an email-body LLM.</em><br/><br/>Pick TRUE.</>}
        options={[
          {key:"a", text:"Renders the suspect URL in a headless browser to capture a screenshot.", correct:true},
          {key:"b", text:"Compares the screenshot embedding to a TEMPLATE BANK of legit-brand login pages.", correct:true},
          {key:"c", text:"Requires a per-brand ALLOWLIST of registered domains to distinguish legit from impostor.", correct:true},
          {key:"d", text:"Catches benign-string URLs hosting visual brand clones.", correct:true},
          {key:"e", text:"Operates on the URL string at character granularity (no rendering)."},
          {key:"f", text:"Prompts an LLM with the email body to reason about phishing."},
        ]}
        trap={<>(e) is URLNet; (f) is LLM email scoring.</>}
        lens={<>Render → embed → brand template match → allowlist check. Catches benign-string clones. NOT URL-string; NOT email LLM.</>}
        stretch={<>How big is a typical brand template bank?</>}
      />

      <VIS.TrapProblem id="vp-p5" difficulty="medium" title="P5 — Distinguish from URLNet."
        scenario={<><em>Discriminating insight: URLNet operates on URL string only (sub-ms); visual phishing renders the page (seconds). Different layers, different costs, different failure modes. URLNet catches lexical phishing patterns; visual phishing catches visual brand clones on benign-string URLs.</em><br/><br/>Distinguish.</>}
        options={[
          {key:"a", text:"Same model."},
          {key:"b", text:"DIFFERENT LAYERS, DIFFERENT INPUTS, DIFFERENT COSTS, COMPLEMENTARY. URLNet / URLTransformer operates on the URL STRING — character-level CNN or Transformer over a sequence of characters; learns lexical patterns of phishing-URL construction (homoglyph paypa1.com, brand-suffix paypal.security-update.tk, IP-as-host, hex hosts, IDN abuse). Sub-millisecond per URL. Catches: lexically-suspicious URLs. Misses: benign-string URLs (login-helper-tools.com) hosting visual brand clones. Visual phishing detection operates on the RENDERED SCREENSHOT — fetch URL in headless browser, capture pixels, embed, compare to brand templates. Seconds per URL. Catches: any URL whose rendered page visually impersonates a brand, regardless of URL string. Misses: phishing flows that POST credentials via API without rendering a clone page; phishing URLs that show benign content but exfiltrate via JavaScript. PRODUCTION LAYERING. (1) URLNet at ingest (cheap, broad): score every URL in SMS/email/browser; block / quarantine high-score. (2) Visual phishing as second layer: render only URLs that pass URLNet but match high-stakes criteria (banking-related sender, financial keyword in email, unknown registration, redirect from known-good brand). (3) Together they cover both LEXICAL and VISUAL impersonation. ATTACKER COST: must register a domain whose URL string PASSES URLNet AND whose rendered page does NOT VISUALLY match a known brand. Far harder than either alone.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Same thing."},
        ]}
        trap={<>(a)(c)(d) collapse the two layers.</>}
        lens={<>URLNet: URL string, sub-ms. Visual: screenshot, seconds. URLNet misses benign-string visual clones; visual catches them.</>}
        stretch={<>How does production layer the two?</>}
      />

      <VIS.TrapProblem id="vp-p6" difficulty="medium" title="P6 — Distinguish from LLM email-content scoring."
        scenario={<><em>Discriminating insight: LLM scores the EMAIL CONTENT (text); visual phishing scores the RENDERED PAGE (pixels). Different inputs, complementary signals. LLM catches email-only social engineering; visual catches the landing-page clone.</em><br/><br/>Distinguish.</>}
        options={[
          {key:"a", text:"Same model."},
          {key:"b", text:"DIFFERENT INPUTS, DIFFERENT SIGNALS, COMPLEMENTARY. LLM email-content scoring takes the FULL EMAIL (subject, body, sender display name, headers, embedded URLs) and prompts an LLM to reason about phishing-signal: urgency language (act-within-24-hours), sender-domain spoof, impersonation tone, URL-claim mismatch. The signal is TEXT SEMANTICS. Visual phishing detection takes the RENDERED PAGE (pixels) after the user clicks the URL. The signal is VISUAL IMPERSONATION of a brand. CASES. (1) Email with benign body + URL leading to brand clone: LLM may pass it (body looks normal — e.g., a generic invoice reminder); visual phishing catches the clone on click. (2) Email with strong impersonation tone (urgent! click now!) but no URL: LLM flags; visual phishing has nothing to score. (3) Email with impersonation tone AND clone URL: both flag; meta-classifier consensus is high. COMBINE. LLM scores the email at SMTP ingest; visual phishing scores the landing page on URL extract or user-click; fuse the two scores via a meta-classifier alongside URLNet, sender reputation, and recipient cohort. ATTACKER COST: must produce an email whose body reads as benign to an LLM AND whose landing page does not visually clone a known brand. Significantly harder than either alone.", correct:true},
          {key:"c", text:"Same architecture."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) collapse text vs pixels.</>}
        lens={<>LLM: text semantics of email. Visual: pixels of rendered page. Complementary; fuse via meta-classifier.</>}
        stretch={<>What does the meta-classifier consume?</>}
      />

      <VIS.TrapProblem id="vp-p7" difficulty="hard" title="P7 — Three image-embedding choices: pHash vs Siamese CNN vs CLIP — trade-offs?"
        scenario={<><em>Discriminating insight: pHash = fast/small, sensitive to layout shifts. Siamese CNN = trained per brand, accurate but needs brand-specific training. CLIP = zero-shot across brands, larger model, more compute. Pick by brand coverage need + compute budget.</em><br/><br/>Embedding.</>}
        options={[
          {key:"a", text:"All identical."},
          {key:"b", text:"THREE EMBEDDING CHOICES, EACH WITH TRADE-OFFS. (1) PERCEPTUAL HASH (pHash, dHash, aHash) — fixed-size hash where similar images have low Hamming distance. PROS: microsecond computation, 64-256 bit footprint, no training. CONS: SENSITIVE TO LAYOUT SHIFTS — same brand page rendered at different viewport size, with a different ad, or with localized text produces a different hash; high false-negative rate. Useful as a fast PRE-FILTER (cheap exact-clone catch) before a more expensive embedding. (2) SIAMESE CNN (VisualPhishNet, Phishpedia&apos;s detector) — ResNet / VGG backbone trained with contrastive loss on (same-brand-page, same-brand-page) positives and (different-brand) negatives. Produces 256-512 dim dense embedding. PROS: robust to layout shifts, accurate within trained brand set. CONS: requires brand-specific training data (hundreds of screenshots per brand); does not generalize to new brands without retraining; per-brand maintenance burden. (3) CLIP IMAGE ENCODER (PhishCLIP, Phish-Intention) — OpenAI CLIP pretrained on 400M image-text pairs; image encoder produces 512-768 dim embedding. PROS: ZERO-SHOT generalization to new brands (compare screenshot to brand-name text prompt or to a single brand reference image); no per-brand training; covers thousands of brands. CONS: larger model (200M+ params), more inference cost; coarser brand discrimination than a brand-specific Siamese CNN; CLIP may be fooled by generic-looking login pages. (4) PRODUCTION STACK: pHash as fast pre-filter (catches exact-clone phishing kits); CLIP as broad zero-shot detector covering long-tail brands; Siamese CNN as high-precision detector for the top-50 brands; fused via meta-classifier.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the trade-offs.</>}
        lens={<>pHash: fast pre-filter, layout-brittle. Siamese: per-brand-trained, accurate, narrow. CLIP: zero-shot broad, larger. Stack all three.</>}
        stretch={<>How does CLIP do zero-shot brand recognition?</>}
      />

      <VIS.TrapProblem id="vp-p8" difficulty="hard" title="P8 — How does the system handle a NEW BRAND not yet in the template bank?"
        scenario={<><em>Discriminating insight: per-brand-trained Siamese CNN cannot detect a never-trained brand. CLIP zero-shot can detect via text prompt (a login page for Brand X). Curation pipeline must add new templates as new phishing campaigns target new brands. Bootstrap: brand-defense vendors monitor PhishTank / OpenPhish for new brand impersonation and curate.</em><br/><br/>New brand.</>}
        options={[
          {key:"a", text:"Cannot handle."},
          {key:"b", text:"NEW BRANDS are handled differently per embedding choice. (1) SIAMESE CNN — cannot detect a brand whose templates aren&apos;t in the bank; the embedding space wasn&apos;t trained on it; even a perfect visual clone scores low against existing templates. Mitigation: CURATION PIPELINE that monitors PhishTank / OpenPhish / APWG for emerging brand impersonation; when a new brand appears in phishing samples, capture legit-brand templates (Common Crawl / brand homepage scraping), add to bank, fine-tune Siamese CNN incrementally. Cycle time: days to weeks. (2) CLIP IMAGE ENCODER — ZERO-SHOT generalization. The CLIP text encoder embeds the brand name (a login page for Brand X is a text prompt); the image encoder embeds the screenshot; similarity in shared space detects impersonation WITHOUT per-brand training. Effectively covers any brand recognizable from its public web presence. Adding a new brand = adding a text prompt or a reference image to the bank. (3) HYBRID: CLIP for the long tail of brands; Siamese for the top-50 high-value brands (banking, government, mainstream tech) where false-positive rate matters most. (4) BRAND COVERAGE PRIORITIZATION: which brands first? Track phishing volume per brand from PhishTank labels; cover the top brands by victim impact (financial brands, identity providers, healthcare, cloud accounts). (5) MAINTENANCE: brand visual identity changes (redesigns, A/B tests); refresh templates monthly to avoid the model going stale on the legit brand and false-negative-ing the brand&apos;s real page (or false-positive-ing the new brand page).", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the new-brand handling.</>}
        lens={<>Siamese: needs per-brand training + curation pipeline. CLIP: zero-shot via text prompt. Hybrid: CLIP long tail + Siamese top brands.</>}
        stretch={<>How fast can a curation pipeline add a new brand?</>}
      />

      <VIS.TrapProblem id="vp-p9" difficulty="hard" title="P9 — Concept-specific misattribution: visual phishing flags an AGENCY LANDING PAGE that legit uses brand imagery."
        scenario={<><em>Discriminating insight (concept-specific): a third-party authorized partner (loyalty rewards site, customer-service vendor, marketing agency landing page) legitimately uses the brand logo and similar visual style. Screenshot matches brand template; URL is not on the brand allowlist; system flags. NOT phishing. Mitigations: expand allowlist to include authorized partners; require multi-signal confirmation (cert-issued-to, brand-authorized partner list, no credential-collection form); whitelist by partnership manifest.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"Visual-phishing-specific cause for false-positive on authorized brand partners. Many brands have legitimate third-party PARTNERS that use brand imagery: loyalty-rewards sites, customer-service outsourcers, regional reseller portals, marketing-agency landing pages for promotions. These third-party sites are NOT on the brand&apos;s registered-domain allowlist (they&apos;re owned by the partner, not the brand) but legitimately display the brand logo and similar visual style. Screenshot embedding matches the brand template; URL is not on allowlist; system flags. NOT phishing. Mitigations specific to visual phishing. (1) EXPAND ALLOWLIST to include AUTHORIZED PARTNERS — brand security team maintains a partnership manifest (paypal-rewards.example-partner.com, paypal-helpline.example-call-center.com); add to a SECONDARY allowlist. (2) MULTI-SIGNAL CONFIRMATION before flagging: cross-check TLS CERT-ISSUED-TO (legit partners often have a specific cert issuance pattern from the brand); check presence of a CREDENTIAL-COLLECTION FORM (legit partner pages often display brand imagery but don&apos;t ask for brand credentials — phishing clones do); check OUTBOUND LINKS (do they go to brand or to phisher backend). (3) FORM-DETECTION FEATURE: in addition to screenshot embedding, run a form-classifier (does the page contain a username + password field) and gate alerts on it. Pure-visual-similarity without credential-collection is much less likely to be phishing. (4) HUMAN-IN-THE-LOOP for borderline: route ambiguous cases to a brand-defense analyst with the screenshot, allowlist status, partnership manifest, and credential-form flag — fast triage rather than auto-block. (5) FEEDBACK LOOP: when a partner page is flagged and confirmed legit, ADD to allowlist; periodically prune.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Authorized brand partners use brand imagery legitimately. Fix: expand allowlist with partnership manifest + cert-issued-to + credential-form gate + human-in-loop triage.</>}
        stretch={<>How is the partnership manifest maintained?</>}
      />

      <VIS.TrapProblem id="vp-p10" difficulty="hard" title="P10 — Headless rendering — what about pages that DON'T render (login wall, geo block, captcha)?"
        scenario={<><em>Discriminating insight: rendering fails on pages with login walls, captchas, geo restrictions, or anti-bot defenses. Mitigations: residential proxy / rotating IP / browser fingerprint to bypass; OR fall back to URL-string + email-content signals; OR escalate to manual analyst review.</em><br/><br/>Render fail.</>}
        options={[
          {key:"a", text:"Skip the URL."},
          {key:"b", text:"RENDER FAILURES are a real production issue and require explicit handling. (1) FAILURE MODES. (a) PAGE BEHIND LOGIN WALL — phisher requires user to enter email before showing the clone (two-step harvest). Headless render sees only the email-collection page, not the brand clone. (b) GEO BLOCK — phisher only serves the clone to victims in specific geographies; headless render from a different IP sees a 403 or a fake error page. (c) CAPTCHA / ANTI-BOT — phisher detects the headless browser (puppeteer fingerprint, missing WebGL, navigator.webdriver=true) and serves a benign page or a captcha. (d) CLOAKING — phisher serves DIFFERENT CONTENT to known security-scanner IPs (Google, Microsoft, Phishtank scanners) than to actual victims. (e) JAVASCRIPT-HEAVY PAGE — clone renders after a delay or user interaction (click button to show login form); naive headless capture misses the brand clone. (2) MITIGATIONS. (a) RESIDENTIAL PROXY POOL — render via residential IPs to look like real victims; rotate per-render. (b) STEALTH BROWSER — use playwright-extra with stealth plugin to hide automation signatures; randomize fingerprint. (c) MULTI-GEO RENDERING — render from multiple geos; if any one returns a clone screenshot, flag. (d) USER-INTERACTION SIMULATION — scroll, click expected buttons, fill obvious decoy fields to trigger lazy-load. (e) FALLBACK to URL-string + email-content signals when render fails; never silently pass. (f) ANALYST ESCALATION on persistent render failures + high-stakes context (banking sender). (3) ETHICAL / LEGAL: avoid rendering pages that look operationally dangerous (e.g., malware drive-by-download); sandbox the render in an isolated VM with no privileged outbound; instrument for malicious downloads.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the render-failure handling.</>}
        lens={<>Render fail modes: login wall / geo block / captcha / cloaking / lazy-load. Fix: residential proxy / stealth browser / multi-geo / user-sim / fallback signals.</>}
        stretch={<>How does cloaking detection work?</>}
      />

      <VIS.TrapProblem id="vp-p11" difficulty="medium" title="P11 — Production: when to render?"
        scenario={<><em>Discriminating insight: rendering is seconds per URL — too expensive for every URL. Trigger on (a) URLNet score above a soft threshold; (b) banking / financial keyword in email; (c) sender unknown to recipient; (d) URL on cheap TLD; (e) user click in browser (real-time block). Batch render in background for low-priority URLs.</em><br/><br/>When.</>}
        options={[
          {key:"a", text:"Render every URL."},
          {key:"b", text:"RENDERING is SECONDS PER URL — too expensive to apply to every URL. Trigger selectively. (1) URLNet SOFT-THRESHOLD TRIGGER: URLs with URLNet score above a soft threshold (e.g., 0.3 — too high to ignore, too low to auto-block) go to visual phishing for second-layer analysis. (2) HIGH-STAKES CONTEXT: emails containing banking / financial / credential-related keywords (login, password, verify, account, transfer, payment, IRS, refund); regulated-recipient cohort (banking customer, healthcare patient); high-value transactions. (3) UNKNOWN SENDER: sender not in recipient&apos;s contact list / never received from this domain before; trigger visual rendering for landing-page check. (4) CHEAP TLD / RECENT REGISTRATION: domain registered in last 7 days (per WHOIS); domain on a cheap TLD (.tk, .ml, .top); domain has no TLS cert or cert age < 30 days. (5) USER-CLICK INTERCEPT in browser: when a user clicks a link in a quarantined or warning-flagged email; render in real-time before redirecting; block on visual phishing alert. (6) BATCH BACKGROUND RENDERING: for low-priority URLs (mass marketing emails, internal forwards), batch-render in the background with no real-time SLA; populate the historical phishing-knowledge-base. (7) AVOID DOUBLE-RENDERING: cache renders per URL for a short TTL (5-30 minutes); skip if already rendered recently. (8) CAPACITY PLANNING: typical large email gateway sees 100M URLs/day; selective render hits maybe 1-5% (1-5M renders) — fits in a sandbox cluster.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip rendering."},
        ]}
        trap={<>(a)(c)(d) miss the selective trigger.</>}
        lens={<>Render selectively on URLNet soft-threshold + high-stakes context + unknown sender + cheap TLD + user-click. Batch low-priority.</>}
        stretch={<>What&apos;s the typical render-cache TTL?</>}
      />

      <VIS.TrapProblem id="vp-p12" difficulty="hard" title="P12 — Concept-specific misattribution: visual phishing MISSES a confirmed brand-clone phishing case."
        scenario={<><em>Discriminating insight (concept-specific): (1) phisher used a brand template variant (mobile / localized / outdated version) not in our template bank; (2) phisher applied subtle visual perturbation (cropped logo, slight color shift) that fooled the CNN/CLIP embedding; (3) render failed (cloaked, geo-blocked); (4) phisher targeted a brand we don&apos;t cover. Specific to screenshot-renderer + template-bank mechanism.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},

      <VIS.TrapProblem id="vp-p15" difficulty="hard" title="P15 — Adversarial robustness — what do phisher kits do to evade visual detection?"

      <VIS.TrapProblem id="vp-p16" difficulty="medium" title="P16 — Junior: 'Visual phishing is just image retrieval'. Refute."

        options={[

      <VIS.TrapProblem id="vp-p17" difficulty="hard" title="P17 — Skeptic: 'Just OCR the logo and check brand-name in image'. Refute."
        scenario={<><em>Discriminating insight: skeptic is RIGHT for the simplest phishing kits where the brand logo is present and unmodified. WRONG for the long tail: logo-removed clones, logo-modified clones, layout-only mimicry, non-English brands, brand-name-as-image-not-text. Visual embedding captures the full visual gestalt, not just the logo text.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Skeptic is right."},
          {key:"b", text:"PARTIALLY right; logo-OCR catches the obvious but misses the long tail. (1) LOGO-OCR catches simplest kits: extract logo via object-detection; OCR the brand name in the logo; flag if brand-name extracted AND URL not on that brand&apos;s allowlist. Cheap and fast. Works on kits where the logo is unmodified PNG (which is many of them). (2) LIMITATIONS. (a) LOGO-REMOVED CLONES — phisher omits the logo but copies layout, color, fonts, form structure. OCR finds nothing; visual-similarity embedding catches via layout / color signal. (b) LOGO-MODIFIED CLONES — phisher subtly perturbs the logo (color shift, partial crop, replaced with similar image). OCR may fail or extract a non-brand string; visual embedding handles via robust feature extraction. (c) BRAND-NAME-AS-IMAGE — brand logo is purely graphical (no text — e.g., Apple, Twitter X icon-only); OCR has nothing to read; visual embedding captures the shape. (d) LAYOUT-ONLY MIMICRY — phisher copies the layout (form fields in specific positions, specific button colors, specific copy text) without the logo; OCR has nothing to find; layout-aware embedding catches it. (e) MULTI-BRAND TARGETING — kit targets multiple brands by detecting the victim&apos;s email domain and serving the appropriate brand clone dynamically; logo OCR works per page but a comprehensive system needs the broader visual-similarity framework. (3) HYBRID: logo-OCR as a cheap pre-filter (catches obvious cases quickly), visual-similarity embedding for the long tail. Many production systems use both (Phishpedia explicitly: logo-detection PLUS Siamese CNN on screenshot). (4) ARGUMENT: logo-OCR is a feature; visual similarity is a system. Use logo-OCR as one signal within visual phishing detection, not as a replacement.", correct:true},

      <VIS.TrapProblem id="vp-p18" difficulty="hard" title="P18 — Multi-modal embedding — combining screenshot + HTML DOM + URL."
        scenario={<><em>Discriminating insight: screenshot captures the visual; HTML DOM captures the structural (form field types, input names, hidden fields); URL captures the lexical. Multi-modal embedding (e.g., late-fusion of CLIP image + DOM-graph encoder + URLNet) catches more than any single modality.</em><br/><br/>Multi-modal.</>}
        options={[
          {key:"a", text:"Just use screenshot."},
          {key:"b", text:"MULTI-MODAL embedding captures complementary signals. (1) SCREENSHOT (CLIP / CNN image embedding): VISUAL signal — layout, color, logo, fonts. Catches visual impersonation. Misses: visually-bland phishing forms that exfiltrate via JavaScript. (2) HTML DOM (DOM-graph encoder, or BERT on serialized HTML): STRUCTURAL signal — form-field names (username, email, password), hidden form fields, JavaScript handlers, outbound URLs (form action attribute), iframe sources. Catches: phishing forms whose visual is plain but whose form action POSTs to a phisher backend; or pages with hidden credential-collection fields. (3) URL STRING (URLNet): LEXICAL signal — homoglyph, brand-suffix, etc. (4) META-FEATURES: WHOIS age, TLS cert age, DNS record patterns, hosting AS (autonomous system). (5) FUSION OPTIONS. (a) LATE FUSION: each modality produces an embedding; concatenate; MLP or GBDT classifier on concatenated. Simple. (b) EARLY FUSION: cross-attention between modalities (image-text cross-attention layers); more expressive but more compute. (c) MIXTURE-OF-EXPERTS gating: route URLs to the modality most likely to catch phishing in that category (banking URLs → screenshot dominant; SaaS URLs → DOM dominant). (6) EMPIRICAL: multi-modal beats best single modality by 5-15% AUPRC on benchmarks (Phishpedia ablation table 4). The marginal cost of HTML DOM encoding is low; the marginal cost of screenshot rendering is the dominant cost. (7) PRODUCTION: render the screenshot ONCE, extract HTML at the same time, encode all modalities in parallel, fuse downstream.", correct:true},

      <VIS.TrapProblem id="vp-p19" difficulty="medium" title="P19 — Threshold tuning — per-brand vs global similarity threshold."
        scenario={<><em>Discriminating insight: per-brand threshold matters. Some brands have very distinctive visual identities (Apple, Google) → tight threshold. Others use generic SaaS templates (small B2B portals) → looser threshold needed to avoid FP. Per-brand isotonic regression on labeled phishing-vs-legit pairs.</em><br/><br/>Threshold.</>}
        options={[
          {key:"a", text:"Global threshold only."},
          {key:"b", text:"PER-BRAND THRESHOLD is the production default. (1) VISUAL DISTINCTIVENESS varies dramatically by brand. (a) Highly-distinctive brands (Apple — minimalist white background, specific font, specific logo placement; Google — colorful logo on white; PayPal — blue gradient with specific layout): tight similarity threshold (e.g., cosine 0.92) flags clones reliably with low FP. (b) Generic-SaaS-template brands (small B2B portals using a Bootstrap login template; regional banks using stock templates): low intrinsic visual distinctiveness; many legit non-impostor pages look similar to the template; need a looser threshold but with stronger SECONDARY confirmation (form-detector, URLNet, sender reputation). (c) Frequently-redesigned brands (consumer apps, fintech): threshold must shift after each redesign as the legit page drifts from template. (2) PER-BRAND CALIBRATION: for each brand, collect labeled (phishing-clone, legit-brand-page) pairs; fit ISOTONIC REGRESSION mapping raw similarity score to phishing probability; pick threshold to hit a target precision per brand. (3) BRAND-CATEGORY FALLBACK: for brands without enough labeled data, use category-level threshold (financial / SaaS / e-commerce / government). (4) MULTI-STAGE: low threshold per brand → BROWSER WARNING (low FP cost); high threshold → BLOCK (high FP cost). (5) MONITORING: per-brand precision and recall tracked separately; drift alerts per brand (especially after brand redesigns). (6) ASYMMETRIC COST: banking brands tolerate more false positives (customer protection priority); content-platform brands prefer fewer false positives (user-friction priority). Tune accordingly.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip thresholds."},
        ]}
        trap={<>(a)(c)(d) miss per-brand variance.</>}
        lens={<>Per-brand threshold via isotonic regression. Distinctive brands: tight. Generic-template brands: loose + secondary confirmation. Per-brand monitoring.</>}
        stretch={<>What does the per-brand calibration data look like?</>}

m version differs from template-bank capture version, fail builds. (e) Consider RENDERER-AGNOSTIC embeddings (CLIP is more robust than pHash to small rendering changes — but still drifts).", correct:true},

      <VIS.TrapProblem id="vp-p21" difficulty="hard" title="P21 — In one sentence, THE unique mechanism of visual phishing detection."
        scenario={<><em>Discriminating insight: RENDER the suspect URL in a HEADLESS BROWSER → SCREENSHOT → IMAGE EMBEDDING (pHash / Siamese CNN / CLIP) → NEAREST-NEIGHBOR against BRAND TEMPLATE BANK → ALLOWLIST CHECK on registered domain. PIXEL similarity of rendered page to brand templates. NOT URL string; NOT email body; NOT logo OCR alone.</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"It is a URL classifier."},
          {key:"b", text:"FIVE-COMPONENT MECHANISM. (1) HEADLESS RENDERING: launch Chromium / Firefox in headless mode; fetch suspect URL; wait for DOMContentLoaded + network-idle; capture full-page screenshot at fixed viewport (1280x800). Anti-cloaking: residential-proxy IP, stealth-browser plugins, multi-geo, user-interaction simulation. Sandboxed environment. (2) IMAGE EMBEDDING. (a) Perceptual hash (pHash, dHash) — microsecond fast pre-filter, brittle to layout. (b) Siamese CNN (VisualPhishNet, Phishpedia&apos;s detector) — ResNet trained with contrastive loss on per-brand positives; 256-512 dim; needs per-brand training. (c) CLIP image encoder (PhishCLIP, Phish-Intention) — zero-shot brand recognition across thousands of brands; 512-768 dim; no per-brand training. (3) BRAND TEMPLATE BANK: curated set of 5-20 LEGITIMATE login-page screenshots per brand (desktop / mobile / localized / historical variants); maintained by curation pipeline driven by emerging-brand-impersonation monitoring. (4) NEAREST-NEIGHBOR: vector search the screenshot embedding against the template bank; retrieve top-K with similarity scores. (5) ALLOWLIST + DECISION: extract registered domain via PSL; cross-check against the matched brand&apos;s registered-domain allowlist (e.g., PayPal owns paypal.com, paypal.me); flag VISUAL PHISHING if (matched brand X AND registered domain NOT in X&apos;s allowlist AND similarity above per-brand threshold AND credential-collection form present). (6) PRODUCTION TRIGGERS: rendering is seconds per URL — trigger selectively (URLNet soft-threshold, high-stakes context, unknown sender, cheap TLD, user-click intercept). (7) NOT a URL-string model (URLNet — different layer). NOT an email-body LLM (LLM email scoring — different layer). NOT logo-OCR alone (which catches the logo image but misses layout-only mimicry, logo-removed clones, icon-only brands).", correct:true},

        scenario={<><em>Discriminating insight: visual phishing is the PAGE LAYER of a three-layer stack: URLNet (URL string layer, cheap), visual phishing (page layer, expensive), LLM email scoring (email-content layer, slow). Each catches different failure modes. Late-fuse via meta-classifier.</em><br/><br/>Combine.</>}
        options={[
          {key:"a", text:"Cannot combine."},
          {key:"b", text:"THREE-LAYER DEFENSE; visual phishing slots into the PAGE LAYER. (1) URLNET / URLTRANSFORMER (URL layer, sub-ms): char-level CNN/Transformer on URL string; catches lexical phishing patterns (homoglyph, brand-suffix, IP host, IDN). Cheap and broad. (2) VISUAL PHISHING DETECTION (page layer, seconds): render URL in headless browser, embed screenshot, compare to brand templates, check allowlist. Catches visual brand clones regardless of URL string. (3) LLM EMAIL-CONTENT SCORING (email layer, 100ms-2s): prompts LLM with email body, headers, sender display name; reasons about urgency, impersonation, sender-domain conflict. Catches email-only social engineering with no URL or with already-passed URL. (4) ORCHESTRATION. (a) URLNet at SMTP ingest and SMS firewall — scores every URL cheaply; block/quarantine high-score. (b) Visual phishing TRIGGERED SELECTIVELY: URLs that pass URLNet but match high-stakes criteria (banking keyword email, unknown sender, cheap TLD, URLNet soft-threshold); also on user-click in browser as real-time intercept. (c) LLM email scoring at SMTP ingest in parallel; produces an email-content phishing score for the meta-classifier. (5) LATE FUSION: a small GBDT takes [URLNet score, visual phishing score with matched brand, LLM email score, sender reputation, WHOIS age, recipient cohort, time-of-day] and produces final phishing probability. Calibrated per channel + recipient cohort. (6) ATTACKER COST: must produce a URL whose STRING passes URLNet AND whose RENDERED PAGE does not visually match any brand template (or matches but URL is in allowlist) AND whose EMAIL BODY reads benign to an LLM. Drastically reduces attacker conversion. (7) COMPUTE OPTIMIZATION: cache visual-phishing renders per URL with TTL; reuse across recipients sharing the same URL.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the three-layer architecture.</>}
        lens={<>URLNet (URL string, cheap) → visual phishing (page, expensive) → LLM email scoring (email, slow). Late-fuse via GBDT meta-classifier. Cache renders for reuse.</>}
        stretch={<>What share of phishing each layer catches solo?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://www.usenix.org/conference/usenixsecurity21/presentation/lin" target="_blank" rel="noopener"><strong>Lin et al. — Phishpedia: A Hybrid Deep Learning Based Approach to Visually Identify Phishing Webpages</strong></a> <span style={{color:"#64748b", fontSize:14}}>(USENIX Security 2021, paper)</span><br/>The canonical paper. Logo-detection (object detection) + brand-identification (Siamese CNN on screenshot) + allowlist check. Architecture closely tracks the recipe in this visual.</li>
        <li><a href="https://dl.acm.org/doi/10.1145/3372297.3417233" target="_blank" rel="noopener"><strong>Abdelnabi et al. — VisualPhishNet: Zero-Day Phishing Website Detection by Visual Similarity</strong></a> <span style={{color:"#64748b", fontSize:14}}>(CCS 2020, paper)</span><br/>Siamese CNN on screenshots with triplet loss; introduced the zero-day visual phishing framing.</li>
        <li><a href="https://arxiv.org/abs/2304.05521" target="_blank" rel="noopener"><strong>Liu et al. — Knowledge Expansion and Counterfactual Interaction for Reference-Based Phishing Detection</strong></a> <span style={{color:"#64748b", fontSize:14}}>(USENIX Security 2023, paper)</span><br/>Phishpedia&apos;s successor (Phish-Intention / PhishCLIP-style). CLIP-based zero-shot brand recognition + brand-allowlist + interaction modeling.</li>
        <li><a href="https://urlscan.io/" target="_blank" rel="noopener"><strong>urlscan.io</strong></a> <span style={{color:"#64748b", fontSize:14}}>(industry / reference)</span><br/>Hosted URL-rendering scanner. Useful for seeing the rendering pipeline + screenshot output in practice; many production phishing detectors use urlscan.io infrastructure.</li>
        <li><a href="https://openai.com/research/clip" target="_blank" rel="noopener"><strong>Radford et al. — Learning Transferable Visual Models From Natural Language Supervision (CLIP)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(OpenAI / ICML 2021, paper)</span><br/>The image-text encoder used by PhishCLIP and Phish-Intention. Foundation for zero-shot brand recognition.</li>
        <li><a href="https://docs.apwg.org/reports/apwg_trends_report.html" target="_blank" rel="noopener"><strong>APWG Phishing Activity Trends Report</strong></a> <span style={{color:"#64748b", fontSize:14}}>(industry trend report)</span><br/>Quarterly phishing telemetry: brands targeted, channels, regions. Useful for prioritizing brand-template-bank coverage.</li>
      </ul>
    </VIS.Section>
