  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Deep ensembles for fraud — 5-10 independently-initialized models for epistemic
// uncertainty and OOD detection via disagreement. Costly at serving time but the
// most reliable single source of uncertainty in production.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Uncertainty"
      title="Deep ensembles for fraud"
      subtitle="Train 5 to 10 independently-initialized models; ensemble mean is the prediction, ensemble disagreement is an epistemic-uncertainty signal that flags out-of-distribution and novel fraud MOs."
      byline={[
        {label: "Source", value: "Lakshminarayanan et al. (NeurIPS 2017); 'Deep Ensembles for Risk Uncertainty' (FATE 2024)"},
        {label: "Year", value: "2017 / 2024"},
        {label: "L2", value: "Bayesian / uncertainty methods"},
      ]}/>

    <VIS.TLDR>
      A single fraud model returns a probability for every transaction — but is overconfident on inputs unlike anything it saw during training (novel fraud{" "}
      <VIS.Term def="Modus Operandi — the specific tactic / pattern fraudsters use to commit fraud. Fraud rings rotate MOs frequently; novel MOs are MOs the model has not seen before.">MOs</VIS.Term>, new merchant categories, new attack patterns). A{" "}
      <VIS.Term def="An ensemble of 5 to 10 deep neural networks, each independently initialized and trained on the same data. Predictions are averaged; the variance across members is treated as epistemic uncertainty.">deep ensemble</VIS.Term>{" "}
      of 5 to 10 networks gives you two things at once: a more accurate prediction (variance reduction across members) AND a measure of{" "}
      <VIS.Term def="Uncertainty due to model ignorance (lack of data in this region). Decreases with more data. Contrast with aleatoric uncertainty, which is irreducible randomness in the labels themselves.">epistemic uncertainty</VIS.Term>{" "}
      from member disagreement. Disagreement spikes on{" "}
      <VIS.Term def="Out-of-Distribution — input data that differs systematically from the training distribution. Single models are silently overconfident on OOD; ensemble disagreement flags it.">OOD</VIS.Term>{" "}
      inputs and flags novel fraud patterns for human review.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <ol>
        <li><strong>Train 5 to 10 independent models</strong> — same architecture, same data, different random initialization (and different data ordering during training). Each member converges to a different minimum of the loss landscape.</li>
        <li><strong>At inference, predict with all members</strong> — mean is the prediction, variance is the uncertainty signal.</li>
        <li><strong>Threshold uncertainty</strong> — high disagreement (variance) means epistemic uncertainty: input is unlike training data. Route to human review or fall back to a rule-based system.</li>
      </ol>

      <VIS.Mermaid chart={`
flowchart TB
  X["Input transaction"]
  X --> M1["Model 1"]
  X --> M2["Model 2"]
  X --> M3["Model k"]
  M1 --> P["Predictions p_1 to p_k"]
  M2 --> P
  M3 --> P
  P --> AVG["Mean = score"]
  P --> VAR["Variance = uncertainty"]
  style AVG fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style VAR fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>Blue is the calibrated score (more accurate than any single member). Yellow is the disagreement signal — high values indicate epistemic uncertainty and trigger downstream review.</p>

      <VIS.Equation display
        tex="\text{Var}_{\text{epistemic}}(x) = \frac{1}{k}\sum_{i=1}^k \big(p_i(x) - \bar{p}(x)\big)^2 \quad \text{where} \quad \bar{p}(x) = \frac{1}{k}\sum_{i=1}^k p_i(x)" />

      <p>
        The variance is the empirical disagreement across members at input <code>x</code>. As <code>k</code> grows, the mean converges to the ensemble prediction; the variance estimates how much different sensible models would disagree about this input.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from single model + softmax confidence">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Single model + softmax</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Deep ensemble</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Captures epistemic uncertainty</td>
            <td style={{padding:"8px 10px"}}>No — overconfident on OOD</td>
            <td style={{padding:"8px 10px"}}>Yes — disagreement signal</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Captures aleatoric uncertainty</td>
            <td style={{padding:"8px 10px"}}>Partially via softmax sharpness</td>
            <td style={{padding:"8px 10px"}}>Same as single model on in-distribution</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Calibration</td>
            <td style={{padding:"8px 10px"}}>Often poor without recalibration</td>
            <td style={{padding:"8px 10px"}}>Better; further improved with temperature scaling</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Accuracy vs single model</td>
            <td style={{padding:"8px 10px"}}>Baseline</td>
            <td style={{padding:"8px 10px"}}>Usually 1 to 3 points better</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Serving cost</td>
            <td style={{padding:"8px 10px"}}>1x</td>
            <td style={{padding:"8px 10px"}}>5x to 10x</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Novel-MO concern is real</strong> — fraud rings rotate attacks, and you need a flag when the model sees something it has not seen.</li>
        <li><strong>You have budget for 5x to 10x serving cost</strong> — either by batching, GPU pooling, or relegating ensembles to a second-stage where they only run on the top-N percent of transactions.</li>
        <li><strong>You want epistemic uncertainty without the implementation overhead of Bayesian neural nets</strong> — deep ensembles are the cheapest pragmatic approximation that actually works on tabular fraud features.</li>
        <li><strong>You need calibrated probabilities for downstream cost-sensitive decisions</strong> — ensemble mean plus temperature scaling is the standard recipe.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Serving cost is real — design for it">
        5 to 10 forward passes per transaction means proportionally more GPU time. Mitigations: (1) batch decisions across an interval (5 to 20 ms window); (2) only ensemble on top-N risky transactions, single model for the rest; (3) distill the ensemble into a single network for the main path and use the full ensemble for the uncertainty-flagged slice.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Tiny ensembled models can underperform a single big model">
        Lakshminarayanan et al. shows ensembles of moderate-sized models beat single models — but if your ensemble members are too small (say, 3 layers, 64 hidden), a single big model (12 layers, 512 hidden) with the same compute budget often wins. Choose ensemble vs depth based on whether your accuracy is compute-bound or data-bound.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Disagreement is necessary but not sufficient for OOD detection">
        High disagreement is a strong OOD signal, but low disagreement can still be OOD if all members make the same systematic mistake (e.g., they all rely on a feature that is absent). Pair with a density-based OOD detector or input-reconstruction signal for robustness.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Independent init is not always independent enough">
        Identical architecture and data with only different seeds often gives correlated members. To increase diversity: vary data subsets (bagging), vary architecture slightly (depth, width), or use snapshot ensembles (different points along the same training trajectory). More diversity, more useful disagreement.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Trap problems on disagreement signals, ensembling cost-engineering, distillation, and the difference between epistemic and aleatoric uncertainty.
      </p>

      <VIS.TrapProblem
        id="de-p1"
        difficulty="hard"
        title="P1 — Ensemble disagreement spikes for 3 percent of transactions. Drift, OOD, or noise?"
        scenario={<>Your 7-model deep ensemble suddenly shows high variance on 3 percent of recent transactions. The other 97 percent look normal. Triage: is this drift, OOD, or label noise?</>}
        options={[
          {key:"a", text:"Most likely OOD or a novel-MO emergence. Drift would show GRADUAL variance increase across the whole population; label noise is an aleatoric (per-input intrinsic) phenomenon and would NOT show as ensemble disagreement (members trained on noisy labels would all be similarly confused). High disagreement concentrated on a slice is the signature of inputs unlike training data — investigate the slice for a common pattern (new merchant, new geography, new device fingerprint cluster).", correct:true},
          {key:"b", text:"Drift — retrain immediately."},
          {key:"c", text:"Label noise — clean the labels."},
          {key:"d", text:"Random — wait and see."},
        ]}
        trap={<>(b) confuses drift signature. (c) confuses epistemic with aleatoric. (d) ignores actionable signal.</>}
        lens={<>(a) is the senior triage. Ensemble disagreement concentrated on a slice is the textbook OOD/novel-MO signature.</>}
        stretch={<>How would you cleanly distinguish drift from novel-MO emergence?</>}
      />

      <VIS.TrapProblem
        id="de-p2"
        difficulty="hard"
        title="P2 — Why is single-model softmax overconfident on OOD?"
        scenario={<>Your team reports a transaction the single model scored 0.99 fraud-probability, but the ensemble disagrees wildly (mean 0.6, std 0.3). Why is the single model overconfident?</>}
        options={[
          {key:"a", text:"Softmax produces a categorical distribution from arbitrary logits. The model's logits on OOD inputs are not constrained to be small — the model extrapolates from training and produces a confident logit that gets exponentiated to a confident probability. Deep ensembles expose this by training k separate models that learn different extrapolations; their disagreement at the OOD point is the epistemic signal the single softmax cannot give you.", correct:true},
          {key:"b", text:"Softmax is broken; use sigmoid."},
          {key:"c", text:"The model is overfit."},
          {key:"d", text:"There is a numerical bug."},
        ]}
        trap={<>(b) (c) (d) miss the systemic issue.</>}
        lens={<>(a) is the textbook softmax-overconfidence argument. Softmax does not penalize confident extrapolation.</>}
        stretch={<>Does temperature scaling fix this?</>}
      />

      <VIS.TrapProblem
        id="de-p3"
        difficulty="hard"
        multiSelect
        title="P3 — Cost-engineering the 5x serving overhead — which strategies actually work?"
        scenario={<>Your fraud platform serves 50K transactions per second. A 7-model deep ensemble is 7x the cost. Which strategies are reasonable mitigations? Select all that apply.</>}
        options={[
          {key:"a", text:"Two-stage routing: cheap single model first; only run the full ensemble on the top 5 to 10 percent flagged by the single model.", correct:true},
          {key:"b", text:"Distill the ensemble into a single student model with knowledge distillation, use the student in the hot path, reserve the full ensemble for uncertainty-flagged slices.", correct:true},
          {key:"c", text:"Dynamic batching across requests within a 5 to 20 ms window to amortize GPU launches.", correct:true},
          {key:"d", text:"Quantize all ensemble members to INT8.", correct:true},
          {key:"e", text:"Drop to a 2-model ensemble — same uncertainty signal."},
          {key:"f", text:"Run all ensemble members on CPU."},
        ]}
        trap={<>(e) 2-model ensemble gives a much weaker uncertainty signal — variance estimates are very noisy at k=2. (f) CPU is too slow for the latency budget.</>}
        lens={<>(a) (b) (c) (d) are valid mitigations and often used together.</>}
        stretch={<>Of (a) (b) (c) (d), which gives the biggest cost win?</>}
      />

      <VIS.TrapProblem
        id="de-p4"
        difficulty="hard"
        title="P4 — Ensemble disagreement is LOW on a known-fraud novel-MO. What went wrong?"
        scenario={<>You hand-crafted a novel-MO test case (a new attack pattern not in training data). All 7 ensemble members agree on a low fraud score. Disagreement is near zero. The MO is genuinely novel. What went wrong?</>}
        options={[
          {key:"a", text:"Members share systematic blind spots. Independent random init does not guarantee diverse functional behavior, especially if all members lean on the same dominant features. The fix is diversity: bagging on data subsets, varying architecture (depth or width per member), adding a density-based OOD detector as a second signal independent of the ensemble. Ensemble disagreement is a USEFUL OOD signal, not a complete one.", correct:true},
          {key:"b", text:"The MO is not novel after all."},
          {key:"c", text:"Increase ensemble size from 7 to 70."},
          {key:"d", text:"Use a smaller architecture."},
        ]}
        trap={<>(b) contradicts the scenario. (c) does not address shared bias. (d) reduces capacity.</>}
        lens={<>(a) is the correct read. Ensemble diversity is a means; if members are too similar they have shared blind spots. Combine with an independent OOD detector for safety.</>}
        stretch={<>What architectural change would maximize diversity without changing performance much?</>}
      />

      <VIS.TrapProblem
        id="de-p5"
        difficulty="hard"
        title="P5 — Should you ensemble 5 small models or train one 5x bigger model?"
        scenario={<>You have a fixed compute budget — either train 5 models of size N or one model of size 5N. Which is the senior default for fraud?</>}
        options={[
          {key:"a", text:"It depends on whether you are bottlenecked by capacity or by data. If a single model of size 5N is still under-capacity (training loss high), train the bigger model. If a single model of size N already fits training well but generalizes poorly (variance problem), ensembling 5 wins because each member fits the data and disagreement at unseen points is the win. Lakshminarayanan's experiments show small-to-medium models benefit most from ensembling.", correct:true},
          {key:"b", text:"Always ensemble — the single big model never wins."},
          {key:"c", text:"Always go bigger — ensembling is wasteful."},
          {key:"d", text:"They are equivalent."},
        ]}
        trap={<>(b) (c) (d) are over-general.</>}
        lens={<>(a) is the senior framing. Bias-variance perspective: if bias dominates, go bigger; if variance dominates, ensemble.</>}
        stretch={<>What experiment would tell you which regime you are in?</>}
      />

      <VIS.TrapProblem
        id="de-p6"
        difficulty="hard"
        multiSelect
        title="P6 — Calibration — pick valid statements"
        scenario={<>You want calibrated probabilities for downstream decisioning. Which of the following are TRUE for deep ensembles? Select all that apply.</>}
        options={[
          {key:"a", text:"Deep ensembles typically improve calibration over single models without temperature scaling.", correct:true},
          {key:"b", text:"Adding temperature scaling on top of an ensemble's mean often gives the best of both.", correct:true},
          {key:"c", text:"Ensemble variance can be added to expected calibration error reports as an OOD-detection auxiliary metric.", correct:true},
          {key:"d", text:"Calibration on in-distribution data implies calibration on OOD data."},
          {key:"e", text:"Calibration is irrelevant for fraud — only ranking matters."},
          {key:"f", text:"Ensembles can still be miscalibrated when all members share a systematic bias.", correct:true},
        ]}
        trap={<>(d) is false — in-distribution calibration is no guarantee on OOD. (e) is false for cost-sensitive decisioning.</>}
        lens={<>(a) (b) (c) (f) are correct. Ensembles help calibration but do not solve it; combine with temperature scaling and shared-bias diagnostics.</>}
        stretch={<>How would you measure calibration on OOD inputs?</>}
      />

      <VIS.TrapProblem
        id="de-p7"
        difficulty="hard"
        title="P7 — Knowledge distillation — what do you lose?"
        scenario={<>You distill a 7-model ensemble into a single student to save serving cost. What do you LOSE compared to running the full ensemble?</>}
        options={[
          {key:"a", text:"You lose the ensemble disagreement signal — the student has no notion of epistemic uncertainty by default. Mitigations: (1) include the variance as an auxiliary distillation target so the student learns to predict uncertainty too, (2) keep the full ensemble for a second-stage uncertainty check on top-K flagged transactions, (3) train multiple students and ensemble them. Pure distillation buys accuracy, not uncertainty.", correct:true},
          {key:"b", text:"You lose accuracy."},
          {key:"c", text:"You lose calibration only."},
          {key:"d", text:"You lose nothing — distillation is lossless."},
        ]}
        trap={<>(b) is incomplete — accuracy is often maintained. (d) is wrong.</>}
        lens={<>(a) is the senior read. Distillation transfers mean prediction; variance signal must be preserved separately or relearned.</>}
        stretch={<>How would you distill epistemic uncertainty into a single student?</>}
      />

      <VIS.TrapProblem
        id="de-p8"
        difficulty="hard"
        title="P8 — How many members? 3, 7, or 30?"
        scenario={<>You pick ensemble size k. What is the senior default for fraud, and why?</>}
        options={[
          {key:"a", text:"k around 5 to 10 is the senior default. Diminishing returns set in after 5 to 10 (variance estimate stabilizes, accuracy gain plateaus). Compute cost grows linearly. k=3 is too few for a reliable variance estimate (high variance of variance). k=30 buys little over k=10 and triples serving cost. Operational sweet spot: 5 for cost-sensitive, 10 for high-stakes.", correct:true},
          {key:"b", text:"k=100 is always better."},
          {key:"c", text:"k=2 is enough."},
          {key:"d", text:"k does not matter."},
        ]}
        trap={<>(b) ignores cost. (c) gives a noisy variance estimate. (d) is wrong.</>}
        lens={<>(a) is the empirical default. 5 to 10 hits the elbow of the accuracy and uncertainty curves.</>}
        stretch={<>What is the variance of the variance estimate at k=3 vs k=10?</>}
      />

      <VIS.TrapProblem
        id="de-p9"
        difficulty="hard"
        title="P9 — Epistemic vs aleatoric — how do you tell them apart?"
        scenario={<>You see a high-uncertainty transaction. Is the uncertainty epistemic (model does not know) or aleatoric (truly ambiguous label)? How do you tell?</>}
        options={[
          {key:"a", text:"Decompose: epistemic uncertainty is the VARIANCE across ensemble members' predictions; aleatoric is the AVERAGE entropy of individual members' predictions. If members agree (low variance) but each is uncertain (high entropy), it is aleatoric — the input is intrinsically ambiguous. If members disagree (high variance), it is epistemic — the model does not know. Treat the two differently in downstream decisioning.", correct:true},
          {key:"b", text:"You cannot tell them apart."},
          {key:"c", text:"They are the same thing."},
          {key:"d", text:"Aleatoric does not exist for fraud."},
        ]}
        trap={<>(b) (c) (d) are wrong.</>}
        lens={<>(a) is the textbook decomposition (Depeweg et al., Smith and Gal). The two have different fixes — more data for epistemic, better labels for aleatoric.</>}
        stretch={<>Which kind of uncertainty cannot be reduced by adding more training data?</>}
      />

      <VIS.TrapProblem
        id="de-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Production design — pick the ingredients for a deep-ensemble fraud system"
        scenario={<>You ship a deep ensemble for fraud at a top-3 issuer. Pick the ingredients. Select all that apply.</>}
        options={[
          {key:"a", text:"5 to 10 independently-initialized members with bagging or architecture variation for diversity.", correct:true},
          {key:"b", text:"Two-stage serving: cheap distilled student in the hot path, full ensemble on top-K flagged transactions.", correct:true},
          {key:"c", text:"Temperature scaling on the ensemble mean for calibrated probabilities.", correct:true},
          {key:"d", text:"Dashboard tracking ensemble disagreement distribution and slice analysis for novel-MO detection.", correct:true},
          {key:"e", text:"Single 100-layer model only, no ensembling."},
          {key:"f", text:"Density-based OOD detector as a second uncertainty signal independent of ensemble variance.", correct:true},
          {key:"g", text:"Skip calibration — ensembling fixes calibration automatically."},
        ]}
        trap={<>(e) abandons the uncertainty signal. (g) is over-confident in ensembling.</>}
        lens={<>(a) (b) (c) (d) (f) are the senior production ingredients.</>}
        stretch={<>What single metric tells you the ensemble is paying off vs the distilled student?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1612.01474" target="_blank" rel="noopener">
            <strong>Lakshminarayanan, Pritzel, Blundell — Simple and Scalable Predictive Uncertainty Estimation using Deep Ensembles</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2017)</span>
          <br/>The canonical deep ensembles paper. Section 3 has the algorithm; section 4 has the OOD experiments — required reading.
        </li>
        <li>
          <a href="https://yk-deeplearning.github.io/posts/uncertainty/" target="_blank" rel="noopener">
            <strong>Yarin Gal — What My Deep Model Doesn't Know (uncertainty in deep learning)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>The clearest practitioner introduction to epistemic vs aleatoric uncertainty. Read this before the Lakshminarayanan paper.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2007.06823" target="_blank" rel="noopener">
            <strong>Fort, Hu, Lakshminarayanan — Deep Ensembles: A Loss Landscape Perspective</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, 2020)</span>
          <br/>Explains WHY independent random inits give diverse members — they land in different loss-landscape modes. Helpful when justifying ensembling vs alternatives.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1503.02531" target="_blank" rel="noopener">
            <strong>Hinton, Vinyals, Dean — Distilling the Knowledge in a Neural Network</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, 2015)</span>
          <br/>The original distillation paper. Read this when planning to compress an ensemble into a single student.
        </li>
        <li>
          <a href="https://www.youtube.com/watch?v=YJqDfWyT3UA" target="_blank" rel="noopener">
            <strong>Andrew Gordon Wilson — Bayesian Deep Learning and Deep Ensembles (talk)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(video)</span>
          <br/>Senior talk on why deep ensembles are a pragmatic approximation to Bayesian deep learning. The connection to MAP modes is the keeper.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
