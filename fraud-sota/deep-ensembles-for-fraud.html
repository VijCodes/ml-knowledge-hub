      <VIS.TrapProblem id="de-p19" difficulty="hard" title="P19 — Cross-bank ensemble (FedAvg style): how does it relate to deep ensembles?"
        scenario={<><em>Discriminating insight: FedAvg averages WEIGHTS (in parameter space) across banks; deep ensembles average PREDICTIONS (in output space) across members. Different operations. Output-space averaging preserves diversity; weight-space averaging loses it (parameters that disagree across banks cancel). Don't conflate.</em><br/><br/>Distinguish.</>}
        options={[
          {key:"a", text:"Same operation."},
          {key:"b", text:"DIFFERENT operations. FedAvg (McMahan et al. 2017 federated learning): server averages WEIGHTS theta_bank from M client banks: theta_global = (1/M) sum theta_bank. Output prediction: p(y|x, theta_global). Single-model inference at deploy. Weight-space averaging is well-defined only when all members are in the same loss-landscape basin; if banks land in different basins (likely without coordination), averaging produces a parameter that is between the basins and worse than any individual member (Wortsman et al. 2022 'Model Soups' explored this). Deep ensemble (Lakshminarayanan et al. 2017): independently-trained models, AVERAGE PREDICTIONS at inference: p_ens(y|x) = (1/M) sum p_m(y|x, theta_m). Output-space averaging works regardless of which basin each member is in — different members can be functionally diverse and the average still works. The two are different operations with different properties; do not conflate.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"FedAvg is a deep ensemble."},
        ]}
        trap={<>(a)(c)(d) miss the operation.</>}
        lens={<>FedAvg: average weights (single model deploy). Deep ensemble: average predictions (M models deploy).</>}
        stretch={<>When does weight averaging match prediction averaging?</>}
      />

      <VIS.TrapProblem id="de-p20" difficulty="medium" title="P20 — When NOT to use deep ensembles for fraud."
        scenario={<><em>Discriminating insight (concept-specific): (1) serving SLA tight (Mx infeasible); (2) novel-MO concern low (mature payment vertical with stable patterns); (3) downstream consumer cannot use a variance signal (UI / regulator wants one number); (4) M-fold training cost prohibitive (large model, limited GPU). Concept-specific.</em><br/><br/>Skip.</>}
        options={[
          {key:"a", text:"Always use ensembles."},
          {key:"b", text:"Skip deep ensembles when: (1) Serving SLA is tight and Mx inference at 100K QPS is infeasible at your GPU budget — distill or use BatchEnsemble or accept single-model. (2) Novel-MO concern is low (mature payment vertical with stable fraudster behavior; e.g., card-present chip transactions where the attack surface is well understood); the OOD-detection gain is small. (3) Downstream consumers cannot use a variance signal — UI displays one probability; regulator wants a single decision; in those cases ensembles still help (mean is better calibrated) but the unique value (disagreement signal) is wasted. (4) M-fold training is too expensive for the model size and team GPU budget; especially for very large models where 5x training cost is months. (5) Strong distillation pipeline already exists — a distilled single net captures most of the calibration gain at 1x inference. Production fraud: default to ensembles when novel-MO risk is high; reconsider when serving capacity is the binding constraint.", correct:true},
          {key:"c", text:"Always single model."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>Skip when SLA tight / mature vertical / variance not consumed / training cost prohibitive.</>}
        stretch={<>What's the break-even between ensemble and distilled single?</>}
      />

      <VIS.TrapProblem id="de-p21" difficulty="hard" title="P21 — Skeptic: 'Just retrain the single model when accuracy drops. Why monitor variance?'"
        scenario={<><em>Discriminating insight: retraining is a LAGGING action — you wait for the labels (chargebacks, 30-90 days). Ensemble variance is a LEADING signal — high variance on new transactions PRE-LABEL flags novel-MOs early, enabling intervention before the breach. The variance signal closes the feedback-lag gap.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Skeptic is right."},
          {key:"b", text:"Variance is a LEADING signal; retraining-on-accuracy-drop is LAGGING. In fraud, labels (chargebacks, confirmed fraud reports) lag the transaction by 30-90 days; by the time accuracy drops, the novel MO has been exploited for 1-3 months and you have already lost millions. The ensemble variance spikes IMMEDIATELY on novel transactions, BEFORE any labels arrive — because the disagreement is computed from the M members' predictions on the new input, not on Y. So variance is a real-time anomaly detector for distribution shift; it lets you route novel transactions to human review the same day they appear, prevent the breach, and gather labels FASTER (humans label the queued items in days, not months) to enable rapid retraining. The variance signal closes the feedback-lag gap that pure retraining cannot. For latency-sensitive fraud (card-present, ATO), this is the operational advantage of ensembles over single-model + retrain-on-degradation.", correct:true},
          {key:"c", text:"Variance is useless."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the leading-vs-lagging distinction.</>}
        lens={<>Variance: leading. Accuracy-drop retrain: lagging. Closes the chargeback-feedback gap.</>}
        stretch={<>What's the typical label lag for card-not-present fraud?</>}
      />

      <VIS.TrapProblem id="de-p22" difficulty="hard" title="P22 — In one sentence, THE unique mechanism of deep ensembles?"
        scenario={<><em>Discriminating insight: M INDEPENDENTLY-INITIALIZED COPIES OF THE SAME ARCHITECTURE TRAINED INDEPENDENTLY; PREDICTIONS AVERAGED; VARIANCE ACROSS MEMBERS = EPISTEMIC UNCERTAINTY. The disagreement on OOD inputs is the signal a single model — however large — cannot produce. Strip &quot;independent init&quot; or &quot;disagreement as epistemic&quot; and answer collapses to bagging / stacking / single-model.</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"It is just bagging."},
          {key:"b", text:"M (typically 5-10) INDEPENDENTLY-INITIALIZED COPIES of the SAME ARCHITECTURE TRAINED INDEPENDENTLY on the SAME training data (random init seed is the only difference; same data, same hyperparams). At inference: PREDICTIONS AVERAGED, p_ens = (1/M) sum p_m. The VARIANCE across members captures EPISTEMIC UNCERTAINTY — what the model does NOT know — distinct from aleatoric (irreducible noise in Y). On training-distribution inputs members agree (low variance, confident average); on OOD inputs members extrapolate differently (high variance, ensemble correctly less confident). This DISAGREEMENT-AS-EPISTEMIC interpretation is what a single deep network — however large — cannot give and what motivates the 5-10x cost. NOT bagging (bagging resamples data per base; ensembles vary init); NOT stacking (stacking has meta-learner; ensembles use simple mean). Lakshminarayanan et al. NeurIPS 2017.", correct:true},
          {key:"c", text:"It is calibration."},
          {key:"d", text:"It is stacking."},
        ]}
        trap={<>(a)(c)(d) miss the init-and-disagreement mechanism.</>}
        lens={<>M independent-init copies; mean prediction; variance-across-members = epistemic.</>}
        stretch={<>Why does a single big model not give epistemic uncertainty?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/1612.01474" target="_blank" rel="noopener"><strong>Lakshminarayanan, Pritzel, Blundell — Simple and Scalable Predictive Uncertainty Estimation</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2017, paper)</span><br/>The deep ensembles paper. Section 4 ablates bootstrap, init, and the variance regularizer; the key empirical finding.</li>
        <li><a href="https://arxiv.org/abs/1906.02530" target="_blank" rel="noopener"><strong>Ovadia et al. — Can You Trust Your Model's Uncertainty?</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2019, paper)</span><br/>Empirical benchmark of deep ensembles vs MC dropout vs BNN under distribution shift. Ensembles dominate; required reading.</li>
        <li><a href="https://arxiv.org/abs/2002.08791" target="_blank" rel="noopener"><strong>Wilson & Izmailov — Bayesian Deep Learning and a Probabilistic Perspective of Generalization</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2020, paper)</span><br/>The Bayesian justification: deep ensembles approximate multi-modal weight posterior; they outperform VI because multimodality is the main signal.</li>
        <li><a href="https://blog.evjang.com/2018/01/uncertainty.html" target="_blank" rel="noopener"><strong>Eric Jang — A Beginner's Guide to Uncertainty Estimation</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Clear practitioner walkthrough of epistemic vs aleatoric, ensembles vs dropout. Best 20-minute primer.</li>
        <li><a href="https://arxiv.org/abs/2002.06715" target="_blank" rel="noopener"><strong>Wen, Tran, Ba — BatchEnsemble</strong></a> <span style={{color:"#64748b", fontSize:14}}>(ICLR 2020, paper)</span><br/>Low-cost ensemble alternative: share weights with per-member low-rank residuals. Practical when full ensembles are too expensive at serving.</li>
      </ul>
    </VIS.Section>
  </main>
