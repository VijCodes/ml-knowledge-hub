      />

      <VIS.TrapProblem id="mcd-p6" difficulty="hard" title="P6 — Where in the network do you apply MC dropout?"
        scenario={<><em>Discriminating insight: dropout applied AFTER each fully-connected layer (and after attention/FFN blocks in transformers). NOT just at the input or just at the output. The Gal-Ghahramani derivation requires dropout in every layer. For fraud transformers: between FFN sublayers; for MLPs: between every dense layer.</em><br/><br/>Where.</>}
        options={[
          {key:"a", text:"Only at input."},
          {key:"b", text:"Dropout applied between EVERY hidden layer for the Gal-Ghahramani variational derivation to hold — input dropout, after each dense layer in an MLP, after each FFN sublayer and attention output in a transformer, after each residual block in a ResNet. Skipping layers gives a degenerate variational q that does not approximate the deep-GP posterior. Practitioner gotcha: BatchNorm + dropout interaction (Ioffe and Szegedy 2015; Li et al. 2019) — BN running statistics computed during training with dropout-on are slightly biased; at inference with MC dropout, BN should be in eval mode (frozen population stats) but dropout in train mode (sampling). Use the explicit framework pattern (TF Keras: training=True on Dropout layers only; PyTorch: model.eval() then model.apply(lambda m: m.train() if isinstance(m, nn.Dropout) else None)). Forgetting this is the most common MC dropout implementation bug.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Only at output."},
        ]}
        trap={<>(a)(c)(d) miss the dense placement.</>}
        lens={<>Dropout between every hidden layer. BN in eval, dropout in train at inference.</>}
        stretch={<>What about LayerNorm + dropout?</>}
      />

      <VIS.TrapProblem id="mcd-p7" difficulty="hard" title="P7 — Concept-specific misattribution: MC dropout variance is HIGH on training data. Cause?"
        scenario={<><em>Discriminating insight (concept-specific): (1) dropout rate too high (network's variational q too spread); (2) network underfit (predictions noisy everywhere); (3) implementation bug — BN running in train mode at inference; (4) heteroscedastic noise region (high aleatoric). Concept-specific.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"Concept-specific causes for high MC-dropout variance on training data. (1) Dropout rate too high — p_dropout = 0.5 in a deep network injects huge mask variance; the variational q becomes too spread; MC variance is large everywhere (including training data). Fix: reduce p_dropout to 0.1-0.2 for inference-time sampling; or train with one dropout rate and recalibrate at inference with a smaller one (concrete dropout — Gal et al. 2017). (2) Network underfit — training did not converge; predictions noisy on training data; MC variance picks up the unconverged spread. Fix: train longer or larger model. (3) Implementation bug — BatchNorm in train mode at inference produces different statistics per pass, inflating variance. Fix: BN eval mode + dropout train mode (see P6). (4) Heteroscedastic noise — some training rows have high inherent label noise; aleatoric variance large; MC dropout picks this up correctly. Diagnostic: rank training points by MC variance and inspect the high-variance ones.", correct:true},
          {key:"c", text:"Use Platt."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Dropout-rate / underfit / BN-bug / aleatoric. Each concept-specific.</>}
        stretch={<>Concrete dropout — when to use?</>}
      />

      <VIS.TrapProblem id="mcd-p8" difficulty="hard" title="P8 — Aleatoric vs epistemic in MC dropout."
        scenario={<><em>Discriminating insight: MC dropout variance is the EPISTEMIC approximation. Aleatoric requires the network to predict its own noise (heteroscedastic head): mean and log-variance heads. Total predictive variance = epistemic + aleatoric. Kendall and Gal (NeurIPS 2017) formalize.</em><br/><br/>Decompose.</>}
        options={[
          {key:"a", text:"MC dropout gives both directly."},
          {key:"b", text:"MC dropout variance approximates EPISTEMIC uncertainty only. For ALEATORIC uncertainty (irreducible noise in Y given X), the network must explicitly predict its own noise. Standard pattern (Kendall and Gal NeurIPS 2017 'What Uncertainties Do We Need in Bayesian Deep Learning for Computer Vision?'): two output heads — a MEAN head mu(x) and a LOG-VARIANCE head log sigma^2(x); train with the Gaussian negative-log-likelihood loss L = (y - mu(x))^2 / (2 sigma^2(x)) + (1/2) log sigma^2(x); at inference, sigma^2(x) is the aleatoric variance. With MC dropout on top: the M passes give M (mu_m, sigma_m^2) pairs; total predictive variance = Var_m(mu_m) [EPISTEMIC] + E_m(sigma_m^2) [ALEATORIC]. For binary fraud, the analog uses Beta or logistic heads with a temperature parameter. Always decompose: drift / novel-MO is epistemic; intrinsic high-variance regions (chargeback noise) is aleatoric. Different downstream actions.", correct:true},
          {key:"c", text:"Aleatoric is undefined."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the decomposition.</>}
        lens={<>MC variance = epistemic. Add heteroscedastic head for aleatoric. Total = sum.</>}
        stretch={<>Why decompose? Different actions per type.</>}
      />

      <VIS.TrapProblem id="mcd-p9" difficulty="hard" title="P9 — Practitioner: 'I'll just add Gaussian noise to weights at inference'. Diagnose."
        scenario={<><em>Discriminating insight: SUPERFICIALLY similar; not equivalent to MC dropout. The dropout-as-VI derivation depends on the specific Bernoulli-mask form on activations with weight decay; Gaussian-on-weights gives a different variational q (factorized Gaussian) which corresponds to a different approximation. Both Bayesian-flavored; not the same algorithm.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Same thing."},
          {key:"b", text:"Superficially similar; not equivalent. Adding Gaussian noise to weights at inference is a DIFFERENT Bayesian approximation: it corresponds to a factorized Gaussian variational posterior q(theta) = product N(theta_i; theta_MAP_i, sigma^2). This is closer to Bayes-by-Backprop (Blundell et al. 2015) — but Bayes-by-Backprop trains explicit per-weight variance parameters and minimizes the VI loss; just adding noise at inference without trained variances is using arbitrary Gaussian widths and gives an unprincipled variance estimate. MC dropout's Bernoulli-mask-on-activations with weight decay corresponds to a SPECIFIC dropout-induced variational posterior; the Gal-Ghahramani derivation makes this rigorous. Different variational families, different approximation properties. Practical guidance: use MC dropout if you trained with dropout; train Bayes-by-Backprop if you want explicit per-weight variances; deep ensemble for the multimodal approximation that beats both empirically.", correct:true},
          {key:"c", text:"They are identical."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) collapse the variational families.</>}
        lens={<>Dropout = Bernoulli mask on activations. Gaussian noise on weights = different family. Both Bayes-flavored.</>}
        stretch={<>When does Bayes-by-Backprop dominate MC dropout?</>}
      />

      <VIS.TrapProblem id="mcd-p10" difficulty="hard" title="P10 — Calibration: does MC dropout fix overconfidence?"
        scenario={<><em>Discriminating insight: partial. MC dropout reduces in-distribution overconfidence (mean over M masks smooths predictions) — modest ECE gain. On OOD, MC dropout still UNDER-COVERS; ECE degrades sharply (Ovadia et al. 2019). Combine with temperature scaling on top to hit a target ECE.</em><br/><br/>Calibrate.</>}
        options={[
          {key:"a", text:"MC dropout calibrates perfectly."},
          {key:"b", text:"Partial improvement. On in-distribution inputs, MC dropout's mean over M masks is more conservative than a single deterministic pass (the masks induce slight prediction variance that smooths the average), giving a modest ECE improvement vs single-model (Gal and Ghahramani 2016). On OOD, MC dropout SYSTEMATICALLY UNDER-COVERS — the under-coverage in the variance translates to over-confident probability estimates, and ECE on OOD is often WORSE than the single-model baseline (Ovadia et al. 2019 Section 5). Production: layer temperature scaling on top of MC dropout to hit a target in-distribution ECE; or layer conformal prediction for coverage guarantee. Do NOT rely on MC dropout alone for calibration under shift. Deep ensembles dominate MC dropout on OOD calibration — the multi-modal posterior gives proper conservativeness.", correct:true},
          {key:"c", text:"MC dropout makes calibration worse."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a) overstates; (c) understates; (d) wrong.</>}
        lens={<>In-dist: modest ECE gain. OOD: under-covers, worse ECE. Layer temperature or conformal on top.</>}
        stretch={<>How does temperature scaling interact with MC dropout?</>}
      />

      <VIS.TrapProblem id="mcd-p11" difficulty="medium" title="P11 — Production: when to default to MC dropout over deep ensembles."
        scenario={<><em>Discriminating insight: when training cost is the binding constraint (single big model already at GPU budget; cannot afford Mx training). Or when uncertainty is needed as a secondary signal (primary OOD detection from elsewhere). NOT when novel-MO detection is the main goal.</em><br/><br/>Pick.</>}
        options={[
          {key:"a", text:"Always MC dropout."},
          {key:"b", text:"Default to MC dropout over deep ensembles when: (1) training cost is the binding constraint — a single model already pushes GPU/time budget, and Mx training is infeasible. MC dropout is 1x training (you already use dropout for regularization). (2) Uncertainty is a SECONDARY signal — primary OOD detection comes from an isolation-forest or DSVDD or conformal layer; MC dropout is just an extra signal. (3) Inference latency budget allows Mx forward passes with vectorized masks. (4) The deployment domain is largely in-distribution (mature payment vertical with stable fraud patterns); novel-MO concern is low. Default to deep ensembles when: novel-MO concern is high; serving capacity allows Mx; the cost of training Mx is acceptable. Hybrid: a small ensemble (M = 3) where each member uses MC dropout at inference (M' = 10 masks) — captures multi-modal AND within-mode variance; production fraud teams do this.", correct:true},

      <VIS.TrapProblem id="mcd-p12" difficulty="hard" title="P12 — Concept-specific misattribution: MC dropout variance is FLAT across all inputs. Cause?"
        scenario={<><em>Discriminating insight (concept-specific): (1) dropout rate too SMALL (mask barely changes prediction); (2) network too large relative to dropout (most paths preserve signal); (3) input has been preprocessed to a constant (data pipeline bug); (4) the dropout layers are at depths where they do not affect the output strongly. Concept-specific.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"Concept-specific causes for flat MC variance (no signal). (1) Dropout rate too small — p_dropout = 0.05 barely changes the mask between passes; predictions are nearly deterministic; variance is small everywhere. Fix: increase p_dropout to 0.15-0.25 at inference (or use concrete dropout to learn the right rate). (2) Network too large relative to dropout — with high redundancy in hidden representations, masking out 20% of units does not change the output meaningfully; the variational q is too tight. Diagnostic: compare prediction with all-units-on vs MC mean; if essentially identical, the network has memorized through the dropout. (3) Pipeline bug — inputs preprocessed to a constant value (NaN-to-zero, batch normalization with broken stats); all M passes see the same input; variance zero or trivial. (4) Dropout layers shallowly placed — if dropout only at the input layer in a deep transformer, the deep layers wash out the mask; variance vanishes. Place dropout at every hidden layer (see P6).", correct:true},

      <VIS.TrapProblem id="mcd-p13" difficulty="medium" multiSelect title="P13 — Decoys: which are NOT MC dropout? (3 correct)"

      <VIS.TrapProblem id="mcd-p14" difficulty="hard" title="P14 — Concept-specific misattribution: MC dropout works in-distribution but misses novel-MO. Cause?"
        scenario={<><em>Discriminating insight (concept-specific): this is the SYSTEMATIC under-coverage failure mode — the variational q is unimodal around the trained MAP, so novel-MO (which probes regions other modes of the true posterior would disagree on) gets a deceptively low variance. MC dropout cannot fix this; switch to deep ensembles for novel-MO detection.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Use bigger model."},
          {key:"b", text:"This is THE characteristic MC dropout failure mode. The variational q approximating the posterior is restricted to a unimodal family around theta_MAP — sampling Bernoulli masks explores nearby weight configurations within one basin, not across basins. Novel-MO inputs probe regions where multiple basins of the TRUE posterior would disagree (different basins extrapolate the novel pattern differently). MC dropout only knows about its one basin, so it returns a CONFIDENTLY-LOW variance — the model thinks it knows. Action: this is not a bug to fix in MC dropout, it is a FUNDAMENTAL property of the approximation. Switch to deep ensembles (multi-modal exploration), or layer a separate OOD detector (isolation forest, autoencoder reconstruction error, conformal nonconformity score) on top. Do NOT trust MC dropout as the SOLE novel-MO detector. Combine: MC dropout for in-distribution uncertainty + isolation forest for OOD detection.", correct:true},

          {key:"d", text:"Use Platt."},

        stretch={<>How to layer isolation forest on top?</>}
      />

      <VIS.TrapProblem id="mcd-p15" difficulty="hard" title="P15 — Concrete dropout: what does it add?"
        scenario={<><em>Discriminating insight: concrete dropout (Gal et al. NeurIPS 2017) makes p_dropout LEARNABLE per layer via a continuous relaxation. Optimizes the variational q's variance jointly with the network weights. Eliminates the manual tuning of p_dropout for the inference-time variance to be calibrated.</em><br/><br/>Add.</>}
        options={[
          {key:"a", text:"Concrete dropout is identical."},
          {key:"b", text:"Concrete dropout (Gal, Hron, Kendall NeurIPS 2017) makes the dropout RATE p LEARNABLE — instead of fixing p = 0.2 by hand, the network learns a separate p_l for each layer l, jointly with the weights, by minimizing the variational lower bound. Mechanism: replace the discrete Bernoulli mask with a CONCRETE (continuous) relaxation that is differentiable — the Gumbel-sigmoid trick. At inference, sample concrete masks (or take the limit to recover Bernoulli) and average M passes. Benefit: the dropout rate per layer is calibrated to the data, eliminating the manual hyperparameter tuning that vanilla MC dropout requires for the variance to be at the right magnitude. Empirically (Gal et al. 2017): concrete dropout's variance estimates are better calibrated to OOD shift than vanilla MC dropout with fixed p. Still suffers the unimodal-q limitation; still under-covers severe OOD vs deep ensembles. The right pick when you need cheap uncertainty AND want the dropout rate auto-tuned.", correct:true},
          {key:"c", text:"Use Platt."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the learnable-p extension.</>}
        lens={<>Concrete dropout: learn p_l per layer. Eliminates manual tuning. Still unimodal q.</>}
        stretch={<>How does Gumbel-sigmoid relax Bernoulli?</>}
      />

      <VIS.TrapProblem id="mcd-p16" difficulty="medium" title="P16 — Junior: 'MC dropout is just running the model with dropout on'. Refute."
        scenario={<><em>Discriminating insight: half right but misses the BAYESIAN INTERPRETATION. Yes, mechanically you run with dropout-on. The substance is treating the M passes as Monte-Carlo samples from a VARIATIONAL POSTERIOR PREDICTIVE — Gal-Ghahramani's derivation. Without the interpretation, you just have noisy inference, not uncertainty quantification.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Junior is right."},
          {key:"b", text:"Half right on mechanics, completely missing the substance. YES, you run the model with dropout enabled at inference. But the POINT is not 'noisy inference' — it's that the M predictions are MONTE-CARLO SAMPLES FROM AN APPROXIMATE BAYESIAN POSTERIOR PREDICTIVE distribution (Gal and Ghahramani 2016). The MEAN of the M passes approximates the posterior predictive mean; the VARIANCE of the M passes approximates the posterior predictive variance (= epistemic uncertainty). This interpretation is what justifies treating the variance as a meaningful uncertainty signal. Without it, you just have noisy inference and the variance is a measurement artifact. The variational-inference theory says: dropout-trained-with-weight-decay = VI in a deep GP; dropout-at-inference samples from that VI posterior. Without this connection, MC dropout is dropout-at-inference is a hack; with it, it's a principled (if narrow) Bayesian method.", correct:true},

        stretch={<>Without VI theory, what is the variance?</>}
      />

      <VIS.TrapProblem id="mcd-p17" difficulty="hard" title="P17 — Skeptic: 'Just use a deep ensemble — MC dropout is strictly worse'. Refute partially."
        scenario={<><em>Discriminating insight: skeptic is RIGHT on OOD quality and uncertainty calibration; WRONG on cost-benefit at constrained compute. MC dropout's value is at 1x training cost — when you can't afford Mx training, it provides a usable in-distribution epistemic signal cheaply. For OOD, ensembles win.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Skeptic is fully right."},
          {key:"b", text:"Partially right. Deep ensembles strictly dominate MC dropout on (a) OOD detection — multi-modal vs unimodal posterior approximation; (b) calibration under shift — Ovadia et al. 2019 showed this empirically; (c) interpretability — disagreement across models is intuitive. But MC dropout DOMINATES deep ensembles on cost — 1x training vs Mx training. For training-compute-constrained scenarios (very large single model, limited GPU, deadline pressure, frequent retraining), 1x training is the binding constraint and MC dropout is the only feasible Bayesian-flavored option. Empirically (Ovadia et al. 2019), MC dropout's in-distribution calibration is within 10-20% of deep ensembles. Recommend: use MC dropout when training-time cost is the constraint; use ensembles when you can afford Mx training AND novel-MO detection matters; use the hybrid (small ensemble of MC-dropout members) when both gains matter.", correct:true},

      <VIS.TrapProblem id="mcd-p18" difficulty="hard" title="P18 — MC dropout variance for a regression head."
        scenario={<><em>Discriminating insight: same machinery, regression target. M forward passes give M predicted y_m's; variance = Var_m[y_m]. Add heteroscedastic output (predict log-variance directly) for aleatoric. Total predictive variance = epistemic (Var_m of mean) + aleatoric (E_m of sigma^2).</em><br/><br/>Regression.</>}
        options={[
          {key:"a", text:"Only for classification."},
          {key:"b", text:"MC dropout extends naturally to regression. Mechanism: train a network with dropout to predict a scalar y (e.g., fraud loss amount in dollars, not a probability); at inference, take M forward passes with different masks, get M predicted y_m; MC mean = (1/M) sum y_m, MC variance = sample variance of y_m. The MC variance is the EPISTEMIC uncertainty approximation (under the unimodal-q caveat). For ALEATORIC, add a heteroscedastic head that predicts log sigma^2(x) alongside the mean (Kendall and Gal NeurIPS 2017): train with Gaussian NLL loss L = (y - mu(x))^2 / (2 sigma^2(x)) + (1/2) log sigma^2(x). At inference: M passes give M (mu_m, sigma_m^2); total predictive variance = Var_m(mu_m) [epistemic] + E_m(sigma_m^2) [aleatoric]. For fraud regression on loss amount, the aleatoric part captures intrinsic variability (same-looking transactions have different loss amounts) and the epistemic part flags novel-MO.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip MC dropout."},
        ]}
        trap={<>(a)(c)(d) miss the generality.</>}
        lens={<>Regression: MC variance + heteroscedastic head. Total = epistemic + aleatoric.</>}
        stretch={<>What if y has a Poisson distribution?</>}
      />

      <VIS.TrapProblem id="mcd-p19" difficulty="medium" title="P19 — Real-time fraud at 100K QPS: is MC dropout feasible?"
        scenario={<><em>Discriminating insight: with vectorized masks (batch M dropout patterns into one forward pass), the cost is 1-2x not Mx. Memory grows by Mx for the mask tensors but compute is largely parallel. Production fraud teams use this — concrete dropout + vectorized inference + 10-mask batches.</em><br/><br/>Feasibility.</>}
        options={[
          {key:"a", text:"Infeasible at scale."},
          {key:"b", text:"FEASIBLE with vectorized inference. Naive implementation: M sequential forward passes, each with a different dropout mask = Mx latency = infeasible at 100K QPS. Vectorized implementation: stack M different masks into a single batched tensor; one forward pass through the network processes all M masks in parallel; total latency ~1-2x single inference (depending on activation memory bandwidth). Memory cost: Mx the activation tensors during one pass; GPU memory constraint. M = 10 is a common production sweet spot. For 100K QPS fraud: batch-vectorized MC dropout fits within the SLA; the variance signal is computed in parallel. Tooling: PyTorch's nn.Dropout supports the train-mode-at-inference pattern; TF Keras requires explicit training=True. Production fraud teams use this in tabular transformers; concrete dropout (learnable p) plus vectorized inference is the modern pattern.", correct:true},
          {key:"c", text:"Always infeasible."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the vectorization.</>}
        lens={<>Vectorized masks: 1-2x latency, Mx memory. M=10 fits 100K QPS.</>}
        stretch={<>What's the activation memory cost trade-off?</>}
      />

      <VIS.TrapProblem id="mcd-p20" difficulty="hard" title="P20 — Concept-specific misattribution: MC dropout variance LOWER than deep ensemble variance on same input. Why?"
        scenario={<><em>Discriminating insight (concept-specific): MC dropout's variational q is UNIMODAL (around the trained MAP); deep ensemble approximates MULTI-MODAL posterior. Same input under MC dropout sees variance from one basin; under ensemble sees variance across basins. Ensemble variance is upper-bounded by total posterior variance; MC dropout's is upper-bounded by within-basin variance — strictly smaller. NOT a bug.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Bug in MC dropout."},
          {key:"b", text:"NOT a bug — it's the systematic property of the unimodal-q approximation. MC dropout's variational q is restricted to a Bernoulli-mask family around theta_MAP (single basin); the variance it reports is the variance of predictions WITHIN that basin. Deep ensemble's M independent inits explore multiple basins of the loss landscape; the variance across members captures the BETWEEN-BASIN variance, which is MUCH LARGER on OOD inputs (the basins extrapolate differently). Result: same input, MC dropout reports a SMALLER variance than deep ensemble; both are underestimates of the true posterior variance, but ensemble is closer. On training-distribution inputs, basins agree, so ensemble variance is also small; on OOD inputs, basins disagree, so ensemble variance grows while MC dropout's stays small (its one basin still extrapolates one way). Ovadia et al. 2019 quantified this gap empirically. The remedy is to use ensembles when novel-MO matters; do not try to 'fix' MC dropout's variance with rescaling.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt."},
        ]}
        trap={<>(a)(c)(d) miss the property.</>}
        lens={<>Unimodal q &lt; multimodal posterior. MC dropout reports within-basin; ensemble reports between-basin. Not a bug.</>}
        stretch={<>How would you rescale MC dropout to match ensemble variance?</>}
      />

      <VIS.TrapProblem id="mcd-p21" difficulty="hard" title="P21 — In one sentence, THE unique mechanism of MC dropout?"
        scenario={<><em>Discriminating insight: KEEP DROPOUT ENABLED AT INFERENCE, M forward passes per input, M predictions = MC samples from an APPROXIMATE BAYESIAN POSTERIOR PREDICTIVE (variational inference equivalence — Gal-Ghahramani 2016). Single model, ~Mx forward passes. Systematic OOD under-coverage. NOT regularization-at-inference (that is deterministic with weight scale); NOT a deep ensemble (single model, no independent training). Strip "dropout-at-inference" or "variational approximation" and answer collapses.</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"It is regularization."},
          {key:"b", text:"KEEP DROPOUT ENABLED AT INFERENCE; take M (typically 10-30) FORWARD PASSES with INDEPENDENT random dropout masks per pass; TREAT THE M PREDICTIONS AS MONTE-CARLO SAMPLES FROM AN APPROXIMATE BAYESIAN POSTERIOR PREDICTIVE distribution. Gal and Ghahramani (ICML 2016) proved: dropout-trained-with-weight-decay is equivalent to variational inference in a deep Gaussian Process with a specific approximate posterior; sampling at inference samples from that posterior. Mean prediction = (1/M) sum p_m. Variance = MC variance = APPROXIMATE EPISTEMIC UNCERTAINTY. Cost: 1x training, ~Mx forward passes through ONE network (vectorize masks for ~1.x latency). Critical failure mode: the unimodal variational q SYSTEMATICALLY UNDER-COVERS OOD inputs because it cannot represent the multi-modal weight posterior. NOT regularization-at-inference (the deterministic version with weight scaling); NOT a deep ensemble (single model, no independent training).", correct:true},
          {key:"c", text:"It is a deep ensemble."},
          {key:"d", text:"It is calibration."},
        ]}
        trap={<>(a)(c)(d) miss the dropout-at-inference-as-VI mechanism.</>}
        lens={<>Dropout ON at inference; M MC samples from variational posterior. Systematic OOD under-coverage.</>}
        stretch={<>How does this compare to a true BNN's posterior?</>}
      />

      <VIS.TrapProblem id="mcd-p22" difficulty="medium" title="P22 — When NOT to use MC dropout for fraud uncertainty."
        scenario={<><em>Discriminating insight (concept-specific): (1) primary OOD detector — under-coverage; (2) novel-MO concern is the main use case — use ensembles; (3) network did not use dropout in training (cannot retrofit); (4) downstream consumer needs strict coverage guarantee — use conformal. Concept-specific.</em><br/><br/>Skip.</>}
        options={[
          {key:"a", text:"Always use MC dropout."},
          {key:"b", text:"Skip MC dropout when: (1) IT IS THE PRIMARY OOD DETECTOR for novel-MO fraud — the unimodal-q approximation under-covers exactly where you need it. Use deep ensembles or layer an isolation forest / DSVDD / conformal nonconformity score on top. (2) The model was NOT trained with dropout (e.g., gradient-boosting models, pure transformer with no FFN dropout) — you cannot retrofit MC dropout meaningfully; train a dropout-enabled net or use a different uncertainty tool. (3) The downstream consumer needs a STRICT COVERAGE GUARANTEE (regulatory mandate to cover 95% of fraud) — MC dropout has no coverage theorem; use conformal prediction. (4) The serving SLA cannot absorb even vectorized Mx forward passes (sub-10ms tabular fraud at 1M QPS) — use a single-model with post-hoc Platt + isotonic + threshold tuning. (5) The training pipeline already uses BatchNorm extensively without careful BN-vs-dropout-mode handling at inference — the implementation bugs are common.", correct:true},
          {key:"c", text:"Never use MC dropout."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>Skip when primary OOD / no dropout in training / strict coverage needed / sub-10ms SLA.</>}
        stretch={<>How to layer conformal on top of MC dropout?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/1506.02142" target="_blank" rel="noopener"><strong>Gal & Ghahramani — Dropout as a Bayesian Approximation</strong></a> <span style={{color:"#64748b", fontSize:14}}>(ICML 2016, paper)</span><br/>The original MC dropout paper. Sections 2-3 derive the deep-GP equivalence; Section 4 the variational interpretation.</li>
        <li><a href="https://arxiv.org/abs/1906.02530" target="_blank" rel="noopener"><strong>Ovadia et al. — Can You Trust Your Model's Uncertainty?</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2019, paper)</span><br/>Empirical benchmark: MC dropout vs deep ensembles vs BNN under distribution shift. Quantifies MC dropout's OOD under-coverage.</li>
        <li><a href="https://arxiv.org/abs/1703.04977" target="_blank" rel="noopener"><strong>Kendall & Gal — What Uncertainties Do We Need? (Aleatoric + Epistemic)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2017, paper)</span><br/>The decomposition of total predictive variance into aleatoric + epistemic via heteroscedastic head + MC dropout. Reference for the decomposition pattern.</li>
        <li><a href="http://yarin.co/blog" target="_blank" rel="noopener"><strong>Yarin Gal — Blog and PhD thesis</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Practitioner walk-through of MC dropout's derivation, intuition, and limits. Best for building intuition beyond the paper.</li>
        <li><a href="https://arxiv.org/abs/1705.07832" target="_blank" rel="noopener"><strong>Gal, Hron, Kendall — Concrete Dropout</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2017, paper)</span><br/>Learnable dropout rate per layer via continuous relaxation. Eliminates the manual p tuning that limits vanilla MC dropout in production.</li>
      </ul>
    </VIS.Section>
