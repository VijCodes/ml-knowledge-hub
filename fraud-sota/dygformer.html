  function Mermaid({ chart, id }) {
    const ref = React.useRef(null);
    const autoId = React.useId();
    React.useEffect(() => {
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js")
        .then(() => {
          if (!window.mermaid._inited) {
            window.mermaid._inited = true;
            // trusted-author content; "loose" enables click handlers + HTML labels in mermaid
            // trusted-author content; "loose" enables click handlers + HTML labels in mermaid.
            // flowchart.padding + nodePadding give descenders (g, p, y, j, q) room to render
            // inside diamond/rectangle nodes — without this Mermaid 10 clips them at the bottom edge.
            window.mermaid.initialize({
              startOnLoad: false,
              theme: "default",
              securityLevel: "loose",
              flowchart: { padding: 18, nodeSpacing: 50, rankSpacing: 60, useMaxWidth: true, htmlLabels: true },
              themeVariables: { fontSize: "14px" }
            });
          }
          return window.mermaid.render((id || "mmd") + "-" + autoId.replace(/:/g, ""), chart);
        })
        .then(({ svg }) => {
          if (cancelled || !ref.current) return;
          ref.current.innerHTML = svg;
          // POST-PROCESS to fix Mermaid 10 descender clipping (g, p, y, j, q).
          // Mermaid sizes foreignObjects to the font em-box, which does NOT include
          // descender depth. Grow each foreignObject by 12px (6 top + 6 bottom) so
          // descenders render fully. Also grow rectangle node fills to match so the
          // colored box doesn't show a thin sliver above/below the text.
          const svgEl = ref.current.querySelector("svg");
          if (!svgEl) return;
          svgEl.querySelectorAll("foreignObject").forEach((fo) => {
            const h = parseFloat(fo.getAttribute("height") || "0");
            const y = parseFloat(fo.getAttribute("y") || "0");
            fo.setAttribute("height", String(h + 12));
            fo.setAttribute("y", String(y - 6));
          });
          svgEl.querySelectorAll("g.node > rect").forEach((rect) => {
            const h = parseFloat(rect.getAttribute("height") || "0");
            const y = parseFloat(rect.getAttribute("y") || "0");
            rect.setAttribute("height", String(h + 12));
            rect.setAttribute("y", String(y - 6));
          });
          // Diamonds use <polygon points="..."/>. Expand vertically by translating
          // top and bottom vertices outward from the centroid by 6px each.
          svgEl.querySelectorAll("g.node > polygon").forEach((poly) => {
            const pts = (poly.getAttribute("points") || "").trim().split(/\s+/)
              .map((p) => p.split(",").map(parseFloat));
            if (pts.length < 3 || pts.some((p) => p.length < 2 || p.some(isNaN))) return;
            const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;
            const grown = pts.map(([x, py]) => [x, py + (py < cy ? -6 : 6)]);
            poly.setAttribute("points", grown.map((p) => p.join(",")).join(" "));
          });
        })
        .catch((e) => { if (ref.current) ref.current.textContent = "[mermaid error] " + e; });
      return () => { cancelled = true; };
    }, [chart, id, autoId]);
    return h("div", { ref, className: "vis-mermaid", style: { margin: "16px 0", textAlign: "center" } });
  }

  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.

  // autoGloss: scan a string for terms in window.__VIS_GLOSSARY (set by exporter
  // before vis-components.js loads). Returns a React children array with each
  // matched term wrapped in the same <span class="vis-term"> the Term component
  // emits. First-mention only per call. Longest-match-first so "candidate
  // generation" beats "candidate" alone.
  let _glossPattern = null;
  let _glossLookup = null;
  function _buildGlossPattern() {
    const g = (typeof window !== "undefined" && window.__VIS_GLOSSARY) || {};
    const keys = Object.keys(g).filter(k => k && !k.startsWith("_"));
    if (!keys.length) { _glossPattern = false; return; }
    // Longest first to favor multi-word terms; escape regex metachars.
    keys.sort((a, b) => b.length - a.length);
    const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    // Word-boundary on each side. Allow internal hyphens/spaces; common ML terms
    // like "DP-SGD", "feature cross", "p99 latency" are all matched naturally.
    _glossPattern = new RegExp("(^|[^A-Za-z0-9_])(" + escaped.join("|") + ")(?=[^A-Za-z0-9_]|$)", "g");
    _glossLookup = g;
  }
  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay

      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";

      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();

      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });

    document.addEventListener("scroll", hide, true);

    // Tapping anywhere else (including a different term) hides the current.

    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");

        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"

  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,

    const isOrdered = effectiveMode === "ordered";

      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// DyGFormer — dynamic graph TRANSFORMER over patches of temporal neighbor sequences.
// Concept-specific anchors (must survive redaction):
//   (1) TRANSFORMER backbone (NOT RNN memory like TGN) — stateless between scoring calls
//   (2) NEIGHBOR-CO-OCCURRENCE encoding: each token is tagged with how often the
//       node appears in BOTH endpoints' histories — the model's distinctive lever
//   (3) PATCHING of long neighbor sequences into fixed-size patches for long-context
// Strip "transformer over neighbor patches + co-occurrence encoding" and answers should fail.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Dynamic graph transformer"
      title="DyGFormer"
      subtitle="Transformer over patches of each node's temporal neighbor sequence, with a neighbor co-occurrence encoding. Stateless per-call; no RNN memory."
      byline={[
        {label: "Source", value: "Yu et al. — Towards Better Dynamic Graph Learning: New Architecture and Unified Library (NeurIPS 2023)"},
        {label: "L3", value: "Transformer over neighbor patches + co-occurrence encoding"},
        {label: "Anchor", value: "Token = (neighbor, time, co-occurrence count); attention does the work"},
      ]}/>

    <VIS.TLDR>
      Where{" "}
      <VIS.Term def="Temporal Graph Network — a dynamic-graph model that keeps a per-node RNN-style memory vector, updated by a GRU each time the node participates in an event.">TGN</VIS.Term>{" "}
      gives every node an <VIS.Term def="Recurrent Neural Network. Sequence model whose hidden state is updated event-by-event; GRU/LSTM are gated variants. Inside TGN, the RNN is the per-node memory updater.">RNN</VIS.Term>-style memory updated event-by-event,{" "}
      <VIS.Term def="Dynamic Graph Transformer — a 2023 architecture that scores a link by running a transformer over the recent neighbor sequences of the two endpoints, tagged with a neighbor co-occurrence count.">DyGFormer</VIS.Term>{" "}
      takes the opposite design: NO per-node state between calls. At scoring time, gather each endpoint's recent neighbor sequence, tag every token with how often that neighbor appears in BOTH endpoints' histories (the <VIS.Term def="DyGFormer's headline lever: each neighbor token is tagged with how many times that neighbor appears in BOTH endpoints' histories, making shared-neighbor structure a first-class learnable feature."><strong>co-occurrence encoding</strong></VIS.Term>), chunk into fixed-size <VIS.Term def="ViT-style trick: pack P consecutive tokens into one patch-token via a learned linear projection on their concatenation; cuts attention cost from O(N^2) to O((N/P)^2).">patches</VIS.Term>, and run a <VIS.Term def="Sequence model built from stacked self-attention + feed-forward blocks. Order-agnostic without positional encodings; the default architecture for sequences.">transformer</VIS.Term> over the patches. The co-occurrence count is the architectural lever — vanilla transformers can't see that node X appears in both U's AND V's history; DyGFormer makes that signal a first-class input. Long sequences are handled by patching (like a <VIS.Term def="Vision Transformer (Dosovitskiy et al., ICLR 2021). Applies transformer attention to image patches; the patch-projection trick DyGFormer borrows for temporal-neighbor sequences.">vision-transformer</VIS.Term> patch), not by RNN compression.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — transformer + co-occurrence encoding + patching">
      <p>
        Imagine you are scoring whether user U sending to merchant V is fraud. Pull U's last 200 neighbor interactions and V's last 200 neighbor interactions. Make every interaction a token: (neighbor_id, time_delta, edge_features). Then count, for every neighbor that appears in U's sequence, how many times it ALSO appears in V's sequence (and vice versa) — that integer is appended to the token. Now chop each 200-token sequence into 8 patches of 25 tokens each, concatenate, and feed to a vanilla <VIS.Term def="Sequence model built from stacked self-attention + feed-forward blocks. Order-agnostic without positional encodings; the default architecture for sequences.">transformer</VIS.Term>. The transformer's <VIS.Term def="Transformer layer that runs H parallel attention heads and concatenates them; each head can specialise (e.g. one tracks high-co-occurrence neighbors).">attention</VIS.Term> learns when a high co-occurrence count is bad news (a shared <VIS.Term def="Mule account that relays funds from victims to fraudsters; a textbook fraud-ring signature is the same mule receiving from multiple victims.">mule</VIS.Term>), when it is good news (a routine vendor), and when stale tokens (high dt) should be down-weighted.
      </p>

      <ol>
        <li><strong>Token = (neighbor_id_embedding, dt-encoding, edge_features).</strong> Standard dynamic-graph token, similar to <VIS.Term def="Temporal Graph Attention (Xu et al., ICLR 2020). Inductive temporal-graph model; runs attention over each endpoint's recent neighbors with a learned Fourier time-encoding. No per-node memory.">TGAT</VIS.Term>.</li>
        <li><strong>Neighbor co-occurrence encoding (the headline contribution):</strong> for each token in U's sequence, append c_u = count of that neighbor in U's sequence and c_v = count in V's sequence. Same for V's tokens. This makes "Node X appears 7 times in U's history AND 3 times in V's history" a single learnable feature the transformer can attend to.</li>
        <li><strong><VIS.Term def="ViT-style trick: pack P consecutive tokens into one patch-token via a learned linear projection on their concatenation; cuts attention cost from O(N^2) to O((N/P)^2).">Patching</VIS.Term>:</strong> instead of feeding 1 token per neighbor (long sequences blow O(N^2) attention), pack P consecutive tokens into one patch token by linear projection (<VIS.Term def="Vision Transformer (Dosovitskiy et al., ICLR 2021). Applies transformer attention to image patches; the patch-projection trick DyGFormer borrows for temporal-neighbor sequences.">vision-transformer</VIS.Term> style). 200 tokens at patch size 25 = 8 patch-tokens per endpoint = 16 patch-tokens total per call.</li>
        <li><strong>Backbone:</strong> a standard transformer (2-4 layers, d=128-200). NO causal mask is needed within a single scoring call — all neighbor events are in the past, so self-attention is bidirectional over the patches.</li>
        <li><strong>Head:</strong> mean-pool patches into a single vector per endpoint; concat U and V vectors; MLP to a link-prediction logit.</li>
        <li><strong><VIS.Term def="Architectural property that a model carries no per-entity state between scoring calls; each call reconstructs inputs from a feature store. Eliminates train/eval memory-leak surface and batch-order non-determinism.">Stateless</VIS.Term> between calls:</strong> nothing is remembered across scoring calls. Each call gathers its own neighbor windows from a <VIS.Term def="Low-latency key-value store that returns per-entity feature windows (e.g., last 200 neighbors) at inference time; the canonical backing service for stateless models like DyGFormer.">feature store</VIS.Term> and runs the whole forward pass. This is the opposite of TGN's per-node memory.</li>
      </ol>

      <VIS.Mermaid chart={`
flowchart TB
  U["Endpoint U recent neighbors"]
  V["Endpoint V recent neighbors"]
  U --> CO["Co-occurrence count tagger"]
  V --> CO
  CO --> TU["U tokens with c_u and c_v"]
  CO --> TV["V tokens with c_u and c_v"]
  TU --> PA["Patching (25 tokens per patch)"]
  TV --> PA
  PA --> TF["Transformer (2-4 layers)"]
  TF --> H["Concat plus MLP"]
  H --> S["Link score"]
  style CO fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style PA fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style TF fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `}/>
      <p>Yellow = neighbor co-occurrence encoding (the architectural lever). Blue = patching (long-sequence trick). Green = transformer backbone (stateless). No per-node memory anywhere.</p>
    </VIS.Section>

    <VIS.Section id="sec-why" title="Why neighbor co-occurrence + patching beats TGN-style memory on the long-range link benchmarks">
      <p>
        On the <VIS.Term def="Temporal Graph Benchmark (Huang et al., NeurIPS 2023). Standard suite of dynamic-graph link-prediction and node-property tasks with leakage-safe temporal splits; DyGFormer's 5-15% MRR lift is measured here.">TGB</VIS.Term> (Temporal Graph Benchmark) and DGL dynamic-graph benchmarks, DyGFormer outperforms TGN, <VIS.Term def="Kumar et al., KDD 2019. Dynamic-graph embedding model with separate user/item RNNs that project future embeddings; an early stateful temporal-graph baseline alongside TGN.">JODIE</VIS.Term>, and <VIS.Term def="Temporal Graph Attention (Xu et al., ICLR 2020). Inductive temporal-graph model; runs attention over each endpoint's recent neighbors with a learned Fourier time-encoding. No per-node memory.">TGAT</VIS.Term> on <VIS.Term def="Predicting whether a (u, v) edge will occur (often at a future time t). Canonical evaluation task for dynamic-graph models; scored with MRR over corrupted negatives.">link-prediction</VIS.Term> <VIS.Term def="Mean Reciprocal Rank. 1 / position of the first relevant item, averaged across queries. Sensitive to top-1 only.">MRR</VIS.Term> by 5-15% on the long-range tasks. The headline reason is the co-occurrence encoding: TGN's memory of a node compresses ITS OWN history; DyGFormer can see "this neighbor is shared between U and V" as a token-level feature that attention immediately picks up. TGN must HOPE that two <VIS.Term def="Gated Recurrent Unit. Compact RNN cell with update + reset gates; cheaper than LSTM and the canonical memory updater inside TGN.">GRU</VIS.Term> updates and two attention layers, run independently for U and V, somehow line up the shared neighbor — DyGFormer hands the model the answer.
      </p>
      <p>
        The <VIS.Term def="ViT-style trick: pack P consecutive tokens into one patch-token via a learned linear projection on their concatenation; cuts attention cost from O(N^2) to O((N/P)^2).">patching</VIS.Term> trick is the second lever. Without patching, attending to 200 tokens per endpoint costs 400^2 <VIS.Term def="Transformer layer that runs H parallel attention heads and concatenates them; each head can specialise (e.g. one tracks high-co-occurrence neighbors).">attention</VIS.Term> ops. With 25-token patches, 16^2 = 256 ops — 600x cheaper. The cost is that within-patch detail is averaged, but the co-occurrence encoding is added BEFORE patching so the signal survives.
      </p>

      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>TGN (RNN memory)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>TGAT (attention, no memory)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>DyGFormer</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Per-node state</td><td style={{padding:"6px 10px"}}>RNN memory s_n(t)</td><td style={{padding:"6px 10px"}}>None</td><td style={{padding:"6px 10px"}}>None — stateless per call</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Shared-neighbor signal</td><td style={{padding:"6px 10px"}}>Indirect via memory</td><td style={{padding:"6px 10px"}}>Indirect via attention</td><td style={{padding:"6px 10px"}}>Direct: co-occurrence count per token</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Long-sequence cost</td><td style={{padding:"6px 10px"}}>O(K) attention</td><td style={{padding:"6px 10px"}}>O(K^2)</td><td style={{padding:"6px 10px"}}>O((K/P)^2) with patch size P</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Long-history coverage</td><td style={{padding:"6px 10px"}}>All history in memory</td><td style={{padding:"6px 10px"}}>K-neighbor window</td><td style={{padding:"6px 10px"}}>Much larger window via patching</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Inference complexity</td><td style={{padding:"6px 10px"}}>O(2-node GRU + K attn)</td><td style={{padding:"6px 10px"}}>O(K^2)</td><td style={{padding:"6px 10px"}}>O(patches^2) — bigger per call than TGN but no state lookup</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limits and gotchas — the transformer-over-patches specific ones">
      <VIS.Callout kind="gotcha" title="No state between calls — fresh feature-store reads every time">
        Unlike TGN, DyGFormer carries no state. Each scoring call must read the latest K neighbors for BOTH endpoints from the <VIS.Term def="Low-latency key-value store that returns per-entity feature windows (e.g., last 200 neighbors) at inference time; the canonical backing service for stateless models like DyGFormer.">feature store</VIS.Term>. If the feature store is stale, the model is stale — and there is no in-memory cache to bridge the gap.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Patching loses within-patch order">
        Aggregating P tokens into one <VIS.Term def="ViT-style trick: pack P consecutive tokens into one patch-token via a learned linear projection on their concatenation; cuts attention cost from O(N^2) to O((N/P)^2).">patch</VIS.Term> token destroys ordering inside the patch. If a fraud signature lives inside a 3-event burst within one patch window, the patch averaging smears it. Defense: smaller patch size for high-velocity windows, OR multi-resolution patching.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Co-occurrence count is sensitive to neighbor-window length">
        c_u depends on how long the U neighbor window is. Doubling the window doubles expected co-occurrence counts for stationary neighbors. The model has to learn this conditional on window length, OR you normalize counts by window length before feeding.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="No causal mask within a scoring call — but careful across calls">
        Within a single scoring call, all neighbor events are in the past, so self-attention is bidirectional. BUT during training, the labels are at future times — you must ensure the neighbor windows used at training event t do not contain events with t_event &gt; t. This is a data-pipeline rule, not an <VIS.Term def="Boolean mask applied to attention scores before softmax to zero out forbidden positions (e.g., future tokens in causal language models, padding tokens, or out-of-window neighbors).">attention-mask</VIS.Term> rule.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Cold-pair: no shared neighbors">
        If U and V have never shared neighbors, c_u = c_v = 0 everywhere and the co-occurrence signal contributes nothing. The model falls back to vanilla neighbor sequences. For very <VIS.Term def="Pair (U, V) with no shared neighbors in their recent histories; DyGFormer's co-occurrence counts are all zero, so the model degrades to a vanilla neighbor-sequence transformer (TGAT-with-patching).">cold pairs</VIS.Term> (most users x most merchants), this is the dominant regime.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — concept-specific trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Every problem hinges on something only DyGFormer does: the neighbor co-occurrence encoding, patching of long temporal-neighbor sequences, transformer-over-patches with no per-node memory, and stateless-per-call inference. Strip "co-occurrence encoding + patching + transformer-no-memory" and the answer must no longer work.
      </p>

      {/* B3 — STAKEHOLDER PITCH */}
      <VIS.TrapProblem
        id="dyg-p1"
        difficulty="hard"
        title="P1 — Risk ML lead asks: 'We already have TGN in production. What does DyGFormer give us that TGN can't?'"
        scenario={<><em>Discriminating insight: TGN's memory compresses each node's OWN history independently; the shared-neighbor signal is at best implicit through attention. DyGFormer's co-occurrence encoding makes "this neighbor appears in BOTH endpoints' histories" a first-class token feature. Strip "co-occurrence encoding" and the pitch is generic transformer-vs-RNN.</em><br/><br/>Pick the pitch that justifies adding DyGFormer.</>}
        options={[
          {key:"a", text:"DyGFormer is newer and transformers are always better than RNNs."},
          {key:"b", text:"TGN encodes each node's history into an RNN-style memory vector INDEPENDENTLY — U's memory doesn't know which nodes are in V's history. The shared-neighbor signal (a mule node M appearing in BOTH U's and V's neighborhoods — a classic fraud-ring signature) can only emerge via downstream attention, lossy. DyGFormer's headline contribution is a NEIGHBOR CO-OCCURRENCE encoding: every token in U's neighbor sequence carries a count of how many times that neighbor also appears in V's neighbor sequence (and vice versa). This makes the shared-neighbor signal a first-class learnable feature — the transformer sees it directly. On long-range link-prediction benchmarks (TGB) DyGFormer beats TGN by 5-15% MRR, traceable to this encoding.", correct:true},
          {key:"c", text:"DyGFormer uses fewer parameters."},
          {key:"d", text:"DyGFormer doesn't need GPUs."},
        ]}
        trap={<>(a) is recency bias and architecturally lazy — TGN ALSO has attention. (c)(d) factually false.</>}
        lens={<>B3 redact-test: strip "co-occurrence encoding" and only (b) collapses. The encoding IS the pitch.</>}
        stretch={<>For which fraud types is the co-occurrence signal smallest — and so DyGFormer's advantage shrinks?</>}
      />

      {/* A1 — vs TGN */}
      <VIS.TrapProblem
        id="dyg-p2"
        difficulty="hard"
        title="P2 — TGN vs DyGFormer: name three irreducible architectural differences."
        scenario={<><em>Discriminating insight: (1) state (TGN has per-node memory, DyGFormer has none), (2) shared-neighbor signal (DyGFormer encodes it explicitly via co-occurrence count, TGN must learn it through attention), (3) long-sequence handling (TGN compresses via memory, DyGFormer patches).</em><br/><br/>Three differences.</>}
        options={[
          {key:"a", text:"They're nearly identical."},
          {key:"b", text:"Three: (1) State: TGN maintains a per-node RNN memory s_n(t) updated by a GRU on every event the node participates in — state persists across scoring calls. DyGFormer is STATELESS per call: it reads each endpoint's recent neighbor window from a feature store and recomputes from scratch each time. (2) Shared-neighbor signal: DyGFormer tags each neighbor token with how many times that neighbor appears in the OTHER endpoint's history (the co-occurrence encoding) — a token-level explicit signal. TGN has no analogous lever; the shared-neighbor pattern has to emerge through attention. (3) Long-sequence handling: TGN compresses history into the fixed-size memory vector and uses K=20-50 neighbor attention. DyGFormer keeps the long sequence visible by patching it (e.g., 200 tokens → 8 patches of 25), so attention runs over patches.", correct:true},
          {key:"c", text:"TGN is faster."},
          {key:"d", text:"Only the loss function differs."},
        ]}
        trap={<>(a)(c)(d) blur or skip the mechanism.</>}
        lens={<>State, shared-neighbor signal, long-sequence handling — the three architectural axes.</>}
        stretch={<>Which of the three is most responsible for the empirical MRR gap?</>}
      />

      {/* C1 — co-occurrence mechanics */}
      <VIS.TrapProblem
        id="dyg-p3"
        difficulty="hard"
        title="P3 — Walk through how the neighbor co-occurrence count is computed for a (U, V) scoring call."
        scenario={<><em>Discriminating insight: for each token in U's sequence, c_u = count of that neighbor in U's window, c_v = count of that neighbor in V's window. Symmetric for V's tokens. Counts are appended to each token before patching. Window length matters.</em><br/><br/>Compute the co-occurrence encoding.</>}
        options={[
          {key:"a", text:"Count total events for U and V."},
          {key:"b", text:"Step 1: gather U's last N neighbor events (neighbor_id, time, edge_features) and V's last N neighbor events. Step 2: build a multiset of neighbor_ids for each endpoint: M_U = {n1:5, n2:1, n3:2, ...}, M_V = {n2:3, n4:1, n3:7, ...}. Step 3: for each token (neighbor=n_i, time, ef) in U's sequence, append (c_u = M_U[n_i], c_v = M_V[n_i]) to the token. (c_v will be zero if n_i is not in V's window.) Step 4: do the symmetric thing for V's tokens. The pair (c_u, c_v) per token is the new signal — a node that appears in both endpoints' histories now has high c_u AND high c_v.", correct:true},
          {key:"c", text:"Count distinct merchants."},
          {key:"d", text:"Use the dot product of node embeddings."},
        ]}
        trap={<>(a) loses neighbor-level granularity; (c)(d) miss the encoding.</>}
        lens={<>Per-token (c_u, c_v) pair is the encoding. Internalize the multiset construction.</>}
        stretch={<>What's the storage cost of computing this on demand vs precomputing?</>}
      />

      {/* C2 — patching mechanics */}
      <VIS.TrapProblem
        id="dyg-p4"
        difficulty="hard"
        title="P4 — Patching: 200 tokens, patch size P=25. What does the patch-token look like and what is the attention cost?"
        scenario={<><em>Discriminating insight: 200 tokens / 25 = 8 patch-tokens per endpoint. Each patch is a linear projection of the concatenation of 25 token embeddings (ViT-style). Attention runs over 16 patch-tokens (8 per endpoint), so cost is 16^2 = 256 vs 400^2 = 160k without patching.</em><br/><br/>Walk through patching.</>}
        options={[
          {key:"a", text:"Take the mean of every 25 tokens."},
          {key:"b", text:"With 200 raw tokens per endpoint and patch size P=25, you get 200/25 = 8 patch tokens per endpoint. Each patch token is a learned LINEAR PROJECTION of the concatenation of the 25 token embeddings (W_patch * [t_1; t_2; ...; t_25]); same trick as ViT. Concatenating both endpoints gives 16 patch tokens. Self-attention runs over those 16 tokens at O(16^2) = 256 ops, versus O(400^2) = 160k without patching. The cost: within-patch order is mixed (the linear projection is permutation-aware but attention can't dis-aggregate). Mean-pool (a) is a strictly weaker pooling — it loses the learnable mixing.", correct:true},
          {key:"c", text:"Sum every 25 tokens."},
          {key:"d", text:"Drop every 24 of 25 tokens."},
        ]}
        trap={<>(a)(c) are weak pooling that lose learnability; (d) discards 96% of signal.</>}
        lens={<>Patching = learned linear projection of concatenated tokens. ViT trick, applied to temporal-neighbor sequences.</>}
        stretch={<>What's the optimal patch size — too small loses long-sequence advantage, too large smears bursts.</>}
      />

      {/* C3 — stateless property */}
      <VIS.TrapProblem
        id="dyg-p5"
        difficulty="hard"
        title="P5 — Why is DyGFormer's stateless-per-call design a DELIBERATE choice, not a bug?"
        scenario={<><em>Discriminating insight: stateless means no train/eval-memory-leak surface, no batch-order non-determinism, no stale-state problem. The cost is per-call inference is heavier — every call re-reads neighbor windows from the feature store.</em><br/><br/>Why deliberate?</>}
        options={[
          {key:"a", text:"It's a bug — stateful would be better."},
          {key:"b", text:"Stateless brings significant engineering wins: (1) no train/eval memory-leak surface (TGN's classic 10pt gap from memory crossing the boundary cannot happen here), (2) no batch-order non-determinism — same input always gives same output, (3) no stale-state vulnerability — a dormant account doesn't carry an outdated reputation because there's no carried state; the feature-store query returns the actual recent neighbor window. The cost is per-call compute is heavier (must read and re-tokenize windows every time) and you lose long-range history compression — you only see the last N events per endpoint. The trade is intentional: replace state-management complexity with feature-store throughput.", correct:true},
          {key:"c", text:"It saves GPU memory."},
          {key:"d", text:"It's just laziness."},
        ]}
        trap={<>(a)(c)(d) miss the engineering trade.</>}
        lens={<>State = power and risk. Stateless = simpler ops, more per-call compute. DyGFormer chose stateless.</>}
        stretch={<>For which deployment regimes is stateless preferred over TGN's stateful?</>}
      />

      {/* C4 — time encoding */}
      <VIS.TrapProblem
        id="dyg-p6"
        difficulty="medium"
        title="P6 — DyGFormer still needs to know when each event happened. How does it encode time?"
        scenario={<><em>Discriminating insight: DyGFormer reuses TGAT's learned Fourier time-encoding phi(dt) for each token, where dt is time-from-now-to-event. NOT positional encoding by integer index — events are irregularly spaced.</em><br/><br/>Time encoding inside DyGFormer.</>}
        options={[
          {key:"a", text:"Standard sinusoidal positional encoding on token index 0..N-1."},
          {key:"b", text:"Same Fourier-style time encoding as TGAT: phi(dt) = [cos(omega_1 dt), sin(omega_1 dt), ..., cos(omega_d dt), sin(omega_d dt)] with learnable omega, concatenated to each token. dt is the (scoring-time - event-time) gap, NOT integer position. Auth events are irregularly spaced, so a position-index sinusoid would equate '4 seconds ago' with '4 weeks ago' if both are 'position 3.' Fourier-on-dt lets attention learn multi-scale time weighting.", correct:true},
          {key:"c", text:"Use absolute calendar time as a scalar feature."},

      <VIS.TrapProblem
        id="dyg-p25"
        difficulty="hard"
        title="P25 — Production symptom: DyGFormer's lift over TGAT-with-patching has dropped from 8pt to 1pt over 6 months. Which design choice eroded?"
        scenario={<><em>Discriminating insight: the co-occurrence encoding is the lever; if shared-neighbor structure has changed (e.g., fraud rings now use single-use mules), c_u and c_v collapse and the encoding stops carrying signal. Monitor the (c_u, c_v) distribution.</em><br/><br/>Reverse engineer.</>}
        options={[
          {key:"a", text:"Train the model longer."},
          {key:"b", text:"The co-occurrence encoding is the headline lever vs TGAT-with-patching. If the (c_u, c_v) distribution has shifted toward zero — which happens when fraud rings move to one-time-use mules per victim, or when the neighbor-window length is shortened so shared neighbors fall out — the encoding stops carrying signal. Diagnose by plotting the (c_u, c_v) distribution over the last 6 months. If it has collapsed toward zero, the architectural lever has eroded; counter-defenses include lengthening the neighbor window (more chance to catch shared mules), adding 2-hop co-occurrence, or augmenting with cross-card pattern detection upstream.", correct:true},
          {key:"c", text:"Bigger model."},
          {key:"d", text:"Adversary is too strong; abandon DyGFormer."},
        ]}
        trap={<>(a)(c) don't address the diagnostic; (d) defeatist.</>}
        lens={<>Diagnose by monitoring the lever's distribution, not just the final metric.</>}
        stretch={<>What pre-deploy signal would have caught this before the 6-month decay?</>}
      />

      {/* C8 — interaction with edge features */}
      <VIS.TrapProblem
        id="dyg-p26"
        difficulty="medium"
        title="P26 — Edge features (amount, channel) per event — where do they enter relative to co-occurrence?"
        scenario={<><em>Discriminating insight: edge features are concatenated into the per-token vector ALONGSIDE the co-occurrence count, BEFORE patching. The transformer can then learn that a high-c_u high-amount neighbor token is especially fraud-indicative.</em><br/><br/>Edge feature placement.</>}
        options={[
          {key:"a", text:"Edge features go into a separate stream."},
          {key:"b", text:"Edge features (amount, channel, country) for each event are concatenated INTO the per-token vector alongside (neighbor_id_embedding, dt-encoding, c_u, c_v) BEFORE patching. The transformer's attention then learns joint patterns — for instance, 'a neighbor with high c_u and high amount and CNP channel within the last hour is much riskier than the same neighbor with low amount.' Sticking edge features into a parallel stream loses these per-token interactions. The patch projection mixes all per-token features uniformly; downstream attention disentangles which combinations matter.", correct:true},
          {key:"c", text:"After patching only."},
          {key:"d", text:"Edge features aren't used."},
        ]}
        trap={<>(a)(c) split signals that should fuse; (d) factually wrong.</>}
        lens={<>All per-token signals concatenate at the token level, before patching.</>}
        stretch={<>What if edge features include very-high-cardinality fields (e.g., merchant subcategory)?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/2303.13047" target="_blank" rel="noopener">
            <strong>Yu et al. — Towards Better Dynamic Graph Learning: New Architecture and Unified Library</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2023)</span>
          <br/>The DyGFormer paper. Section 3 introduces the co-occurrence encoding + patching; Section 5 has the <VIS.Term def="Controlled experiment that removes one component of a model to measure its contribution; standard tool for attributing a model's lift to specific mechanisms.">ablations</VIS.Term> that quantify each contribution. The ablations are why P22 has its answer.
        </li>
        <li>
          <a href="https://github.com/yule-BUAA/DyGLib" target="_blank" rel="noopener">
            <strong>DyGLib — Official reference implementation + dynamic-graph library</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(repo)</span>
          <br/>Read <code>models/DyGFormer.py</code> for the co-occurrence + patching code. Pairs with TGN / TGAT / JODIE implementations under the same interface — useful for apples-to-apples ablation reading.
        </li>
        <li>
          <a href="https://tgb.complexdatalab.com/" target="_blank" rel="noopener">
            <strong>Temporal Graph Benchmark (TGB) — leaderboard + tasks</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(benchmark)</span>
          <br/>The benchmark on which DyGFormer's 5-15% <VIS.Term def="Mean Reciprocal Rank. 1 / position of the first relevant item, averaged across queries. Sensitive to top-1 only.">MRR</VIS.Term> lift over TGN is measured. Useful for sanity-checking any in-house claim of improvement.
        </li>
        <li>
          <a href="https://jalammar.github.io/illustrated-transformer/" target="_blank" rel="noopener">
            <strong>Jay Alammar — The Illustrated Transformer</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Re-read if the transformer/attention mechanics aren't second-nature. P4 (patching) builds on the standard ViT-style trick.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2002.07962" target="_blank" rel="noopener">
            <strong>Xu et al. — TGAT (Inductive Representation Learning on Temporal Graphs)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICLR 2020)</span>
          <br/>DyGFormer reuses TGAT's <VIS.Term def="phi(dt) = [cos(omega_1 dt), sin(omega_1 dt), ..., cos(omega_d dt), sin(omega_d dt)] with learnable frequencies omega; encodes irregular event-time gaps so attention can weigh recency.">Fourier time-encoding</VIS.Term>. Read Section 3.1 to internalize phi(dt).
        </li>
        <li>
          <a href="https://arxiv.org/abs/2010.11929" target="_blank" rel="noopener">
            <strong>Dosovitskiy et al. — An Image is Worth 16x16 Words (ViT)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICLR 2021)</span>
          <br/>The <VIS.Term def="ViT-style trick: pack P consecutive tokens into one patch-token via a learned linear projection on their concatenation; cuts attention cost from O(N^2) to O((N/P)^2).">patching</VIS.Term> trick DyGFormer borrows. <VIS.Term def="Vision Transformer (Dosovitskiy et al., ICLR 2021). Applies transformer attention to image patches; the patch-projection trick DyGFormer borrows for temporal-neighbor sequences.">ViT</VIS.Term> patches images; DyGFormer patches neighbor sequences. Read for the linear-projection-of-concatenation construction.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
