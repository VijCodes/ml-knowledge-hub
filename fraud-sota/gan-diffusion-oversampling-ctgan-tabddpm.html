          {key:"d", text:"CTGAN doesn't drift."},

      <VIS.TrapProblem
        id="ctgan-p14"
        difficulty="hard"
        title="P14 — Mode collapse symptom: how do you spot it?"
        scenario={<><em>Discriminating insight: per-column marginal divergence + nearest-neighbor diversity. If 10K synthetic rows collapse to ~100 unique categorical combinations, or the synthetic 2D PCA scatter is a tight cluster while real is spread, you have mode collapse. Per-column chi-square divergence on rare categorical values is a sensitive detector.</em><br/><br/>Detection recipe.</>}

      />

      <VIS.TrapProblem
        id="ctgan-p15"
        difficulty="medium"

          {key:"d", text:"Use the entire dataset always."},

      <VIS.TrapProblem
        id="ctgan-p16"
        difficulty="hard"
        title="P16 — Downstream evaluation: synthetic + real outperforms real alone on AUC, but recall@1%FPR is flat. Diagnose."
        scenario={<><em>Discriminating insight: synthetic rows usually sit on the AVERAGE of the fraud manifold — they improve mid-distribution ranking (AUC) but don't help the top-of-distribution operating point where the rare, hard fraud sits. To move recall@1%FPR you need rare-archetype coverage, which CTGAN's conditional sampler may not provide if the rare archetype was sparse in training.</em><br/><br/>AUC up, recall@FPR flat.</>}
        options={[
          {key:"a", text:"Synthetic data is broken."},

        lens={<>AUC equals global ranking. Recall at FPR equals tail of score. Generators help the former, not always the latter.</>}
        stretch={<>How would you cluster fraud archetypes for class-conditional generation?</>}
      />

      <VIS.TrapProblem
        id="ctgan-p18"

        title="P18 — Generator memorization audit: design the test."
        scenario={<><em>Discriminating insight: for each synthetic row, find the nearest real row by L2 (continuous, after normalization) + Hamming (categorical). Flag synthetic rows whose distance to nearest real is below a small threshold (e.g., the 5th percentile of real-real distances). Report the memorization rate. Tighten with DCR (distance-to-closest-record) metric standard in synthetic-data benchmarks.</em><br/><br/>Audit recipe.</>}
        options={[
          {key:"a", text:"Audits don't matter."},
          {key:"b", text:"Distance-to-closest-record (DCR) audit: for each synthetic row x_s, compute distance to its nearest real row in the training set, using a hybrid metric — L2 on standardized continuous columns plus Hamming on one-hot categoricals (weighted so each column contributes proportionally). Compute the distribution of nearest-real distances for synthetic rows; compare to the distribution of nearest-real-to-real distances within the training set (the within-real baseline). If synthetic distances skew SMALLER than within-real distances, the generator is memorizing. Common threshold: flag any synthetic row whose nearest-real distance is below the 5th percentile of within-real distances; the fraction flagged is the 'memorization rate'. Report it alongside utility metrics. SDV and Syndata-Vault both implement this.", correct:true},
          {key:"c", text:"Just look at the loss."},
          {key:"d", text:"Use cosine similarity only."},
        ]}
        trap={<>(a) abdicates; (c) loss doesn't tell memorization; (d) wrong metric for one-hot.</>}
        lens={<>DCR: nearest-real distance distribution, compared to within-real baseline.</>}
        stretch={<>How does DP-SGD interact with the DCR metric?</>}
      />

      <VIS.TrapProblem
        id="ctgan-p19"
        difficulty="hard"
        title="P19 — CTGAN converged but synthetic AUC is much worse than real. What's the immediate diagnostic?"
        scenario={<><em>Discriminating insight: 'train on synthetic, test on real' (TSTR) score vs 'train on real, test on real' (TRTR) score. If TSTR is much less than TRTR, the generator under-covers the discriminative signal the downstream model needs — typically mode collapse on rare ring archetypes or breakdown of cat-cat correlations.</em><br/><br/>TSTR vs TRTR.</>}
        options={[
          {key:"a", text:"Add more layers."},
          {key:"b", text:"Run the TSTR/TRTR comparison: (1) TRTR — train downstream GBDT on real_train, test on real_test, this is the baseline AUC. (2) TSTR — train downstream GBDT on synthetic_only, test on real_test, this is the utility AUC. A large gap (TSTR much less than TRTR) means the synthetic data does not carry the discriminative signal. Diagnose by: column-marginal divergence (find columns where synth and real differ most) and feature-importance comparison (does the GBDT trained on synth use different features than GBDT trained on real?). Common causes: mode collapse on rare archetypes that carry signal, broken cat-cat correlations (specific country times merchant pairs that signal a ring), and overfit conditional generator that only generates common categorical values.", correct:true},
          {key:"c", text:"AUC is wrong."},
          {key:"d", text:"Synthetic data always loses."},
        ]}
        trap={<>(a) blind; (c) dismisses metric; (d) too strong.</>}
        lens={<>TSTR vs TRTR gap. Diagnose with marginal divergence plus feature-importance comparison.</>}
        stretch={<>What's a 'good' TSTR/TRTR ratio in published tabular benchmarks?</>}
      />

      <VIS.TrapProblem
        id="ctgan-p20"
        difficulty="medium"
        title="P20 — When NOT to use CTGAN/TabDDPM."
        scenario={<><em>Discriminating insight: tiny minority (under 500 rows, memorization), strict privacy without DP-SGD budget, very high cardinality categoricals (merchant_id with 100K values blows up the one-hot space), or when SimFraud-style in-distribution augmentation suffices structurally.</em><br/><br/>Skip-generative scenarios.</>}
        options={[
          {key:"a", text:"Always use CTGAN."},
          {key:"b", text:"Skip generative oversampling when: (1) minority count is too small (under 500 fraud rows) — generator memorizes, no new signal; (2) strict privacy regime without budget for DP-SGD — memorized rows are PII leak; (3) very high cardinality categoricals (merchant_id with 100K values) — one-hot blows up, conditional sampler can't cover marginals; (4) the natural augmentation is structural (e.g., sequence-level time/amount jitter in SimFraud) and stays in-distribution by construction — generative model adds risk without benefit; (5) downstream model already handles imbalance well (focal loss, LDAM, balanced batch sampler) and adding synthetic rows is incremental at best. The default should be 'try class-weighting + threshold tuning first; reach for CTGAN only when those plateau and you have at least 1K minority rows'.", correct:true},
          {key:"c", text:"Never use CTGAN."},
          {key:"d", text:"Always use SMOTE."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>At least 1K minority plus tolerable privacy plus manageable cardinality means CTGAN/TabDDPM is justified. Otherwise: simpler levers.</>}
        stretch={<>How to A/B CTGAN vs no-oversampling in production?</>}
      />

      <VIS.TrapProblem
        id="ctgan-p21"
        difficulty="hard"
        title="P21 — Junior: 'TabDDPM is just CTGAN with extra steps'. Diagnose."
        scenario={<><em>Discriminating insight: different probabilistic model. CTGAN learns implicitly via minimax (no explicit p(x), known mode-collapse risk). TabDDPM learns an explicit reverse process; sampling traverses the full chain, mode coverage is built in. Different sample-time cost (1-step vs T-step) and different failure modes.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Correct — same thing."},
          {key:"b", text:"Wrong. Different probabilistic model class. CTGAN is an implicit generative model: G(z) is trained adversarially against D; there's no explicit density p_G(x), and the training objective is a minimax saddle point that can mode-collapse. Sample cost: O(1) forward pass. TabDDPM is an explicit generative model: the forward noise process q(x_t | x_0) is fixed and analytically known; the denoiser p_theta(x_{t-1} | x_t) is trained by maximum likelihood (variational lower bound) — a well-defined optimization. Sample cost: O(T) forward passes, T typically 100-1000. Failure modes diverge: CTGAN can mode-collapse and stall; TabDDPM is slow at sample time and sensitive to noise-schedule choice. Empirically TabDDPM matches or beats CTGAN on tabular benchmarks precisely because mode coverage is structural, not adversarial.", correct:true},
          {key:"c", text:"TabDDPM is a transformer."},
          {key:"d", text:"CTGAN uses diffusion internally."},
        ]}
        trap={<>(a) collapses; (c)(d) factually wrong.</>}
        lens={<>Implicit GAN vs explicit diffusion: different objectives, different failure modes.</>}
        stretch={<>Is the slow sampling of TabDDPM a deployment blocker?</>}
      />

      <VIS.TrapProblem
        id="ctgan-p22"
        difficulty="hard"
        title="P22 — In one sentence, what is THE unique mechanism of CTGAN/TabDDPM (vs SMOTE, vs SimFraud)?"
        scenario={<><em>Discriminating insight: a LEARNED GENERATIVE MODEL of the fraud feature distribution, used to SAMPLE NEW rows that lie on the fraud manifold. Strip "learned generative model" and you have SMOTE (interpolation) or SimFraud (perturbation).</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"They use cross-entropy."},
          {key:"b", text:"A LEARNED GENERATIVE MODEL — neural generator G(z) for CTGAN, denoiser epsilon_theta for TabDDPM — trained on minority-class rows to capture the JOINT distribution including cat-cat correlations and continuous multi-modality. New rows are SAMPLED (not interpolated, not perturbed) from this learned distribution. This distinguishes them from SMOTE (linear interpolation between existing rows, no model) and from SimFraud (in-place perturbation of existing rows, no model). Trade-offs: better cat handling and richer samples vs new failure modes (mode collapse, memorization, drift relative to deployed time).", correct:true},
          {key:"c", text:"They re-weight classes."},
          {key:"d", text:"They move the threshold."},
        ]}
        trap={<>(a)(c)(d) describe other levers entirely.</>}
        lens={<>The anchor: learned generative model produces sampled new rows on the fraud manifold.</>}
        stretch={<>Of generative oversamplers, why have GAN/diffusion overtaken VAEs for tabular?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/1907.00503" target="_blank" rel="noopener"><strong>Xu et al. — Modeling Tabular Data using Conditional GAN (CTGAN)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2019, paper)</span><br/>The CTGAN paper. Sections 4 (mode-specific normalization) and 5 (conditional generator) are the load-bearing tricks; skim the rest.</li>
        <li><a href="https://arxiv.org/abs/2209.15421" target="_blank" rel="noopener"><strong>Kotelnikov et al. — TabDDPM: Modelling Tabular Data with Diffusion Models</strong></a> <span style={{color:"#64748b", fontSize:14}}>(ICML 2023, paper)</span><br/>The TabDDPM paper. Sections 3 (joint multinomial+Gaussian diffusion) and the benchmarks vs CTGAN are the key reads.</li>
        <li><a href="https://docs.sdv.dev/sdv/single-table-data/modeling/synthesizers/ctgansynthesizer" target="_blank" rel="noopener"><strong>Synthetic Data Vault — CTGAN user guide</strong></a> <span style={{color:"#64748b", fontSize:14}}>(library docs)</span><br/>The most-used open-source library for tabular synthesis. Read the metadata schema, conditional sampling, and DCR memorization audit pages before rolling your own.</li>
        <li><a href="https://github.com/rotot0/tab-ddpm" target="_blank" rel="noopener"><strong>TabDDPM reference implementation</strong></a> <span style={{color:"#64748b", fontSize:14}}>(repo)</span><br/>The official PyTorch implementation. Read the denoiser definition and the multinomial diffusion module — the joint design is clearer in code than prose.</li>
        <li><a href="https://gretel.ai/blog/practitioners-guide-to-synthetic-data-quality" target="_blank" rel="noopener"><strong>Gretel — Practitioner's guide to synthetic data quality (blog)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>How to actually evaluate synthetic data: marginal divergence, TSTR/TRTR, DCR memorization, downstream-AUC proxy. The metrics matter more than the model choice.</li>
      </ul>
    </VIS.Section>
  </main>
