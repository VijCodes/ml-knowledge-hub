  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// GNN explanation — GNNExplainer / PGExplainer surfaces the minimal subgraph driving a
// graph-neural-net fraud-ring prediction, the case-escalation tool for AML analysts.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Explainability"
      title="GNN explanation — GNNExplainer and PGExplainer"
      subtitle="Surfacing the minimal subgraph that drives a graph-neural-net fraud prediction so AML analysts can escalate a ring instead of one isolated node."
      byline={[
        {label: "Source", value: "Ying et al. — GNNExplainer (NeurIPS 2019); Luo et al. — PGExplainer (NeurIPS 2020)"},
        {label: "Year", value: "2019 / 2020"},
        {label: "L2", value: "Explainability for fraud decisions"},
      ]}/>

    <VIS.TLDR>
      A <VIS.Term def="A neural network that operates on graphs (nodes and edges), aggregating messages from a node's neighbors to compute its representation. Used in fraud detection to score accounts within a transaction network.">graph neural network</VIS.Term> may flag an account as fraudulent based on the structure of its neighborhood, but the score alone gives an AML analyst no place to start an investigation. <VIS.Term def="A post-hoc method that finds the minimal subgraph and feature subset whose presence is sufficient to reproduce the GNN's prediction for a target node.">GNNExplainer</VIS.Term> and its parameterized successor <VIS.Term def="A neural-network-based GNN explainer that learns a shared mask-generation network across many predictions, giving faster and more stable explanations than per-prediction optimization.">PGExplainer</VIS.Term> return the small subgraph driving the prediction — turning a black-box score into a visual fraud-ring map.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Given a trained GNN and a target node, both methods find a small <em>explanation subgraph</em> <code>G_S</code> (a subset of edges in the target's receptive field) such that running the same GNN on <code>G_S</code> reproduces the prediction. GNNExplainer learns the subgraph by optimizing an edge mask per prediction; PGExplainer trains one shared neural net that generates masks for any node — much faster at inference and more consistent across cases.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  G["Full transaction graph"]
  N["Target account (flagged as fraud)"]
  G --> M["GNN message-passing receptive field"]
  N --> M
  M --> E1["GNNExplainer: per-prediction mask optimization"]
  M --> E2["PGExplainer: shared mask network"]
  E1 --> S["Minimal explanation subgraph G_S"]
  E2 --> S
  S --> A["AML analyst escalation: ring map"]
  style S fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style A fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>The blue box is the explanation. The yellow box is the operational artifact — the subgraph an analyst pastes into the case-management tool.</p>

      <p style={{marginTop: 16}}><strong>GNNExplainer objective, in plain terms:</strong></p>
      <VIS.Equation display tex={"\\max_{M} \\; \\mathrm{MI}\\big(Y; G_S\\big) = H(Y) - H\\big(Y \\mid G = G_S\\big)"} />
      <p>
        Read it as: find the edge-mask <code>M</code> that maximizes <VIS.Term def="A measure from information theory of how much knowing one variable reduces uncertainty about another. In GNNExplainer, it measures how much the masked subgraph explains the prediction.">mutual information</VIS.Term> between the model's prediction <code>Y</code> and the masked subgraph <code>G_S</code>. Practically, you minimize cross-entropy between the prediction on <code>G_S</code> and the prediction on the full graph, plus a sparsity penalty on the mask.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from SHAP-on-node-features">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>SHAP on node features</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>GNNExplainer</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>PGExplainer</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>What it explains</td>
            <td style={{padding:"8px 10px"}}>Per-node feature attributions</td>
            <td style={{padding:"8px 10px"}}>Edges plus features in subgraph</td>
            <td style={{padding:"8px 10px"}}>Edges plus features in subgraph</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Captures graph structure</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Compute cost per prediction</td>
            <td style={{padding:"8px 10px"}}>Milliseconds</td>
            <td style={{padding:"8px 10px"}}>Seconds (per-row optimization)</td>
            <td style={{padding:"8px 10px"}}>Milliseconds (shared net)</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Stability across runs</td>
            <td style={{padding:"8px 10px"}}>Stable</td>
            <td style={{padding:"8px 10px"}}>Variable (re-optimized)</td>
            <td style={{padding:"8px 10px"}}>Stable (shared weights)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Faithfulness guarantee</td>
            <td style={{padding:"8px 10px"}}>Shapley axioms (features only)</td>
            <td style={{padding:"8px 10px"}}>Mutual-information bound</td>
            <td style={{padding:"8px 10px"}}>Same family</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>AML fraud-ring case escalation</strong> — analysts need a ring map, not a per-feature attribution. The subgraph IS the story.</li>
        <li><strong>PGExplainer when scale matters</strong> — millions of node predictions per day make per-prediction optimization untenable. Shared-net PGExplainer is the operational choice.</li>
        <li><strong>GNNExplainer for offline deep-dives</strong> — when an investigator needs the most faithful possible explanation for a single high-value case.</li>
        <li><strong>Skip GNN explanation when the GNN itself is not driving decisions</strong> — if the prediction is mostly a tabular signal piped through a GNN, SHAP on the upstream features is simpler and faster.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Faithfulness is debated">
        Several papers (Sanchez-Lengeling et al. 2020, Faber et al. 2021) show that GNNExplainer and similar mask-based methods sometimes return subgraphs that are not actually sufficient to reproduce the prediction — they correlate with the true rationale instead of identifying it. Always sanity-check by re-running the GNN on the explanation subgraph and confirming the prediction holds.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Analysts overtrust pretty visuals">
        An AML analyst shown a subgraph in a UI tends to believe it. If the explainer is wrong in a particular case, the analyst escalates wrongly and the false-positive cost is real (frozen accounts, regulatory cases). Treat the subgraph as a starting hypothesis, not a verdict.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Sparsity penalty is a tunable that changes the story">
        The mask gets a sparsity regularizer; the regularization weight determines how big a ring the explainer returns. Set it too low and you get the entire 3-hop neighborhood; set it too high and you get isolated edges. There is no objective right setting — make the tradeoff explicit and version it.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Distribution shift breaks PGExplainer first">
        Because PGExplainer trains a shared mask network on a fixed graph snapshot, when fraudster topology changes (new ring pattern, new mule structure) the explainer's masks degrade before the GNN itself does. Monitor explanation faithfulness as a drift signal.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Trap problems on faithfulness, sparsity tuning, GNNExplainer vs PGExplainer choice, analyst overtrust, and production deployment.
      </p>

      <VIS.TrapProblem
        id="gnnx-p1"
        difficulty="hard"
        title="P1 — Analyst trusts the explainer's subgraph as ground truth. When dangerous?"
        scenario={<>An AML analyst escalates a five-account ring based purely on a GNNExplainer subgraph. The accounts are frozen. Later, four of them turn out to be legitimate. The analyst says <em>I trusted the model</em>. What is the structural problem?</>}
        options={[
          {key:"a", text:"Faithfulness is not guaranteed: mask-based explainers correlate with the true rationale but can fail to identify it, especially under distribution shift or for nodes outside the training topology. The right policy is to treat the subgraph as a starting hypothesis for analyst investigation — not as evidence — and to require independent corroborating signals (KYC, transaction-pattern timing, prior SAR history) before freezing accounts.", correct:true},
          {key:"b", text:"The analyst should always trust the explainer because it is mathematically derived."},
          {key:"c", text:"Switch to SHAP for the GNN model."},
          {key:"d", text:"The GNN itself was wrong, not the explainer."},
        ]}
        trap={<>(b) inverts the failure mode. (c) loses the graph structure entirely. (d) is one possibility but not the structural lesson.</>}
        lens={<>(a) The senior framing is process: explainers inform analyst hypothesis, never replace evidence. Build the SOP to require corroboration.</>}
        stretch={<>What corroborating signals would you require before freeze?</>}
      />

      <VIS.TrapProblem
        id="gnnx-p2"
        difficulty="hard"
        title="P2 — GNNExplainer or PGExplainer for 10M daily predictions?"
        scenario={<>Your fraud GNN scores 10M accounts per day. The team must produce an explanation subgraph for every flagged account (about 50k per day). GNNExplainer's per-prediction optimization takes 2 to 5 seconds. PGExplainer's shared net runs in milliseconds. Which is the operational choice and what is the tradeoff?</>}
        options={[
          {key:"a", text:"PGExplainer. The shared mask network trades a small loss in per-prediction faithfulness for milliseconds-per-row scoring, which is the only viable option at 50k explanations per day. Pair it with a periodic GNNExplainer audit on a small random sample to verify faithfulness has not drifted.", correct:true},
          {key:"b", text:"GNNExplainer; faithfulness matters more than speed."},
          {key:"c", text:"Run GNNExplainer for all 50k overnight in batch."},
          {key:"d", text:"Drop explainability for the GNN; SHAP the upstream features."},
        ]}
        trap={<>(b) ignores throughput reality. (c) is feasible but misses analyst SLA (cases must be reviewed within hours, not next day). (d) loses the graph structure that is the point.</>}
        lens={<>(a) PGExplainer with a sampled audit. Operational explainability is always a speed-faithfulness tradeoff.</>}
        stretch={<>What audit frequency would catch a 5 percent faithfulness drop within a week?</>}
      />

      <VIS.TrapProblem
        id="gnnx-p3"
        difficulty="hard"
        title="P3 — Sparsity penalty knob — set it where?"
        scenario={<>Your team trains PGExplainer with a sparsity regularizer that controls how many edges the explanation mask keeps. With weight 0.001 it returns the full 3-hop neighborhood (200+ edges); with 1.0 it returns 2 to 3 edges; with 0.05 it returns 8 to 15 edges (ring-sized). What is the principled way to pick the value?</>}
        options={[
          {key:"a", text:"Calibrate sparsity against analyst workflow: ring-sized explanations (8 to 20 edges) are the operationally useful target because analysts can scan them in seconds. Sweep the weight, measure (i) faithfulness on a labeled-rationale validation set if one exists, and (ii) analyst-time-per-case in a small UI study, then pick the knee. Version the weight alongside the model.", correct:true},
          {key:"b", text:"Pick whichever weight gives the highest faithfulness score."},
          {key:"c", text:"Always use 0.05 — it is the paper default."},
          {key:"d", text:"Let the analyst choose sparsity per case."},
        ]}
        trap={<>(b) overfits the metric and ignores UX. (c) borrows hyperparams without re-tuning. (d) shifts the burden to humans.</>}
        lens={<>(a) Joint workflow + faithfulness calibration. Sparsity is a product-design decision, not just a hyperparam.</>}
        stretch={<>How would you build a labeled-rationale validation set?</>}
      />

      <VIS.TrapProblem
        id="gnnx-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Faithfulness audit — which checks should you run?"
        scenario={<>You want to audit your PGExplainer's faithfulness in production. Pick the checks that meaningfully test whether the explanation subgraph actually drives the GNN's prediction. Select all that apply.</>}
        options={[
          {key:"a", text:"Re-run the GNN on the explanation subgraph alone and verify the prediction probability matches the full-graph prediction within a tolerance.", correct:true},
          {key:"b", text:"Re-run the GNN on the complement (full graph minus explanation) and verify the prediction now flips or weakens substantially.", correct:true},
          {key:"c", text:"Compare explanations from PGExplainer and GNNExplainer on the same node and measure overlap.", correct:true},
          {key:"d", text:"Random-graph baseline: replace the explanation with a random equally-sized subgraph and check the prediction degrades more than the explanation case.", correct:true},
          {key:"e", text:"Check that all flagged accounts have non-empty explanations."},
          {key:"f", text:"Show explanations to three analysts and average their agreement scores."},
          {key:"g", text:"Confirm the explanation visually looks ring-shaped."},
        ]}
        trap={<>(e) trivially true and tells you nothing. (g) is aesthetic, not technical. (f) measures plausibility, not faithfulness — they are different.</>}
        lens={<>(a), (b), (c), (d) form a defensible audit. (a) (sufficiency) and (b) (necessity) are the two halves of faithfulness; (c) (agreement) and (d) (vs-random) are corroboration.</>}
        stretch={<>Which of these can be run cheaply enough to do every prediction, and which only on a sample?</>}
      />

      <VIS.TrapProblem
        id="gnnx-p5"
        difficulty="hard"
        title="P5 — Explainer says the ring is six accounts; analyst sees only three. Why?"
        scenario={<>PGExplainer returns a six-account subgraph; the analyst looking at the transaction-graph UI says only three of those accounts have any visible link to the flagged target. What is the most likely cause?</>}
        options={[
          {key:"a", text:"The GNN aggregates information over multiple hops, so the explanation can include accounts that are not direct neighbors but contribute via 2-hop or 3-hop message passing. The UI showing only 1-hop links is hiding the true receptive field. Fix: extend the UI to show the explanation at the right hop-depth, or post-process the explanation to prune to the most direct path with comparable faithfulness.", correct:true},
          {key:"b", text:"The explainer is buggy and is including unrelated nodes."},
          {key:"c", text:"The analyst is missing edges that the data team has."},
          {key:"d", text:"GNNs cannot explain multi-hop relationships."},
        ]}
        trap={<>(b) is a possibility but not the most likely. (c) is operational, not structural. (d) is wrong — multi-hop is exactly what GNNs do.</>}
        lens={<>(a) The receptive field of a GNN spans multiple hops; the UI must visualize at the right depth or the explanation looks wrong.</>}
        stretch={<>How would you pick the right number of hops to visualize?</>}
      />

      <VIS.TrapProblem
        id="gnnx-p6"
        difficulty="hard"
        title="P6 — Explainer surfaces a benign hub account in every ring. Why?"
        scenario={<>Across many flagged-account explanations, the same hub account (a payment processor or merchant aggregator) keeps appearing. Analysts complain the hub is obviously benign. What is going on and what is the fix?</>}
        options={[
          {key:"a", text:"High-centrality benign hubs lie on many paths and therefore receive nonzero mask weight in many explanations. The explainer is correct in the message-passing sense but not in the operational sense. Fix: post-process by suppressing edges to known-benign hubs in the rendered explanation, or train PGExplainer with an inductive bias that penalizes inclusion of nodes above a centrality threshold, or annotate hubs in the UI so analysts can dismiss them.", correct:true},
          {key:"b", text:"The hub is secretly fraudulent."},
          {key:"c", text:"Retrain the GNN to ignore the hub."},
          {key:"d", text:"The explainer is broken; switch to GNNExplainer."},
        ]}
        trap={<>(b) is the paranoid read; verify, but it is rarely the answer. (c) removes useful signal. (d) does not address the structural property.</>}
        lens={<>(a) High-centrality benign nodes are explanation noise; suppress in the rendering layer.</>}
        stretch={<>How would you maintain the benign-hub deny-list automatically?</>}
      />

      <VIS.TrapProblem
        id="gnnx-p7"
        difficulty="hard"
        title="P7 — A new fraud-ring topology appears; explainer faithfulness drops 12 percent in two weeks. Action?"
        scenario={<>You monitor PGExplainer faithfulness daily on a held-out audit. It is steady around 92 percent for months, then drops to 80 percent over two weeks. The GNN's primary metrics are flat. What does this mean and what do you do?</>}
        options={[
          {key:"a", text:"Faithfulness drop without a drop in the primary GNN metric typically means the underlying topology has shifted into a region the explainer's shared mask network did not see at training, even though the GNN's representations adapt. Re-train PGExplainer on a fresh snapshot, and add a faithfulness-drop alert as a leading drift indicator for the GNN itself. The next GNN metric drop is usually weeks behind.", correct:true},
          {key:"b", text:"Ignore it; the GNN is fine."},
          {key:"c", text:"Roll back the GNN."},
          {key:"d", text:"Switch to GNNExplainer per-prediction."},
        ]}
        trap={<>(b) misses a leading indicator. (c) rolls back the wrong model. (d) is operationally expensive and may not fix the cause.</>}
        lens={<>(a) Explainer faithfulness drift is a leading indicator of topology drift; retrain the explainer and watch the GNN closely.</>}
        stretch={<>How often would you retrain PGExplainer relative to the GNN?</>}
      />

      <VIS.TrapProblem
        id="gnnx-p8"
        difficulty="hard"
        multiSelect
        title="P8 — Production deployment design — pick the ingredients"
        scenario={<>You ship GNN explainability for an AML use case. Pick the production ingredients a senior would defend. Select all that apply.</>}
        options={[
          {key:"a", text:"PGExplainer for live explanations of all flagged accounts.", correct:true},
          {key:"b", text:"GNNExplainer audit on a daily 1 percent sample to monitor faithfulness drift.", correct:true},
          {key:"c", text:"Benign-hub deny-list, refreshed weekly, applied as a post-processing step.", correct:true},
          {key:"d", text:"Re-run the GNN on the explanation subgraph and store the sufficiency-test result alongside the explanation.", correct:true},
          {key:"e", text:"Analyst UI shows the explanation as a ring at the right hop-depth with corroborating signals (KYC, prior SARs, transaction timing).", correct:true},
          {key:"f", text:"Auto-freeze any account whose explanation contains 3 or more nodes with prior SARs."},
          {key:"g", text:"Disable explanation generation when latency budget is tight."},
        ]}
        trap={<>(f) is the auto-pilot trap that creates regulatory exposure. (g) ships unexplainable decisions, which is exactly what the explainer exists to prevent.</>}
        lens={<>(a) through (e) are the defensible stack — explainer, audit, suppression, sufficiency-test, analyst-UI corroboration.</>}
        stretch={<>What is the SLA for explanation latency from flag to analyst inbox?</>}
      />

      <VIS.TrapProblem
        id="gnnx-p9"
        difficulty="hard"
        title="P9 — Explanation contains protected-attribute proxy. Action?"
        scenario={<>Analysts notice explanations frequently include edges to merchants in particular zip codes. The zip-code-cluster correlates with race. What is the right response?</>}
        options={[
          {key:"a", text:"Fair-lending response: (1) suppress the proxy in the rendered explanation, (2) audit GNN predictions for disparate impact independently of the explainer, (3) consider removing the proxy edges from the message-passing graph or training with an adversarial debiaser, (4) bring the finding to fair-lending governance. The explainer is doing its job by surfacing the proxy; the response is structural.", correct:true},
          {key:"b", text:"Remove the edges from the UI rendering and move on."},
          {key:"c", text:"Tell analysts to ignore zip-code edges."},
          {key:"d", text:"The GNN is blind to race so this is fine."},
        ]}
        trap={<>(b) (c) are cosmetic. (d) is the canonical disparate-impact mistake.</>}
        lens={<>(a) The explainer made the proxy visible; suppression, audit, mitigation, and governance are all required — same playbook as SHAP-proxy.</>}
        stretch={<>How is this case different from the SHAP-proxy case?</>}
      />

      <VIS.TrapProblem
        id="gnnx-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Choose GNN-explainer alternatives — when is each one the right pick?"
        scenario={<>For different scenarios, pick the right GNN-explainability method. Each option matches one scenario; pick the scenarios where the method is a senior default. Select all that apply.</>}
        options={[
          {key:"a", text:"PGExplainer for production live-scoring of millions of nodes per day.", correct:true},
          {key:"b", text:"GNNExplainer for offline high-value case deep-dive where faithfulness matters more than speed.", correct:true},
          {key:"c", text:"GraphMask (Schlichtkrull 2021) when you need per-layer edge masking for a multi-layer GNN with interpretable layer-wise contributions.", correct:true},
          {key:"d", text:"Subgraph attention rollouts when the GNN is a graph transformer and attention weights are interpretable.", correct:true},
          {key:"e", text:"SHAP on node features when the graph structure is incidental and most predictive signal is in the features."},
          {key:"f", text:"Use GNNExplainer for every prediction at production scale because faithfulness is best."},
          {key:"g", text:"Skip explainability entirely; it adds latency."},
        ]}
        trap={<>(f) is the operational mistake — GNNExplainer per-prediction does not scale. (g) ships unexplainable AML decisions, which is regulatorily indefensible.</>}
        lens={<>(a) through (e) are the senior catalog. (e) is a reminder that graph structure is not always the answer — sometimes the features are.</>}
        stretch={<>Which two of these would you pair in a single production stack?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1903.03894" target="_blank" rel="noopener">
            <strong>Ying et al. — GNNExplainer: Generating Explanations for Graph Neural Networks</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2019)</span>
          <br/>The original GNNExplainer paper. Section 3 is the cleanest derivation of the mutual-information objective.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2011.04573" target="_blank" rel="noopener">
            <strong>Luo et al. — Parameterized Explainer for Graph Neural Network (PGExplainer)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2020)</span>
          <br/>The shared-net variant. Section 4 explains why amortized explanation is both faster and more stable than per-prediction optimization.
        </li>
        <li>
          <a href="https://distill.pub/2021/gnn-intro/" target="_blank" rel="noopener">
            <strong>Sanchez-Lengeling, Reif, Pearce, Wiltschko — A Gentle Introduction to Graph Neural Networks (Distill)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog with interactive diagrams)</span>
          <br/>The best visual introduction to GNNs anywhere. Read the message-passing section before going deep on the explainers.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2010.00577" target="_blank" rel="noopener">
            <strong>Yuan, Yu, Gui, Ji — Explainability in Graph Neural Networks: A Taxonomic Survey</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(survey paper, 2020)</span>
          <br/>The reference taxonomy. Read Sections 3 and 4 to place GNNExplainer and PGExplainer in the broader landscape of GNN explainers.
        </li>
        <li>
          <a href="https://pytorch-geometric.readthedocs.io/en/latest/modules/explain.html" target="_blank" rel="noopener">
            <strong>PyTorch Geometric — Explainability documentation</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(library docs)</span>
          <br/>Production-grade implementations of GNNExplainer, PGExplainer, and several others, with code recipes for fidelity and sparsity metrics.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
