<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// CARE-GNN — Camouflage-Resistant GNN for fraud (Dou et al., CIKM 2020)
// v2 redo — trap problems span A-F axes; every problem hinges on CARE-GNN's
// specific mechanism (per-relation RL-tuned similarity filter) and threads
// the GADBench-tuned-GBDT gotcha where applicable.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · GNN-based fraud detection (camouflage defense)"
      title="CARE-GNN — Camouflage-Aware Reinforced GNN"
      subtitle="Per-relation RL-learned similarity threshold filters out camouflaged neighbors before message passing on heterogeneous review-fraud graphs."
      byline={[
        {label: "Paper", value: "Dou et al., CIKM 2020"},
        {label: "Year", value: "2020"},
        {label: "Domain", value: "GNN fraud detection"},
      ]}/>

    <VIS.TLDR>
      Vanilla <VIS.Term def="An MPNN that samples a fixed neighborhood per node and aggregates features uniformly. Fraudsters defeat this by camouflaging — surrounding themselves with benign neighbors so aggregation dilutes the fraud signal.">GraphSAGE</VIS.Term> collapses on Yelp/Amazon <VIS.Term def="A graph whose nodes are reviews/users/products and edges indicate fraud-relevant relationships (same author, same product, same posting window). Fraud labels live on nodes.">fraud graphs</VIS.Term> because fraudsters <VIS.Term def="A fraudster strategy: surround a fraud node with real benign neighbors so a GraphSAGE-style aggregator averages the fraud signal away. A structural attack on graph topology, not a feature-perturbation attack.">camouflage</VIS.Term>. CARE-GNN adds a per-relation <VIS.Term def="An MLP-cosine similarity score between center node and a candidate neighbor used to decide whether to keep the edge during message passing.">label-aware similarity</VIS.Term> filter and an <VIS.Term def="Bernoulli-rewarded reinforcement learner that picks the top-p% similar neighbors per relation each epoch, where p is tuned online by whether the prior epoch's val-loss improved.">RL agent</VIS.Term> that tunes the <VIS.Term def="Fraction p of neighbors retained per relation after similarity scoring. The RL agent's action is to nudge p up or down each epoch.">keep-fraction</VIS.Term> per relation. Headline gains on YelpChi/Amazon used a <VIS.Term def="Train/test split done by shuffling rows uniformly. On a temporally-ordered graph it leaks future structure into training and inflates apparent gains.">random split</VIS.Term> — under GADBench's <VIS.Term def="Train/test split that respects time ordering (train on past, test on future). The protocol GADBench imposed; it strips ~15-20 F1 points off published GNN fraud results.">temporal split</VIS.Term> plus <VIS.Term def="Area Under the Precision-Recall Curve. More informative than AUC for class-imbalanced problems.">AUPRC</VIS.Term> plus <VIS.Term def="A tuned gradient-boosted decision tree (e.g. LightGBM) with hand-crafted structural features (degree, k-hop fraud counts, triangle counts). The fair-eval baseline GADBench mandates.">tuned-GBDT</VIS.Term> baseline, the win collapses to less than one point on most graphs. Source: <a href="https://arxiv.org/abs/2008.08692" target="_blank" rel="noopener">arXiv:2008.08692</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        CARE-GNN is a GraphSAGE-family <VIS.Term def="A neural network that operates on graph-structured data by aggregating features from each node's neighbors layer by layer.">GNN</VIS.Term> for <VIS.Term def="A graph with more than one edge type. Each edge type (relation) carries different semantics and homophily, so per-relation modeling matters.">heterogeneous</VIS.Term> fraud graphs (e.g. Yelp reviews: review-user-review, review-product-review, review-time-review <VIS.Term def="Distinct edge types in a heterogeneous graph. CARE-GNN maintains one similarity MLP and one RL agent per relation.">relations</VIS.Term>) augmented with three modules:
      </p>
      <ol>
        <li><strong>Label-aware similarity</strong> <VIS.Term def="The learned similarity score between center node v and candidate neighbor u; ranges in [-1, 1] (cosine of MLP-projected features). The filter keeps the top-p neighbors by sigma.">sigma(v, u)</VIS.Term> — an <VIS.Term def="Cosine similarity computed between MLP-projected feature vectors of two nodes. Lets the network learn a similarity metric on top of raw features.">MLP-cosine</VIS.Term> score predicting whether u is the same class as v.</li>
        <li><strong>Per-relation neighbor selector</strong> — keep only the <VIS.Term def="Of the candidate neighbors, retain the fraction p with the highest sigma; drop the rest before message passing.">top-p fraction</VIS.Term> of neighbors per relation by sigma.</li>
        <li><strong>RL agent</strong> — tunes p per relation each epoch using Bernoulli reward (did <VIS.Term def="Loss on a held-out validation set. CARE-GNN's RL agent checks whether val-loss decreased this epoch; if yes, reward = 1, else 0.">val-loss</VIS.Term> improve?).</li>
      </ol>
      <VIS.Mermaid chart={`
flowchart TB
  C["Center node v (review)"]
  C --> R1["Relation R-U-R (same user)"]
  C --> R2["Relation R-S-R (same product star)"]
  C --> R3["Relation R-T-R (same time bucket)"]
  R1 --> S["Score sigma(v,u) per neighbor"]
  R2 --> S
  R3 --> S
  S --> F["Keep top-p per relation (RL-tuned)"]
  F --> A["Aggregate kept neighbors"]
  A --> O["v's representation"]
  style F fill:#dbeafe,stroke:#1e40af,stroke-width:2px
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — How it differs from GraphSAGE, PC-GNN, GAGA">
      <p>
        <strong>GraphSAGE.</strong> Aggregates ALL sampled neighbors uniformly. Fraudsters exploit this by surrounding themselves with benign neighbors — the fraud signal averages away during <VIS.Term def="Each GNN layer pools features from a node's neighbors into the node's representation. Repeating this k times lets information flow over k-hop neighborhoods.">message passing</VIS.Term>.
      </p>
      <p>
        <strong>PC-GNN (sibling).</strong> Attacks <em>class imbalance</em>, not camouflage. PC-GNN's <VIS.Term def="A neighbor sampler that over-draws from the rare class so each training batch sees balanced positives and negatives. PC-GNN's central trick.">sampler</VIS.Term> over-samples minority-class neighbors regardless of similarity; CARE-GNN's filter drops camouflaged neighbors regardless of class. Orthogonal fraud problems.
      </p>
      <p>
        <strong>GAGA (sibling).</strong> CARE-GNN assumes mostly-<VIS.Term def="Connected nodes tend to share the same class label. CARE-GNN exploits this on review graphs (same-user reviews tend to share class).">homophilic</VIS.Term> relations with camouflage exceptions. GAGA assumes the opposite — fraudsters predominantly connect to benign nodes (<VIS.Term def="Money-laundering pattern where fraud accounts connect to benign accounts that move illicit funds. Produces heterophilic graphs where neighbors are usually NOT same-class.">mule networks</VIS.Term>) and homophily is the exception. Filtering low-similarity neighbors (CARE-GNN) destroys the very signal GAGA wants to model.
      </p>
      <p>
        <strong>GADBench-tuned GBDT.</strong> A <VIS.Term def="Gradient-boosted decision tree library (Microsoft). Fast on tabular data, the de-facto fraud baseline at most banks.">LightGBM</VIS.Term> with <VIS.Term def="Number of edges incident to a node. A simple yet powerful structural feature: fraud nodes often have anomalous degree distributions.">degree</VIS.Term>, <VIS.Term def="Count of fraud-labeled nodes reachable within k hops. Captures local fraud density without running a GNN.">k-hop fraud-neighbor counts</VIS.Term>, and <VIS.Term def="Number of length-3 closed walks (closed triplets) through a node. Measures local clustering; high triangle count near a node hints at coordinated rings.">triangle counts</VIS.Term> captures most of CARE-GNN's signal. Under GADBench's temporal-split AUPRC protocol, the original paper's edge over a tuned tree shrinks dramatically. <em>Every claim about CARE-GNN in production must be <VIS.Term def="Removing one component to measure its marginal contribution. The mandatory test against a tuned-GBDT baseline before claiming GNN wins.">ablated</VIS.Term> against this baseline.</em>
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick it / where it wins">
      <p>
        Pick CARE-GNN when (a) heterogeneous relations exist, (b) <VIS.Term def="Fraction of nodes that are labeled fraud. Drives whether imbalance or camouflage is the dominant problem.">fraud rate</VIS.Term> is moderate (5 to 20 percent) — high enough that camouflage is a profitable fraudster strategy, low enough that <VIS.Term def="Heavy skew in class proportions (e.g. 0.3% fraud). Plain CE loss is dominated by the majority class and fraud gradients vanish.">imbalance</VIS.Term> isn't dominant, (c) node features carry enough signal for the <VIS.Term def="Multi-Layer Perceptron. A few fully-connected layers with nonlinearities; CARE-GNN's similarity head is an MLP over concatenated node features.">similarity MLP</VIS.Term> to learn, and (d) you have already established a tuned-GBDT baseline and CARE-GNN beats it on a temporal split.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  D["Fraud surface"]
  D --> Q1{"Multiple relation types?"}
  Q1 -->|No| GBDT["GBDT + structural features"]
  Q1 -->|Yes| Q2{"Homophilic with camouflage?"}
  Q2 -->|No, low homophily| GAGA["GAGA"]
  Q2 -->|Yes| Q3{"Beats tuned GBDT on temporal split?"}
  Q3 -->|No| GBDT2["Ship GBDT"]
  Q3 -->|Yes| CARE["CARE-GNN"]
  style CARE fill:#dcfce7,stroke:#16a34a
  style GBDT fill:#fef3c7,stroke:#d97706
  style GBDT2 fill:#fef3c7,stroke:#d97706
      `} />
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations & gotchas">
      <VIS.Callout kind="gotcha" title="The RL-threshold instability">
        The <VIS.Term def="Reward of +1 if val-loss improved this epoch, 0 otherwise. A noisy single-bit signal — the source of the RL agent's oscillation.">Bernoulli-rewarded</VIS.Term> RL agent oscillates: a bad <VIS.Term def="One pass over the training data. CARE-GNN's RL agent updates p once per epoch.">epoch</VIS.Term>'s noisy reward swings p, the next epoch's signal is weaker, p swings again. In practice you must freeze p after <VIS.Term def="Initial training phase (usually 5-20 epochs) where the similarity MLP and feature encoders stabilize before any RL or selection logic is engaged.">warm-up</VIS.Term> — but then it is no longer "RL-tuned," it is a static <VIS.Term def="A knob you set before training (learning rate, p, layer count) — as opposed to a learned weight. Static hyperparameters have no RL update loop.">hyperparameter</VIS.Term> and the framing collapses to "GraphSAGE with per-relation top-p filter."
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="The GADBench reckoning">
        CARE-GNN's headline <VIS.Term def="Harmonic mean of precision and recall, evaluated at a chosen score threshold. Sensitive to threshold choice; AUPRC is its threshold-free cousin.">F1</VIS.Term> on YelpChi was reported on a <em>random</em> train/test split. The graph's <VIS.Term def="Property that edges have timestamps so train/test sets must be split along the time axis to avoid letting the model see future neighbors at training time.">temporal structure</VIS.Term> means random splits let the GNN see future neighbors during training. Under GADBench's temporal split, CARE-GNN drops 15-20 F1 points and a tuned LightGBM with degree + <VIS.Term def="For each node, the fraction of its neighbors that share its class. A cheap structural feature that captures most of what a homophily-exploiting GNN learns.">neighbor-purity</VIS.Term> features closes most of the remaining gap.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Problems span the 6 <VIS.Term def="The six axes (Identity, Application, Mechanism, Intuition, Operations, Failure modes) along which trap problems probe whether a candidate understands CARE-GNN beyond surface familiarity.">taxonomy axes</VIS.Term>. Every option must pass the <VIS.Term def="A trap-design test: blank out the model name from the question; if the answer is still derivable from generic ML, the question fails to probe concept-specific understanding.">redaction litmus</VIS.Term> — strip "CARE-GNN" and the question must no longer be answerable from generic ML knowledge.
      </p>

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Identity & comparison</h3>

      {/* axis: A1 */}
      <VIS.TrapProblem
        id="care-a1"
        difficulty="hard"
        title="A1 — CARE-GNN vs PC-GNN: same family, different fraud problem"
        scenario={<>Your tech lead says "CARE-GNN and PC-GNN are both fraud GNNs — pick one for our 0.3% fraud transaction graph." You have to articulate which fraud problem each one solves. Which is the actual discriminator?</>}
        options={[
          {key:"a", text:"CARE-GNN targets camouflage via a per-relation similarity filter; PC-GNN targets class imbalance via a label-aware neighbor sampler. With 0.3% fraud, imbalance dominates, so PC-GNN.", correct:true},
          {key:"b", text:"They are the same model; pick either."},
          {key:"c", text:"CARE-GNN is for transaction graphs; PC-GNN is for review graphs."},
          {key:"d", text:"CARE-GNN handles imbalance; PC-GNN handles camouflage."},
        ]}
        trap={<>(d) inverts the truth — exactly the confusion the question targets. (c) is over-specific. (b) is wrong.</>}
        lens={<>The two papers attack orthogonal fraud problems. CARE-GNN filters whom to message-pass with (camouflage defense); PC-GNN reweights who gets sampled into batches (imbalance defense). At 0.3% fraud, the dominant issue is imbalance — the GraphSAGE representation is dominated by benign neighbors regardless of camouflage.</>}
        stretch={<>Could you stack PC-GNN's sampler with CARE-GNN's filter? What conflicts arise?</>}
      />

      {/* axis: A2 */}
      <VIS.TrapProblem
        id="care-a2"
        difficulty="medium"
        title="A2 — 'CARE-GNN is adversarial training for GNNs'"
        scenario={<>A reviewer dismisses CARE-GNN as "adversarial training applied to GNNs." Which statements about CARE-GNN's mechanism are true?</>}
        multiSelect
        options={[
          {key:"a", text:"CARE-GNN's filter operates on neighbor selection, not on input feature perturbation — adversarial training perturbs inputs, which is a different mechanism.", correct:true},
          {key:"b", text:"Camouflage in the CARE-GNN sense is a benign-by-construction strategy (fraudsters surround themselves with real benign neighbors), not an adversarial perturbation of node features.", correct:true},
          {key:"c", text:"The RL agent in CARE-GNN tunes which neighbors to KEEP, not which to perturb.", correct:true},
          {key:"d", text:"CARE-GNN uses FGSM-style perturbations during training."},
        ]}
        trap={<>(d) is what adversarial training does — CARE-GNN does not. The reviewer's framing is a category error.</>}
        lens={<>Camouflage is a structural attack on the graph topology, not a feature-space adversarial attack. The defense lives at the neighbor-selection layer, not at feature perturbation. Calling it "adversarial training" misroutes the mental model to FGSM/PGD, which would not help against camouflage.</>}
        stretch={<>Could adversarial training on node features ever address camouflage indirectly? Argue both ways.</>}
      />

      {/* axis: A3 */}
      <VIS.TrapProblem
        id="care-a3"
        difficulty="hard"
        title="A3 — Counterfactual: CARE-GNN never existed"
        scenario={<>Counterfactual: CARE-GNN was never published. You have a Yelp-style review-fraud problem with camouflage. What is your actual fallback, and what does it cost you?</>}
        options={[
          {key:"a", text:"A tuned LightGBM with degree, neighbor-class-purity, and triangle-count features captures most of CARE-GNN's signal under temporal-split AUPRC; the cost is interpretability gain rather than performance loss.", correct:true},
          {key:"b", text:"You would have nothing — fraud detection on graphs would be impossible."},
          {key:"c", text:"You would use vanilla GraphSAGE and accept the loss."},
          {key:"d", text:"You would build a transformer over node features."},
        ]}
        trap={<>(b), (c), (d) all miss actual industrial practice. (c) accepts the camouflage hit; (d) ignores graph structure entirely.</>}
        lens={<>The honest fallback is not "GraphSAGE minus the filter" but "a tuned tree with structural features." GADBench showed this baseline beats CARE-GNN's original claim on temporal-split AUPRC for most public graphs.</>}
        stretch={<>Name two regimes where CARE-GNN clearly beats the GBDT baseline.</>}
      />

      {/* axis: A4 */}
      <VIS.TrapProblem
        id="care-a4"
        difficulty="hard"
        title="A4 — Stack CARE-GNN + PC-GNN sampler"
        scenario={<>You want to combine PC-GNN's class-balanced sampler with CARE-GNN's similarity filter on a 0.5% fraud review graph. Which interactions are real concerns?</>}
        multiSelect
        options={[
          {key:"a", text:"PC-GNN over-samples fraud nodes; if those fraud nodes are camouflaged, CARE-GNN's filter then drops most of their (benign) neighbors — leaving the fraud nodes with empty neighborhoods to aggregate over.", correct:true},
          {key:"b", text:"The RL agent's reward signal becomes noisier because PC-GNN's sampling already shifts the validation distribution; the agent attributes reward changes to its threshold when they actually come from the sampler.", correct:true},
          {key:"c", text:"You must choose ONE — they cannot be combined."},
          {key:"d", text:"The combined model has more parameters."},
        ]}
        trap={<>(c) is too strong — combining is possible, just non-trivial. (d) is parameters-not-the-issue.</>}
        lens={<>The two mechanisms operate on different axes (which nodes to batch vs which neighbors to keep) but they interact through the RL agent's reward attribution. In practice you freeze the RL agent and ship a deterministic similarity threshold; then PC-GNN composes cleanly.</>}
        stretch={<>If you froze p first, would you still want PC-GNN's sampler? Justify.</>}
      />

      {/* axis: A5 */}
      <VIS.TrapProblem
        id="care-a5"
        difficulty="hard"
        title="A5 — Where CARE-GNN stops winning"
        scenario={<>At what fraud rate does CARE-GNN's camouflage premise stop holding? Pick the answer with the strongest architectural justification.</>}
        options={[
          {key:"a", text:"Above approximately 25% fraud rate: when fraudsters dominate the graph, they have no incentive to camouflage among benign neighbors — they are the majority. CARE-GNN's filter has no camouflaged neighbors to remove and reduces to GraphSAGE.", correct:true},
          {key:"b", text:"Below 0.1% fraud: imbalance dominates."},
          {key:"c", text:"At exactly 50% fraud."},
          {key:"d", text:"There is no boundary — CARE-GNN works at any fraud rate."},
        ]}
        trap={<>(b) is the imbalance-dominant regime (PC-GNN's territory), not the upper bound on CARE-GNN. (c), (d) miss the mechanism.</>}
        lens={<>Camouflage is a strategy fraudsters adopt because they are a minority. As the minority shrinks the camouflage incentive grows; as the minority approaches the majority the camouflage incentive vanishes. The paper notes this regime explicitly.</>}
        stretch={<>What is the optimal fraud-rate regime for CARE-GNN to outperform a tuned GBDT?</>}
      />

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>B. Application</h3>

      {/* axis: B1 */}
      <VIS.TrapProblem
        id="care-b1"
        difficulty="medium"
        title="B1 — Pick the right tool given the scenario"
        scenario={<>Scenario: review fraud on a marketplace; 8% fraud rate; three heterogeneous relations (R-U-R, R-S-R, R-T-R); rich node features (review text length, user history length, rating distribution); a tuned LightGBM baseline gets 0.72 AUPRC on temporal split. You have 1 month and 2 engineers. Which is the right next investment?</>}
        options={[
          {key:"a", text:"Train CARE-GNN with rich features and shadow-score against the LightGBM on temporal-split AUPRC. If CARE-GNN beats 0.72 AUPRC by at least 2 points, ship; otherwise stay on GBDT.", correct:true},
          {key:"b", text:"Train GAGA immediately because transformers are state of the art."},
          {key:"c", text:"Train PC-GNN — imbalance is the issue at 8% fraud."},
          {key:"d", text:"Build a federated learning pipeline."},
        ]}
        trap={<>(b) is the "transformer = better" reflex; GAGA targets heterophily, not the scenario. (c) misreads imbalance — 8% is moderate, not extreme. (d) is off-topic.</>}
        lens={<>The scenario matches CARE-GNN's design assumptions (heterogeneous relations, moderate fraud, features). The shadow-comparison clause is the senior part — CARE-GNN's headline lift has been overturned on several benchmarks under GADBench fair eval; you owe yourself the actual measurement.</>}
        stretch={<>If CARE-GNN beats LightGBM by 0.5 AUPRC, do you ship it? What is your maintenance-cost tradeoff?</>}
      />

      {/* axis: B2 */}
      <VIS.TrapProblem
        id="care-b2"
        difficulty="hard"
        title="B2 — 'Sounds reasonable' — more relations = better"
        scenario={<>A teammate suggests "we have 12 relations; let us add all of them to CARE-GNN to maximize signal." Why is this wrong specifically for CARE-GNN?</>}
        options={[
          {key:"a", text:"Each relation has its own RL agent and similarity MLP; 12 RL agents create reward-noise correlation, the agents fight each other (one's threshold change shifts another's reward), and convergence breaks. CARE-GNN's mechanism does not scale to many relations.", correct:true},
          {key:"b", text:"GPUs cannot hold 12 relations."},
          {key:"c", text:"Adding relations is always better — the teammate is correct."},
          {key:"d", text:"More relations cause label leakage."},
        ]}
        trap={<>(b) is a memory complaint, not a mechanism issue. (c) is the naive belief. (d) is unrelated.</>}
        lens={<>Each agent's reward is the global val-loss delta, which is shared — so all agents see the same noisy reward signal and credit-assignment between agents is impossible. In practice CARE-GNN uses 3-5 relations; beyond that the RL story breaks. A GBDT with relation-typed neighbor features has no such ceiling.</>}
        stretch={<>What architectural change would let CARE-GNN scale to 50 relations?</>}
      />

      {/* axis: B3 — CRITICAL concept-specific pitch */}
      <VIS.TrapProblem
        id="care-b3"
        difficulty="hard"
        title="B3 — Pitch CARE-GNN to the Risk team"
        scenario={<>Your Risk-team lead asks "Why CARE-GNN over our existing GBDT? Give me one sentence I can take to the VP." Pick the pitch that requires the listener to understand CARE-GNN's specific mechanism — not a generic GNN sales pitch.</>}
        options={[
          {key:"a", text:"CARE-GNN explicitly identifies and drops camouflaged neighbors per relation (e.g. fraudulent reviews surrounded by real reviews from the same product) before message passing, so the aggregation step sees the actual fraud topology — a defense that lives at neighbor selection, not at the loss, and that the GBDT cannot replicate without per-relation pairwise-similarity features.", correct:true},
          {key:"b", text:"CARE-GNN lowers false-negative rate and improves regulatory explainability."},
          {key:"c", text:"GNNs use the graph; our GBDT does not."},
          {key:"d", text:"CARE-GNN is state of the art."},
        ]}
        trap={<>(b) is the generic "lower FN, more explainable" pitch — it fails redaction (could be said about any model). (c) is false: a GBDT with degree and neighbor-purity features uses the graph. (d) is empty.</>}
        lens={<>The concept-specific pitch names <em>per-relation camouflage filtering</em> and the <em>neighbor-selection-vs-loss</em> distinction. A listener who does not understand that camouflage is a structural attack defeated at neighbor selection cannot evaluate this claim. Replace "CARE-GNN" with "Model X" — (a) still names the mechanism, so the listener needs to know what camouflage filtering is to judge it.</>}
        stretch={<>Write a 3-sentence VP follow-up that addresses the GADBench tuned-GBDT counter.</>}
      />

      {/* axis: B4 */}
      <VIS.TrapProblem
        id="care-b4"
        difficulty="hard"
        title="B4 — When NOT to use CARE-GNN"
        scenario={<>Which scenarios are CARE-GNN's anti-patterns?</>}
        multiSelect
        options={[
          {key:"a", text:"Heterophilic graph (fraudsters predominantly connect to benign neighbors — money mule pattern). CARE-GNN's filter drops the heterophilic signal as if it were camouflage.", correct:true},
          {key:"b", text:"Very low fraud rate (under 0.5%) where class imbalance dominates the gradient and the RL agent's reward is dominated by majority-class accuracy.", correct:true},
          {key:"c", text:"Cold-start nodes with no features — the similarity MLP has nothing to learn from.", correct:true},
          {key:"d", text:"Dense homophilic graphs with moderate fraud rate."},
        ]}
        trap={<>(d) is the regime CARE-GNN was designed for — not an anti-pattern.</>}
        lens={<>CARE-GNN's three failure modes line up: heterophily (filter destroys signal), extreme imbalance (PC-GNN's regime), and feature-poverty (similarity MLP cannot discriminate). Each maps to a sibling technique that does better.</>}
        stretch={<>Which sibling addresses each anti-pattern? Match them.</>}
      />

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>C. Mechanism</h3>

      {/* axis: C1 */}
      <VIS.TrapProblem
        id="care-c1"
        difficulty="hard"
        title="C1 — Why per-relation filter (not global)?"
        scenario={<>Why does CARE-GNN learn a separate similarity threshold p per relation, instead of a single global threshold?</>}
        options={[
          {key:"a", text:"Different relations carry different homophily levels (R-U-R may be highly homophilic — same user's reviews tend to share class; R-T-R may be near-random — same time bucket is weak). A global threshold either over-filters the weak relation or under-filters the strong one.", correct:true},
          {key:"b", text:"Per-relation thresholds reduce model parameters."},
          {key:"c", text:"GPU memory constraint."},
          {key:"d", text:"Per-relation thresholds make the model invariant to relation permutation."},
        ]}
        trap={<>(b) is the opposite of true. (c), (d) miss the mechanism.</>}
        lens={<>The per-relation design assumes each relation has its own homophily statistics; a global filter cannot respect the heterogeneity. CARE-GNN's gains concentrate on graphs with diverse relations (YelpChi has 3 relations with quite different homophily); on a single-relation graph CARE-GNN reduces to GraphSAGE-plus-threshold.</>}
        stretch={<>Sketch the homophily measure you would compute per relation to set p without RL.</>}
      />

      {/* axis: C2 */}
      <VIS.TrapProblem
        id="care-c2"
        difficulty="medium"
        title="C2 — Loss / similarity regularizer interaction"
        scenario={<>CARE-GNN adds a similarity-loss regularizer that pulls same-class node features together. What does this regularizer specifically do for the rest of the training?</>}
        options={[
          {key:"a", text:"It stabilizes the similarity MLP early in training, when classification CE alone is too weak to give the MLP a useful gradient — without the regularizer, sigma is near-random and the neighbor-selection step is noise, which makes the RL reward signal also noise.", correct:true},
          {key:"b", text:"It reduces overfitting only."},
          {key:"c", text:"It is a hyperparameter knob with no architectural role."},
          {key:"d", text:"It replaces the classification loss."},
        ]}
        trap={<>(d) is wrong — both losses are used. (b) is true but trivial.</>}
        lens={<>The similarity regularizer is a bootstrap mechanism: it makes sigma meaningful before the RL agent has data to work with. Without it, training is a cold-start RL problem (no signal → no reward → no threshold update → no signal). With it, the agent finds non-trivial thresholds within a few epochs.</>}
        stretch={<>What would happen if you raised the regularizer weight too high?</>}
      />

      {/* axis: C3 */}
      <VIS.TrapProblem
        id="care-c3"
        difficulty="hard"
        title="C3 — What CARE-GNN drops vs GraphSAGE"
        scenario={<>What does CARE-GNN explicitly drop relative to vanilla GraphSAGE?</>}
        multiSelect
        options={[
          {key:"a", text:"Uniform aggregation over all sampled neighbors — replaced by top-p selection by similarity.", correct:true},
          {key:"b", text:"Single global aggregation function across relations — replaced by per-relation aggregation.", correct:true},
          {key:"c", text:"Node-ID / feature embeddings."},
          {key:"d", text:"Inductive sampling at unseen nodes — both GraphSAGE and CARE-GNN remain inductive."},
        ]}
        trap={<>(c) is wrong: CARE-GNN keeps node embeddings. (d) is a fact about both, not a drop.</>}
        lens={<>Two drops: uniform aggregation (now top-p) and single global aggregator (now per-relation). Two retentions: inductive structure, node-feature embeddings. The retentions are what let CARE-GNN behave like a drop-in replacement for GraphSAGE at serving time.</>}
        stretch={<>Of the two drops, which contributes more to the headline F1 gain on YelpChi? Defend.</>}
      />

      {/* axis: C4 */}
      <VIS.TrapProblem
        id="care-c4"
        difficulty="hard"
        title="C4 — Which knob, mis-set, breaks CARE-GNN?"
        scenario={<>Rank these hyperparameters by "production breakage severity if mis-set": (i) RL threshold p initialization, (ii) similarity-loss regularizer weight, (iii) number of GNN layers, (iv) batch size.</>}
        options={[
          {key:"a", text:"RL threshold p init > similarity-loss weight > number of layers > batch size. A bad p init makes the RL agent oscillate (most reproducible failure); the regularizer controls bootstrap; layers cause over-smoothing if greater than 2; batch size is least sensitive.", correct:true},
          {key:"b", text:"Batch size > p init > layers > regularizer."},
          {key:"c", text:"All are equally critical."},
          {key:"d", text:"Number of layers is the only critical one."},
        ]}
        trap={<>(b) puts batch size first. (c), (d) miss the RL agent's instability.</>}
        lens={<>The RL agent is the most fragile component. A common production failure is "we re-trained and CARE-GNN regressed 5 F1" — the new run's RL agent settled at a different p because random init pushed it into a different reward basin. Fix: freeze p after warm-up.</>}
        stretch={<>What is your initialization heuristic for p per relation?</>}
      />

      {/* axis: C5 */}
      <VIS.TrapProblem
        id="care-c5"
        difficulty="medium"
        title="C5 — Data-assumption violation: cold-start nodes"
        scenario={<>You deploy CARE-GNN on a marketplace where 30% of users are brand-new (no review history, only a username and timestamp). What happens to CARE-GNN's behavior on these cold-start nodes?</>}
        options={[
          {key:"a", text:"The similarity MLP cannot discriminate cold-start nodes (no informative features), so sigma is near-random; the per-relation filter degenerates to random subsampling; CARE-GNN reduces to GraphSAGE with random neighbor dropout — losing its camouflage-defense premise on exactly the nodes where camouflage is most likely.", correct:true},
          {key:"b", text:"CARE-GNN handles cold-start transparently because it is a GNN."},
          {key:"c", text:"Cold-start nodes are aggregated using their neighbors' features only — no impact on CARE-GNN."},
          {key:"d", text:"CARE-GNN raises an error on cold-start nodes."},
        ]}
        trap={<>(b) is the GNN-is-magic intuition. (c) misses that the center node's similarity score is also random.</>}
        lens={<>CARE-GNN's mechanism depends on a meaningful sigma — which depends on features. Cold-start breaks the assumption. Mitigation: a default sigma threshold (skip RL filter) for new nodes, or hybrid with a content/embedding-based feature inducer.</>}
        stretch={<>What pre-filter would you add to detect cold-start nodes before they hit CARE-GNN?</>}
      />

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>D. Intuition traps</h3>

      {/* axis: D1 */}
      <VIS.TrapProblem
        id="care-d1"
        difficulty="medium"
        title="D1 — 'Deeper CARE-GNN catches deeper camouflage'"
        scenario={<>Intuition: if 2-layer CARE-GNN handles 1-hop camouflage, then 5-layer CARE-GNN should handle 5-hop camouflage. Where does this intuition break?</>}
        options={[
          {key:"a", text:"At depth greater than 2, MPNN over-smoothing dominates: representations converge across the graph and the similarity MLP can no longer discriminate same-class from different-class neighbors. Deeper CARE-GNN is strictly worse than 2-layer — depth amplifies rather than solves the camouflage problem.", correct:true},
          {key:"b", text:"Deeper is always better — the intuition is correct."},
          {key:"c", text:"Deeper costs more GPU but is otherwise identical."},
          {key:"d", text:"Deeper breaks the loss function."},
        ]}
        trap={<>(b) is the naive read. (c) misses the over-smoothing mechanism.</>}
        lens={<>Over-smoothing is intrinsic to MPNN depth — every additional layer mixes more of the graph's nodes into each representation. CARE-GNN's filter cannot defeat over-smoothing; it only defeats camouflage at the depth it operates. Catching deeper laundering rings is FraudGT's territory (single-shot attention over k-hop subgraph), not CARE-GNN's.</>}
        stretch={<>How would you detect over-smoothing in your CARE-GNN run? Name a measurable diagnostic.</>}
      />

      {/* axis: D1b */}
      <VIS.TrapProblem
        id="care-d1b"
        difficulty="hard"
        title="D1b — 'RL agent gives me distribution-shift robustness'"
        scenario={<>A junior says "the RL agent makes CARE-GNN robust to distribution shift — it will re-tune p automatically." Why is this wrong?</>}
        options={[
          {key:"a", text:"The RL agent's reward is the validation-loss delta on a fixed val set drawn from the training distribution. Under distribution shift the agent receives no signal about the new distribution and re-tunes p to optimize a stale objective.", correct:true},
          {key:"b", text:"The RL agent does help with distribution shift."},
          {key:"c", text:"The agent freezes at deploy time anyway."},
          {key:"d", text:"RL agents are always brittle."},
        ]}
        trap={<>(c) is true in some setups but does not address the junior's claim. (d) is too broad.</>}
        lens={<>RL "robustness" requires reward feedback from the shifted distribution. CARE-GNN's RL loop is in-distribution. For real distribution-shift robustness you need an online evaluation channel (delayed chargeback labels) feeding a continually-updated val set — which CARE-GNN does not provide.</>}
        stretch={<>How would you wire delayed chargeback signal into the RL reward?</>}
      />

      {/* axis: D2 */}
      <VIS.TrapProblem
        id="care-d2"
        difficulty="hard"
        title="D2 — Wrong-assumption cascade"
        scenario={<>You assume "CARE-GNN handles imbalance because it filters camouflage, and camouflage and imbalance are related." Trace the cascade — what concretely breaks?</>}
        options={[
          {key:"a", text:"Assumption 1: 'camouflage covers imbalance' → no class reweighting → at 0.5% fraud rate the gradient is dominated by benign loss → similarity MLP learns benign-vs-benign discrimination and sigma is high for benigns but useless for fraud → RL agent finds p that keeps benign-similar neighbors → fraud signal vanishes from the aggregation → AUPRC collapses.", correct:true},
          {key:"b", text:"Nothing breaks — the assumption is fine."},
          {key:"c", text:"Memory usage doubles."},
          {key:"d", text:"Latency increases."},
        ]}
        trap={<>(b), (c), (d) miss the cascade.</>}
        lens={<>Camouflage and imbalance are orthogonal problems. CARE-GNN's filter, applied without class reweighting at low fraud rate, optimizes the wrong objective end-to-end. Fix: combine PC-GNN-style sampler (or class-weighted loss) with CARE-GNN's filter, after freezing the RL agent.</>}
        stretch={<>Diagnose the cascade in metrics: what does the AUPRC curve look like, and at what point?</>}
      />

      {/* axis: D3 */}
      <VIS.TrapProblem
        id="care-d3"
        difficulty="hard"
        title="D3 — Junior vs senior diagnostic"
        scenario={<>A junior runs CARE-GNN, gets 0.78 AUROC on YelpChi random split, declares victory. What is the senior question that overturns the win?</>}
        options={[
          {key:"a", text:"'Show me the temporal-split AUPRC and the tuned-LightGBM baseline with degree + neighbor-purity features under the same temporal split. The published gains on YelpChi were inflated by the random-split protocol.'", correct:true},
          {key:"b", text:"'How many GPUs did you use?'"},
          {key:"c", text:"'Try more layers.'"},
          {key:"d", text:"'AUROC is fine, ship it.'"},
        ]}
        trap={<>(b), (c), (d) miss the GADBench protocol issue.</>}
        lens={<>The senior question forces the junior to confront (i) AUROC vs AUPRC at low prevalence, (ii) random-split label leakage on temporal graphs, (iii) the GBDT baseline that GADBench established. This is the most reliable filter at the senior bar for fraud GNN claims.</>}
        stretch={<>Sketch the LightGBM feature list you would build for the baseline.</>}
      />

      {/* axis: D4 */}
      <VIS.TrapProblem
        id="care-d4"
        difficulty="hard"
        title="D4 — Plausible misattribution: score drop after deploy"
        scenario={<>CARE-GNN production AUPRC drops from 0.62 to 0.51 over two weeks. Three plausible causes: (i) camouflage distribution shift, (ii) class imbalance shift, (iii) RL agent oscillation across retrainings. Which is most likely?</>}
        options={[
          {key:"a", text:"(iii) RL agent oscillation. If the agent was not frozen, each retraining can converge to a different p; (i) and (ii) would cause smaller, distribution-driven drifts. The discontinuous drop magnitude (11 AUPRC points over 2 weeks across 1 retraining) is the fingerprint of a different operating point, not a slow distribution drift.", correct:true},
          {key:"b", text:"(i) Camouflage distribution shift."},
          {key:"c", text:"(ii) Class imbalance shift."},
          {key:"d", text:"Random noise."},
        ]}
        trap={<>(b), (c) are plausible but distribution-driven drops are gradual. (d) ignores the magnitude.</>}
        lens={<>The signature of RL-agent oscillation is "trained-model variance" not "test-distribution variance." Diagnose by re-running training with frozen p and checking whether the regression replicates.</>}
        stretch={<>Design a continuous monitor that detects RL-agent oscillation between retrainings.</>}
      />

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>E. Operations</h3>

      {/* axis: E1 */}
      <VIS.TrapProblem
        id="care-e1"
        difficulty="hard"
        title="E1 — Production gotcha specific to CARE-GNN"
        scenario={<>Pick the production gotcha most specific to CARE-GNN (i.e. would not bite other fraud GNNs):</>}
        options={[
          {key:"a", text:"The RL agent's stochastic threshold means two consecutive retrainings with identical data and seeds can produce different deployed thresholds; shadow-mode comparisons against a prior model are non-deterministic unless the RL agent is frozen post warm-up.", correct:true},
          {key:"b", text:"Inference latency increases with graph size."},
          {key:"c", text:"Embedding tables consume memory."},
          {key:"d", text:"Training is GPU-bound."},
        ]}
        trap={<>(b), (c), (d) are generic GNN concerns — not CARE-GNN-specific.</>}
        lens={<>The CARE-GNN-specific issue is RL-induced non-determinism at the threshold layer. Every other GNN has deterministic post-training. Mitigation: freeze p after warm-up, log it, version it as a config artifact.</>}
        stretch={<>What changes in your model-versioning system to handle per-relation p as a versioned config?</>}
      />

      {/* axis: E2 */}
      <VIS.TrapProblem
        id="care-e2"
        difficulty="hard"
        title="E2 — Friday: val-loss spikes"
        scenario={<>It is Friday. Overnight retraining: CARE-GNN val-loss jumps from 0.18 to 0.31. Logs show p for relation R-U-R bounced between 0.4 and 0.7 across the last 4 epochs. Three teams converge with different diagnoses: (i) fraud rate dropped, (ii) feature pipeline regression, (iii) RL agent oscillation. What is the right first move?</>}
        options={[
          {key:"a", text:"Pin p at its pre-spike value, retrain with the RL agent frozen, and check whether val-loss recovers. If it does, the cause is RL oscillation; if not, the cause is upstream. This isolates the failure mode in one experiment.", correct:true},
          {key:"b", text:"Roll back the model."},
          {key:"c", text:"Page the data team."},
          {key:"d", text:"Add more layers."},
        ]}
        trap={<>(b) skips diagnosis. (c) escalates without evidence. (d) is unrelated.</>}
        lens={<>The "p bouncing across epochs" log signature is unique to CARE-GNN. Pinning p is the cheapest diagnostic and immediately partitions the hypothesis space.</>}
        stretch={<>What metric (besides p) would you add to your training dashboard to detect this early?</>}
      />

      {/* axis: E3 */}
      <VIS.TrapProblem
        id="care-e3"
        difficulty="hard"
        title="E3 — Eval-protocol audit (GADBench lesson)"
        scenario={<>Your team's CARE-GNN report card shows 0.81 F1 on YelpChi, citing the original paper. Which audit findings invalidate the report card?</>}
        multiSelect
        options={[
          {key:"a", text:"Original eval used a random train/test split on a temporally-ordered graph — neighbors in the train graph included nodes that appear in the test set, leaking future structural information.", correct:true},
          {key:"b", text:"Original eval reported F1 at the threshold that maximized F1 on the test set itself (post-hoc threshold) rather than on a held-out validation set.", correct:true},
          {key:"c", text:"The LightGBM baseline used by the paper was untuned (default hyperparameters), while CARE-GNN was tuned.", correct:true},
          {key:"d", text:"YelpChi is a public benchmark, so all evaluations are trustworthy."},
        ]}
        trap={<>(d) is wrong by construction.</>}
        lens={<>GADBench's three structural fixes: temporal split, prevent post-hoc threshold tuning, equal hyperparameter budget for baselines. Each of (a)(b)(c) corresponds to one fix. Production-aligned eval requires all three.</>}
        stretch={<>Write the eval-protocol checklist your team will apply before accepting any new fraud-detection model.</>}
      />

      {/* axis: E4 */}
      <VIS.TrapProblem
        id="care-e4"
        difficulty="medium"
        title="E4 — Migration sequence: GBDT to CARE-GNN"
        scenario={<>Order the rollout phases to migrate from a tuned LightGBM to CARE-GNN with minimum risk: (i) full ramp, (ii) shadow scoring at 0% traffic, (iii) hybrid ensemble (average of both), (iv) traffic ramp 1, 5, 25, 100%.</>}
        options={[
          {key:"a", text:"ii → iii → iv → i. Shadow first to compare offline; then hybrid to absorb cases where CARE-GNN disagrees with GBDT (the hybrid is a safety net); then ramp; full only after the ramp completes without metric regressions.", correct:true},
          {key:"b", text:"i → ii → iii → iv."},
          {key:"c", text:"iv → ii → iii → i."},
          {key:"d", text:"Direct cutover."},
        ]}
        trap={<>(b), (c), (d) miss the safety value of starting with shadow + hybrid.</>}
        lens={<>The hybrid step is CARE-GNN-specific: CARE-GNN's per-relation filter can be over-aggressive (drops too many neighbors), causing high-variance scores on dense-graph nodes. The hybrid with the GBDT bounds this variance during ramp.</>}
        stretch={<>What is the offline diagnostic that tells you the hybrid is no longer needed?</>}
      />

      {/* axis: E5 */}
      <VIS.TrapProblem
        id="care-e5"
        difficulty="medium"
        title="E5 — Reproducibility: original CARE-GNN repo"
        scenario={<>You clone the original CARE-GNN repo to reproduce the YelpChi result. What two reproducibility issues are widely known about the public code?</>}
        multiSelect
        options={[
          {key:"a", text:"The default eval script uses the same set as both validation and test (issue tracker #14).", correct:true},
          {key:"b", text:"The RNG seed is not fully controlled across the RL agent's actions — runs with identical seeds can diverge.", correct:true},
          {key:"c", text:"The repo includes the test-set labels in the training loader."},
          {key:"d", text:"The repo does not run on GPUs."},
        ]}
        trap={<>(c) is a stronger claim than the public record supports; (d) is false.</>}
        lens={<>Both reproducibility gaps inflate the headline number. GADBench provides a sanitized re-implementation; cite that, not the original repo's number.</>}
        stretch={<>If the GADBench number disagrees with the paper's number by 8 F1, what do you tell your VP?</>}
      />

      {/* axis: E6 */}
      <VIS.TrapProblem
        id="care-e6"
        difficulty="hard"
        title="E6 — Eval contamination on YelpChi"
        scenario={<>Which YelpChi-specific properties most contaminate CARE-GNN's reported gains over a tuned GBDT under random-split eval?</>}
        multiSelect
        options={[
          {key:"a", text:"The graph is temporally ordered; random splits create train/test edges that span the same time window, letting train neighbors include test-period nodes.", correct:true},
          {key:"b", text:"Reviewer identities repeat — the same user contributes multiple reviews across the train and test split, causing user-level label leakage.", correct:true},
          {key:"c", text:"The R-T-R (same time bucket) relation directly encodes the time the split was supposed to respect.", correct:true},
          {key:"d", text:"YelpChi is too small to evaluate any model on."},
        ]}
        trap={<>(d) overstates — the graph is small but evaluable; the issue is protocol.</>}
        lens={<>All three contamination paths (a)(b)(c) are graph-structural and unique to YelpChi-style temporal review graphs. Temporal splits address (a) and (c); user-level holdouts address (b).</>}
        stretch={<>Sketch the train/test split policy you would use in production.</>}
      />

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>F. Failure modes &amp; edge cases</h3>

      {/* axis: F1 */}
      <VIS.TrapProblem
        id="care-f1"
        difficulty="hard"
        title="F1 — Smallest input that breaks CARE-GNN"
        scenario={<>Construct the smallest graph where CARE-GNN provably reduces to GraphSAGE (no advantage).</>}
        options={[
          {key:"a", text:"A graph with a single relation and uniform pairwise similarity: sigma is constant across neighbors, so the RL agent receives a flat reward signal, p does not move, and the top-p selection becomes equivalent to random subsampling. CARE-GNN equals GraphSAGE-with-dropout.", correct:true},
          {key:"b", text:"Any 1-node graph."},
          {key:"c", text:"Any graph with fewer than 100 nodes."},
          {key:"d", text:"A bipartite graph."},
        ]}
        trap={<>(b) is degenerate. (c), (d) miss the mechanism.</>}
        lens={<>The mechanism breaks at "uniform sigma" or "single relation" — that is when both of CARE-GNN's contributions become inert.</>}
        stretch={<>Construct an adversarial dataset where CARE-GNN is provably worse than GraphSAGE.</>}
      />

      {/* axis: F2 */}
      <VIS.TrapProblem
        id="care-f2"
        difficulty="hard"
        title="F2 — Adversarial: fraud ring with intra-similarity"
        scenario={<>Design an attack that exploits CARE-GNN's similarity-based filter to evade detection.</>}
        options={[
          {key:"a", text:"Form a dense fraud ring where all fraud nodes share similar features (similar review-text length, rating, posting time). Sigma is high among ring members; CARE-GNN's filter KEEPS them as 'high-similarity neighbors' assuming same-class — and since they are, the aggregation produces a high-fraud representation. Because the filter is class-agnostic, it can keep tight fraud clusters as if they were homophilic benign neighborhoods.", correct:true},
          {key:"b", text:"Add random noise to fraud node features."},
          {key:"c", text:"Increase fraud count to 50%."},
          {key:"d", text:"There is no attack."},
        ]}
        trap={<>(b) is feature-perturbation (defended by adversarial training). (c) flips the regime to majority-fraud. (d) is wrong by construction.</>}
        lens={<>CARE-GNN's similarity signal is class-symmetric: high sigma between two nodes means "same class" without saying which class. Tight fraud rings exploit this directly. The defense would require an asymmetric similarity that penalizes mutual-fraud similarity — which the paper does not provide.</>}
        stretch={<>How would you change the similarity loss to make it class-asymmetric?</>}
      />

      {/* axis: F4 */}
      <VIS.TrapProblem
        id="care-f4"
        difficulty="medium"
        title="F4 — What the paper itself admits"
        scenario={<>Which failure mode does the original CARE-GNN paper explicitly call out as a regime where CARE-GNN does not help?</>}
        options={[
          {key:"a", text:"When the fraud rate is high enough that fraudsters dominate the neighborhood — they have no incentive to camouflage, so there is nothing for the filter to remove.", correct:true},
          {key:"b", text:"CARE-GNN works perfectly in all regimes."},
          {key:"c", text:"GPU memory bottlenecks."},
          {key:"d", text:"FP16 precision."},
        ]}
        trap={<>(b), (c), (d) are not paper-cited limitations.</>}
        lens={<>The paper is explicit about this regime boundary. Knowing it signals that the candidate read the paper rather than the blog.</>}
        stretch={<>What did the paper NOT predict that GADBench exposed?</>}
      />

      {/* axis: F5 */}
      <VIS.TrapProblem
        id="care-f5"
        difficulty="hard"
        title="F5 — The GADBench critique"
        scenario={<>GADBench (NeurIPS 2024) re-evaluated CARE-GNN under temporal split + AUPRC + a tuned-LightGBM baseline with structural features. What did it find?</>}
        multiSelect
        options={[
          {key:"a", text:"On most public benchmarks (YelpChi, Amazon), the CARE-GNN vs tuned-LightGBM gap collapses to less than 2 AUPRC points under temporal split.", correct:true},
          {key:"b", text:"On dense heterogeneous graphs (Amazon with rich features), CARE-GNN retains a small edge — its per-relation mechanism is hardest for structural features to replicate.", correct:true},
          {key:"c", text:"AUROC reported under random splits inflated CARE-GNN's apparent gain by 3-6 points on YelpChi.", correct:true},
          {key:"d", text:"CARE-GNN dominates the tuned GBDT by more than 10 points on every benchmark."},
        ]}
        trap={<>(d) is the popular pre-GADBench belief that the benchmark overturned.</>}
        lens={<>The GADBench finding is regime-specific: GNNs retain a real edge on rich heterogeneous multi-relation graphs but lose published headline gains elsewhere. Senior MLEs internalize this nuance.</>}
        stretch={<>For a brand-new fraud surface with no GBDT baseline, what is your honest first 90 days?</>}
      />

      {/* axis: F5b — interview gold */}
      <VIS.TrapProblem
        id="care-f5b"
        difficulty="hard"
        title="F5b — The interview gold question"
        scenario={<>Interviewer: "You championed CARE-GNN at your last company. Walk me through the experiment you ran to confirm CARE-GNN actually beats a tuned GBDT with structural features under fair evaluation." Pick the answer that demonstrates senior judgment.</>}
        options={[
          {key:"a", text:"Built a LightGBM baseline with degree, in/out-degree per relation, k-hop fraud-neighbor counts, triangle counts, and node-feature summary statistics; tuned both models with equal hyperparameter budget; reported AUPRC on temporal split; CARE-GNN won by 1.4 AUPRC on the heterogeneous graph, lost by 0.2 AUPRC on the homogeneous transaction graph. Shipped CARE-GNN only on the former.", correct:true},
          {key:"b", text:"Ran the original paper's eval; CARE-GNN beat the baseline by 4 F1; shipped."},
          {key:"c", text:"CARE-GNN is SOTA, so we shipped without a baseline."},
          {key:"d", text:"We compared CARE-GNN to GraphSAGE only."},
        ]}
        trap={<>(b), (c), (d) all skip the GADBench-style fair comparison and are wrong at the senior bar.</>}
        lens={<>The right answer surfaces the GADBench protocol AND a regime-specific deployment decision. This is the question that separates "read the paper" from "knows when to ignore the paper."</>}
        stretch={<>What is the one feature you would add to the LightGBM baseline that most reduces the CARE-GNN gap?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/2008.08692" target="_blank" rel="noopener"><strong>Dou et al. — CARE-GNN</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, CIKM 2020)</span>
          <br/>The original. Section 3 (label-aware similarity), Section 4 (RL module), Section 5 (per-relation <VIS.Term def="Pooling step that summarizes a node's neighbor features into a fixed-size vector (mean/sum/attention). CARE-GNN runs one aggregator per relation, then combines.">aggregation</VIS.Term>).
        </li>
        <li>
          <a href="https://arxiv.org/abs/2306.12251" target="_blank" rel="noopener"><strong>Tang et al. — GADBench</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2024)</span>
          <br/>The <VIS.Term def="A re-evaluation protocol that enforces temporal split, AUPRC reporting, and an equal hyperparameter budget for non-GNN baselines. Most published GNN-fraud gains shrink under it.">fair-eval re-audit</VIS.Term>. Read for the temporal-split + AUPRC + tuned-GBDT-baseline protocol; cite this instead of the CARE-GNN paper's numbers.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2105.06624" target="_blank" rel="noopener"><strong>Liu et al. — PC-GNN</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, WWW 2021)</span>
          <br/>The <VIS.Term def="Two methods solve different problems and can in principle compose. PC-GNN (imbalance) and CARE-GNN (camouflage) are orthogonal axes of fraud-GNN defense.">orthogonal-axis</VIS.Term> sibling (imbalance, not camouflage).
        </li>
        <li>
          <a href="https://arxiv.org/abs/2302.10407" target="_blank" rel="noopener"><strong>Wang et al. — GAGA</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, WWW 2023)</span>
          <br/>The <VIS.Term def="Aware that edges in the graph predominantly connect different-class nodes (the opposite of homophily). GAGA learns from class-disagreement signal; CARE-GNN's similarity filter would erase it.">heterophily-aware</VIS.Term> sibling — relevant where CARE-GNN's similarity filter is the wrong defense.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
