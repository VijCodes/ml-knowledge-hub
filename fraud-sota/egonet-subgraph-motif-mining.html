<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Egonet / subgraph motif mining — Fraud SOTA · AML detection.
// CONCEPT ANCHOR (B3): per node, extract the K-HOP EGO-SUBGRAPH (the node + all
// vertices within K hops + edges among them), ENUMERATE small canonical MOTIFS
// (fan-in, fan-out, ring/cycle, smurf-star, scatter-gather) on that egonet,
// COUNT motif occurrences as features. Score nodes/subgraphs by these motif
// signatures aligned with regulator typologies (FinCEN, FATF). Classical graph
// mining, NOT a learned GNN. NOT random-walk embeddings (DeepWalk). NOT subgraph
// neural networks (SubGNN). NOT general anomaly subgraph (Spotlight/MIDAS).

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · AML detection"
      title="Egonet / subgraph motif mining — count typology-aligned motifs on each node's K-hop neighborhood"
      subtitle="For each node, extract the K-hop ego-subgraph; enumerate small canonical MOTIFS (fan-in, fan-out, ring, smurf-star, scatter-gather); count their occurrences as features. Score by motif signature aligned with regulator typologies (FinCEN, FATF). Classical graph mining — interpretable, no neural network needed."
      byline={[
        {label:"Paper", value:"Subgraph-level GNN for AML (KDD 2024) — applies motif-mining inside an interpretable AML pipeline"},
        {label:"L3", value:"K-hop egonet extraction; canonical small-motif enumeration; motif-count feature vector; subgraph-level scoring."},
        {label:"Anchor", value:"Per node, K-hop ego-subgraph + motif counts as features; classical mining, NOT a learned GNN."},
      ]}/>

    <VIS.TLDR>
      Money laundering shows up not as suspicious individual transactions but as suspicious LOCAL PATTERNS — a node that receives from many accounts and forwards to one (fan-in funnel), a node that sends to many small accounts (fan-out smurfing), a ring of accounts that cycle funds back to origin, a scatter-gather lattice. EGONET MOTIF MINING extracts the{" "}
      <VIS.Term def="K-hop ego-subgraph: for a center node v, the subgraph induced by v plus all vertices within K hops in the transaction graph, plus all edges among them. K=2 is standard for AML — captures direct counterparties + their counterparties.">K-hop ego-subgraph</VIS.Term>{" "}
      around each candidate node, ENUMERATES small canonical{" "}
      <VIS.Term def="Graph motif: a small connected subgraph pattern (e.g., a 3-node triangle, a 4-node fan-out star, a 5-node ring) defined up to isomorphism. Motif enumeration counts how many times each canonical pattern appears in a given subgraph.">MOTIFS</VIS.Term>{" "}
      (fan-in, fan-out, ring/cycle, smurf-star, scatter-gather), and COUNTS each motif's occurrences as a feature vector. The features are then either thresholded against{" "}
      <VIS.Term def="FinCEN / FATF typologies: regulator-published catalogs of money-laundering patterns. FinCEN (US Treasury) publishes 'red flag' typologies (smurfing, layering, structuring, cycle); FATF (international) publishes 40 Recommendations + typology reports. Motif-based features map directly to these typology codes, which makes the alerts defensible to regulators.">regulator typology rules</VIS.Term>{" "}
      (FinCEN red-flag codes, FATF typology lists) or fed to a classical classifier (XGBoost). The output is a per-node or per-subgraph score with a CRITICAL property: each high score has an INTERPRETABLE explanation in terms of which motifs fired — &quot;this account has 47 fan-in edges from low-balance accounts followed by one fan-out edge to a known shell&quot; maps to FinCEN typology code &quot;smurf/funnel&quot;. NOT a learned GNN (CARE-GNN, GraphSAGE) — no neural network, no message passing. NOT random-walk embeddings (DeepWalk, node2vec) — those produce uninterpretable dense vectors. NOT general subgraph anomaly (Spotlight, MIDAS) — those score &quot;unusual&quot; subgraphs by streaming statistics; motif mining scores against a FIXED CATALOG of regulator-defined patterns. The trade-off: interpretability and regulator alignment vs limited expressiveness (cannot catch motifs not in the catalog) and ENUMERATION EXPLOSION on large dense graphs.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — egonet extraction + motif enumeration">
      <p>
        Imagine an AML investigator at a regional bank reviewing one suspicious account v. The first thing they do is pull up v's network: who has v transacted with, and who have those counterparties transacted with? This is the K-hop egonet — typically K=2 to keep the subgraph small but include layering. The investigator then looks for KNOWN LAUNDERING PATTERNS:
      </p>
      <ul>
        <li><strong>Fan-in funnel:</strong> many low-value senders to v, then v sends a single large value out → &quot;smurfing&quot; / structuring.</li>
        <li><strong>Fan-out star:</strong> v sends many small values to many recipients → reverse-smurf / dispersal.</li>
        <li><strong>Ring / cycle:</strong> money flows v → a → b → v → closed loop, possibly through shell companies → &quot;cycle&quot; (FinCEN red-flag).</li>
        <li><strong>Scatter-gather lattice:</strong> v sends to several intermediaries; intermediaries forward to one destination → &quot;layering&quot;.</li>
        <li><strong>Pass-through chain:</strong> v -&gt; a -&gt; b -&gt; c with the same value flowing through quickly → &quot;passthrough&quot; / wire chain.</li>
      </ul>
      <p>
        Egonet motif mining automates this. For each candidate node v, extract the K-hop ego-subgraph G_v; for each motif M in a FIXED CATALOG (5-20 typologies), count how many times M appears as a subgraph of G_v (subgraph isomorphism); the count vector becomes the feature.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  G["Transaction graph G with N nodes"]
  G --> EX["For each node v extract K-hop egonet G_v"]
  EX --> EN["Enumerate motifs from fixed catalog M_1 to M_K"]
  EN --> CT["Count motif occurrences per egonet"]
  CT --> FV["Feature vector per node = motif counts"]
  FV --> SC["Score: typology rule threshold OR XGBoost classifier"]
  SC --> AL["Per node alert WITH explanation in motif terms"]
  style EN fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style CT fill:#fee2e2,stroke:#dc2626,stroke-width:2px
      `} />
      <p>Red boxes: the two motif-specific steps — enumeration over a fixed catalog and counting. Everything else is standard pipeline.</p>

      <p style={{marginTop:16}}>
        <strong>The catalog matters more than the algorithm.</strong> The MOTIFS in the catalog are not arbitrary graph patterns — they map to regulator-defined typology codes (FinCEN Suspicious Activity Report categories, FATF typology reports). When an alert fires, the explanation is &quot;fan-in funnel count = 47, fan-out spread count = 12, ring count = 1 → matches FinCEN typology code XYZ&quot;. Investigators and regulators can audit each alert against the catalog. Compare with a GNN: a graph-neural-net classifier produces a node-level score with no inherent explanation; explainability layers (GNNExplainer, SubGraphX) approximate it post-hoc. Egonet motif mining is interpretable BY CONSTRUCTION.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Egonet motif mining vs related graph approaches">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Egonet motif mining</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Random-walk embedding (node2vec)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>GNN classifier (CARE-GNN)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Streaming subgraph anomaly (Spotlight/MIDAS)</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Mechanism</td><td style={{padding:"6px 10px"}}>Subgraph isomorphism on K-hop egonet vs fixed motif catalog</td><td style={{padding:"6px 10px"}}>Sample random walks; train skip-gram</td><td style={{padding:"6px 10px"}}>Message-passing + learned aggregation</td><td style={{padding:"6px 10px"}}>Streaming sketches; flag bursty subgraph activity</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Output</td><td style={{padding:"6px 10px"}}>Per-motif count features; interpretable typology score</td><td style={{padding:"6px 10px"}}>Dense embedding (uninterpretable)</td><td style={{padding:"6px 10px"}}>Per-node score (uninterpretable without post-hoc explainer)</td><td style={{padding:"6px 10px"}}>Anomaly score on time-window subgraphs</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Interpretable to regulator</td><td style={{padding:"6px 10px"}}><strong>YES — direct typology mapping</strong></td><td style={{padding:"6px 10px"}}>No</td><td style={{padding:"6px 10px"}}>No (post-hoc only)</td><td style={{padding:"6px 10px"}}>Partial — flags WHERE but not WHY</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Handles novel patterns</td><td style={{padding:"6px 10px"}}>No (catalog-bound)</td><td style={{padding:"6px 10px"}}>Yes (learned)</td><td style={{padding:"6px 10px"}}>Yes (learned)</td><td style={{padding:"6px 10px"}}>Partial (anomaly = novelty)</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Compute cost</td><td style={{padding:"6px 10px"}}>Subgraph enumeration EXPLOSION on dense egonets</td><td style={{padding:"6px 10px"}}>O(walks * walk_len) training</td><td style={{padding:"6px 10px"}}>O(edges * depth) per forward pass</td><td style={{padding:"6px 10px"}}>O(edge stream) — sub-linear</td></tr>
          <tr><td style={{padding:"6px 10px"}}>When to pick</td><td style={{padding:"6px 10px"}}>Bank AML with regulator typology requirements</td><td style={{padding:"6px 10px"}}>Downstream model wants graph features</td><td style={{padding:"6px 10px"}}>Pure performance, no regulator constraint</td><td style={{padding:"6px 10px"}}>Real-time burst detection</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 23 trap problems">
      <p style={{color:"#475569", marginBottom:16}}>Every problem turns on the K-HOP EGONET EXTRACTION + FIXED MOTIF CATALOG + COUNT-AS-FEATURE mechanism, and the REGULATOR-INTERPRETABILITY property. Strip &quot;motif catalog&quot; or &quot;subgraph isomorphism&quot; and the answer collapses to either a learned GNN or a random-walk embedding.</p>

      <VIS.TrapProblem id="ego-p1" difficulty="hard" title="P1 — VP AML: 'Why not just use a CARE-GNN or GraphSAGE for AML?'"
        scenario={<><em>Discriminating insight: GNNs produce uninterpretable scores; regulators (FinCEN, FATF) require alerts mapped to typology codes. Egonet motif mining gives interpretable alerts BY CONSTRUCTION — counts of typology-mapped motifs. Trade-off: less expressive (catalog-bound) but defensible.</em><br/><br/>Pitch.</>}
        options={[
          {key:"a", text:"GNNs are always better."},
          {key:"b", text:"Regulator requirement. AML alerts must be defensible to the FinCEN / FATF auditor: an alert package includes WHY the model flagged the account, mapped to a regulator typology code (smurfing, structuring, cycle, layering). A GNN classifier (CARE-GNN, GraphSAGE) produces a node-level probability with no inherent explanation; explainability layers (GNNExplainer, SubGraphX) approximate explanations post-hoc but the relationship between the explanation and the prediction is not formally guaranteed. Egonet motif mining gives interpretable alerts BY CONSTRUCTION: the feature is 'fan-in count = 47 on this account' which maps directly to typology code 'funnel/smurf'; the alert package writes itself. Trade-off: motif mining is less expressive (cannot detect a pattern not in the catalog) but defensible at audit. Production AML practice: use motif features as INPUTS to an XGBoost; the XGBoost weights are also interpretable; each high-importance feature maps to a typology code. GNNs may be used in parallel as a candidate generator, with motif mining as the auditable scorer.", correct:true},
          {key:"c", text:"They are equivalent."},
          {key:"d", text:"Skip both."},
        ]}
        trap={<>(a)(c)(d) miss the regulator interpretability requirement.</>}
        lens={<>GNN: black-box score. Motif mining: interpretable typology counts by construction. Regulator-defensible.</>}
        stretch={<>What does FinCEN typology code XYZ map to in motif terms?</>}
      />

      <VIS.TrapProblem id="ego-p2" difficulty="hard" title="P2 — State the egonet motif mining recipe."
        scenario={<><em>Discriminating insight: per node, K-hop ego-subgraph extraction, subgraph-isomorphism enumeration over fixed motif catalog, count vector, classifier/threshold. Three steps; no learning happens at the motif level (catalog is FIXED).</em><br/><br/>State.</>}
        options={[
          {key:"a", text:"Run a GNN."},
          {key:"b", text:"Three steps. (1) EGONET EXTRACTION: for each candidate node v (typically every customer account, or a filtered set above some volume threshold), extract the K-hop ego-subgraph G_v — the subgraph induced by v plus all vertices reachable within K transaction hops, plus all edges among them. K = 2 is standard for AML; K = 3 occasionally for deep layering. (2) MOTIF ENUMERATION: for each motif M in a FIXED CATALOG (5-20 patterns: fan-in, fan-out, ring, smurf-star, scatter-gather, pass-through chain), count the number of subgraph-isomorphic copies of M inside G_v. The catalog is curated from regulator typologies and is FIXED — not learned. Enumeration uses algorithms like ESU (Wernicke 2006) or color-coding for tractability. (3) SCORING: the per-node feature vector is the motif-count vector. Either threshold against typology rules (count(fan-in) > T_1 AND count(ring) > T_2 implies SAR review) or feed to XGBoost trained on labeled SAR outcomes. Output: per-node alert with motif-count explanation. No learning at the motif step; classifier weights at the scoring step are learnable and interpretable.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Cluster the graph."},
        ]}
        trap={<>(a)(c)(d) miss the three steps.</>}
        lens={<>K-hop egonet → motif enumeration vs fixed catalog → count vector → threshold or XGBoost.</>}
        stretch={<>What is ESU and why use it for enumeration?</>}
      />

      <VIS.TrapProblem id="ego-p3" difficulty="hard" title="P3 — Name 3 AML motifs and the subgraph signature for each."
        scenario={<><em>Discriminating insight: SMURFING = high in-degree to v from low-balance accounts followed by one large out-edge. FAN-OUT = v has high out-degree to many small accounts. RING = directed cycle v -&gt; a -&gt; b -&gt; v. SCATTER-GATHER = v sends to k intermediaries; all k forward to one destination. Each is a specific subgraph pattern definable up to isomorphism.</em><br/><br/>List.</>}
        options={[
          {key:"a", text:"Skip motifs."},
          {key:"b", text:"Three concrete motifs and their subgraph signatures. (1) SMURFING / FAN-IN FUNNEL: in-edges from many distinct source accounts (typically with low individual balances, each below the 10K CTR reporting threshold) all targeting one node v within a short time window, followed by one or two large out-edges from v. Subgraph: a 'star-into-v then arrow-out' pattern with in-degree(v) >= K (catalog threshold, K = 5-20) and one or two out-edges. Maps to FinCEN typology 'structuring'. (2) FAN-OUT / REVERSE-SMURF: out-edges from v to many distinct recipient accounts with small individual values, optionally re-aggregated downstream. Subgraph: 'arrow-into-v then star-out from v' with out-degree(v) >= K. Maps to 'dispersal'. (3) RING / CYCLE: a directed cycle v → a → b → ... → v of length L (typically L = 3-5) where each edge value is approximately equal (suggesting same money flowing through). Subgraph: a directed cycle of length L containing v. Maps to 'layering' or 'cycle'. Other typology motifs: SCATTER-GATHER, PASS-THROUGH CHAIN, U-TURN PAIR.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip the question."},
        ]}
        trap={<>(a)(c)(d) miss the typology-aligned motif catalog.</>}
        lens={<>Smurfing: high in-degree + small out. Fan-out: high out-degree. Ring: directed cycle. Each = specific subgraph.</>}
        stretch={<>What is a U-turn pair motif?</>}
      />

      <VIS.TrapProblem id="ego-p4" difficulty="hard" multiSelect title="P4 — Pick TRUE statements about egonet motif mining (4 correct)"
        scenario={<><em>Discriminating insight: per node K-hop subgraph, fixed catalog of motifs, count features, interpretable to regulator, classical (no GNN). Not learned end-to-end.</em><br/><br/>Pick TRUE.</>}
        options={[
          {key:"a", text:"Extracts the K-hop ego-subgraph around each candidate node.", correct:true},
          {key:"b", text:"Counts occurrences of a FIXED catalog of small motifs.", correct:true},
          {key:"c", text:"Feature vector = motif-count vector; interpretable to regulator.", correct:true},
          {key:"d", text:"Catalog motifs map to regulator-defined typology codes (FinCEN / FATF).", correct:true},
          {key:"e", text:"Trains a graph neural network end-to-end on node labels."},
          {key:"f", text:"Produces a dense embedding via random walks."},
        ]}
        trap={<>(e) GNN; (f) node2vec/DeepWalk — both wrong mechanisms.</>}
        lens={<>K-hop egonet; fixed motif catalog; count features; typology-mapped; classical (no GNN).</>}
        stretch={<>Why FIXED catalog and not learned?</>}
      />

      <VIS.TrapProblem id="ego-p5" difficulty="medium" title="P5 — What does K control in K-hop egonet?"
        scenario={<><em>Discriminating insight: K is the hop radius. K=1 only sees direct counterparties; K=2 sees counterparties-of-counterparties (captures layering and most AML typologies); K=3 captures deeper rings but EXPLODES the egonet size and enumeration cost. K=2 standard; K=3 occasionally for deep layering investigations.</em><br/><br/>K.</>}
        options={[
          {key:"a", text:"K is irrelevant."},
          {key:"b", text:"K is the HOP RADIUS for ego-subgraph extraction — the maximum graph distance (number of edges) from the center node v that is included in G_v. Effect on what is captured: K = 1 includes only v and its direct transactional counterparties; this catches simple fan-in/fan-out patterns but MISSES layering (counterparty-of-counterparty). K = 2 includes v's counterparties AND their counterparties; this catches most AML typologies including layering, scatter-gather, and short rings (L <= 3). K = 3 includes one more hop and catches deeper rings and chain patterns but the egonet size grows exponentially with K (avg degree ^ K). Effect on cost: enumeration cost is dominated by subgraph isomorphism on G_v, which scales superlinearly with |G_v|. K = 2 keeps |G_v| manageable for most accounts; K = 3 can EXPLODE for high-degree accounts (institutional, exchange) — the egonet can include millions of nodes and motif enumeration becomes infeasible. Production AML default: K = 2 with degree-bound sampling for high-degree nodes. K = 3 reserved for targeted investigations on flagged candidates.", correct:true},
          {key:"c", text:"K should be max."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the hop-radius trade-off.</>}
        lens={<>K = 1: counterparties. K = 2: layering. K = 3: explodes. Standard: K = 2 with degree sampling.</>}
        stretch={<>What does ego-subgraph size grow like in K?</>}
      />

      <VIS.TrapProblem id="ego-p6" difficulty="hard" title="P6 — Why is subgraph isomorphism the right primitive for motif counting?"
        scenario={<><em>Discriminating insight: subgraph isomorphism = &quot;does motif M appear as a subgraph of egonet G_v, up to vertex relabeling?&quot; — exactly the question motif counting asks. NP-hard in general but tractable on small (K=2) egonets and small (3-5 node) motifs via ESU / color-coding. Tools: VF3, VF3-light, GraphTool. Alternative graph-edit distance is too coarse.</em><br/><br/>Why isomorphism.</>}
        options={[
          {key:"a", text:"Use graph-edit distance."},
          {key:"b", text:"Subgraph isomorphism asks exactly the question motif counting asks: 'does the canonical pattern M (e.g., a 5-node fan-in star with one out-arrow) appear as a subgraph of egonet G_v, up to vertex relabeling?'. The OUTPUT is a count of distinct embeddings of M in G_v, which is the feature value. The problem is NP-hard in general (subgraph isomorphism is one of Karp's 21 NP-complete problems), but TRACTABLE in the AML use case because: (a) the motif M is SMALL (3-5 nodes, typically 4); (b) the egonet G_v is SMALL after K=2 with degree-bound sampling (typically tens to hundreds of nodes); (c) edges are TYPED (transaction direction, value range, time window) which dramatically prunes the search. Algorithms: VF3 (Carletti et al.), VF3-light, the ESU algorithm (Wernicke 2006 for unbiased motif sampling), color-coding (Alon-Yuster-Zwick for approximate counts). Tools: NetworkX (small graphs), GraphTool, igraph. Alternative graph-edit distance is TOO COARSE — it gives a single distance number, not a count of pattern occurrences. Production: use a typed subgraph-isomorphism library; expect milliseconds per egonet per motif at K = 2.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip motifs."},
        ]}
        trap={<>(a)(c)(d) miss the isomorphism primitive.</>}
        lens={<>Subgraph isomorphism: exact 'does M appear in G_v' question. NP-hard but tractable on small egonets + small motifs. VF3, ESU.</>}
        stretch={<>What does typed-edge pruning gain?</>}
      />

      <VIS.TrapProblem id="ego-p7" difficulty="hard" title="P7 — Concept-specific misattribution: motif counts are LARGE on benign accounts. Cause?"
        scenario={<><em>Discriminating insight (concept-specific): (1) catalog motif too LOOSE — &quot;any 3-node star&quot; matches every account; (2) K too large — egonet includes huge swaths of the graph and even rare motifs accumulate; (3) high-volume legitimate businesses (merchants, exchanges) genuinely HAVE fan-in/fan-out patterns; (4) motif counts not NORMALIZED by egonet size; need per-egonet rate. Concept-specific.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"Motif-mining-specific causes for high counts on benign accounts. (1) MOTIF TOO LOOSE — a motif defined as 'any 3-node star with v as center' matches every account; needs tightened with typology-specific constraints (value range = below CTR threshold, time window = 24h, sender accounts not previously linked to v). (2) K TOO LARGE — at K = 3 the egonet for a normal customer can include hundreds of nodes; even rare motifs accumulate. Reduce K to 2 with degree-bound sampling. (3) LEGITIMATE HIGH-VOLUME ACCOUNTS — payroll processors, e-commerce merchants, exchanges genuinely have fan-in or fan-out patterns. Mitigations: maintain an EXCLUSION LIST of known high-volume legitimate accounts; OR normalize motif counts by egonet size (count_rate = count / |G_v|) so a million-counterparty merchant doesn't trigger by raw count. (4) UN-NORMALIZED COUNTS — a raw count of 50 fan-in edges has different meaning for an account with 60 counterparties vs 5000; normalize by egonet size or use Z-score against population baseline. (5) TIME WINDOW too long — accumulating motifs over months conflates legitimate patterns with bursts; use rolling windows aligned to typology definitions.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Motif too loose / K too large / legitimate high-volume / un-normalized counts / time window too long. Each concept-specific.</>}
        stretch={<>How do you tune motif tightness per typology?</>}
      />

      <VIS.TrapProblem id="ego-p8" difficulty="hard" title="P8 — Compare egonet motif mining to a GNN like CARE-GNN."
        scenario={<><em>Discriminating insight: motif mining = CLASSICAL graph mining; fixed catalog; interpretable; no message passing. CARE-GNN = LEARNED message passing; reinforcement-learned aggregation; uninterpretable score. Different mechanisms entirely. Use motif mining for regulator-defensible alerts; use CARE-GNN for raw performance when regulator-interpretability isn't binding.</em><br/><br/>Compare.</>}
        options={[
          {key:"a", text:"Same thing."},
          {key:"b", text:"Different MECHANISMS, different OUTPUTS. Egonet motif mining is CLASSICAL graph mining: per-node K-hop egonet extraction + subgraph-isomorphism counting against a FIXED motif catalog of typology-aligned patterns. No message passing, no embeddings. Output: per-motif counts → interpretable feature vector → typology threshold or XGBoost. CARE-GNN (Camouflage-Resistant GNN, CIKM 2020) is a LEARNED GNN: message passing with neighbor aggregation; uses reinforcement learning to choose which neighbors to attend to (defends against label-flipping camouflage attacks where fraudsters disguise their neighborhood); produces a per-node embedding then a learned classifier score. Output: uninterpretable score (post-hoc explainer needed). Use motif mining when: regulator interpretability is binding (bank AML, SAR alerts), the typology catalog is well-defined (FinCEN/FATF). Use CARE-GNN when: regulator-interpretability is not binding (internal risk scoring, credit-card fraud), you have labeled training data, raw recall/precision matters. Production AML: motif features as INPUTS to an XGBoost (auditable); GNN in parallel as candidate generator (unflagged candidates only).", correct:true},
          {key:"c", text:"GNN is always better."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the mechanism difference.</>}
        lens={<>Motif mining: classical, catalog, interpretable. CARE-GNN: learned, message-passing, uninterpretable. Different use cases.</>}
        stretch={<>What does CARE-GNN's RL component defend against?</>}
      />

      <VIS.TrapProblem id="ego-p9" difficulty="hard" title="P9 — Compare egonet motif mining to node2vec / DeepWalk."
        scenario={<><em>Discriminating insight: node2vec produces DENSE EMBEDDINGS from random walks — uninterpretable. Motif mining produces COUNT FEATURES — interpretable. Different purposes: node2vec feeds downstream models; motif mining produces auditable alerts directly. Motif features can also FEED downstream models.</em><br/><br/>Compare.</>}
        options={[
          {key:"a", text:"Identical."},
          {key:"b", text:"DIFFERENT primitives and different outputs. Node2vec (Grover-Leskovec KDD 2016) and DeepWalk (Perozzi et al. KDD 2014) generate RANDOM WALKS from each node, then train a SKIP-GRAM model on the walk sequences to produce a DENSE EMBEDDING (typically d = 128) per node. The embedding captures STRUCTURAL similarity (nodes in similar neighborhoods get similar embeddings) but is UNINTERPRETABLE — you cannot point to a particular dimension and say 'this is the funnel-pattern dimension'. Motif mining COUNTS occurrences of NAMED motifs in the K-hop egonet — each feature has a clear interpretation ('count of 5-node fan-in stars'). Use node2vec when: downstream model wants dense graph features for arbitrary tasks (link prediction, node classification), interpretability is not required. Use motif mining when: regulator-interpretable features are needed, the relevant patterns are known and enumerable (AML typologies). They can be COMBINED: motif counts as interpretable features PLUS node2vec embeddings as additional dense features; XGBoost on the union; the motif-count features are highlighted in the alert package while node2vec features add raw predictive power.", correct:true},
          {key:"c", text:"Skip both."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the embedding-vs-count distinction.</>}
        lens={<>node2vec: dense embeddings, uninterpretable. Motif: count features, interpretable. Can combine.</>}
        stretch={<>How does skip-gram on random walks produce structural similarity?</>}
      />

      <VIS.TrapProblem id="ego-p10" difficulty="hard" title="P10 — Enumeration explosion: what mitigations?"
        scenario={<><em>Discriminating insight: subgraph enumeration cost grows superlinearly with egonet size and exponentially with motif size. Mitigations: (1) cap K to 2; (2) degree-bound sampling on high-degree nodes; (3) ESU sampling for unbiased estimates; (4) color-coding for approximate counts; (5) typed-edge pruning; (6) limit motif size to 3-5 nodes. Stack these.</em><br/><br/>Mitigate.</>}
        options={[
          {key:"a", text:"Use a bigger machine."},
          {key:"b", text:"Five mitigations, stack as needed. (1) CAP K = 2 — keeps egonet size bounded for most accounts. K = 3 only for targeted investigations on flagged candidates. (2) DEGREE-BOUND SAMPLING — for high-degree nodes (institutional accounts, exchanges, merchants) with egonet that would exceed a size budget (10K nodes), sample K neighbors per hop instead of taking all neighbors; degrades motif counts to RATE estimates (count per sampled-subgraph) and reduces enumeration cost. (3) ESU SAMPLING (Wernicke 2006) — instead of full enumeration, sample a subset of motif embeddings uniformly at random with provable unbiased count estimates; controls the cost-precision trade-off. (4) COLOR-CODING (Alon-Yuster-Zwick 1995) — randomly color vertices with k colors and count only colorful motifs; gives approximate count with controlled variance and polynomial cost. (5) TYPED-EDGE PRUNING — edges typed by direction, value range, time window dramatically prune the subgraph-isomorphism search (e.g., 'find a fan-in star where all in-edges are sub-CTR-threshold' filters out 99% of search). (6) LIMIT MOTIF SIZE — keep motifs to 3-5 nodes; bigger motifs explode in cost and are rarely needed for AML typologies (typology motifs are intrinsically small).", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the mitigation stack.</>}
        lens={<>K=2 / degree-sampling / ESU / color-coding / typed-edge prune / motif-size cap. Stack as needed.</>}
        stretch={<>What guarantees does ESU give on count variance?</>}
      />

      <VIS.TrapProblem id="ego-p11" difficulty="medium" title="P11 — Production: 10M-account bank — feasibility?"
        scenario={<><em>Discriminating insight: feasible nightly batch with mitigations. Per-account cost: 1-10 ms motif enumeration at K=2 with typed-edge pruning. 10M accounts x 5 ms = 14 GPU-hours nightly — affordable. Streaming sub-second is the harder problem; use rule pre-filters + on-demand enumeration on flagged candidates.</em><br/><br/>Feasibility.</>}
        options={[
          {key:"a", text:"Infeasible."},
          {key:"b", text:"FEASIBLE for nightly batch; HARDER for streaming. Per-account cost: 1-10 ms for motif enumeration over a K=2 egonet with typed-edge pruning on a typed transaction graph (typical egonet size 50-500 nodes; 5-20 catalog motifs each at 3-5 nodes). At 10M accounts: 10M x 5 ms = 50000 sec = ~14 GPU-hours / CPU-hours nightly. AFFORDABLE on commodity infrastructure. Daily batch fits the typical AML SAR-filing cadence (alerts reviewed daily; SAR filed within 30 days of detection). For STREAMING / real-time scoring (sub-second), full enumeration per transaction is infeasible. Architecture: (a) RULE PRE-FILTERS on transaction velocity, value, counterparty count — fire candidate flags in real time; (b) ON-DEMAND motif enumeration only on flagged candidates — milliseconds for one candidate; (c) NIGHTLY BATCH refresh of motif counts for all accounts. Memory: graph stored in a graph database (Neo4j, TigerGraph) or compressed adjacency (CSR sparse arrays); 10M nodes + 100M edges fits in single-host RAM. Tools: TigerGraph has built-in motif templates; Spark GraphX for distributed counting if needed.", correct:true},
          {key:"c", text:"Always infeasible."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the batch-vs-stream architecture.</>}
        lens={<>Nightly batch: feasible at 14 hours for 10M accounts. Streaming: rule pre-filter + on-demand enumeration on candidates.</>}
        stretch={<>Does TigerGraph or Neo4j fit motif templates natively?</>}
      />

      <VIS.TrapProblem id="ego-p12" difficulty="hard" title="P12 — Concept-specific misattribution: motif mining MISSES a known laundering pattern detected by an investigator."
        scenario={<><em>Discriminating insight (concept-specific): the pattern is NOT in the catalog. Motif mining is catalog-bound; new typologies require catalog updates. Process: ingest investigator&apos;s pattern; encode as a new motif (subgraph definition); add to catalog; backfill counts. NOT a learning failure — a curation failure.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Use a bigger model."},
          {key:"b", text:"Catalog gap. Motif mining is CATALOG-BOUND: it counts only the motifs the catalog defines. A laundering pattern the investigator detected by intuition (e.g., a novel U-turn-with-currency-conversion pattern) is invisible to the algorithm if it's NOT in the catalog. This is NOT a learning failure (no learning happens at the motif level); it's a CATALOG CURATION failure. Process to fix: (a) the investigator describes the pattern in graph terms (number of nodes, edge directions, value relationships, time constraints); (b) the AML team encodes it as a new motif specification (subgraph topology + edge-type constraints); (c) add the new motif to the catalog with a typology code mapping; (d) backfill: re-run motif enumeration on historical egonets to compute counts for the new motif; (e) retrain the downstream classifier (XGBoost) on the expanded feature set. Update cadence: typical AML team adds 1-3 new motifs per quarter as new typologies emerge or regulators publish new guidance. The catalog is a living artifact maintained by domain experts. CONTRAST with GNN: a GNN could potentially LEARN to detect a novel pattern from labeled examples, but only after the examples are labeled and the GNN retrained.", correct:true},
          {key:"c", text:"Lower learning rate."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the catalog-curation requirement.</>}
        lens={<>Catalog-bound: not in catalog = missed. Fix: investigator → graph spec → add motif → backfill → retrain classifier. Curation, not learning.</>}
        stretch={<>How often does the catalog need updating?</>}
      />

      <VIS.TrapProblem id="ego-p13" difficulty="medium" multiSelect title="P13 — Decoys: which are NOT egonet motif mining? (4 correct)"
        scenario={<><em>Discriminating insight: GNN, node2vec/DeepWalk, streaming anomaly (MIDAS), graph clustering (Louvain) are NOT egonet motif mining. K-hop egonet + fixed motif catalog + count IS.</em><br/><br/>Pick NOT-motif-mining.</>}
        options={[
          {key:"a", text:"Train a GraphSAGE classifier on node features.", correct:true},
          {key:"b", text:"Generate dense embeddings via random walks (node2vec).", correct:true},
          {key:"c", text:"Streaming edge-burst anomaly via count sketches (MIDAS).", correct:true},
          {key:"d", text:"Louvain community detection on the full graph.", correct:true},
          {key:"e", text:"Per node K-hop egonet + count occurrences of fixed typology motifs."},
        ]}
        trap={<>(a) GNN; (b) random-walk embedding; (c) streaming sketches; (d) community detection — all different mechanisms.</>}
        lens={<>Egonet motif mining = K-hop egonet + fixed catalog + count. Drop any piece and it is not.</>}
        stretch={<>What does Louvain optimize?</>}
      />

      <VIS.TrapProblem id="ego-p14" difficulty="hard" title="P14 — Concept-specific misattribution: motif counts give HIGH alert volume but LOW SAR-file rate."
        scenario={<><em>Discriminating insight (concept-specific): high false-positive rate. Causes: (1) motif thresholds too loose; (2) catalog motifs too generic (catch benign high-volume patterns); (3) no second-stage classifier — raw counts thresholded directly; (4) no exclusion list for legitimate merchants; (5) typology weighting mis-calibrated. Apply XGBoost on motif features trained on labeled SAR outcomes.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"High false-positive rate; classical AML calibration problem. Concept-specific causes. (1) MOTIF THRESHOLDS TOO LOOSE — directly thresholding raw counts (fan-in count > 10 → alert) catches everyone with moderate volume. Fix: thresholds should be PER-TYPOLOGY tuned on labeled outcomes. (2) CATALOG MOTIFS TOO GENERIC — 'any 3-node star' matches every account. Tighten with typology-specific edge constraints (in-edges below CTR threshold, time window 24h, no prior link history). (3) NO SECOND-STAGE CLASSIFIER — raw motif counts thresholded directly. Production fix: feed motif counts + auxiliary features (account age, KYC tier, geo-risk) to an XGBoost trained on labeled SAR outcomes; XGBoost learns the weighting and the threshold. Alert volume drops 5-10x. (4) NO EXCLUSION LIST for legitimate high-volume accounts (payroll processors, merchants, exchanges) — these genuinely have fan-in/fan-out patterns; maintain a curated exclusion list checked first. (5) TYPOLOGY WEIGHTING MIS-CALIBRATED — if all 20 motifs in the catalog are weighted equally, rare typologies are drowned out by common ones (fan-in is common; rings are rare). XGBoost handles this automatically. Net: motif mining is CANDIDATE GENERATION; second-stage classifier is the precision tuner.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the calibration causes.</>}
        lens={<>Thresholds / motif tightness / second-stage XGBoost / exclusion list / typology weighting. Stack of calibrations.</>}
        stretch={<>What features should the XGBoost see besides motif counts?</>}
      />

      <VIS.TrapProblem id="ego-p15" difficulty="hard" title="P15 — Color-coding for motif enumeration: what does it do?"
        scenario={<><em>Discriminating insight: color-coding (Alon-Yuster-Zwick 1995) randomly colors graph vertices with k colors then counts only &quot;colorful&quot; copies of a k-node motif (one node of each color); gives approximate motif count with polynomial cost. Run multiple coloring iterations and average. Trade exact count for tractable runtime on large egonets.</em><br/><br/>Color-coding.</>}
        options={[
          {key:"a", text:"Color-coding is full enumeration."},
          {key:"b", text:"COLOR-CODING (Alon-Yuster-Zwick 1995) is an approximation technique for motif counting. Mechanism: for a target motif of size k (e.g., k = 5 for a 5-node ring), randomly assign each graph vertex one of k COLORS uniformly at random; then count only the COLORFUL copies of the motif (those where the k vertices have all k distinct colors). The probability that a particular motif embedding is colorful is k!/k^k > 0 (Stirling-bounded); multiplying the colorful count by 1 / (k!/k^k) gives an UNBIASED estimate of the total count. Repeat with multiple independent colorings to reduce variance. The colorful-motif counting itself is polynomial (O(2^k * V * E)) — much cheaper than full enumeration which is exponential in k. Use for: large egonets where exact enumeration explodes; motifs of size 5+; when you need a tractable count estimate with controlled variance. Trade-off: returns an APPROXIMATE count with variance proportional to 1/(number of iterations); good enough for ranking accounts by motif intensity but not for exact regulatory reporting. ESU (Wernicke 2006) is an alternative sampling-based approach with similar trade-offs.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip motifs."},
        ]}
        trap={<>(a)(c)(d) miss the color-coding mechanism.</>}
        lens={<>Color-coding: randomly color vertices, count colorful motifs, scale by k!/k^k. Polynomial cost. Approximate count.</>}
        stretch={<>How does ESU differ from color-coding?</>}
      />

      <VIS.TrapProblem id="ego-p16" difficulty="medium" title="P16 — Junior: 'Egonet motif mining is just a graph database query'. Refute."
        scenario={<><em>Discriminating insight: half right on mechanics (subgraph query) but misses the CATALOG + COUNT-AS-FEATURE + REGULATOR-MAPPING substance. A naive Cypher query gives you matches; egonet motif mining wraps it in a catalog of typologies, count-as-feature aggregation, and audit-trail mapping.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Junior is right."},
          {key:"b", text:"Half right on mechanics, missing the substance. YES — at the lowest level, motif enumeration on an egonet IS a subgraph-isomorphism query, the kind of query Cypher (Neo4j) or GSQL (TigerGraph) supports natively (MATCH (a)-[:txn]->(b)-[:txn]->(a)). Without further structure, it gives a list of matches. Egonet motif mining as an AML methodology adds: (1) a CURATED CATALOG of typology-aligned motifs (5-20 patterns mapped to FinCEN/FATF codes), maintained by domain experts; (2) COUNT-AS-FEATURE aggregation — each motif's count becomes a feature in a per-node vector; (3) SECOND-STAGE CLASSIFIER (XGBoost) trained on labeled SAR outcomes to weight the typology counts; (4) AUDIT-TRAIL MAPPING — each alert package documents which motifs fired and which typology codes they map to; (5) ENUMERATION ENGINEERING — typed-edge pruning, color-coding, ESU sampling to make subgraph enumeration tractable at 10M-account scale. Calling it 'just a graph query' loses the catalog (the load-bearing intellectual artifact), the counts-as-features layer, the typology mapping, and the engineering for tractability.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"They are identical."},
        ]}
        trap={<>(a)(c)(d) collapse mechanics with substance.</>}
        lens={<>Subgraph query: low-level primitive. Egonet motif mining: catalog + count-feature + classifier + audit + engineering.</>}
        stretch={<>What does Cypher's MATCH clause give you?</>}
      />

      <VIS.TrapProblem id="ego-p17" difficulty="hard" title="P17 — Skeptic: 'Just use a GNN — motif mining is obsolete'. Refute."
        scenario={<><em>Discriminating insight: skeptic ignores regulator interpretability. GNNs win on raw recall/precision; motif mining wins on interpretability and audit. In production AML, motif features FEED an XGBoost; GNN may run in parallel. Combination is best; either alone misses something.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Skeptic is right."},
          {key:"b", text:"Ignores regulator interpretability. GNNs (CARE-GNN, GAGA, GraphGuard) win on RAW PERFORMANCE (recall/precision on labeled benchmarks) — they can learn patterns motif mining misses. But AML alerts are not just performance: a SAR (Suspicious Activity Report) must be DEFENSIBLE to FinCEN/FATF auditors; alerts must be MAPPED to regulator typology codes; investigators must be able to trace WHY each alert fired. Motif mining gives this BY CONSTRUCTION — every alert decomposes into typology-coded motif counts. GNN scores require post-hoc explainers (GNNExplainer, SubGraphX) whose explanations are approximations, not the model's actual decision logic. Production AML at large banks: motif features as INPUT to an XGBoost (auditable); GNN runs in parallel as a CANDIDATE GENERATOR for the human review queue; motif-XGBoost is the auditable scorer. Neither alone is sufficient. Calling motif mining 'obsolete' loses the regulatory defense. Calling GNN 'unnecessary' loses raw recall on novel patterns the catalog misses. Both have a role; the choice is architectural, not either/or.", correct:true},
          {key:"c", text:"Always GNN."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the regulator-defensible role.</>}
        lens={<>GNN: raw performance. Motif: interpretable, defensible. Combine: motif features → XGBoost (auditable); GNN as candidate generator.</>}
        stretch={<>What is a SAR and what auditors review it?</>}
      />

      <VIS.TrapProblem id="ego-p18" difficulty="hard" title="P18 — Catalog of motifs: how do you VALIDATE it?"
        scenario={<><em>Discriminating insight: catalog validation: (1) sensitivity — labeled SAR cases should exhibit catalog motifs at higher rates than controls; (2) specificity — random non-flagged accounts should not over-fire; (3) coverage — investigator-found cases should be detectable via catalog; (4) catalog completeness audit against FinCEN/FATF typology publications. Periodic refresh.</em><br/><br/>Validate.</>}
        options={[
          {key:"a", text:"Skip validation."},
          {key:"b", text:"Catalog is a curated intellectual artifact; validation is a periodic process. Validation dimensions. (1) SENSITIVITY: on a held-out set of LABELED SAR cases (accounts that resulted in filed SARs), compute motif counts; cases should exhibit catalog motifs at materially higher rates than non-SAR controls. If a typology has zero discriminating power, the motif is mis-specified — re-tighten or remove. (2) SPECIFICITY: on random non-flagged accounts, compute motif counts; catalog should not over-fire on benign volume. If specificity is poor, tighten motif constraints or add exclusion lists. (3) COVERAGE: investigator-detected cases that the catalog MISSED (false negatives where humans found laundering the motif catalog did not flag) — analyze the missed pattern and add new motifs to the catalog. (4) COMPLETENESS audit against FinCEN red-flag typology publications, FATF typology reports, and bank's own historical SAR taxonomy — ensure each published typology has at least one corresponding motif. (5) PERIODIC REFRESH cadence: quarterly catalog review; ad-hoc additions when new typologies emerge (e.g., crypto-bridge patterns post-Tornado Cash). Document the catalog version in alert packages for audit reproducibility.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the validation dimensions.</>}
        lens={<>Sensitivity / specificity / coverage / completeness / refresh. Catalog is a versioned, validated artifact.</>}
        stretch={<>What FinCEN publication catalogs typology codes?</>}
      />

      <VIS.TrapProblem id="ego-p19" difficulty="medium" title="P19 — Edge typing: why critical for motif mining?"
        scenario={<><em>Discriminating insight: untyped edges = combinatorial explosion (any edge counts). Typed by direction, value range, time window, currency, counterparty risk tier — dramatically PRUNES subgraph-isomorphism search and tightens motif specificity to the typology. Without edge typing, &quot;fan-in&quot; matches every account; with typing, &quot;fan-in of sub-CTR-threshold transactions within 24h&quot; matches a small set.</em><br/><br/>Typing.</>}
        options={[
          {key:"a", text:"Edge types are optional."},
          {key:"b", text:"CRITICAL for two reasons. (1) TIGHTNESS TO TYPOLOGY: a motif like 'fan-in star' is too loose without edge constraints — every account with multiple counterparties matches. Adding edge types — direction (in vs out), value range (below CTR threshold of $10K), time window (24-hour rolling), currency (cash, wire, crypto), counterparty risk tier (high-risk jurisdiction) — TIGHTENS the motif to the specific typology: 'fan-in star where all in-edges are CASH below $9999 within 24h from accounts in high-risk jurisdictions' maps to structuring. Without typing, the motif fires on legitimate volume; with typing, it discriminates. (2) ENUMERATION COST: typed edges PRUNE the subgraph-isomorphism search dramatically. A subgraph-iso query that scans all edges is O(|E|^k) for a k-edge motif; with typed-edge indexes, the search is restricted to edges of the right type, often reducing the candidate set by 100-1000x. Implementation: store edges in a graph database with edge-type indexes (Neo4j relationship types, TigerGraph edge types) or pre-partition the graph by type for offline batch. Edge typing is what makes catalog motifs both DISCRIMINATING and TRACTABLE at scale.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip typing."},
        ]}
        trap={<>(a)(c)(d) miss the tightness + cost roles.</>}
        lens={<>Typed edges: tighten to typology + prune isomorphism search. Both load-bearing for motif mining at scale.</>}
        stretch={<>How does TigerGraph edge-type indexing work?</>}
      />

      <VIS.TrapProblem id="ego-p20" difficulty="hard" title="P20 — Concept-specific misattribution: motif counts ZERO across many accounts. Cause?"
        scenario={<><em>Discriminating insight (concept-specific): (1) motif catalog too TIGHT (no real accounts match exactly); (2) edge typing mis-specified — wrong currency code or wrong time window; (3) K=1 instead of K=2 — too shallow to capture layering; (4) the typology really is rare (cycles are rare). Distinguish a bug from a true rarity.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"Motif-mining-specific causes for zero counts. (1) CATALOG MOTIFS TOO TIGHT — if a motif specification includes too many constraints (specific value range AND specific time AND specific currency AND specific counterparty tier), almost nothing matches exactly. Fix: relax non-essential constraints; tune via labeled SAR cases to find the sensitivity-specificity sweet point. (2) EDGE TYPING MIS-SPECIFIED — if your typed edges use a 'currency' field that's missing or coded differently for the new motif (e.g., catalog expects 'USD-cash' but data has 'cash-deposit-USD'), the subgraph-isomorphism query returns no matches. Check the join key alignment between catalog spec and data schema. (3) K = 1 INSTEAD OF K = 2 — at K = 1 you only see direct counterparties; layering motifs (which require 2-3 hops) are unreachable. Fix: increase K to 2 for layering typologies. (4) TRUE RARITY — cycles and complex motifs (5+ nodes) are GENUINELY rare in retail-payment graphs. If validated catalog and edge typing are correct, low count is real signal — those motifs are high-precision when they DO fire. Distinguish a bug from a true rarity by re-running on a labeled SAR set: if the catalog fires on known SARs, the rarity is real.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Catalog too tight / edge typing mis-spec / K too shallow / true rarity. Distinguish bug from rare signal via labeled SARs.</>}
        stretch={<>How do you distinguish bug from rarity systematically?</>}
      />

      <VIS.TrapProblem id="ego-p21" difficulty="hard" title="P21 — In one sentence, THE unique mechanism of egonet motif mining."
        scenario={<><em>Discriminating insight: per node, K-HOP EGO-SUBGRAPH EXTRACTION + ENUMERATE SMALL CANONICAL MOTIFS FROM A FIXED REGULATOR-ALIGNED CATALOG + COUNT OCCURRENCES AS FEATURES. Classical graph mining; interpretable; not learned. NOT GNN. NOT random-walk embedding. NOT streaming subgraph anomaly.</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"It is a GNN."},
          {key:"b", text:"For each candidate node v in the transaction graph, EXTRACT the K-HOP EGO-SUBGRAPH G_v (typically K = 2 for AML); ENUMERATE small canonical MOTIFS from a FIXED CATALOG (fan-in, fan-out, ring, smurf-star, scatter-gather, pass-through — 5-20 patterns aligned to regulator typologies FinCEN/FATF); for each motif M, COUNT the number of subgraph-isomorphic occurrences of M in G_v; the COUNT VECTOR becomes the per-node feature. SCORING: either typology-rule threshold (count > T fires alert) or feed counts to an XGBoost trained on labeled SAR outcomes. ENGINEERING: typed-edge pruning, ESU sampling, color-coding to make subgraph enumeration tractable at 10M-account scale. CLASSICAL graph mining; no neural network, no message passing, no learned embedding. NOT a GNN (CARE-GNN, GraphSAGE — learned message passing). NOT a random-walk embedding (node2vec, DeepWalk — dense uninterpretable vectors). NOT streaming subgraph anomaly (Spotlight, MIDAS — streaming sketches on edge bursts). The catalog is FIXED at curation time; interpretability is by construction.", correct:true},
          {key:"c", text:"It is a random-walk embedding."},
          {key:"d", text:"It is streaming anomaly."},
        ]}
        trap={<>(a)(c)(d) miss the K-hop-egonet + catalog + count mechanism.</>}
        lens={<>K-hop egonet + fixed catalog + count-as-feature. Classical, interpretable, catalog-bound.</>}
        stretch={<>What does FinCEN catalog and how does motif mining map to it?</>}
      />

      <VIS.TrapProblem id="ego-p22" difficulty="medium" title="P22 — When NOT to use egonet motif mining."
        scenario={<><em>Discriminating insight (concept-specific): (1) typology catalog not defined (novel domain, no FinCEN/FATF analog); (2) regulator-interpretability not required (internal risk scoring); (3) catalog of patterns is infinite (web fraud with adversarial creativity); (4) graph dense enough that enumeration explodes even with mitigations (massive payment networks at &gt;1B nodes). Concept-specific.</em><br/><br/>Skip.</>}
        options={[
          {key:"a", text:"Always use motif mining."},
          {key:"b", text:"Skip motif mining when: (1) TYPOLOGY CATALOG NOT DEFINED — for a novel fraud domain without regulator-published typologies (consumer ATO, novel crypto patterns without FATF coverage), there is no curated catalog to count against. Use learned methods (GNN, autoencoder anomaly). (2) REGULATOR-INTERPRETABILITY NOT REQUIRED — for internal risk scoring (credit-card transaction fraud, e-commerce chargebacks) where the model output is used internally and not packaged for FinCEN/FATF audit, the interpretability benefit doesn't matter; learned methods may win on raw performance. (3) PATTERN SPACE IS INFINITE / ADVERSARIAL — web fraud with adversarial fraudsters who actively avoid known patterns generates an open-ended space of patterns; a fixed catalog is always behind. Use learned methods (GNN with adversarial training, anomaly detection). (4) GRAPH IS TOO DENSE — at >1B nodes with high average degree (large payment networks, large social graphs), enumeration cost is prohibitive even with K=2, degree sampling, and color-coding. Switch to sampling-based GNN or streaming anomaly. (5) Real-time sub-millisecond scoring required — enumeration cost is in milliseconds per egonet; use rule pre-filters + offline motif refresh.", correct:true},
          {key:"c", text:"Never use motif mining."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>Skip when no catalog / no regulator constraint / adversarial open patterns / dense >1B graph / sub-ms latency.</>}
        stretch={<>What's the catalog gap for crypto-bridge laundering?</>}
      />

      <VIS.TrapProblem id="ego-p23" difficulty="hard" title="P23 — Production pipeline: how does motif mining slot into bank AML stack?"
        scenario={<><em>Discriminating insight: nightly batch motif enumeration over all accounts → XGBoost scoring on motif features + auxiliary features → top-K alerts to investigator queue → SAR decision with motif-count explanation in alert package. Motif refresh cadence: 24h. Catalog refresh cadence: quarterly. Audit log of catalog version per alert.</em><br/><br/>Pipeline.</>}
        options={[
          {key:"a", text:"Just run motif enumeration."},
          {key:"b", text:"End-to-end production pipeline. (1) GRAPH INGEST: nightly ETL of transactions into a typed graph store (TigerGraph or Spark-based CSR sparse arrays). Edges typed by direction, value, time, currency, risk tier. (2) MOTIF ENUMERATION: per-account K=2 egonet extraction + subgraph-iso counting against the fixed catalog (5-20 motifs); typed-edge pruning + color-coding for tractability. 10M accounts in ~14 hours nightly batch. Output: per-account motif-count table (account_id, motif_name, count, last_updated). (3) FEATURE JOIN: combine motif counts with auxiliary features — account tenure, KYC tier, geo-risk score, recent transaction velocity, OFAC sanctions flags. (4) XGBOOST SCORING: feed combined features into XGBoost classifier trained on historical labeled SAR outcomes; output per-account risk score. (5) ALERT QUEUE: top-K (typically top-1000 nationally per day) alerts routed to investigator review queue. Each alert package includes: motif-count breakdown, typology code mapping, top contributing features (XGBoost SHAP), historical activity timeline. (6) SAR DECISION: investigator reviews; files SAR (Suspicious Activity Report) to FinCEN if confirmed. (7) FEEDBACK LOOP: confirmed SARs become labeled data for next XGBoost retrain (quarterly). (8) AUDIT: every alert documents catalog version, model version, feature snapshot for regulator reproducibility.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the end-to-end pipeline.</>}
        lens={<>Graph ingest → motif enum → feature join → XGBoost → alert queue → SAR → feedback loop → audit.</>}
        stretch={<>What does SHAP add to the alert package?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://dl.acm.org/doi/10.1145/3637528.3671594" target="_blank" rel="noopener"><strong>Subgraph-level GNN for AML</strong></a> <span style={{color:"#64748b", fontSize:14}}>(KDD 2024, paper)</span><br/>Combines egonet motif features with a GNN for AML. Section 3 defines the typology motif catalog; Section 4 shows the lift over node-only GNN.</li>
        <li><a href="https://www.fincen.gov/resources/statutes-regulations/cfr/31-cfr-chapter-x" target="_blank" rel="noopener"><strong>FinCEN — Suspicious Activity Report (SAR) typology codes</strong></a> <span style={{color:"#64748b", fontSize:14}}>(regulator reference)</span><br/>The U.S. Treasury FinCEN canonical typology catalog: structuring, layering, integration, smurfing, cycle. Egonet motif catalogs map directly to these codes.</li>
        <li><a href="https://www.fatf-gafi.org/en/publications.html" target="_blank" rel="noopener"><strong>FATF typology reports</strong></a> <span style={{color:"#64748b", fontSize:14}}>(regulator reference)</span><br/>The international Financial Action Task Force publishes typology reports per domain (trade-based laundering, cyber-laundering, crypto). New motifs are added to catalogs after each report.</li>
        <li><a href="https://snap.stanford.edu/proj/embeddings-www/" target="_blank" rel="noopener"><strong>Stanford SNAP graph mining tutorial</strong></a> <span style={{color:"#64748b", fontSize:14}}>(tutorial)</span><br/>Walk-through of motif counting, subgraph isomorphism, ESU sampling, and color-coding with worked examples on social and financial graphs.</li>
        <li><a href="https://arxiv.org/abs/2008.08692" target="_blank" rel="noopener"><strong>Dou, Liu, Sun, Deng, Peng, Yu — CARE-GNN (CIKM 2020)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The contrast point: a learned camouflage-resistant GNN for fraud. Read in parallel to understand the interpretability-vs-performance trade-off motif mining navigates.</li>
      </ul>
    </VIS.Section>
  </main>
);
