<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// SHAP / Tree SHAP for GBDT — exact polynomial-time Shapley values for tree ensembles,
// the practical fraud-explainability workhorse for FCRA-required adverse-action notices.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Explainability"
      title="SHAP and Tree SHAP for GBDT fraud models"
      subtitle="Exact polynomial-time Shapley values turn a black-box gradient-boosted tree into per-feature attributions, the standard fraud-explainability tool for adverse-action notices."
      byline={[
        {label: "Source", value: "Lundberg et al. — Tree SHAP (Nature Machine Intelligence 2020)"},
        {label: "Year", value: "2020 / 2024 (standard fraud-team practice)"},
        {label: "L2", value: "Explainability for fraud decisions"},
      ]}/>

    <VIS.TLDR>
      A <VIS.Term def="A class of machine-learning models that builds an ensemble of decision trees one at a time, where each new tree corrects the errors of the previous ones, commonly used for tabular fraud detection.">gradient-boosted tree</VIS.Term> ensemble scores millions of transactions per day but tells you nothing about <em>why</em>. <VIS.Term def="A method from cooperative game theory that fairly distributes a prediction's value across the input features by averaging marginal contributions over all feature subsets.">SHAP</VIS.Term> turns each prediction into a per-feature attribution; Tree SHAP makes that attribution exact and polynomial-time for tree models, which is what lets fraud teams ship FCRA-compliant adverse-action notices that say <em>here are the four features that drove the decision</em> without sampling noise.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Pose attribution as a cooperative game. The players are the features; the payout is the model output for a particular row; each player's fair share of the payout is its <VIS.Term def="The Shapley value of a feature is its average marginal contribution to the prediction across all possible orderings of the other features. It is the unique attribution scheme satisfying efficiency, symmetry, dummy, and additivity axioms.">Shapley value</VIS.Term>. Naively computing it costs <code>O(2^M)</code> where <code>M</code> is the number of features, which is infeasible. Tree SHAP uses the tree's structure to do it in <code>O(T L D^2)</code> where <code>T</code> is the number of trees, <code>L</code> is leaves, and <code>D</code> is depth.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  X["Input row x"]
  M["Trained GBDT model"]
  X --> M
  M --> P["Prediction f(x) = baseline + sum of contributions"]
  P --> A["Per-feature Shapley value phi_i"]
  A --> N["Adverse-action notice: top 4 reasons"]
  A --> D["Model debugging and drift detection"]
  style P fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style N fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>The blue box is the additive decomposition. The yellow box is the regulated, customer-facing artifact that pays for the whole exercise.</p>

      <p style={{marginTop: 16}}><strong>The Shapley value, in plain terms:</strong></p>
      <VIS.Equation display tex={"\\phi_i = \\sum_{S \\subseteq F \\setminus \\{i\\}} \\frac{|S|!\\,(|F|-|S|-1)!}{|F|!} \\,\\big[f(S \\cup \\{i\\}) - f(S)\\big]"} />
      <p>
        Read it as: average over every possible coalition <code>S</code> not containing feature <code>i</code>, of the increase in model output when you add <code>i</code> to <code>S</code>. The combinatorial coefficient is the probability of that ordering. Tree SHAP avoids the explicit sum by walking the tree and tracking how a node would be reached under each subset.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from LIME and permutation importance">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>LIME</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Permutation importance</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Tree SHAP</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Scope</td>
            <td style={{padding:"8px 10px"}}>Per-row (local)</td>
            <td style={{padding:"8px 10px"}}>Global only</td>
            <td style={{padding:"8px 10px"}}>Per-row and global</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Determinism</td>
            <td style={{padding:"8px 10px"}}>Stochastic — varies across runs</td>
            <td style={{padding:"8px 10px"}}>Stochastic — shuffle-dependent</td>
            <td style={{padding:"8px 10px"}}>Exact and deterministic</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Speed at scoring time</td>
            <td style={{padding:"8px 10px"}}>Seconds per row</td>
            <td style={{padding:"8px 10px"}}>Not per-row</td>
            <td style={{padding:"8px 10px"}}>Milliseconds per row</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Theoretical guarantee</td>
            <td style={{padding:"8px 10px"}}>None</td>
            <td style={{padding:"8px 10px"}}>Heuristic</td>
            <td style={{padding:"8px 10px"}}>Unique Shapley axioms</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Correlated features</td>
            <td style={{padding:"8px 10px"}}>Unstable</td>
            <td style={{padding:"8px 10px"}}>Inflated by aliasing</td>
            <td style={{padding:"8px 10px"}}>Splits credit between them</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Adverse-action notices under FCRA</strong> — US lenders must list the top reasons a decision was unfavorable. Tree SHAP gives you ranked, signed per-feature reasons for every declined customer in real time.</li>
        <li><strong>Drift and bias debugging</strong> — aggregate SHAP values over slices of population to detect that the model has started leaning on a proxy for protected attributes.</li>
        <li><strong>Tree SHAP specifically when the model is GBDT</strong> — for neural nets use KernelSHAP or DeepSHAP; Tree SHAP only works on tree ensembles.</li>
        <li><strong>Skip SHAP for very low-cardinality models</strong> — if your fraud model is a 50-rule scorecard, hand-written reason codes beat SHAP on operator trust.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Correlated features split credit unpredictably">
        Two features that carry the same signal (say, transaction amount and amount-bucket) will each receive roughly half the Shapley value of the underlying signal. The adverse-action notice that says <em>amount=$4,300</em> and <em>amount-bucket=very-high</em> looks redundant and confusing. The fix is to deduplicate correlated features upstream or to compute Tree SHAP interaction values and aggregate.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Interactions are invisible without TreeSHAP-interaction">
        Vanilla Tree SHAP attributes each feature its marginal contribution and hides synergies. If the model decides via an <code>amount AND geo-mismatch</code> rule, neither feature in isolation looks decisive. The Tree SHAP interaction matrix (<code>phi_ij</code>) surfaces these, at <code>O(T L D^2 M)</code> cost.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Path-dependent vs interventional disagreement">
        Tree SHAP has two modes. Path-dependent is fast and uses the tree's training distribution; interventional uses a background dataset and approximates a true do-operator. They disagree, sometimes meaningfully, on correlated features. Pick one explicitly and document it in the model card — auditors will ask.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Adverse-action notice templating is its own engineering project">
        Producing a Shapley vector is the easy half. The hard half is mapping feature names to consumer-readable strings, suppressing protected-attribute proxies, ranking by absolute contribution while preserving sign, and templating into a paragraph that reads like English. Treat that pipeline as production code, not glue.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Trap problems on Shapley axioms, correlated-feature aliasing, FCRA notice design, mode selection, interactions, and operational pitfalls.
      </p>

      <VIS.TrapProblem
        id="shap-p1"
        difficulty="hard"
        title="P1 — Two correlated features each get half the SHAP value. Bug or feature?"
        scenario={<>You ship a fraud GBDT. The top-2 SHAP reasons for a decline are <em>transaction amount</em> and <em>amount-bucket</em>, with nearly equal magnitude. A regulator asks why the notice lists what looks like the same reason twice. What is happening?</>}
        options={[
          {key:"a", text:"This is the canonical Shapley behavior for correlated features: each feature receives roughly its fair share of the joint credit, so two near-duplicates split the underlying signal. It is not a bug, but it is bad for adverse-action notices. The fix is upstream: deduplicate correlated features before training, or compute Tree SHAP interaction values and aggregate the related features into one reason code.", correct:true},
          {key:"b", text:"Tree SHAP is broken. Switch to LIME."},
          {key:"c", text:"This indicates the model is overfitting to amount."},
          {key:"d", text:"Increase regularization to push one feature out."},
        ]}
        trap={<>(b) is reactive. (c) confuses redundancy with overfit. (d) does not fix the explanation; the model may still use both.</>}
        lens={<>(a) is the senior read. Shapley credit-splitting on correlated features is a known property; you handle it with feature engineering and interaction aggregation, not by abandoning the method.</>}
        stretch={<>Would Tree SHAP interaction values cleanly attribute credit to a single reason if the features are perfectly correlated?</>}
      />

      <VIS.TrapProblem
        id="shap-p2"
        difficulty="hard"
        title="P2 — Path-dependent versus interventional Tree SHAP. Which mode for FCRA?"
        scenario={<>Your team computes Tree SHAP in two modes for a sample of declined customers and gets noticeably different attributions. Compliance asks which to use for adverse-action notices. What is the senior answer?</>}
        options={[
          {key:"a", text:"Interventional Tree SHAP with a representative background dataset is the cleaner choice for FCRA notices because it approximates the causal do-operator: what would the prediction be if we set this feature to its background distribution. Path-dependent uses the empirical training distribution and bakes in correlations that are not what the notice should claim. Document the choice in the model card.", correct:true},
          {key:"b", text:"Path-dependent — it is the default and it is fast."},
          {key:"c", text:"Average the two."},
          {key:"d", text:"It does not matter at the per-customer level."},
        ]}
        trap={<>(b) prioritizes speed over semantics. (c) is statistically incoherent. (d) is wrong — the two modes disagree per-row on correlated features.</>}
        lens={<>(a) interventional is the principled FCRA choice; document and stick with it.</>}
        stretch={<>What does the background dataset need to look like to make interventional Tree SHAP trustworthy?</>}
      />

      <VIS.TrapProblem
        id="shap-p3"
        difficulty="hard"
        title="P3 — A protected-attribute proxy shows up as a top SHAP reason. What now?"
        scenario={<>An audit reveals that <em>zip-code-cluster-7</em> is among the top SHAP reasons for many declined customers, and the cluster correlates 0.78 with race. The model never sees race directly. What is the right action?</>}
        options={[
          {key:"a", text:"Treat the proxy as a fair-lending risk: (1) suppress the proxy from adverse-action notices and surface the next-strongest non-proxy reason instead, (2) audit how predictive the proxy actually is versus less-correlated alternatives, (3) consider removing the feature or applying an adversarial debiaser, and (4) bring the finding to the fair-lending committee. The SHAP value did its job — it exposed the proxy.", correct:true},
          {key:"b", text:"Just remove zip-code-cluster-7 from the notice template."},
          {key:"c", text:"Retrain without the feature and re-run SHAP."},
          {key:"d", text:"Ignore it — the model is blind to race."},
        ]}
        trap={<>(b) hides the issue without fixing it. (c) is one fix but skips the audit and committee step. (d) is the canonical legal mistake — disparate impact does not require intent.</>}
        lens={<>(a) is the cross-functional response. SHAP made the proxy visible; suppression, audit, mitigation, and governance are all required.</>}
        stretch={<>What metric would tell you the proxy contributes meaningful accuracy versus pure proxy effect?</>}
      />

      <VIS.TrapProblem
        id="shap-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Adverse-action notice design — which choices are defensible?"
        scenario={<>You design the FCRA notice template from per-row SHAP outputs. Pick the choices a senior engineer would defend in audit.</>}
        options={[
          {key:"a", text:"Rank reasons by absolute SHAP magnitude but display only those pushing toward the decline outcome (positive sign).", correct:true},
          {key:"b", text:"Display the top 4 to 5 reasons; truncating below that strips information, going above is noise.", correct:true},
          {key:"c", text:"Map raw feature names to consumer-readable strings via a versioned mapping table.", correct:true},
          {key:"d", text:"Suppress protected-attribute proxies via an explicit deny-list reviewed by fair-lending.", correct:true},
          {key:"e", text:"Use a different SHAP background sample for every notice to keep it fresh."},
          {key:"f", text:"Show numeric SHAP values to the customer for transparency."},
          {key:"g", text:"Aggregate correlated features into a single reason via a feature-family mapping.", correct:true},
        ]}
        trap={<>(e) introduces variability that breaks reproducibility — auditors expect deterministic notices. (f) is a UX mistake — raw values confuse consumers.</>}
        lens={<>(a), (b), (c), (d), (g) form a defensible pipeline. The deny-list and family-mapping are the least obvious but most important compliance hooks.</>}
        stretch={<>How would you version the consumer-readable mapping so an old notice can be reproduced years later?</>}
      />

      <VIS.TrapProblem
        id="shap-p5"
        difficulty="hard"
        title="P5 — KernelSHAP vs Tree SHAP for a GBDT — which and why?"
        scenario={<>An engineer proposes computing SHAP with KernelSHAP on your GBDT because the library was already in the repo for a separate neural-net model. Speed and accuracy comparison?</>}
        options={[
          {key:"a", text:"Tree SHAP is exact and runs in polynomial time using the tree structure; KernelSHAP is a sampling approximation that needs hundreds to thousands of model evaluations per row and gives noisy estimates. For a GBDT, Tree SHAP is strictly better on both speed and correctness. Use KernelSHAP only when the model is not a tree.", correct:true},
          {key:"b", text:"KernelSHAP is more accurate because it does not assume tree structure."},
          {key:"c", text:"They produce identical results; pick on convenience."},
          {key:"d", text:"KernelSHAP is faster for high-dimensional inputs."},
        ]}
        trap={<>(b) inverts the truth — Tree SHAP is exact. (c) is wrong; KernelSHAP has sampling noise. (d) is the opposite of reality.</>}
        lens={<>(a) Tree SHAP for trees, KernelSHAP for everything else.</>}
        stretch={<>How would you cross-check a Tree SHAP implementation against KernelSHAP with very large sample size?</>}
      />

      <VIS.TrapProblem
        id="shap-p6"
        difficulty="hard"
        title="P6 — Local SHAP and global feature importance disagree. Which is wrong?"
        scenario={<>Global gain-based feature importance ranks <em>velocity-1h</em> as the top feature. Aggregated SHAP magnitudes rank <em>geo-mismatch</em> first. Which signal do you trust?</>}
        options={[
          {key:"a", text:"Aggregated SHAP magnitudes. Gain-based importance is biased toward high-cardinality and high-variance features, and it counts the SUM of node-level gains without accounting for prediction direction. SHAP is the additive decomposition of the actual predictions, so it tells you what the model is operationally using. Use SHAP for the answer and treat gain as a fast cross-check.", correct:true},
          {key:"b", text:"Gain is the canonical metric, trust it."},
          {key:"c", text:"They cannot disagree; one is computed wrong."},
          {key:"d", text:"Use the average rank of both."},
        ]}
        trap={<>(b) is the textbook GBDT-library default but flawed. (c) is wrong — disagreement is normal and expected. (d) papers over a real disagreement.</>}
        lens={<>(a) SHAP is the post-hoc, prediction-faithful aggregation; gain has known biases.</>}
        stretch={<>When could gain and SHAP-aggregate agree closely?</>}
      />

      <VIS.TrapProblem
        id="shap-p7"
        difficulty="hard"
        title="P7 — Tree SHAP at scoring time costs 2 ms per row; latency budget is 5 ms. Plan?"
        scenario={<>You measure Tree SHAP at 2 ms per row in production. The decision endpoint has a 5 ms total latency budget already spending 2 ms on feature lookup and 1.5 ms on model inference. Tree SHAP would blow the budget. What is the right plan?</>}
        options={[
          {key:"a", text:"Compute SHAP asynchronously off the critical path: return the decision in 5 ms, queue the SHAP computation onto a side worker, persist the result for FCRA notice generation within hours. FCRA requires a written notice within 30 days; sub-second per-decision SHAP is not required. Optionally precompute SHAP for batch-scored cohorts.", correct:true},
          {key:"b", text:"Cache SHAP for previously-seen rows."},
          {key:"c", text:"Skip Tree SHAP and use a smaller model."},
          {key:"d", text:"Increase the latency budget."},
        ]}
        trap={<>(b) is fine but rare rows still hit the budget. (c) sacrifices accuracy for an unnecessary inline requirement. (d) is unrealistic in real fraud pipelines.</>}
        lens={<>(a) Decouple the regulated artifact (notice) from the real-time decision; FCRA allows it.</>}
        stretch={<>What is the latency requirement for the notice itself?</>}
      />

      <VIS.TrapProblem
        id="shap-p8"
        difficulty="hard"
        multiSelect
        title="P8 — Drift detection via SHAP — which signals are meaningful?"
        scenario={<>You want to monitor SHAP-based signals to detect drift in a deployed fraud model. Which signals carry diagnostic value? Select all that apply.</>}
        options={[
          {key:"a", text:"Distribution shift of per-feature SHAP magnitudes over time — if a feature's importance suddenly doubles, the upstream data may have changed.", correct:true},
          {key:"b", text:"Change in the rank order of the top 10 features week-over-week.", correct:true},
          {key:"c", text:"Per-slice SHAP drift — protected-class slices showing growing dependence on a proxy.", correct:true},
          {key:"d", text:"The single sum of SHAP values across all features."},
          {key:"e", text:"Disagreement between path-dependent and interventional SHAP magnitudes for specific features.", correct:true},
          {key:"f", text:"The exact numerical SHAP value of every individual customer."},
        ]}
        trap={<>(d) is by construction equal to the prediction minus baseline; it has no extra signal. (f) is operationally useless at scale.</>}
        lens={<>(a), (b), (c), (e) are the operational drift signals. Slice-level SHAP drift is the most underused.</>}
        stretch={<>How often would you compute these drift signals — hourly, daily, weekly?</>}
      />

      <VIS.TrapProblem
        id="shap-p9"
        difficulty="hard"
        title="P9 — Background dataset for interventional SHAP — how to pick?"
        scenario={<>You move to interventional Tree SHAP. The library asks for a background dataset. Your engineer proposes using a random 1000-row sample from the training set. What should you do?</>}
        options={[
          {key:"a", text:"A representative background is fine, but be deliberate: (1) use a recent in-distribution sample, not historical training data — the training set may not reflect current customer mix, (2) sample at least 1000 rows for stable estimates, more for high-cardinality categorical features, (3) re-sample periodically as the population drifts, (4) consider segment-specific backgrounds when fairness across slices matters, and (5) document the background-version next to the model-version.", correct:true},
          {key:"b", text:"Random 1000-row sample from training is fine, ship it."},
          {key:"c", text:"Use only declined customers as background."},
          {key:"d", text:"Use the entire training set; smaller samples give noisy SHAP."},
        ]}
        trap={<>(b) skips the drift and segment considerations. (c) biases SHAP toward decline-conditional baselines. (d) inflates compute with little gain past 1000 rows in most settings.</>}
        lens={<>(a) Recent, segment-aware, versioned, periodically refreshed.</>}
        stretch={<>What would you put in the model card about the background dataset?</>}
      />

      <VIS.TrapProblem
        id="shap-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Production SHAP pipeline — pick the ingredients"
        scenario={<>You design the SHAP pipeline for a top-3 issuer's fraud GBDT. Pick the ingredients a senior would put in. Select all that apply.</>}
        options={[
          {key:"a", text:"Tree SHAP in interventional mode with a versioned, recent, representative background.", correct:true},
          {key:"b", text:"Async SHAP computation off the decision critical path, persisted to a feature store.", correct:true},
          {key:"c", text:"Feature-family aggregation so correlated features collapse to one reason in the notice.", correct:true},
          {key:"d", text:"Deny-list for protected-attribute proxies; review quarterly with fair-lending.", correct:true},
          {key:"e", text:"Per-slice SHAP drift dashboard refreshed daily.", correct:true},
          {key:"f", text:"Always show numeric SHAP values to the customer for transparency."},
          {key:"g", text:"KernelSHAP fallback for the GBDT scoring path because it is more accurate."},
        ]}
        trap={<>(f) is a UX failure. (g) is wrong about Tree SHAP vs KernelSHAP — Tree SHAP is exact for trees.</>}
        lens={<>(a) through (e) are the defensible production stack.</>}
        stretch={<>What is the single most important governance artifact in this list?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://www.nature.com/articles/s42256-019-0138-9" target="_blank" rel="noopener">
            <strong>Lundberg et al. — From local explanations to global understanding with explainable AI for trees</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, Nature Machine Intelligence 2020)</span>
          <br/>The Tree SHAP paper. The algorithmic core is Section 3; the fraud and credit examples in Section 5 are directly transferable.
        </li>
        <li>
          <a href="https://christophm.github.io/interpretable-ml-book/shap.html" target="_blank" rel="noopener">
            <strong>Christoph Molnar — Interpretable Machine Learning, chapter on SHAP</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(open book chapter)</span>
          <br/>The friendliest practitioner explanation of Shapley values and SHAP. The figures on credit-split between correlated features are gold.
        </li>
        <li>
          <a href="https://shap.readthedocs.io/" target="_blank" rel="noopener">
            <strong>SHAP library documentation</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(library docs, tutorials)</span>
          <br/>The reference implementation. The tutorial on path-dependent versus interventional is the most important read for production engineers.
        </li>
        <li>
          <a href="https://www.consumerfinance.gov/rules-policy/regulations/1002/9/" target="_blank" rel="noopener">
            <strong>CFPB Regulation B Section 1002.9 — Adverse-action notices</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(regulatory text)</span>
          <br/>The legal source. Read this once so you know what the notice is supposed to do; it is shorter than people fear.
        </li>
        <li>
          <a href="https://www.youtube.com/watch?v=VB9uV-x0gtg" target="_blank" rel="noopener">
            <strong>Scott Lundberg — Explaining tree-based models with SHAP (talk)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(~40 min video)</span>
          <br/>The author walks through Tree SHAP intuition with worked examples. Best video introduction.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
