  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Behavioral baselining with autoencoders — per-employee LSTM autoencoder for insider threat detection.
// USENIX Security 2024 pattern.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Insider threat"
      title="Behavioral baselining with autoencoders"
      subtitle="A per-employee LSTM autoencoder learns each user's usual activity sequence; reconstruction error flags deviations as candidate insider abuse."
      byline={[
        {label: "Source", value: "USENIX Security 2024 — Insider Threat via Sequence Autoencoders"},
        {label: "Year", value: "2024"},
        {label: "L3", value: "Insider threat / employee abuse"},
      ]}/>

    <VIS.TLDR>
      Global baselining (one model for everyone) misses role-specific norms: a finance analyst pulling 200 reports is normal, the same activity from a marketing employee is not. A{" "}
      <VIS.Term def="A neural network that learns to compress and reconstruct its own input. The reconstruction error (how poorly it reproduces a new sample) measures how 'unusual' the sample is relative to what the model was trained on.">per-employee autoencoder</VIS.Term>{" "}
      learns each individual's usual activity sequence; reconstruction error at inference time becomes the anomaly score. Senior issues: cold-start for new joiners, baseline drift after role changes, and the false-positive cost of paging the SOC on every spike.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        For each employee, collect a sequence of activity events over a rolling window: file accesses, system logins, code-repo actions, email volume, badge-in/out times. Encode the sequence as a tokenized stream. Train a{" "}
        <VIS.Term def="A neural network architecture (Long Short-Term Memory) designed to process sequences while remembering long-range context. Standard pre-Transformer architecture for time series and event streams.">LSTM</VIS.Term>{" "}
        or small Transformer autoencoder on that employee's last 30-90 days of activity. At inference, feed today's sequence; high reconstruction error indicates a deviation from baseline.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  EVENTS["Employee activity events"]
  SEQ["Tokenized sequence"]
  AE["Per-employee autoencoder"]
  REC["Reconstruction error"]
  SCORE["Anomaly score"]
  EVENTS --> SEQ
  SEQ --> AE
  AE --> REC
  REC --> SCORE
  style AE fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style SCORE fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the per-employee autoencoder. Yellow = the downstream anomaly score that drives SOC triage. Note: it is one model per employee, not one shared model — this is the entire point.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Global baseline</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Role-based baseline</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Per-employee autoencoder</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Granularity</td>
            <td style={{padding:"8px 10px"}}>Org-wide</td>
            <td style={{padding:"8px 10px"}}>Role / team</td>
            <td style={{padding:"8px 10px"}}>Individual</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Catches role-specific norms</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Partially</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Cold-start for new employees</td>
            <td style={{padding:"8px 10px"}}>Works immediately</td>
            <td style={{padding:"8px 10px"}}>Works (role known)</td>
            <td style={{padding:"8px 10px"}}>Broken until enough history</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Sensitivity to role change</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>Medium</td>
            <td style={{padding:"8px 10px"}}>High — baseline becomes stale fast</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Storage / training cost</td>
            <td style={{padding:"8px 10px"}}>One model</td>
            <td style={{padding:"8px 10px"}}>One per role</td>
            <td style={{padding:"8px 10px"}}>N models (10k-100k employees)</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Enterprise insider-threat monitoring</strong> — finance, healthcare, defense, hyperscaler corp-security.</li>
        <li><strong>You have 30-90 days of per-employee activity logs</strong> — DLP feeds, EDR events, badge data, code-repo audit logs.</li>
        <li><strong>Role-specific norms dominate</strong> — analysts pulling 200 reports is normal, the same from engineering is not.</li>
        <li><strong>You can pair it with a global / role layer for cold-start</strong> — pure per-employee fails on day 1 of employment.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Cold-start is the biggest failure">
        A new employee has no baseline. You must either fall back to the role baseline for the first 30 days, OR bootstrap from a similar-role peer template. Pure per-employee scoring on a new joiner produces either no signal or noise.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Baseline poisoning by a slow-burn insider">
        An attacker who exfiltrates slowly over months can poison their own baseline — the autoencoder learns the exfil pattern as normal. Mitigation: anchor part of the training set on a known-clean window, or use a fixed pre-incident baseline that does not update with recent activity.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Role changes destroy the baseline overnight">
        Promotion, transfer, or new-project assignment makes yesterday's baseline irrelevant. Need explicit role-change events to trigger baseline reset; otherwise the model floods the SOC with false positives for two weeks.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade traps on cold-start, baseline poisoning, threshold setting, role drift, and architecture choice.
      </p>

      <VIS.TrapProblem
        id="bba-p1"
        difficulty="hard"
        title="P1 — Week-1 employee. How do you score insider risk with no baseline?"
        scenario={<>A new financial-analyst hire starts Monday. By Friday they have downloaded 47 historical earnings reports, joined 12 SharePoint groups, and pulled the customer-PII export tool twice. Your per-employee autoencoder has fewer than 5 days of history — too little to train a stable baseline. Manager says "they are just onboarding." Security ops asks for a risk score. What do you do?</>}
        options={[
          {key:"a", text:"Fall back to the role-baseline autoencoder (trained on all financial analysts org-wide). Run the new joiner through it; deviation from role norms is the week-1 signal. Begin collecting individual events; transition to per-employee model around day 30 once enough history exists.", correct:true},
          {key:"b", text:"Score 0 risk until the personal baseline is ready."},
          {key:"c", text:"Run the partial-history personal autoencoder anyway and trust its score."},
          {key:"d", text:"Block all sensitive actions until 30 days have elapsed."},
        ]}
        trap={<>(b) gives a free pass to the insider-pretending-to-onboard attack — many real insider cases are by employees in their first 90 days. (c) over-trusts a model with insufficient training data; reconstruction error is meaningless on 5 events. (d) is operationally untenable for any normal business.</>}
        lens={<>(a). The senior pattern is layered baselining: role baseline carries cold-start, individual baseline takes over once history exists, and a smooth transition (weighted blend) avoids the discontinuity. Most insider-threat literature explicitly recommends this hybrid.</>}
        stretch={<>How long after start date do you fully switch from role baseline to personal baseline, and what is the blending function in between?</>}
      />

      <VIS.TrapProblem
        id="bba-p2"
        difficulty="hard"
        title="P2 — A slow-burn insider has been exfiltrating for 6 months"
        scenario={<>An employee has been pulling 5-10 customer-PII records per week to a personal cloud drive for the last 6 months. Total volume is 200 records — significant but spread over time. Your autoencoder has been training continuously on a rolling 90-day window. Today the autoencoder's reconstruction error for this employee is normal. Why didn't you catch them, and what fixes the architecture?</>}
        options={[
          {key:"a", text:"The rolling-window baseline has been continuously absorbing the exfiltration pattern as 'normal' — baseline poisoning by the attacker's own actions. Fix: anchor the training window on a known-clean pre-incident period, OR detect long-term cumulative drift across baselines, OR add a global volume-of-PII-touched feature that ignores the personal baseline.", correct:true},
          {key:"b", text:"The autoencoder is too small; bigger model would catch it."},
          {key:"c", text:"Insider threat is unsolvable at this rate."},
          {key:"d", text:"Re-train more frequently to be more responsive."},
        ]}
        trap={<>(b) capacity does not fix the baseline-poisoning problem; the model is correctly learning what its training data says is normal. (c) defeatism. (d) makes the problem worse — faster re-training means faster absorption of the exfil pattern as the new normal.</>}
        lens={<>(a). Baseline poisoning is the structural failure mode of any anomaly-based system that updates continuously. Defenses: clean-window anchoring, slow-baseline-drift detectors, global guardrails that bypass the personal model (e.g., absolute PII-export volume thresholds). The autoencoder must be one layer in a defense-in-depth stack, not the only detector.</>}
        stretch={<>If you cannot identify a clean window (the insider has been there since the start), what is the fallback signal?</>}
      />

      <VIS.TrapProblem
        id="bba-p3"
        difficulty="hard"
        multiSelect
        title="P3 — Threshold selection for SOC triage"
        scenario={<>You have 50,000 employees scored daily. The SOC has bandwidth for ~50 manual reviews per day. Reconstruction error follows a heavy-tailed distribution per employee. Naive global percentile thresholding (top 0.1%) yields 50 alerts but they cluster on a handful of legitimately-active power users. Which strategies actually deliver useful alerts?</>}
        options={[
          {key:"a", text:"Per-employee z-score on reconstruction error (today vs that employee's own 90-day distribution). Top z-scores yield deviations relative to each person's own variability, not absolute.", correct:true},
          {key:"b", text:"Cap per-employee alert frequency (no more than 3 alerts/employee/month) to prevent power-user dominance.", correct:true},
          {key:"c", text:"Use a global threshold on raw reconstruction error."},
          {key:"d", text:"Combine with risk-amplifier features (recent termination notice, role transition, PIP status) to upgrade borderline scores.", correct:true},
          {key:"e", text:"Raise the global threshold until exactly 50 alerts/day remain."},
        ]}
        trap={<>(c) and (e) both ignore that raw reconstruction error is not comparable across employees — naturally noisy users always dominate. The trap is treating anomaly score as an absolute quantity when it is fundamentally relative to a learned baseline.</>}
        lens={<>Three correct. <strong>(a)</strong> z-score normalizes per person. <strong>(b)</strong> volume caps prevent noisy-user dominance. <strong>(d)</strong> business-context risk amplifiers (termination, PIP) are the most predictive signal in real insider cases. Senior systems combine all three.</>}
        stretch={<>What is the right precision target for the top 50 SOC alerts, and how do you measure it without ground truth?</>}
      />

      <VIS.TrapProblem
        id="bba-p4"
        difficulty="hard"
        title="P4 — Role change resets behavior overnight"
        scenario={<>An engineer is promoted to engineering manager. Their activity pattern shifts: less code, more calendar events, more SharePoint edits, more HR-tool usage. The per-employee autoencoder floods the SOC with high-reconstruction-error alerts for two weeks. What is the right architectural response?</>}
        options={[
          {key:"a", text:"Subscribe to HR role-change events as a first-class signal. On role change, freeze the existing baseline as a reference snapshot and start a new rolling baseline. Use the role baseline (manager role) for the first 30 days as the active scorer. After 30 days, transition back to the new personal baseline.", correct:true},
          {key:"b", text:"Raise the threshold by 2x for 30 days post-role-change."},
          {key:"c", text:"Disable scoring for the employee for 30 days."},
          {key:"d", text:"Manually mark all alerts as false positive."},
        ]}
        trap={<>(b) is a blunt fix that misses true positives (a manager who is also exfiltrating). (c) is the worst of both worlds — a real insider often exploits role changes. (d) doesn't scale and trains the SOC to ignore alerts during role-change windows.</>}
        lens={<>(a). HR events as first-class signals is the senior fix. Same architectural pattern as account-handover in fraud (legitimate change of account control needs explicit signal, not anomaly-score guesswork). The role baseline bridges the gap; the snapshot lets you audit pre-vs-post-role activity if needed.</>}
        stretch={<>What other HR events warrant a baseline reset?</>}
      />

      <VIS.TrapProblem
        id="bba-p5"
        difficulty="medium"
        title="P5 — Architecture choice: LSTM vs Transformer vs simple MLP"
        scenario={<>You are starting fresh on the per-employee autoencoder. Sequences are 50-500 events per day per employee, vocab of ~5000 event types, 50,000 employees total. What architecture do you pick first?</>}
        options={[
          {key:"a", text:"Start with a small LSTM autoencoder per employee (or shared encoder, per-employee fine-tuned head). Sequences are short enough that LSTM context-window is adequate; per-employee model size is small; training cost across 50k employees is tractable. Move to Transformer only if LSTM hits a clear quality ceiling.", correct:true},
          {key:"b", text:"Start with a 1B-parameter Transformer per employee — best in class for any sequence."},
          {key:"c", text:"Use a bag-of-events MLP; sequences don't matter."},
          {key:"d", text:"One global Transformer with employee ID as a feature."},
        ]}
        trap={<>(b) is computationally absurd (50,000 1B models). (c) discards order, which carries half the signal in insider patterns (sequence of access matters). (d) reverts to global baselining and loses the per-employee benefit.</>}
        lens={<>(a). LSTM autoencoders are the standard baseline for this regime — short sequences, tractable cost, captured sequence order. Shared encoder + per-employee head is the practical engineering compromise (one model to train, per-employee parameters small). Transformer is the escalation when LSTM saturates, not the default.</>}
        stretch={<>What signals would tell you LSTM has saturated and Transformer is worth the cost?</>}
      />

      <VIS.TrapProblem
        id="bba-p6"
        difficulty="hard"
        multiSelect
        title="P6 — Feature engineering for the event tokenizer"
        scenario={<>You are designing the event-tokenizer that feeds the autoencoder. Raw signals: file paths accessed, SaaS apps touched, login times, IP locations, badge events, code-repo actions. Which design choices matter for catching real insider patterns?</>}
        options={[
          {key:"a", text:"Tokenize file paths by sensitivity class (PII, financials, secrets) not raw path — paths drift; sensitivity classes are stable.", correct:true},
          {key:"b", text:"Include temporal features (time-of-day, day-of-week) as part of the sequence — off-hours access is a real insider signature.", correct:true},
          {key:"c", text:"Aggregate to hourly buckets to reduce sequence length, even though it discards within-hour order.", correct:false},
          {key:"d", text:"Include cross-system events in one unified sequence (badge + login + file + email) — many insider patterns span systems.", correct:true},
          {key:"e", text:"Drop low-frequency event types to clean the vocabulary."},
        ]}
        trap={<>(c) reduces signal — many insider attacks involve fast bursts within an hour (rapid PII pulls). (e) is dangerous; rare events (first-time access to secrets vault) are often the signal. Both are tempting cleanups that destroy precision.</>}
        lens={<>Three correct. <strong>(a)</strong> sensitivity classes are the right abstraction. <strong>(b)</strong> time features are essential. <strong>(d)</strong> cross-system unification is what beats single-source DLP. Senior signal: feature design that captures stable semantic structure, not raw paths.</>}
        stretch={<>How do you handle file paths that are sensitive AND new (just-created secrets file)?</>}
      />

      <VIS.TrapProblem
        id="bba-p7"
        difficulty="hard"
        title="P7 — Evaluation without ground truth"
        scenario={<>Real insider events are rare (a handful per year across 50k employees). How do you evaluate whether the model is working?</>}
        options={[
          {key:"a", text:"Multi-pronged evaluation: (i) injected red-team scenarios (security team simulates real insider patterns and measures recall); (ii) historical-incident replay (known past insider cases — do scores spike); (iii) precision-at-K reviewed by SOC analysts on top-K daily alerts; (iv) drift monitors on score distribution (sudden distribution shifts indicate model regression). No single proxy is sufficient.", correct:true},
          {key:"b", text:"Just measure AUC on your training set."},
          {key:"c", text:"Trust the academic baseline numbers from the paper."},
          {key:"d", text:"Wait for incidents and post-hoc check the model."},
        ]}
        trap={<>(b) AUC requires labeled positives which you essentially don't have. (c) paper numbers come from different employee populations and rarely transfer. (d) post-hoc-only means a model regression goes unnoticed until the next incident.</>}
        lens={<>(a). The senior posture combines red-team injection + historical replay + SOC-feedback precision-at-K + drift monitors. Each catches a different failure mode; together they form a continuous-evaluation harness that survives the rare-event problem.</>}
        stretch={<>What is the right cadence for red-team injection campaigns?</>}
      />

      <VIS.TrapProblem
        id="bba-p8"
        difficulty="medium"
        title="P8 — Privacy and works-council pushback"
        scenario={<>The EU works council objects: "you are training a model on every employee's individual activity. That is surveillance." How do you respond architecturally?</>}
        options={[
          {key:"a", text:"Document the threat model (insider data theft, IP exfil, regulatory obligation), apply data minimization (only sensitivity classes, not raw content), limit access to anomaly scores (no manager-level dashboards; SOC-only review with audit trail), prefer on-prem deployment, run a DPIA, and explicitly exclude employee-performance use cases. The architecture is auditable; surveillance use is policy-banned.", correct:true},
          {key:"b", text:"Drop the model in EU jurisdictions."},
          {key:"c", text:"Ignore the works council; security trumps privacy."},
          {key:"d", text:"Aggregate to team level only."},
        ]}
        trap={<>(b) loses the EU threat surface. (c) is non-starter in EU and gets the program shut down. (d) aggregate-only models miss the per-employee insider signal.</>}
        lens={<>(a). Privacy is engineered into the architecture, not bolted on. Data minimization (sensitivity classes), use-case limitation (security only, not HR), SOC-only access with audit trail, DPIA, on-prem deployment. Standard pattern for any per-employee behavioral system in the EU.</>}
        stretch={<>What single piece of evidence would the works council most want to see?</>}
      />

      <VIS.TrapProblem
        id="bba-p9"
        difficulty="hard"
        title="P9 — A high-reconstruction-error employee is a known whistleblower"
        scenario={<>A high-anomaly-score alert surfaces. SOC review reveals the employee is in active contact with a regulator about company misconduct. They are pulling internal documents to support a report under whistleblower protection. How does the system handle this?</>}
        options={[
          {key:"a", text:"This is a policy-and-governance question, not an architectural one. The technical anomaly signal is correct (the activity IS deviant from baseline). The right response is governance: legal-hold flag on the employee, escalate to general counsel and ethics board NOT to direct management, suspend automated actioning on the alert pending legal review. The architecture should support an explicit 'do not auto-action' override at the employee level.", correct:true},
          {key:"b", text:"Block the employee's access immediately."},
          {key:"c", text:"Have the model ignore the activity."},
          {key:"d", text:"Hide the alert from SOC."},
        ]}
        trap={<>(b) is illegal retaliation in many jurisdictions and creates the highest possible legal liability. (c) and (d) both attempt to use the model to hide the activity, which is its own legal problem (obstruction).</>}
        lens={<>(a). Architecture supports policy: explicit per-employee do-not-auto-action override, escalation paths that bypass implicated managers, legal-hold semantics. The model correctly flagged; the right next step is governance, not technical action. Senior systems anticipate this scenario at design time.</>}
        stretch={<>How do you audit-trail the do-not-auto-action override so it cannot be set silently to suppress legitimate alerts?</>}
      />

      <VIS.TrapProblem
        id="bba-p10"
        difficulty="hard"
        title="P10 — End-to-end insider-threat detection stack"
        scenario={<>You are designing the full insider-threat detection stack for a 50,000-employee enterprise with EU + US + healthcare ops. Pick the architecture.</>}
        options={[
          {key:"a", text:"Layered baselining: per-employee autoencoder (LSTM-based) is the personalized layer; role baseline carries cold-start (first 30 days) and role-change transitions. Global guardrails (absolute PII-volume, secret-vault access, off-hours bursts) bypass personal model. HR events (role change, termination notice, PIP) drive baseline resets and risk amplification. Anchor training on clean pre-incident windows to resist poisoning. Per-employee z-score normalization for SOC ranking; alert-frequency caps; risk-amplifier features. Privacy by design (sensitivity classes only, SOC-only access, DPIA, on-prem). Red-team injection + historical replay + drift monitor for continuous eval. Do-not-auto-action override with audit trail for whistleblower / legal-hold scenarios.", correct:true},
          {key:"b", text:"One global autoencoder; trust the score."},
          {key:"c", text:"Rules-only DLP; no ML."},
          {key:"d", text:"Per-employee model only; no role / global layer."},
        ]}
        trap={<>(b) misses role-specific norms. (c) is the pre-2020 baseline that motivated this whole field. (d) breaks on cold-start, role change, and baseline poisoning — all the failure modes the prior problems explored.</>}
        lens={<>(a). The complete senior architecture: layered baselines (per-employee + role + global), HR-event-driven resets, clean-window anchoring against poisoning, per-employee normalization for SOC ranking, privacy by design, continuous eval, governance overrides. Each layer addresses a failure mode the others cannot.</>}
        stretch={<>What single guardrail metric would trigger a kill-switch on the entire autoencoder layer?</>}
      />
    </VIS.Section>
