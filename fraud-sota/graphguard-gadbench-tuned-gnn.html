          {key:"a", text:"GADBench's re-evaluated number, with the GADBench-protocol settings noted (temporal split, AUPRC, tuned LightGBM baseline). Paper's original number is footnoted as 'paper's original; under random-split AUROC.'", correct:true},
          {key:"b", text:"Paper's number — it's peer-reviewed."},
          {key:"c", text:"Either — they are equivalent."},
          {key:"d", text:"Neither — re-run yourself."},
        ]}
        trap={<>(b) trusts the paper; (c) misses the protocol difference; (d) is overkill if GADBench covers the dataset.</>}
        lens={<>Citing GADBench's numbers is the senior signal — it shows you know there's a protocol difference and you've internalized the audit.</>}
        stretch={<>Where does GADBench's coverage end and you must run your own audit?</>}
      />

      {/* axis: E6 */}
      <VIS.TrapProblem
        id="gad-e6"
        difficulty="hard"
        title="E6 — Eval contamination paths GADBench DOESN'T fix"
        scenario={<>What contamination paths does GADBench's protocol NOT address?</>}
        multiSelect
        options={[
          {key:"a", text:"Label leakage from features (e.g. a feature derived from the label itself, like 'has been investigated' which correlates with 'is fraud').", correct:true},
          {key:"b", text:"Survivorship bias in the dataset (you only see fraud that was caught; missed fraud isn't labeled).", correct:true},
          {key:"c", text:"Adversarial label flips (poisoning attacks on training labels).", correct:true},
          {key:"d", text:"Random splits."},
        ]}
        trap={<>(d) IS addressed by GADBench's temporal split.</>}
        lens={<>GADBench fixes protocol-level issues (split, metric, baseline). It doesn't fix feature-level label leakage, survivorship bias, or adversarial poisoning. Those require additional discipline.</>}
        stretch={<>For each unaddressed contamination, what's the right additional audit?</>}
      />

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>F. Failure modes & edge cases</h3>

      {/* axis: F1 */}
      <VIS.TrapProblem
        id="gad-f1"
        difficulty="hard"
        title="F1 — Smallest scenario where GADBench's lesson fails"
        scenario={<>Construct the smallest fraud detection scenario where the GADBench-tuned-GBDT baseline clearly loses to a GNN under GADBench's own protocol.</>}
        options={[
          {key:"a", text:"A cold-start node with no neighborhood history (brand-new merchant, day 0) on a graph with rich neighbor features. The GBDT's structural features (degree, k-hop fraud-density, motifs) are zero or one for this node — no signal. A GNN with inductive aggregation from neighbor features still produces a meaningful representation. The GBDT cannot recover what doesn't exist.", correct:true},
          {key:"b", text:"Any small graph."},
          {key:"c", text:"A 1-node graph."},
          {key:"d", text:"A graph with 50% fraud."},
        ]}
        trap={<>(b), (c) are degenerate. (d) doesn't engage the mechanism.</>}
        lens={<>The cold-start regime is one of the four named regimes where GBDT loses. The mechanism is feature-availability, not model architecture.</>}
        stretch={<>How would you fix the GBDT baseline for cold-start (if at all)?</>}
      />

      {/* axis: F2 */}
      <VIS.TrapProblem
        id="gad-f2"
        difficulty="hard"
        title="F2 — Adversarial: gaming GADBench's protocol"
        scenario={<>Design an attack where a paper passes GADBench's protocol but the model is still hollow.</>}
        options={[
          {key:"a", text:"Feature leakage: build a node feature that secretly encodes the label (e.g. 'historical investigation count' is highly correlated with future label). GADBench's split is temporal, but if the feature itself uses future-derived signals at training time (point-in-time-incorrect), the model 'sees' the label via the feature even on temporal split.", correct:true},
          {key:"b", text:"Train on more data."},
          {key:"c", text:"Use a bigger model."},
          {key:"d", text:"No attack possible."},
        ]}
        trap={<>(b), (c), (d) miss the feature-leakage attack.</>}
        lens={<>GADBench's protocol fixes split + metric + baseline but does NOT fix feature-level leakage. The attack lives at feature engineering, below the protocol's scope.</>}
        stretch={<>What's the right defense against feature-leakage?</>}
      />

      {/* axis: F3 — paper-named: GADBench's specific dataset findings */}
      <VIS.TrapProblem
        id="gad-f3"
        difficulty="medium"
        title="F3 — GADBench's per-dataset findings"
        scenario={<>Which datasets in GADBench show the LARGEST gap closure between published GNN gains and the tuned-GBDT baseline under fair eval?</>}
        multiSelect
        options={[
          {key:"a", text:"YelpChi (review fraud, moderate prevalence, multiple relations).", correct:true},
          {key:"b", text:"Amazon (review fraud, dense heterogeneous).", correct:true},
          {key:"c", text:"T-Finance (financial transactions, low homophily).", correct:true},
          {key:"d", text:"GADBench has not evaluated any dataset."},
        ]}
        trap={<>(d) is false.</>}
        lens={<>The three named datasets show the gap closure most clearly. Naming them is a reading-signal at the senior bar.</>}
        stretch={<>On which dataset does the GBDT NOT close the gap? Why?</>}
      />

      {/* axis: F4 */}
      <VIS.TrapProblem
        id="gad-f4"
        difficulty="medium"
        title="F4 — Paper-admitted limitation"
        scenario={<>Which limitations does the GADBench paper itself acknowledge?</>}
        multiSelect
        options={[
          {key:"a", text:"Findings don't extend to very sparse / cold-start graphs where structural features degenerate.", correct:true},
          {key:"b", text:"Findings don't extend to text-rich content fraud where GBDT cannot ingest raw content.", correct:true},
          {key:"c", text:"Findings don't extend to dynamic temporal graphs with rapid topology change.", correct:true},
          {key:"d", text:"GADBench claims its protocol fixes every fraud-detection eval issue."},
        ]}
        trap={<>(d) overstates.</>}
        lens={<>The three explicit caveats are the honesty signal of the paper. Naming them is the senior reading.</>}
        stretch={<>For each caveat, what's the right benchmark to use instead?</>}
      />

      {/* axis: F5 */}
      <VIS.TrapProblem
        id="gad-f5"
        difficulty="hard"
        title="F5 — Post-GADBench fraud-GNN research"
        scenario={<>Which 2025+ fraud-GNN directions specifically target regimes where GADBench's lesson breaks?</>}
        multiSelect
        options={[
          {key:"a", text:"Dynamic graph methods (TGN-family) — target rapid-topology-change regime.", correct:true},
          {key:"b", text:"GNN-LM hybrids for review/text fraud — target text-rich-content regime.", correct:true},
          {key:"c", text:"Inductive cold-start methods (meta-GNN, prototype-based) — target sparse / cold-start regime.", correct:true},
          {key:"d", text:"More-parameter GNNs that beat tuned LightGBM by adding more compute on the same regime."},
        ]}
        trap={<>(d) is wrong-direction research (the regime is already GBDT-favorable).</>}
        lens={<>Post-GADBench research has converged on the regimes the GBDT loses. This is the senior-MLE reading of where the field is going.</>}
        stretch={<>Which direction has the strongest production trajectory?</>}
      />

      {/* axis: F5b — interview gold */}
      <VIS.TrapProblem
        id="gad-f5b"
        difficulty="hard"
        title="F5b — The interview gold question"
        scenario={<>Interviewer: "GADBench says GBDT rivals GNN. Why would I ever pick a GNN, then?" The answer separates senior from junior.</>}
        options={[
          {key:"a", text:"GADBench's finding is regime-specific. Pick a GNN when (1) cold-start nodes dominate the surface — structural features degenerate; (2) text/multimodal content is the signal — GBDT cannot ingest; (3) graph topology changes rapidly — snapshot features go stale; (4) the graph is very large heterogeneous with deep motif structure — combinatorial feature explosion in the GBDT. And specify the eval protocol you'd use to prove it: temporal split + AUPRC + tuned-GBDT-with-structural-features baseline at equal hyperparameter budget. If the GNN wins by 2+ AUPRC, the migration is justified.", correct:true},
          {key:"b", text:"Just always pick the GNN."},
          {key:"c", text:"GADBench was retracted."},
          {key:"d", text:"GNNs always lose post-GADBench."},
        ]}
        trap={<>(b), (c), (d) miss the regime-specific reading.</>}
        lens={<>The right answer (i) names the four regimes where GNNs win, (ii) specifies the protocol gate that proves it. This is the gold senior-MLE answer.</>}
        stretch={<>Which of the four regimes is most common in your domain?</>}
      />

      {/* axis: F5c — protocol meta */}
      <VIS.TrapProblem
        id="gad-f5c"
        difficulty="hard"
        title="F5c — Beyond GADBench: future protocol gaps"
        scenario={<>Which gaps remain in fraud-model evaluation that GADBench does NOT close?</>}
        multiSelect
        options={[
          {key:"a", text:"Online-offline divergence (offline AUPRC correlation with online business metrics is incompletely characterized).", correct:true},
          {key:"b", text:"Feedback-loop effects (flagged fraud queue → labeling → retraining creates self-reinforcing patterns that offline eval cannot capture).", correct:true},
          {key:"c", text:"Multi-task / multi-objective eval (e.g. fraud detection vs collateral-damage on benign users).", correct:true},
          {key:"d", text:"All eval gaps are closed by GADBench."},
        ]}
        trap={<>(d) overstates.</>}
        lens={<>The three remaining gaps are the next research frontier. Senior MLEs know GADBench is one layer of an audit stack, not the whole stack.</>}
        stretch={<>For each gap, propose the protocol fix.</>}
      />

      {/* axis: F5d */}
      <VIS.TrapProblem
        id="gad-f5d"
        difficulty="hard"
        title="F5d — Architecting your team's audit stack around GADBench"
        scenario={<>You inherit a fraud team with 4 models in production and 6 in development. Architect the audit stack with GADBench as one layer.</>}
        options={[
          {key:"a", text:"Layer 1: GADBench-equivalent offline audit (temporal split + AUPRC + tuned-GBDT-baseline at equal budget). Layer 2: feature-leakage audit (point-in-time correctness, label-leakage scan). Layer 3: online shadow + A/B with fraud-queue precision and benign-user collateral-damage metrics. Layer 4: monitoring (PSI on features, AUPRC drift, fraud-rate drift). Reject migrations that don't pass Layer 1; instrument all models with Layer 4.", correct:true},
          {key:"b", text:"Just A/B test everything."},
          {key:"c", text:"Trust the paper numbers."},
          {key:"d", text:"GADBench is enough — no other layer needed."},
        ]}
        trap={<>(b), (c), (d) miss the stack.</>}
        lens={<>GADBench is one layer of the senior audit stack — necessary but not sufficient. Senior MLEs architect the whole stack.</>}
        stretch={<>Which layer has the highest cost-benefit ratio in your team?</>}
      />

      {/* axis: F5e */}
      <VIS.TrapProblem
        id="gad-f5e"
        difficulty="hard"
        title="F5e — The 'I would not deploy this' threshold"
        scenario={<>Under GADBench protocol, the proposed fraud-GNN ties the tuned-GBDT-with-structural-features baseline on temporal-split AUPRC (gap of less than 0.5). Do you deploy it?</>}
        options={[
          {key:"a", text:"No — at parity, the GBDT wins on operational dimensions: simpler, faster, more interpretable, cheaper to maintain, and structural features have well-understood failure modes. The GNN has implicit failure modes (over-smoothing, subgraph materialization, embedding drift) that the GBDT does not. Deploy the GBDT; reserve the GNN for the regime where it wins by 2+ AUPRC.", correct:true},
          {key:"b", text:"Yes — GNNs are the future."},
          {key:"c", text:"Yes — ties are wins."},
          {key:"d", text:"Run more experiments."},
        ]}
        trap={<>(b), (c), (d) miss the operational tradeoff.</>}
        lens={<>At parity, the operational-cost differential decides. Senior MLEs internalize the full deployment cost (interpretability, debugging, ops) not just AUPRC.</>}
        stretch={<>What's your team's deployment-cost calibration formula?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>

        </li>

        </li>

          <a href="https://arxiv.org/abs/2302.10407" target="_blank" rel="noopener"><strong>Wang et al. — GAGA</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, WWW 2023)</span>

      </ul>
    </VIS.Section>

    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
