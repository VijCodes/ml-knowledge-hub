  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Feature stores + point-in-time correctness — PIT joins prevent label leakage.
// Tecton / Feast / Block fraud-feature-store pattern.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · MLOps"
      title="Feature stores + point-in-time correctness"
      subtitle="A point-in-time correct feature join uses ONLY the feature values that were known at decision time, eliminating label leakage from features that were computed after the fraud event."
      byline={[
        {label: "Source", value: "Tecton, Feast docs; Block 'Fraud-Feature-Store' tech blog 2024"},
        {label: "Year", value: "2024"},
        {label: "L3", value: "Production ML for fraud / MLOps"},
      ]}/>

    <VIS.TLDR>
      A naive offline training join uses today's feature values to predict past labels. If those features include any signal that was COMPUTED USING the label event (e.g., a 7-day chargeback aggregate that, by definition, knows the chargeback happened), offline AUC will look glorious and online AUC will collapse. A{" "}
      <VIS.Term def="Point-in-time correctness: a feature-join discipline that, for each training row at time T, retrieves only the feature values that were known to the system at time T — never values that were computed using events after T. Eliminates a class of label leakage that is invisible in standard offline metrics.">point-in-time correct</VIS.Term>{" "}
      join enforces causal feature retrieval: at training time T, use only what was known at T. Senior issues: which features need PIT, the latency cost of PIT lookups, and the diagnostic pattern when offline-online AUC diverges.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        A feature store maintains, for each feature, a TIMELINE of (entity_id, timestamp, value) records. A PIT join at training time T retrieves, for each entity, the most recent feature value with timestamp &le; T. This guarantees that the training row's features reflect ONLY what was known at T, not what was learned later. Naive joins (latest-value-as-of-today) silently leak future information into past training rows.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  EVENTS["Event stream"]
  FS["Feature store with timeline"]
  TRAIN["Training row at time T"]
  PIT["PIT join: features known at T"]
  MODEL["Trained model"]
  EVENTS --> FS
  FS --> PIT
  TRAIN --> PIT
  PIT --> MODEL
  style FS fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style PIT fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the feature store with its full feature timeline. Yellow = the PIT join that enforces causal retrieval. The discipline is invisible at inference time (the online store naturally only has values as of now) but is the difference between honest and dishonest offline metrics.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Naive batch join</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>As-of-yesterday join</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>PIT-correct join</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Uses future info per row</td>
            <td style={{padding:"8px 10px"}}>Yes (full leakage)</td>
            <td style={{padding:"8px 10px"}}>Often (coarse cutoff)</td>
            <td style={{padding:"8px 10px"}}>No</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Offline-online AUC match</td>
            <td style={{padding:"8px 10px"}}>Often wildly diverges</td>
            <td style={{padding:"8px 10px"}}>Closer but still off</td>
            <td style={{padding:"8px 10px"}}>Matches within noise</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Implementation complexity</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>Medium</td>
            <td style={{padding:"8px 10px"}}>High (timestamp on every feature)</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Engineering cost</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>Medium</td>
            <td style={{padding:"8px 10px"}}>High</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Suitable for fraud</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Risky</td>
            <td style={{padding:"8px 10px"}}>Required</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Any production fraud system</strong> — fraud's tight feedback loops + chargeback aggregates make this category of leak nearly inevitable without PIT.</li>
        <li><strong>Features include aggregates over windows ending at "now"</strong> — 7-day chargeback rate, 30-day dispute count, 24-hour velocity. All of these are PIT-sensitive.</li>
        <li><strong>You see offline-online AUC gaps</strong> — temporal leakage is the most common explanation.</li>
        <li><strong>You can pay the engineering cost</strong> — feature timelines, ingestion timestamps, retrieval-as-of semantics in the offline path.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="PIT is necessary but not sufficient">
        PIT prevents leakage from the feature-join step. It does NOT prevent feature engineering that itself peeks at the label (e.g., a feature defined as "did this user chargeback in the next 7 days"). Code review of feature DEFINITIONS still matters.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Ingestion lag is a real production cost">
        At inference time, the freshest feature value may be stale by the ingestion lag (event happened at T, landed in the store at T+&Delta;). PIT correctness in training MUST match the freshness available at inference — otherwise you train on cleaner data than you can serve.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Latency cost of PIT lookups">
        PIT joins are timestamp-bounded range queries, materially more expensive than latest-value lookups. Common engineering pattern: pre-materialize PIT training tables in batch; online serving uses latest-value but matches the freshness profile training was generated under.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade traps on diagnosing temporal leakage, designing PIT joins, ingestion lag, and ensuring offline-online parity.
      </p>

      <VIS.TrapProblem
        id="fpit-p1"
        difficulty="hard"
        title="P1 — Offline AUC 0.97, online AUC 0.78. Walk me through diagnosing temporal leakage."
        scenario={<>You ship a new fraud model. Offline AUC on a 6-month holdout = 0.97. Two weeks after deploy, online AUC = 0.78. The team is bewildered. The holdout was time-based (last month held out, not random). The model uses 200 features from a feature store. Walk through the diagnosis.</>}
        options={[
          {key:"a", text:"Audit each feature definition for whether the value at training time T uses data with timestamp > T. Common culprits: aggregate features (7-day chargeback rate, 30-day dispute count) joined as 'value as of training date' instead of 'value as of row's event time T'. Sort features by training-importance and audit top features first. For each suspect, compare offline feature value at T to what would have been available at T in production. Expect to find at least one feature where offline value differs materially from production-available value.", correct:true},
          {key:"b", text:"Re-train with more data."},
          {key:"c", text:"Switch model class — XGBoost is overfitting."},
          {key:"d", text:"Wait for more online data; eventually online AUC will improve."},
        ]}
        trap={<>(b) and (c) assume model-side problems but the model is correctly learning whatever signal is in the data. (d) waits for a problem that will not resolve itself; the gap will persist as long as the feature pipeline leaks. The classic mistake is treating offline-online AUC gap as a modeling problem instead of a feature-pipeline problem.</>}
        lens={<>(a). Temporal leakage is the modal explanation for offline-online AUC gap in fraud. Diagnosis is feature-by-feature: compare offline feature value at training-row time T to production-available value at T. The discrepancy IS the leak. Senior signal: the diagnosis path starts at the feature pipeline, not at the model.</>}
        stretch={<>What is the cheapest sanity-check to run BEFORE the full feature-by-feature audit?</>}
      />

      <VIS.TrapProblem
        id="fpit-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Which features always need PIT discipline?"
        scenario={<>You are listing features that need PIT-correct retrieval vs features safe with latest-value joins. Which are PIT-sensitive?</>}
        options={[
          {key:"a", text:"7-day chargeback rate per merchant — the aggregate definition CHANGES retroactively as chargebacks come in.", correct:true},
          {key:"b", text:"30-day dispute count per user — same shape as (a).", correct:true},
          {key:"c", text:"24-hour transaction velocity per card — updates with each transaction; PIT needed.", correct:true},
          {key:"d", text:"User account creation date — set once at signup; never changes.", correct:false},
          {key:"e", text:"Merchant business-category code (MCC) — generally stable but can change with merchant updates.", correct:true},
        ]}
        trap={<>(d) is safe with a latest-value join because it is immutable per entity. (e) is the trap: candidates often classify static categorical fields as not-PIT-sensitive, but merchant-side updates DO happen (re-categorizations, mergers); for safety, treat any mutable field as PIT-sensitive even if changes are rare.</>}
        lens={<>Four correct. <strong>(a) (b) (c)</strong> are obviously aggregates that retroactively change. <strong>(e)</strong> is the subtle one — even slow-changing categorical fields are PIT-sensitive if they EVER change. Senior signal: default to PIT for any feature that can mutate; whitelist exceptions only for provably-immutable fields.</>}
        stretch={<>What is the canonical example of a provably-immutable field that does NOT need PIT?</>}
      />

      <VIS.TrapProblem
        id="fpit-p3"
        difficulty="hard"
        title="P3 — Offline-online ingestion-lag mismatch"
        scenario={<>Your offline training data uses PIT-correct joins with ingestion timestamps assumed instantaneous (event-time = ingestion-time). In production, events arrive in the online store with ingestion lag averaging 30 seconds, p99 = 5 minutes. Offline AUC is 0.92, online AUC is 0.85. PIT is correct on the offline side. What is happening?</>}
        options={[
          {key:"a", text:"Offline training uses values that, in production, would not have been available by event time due to ingestion lag. The model was trained on fresher data than it can serve. Fix: simulate the ingestion-lag distribution in offline training — for each training row at event time T, retrieve features as of T minus a sampled lag from the production distribution. This trains the model on data it can realistically see at inference.", correct:true},
          {key:"b", text:"Ingestion lag is irrelevant to PIT; the offline join is correct."},
          {key:"c", text:"Online AUC will drift back up as ingestion lag decreases."},
          {key:"d", text:"Switch to event-time inference and ignore ingestion lag."},
        ]}
        trap={<>(b) misunderstands the joint constraint: PIT correctness must match the FRESHNESS available at inference. (c) assumes lag will decrease, which is not under model-team control. (d) breaks the production reality that inference latency is bounded.</>}
        lens={<>(a). Offline training must simulate the production ingestion-lag distribution. Same shape as the train-test distribution-shift problem more generally: training data must reflect serving conditions. Senior signal: PIT correctness is about MATCHING serving freshness, not about minimizing leak in the abstract.</>}
        stretch={<>How do you estimate the production ingestion-lag distribution to sample from?</>}
      />

      <VIS.TrapProblem
        id="fpit-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Implementation patterns for PIT joins"
        scenario={<>You are building PIT-join infrastructure for 1000+ features across 50M entity-IDs. Naive timestamp-range queries are prohibitively expensive. Which engineering patterns help?</>}
        options={[
          {key:"a", text:"Pre-materialize training tables: nightly batch job emits (entity_id, event_time, feature_value) rows with PIT semantics baked in. Training reads the pre-joined table.", correct:true},
          {key:"b", text:"Bucket features by update cadence; cheap latest-value joins for slow-changing features (e.g., user demographics) and full PIT only for fast-changing ones.", correct:true},
          {key:"c", text:"Use a temporal-aware feature-store backend (Tecton, Feast with offline store on Delta / Iceberg) that natively supports as-of joins.", correct:true},
          {key:"d", text:"Skip PIT for features ranked low in importance."},
          {key:"e", text:"Materialize all features as event-sourced streams to enable PIT replay.", correct:true},
        ]}
        trap={<>(d) is the eternal pitfall — a low-importance leaky feature can still rank high under HPO and silently inflate offline AUC. Importance ranking is itself biased by leakage; you cannot use it to gate PIT.</>}
        lens={<>Four correct. <strong>(a)</strong> pre-materialization amortizes cost. <strong>(b)</strong> bucket-by-cadence right-sizes effort. <strong>(c)</strong> use the right tool. <strong>(e)</strong> event-sourcing enables replay. Senior signal: apply PIT to ALL features, not just the ones you think matter.</>}
        stretch={<>What audit guarantees that the pre-materialized table is PIT-correct?</>}
      />

      <VIS.TrapProblem
        id="fpit-p5"
        difficulty="hard"
        title="P5 — A feature defined as 'did this user chargeback in the next 7 days'"
        scenario={<>A team member adds a new feature: <code>future_chargeback_7d</code>, defined as "did this user have any chargeback in the 7 days AFTER the event." Offline AUC jumps from 0.92 to 0.99. Online AUC is unchanged. What is going on?</>}
        options={[
          {key:"a", text:"The feature definition itself leaks the label. PIT joins do not protect against features that EXPLICITLY use future data; PIT only protects against accidental future-data leak in the join step. Code review of feature definitions catches this category. Online AUC is unchanged because at inference time the feature CANNOT BE COMPUTED — the future has not happened yet — so it is either NULL or stale.", correct:true},
          {key:"b", text:"PIT is broken; the feature store has a bug."},
          {key:"c", text:"The model is overfitting; reduce capacity."},
          {key:"d", text:"Use the feature as-is; offline AUC is the right metric."},
        ]}
        trap={<>(b) blames infrastructure for a feature-definition problem. (c) treats overfitting as the cause when the cause is intentional label leak. (d) ships a model that uses a feature that does not exist at inference, guaranteeing online failure.</>}
        lens={<>(a). PIT prevents the JOIN-step leak; it does not prevent feature DEFINITIONS that reach into the future. Code review of features (and ideally a feature-validator that checks for forward-looking window semantics) is required alongside PIT. Senior signal: distinguish join-side leakage from definition-side leakage; they need different defenses.</>}
        stretch={<>How would you automate the detection of forward-looking feature definitions?</>}
      />

      <VIS.TrapProblem
        id="fpit-p6"
        difficulty="medium"
        title="P6 — Label timestamp drift"
        scenario={<>Fraud labels arrive 30 days after the transaction (chargebacks resolve slowly). Your training data uses transaction time as the row time T for PIT joins. A reviewer asks: should T be the label time or the transaction time?</>}
        options={[
          {key:"a", text:"Use the TRANSACTION time as T for feature joins. Features must reflect what was known at the time the DECISION was made (approve / decline). The label timestamp is the time the OUTCOME was observed, which is separate. Using label time leaks information accumulated between decision time and label time.", correct:true},
          {key:"b", text:"Use the label time; the model needs to predict the outcome at observation."},
          {key:"c", text:"Use either; it does not matter for fraud."},
          {key:"d", text:"Use the average of the two."},
        ]}
        trap={<>(b) is the most-tempting wrong answer — "predict the label, use label time." But the model is deployed at TRANSACTION time, so features must reflect transaction-time knowledge. (c) and (d) confuse the distinct timestamps.</>}
        lens={<>(a). The model serves predictions at decision time, so PIT must align to decision time. The 30-day label delay is a separate problem (handled by delayed-feedback methods like the sister visual), not a feature-join concern.</>}
        stretch={<>How does PIT interact with delayed-feedback survival models that estimate label probabilities under incomplete observation?</>}
      />

      <VIS.TrapProblem
        id="fpit-p7"
        difficulty="hard"
        multiSelect
        title="P7 — Online-offline parity testing"
        scenario={<>You want to verify, before deploy, that offline-trained features match what the online serving path produces. Which tests apply?</>}
        options={[
          {key:"a", text:"Shadow-mode parity: for production-served traffic, log both the online-served feature vector AND the offline-computed feature vector (re-computed from raw events via the offline path). Compare element-wise; alert on mismatch.", correct:true},
          {key:"b", text:"Synthetic-event replay: feed known synthetic events through both paths and assert identical output.", correct:true},
          {key:"c", text:"Schema-only validation; if column names match, features match."},
          {key:"d", text:"Sample-based offline-online AUC comparison on the same scoring window.", correct:true},
          {key:"e", text:"Trust the feature store SDK; it handles parity internally."},
        ]}
        trap={<>(c) misses semantic divergence (column has same name, different aggregation logic). (e) over-trusts; feature-store bugs and config drifts happen even in mature stores.</>}
        lens={<>Three correct. <strong>(a)</strong> shadow-mode logging is the production-truth check. <strong>(b)</strong> synthetic replay surfaces edge cases. <strong>(d)</strong> AUC parity is the integration test. Senior pattern: defense in depth via all three.</>}
        stretch={<>What single feature most often drifts in shadow-mode parity tests in practice?</>}
      />

      <VIS.TrapProblem
        id="fpit-p8"
        difficulty="medium"
        title="P8 — When PIT is too expensive"
        scenario={<>A startup has 1k transactions/day and a 3-person ML team. They are debating whether to invest in a feature store with PIT semantics. Is it worth it?</>}
        options={[
          {key:"a", text:"At their current scale, build minimum viable PIT: timestamp every feature ingestion, use SQL with as-of joins on a single Postgres / DuckDB. No feature-store product needed. Re-evaluate when transaction volume crosses 10M/day or when offline-online divergence becomes a recurring debugging cost. PIT discipline matters at any scale; feature-store PRODUCTS are a scale concern.", correct:true},
          {key:"b", text:"Buy Tecton immediately; PIT is non-negotiable."},
          {key:"c", text:"Skip PIT; at small scale leakage doesn't matter."},
          {key:"d", text:"Build a full feature store before launching the model."},
        ]}
        trap={<>(b) over-engineers for the stage. (c) misunderstands PIT as a scale issue — leakage hurts equally at any scale. (d) is the build-then-ship mistake.</>}
        lens={<>(a). The DISCIPLINE of PIT is universal; the PRODUCT (Tecton / Feast / etc.) is scale-dependent. At low scale, SQL with as-of joins is sufficient. Build the product when the engineering cost of homegrown exceeds the product license cost.</>}
        stretch={<>What is the first failure mode of homegrown PIT at scale that pushes teams to adopt a feature-store product?</>}
      />

      <VIS.TrapProblem
        id="fpit-p9"
        difficulty="hard"
        title="P9 — Backfill of new features"
        scenario={<>You are adding a new feature (60-day merchant chargeback rate) to a model that has been live for a year. To train on a year of history, you need to backfill the feature value as-of every historical transaction. The merchant-event log goes back further; the chargeback log only goes back 18 months. What do you do?</>}
        options={[
          {key:"a", text:"Compute the PIT-correct 60-day chargeback rate at every historical transaction time T using the chargeback log. Truncate training data to the period where 60-day lookback is fully available (18 months minus 60 days = ~16 months of usable history). Document the truncation and verify the backfill matches what the online path would produce going forward.", correct:true},
          {key:"b", text:"Fill missing chargeback aggregates with zero before the 18-month mark."},
          {key:"c", text:"Use the current chargeback aggregate as a constant for all historical rows."},
          {key:"d", text:"Skip the feature; backfill is too hard."},
        ]}
        trap={<>(b) injects label-correlated bias (zero is not the truth for historical periods, just our ignorance). (c) is the worst form of leakage — uses current state as a backfilled past value. (d) gives up on a useful feature.</>}
        lens={<>(a). PIT backfill is bounded by the underlying event-log retention. Truncate training data honestly; do not fabricate values. Verify backfill matches online semantics. Senior signal: feature backfill is bounded by data availability, not by feature-store API.</>}
        stretch={<>If the chargeback log is shorter than the lookback window, what alternative feature would you compute instead?</>}
      />

      <VIS.TrapProblem
        id="fpit-p10"
        difficulty="hard"
        title="P10 — End-to-end feature-store discipline for fraud"
        scenario={<>You are designing the feature-store architecture for a fintech's fraud team. 50M transactions/day, 200+ features, 18-month label-delay tail. Pick the architecture.</>}
        options={[
          {key:"a", text:"Event-sourced raw event ingestion with ingestion timestamps. Feature timelines stored on Delta / Iceberg (offline) and Redis / DynamoDB (online). PIT-correct nightly materialization of training tables. Forward-looking-feature linter on every new feature definition. Ingestion-lag distribution sampled in offline training to match online freshness. Shadow-mode parity logger compares offline-computed and online-served features on production traffic. Synthetic-event replay tests on every feature change. Truncate training data to honest backfill horizon per feature. Use transaction time (not label time) as the PIT row time. Offline-online AUC parity audit on every deploy. Documented feature definitions with explicit window semantics and PIT-sensitivity classification. Tecton / Feast / homegrown depending on scale.", correct:true},
          {key:"b", text:"Latest-value joins everywhere; offline AUC is the only metric."},
          {key:"c", text:"Skip the feature store; compute features inline in the model pipeline."},
          {key:"d", text:"Use Tecton out of the box without parity testing."},
        ]}
        trap={<>(b) ships a maximally-leaky pipeline. (c) loses reusability and parity guarantees. (d) trusts the product without verifying production behavior.</>}
        lens={<>(a). The complete senior architecture: event-sourcing, PIT-correct materialization, linter for forward-looking features, ingestion-lag matching, shadow-mode parity, synthetic replay, honest backfill, transaction-time PIT, offline-online parity audit, classified feature definitions. Each component addresses a failure mode the prior problems exposed.</>}
        stretch={<>Which single piece of this architecture has the highest ROI for a team starting from latest-value joins?</>}
      />
    </VIS.Section>
