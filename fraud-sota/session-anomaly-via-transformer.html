<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Session anomaly via Transformer — Fraud SOTA · Account takeover (ATO).
// CONCEPT ANCHOR (B3): TRANSFORMER over a USER'S BEHAVIORAL SESSION as an EVENT
// SEQUENCE (login event, page visit, click, scroll, dwell time, form fill,
// transaction). Build a per-user HISTORY EMBEDDING from past sessions; score the
// CURRENT session's deviation from the user's history embedding via a learned
// anomaly head (reconstruction loss, contrastive distance, or autoregressive
// likelihood). NOT auth-event-tape transformers (Transformer-Risk-Mastercard —
// cross-issuer auth-event sequences, batch 9). NOT generic LSTM session models
// (deepseq, RNN). NOT user-graph anomaly. The TRANSFORMER over WITHIN-SESSION
// EVENT SEQUENCE + PER-USER HISTORY DEVIATION is the unique mechanism.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Account takeover"
      title="Session anomaly via Transformer — encode the user's session as an event sequence; score deviation from their history embedding"
      subtitle="A Transformer encoder reads each user's CURRENT SESSION as an EVENT SEQUENCE (login → page visits → clicks → scrolls → dwell times → form fills → transaction); a HISTORY EMBEDDING aggregated from prior sessions per user defines that user's normal; the anomaly score is the deviation between current and history. Beats rule-based 'new device' (false positives on legitimate device changes) by learning what behavioral consistency means for each user."
      byline={[
        {label:"Paper", value:"Session-aware ATO with Transformers (WWW 2024) — Transformer encoder on user-session event sequences + per-user history embedding + deviation scoring"},
        {label:"L3", value:"Within-session event sequence; positional + temporal embeddings; per-user history embedding; deviation as anomaly score."},
        {label:"Anchor", value:"Transformer on USER SESSION events (within-session sequence) vs USER HISTORY embedding (across-session aggregate). Different from auth-event tapes."},
      ]}/>

    <VIS.TLDR>
      Account takeover (ATO) fraud is when a legitimate user's credentials are used by an attacker — same login, different person. Rules like &quot;new device&quot; or &quot;new IP&quot; flag too many false positives (users travel, switch devices, use VPNs) and miss attackers who use credential-stuffed sessions from common consumer devices. Session anomaly via Transformer learns what BEHAVIORAL CONSISTENCY looks like PER USER and scores the CURRENT SESSION's deviation from that user's normal. Mechanism: encode each user's current{" "}
      <VIS.Term def="User session: a contiguous sequence of user-generated events on a web/mobile application — login, page-visit, click, scroll, dwell-time-on-page, form-field-fill, transaction-attempt. Bounded by a session timeout (e.g., 30 minutes of inactivity) or explicit logout.">session</VIS.Term>{" "}
      as an EVENT SEQUENCE (login event, then each subsequent page-visit / click / scroll / dwell-time / form-fill / transaction as a typed token); a{" "}
      <VIS.Term def="Transformer encoder: a stack of self-attention + FFN layers (Vaswani et al. 2017) that maps a sequence of tokens to per-token contextual embeddings. In this concept, the sequence is the user's session events (not text tokens); each event becomes a typed token with positional + temporal embedding.">Transformer encoder</VIS.Term>{" "}
      maps this to per-session contextual embeddings; a per-user{" "}
      <VIS.Term def="History embedding: a per-user aggregated representation of prior sessions — built via mean-pool over recent session embeddings, exponential decay, or a separate context Transformer encoding the last N sessions. The user's 'normal' against which deviation is measured.">history embedding</VIS.Term>{" "}
      aggregated from PRIOR SESSIONS (typical: last 30-90 days, exponentially-weighted mean of per-session embeddings) defines that user's normal. ANOMALY SCORE: distance between the current session embedding and the user's history embedding (cosine, learned bilinear, or autoregressive log-likelihood). Trained on labeled ATO positives + unlabeled normal-session negatives (or self-supervised reconstruction loss). NOT auth-event-tape transformers (Transformer-Risk-Mastercard, batch 9 — operates on CROSS-ISSUER authorization events, not within-user session events; different problem). NOT a generic LSTM session model (LSTM lacks self-attention — cannot weight which past events matter). NOT user-graph anomaly (operates on session sequence, not graph structure). Handles legitimate device changes (history embedding includes the user's past device variability) and catches attacker sessions that look behaviorally inconsistent (different click rhythm, different page-visit ordering, different dwell times) even from the same device.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — Transformer on session events + per-user history embedding">
      <p>
        Imagine you bank online. Every time you log in, you visit your accounts page, click into checking, scroll through transactions, click on a specific transaction, view it, go back, then move on. This sequence of actions — login event, page-visit events, clicks, scrolls, dwell times — is your SESSION. You do it consistently across sessions because it reflects your habits.
      </p>
      <p>
        An attacker who has stolen your credentials does NOT have your habits. They might log in, immediately try to add a payee, hover briefly over your balance, and try to wire money. The SEQUENCE of events is different. Even if they have your device fingerprint and IP (credential-stuffed from a previous compromise), their BEHAVIORAL FOOTPRINT differs.
      </p>
      <p>
        Session anomaly via Transformer learns this. For each user u:
      </p>
      <ol>
        <li><strong>HISTORY EMBEDDING h_history(u)</strong> from prior sessions (last 30-90 days). Each prior session is encoded by the Transformer (same encoder); h_history(u) is an aggregate — typically an exponentially-weighted mean of per-session embeddings, OR a separate context Transformer encoding the sequence of last N session embeddings.</li>
        <li><strong>CURRENT SESSION ENCODING h_current(s)</strong>. The current session s is tokenized: each event becomes a typed token (login, page-visit-/accounts, click-/transactions-12345, scroll-down-200px, dwell-3.4s, form-fill-/transfer-amount, ...) with positional embedding (position in session) and temporal embedding (delta-time since last event). Run the Transformer encoder; pool over tokens to get h_current(s).</li>
        <li><strong>ANOMALY SCORE = deviation(h_current(s), h_history(u))</strong>. Options: cosine distance, learned bilinear distance W * h_current * h_history, or autoregressive log-likelihood under a Transformer-LM trained on user's prior sessions (low log-likelihood = anomalous).</li>
      </ol>

      <VIS.Mermaid chart={`
flowchart TB
  PS["User u prior sessions last 30 to 90 days"]
  PS --> HE["Transformer encoder per prior session"]
  HE --> AG["Aggregate as history embedding h_history u"]
  CS["Current session s as event sequence login click scroll dwell"]
  CS --> CE["Transformer encoder on current session"]
  CE --> HC["Current session embedding h_current s"]
  AG --> DV["Deviation score cosine or bilinear or autoreg LL"]
  HC --> DV
  DV --> AS["Anomaly score per session"]
  AS --> AL["Threshold to ATO alert or step-up auth"]
  style HE fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style CE fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style DV fill:#dbeafe,stroke:#2563eb,stroke-width:2px
      `} />
      <p>Red boxes: Transformer encoders (shared parameters for history and current). Blue box: deviation scoring between current and history embeddings.</p>

      <p style={{marginTop:16}}>
        <strong>Why this beats rule-based ATO detectors.</strong> Rule-based ATO (Norkom, FICO Falcon) flags &quot;new device&quot;, &quot;new IP&quot;, &quot;new geo&quot;, &quot;velocity of attempts&quot;. These trigger high false positives on LEGITIMATE behavior (user buys a new laptop, travels, uses VPN) and miss attackers who use COMMON devices (credential-stuffed from another breach) or RESIDENTIAL PROXIES (geo + IP look benign). Session anomaly via Transformer learns the BEHAVIORAL CONSISTENCY across sessions PER USER — what dwell times, click patterns, page-visit orderings does this user typically have? An attacker session, even from a common device, exhibits different rhythms; the model catches the deviation. Plus: legitimate device changes are HANDLED — the user's history embedding includes the variability of their past device use, so a new device alone is not anomalous; only behavior IN the new-device session is scored.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Session anomaly Transformer vs related approaches">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Session anomaly Transformer</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Transformer-Risk-Mastercard (batch 9)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>LSTM/RNN session model</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Rule-based ATO (new device / new IP)</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Input sequence</td><td style={{padding:"6px 10px"}}>USER SESSION events (within-session: login, click, scroll)</td><td style={{padding:"6px 10px"}}>AUTH events across issuers (cross-merchant tape)</td><td style={{padding:"6px 10px"}}>Session events but with RNN</td><td style={{padding:"6px 10px"}}>Hand-coded features</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Encoder</td><td style={{padding:"6px 10px"}}>Transformer with self-attention</td><td style={{padding:"6px 10px"}}>Transformer with cross-issuer pretraining</td><td style={{padding:"6px 10px"}}>LSTM / GRU</td><td style={{padding:"6px 10px"}}>None</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Anomaly mechanism</td><td style={{padding:"6px 10px"}}>Deviation from PER-USER history embedding</td><td style={{padding:"6px 10px"}}>Auth-event classification (fraud prob per event)</td><td style={{padding:"6px 10px"}}>Per-event classification</td><td style={{padding:"6px 10px"}}>Threshold on hand-coded rules</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Handles legitimate device change</td><td style={{padding:"6px 10px"}}>YES — history captures variability</td><td style={{padding:"6px 10px"}}>N/A (different problem)</td><td style={{padding:"6px 10px"}}>Partial (limited memory)</td><td style={{padding:"6px 10px"}}>NO (false positive)</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Cold start (low history)</td><td style={{padding:"6px 10px"}}>WEAK — needs 5+ prior sessions</td><td style={{padding:"6px 10px"}}>OK (issuer-level patterns)</td><td style={{padding:"6px 10px"}}>WEAK</td><td style={{padding:"6px 10px"}}>OK (rules apply)</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569", marginBottom:16}}>Every problem turns on the TRANSFORMER-ON-SESSION-EVENT-SEQUENCE + PER-USER-HISTORY-DEVIATION mechanism. Strip the per-user history and the answer collapses to a generic session classifier; strip the Transformer and you have an LSTM (lower performance); replace with cross-issuer auth events and you have Transformer-Risk-Mastercard (different problem entirely).</p>

      <VIS.TrapProblem id="sat-p1" difficulty="hard" title="P1 — VP Risk: 'Why not just flag new devices / IPs for ATO?'"
        scenario={<><em>Discriminating insight: rule-based new-device / new-IP triggers too many false positives (users travel, switch devices, use VPNs) and misses attackers who use common consumer devices or residential proxies. Session anomaly via Transformer learns PER-USER behavioral consistency — what dwell times, click patterns, page-visit orderings does THIS user have? — and catches behavioral deviation even on the same device.</em><br/><br/>Pitch.</>}
        options={[
          {key:"a", text:"Rules are sufficient."},
          {key:"b", text:"Rule-based 'new device' / 'new IP' / 'new geo' triggers TWO failure modes for ATO. (1) FALSE POSITIVES on legitimate behavior: users buy new laptops, travel internationally, use VPNs or residential proxies, share family devices. A new-device rule flags all of these as ATO; the alert volume overwhelms the human review queue and degrades the customer experience (legitimate user gets challenged on every new device). (2) FALSE NEGATIVES on attacker behavior: attackers who CREDENTIAL-STUFF from prior data breaches arrive at the login page with a device that LOOKS BENIGN — common Chrome / Windows / consumer IP from a residential proxy service. The rules see nothing unusual; the attacker logs in successfully and moves money. Session anomaly via Transformer learns BEHAVIORAL CONSISTENCY PER USER from each user's history of sessions — what dwell times do you typically have on the account-overview page, what is your typical click cadence, do you scroll all the way through transactions or just glance? An attacker session, even from a benign-looking device, exhibits DIFFERENT BEHAVIORAL RHYTHMS; the model catches the deviation. Legitimate device changes are HANDLED because the user's history embedding includes variability from past device use; only the IN-SESSION BEHAVIOR is scored.", correct:true},
          {key:"c", text:"They're equivalent."},
          {key:"d", text:"Skip ATO detection."},
        ]}
        trap={<>(a)(c)(d) miss the false-positive + false-negative limitations of rules.</>}
        lens={<>Rules: false positives on legit device changes + false negatives on credential-stuffed common devices. Transformer: per-user behavioral consistency.</>}
        stretch={<>What does residential proxy look like in rule features?</>}
      />

      <VIS.TrapProblem id="sat-p2" difficulty="hard" title="P2 — State the session anomaly Transformer recipe."
        scenario={<><em>Discriminating insight: tokenize current session as event sequence → Transformer encode → pool to h_current. Encode prior sessions same way → aggregate to h_history (per user). Score = deviation between h_current and h_history. Threshold to ATO alert.</em><br/><br/>State.</>}
        options={[
          {key:"a", text:"Just run a Transformer."},
          {key:"b", text:"FOUR-STEP RECIPE. (1) TOKENIZE CURRENT SESSION as an EVENT SEQUENCE. Each event is typed (LOGIN, PAGE-VISIT-/accounts, CLICK-/transaction-id, SCROLL-down-pixels, DWELL-seconds, FORM-FILL-/transfer-amount, TRANSACTION-attempt). Each event becomes a token with type embedding + positional embedding (position in session) + temporal embedding (delta-time since last event, log-scaled). Padding/truncation to a max session length (e.g., 256 events). (2) TRANSFORMER ENCODER: multi-head self-attention + FFN stack (typically 4-6 layers, hidden dim 128-256) on the event sequence. Pool over tokens (mean-pool, CLS-token, or attention-pool) to get h_current(s) — current session embedding. (3) HISTORY EMBEDDING h_history(u). Encode each of the user's prior sessions (last 30-90 days, typically last K=10-30 sessions) with the SAME Transformer; aggregate via exponentially-weighted mean (recent sessions weighted more) or a separate CONTEXT TRANSFORMER over the sequence of session embeddings. Result: a fixed-dim vector capturing the user's behavioral norm. (4) DEVIATION SCORING: anomaly_score = distance(h_current, h_history). Options: cosine distance, learned bilinear h_current^T W h_history, or autoregressive log-likelihood under a Transformer-LM trained on the user's history. (5) THRESHOLD: high anomaly → ATO alert or step-up authentication (CAPTCHA, MFA challenge); low → auto-allow. Trained on labeled ATO positives + unlabeled normal sessions OR self-supervised reconstruction loss.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Cluster the sessions."},
        ]}
        trap={<>(a)(c)(d) miss the four steps.</>}
        lens={<>Tokenize session events → Transformer encode → pool to h_current. Encode user's history → aggregate to h_history. Score deviation.</>}
        stretch={<>What pooling is best for session embedding?</>}
      />

      <VIS.TrapProblem id="sat-p3" difficulty="hard" title="P3 — How do you encode time deltas in the session sequence?"
        scenario={<><em>Discriminating insight: temporal embedding for delta-t between events. Options: (a) log-scaled scalar embedded via small MLP; (b) sinusoidal time encoding (continuous extension of positional); (c) bucketed categorical bins (1s, 5s, 30s, 1m, 5m, 30m). Critical: dwell times carry signal (humans pause, attackers don&apos;t).</em><br/><br/>Time.</>}
        options={[
          {key:"a", text:"Ignore time."},
          {key:"b", text:"Time between events is CRITICAL for session anomaly — humans dwell on pages (read, think); attackers move fast (script-driven or impatient). Three encoding options. (1) LOG-SCALED SCALAR: compute delta_t = time since previous event in seconds; log_dt = log(1 + delta_t); embed via a small MLP (Linear -> ReLU -> Linear); add to event's positional + type embedding. Simple, works well. (2) SINUSOIDAL TIME ENCODING: extend positional encoding (Vaswani et al. 2017) to continuous time using sin/cos at multiple frequencies of log_dt. Captures periodic patterns. (3) BUCKETED CATEGORICAL: bin delta_t into discrete buckets (e.g., <1s, 1-5s, 5-30s, 30-60s, 1-5min, 5-30min, 30+min); each bucket has a learned embedding; concatenate to event embedding. Simple and robust. Practitioners often combine bucketed (coarse) + log-scaled scalar (fine) for robustness. KEY INSIGHT: dwell times on specific pages ARE the behavioral signal. User u typically dwells 45-60s on the accounts page; attacker dwells 2s. Without temporal embedding, the Transformer sees only event types, missing this. Including dwell as a TYPED event (DWELL-3s as its own token) + positional/temporal embedding gives the model both event ordering AND timing.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip time."},
        ]}
        trap={<>(a)(c)(d) miss the temporal-signal importance.</>}
        lens={<>Delta_t critical for ATO. Encode via log-scalar MLP / sinusoidal / bucketed. Dwell times = behavioral signal humans have, attackers don't.</>}
        stretch={<>How does dwell time distinguish humans from scripts?</>}
      />

      <VIS.TrapProblem id="sat-p4" difficulty="hard" multiSelect title="P4 — Pick TRUE statements about session anomaly Transformer (4 correct)"
        scenario={<><em>Discriminating insight: Transformer on WITHIN-SESSION event sequence, per-user history embedding, deviation scoring, dwell-time and event-ordering matter. NOT cross-issuer auth tape; NOT a rule-based detector.</em><br/><br/>Pick TRUE.</>}
        options={[
          {key:"a", text:"Encodes the CURRENT user session as a sequence of typed events.", correct:true},
          {key:"b", text:"Maintains a PER-USER history embedding from prior sessions.", correct:true},
          {key:"c", text:"Anomaly score = deviation between current session and user's history embedding.", correct:true},
          {key:"d", text:"Temporal embeddings (delta-t, dwell times) carry behavioral signal.", correct:true},
          {key:"e", text:"Operates on CROSS-ISSUER auth-event tape across many merchants."},
          {key:"f", text:"Pure rule-based 'new device' / 'new IP' check."},
        ]}
        trap={<>(e) confuses with Transformer-Risk-Mastercard; (f) confuses with rule-based.</>}
        lens={<>Within-session event sequence; per-user history; deviation scoring; temporal embeddings. NOT cross-issuer; NOT rules.</>}
        stretch={<>What's the typical session token vocabulary size?</>}
      />

      <VIS.TrapProblem id="sat-p5" difficulty="medium" title="P5 — Distinguish from Transformer-Risk-Mastercard (batch 9)."
        scenario={<><em>Discriminating insight: TRANSFORMER-RISK-MASTERCARD operates on CROSS-ISSUER authorization events (the tape of all auth events for a card across all merchants — not session-bounded). SESSION ANOMALY operates on WITHIN-SESSION event sequences (login → click → scroll → ...) for a SINGLE user's behavioral session. Different inputs, different problems. T-R-M = card-fraud; session anomaly = ATO. Both use Transformer; different problem framing.</em><br/><br/>Distinguish.</>}
        options={[
          {key:"a", text:"They are the same."},
          {key:"b", text:"DIFFERENT INPUTS, DIFFERENT PROBLEMS. Transformer-Risk-Mastercard (T-R-M, Mastercard 2023; batch 9 of this corpus) operates on CROSS-ISSUER AUTHORIZATION EVENTS — the tape of all auth events for a given card across all merchants, all issuers, over a long horizon (months to years). Tokens are auth events (merchant ID, amount, MCC, geo, timestamp). The Transformer is pretrained on this tape via masked-event prediction (BERT-style on auth events); fine-tuned to predict per-event fraud probability. Goal: CARD FRAUD detection at the authorization moment. Session anomaly via Transformer operates on WITHIN-SESSION USER BEHAVIOR EVENTS — login event, page visits, clicks, scrolls, dwell times, form fills, transaction attempts — bounded by a session timeout (30 min inactivity). Tokens are user-behavior events. Per-user history embedding from prior sessions defines normal; anomaly = deviation. Goal: ACCOUNT TAKEOVER detection at the session level. KEY DIFFERENCES. (1) INPUT: auth-event tape (T-R-M) vs user-session behavior tape (session anomaly). (2) PROBLEM: card fraud (T-R-M) vs account takeover (session anomaly). (3) ANOMALY MECHANISM: per-event fraud probability via supervised fine-tuning (T-R-M) vs deviation from per-user history (session anomaly). Both use Transformer; both are 'sequence-of-events models'; but the unit, problem, and mechanism differ.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip distinction."},
        ]}
        trap={<>(a)(c)(d) collapse the two transformers.</>}
        lens={<>T-R-M: cross-issuer auth tape, card fraud. Session anomaly: within-session behavior, ATO. Different inputs and goals.</>}
        stretch={<>What does T-R-M's masked-event pretraining do?</>}
      />

      <VIS.TrapProblem id="sat-p6" difficulty="hard" title="P6 — How is the per-user history embedding constructed?"
        scenario={<><em>Discriminating insight: aggregate prior sessions per user. Options: (1) exponentially-weighted mean of per-session embeddings (recent sessions weighted more); (2) separate CONTEXT TRANSFORMER over the sequence of last N session embeddings; (3) attention-pool over prior sessions weighted by similarity to current. Trade-off: simplicity (mean) vs expressiveness (context-Transformer).</em><br/><br/>History.</>}
        options={[
          {key:"a", text:"Use one prior session."},
          {key:"b", text:"Three options for history-embedding aggregation. (1) EXPONENTIALLY-WEIGHTED MEAN: weight prior sessions by exp(-lambda * delta_days) so recent sessions weight more; mean-pool the per-session embeddings. Simple, robust, low-parameter. Decay rate lambda tuned on validation (e.g., half-life of 14 days = lambda ~ 0.05/day). (2) CONTEXT TRANSFORMER over session embeddings: take the last N=10-30 per-session embeddings as a sequence; run a SECOND Transformer over them (with positional embedding by session recency); pool to get h_history. More expressive — captures patterns like 'user's behavior changed gradually over the last 2 weeks (vacation)' or 'sudden recent change (3 sessions ago) might be early ATO'. More parameters and compute. (3) ATTENTION-POOL: cross-attention from current session embedding to prior session embeddings; weight by similarity; pool. Effectively a retrieval over history. Best when user's behavior varies by CONTEXT (work hours vs weekend); current session attends to similar-context history. PRODUCTION: option (1) is the default; option (2) for users with >30 prior sessions; option (3) for high-value accounts where context matters. Cold-start: <5 prior sessions — fall back to population-average history embedding for the user's demographic.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip history."},
        ]}
        trap={<>(a)(c)(d) miss the aggregation options.</>}
        lens={<>EWMA / context-Transformer / attention-pool. EWMA = simple default; context-Transformer = expressive; attention-pool = retrieval over context-similar history.</>}
        stretch={<>What's the half-life for EWMA in practice?</>}
      />

      <VIS.TrapProblem id="sat-p7" difficulty="hard" title="P7 — Concept-specific misattribution: session anomaly fires on a USER WHO JUST CAME BACK FROM VACATION."
        scenario={<><em>Discriminating insight (concept-specific): user&apos;s prior sessions all from work-day-during-business-hours pattern; first session back from vacation includes &quot;catching up&quot; — burst of activity, new device, different times. History embedding is too narrow. Mitigations: (1) longer history window (90+ days); (2) context-aware history (attention-pool by time-of-day similarity); (3) periodic re-anchor on user-confirmed legitimate sessions; (4) gating to step-up auth rather than block.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"Concept-specific cause for false-positive on returning vacationer. The user's HISTORY EMBEDDING is too narrow — built only from recent (last 30 days) sessions which were all work-day-during-business-hours. The first post-vacation session is genuinely different: catching up on multiple accounts, new device (perhaps used a friend's laptop on vacation), different time-of-day (logging in immediately on landing), burst of activity. The model correctly detects deviation but mis-attributes it to ATO. Mitigations specific to this model. (1) LONGER HISTORY WINDOW — extend prior-session window to 90+ days so vacation-style patterns from prior vacations are in history. (2) CONTEXT-AWARE HISTORY via attention-pool — current session attends to PRIOR SESSIONS WITH SIMILAR CONTEXT (time-of-day, weekday, device); a 'post-vacation' session attends to other 'post-vacation' sessions in history if any. (3) RE-ANCHOR ON CONFIRMED LEGITIMATE: when user passes step-up auth (MFA) successfully, ADD that session to history with a 'verified' weight boost; the model learns from confirmed legitimate behavior. (4) ALERT vs BLOCK: instead of blocking, route to STEP-UP AUTHENTICATION (CAPTCHA + MFA). If user passes, proceed; if not, escalate. Asymmetric cost: legitimate user has small friction; attacker is blocked. (5) BEHAVIORAL CALIBRATION: monitor per-user anomaly score distribution over time; if a user's normal anomaly score drifts (gradual habit change), recalibrate threshold per user.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>History too narrow → vacation = anomaly. Fix: longer history / context-aware attention / re-anchor on MFA-passed / step-up auth not block.</>}
        stretch={<>How do you compute attention-pool by time-of-day similarity?</>}
      />

      <VIS.TrapProblem id="sat-p8" difficulty="hard" title="P8 — Why use a Transformer and not an LSTM for session sequences?"
        scenario={<><em>Discriminating insight: Transformer&apos;s self-attention can WEIGHT WHICH PAST EVENTS matter for the current event — e.g., the form-fill event attends to the prior page-visit event because navigation context disambiguates. LSTM has only a hidden state that compresses ALL prior events uniformly — fewer parameters but loses fine-grained event-to-event dependencies. Plus parallelizable training, longer effective context.</em><br/><br/>Why Transformer.</>}
        options={[
          {key:"a", text:"LSTM is better."},
          {key:"b", text:"Three reasons Transformer wins for session anomaly. (1) SELECTIVE ATTENTION ACROSS EVENTS: the user's CURRENT event (a form-fill on the transfer page) attends to RELEVANT prior events (the navigation that brought them to this page, their dwell on the accounts page, the click that initiated the form) — not uniformly compressed into one hidden state. LSTM's hidden state at time t is a recurrent compression of ALL prior events; subtle dependencies between non-adjacent events are lost. Self-attention preserves them. (2) LONG-RANGE DEPENDENCY: a user session can have 100-300 events; an LSTM's effective context is ~20-30 events (gradient vanishing limits longer); a Transformer with quadratic attention handles 256-512 tokens well. ATO patterns often span the full session (login behavior + later transaction attempt), so long-range matters. (3) PARALLEL TRAINING: Transformer trains in parallel across positions; LSTM is sequential. For large session corpora (millions of users x tens of sessions each), Transformer trains 10-100x faster on GPU. (4) INTERPRETABILITY VIA ATTENTION: attention weights at inference tell investigators 'this event attends most to these prior events' — useful for ATO alert review. LSTM hidden states are not directly interpretable. Trade-off: Transformer has more parameters; for very short sessions (<10 events) LSTM may match performance with fewer params. For typical web/mobile sessions (50-300 events), Transformer dominates.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Same thing."},
        ]}
        trap={<>(a)(c)(d) miss the architectural advantages.</>}
        lens={<>Transformer: selective attention across events / long-range / parallel training / interpretable attention. LSTM: uniform compression, sequential, limited context.</>}
        stretch={<>For very short sessions (<10 events) does LSTM still win?</>}
      />

      <VIS.TrapProblem id="sat-p9" difficulty="hard" title="P9 — Compare to a generic user-graph anomaly detector."
        scenario={<><em>Discriminating insight: user-graph anomaly operates on GRAPH STRUCTURE (user-merchant interactions, social edges) — captures structural fraud signals. Session anomaly operates on EVENT SEQUENCE within one session — captures behavioral rhythm signals. Different signals; complementary. Combine: graph-level user features as auxiliary input to session Transformer; or two-branch (graph + session) late fusion.</em><br/><br/>Compare.</>}
        options={[
          {key:"a", text:"Same thing."},
          {key:"b", text:"DIFFERENT SIGNALS, COMPLEMENTARY. User-graph anomaly (Sybil-GNN, CARE-GNN, GraphSAGE on user-merchant graph) operates on GRAPH STRUCTURE — captures signals like 'user shares device fingerprint with 50 other users (sybil cluster)', 'user is downstream of a recently-flagged merchant', 'user's transaction graph degenerates into ring patterns'. Cannot see behavioral rhythm within one session. Session anomaly Transformer operates on the EVENT SEQUENCE WITHIN ONE SESSION — captures behavioral rhythm signals (dwell times, click rhythm, page-visit ordering, scroll patterns) that distinguish the legitimate user from an attacker with the same credentials and device. Cannot directly see graph-level signals (whether the user is part of a sybil cluster, whether the device is shared). They COMPLEMENT: an attacker may evade GRAPH anomaly by using a fresh device but exhibit different behavioral rhythms (caught by session Transformer); an attacker may exhibit matching behavior (sophisticated scripted attack with realistic dwell) but be part of a sybil cluster (caught by graph). HYBRID: feed graph-level user features (sybil-score, downstream-of-flagged-merchant flag, degree-anomaly) as AUXILIARY TOKENS to the session Transformer; or run two-branch (graph + session) late-fusion. Production: most major banks layer both.", correct:true},
          {key:"c", text:"Graph is always better."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the signal-type difference.</>}
        lens={<>Graph anomaly: structural signals (sybil, downstream-of-flagged). Session Transformer: behavioral rhythm. Complementary — combine via fusion.</>}
        stretch={<>What's a hybrid architecture?</>}
      />

      <VIS.TrapProblem id="sat-p10" difficulty="hard" title="P10 — Self-supervised pretraining options for session Transformer."
        scenario={<><em>Discriminating insight: labeled ATO is RARE (most positives discovered later via chargeback). Self-supervised options: (1) masked-event prediction (BERT-style: mask events, predict from context); (2) next-event prediction (autoregressive); (3) contrastive (positive = sessions from same user; negative = different users); (4) session reconstruction loss (autoencoder). Pretrain on millions of unlabeled sessions; fine-tune on labeled ATO positives.</em><br/><br/>Self-supervised.</>}
        options={[
          {key:"a", text:"No pretraining."},
          {key:"b", text:"Four self-supervised pretraining options. Labeled ATO is rare (most positives are discovered only later via customer chargebacks; sessions in real-time are unlabeled). Self-supervised pretraining on the abundant unlabeled session corpus is critical. (1) MASKED-EVENT PREDICTION (BERT-style): mask 15% of events in each session; train Transformer to predict the masked events from surrounding context. Forces the model to learn event co-occurrence and ordering patterns. (2) NEXT-EVENT PREDICTION (autoregressive, GPT-style): given the first k events, predict the (k+1)-th event. Captures sequence generation patterns. (3) CONTRASTIVE LEARNING (SimCLR-style): treat two sessions from the SAME user as a positive pair; sessions from different users as negative pairs. Trains the encoder to map same-user sessions close, different-user sessions far. The pretrained encoder's session embeddings are immediately useful for the deviation score (h_current close to h_history naturally because same-user sessions cluster). (4) SESSION RECONSTRUCTION LOSS (autoencoder): train encoder + decoder to reconstruct the full session; the bottleneck embedding captures the session's identity; reconstruction error = anomaly proxy. Production: option (3) contrastive is the strongest baseline for the deviation framing; option (1) masked-event is the standard BERT-style transfer. Then FINE-TUNE on the small labeled ATO positive set with binary cross-entropy or a margin loss between ATO and same-user-normal pairs.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use rules."},
        ]}
        trap={<>(a)(c)(d) miss the self-supervised setup.</>}
        lens={<>Pretraining: masked-event / next-event / contrastive (same-user pairs) / reconstruction. Contrastive aligns with deviation framing. Fine-tune on small ATO label set.</>}
        stretch={<>Why does contrastive align with the deviation framing?</>}
      />

      <VIS.TrapProblem id="sat-p11" difficulty="medium" title="P11 — Production: real-time scoring as session events arrive — feasibility?"
        scenario={<><em>Discriminating insight: feasible. Incremental scoring as events arrive. Buffer session events; re-score after every N events (N=5-10); Transformer forward pass on the current event prefix is sub-50ms. History embedding pre-computed at session start (cached per user). Step-up auth triggered when anomaly score crosses threshold.</em><br/><br/>Feasibility.</>}
        options={[
          {key:"a", text:"Infeasible."},
          {key:"b", text:"FEASIBLE for real-time scoring. Architecture. (1) SESSION-START: at login event, look up the user's HISTORY EMBEDDING from a cached store (pre-computed daily or upon last session end); typical size 256-512 dim float vector; lookup < 1ms. (2) STREAMING EVENT INGEST: as events arrive (login → page → click → scroll → dwell → form → ...), buffer them in a session event store. (3) INCREMENTAL SCORING: re-score every N events (N = 5-10 events) or every 5-10 seconds. Each re-score: take the current prefix of session events; run Transformer encoder; pool to get h_current_prefix; compute deviation from h_history. Cost: Transformer forward pass on a session prefix of length up to 256, with a 4-6 layer encoder, is 20-50 ms on GPU; 50-100 ms on CPU. (4) THRESHOLD: if anomaly score crosses threshold, trigger STEP-UP AUTHENTICATION (push notification with MFA prompt, CAPTCHA, biometric check). Block only if step-up fails. (5) END-OF-SESSION: after session ends or timeout, re-compute the final session embedding; UPDATE the user's history embedding (append to history, recompute EWMA) for next session. (6) THROUGHPUT: typical large bank has 100K-1M concurrent web/mobile sessions; with re-scoring every 10 seconds, peak QPS ~100K. Fits on a small GPU cluster + history-embedding cache (Redis / in-memory KV). LATENCY: sub-second per re-score, well within step-up auth SLA. Production: deploy as a side-car service to the web/mobile session layer.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Always infeasible."},
        ]}
        trap={<>(a)(c)(d) miss the streaming architecture.</>}
        lens={<>History embedding cached per user. Incremental re-score every N events. Sub-second Transformer pass. Step-up auth on threshold.</>}
        stretch={<>How does the history-embedding cache update?</>}
      />

      <VIS.TrapProblem id="sat-p12" difficulty="hard" title="P12 — Concept-specific misattribution: session anomaly NEVER fires on a confirmed ATO case."
        scenario={<><em>Discriminating insight (concept-specific): (1) attacker mimicked user&apos;s behavior closely (sophisticated, trained on prior session leaks); (2) user&apos;s history embedding is itself noisy (high baseline anomaly); (3) the attacker session is too short (just one transaction event before logout); (4) sequence tokenization lost the discriminating signal (e.g., scroll patterns not tokenized). Specific to session-anomaly mechanism.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},

      <VIS.TrapProblem id="sat-p15" difficulty="hard" title="P15 — Cold-start for users with very few prior sessions."

      <VIS.TrapProblem id="sat-p16" difficulty="medium" title="P16 — Junior: 'Session anomaly Transformer is just BERT'. Refute."
        scenario={<><em>Discriminating insight: half right — uses Transformer encoder (BERT-family architecture). Misses the SESSION-EVENT TOKENIZATION (events, not text), the PER-USER HISTORY EMBEDDING, and the DEVIATION SCORING — three pieces that are the actual mechanism. BERT is the encoder backbone; the architecture wrapped around it is the innovation.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Junior is right."},
          {key:"b", text:"Half right, missing three key pieces. YES — the encoder backbone is a Transformer of the BERT family (self-attention + FFN layers; positional embeddings; potentially masked-event pretraining). Three additional pieces make session anomaly via Transformer a distinct architecture. (1) SESSION-EVENT TOKENIZATION: tokens are not text words but TYPED USER EVENTS (login, page-visit, click, scroll, dwell, form-fill, transaction). Token vocabulary is event-types; embeddings are typed-event embeddings + positional embeddings + TEMPORAL EMBEDDINGS (delta-time between events). Strip this and you have a vanilla text Transformer — useless on sessions. (2) PER-USER HISTORY EMBEDDING: aggregate of user's prior session embeddings (EWMA, context Transformer, or attention-pool). Defines 'normal for this user'. Strip this and you have a session classifier with no per-user grounding — every session scored against a population norm, losing the per-user behavioral signal. (3) DEVIATION SCORING: anomaly = distance(h_current, h_history) — cosine, learned bilinear, or autoregressive log-likelihood. Strip this and you have a session embedder with no anomaly head. Calling session anomaly 'just BERT' loses the event tokenization, the per-user history, and the deviation scoring — the three pieces that turn a generic encoder into an ATO detector.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"They are identical."},
        ]}
        trap={<>(a)(c)(d) miss the wrapped architecture.</>}
        lens={<>BERT = encoder. Session anomaly = BERT + event tokenization + per-user history + deviation scoring.</>}

      />

      <VIS.TrapProblem id="sat-p17" difficulty="hard" title="P17 — Skeptic: 'Just use a deep ensemble of LSTMs — Transformer is overkill'. Refute."
        scenario={<><em>Discriminating insight: skeptic is RIGHT for very short sessions (&lt;10 events) — LSTM with adequate ensembling matches Transformer at smaller param budget. WRONG for typical web/mobile sessions (50-300 events) where self-attention captures non-adjacent dependencies LSTM cannot. Plus parallel training matters at corpus scale. Pick by session length and corpus size.</em><br/><br/>Refute.</>}
        options={[

          {key:"b", text:"PARTIALLY right; depends on session length and corpus size. For VERY SHORT sessions (under 10 events — e.g., quick mobile balance check), a well-tuned LSTM with adequate hidden state captures everything; Transformer's advantage (long-range attention) is wasted; LSTM ensemble matches Transformer at smaller parameter budget. For TYPICAL WEB/MOBILE SESSIONS (50-300 events — e.g., full banking session), Transformer wins on three dimensions. (1) NON-ADJACENT DEPENDENCIES: self-attention captures relationships between distant events (login behavior + later transaction attempt); LSTM's compressed hidden state loses these. (2) PARALLEL TRAINING: corpus-scale training (millions of users x tens of sessions each) — Transformer trains 10-100x faster on GPU; deep-ensemble of LSTMs at the same scale is infeasible. (3) INTERPRETABILITY: attention weights aid investigator review; LSTM hidden states are opaque. WHEN LSTM ENSEMBLE WINS: very short sessions, very small training corpus (small bank with limited session data), latency-critical scoring where Transformer's quadratic attention is too expensive. WHEN TRANSFORMER WINS: typical session lengths, abundant training data, GPU-affordable compute, interpretability matters for review. The PAPER (Session-aware ATO with Transformers, WWW 2024) explicitly ablates LSTM vs Transformer on web banking sessions and finds Transformer wins by 5-12 F1 — non-trivial gap that justifies the architectural switch.", correct:true},
          {key:"c", text:"Always Transformer."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>Short sessions: LSTM matches. Typical sessions: Transformer wins on long-range / parallel / interpretability. Pick by session length and corpus size.</>}
        stretch={<>What does the WWW 2024 ablation show?</>}

      <VIS.TrapProblem id="sat-p18" difficulty="hard" title="P18 — What events should be in the session tokenization?"
        scenario={<><em>Discriminating insight: rich tokenization wins. Include: (a) navigation events (page visits, deep links); (b) interaction events (clicks, taps, scrolls, hovers); (c) form events (field focus, fill, submit); (d) dwell times (per-page time-on-page); (e) transaction events (amount, payee, currency); (f) channel/device context as auxiliary tokens; (g) behavioral biometrics (keystroke dynamics, mouse path) — see BiotouchPass batch 14. The richer the tokenization, the harder to mimic.</em><br/><br/>Events.</>}
        options={[

          {key:"b", text:"Rich tokenization wins; include as many event types as you have data for. (1) NAVIGATION EVENTS: page visits (URL), in-app navigation (deep links), back-button presses, tab opens. Captures the user's NAVIGATION PATH through the app — characteristic per user. (2) INTERACTION EVENTS: clicks (target element id), taps (mobile), scrolls (direction + pixels), hovers (target + duration). Captures the user's INTERACTION RHYTHM. (3) FORM EVENTS: field focus, field fill (no PII, just event), field blur, form submit, autofill detection. Captures form-filling behavior — users typically fill in a learned order; attackers may differ. (4) DWELL TIMES: time spent on each page or in each form field. Captured as DWELL-Xs tokens between events. Humans pause; attackers (especially scripted) don't. (5) TRANSACTION EVENTS: transaction attempts (amount range as a bucket, payee type, currency); add-payee events; transfer initiation. (6) CHANNEL/DEVICE CONTEXT as AUXILIARY TOKENS at session start: device type, browser, IP geo, language; not anomalous per se but provides context for the Transformer to weight events. (7) BEHAVIORAL BIOMETRICS (if available, from BiotouchPass / TypeNet / mouse-swipe batch 14 instrumentation): keystroke inter-key timings, mouse-path curvature, swipe pressure. The RICHEST anomaly signal — hardest for attacker to mimic. Trade-off: richer tokenization = larger vocabulary = more parameters + more pretraining data needed. Start with (1)-(5); add (7) for high-value accounts.", correct:true},

      <VIS.TrapProblem id="sat-p19" difficulty="medium" title="P19 — Threshold tuning per user vs global threshold."
        scenario={<><em>Discriminating insight: per-user threshold matters because users have DIFFERENT baseline anomaly distributions (high-variance users naturally have higher scores). Global threshold over-flags high-variance users and under-flags low-variance ones. Per-user threshold: percentile-based (flag top 1% of this user&apos;s sessions) or calibrated against per-user labeled outcomes. Bayesian shrinkage to population for users with limited history.</em><br/><br/>Threshold.</>}

          {key:"b", text:"Per-user threshold (with shrinkage to population for low-history users) is necessary because different users have different BASELINE ANOMALY DISTRIBUTIONS. Users who are 'creatures of habit' (same login time, same navigation, same dwell times) have low average anomaly scores; their ATO would be a clear spike. Users who are 'high-variance' (work irregularly, use multiple devices, vary patterns) have higher average anomaly scores; even ATO might fall within their normal range. A single GLOBAL THRESHOLD over-flags high-variance users (false positives) and under-flags low-variance users (false negatives). Per-user threshold options. (1) PERCENTILE-BASED: flag sessions in the top 1% (or top 0.1%) of THIS user's historical anomaly scores. Robust, no labels needed. (2) USER-SPECIFIC CALIBRATION: if labeled ATO outcomes exist for this user (rare), calibrate threshold to hit a target precision per user. (3) HIERARCHICAL BAYESIAN: per-user threshold shrunk toward a POPULATION threshold via Bayesian prior; users with abundant history get user-specific threshold; users with limited history get closer to population. (4) MULTI-STAGE: low threshold triggers step-up auth (low cost); high threshold triggers block (high cost). Production: percentile-based with hierarchical shrinkage for users with <30 prior sessions; user-specific calibration for high-value accounts with abundant history.", correct:true},

        scenario={<><em>Discriminating insight (concept-specific): (1) history embedding stale (user changed habits weeks ago; history still reflects old habits); (2) user&apos;s sessions genuinely high-variance (no stable pattern); (3) tokenization picking up nuisance changes (browser update changed event signatures); (4) personalization data missing (the user&apos;s history was wiped or reset); (5) model drift. Specific to per-user-history mechanism.</em><br/><br/>Diagnose.</>}

      <VIS.TrapProblem id="sat-p22" difficulty="medium" title="P22 — When NOT to use session anomaly Transformer."

      <VIS.TrapProblem id="sat-p23" difficulty="hard" title="P23 — Production pipeline: how does session anomaly slot into web banking?"
        scenario={<><em>Discriminating insight: client-side instrumentation (JS/SDK) collects events → server-side event ingestion → session state store → incremental Transformer scoring as events arrive (every N events) → threshold → step-up auth (CAPTCHA, MFA) or block on confirmed ATO. History embedding cache updated end-of-session. Model retrain weekly. Privacy: behavioral data anonymized/aggregated per user policy.</em><br/><br/>Pipeline.</>}

          {key:"b", text:"End-to-end real-time pipeline. (1) CLIENT-SIDE INSTRUMENTATION: JavaScript on web pages or mobile SDK captures user events (page navigation, clicks, scrolls, taps, dwell times, form interactions, transaction attempts); buffers events; sends to server in batched POSTs (every 1-5 seconds). PII excluded (only event types, not field values). (2) SERVER-SIDE INGEST: event service receives batches; writes to session event store (Redis for hot session state, persistent store for analytics); maintains current session token sequence per active session id. (3) SESSION-START LOOKUP: at login, fetch user's HISTORY EMBEDDING from cache (Redis KV store keyed by user id; pre-computed at end of previous session); typical size 256-dim float vector. (4) INCREMENTAL SCORING: re-score every N=5-10 events or every 5-10 seconds. Take current event prefix; Transformer forward pass; pool; compute deviation from h_history. Latency 20-100 ms per re-score. (5) THRESHOLD ACTION: low score → continue; medium → STEP-UP AUTH (MFA challenge or CAPTCHA); high → block transaction + alert investigator queue. (6) STEP-UP RESPONSE: if user passes MFA, ADD CONFIRMED-LEGITIMATE flag to session, re-anchor history with positive weight; if fails, escalate to block. (7) END-OF-SESSION: compute final session embedding; UPDATE history embedding (append to prior sessions list, recompute EWMA); write back to cache. (8) ALERT QUEUE: high-anomaly sessions routed to investigator queue with full event sequence + attention attribution. (9) FEEDBACK LOOP: confirmed ATO (post-chargeback or investigator-confirmed) labeled and fed to weekly retrain. (10) MONITORING: per-user anomaly distribution drift; per-channel performance; step-up auth pass rate (sanity check on FP rate). (11) PRIVACY: behavioral tracking opted in per user policy; aggregated/anonymized for model training where required by GDPR/CCPA.", correct:true},
          {key:"c", text:"Random."},

        trap={<>(a)(c)(d) miss the end-to-end pipeline.</>}

        options={[
          {key:"a", text:"Cannot combine."},
          {key:"b", text:"Two LEVELS of behavioral signal; combination dramatically raises the mimicry bar. BEHAVIORAL BIOMETRICS (BiotouchPass for touch, TypeNet for keystroke, mouse-swipe TCN — batch 14 of this corpus) capture MICRO-LEVEL signals: inter-keystroke timings (each user has characteristic flight + dwell times), touch pressure profiles, swipe trajectory curvature, mouse path acceleration. These are signals at the millisecond level WITHIN individual interactions. Session anomaly Transformer captures MACRO-LEVEL signals: event ordering (login → click X → click Y vs login → click Y → click X), dwell distributions across pages, navigation paths, form-fill order. These are signals at the second-to-minute level ACROSS the session. COMBINATION OPTIONS. (1) BIOMETRIC TOKENS AS AUXILIARY TOKENS: append biometric features (mean keystroke interval, mouse-path entropy) as auxiliary tokens at strategic points in the session sequence (e.g., after each form-fill event); the session Transformer attends to both event ordering AND biometric tokens. Simple, single-model. (2) PARALLEL BRANCHES + LATE FUSION: run session Transformer on event sequence AND BiotouchPass / TypeNet on biometric signals; produce separate embeddings; late-fuse via logistic regression. Cleaner separation, separately tunable. (3) MULTI-TASK PRETRAINING: pretrain session Transformer with auxiliary biometric prediction tasks (predict keystroke dwell from event context); the encoder learns biometric-aware representations. ADVERSARIAL BAR: an attacker would need to mimic BOTH the user's macro behavior (event ordering, dwell pattern) AND micro behavior (keystroke timings, mouse curvature) — much harder than mimicking either alone. Production: combine via (2) at high-value accounts; (1) at scale.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip biometrics."},
        ]}
        trap={<>(a)(c)(d) miss the multi-level combination.</>}
        lens={<>Biometrics: micro (ms-level). Session Transformer: macro (s-level). Combine via auxiliary tokens / late fusion / multi-task pretrain. Mimicry bar = both levels.</>}
        stretch={<>How does TypeNet pretraining transfer to session Transformer?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://dl.acm.org/doi/10.1145/3589334.3645629" target="_blank" rel="noopener"><strong>Session-aware ATO Detection with Transformers</strong></a> <span style={{color:"#64748b", fontSize:14}}>(WWW 2024, paper)</span><br/>The reference for this concept. Sections 3-4 define the within-session Transformer + per-user history embedding architecture; Section 5 ablates vs LSTM and rule-based baselines.</li>
        <li><a href="https://arxiv.org/abs/1706.03762" target="_blank" rel="noopener"><strong>Vaswani et al. — Attention is All You Need</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2017, paper)</span><br/>The foundational Transformer paper. Read for self-attention + positional embedding; the architectural primitive session anomaly Transformer specializes for ATO.</li>
        <li><a href="https://www.fico.com/blogs/account-takeover-fraud-prevention" target="_blank" rel="noopener"><strong>FICO — ATO fraud prevention</strong></a> <span style={{color:"#64748b", fontSize:14}}>(industry blog)</span><br/>The contrast point: rule-based + scorecard approaches to ATO. Useful for understanding what session anomaly Transformer improves on and why credential-stuffed attacks evade rules.</li>
        <li><a href="https://arxiv.org/abs/2103.10374" target="_blank" rel="noopener"><strong>Tolosana et al. — TypeNet: Keystroke Dynamics for Continuous Authentication</strong></a> <span style={{color:"#64748b", fontSize:14}}>(IEEE Access 2021, paper)</span><br/>Behavioral biometrics primer — the micro-level signal that complements session anomaly Transformer's macro-level signal. Combine both for the highest mimicry bar.</li>
        <li><a href="https://owasp.org/www-community/attacks/Credential_stuffing" target="_blank" rel="noopener"><strong>OWASP — Credential Stuffing</strong></a> <span style={{color:"#64748b", fontSize:14}}>(reference)</span><br/>The attacker side: how credential-stuffing operates, what defenders see at the login page, why behavioral signals are the next-line defense after credentials are compromised.</li>
