<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Population stability index (PSI) monitoring — per-feature + score PSI as leading drift indicator.
// Classical credit-risk monitoring, modernized for fraud (Datadog 2025).

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · MLOps"
      title="Population stability index (PSI) monitoring"
      subtitle="Per-feature and score PSI are leading indicators of distribution drift — they alert BEFORE recall drops, unlike post-hoc recall regression which only fires after the model has already been failing."
      byline={[
        {label: "Source", value: "Classical credit risk; modernized in 'Drift Monitoring for Fraud Models' (Datadog 2025)"},
        {label: "Year", value: "2025"},
        {label: "L3", value: "Production ML for fraud / MLOps"},
      ]}/>

    <VIS.TLDR>
      A model can be silently failing for weeks before recall regression shows up — labels take 30+ days to arrive in fraud, so post-hoc recall is a lagging metric.{" "}
      <VIS.Term def="Population Stability Index (PSI): a divergence measure between two binned distributions of the same variable across time. PSI = Σ (p_now - p_then) * ln(p_now / p_then). Classical thresholds: PSI < 0.1 no shift, 0.1-0.25 modest shift, > 0.25 major shift requiring investigation.">PSI</VIS.Term>{" "}
      compares today's distribution of each feature (and the model's score distribution) against a training-time baseline; spikes alert you to drift before recall drops. Senior issues: the 0.1 / 0.25 thresholds are heuristics, feature-PSI without score-PSI impact is noise, and binning choices materially change the metric.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        For each feature (and the model's output score), maintain a binned baseline distribution from training time (or a recent stable production window). Periodically compute the same binned distribution on current production traffic. PSI is the symmetric{" "}
        <VIS.Term def="Kullback-Leibler divergence: a non-symmetric measure of how one probability distribution differs from another. PSI uses a symmetric variant suitable for two-direction drift detection.">KL-style</VIS.Term>{" "}
        divergence between the two. Conventional thresholds: PSI &lt; 0.1 = no meaningful shift, 0.1-0.25 = modest shift, &gt; 0.25 = major shift.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  TRAIN["Training-time baseline"]
  PROD["Current production traffic"]
  BIN["Binned distributions"]
  PSI["PSI per feature + score"]
  ALERT["Alert + investigation"]
  TRAIN --> BIN
  PROD --> BIN
  BIN --> PSI
  PSI --> ALERT
  style PSI fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style ALERT fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the PSI computation across features and score. Yellow = the alert that drives investigation. Crucial: PSI alerts on DISTRIBUTION shift, which may or may not translate to RECALL impact — diagnosing which is the senior part of the work.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Post-hoc recall</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Score PSI only</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Feature + score PSI</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Lead time before damage</td>
            <td style={{padding:"8px 10px"}}>0 days (reactive)</td>
            <td style={{padding:"8px 10px"}}>Days to weeks</td>
            <td style={{padding:"8px 10px"}}>Days to weeks</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Pinpoints offending feature</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>No (score only)</td>
            <td style={{padding:"8px 10px"}}>Yes (per feature)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Requires labels</td>
            <td style={{padding:"8px 10px"}}>Yes (with delay)</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>No</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>False-alarm rate</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>Medium</td>
            <td style={{padding:"8px 10px"}}>Higher (many features)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Engineering cost</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>Medium</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Always — table-stakes monitoring</strong> for any production model. PSI is cheap and adds a leading indicator no other metric provides.</li>
        <li><strong>Labels arrive with delay</strong> — fraud, churn, lifetime-value all benefit because the alternatives (recall, AUC) lag.</li>
        <li><strong>Distribution stability is a regulatory expectation</strong> — credit-risk regulators have expected PSI monitoring for decades; fraud increasingly follows.</li>
        <li><strong>Combine with feature importance</strong> — PSI on a low-importance feature matters less than PSI on a top-importance one.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="0.1 / 0.25 thresholds are heuristics, not laws">
        The classical bands come from credit-risk monographs in the 1990s. They are a reasonable starting point but should be calibrated to your specific feature, baseline window length, and historical week-to-week PSI variance. Some features naturally drift quarterly (seasonal) without recall impact.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="PSI on a feature with no model impact is noise">
        PSI on a feature that contributes nothing to the model's score adds false alarms. Weight feature-PSI alerts by feature importance; surface low-importance drift only when many features drift simultaneously (suggesting an upstream pipeline issue).
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Binning choices change the PSI value">
        Decile binning vs equal-width binning vs custom-edge binning give materially different PSI values for the same data. Standardize binning per feature; document it; never change binning during a baseline window without resetting.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade traps on PSI interpretation, threshold setting, binning, and combining with other drift signals.
      </p>

      <VIS.TrapProblem
        id="psi-p1"
        difficulty="hard"
        title="P1 — PSI spikes on a feature with no recall impact. False alarm or early warning?"
        scenario={<>You wake up to a PSI alert: feature <code>merchant_avg_ticket_30d</code> has PSI 0.31 (major shift) versus baseline. The model's score-PSI is 0.06 (no meaningful shift). Recall on the early-label cohort is stable. The on-call asks: false alarm or early warning?</>}
        options={[
          {key:"a", text:"Neither — it is a real drift, but one that the model is currently absorbing. Diagnose: is this feature a top-importance feature? If low importance, the score-PSI being stable means the model is appropriately downweighting it; route to backlog, not page. If top importance, the score-PSI being stable suggests the model is compensating via correlated features that have themselves drifted in offsetting directions — this masks current impact but the model is in an unfamiliar state. Investigate which features moved, what fraction of merchants drove the shift, and whether the change is upstream pipeline (data engineering bug) or downstream business (real merchant-mix change). Track score-PSI over the next 2-3 days; if it starts rising, the compensation is unraveling and intervention is needed.", correct:true},
          {key:"b", text:"False alarm — score-PSI is fine, ignore the feature alert."},
          {key:"c", text:"Early warning — retrain immediately."},
          {key:"d", text:"PSI is a flawed metric; replace it."},
        ]}
        trap={<>(b) discards a real signal because the immediate score impact is low — but distribution shifts compound, and a low-importance feature shift today often correlates with higher-importance feature shifts tomorrow. (c) overreacts; retraining without diagnosis treats the symptom. (d) is reflex-skepticism.</>}
        lens={<>(a). The senior reading: PSI on a feature without immediate score impact is neither false alarm nor confirmed problem. It is a feature-level signal that needs context (feature importance, correlated features, upstream cause). The right next move is investigation, not blanket action. Senior signal: distinguish between immediate-action drift and watch-and-investigate drift.</>}
        stretch={<>What single follow-on metric would confirm "early warning" vs "absorbed drift" within 2-3 days?</>}
      />

      <VIS.TrapProblem
        id="psi-p2"
        difficulty="hard"
        multiSelect
        title="P2 — What should you bin, and how?"
        scenario={<>You are designing PSI binning for a fraud model with 200 features (mix of numeric continuous, numeric counts, categorical with high cardinality, categorical with low cardinality). Which binning choices apply?</>}
        options={[
          {key:"a", text:"Numeric continuous: decile bins from training-time quantiles, kept fixed across all production windows for that feature.", correct:true},
          {key:"b", text:"Numeric counts (sparse): special bin for zero plus decile bins on non-zero values; counts often have zero-inflation.", correct:true},
          {key:"c", text:"Categorical low cardinality: one bin per level plus a 'rare / unseen' bucket.", correct:true},
          {key:"d", text:"Categorical high cardinality (e.g., merchant IDs): hash to a fixed K bins or use the most-frequent K levels plus a 'rest' bin.", correct:true},
          {key:"e", text:"Re-bin every week based on the most recent production data."},
          {key:"f", text:"Use the same number of bins for every feature regardless of distribution shape."},
        ]}
        trap={<>(e) re-binning destroys comparability across time; you cannot tell distribution shift from bin-edge shift. (f) ignores distribution shape; equal-bin-count on a power-law feature collapses signal.</>}
        lens={<>Four correct. <strong>(a) (b) (c) (d)</strong> are the standard binning recipes per feature type. The trap is (e) — bin edges MUST be fixed at baseline time and persisted. Senior signal: PSI is a fixed-binning game; floating bins make the metric meaningless.</>}
        stretch={<>How do you handle a new categorical level that did not exist at baseline?</>}
      />

      <VIS.TrapProblem
        id="psi-p3"
        difficulty="hard"
        title="P3 — Score-PSI spikes but no feature-PSI explains it"
        scenario={<>Score-PSI jumps to 0.28 (major shift) overnight. You scan all 200 features for PSI changes; none crosses 0.1. Recall is starting to wobble. What is going on?</>}
        options={[
          {key:"a", text:"The shift is in the JOINT distribution of features even though no individual feature has shifted noticeably. Customers (or attackers) are appearing in combinations of feature values that the baseline did not contain, even though each individual feature's marginal looks normal. Diagnose: compute joint-PSI on pairs / triples of important features, or look at the model's score on a per-segment basis (geography, channel, customer cohort) to see where the score distribution shifted. A new attacker MO often produces exactly this signature.", correct:true},
          {key:"b", text:"PSI math bug; recompute."},
          {key:"c", text:"Score is drifting independent of features; retrain."},
          {key:"d", text:"Ignore it; recall is the real metric."},
        ]}
        trap={<>(b) blames math. (c) is impossible — the score is a deterministic function of features, so score drift IS feature drift, even if the marginal-PSI did not catch it. (d) ignores the leading indicator.</>}
        lens={<>(a). Per-feature marginal PSI misses joint distribution shifts; a new attacker MO can move the joint without moving any marginal noticeably. Diagnose via joint-PSI on top correlated feature pairs, segment-level score-PSI, and adversarial-cohort comparison. Senior signal: score-PSI is the integration of all feature shifts; if it moves and no individual feature moved much, the joint is the culprit.</>}
        stretch={<>Which two-feature combination would you check first for joint shift?</>}
      />

      <VIS.TrapProblem
        id="psi-p4"
        difficulty="medium"
        title="P4 — PSI baseline: training-time or recent stable production?"
        scenario={<>You are setting up PSI monitoring for a model that has been live for a year. Should the baseline distribution be the training-time data, or a recent stable production window?</>}
        options={[
          {key:"a", text:"Both, used for different purposes. Training-time baseline tells you how far production has drifted from the data the model was trained on (which bounds expected performance). Recent-stable-production baseline (e.g., 30-day rolling) tells you whether today's distribution differs from recent operating conditions (which catches sudden shifts). Use training PSI for retraining decisions; use rolling PSI for incident-detection alerts.", correct:true},
          {key:"b", text:"Training-time only; that is what the model was fit for."},
          {key:"c", text:"Recent stable only; training-time is too far back."},
          {key:"d", text:"Use the most recent week as baseline; always."},
        ]}
        trap={<>(b) misses gradual drift over the model's lifetime — slow drift never sets off a PSI alert against training but degrades performance steadily. (c) misses long-term degradation. (d) uses too-short baseline; weekly variance dominates.</>}
        lens={<>(a). Two baselines for two purposes: training-time for retraining triggers, rolling-stable for incident-detection. Standard pattern in production credit-risk and fraud monitoring. Senior signal: explain WHY you use each baseline, not just THAT you use one.</>}
        stretch={<>What is the right window length for the rolling-stable baseline?</>}
      />

      <VIS.TrapProblem
        id="psi-p5"
        difficulty="hard"
        title="P5 — Feature PSI alert during Black Friday"
        scenario={<>Black Friday. Transaction-volume PSI on <code>transaction_amount</code> hits 0.42 (major shift), velocity-features hit 0.31, merchant-category mix shifts. The on-call is paged 15 times in an hour. Real drift or noise?</>}
        options={[
          {key:"a", text:"Real distribution shift but expected and seasonal. The right architectural response is per-event-class PSI baselines: have a 'Black Friday baseline' computed from prior Black Fridays, compare today against that, not against the training-period or rolling-non-holiday baseline. Without seasonal baselines, you flood on-call every retail-event-day. Also: temporarily widen alert thresholds during pre-announced events, while keeping the underlying PSI computation running so post-event you can compare this Black Friday to prior years.", correct:true},
          {key:"b", text:"Real drift — disable the model until conditions normalize."},
          {key:"c", text:"Noise — silence PSI for 48 hours."},
          {key:"d", text:"Retrain on Black Friday data and ship by Monday."},
        ]}
        trap={<>(b) panics on expected seasonal shift; turning off fraud detection on a high-fraud day is exactly wrong. (c) silences a real signal and trains on-call to ignore alerts. (d) overfits to one event and pollutes the baseline.</>}
        lens={<>(a). Seasonal events deserve seasonal baselines and event-aware thresholds. Same shape as alerting on metric drift in any seasonal business; do not flatten the time-of-year context. Senior signal: PSI architecture must include event-class baselines and temporal-context-aware thresholds.</>}
        stretch={<>How do you bootstrap a Black Friday baseline in year 1 of the model?</>}
      />

      <VIS.TrapProblem
        id="psi-p6"
        difficulty="hard"
        multiSelect
        title="P6 — Combining PSI with other drift signals"
        scenario={<>PSI is one drift signal; there are others. Which complementary signals belong in a complete drift-monitoring stack?</>}
        options={[
          {key:"a", text:"Score distribution KS / Wasserstein distance — complements PSI with non-binned divergence metrics.", correct:true},
          {key:"b", text:"Feature importance drift — track how SHAP / gain importances shift over time; the model's mechanism may be changing even if score distribution is stable.", correct:true},
          {key:"c", text:"Concept drift (label-conditional feature shift) — when labels arrive, check whether P(feature | label) has shifted; PSI alone catches P(feature), not the conditional.", correct:true},
          {key:"d", text:"Calibration drift — reliability diagrams comparing predicted vs observed fraud rate by score bucket.", correct:true},
          {key:"e", text:"Just use PSI; other metrics add noise."},
          {key:"f", text:"Approval-rate trend — operational signal that often moves with score-PSI.", correct:true},
        ]}
        trap={<>(e) is the trap — PSI is one tool, not all tools. Senior monitoring stacks combine multiple drift signals because each catches different failure modes.</>}
        lens={<>Five correct. <strong>(a)</strong> non-binned divergence. <strong>(b)</strong> importance drift. <strong>(c)</strong> concept drift via P(feature | label). <strong>(d)</strong> calibration. <strong>(f)</strong> operational signals. PSI complements all of them. Senior signal: name the COMPLEMENTARY signals, not just the strongest one.</>}
        stretch={<>Which two of these signals catch issues PSI cannot catch at all?</>}
      />

      <VIS.TrapProblem
        id="psi-p7"
        difficulty="medium"
        title="P7 — A pipeline bug causes a feature to be constantly NaN"
        scenario={<>An upstream ETL change makes feature <code>device_fingerprint_age_days</code> 100% NaN starting yesterday. Your model imputes NaN as -1. PSI on the feature: 1.7 (extreme). Score-PSI: 0.04 (minimal). What does this tell you?</>}
        options={[
          {key:"a", text:"PSI is doing its job: it surfaced a major upstream data-pipeline failure as a feature-level alarm. Score-PSI is low because the model is robustly imputing missing values without crashing, but the model is now blind to one feature — which is a silent recall degradation that will only show up when labels arrive in 30 days. The right action is to fix the pipeline immediately; do not wait for score-PSI or recall to confirm.", correct:true},
          {key:"b", text:"False alarm — the imputation handles it."},
          {key:"c", text:"PSI is broken at the extreme; ignore values above 1.0."},
          {key:"d", text:"Retrain with NaN as a category."},
        ]}
        trap={<>(b) misses that "imputation" is not "no impact"; the model is operating without the feature's signal. (c) is exactly wrong — extreme PSI values are the highest-priority alarms. (d) is the post-fix retraining decision, not the immediate response.</>}
        lens={<>(a). PSI catches upstream pipeline failures FAST — the cardinal failure mode that turns into silent recall loss weeks later. Senior signal: feature-PSI is the first line of defense against data-pipeline breakage, regardless of immediate score impact.</>}
        stretch={<>What metric beyond PSI would have caught this even faster?</>}
      />

      <VIS.TrapProblem
        id="psi-p8"
        difficulty="hard"
        title="P8 — Setting custom PSI thresholds per feature"
        scenario={<>The standard 0.1 / 0.25 thresholds produce 50 alerts/day on a 200-feature model — too noisy. You want per-feature thresholds. How do you set them?</>}
        options={[
          {key:"a", text:"Per feature, compute the empirical distribution of PSI values over 90 days of stable production (week-vs-week, no known incident). Set the alert threshold at, say, the 95th or 99th percentile of that empirical distribution. Features with naturally-high week-to-week variance (seasonal categoricals, traffic-mix features) get higher thresholds; features with stable distributions get lower ones. This is per-feature calibration, not one-size-fits-all.", correct:true},
          {key:"b", text:"Multiply 0.1 / 0.25 by feature importance; less-important features get higher thresholds."},
          {key:"c", text:"Use 0.5 / 1.0 thresholds globally; fewer alerts."},
          {key:"d", text:"Only alert on top-10 features; ignore the rest."},
        ]}
        trap={<>(b) is partially right (importance weighting matters) but conflates two issues (natural variance vs business impact). (c) raises thresholds globally and misses real shifts on stable features. (d) discards drift signal on 95% of the feature set.</>}
        lens={<>(a). Per-feature empirical thresholds calibrate to natural variance. Standard practice in mature production monitoring. Combine with importance weighting for alert priority. Senior signal: PSI thresholds are a tunable parameter, not a constant.</>}
        stretch={<>How long a baseline window do you need to estimate the 99th percentile reliably?</>}
      />

      <VIS.TrapProblem
        id="psi-p9"
        difficulty="hard"
        multiSelect
        title="P9 — PSI without retraining"
        scenario={<>You have PSI alerts. The default action is retrain. But retraining is expensive and slow. Which non-retraining responses are appropriate to specific PSI patterns?</>}
        options={[
          {key:"a", text:"Upstream pipeline fix — if PSI on a feature jumps to extreme values (1.0+), the cause is almost always a data-pipeline bug; fix the pipeline.", correct:true},
          {key:"b", text:"Threshold adjustment — if score-PSI is high but feature-PSI is widely distributed (no single feature broken), recalibrate the decision threshold to maintain operational metrics.", correct:true},
          {key:"c", text:"Feature deprecation — if a feature is permanently changed (e.g., a third-party signal API was discontinued), drop it from the model and retrain only that feature out, not the full model.", correct:true},
          {key:"d", text:"Always retrain on any PSI alert.", correct:false},
          {key:"e", text:"Incident-class baseline update — if the drift is seasonal / event-related, update the seasonal baseline rather than retraining.", correct:true},
        ]}
        trap={<>(d) is the reflexive answer that conflates monitoring with action; not every alert deserves retraining, and retraining when the cause is a pipeline bug just bakes in the bug.</>}
        lens={<>Four correct. <strong>(a)</strong> pipeline fix. <strong>(b)</strong> threshold recalibration. <strong>(c)</strong> targeted feature removal. <strong>(e)</strong> seasonal baseline update. Senior signal: diagnosis precedes action; retraining is one of several responses, not the only one.</>}
        stretch={<>What single PSI pattern would push you to retrain vs apply one of the lighter responses?</>}
      />

      <VIS.TrapProblem
        id="psi-p10"
        difficulty="hard"
        title="P10 — End-to-end drift-monitoring stack"
        scenario={<>You are designing the complete drift-monitoring stack for a fraud model. 200 features, 50M transactions/day, 30-day label delay, seasonal patterns. Pick the architecture.</>}
        options={[
          {key:"a", text:"Layered drift monitoring: per-feature PSI (binned, fixed bin edges, two baselines — training and rolling-30-day) plus score-PSI plus joint-PSI on top correlated feature pairs. Per-feature empirical thresholds at 95-99th percentile of stable-window PSI distribution; importance-weighted alert prioritization. Seasonal baselines for known event classes (Black Friday, payday, quarter-end). Complementary signals: KS / Wasserstein on score, feature-importance drift, calibration reliability diagrams, label-conditional concept drift when labels arrive. Operational signals: approval-rate, step-up rate, complaint-rate trends. Alert routing: page on upstream pipeline failure (extreme PSI), backlog for low-impact drift, escalate on score-PSI + complaint-rate joint signal. Action playbooks per pattern: pipeline fix, threshold recalibration, targeted feature deprecation, seasonal-baseline update, retrain — not always retrain.", correct:true},
          {key:"b", text:"Just track recall after labels arrive."},
          {key:"c", text:"Score-PSI only; ignore feature-PSI."},
          {key:"d", text:"PSI on every feature with fixed 0.1 / 0.25 thresholds globally."},
        ]}
        trap={<>(b) is the lagging-indicator-only failure that motivates the entire visual. (c) loses feature-level diagnosability. (d) floods on-call with noise from naturally-variable features.</>}
        lens={<>(a). The complete senior architecture: layered PSI with two baselines, joint-PSI for non-marginal shifts, seasonal baselines, complementary drift signals, operational signals, per-feature thresholds, alert routing by impact, and action playbooks. Each component addresses a failure mode the prior problems exposed.</>}
        stretch={<>Which single component of this stack has the highest ROI for a team currently doing recall-only monitoring?</>}
      />
    </VIS.Section>
