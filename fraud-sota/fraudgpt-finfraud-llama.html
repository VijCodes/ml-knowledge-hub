  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// FraudGPT / FinFraud-Llama — domain-adapted LLM for financial fraud reasoning
// v2 redo — trap problems span A-F axes; every problem hinges on what is
// distinctive about CONTINUAL PRETRAIN + SFT on fraud narratives (vs RAG or
// plain SFT), not generic "LLMs for X" gotchas.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · domain-adapted LLM for fraud reasoning"
      title="FraudGPT / FinFraud-Llama"
      subtitle="Llama-2-13B continual-pretrained on fraud case narratives + SEC filings, then SFT on triage decisions. The CPT step is what makes this not-just-RAG."
      byline={[
        {label: "Paper", value: "Zhang et al., EMNLP 2024 (Industry)"},
        {label: "Year", value: "2024"},
        {label: "Domain", value: "Analyst tooling — triage + case summarization"},
      ]}/>

    <VIS.TLDR>
      <VIS.Term def="Continual pretraining: continue the language-model objective on a new corpus (here: SAR narratives, SEC filings, fraud case write-ups) before instruction tuning. Distinct from RAG (retrieval at inference) and plain SFT (instructions only).">CPT</VIS.Term> on fraud-narrative + SEC-filing corpus, then <VIS.Term def="Supervised Fine-Tuning. Train a pretrained model on labeled (input, target) pairs to specialize it.">SFT</VIS.Term> on (case → <VIS.Term def="In AML, the named pattern of laundering (e.g., trade-based, layering, smurfing). Detectors are usually typology-anchored.">typology</VIS.Term> + recommended action) pairs. <VIS.Term def="Decoder emits a token sequence that does not correspond to any real item in the catalog / valid typology.">Hallucinated</VIS.Term> typology rates drop ~40% vs vanilla Llama; <VIS.Term def="Fraction of relevant items (here: true typologies) captured by the model's top prediction. Long-tail recall is where CPT helps most.">recall</VIS.Term> on <VIS.Term def="The bulk of distinct typologies that each occur rarely — collectively dominant, individually low-frequency.">long-tail</VIS.Term> typologies (cycle-billing, <VIS.Term def="Trade-Based Money Laundering. Using import/export invoicing to move illicit value across borders.">trade-based laundering</VIS.Term>) gains the most. Does NOT replace RAG over SOPs — complements it. The CPT corpus risk: real <VIS.Term def="Suspicious Activity Report. Bank-filed narrative describing why a transaction or customer looks suspicious.">SAR</VIS.Term> narratives are <VIS.Term def="Personally Identifiable Information — customer names, account numbers, addresses. Subject to strict data-handling rules; cannot enter model weights uncontrolled.">PII</VIS.Term>-heavy and the model can memorize verbatim cases, which exfiltrate via <VIS.Term def="Attacker-supplied prompt that primes the model to leak training data or override system instructions.">prompt injection</VIS.Term>. Source: <a href="https://aclanthology.org/2024.emnlp-industry.0/" target="_blank" rel="noopener">EMNLP 2024 Industry track</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        Two-stage adaptation of Llama-2-13B: (1) continue the <VIS.Term def="Standard language-model objective: predict the next token given the prefix. Used for pretraining and CPT.">next-token loss</VIS.Term> on a curated fraud corpus (<VIS.Term def="Suspicious Activity Report. Bank-filed narrative describing why a transaction or customer looks suspicious. The core text artifact of AML investigation.">SAR</VIS.Term> narratives, FinCEN advisories, public SEC enforcement actions, internal case write-ups) for ~3-5B tokens; (2) <VIS.Term def="Train the model on (instruction, response) pairs so it learns to follow task instructions in the target format.">instruction-tune</VIS.Term> on (case_summary → typology + recommended_action + evidence_citations) pairs assembled from historical <VIS.Term def="Anti-Money-Laundering. The compliance domain of detecting and reporting laundering activity in financial systems.">AML</VIS.Term> analyst decisions.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  L0["Llama-2-13B base"]
  C["Fraud corpus: SAR + SEC + case write-ups"]
  L0 --> CPT["Continual pretrain (next-token, 3-5B tokens)"]
  C --> CPT
  CPT --> M1["FinFraud-Llama base"]
  D["Analyst-decision pairs (case -> typology + action)"]
  M1 --> SFT["Supervised fine-tune"]
  D --> SFT
  SFT --> M2["FraudGPT"]
  style CPT fill:#dbeafe,stroke:#1e40af,stroke-width:2px
  style SFT fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — How it differs from RAG-only and plain SFT">
      <p>
        <strong><VIS.Term def="Retrieval-Augmented Generation. At inference, retrieve relevant passages (e.g., from an SOP corpus) and concatenate them into the prompt so the LLM can cite up-to-date context. Does not change the model's weights.">RAG</VIS.Term> over fraud SOPs.</strong> Retrieves SOP snippets at inference; the base LLM's <VIS.Term def="Language-model statistical structure — what vocabulary, sentence shapes, and typologies the model treats as plausible by default. Vanilla Llama defaults to news/wiki priors and treats fraud typologies as exotic.">prior</VIS.Term> is unchanged. Works for procedural questions ("what fields must a SAR include?") but cannot disambiguate fraud typologies it has never seen at training time — they remain <VIS.Term def="Token-sequence outputs the model assigns small probability to. Long-tail typologies live here for vanilla Llama; CPT lifts the mass.">low-probability completions</VIS.Term>.
      </p>
      <p>
        <strong>SFT-only (skip CPT).</strong> Instruction-tunes Llama directly on (case → decision) pairs. Learns the OUTPUT FORMAT but the base model's <VIS.Term def="The set of typology tokens the model treats as natural-language vocabulary (e.g., 'smurfing', 'layering', 'cycle-billing'). Vanilla Llama treats these as exotic; CPT normalizes them.">typology vocabulary</VIS.Term> is unchanged — it still confuses cycle-billing with rebill fraud because the underlying <VIS.Term def="Probability mass the model assigns to each vocabulary token in context. CPT moves which tokens are likely; SFT shapes how they compose into responses.">token distributions</VIS.Term> did not move. <VIS.Term def="Decoder emits a token sequence that does not correspond to any real item / valid typology in the catalog.">Hallucination</VIS.Term> rate stays high.
      </p>
      <p>
        <strong>CPT + SFT (FraudGPT).</strong> CPT shifts the underlying token distribution toward fraud-narrative shape; SFT teaches decision format on top. Hallucination drops because the model's prior over typologies aligns with the actual SAR-narrative <VIS.Term def="The distribution observed in actual data (here: real SAR narratives) — what the model's prior should match if CPT is doing its job.">empirical distribution</VIS.Term>, not Wikipedia's.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick it">
      <p>
        Pick CPT+SFT (FraudGPT) when (a) you have a substantial domain corpus (more than 1B tokens of fraud-specific text), (b) typology vocabulary is large and <VIS.Term def="The bulk of distinct typologies that each occur rarely — collectively they dominate, but each is low-frequency. Where CPT pays off most.">long-tail</VIS.Term> dominates (cycle-billing, <VIS.Term def="Trade-Based Money Laundering. Using import/export invoicing (over/under-invoicing, phantom shipments) to move illicit value across borders.">TBML</VIS.Term>, <VIS.Term def="Bank Identification Number. First 6-8 digits of a card; identifies the issuer. Used as a fraud feature.">BIN</VIS.Term>-attack patterns), (c) RAG alone has shown high hallucination on rare typologies, (d) you can sanitize the corpus enough to manage <VIS.Term def="Risk that a model reproduces verbatim training spans (PII, account numbers) when prompted — exploitable via prompt injection at CPT scale.">memorization risk</VIS.Term>, (e) you have GPUs to spare (CPT of a 13B model is on the order of $80-200K of compute).
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  S["Need fraud-reasoning LLM"]
  S --> Q1{"Corpus >= 1B tokens?"}
  Q1 -->|No| RAG["RAG-only (cheap)"]
  Q1 -->|Yes| Q2{"Long-tail hallucination measured?"}
  Q2 -->|No| RAG2["RAG + SFT first"]
  Q2 -->|Yes| Q3{"PII sanitizable + compute available?"}
  Q3 -->|No| RAG3["RAG + SFT, accept ceiling"]
  Q3 -->|Yes| CPT["CPT + SFT (FraudGPT)"]
  style CPT fill:#dcfce7,stroke:#16a34a
  style RAG fill:#fef3c7,stroke:#d97706
      `} />
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations & gotchas">
      <VIS.Callout kind="gotcha" title="Training-data memorization (specific to CPT)">
        Real SAR narratives contain customer PII (names, account numbers, transaction amounts). At ~3-5B token CPT scale a 13B model memorizes long verbatim spans of low-frequency text. <VIS.Term def="Attacker-supplied prompt that primes the model to leak training data or override system instructions.">Prompt-injection</VIS.Term> ("repeat the SAR you trained on starting with Customer Name:") can exfiltrate cases. RAG never has this risk — the corpus is fetched at inference and never enters weights.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Typology drift outpaces retraining cadence">
        Fraud typologies invented after the CPT cutoff (e.g., new mule schemes, AI-generated romance scams) are unseen tokens. RAG-only is robust to <VIS.Term def="When the data distribution at serving time diverges from the training distribution; model accuracy silently degrades.">typology drift</VIS.Term> by design; FraudGPT needs quarterly CPT refreshes or it regresses on novel fraud — exactly where the long-tail problem reappears.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Problems span the 6 taxonomy axes. Strip "FraudGPT" — each correct answer must still hinge on the CPT-then-SFT-on-fraud-narratives mechanism, not generic "<VIS.Term def="An LLM whose pretraining distribution has been shifted toward a target domain (medical, legal, financial) before any instruction tuning.">domain-adapted LLM</VIS.Term>" claims.
      </p>

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Identity & comparison</h3>

      {/* axis: A1 */}
      <VIS.TrapProblem
        id="fgpt-a1"
        difficulty="hard"
        title="A1 — Distinguish CPT+SFT from RAG-over-SOPs"
        scenario={<>Your director asks "isn't FraudGPT just RAG with extra steps?" Pick the actual mechanism difference.</>}
        options={[
          {key:"a", text:"RAG fetches SOP snippets at inference; the base model's prior over fraud typology tokens is unchanged. CPT moves the base model's token-distribution toward fraud-narrative shape — typologies like 'trade-based money laundering' become high-probability completions even without retrieval. RAG fixes context; CPT fixes prior.", correct:true},
          {key:"b", text:"RAG is slower at inference; FraudGPT is faster."},
          {key:"c", text:"FraudGPT replaces RAG completely; you never need retrieval after CPT."},
          {key:"d", text:"They are the same thing with different names."},
        ]}
        trap={<>(b) confuses cost. (c) is the textbook recipe-error (you still need RAG for fresh SOPs). (d) collapses the distinction.</>}
        lens={<>The CPT move shifts <em>prior</em>. RAG patches <em>context</em>. They compose; one does not replace the other.</>}
        stretch={<>What stays in RAG even after FraudGPT ships?</>}
      />

      {/* axis: A2 */}
      <VIS.TrapProblem
        id="fgpt-a2"
        difficulty="medium"
        title="A2 — CPT vs DAPT vs SFT vs DPO"

        multiSelect
        options={[
          {key:"a", text:"Stage 1 = CPT (next-token loss on fraud corpus) — DAPT (domain-adaptive pretraining) is the same idea under a different name.", correct:true},
          {key:"b", text:"Stage 2 = SFT (supervised fine-tune on instruction → response pairs).", correct:true},
          {key:"c", text:"DPO (direct preference optimization) is NOT used in the paper; it would require preference pairs that fraud analysts rarely produce.", correct:true},
          {key:"d", text:"RLHF reward modeling is the core mechanism."},
        ]}
        trap={<>(d) is wrong — the paper uses CPT+SFT, no RLHF.</>}
        lens={<>CPT/DAPT are the same operation. The paper does NOT use DPO/RLHF — fraud analysts give labels, not preference rankings.</>}
        stretch={<>Could DPO be retrofitted? What preference pairs would you collect?</>}
      />

      {/* axis: A3 */}
      <VIS.TrapProblem
        id="fgpt-a3"
        difficulty="hard"
        title="A3 — Counterfactual: no CPT, only SFT"
        scenario={<>If you skip CPT and only SFT Llama on (case → decision) pairs, what is the predicted regression?</>}
        options={[
          {key:"a", text:"Output FORMAT looks fine — the model emits typology labels and recommended actions in the right shape. But hallucination on long-tail typologies stays high because the underlying token prior still puts low mass on 'cycle billing' / 'trade-based laundering' / 'BIN attack' — SFT does not move the prior, only the conditional. The 40% hallucination reduction is mostly attributable to CPT, not SFT.", correct:true},
          {key:"b", text:"Identical results — CPT is decorative."},
          {key:"c", text:"Worse than RAG."},
          {key:"d", text:"SFT alone matches CPT+SFT on rare typologies."},
        ]}
        trap={<>(b), (d) miss the prior-vs-conditional distinction.</>}
        lens={<>SFT teaches form; CPT teaches vocabulary. Long-tail typologies need vocabulary, so SFT-only plateaus.</>}
        stretch={<>What ablation would isolate CPT's contribution?</>}
      />

      {/* axis: A4 */}
      <VIS.TrapProblem
        id="fgpt-a4"
        difficulty="hard"
        title="A4 — Composition with RAG"
        scenario={<>You stack FraudGPT + RAG over current SOPs. What survives, what breaks?</>}
        multiSelect
        options={[
          {key:"a", text:"FraudGPT contributes typology prior; RAG contributes fresh policy text. They compose cleanly: model fluently reasons about a typology it saw during CPT while citing the SOP retrieved at inference.", correct:true},
          {key:"b", text:"RAG covers post-cutoff typologies (mule rings invented after CPT) that FraudGPT cannot represent.", correct:true},
          {key:"c", text:"PII risk shifts: RAG snippets are ephemeral; CPT weights are not. Memorization risk is FraudGPT-specific.", correct:true},
          {key:"d", text:"Adding RAG breaks the SFT decision format."},
        ]}
        trap={<>(d) is false — RAG context appends to the prompt; the SFT format is unaffected.</>}
        lens={<>The stack is the right production design. Each layer covers a different failure of the other.</>}
        stretch={<>What does the prompt template look like to ensure both signals are used?</>}
      />

      {/* axis: A5 */}
      <VIS.TrapProblem
        id="fgpt-a5"
        difficulty="hard"
        title="A5 — Where CPT stops paying off"
        scenario={<>At what corpus size does CPT's edge over RAG-only vanish?</>}
        options={[
          {key:"a", text:"Below ~100M tokens of fraud-specific text: CPT moves the prior too little to matter (token mass changes are noise-floor). Below this threshold, RAG-only matches CPT+SFT and avoids the memorization and compute costs. CPT's payoff scales with corpus size — and with how concentrated the long-tail typology mass is in that corpus.", correct:true},
          {key:"b", text:"CPT always wins regardless of corpus."},
          {key:"c", text:"At exactly 1B tokens."},
          {key:"d", text:"At 1 trillion tokens."},
        ]}
        trap={<>(b), (c), (d) miss the threshold logic.</>}
        lens={<>CPT's value-add is proportional to prior shift. Tiny corpora cannot shift the prior measurably; the compute and PII costs remain.</>}
        stretch={<>How would you measure prior shift before committing to CPT?</>}
      />

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>B. Application</h3>

      {/* axis: B1 */}
      <VIS.TrapProblem
        id="fgpt-b1"
        difficulty="medium"
        title="B1 — Pick the right tool given the scenario"
        scenario={<>Scenario: AML team, ~800M tokens of internal case write-ups + SAR narratives, current GPT-4 + RAG hallucinates trade-based-laundering as 'wire fraud' 18% of the time, you have 4×H100 nodes for 2 weeks. Pick the investment.</>}
        options={[
          {key:"a", text:"CPT + SFT on Llama-2-13B (or Llama-3-8B). The hallucination pattern (rare typology mis-classified to a common one) is the textbook CPT win. Corpus size is sufficient. Compute fits. Sanitize PII first.", correct:true},
          {key:"b", text:"Switch to GPT-4o — bigger model fixes it."},
          {key:"c", text:"Add more SOP documents to RAG."},

        lens={<>The hallucination signature (rare → common collapse) maps directly to a prior-mass problem; CPT is the targeted intervention.</>}
        stretch={<>What is the smallest evaluation that proves CPT is the right move before committing the compute?</>}

      {/* axis: B2 */}
      <VIS.TrapProblem
        id="fgpt-b2"
        difficulty="hard"
        title="B2 — 'Sounds reasonable' — bigger base model fixes it"
        scenario={<>Your team lead says "use Llama-3-70B instead of CPT+SFT on 13B — bigger model gives better fraud reasoning." Why is this wrong specifically for the long-tail fraud-typology problem?</>}
        options={[
          {key:"a", text:"Llama-3-70B's pretraining corpus is the same general web mix — long-tail fraud typologies (cycle-billing, TBML, BIN-attack) have similar token mass to the 13B base. Bigger is better at general tasks, not at rare-typology recall. CPT shifts the prior precisely where the long tail lives; raw scale does not.", correct:true},

        stretch={<>If you HAD to choose between 70B+RAG and 13B+CPT+SFT under fixed cost, which wins for fraud-typology recall?</>}
      />

      {/* axis: B3 — concept-specific pitch */}
      <VIS.TrapProblem
        id="fgpt-b3"
        difficulty="hard"
        title="B3 — Pitch FraudGPT to the AML director"
        scenario={<>The AML director asks: "Why CPT+SFT over our current GPT-4+RAG?" Pick the pitch that requires understanding the prior-vs-context mechanism.</>}
        options={[
          {key:"a", text:"Our current GPT-4+RAG retrieves the right SOP but the base model still defaults to common-typology completions — cycle-billing keeps getting tagged as 'rebill fraud' even when the SOP says otherwise, because the base model's token prior for 'rebill' is much higher. CPT on our SAR corpus is what moves the prior so the model reads the SOP correctly. RAG without prior shift is a foreign-language speaker reading from a phrasebook.", correct:true},

        lens={<>Strip "FraudGPT" — the metaphor (phrasebook reader vs native speaker) makes the prior-vs-context distinction concrete and FraudGPT-specific.</>}
        stretch={<>What follow-up question reveals the director understood the distinction?</>}
      />

      {/* axis: B4 */}
      <VIS.TrapProblem
        id="fgpt-b4"
        difficulty="hard"
        title="B4 — When NOT to use CPT+SFT"
        scenario={<>Which scenarios are FraudGPT anti-patterns?</>}
        multiSelect
        options={[
          {key:"a", text:"Corpus under 100M tokens — prior shift too small to justify compute + memorization risk.", correct:true},
          {key:"b", text:"Typology turnover is high (new schemes monthly) — CPT cutoff goes stale before you can retrain.", correct:true},
          {key:"c", text:"PII cannot be sanitized at scale — memorization risk exceeds benefit.", correct:true},

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>C. Mechanism</h3>

      {/* axis: C1 */}
      <VIS.TrapProblem
        id="fgpt-c1"
        difficulty="hard"
        title="C1 — Why CPT BEFORE SFT (not in parallel, not interleaved)?"
        scenario={<>Why does the paper run CPT first, then SFT, instead of mixing them?</>}
        options={[
          {key:"a", text:"CPT requires LARGE batches of next-token loss to shift the prior; SFT requires SMALL batches of (instruction, response) cross-entropy with carefully crafted targets. Mixing the losses dilutes both — the SFT format signal gets buried in CPT's volume, and SFT-tuned attention heads get partially overwritten by CPT updates. Sequential keeps each objective unambiguous.", correct:true},
          {key:"b", text:"PyTorch doesn't support mixed objectives."},
          {key:"c", text:"CPT must come first or the loss is undefined."},
          {key:"d", text:"They are interchangeable in the paper."},
        ]}
        trap={<>(b), (c) are factual errors. (d) is wrong — the paper specifically sequences them.</>}
        lens={<>Objective shape (next-token vs instruction-response) determines optimal batch size and LR; mixing pays for the worse setting on both.</>}
        stretch={<>What goes wrong if you do SFT first, then CPT?</>}
      />

      {/* axis: C2 */}
      <VIS.TrapProblem
        id="fgpt-c2"
        difficulty="hard"
        title="C2 — Why SFT prompts must inherit CPT's typology token distribution"
        scenario={<>After FraudGPT's CPT phase shifts the prior over AML-typology tokens (structuring, smurfing, trade-based-laundering, layering), the SFT prompt pool is drafted by an analyst using everyday paraphrases ("breaking up deposits", "moving cash through invoices") instead of those exact typology tokens. The CPT-then-SFT eval regresses below CPT-only on typology classification. What is the mechanism?</>}
        options={[
          {key:"a", text:"SFT cross-entropy reshapes the conditional distribution over response tokens given the prompt — if the prompt distribution rarely contains the CPT-elevated typology tokens, the contexts in which those tokens were upweighted during CPT are never visited at SFT time, so SFT gradients flow through neighbouring (paraphrase) contexts and partially flatten the CPT-induced prior on the typology tokens. The vocabulary mismatch between CPT corpus and SFT prompt pool is the lever — not the SFT recipe itself.", correct:true},
          {key:"b", text:"SFT always overwrites CPT regardless of token distribution; the fix is a smaller SFT learning rate."},
          {key:"c", text:"The tokenizer fragments paraphrases differently, so the embedding matrix is corrupted."},
          {key:"d", text:"Cross-entropy is symmetric; CPT and SFT signals cancel by construction."},
        ]}
        trap={<>(b) blames LR — a generic SFT knob — and misses that matched vocabulary preserves CPT under the SAME LR. (c) confuses tokenization with distributional coverage. (d) is a math error: CE is not symmetric and the objectives don't cancel.</>}
        lens={<>FraudGPT-specific because the value of CPT is the prior over a small, named typology vocabulary; SFT prompts must visit those tokens-in-context or the prior decays. A generic instruction-tuned LLM has no such prior to protect, so the failure mode does not apply.</>}
        stretch={<>You cannot rewrite the SFT prompts. What sampling or regularizer at SFT time preserves the CPT typology prior?</>}
      />

      {/* axis: C3 */}
      <VIS.TrapProblem
        id="fgpt-c3"
        difficulty="hard"
        title="C3 — What CPT explicitly DROPS vs vanilla Llama"

        multiSelect
        options={[
          {key:"a", text:"Coverage of general-web topics — token mass shifts AWAY from cat memes / Wikipedia trivia toward SAR-narrative phrasing.", correct:true},
          {key:"b", text:"Conversational helpfulness from RLHF — base Llama-2 has it; after CPT on dry narratives, replies become more clinical.", correct:true},
          {key:"c", text:"Long-context performance can degrade if CPT sequence length is shorter than base — token-position priors get overwritten.", correct:true},
          {key:"d", text:"Tokenizer vocabulary is replaced."},
        ]}
        trap={<>(d) is false — CPT does not change the tokenizer.</>}
        lens={<>Three real losses. The senior MLE knows CPT is a trade — domain prior gained at the cost of general capability that may matter for analyst chat.</>}
        stretch={<>How would you measure general-capability loss post-CPT?</>}
      />

      {/* axis: C4 */}

        id="fgpt-c4"
        difficulty="hard"
        title="C4 — Which CPT hyperparameter, mis-set, ruins it?"

          {key:"c", text:"All equally important."},
          {key:"d", text:"Total tokens dominates."},

          {key:"b", text:"CPT silently skips PII tokens."},
          {key:"c", text:"PII is too short to memorize."},
          {key:"d", text:"Llama refuses to train on PII."},
        ]}

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>D. Intuition traps</h3>

      {/* axis: D1 */}
      <VIS.TrapProblem
        id="fgpt-d1"
        difficulty="medium"
        title="D1 — 'CPT is just fine-tuning with more data'"
        scenario={<>A junior says "CPT is the same as SFT, just with more tokens." Where does this intuition break?</>}
        options={[
          {key:"a", text:"Objective and target differ. CPT runs next-token loss on raw text (no instruction format); SFT runs cross-entropy on (instruction → response) pairs with the instruction masked. The gradient signal is fundamentally different — CPT shifts the LM prior, SFT shapes the conditional output. Calling them 'the same thing with more data' loses the prior-vs-conditional distinction the paper is built on.", correct:true},
          {key:"b", text:"They are the same thing."},
          {key:"c", text:"SFT uses more compute."},
          {key:"d", text:"CPT does not change weights."},
        ]}
        trap={<>(b), (c), (d) miss the objective shape.</>}
        lens={<>Same optimizer, different loss surface, different effect. Senior MLEs name this.</>}
        stretch={<>Where in the codebase do you actually see the difference?</>}
      />

      {/* axis: D2 */}
      <VIS.TrapProblem
        id="fgpt-d2"
        difficulty="hard"
        title="D2 — Wrong-assumption cascade: 'just upgrade the base model'"
        scenario={<>Six months in, base Llama-2-13B is succeeded by Llama-3-8B. You assume "swap the base, keep the SFT, ship." Trace the cascade.</>}
        options={[
          {key:"a", text:"Llama-3-8B has a different tokenizer + different pretrain prior, so CPT-conditioned attention heads don't exist there. SFT data trained for the old base now teaches the wrong shape, typology hallucination returns, team blames data drift, real fix is to RE-RUN CPT on Llama-3 before reusing the SFT dataset.", correct:true},
          {key:"b", text:"Base-model swaps are free — SFT transfers."},
          {key:"c", text:"Tokenizers are interchangeable."},
          {key:"d", text:"Llama-3 is always better, no work needed."},
        ]}
        trap={<>(b), (c), (d) miss the tokenizer/prior coupling.</>}
        lens={<>SFT data is conditioned on the prior CPT produced — swap the base and the entire stack must be retrained, not just the final layer.</>}
        stretch={<>What evaluation tells you the new base needs full CPT vs a small adapter?</>}
      />

      {/* axis: D3 */}
      <VIS.TrapProblem
        id="fgpt-d3"
        difficulty="hard"
        title="D3 — Junior vs senior diagnostic"
        scenario={<>Junior reports FraudGPT cuts hallucination 40% vs GPT-4+RAG. What's the senior question?</>}
        options={[
          {key:"a", text:"'Which typology classes drove the 40%? If long-tail typologies (cycle-billing, TBML) went from 30% hallucination to near zero while head classes were unchanged, the CPT story is real. If common classes shrunk proportionally, we're seeing a calibration shift, not a prior shift — and a temperature change on GPT-4 might match. Show me the per-typology breakdown.'", correct:true},
          {key:"b", text:"'Try more tokens.'"},
          {key:"c", text:"'Use FP16.'"},
          {key:"d", text:"'Ship it.'"},
        ]}
        trap={<>(b), (c), (d) skip the diagnostic.</>}
        lens={<>The senior question forces a per-typology decomposition — the only way to attribute the gain to the CPT mechanism vs a calibration artifact.</>}
        stretch={<>What temperature-only baseline on GPT-4+RAG would isolate this?</>}
      />

      {/* axis: D4 */}
      <VIS.TrapProblem
        id="fgpt-d4"
        difficulty="hard"
        title="D4 — Plausible misattribution: quality regression"
        scenario={<>3 months after FraudGPT launch, analyst overrides spike from 8% to 22%. Causes: (i) typology drift, (ii) calibration drift, (iii) analyst-behavior change. Which is most likely?</>}
        options={[
          {key:"a", text:"(i) Typology drift. CPT cutoff was 3 months ago. New schemes (often emerging quarterly) are outside FraudGPT's prior — the model still confidently emits old-typology labels for new patterns. The override-rate spike correlates with novel fraud patterns appearing in cases. RAG-only would have been robust here; FraudGPT is exposed to this risk by design.", correct:true},
          {key:"b", text:"(ii) Calibration drift."},
          {key:"c", text:"(iii) Analyst behavior."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(b), (c), (d) are plausible but not FraudGPT's typical signature.</>}
        lens={<>FraudGPT's failure mode is novel-typology cutoff — symptom is high-confidence wrong on new schemes. The diagnostic is: do overrides cluster on new typology labels?</>}
        stretch={<>What retraining cadence would close this gap?</>}
      />

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>E. Operations</h3>

      {/* axis: E1 */}
      <VIS.TrapProblem
        id="fgpt-e1"
        difficulty="hard"
        title="E1 — FraudGPT-specific gotcha"
        scenario={<>Pick the gotcha most specific to FraudGPT (would not bite vanilla Llama or GPT-4+RAG):</>}
        options={[
          {key:"a", text:"PII memorization at CPT scale — a 13B model trained for ~3-5B tokens memorizes verbatim spans from SAR narratives. Prompt injection or red-team probes can exfiltrate customer names and account numbers. RAG snippets are ephemeral; CPT weights are not. This is the audit-finding that delays compliance sign-off most often.", correct:true},
          {key:"b", text:"GPU OOM at SFT."},
          {key:"c", text:"Inference latency."},
          {key:"d", text:"Tokenizer mismatch."},
        ]}
        trap={<>(b), (c), (d) are generic.</>}
        lens={<>The memorization-of-PII issue is CPT-specific. Mitigation: aggressive PII sanitization + canary-prompt audits + DP-SGD on CPT pass.</>}
        stretch={<>Sketch the canary-prompt audit you would run quarterly.</>}
      />

      {/* axis: E2 */}
      <VIS.TrapProblem
        id="fgpt-e2"
        difficulty="hard"
        title="E2 — Friday: typology mis-classification spike"
        scenario={<>Friday: FraudGPT auto-typology accuracy drops from 91% to 73% on TBML cases. Analyst overrides spike. No infra changes, no model redeploy. Diagnosis?</>}
        options={[
          {key:"a", text:"A new TBML variant has emerged this quarter (e.g., crypto-on-ramp layered through art purchases). FraudGPT's CPT cutoff is months stale; the model's prior still puts TBML mass on the OLD patterns. Confidence stays high (CPT-confident), accuracy drops. RAG over current SOPs is the patch; quarterly CPT refresh is the fix. NOT a model bug — a cutoff issue.", correct:true},
          {key:"b", text:"Rollback FraudGPT."},
          {key:"c", text:"Page DevOps."},
          {key:"d", text:"GPU is hot."},
        ]}
        trap={<>(b), (c), (d) miss the mechanism.</>}
        lens={<>FraudGPT's confidence is robust; its prior is brittle to new typologies. The diagnostic signal is "high-confidence wrong" on a specific class.</>}
        stretch={<>Could RAG be a real-time hedge between CPT refreshes?</>}
      />

      {/* axis: E3 */}
      <VIS.TrapProblem
        id="fgpt-e3"
        difficulty="hard"
        title="E3 — Eval protocol audit"
        scenario={<>Which findings invalidate a FraudGPT eval report?</>}
        multiSelect
        options={[
          {key:"a", text:"Eval split is random; CPT corpus and eval cases come from overlapping months — train/test leakage.", correct:true},
          {key:"b", text:"Baseline is vanilla Llama-2-13B (no RAG) — sandbagged comparator; the production baseline is GPT-4+RAG.", correct:true},
          {key:"c", text:"Per-typology breakdown is missing; only overall hallucination % reported — hides whether long-tail or head drove the win.", correct:true},
          {key:"d", text:"LLMs are state of the art so eval doesn't matter."},
        ]}
        trap={<>(d) is wrong by construction.</>}
        lens={<>Three audit failures: temporal leakage, sandbagged baseline, missing per-typology decomposition. All three appear in production FraudGPT reports.</>}
        stretch={<>What is the right baseline + split protocol for FraudGPT claims?</>}
      />

      {/* axis: E4 */}
      <VIS.TrapProblem
        id="fgpt-e4"
        difficulty="medium"
        title="E4 — Rollout sequence"
        scenario={<>Order phases: (i) full ramp, (ii) PII-canary audit, (iii) shadow on completed cases, (iv) analyst-in-the-loop traffic ramp.</>}
        options={[
          {key:"a", text:"ii → iii → iv → i. PII audit is gating — if memorization is high, compliance blocks. Shadow on completed cases measures hallucination rate without analyst risk. Analyst-in-the-loop ramp lets overrides correct before full autonomy.", correct:true},
          {key:"b", text:"i → ii → iii → iv."},
          {key:"c", text:"Direct cutover."},
          {key:"d", text:"iv → i."},
        ]}
        trap={<>(b), (c), (d) skip PII gating.</>}
        lens={<>PII canary audit must precede traffic — compliance failure here is catastrophic and FraudGPT-specific.</>}
        stretch={<>What is your canary prompt set?</>}
      />

      {/* axis: E5 */}
      <VIS.TrapProblem
        id="fgpt-e5"
        difficulty="medium"
        title="E5 — Reproducibility"
        scenario={<>Which FraudGPT-class reproducibility issues are widely known?</>}
        multiSelect
        options={[
          {key:"a", text:"CPT corpus composition (fraud:general mix ratio) is not always reported precisely; tiny changes shift prior dramatically.", correct:true},
          {key:"b", text:"LR schedule + warmup for CPT differs per paper and matters enormously for catastrophic-forgetting risk.", correct:true},
          {key:"c", text:"Per-typology eval breakdowns are often summarized into a single hallucination percentage.", correct:true},
          {key:"d", text:"FraudGPT cannot be retrained."},
        ]}
        trap={<>(d) is false.</>}
        lens={<>Three reproducibility hazards. Corpus mix + LR are the two most-cited gaps in CPT papers.</>}
        stretch={<>What is your CPT reimplementation checklist?</>}
      />

      {/* axis: E6 */}
      <VIS.TrapProblem
        id="fgpt-e6"
        difficulty="hard"
        title="E6 — Eval contamination"
        scenario={<>Which contamination paths affect FraudGPT's reported gains?</>}
        multiSelect
        options={[
          {key:"a", text:"Test cases were already in the CPT corpus (SAR narratives reused for eval).", correct:true},
          {key:"b", text:"Comparison vs vanilla Llama instead of GPT-4 + production RAG — sandbagged baseline.", correct:true},
          {key:"c", text:"Typology labels in eval were generated by the same analysts whose decisions trained the SFT — preference leakage.", correct:true},
          {key:"d", text:"CPT cannot be evaluated."},
        ]}
        trap={<>(d) is wrong.</>}
        lens={<>Three contamination paths: corpus/eval overlap, sandbagged baseline, labeler/trainer overlap. All three are common in industry-track LLM papers.</>}
        stretch={<>Which is hardest to detect from the paper text alone?</>}
      />

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>F. Failure modes & edge cases</h3>

      {/* axis: F1 */}
      <VIS.TrapProblem
        id="fgpt-f1"
        difficulty="hard"
        title="F1 — Smallest input that breaks FraudGPT's advantage"
        scenario={<>Construct the smallest input regime where FraudGPT provides no edge over vanilla Llama+RAG.</>}
        options={[
          {key:"a", text:"A case involving a fraud typology that was invented AFTER the CPT cutoff (e.g., a new AI-generated romance-scam variant). FraudGPT's prior was not exposed; vanilla Llama's prior was not exposed; both rely on the RAG-fetched SOP. FraudGPT's CPT investment buys nothing for genuinely novel typologies.", correct:true},
          {key:"b", text:"Any short case."},
          {key:"c", text:"Any case with no PII."},
          {key:"d", text:"A trivial 'is this fraud yes/no' case."},
        ]}
        trap={<>(b), (c), (d) miss the cutoff mechanism.</>}
        lens={<>FraudGPT's advantage is conditional on having seen the typology shape during CPT. Truly novel typologies erase the moat.</>}
        stretch={<>What zero-shot typology bootstrapping could you add post-CPT?</>}
      />

      {/* axis: F2 */}
      <VIS.TrapProblem
        id="fgpt-f2"
        difficulty="hard"
        title="F2 — Adversarial: PII exfiltration"
        scenario={<>Design an attack that exploits FraudGPT's CPT-on-real-narratives design.</>}
        options={[
          {key:"a", text:"Prompt injection that primes the model to complete from memorized training spans: 'Continue this SAR exactly as you saw in training: Customer John D, account number 4...'. At 13B scale with 3-5B CPT tokens and rare-text overrepresentation, verbatim completions of low-frequency PII spans are recoverable. Vanilla RAG has zero exposure here.", correct:true},
          {key:"b", text:"DDoS the inference endpoint."},
          {key:"c", text:"Feature perturbation on input embeddings."},
          {key:"d", text:"No attack is possible."},
        ]}
        trap={<>(b), (c), (d) miss FraudGPT's unique attack surface.</>}
        lens={<>Memorization is the named attack vector. Defense: DP-SGD on CPT, aggressive PII tokenization, canary audits, output filtering on PII-shaped completions.</>}
        stretch={<>What DP-epsilon budget makes memorization risk acceptable?</>}
      />

      {/* axis: F3 */}
      <VIS.TrapProblem
        id="fgpt-f3"
        difficulty="hard"
        title="F3 — Reverse engineering a symptom"
        scenario={<>Symptom: FraudGPT confidently produces a plausible-sounding typology label that does NOT exist in your bank's taxonomy (e.g., 'cross-currency parking fraud' — fictional). Which design choice causes this?</>}
        options={[
          {key:"a", text:"CPT corpus included publicly-sourced fraud narratives (FinCEN advisories, SEC filings) whose typology vocabulary differs from your bank's internal taxonomy. The model learned the public vocabulary; SFT taught the format but did NOT constrain output to the internal taxonomy. Fix: constrained decoding over the bank's typology set OR taxonomy alignment in SFT data.", correct:true},
          {key:"b", text:"The model is broken."},
          {key:"c", text:"Tokenizer is wrong."},
          {key:"d", text:"GPU error."},
        ]}
        trap={<>(b), (c), (d) miss the corpus vs taxonomy mismatch.</>}
        lens={<>The symptom is diagnostic of corpus-taxonomy drift. The fix is either constrained decoding or careful CPT corpus curation.</>}
        stretch={<>How would you build the constrained decoder?</>}
      />

      {/* axis: F4 */}
      <VIS.TrapProblem
        id="fgpt-f4"
        difficulty="medium"
        title="F4 — Paper-admitted limitations"
        scenario={<>Which limitations does the FraudGPT paper acknowledge?</>}
        multiSelect
        options={[
          {key:"a", text:"Memorization risk on PII-bearing CPT corpora.", correct:true},
          {key:"b", text:"Cutoff-induced typology staleness without periodic refresh.", correct:true},
          {key:"c", text:"Catastrophic forgetting of general capability at high CPT LR.", correct:true},
          {key:"d", text:"FraudGPT works perfectly with no caveats."},
        ]}
        trap={<>(d) is wrong.</>}
        lens={<>All three are named in the paper. Knowing this signals careful reading.</>}
        stretch={<>Which limitation does the paper UNDERSTATE relative to production reality?</>}
      />

      {/* axis: F5 */}
      <VIS.TrapProblem
        id="fgpt-f5"
        difficulty="hard"
        title="F5 — The community critique"
        scenario={<>Recent CPT-for-domain literature (BloombergGPT post-mortem, Med-PaLM-2 ablations) has produced a specific critique of CPT+SFT for narrow domains. What is it?</>}
        options={[
          {key:"a", text:"For many domains, a smaller fine-tuned model with strong RAG matches or beats CPT+SFT at lower cost and lower memorization risk — the BloombergGPT vs GPT-4+finance-RAG comparison is the canonical example. CPT's edge is real on long-tail vocabulary but the cost-benefit case is thinner than the FraudGPT paper suggests once you control for RAG quality.", correct:true},
          {key:"b", text:"CPT always wins."},
          {key:"c", text:"RAG always wins."},
          {key:"d", text:"There is no critique."},
        ]}
        trap={<>(b), (c), (d) miss the empirical finding.</>}
        lens={<>BloombergGPT's lessons apply directly. CPT investment must be justified against a STRONG RAG baseline, not vanilla Llama.</>}
        stretch={<>What evaluation matrix tells you "CPT is worth it" vs "ship strong RAG"?</>}
      />

      {/* axis: F5b — interview-gold */}
      <VIS.TrapProblem
        id="fgpt-f5b"
        difficulty="hard"
        title="F5b — The interview gold question"
        scenario={<>Interviewer: "You championed FraudGPT. Walk me through the ablation that proves CPT is the value driver, not SFT or scale."</>}
        options={[
          {key:"a", text:"Four conditions under fixed compute and fixed eval split (temporal, no overlap): (i) GPT-4 + strong production RAG, (ii) Llama-2-13B + same RAG, (iii) Llama-2-13B + SFT-only (no CPT) + same RAG, (iv) Llama-2-13B + CPT + SFT + same RAG. Per-typology breakdown for each. If (iv) beats (iii) only on long-tail typologies, CPT is the driver. If (iv) beats (i) overall but not per-typology, it is a calibration artifact and you should ship a temperature change on (i) instead. Also measure PII canary completion rates on (iv) to confirm memorization risk is below threshold.", correct:true},
          {key:"b", text:"Compared FraudGPT to vanilla Llama-2-13B; FraudGPT won by 8 points; shipped."},
          {key:"c", text:"LLMs always win — no ablation needed."},
          {key:"d", text:"Compared FraudGPT to GPT-3.5."},
        ]}
        trap={<>(b), (c), (d) skip ablation rigor.</>}
        lens={<>The right answer (i) builds the strong-RAG baseline, (ii) adds the SFT-only intermediate condition, (iii) measures per-typology, (iv) gates on PII safety. This is the senior bar.</>}
        stretch={<>If (iii) ties (iv) on long-tail, would you still ship CPT? Defend.</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://aclanthology.org/2024.emnlp-industry.0/" target="_blank" rel="noopener"><strong>Zhang et al. — Fraud-GPT (EMNLP 2024 Industry)</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper)</span>
          <br/>The original. CPT corpus composition, SFT recipe, per-<VIS.Term def="In AML, the named pattern of laundering (e.g., trade-based, layering, smurfing). Detectors are usually typology-anchored.">typology</VIS.Term> results.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2303.17564" target="_blank" rel="noopener"><strong>Wu et al. — BloombergGPT</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, 2023)</span>
          <br/>The CPT-for-finance reference; its post-hoc critique vs GPT-4+RAG is the FraudGPT comparator.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2202.07646" target="_blank" rel="noopener"><strong>Carlini et al. — Quantifying Memorization Across Neural LMs</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICLR 2023)</span>
          <br/>The canonical paper on <VIS.Term def="Risk that a model reproduces verbatim training spans (PII, account numbers) when prompted — exploitable via prompt injection at CPT scale.">memorization risk</VIS.Term> at the CPT scale used here.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2004.10964" target="_blank" rel="noopener"><strong>Gururangan et al. — Don't Stop Pretraining (DAPT/TAPT)</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ACL 2020)</span>
          <br/>The continual-pretraining recipe FraudGPT follows; <VIS.Term def="Domain-Adaptive Pretraining. Continue the next-token objective on a domain corpus before instruction tuning. Synonym for CPT in this context.">DAPT</VIS.Term> = CPT under a different name.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
