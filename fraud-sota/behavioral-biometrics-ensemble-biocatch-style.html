<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Behavioral biometrics ensemble — stacked classifier on keystroke + mouse + device + session signals
// for account-takeover (ATO) defense in banking apps.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · ATO defense"
      title="Behavioral biometrics ensemble (BioCatch-style)"
      subtitle="Stack keystroke dynamics, mouse trajectories, device fingerprint, and session-level behavior into a single ATO risk score — no one biometric is reliable alone, but the ensemble is."
      byline={[
        {label: "Source", value: "BioCatch / NuData / Sift whitepapers 2024-25"},
        {label: "Year", value: "2025"},
        {label: "L3", value: "Account takeover (ATO)"},
      ]}/>

    <VIS.TLDR>
      A single biometric channel (just keystroke timing, or just mouse) ships with brittle false positives — a tired legitimate user types differently after midnight. An{" "}
      <VIS.Term def="A meta-model whose features are predictions or feature vectors from several base models trained on different signal types. Stacking captures complementary errors the individual models make.">ensemble (stacked classifier)</VIS.Term>{" "}
      that fuses four orthogonal channels — keystroke, mouse, device, session — stabilizes both precision and recall. The senior question is not "is biometrics enough" — it's "which channels are orthogonal, how do you fuse them under EU consent constraints, and how do you keep the system honest as attackers script around each signal?"
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        At login or during a session, the client collects four families of signals: (i) <strong>keystroke dynamics</strong> — dwell time per key and flight time between keys; (ii) <strong>mouse / touch trajectories</strong> — velocity profile, curvature, tremor; (iii) <strong>device fingerprint</strong> — user-agent, canvas hash, fonts, time-zone, sensor entropy; (iv) <strong>session behavior</strong> — page-flow sequence, dwell on each screen, copy-paste use, form-fill order. Each channel feeds its own base learner; a meta-classifier stacks their outputs into one ATO probability.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  KEY["Keystroke dynamics"]
  MOUSE["Mouse trajectory"]
  DEV["Device fingerprint"]
  SESS["Session behavior"]
  KM["Keystroke model"]
  MM["Mouse model"]
  DM["Device model"]
  SM["Session model"]
  STACK["Stacked meta-classifier"]
  RISK["ATO risk score"]
  KEY --> KM
  MOUSE --> MM
  DEV --> DM
  SESS --> SM
  KM --> STACK
  MM --> STACK
  DM --> STACK
  SM --> STACK
  STACK --> RISK
  style STACK fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style RISK fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the stacked meta-classifier where signal fusion happens. Yellow = the calibrated ATO score consumed downstream by step-up auth or fraud-ops queues. The four base learners are independently trained per channel so an attacker who scripts around one (e.g., replays mouse paths) still trips the others.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Password + 2FA only</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Single biometric</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Stacked ensemble</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Catches credential-stuffing with valid 2FA</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Sometimes</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>FPR on legitimate fatigued users</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>High</td>
            <td style={{padding:"8px 10px"}}>Low to medium</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Robust to attacker scripting one channel</td>
            <td style={{padding:"8px 10px"}}>N/A</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Yes (other channels still trigger)</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>EU GDPR consent overhead</td>
            <td style={{padding:"8px 10px"}}>None</td>
            <td style={{padding:"8px 10px"}}>Moderate</td>
            <td style={{padding:"8px 10px"}}>Heavy (multi-channel disclosure)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Friction added per login</td>
            <td style={{padding:"8px 10px"}}>High (always 2FA)</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>Low (passive)</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>High-value account flows</strong> — wire transfers, crypto withdrawals, primary-bank logins where ATO has a five-figure blast radius per incident.</li>
        <li><strong>Mobile and web apps with rich client telemetry</strong> — touch sensors, key timings, mouse paths must all be capturable.</li>
        <li><strong>Coexists with risk-based step-up auth</strong> — the ensemble's score is consumed by a step-up policy that decides whether to challenge.</li>
        <li><strong>Not on its own for EU users without explicit consent</strong> — privacy disclosures must be reworked; channels may need to be off by default in some jurisdictions.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Stacked models train-test leakage">
        Naive stacking — train base models on the full train set, then train the meta-classifier on their predictions on the same data — overfits badly. Use out-of-fold predictions for the meta-training set, or hold out a fold.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="GDPR Art. 9 + Art. 22 implications">
        Behavioral biometrics is considered special-category personal data under GDPR in some EU interpretations. Article 22 also constrains "solely automated decisions"; in EU, the score must feed a human-or-multi-factor downstream, never a unilateral block.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Accessibility false positives">
        Users with motor impairments, Parkinson's tremor, or screen-reader navigation produce keystroke + mouse patterns that look anomalous to a model trained on able-bodied medians. Stratified-FPR audits per accessibility profile are mandatory.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade traps on signal orthogonality, stacking discipline, consent, attacker scripting, and end-to-end deployment.
      </p>

      <VIS.TrapProblem
        id="bbe-p1"
        difficulty="hard"
        multiSelect
        title="P1 — Which signals are actually orthogonal?"
        scenario={<>You propose four base channels: keystroke timings, mouse trajectories, device fingerprint, and IP geolocation. Your tech lead asks: are these orthogonal enough that ensembling buys real lift over the strongest single channel? Which statements correctly reason about orthogonality?</>}
        options={[
          {key:"a", text:"Keystroke timing and mouse trajectory are physically generated by different motor systems and often by different input devices; their error patterns are largely uncorrelated and ensembling adds real lift.", correct:true},
          {key:"b", text:"Device fingerprint and IP geolocation are highly correlated — attackers with a stolen device on a VPN look anomalous on both simultaneously; treating them as independent overcounts evidence.", correct:true},
          {key:"c", text:"All four signals are independent because they measure different things; ensemble lift is guaranteed."},
          {key:"d", text:"Replace IP geolocation with session behavior (page-flow sequence) — orthogonal to the other three because it's about higher-level intent, not motor or hardware identity.", correct:true},
          {key:"e", text:"Add a fifth channel that re-uses keystroke features under a different name (e.g., 'typing rhythm spectral density'); diversity always helps."},
        ]}
        trap={<>(c) is the naive "different feature, different model" reflex — features can MEASURE different things and still produce correlated ERRORS. (e) is the diversity-cargo-cult: adding a renamed channel doesn't add information. The real orthogonality question is "do the channels' MISTAKES disagree" — and that's empirical, not nominal.</>}
        lens={<>Three correct. <strong>(a)</strong> keystroke and mouse use different motor systems — empirically uncorrelated errors. <strong>(b)</strong> device + IP both move together under VPN attacks — combining them double-counts the same evidence. <strong>(d)</strong> session-behavior signals are orthogonal because they measure intent at the page level, not motor or hardware. The senior signal here is rejecting nominal diversity in favor of measured error-correlation.</>}
        stretch={<>How would you EMPIRICALLY measure orthogonality between two channels before ensembling them?</>}
      />

      <VIS.TrapProblem
        id="bbe-p2"
        difficulty="hard"
        title="P2 — Stacking leakage"
        scenario={<>You build four base learners on 10M sessions (8M train, 1M val, 1M test). You train each base learner on the full 8M train set, then compute their predictions on the same 8M train set and feed those predictions as features into a logistic-regression meta-classifier. Val AUC = 0.97, test AUC = 0.81. What went wrong?</>}
        options={[
          {key:"a", text:"Bug in feature extraction; rebuild pipeline."},
          {key:"b", text:"Each base learner saw the meta-training labels indirectly because it trained on the same rows whose predictions are now meta-features. The meta-classifier overfits to the optimistic in-sample base predictions. Fix: train base learners with K-fold out-of-fold predictions, or hold out a separate fold dedicated to meta-training.", correct:true},
          {key:"c", text:"Logistic regression is too simple for stacking; switch to XGBoost."},
          {key:"d", text:"More training data would close the gap."},
        ]}
        trap={<>(a) misdiagnoses a known design pitfall as code error. (c) wraps the same leakage in a stronger model — the gap stays. (d) "more data" reflex but the gap is structural, not statistical.</>}
        lens={<>(b). This is the classical stacking-leakage trap. In-sample base predictions are systematically too good; the meta-classifier learns to trust them, then crumbles on truly unseen base predictions at test time. Out-of-fold (OOF) predictions on the train set, or a dedicated holdout fold for meta, is the standard fix. Wolpert's 1992 stacking paper specifies OOF — most practitioners forget.</>}
        stretch={<>If using a 5-fold OOF scheme, how would you produce base predictions for the val set?</>}
      />

      <VIS.TrapProblem
        id="bbe-p3"
        difficulty="hard"
        multiSelect
        title="P3 — Attacker scripting one channel"
        scenario={<>Threat intel reports a new ATO kit on the dark web that replays harvested mouse trajectories during login. Your mouse-model precision drops 30% in one week. Which responses are correct?</>}
        options={[
          {key:"a", text:"The other three channels are still active — ATO score should degrade gracefully because keystroke, device, and session models were not scripted. If overall AUC drops only marginally, the ensemble design is working as intended.", correct:true},
          {key:"b", text:"Down-weight the mouse channel in the meta-classifier proportional to its drift — but don't drop it (the kit isn't universal and the channel still helps on the un-scripted majority).", correct:true},
          {key:"c", text:"Add a freshness adversarial-training set: harvest examples of replayed-mouse sessions; retrain the mouse model to flag replay-specific artifacts (constant inter-event timing, identical Bezier curvature).", correct:true},
          {key:"d", text:"Drop the mouse channel entirely — once attacked, it's permanently compromised."},
          {key:"e", text:"Hard-block any session with anomalous mouse score; force step-up for all users."},
        ]}
        trap={<>(d) is the overreaction trap — the kit only affects a subset of attackers; legitimate signal remains in the channel. (e) over-friction the legitimate population to defend against a partial-coverage threat.</>}
        lens={<>Three correct. <strong>(a)</strong> graceful degradation is THE reason to ensemble — one channel compromised, others compensate. <strong>(b)</strong> dynamic re-weighting under drift is the disciplined response. <strong>(c)</strong> adversarial retraining adds replay-specific defenses without giving up the channel. The senior posture is "channels are defensive depth, not single points of failure."</>}
        stretch={<>How would you DETECT that a specific channel has been scripted before precision drops 30%?</>}
      />

      <VIS.TrapProblem
        id="bbe-p4"
        difficulty="hard"
        title="P4 — EU consent under GDPR Article 9"
        scenario={<>You operate the bank in Germany. The DPO informs you that keystroke + mouse biometrics may fall under GDPR Art. 9 special-category data. What's the right product posture?</>}
        options={[
          {key:"a", text:"Default the EU keystroke + mouse channels to OFF. Offer them as an opt-in security-upgrade feature with explicit Art. 9 consent. Keep device fingerprint + session-behavior channels (which generally don't fall under Art. 9) running by default. Score the EU users on whichever channels they consented to; meta-classifier handles missing channels via masked input or imputation.", correct:true},
          {key:"b", text:"Ignore the DPO — fraud-prevention is a legitimate interest under Art. 6(1)(f) that overrides Art. 9."},
          {key:"c", text:"Block all EU users from using the app until they consent."},
          {key:"d", text:"Run the channels server-side without informing users — no client-side collection means no consent needed."},
        ]}
        trap={<>(b) misreads the GDPR hierarchy — Art. 9 has tighter requirements than Art. 6 legitimate interest. (c) is operationally absurd. (d) is illegal — server-side processing of biometric-derived data still triggers Art. 9 if the source is biometric.</>}
        lens={<>(a). The right posture is channel-level consent + graceful meta-classifier. Channels users haven't consented to are masked at inference; the meta-classifier was trained to handle the masked-channel case. This is the standard pattern at EU-operating biometrics vendors and survives DPO + supervisory-authority review.</>}
        stretch={<>How would you TRAIN a meta-classifier robust to one or more masked channels at inference time?</>}
      />

      <VIS.TrapProblem
        id="bbe-p5"
        difficulty="medium"
        title="P5 — Per-user vs population baseline"
        scenario={<>Your keystroke model can be trained as either (i) a population baseline (one model for all users; flag anomalies vs population) or (ii) per-user (one model per user; flag anomalies vs that user's history). Which is right for ATO?</>}
        options={[
          {key:"a", text:"Both, fused. Per-user model is the strongest ATO signal (the attacker is NOT this user), but it cold-starts on new accounts and breaks on long-inactive users. Population baseline covers cold-start and acts as a sanity check. Train both; the meta-classifier learns when to trust which.", correct:true},
          {key:"b", text:"Per-user only — population baseline can't distinguish user-vs-user."},
          {key:"c", text:"Population only — per-user requires too much storage."},
          {key:"d", text:"Either is fine; results are equivalent."},
        ]}
        trap={<>(b) and (c) are single-axis arguments that ignore cold-start (b) and signal strength (c). (d) ignores that the two have different operating points — per-user wins on established users, population wins on new ones.</>}
        lens={<>(a). The fusion design is the senior answer. Per-user is the precision king once you have enough history (~30+ sessions); population is the recall floor for cold-start. Combined: meta-classifier weights per-user higher when history is rich, population higher when history is thin.</>}
        stretch={<>What single piece of session metadata makes the meta-classifier's fusion most accurate?</>}
      />

      <VIS.TrapProblem
        id="bbe-p6"
        difficulty="hard"
        multiSelect
        title="P6 — Calibration vs ranking"
        scenario={<>The ensemble has good ranking (AUC = 0.96) but poorly calibrated probabilities (predicted ATO probability at 0.8 actually has a 0.5 empirical rate). Downstream step-up auth uses the probability directly in expected-cost math. Which fixes apply?</>}
        options={[
          {key:"a", text:"Apply isotonic regression or Platt scaling on a held-out calibration set — preserves ranking, fixes probability surface.", correct:true},
          {key:"b", text:"Re-train the meta-classifier with a proper scoring rule loss (log-loss) instead of AUC-style ranking objectives — fixes calibration at training time.", correct:true},
          {key:"c", text:"Monitor calibration drift on a rolling window; re-fit the calibration map weekly because behavioral fraud distributions shift fast.", correct:true},
          {key:"d", text:"Switch to a deeper model; calibration improves with capacity."},
          {key:"e", text:"Ignore — calibration doesn't matter if ranking is good."},
        ]}
        trap={<>(d) deeper models often have WORSE calibration than shallower ones, not better. (e) ignores the actual downstream consumer — step-up auth needs probabilities to do expected-cost math.</>}
        lens={<>Three correct. <strong>(a)</strong> post-hoc calibration is the standard fix. <strong>(b)</strong> log-loss training directly optimizes calibration. <strong>(c)</strong> calibration drifts under attacker shifts; rolling re-fit is required. Senior signal: distinguishing ranking from calibration, naming the downstream consumer that needs each.</>}
        stretch={<>What's the right calibration metric to report on the rolling monitor: ECE, MCE, or Brier score?</>}
      />

      <VIS.TrapProblem
        id="bbe-p7"
        difficulty="hard"
        title="P7 — Latency budget"
        scenario={<>Login flow has a 200ms p99 latency budget. Each base learner takes 30-50ms; meta-classifier adds 10ms. Naively that's 130-210ms. How do you fit?</>}
        options={[
          {key:"a", text:"Run the four base learners in PARALLEL (they have independent inputs); their max-latency (~50ms) plus meta (~10ms) is ~60ms p99. Use a thread pool or async/await on the inference server. Keep model weights in shared memory to avoid cold-load.", correct:true},
          {key:"b", text:"Run base learners serially in order of importance; cut off after 150ms."},
          {key:"c", text:"Quantize all base learners to INT8; reduces each to under 20ms."},
          {key:"d", text:"Move all four to a single fused multi-head model so there's only one forward pass."},
        ]}
        trap={<>(b) early-cutoff drops channels arbitrarily — destroys the ensemble. (c) helps but parallelism is the bigger lever, and INT8 changes the calibration story. (d) sounds elegant but loses orthogonality and complicates per-channel consent (P4 problem).</>}
        lens={<>(a). Independent inputs → embarrassingly parallel. The four base learners run concurrently; total wall-time = max(channels) + meta. This is the standard pattern at production scoring services (Uber Michelangelo, Meta Looper). The parallel design also preserves per-channel consent — each channel either runs or is masked, independently.</>}
        stretch={<>If a base learner times out at 80ms, what should the meta-classifier do with the missing input?</>}
      />

      <VIS.TrapProblem
        id="bbe-p8"
        difficulty="hard"
        title="P8 — Concept drift in mouse trajectories"
        scenario={<>Six months post-launch, mouse-channel AUC drifts from 0.91 → 0.78. Keystroke + device + session are stable. Why might JUST mouse decay?</>}
        options={[
          {key:"a", text:"Mouse trajectories are sensitive to hardware + OS-cursor-acceleration changes; a Windows 11 update changed the default cursor acceleration curve, shifting the distribution of legitimate users' velocity profiles. Population baseline is stale.", correct:true},
          {key:"b", text:"Mouse models are inherently unstable; pick keystroke-only."},
          {key:"c", text:"Bug — re-derive features."},
          {key:"d", text:"Concept drift always affects the strongest channel first."},
        ]}
        trap={<>(b) overgeneralizes — mouse drift here has a SPECIFIC cause. (c) misdiagnosis. (d) is a made-up rule.</>}
        lens={<>(a). The senior diagnostic is recognizing that mouse-trajectory distributions are coupled to OS + driver + hardware, which can shift in a single update. The fix is periodic re-fitting on a sliding window of recent legitimate sessions, AND including OS-version as a context feature so the model can learn per-platform medians.</>}
        stretch={<>What's a lightweight monitor that would catch this kind of drift within hours, not months?</>}
      />

      <VIS.TrapProblem
        id="bbe-p9"
        difficulty="medium"
        title="P9 — Score consumer: step-up auth vs hard-block"
        scenario={<>The meta-classifier outputs an ATO probability. Two consumers want it: (i) step-up auth (decides to challenge with biometric or SMS) and (ii) fraud-ops queue (analysts review high-score sessions). Which consumer should drive threshold choice?</>}
        options={[
          {key:"a", text:"Each has its own threshold and its own expected-cost math. Step-up auth weighs UX friction vs ATO loss; fraud-ops weighs analyst hours vs catch rate. The model output is one calibrated probability; thresholds are policy decisions per-consumer.", correct:true},
          {key:"b", text:"Pick one threshold globally; both consumers use the same cutoff."},
          {key:"c", text:"Let the meta-classifier directly output the action (challenge / block / let through)."},
          {key:"d", text:"Always default to the strictest threshold to minimize ATO loss."},
        ]}
        trap={<>(b) ignores that the two consumers have different cost functions. (c) couples model and policy — every cost change forces a retrain. (d) over-friction users for no incremental ATO catch beyond the existing step-up.</>}
        lens={<>(a). Separation of model and policy. The model says "0.73 probability of ATO"; step-up's policy says "challenge above 0.5"; fraud-ops policy says "queue above 0.85." Costs and policies evolve independently of the model. This is standard practice in any mature risk system.</>}
        stretch={<>If step-up auth itself is a contextual bandit (separate concept), how does its threshold interact with this score?</>}
      />

      <VIS.TrapProblem
        id="bbe-p10"
        difficulty="hard"
        title="P10 — End-to-end pick for a top-3 US bank"
        scenario={<>You're shipping behavioral biometrics for a top-3 US bank. 50M MAU, 200M logins/month, $200M/yr ATO losses. EU subsidiary is 10% of MAU. Mobile + web. Compliance: SOC2, PCI, GDPR (EU only). Pick the architecture.</>}
        options={[
          {key:"a", text:"Four parallel base learners (keystroke, mouse/touch, device, session) trained with OOF stacking + log-loss + post-hoc isotonic calibration. Per-user + population baselines per channel, fused. EU users default-off on keystroke/mouse with explicit Art. 9 opt-in; meta-classifier handles masked channels. Channel weights re-fit weekly under rolling drift monitor. Score consumed by (i) risk-based step-up auth (own threshold), (ii) fraud-ops queue (own threshold), (iii) post-login monitoring (own threshold). Annual fair-lending + accessibility audit stratified by self-reported impairment.", correct:true},
          {key:"b", text:"Single deep model that ingests raw events for all four channels."},
          {key:"c", text:"Hard-block any session with ATO score above 0.5."},
          {key:"d", text:"Buy a single vendor product (BioCatch) and trust their score directly."},
        ]}
        trap={<>(b) sacrifices per-channel consent, calibration, and graceful degradation for a marginal AUC bump. (c) is fair-lending malpractice. (d) vendor lock-in on a signal you can't audit or tune.</>}
        lens={<>(a). The complete senior architecture: stacked ensemble with OOF + calibration, channel-level consent, masked-channel handling, separated thresholds per consumer, drift monitoring, fair-lending + accessibility audit. This is what survives risk review at a top-3 US bank.</>}
        stretch={<>What single metric on the rolling drift monitor would pause the entire ensemble (kill switch)?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://www.biocatch.com/resources" target="_blank" rel="noopener">

          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(survey, Artificial Intelligence Review 2023)</span>

    </VIS.Section>
  </main>
