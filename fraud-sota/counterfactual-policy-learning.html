<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Counterfactual policy learning — Fraud SOTA · Causal inference for fraud decisions.
// CONCEPT ANCHOR (B3): LEARN A POLICY pi(x) directly to MAXIMIZE EXPECTED COUNTERFACTUAL
// REWARD V(pi), using PROPENSITY-CORRECTED LOGGED DATA. End-to-end: closes the predict→
// threshold gap by optimizing the decision objective itself. Needs LOGGED EXPLORATION DATA
// (epsilon-greedy or RCT slice) for positivity. NOT imitation learning (mimics logged
// policy); NOT reinforcement learning (no sequential reward); NOT pure CATE estimation
// (output is the policy, not the effect estimate).

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Causal inference"
      title="Counterfactual policy learning — direct optimization of fraud decisions"
      subtitle="Learn a policy pi(x) from logged production data that maximizes E[Y(pi(X))] — the expected outcome if pi ran everywhere. End-to-end alternative to the two-stage 'predict-then-threshold' pattern. Needs logged exploration for positivity."
      byline={[
        {label:"Paper", value:"Swaminathan & Joachims CRM (JMLR 2015); 'Counterfactual Policy Optimization for Fraud' (ICML 2025)"},
        {label:"L3", value:"Counterfactual Risk Minimization + IPS / Self-Normalized / DR objective"},
        {label:"Anchor", value:"max_pi (1/n) sum (pi(T_i|x_i)/pi_log(T_i|x_i)) Y_i; gradient flows through pi."},
      ]}/>

    <VIS.TLDR>
      The dominant fraud pipeline is two-stage:{" "}
      <VIS.Term def="A pipeline that first trains a model to predict P(fraud|x), then chooses a decision threshold to optimize a business metric. Common but suboptimal when the predict and threshold objectives differ.">predict-then-threshold</VIS.Term>{" "}
      — train a model to predict P(fraud|x), then pick a threshold t that hits a business KPI (precision at recall, dollar savings). It works, but it is suboptimal: the prediction loss (log-loss, focal) is NOT the decision objective, so the predicted scores can be uncalibrated FOR THE DECISION even when they are accurate as probabilities.{" "}
      <VIS.Term def="Counterfactual Policy Learning: directly train a policy pi(x) to maximize expected counterfactual reward V(pi) = E[Y(pi(X))], using propensity-corrected logged data. End-to-end alternative to predict-then-threshold.">Counterfactual policy learning</VIS.Term>{" "}
      closes the gap by directly optimizing the policy objective V(pi) = E[Y(pi(X))] using logged data. Mechanism: write V(pi) as an importance-weighted sum over logged units — V-hat(pi) = (1/n) sum_i (pi(T_i|x_i) / pi_log(T_i|x_i)) Y_i — and gradient-descend the parameters of pi. This is{" "}
      <VIS.Term def="Counterfactual Risk Minimization: optimize an empirical risk written as an inverse-propensity-weighted sum over logged data; the gradient flows through the policy parameters.">Counterfactual Risk Minimization (CRM)</VIS.Term>{" "}
      (Swaminathan and Joachims 2015). Variants use{" "}
      <VIS.Term def="Self-Normalized IPS: divide by the sum of importance weights to reduce variance at the cost of slight bias.">Self-Normalized IPS</VIS.Term>{" "}
      to bound variance,{" "}
      <VIS.Term def="A DR objective uses the orthogonal score psi as the per-unit reward; gradient ascent on the policy parameters maximizes E[psi]. Doubly robust property preserved.">DR objectives</VIS.Term>{" "}
      to inherit doubly-robust unbiasedness, or{" "}
      <VIS.Term def="Pessimistic policy learning: subtract a confidence-interval penalty during optimization so the learned policy is conservative in regions of weak data support.">pessimistic / CIPS</VIS.Term>{" "}
      bounds for safe deployment. Critical operational constraint: needs LOGGED EXPLORATION DATA (epsilon-greedy logged policy, RCT slice) — without it, positivity fails and CPL learns garbage.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — direct policy optimization">
      <p>
        Pose the decision problem: each transaction has features x, a candidate action set (block, hold-for-review, allow), and a reward Y observed only for the action that was taken. Logged data is {`{`}(x_i, T_i, Y_i, pi_log(T_i|x_i)){`}`} — the last term is the LOGGED PROPENSITY: the probability the logged policy chose T_i for x_i. Goal: learn a new policy pi(x) maximizing V(pi) = E[Y(pi(X))]. CPL writes V(pi) directly in terms of the logged data and gradient-ascends pi parameters.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  L["Logged data x, T, Y, log propensity"]
  L --> O["CRM objective: weighted reward sum"]
  P["Policy pi(x; theta)"]
  P --> O
  O --> G["Gradient on pi parameters theta"]
  G --> P
  P --> D["Deploy pi when V hat dominates current"]
  style O fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style P fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style D fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `} />

      <VIS.Equation display tex={`\\hat{V}(\\pi) = \\frac{1}{n}\\sum_{i=1}^{n}\\frac{\\pi(T_i \\mid x_i)}{\\pi_{\\text{log}}(T_i \\mid x_i)}\\,Y_i`} />
      <p>The CRM objective (Swaminathan and Joachims 2015). Importance-weighted average of logged rewards. Each unit contributes its reward Y_i weighted by how much MORE likely the new policy was to take action T_i than the logged policy. Gradient ascent on pi parameters maximizes V-hat. Unbiased if pi_log is correct. High variance when pi disagrees with pi_log on most units; mitigated by Self-Normalized IPS or DR-CRM.</p>

      <p style={{marginTop:16}}><strong>Three flavors:</strong></p>
      <ol>
        <li><strong>Vanilla IPS-CRM:</strong> exactly the equation above. Unbiased; high variance.</li>
        <li><strong>Self-Normalized CRM (SN-CRM):</strong> divide by sum of weights. Biased; low variance; popular in production.</li>
        <li><strong>DR-CRM:</strong> use the doubly-robust score psi_i = mu_pi(x_i)(x_i) + (1&#123;T_i=pi(x_i)&#125;/pi_log) (Y_i - mu_T_i(x_i)) as the per-unit objective. Unbiased if either mu or pi_log is correct; low variance.</li>
      </ol>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="CPL vs alternatives">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>CPL</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Predict-then-threshold</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Imitation learning</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>RL</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Trained against</td><td style={{padding:"6px 10px"}}>V(pi) directly</td><td style={{padding:"6px 10px"}}>Log-loss / focal</td><td style={{padding:"6px 10px"}}>Match logged policy</td><td style={{padding:"6px 10px"}}>Cumulative reward</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Needs propensities?</td><td style={{padding:"6px 10px"}}>YES (logged exploration)</td><td style={{padding:"6px 10px"}}>No</td><td style={{padding:"6px 10px"}}>No</td><td style={{padding:"6px 10px"}}>Yes (on-policy)</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Output</td><td style={{padding:"6px 10px"}}>Policy pi(x)</td><td style={{padding:"6px 10px"}}>P(fraud|x) + threshold</td><td style={{padding:"6px 10px"}}>Behavior clone</td><td style={{padding:"6px 10px"}}>Policy (online)</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Closes predict-threshold gap?</td><td style={{padding:"6px 10px"}}>YES</td><td style={{padding:"6px 10px"}}>NO</td><td style={{padding:"6px 10px"}}>N/A</td><td style={{padding:"6px 10px"}}>YES, but online</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Safe to deploy?</td><td style={{padding:"6px 10px"}}>With pessimism / CIPS</td><td style={{padding:"6px 10px"}}>Yes</td><td style={{padding:"6px 10px"}}>Yes</td><td style={{padding:"6px 10px"}}>Hard offline</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 23 trap problems">
      <p style={{color:"#475569", marginBottom:16}}>Every problem turns on the DIRECT POLICY OBJECTIVE and the propensity-corrected logged data. Strip &quot;maximizes V(pi)&quot; and the answer collapses to prediction or imitation.</p>

      <VIS.TrapProblem id="cpl-p1" difficulty="hard" title="P1 — Lead: 'We already train a P(fraud) model and pick a threshold. Why CPL?'"
        scenario={<><em>Discriminating insight: predict-then-threshold optimizes log-loss / focal then sweeps a threshold. The two objectives differ — the model is calibrated for probability, not for the decision boundary that maximizes business reward. CPL directly trains for V(pi), closing the gap.</em><br/><br/>Pitch.</>}
        options={[
          {key:"a", text:"CPL is newer."},
          {key:"b", text:"Two-stage predict-then-threshold trains a model to minimize prediction loss (log-loss, focal), then picks a threshold to optimize business reward. The two objectives are DIFFERENT: low log-loss does NOT mean optimal decision boundary, especially under (a) asymmetric costs, (b) class imbalance, (c) capacity constraints. Real example: with 5x asymmetric costs (false-block costs less than false-pass), the optimal decision boundary is shifted from 0.5; a well-calibrated probability model needs the right threshold; threshold-tuning on validation works, but the model itself can have low FAR-near-decision-boundary precision because that region was not the gradient signal. CPL trains pi DIRECTLY for V(pi) — every gradient step explicitly maximizes business reward under operational constraints. Result: same dollar savings achievable with smaller capacity, or more dollars saved at fixed capacity.", correct:true},
          {key:"c", text:"They are identical."},
          {key:"d", text:"Predict-then-threshold cannot work."},
        ]}
        trap={<>(a) recency; (c)(d) collapse.</>}
        lens={<>Two-stage optimizes loss then threshold. CPL optimizes V(pi) directly. Closes the objective gap.</>}
        stretch={<>When does the gap vanish — calibrated, symmetric, balanced?</>}
      />

      <VIS.TrapProblem id="cpl-p2" difficulty="hard" title="P2 — Write the IPS-CRM objective."
        scenario={<><em>Discriminating insight: V-hat(pi) = (1/n) sum (pi(T_i|x_i)/pi_log(T_i|x_i)) Y_i. Importance-weighted reward sum. The propensity ratio inside the sum is what makes it counterfactual — reweights logged data to look like data sampled under pi.</em><br/><br/>Write.</>}
        options={[
          {key:"a", text:"Just average Y_i."},
          {key:"b", text:"V-hat_IPS(pi) = (1/n) sum_i (pi(T_i | x_i) / pi_log(T_i | x_i)) Y_i. The IMPORTANCE-WEIGHTED reward estimator from off-policy evaluation. Each unit's reward Y_i is multiplied by the probability ratio between the new policy and the logged policy at that (x_i, T_i). Unbiased for V(pi) = E[Y(pi(X))] if (1) propensities pi_log are correct (typically known by design — epsilon-greedy logged policy) and (2) positivity holds. Gradient ascent: differentiate V-hat with respect to pi parameters theta; backprop through pi(T_i | x_i; theta). For a deterministic pi: rewrite as pi(T_i|x_i) = 1{T_i = pi(x_i)} and use a smooth surrogate (Gumbel-softmax, soft-pi). Vanilla IPS-CRM has high variance — use SN-CRM or DR-CRM in production.", correct:true},
          {key:"c", text:"Use AUROC."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the importance-weight structure.</>}
        lens={<>V-hat = (1/n) sum (pi/pi_log) Y. Importance-weighted reward sum.</>}
        stretch={<>How to differentiate through a deterministic pi?</>}
      />

      <VIS.TrapProblem id="cpl-p3" difficulty="hard" title="P3 — Without exploration in the logged policy, what breaks?"
        scenario={<><em>Discriminating insight: POSITIVITY. If pi_log(a|x) = 0 for some action a, you cannot learn pi(x) = a — the importance weight is undefined; the estimator does not see that arm. Need epsilon-greedy or randomized logging. Without it, CPL just mimics the logged policy (the only policy you have data for).</em><br/><br/>Bottleneck.</>}
        options={[
          {key:"a", text:"Nothing."},
          {key:"b", text:"POSITIVITY breaks. If the logged policy never took action a for x (i.e., pi_log(a|x) = 0), then no logged unit has T_i = a for that x, and the importance ratio pi(a|x) / 0 is undefined; that arm contributes nothing to V-hat. The optimizer cannot learn that pi(x) = a is good or bad — there is no signal. Result: CPL collapses to mimicking the logged policy (the only policy with non-zero propensity everywhere). Fix: bake EXPLORATION into the logged policy. Standard pattern: epsilon-greedy — with probability 1 - epsilon take the current best action, with probability epsilon take a uniformly random action. Epsilon = 5% is the typical default; smaller for high-cost actions, larger for low-cost exploration. Alternative: RCT slice (1-5% of traffic gets a uniform random action). Without exploration, CPL is unidentified and dangerous.", correct:true},
          {key:"c", text:"Imitation works."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a) wrong; (c) misses the difference; (d) wrong.</>}
        lens={<>Positivity = nonzero logged propensity. Without exploration, no signal for unobserved actions.</>}
        stretch={<>Min epsilon to recover ATE within 5%?</>}
      />

      <VIS.TrapProblem id="cpl-p4" difficulty="hard" multiSelect title="P4 — Pick TRUE statements about CPL (4 correct)"
        scenario={<><em>Discriminating insight: needs propensities; closes predict-threshold gap; can use DR objectives; SN-CRM is biased lower-variance; vanilla IPS-CRM is unbiased higher-variance. NOT online; NOT imitation.</em><br/><br/>Pick TRUE.</>}
        options={[
          {key:"a", text:"Needs logged propensities (or randomized logging).", correct:true},
          {key:"b", text:"Closes the predict-then-threshold objective gap.", correct:true},
          {key:"c", text:"DR-CRM objective inherits doubly-robust unbiasedness.", correct:true},
          {key:"d", text:"Self-Normalized CRM trades a small bias for much lower variance.", correct:true},
          {key:"e", text:"Same as imitation learning."},
        ]}
        trap={<>(e) wrong.</>}
        lens={<>Needs propensities; closes gap; DR variant; SN trade-off. Not imitation.</>}
        stretch={<>What's PoEM (Policy Optimizer for Exponential Models)?</>}
      />

      <VIS.TrapProblem id="cpl-p5" difficulty="hard" title="P5 — CPL vs imitation learning — how do they differ?"
        scenario={<><em>Discriminating insight: imitation learning MIMICS the logged policy (training target is pi_log). CPL OPTIMIZES the reward (training target is V(pi)). When pi_log is suboptimal — typically true in fraud — imitation reproduces its mistakes; CPL improves.</em><br/><br/>Differ.</>}
        options={[
          {key:"a", text:"Same."},
          {key:"b", text:"Different objectives entirely. IMITATION LEARNING (a.k.a. behavior cloning, supervised policy learning): trains pi to predict T_i given x_i — minimizes cross-entropy between pi(x_i) and the logged action T_i. The target IS pi_log. If pi_log is good, imitation works; if pi_log is bad, imitation reproduces the bad behavior. COUNTERFACTUAL POLICY LEARNING: trains pi to maximize V(pi) = E[Y(pi(X))] — the target is REWARD, not the logged action. CPL can prescribe actions different from pi_log when those actions yield higher reward. The key difference: imitation has NO mechanism to improve over pi_log; CPL does. For fraud where current policies are usually heuristics with known gaps, CPL is the right tool. Caveat: CPL needs propensities (imitation does not) and exploration in the logged data (imitation does not strictly need it).", correct:true},
          {key:"c", text:"CPL is imitation."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) collapse.</>}
        lens={<>Imitation target: logged action. CPL target: reward. Imitation cannot improve; CPL can.</>}
        stretch={<>When does imitation come close to CPL?</>}
      />

      <VIS.TrapProblem id="cpl-p6" difficulty="hard" title="P6 — CPL vs RL — how do they differ?"
        scenario={<><em>Discriminating insight: CPL is OFFLINE single-step (no sequential reward). RL is ONLINE multi-step. CPL fits a CONTEXTUAL BANDIT (one action, one reward). RL fits an MDP (action → state transition → next reward). Fraud is mostly bandit (one decision per transaction), so CPL is the right framing.</em><br/><br/>Differ.</>}
        options={[
          {key:"a", text:"Same."},
          {key:"b", text:"Different setting. RL solves a Markov Decision Process: state, action, transition probability, sequential reward; the agent learns Q(s, a) or pi(s) over multi-step trajectories; typically requires online interaction with the environment (or offline RL methods like CQL). CPL solves a CONTEXTUAL BANDIT (Langford and Zhang 2008): single decision per context, immediate reward, no state transition. Fraud is mostly bandit — each transaction has features (context), one decision (block / hold / allow), one reward (catch / miss / abandon). No sequential dynamics per transaction (a separate transaction's decision does not change the current one). CPL is the simpler, well-suited offline tool. Caveat: if you model fraudster behavior over a session (multiple correlated transactions), you slide toward RL — but that is rare in production fraud.", correct:true},
          {key:"c", text:"CPL is RL."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) collapse.</>}
        lens={<>CPL = offline contextual bandit. RL = online MDP. Fraud is bandit.</>}
        stretch={<>When does sequential modeling matter in fraud?</>}
      />

      <VIS.TrapProblem id="cpl-p7" difficulty="medium" title="P7 — Self-Normalized IPS: why and what trade-off?"
        scenario={<><em>Discriminating insight: divide by sum of importance weights, not n. Reduces variance (especially when weights concentrate on a few units) at the cost of small bias. Production default because of stability.</em><br/><br/>SN trade-off.</>}
        options={[
          {key:"a", text:"No difference."},
          {key:"b", text:"Self-Normalized IPS: V-hat_SN(pi) = sum_i (pi(T_i|x_i)/pi_log(T_i|x_i)) Y_i / sum_i (pi(T_i|x_i)/pi_log(T_i|x_i)) — divide by the SUM OF WEIGHTS instead of n. Why it helps: when most weight mass concentrates on a few units (typical when pi disagrees with pi_log), vanilla IPS divides by n (constant) but the numerator is dominated by those units; if their weights are extreme, the estimate is high-variance. SN-IPS divides by the sum of weights, which is also dominated by the same few units; the ratio stabilizes. Trade-off: SN-IPS is BIASED (by a factor that vanishes as n→infinity) but has dramatically lower variance — typically 10-100x less in practice. Production CPL defaults to SN-IPS (Swaminathan and Joachims 2015 NeurIPS).", correct:true},
          {key:"c", text:"SN-IPS is unbiased."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the trade-off.</>}
        lens={<>SN-IPS: divide by sum of weights. Bias up, variance way down. Production default.</>}
        stretch={<>What is the bias rate of SN-IPS?</>}
      />

      <VIS.TrapProblem id="cpl-p8" difficulty="hard" title="P8 — Pessimistic policy learning: why pessimism is needed."
        scenario={<><em>Discriminating insight: with finite logged data, the optimizer can find a pi that ASSIGNS LOW PROPENSITY units to high-reward regions — a few unlucky high-reward observations there spuriously inflate V-hat. Pessimism subtracts a CI penalty so the optimizer prefers well-supported actions. CIPS, BanditNet, PG-Pess.</em><br/><br/>Pessimism.</>}
        options={[
          {key:"a", text:"Pessimism hurts."},
          {key:"b", text:"Pessimism is essential for safe deployment. Without it: with finite logged data the optimizer finds a pi that assigns HIGH probability to actions in x-regions where the logged propensity was LOW. A few logged units with high Y in those regions inflate the importance-weighted V-hat enormously; the optimizer learns to chase that spurious peak. Result: the deployed pi prescribes actions in low-data regions and underperforms in practice. PESSIMISTIC policy learning subtracts a confidence-interval penalty: V-hat_PESS(pi) = V-hat(pi) - lambda * U(pi), where U(pi) is an upper bound on the standard error or the effective sample size in low-propensity regions. Variants: CIPS (Counterfactual Inverse Propensity Score) with Bernstein-bound penalty; BanditNet (Joachims et al. 2018); Pessimistic Policy Gradient (Brandfonbrener et al. 2021). The penalty makes the optimizer prefer well-supported actions; sacrifices some upside for substantial downside protection.", correct:true},
          {key:"c", text:"Pessimism is optional."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the safe-deployment necessity.</>}
        lens={<>Pessimism penalizes optimization that chases low-propensity high-Y peaks. CIPS, BanditNet.</>}
        stretch={<>How to set the lambda penalty?</>}
      />

      <VIS.TrapProblem id="cpl-p9" difficulty="hard" title="P9 — Implementation: deterministic vs stochastic learned pi."
        scenario={<><em>Discriminating insight: deterministic pi has a non-differentiable argmax — needs smooth surrogate (Gumbel-softmax, soft-argmax). Stochastic pi differentiates through softmax directly. For DEPLOYMENT, you can argmax the stochastic policy at inference. Practice: train stochastic, deploy argmax.</em><br/><br/>Choice.</>}
        options={[
          {key:"a", text:"Always deterministic."},
          {key:"b", text:"Train stochastic, deploy argmax. Deterministic pi has the form pi(x) = argmax_a f(x, a; theta); the argmax is non-differentiable, so vanilla gradient descent fails. Workarounds: (1) Gumbel-softmax — add Gumbel noise, take softmax with temperature tau, sample; gradient flows through softmax. (2) Soft-argmax — replace argmax with a softmax-weighted sum over action embeddings. (3) REINFORCE policy gradient — treat pi as stochastic and use score-function gradient. Stochastic pi (smooth softmax) differentiates directly: gradient flows through pi(a|x; theta). At deployment, argmax over actions for each x — recovers a deterministic policy. This is the standard pattern in CPL: stochastic during training (smooth gradients) + argmax at inference (deterministic decision). Plus: stochastic during training serves as implicit exploration regularization.", correct:true},
          {key:"c", text:"Always deterministic gradient."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the differentiability.</>}
        lens={<>Train stochastic for gradients; argmax at deployment for determinism.</>}
        stretch={<>What does the softmax temperature control?</>}
      />

      <VIS.TrapProblem id="cpl-p10" difficulty="hard" title="P10 — Concept-specific misattribution: deployed CPL underperforms logged policy. Why?"
        scenario={<><em>Discriminating insight (concept-specific): (1) positivity violation — pi acts in low-propensity regions; (2) no pessimism — optimizer chased spurious peaks; (3) reward miscoded — Y was log-loss not business reward; (4) drift between logged and deploy windows. NOT generic.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"Concept-specific failure modes for deployed-CPL underperformance. (1) Positivity violation — pi assigns probability to actions in x-regions where the logged policy never explored; the importance weights for those (x, a) pairs are extreme or undefined; the V-hat estimate did not reflect true V. Diagnostic: distribution of pi-vs-pi_log overlap. (2) No pessimism — optimizer chased high-Y peaks in low-propensity regions; V-hat overstated true V. Diagnostic: re-run with CIPS pessimism penalty; if behavior changes, this was the cause. (3) Reward miscoded — Y in the objective was prediction loss (e.g., focal loss) rather than business reward (dollar savings); CPL optimized the wrong thing. Diagnostic: print the per-unit Y values and confirm they are business reward. (4) Drift — logged data is from t_0; deploy window is t_1; nuisances and propensities extrapolate. Diagnostic: rerun CPL on the latest 30 days.", correct:true},
          {key:"c", text:"Use Platt."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Positivity / no-pessimism / wrong-Y / drift. Each concept-specific.</>}
        stretch={<>Which to check first?</>}
      />

      <VIS.TrapProblem id="cpl-p11" difficulty="medium" title="P11 — Counterfactual reward needs Y for the chosen action. What if Y is delayed?"
        scenario={<><em>Discriminating insight: delayed feedback breaks the offline assumption. Solutions: train a delay-corrected outcome model (Chapelle 2014, Yasui et al. 2020); use partial-label CPL; or wait for the feedback window before training. Production fraud: chargebacks take 30-90 days, so explicitly model the delay.</em><br/><br/>Delayed Y.</>}
        options={[
          {key:"a", text:"Skip delayed Y."},
          {key:"b", text:"Delayed feedback is a known challenge for fraud CPL (chargebacks take 30-90 days). Three approaches. (1) Delay-corrected outcome model (Chapelle 2014, Yasui et al. KDD 2020): jointly model the time-to-conversion and the conversion; train on observed-or-still-pending data with a survival likelihood. (2) Partial-label CPL: treat unobserved Y as missing-at-random with a propensity-corrected pseudo-label from the outcome model. (3) Wait-and-train: only train on transactions where the chargeback window has elapsed; restricts data but unbiased. Production fraud teams typically combine (1) and (3): wait 60 days for a stable label, use the delay model as warm-up for the freshest data. Without explicit modeling, vanilla CPL treats pending transactions as Y=0 and is biased — overweighting catch rate, underweighting fraud rate.", correct:true},
          {key:"c", text:"Y must be instant."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the delay-modeling solutions.</>}
        lens={<>Delay-corrected outcome model + wait window. Vanilla CPL is biased on pending.</>}
        stretch={<>Trade-off between wait length and recency?</>}
      />

      <VIS.TrapProblem id="cpl-p12" difficulty="hard" title="P12 — DR-CRM vs vanilla IPS-CRM: when DR helps."
        scenario={<><em>Discriminating insight: DR-CRM uses the DR score psi_i as the per-unit reward — inherits doubly-robust unbiasedness AND lower variance. Helps when outcome model has signal and/or when propensities are imperfect. Production default.</em><br/><br/>Pick.</>}
        options={[
          {key:"a", text:"Always IPS-CRM."},
          {key:"b", text:"DR-CRM replaces the vanilla importance-weighted reward with the doubly-robust score psi_i. Algorithm: (1) fit nuisance models mu_T(x) (outcome) and pi_log(T|x) (propensity, if unknown); (2) for each logged unit compute psi_i^DR(pi) = mu_pi(x_i)(x_i) + (pi(T_i|x_i)/pi_log(T_i|x_i))(Y_i - mu_T_i(x_i)); (3) V-hat_DR(pi) = (1/n) sum psi_i^DR(pi); (4) gradient ascent through pi. Two gains. (a) Unbiased if EITHER mu OR pi_log is correct — robustness to misspecification. (b) Variance bounded by mu's residual variance rather than 1/pi_log^2 — much smaller in practice. Production default. Caveat: need cross-fitting on mu (and pi_log if estimated) to avoid overfitting bias in the gradient.", correct:true},
          {key:"c", text:"DR-CRM is unrelated."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the DR gains.</>}
        lens={<>DR-CRM: doubly-robust per-unit reward in the CRM objective. Less variance + either-correct.</>}
        stretch={<>How does cross-fitting fit into CPL training?</>}
      />

      <VIS.TrapProblem id="cpl-p13" difficulty="medium" title="P13 — Capacity constraint: how to bake in the review-queue limit?"
        scenario={<><em>Discriminating insight: add a Lagrangian penalty on E[1&#123;pi(x)=review&#125;] minus capacity, optimize jointly. Or constrain via dual at fixed multiplier. Or top-K selection by tau-hat after CPL training. Direct Lagrangian gives the cleanest gradient.</em><br/><br/>Constrain.</>}
        options={[
          {key:"a", text:"Skip capacity."},
          {key:"b", text:"Bake capacity in via a Lagrangian. (1) Define the constraint: E[1{pi(x) = review}] is at most K/N (where K is daily review capacity and N is daily transaction volume). (2) Form the Lagrangian: L(pi, lambda) = V-hat(pi) - lambda (E-hat[1{pi(x) = review}] - K/N). (3) Optimize: alternate gradient ascent on pi (maximizing L for fixed lambda) with gradient ascent on lambda (gradient is the constraint violation). At equilibrium, the constraint is satisfied. Alternative: fix lambda at a value where the constraint binds and just train pi. Simpler but requires tuning lambda. Alternative: post-hoc top-K — train unconstrained CPL, then at inference take top-K by predicted tau-hat. Loses some optimality but easy. The Lagrangian approach gives the cleanest gradient and respects capacity throughout training.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt."},
        ]}
        trap={<>(a)(c)(d) miss the Lagrangian.</>}
        lens={<>Lagrangian penalty on constraint; alternating gradient on pi and lambda.</>}
        stretch={<>Per-day vs averaged capacity — same Lagrangian?</>}
      />

      <VIS.TrapProblem id="cpl-p14" difficulty="hard" title="P14 — Concept-specific misattribution: CPL converged to a constant policy (always block). Why?"
        scenario={<><em>Discriminating insight (concept-specific): (1) reward coded as -1{"{Y=fraud}"}; always-block trivially maximizes (no fraud passes); (2) capacity constraint omitted; (3) cost-of-block ignored in reward; (4) optimization hit a local optimum due to softmax temperature too sharp. NOT generic.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Bug in code."},
          {key:"b", text:"Concept-specific causes for the always-block degenerate policy. (1) Reward miscoded — if Y is coded as -1{Y_true=fraud}, the optimal is always block (no fraud passes); reward needs to subtract the COST of false blocks (legit users blocked). Correct reward: Y = (catch_value if fraud caught) minus (false_block_cost if legit blocked) minus (false_pass_cost if fraud passed). (2) Capacity constraint omitted — without it the optimizer never balances block-volume against block-precision. (3) Cost-of-block missing — even with capacity, if false-block cost is zero in the reward, the optimizer treats blocks as free. (4) Softmax temperature too sharp — at training, tau small means pi is nearly deterministic; if it lands on always-block in early epochs (typical from data imbalance), no exploration recovery. Fix the reward coding first; then check temperature schedule and capacity Lagrangian.", correct:true},
          {key:"c", text:"Lower learning rate."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Reward miscoded / no capacity / no block cost / temp too sharp. Each concept-specific.</>}
        stretch={<>Anneal softmax temperature — what schedule?</>}
      />

      <VIS.TrapProblem id="cpl-p15" difficulty="medium" multiSelect title="P15 — Decoys: which are NOT counterfactual policy learning methods? (3 correct)"
        scenario={<><em>Discriminating insight: BC, log-loss, AUROC are NOT CPL. CRM, BanditNet, POEM, CIPS, DR-CRM are CPL.</em><br/><br/>Pick NOT-CPL.</>}
        options={[
          {key:"a", text:"Behavior cloning.", correct:true},
          {key:"b", text:"Log-loss minimization.", correct:true},
          {key:"c", text:"AUROC optimization.", correct:true},
          {key:"d", text:"BanditNet (Joachims et al. 2018)."},
          {key:"e", text:"POEM (Swaminathan & Joachims 2015)."},
        ]}
        trap={<>(a)(b)(c) not CPL; (d)(e) ARE CPL.</>}
        lens={<>BanditNet and POEM are CPL; BC and loss optimizers are not.</>}
        stretch={<>What does POEM stand for?</>}
      />

      <VIS.TrapProblem id="cpl-p16" difficulty="hard" title="P16 — Safe deployment: how do you A/B a learned CPL policy?"
        scenario={<><em>Discriminating insight: gradual ramp + monitoring. Start at 1% traffic, monitor reward gap vs control, scale to 5/10/20/50/100% over weeks. Use DR (off-policy) as a continuous monitor during ramp. Pessimistic CIPS bound used to gate the ramp.</em><br/><br/>Deploy.</>}
        options={[
          {key:"a", text:"Deploy 100% day 1."},
          {key:"b", text:"Gradual ramp + continuous DR monitoring. (1) Train CPL with pessimism (CIPS) on logged data; verify V-hat with DR off-policy evaluation on a held-out window. (2) Deploy at 1% traffic; A/B against the current production policy. Monitor: per-day reward delta vs control, DR-extrapolated V on the 1% slice. (3) After 1-2 weeks at 1% with no degradation, ramp to 5%; repeat for 10%, 25%, 50%, 100%. (4) Throughout, use DR-CIPS on the latest logged data as a continuous off-policy monitor — if the DR-CI on V(pi) drops below V(pi_current), pause the ramp and investigate. (5) Set automatic rollback triggers on observed reward delta below a threshold. (6) Maintain epsilon-greedy exploration on the deployed pi to enable continued off-policy evaluation of future candidate policies — fold exploration into the deploy.", correct:true},
          {key:"c", text:"Skip A/B."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) skip safety.</>}
        lens={<>Pessimistic train + gradual ramp + DR monitor + rollback triggers + persistent exploration.</>}
        stretch={<>What rollback threshold do you set?</>}
      />

      <VIS.TrapProblem id="cpl-p17" difficulty="hard" title="P17 — CPL vs CATE-then-decide — same thing?"
        scenario={<><em>Discriminating insight: CATE-then-decide first ESTIMATES tau(x) and then thresholds. CPL directly LEARNS the policy. CATE-then-decide is two-stage like predict-then-threshold; CPL closes the gap by training pi directly against V(pi). Often similar performance but CPL is cleaner under asymmetric costs and capacity.</em><br/><br/>Distinguish.</>}
        options={[
          {key:"a", text:"Same."},
          {key:"b", text:"Different patterns. CATE-then-decide: (1) estimate tau-hat(x) using S/T/X/DR-learner; (2) define a decision rule like pi(x) = 1{tau-hat(x) above c} where c is tuned on validation. Two stages: estimation + thresholding. CPL: train pi(x) DIRECTLY against V(pi) using the CRM objective; the policy is the output, not the CATE. Both can produce the same policy in simple cases (binary action, symmetric costs, no capacity), but CPL is cleaner when: (a) asymmetric costs — CPL bakes them into the reward Y; (b) capacity constraints — CPL handles via Lagrangian; (c) the decision-loss differs from the CATE-loss — CPL optimizes the right thing. CATE-then-decide is more INTERPRETABLE (you can examine tau-hat per unit) and easier to deploy under regulatory scrutiny. CPL is more end-to-end optimal. Production teams often start with CATE-then-decide and graduate to CPL once interpretability requirements are satisfied differently (e.g., via shap explanations on pi).", correct:true},
          {key:"c", text:"CPL is CATE."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) collapse.</>}
        lens={<>CATE-then-decide: two-stage. CPL: direct. CPL wins on asymmetric/capacity; CATE wins on interpretability.</>}
        stretch={<>When does CATE-then-decide match CPL exactly?</>}
      />

      <VIS.TrapProblem id="cpl-p18" difficulty="medium" title="P18 — Off-policy gradient: how does the gradient look?"
        scenario={<><em>Discriminating insight: gradient of V-hat_IPS = (1/n) sum (Y_i / pi_log(T_i|x_i)) * grad pi(T_i|x_i; theta). Importance weight times policy gradient. For stochastic pi parameterized by softmax over actions, grad pi has the standard softmax form.</em><br/><br/>Gradient.</>}
        options={[
          {key:"a", text:"Skip gradients."},
          {key:"b", text:"Gradient of the IPS-CRM objective: grad_theta V-hat_IPS(pi) = (1/n) sum_i (Y_i / pi_log(T_i|x_i)) * grad_theta pi(T_i | x_i; theta). It is an IMPORTANCE-WEIGHTED POLICY GRADIENT — the standard policy gradient (Williams 1992, REINFORCE) reweighted by 1/pi_log to convert from on-policy to off-policy. For a softmax-parameterized pi(a|x) = exp(f(x, a)) / sum_a' exp(f(x, a')), grad_theta pi(a|x) = pi(a|x) (grad_theta f(x, a) - sum_a' pi(a'|x) grad_theta f(x, a')) — standard softmax gradient. Plug into the IPS expression and use stochastic gradient ascent on theta. DR-CRM gradient has the same structure but the per-unit reward Y_i is replaced by the DR pseudo-outcome psi_i^DR. Implementations: PyTorch with custom IPS loss; pyro.ai for Bayesian variants.", correct:true},
          {key:"c", text:"AUROC."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) wrong.</>}
        lens={<>Importance-weighted policy gradient. REINFORCE reweighted by 1/pi_log.</>}
        stretch={<>How does variance reduction via baseline subtraction help?</>}
      />

      <VIS.TrapProblem id="cpl-p19" difficulty="medium" title="P19 — Online vs offline exploration: does CPL ever explore at deployment?"
        scenario={<><em>Discriminating insight: pure CPL is OFFLINE — trained on logged data and deployed; no exploration at deployment. But production CPL fold-in epsilon-greedy at deployment to maintain logged exploration for FUTURE training rounds. This is the contextual bandit setting.</em><br/><br/>Explore at deploy.</>}
        options={[
          {key:"a", text:"Never."},
          {key:"b", text:"Pure offline CPL trains on logged data and deploys argmax — no exploration. But production CPL is iterative: deploy pi_v1, log new data under pi_v1 (with epsilon-greedy exploration), train pi_v2 on the new logged data, deploy pi_v2, etc. The DEPLOYMENT pi must maintain non-zero propensity on all actions of interest, otherwise the next round of CPL has positivity violation. Standard pattern: deploy pi_eps = (1 - epsilon) pi_argmax + epsilon uniform, with epsilon typically 1-5%. This is exactly the CONTEXTUAL BANDIT setting (Langford and Zhang 2008, LinUCB, Thompson sampling for bandits). The epsilon-greedy or Thompson exploration is the OPERATIONAL exploration; the CPL training itself is offline. Modern variants combine: train offline CPL with pessimism; deploy with epsilon-greedy or Thompson; alternate periodically.", correct:true},
          {key:"c", text:"Always 100% exploration."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the operational pattern.</>}
        lens={<>Offline train + epsilon-greedy deploy. Maintains positivity for future training.</>}
        stretch={<>Thompson sampling vs epsilon-greedy — when each?</>}
      />

      <VIS.TrapProblem id="cpl-p20" difficulty="hard" title="P20 — Concept-specific misattribution: CPL trained fine but V-hat on holdout much lower than train. Cause?"
        scenario={<><em>Discriminating insight (concept-specific): (1) overfit on importance-weighted training reward (spurious high V-hat); (2) train propensities were wrong (overestimated weights); (3) outcome model used in DR-CRM overfits to training fold; (4) policy class too large for sample size. Concept-specific.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model size wrong."},
          {key:"b", text:"Concept-specific failure modes for train-vs-holdout V-hat gap. (1) Overfitting on the IPS objective itself — extreme importance weights concentrate gradient on few units; the optimizer fits noise in those units; train V-hat looks great, holdout collapses. Fix: cross-fitted DR-CRM or weight clipping or SN-IPS. (2) Propensity misspecification — train pi_log was a logistic model, but the true logging policy was a more complex heuristic; importance weights were wrong; V-hat biased. Fix: refit pi_log with a richer model or use known propensities (deploy epsilon-greedy). (3) Outcome model overfits — in DR-CRM, mu trained on full train data sees Y; the DR pseudo-outcome is overoptimistic; cross-fitting required. (4) Policy class too large — neural net pi with too many parameters relative to effective sample size; weight clipping reduces effective n. Fix: regularize pi heavily or use a smaller model class.", correct:true},
          {key:"c", text:"Use Platt."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Overfit-IPS / wrong propensity / outcome-overfit / policy-too-large. Each concept-specific.</>}
        stretch={<>Cross-fitted DR-CRM vs SN-IPS — when each?</>}
      />

      <VIS.TrapProblem id="cpl-p21" difficulty="hard" title="P21 — Skeptic: 'Just use the DR estimator to pick the best of a few candidate policies'. Refute."
        scenario={<><em>Discriminating insight: DR + candidate-pick is FINE for small discrete policy spaces (5-50 candidates). CPL is for LARGE / CONTINUOUS policy classes (deep nets with millions of params parameterizing pi). DR cannot enumerate; gradient-based CPL can. Different sizes of policy space.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Skeptic is right always."},
          {key:"b", text:"Partial truth — works only for small discrete policy spaces. DR off-policy evaluation gives unbiased V-hat for a SINGLE candidate pi. To pick the best of K candidates, run DR K times and take the max — fine when K is in the tens (e.g., evaluating threshold sweeps, decision-tree variants). But CPL is for LARGE / CONTINUOUS / NEURAL policy classes: pi parameterized by a deep net with millions of parameters; you cannot enumerate. Gradient-based CPL navigates this space via stochastic gradient ascent on the CRM objective. The DR-vs-CPL distinction is about the SIZE OF THE POLICY CLASS: DR is for evaluation (small or single pi); CPL is for learning (large pi class). They compose: train pi via CPL; estimate V(pi-trained) via DR; compare to V(pi-current).", correct:true},
          {key:"c", text:"They are identical."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the policy-class-size distinction.</>}
        lens={<>DR: evaluate one pi. CPL: learn pi in a large class. Compose: CPL trains, DR evaluates.</>}
        stretch={<>When does DR + brute-force grid match CPL?</>}
      />

      <VIS.TrapProblem id="cpl-p22" difficulty="hard" title="P22 — Bandit feedback: partial observability of Y."
        scenario={<><em>Discriminating insight: in bandits, Y is observed ONLY for the action TAKEN — Y(a') for a' different from T is never seen. This is what makes CPL fundamentally different from supervised learning. The IPS reweight is what corrects for partial observability.</em><br/><br/>Bandit setting.</>}
        options={[
          {key:"a", text:"Y is fully observed."},
          {key:"b", text:"BANDIT FEEDBACK: for each logged unit, you observe Y only for the action T_i actually taken — Y_i(a') for a' different from T_i is UNOBSERVED. This is fundamentally different from supervised learning (where labels are fully observed). The IPS reweight is what corrects for partial observability: by reweighting logged units (T_i = a happened with probability pi_log(a|x_i)), the importance ratio pi(a|x_i) / pi_log(a|x_i) makes the expectation match what would happen under pi. Without IPS, you would just compute E[Y | T = pi(x)] under the logged distribution — a different thing. The contextual bandit (Langford and Zhang 2008) is the formal setting. The same partial-observability constraint motivates BanditNet (Joachims et al. 2018), POEM (Swaminathan and Joachims 2015), and CRM. Full observability is the supervised setting; partial is the bandit setting where CPL applies.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip Y."},
        ]}
        trap={<>(a)(c)(d) miss the partial observability.</>}
        lens={<>Bandit Y: only one arm observed per unit. IPS corrects partial observability.</>}
        stretch={<>What is the cost of partial observability vs full?</>}
      />

      <VIS.TrapProblem id="cpl-p23" difficulty="hard" title="P23 — In one sentence, THE unique mechanism of CPL?"
        scenario={<><em>Discriminating insight: LEARN A POLICY pi(x) TO MAXIMIZE EXPECTED COUNTERFACTUAL REWARD V(pi) = E[Y(pi(X))] USING PROPENSITY-CORRECTED LOGGED DATA — end-to-end alternative to predict-then-threshold; closes the predict-vs-decision objective gap; needs logged exploration for positivity; pessimism for safe deployment. Strip &quot;direct V(pi) optimization&quot; or &quot;propensity-corrected&quot; and answer collapses to imitation or supervised.</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"It is just RL."},
          {key:"b", text:"LEARN A POLICY pi(x) DIRECTLY MAXIMIZING EXPECTED COUNTERFACTUAL REWARD V(pi) = E[Y(pi(X))] FROM LOGGED PRODUCTION DATA, using a PROPENSITY-CORRECTED OBJECTIVE V-hat(pi) = (1/n) sum (pi(T_i|x_i)/pi_log(T_i|x_i)) Y_i and STOCHASTIC GRADIENT ASCENT on the policy parameters. End-to-end alternative to the two-stage predict-then-threshold pattern — closes the predict-vs-decision objective gap. Variants: vanilla IPS-CRM (unbiased, high variance); Self-Normalized IPS (biased, low variance, production default); DR-CRM (doubly-robust, lower variance, either-correct unbiasedness); pessimistic CIPS (CI penalty for safe deployment). Needs LOGGED EXPLORATION (epsilon-greedy or RCT slice) for positivity. Closes operational gaps in asymmetric-cost / capacity-constrained fraud decisions where the predict-then-threshold gap matters.", correct:true},
          {key:"c", text:"It is calibration."},
          {key:"d", text:"It is imitation."},
        ]}
        trap={<>(a)(c)(d) miss the direct V(pi) optimization.</>}
        lens={<>Direct V(pi) optimization on propensity-corrected logged data. End-to-end alternative to predict-then-threshold.</>}
        stretch={<>When would you NOT pick CPL in 2026 fraud?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://www.jmlr.org/papers/volume16/swaminathan15a/swaminathan15a.pdf" target="_blank" rel="noopener"><strong>Swaminathan & Joachims — Counterfactual Risk Minimization (POEM)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(JMLR 2015, paper)</span><br/>The CRM paper. Section 4 introduces the SN-IPS objective; Section 5 the variance regularizer that becomes pessimism.</li>
        <li><a href="https://arxiv.org/abs/1502.02362" target="_blank" rel="noopener"><strong>Swaminathan & Joachims — The Self-Normalized Estimator for Counterfactual Learning</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2015, paper)</span><br/>Why SN-IPS dramatically reduces variance and why it became the production default.</li>
        <li><a href="https://www.cs.cornell.edu/people/tj/publications/joachims_etal_18a.pdf" target="_blank" rel="noopener"><strong>Joachims, Swaminathan, Rijke — Deep Learning with Logged Bandit Feedback (BanditNet)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(ICLR 2018, paper)</span><br/>Deep-net policies trained end-to-end with SN-IPS. The mechanism that makes neural CPL practical.</li>
        <li><a href="https://arxiv.org/abs/2105.06692" target="_blank" rel="noopener"><strong>Brandfonbrener et al. — Offline RL Without Off-Policy Evaluation (Pessimistic PG)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2021, paper)</span><br/>The pessimism justification for safe deployment of CPL-style methods. Adjacent to CIPS.</li>
        <li><a href="https://obp.readthedocs.io/" target="_blank" rel="noopener"><strong>OBP — Open Bandit Pipeline (ZOZO Research)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(library / docs)</span><br/>Reference implementation of IPS, SN-IPS, DR, DR-Switch and CRM-style trainers with real-world bandit benchmarks. The right starting point in code.</li>
      </ul>
    </VIS.Section>
