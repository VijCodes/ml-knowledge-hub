  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Counterfactual policy learning — learn fraud-decision policies directly to maximize
// expected counterfactual reward under exploration constraints. Bandit-style decisioning.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Causal inference"
      title="Counterfactual policy learning"
      subtitle="Learn fraud-decision policies directly by maximizing expected counterfactual reward, under safe-exploration constraints. Bandit-style decisioning at scale."
      byline={[
        {label: "Source", value: "Counterfactual Policy Optimization for Fraud Decisions (ICML 2025)"},
        {label: "Year", value: "2025"},
        {label: "L2", value: "Causal inference for fraud / risk"},
      ]}/>

    <VIS.TLDR>
      The standard two-stage fraud system{" "}
      <VIS.Term def="Predict-then-threshold: a model predicts fraud probability, then a fixed rule converts the probability into an action (review / approve / decline) via a threshold.">predicts a risk score and applies a threshold</VIS.Term>{" "}
      to decide whether to review, approve, or decline. That decomposition is locally optimal at best and loses information at every stage.{" "}
      <VIS.Term def="A class of methods that directly optimize an action-selection policy to maximize a long-run reward, often using counterfactual estimators (IPS, doubly robust) to evaluate candidate policies on logged data without deploying them.">Counterfactual policy learning</VIS.Term>{" "}
      learns the action-selection policy <em>directly</em> from logged data, optimizing the expected reward (fraud caught minus false-positive cost minus review cost) end-to-end. It is bandit-style decisioning, applied at fraud-system scale.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Decompose any fraud system as a four-tuple per decision: <strong>context x</strong> (customer + transaction features), <strong>action a</strong> (approve / review / decline), <strong>reward r</strong> (fraud caught minus costs), and <strong>logging policy pi_0</strong> (whatever policy collected the data). Counterfactual policy learning fits a new policy <code>pi(a given x)</code> that maximizes the expected reward on the population we will face going forward.
      </p>

      <VIS.Equation display
        tex="\pi^* = \arg\max_{\pi} \;\; \mathbb{E}_{x,a \sim \pi_0,\, r}\!\left[ \frac{\pi(a\mid x)}{\pi_0(a\mid x)} \cdot r \right]" />

      <p>
        The fraction is the{" "}
        <VIS.Term def="Inverse Propensity Score weighting — reweights each logged action by the ratio of new-policy probability to logging-policy probability, so logged data can be used to estimate the reward of the new policy without deploying it.">IPS weight</VIS.Term>, which converts logged data into an unbiased estimator of the new policy's expected reward (under the same overlap and unconfoundedness conditions as DR). In practice the IPS variant is replaced or stabilized by{" "}
        <VIS.Term def="Doubly Robust policy learning — DR-style estimator combining a reward model with IPS, used as the policy objective. Lower variance than vanilla IPS.">DR-style policy learning</VIS.Term>{" "}
        and{" "}
        <VIS.Term def="Self-Normalized Inverse Propensity Score — IPS weights divided by their sum, trading bias for variance. Often more stable than vanilla IPS in policy learning.">SNIPS</VIS.Term>.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  L["Logged data: x, a, r, pi_0"]
  L --> O["Counterfactual reward estimator"]
  O --> P["Policy pi of a given x"]
  P --> S["Safe exploration: epsilon mix with logging policy"]
  S --> D["Deploy"]
  D --> L
  style P fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style S fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>Blue is the learned policy. Yellow is the safety wrapper that keeps exploration bounded.</p>

      <p style={{marginTop: 16}}><strong>The pieces:</strong></p>
      <ul>
        <li><strong>Logging:</strong> the policy in production logs the probability with which it chose each action — required for IPS.</li>
        <li><strong>Estimator:</strong> IPS, SNIPS, or DR — pick by variance / bias tradeoff.</li>
        <li><strong>Policy class:</strong> linear, tree, or neural — the optimization is over this class.</li>
        <li><strong>Safety wrapper:</strong> epsilon-greedy or pessimistic constraints to keep exploration safe in a high-stakes system.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from two-stage decisioning">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Two-stage (predict then threshold)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Direct policy learning</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>What is optimized</td>
            <td style={{padding:"8px 10px"}}>Risk score loss</td>
            <td style={{padding:"8px 10px"}}>Expected reward</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Captures cost-asymmetry</td>
            <td style={{padding:"8px 10px"}}>Indirectly via threshold</td>
            <td style={{padding:"8px 10px"}}>Directly in reward</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Captures action interactions</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Yes — policy maps to multi-action space</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Requires exploration data</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Yes — IPS needs propensity logging</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Tooling maturity</td>
            <td style={{padding:"8px 10px"}}>Mature</td>
            <td style={{padding:"8px 10px"}}>Immature — requires custom infra</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Multi-action decisioning at scale</strong> — when actions include approve / review / decline / step-up-auth, not just binary.</li>
        <li><strong>Reward is well-defined and measurable</strong> — fraud loss avoided minus false-positive cost minus operational cost; you can write it as a number per decision.</li>
        <li><strong>You can log propensities</strong> — the production system records the action AND the probability it would have chosen each action.</li>
        <li><strong>You have safe-exploration infrastructure</strong> — epsilon-greedy slice, automatic rollback, anomaly detection on policy decisions.</li>
        <li><strong>The two-stage system is plateauing</strong> — when threshold tuning no longer moves the needle, the locally-optimal score-then-threshold structure may be the limit.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="No exploration, no learning">
        IPS requires that every action has non-zero probability under the logging policy. If your existing system is purely deterministic (threshold on a score), some action-context combinations have propensity zero — IPS is undefined for them. You must inject randomization (small epsilon-greedy or Thompson-style) into the production system to generate the exploration data, BEFORE you can learn a policy.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Production tooling is immature">
        Most fraud teams do not have: per-decision propensity logging, the policy-learning loss, safe-exploration infrastructure, counterfactual-policy evaluation dashboards. You will build them. Budget for it.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="High-stakes exploration risk">
        Random exploration in fraud means occasionally approving a transaction the system would have declined, or declining one it would have approved. Cap the exploration rate, monitor in real time, and have automatic rollback on observed reward dips.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Adversarial actors learn the policy">
        A learned policy is itself a target. Fraudsters can probe to learn the action boundaries. Mitigations: randomized actions in borderline regions, periodic policy retraining, and ensembling with a rule-based fallback for adversarially flagged inputs.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Trap problems on safe exploration, IPS variance, counterfactual evaluation, and when direct policy learning beats two-stage decisioning.
      </p>

      <VIS.TrapProblem
        id="cpl-p1"
        difficulty="hard"
        title="P1 — Production system is fully deterministic. Can you start policy learning?"
        scenario={<>Your current production system is a fixed-threshold rule on a risk score. Every decision is deterministic given the score. Leadership asks if you can deploy counterfactual policy learning starting tomorrow on the logged data. Can you?</>}
        options={[
          {key:"a", text:"Not yet. IPS-based policy learning requires non-zero propensity for every action under the logging policy. A deterministic threshold makes propensity 0 for the non-chosen action in every context — IPS estimates are undefined. You need to inject randomization first: epsilon-greedy on a small slice (1 to 3 percent), or Thompson-style sampling near the threshold band, and log the propensities. Then collect exploration data for a few weeks before training a counterfactual policy.", correct:true},
          {key:"b", text:"Yes — just compute IPS with propensity equal to 0 or 1."},
          {key:"c", text:"Yes — use the risk score as the propensity."},
          {key:"d", text:"Use only the data where the action was correct."},
        ]}
        trap={<>(b) makes IPS undefined. (c) confuses risk score with policy propensity. (d) introduces selection bias.</>}
        lens={<>(a) is the required prerequisite. No exploration, no policy learning. Inject epsilon first.</>}
        stretch={<>What is the smallest epsilon that lets policy learning converge while keeping operational risk acceptable?</>}
      />

      <VIS.TrapProblem
        id="cpl-p2"
        difficulty="hard"
        title="P2 — IPS variance is huge — what is the right fix?"
        scenario={<>Your IPS-based policy learning has huge variance. Some IPS weights are 100+. What is the right fix?</>}
        options={[
          {key:"a", text:"Switch to SNIPS (self-normalized IPS) or DR policy learning. Both trade a small amount of bias for dramatic variance reduction. SNIPS divides IPS weights by their sum so the estimator is bounded. DR policy learning combines a learned reward model with IPS so the IPS term only corrects residuals — variance shrinks like sqrt of residual variance, not raw reward variance.", correct:true},
          {key:"b", text:"Increase the policy regularization."},
          {key:"c", text:"Drop the high-weight observations."},
          {key:"d", text:"Use a bigger neural net."},
        ]}
        trap={<>(b) is a knob without diagnosis. (c) is biased subsetting. (d) does not address estimator variance.</>}
        lens={<>(a) is the textbook IPS-variance fix. SNIPS or DR policy learning are the named recipes.</>}
        stretch={<>What is the bias cost of SNIPS, and when does it matter?</>}
      />

      <VIS.TrapProblem
        id="cpl-p3"
        difficulty="hard"
        multiSelect
        title="P3 — Off-policy policy evaluation — pick the valid setups"
        scenario={<>Before deploying a candidate policy pi_new, you want to estimate its expected reward from logged data under pi_0. Which setups are valid? Select all that apply.</>}
        options={[
          {key:"a", text:"Compute the IPS estimator on logged data with weights pi_new over pi_0.", correct:true},
          {key:"b", text:"Fit a reward model and combine with IPS using a DR estimator (Dudik et al.).", correct:true},
          {key:"c", text:"Just compute the average logged reward as a proxy."},
          {key:"d", text:"Use a model-based simulator that imagines what each candidate action would have given.", correct:true},
          {key:"e", text:"Report SNIPS for a stable point estimate alongside IPS for an unbiased one.", correct:true},
          {key:"f", text:"Deploy pi_new in an A/B test and skip counterfactual evaluation entirely."},
        ]}
        trap={<>(c) is naive — average logged reward is the reward of pi_0, not pi_new. (f) is a fine option if you have the appetite for risk, but it is not counterfactual evaluation.</>}
        lens={<>(a) (b) (d) (e) are valid offline evaluation tools. Use multiple and check they agree.</>}
        stretch={<>If IPS and DR disagree by more than 2 percent, which do you trust?</>}
      />

      <VIS.TrapProblem
        id="cpl-p4"
        difficulty="hard"
        title="P4 — Safe-exploration design — what would you ship?"
        scenario={<>You ship a counterfactual policy learning system. What is the right safe-exploration design?</>}
        options={[
          {key:"a", text:"Epsilon-greedy at 1 to 3 percent of decisions, randomization concentrated NEAR the policy's decision boundary (not uniform), with real-time monitoring of reward proxies (fraud loss rate, false-positive rate) and automatic rollback to the previous policy when any tripwire fires. Log the actual probability each action was taken so IPS estimates remain valid. Cap per-context exploration so high-stakes decisions are not randomized.", correct:true},
          {key:"b", text:"Random uniform actions for 10 percent of traffic, no monitoring."},
          {key:"c", text:"No exploration — just deploy the learned policy."},
          {key:"d", text:"Exploration only on Sundays."},
        ]}
        trap={<>(b) is reckless — uniform random in fraud causes huge losses. (c) loses the data needed for the next iteration. (d) is operationally weird and creates day-of-week distribution shift.</>}
        lens={<>(a) is the senior safe-exploration recipe. Targeted, monitored, capped, automatically rolled back.</>}
        stretch={<>What is the right tripwire threshold for automatic rollback?</>}
      />

      <VIS.TrapProblem
        id="cpl-p5"
        difficulty="hard"
        title="P5 — Reward function design — what goes wrong if you under-specify it?"
        scenario={<>Your team specifies the reward function as: +1 for catching a fraud, -1 for a false positive, 0 for correct approve. After deployment the policy approves more transactions than the old threshold, fraud catch rate improves, but customer-service complaints spike 30 percent. What was wrong with the reward?</>}
        options={[
          {key:"a", text:"The reward did not include operational and downstream costs — customer abandonment after false-positive declines, manual-review queue cost, customer-service tickets after step-up auth, and second-order brand-trust effects. The learned policy correctly optimized the specified reward, but the specified reward was not the business reward. Fix: instrument richer reward components, including delayed downstream signals, and retrain.", correct:true},
          {key:"b", text:"The policy is buggy."},
          {key:"c", text:"Customer service should staff up."},
          {key:"d", text:"Add a regularizer."},
        ]}
        trap={<>(b) blames the wrong thing. (c) does not address the cause. (d) does not fix the misspecified objective.</>}
        lens={<>(a) is the canonical reward-design lesson. The policy gets exactly what you specified — make sure the reward IS the goal.</>}
        stretch={<>How would you instrument a delayed downstream signal (like 30-day abandonment) in a reward?</>}
      />

      <VIS.TrapProblem
        id="cpl-p6"
        difficulty="hard"
        multiSelect
        title="P6 — When does direct policy learning beat two-stage decisioning?"
        scenario={<>You compare your direct policy learner against the two-stage (score then threshold) baseline. Which conditions make direct policy learning likely to WIN? Select all that apply.</>}
        options={[
          {key:"a", text:"Multiple non-binary actions (approve, review, step-up auth, decline) with different costs.", correct:true},
          {key:"b", text:"Strong context-dependent cost asymmetry — false positives cost differently for different customer segments.", correct:true},
          {key:"c", text:"Plenty of logged exploration data with propensity logging.", correct:true},
          {key:"d", text:"Binary action space with symmetric cost."},
          {key:"e", text:"The two-stage system is already at near-optimal threshold and plateauing.", correct:true},
          {key:"f", text:"Very limited logged data — fewer than 10,000 decisions per day."},
        ]}
        trap={<>(d) is the case where two-stage is fine. (f) means IPS variance will be too high.</>}
        lens={<>(a) (b) (c) (e) are the favorable cases. Multi-action, context-dependent costs, plenty of data, plateaued baseline.</>}
        stretch={<>What is the bare-minimum data scale at which you would attempt direct policy learning?</>}
      />

      <VIS.TrapProblem
        id="cpl-p7"
        difficulty="hard"
        title="P7 — Adversarial probing — how does direct policy learning make it harder or easier?"
        scenario={<>A fraud ring probes your direct-policy-learning system to learn its action boundaries. Does direct policy learning make probing harder or easier than threshold-based decisioning?</>}
        options={[
          {key:"a", text:"Slightly harder, but only if you build in randomization. A learned policy can be more complex than a single threshold, making boundaries harder to map. BUT a deterministic learned policy is still probable. Combine direct policy learning with stochastic exploration near the boundary, periodic retraining, and ensembling with a rule-based fallback to make probing economically infeasible.", correct:true},
          {key:"b", text:"Easier — neural nets are more predictable."},
          {key:"c", text:"Does not matter — adversaries cannot probe systems."},
          {key:"d", text:"Identical — same single boundary."},
        ]}
        trap={<>(b) (c) (d) are wrong or naive.</>}
        lens={<>(a) is the senior security take. Complexity buys some defense; randomization and ensembling buy more.</>}
        stretch={<>How would you measure whether probing is actually happening in production?</>}
      />

      <VIS.TrapProblem
        id="cpl-p8"
        difficulty="hard"
        title="P8 — Policy class — linear, tree, or neural?"
        scenario={<>You pick the policy class. Options: linear (logistic), gradient-boosted tree, or small neural net. What is the senior default?</>}
        options={[
          {key:"a", text:"Start with gradient-boosted trees for the policy class. They handle heterogeneous tabular fraud features well, they are robust to non-linearities, they are interpretable enough to debug, and they train fast enough to retrain weekly. Move to neural nets only if you have sequential features (transaction history) or large-scale data where neural nets meaningfully out-scale GBDT. Linear is rarely competitive on production fraud features.", correct:true},
          {key:"b", text:"Always start with neural nets."},
          {key:"c", text:"Always start with linear."},
          {key:"d", text:"The policy class does not matter."},
        ]}
        trap={<>(b) is over-engineering. (c) under-fits. (d) is wrong.</>}
        lens={<>(a) is the senior default. GBDT is the right starting point; escalate to neural nets for sequential or scale-driven reasons.</>}
        stretch={<>If the GBDT policy is plateauing, what is the next move — bigger GBDT or switch to neural net?</>}
      />

      <VIS.TrapProblem
        id="cpl-p9"
        difficulty="hard"
        title="P9 — How do you know the new policy is actually better before full rollout?"
        scenario={<>You finish training and want to validate the candidate policy before deploying. What is the right gate?</>}
        options={[
          {key:"a", text:"Multi-step gate: (1) DR-based off-policy evaluation on held-out logged data, with confidence interval. (2) Simulation on a known-effect synthetic harness. (3) Shadow deployment for 1 to 2 weeks (run the new policy alongside the old, log its decisions but do not act on them, compute counterfactual reward). (4) Limited canary at 1 to 5 percent of traffic with tripwires and rollback. (5) Gradual scale-up over weeks with continuous monitoring.", correct:true},
          {key:"b", text:"Just deploy and watch the reward dashboard."},
          {key:"c", text:"Train accuracy is enough."},
          {key:"d", text:"Off-policy IPS estimate alone is enough."},
        ]}
        trap={<>(b) (c) (d) skip the validation chain.</>}
        lens={<>(a) is the senior validation gate. Layered, with each stage cheaper than the next and stricter than the previous.</>}
        stretch={<>Which stage of the gate is most likely to catch an actual problem?</>}
      />

      <VIS.TrapProblem
        id="cpl-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Production design — pick the ingredients for direct policy learning"
        scenario={<>You ship direct policy learning into production for a top-3 payment processor. Pick the ingredients. Select all that apply.</>}
        options={[
          {key:"a", text:"Propensity logging at every production decision.", correct:true},
          {key:"b", text:"Epsilon-greedy or boundary-targeted exploration at 1 to 3 percent with rollback tripwires.", correct:true},
          {key:"c", text:"DR or SNIPS-based off-policy evaluation with confidence intervals.", correct:true},
          {key:"d", text:"GBDT policy class as the starting point; escalate to neural only on demonstrated need.", correct:true},
          {key:"e", text:"Single fixed reward formula that never changes."},
          {key:"f", text:"Rule-based fallback for adversarially flagged inputs.", correct:true},
          {key:"g", text:"Daily retraining with no shadow validation."},
        ]}
        trap={<>(e) is rigid — reward design evolves with business. (g) is reckless without shadow validation.</>}
        lens={<>(a) (b) (c) (d) (f) are the senior ingredients.</>}
        stretch={<>What single metric in week 1 tells you the new policy is paying off?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1503.02834" target="_blank" rel="noopener">
            <strong>Dudik, Erhan, Langford, Li — Doubly Robust Policy Evaluation and Learning</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICML 2011 / extended)</span>
          <br/>The foundational paper for DR policy learning. The bias-variance section is required.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1502.02362" target="_blank" rel="noopener">
            <strong>Swaminathan, Joachims — The Self-Normalized Estimator for Counterfactual Learning</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2015)</span>
          <br/>The SNIPS paper. Read this when vanilla IPS variance is killing your training.
        </li>
        <li>
          <a href="https://hunch.net/~exp_learning/" target="_blank" rel="noopener">
            <strong>John Langford — Counterfactual Learning resources and Vowpal Wabbit</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(library + blog)</span>
          <br/>VW is the longest-running production counterfactual learning library. The README and the docs page are a tour of the practical landscape.
        </li>
        <li>
          <a href="https://github.com/st-tech/zr-obp" target="_blank" rel="noopener">
            <strong>OpenBanditPipeline (ZOZO Research) — Off-Policy Evaluation library</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(repo, docs)</span>
          <br/>Modern Python library specifically for counterfactual policy evaluation and learning. The examples replay real bandit data and show the off-policy gotchas crisply.
        </li>
        <li>
          <a href="https://lilianweng.github.io/posts/2018-02-19-rl-overview/" target="_blank" rel="noopener">
            <strong>Lilian Weng — A Quick Introduction to Reinforcement Learning</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Helpful background. Counterfactual policy learning is contextual-bandits with logged data — start here if RL terminology is unfamiliar.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
