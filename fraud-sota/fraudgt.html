  function Callout({ kind = "info", title, children }) {
    return h("aside", { className: `vis-callout vis-callout-${kind}`, role: "note" },
      title ? h("strong", { className: "vis-callout-title" }, title) : null,
      children);
  }

  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // autoGloss: scan a string for terms in window.__VIS_GLOSSARY (set by exporter
  // before vis-components.js loads). Returns a React children array with each
  // matched term wrapped in the same <span class="vis-term"> the Term component
  // emits. First-mention only per call. Longest-match-first so "candidate
  // generation" beats "candidate" alone.
  let _glossPattern = null;
  let _glossLookup = null;
  function _buildGlossPattern() {
    const g = (typeof window !== "undefined" && window.__VIS_GLOSSARY) || {};
    const keys = Object.keys(g).filter(k => k && !k.startsWith("_"));
    if (!keys.length) { _glossPattern = false; return; }
    // Longest first to favor multi-word terms; escape regex metachars.
    keys.sort((a, b) => b.length - a.length);
    const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    // Word-boundary on each side. Allow internal hyphens/spaces; common ML terms
    // like "DP-SGD", "feature cross", "p99 latency" are all matched naturally.
    _glossPattern = new RegExp("(^|[^A-Za-z0-9_])(" + escaped.join("|") + ")(?=[^A-Za-z0-9_]|$)", "g");
    _glossLookup = g;
  }
  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// FraudGT — sparse graph transformer for large fraud graphs (Lin et al., ICAIF 2024)
// v2 redo — trap problems span A-F axes; every problem hinges on FraudGT's
// specific mechanism (single-shot k-hop sparse attention with relation-typed
// positional encoding) and threads GADBench tuned-GBDT counter-evidence.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · graph transformer for large fraud graphs"
      title="FraudGT — Sparse Graph Transformer"
      subtitle={<>Replaces stacked <VIS.Term def="The standard graph-neural-net update rule: each node aggregates feature vectors from its neighbors, transforms, and writes back. Stacking L layers gives an L-hop receptive field.">message-passing</VIS.Term> with single-shot sparse attention over a k-hop subgraph plus relation-typed <VIS.Term def="Token features that encode where a token sits relative to the center — here, hop-distance plus the relation type along the path.">positional encoding</VIS.Term>. Avoids MPNN over-smoothing at the depth needed for multi-hop <VIS.Term def="Moving illicit funds through a chain of accounts so the trail is obscured. Detecting it requires reasoning over 4+ hop paths in the transaction graph.">laundering</VIS.Term>.</>}
      byline={[
        {label: "Paper", value: "Lin et al., ICAIF 2024"},
        {label: "Year", value: "2024"},
        {label: "Domain", value: "GNN fraud detection (scale)"},
      ]}/>

    <VIS.TLDR>
      <VIS.Term def="Message-Passing Neural Network. Family of GNNs where each layer aggregates from neighbors; L stacked layers gives an L-hop receptive field but causes representations to converge with depth.">MPNN</VIS.Term>-style fraud detectors (<VIS.Term def="Inductive GNN: each node aggregates features from sampled neighbors; works on unseen nodes (unlike transductive GCN).">GraphSAGE</VIS.Term>, <VIS.Term def="Graph Attention Network. Per-edge attention weights over 1-hop neighbors at each layer; stacks L layers to reach L-hop context.">GAT</VIS.Term>, <VIS.Term def="Camouflage-Resistant GNN for fraud. Adds a reinforcement-learning neighbor selector to filter out fraudsters that disguise themselves with benign neighbors.">CARE-GNN</VIS.Term>, <VIS.Term def="Pick-and-Choose GNN. Imbalance-aware fraud GNN that samples neighbors to balance the per-class density before aggregation.">PC-GNN</VIS.Term>) <VIS.Term def="A pathology of stacked message-passing where deeper layers cause node representations to converge across the graph — by depth 4 or 5, all nodes look similar and the fraud signal is lost.">over-smooth</VIS.Term> at the depth (4-6) needed for multi-hop laundering rings. Classic <VIS.Term def="Graph transformer (Ying et al., NeurIPS 2021) using full O(N^2) attention with shortest-path-based positional encoding. Strong on small molecule graphs; infeasible at fraud-graph scale.">Graphormer</VIS.Term> uses <VIS.Term def="Attention over every (i,j) pair in the input. Cost is quadratic in N; infeasible past ~100k nodes on a single GPU.">O(N^2) full attention</VIS.Term> and doesn't scale. FraudGT uses a <VIS.Term def="Attention restricted to (i, j) pairs that lie within a k-hop subgraph around the center — keeps the cost manageable at scale.">sparse attention</VIS.Term> over the <VIS.Term def="The subgraph induced by all nodes within k hops of a center node. Materialized per scoring request in FraudGT.">k-hop subgraph</VIS.Term> with <VIS.Term def="Token positional features that encode both the hop-distance and the relation type connecting the center to the token's source node.">relation-typed positional encoding</VIS.Term>. Single pass replaces stacked MP, no over-smoothing. Under <VIS.Term def="Graph Anomaly Detection Benchmark (Tang et al., NeurIPS 2024). Fair-eval protocol that exposes tuned-GBDT-with-graph-motifs as a strong baseline against transformer-based fraud GNNs.">GADBench</VIS.Term> fair eval, a tuned <VIS.Term def="Microsoft's gradient-boosted decision tree library. Histogram-based, fast; the default tabular-fraud baseline.">LightGBM</VIS.Term> with k-hop <VIS.Term def="Hand-crafted features summarizing local subgraph structure — triangle counts, 4-cycle counts, fraud-density at hop k per relation. Cheap and strong on small graphs.">motif features</VIS.Term> matches FraudGT on small graphs but cannot keep up on very-large <VIS.Term def="Graph with multiple node types or multiple edge (relation) types — e.g. user-card-merchant transactions across 4 relation types.">heterogeneous</VIS.Term> ones. Source: <a href="https://arxiv.org/abs/2402.16494" target="_blank" rel="noopener">arXiv:2402.16494</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        For each center node v, FraudGT <VIS.Term def="Fetches all nodes and edges within k hops of the center and assembles them into a single subgraph object for input.">materializes</VIS.Term> its k-hop subgraph; <VIS.Term def="Treat each subgraph node as one input token to the transformer, attaching its feature vector plus positional encodings.">tokenizes</VIS.Term> each subgraph node with (node <VIS.Term def="Dense vector representation of a discrete item (word, user, product). Learned so that similar items have similar vectors.">embedding</VIS.Term> + relation-typed positional encoding + <VIS.Term def="Positional feature encoding the number of hops a token's source node sits from the center node.">hop-distance encoding</VIS.Term>); applies ONE sparse <VIS.Term def="Transformer attention split across H independent heads, each computing its own attention map; outputs concatenated. Lets different heads specialize.">multi-head attention</VIS.Term> layer restricted to within-subgraph pairs; <VIS.Term def="Selecting the center token's final hidden state (after attention) as the node's representation, fed to the classification head.">reads out</VIS.Term> the center's final representation.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  V["Center v"]
  V --> S["Materialize k-hop subgraph (Sv)"]
  S --> T["Tokenize each u in Sv:\\n  feature + relation PE + hop-distance PE"]
  T --> A["Single sparse multi-head attention\\n(restricted to within-Sv pairs)"]
  A --> R["Readout center token"]
  R --> O["v's representation"]
  style A fill:#dbeafe,stroke:#1e40af,stroke-width:2px
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — How it differs from MPNN, Graphormer, GAGA">
      <p>
        <strong>MPNN (GraphSAGE, GAT, CARE-GNN, PC-GNN).</strong> Stacks L layers of message passing. Beyond L=3, over-smoothing dominates: representations converge across the graph and the fraud signal is lost. To catch 5-hop <VIS.Term def="A directed cycle of accounts that recycles funds among themselves to obscure origin. Detection requires reasoning over the full cycle, not local neighborhoods.">laundering rings</VIS.Term>, MPNN needs depth 5 — which over-smooths.
      </p>
      <p>
        <strong>Graphormer / classic graph transformer.</strong> Full O(N^2) attention with <VIS.Term def="Positional feature based on the shortest path distance between every (i,j) pair in the full graph. Cheap on small molecule graphs; intractable to precompute on fraud-scale graphs.">shortest-path positional encoding</VIS.Term>. Infeasible at 10M+ edge fraud graphs.
      </p>
      <p>
        <strong><VIS.Term def="Group AggregAtion. Transformer-based fraud detector (Wang et al., WWW 2023) that builds tokens from grouped labeled neighbors per (hop, class). Strong but requires labels at inference.">GAGA</VIS.Term> (sibling).</strong> Aggregates labeled-neighbor groups into a small fixed-size token sequence; attention is over (hop, class) groups. FraudGT keeps per-node tokens within a k-hop subgraph and avoids label dependency. Different tradeoffs: GAGA needs labels at <VIS.Term def="The time when the model scores a new event (versus train time). FraudGT's k-hop materialization happens here per request.">inference</VIS.Term>; FraudGT needs subgraph materialization.
      </p>
      <p>
        <strong>GADBench-tuned <VIS.Term def="Gradient-Boosted Decision Trees. Tree ensemble (LightGBM, XGBoost, CatBoost); the dominant tabular fraud baseline.">GBDT</VIS.Term>.</strong> LightGBM with k-hop motif features (triangle counts, 4-cycles, fraud-density-at-hop-k per relation) is a strong baseline. On small/mid graphs it matches FraudGT. On very-large heterogeneous graphs the motif feature space explodes <VIS.Term def="Growth that scales with all pairs/triples/k-tuples of base features. For motif features, the count of distinct motifs grows polynomially or exponentially in graph density and k.">combinatorially</VIS.Term>, and FraudGT's attention encodes the same patterns more parsimoniously. The senior question: which regime is your graph in?
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick it">
      <p>
        Pick FraudGT when (a) large heterogeneous graph (more than 1M edges), (b) multi-hop reasoning needed (laundering rings 4+ hops deep), (c) MPNN over-smoothing already observed (depth-3 ≈ depth-1 in val metric), (d) <VIS.Term def="The maximum p99 inference time the product surface tolerates. Fraud scoring is typically gated at 20-30ms p99.">latency budget</VIS.Term> allows materializing k-hop subgraphs at <VIS.Term def="Time when the model is invoked on a live request, versus offline training or batch scoring.">serving</VIS.Term>, (e) you've verified the motif-feature LightGBM does NOT close the gap.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  D["Fraud surface"]
  D --> Q1{"Need depth >= 4 hops?"}
  Q1 -->|No| MP["MPNN sibling (CARE/PC-GNN)"]
  Q1 -->|Yes| Q2{"MPNN over-smooths at depth 3?"}
  Q2 -->|No| MPNN2["Tune MPNN deeper"]
  Q2 -->|Yes| Q3{"Beats GBDT + k-hop motifs?"}
  Q3 -->|No| GBDT["Ship GBDT"]
  Q3 -->|Yes| FGT["FraudGT"]
  style FGT fill:#dcfce7,stroke:#16a34a
  style GBDT fill:#fef3c7,stroke:#d97706
      `} />
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations & gotchas">
      <VIS.Callout kind="gotcha" title="Subgraph materialization cost at serving">
        FraudGT requires k-hop neighborhood fetch at inference per scoring request. For dense fraud rings, k-hop subgraphs explode. Production must <VIS.Term def="A hard upper bound on subgraph size; if the materialized k-hop exceeds the cap, the system samples down to fit. Critical FraudGT operational knob.">cap subgraph size</VIS.Term> and randomly sample if exceeded — but sampling within the subgraph reintroduces some of MPNN's <VIS.Term def="Loss of fraud signal that happens when aggregation mixes the (rare) fraud nodes with many benign ones, washing the signal toward the prior.">signal-dilution</VIS.Term> problem.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="The GADBench reckoning (specific to FraudGT)">
        On small/mid graphs (<VIS.Term def="Public fraud-detection benchmark of Yelp reviews; ~45k nodes, single-relation. Small enough that MPNN over-smoothing isn't the bottleneck.">YelpChi</VIS.Term>, <VIS.Term def="Public fraud-detection benchmark from Tencent: ~5M nodes, multi-relation social graph. Mid-scale FraudGT regime.">T-Social</VIS.Term>), a LightGBM with k-hop motif features (triangle counts, 4-cycle counts, fraud-density at hop k per relation) closes most of FraudGT's gap. FraudGT's edge is concentrated on very-large heterogeneous graphs where motif feature enumeration explodes combinatorially — the regime the paper actually targets but the public benchmarks understate.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Identity & comparison</h3>

          {key:"b", text:"They are the same model."},
          {key:"c", text:"FraudGT does not use attention."},

          {key:"d", text:"FraudGT does not use attention."},

        trap={<>(d) is false.</>}

        id="fgt-e2"
        difficulty="hard"
        title="E2 — Friday: latency cliff on dense graph"
        scenario={<>Friday: FraudGT p99 latency goes from 25ms to 95ms over 2 hours. Subgraph size logs show average k-hop subgraph size grew from 1200 to 8400 nodes. Diagnosis?</>}
        options={[
          {key:"a", text:"A new fraud ring is forming (high-degree fraud activity), exploding k-hop subgraph sizes. Mitigation: temporarily lower the subgraph cap; alert the AML investigators; expect the latency to recover after the ring is taken down or after the cap stabilizes the materialization.", correct:true},
          {key:"b", text:"Roll back."},
          {key:"c", text:"Page DevOps."},
          {key:"d", text:"Add more attention heads."},
        ]}
        trap={<>(b), (c), (d) miss the mechanism.</>}
        lens={<>Subgraph-size growth is a leading indicator of active fraud activity. FraudGT's latency is a fraud-activity proxy.</>}
        stretch={<>Could subgraph-size become an upstream fraud feature itself?</>}
      />

      {/* axis: E3 */}
      <VIS.TrapProblem
        id="fgt-e3"
        difficulty="hard"
        title="E3 — Eval-protocol audit"
        scenario={<>Which findings invalidate a FraudGT report card?</>}
        multiSelect
        options={[
          {key:"a", text:"Eval did not include a LightGBM with k-hop motif features (triangle counts, 4-cycle counts, fraud-density at hop k) as a baseline.", correct:true},
          {key:"b", text:"Random split on temporal graph leaked future edges.", correct:true},
          {key:"c", text:"Baseline MPNN was at depth 3 (already over-smoothed) — sandbagging the baseline.", correct:true},
          {key:"d", text:"Transformers are state of the art so eval doesn't matter."},
        ]}
        trap={<>(d) is wrong by construction.</>}
        lens={<>Three audit failures: missing motif-feature baseline, random splits, sandbagged MPNN depth. Each is fixable.</>}
        stretch={<>What's the right MPNN-baseline depth for fair comparison?</>}
      />

      {/* axis: E4 */}
      <VIS.TrapProblem
        id="fgt-e4"
        difficulty="medium"
        title="E4 — Rollout sequence: MPNN to FraudGT"
        scenario={<>Order: (i) full ramp, (ii) shadow + subgraph-cap calibration, (iii) hybrid with MPNN score, (iv) traffic ramp.</>}
        options={[
          {key:"a", text:"ii → iii → iv → i. The subgraph-cap calibration step is FraudGT-specific: you need to verify worst-case latency before traffic. Hybrid bounds risk during ramp.", correct:true},
          {key:"b", text:"i → ii → iii → iv."},
          {key:"c", text:"Direct cutover."},
          {key:"d", text:"iv → i."},
        ]}
        trap={<>(b), (c), (d) skip the cap-calibration step.</>}
        lens={<>The subgraph-cap calibration is FraudGT-specific. Without it, the ramp can hit OOM on the first dense fraud event.</>}
        stretch={<>What's the offline-load-testing protocol you would use?</>}
      />

      {/* axis: E5 */}
      <VIS.TrapProblem
        id="fgt-e5"
        difficulty="medium"
        title="E5 — Reproducibility"
        scenario={<>Which FraudGT reproducibility issues are widely known?</>}
        multiSelect
        options={[
          {key:"a", text:"Relation positional encoding details (the exact RoPE-style formula) are non-trivial to reimplement from the paper.", correct:true},
          {key:"b", text:"Subgraph caps used in the paper are not always reported per dataset.", correct:true},
          {key:"c", text:"Eval did not always include the GBDT motif-feature baseline.", correct:true},
          {key:"d", text:"FraudGT cannot run on GPUs."},
        ]}
        trap={<>(d) is false.</>}
        lens={<>All three issues are common to graph transformer papers. The motif-baseline omission is the GADBench-style failure.</>}
        stretch={<>What's your reimplementation checklist?</>}
      />

      {/* axis: E6 */}
      <VIS.TrapProblem
        id="fgt-e6"
        difficulty="hard"
        title="E6 — Eval contamination"
        scenario={<>Which contamination paths affect FraudGT's claims?</>}
        multiSelect
        options={[
          {key:"a", text:"Random splits on temporal graphs leak future neighbors into training.", correct:true},
          {key:"b", text:"GBDT baseline was given only basic features (no k-hop motifs), inflating FraudGT's apparent edge.", correct:true},
          {key:"c", text:"MPNN baselines were not tuned for over-smoothing mitigation (no residual / skip connections), sandbagging.", correct:true},
          {key:"d", text:"FraudGT is too new to evaluate."},
        ]}
        trap={<>(d) is wrong.</>}
        lens={<>Three contamination paths: temporal-split protocol, GBDT feature sandbagging, MPNN-baseline sandbagging. All three are common in transformer-fraud papers.</>}
        stretch={<>Which contamination is hardest to detect in published work?</>}
      />

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>F. Failure modes & edge cases</h3>

      {/* axis: F1 */}
      <VIS.TrapProblem
        id="fgt-f1"
        difficulty="hard"
        title="F1 — Smallest input that breaks FraudGT"
        scenario={<>Construct the smallest graph where FraudGT provably reduces to GAT.</>}
        options={[
          {key:"a", text:"A 1-hop graph (no multi-hop reasoning needed) with a single relation — FraudGT's k-hop attention reduces to 1-hop attention, the relation-PE has nothing to encode, and the result is GAT with hop-distance PE that always equals 1 (i.e. constant).", correct:true},
          {key:"b", text:"Any 1-node graph."},
          {key:"c", text:"Any tree."},
          {key:"d", text:"A bipartite graph."},
        ]}
        trap={<>(b) is degenerate. (c), (d) miss the mechanism.</>}
        lens={<>FraudGT's mechanism breaks at "k=1 + single relation" — both contributions become trivial.</>}
        stretch={<>What is the minimum k at which FraudGT outperforms GAT?</>}
      />

      {/* axis: F2 */}
      <VIS.TrapProblem
        id="fgt-f2"
        difficulty="hard"
        title="F2 — Adversarial: pad subgraph with noise"
        scenario={<>Design an attack that exploits FraudGT's k-hop subgraph materialization.</>}
        options={[
          {key:"a", text:"Connect the fraud node to many benign 'noise' nodes (cheap to fake — disposable accounts, low-value transactions). The fraud node's k-hop subgraph balloons with benign noise; sparse attention dilutes the fraud signal across many benign tokens; subgraph cap forces sampling, reintroducing aggregation noise. The fraud node looks like a high-degree but mostly-benign hub.", correct:true},
          {key:"b", text:"Feature perturbation."},
          {key:"c", text:"No attack possible."},
          {key:"d", text:"Increase fraud rate."},
        ]}
        trap={<>(b), (c), (d) miss FraudGT's attack surface.</>}
        lens={<>Subgraph-padding is FraudGT's specific attack surface. Defense: subgraph importance sampling (use degree-aware sampling, not random), per-edge confidence scoring.</>}
        stretch={<>How would you defend with importance-weighted attention?</>}
      />

      {/* axis: F4 */}
      <VIS.TrapProblem
        id="fgt-f4"
        difficulty="medium"
        title="F4 — Paper-admitted limitation"
        scenario={<>Which limitation does the FraudGT paper itself acknowledge?</>}
        options={[
          {key:"a", text:"Memory blowup at k > 3 on dense graphs; subgraph cap is necessary in practice.", correct:true},
          {key:"b", text:"FraudGT works perfectly at any scale."},
          {key:"c", text:"Only works on GPUs."},
          {key:"d", text:"Cannot be deployed."},
        ]}
        trap={<>(b), (c), (d) are wrong.</>}
        lens={<>The paper is honest about the dense-graph memory blowup. Knowing this signals careful reading.</>}
        stretch={<>What did the paper NOT predict that GADBench-style benchmarks would expose?</>}
      />

      {/* axis: F5 */}
      <VIS.TrapProblem
        id="fgt-f5"
        difficulty="hard"
        title="F5 — The GADBench critique"
        scenario={<>What does GADBench-style fair eval find about FraudGT?</>}
        multiSelect
        options={[
          {key:"a", text:"On small-mid graphs (YelpChi, T-Social) a LightGBM with k-hop motif features closes most of FraudGT's gap.", correct:true},
          {key:"b", text:"On large heterogeneous graphs (Amazon, T-Finance) FraudGT retains a real edge — motif features explode combinatorially and the GBDT loses its handle.", correct:true},
          {key:"c", text:"FraudGT's over-smoothing-avoidance is real but contributes only part of the gain; relation-PE contributes the rest.", correct:true},
          {key:"d", text:"FraudGT loses everywhere."},
        ]}
        trap={<>(d) overstates the GADBench finding.</>}
        lens={<>The GADBench finding for FraudGT is regime-specific: GBDT closes the gap on small graphs, FraudGT wins on very-large heterogeneous ones. Senior MLEs deploy accordingly.</>}
        stretch={<>What's the threshold graph size at which the regimes flip?</>}
      />

      {/* axis: F5b */}
      <VIS.TrapProblem
        id="fgt-f5b"
        difficulty="hard"
        title="F5b — The interview gold question"
        scenario={<>Interviewer: "You championed FraudGT. Walk me through the ablation that proves the win is from the architecture, not from a sandbagged baseline."</>}
        options={[
          {key:"a", text:"Built four baselines under temporal-split AUPRC with equal hyperparameter budget: (i) LightGBM with k-hop motif features (triangle, 4-cycle, fraud-density per relation per hop), (ii) residual MPNN with skip connections at depth 5 (mitigates over-smoothing), (iii) GAT at depth 3, (iv) FraudGT. Also measured pairwise representation cosine for (ii) to confirm over-smoothing was mitigated. FraudGT beat (i) by 2.3 AUPRC and (ii) by 1.1 — the win is real on this dense heterogeneous graph but the residual MPNN closed much of the gap, so the win is mostly relation-PE + cap, not 'transformer'.", correct:true},
          {key:"b", text:"Compared FraudGT to depth-3 GraphSAGE; FraudGT won by 4 points; shipped."},
          {key:"c", text:"Transformers always win — no ablation needed."},
          {key:"d", text:"Compared FraudGT to a GBDT with only basic features."},
        ]}
        trap={<>(b), (c), (d) skip rigorous ablation.</>}
        lens={<>The right answer (i) builds the motif-feature GBDT baseline, (ii) builds a residual-MPNN baseline that mitigates over-smoothing, (iii) measures over-smoothing diagnostic, (iv) decomposes the win source. This is the senior bar for transformer-fraud claims.</>}
        stretch={<>If the residual MPNN tied FraudGT, would you ship FraudGT? Defend.</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/2402.16494" target="_blank" rel="noopener"><strong>Lin et al. — FraudGT</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICAIF 2024)</span>
          <br/>The original. Section 3 (sparse attention), Section 4 (relation PE), Section 5 (scaling).
        </li>
        <li>
          <a href="https://arxiv.org/abs/2306.12251" target="_blank" rel="noopener"><strong>Tang et al. — GADBench</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2024)</span>
          <br/>The fair-eval protocol; the motif-feature GBDT baseline is the right comparator.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2106.05234" target="_blank" rel="noopener"><strong>Ying et al. — Graphormer</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2021)</span>
          <br/>The full-attention graph transformer; the O(N^2) baseline FraudGT scales away from.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2302.10407" target="_blank" rel="noopener"><strong>Wang et al. — GAGA</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, WWW 2023)</span>
          <br/>The label-token-based transformer sibling — different scaling tradeoff.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
