<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// SNGP — Fraud SOTA · Bayesian / uncertainty methods.
// CONCEPT ANCHOR (B3): SPECTRAL-NORMALIZED HIDDEN LAYERS + LAST-LAYER GAUSSIAN-PROCESS
// (RFF-Laplace approx). Distance-aware uncertainty INTRINSIC to a SINGLE FORWARD PASS
// of a SINGLE TRAINED MODEL. Liu et al. NeurIPS 2020. NOT ensembles (M models); NOT
// MC dropout (M masks); NOT softmax temperature. Two architectural changes — spectral
// norm on the encoder gives bi-Lipschitz feature map; RFF-GP on the head gives a
// variance that GROWS with distance to training features.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Uncertainty methods"
      title="SNGP — Spectral-Normalized Gaussian Process layers"
      subtitle="Distance-aware uncertainty in a SINGLE forward pass: spectral-normalized encoder makes feature distances reflect input distances; a last-layer Gaussian process head (RFF + Laplace) gives a variance that grows for inputs far from training. One model, one pass — NOT M ensembles, NOT M dropout masks."
      byline={[
        {label:"Paper", value:"Liu, Lin, Padhy, Tran, Bedrax-Weiss, Lakshminarayanan — Simple and Principled Uncertainty Estimation with Deterministic Deep Learning via Distance Awareness (NeurIPS 2020)"},
        {label:"L3", value:"Spectral norm (bi-Lipschitz) + RFF-Laplace Gaussian-process head; distance-aware OOD."},
        {label:"Anchor", value:"Two architectural changes; single deterministic forward pass; predictive variance large when feature distance to training set is large."},
      ]}/>

    <VIS.TLDR>
      A standard softmax classifier is{" "}
      <VIS.Term def="Property of standard softmax/sigmoid networks: their output probability does not encode 'how far is this input from anything I have seen'. Two inputs equally distant from the training set can get arbitrarily different confidences if they happen to land on different sides of the decision boundary.">distance-unaware</VIS.Term>{" "}
      — on a novel fraud MO (modus operandi) it will produce a confidently-wrong probability. SNGP (Liu et al. NeurIPS 2020) makes a deterministic deep classifier{" "}
      <VIS.Term def="Distance-aware: predictive variance grows monotonically with distance between the test feature and training features. Inputs far from training automatically receive low confidence.">distance-aware</VIS.Term>{" "}
      with TWO architectural changes — (1) apply{" "}
      <VIS.Term def="Spectral normalization: divide each weight matrix by an estimate of its largest singular value (computed via power iteration) so the layer's spectral norm is bounded by 1. The composed network becomes approximately bi-Lipschitz — small input changes give bounded feature changes and vice versa.">spectral normalization</VIS.Term>{" "}
      to every hidden layer so the encoder is approximately{" "}
      <VIS.Term def="Bi-Lipschitz: a mapping f where there exist constants L_lo, L_hi with L_lo * ||x-y|| <= ||f(x)-f(y)|| <= L_hi * ||x-y||. Distances are preserved up to bounded distortion in both directions. Crucial for distance-awareness: feature-space distance reflects input-space distance.">bi-Lipschitz</VIS.Term>{" "}
      (preserves distances), and (2) replace the final dense+softmax with a{" "}
      <VIS.Term def="Gaussian process: a non-parametric Bayesian model over functions defined by a kernel. Predictive mean = kernel-weighted training labels; predictive variance large when test feature is far (in kernel sense) from training features.">last-layer Gaussian process</VIS.Term>{" "}
      approximated via{" "}
      <VIS.Term def="Random Fourier Features (Rahimi & Recht 2007): approximate a shift-invariant kernel by an explicit finite-dimensional feature map phi(x) = sqrt(2/D) cos(W x + b) with W, b sampled randomly. Lets the GP scale linearly in number of training points.">random Fourier features</VIS.Term>{" "}
      and a{" "}
      <VIS.Term def="Laplace approximation: replace the intractable posterior by a Gaussian centered at the MAP with covariance equal to the inverse Hessian. Cheap, closed-form, and gives a usable predictive variance for the GP head.">Laplace-approximated</VIS.Term>{" "}
      posterior on the output weights. Result: a SINGLE deterministic forward pass produces both a class probability AND a calibrated, distance-aware predictive variance. NOT a deep ensemble (single model, no independent retraining). NOT MC dropout (single deterministic pass, no stochastic masks). NOT temperature scaling (the spectral-norm + GP changes the model itself, not just a scalar on the logits). On novel fraud MOs, SNGP variance grows because the encoded feature is far from any training feature; standard softmax cannot do this.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — two architectural changes">
      <p>
        Concretely SNGP rewrites a normal deep classifier in two places. Everything between input and output stays the same conceptually (any encoder — MLP, transformer, ResNet); the changes are surgical.
      </p>
      <ol>
        <li><strong>Spectral-normalize every hidden weight matrix.</strong> Run one or two iterations of{" "}
          <VIS.Term def="Power iteration: an iterative method that estimates the largest singular value (and corresponding singular vectors) of a matrix. One or two iterations per training step give a stable estimate cheaply.">power iteration</VIS.Term>{" "}
          per training step to estimate the largest singular value sigma_max(W); replace W by c * W / max(sigma_max(W), c) for a target norm c (typically c in [0.95, 6]). This bounds the Lipschitz constant of each layer and — composed — gives an approximately bi-Lipschitz encoder. Input-space distances are preserved (up to bounded distortion) in feature space.</li>
        <li><strong>Replace final dense+softmax with a last-layer Gaussian process.</strong> The GP uses{" "}
          <VIS.Term def="A finite-dimensional approximation of the RBF (squared-exponential) kernel via random Fourier features. Lets the GP be expressed as a linear model in the random-feature space — closed-form Laplace posterior.">RFF approximation of the RBF kernel</VIS.Term>{" "}
          to give an explicit feature map of size D (typically 1024). On top, a logistic likelihood is trained; at inference, the Laplace approximation gives both a predictive mean (used for the class probability) AND a closed-form predictive variance (the distance-aware uncertainty).</li>
      </ol>

      <VIS.Equation display tex={`\\hat{p}(y\\mid x) \\;\\approx\\; \\text{softmax}\\!\\Big(\\Phi(x)^{\\!\\top}\\beta \\;-\\; \\tfrac{1}{2}\\,\\Phi(x)^{\\!\\top}\\Sigma\\,\\Phi(x)\\Big)`} />
      <p>
        Here Phi(x) is the RFF-encoded representation of the spectral-norm encoder's output; beta is the GP posterior-mean; Sigma is the GP posterior-covariance (from Laplace). The mean-field correction term (-1/2 Phi^T Sigma Phi) is the trick that makes the softmax output reflect the GP variance — large variance shrinks the logits toward 0, lowering confidence.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  X["Transaction features x"]
  X --> E["Encoder with spectral norm at every layer"]
  E --> H["Hidden feature h(x)"]
  H --> RFF["Random Fourier feature map Phi(x)"]
  RFF --> GP["Last-layer GP with Laplace approx posterior beta and Sigma"]
  GP --> M["Predictive mean for class prob"]
  GP --> V["Predictive variance distance aware"]
  V --> D{"Variance high"}
  D -->|Yes| OOD["Route to human review or escalate"]
  D -->|No| AUTO["Auto decide"]
  style E fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style GP fill:#fee2e2,stroke:#dc2626,stroke-width:2px
      `} />
      <p>Red boxes mark the two SNGP-specific changes. The rest is a standard deep classifier.</p>

      <p style={{marginTop:16}}>
        <strong>Why this works.</strong> Spectral norm prevents the encoder from arbitrarily collapsing or stretching distances; the GP's RBF kernel has the property that k(x, x') decays exponentially in feature-space distance. A test point whose Phi(x) is far from all training Phi(x_i) gets large posterior variance — the GP has no nearby anchor to interpolate from. Putting these together: input-space far → feature-space far (spectral norm) → GP variance large (RBF/Laplace) → low predictive confidence. A standard softmax network breaks this chain at step 2: without spectral norm, the encoder can map any far-away input to a feature close to a training cluster, and softmax will report high confidence.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="SNGP vs alternative uncertainty methods">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>SNGP</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Deep ensemble</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>MC dropout</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Softmax + Temp</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Forward passes per input</td><td style={{padding:"6px 10px"}}><strong>1</strong></td><td style={{padding:"6px 10px"}}>M (typically 5-10)</td><td style={{padding:"6px 10px"}}>M (typically 10-30)</td><td style={{padding:"6px 10px"}}>1</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Training cost</td><td style={{padding:"6px 10px"}}>1x</td><td style={{padding:"6px 10px"}}>Mx</td><td style={{padding:"6px 10px"}}>1x</td><td style={{padding:"6px 10px"}}>1x</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Distance-aware on OOD</td><td style={{padding:"6px 10px"}}>YES (by construction)</td><td style={{padding:"6px 10px"}}>Partial (multi-mode disagreement)</td><td style={{padding:"6px 10px"}}>WEAK (unimodal q)</td><td style={{padding:"6px 10px"}}>No</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Architecture change</td><td style={{padding:"6px 10px"}}>Spectral norm + GP head</td><td style={{padding:"6px 10px"}}>None</td><td style={{padding:"6px 10px"}}>None</td><td style={{padding:"6px 10px"}}>None</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Mechanism</td><td style={{padding:"6px 10px"}}>Deterministic; bi-Lipschitz + GP variance</td><td style={{padding:"6px 10px"}}>M independent models; disagreement = epistemic</td><td style={{padding:"6px 10px"}}>Bernoulli mask = variational q</td><td style={{padding:"6px 10px"}}>Scalar logit rescale</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569", marginBottom:16}}>Every problem turns on the SPECTRAL-NORM + GP-HEAD + SINGLE-FORWARD-PASS mechanism and the distance-aware-via-architecture property. Strip the spectral-norm constraint OR the GP head and the answer collapses to a softmax classifier with no OOD signal.</p>

      <VIS.TrapProblem id="sngp-p1" difficulty="hard" title="P1 — VP Risk: 'Why not just run our existing softmax model and threshold low-confidence outputs?'"
        scenario={<><em>Discriminating insight: softmax is distance-UNAWARE — a novel-MO input can land arbitrarily close to a training cluster in feature space (the encoder is free to map it there) and get a HIGH-confidence wrong answer. Thresholding on softmax confidence does not catch this; the model has no mechanism to flag &quot;far from training&quot;. SNGP fixes the mechanism, not the threshold.</em><br/><br/>Pitch the difference.</>}
        options={[
          {key:"a", text:"They are equivalent."},
          {key:"b", text:"Softmax confidence does NOT correlate with distance to training data. A standard deep encoder is free to map ANY input — including a novel-MO fraud transaction — into a region of feature space arbitrarily close to a training cluster; softmax then reports a high probability for whatever class that cluster belongs to. There is no architectural mechanism in a standard classifier that forces 'far from training inputs' to map to 'far from training features', and no mechanism that forces softmax to lower confidence when this happens. Thresholding low-confidence outputs only catches inputs that happen to land near the decision boundary — completely different signal from 'far from training set'. SNGP introduces TWO architectural changes that together CREATE the distance-confidence link: (1) spectral norm makes the encoder approximately bi-Lipschitz so feature distance reflects input distance; (2) the GP head's predictive variance is LARGE when the encoded feature is far from training features (RBF kernel decays exponentially with distance). One deterministic forward pass yields a variance that grows with novelty. This is the mechanism softmax-threshold cannot replicate.", correct:true},
          {key:"c", text:"Just lower the threshold."},
          {key:"d", text:"Use weight decay instead."},
        ]}
        trap={<>(a)(c)(d) miss that softmax has no mechanism for distance-awareness.</>}
        lens={<>Softmax: distance-unaware. SNGP: bi-Lipschitz encoder + GP head = mechanism that links input-distance to confidence.</>}
        stretch={<>What is the exact failure of softmax-threshold on a novel input near a training cluster?</>}
      />

      <VIS.TrapProblem id="sngp-p2" difficulty="hard" title="P2 — State the SNGP architectural recipe in one paragraph."
        scenario={<><em>Discriminating insight: TWO changes — spectral-norm every hidden layer (bi-Lipschitz encoder) AND replace dense+softmax with RFF-Laplace GP head. Single deterministic forward pass. NOT &quot;wrap softmax with GP&quot; — the spectral-norm step is essential.</em><br/><br/>State the recipe.</>}
        options={[
          {key:"a", text:"Add dropout at inference."},
          {key:"b", text:"SNGP (Liu et al. NeurIPS 2020) is TWO architectural modifications applied to a standard deep classifier. (1) ENCODER: apply spectral normalization to every weight matrix of every hidden layer — use power iteration during training to estimate sigma_max(W), then rescale W to bound its spectral norm by a target c. This makes the composed encoder approximately bi-Lipschitz: distances between inputs in feature space stay within a bounded factor of distances in input space. (2) HEAD: replace the final dense + softmax with a last-layer Gaussian process, approximated by Random Fourier Features (sample W, b once; phi(x) = sqrt(2/D) cos(W h(x) + b)) and a Laplace approximation of the posterior on the output weights. The GP head produces a closed-form predictive mean (used as the logit) AND a predictive variance (used as the uncertainty). Single deterministic forward pass at inference — no Monte-Carlo sampling, no ensemble. The spectral-norm step is essential: without it, the encoder can map far-away inputs to features near training, defeating the GP's distance-awareness.", correct:true},
          {key:"c", text:"Train M copies independently."},
          {key:"d", text:"Just use a Gaussian process."},
        ]}
        trap={<>(a) MC dropout; (c) ensembles; (d) misses the spectral-norm.</>}
        lens={<>Spectral norm on encoder + RFF-Laplace GP on head. Single pass. Distance-aware by construction.</>}
        stretch={<>What does the Laplace approximation give us closed-form?</>}
      />

      <VIS.TrapProblem id="sngp-p3" difficulty="hard" title="P3 — Why does spectral-norm alone not give distance-awareness?"
        scenario={<><em>Discriminating insight: spectral-norm controls the encoder (input distance → feature distance) but the HEAD must also turn feature-distance into uncertainty. Softmax has no mechanism for that; GP does (RBF kernel decays with distance). Both changes are needed.</em><br/><br/>Both pieces.</>}
        options={[
          {key:"a", text:"It does."},
          {key:"b", text:"Spectral normalization gives you the FIRST half: input-space distances are preserved as feature-space distances (bi-Lipschitz). But for confidence to FALL with distance, the HEAD must turn 'feature far from training features' into 'low confidence'. A standard softmax head has no such mechanism — the dot product Phi(x)^T w can be large or small for arbitrary Phi(x), independent of distance to training Phi(x_i). The GP head with an RBF (or RFF-approximated RBF) kernel has the property: k(Phi(x), Phi(x_i)) decays exponentially in ||Phi(x) - Phi(x_i)||. Far-from-training features get tiny kernel weights, low posterior mean, AND large posterior variance. So both pieces are needed: spectral norm to make 'far' meaningful in feature space; GP head to translate 'far' into 'uncertain'. Drop either and SNGP loses distance-awareness — drop spectral norm and the encoder can lie about distance; drop the GP and the head has no variance.", correct:true},
          {key:"c", text:"Use temperature scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the two-piece requirement.</>}
        lens={<>Spectral norm: input-distance to feature-distance. GP head: feature-distance to uncertainty. Both needed.</>}
        stretch={<>What if you used cosine similarity head instead of GP?</>}
      />

      <VIS.TrapProblem id="sngp-p4" difficulty="hard" multiSelect title="P4 — Pick TRUE statements about SNGP (4 correct)"
        scenario={<><em>Discriminating insight: single deterministic forward pass; spectral-norm + GP-head; bi-Lipschitz encoder; distance-aware variance; NOT ensembles; NOT MC dropout.</em><br/><br/>Pick TRUE.</>}
        options={[
          {key:"a", text:"Uses a SINGLE deterministic forward pass at inference.", correct:true},
          {key:"b", text:"Applies spectral normalization to every hidden weight matrix.", correct:true},
          {key:"c", text:"Replaces the dense+softmax head with an RFF-approximated Gaussian process.", correct:true},
          {key:"d", text:"Predictive variance grows when the input feature is far from training features.", correct:true},
          {key:"e", text:"Requires M independent trained models at inference."},
          {key:"f", text:"Samples M Bernoulli dropout masks per input."},
        ]}
        trap={<>(e) confuses with ensembles; (f) confuses with MC dropout.</>}
        lens={<>Single pass; spectral norm + GP; distance-aware. NOT ensembles, NOT MC dropout.</>}
        stretch={<>What is the typical RFF dimension D?</>}
      />

      <VIS.TrapProblem id="sngp-p5" difficulty="medium" title="P5 — What is the Laplace approximation doing in SNGP?"
        scenario={<><em>Discriminating insight: the GP posterior for non-Gaussian (e.g., logistic) likelihood is intractable; Laplace approximates it by a Gaussian centered at MAP with covariance from the inverse Hessian. Gives closed-form predictive mean AND variance for the head. NOT used in the encoder.</em><br/><br/>Laplace.</>}
        options={[
          {key:"a", text:"Approximates the data distribution."},
          {key:"b", text:"For classification, the GP posterior over the output weights is intractable because the logistic (or softmax) likelihood is non-Gaussian. The Laplace approximation replaces this intractable posterior by a Gaussian centered at the maximum a posteriori (MAP) estimate of the weights, with covariance equal to the inverse Hessian of the negative log-posterior at the MAP. This gives a closed-form Gaussian posterior on the GP output weights, from which the predictive mean (used as the logit) and the predictive variance (the distance-aware uncertainty) are computed in closed form on each test point. The Laplace approximation is applied ONLY to the GP head's output-weight posterior — not to the encoder or to the random Fourier features (those are fixed once sampled). Alternatives: variational inference for the GP head (more expensive, sometimes more accurate); HMC (much more expensive). SNGP uses Laplace because it is cheap, gives closed-form variance, and integrates with end-to-end training of the encoder via standard backprop.", correct:true},
          {key:"c", text:"Replaces softmax with a Laplace distribution."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the role of Laplace.</>}
        lens={<>Laplace: Gaussian posterior on GP output weights at MAP via inverse Hessian. Closed-form predictive variance.</>}
        stretch={<>Why not use VI for the GP head?</>}
      />

      <VIS.TrapProblem id="sngp-p6" difficulty="hard" title="P6 — Why does the encoder need to be bi-Lipschitz (BOTH directions)?"
        scenario={<><em>Discriminating insight: upper-Lipschitz alone (input close → feature close) is NOT enough — without lower-Lipschitz, the encoder can COLLAPSE distant inputs to close features (feature collapse, like a degenerate encoder mapping everything to a constant). Lower-Lipschitz (input far → feature far) is the critical property for distance-aware OOD; spectral norm + residual structure together give both.</em><br/><br/>Both bounds.</>}
        options={[
          {key:"a", text:"Upper-Lipschitz is enough."},
          {key:"b", text:"Both bounds are necessary. UPPER-LIPSCHITZ alone (||f(x) - f(y)|| <= L_hi ||x - y||) gives a kind of stability — small input changes give bounded feature changes. But it does NOT prevent the encoder from COLLAPSING distant inputs to close features: a degenerate encoder mapping every input to a single point satisfies upper-Lipschitz (constant 0) but destroys all distance information. For SNGP to be distance-aware, the encoder must also be LOWER-LIPSCHITZ (||f(x) - f(y)|| >= L_lo ||x - y||): inputs far apart MUST have features far apart. Spectral normalization with a target norm c slightly less than 1 makes each layer 1-Lipschitz (upper) but not lower-Lipschitz alone. The trick used in SNGP is RESIDUAL connections combined with spectral norm: f(x) = x + g(x) with g spectral-normed; if c < 1 then g is contractive and f is bi-Lipschitz with bounds [1-c, 1+c]. This combination guarantees distance preservation in both directions, which is what makes 'far in input space implies far in feature space' a property the GP head can exploit.", correct:true},
          {key:"c", text:"It is automatic."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the feature-collapse failure mode.</>}
        lens={<>Upper-Lipschitz: stability. Lower-Lipschitz: no feature collapse. Spectral-norm + residual gives both.</>}
        stretch={<>What goes wrong if c > 1 in spectral norm?</>}
      />

      <VIS.TrapProblem id="sngp-p7" difficulty="hard" title="P7 — Concept-specific misattribution: SNGP variance is HIGH on TRAINING data. Cause?"
        scenario={<><em>Discriminating insight (concept-specific): (1) RFF dimension D too small (feature map too coarse, even training points look like &quot;outliers&quot; in RFF space); (2) GP kernel bandwidth set too narrow (no training neighbor is &quot;close&quot;); (3) spectral-norm c too tight (encoder under-capacity, features under-fit); (4) Laplace approx posterior covariance scale mis-set. Concept-specific.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"SNGP-specific causes for high variance on training data: (1) RFF dimension D too small — the RFF map Phi(x) = sqrt(2/D) cos(W x + b) approximates the RBF kernel only as D grows; small D (say, D = 64) gives a coarse, noisy approximation where even training points have high posterior variance. Fix: increase D to 1024-2048. (2) GP kernel bandwidth (RBF length scale) too small — if the length scale is much smaller than typical pairwise feature distances, no training neighbor is 'close' to any test point, and posterior variance is large everywhere. Fix: increase the length scale or learn it. (3) Spectral norm target c set too tight (e.g., c = 0.5) — encoder under-capacity, features are pushed toward a small region of feature space and the GP can't separate clusters; effective training-set 'spread' is tiny relative to RBF kernel. Fix: relax c to 0.95-6.0 per Liu et al. (4) Laplace covariance scale mis-set — the prior precision on the GP output weights, if too small, gives a wide posterior and inflates variance everywhere. Fix: re-tune the prior precision against held-out calibration set.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>D too small / length scale too small / c too tight / prior precision wrong — each SNGP-specific.</>}
        stretch={<>How do you learn the RBF length scale?</>}
      />

      <VIS.TrapProblem id="sngp-p8" difficulty="hard" title="P8 — Compare SNGP to deep ensembles for OOD detection."
        scenario={<><em>Discriminating insight: SNGP gets distance-aware OOD from ARCHITECTURE in one pass; ensembles get it from M-model DISAGREEMENT (multi-modal posterior). Different mechanisms. Empirically SNGP matches small ensembles on OOD-AUROC for tabular fraud at ~1/M the inference cost.</em><br/><br/>Compare.</>}
        options={[
          {key:"a", text:"Identical."},
          {key:"b", text:"DIFFERENT mechanisms, comparable empirical OOD detection. Deep ensembles get OOD signal from M independently-initialized models disagreeing — each model lands in a different basin of the loss landscape; on training-distribution inputs they all agree, on OOD inputs they extrapolate differently and disagree. The signal is BETWEEN-MODEL VARIANCE; cost is Mx training and Mx inference. SNGP gets OOD signal from a SINGLE model's GP head reporting a variance that grows with feature-distance to training set — the signal is WITHIN-MODEL distance-aware variance; cost is 1x training, 1x inference, with the architectural changes. Empirically (Liu et al. 2020 and follow-ups): on tabular and image OOD benchmarks SNGP matches small (M=5) deep ensembles on OOD-AUROC while being 5x cheaper at inference. Trade-off: ensembles are more flexible (work for any architecture without modification); SNGP requires spectral-norm-compatible architecture (residual blocks essential) and adds the GP head. For fraud at 100K QPS, SNGP wins on cost; for one-off offline scoring with budget, ensembles win on simplicity.", correct:true},
          {key:"c", text:"Ensembles always win."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the trade-off.</>}
        lens={<>SNGP: distance-aware variance from one pass. Ensembles: between-model disagreement from M passes. Same OOD-AUROC ballpark, different cost.</>}
        stretch={<>What about a small ensemble of SNGPs?</>}
      />

      <VIS.TrapProblem id="sngp-p9" difficulty="hard" title="P9 — Compare SNGP to MC dropout."
        scenario={<><em>Discriminating insight: SNGP = single forward pass + GP variance (distance-aware by architecture). MC dropout = M stochastic forward passes through one model (variational Bayesian, but UNIMODAL q around MAP — under-covers OOD). Different cost (1 vs M passes); SNGP wins on OOD calibration (Liu et al. 2020 results); MC dropout is simpler retrofit if model already trained with dropout.</em><br/><br/>Compare.</>}
        options={[
          {key:"a", text:"Identical."},
          {key:"b", text:"Three differences. (1) NUMBER OF PASSES: SNGP runs ONE deterministic forward pass per input; MC dropout runs M (typically 10-30) stochastic passes with different dropout masks per input. (2) MECHANISM: SNGP's uncertainty comes from the GP head's predictive variance which is DISTANCE-AWARE by architecture (spectral norm + RBF kernel); MC dropout's uncertainty comes from the Monte-Carlo variance across stochastic passes which approximates a VARIATIONAL POSTERIOR (Gal-Ghahramani 2016). (3) OOD QUALITY: MC dropout's variational q is unimodal around theta_MAP and SYSTEMATICALLY UNDER-COVERS OOD (Ovadia et al. 2019); SNGP's distance-awareness covers OOD by design and matches deep ensembles empirically (Liu et al. 2020). When to pick: MC dropout if the model already uses dropout heavily and you cannot modify architecture; SNGP if you can change architecture and need both low inference latency AND reliable OOD detection.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"They are the same."},
        ]}
        trap={<>(a)(c)(d) collapse the mechanisms.</>}
        lens={<>SNGP: 1 pass, GP variance, distance-aware. MC dropout: M passes, MC variance, under-covers OOD.</>}
        stretch={<>Can you combine SNGP with MC dropout?</>}
      />

      <VIS.TrapProblem id="sngp-p10" difficulty="hard" title="P10 — Why is spectral-norm done with POWER ITERATION (not full SVD)?"
        scenario={<><em>Discriminating insight: full SVD of every weight matrix every step is O(n^3) per layer — infeasible. Power iteration converges to the top singular value in O(d^2) per iteration and benefits from WARM-STARTING across training steps (the singular vectors change slowly between steps); 1-2 iterations per step suffices in practice (Miyato et al. 2018 SN-GAN).</em><br/><br/>Why.</>}
        options={[
          {key:"a", text:"Full SVD is cheap."},
          {key:"b", text:"Cost. A full singular value decomposition of an d_in x d_out weight matrix is O(min(d_in, d_out)^2 * max(d_in, d_out)) — milliseconds for a small layer but seconds for transformer-style hidden dims (d_in = d_out = 1024+) per layer per step. Across hundreds of layers and millions of training steps this becomes infeasible. Power iteration computes the LARGEST singular value (the spectral norm) iteratively in O(d_in * d_out) per iteration, and — critically — the top singular vectors change SLOWLY between consecutive training steps (the weight matrix updates are small). Miyato et al. (SN-GAN, ICLR 2018) introduced the trick: store u, v (left/right singular vectors) as buffers, do ONE power-iteration step per forward pass, and reuse u, v across steps. This gives a tight estimate of sigma_max at near-zero cost — a single matrix-vector product per layer per step. SNGP inherits this trick directly. Without it, the spectral-norm constraint would be too expensive to enforce.", correct:true},
          {key:"c", text:"Power iteration is more accurate than SVD."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the cost-and-warm-start trick.</>}
        lens={<>Power iteration with warm-started u, v: 1 mat-vec per step. Miyato 2018 trick. SVD is too expensive.</>}
        stretch={<>How many iterations of power iteration to converge from cold start?</>}
      />

      <VIS.TrapProblem id="sngp-p11" difficulty="medium" title="P11 — Production: SNGP at 100K QPS for fraud — feasible?"
        scenario={<><em>Discriminating insight: yes, comparable to a softmax model at inference. RFF is a fixed linear projection; GP predictive variance is O(D^2) per inference for D-dimensional RFF. With D=1024, this is one matmul on top of the encoder — &lt;1ms incremental on GPU. Spectral norm only runs at TRAIN time (not inference). NO M-fold cost like ensembles or MC dropout.</em><br/><br/>Feasible.</>}
        options={[
          {key:"a", text:"Infeasible."},
          {key:"b", text:"Feasible. Inference-time cost of SNGP vs a plain softmax model: (1) the encoder is IDENTICAL to a normal encoder (the spectral-norm constraint affects only the training-time weight values, not inference compute); (2) the GP head adds ONE matrix-vector projection through the random Fourier feature map (fixed W, b — O(d_hidden * D)) and TWO mat-vecs through the Laplace posterior mean and covariance (O(D^2) for the variance). For D=1024, this is ~1 ms extra on a modern GPU — comparable to a single extra dense layer. Total inference cost: roughly 1.05-1.2x a softmax baseline. Crucial contrast: NO Mx like deep ensembles (M = 5-10) or MC dropout (M = 10-30). Spectral normalization runs ONLY at training time (the power iteration buffer is used to rescale weights during the forward pass during training); at inference the weights are fixed and there is no per-step iteration. Result: SNGP fits 100K QPS fraud serving budgets where ensembles/MC dropout would need 5-30x more compute.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Slower than ensembles."},
        ]}
        trap={<>(a)(c)(d) miss the single-pass cost.</>}
        lens={<>Inference: ~1.1x softmax. Spectral norm only at training time. NOT Mx like ensembles or MC dropout.</>}
        stretch={<>What is the dominant cost of the GP head at inference?</>}
      />

      <VIS.TrapProblem id="sngp-p12" difficulty="hard" title="P12 — Concept-specific misattribution: SNGP variance is FLAT (no signal) across all inputs."
        scenario={<><em>Discriminating insight (concept-specific): (1) the GP head's RBF length scale is far too large (everything looks &quot;close&quot;); (2) the Laplace posterior precision (prior on output weights) is too tight (posterior collapses to a point); (3) the random Fourier features were not properly trained/scaled; (4) spectral norm target c too large (no real distance preservation — encoder behaves like a regular DNN). SNGP-specific.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"SNGP-specific causes for flat (no-signal) variance. (1) RBF length scale too LARGE — kernel k(x, x') ~ 1 for all pairs; every test point looks 'close' to every training point in kernel sense; posterior variance is tiny everywhere including OOD. Fix: reduce length scale; use median pairwise feature distance as a heuristic. (2) Laplace prior precision too LARGE on the output weights — posterior covariance Sigma collapses to a near-zero matrix; predictive variance vanishes everywhere. Fix: re-tune prior precision against a held-out OOD-vs-ID calibration set. (3) RFF parameters W, b not at the right scale — RFF approximates RBF(length scale=l) only when W has variance 1/l^2; if W was initialized at the default Gaussian without scaling for length scale, the implicit kernel is wrong and the variance signal degenerates. (4) Spectral norm target c too large (c >> 1) — no real Lipschitz bound; encoder behaves like a regular DNN and can collapse OOD inputs into training clusters, after which the GP sees them as 'close to training' and reports low variance. Fix: c in [0.95, 6.0] per Liu et al.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Length scale / prior precision / RFF scale / spectral norm c — each SNGP-specific cause.</>}
        stretch={<>How to set the RBF length scale from data?</>}
      />

      <VIS.TrapProblem id="sngp-p13" difficulty="medium" multiSelect title="P13 — Decoys: which are NOT SNGP? (4 correct)"
        scenario={<><em>Discriminating insight: deep ensembles, MC dropout, Platt scaling, vanilla GP classifier are NOT SNGP. Spectral-norm + GP head IS SNGP.</em><br/><br/>Pick NOT-SNGP.</>}
        options={[
          {key:"a", text:"Train M models with different seeds, average predictions.", correct:true},
          {key:"b", text:"Apply dropout at inference with M stochastic forward passes.", correct:true},
          {key:"c", text:"Fit a 1-parameter sigmoid on validation logits (Platt scaling).", correct:true},
          {key:"d", text:"Train a vanilla GP classifier on raw features without spectral-norm encoder.", correct:true},
          {key:"e", text:"Apply spectral-norm to every encoder layer AND replace softmax with RFF-Laplace GP head."},
        ]}
        trap={<>(a) ensembles; (b) MC dropout; (c) Platt; (d) GP without spectral-norm encoder is NOT SNGP.</>}
        lens={<>SNGP = spectral-norm encoder + RFF-Laplace GP head. Drop either piece and it is not SNGP.</>}
        stretch={<>Why is GP-without-spectral-norm not enough?</>}
      />

      <VIS.TrapProblem id="sngp-p14" difficulty="hard" title="P14 — Concept-specific misattribution: SNGP confidently misclassifies a novel-MO fraud."
        scenario={<><em>Discriminating insight (concept-specific): SNGP&apos;s distance-awareness operates in FEATURE SPACE. If the novel MO produces inputs that the SPECTRAL-NORM ENCODER maps to features near a benign training cluster (lower-Lipschitz bound is approximate, not exact), the GP head sees a &quot;nearby&quot; feature and reports low variance. The failure is at the encoder, not the GP head; mitigations: tighten spectral-norm c, increase encoder depth, or add a separate OOD detector (isolation forest) on top.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Bug in the GP head."},
          {key:"b", text:"SNGP's distance-awareness depends on the SPECTRAL-NORM ENCODER being a TIGHT bi-Lipschitz map — input-space distances must be preserved as feature-space distances. The spectral-norm constraint gives only an APPROXIMATE bi-Lipschitz bound (combined with residual structure); in practice the lower-Lipschitz constant L_lo can still be small enough that DISTANT inputs collapse to NEARBY features. If a novel MO produces inputs that the encoder happens to map close to a benign training cluster in feature space, the GP head — which sees only the feature — reports low predictive variance. The model is confidently wrong. The failure is at the ENCODER, not the GP head. Mitigations: (1) tighten the spectral-norm target c closer to 1 with residual structure to enforce L_lo closer to 1; (2) increase encoder depth so the bi-Lipschitz bound has more slack; (3) layer a SEPARATE OOD detector (isolation forest, k-NN distance in raw feature space, conformal nonconformity score) on top of SNGP to catch encoder-level collapse cases; (4) periodically retrain SNGP including the novel-MO examples once they are observed (the typical drift response).", correct:true},
          {key:"c", text:"Lower learning rate."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) misattribute the failure.</>}
        lens={<>Encoder bi-Lipschitz is approximate. Collapsed novel-MO features get low variance. Failure at encoder, not GP head.</>}
        stretch={<>How to layer an isolation forest on top of SNGP?</>}
      />

      <VIS.TrapProblem id="sngp-p15" difficulty="hard" title="P15 — Random Fourier Features: why this approximation?"
        scenario={<><em>Discriminating insight: exact GP scales O(N^3) in training-set size N — infeasible at fraud scale. RFF gives an explicit finite-dimensional feature map for shift-invariant kernels (Rahimi-Recht 2007), reducing the GP to a Bayesian linear regression in feature space — O(D^2) per inference, O(N D^2) training. Enables GP at millions of points.</em><br/><br/>Why RFF.</>}
        options={[
          {key:"a", text:"RFF is identical to RBF."},
          {key:"b", text:"Scaling. An exact Gaussian process with N training points has O(N^3) inference (Cholesky of the N x N kernel matrix) and O(N^2) memory — completely infeasible for a fraud dataset with N = 10^7 transactions. RFF (Rahimi and Recht NeurIPS 2007) provides an EXPLICIT FINITE-DIMENSIONAL feature map phi(x) of dimension D such that phi(x)^T phi(x') approximates the RBF kernel k(x, x'); the approximation error decreases as O(1/sqrt(D)). Once you have phi, the GP REDUCES to a Bayesian linear regression in D-dimensional feature space: predictive mean = phi(x)^T beta, predictive variance = phi(x)^T Sigma phi(x), where beta and Sigma are computed once (Laplace approximation) in O(N D^2) training and O(D^2) per inference. With D = 1024 this is tractable for N = 10^7. The RFF trick is what makes the GP HEAD of SNGP practical at fraud scale; without it, exact GP would be impossible. SNGP uses RFF specifically for the shift-invariant RBF kernel via the Bochner-theorem construction phi(x) = sqrt(2/D) cos(W x + b), W and b sampled once at initialization.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip the GP."},
        ]}
        trap={<>(a)(c)(d) miss the scaling motivation.</>}
        lens={<>Exact GP: O(N^3). RFF reduces to D-dim Bayesian linear regression: O(D^2) inference. Enables fraud scale.</>}
        stretch={<>What does the Bochner theorem say?</>}
      />

      <VIS.TrapProblem id="sngp-p16" difficulty="medium" title="P16 — Junior: 'SNGP is just a Gaussian process'. Refute."
        scenario={<><em>Discriminating insight: half right. The HEAD is a GP (approximated by RFF + Laplace). The ENCODER is a deep network with spectral-norm — that part is the critical innovation; without it, the GP sees features that do not encode input distance, and distance-awareness fails.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Junior is right."},
          {key:"b", text:"Half right. SNGP's HEAD is indeed a Gaussian process (approximated by RFF for scalability and Laplace for tractable posterior on logistic likelihood). But calling SNGP 'just a GP' misses the SPECTRAL-NORM ENCODER which is the critical architectural innovation. A vanilla GP classifier on raw features handles tabular inputs reasonably but does not know how to extract useful features from images, transactions, or sequences. SNGP layers a DEEP ENCODER under the GP — but a normal deep encoder destroys distance-awareness (it can map far-away inputs near training clusters in feature space). The spectral-norm constraint on every hidden layer of the encoder restores distance preservation, making the encoder approximately bi-Lipschitz. Without spectral norm: deep features + GP head = no distance-awareness. With spectral norm: deep features + GP head = distance-aware uncertainty. So SNGP is precisely the combination — deep representation learning AND distance-aware uncertainty. Calling it 'just a GP' loses the encoder innovation; calling it 'just a deep net' loses the GP head.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"They are identical."},
        ]}
        trap={<>(a)(c)(d) miss the combination.</>}
        lens={<>SNGP = spectral-norm encoder + GP head. Neither alone suffices.</>}
        stretch={<>What if you wrapped a GP around any pretrained encoder?</>}
      />

      <VIS.TrapProblem id="sngp-p17" difficulty="hard" title="P17 — Skeptic: 'Just use a deep ensemble — SNGP is strictly worse'. Refute."
        scenario={<><em>Discriminating insight: skeptic is WRONG on cost-quality trade-off. SNGP empirically matches small ensembles (M=5) on OOD-AUROC while being 5x cheaper at inference; needs architecture changes (spectral norm + GP head) but no Mx retraining. Ensembles win on simplicity (no architecture change); SNGP wins on inference cost.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Skeptic is right."},
          {key:"b", text:"Wrong on the cost-quality trade-off. Liu et al. (NeurIPS 2020) and follow-ups show SNGP matches small (M=5) deep ensembles on OOD-AUROC across image and tabular benchmarks. SNGP wins on INFERENCE COST (1 forward pass vs Mx forward passes; for production fraud at 100K QPS this is the binding constraint). Ensembles win on SIMPLICITY (no architecture change, just retrain M times with different seeds; works with any architecture). When to pick SNGP: inference-cost-constrained serving (high QPS, real-time), willingness to modify architecture (spectral-norm + GP head on a residual-friendly encoder), need for distance-aware OOD detection. When to pick ensembles: training-cost is acceptable (Mx training affordable), architecture cannot be modified (e.g., must use a pretrained transformer as-is), multiple model variants for diversity. Best of both: a small ensemble of SNGPs (M = 3) — captures BOTH between-model multi-mode disagreement AND within-model distance-awareness; production fraud teams use this when both budgets allow.", correct:true},
          {key:"c", text:"Always SNGP."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>SNGP: 1x inference, distance-aware. Ensembles: Mx inference, between-model variance. Different cost-quality trade-offs.</>}
        stretch={<>Hybrid: small ensemble of SNGPs?</>}
      />

      <VIS.TrapProblem id="sngp-p18" difficulty="hard" title="P18 — Decompose: epistemic vs aleatoric in SNGP."
        scenario={<><em>Discriminating insight: SNGP&apos;s GP predictive variance approximates EPISTEMIC uncertainty (distance to training set, model&apos;s ignorance). ALEATORIC (intrinsic label noise) is NOT captured — add a heteroscedastic output head (predict log-variance directly) to capture it. Total = epistemic + aleatoric.</em><br/><br/>Decompose.</>}
        options={[
          {key:"a", text:"SNGP captures both."},
          {key:"b", text:"SNGP's GP predictive variance approximates the EPISTEMIC component: 'how far is this input from anything I have seen?' — large variance on novel MOs (model ignorance), small variance on input near training clusters. The ALEATORIC component (irreducible label noise in regions where the data itself is noisy — same-looking transactions get different labels due to chargeback policy variation or stochastic fraudster behavior) is NOT captured by the GP variance, which goes to zero in the limit of infinite training data near the test point. To capture aleatoric: add a HETEROSCEDASTIC output head that predicts log sigma^2(x) directly (Kendall and Gal NeurIPS 2017); train with Gaussian NLL loss. At inference, total predictive variance = epistemic (from GP) + aleatoric (from heteroscedastic head). For binary fraud, the analog uses a learned temperature or logistic noise parameter. Decomposing matters because the two have different downstream actions: epistemic uncertainty triggers OOD escalation / re-training; aleatoric uncertainty triggers threshold adjustments or routing to specialist reviewers.", correct:true},
          {key:"c", text:"Aleatoric is undefined."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the decomposition.</>}
        lens={<>GP variance = epistemic (distance-aware). Heteroscedastic head = aleatoric. Different actions per type.</>}
        stretch={<>How to compute heteroscedastic head with logistic likelihood?</>}
      />

      <VIS.TrapProblem id="sngp-p19" difficulty="medium" title="P19 — Where exactly do you apply spectral normalization?"
        scenario={<><em>Discriminating insight: every hidden weight matrix (Conv layers, FFN inside transformer blocks, attention QKV projections, output of residual blocks). NOT the embedding lookup (no weight matrix), NOT batch-norm parameters (already scale-controlled). Residual structure is essential for the bi-Lipschitz bound.</em><br/><br/>Where.</>}
        options={[
          {key:"a", text:"Only at output."},
          {key:"b", text:"Apply to every HIDDEN WEIGHT MATRIX: Conv kernels (Convolutional layers), FFN dense layers inside transformer blocks, Q/K/V projection matrices of self-attention, the output projection of residual blocks. Skip: embedding lookups (no weight matrix to normalize in the conventional sense; the embedding matrix can be optionally spectral-normed but Liu et al. typically skip it), BatchNorm/LayerNorm scale parameters (already control the activation scale and conflict with spectral-norm). Residual connections are ESSENTIAL: with f(x) = x + g(x) and g spectral-normed to c < 1, the residual block is provably bi-Lipschitz with bounds [1-c, 1+c]. Without residuals, spectral-norm alone gives only upper-Lipschitz; lower-Lipschitz can collapse. Skipping any hidden layer breaks the bi-Lipschitz property of the composed encoder. Implementation: per-layer, store buffers u, v (top singular vectors), do one power-iteration step per forward pass, divide W by max(sigma_max, c) at the layer's forward call (in train mode); at inference, weights are already constrained and no power iteration runs.", correct:true},
          {key:"c", text:"Only Conv layers."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the comprehensive placement.</>}
        lens={<>Every hidden weight matrix. Residual structure essential. Skip embedding and BN/LN.</>}
        stretch={<>What about LayerNorm in transformers + spectral norm?</>}
      />

      <VIS.TrapProblem id="sngp-p20" difficulty="hard" title="P20 — Concept-specific misattribution: ablating spectral-norm but keeping GP head — what happens?"
        scenario={<><em>Discriminating insight (concept-specific): the GP head still computes a variance, but it loses distance-awareness. The encoder is free to map far-away inputs near training clusters in feature space; the GP sees those features as &quot;close to training&quot; and reports LOW variance — confidently-wrong on OOD. The distance-aware property requires BOTH pieces. Ablation confirms spectral-norm is essential (Liu et al. 2020 Table 4).</em><br/><br/>Ablation.</>}
        options={[
          {key:"a", text:"Nothing changes."},
          {key:"b", text:"You lose distance-awareness — the model becomes confidently wrong on OOD. The GP head still computes a posterior mean and variance on the encoder's features. But without the spectral-norm constraint, the encoder is FREE to map any input — including a far-away novel MO — to a feature vector close to a training cluster (this is a learned behavior of unconstrained deep networks; they tend to collapse extrapolations). The GP head sees this collapsed feature, treats it as 'close to training set', and returns a LOW posterior variance — high confidence on something it has never seen. Empirically (Liu et al. 2020 Table 4): SNGP with spectral-norm removed performs comparably to a softmax baseline on OOD-AUROC; the GP head alone gives essentially no benefit. The spectral-norm step is the LOAD-BEARING change for distance-awareness; the GP head is the load-bearing change for translating distance to variance. Both required. Ablating spectral-norm and adding a GP head is a common 'looks like SNGP but does not work' implementation; if your variance signal is dead, check the spectral-norm constraint first.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"It still works."},
        ]}
        trap={<>(a)(c)(d) miss the load-bearing role of spectral norm.</>}
        lens={<>Without spectral norm, encoder collapses far-away inputs to near-training features. GP head sees 'close', reports low variance. Confidently wrong on OOD.</>}
        stretch={<>What does the ablation in Liu et al. Table 4 show numerically?</>}
      />

      <VIS.TrapProblem id="sngp-p21" difficulty="hard" title="P21 — In one sentence, THE unique mechanism of SNGP."
        scenario={<><em>Discriminating insight: SPECTRAL-NORMALIZED HIDDEN LAYERS (bi-Lipschitz encoder) + LAST-LAYER GAUSSIAN PROCESS (RFF + Laplace), SINGLE deterministic forward pass, distance-aware variance INTRINSIC to the architecture. NOT ensembles (no M models). NOT MC dropout (no stochastic masks). Liu et al. NeurIPS 2020.</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"It is regularization."},
          {key:"b", text:"TWO ARCHITECTURAL CHANGES TO A STANDARD DEEP CLASSIFIER. (1) Apply SPECTRAL NORMALIZATION (Miyato et al. 2018 trick: power iteration on top singular value with warm-started u, v buffers) to EVERY HIDDEN WEIGHT MATRIX, combined with residual structure, so the encoder is approximately BI-LIPSCHITZ — input-space distances are preserved as feature-space distances. (2) REPLACE THE FINAL DENSE + SOFTMAX with a LAST-LAYER GAUSSIAN PROCESS, approximated by random Fourier features (RFF, Rahimi-Recht 2007) for the RBF kernel + Laplace approximation of the posterior on output weights for the logistic likelihood. At inference, a SINGLE deterministic forward pass produces both a predictive mean (the class probability) AND a predictive variance (the distance-aware uncertainty). The variance grows when the encoded feature is far from training features. Liu et al. NeurIPS 2020. NOT a deep ensemble (single model, no independent retraining); NOT MC dropout (single forward pass, no stochastic masks); NOT temperature scaling (architecture-level, not logit-rescaling).", correct:true},
          {key:"c", text:"It is a deep ensemble."},
          {key:"d", text:"It is MC dropout."},
        ]}
        trap={<>(a)(c)(d) miss the spectral-norm + GP-head mechanism.</>}
        lens={<>Spectral norm + RFF-Laplace GP head. Single deterministic pass. Distance-aware variance from architecture.</>}
        stretch={<>What does the Liu et al. paper title emphasize?</>}
      />

      <VIS.TrapProblem id="sngp-p22" difficulty="medium" title="P22 — When NOT to use SNGP for fraud uncertainty."
        scenario={<><em>Discriminating insight (concept-specific): (1) cannot modify architecture (using a pretrained foundation model as-is); (2) need EXACT coverage guarantee (use conformal); (3) downstream signal is purely aleatoric (intrinsic label noise) — SNGP gives epistemic; (4) feature space is so high-dim that bi-Lipschitz constraint over-restricts capacity. Concept-specific.</em><br/><br/>Skip.</>}
        options={[
          {key:"a", text:"Always use SNGP."},
          {key:"b", text:"Skip SNGP when: (1) the architecture is FROZEN — using a pretrained foundation model or LLM-backbone you cannot modify (cannot add spectral norm or swap the head). MC dropout (if pretrained model used dropout) or a probing classifier with a separate uncertainty layer is better. (2) The downstream consumer needs a STRICT COVERAGE GUARANTEE (regulatory mandate: cover 95% of fraud cases) — SNGP gives no coverage theorem; use conformal prediction. (3) The relevant uncertainty is purely ALEATORIC (data has high intrinsic noise; same-looking transactions get different labels due to policy variation) — SNGP captures epistemic, not aleatoric; add a heteroscedastic head or skip to a more general Bayesian model. (4) Encoder capacity is the binding constraint — spectral-norm constraints encoder capacity (Lipschitz bound limits expressiveness in extreme cases); if your softmax baseline is already barely fitting (high train loss), SNGP's constraint will push training even harder. (5) You need an instantly-retrofitted method — SNGP requires re-training; if you have a deployed model and 24 hours to ship uncertainty, use post-hoc methods (temperature scaling, Platt) or MC dropout if dropout was already used.", correct:true},
          {key:"c", text:"Never use SNGP."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>Skip when architecture frozen / strict coverage needed / purely aleatoric / capacity-constrained / no time to retrain.</>}
        stretch={<>How to layer conformal on top of SNGP?</>}
      />

      <VIS.TrapProblem id="sngp-p23" difficulty="hard" title="P23 — Practitioner: 'I see no improvement on my OOD benchmark — what did I miss?'"
        scenario={<><em>Discriminating insight: most common implementation pitfalls — (a) spectral-norm c set too large (no real constraint); (b) ablated spectral-norm on attention/FFN (residual bypass dominates); (c) RBF length scale auto-init wrong (no signal); (d) used vanilla GP without RFF + Laplace; (e) Laplace posterior precision mis-tuned. Triage in this order.</em><br/><br/>Triage.</>}
        options={[
          {key:"a", text:"Use bigger model."},
          {key:"b", text:"Triage in this order. (1) Verify SPECTRAL-NORM c — Liu et al. recommends c in [0.95, 6.0]; if c is at default 1.0 in a library that interprets it differently (some libs use 'max norm', some 'multiplied factor'), the constraint may be effectively absent. Check the actual spectral norm of trained weight matrices. (2) Verify SPECTRAL-NORM PLACEMENT — every Conv, FFN, attention Q/K/V projection. A common bug is applying spectral-norm only to the FFN inside transformer blocks but not to attention projections; the bi-Lipschitz bound breaks at attention. (3) Verify RFF LENGTH SCALE — at default (length scale = 1), the kernel may be much narrower or wider than the typical feature distance, giving either no signal or saturating signal. Set length scale to median pairwise feature distance on a calibration batch. (4) Verify GP POSTERIOR — use the closed-form Laplace approximation, not a vanilla GP fit; the Laplace step gives the variance signal. (5) Verify LAPLACE PRIOR PRECISION — re-tune on a held-out ID-vs-OOD split. (6) Verify INFERENCE MODE — at inference, spectral-norm power iteration should be disabled and the GP head's Sigma should be the trained Laplace covariance, not freshly computed.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the implementation triage.</>}
        lens={<>c value / placement / length scale / Laplace closed-form / prior precision / inference mode. Six SNGP-specific checks.</>}
        stretch={<>What is the default sigma_max library mismatch trap?</>}
      />

      <VIS.TrapProblem id="sngp-p24" difficulty="hard" title="P24 — SNGP + temperature scaling: layer order?"
        scenario={<><em>Discriminating insight: SNGP gives well-calibrated logits on training distribution AND distance-aware variance on OOD; temperature scaling on top can further sharpen in-distribution ECE. Layer ORDER: SNGP produces logits with mean-field correction; temperature applied AFTER the correction, on the held-out validation set, to fine-tune ECE. NOT before — temperature does not affect variance.</em><br/><br/>Stack.</>}
        options={[
          {key:"a", text:"Use temperature instead of SNGP."},
          {key:"b", text:"SNGP and temperature scaling are complementary and layer in a specific order. SNGP produces mean-field-corrected logits z(x) = Phi(x)^T beta - (1/2) Phi(x)^T Sigma Phi(x); the corrected logits are softmax'd to give probabilities. Temperature scaling (Guo et al. ICML 2017) applies a single learned scalar T > 0: p_T(y | x) = softmax(z(x) / T), with T fit by minimizing NLL on a held-out validation set. ORDER: SNGP first (produces the corrected logits and the variance signal); temperature SECOND (applied to the logits for a final ECE tune on in-distribution validation). Temperature does NOT affect the variance signal — it just rescales logits — so it cannot fix OOD miscalibration (the SNGP variance is what catches OOD). Reverse order — temperature first, SNGP second — does not make sense; temperature is post-hoc on logits and SNGP's GP head IS the logit producer. Production pattern: SNGP for distance-aware OOD; temperature on top for residual in-distribution ECE; conformal on top of both if a strict coverage guarantee is required.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"They cannot be combined."},
        ]}
        trap={<>(a)(c)(d) miss the complementary stacking.</>}
        lens={<>SNGP produces corrected logits + variance. Temperature on top of logits, post-hoc. Conformal on top of both.</>}
        stretch={<>What does the mean-field correction do to the logits?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2006.10108" target="_blank" rel="noopener"><strong>Liu, Lin, Padhy, Tran, Bedrax-Weiss, Lakshminarayanan — Simple and Principled Uncertainty Estimation with Deterministic Deep Learning via Distance Awareness</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2020, paper)</span><br/>The original SNGP paper. Sections 2-3 motivate distance-awareness; Section 4 gives the spectral-norm + GP-head construction; Section 5 ablates each piece.</li>
        <li><a href="https://arxiv.org/abs/1802.05957" target="_blank" rel="noopener"><strong>Miyato, Kataoka, Koyama, Yoshida — Spectral Normalization for GANs</strong></a> <span style={{color:"#64748b", fontSize:14}}>(ICLR 2018, paper)</span><br/>Introduces the power-iteration-with-warm-start trick for cheap spectral-norm enforcement. SNGP inherits this directly.</li>
        <li><a href="https://www.tensorflow.org/tutorials/understanding/sngp" target="_blank" rel="noopener"><strong>TensorFlow SNGP tutorial</strong></a> <span style={{color:"#64748b", fontSize:14}}>(tutorial)</span><br/>Practitioner walkthrough with code: how to apply spectral norm to Keras layers, how to plug in the RFF-Laplace GP head, and how to read off the variance. Best for building intuition from a runnable example.</li>
        <li><a href="https://arxiv.org/abs/1906.02530" target="_blank" rel="noopener"><strong>Ovadia et al. — Can You Trust Your Model's Uncertainty?</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2019, paper)</span><br/>Empirical benchmark of uncertainty methods under distribution shift. Quantifies how MC dropout and softmax fail on OOD — motivates SNGP's distance-aware design.</li>
        <li><a href="https://yarinslab.com/category/uncertainty/" target="_blank" rel="noopener"><strong>Yarin Gal — Uncertainty research blog</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Walk-through articles on uncertainty in deep learning. Best for intuition on epistemic vs aleatoric and where each method fits.</li>
      </ul>
    </VIS.Section>
  </main>
);
