  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Delayed-feedback survival model — Chapelle's joint model of fraud-label probability
// and label-arrival delay, used when chargebacks arrive on a long, non-uniform tail.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Feedback delay"
      title="Delayed-feedback survival models for fraud"
      subtitle="A joint model of fraud-label probability and the time-to-label distribution, treating the unobserved label as a survival problem with a hazard function over time-since-event."
      byline={[
        {label: "Source", value: "Chapelle — Modeling Delayed Feedback in Display Advertising (KDD 2014); Delayed Feedback for Online Fraud (KDD 2024)"},
        {label: "Year", value: "2014 / 2024"},
        {label: "L2", value: "Feedback delay / delayed labels"},
      ]}/>

    <VIS.TLDR>
      Half your fraud labels arrive in 7 days; the other half drift in over 90. A static <em>label = whatever we know today</em> training set is biased toward fast-arriving labels — typically friendly-fraud chargebacks — and underweights slow-arriving cases such as long-tail dispute investigations. <VIS.Term def="A model from survival analysis that captures the instantaneous rate at which an event occurs given that it has not occurred yet. In delayed-feedback fraud modeling, it captures how soon after a transaction a chargeback is likely to arrive.">Hazard-function</VIS.Term> based delayed-feedback models jointly fit the probability of fraud AND the delay distribution, so the optimizer treats <em>unlabeled because still pending</em> differently from <em>unlabeled because confirmed non-fraud</em>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Set up a generative model with two random variables per row: <code>Y</code> is the (unobserved) fraud label, and <code>D</code> is the delay between the transaction and the label arrival (conditional on Y=1). For a row observed at time <code>t</code> since the transaction:
      </p>
      <ul>
        <li>If you have seen a chargeback by <code>t</code>, the row is labeled positive.</li>
        <li>If not, the row is censored: it could be a true negative, or a positive whose chargeback has not yet arrived.</li>
      </ul>

      <VIS.Mermaid chart={`
flowchart TB
  X["Transaction features x"]
  X --> P["P(Y=1 | x) — fraud probability"]
  X --> D["P(D | x, Y=1) — delay distribution"]
  P --> L["Joint log-likelihood: P times survival or P times density"]
  D --> L
  L --> M["Trained delayed-feedback model"]
  M --> S["Score: calibrated fraud probability"]
  M --> A["Adjusted training labels for downstream models"]
  style L fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style S fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>The blue box is the joint log-likelihood that captures both <em>did it happen</em> and <em>when did it arrive</em>. The yellow boxes are the artifacts that consumer-facing systems use.</p>

      <p style={{marginTop: 16}}><strong>Chapelle's joint likelihood:</strong></p>
      <VIS.Equation display tex={"\\log L = \\sum_{i \\in P} \\log p_i + \\log f_i(t_i)\\;+\\;\\sum_{i \\in C} \\log \\Big(1 - p_i + p_i \\,S_i(t_i)\\Big)"} />
      <p>
        Read it as: for every observed positive <code>i</code> in set P, add the log probability of being positive <code>p_i</code> plus the log density of arriving at the observed delay <code>f_i(t_i)</code>. For every censored row <code>i</code> in set C (no chargeback by observation time <code>t_i</code>), add the log of <em>being truly negative</em> plus <em>being positive but not yet arrived</em>, where <code>S_i(t_i)</code> is the <VIS.Term def="The probability that the event of interest has not occurred by time t. In delayed-feedback fraud, the probability that a chargeback has not yet arrived by t given that the transaction is truly fraud.">survival function</VIS.Term> 1 minus the CDF of the delay distribution.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from PU learning and from naive 'label = whatever we know today'">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Naive (label today)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>PU learning</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Delayed-feedback survival</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Models delay distribution</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>No (binary mixture only)</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Uses observation time t_i</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Yes — central</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Bias toward fast-arriving labels</td>
            <td style={{padding:"8px 10px"}}>Severe</td>
            <td style={{padding:"8px 10px"}}>Moderate</td>
            <td style={{padding:"8px 10px"}}>Corrected</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Engineering complexity</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>Medium</td>
            <td style={{padding:"8px 10px"}}>High (joint model)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Best for</td>
            <td style={{padding:"8px 10px"}}>Short label lag</td>
            <td style={{padding:"8px 10px"}}>Steady-state delayed lag</td>
            <td style={{padding:"8px 10px"}}>Non-uniform long-tail delays</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Delay distribution is wide and non-uniform</strong> — half the labels in a week, half over 90 days, with a long tail. Survival-style modeling beats PU because PU collapses the time information.</li>
        <li><strong>Continuous training pipeline</strong> — daily or hourly refresh on streaming chargeback data. Survival models naturally accommodate censoring.</li>
        <li><strong>You can model the delay distribution per-segment</strong> — different merchants, products, geographies have different delay shapes. Survival models extend to per-segment exponential or Weibull naturally.</li>
        <li><strong>Skip when delay is uniformly fast</strong> — for short, narrow label-arrival windows (CTR-like), the survival machinery is overkill and PU or naive-with-cohort-cutoff suffices.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Delay distribution must be modeled and may drift">
        The model assumes a parametric or semi-parametric delay distribution (exponential in Chapelle's original; Weibull, log-normal, or piecewise common in extensions). Misspecification systematically biases <code>p_i</code>. Worse, fraud-pattern shifts can change the delay distribution itself (a new attack vector with faster victim-report). Monitor the delay CDF on matured cohorts as a drift signal.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Identifiability: delay and probability are entangled">
        Distinguishing <em>this row is negative</em> from <em>this row is positive but late</em> is structurally hard. The joint likelihood is identifiable in theory under reasonable assumptions but slow to estimate, and confidence intervals are wider than a naive model suggests. Use bootstrap or Hessian-based CIs and quote uncertainty in the model card.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Cohort accounting must be precise">
        Each row carries (i) observation time <code>t_i</code> since transaction and (ii) censoring indicator. A bug in either propagates into <code>S_i(t_i)</code> and the likelihood. Treat the cohort table as a first-class artifact with unit tests; off-by-one on <code>t_i</code> is the most common silent failure.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Calibration on the matured-cohort holdout is non-trivial">
        Calibration metrics (Brier, reliability curve) need a fully matured cohort where censoring is approximately resolved. That means lag to evaluation. Plan the eval cadence around the longest plausible delay (e.g., 90 days) — you cannot evaluate this week's predictions this week.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Trap problems on delay distribution choice, censoring accounting, PU-vs-survival, drift, and operational evaluation.
      </p>

      <VIS.TrapProblem
        id="dlf-p1"
        difficulty="hard"
        title="P1 — Half of labels in 7 days, half over 90. How to train?"
        scenario={<>Your fraud-team data shows: 50 percent of chargebacks arrive within 7 days, the remaining 50 percent are spread between 8 and 120 days with a long tail at 90+. Junior engineer proposes labeling everything more than 7 days old as confirmed and ignoring older data. What is the senior framing?</>}
        options={[
          {key:"a", text:"Use a delayed-feedback survival model. The naive 7-day cutoff captures only half of the fraud signal — the long-tail half is precisely the systematic-fraud cases that matter most. Model the delay distribution per row (e.g., Weibull conditional on features), include censored rows with their observation time t_i, and fit the joint likelihood. PU is a partial fix because it ignores time-since-event; survival uses t_i directly.", correct:true},
          {key:"b", text:"7-day cutoff is fine since most labels arrive fast."},
          {key:"c", text:"Wait 120 days then train."},
          {key:"d", text:"Use PU instead of survival."},
        ]}
        trap={<>(b) drops the most operationally important half. (c) loses recency. (d) is closer but ignores the per-row delay information.</>}
        lens={<>(a) Delayed-feedback survival uses both the label AND the time-since-event for censored rows. PU collapses time; survival keeps it.</>}
        stretch={<>When would PU be preferred over survival despite the long tail?</>}
      />

      <VIS.TrapProblem
        id="dlf-p2"
        difficulty="hard"
        title="P2 — Chapelle's exponential delay vs Weibull vs log-normal. Pick."
        scenario={<>You implement a delayed-feedback model. The team debates whether to model the delay distribution as exponential (Chapelle's original), Weibull, or log-normal. The empirical delay histogram has a sharp peak around days 2-5 then a long tail. Which fits best and why?</>}
        options={[
          {key:"a", text:"Weibull or log-normal. Exponential has constant hazard and a peak at delay zero, which does not match the observed peak at days 2-5. Weibull adds a shape parameter that can accommodate non-monotonic hazards; log-normal naturally produces a delayed peak with a long right tail, which is closer to observed dispute-process distributions. Pick one via log-likelihood comparison on matured cohort, hold the other in reserve as a fallback.", correct:true},
          {key:"b", text:"Exponential — it is the canonical choice."},
          {key:"c", text:"All three are equivalent on real data."},
          {key:"d", text:"Use a non-parametric Kaplan-Meier instead."},
        ]}
        trap={<>(b) Chapelle's exponential is a teaching example, not the right shape for many real domains. (c) is wrong. (d) is fine for visualization but harder to plug into a joint likelihood with feature dependence.</>}
        lens={<>(a) Pick the parametric form by likelihood on a matured holdout; exponential is rarely the empirical best fit.</>}
        stretch={<>How would you mix per-segment delay distributions in one model?</>}
      />

      <VIS.TrapProblem
        id="dlf-p3"
        difficulty="hard"
        title="P3 — Censored row treatment — what is the most common bug?"
        scenario={<>You train a delayed-feedback model. After a month, the held-out AUC is suspiciously high (0.98), but precision in production is far worse than expected. Where to look first?</>}
        options={[
          {key:"a", text:"Check the cohort definition first. A common bug: training rows from the most recent N days are silently labeled as 'censored at t = today' but the censoring observation time t_i is being passed as the matured cohort length instead of the row-specific elapsed time. The model then treats fresh rows as if they had matured for 90 days with no chargeback — strong negative signal — and over-trains. Fix: store t_i per row, audit the cohort table, add unit tests that t_i lies between zero and the cohort length.", correct:true},
          {key:"b", text:"The model is overfitting. Increase regularization."},
          {key:"c", text:"AUC is the wrong metric."},
          {key:"d", text:"The fraud team has a labeling backlog."},
        ]}
        trap={<>(b) is reactive without root cause. (c) is true but does not explain the prod gap. (d) is a possibility but secondary.</>}
        lens={<>(a) Off-by-one or constant t_i is the canonical bug. Audit the cohort table with tests.</>}
        stretch={<>What unit tests would catch this class of bug at build time?</>}
      />

      <VIS.TrapProblem
        id="dlf-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Delay distribution drift — pick the monitoring signals"
        scenario={<>You want to monitor whether the delay distribution itself is shifting (which would silently bias the model). Pick the meaningful signals.</>}
        options={[
          {key:"a", text:"Kolmogorov-Smirnov test on the delay distribution between this month and a baseline matured cohort.", correct:true},
          {key:"b", text:"Per-segment delay-CDF curves overlaid week-over-week for visual review.", correct:true},
          {key:"c", text:"Ratio of fast-arrival (less than 7 days) to slow-arrival (over 30 days) labels — alert on a 30 percent shift.", correct:true},
          {key:"d", text:"Hazard-function reliability curve: predicted vs observed hazard at fixed time-since-event.", correct:true},
          {key:"e", text:"Total number of chargebacks per week."},
          {key:"f", text:"Mean of delay only."},
        ]}
        trap={<>(e) is volume, not distribution shape. (f) is a single moment that misses the tail shifts.</>}
        lens={<>(a) through (d) capture the shape. Hazard reliability (d) is the most underused.</>}
        stretch={<>How often would you recompute these signals?</>}
      />

      <VIS.TrapProblem
        id="dlf-p5"
        difficulty="hard"
        title="P5 — Delay distribution is bimodal. What do you do?"
        scenario={<>You discover the delay distribution is bimodal: a peak at days 1-3 (friendly-fraud, fast disputes) and a peak at days 60-90 (long-investigation cases). Single Weibull is a poor fit. What is the right model?</>}
        options={[
          {key:"a", text:"Fit a two-component mixture model: P(delay) = w1 * Weibull(d | theta1) + w2 * Weibull(d | theta2), where w1 + w2 = 1. Optionally make the mixture weights and parameters depend on features (mixture-of-experts style), so friendly-fraud-prone segments concentrate on the fast component and systematic-fraud segments on the slow. Per-segment delay modeling is the natural generalization.", correct:true},
          {key:"b", text:"Use a single log-normal — close enough."},
          {key:"c", text:"Truncate the data at 30 days to remove bimodality."},
          {key:"d", text:"Use exponential — bimodality is not real, it is noise."},
        ]}
        trap={<>(b) papers over the structure. (c) loses the long-tail mode. (d) denies reality.</>}
        lens={<>(a) Mixture models with feature-dependent weights are the principled fix.</>}
        stretch={<>How would you initialize the mixture components?</>}
      />

      <VIS.TrapProblem
        id="dlf-p6"
        difficulty="hard"
        title="P6 — Evaluating a delayed-feedback model — what cohort?"
        scenario={<>Your delayed-feedback model is in production. The team wants to report weekly AUC. What is the correct evaluation cohort?</>}
        options={[
          {key:"a", text:"Evaluate on a fully matured cohort: rows whose transactions are older than the 99th-percentile delay of the historical distribution (e.g., 120 days). Rolling weekly AUC must be computed on the matured cohort, lagging real-time by 120 days. Reporting AUC on a fresh cohort is misleading because censoring inflates the apparent precision. Build the dashboard to make the lag explicit.", correct:true},
          {key:"b", text:"Evaluate on the freshest data — that is the operational reality."},
          {key:"c", text:"Average AUC across all observation times."},
          {key:"d", text:"AUC of 99th-percentile-predicted-score against next-day chargebacks."},
        ]}
        trap={<>(b) is the common mistake; censoring inflates the metric. (c) muddies the signal. (d) is partial.</>}
        lens={<>(a) The matured-cohort lag is real and must be made explicit on the dashboard.</>}
        stretch={<>How would you display this lag to a non-technical exec audience?</>}
      />

      <VIS.TrapProblem
        id="dlf-p7"
        difficulty="hard"
        title="P7 — Continuous retraining cadence."
        scenario={<>Your delayed-feedback model retrains nightly on fresh + censored data. The team asks: should we retrain less often, given that matured-cohort signal lags 90 days anyway?</>}
        options={[
          {key:"a", text:"Nightly retraining is still useful because (i) the unconfirmed-censored set updates daily with new transactions, and the per-row t_i changes for previously-censored rows that age into newly-matured rows, and (ii) features and inputs (model context, score distributions) drift on shorter timescales than the delay. But avoid over-fitting to weekly fluctuation by adding a smoothing trick (EMA on parameters, or warm-restart from previous epoch) and an alert on parameter drift beyond a threshold.", correct:true},
          {key:"b", text:"Retrain quarterly — anything faster is meaningless."},
          {key:"c", text:"Retrain hourly to maximize recency."},
          {key:"d", text:"Never retrain; the model is robust to drift."},
        ]}
        trap={<>(b) misses faster feature drift. (c) is wasteful. (d) is wrong.</>}
        lens={<>(a) Nightly with smoothing is the senior cadence.</>}
        stretch={<>What signal would tell you nightly is too frequent?</>}
      />

      <VIS.TrapProblem
        id="dlf-p8"
        difficulty="hard"
        multiSelect
        title="P8 — Choose between PU, mature-only, and delayed-feedback survival"
        scenario={<>For different scenarios, which framing wins? Pick the scenarios where delayed-feedback survival is the senior default.</>}
        options={[
          {key:"a", text:"Delay distribution wide and bimodal; recency critical.", correct:true},
          {key:"b", text:"Per-segment delay shapes meaningfully different.", correct:true},
          {key:"c", text:"Continuous training pipeline with censored rows updating daily.", correct:true},
          {key:"d", text:"Label delay is uniformly short (under 24 hours)."},
          {key:"e", text:"You can build a delay-distribution feature-conditioned likelihood reliably.", correct:true},
          {key:"f", text:"Fraud patterns stable; 90-day-old data is still representative; engineering simplicity preferred."},
        ]}
        trap={<>(d) survival is overkill. (f) mature-only or naive is simpler and fine.</>}
        lens={<>(a), (b), (c), (e) are survival's sweet spots; (d) and (f) are not.</>}
        stretch={<>When would you pair survival with PU instead of using one alone?</>}
      />

      <VIS.TrapProblem
        id="dlf-p9"
        difficulty="hard"
        title="P9 — Joint likelihood is slow to optimize. How to make it tractable?"
        scenario={<>Your nightly retraining is failing the SLA: the joint likelihood is taking 9 hours to converge. Pick the senior set of fixes.</>}
        options={[
          {key:"a", text:"Apply a stack of tractability fixes: (1) decouple delay-distribution fitting from probability fitting in alternating EM-style passes — fit the delay model on matured data only, freeze it, then fit the probability model in the joint likelihood with the delay frozen, (2) use warm-restart from previous night's parameters, (3) approximate the survival term with a closed-form for the chosen parametric family, (4) downsample the censored majority class while keeping all positives, (5) parallelize gradient computation across cohort-time slices.", correct:true},
          {key:"b", text:"Drop the survival term; train as naive classifier."},
          {key:"c", text:"Increase the learning rate."},
          {key:"d", text:"Switch from PyTorch to TensorFlow."},
        ]}
        trap={<>(b) abandons the method. (c) is unprincipled. (d) is irrelevant.</>}
        lens={<>(a) Decoupled fitting + warm restart + closed-form survival + downsample + parallelize is the standard tractability stack.</>}
        stretch={<>Which of the five fixes gives the largest speedup?</>}
      />

      <VIS.TrapProblem
        id="dlf-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Production delayed-feedback stack — pick the ingredients"
        scenario={<>You ship a delayed-feedback survival model for a payment platform. Pick the ingredients a senior would put in production. Select all that apply.</>}
        options={[
          {key:"a", text:"Weibull (or log-normal) per-segment delay distribution with mixture components for bimodal segments, fit on matured cohort.", correct:true},
          {key:"b", text:"Joint likelihood (probability + delay) with EM-style decoupled fitting and warm-restart.", correct:true},
          {key:"c", text:"Cohort-table audits and unit tests on t_i and censoring indicator.", correct:true},
          {key:"d", text:"Matured-cohort AUC dashboard with explicit 90-day lag; alert on hazard-reliability drift.", correct:true},
          {key:"e", text:"Quarterly review of delay-distribution shape against new fraud-pattern data.", correct:true},
          {key:"f", text:"Drop the censored rows entirely to simplify the loss."},
          {key:"g", text:"Treat every row as positive once any chargeback arrives anywhere in the system."},
        ]}
        trap={<>(f) loses the central source of information. (g) corrupts labels.</>}
        lens={<>(a) through (e) form the defensible production stack.</>}
        stretch={<>Which item is the single most important governance artifact?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://olivier.chapelle.cc/pub/delayedConv.pdf" target="_blank" rel="noopener">
            <strong>Olivier Chapelle — Modeling Delayed Feedback in Display Advertising</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, KDD 2014)</span>
          <br/>The foundational paper. Section 3 derives the joint likelihood; the algebraic identities for the exponential survival term are exactly what you implement.
        </li>
        <li>
          <a href="https://lifelines.readthedocs.io/" target="_blank" rel="noopener">
            <strong>lifelines — Python survival analysis library</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(library docs + tutorials)</span>
          <br/>The friendliest entry to survival analysis. Read the chapters on Kaplan-Meier, Weibull, and Cox before extending to delayed-feedback. The notation maps cleanly.
        </li>
        <li>
          <a href="https://web.stanford.edu/~hastie/ElemStatLearn/" target="_blank" rel="noopener">
            <strong>Hastie, Tibshirani, Friedman — Elements of Statistical Learning, Ch. 18 (survival models)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(textbook chapter, free PDF)</span>
          <br/>The canonical math treatment of hazard, survival, and censoring. Required for confidence in the joint-likelihood derivation.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2002.10960" target="_blank" rel="noopener">
            <strong>Yasui et al. — A Feedback Shift Correction in Predicting Conversion Rates under Delayed Feedback</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, WWW 2020)</span>
          <br/>A modern extension of Chapelle's framework with importance-weighting correction. Read for the practical engineering tricks on continuous training.
        </li>
        <li>
          <a href="https://github.com/CFM-MS/delayed-feedback" target="_blank" rel="noopener">
            <strong>CFM-MS — delayed-feedback reference implementation (PyTorch)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(code repository)</span>
          <br/>Compact reference implementation. Best starting point for plugging delayed-feedback survival into an existing fraud pipeline.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
