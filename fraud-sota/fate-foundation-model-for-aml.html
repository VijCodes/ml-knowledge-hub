<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// FATE — Foundation Model for Anti-Money Laundering. KDD 2025.
// Load-bearing distinctions that must survive the redaction test:
//   (1) GRAPH foundation model — input is heterogeneous graph (accounts +
//       transactions + ownership), not tabular rows. Per-bank GNNs already do
//       this; FATE's contribution is what's pretrained INTO the encoder.
//   (2) MOTIF-PREDICTION OBJECTIVE — pretrain target is "which AML typology
//       does this subgraph realize?" — smurfing fan-out, layering chain,
//       round-tripping cycle, TBML. The typology vocabulary IS the pretrain.
//   (3) SIMULATED + CONSORTIUM corpus — real AML labels are too scarce; the
//       simulator generates typology-spanning synthetic graphs to pretrain on.
// Different cross-org pretrain anchor than Transformer-Risk-Mastercard
// (auth-decline) — DO NOT reuse the "your bank's data is too sparse" framing.
// FATE's anchor is "typology vocabulary needs diverse-graph pretrain."

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · AML foundation models"
      title="FATE — Foundation model for AML"
      subtitle="Graph foundation model pretrained on simulated and consortium AML graphs with a motif-prediction objective. Cross-bank typology vocabulary that no single bank's tiny labeled set can replicate."
      byline={[
        {label: "Source", value: "FATE: Foundation Model for AML (KDD 2025)"},
        {label: "L3", value: "Graph foundation model with motif-prediction pretrain"},
        {label: "Anchor", value: "Typology vocabulary (smurfing, layering, round-tripping, TBML) as the cross-bank signal"},
      ]}/>

    <VIS.TLDR>
      AML labels are notoriously scarce — a mid-size bank may have <strong>50-100 confirmed money-laundering cases over years</strong>. A per-bank GNN cold-starts on that handful; it cannot learn what each AML typology STRUCTURALLY looks like (smurfing fan-out subgraph, layering chain, round-tripping cycle, trade-based laundering invoice anomaly) from so few examples. FATE pretrains a graph encoder on (i) <strong>SIMULATED AML graphs</strong> generated by domain experts to span the known typology vocabulary, and (ii) <strong>anonymized consortium graphs</strong> from participating banks. The pretrain objective is <strong>motif prediction</strong> — given a subgraph, predict its typology label. The encoder learns to MAP STRUCTURAL PATTERNS TO TYPOLOGY VOCABULARY. A bank fine-tunes the encoder on their 80 labeled cases; the encoder already knows what smurfing looks like, fine-tune just learns which typologies fire at this bank. <strong>The cross-bank lever is the typology vocabulary itself</strong>, not generic data volume — that's the redaction-proof distinction from Transformer-Risk-Mastercard's auth-decline cross-issuer pretrain.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — graph foundation model with motif-prediction pretrain">
      <ol>
        <li><strong>Input graph:</strong> heterogeneous graph. Nodes = entities (accounts, beneficial owners, businesses, jurisdictions). Edges = transactions (amount, time, type), corporate ownership chains, account-to-account relationships, KYC links.</li>
        <li><strong>Typology vocabulary:</strong> the AML typologies the simulator spans:
          <ul>
            <li><strong>Smurfing</strong> — many small inbound transactions to one beneficiary (fan-out subgraph).</li>
            <li><strong>Layering</strong> — long chain of intermediary accounts each forwarding the same amount to obscure origin.</li>
            <li><strong>Round-tripping</strong> — cycle where money returns to a source account through 3+ intermediaries.</li>
            <li><strong>Trade-based ML (TBML)</strong> — invoice mismatches between trading partners.</li>
            <li><strong>Structuring</strong> — splitting amounts to stay below reporting thresholds.</li>
          </ul>
        </li>
        <li><strong>Pretrain corpus:</strong> (a) SIMULATED graphs generated to instantiate each typology with diverse structural parameters; (b) anonymized real consortium graphs where governance allows.</li>
        <li><strong>Pretrain objective — motif prediction:</strong> given a sampled subgraph centered on a node, predict which typology label (or 'benign') it realizes. Cross-entropy over the typology vocabulary.</li>
        <li><strong>Encoder:</strong> heterogeneous graph transformer (or graph attention network); produces per-node embeddings.</li>
        <li><strong>Fine-tune:</strong> bank loads the pretrained encoder; fine-tunes a small classifier head on their handful of labeled AML cases. The encoder is mostly frozen; the head learns "which typologies fire at THIS bank."</li>
      </ol>

      <VIS.Mermaid chart={`
flowchart TB
  S["Simulator - synthetic AML graphs"] --> C["Pretrain corpus"]
  K["Consortium anonymized graphs"] --> C
  C --> E["Graph encoder - motif prediction objective"]
  E --> P["Pretrained encoder - knows typology vocabulary"]
  P --> B["Bank fine-tune - 80 labeled cases"]
  B --> Y["AML risk score for this bank"]
  style C fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style E fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style B fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `}/>
      <p>Blue = the simulated + consortium pretrain corpus. Yellow = the motif-prediction objective that bakes the typology vocabulary into the encoder. Green = per-bank fine-tune on tiny labeled set.</p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from per-bank GNN / Transformer-Risk-Mastercard / FraudFM">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Per-bank GNN</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Transformer-Risk-Mastercard</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>FraudFM</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>FATE</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"6px 10px"}}>Input</td>
            <td style={{padding:"6px 10px"}}>Bank's own graph</td>
            <td style={{padding:"6px 10px"}}>Auth-event tape per card</td>
            <td style={{padding:"6px 10px"}}>Single-row tabular</td>
            <td style={{padding:"6px 10px"}}><strong>Heterogeneous AML graph</strong></td>
          </tr>
          <tr>
            <td style={{padding:"6px 10px"}}>Cross-org pretrain</td>
            <td style={{padding:"6px 10px"}}>No</td>
            <td style={{padding:"6px 10px"}}>Yes</td>
            <td style={{padding:"6px 10px"}}>Yes</td>
            <td style={{padding:"6px 10px"}}>Yes</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"6px 10px"}}>Pretrain anchor</td>
            <td style={{padding:"6px 10px"}}>N/A</td>
            <td style={{padding:"6px 10px"}}>Auth-decline prediction</td>
            <td style={{padding:"6px 10px"}}>Fraud labels</td>
            <td style={{padding:"6px 10px"}}><strong>AML typology vocabulary (motif prediction)</strong></td>
          </tr>
          <tr>
            <td style={{padding:"6px 10px"}}>Pretrain data source</td>
            <td style={{padding:"6px 10px"}}>N/A</td>
            <td style={{padding:"6px 10px"}}>Mastercard network auths</td>
            <td style={{padding:"6px 10px"}}>Consortium issuer tx</td>
            <td style={{padding:"6px 10px"}}><strong>Simulated + consortium AML graphs</strong></td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"6px 10px"}}>Use case</td>
            <td style={{padding:"6px 10px"}}>Generic graph fraud</td>
            <td style={{padding:"6px 10px"}}>Real-time auth scoring</td>
            <td style={{padding:"6px 10px"}}>Single-row tabular fraud</td>
            <td style={{padding:"6px 10px"}}>AML with tiny labels</td>
          </tr>
        </tbody>
      </table>
      <p style={{marginTop:10}}>Redaction litmus: strip "AML typology vocabulary" and "simulated AML graphs" — does the answer still win? If yes, the problem isn't testing FATE specifically.</p>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limits and gotchas — the FATE-specific ones">
      <VIS.Callout kind="gotcha" title="Simulator-real gap is the load-bearing concern">
        The pretrained encoder knows what the SIMULATOR thinks typologies look like. If the simulator's smurfing pattern doesn't quite match real smurfing in your jurisdiction (different amount thresholds, different account-velocity), the encoder's representation transfers imperfectly. Validate the simulator by sampling real labeled cases and checking that simulated near-neighbors share typology.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Novel typologies require re-pretraining">
        If a new criminal MO emerges (sanctions evasion through a new corporate-structure pattern) and isn't in the simulator's typology vocabulary, FATE can't detect it. The encoder was pretrained on a CLOSED vocabulary. Production process: investigators flag novel typology → AML experts encode it as a simulator generator → re-pretrain (or selectively fine-tune) → deploy.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Consortium graphs need careful governance">
        Even anonymized AML graphs reveal sensitive patterns (which bank has many smurfing cases, etc.). Consortium contracts must specify the anonymization standard and use limitations. Some banks legally cannot participate.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Per-bank label scarcity is the use case, not a bug">
        Real-world AML labels are extremely rare: a mid-size bank may have 50-100 confirmed cases over many years. This SCARCITY is exactly why FATE's pretrain matters. If you have thousands of AML labels per bank (rare), per-bank GNN may match FATE without the pretrain machinery.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Not for non-AML fraud">
        FATE's typology vocabulary is AML-specific (smurfing, layering, round-tripping, TBML, structuring). Applying FATE to card-not-present fraud or account takeover transfers nothing — the typology vocabulary doesn't match. Use FraudFM or per-event sequence transformers for card fraud.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — concept-specific trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Every problem hinges on something only FATE does: the graph-foundation-model structure (heterogeneous AML graph as input), the AML-typology-vocabulary motif-prediction pretrain objective, the simulated + consortium pretrain corpus, the typology-vs-novel-MO failure mode, or the AML-label-scarcity use case. Strip "AML typology" or "motif prediction" or "simulated AML graphs" and the option must no longer win.
      </p>

      {/* P1 — B3 pitch */}
      <VIS.TrapProblem
        id="fate-p1"
        difficulty="hard"
        title="P1 — The AML team has 80 labeled cases over 5 years. They ask: 'Why FATE instead of training our own GNN on those 80?'"
        scenario={<><em>Discriminating insight: the pitch must name (a) AML TYPOLOGY VOCABULARY as the cross-bank lever (smurfing, layering, round-tripping, TBML) and (b) MOTIF-PREDICTION PRETRAIN on simulated + consortium graphs as what bakes the vocabulary into the encoder. CRITICALLY: do NOT reuse the "your bank's data is too sparse" framing — that's T-R-M's auth-decline pitch. FATE's pitch is "typology vocabulary requires diverse-graph pretrain."</em><br/><br/>Pick the pitch.</>}
        options={[
          {key:"a", text:"Your bank's data is too sparse — that's why we need cross-bank pretrain."},
          {key:"b", text:"A per-bank GNN cold-starts on 80 labeled cases — too few to learn what each AML TYPOLOGY structurally looks like. AML typologies are a CLOSED VOCABULARY (smurfing fan-out, layering chain, round-tripping cycle, trade-based laundering invoice anomaly, structuring), and each typology has a distinctive SUBGRAPH SIGNATURE. FATE pretrains a graph encoder on (i) SIMULATED AML graphs generated by domain experts to instantiate each typology, (ii) anonymized consortium graphs. The pretrain objective is MOTIF PREDICTION: given a subgraph, predict its typology. The encoder learns the structural mapping between subgraph shape and typology label across diverse graph instances no single bank has. We fine-tune on our 80 cases — the encoder already knows what smurfing looks like; fine-tune just learns which typologies fire at our bank. The lever is the TYPOLOGY VOCABULARY (specific to AML), not generic 'more data' (which is closer to the auth-decline pitch).", correct:true},
          {key:"c", text:"FATE is a transformer, so it's better than GNN."},
          {key:"d", text:"FATE has more parameters than our GNN."},
        ]}
        trap={<>(a) is a generic data-sparsity pitch that fits Transformer-Risk-Mastercard's pitch on auth-decline; it doesn't name FATE's specific load-bearing piece. (c)(d) miss the typology-vocabulary lever entirely.</>}
        lens={<>FATE pitch must name (1) AML typology vocabulary as the cross-bank signal, (2) motif-prediction pretrain objective, (3) simulated + consortium corpus. NOT generic data sparsity.</>}
        stretch={<>If your bank has 5000 AML cases (rare), is FATE still worth the engineering cost? Hint: marginal — per-bank GNN can learn the typology distribution itself.</>}
      />

      {/* P2 — motif prediction objective */}
      <VIS.TrapProblem
        id="fate-p2"
        difficulty="hard"
        title="P2 — Why is MOTIF-PREDICTION the pretrain objective, and not generic link-prediction or node classification?"
        scenario={<><em>Discriminating insight: motif prediction forces the encoder to map STRUCTURAL PATTERNS to TYPOLOGY LABELS — a domain-specific supervised signal across diverse simulated graphs. Generic link-prediction learns "which links exist" — no typology distinction. Generic node classification needs node labels which AML doesn't have at scale.</em><br/><br/>Pick.</>}
        options={[
          {key:"a", text:"Motif prediction is easier to implement."},
          {key:"b", text:"Motif prediction is task-aligned with downstream AML detection. The objective: given a sampled subgraph centered on a node, predict its typology label from the closed vocabulary {benign, smurfing, layering, round-tripping, TBML, structuring}. This forces the encoder to learn the structural-pattern → typology mapping that AML investigators ALSO use. Alternative objectives don't transfer as well: (i) <strong>generic link prediction</strong> learns 'which edges exist?' — useful for graph completion but doesn't distinguish typologies. (ii) <strong>generic node classification</strong> requires node-level AML labels which AML doesn't have at scale (and which the simulator would have to invent). (iii) <strong>contrastive/InfoNCE</strong> learns invariances but no semantic vocabulary. Motif prediction uses the simulator's KNOWN ground-truth typology labels (cheap to generate by construction in synthetic data), and forces the encoder to learn the same vocabulary AML investigators apply.", correct:true},
          {key:"c", text:"Motif prediction is the only graph pretraining objective."},
          {key:"d", text:"Link prediction would work just as well."},
        ]}
        trap={<>(a) is incidental; (c) is false; (d) misses task alignment.</>}
        lens={<>Pretrain objective should match downstream task. Motif prediction = structural-pattern-to-typology mapping = exactly what AML detection is.</>}
        stretch={<>What's the right objective if you want to ALSO detect novel typologies? Hint: combine motif prediction with contrastive self-supervised.</>}
      />

      {/* P3 — simulator-real gap */}
      <VIS.TrapProblem
        id="fate-p3"
        difficulty="hard"
        title="P3 — Your bank's confirmed smurfing cases have a slightly different structural signature than the simulator's smurfing. What goes wrong?"
        scenario={<><em>Discriminating insight: the encoder learned what the SIMULATOR's smurfing looks like; real smurfing at your bank may have different amount thresholds, different account-velocity, different jurisdictional patterns. The mismatch is the simulator-real gap — pretrain transfers IMPERFECTLY. Validate via sampled real labels.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"FATE is broken."},
          {key:"b", text:"Simulator-real gap. The pretrained encoder learned what the SIMULATOR thinks smurfing looks like — specific amount thresholds, account-velocity, jurisdictional patterns chosen by the simulator's authors. Real smurfing at your bank may differ on those parameters (different threshold structures by local regulation, different velocity patterns by demographics, etc.). The encoder's representation transfers PARTIALLY: subgraphs structurally similar to simulator-smurfing get high typology activation; subgraphs that are real-smurfing-but-different may not. Validation protocol: sample your bank's labeled smurfing cases, embed them with the FATE encoder, and check that the nearest-neighbor simulated subgraphs share the typology label (validates transfer). If many real cases land far from simulator clusters, the simulator needs domain-specific tuning. The fix is iterative: feed flagged false-negatives back to the simulator to expand its parameter range.", correct:true},
          {key:"c", text:"Increase the simulator's data volume."},
          {key:"d", text:"Switch to non-pretrained GNN."},
        ]}
        trap={<>(a)(d) overclaim; (c) doesn't fix the parameter-distribution mismatch (more data of the same simulator is still the wrong simulator).</>}
        lens={<>Pretrain teaches the simulator's vocabulary; real-world may differ. Validate via real labeled samples; iterate simulator.</>}
        stretch={<>What's the right metric for "simulator-real alignment"? Hint: encoder-embedding distribution overlap.</>}
      />

      {/* P4 — vs Transformer-Risk-Mastercard */}
      <VIS.TrapProblem
        id="fate-p4"
        difficulty="hard"
        title="P4 — FATE and Transformer-Risk-Mastercard both pretrain cross-organization. Where do they ACTUALLY differ?"
        scenario={<><em>Discriminating insight: BOTH pretrain cross-org, but on DIFFERENT signals and surfaces. T-R-M = AUTH-DECLINE on per-event tape (sequence of auth tuples). FATE = AML-TYPOLOGY-VOCABULARY on graphs (subgraphs with motif labels). The CROSS-ORG lever is shared; the WHAT is being learned differs critically. Don't reuse "your bank's data is too sparse" framing.</em><br/><br/>Compare.</>}
        options={[
          {key:"a", text:"They are the same — cross-org pretrain."},
          {key:"b", text:"Same cross-org lever, fundamentally different signal + surface. (1) <strong>Signal</strong>: T-R-M pretrains on AUTH-DECLINE prediction (binary classification: will this auth be declined?). FATE pretrains on AML-TYPOLOGY motif prediction (multi-class over typology vocabulary). (2) <strong>Input unit</strong>: T-R-M's input is a per-card sequence of auth-event tuples (BIN, merchant_id, MCC, geo, time-delta, channel). FATE's input is a heterogeneous graph (entities + transactions + ownership). (3) <strong>Surface</strong>: T-R-M serves real-time auth-path scoring (sub-50ms). FATE serves offline AML investigation (compute-heavier; latency budget is hours-days). (4) <strong>Data source</strong>: T-R-M = Mastercard network all-issuer auths. FATE = simulated AML graphs + consortium AML graphs from participating banks. The 'your bank's data is too sparse' pitch fits T-R-M (network volume vs single-issuer); FATE's pitch must instead say 'typology vocabulary needs diverse-graph pretrain' (vocabulary breadth, not raw volume).", correct:true},
          {key:"c", text:"They are competitors for the same use case."},
          {key:"d", text:"FATE is a Mastercard product."},
        ]}
        trap={<>(a) collapses; (c)(d) confuse the products.</>}
        lens={<>Same lever, different signal. T-R-M = decline-vocab + per-event + real-time. FATE = typology-vocab + graph + offline.</>}
        stretch={<>Could a bank use both? Hint: yes — T-R-M for auth path, FATE for AML investigation.</>}
      />

      {/* P5 — novel typology */}
      <VIS.TrapProblem
        id="fate-p5"
        difficulty="hard"
        title="P5 — A new criminal MO emerges: sanctions evasion via shell-company chains in a new jurisdiction. FATE recall is poor. Why?"
        scenario={<><em>Discriminating insight: FATE's pretrain is on a CLOSED typology vocabulary. Novel typologies (new patterns the simulator didn't generate) require expanding the simulator vocabulary and re-pretraining. The encoder has no representation for patterns outside its vocabulary.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"FATE is bad."},
          {key:"b", text:"Closed-vocabulary failure mode. FATE's pretrain teaches the encoder to map subgraphs to a CLOSED typology vocabulary: smurfing, layering, round-tripping, TBML, structuring. A novel MO (shell-company chains in a new jurisdiction with a structural signature distinct from any pretrained typology) maps to either the wrong typology with low confidence or to 'benign.' The encoder cannot generalize to typologies outside its pretrained vocabulary. Fix process: (i) investigators flag the novel typology with explicit structural description; (ii) AML domain experts encode it as a simulator generator (synthesize 10k+ instances); (iii) re-pretrain (or selectively fine-tune the encoder) on the extended vocabulary; (iv) deploy. This is a continuous-update process — typology vocabulary is never closed permanently. Until re-pretrain, the novel typology requires supplementary rule-based or supervised detection.", correct:true},
          {key:"c", text:"Train FATE longer."},
          {key:"d", text:"Use a deeper encoder."},
        ]}
        trap={<>(a)(c)(d) don't address the closed-vocabulary structure.</>}
        lens={<>Closed vocabulary = systematic miss on novel typologies. Continuous simulator-update is the production process.</>}
        stretch={<>How do you DETECT a novel typology before you have labels for it? Hint: anomaly detection on encoder embeddings — out-of-distribution clusters.</>}
      />

      {/* P6 — graph input mechanism */}
      <VIS.TrapProblem
        id="fate-p6"
        difficulty="hard"
        title="P6 — Why is the input a GRAPH (not tabular rows or sequences)? What does graph structure carry that flat tabular doesn't?"
        scenario={<><em>Discriminating insight: AML typologies are STRUCTURAL — they live in the RELATIONSHIPS between accounts. Smurfing = fan-out subgraph; layering = chain; round-tripping = cycle. These are inherently graph patterns. Flat tabular loses the structure; sequence loses non-temporal relationships (corporate ownership).</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Graphs are just for visualization."},
          {key:"b", text:"AML typologies ARE structural — they live in the relationships between accounts, not in any single transaction's attributes. <strong>Smurfing</strong> = fan-out subgraph where one beneficiary has many small inbound counterparties. <strong>Layering</strong> = directed chain of intermediary accounts each forwarding the same amount. <strong>Round-tripping</strong> = a cycle where money returns to origin through 3+ intermediaries. <strong>TBML</strong> = bipartite graph of trading partners with invoice mismatches. <strong>Structuring</strong> = pattern of split deposits across multiple accounts owned by the same beneficial owner. These are graph patterns by definition. A flat tabular representation (one row per transaction) loses the multi-hop structure — you'd have to hand-engineer 'count of counterparties to this beneficiary in last 30d' as a feature; the graph encoder learns this natively via message-passing. A sequence representation (per-account transaction history) loses the cross-account relationships (corporate ownership, beneficial-owner linkages). Graph is the right input for the typology surface.", correct:true},
          {key:"c", text:"Graphs let the model train faster."},
          {key:"d", text:"Graph data is required by regulation."},
        ]}
        trap={<>(a)(c)(d) miss the structural nature of typologies.</>}
        lens={<>AML typologies are graph patterns. Graph input is the right inductive bias.</>}
        stretch={<>Could you collapse the graph to features and feed to FraudFM? Hint: you'd hand-engineer k-hop aggregates, but the GNN does it for you with the right inductive bias.</>}
      />

      {/* P7 — simulator quality matters */}
      <VIS.TrapProblem
        id="fate-p7"
        difficulty="hard"
        title="P7 — Engineer says 'just use any AML simulator.' Why is simulator quality the load-bearing engineering choice?"
        scenario={<><em>Discriminating insight: simulator IS the pretrain — its typology vocabulary, parameter distributions, and structural fidelity determine what the encoder learns. A weak simulator gives weak transfer. AMLSim (Suzumura et al.) is open-source but limited to a few typologies; production deployments often build proprietary simulators with domain-expert input.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Any simulator works."},
          {key:"b", text:"Simulator IS the pretrain. The encoder learns to map subgraphs to the typology labels the simulator generates — so the simulator's TYPOLOGY VOCABULARY, PARAMETER DISTRIBUTIONS, and STRUCTURAL FIDELITY directly determine what the encoder learns. Three quality dimensions matter: (1) <strong>Vocabulary coverage</strong>: does the simulator cover all typologies you care about? AMLSim (Suzumura et al., open-source) covers a few canonical typologies; production deployments often extend with proprietary typology generators built with domain experts. (2) <strong>Parameter distribution realism</strong>: does the simulator's smurfing have realistic amounts, account-velocity, jurisdictional patterns? If the simulator's smurfing is at $9k thresholds but real cases at your bank are at $4k thresholds, the encoder transfers imperfectly. (3) <strong>Structural fidelity</strong>: does the simulator generate counterparty graphs with realistic clustering, hub-and-spoke patterns, etc.? Weak simulator = weak encoder = weak transfer to real cases. Senior framing: simulator quality is the load-bearing engineering investment; it's expert-driven, not generic.", correct:true},
          {key:"c", text:"All simulators are equivalent."},
          {key:"d", text:"Simulator doesn't matter."},
        ]}
        trap={<>(a)(c)(d) understate the simulator's role.</>}
        lens={<>Simulator IS the pretrain. Quality = vocabulary + parameters + structural fidelity.</>}
        stretch={<>What's the lightest-weight way to validate a simulator? Hint: nearest-neighbor distance between simulated and labeled real cases.</>}
      />

      {/* P8 — when NOT to use FATE */}
      <VIS.TrapProblem
        id="fate-p8"
        difficulty="hard"
        title="P8 — A team wants to apply FATE to credit-card fraud (not AML). Diagnose."
        scenario={<><em>Discriminating insight: FATE's typology vocabulary is AML-specific. Card fraud has different patterns (card-testing, lost-and-tested, CNP enumeration) — none in FATE's vocabulary. The pretrain transfers nothing useful. Use FraudFM / sequence transformer / per-event auth-tape model instead.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Yes — FATE works for any fraud."},
          {key:"b", text:"Wrong use case. FATE's typology vocabulary is AML-specific (smurfing, layering, round-tripping, TBML, structuring). Card-not-present fraud has entirely different patterns (card-testing bursts, lost-and-tested chains, BIN-attack waves, ATO followed by exfiltration) — none of these are in FATE's vocabulary. The pretrain transfers nothing useful: the encoder's structural-to-typology mapping doesn't match the card-fraud structural-to-pattern mapping. Outcome: FATE will underperform a generic per-card sequence model (FATA-Trans, Mamba) or a tabular model (FraudFM) for card fraud. Match the foundation model to the use case: FATE for AML; FraudFM for tabular single-row fraud with consortium pretrain; T-R-M for real-time auth-decline; sequence transformers for per-card behavioral patterns. 'Foundation model' is not a generic label — each is anchored on a specific vocabulary.", correct:true},
          {key:"c", text:"Yes, with re-pretraining."},
          {key:"d", text:"FATE replaces all other models."},
        ]}
        trap={<>(a)(d) over-generalize; (c) is naive (the whole architecture is AML-oriented).</>}
        lens={<>FATE vocabulary = AML only. Card fraud needs different foundation models.</>}
        stretch={<>What's the closest analog of FATE for card fraud? Hint: T-R-M, but anchored on auth-decline not typology.</>}
      />

      {/* P9 — eval contamination */}
      <VIS.TrapProblem
        id="fate-p9"
        difficulty="hard"
        title="P9 — FATE consortium pretrain includes your bank's anonymized graphs. What's the eval problem?"
        scenario={<><em>Discriminating insight: if your bank's data is in the consortium pretrain, the encoder has seen your bank's specific graph patterns; eval on your bank's labels conflates transfer with memorization. Demand 'bank excluded from pretrain' guarantee.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"More data is better."},
          {key:"b", text:"Eval-time leakage. If your bank's anonymized graphs are in the FATE consortium pretrain corpus, the encoder has already seen your bank's specific structural patterns during pretraining. Your fine-tune labels overlap with those graph patterns; the offline eval cannot distinguish 'cross-bank typology transfer' from 'memorization of your bank's seen patterns.' Demand the consortium contract specify: 'your bank's data excluded from your pretrain' — i.e., the encoder you fine-tune was pretrained on all consortium data EXCEPT your bank's. This way the eval measures honest transfer. Also: even with the exclusion, the SIMULATOR may have been tuned using your bank's labeled cases (a different leakage vector); demand 'simulator parameters not derived from your bank's data.' Honest eval = bank-excluded pretrain + temporally-stratified eval split.", correct:true},
          {key:"c", text:"Anonymization removes leakage."},
          {key:"d", text:"Leakage doesn't matter."},
        ]}
        trap={<>(a)(c)(d) understate the leak.</>}
        lens={<>Bank-excluded pretrain + temporal split. Anonymization removes identity, not behavioral memorization.</>}
        stretch={<>What's the right anonymization standard for consortium AML data? Hint: graph isomorphism + amount jittering, but residual signal remains.</>}
      />

      {/* P10 — simulator update process */}
      <VIS.TrapProblem
        id="fate-p10"
        difficulty="hard"
        title="P10 — Order the FATE deployment + simulator-update lifecycle."
        scenario={<><em>Discriminating insight: simulator → pretrain → fine-tune at bank → flag novel typologies → expert encodes new typology in simulator → selective re-pretrain → redeploy. It's a closed loop, not a one-shot pretrain.</em><br/><br/>Pick.</>}
        options={[
          {key:"a", text:"Pretrain once, deploy forever."},
          {key:"b", text:"Continuous closed-loop. (1) <strong>Initial pretrain</strong>: simulator generates synthetic graphs spanning the typology vocabulary; consortium graphs added where available; encoder pretrained with motif-prediction objective. (2) <strong>Bank fine-tune</strong>: load pretrained encoder; bank fine-tunes a classifier head on their tiny labeled AML set. Deploy. (3) <strong>Production monitoring</strong>: investigators flag cases the model missed (false negatives) AND novel typologies it can't represent. (4) <strong>Novel-typology encoding</strong>: AML domain experts review flagged cases and define new typology generators for the simulator. (5) <strong>Selective re-pretrain</strong>: re-pretrain the encoder on the extended typology vocabulary (sometimes a smaller fine-tune of the existing encoder; sometimes a full re-pretrain for major vocabulary changes). (6) <strong>Re-deploy</strong>. Cycle repeats quarterly or whenever a major MO emerges. Skipping the closed loop means the encoder ages out as criminal MOs evolve.", correct:true},
          {key:"c", text:"Skip the simulator update."},
          {key:"d", text:"Re-pretrain after every transaction."},
        ]}
        trap={<>(a) treats it as one-shot; (c) skips the update loop; (d) is impractical.</>}
        lens={<>Closed-loop simulator update is core to staying current with criminal MOs.</>}
        stretch={<>What's the right cadence for full re-pretrain? Hint: quarterly + on-demand for major novel typologies.</>}
      />

      {/* P11 — label scarcity check */}
      <VIS.TrapProblem
        id="fate-p11"
        difficulty="medium"
        title="P11 — Your bank has 5000 confirmed AML cases (unusually high). Is FATE still the right tool?"
        scenario={<><em>Discriminating insight: at 5000 labeled cases, per-bank GNN can learn the typology distribution itself. FATE's pretrain advantage shrinks; engineering cost of consortium contracts + simulator-update process may exceed lift. Default to per-bank GNN with hand-engineered typology features.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Yes — FATE always wins."},
          {key:"b", text:"Marginal. FATE's pretrain advantage is largest when AML labels are EXTREMELY SCARCE (50-100 cases) — the encoder bakes in the typology vocabulary that the per-bank GNN couldn't learn from so few examples. At 5000 labeled cases, a per-bank GNN has enough data to learn typology distributions natively. The compute + governance + simulator-maintenance cost of FATE may exceed the marginal lift. Sane default for label-rich AML (rare in practice): per-bank GNN with hand-engineered typology features (fan-out count, chain depth, cycle detection). Run FATE on a hold-out slice to validate the lift; ship only if &gt;1pt AUPRC at fixed precision.", correct:true},
          {key:"c", text:"No — FATE doesn't work."},
          {key:"d", text:"FATE is only useful for benchmark papers."},
        ]}
        trap={<>(a)(c)(d) miss the conditional.</>}
        lens={<>FATE pays off at label scarcity. Label-rich AML → per-bank GNN baseline.</>}
        stretch={<>What's the inflection point in label count? Hint: ~1000-2000.</>}
      />

      {/* P12 — D2 cascade */}
      <VIS.TrapProblem
        id="fate-p12"
        difficulty="hard"
        title="P12 — Team adopts FATE for trade-based money laundering (TBML) without checking that TBML is in the simulator vocabulary. Cascade?"
        scenario={<><em>Discriminating insight: if TBML isn't in the simulator's vocabulary, FATE's encoder has no representation for it. Pretrain transfers nothing; fine-tune on TBML labels is from-scratch. Result: worse than per-bank GNN that was trained from scratch on the same labels. Cascade rooted in not verifying vocabulary coverage.</em><br/><br/>Cascade.</>}
        options={[
          {key:"a", text:"FATE handles TBML automatically."},
          {key:"b", text:"Vocabulary-mismatch cascade. (1) TBML is not in the simulator's pretrained typology vocabulary (the simulator covers smurfing, layering, round-tripping, structuring, but not TBML). (2) The pretrained encoder has no learned representation for TBML's invoice-mismatch bipartite graph pattern. (3) Fine-tuning on the bank's TBML labels is effectively from-scratch — the encoder weights are no better than random init for this typology. (4) Worse: the encoder may FORCE-FIT TBML cases into the nearest pretrained typology (e.g., 'structuring'), producing systematically wrong predictions on TBML. (5) Per-bank GNN trained from scratch on TBML labels likely matches or beats FATE in this regime. Root cause: not verifying vocabulary coverage before adopting FATE. Senior framing: ALWAYS check that the target typologies are in the simulator before deploying — vocabulary coverage is a pre-flight check, not a discovery.", correct:true},
          {key:"c", text:"FATE just needs more training."},
          {key:"d", text:"TBML is impossible to detect."},
        ]}
        trap={<>(a)(c) overclaim; (d) is wrong.</>}
        lens={<>Vocabulary coverage is a pre-flight check, not a discovery.</>}
        stretch={<>What's the pre-flight checklist before adopting FATE? Hint: typology-coverage table for your target typologies.</>}
      />

      {/* P13 — Friday 3am */}
      <VIS.TrapProblem
        id="fate-p13"
        difficulty="hard"
        title="P13 — Friday 3am: investigators flag a coordinated cross-bank ring using a typology the simulator covers (smurfing). FATE catches part of the ring but misses cards at counterparty banks. Diagnose."
        scenario={<><em>Discriminating insight: FATE pretrained on cross-bank GRAPHS but at deploy time each bank scores ITS OWN graph. The ring spans multiple banks; the bank running FATE sees only its slice of the ring. Cross-bank ring detection at INFERENCE TIME needs consortium graph sharing, not just consortium pretrain.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"FATE is broken."},
          {key:"b", text:"Architectural ceiling at deploy time. FATE pretrained on cross-bank graphs (the consortium pretrain corpus), so the ENCODER knows what cross-bank ring patterns look like. But at DEPLOY TIME, each bank scores ITS OWN GRAPH — your bank sees only the part of the ring touching your accounts. The cross-bank slice of the ring (counterparty cards at other banks) is structurally invisible to your inference pipeline. Fix: <strong>operational consortium sharing</strong> — banks share suspicious subgraphs at inference time (under a privacy-preserving protocol, e.g., secure multi-party computation or trusted intermediary) so each bank's FATE inference operates on the full ring graph. This is governance-heavy and most consortiums don't yet support it. Without operational sharing, FATE catches your bank's slice well but misses cross-bank coordination. Senior framing: pretrain-time cross-bank knowledge ≠ inference-time cross-bank visibility.", correct:true},
          {key:"c", text:"Retrain FATE weekly."},
          {key:"d", text:"Use a per-bank GNN."},
        ]}
        trap={<>(a)(d) miss the time-of-knowledge distinction; (c) doesn't fix it.</>}
        lens={<>Pretrain cross-bank ≠ inference cross-bank. Operational consortium graph sharing is a separate problem.</>}
        stretch={<>What's the lightest-weight operational consortium signal? Hint: hashed counterparty IDs with bloom-filter-style overlap detection.</>}
      />

      {/* P14 — diagnostic battery */}
      <VIS.TrapProblem
        id="fate-p14"
        difficulty="hard"
        multiSelect
        title="P14 — FATE pretrain quality diagnostic battery, BEFORE fine-tuning. Pick all that apply."
        scenario={<><em>Discriminating insight: FATE-specific: (a) motif-prediction val accuracy on held-out simulated graphs, (b) typology-cluster separation in encoder embedding space, (c) real-vs-simulated nearest-neighbor overlap, (d) per-typology recall on real labeled cases, (e) embedding distribution shift between simulated and real graphs.</em><br/><br/>Pick.</>}
        options={[
          {key:"a", text:"Motif-prediction val accuracy on held-out simulated graphs — should be high (say, &gt;90% on the typology vocabulary).", correct:true},
          {key:"b", text:"AUPRC on the bank's labeled fine-tune set."},
          {key:"c", text:"Encoder embedding visualization (UMAP/t-SNE) — different typologies should form separable clusters; collapsed clusters mean the encoder isn't distinguishing typologies.", correct:true},
          {key:"d", text:"Nearest-neighbor overlap: for each real labeled case (held out), check whether its k-nearest-neighbor simulated subgraphs share the same typology label.", correct:true},
          {key:"e", text:"Per-typology recall: stratified evaluation showing the model isn't strong on smurfing but weak on layering — uneven coverage reveals simulator imbalances.", correct:true},
          {key:"f", text:"Number of GPU days spent pretraining."},
          {key:"g", text:"Embedding distribution shift (KL divergence or MMD) between simulator-pretrain distribution and real-graph fine-tune distribution.", correct:true},
        ]}
        trap={<>(b) is the integrated downstream metric; (f) is incidental.</>}
        lens={<>Pre-fine-tune: motif-acc + cluster separation + NN overlap + per-typology recall + distribution shift.</>}
        stretch={<>Cheapest?</>}
      />

      {/* P15 — vs supervised graph baseline */}
      <VIS.TrapProblem
        id="fate-p15"
        difficulty="hard"
        title="P15 — A baseline per-bank GNN beats FATE on AUPRC. Where's the catch?"
        scenario={<><em>Discriminating insight: per-bank GNN AUPRC may look better on EASY typologies the bank has many labels for; FATE's lift is on RARE typologies the bank has few labels for. Stratified per-typology recall reveals the truth.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Per-bank GNN is just better."},
          {key:"b", text:"Stratified evaluation likely reveals the catch. Bank GNN was trained on the bank's label distribution — overweighted toward the TYPOLOGIES the bank's labels cover (probably smurfing + structuring, the easy ones). On those, the per-bank GNN AUPRC is fine. FATE's lift is on the RARE TYPOLOGIES (round-tripping, TBML, novel patterns) where the bank has 1-2 labels — too few to train a per-bank model but enough to fine-tune a pretrained encoder. The aggregate AUPRC compares apples to oranges if it averages over typologies the bank's distribution covers poorly. Demand STRATIFIED PER-TYPOLOGY RECALL: 'recall on smurfing,' 'recall on round-tripping,' 'recall on TBML.' FATE will show similar recall on common typologies and substantially better recall on rare ones. The integrated AUPRC hides this if the typology distribution is skewed.", correct:true},
          {key:"c", text:"FATE doesn't work."},
          {key:"d", text:"The benchmark is wrong."},
        ]}
        trap={<>(a)(c) overclaim; (d) deflects.</>}
        lens={<>Stratified per-typology metrics reveal where FATE's lift lives. Aggregate AUPRC can hide it.</>}
        stretch={<>What's the right metric for an AML benchmark? Hint: macro-averaged recall across typologies, not micro-averaged.</>}
      />

      {/* P16 — wrong-assumption cascade */}
      <VIS.TrapProblem
        id="fate-p16"
        difficulty="hard"
        title="P16 — Engineer says 'FATE is a GNN with cross-bank pretrain.' Which downstream beliefs cascade wrong?"
        scenario={<><em>Discriminating insight: under-specifies — misses (1) typology vocabulary as the pretrain target, (2) motif prediction as the objective, (3) simulator's role, (4) closed vocabulary failure mode on novel typologies.</em><br/><br/>Cascade.</>}
        options={[
          {key:"a", text:"Nothing follows."},
          {key:"b", text:"At least four things break. (1) 'Cross-bank pretrain is generic data volume' → engineer doesn't verify typology vocabulary coverage → adopts FATE for typologies not in the vocabulary (P12). (2) 'Motif prediction is one of many objectives' → engineer might switch to a generic graph-pretrain objective (link prediction, contrastive) that loses the task-alignment with downstream AML detection. (3) 'Simulator is just a data source' → engineer doesn't maintain the simulator-update closed loop, so the encoder ages out as criminal MOs evolve. (4) 'Cross-bank pretrain = cross-bank inference' → engineer expects FATE to detect rings spanning multiple banks at inference time, but pretrain knowledge ≠ inference visibility (P13). The frame 'GNN with cross-bank pretrain' collapses all four load-bearing pieces into a single under-specified description.", correct:true},
          {key:"c", text:"Only typology breaks."},
          {key:"d", text:"Only the simulator breaks."},
        ]}
        trap={<>(a)(c)(d) understate.</>}
        lens={<>FATE = (graph encoder) + (typology vocabulary) + (motif prediction) + (simulator + consortium) + (closed-loop update). Reducing collapses all.</>}
        stretch={<>Which break is hardest to diagnose post-hoc?</>}
      />

      {/* P17 — production rollout */}
      <VIS.TrapProblem
        id="fate-p17"
        difficulty="medium"
        title="P17 — Order the FATE rollout stages from baseline → FATE deployment."
        scenario={<><em>Discriminating insight: stage 1 = per-bank GNN baseline; stage 2 = verify typology vocabulary coverage; stage 3 = consortium contract + bank-excluded pretrain; stage 4 = fine-tune; stage 5 = simulator update process; stage 6 = (optional) operational consortium sharing.</em><br/><br/>Pick.</>}
        options={[
          {key:"a", text:"Ship FATE day 1."},
          {key:"b", text:"Six stages. <strong>Stage 1</strong>: per-bank GNN baseline (hand-engineered typology features + GAT/GraphSAGE). Establishes the floor. <strong>Stage 2</strong>: verify typology vocabulary coverage — map your bank's target typologies to FATE's simulator vocabulary; flag gaps. <strong>Stage 3</strong>: consortium contract with 'bank-excluded pretrain' clause + anonymization audit. <strong>Stage 4</strong>: load pretrained encoder; fine-tune on your bank's labels. A/B test against per-bank GNN baseline. <strong>Stage 5</strong>: instantiate the simulator-update closed-loop process — flagged false-negatives feed back to AML experts who encode new typology generators. Quarterly re-pretrain cadence. <strong>Stage 6 (optional)</strong>: explore operational consortium graph sharing for cross-bank ring detection at inference time (governance-heavy). Skipping stages 1-2 forfeits the ability to attribute lift; skipping stage 5 means the encoder ages out within a year.", correct:true},
          {key:"c", text:"Skip the baseline."},
          {key:"d", text:"Adopt the simulator before pretraining."},
        ]}
        trap={<>(a)(c)(d) lose attribution or order.</>}
        lens={<>Baseline → vocabulary check → consortium → fine-tune → update-loop → operational sharing.</>}
        stretch={<>At which stage do you decide FATE isn't the right tool?</>}
      />

      {/* P18 — reproducibility */}
      <VIS.TrapProblem
        id="fate-p18"
        difficulty="medium"
        title="P18 — A reproduction of FATE on AMLSim reports lift over a vanilla GNN. Why is the result limited as evidence?"
        scenario={<><em>Discriminating insight: AMLSim is itself a synthetic benchmark — testing FATE on the same kind of data the pretrain saw. The 'reproduction' doesn't tell you about real-bank transfer. True validation needs labeled real AML cases.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"The reproduction proves FATE works."},
          {key:"b", text:"Limited evidence. AMLSim (Suzumura et al., open-source AML simulator) is itself a synthetic benchmark — testing FATE's pretrained-on-simulated-data encoder on simulated benchmark data. This validates 'the encoder learns the typology vocabulary the simulator generates' but NOT 'the encoder transfers to real-bank graphs with their messy, non-simulator-distributed structural patterns.' The reproduction is in-distribution evaluation. True validation requires labeled real AML cases from real banks — which are scarce and proprietary, so no public reproduction of the real-bank transfer claim exists. Senior framing: AMLSim results are necessary-but-not-sufficient evidence; demand real-bank ablations when you can get them; treat simulated-only results as 'the architecture is correct' not 'the transfer works.'", correct:true},
          {key:"c", text:"Synthetic data is never useful."},
          {key:"d", text:"FATE works perfectly."},
        ]}
        trap={<>(a)(d) overclaim; (c) overcorrects.</>}
        lens={<>Simulator-only eval validates the architecture. Real transfer needs labeled real cases.</>}
        stretch={<>What's the smallest real-bank ablation that would validate transfer? Hint: ~50 labeled cases per typology across 2 banks.</>}
      />

      {/* P19 — adversary */}
      <VIS.TrapProblem
        id="fate-p19"
        difficulty="hard"
        title="P19 — Sophisticated criminals know what AML typologies the simulator covers. How do they evade FATE?"
        scenario={<><em>Discriminating insight: criminals can study public AML literature (FATF typology papers) and design transactions to AVOID typology vocabulary signatures while still achieving the laundering goal. FATE then misses by construction. Defense: combine FATE with anomaly detection on encoder embeddings (OOD novel patterns) + continuous typology vocabulary updates + supplementary supervised + manual review.</em><br/><br/>Defense.</>}
        options={[
          {key:"a", text:"Sophisticated criminals can't evade ML."},
          {key:"b", text:"Layered defense. Sophisticated criminals study public AML literature (FATF typology reports, KDD papers) and DESIGN transactions to avoid each typology's structural signature while still achieving the laundering goal — e.g., randomize counterparties to break the smurfing fan-out pattern; insert legitimate intermediary transactions to break layering chains; spread amounts to avoid structuring thresholds. FATE's closed vocabulary misses these by construction (the criminal MO has been engineered to fall OUTSIDE the vocabulary). Defenses: (1) <strong>Anomaly detection on encoder embeddings</strong> — patterns that don't fit any typology with high confidence are out-of-distribution and worth investigator review (the encoder is doing its job by flagging 'I don't know what this is'). (2) <strong>Continuous typology vocabulary updates</strong> — flagged anomalies feed the simulator-update loop; new typologies enter the vocabulary. (3) <strong>Supplementary supervised models</strong> on engineered features that don't depend on typology vocabulary. (4) <strong>Manual investigator review</strong> — FATE is a triage tool, not a closed-loop decision system. The closed-vocabulary structure is a feature for known typologies and a weakness for evolving ones; the defense is operational (closed-loop update) plus an OOD-anomaly fallback.", correct:true},
          {key:"c", text:"Switch to rules-only."},
          {key:"d", text:"Give up."},
        ]}
        trap={<>(a) is naive; (c)(d) overcorrect.</>}
        lens={<>Closed vocabulary needs OOD-anomaly + supervised + investigator + update-loop hedges.</>}
        stretch={<>What's the right OOD signal? Hint: encoder-embedding distance to nearest typology cluster.</>}
      />

      {/* P20 — interpretability */}
      <VIS.TrapProblem
        id="fate-p20"
        difficulty="hard"
        title="P20 — Regulator asks 'which entities in this subgraph drove the AML flag?' What does FATE expose?"
        scenario={<><em>Discriminating insight: FATE's motif-prediction setup is more interpretable than generic deep models — the encoder maps subgraphs to typology labels with known semantics. You can show the typology + the subgraph + per-node attribution (SHAP / IG on the subgraph). The typology vocabulary IS the explanation language.</em><br/><br/>Operator answer.</>}
        options={[
          {key:"a", text:"FATE is a black box — refuse."},
          {key:"b", text:"FATE is MORE interpretable than generic deep models for AML because the typology vocabulary IS the explanation language. Regulator-facing answer: (i) report the predicted TYPOLOGY ('this subgraph activates the smurfing typology classifier with confidence 0.92'); (ii) show the SUBGRAPH that drove the flag (centered node + k-hop neighborhood) with each node's identity; (iii) per-node attribution via SHAP / Integrated Gradients on the encoder output back to graph features — quantifies which nodes / edges contributed most. The typology label is a regulator-friendly explanation ('we flagged this as smurfing because it matches the structural pattern of one beneficiary receiving many small inbound counterparties'). Pair with the closed-loop process so investigators can confirm or refute. This is closer to interpretability than generic deep-model attention attribution, because the output vocabulary aligns with regulatory AML categories.", correct:true},
          {key:"c", text:"AML doesn't need explanations."},
          {key:"d", text:"FATE outputs are unverifiable."},
        ]}
        trap={<>(a)(c)(d) over- or under-claim.</>}
        lens={<>Typology vocabulary is the explanation. Pair with SHAP / IG on the subgraph.</>}
        stretch={<>How do you handle 'novel-typology' detections without a vocabulary match? Hint: report as 'out-of-vocabulary anomaly' with similarity score to nearest typology.</>}
      />

      {/* P21 — counterfactual: no FATE */}
      <VIS.TrapProblem
        id="fate-p21"
        difficulty="medium"
        title="P21 — If FATE didn't exist, what's the best AML approach for a small bank with 80 labels?"
        scenario={<><em>Discriminating insight: hand-engineered typology features + tuned GBDT + investigator-driven rules. The typology vocabulary still exists — bank can encode each typology's signature as rules / features manually. Slower to update than FATE; cheaper to deploy.</em><br/><br/>Counterfactual.</>}
        options={[
          {key:"a", text:"Nothing — AML is impossible without FATE."},
          {key:"b", text:"Per-typology hand-engineered detection. Without FATE, the typology vocabulary still exists — AML experts have documented smurfing, layering, round-tripping, TBML, structuring for decades. The non-FATE approach: encode each typology's signature as a HAND-ENGINEERED RULE or FEATURE. Smurfing = 'count of small inbound to one beneficiary in 30d &gt; threshold + amount-distribution-test.' Layering = 'longest forward chain depth &gt; K + amount-preserved-along-chain.' Round-tripping = 'cycle detection up to depth 5 + amount-preserved-around-cycle.' Combine into tuned GBDT (graph features + transaction features) + investigator-driven rules + manual review. Slower to update (a new typology requires manual feature engineering, not just simulator update), and may miss typology variants the engineers didn't anticipate — but operationally cheaper and explainable. FATE's value is automating the typology-to-encoder pipeline; without FATE, you do the work by hand.", correct:true},
          {key:"c", text:"Use a deep generic GNN."},
          {key:"d", text:"Use a transformer."},
        ]}
        trap={<>(a) overstates FATE's necessity; (c)(d) don't address the AML-typology surface.</>}
        lens={<>Hand-engineered typology features + GBDT + rules + investigator. The pre-FATE workflow, still common.</>}
        stretch={<>What's the cheapest 'typology' rule? Hint: smurfing's fan-out count.</>}
      />

      {/* P22 — data governance */}
      <VIS.TrapProblem
        id="fate-p22"
        difficulty="medium"
        title="P22 — Your legal team rejects consortium participation. Can you still use FATE?"
        scenario={<><em>Discriminating insight: yes — partially. The simulator-only pretrain (no consortium data) still provides the typology vocabulary; you forfeit the lift from real consortium data but keep the simulator pretrain. Simulator-only FATE is a partial product.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"No — can't use FATE."},
          {key:"b", text:"Yes, partially. FATE's pretrain corpus has two components: (i) SIMULATED graphs (typology generators run by AML experts) — no data governance issue since the data is synthetic; (ii) ANONYMIZED CONSORTIUM graphs from participating banks — requires governance. If legal rejects the consortium, you can still pretrain FATE on the SIMULATOR ONLY. The encoder learns the typology vocabulary from synthetic data; you forfeit the lift from real consortium graphs (which add structural diversity beyond what the simulator generates). Simulator-only FATE is a partial product — typically captures 60-80% of the full FATE's lift over per-bank GNN, depending on simulator quality. Fine-tune on your bank's labels works the same way. This is a reasonable path for governance-restricted deployments; the simulator's typology vocabulary remains the load-bearing piece.", correct:true},
          {key:"c", text:"Yes, full lift without consortium."},
          {key:"d", text:"FATE works only with simulator data."},
        ]}
        trap={<>(a)(c) overclaim either direction; (d) is partially right but uninformative.</>}
        lens={<>Simulator-only FATE is a fallback. Forfeit consortium lift; keep typology vocabulary.</>}
        stretch={<>What's the consortium contribution's marginal lift? Hint: ~1-2pt on top of simulator-only.</>}
      />

      {/* P23 — when novel typology slips through */}
      <VIS.TrapProblem
        id="fate-p23"
        difficulty="hard"
        multiSelect
        title="P23 — Diagnostic signals that a novel typology is slipping past FATE. Pick all that apply."
        scenario={<><em>Discriminating insight: out-of-distribution encoder embeddings, low-confidence typology predictions on flagged-by-investigator cases, growing false-negative rate over time, clustering of novel patterns in embedding space.</em><br/><br/>Pick.</>}
        options={[
          {key:"a", text:"Encoder produces low-confidence (high-entropy) typology predictions on investigator-flagged subgraphs.", correct:true},
          {key:"b", text:"Encoder produces high-confidence smurfing predictions on confirmed smurfing cases."},
          {key:"c", text:"Out-of-distribution encoder embeddings — investigator-flagged subgraphs have embedding distances to typology clusters above a threshold.", correct:true},
          {key:"d", text:"False-negative rate (investigator-flagged AML missed by FATE) is growing month-over-month.", correct:true},
          {key:"e", text:"FATE's overall AUPRC is steady."},
          {key:"f", text:"Clustering analysis on flagged-but-missed subgraphs reveals a coherent novel cluster (suggesting a coherent novel typology, not random misses).", correct:true},
          {key:"g", text:"Investigator confirmation rate (FATE flags that investigators confirm as AML) drops over time.", correct:true},
        ]}
        trap={<>(b) is healthy behavior; (e) is the absence of a signal.</>}
        lens={<>OOD embeddings + low-confidence predictions + FN trend + clusters + investigator-confirm rate.</>}
        stretch={<>Cheapest to monitor?</>}
      />

      {/* P24 — interpretation of motif vs node embedding */}
      <VIS.TrapProblem
        id="fate-p24"
        difficulty="hard"
        title="P24 — Engineer asks: 'Is the FATE encoder producing NODE embeddings or SUBGRAPH/motif embeddings?'"
        scenario={<><em>Discriminating insight: typically produces both — node-level embeddings via message-passing AND subgraph-level via pooling. Motif-prediction objective trains on subgraph-level pools; downstream classification can use either. Architecturally clearer: node-level embeddings are intermediate; subgraph-level is the supervised target.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Just node embeddings."},
          {key:"b", text:"Both, at different scales. The encoder is typically a heterogeneous graph transformer or GAT-family model that produces NODE embeddings via message-passing across the graph. For motif prediction, a SUBGRAPH is sampled (k-hop neighborhood around a center node) and its node embeddings are POOLED (mean, max, attention-pool) into a subgraph-level embedding, which is the input to the typology classifier. So the supervision signal is at the subgraph level (motif prediction); the embeddings flow at the node level. At downstream fine-tune: (i) per-node classifier — predict 'is this account involved in AML?' using the node embedding; (ii) per-subgraph classifier — predict 'is this subgraph a typology?' using the pooled embedding. Production AML systems often use both heads. The architectural choice (which pooling) is a hyperparameter; attention-pool typically beats mean.", correct:true},
          {key:"c", text:"Only motif embeddings."},
          {key:"d", text:"Neither."},
        ]}
        trap={<>(a)(c)(d) collapse the two scales.</>}
        lens={<>Node embeddings via message-passing; subgraph embeddings via pooling for motif prediction.</>}
        stretch={<>Why is attention-pooling preferred over mean-pooling for AML subgraphs? Hint: typology relevance varies by node within the subgraph.</>}
      />

      {/* P25 — fine-tune lr */}
      <VIS.TrapProblem
        id="fate-p25"
        difficulty="medium"
        title="P25 — Fine-tune learning rate: pretrained FATE encoder vs random-init GNN of equal size?"
        scenario={<><em>Discriminating insight: same as any pretrained model — pretrained backbone fine-tune lr ~10x smaller than random-init; or freeze backbone + LoRA. Critical for AML where labels are 80 cases — full unfreeze catastrophically forgets the typology vocabulary.</em><br/><br/>Pick.</>}
        options={[
          {key:"a", text:"Same lr as random-init."},
          {key:"b", text:"~10x smaller lr on the pretrained encoder; OR freeze the encoder entirely and use LoRA / adapter on top. With only 80 labels, full unfreeze with default lr catastrophically forgets the typology vocabulary — the small fine-tune gradient overwrites the pretrained weights and the encoder regresses to nearly-random. Production recipes: (i) freeze the encoder, learn only the classifier head and a small LoRA adapter (typical for label-poor regimes like AML); (ii) layer-wise lr decay (top layers higher lr, deeper layers tiny lr); (iii) discriminative fine-tuning with lr 1e-6 to 5e-5 on encoder, 1e-4 to 1e-3 on head. The right choice depends on bank label count: 80 labels → freeze + LoRA mandatory; 1000 labels → low-lr full fine-tune feasible; 5000+ labels → consider less of FATE's value (P11).", correct:true},
          {key:"c", text:"10x larger lr."},
          {key:"d", text:"lr doesn't matter."},
        ]}
        trap={<>(a)(c)(d) ignore catastrophic forgetting at tiny-label regime.</>}
        lens={<>Tiny labels → freeze + LoRA. Pretrained backbone is fragile with low-data fine-tune.</>}
        stretch={<>When does full unfreeze become safe? Hint: ~thousands of labels per typology.</>}
      />

      {/* P26 — what FATE CAN'T do */}
      <VIS.TrapProblem
        id="fate-p26"
        difficulty="hard"
        title="P26 — Construct the smallest AML use case where FATE provides little value."
        scenario={<><em>Discriminating insight: a label-rich bank using only typologies the simulator already covers, with no novel-MO emergence, no governance constraints — at the limit, a per-bank GNN matches FATE. The minimal case where FATE collapses.</em><br/><br/>Smallest case.</>}
        options={[
          {key:"a", text:"FATE always provides value."},
          {key:"b", text:"A bank with (i) 5000+ confirmed AML cases (label-rich), (ii) cases concentrated in 1-2 well-covered typologies (smurfing + structuring), (iii) stable criminal MO (no novel typologies emerging), (iv) limited engineering resources for the simulator-update closed loop. At label richness, per-bank GNN can learn the typology distribution natively; concentrated coverage means most cases hit the easy typologies a per-bank GNN handles fine; stable MO means the simulator-update loop's value drops; limited engineering means the operational cost dominates. In this regime, a per-bank GNN + hand-engineered typology features matches FATE's AUPRC at lower operational cost. FATE's value scales with label scarcity, typology breadth, novel-MO emergence, and consortium availability — invert all four and FATE becomes overhead.", correct:true},
          {key:"c", text:"Any small bank."},
          {key:"d", text:"Any bank without graph data."},
        ]}
        trap={<>(a) is dogmatic; (c)(d) are over-general.</>}
        lens={<>FATE value scales with label scarcity + typology breadth + novel-MO + consortium availability.</>}
        stretch={<>What single factor most determines whether FATE is worth the cost? Hint: label scarcity.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://dl.acm.org/doi/10.1145/3690624" target="_blank" rel="noopener">
            <strong>FATE: Foundation Model for Anti-Money Laundering</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, KDD 2025)</span>
          <br/>The reference paper. Section on the motif-prediction objective and the simulated + consortium pretrain corpus is the keeper.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2008.06087" target="_blank" rel="noopener">
            <strong>Suzumura et al. — AMLSim: An AML Simulation Framework</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper / repo)</span>
          <br/>The open-source AML simulator that most FATE-style reproductions use. P7 turns on understanding what AMLSim covers and what it misses; P18 turns on understanding why AMLSim-only eval is limited evidence.
        </li>
        <li>
          <a href="https://www.fatf-gafi.org/en/topics/methods-and-trends.html" target="_blank" rel="noopener">
            <strong>FATF — Methods and Trends (typology reports)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(reports)</span>
          <br/>The Financial Action Task Force's published typology reports. The source of truth for the AML typology vocabulary that FATE's simulator must cover. Required reading for the typology vocabulary.
        </li>
        <li>
          <a href="https://distill.pub/2021/gnn-intro/" target="_blank" rel="noopener">
            <strong>Sanchez-Lengeling et al. — A Gentle Introduction to Graph Neural Networks (Distill)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Best visual intro to GNNs. Required baseline before reasoning about FATE's graph encoder architecture.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2008.08692" target="_blank" rel="noopener">
            <strong>Wang et al. — Heterogeneous Graph Attention Network (HAN)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, KDD 2019)</span>
          <br/>The canonical heterogeneous-GNN backbone style for graphs with multiple node/edge types — closest to FATE's encoder family.
        </li>
        <li>
          <a href="https://karpathy.github.io/2019/04/25/recipe/" target="_blank" rel="noopener">
            <strong>Andrej Karpathy — A Recipe for Training Neural Networks</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Field guide for the silent representation bugs that bite FATE — pretrain-vs-random init diagnostics (P14), low-data fine-tune lr (P25), and embedding-cluster sanity checks.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
