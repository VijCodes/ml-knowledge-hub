<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Multi-GNN-AML (IBM) — Fraud SOTA · Money laundering (AML) detection.
// CONCEPT ANCHOR (B3): HETEROGENEOUS-GNN over a TYPED graph (multiple node-types:
// accounts, transactions, entities, addresses; multiple edge-types: transfers,
// ownership, residential). Run a SEPARATE GNN TOWER per relation-type, then
// COMBINE via CROSS-TOWER ATTENTION (learn which relations matter for which
// node). Outperforms single-relation GNN on cross-relation laundering paths
// (layered transfers from owned accounts in shared addresses). IBM Research,
// AMLSim + Multi-GNN benchmark (NeurIPS 2024). NOT a homogeneous GNN (CARE-GNN,
// GraphSAGE on a single relation). NOT motif mining (no learned message passing).
// NOT a single GNN with relation-encoded edges (R-GCN/HAN do something different).

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · AML detection"
      title="Multi-GNN-AML — heterogeneous GNN with per-relation towers + cross-tower attention"
      subtitle="Run a SEPARATE GNN TOWER per relation-type on the typed AML graph (accounts, transactions, entities, addresses, ownership, residential), then COMBINE per-tower node embeddings via CROSS-TOWER ATTENTION. Captures laundering paths that cross relation types — owned-account transfers from shared-residential entities — which single-relation GNNs miss."
      byline={[
        {label:"Paper", value:"IBM Research — Realistic Synthetic Financial Transactions for Anti-Money Laundering Models (NeurIPS 2024 Datasets); Multi-GNN-AML baseline on AMLSim + IBM-AML benchmark"},
        {label:"L3", value:"Heterogeneous graph; per-relation GNN towers; cross-tower attention; node-level AML classifier."},
        {label:"Anchor", value:"Multiple GNN towers — ONE PER RELATION TYPE — combined via cross-tower attention. Different from homogeneous GNN on a single relation."},
      ]}/>

    <VIS.TLDR>
      Real AML data is HETEROGENEOUS: an account belongs to an entity, an entity has a residential address, an account makes transactions to other accounts, an entity owns another entity. A standard{" "}
      <VIS.Term def="Homogeneous GNN: graph neural network operating on a graph with a SINGLE node type and a SINGLE edge type (e.g., account-to-account transactions only). Examples: GraphSAGE, CARE-GNN, GCN. Cannot represent multiple relation types.">homogeneous GNN</VIS.Term>{" "}
      (GraphSAGE, CARE-GNN) collapses all relations to a single graph (typically just account-account transactions) and loses cross-relation laundering patterns — e.g., money flowing from accounts owned by an entity whose residential address matches another entity's. Multi-GNN-AML (IBM 2024) takes the{" "}
      <VIS.Term def="Heterogeneous graph: a graph with MULTIPLE node types (account, transaction, entity, address) and MULTIPLE edge types (transfer, ownership, residence). Standard for AML where the data has rich entity-relation structure.">heterogeneous graph</VIS.Term>{" "}
      seriously by running ONE{" "}
      <VIS.Term def="GNN tower: a complete graph-neural-network forward pass on a specific subgraph or relation type, producing a per-node embedding. In Multi-GNN-AML, one tower processes the account-transaction graph, another the account-ownership graph, another the entity-residence graph; each tower produces its own embedding for shared nodes.">GNN TOWER per relation type</VIS.Term>{" "}
      (transaction-relation tower, ownership-relation tower, residence-relation tower, ...), then COMBINES the per-tower per-node embeddings via{" "}
      <VIS.Term def="Cross-tower attention: a learned attention layer that takes per-relation node embeddings as inputs and computes attention weights per node telling the model which relation matters most for that node's prediction. Different from R-GCN which sums per-relation message-passing results uniformly.">cross-tower attention</VIS.Term>{" "}
      so the model learns WHICH RELATION matters for WHICH NODE (an account might be flagged via its ownership relation; another via its transaction relation). Final classifier head per node. Empirically (IBM NeurIPS 2024 benchmark) Multi-GNN-AML outperforms single-relation GraphSAGE / CARE-GNN by 5-15 points F1 on the AMLSim benchmark — the gap is largest on layered laundering paths that cross multiple relations. NOT a homogeneous GNN (single relation, single tower). NOT motif mining (no learned message passing). NOT R-GCN/HAN as-is (those use a single tower with per-relation message types; Multi-GNN-AML uses independent towers + cross-tower attention).
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — per-relation towers + cross-tower attention">
      <p>
        Concretely: take the AML data as a heterogeneous graph with multiple node types (account, transaction, entity, address, ...) and multiple edge types (sends-to, owns, lives-at, ...). For each EDGE TYPE r, build a sub-graph G_r containing only edges of type r and the nodes they touch.
      </p>
      <p>Then for each relation r, train a SEPARATE GNN TOWER GNN_r on G_r — independent message passing, independent parameters. Each tower outputs a per-node embedding h_r(v) for nodes that appear in G_r. The same account v gets one embedding from the transaction tower, another from the ownership tower, another from the residence tower.</p>
      <p>Cross-tower attention then combines these per-relation embeddings into a single per-node embedding h(v) = sum_r alpha_r(v) * h_r(v) where alpha_r(v) is a LEARNED attention weight: how much does relation r matter for node v? A final classifier head predicts the AML label from h(v).</p>

      <VIS.Mermaid chart={`
flowchart TB
  G["Heterogeneous AML graph"]
  G --> SP["Split by edge type"]
  SP --> R1["Subgraph G_1 transactions"]
  SP --> R2["Subgraph G_2 ownership"]
  SP --> R3["Subgraph G_3 residence"]
  R1 --> T1["GNN tower 1 on G_1"]
  R2 --> T2["GNN tower 2 on G_2"]
  R3 --> T3["GNN tower 3 on G_3"]
  T1 --> CA["Cross-tower attention combine"]
  T2 --> CA
  T3 --> CA
  CA --> H["Per node embedding h v"]
  H --> CL["Classifier head per node AML label"]
  style T1 fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style T2 fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style T3 fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style CA fill:#dbeafe,stroke:#2563eb,stroke-width:2px
      `} />
      <p>Red boxes: per-relation GNN towers (independent parameters). Blue box: cross-tower attention that learns which tower matters for which node.</p>

      <p style={{marginTop:16}}>
        <strong>Why this beats a single GNN.</strong> A homogeneous GNN forced onto the transactions-only sub-graph misses cross-relation patterns — e.g., laundering rings where money flows from accounts that are commonly OWNED by an entity whose ENTITIES SHARE a residential address with a counterparty. The cross-relation evidence is invisible to a transactions-only model. Multi-GNN-AML's towers carry this evidence independently, and cross-tower attention learns to weight it per node.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Multi-GNN-AML vs single-relation GNN, R-GCN/HAN, motif mining">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Multi-GNN-AML (IBM)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Homogeneous GNN (GraphSAGE / CARE-GNN)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>R-GCN / HAN (single multi-relation tower)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Egonet motif mining</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Towers</td><td style={{padding:"6px 10px"}}>K independent (one per relation)</td><td style={{padding:"6px 10px"}}>1 (single relation)</td><td style={{padding:"6px 10px"}}>1 (per-relation message types inside one tower)</td><td style={{padding:"6px 10px"}}>None (no learned net)</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Combination</td><td style={{padding:"6px 10px"}}>Cross-tower attention (per-node alpha_r)</td><td style={{padding:"6px 10px"}}>N/A</td><td style={{padding:"6px 10px"}}>Sum or learned scalar per relation</td><td style={{padding:"6px 10px"}}>Count vector</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Cross-relation laundering</td><td style={{padding:"6px 10px"}}>YES — towers carry evidence per relation</td><td style={{padding:"6px 10px"}}>NO — only one relation</td><td style={{padding:"6px 10px"}}>Partial — relations mixed in one tower</td><td style={{padding:"6px 10px"}}>Catalog-bound</td></tr>
          <tr><td style={{padding:"6px 10px"}}>Cost</td><td style={{padding:"6px 10px"}}>K x single-GNN forward + attention</td><td style={{padding:"6px 10px"}}>1x</td><td style={{padding:"6px 10px"}}>K x message types in one pass</td><td style={{padding:"6px 10px"}}>Subgraph enumeration</td></tr>
          <tr style={{background:"#e8f0fa"}}><td style={{padding:"6px 10px"}}>Interpretability</td><td style={{padding:"6px 10px"}}>Cross-tower attention weights show which relation fired</td><td style={{padding:"6px 10px"}}>Post-hoc only</td><td style={{padding:"6px 10px"}}>Per-relation weights (limited)</td><td style={{padding:"6px 10px"}}>Catalog-mapped (full)</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 23 trap problems">
      <p style={{color:"#475569", marginBottom:16}}>Every problem turns on the PER-RELATION-TOWER + CROSS-TOWER-ATTENTION mechanism and the cross-relation laundering coverage. Strip &quot;per-relation tower&quot; or &quot;cross-tower attention&quot; and the answer collapses to either a homogeneous GNN or an R-GCN.</p>

      <VIS.TrapProblem id="mga-p1" difficulty="hard" title="P1 — VP AML: 'Why not just use CARE-GNN on the transaction graph?'"
        scenario={<><em>Discriminating insight: CARE-GNN is HOMOGENEOUS — operates on ONE relation (account-to-account transactions). Misses laundering patterns that cross relations (e.g., owned accounts laundering through shared-address entities). Multi-GNN-AML has SEPARATE towers per relation + cross-tower attention to carry cross-relation evidence.</em><br/><br/>Pitch.</>}
        options={[
          {key:"a", text:"They are equivalent."},
          {key:"b", text:"CARE-GNN (and GraphSAGE, GCN) are HOMOGENEOUS GNNs — they operate on a SINGLE node type and SINGLE edge type. For AML, this typically means the account-to-account transaction graph: nodes are accounts, edges are transactions. CARE-GNN cannot represent ownership (which entity owns which accounts), residence (which entities share addresses), or device-fingerprint relations. Multi-GNN-AML (IBM Research, NeurIPS 2024) treats the AML data as a HETEROGENEOUS graph with multiple node types (account, transaction, entity, address) and multiple edge types (transfers, ownership, residence). It runs a SEPARATE GNN tower per relation type — one tower for the transaction subgraph, one for the ownership subgraph, one for residence — each with independent parameters. Then a CROSS-TOWER ATTENTION layer combines the per-relation embeddings into a per-node embedding, learning which relation matters most for which node's classification. Empirically (IBM benchmark) this beats CARE-GNN by 5-15 points F1 on AMLSim because layering attacks frequently cross relations: money flows from accounts owned by an entity to another entity that shares a residential address. Single-relation GNN cannot see this; per-relation towers + cross-tower attention can.", correct:true},
          {key:"c", text:"Skip GNNs."},
          {key:"d", text:"Use rules."},
        ]}
        trap={<>(a)(c)(d) miss the heterogeneous-graph requirement.</>}
        lens={<>CARE-GNN: homogeneous, one relation. Multi-GNN-AML: per-relation towers + cross-tower attention, cross-relation evidence.</>}
        stretch={<>What's a concrete cross-relation laundering path?</>}
      />

      <VIS.TrapProblem id="mga-p2" difficulty="hard" title="P2 — State the Multi-GNN-AML architecture."
        scenario={<><em>Discriminating insight: HETEROGENEOUS graph + K independent GNN towers (one per relation type, independent parameters) + cross-tower attention combining per-tower embeddings per node + classifier head. Different from R-GCN/HAN which use ONE tower with per-relation message types.</em><br/><br/>State.</>}
        options={[
          {key:"a", text:"Train one GNN per node."},
          {key:"b", text:"FOUR components. (1) HETEROGENEOUS GRAPH: nodes are typed (account, transaction, entity, address) and edges are typed (sends-to, owns, lives-at). (2) PER-RELATION SUBGRAPH SPLIT: for each edge type r, construct the sub-graph G_r containing only edges of type r and the nodes they touch. (3) PER-RELATION TOWERS: train K SEPARATE GNN towers (one per relation type) with INDEPENDENT parameters. Each tower GNN_r runs message passing on G_r and outputs a per-node embedding h_r(v) for nodes in G_r. The same account v gets ONE embedding per tower it appears in. (4) CROSS-TOWER ATTENTION: combine the per-relation embeddings via an attention layer that learns per-node attention weights alpha_r(v): h(v) = sum_r alpha_r(v) * h_r(v). alpha is a softmax over a query-key-value attention scoring (h_r(v) attends to a learned query for the node-type). (5) CLASSIFIER HEAD: a small MLP on h(v) outputs the per-node AML label probability. Training: end-to-end with binary cross-entropy on labeled accounts. Compare with R-GCN / HAN which use ONE tower with per-relation message TYPES inside — Multi-GNN-AML's separate towers + cross-tower attention give more flexibility per relation.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Cluster the graph."},
        ]}
        trap={<>(a)(c)(d) miss the four-component architecture.</>}
        lens={<>Heterogeneous graph → per-relation subgraphs → K independent towers → cross-tower attention → per-node classifier.</>}
        stretch={<>How does cross-tower attention differ from per-relation summation?</>}
      />

      <VIS.TrapProblem id="mga-p3" difficulty="hard" title="P3 — Why does single-relation GNN miss layered laundering?"
        scenario={<><em>Discriminating insight: layering = money flows through MULTIPLE relations (transaction + ownership + residence). A transaction-only GNN sees only the transaction layer; cannot see that two seemingly unrelated accounts share an ownership entity or a residential address. Multi-GNN-AML carries each relation in its own tower and combines them. Same evidence becomes visible.</em><br/><br/>Why miss.</>}
        options={[
          {key:"a", text:"It does not miss."},
          {key:"b", text:"Layering is the core AML pattern where money is moved through intermediate accounts to obscure origin. In real-world cases this leverages MULTIPLE RELATIONS: (1) the money moves through TRANSACTIONS (one relation); (2) but the intermediate accounts are OWNED by a small set of entities (ownership relation); (3) the entities share a RESIDENTIAL address (residence relation) or a director (board relation) or a device fingerprint (device relation). A single-relation GNN trained ONLY on the transaction graph sees the money flow but cannot see WHO OWNS the intermediates or that they share an address; the cross-relation evidence is invisible. A motif-mining catalog with ONLY transaction motifs has the same limitation. Multi-GNN-AML's per-relation towers carry the ownership and residence evidence independently; cross-tower attention combines them per node. Result: an account that looks innocent in the transaction graph alone can be flagged because the OWNERSHIP TOWER reveals it's part of a shell-entity cluster AND the RESIDENCE TOWER reveals that cluster shares an address with a high-risk entity. The flag is the combined evidence across towers.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the cross-relation evidence.</>}
        lens={<>Layering crosses relations: transactions + ownership + residence. Single tower sees one slice; per-relation towers carry all slices.</>}
        stretch={<>What's another cross-relation pattern beyond transaction + ownership?</>}
      />

      <VIS.TrapProblem id="mga-p4" difficulty="hard" multiSelect title="P4 — Pick TRUE statements about Multi-GNN-AML (4 correct)"
        scenario={<><em>Discriminating insight: heterogeneous graph, per-relation towers (independent params), cross-tower attention, per-node classifier. NOT single relation; NOT R-GCN one-tower.</em><br/><br/>Pick TRUE.</>}
        options={[
          {key:"a", text:"Operates on a heterogeneous graph with multiple node and edge types.", correct:true},
          {key:"b", text:"Runs ONE GNN tower per edge-type with independent parameters.", correct:true},
          {key:"c", text:"Combines per-tower node embeddings via cross-tower attention.", correct:true},
          {key:"d", text:"Attention is per-node — alpha_r(v) tells which relation r matters for node v.", correct:true},
          {key:"e", text:"Operates on the account-only transaction graph."},
          {key:"f", text:"Uses one tower with per-relation message types (R-GCN style)."},
        ]}
        trap={<>(e) confuses with homogeneous GNN; (f) confuses with R-GCN.</>}
        lens={<>Heterogeneous graph; per-relation towers (independent); cross-tower attention; per-node alpha_r.</>}
        stretch={<>What does R-GCN do differently?</>}
      />

      <VIS.TrapProblem id="mga-p5" difficulty="medium" title="P5 — How does cross-tower attention differ from R-GCN's per-relation message types?"
        scenario={<><em>Discriminating insight: R-GCN uses ONE tower with per-relation TRANSFORMATION MATRICES (W_r) inside a single message-passing pass; relations interact at every layer. Multi-GNN-AML uses K SEPARATE towers — each runs full message passing INDEPENDENTLY on its relation subgraph — then combines OUTPUTS via attention. More expressive per relation; more parameters; explicit per-node weighting.</em><br/><br/>Difference.</>}
        options={[
          {key:"a", text:"They are identical."},
          {key:"b", text:"R-GCN (Schlichtkrull et al. 2017) uses a SINGLE GNN with PER-RELATION TRANSFORMATION MATRICES. At each message-passing layer, neighbors are aggregated as h_v^(l+1) = sigma(sum_r sum_u_in_N_r(v) (1/c_v,r) W_r^(l) h_u^(l)) where W_r^(l) is a different matrix per relation r. Relations interact AT EVERY LAYER through the shared node embedding h_v. HAN (Heterogeneous Attention Network, Wang et al. 2019) extends R-GCN with attention over relations at each layer — still ONE tower. Multi-GNN-AML uses K COMPLETELY SEPARATE GNN towers — each runs INDEPENDENT message passing on its own relation subgraph from scratch through all layers; relations do NOT interact during message passing. They interact ONLY at the cross-tower attention layer at the end. Trade-offs: Multi-GNN-AML has MORE PARAMETERS (K times the GNN params instead of one shared GNN with K matrices), more expressive per-relation (each tower fully specializes to its relation), explicit per-node attention weights (interpretable). R-GCN/HAN are more parameter-efficient but mix relations earlier. IBM's NeurIPS 2024 ablation: Multi-GNN-AML beats R-GCN by 3-7 F1 points on AMLSim — separate towers + late fusion wins for AML.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"R-GCN is single relation."},
        ]}
        trap={<>(a)(c)(d) confuse the architectures.</>}
        lens={<>R-GCN: one tower, per-relation W_r at every layer. Multi-GNN-AML: K independent towers, late fusion via cross-tower attention.</>}
        stretch={<>Why does late fusion beat early fusion for AML?</>}
      />

      <VIS.TrapProblem id="mga-p6" difficulty="hard" title="P6 — Why per-NODE attention weights and not per-relation only?"
        scenario={<><em>Discriminating insight: different nodes need different relations. An account flagged for residence-sharing needs the residence-tower; an account flagged for transaction-bursts needs the transaction-tower. Global per-relation weights cannot capture this — per-node alpha_r(v) lets the model SELECTIVELY weight per node.</em><br/><br/>Per-node.</>}
        options={[
          {key:"a", text:"Per-relation only is enough."},
          {key:"b", text:"DIFFERENT NODES need DIFFERENT RELATIONS. Consider two flagged accounts: (1) account v_1 is flagged because it sits in a high-risk RESIDENCE cluster (shares address with sanctioned entities); the residence tower carries the signal; the transaction tower says nothing unusual. (2) account v_2 is flagged because of TRANSACTION bursts (sudden volume increase); the transaction tower carries the signal; the residence tower is irrelevant. A global per-relation weight (alpha_residence applied to ALL nodes) cannot capture this — it would either over-weight residence everywhere (hurting v_2's accuracy) or under-weight it (hurting v_1). PER-NODE ATTENTION alpha_r(v) lets the model learn: for v_1, alpha_residence is high; for v_2, alpha_transaction is high. Implementation: cross-tower attention uses h_r(v) as the input; computes a per-node query that scores against learned per-relation keys; softmax gives alpha_r(v). Interpretability bonus: at inference, alpha_r(v) tells INVESTIGATORS which relation drove each alert ('this account flagged 80% via residence tower' → investigator focuses on residence evidence). This is a key win over R-GCN where per-relation weights are global per layer.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip attention."},
        ]}
        trap={<>(a)(c)(d) miss the per-node selectivity.</>}
        lens={<>Per-node alpha_r(v): different nodes weight different relations. Global alpha_r cannot. Interpretable per-alert.</>}
        stretch={<>How does alpha_r(v) help investigator triage?</>}
      />

      <VIS.TrapProblem id="mga-p7" difficulty="hard" title="P7 — Concept-specific misattribution: ALL alpha weights are uniform across relations."
        scenario={<><em>Discriminating insight (concept-specific): (1) attention layer not learning — initialization too small or loss not back-propagating through attention; (2) relations carry redundant info (training accidentally produced identical towers); (3) regularization too strong on attention weights (L2 forces uniform); (4) labels too sparse — attention can&apos;t differentiate. Specific to per-relation attention.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"Multi-GNN-AML-specific causes for uniform attention. (1) ATTENTION LAYER UNDER-TRAINED — if the gradient flowing into the cross-tower attention layer is too small, the attention weights stay near initialization (uniform). Check gradient norms at the attention layer; consider scaling the attention output or warm-starting attention weights from a per-relation calibration. (2) TOWERS PRODUCING REDUNDANT EMBEDDINGS — if all K towers learned essentially the same representation (because the relation subgraphs happen to be highly overlapping in structure), attention has no signal to discriminate and uniform is optimal. Fix: add per-tower diversity loss (cosine dissimilarity between tower outputs); or check that the subgraphs really are different. (3) ATTENTION REGULARIZATION TOO STRONG — heavy L2 or KL regularization on attention weights pushes them toward uniform; reduce regularization. (4) LABELS TOO SPARSE — if the labeled AML set is tiny (1% positive), the loss gradient through attention is dominated by the dominant class and attention cannot differentiate; address with class re-weighting or oversampling. (5) TASK DOES NOT NEED MULTIPLE RELATIONS — if the AML task in your data is dominated by one relation (e.g., 99% of fraud captured by transaction signals alone), uniform attention is genuinely optimal-ish; consider simpler single-tower baseline before adding complexity.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Attention under-trained / redundant towers / regularization too strong / sparse labels / single-relation-dominant task. Concept-specific.</>}
        stretch={<>How do you measure tower diversity?</>}
      />

      <VIS.TrapProblem id="mga-p8" difficulty="hard" title="P8 — Compare Multi-GNN-AML to motif mining."
        scenario={<><em>Discriminating insight: Multi-GNN-AML = LEARNED end-to-end on heterogeneous graph; per-relation message passing + cross-tower attention; uninterpretable score (post-hoc explainer needed). Motif mining = CLASSICAL graph mining; fixed catalog; interpretable by construction. Different mechanisms — combine motif features as INPUTS to Multi-GNN-AML for hybrid.</em><br/><br/>Compare.</>}
        options={[
          {key:"a", text:"Same."},
          {key:"b", text:"Different MECHANISMS, different OUTPUTS, complementary. Multi-GNN-AML is a LEARNED heterogeneous GNN — per-relation message passing + cross-tower attention; trained end-to-end on labeled AML data; produces a per-node score with attention-weight interpretability (which relation drove the alert) but not motif-level (cannot say 'this fired because of fan-in pattern X'). Egonet motif mining is CLASSICAL — no learning at the motif step; per-node K-hop egonet + subgraph-isomorphism counting against a FIXED catalog of typology motifs; produces interpretable feature vector mapped to regulator typology codes. Use Multi-GNN-AML when: regulator interpretability is partially satisfied by attention weights; labeled training data is available; cross-relation patterns matter (rich heterogeneous graph). Use motif mining when: regulator demands full typology-code mapping (FinCEN SAR alerts); pattern catalog is well-defined. HYBRID: feed motif counts as INPUTS into Multi-GNN-AML's per-node feature vector — get both raw recall from the learned GNN AND interpretable typology counts from motif mining. IBM benchmark reports gains from this combination on the AMLSim dataset.", correct:true},
          {key:"c", text:"Motif mining is always better."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the trade-off.</>}
        lens={<>Multi-GNN-AML: learned, end-to-end, attention-interpretable. Motif: catalog, classical, typology-interpretable. Combine: motif features → Multi-GNN-AML.</>}
        stretch={<>What does the IBM benchmark report for hybrid?</>}
      />

      <VIS.TrapProblem id="mga-p9" difficulty="hard" title="P9 — Tower parameter count: how does it scale?"
        scenario={<><em>Discriminating insight: K relations × per-relation tower params = K × P_tower. With K=5 relations and P_tower=10M, total is 50M — manageable but K × larger than homogeneous GNN. Sharing some encoder layers across towers (shared input encoder) reduces. Trade-off: more parameters vs better per-relation specialization.</em><br/><br/>Scale.</>}
        options={[
          {key:"a", text:"Same as one GNN."},
          {key:"b", text:"K times a single GNN's parameters, with sharing options. Each per-relation tower has its own message-passing layers, attention heads, and FFN: P_tower ~ 5-20M parameters for a typical 3-layer GraphSAGE-like tower. With K = 3-8 relations in AML, total tower parameters are K * P_tower = 15-160M. Add cross-tower attention layer params (a small head with QK-V matrices): ~ 1-5M. Total Multi-GNN-AML model: 20-200M params depending on K and tower size. Compare with R-GCN: one tower with per-relation W_r matrices — total ~ 1.5-3x a single GNN (much smaller than K-times). Trade-off: more parameters vs better per-relation specialization. SHARING OPTIONS to reduce: (a) shared input ENCODER (same first-layer projection across towers) — saves about 1/K of the input-layer params; (b) shared per-node-type RAW FEATURE encoder before the tower — typical for AML where node features (account balance, age, KYC) come from the same embedding regardless of relation. Production AML at IBM benchmark scale: ~50-80M params total fits in single-GPU training. For very large graphs (1B+ accounts), use mini-batch sampling per tower (GraphSAGE-style neighbor sampling) and distribute towers across GPUs.", correct:true},
          {key:"c", text:"Always 1B params."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the K-scaling and sharing.</>}
        lens={<>K * P_tower per-relation params; ~50-200M total; sharing input encoder reduces; ~ 1.5-3x of R-GCN.</>}
        stretch={<>What does GraphSAGE-style neighbor sampling do per tower?</>}
      />

      <VIS.TrapProblem id="mga-p10" difficulty="hard" title="P10 — How are typed nodes handled across towers?"
        scenario={<><em>Discriminating insight: each node type has its own feature dimension (account balance vs entity-founding-date vs address-string-embedding). Towers operating on subgraphs may include multiple node types; project each node type to a common dimension via per-type linear projection before the tower. After cross-tower attention, the per-node embedding is in a unified space.</em><br/><br/>Typed nodes.</>}
        options={[
          {key:"a", text:"Types don't matter."},
          {key:"b", text:"Per-type linear projection to a common embedding dim, then tower operations are uniform. Concretely: account nodes have features (balance, age, KYC tier — say, d_acct = 16); entity nodes have features (incorporation date, jurisdiction, industry code — d_ent = 20); address nodes have features (geo-cluster, residence-count, risk score — d_addr = 8). Each tower's first layer applies a PER-NODE-TYPE LINEAR PROJECTION W_type to map every node's features to a common dim d = 64. After projection, all nodes in the subgraph have d-dim embeddings and message passing is uniform. The projection W_type can be SHARED across towers (typical — same node features regardless of which relation tower is operating) or per-tower (more parameters, more flexibility). Cross-tower attention then operates on the per-node embeddings in d-dim space, agnostic to original feature dim. The classifier head reads h(v) in d-dim. This is the standard heterogeneous-graph encoder pattern (also used in HAN, HetGNN). Multi-GNN-AML inherits it. KEY GOTCHA: missing features per node type — if entity-founding-date is missing for 30% of entities, mask with a learned default vector; do not zero-impute (zero is meaningful in many features).", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip typing."},
        ]}
        trap={<>(a)(c)(d) miss the per-type projection.</>}
        lens={<>Per-node-type linear projection to common dim. Shared across towers (typical). Mask missing features.</>}
        stretch={<>What if a node type has no features at all (just structural)?</>}
      />

      <VIS.TrapProblem id="mga-p11" difficulty="medium" title="P11 — Production: 100M-account bank — feasibility?"
        scenario={<><em>Discriminating insight: K=5 towers × 100M nodes. Mini-batch sampling per tower (GraphSAGE-style) makes this tractable on GPUs. Training: 1-3 days on 8-GPU node; inference: nightly batch scoring of all accounts in ~hours. Memory: distributed graph storage (DGL/PyG with mini-batch loaders). Online streaming: candidate-only inference.</em><br/><br/>Feasibility.</>}
        options={[
          {key:"a", text:"Infeasible."},
          {key:"b", text:"FEASIBLE for nightly batch with engineering. Components and costs. (1) GRAPH STORAGE: 100M accounts + 1B transactions + 50M entities = a few TB of graph data; stored in distributed graph storage (DGL distributed, PyG with feature store, or Spark-based CSR) with mini-batch loaders. (2) TRAINING: per-tower GraphSAGE-style neighbor sampling (sample 25 + 10 neighbors per hop) limits per-step memory; train on labeled positives + random negatives; with K = 5 towers x 50M params = 250M total, training fits in 8-GPU node A100 / H100; 1-3 days for one full pass. (3) NIGHTLY BATCH INFERENCE: score all 100M accounts via forward pass through all K towers + cross-tower attention; mini-batched on GPU; ~ 4-8 hours for 100M nodes on 8 GPUs. (4) STREAMING / REAL-TIME: full Multi-GNN-AML forward pass is in milliseconds per account but with neighbor sampling overhead. For sub-second decisions, use a rule-based pre-filter + on-demand inference on flagged candidates. (5) MONITORING: track per-tower contribution (mean alpha_r across nodes) over time; if one tower's mean alpha drops to near-zero, that relation is no longer informative — investigate data quality. IBM AMLSim benchmark scales to 10M+ accounts; commercial deployments at 100M+ are documented at major banks via IBM Cloud Pak for Data.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Always infeasible."},
        ]}
        trap={<>(a)(c)(d) miss the engineering pattern.</>}
        lens={<>Mini-batch sampling per tower; 8-GPU training; nightly batch inference; streaming on candidates only. 100M-account feasible.</>}
        stretch={<>What's GraphSAGE neighbor sampling?</>}
      />

      <VIS.TrapProblem id="mga-p12" difficulty="hard" title="P12 — Concept-specific misattribution: Multi-GNN-AML BEATEN by single-tower GraphSAGE."
        scenario={<><em>Discriminating insight (concept-specific): (1) only ONE relation actually carries signal in your data — the extra towers are noise; (2) labeled set too sparse — Multi-GNN-AML over-parameterized for the labels; (3) towers under-trained relative to single-tower (split compute across K vs 1); (4) cross-tower attention not learning. Specific diagnosis required.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Multi-GNN-AML is wrong tool."},
          {key:"b", text:"Concept-specific causes for Multi-GNN-AML losing to single-tower GraphSAGE. (1) SINGLE-RELATION-DOMINANT TASK — your data's AML signal lives entirely in the transaction relation; ownership and residence relations carry no extra signal. The extra towers add parameters that overfit to noise. Diagnose: ablate towers one at a time — drop the residence tower, see if F1 improves. If yes, residence relation is unhelpful. (2) LABEL SPARSITY vs PARAMETER COUNT — Multi-GNN-AML has K * P_tower params; with sparse labels (say, 100K positives in 100M accounts), the model is over-parameterized and overfits. Fix: shrink towers, add per-tower dropout, use semi-supervised pretraining on unlabeled. (3) COMPUTE SPLIT — if total training budget is fixed, dividing across K towers gives each tower 1/K of the gradient steps; each tower under-trains; single-tower with full budget converges better. Fix: spend more compute (K * single-tower budget) on Multi-GNN-AML. (4) CROSS-TOWER ATTENTION NOT LEARNING — uniform attention degrades to averaging tower outputs; effective embedding worse than a single well-trained tower. Fix: warm-start attention; ensure attention gradient flows. (5) DATA QUALITY in non-transaction relations — if ownership or residence data is noisy (missing, mis-coded), per-relation towers learn noise. Triage: per-tower validation AUC tells you which towers are helpful.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Single-relation-dominant task / label sparsity / compute split / attention not learning / data quality. Concept-specific.</>}
        stretch={<>How do you per-tower-ablation diagnose?</>}
      />

      <VIS.TrapProblem id="mga-p13" difficulty="medium" multiSelect title="P13 — Decoys: which are NOT Multi-GNN-AML? (4 correct)"
        scenario={<><em>Discriminating insight: GraphSAGE/CARE-GNN (homogeneous), motif mining, R-GCN (one tower with per-relation W_r), HAN (one tower with hierarchical attention) are NOT Multi-GNN-AML. Per-relation independent towers + cross-tower attention IS.</em><br/><br/>Pick NOT-Multi-GNN-AML.</>}
        options={[
          {key:"a", text:"GraphSAGE on the transaction-only subgraph.", correct:true},
          {key:"b", text:"Egonet motif mining against FinCEN typology catalog.", correct:true},
          {key:"c", text:"R-GCN: one tower with per-relation transformation matrices W_r.", correct:true},
          {key:"d", text:"HAN (Heterogeneous Attention Network): one tower with hierarchical relation-attention.", correct:true},
          {key:"e", text:"K independent per-relation GNN towers combined via cross-tower attention."},
        ]}
        trap={<>(a) homogeneous; (b) classical; (c) R-GCN one-tower; (d) HAN one-tower.</>}
        lens={<>Multi-GNN-AML = K independent towers + cross-tower attention. Drop independence or attention and it's something else.</>}
        stretch={<>What's HAN's hierarchical attention?</>}
      />

      <VIS.TrapProblem id="mga-p14" difficulty="hard" title="P14 — Concept-specific misattribution: alerts cluster heavily on one relation type."
        scenario={<><em>Discriminating insight (concept-specific): (1) one tower over-trained — gradient dominated by that relation&apos;s loss; (2) cross-tower attention biased — alpha_r(v) saturated near 1 for one relation; (3) labels correlated with one relation by data generation (positives all have unusual ownership patterns); (4) data leakage — one relation contains the label proxy. Distinguish.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Model is broken."},
          {key:"b", text:"Multi-GNN-AML-specific causes for alerts clustering on one relation. (1) ONE TOWER OVER-TRAINED — if gradients flow disproportionately into one tower (because that relation has more nodes/edges or higher learning rate), that tower's embedding dominates the attention input and alpha_r saturates. Fix: per-tower gradient scaling; or balance tower sizes. (2) ATTENTION SATURATION — alpha softmax converges to near-1 for one relation due to scale mismatch in tower output norms. Mitigation: layer-normalize each tower's output before attention. (3) LABEL CORRELATION WITH ONE RELATION — if the labeled AML positives in your data were originally generated based on a specific relation (e.g., labels come from a rule on ownership patterns), the model correctly learns that the ownership tower carries the signal. This is not a bug — it reflects the data. Diagnose by inspecting the label-generation process. (4) DATA LEAKAGE — one relation contains direct proxy for the label (e.g., 'flagged-by-investigator' edge already encodes the answer). Audit for leakage. (5) GENUINE SIGNAL CONCENTRATION — the AML task in this domain genuinely is dominated by one relation; consider simplifying to single-tower or weighted ensemble.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Tower over-train / attention saturation / label correlation / leakage / genuine concentration. Distinguish via inspection.</>}
        stretch={<>How do you audit for label-relation leakage?</>}
      />

      <VIS.TrapProblem id="mga-p15" difficulty="hard" title="P15 — IBM's AMLSim benchmark: what does it test?"
        scenario={<><em>Discriminating insight: AMLSim is a SYNTHETIC AML graph dataset (IBM Research) — controlled cross-relation laundering scenarios with ground-truth labels. Multi-GNN-AML benchmarked vs GraphSAGE, R-GCN, HAN, GADBench methods. Reports F1 per typology and overall. NeurIPS 2024 Datasets &amp; Benchmarks track.</em><br/><br/>Benchmark.</>}
        options={[
          {key:"a", text:"AMLSim is real data."},
          {key:"b", text:"AMLSim (IBM Research) is a SYNTHETIC AML graph DATASET designed to test heterogeneous-graph AML methods. It simulates a realistic AML scenario with: multiple node types (accounts, entities, addresses, transactions); multiple edge types (transfers, ownership, residence, board-membership); ground-truth labeled AML positives generated from typology-scripted laundering scenarios (fan-in funnels, layering chains, ring structures, scatter-gather patterns); negative accounts simulated to match the volume/temporal distribution of positives so the task is non-trivial. Benchmark protocol: train Multi-GNN-AML and baselines (GraphSAGE, R-GCN, HAN, GADBench-recommended methods) on a train split; evaluate F1 / AUC per typology and overall on a test split. IBM (NeurIPS 2024 Datasets and Benchmarks track) reports: Multi-GNN-AML beats GraphSAGE by 12 F1, R-GCN by 7 F1, HAN by 4 F1 on the cross-relation layering scenarios. Real-data validation requires re-running on bank-internal labeled data; AMLSim is the standard public reference. KEY CAVEAT: synthetic patterns may be more 'cleanly separated' than real AML, so absolute numbers are optimistic; the RELATIVE gap (Multi-GNN vs baselines) is the meaningful signal.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip benchmarks."},
        ]}
        trap={<>(a)(c)(d) miss the synthetic benchmark protocol.</>}
        lens={<>AMLSim: synthetic, ground-truth, cross-relation typologies. Multi-GNN-AML vs GraphSAGE/R-GCN/HAN baselines. Relative gap is the signal.</>}
        stretch={<>What does GADBench provide for comparison?</>}
      />

      <VIS.TrapProblem id="mga-p16" difficulty="medium" title="P16 — Junior: 'Multi-GNN-AML is just an ensemble of GNNs'. Refute."
        scenario={<><em>Discriminating insight: half right — multiple GNNs. Misses the HETEROGENEOUS GRAPH split (one tower per RELATION TYPE, not per random seed) and CROSS-TOWER ATTENTION (learned per-node weighting, not voting/averaging).</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Junior is right."},
          {key:"b", text:"Half right, missing two key distinctions. YES — Multi-GNN-AML uses MULTIPLE GNN models. But it is NOT a deep-ensemble-of-GNNs (M models with different random seeds, predictions averaged). Two critical differences. (1) ONE TOWER PER RELATION TYPE: the towers are NOT random initializations of the same model; each tower operates on a DIFFERENT SUB-GRAPH (transaction-relation subgraph for tower 1, ownership-relation subgraph for tower 2, etc.). Each tower learns a relation-specific representation. A deep-ensemble of single-relation GNNs would still miss cross-relation laundering — same blind spot K times. (2) CROSS-TOWER ATTENTION: combination is via a LEARNED PER-NODE ATTENTION layer, not voting or averaging. alpha_r(v) tells the model which relation matters for which node; this is a key win for interpretability and accuracy. A deep ensemble averages all members uniformly; Multi-GNN-AML differentially weights per-node. Calling it 'ensemble of GNNs' loses both the heterogeneous-graph decomposition and the learned attention combination — which are precisely the parts that beat single-tower baselines.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"They are the same."},
        ]}
        trap={<>(a)(c)(d) miss the relation-split and learned attention.</>}
        lens={<>Not ensemble: towers per RELATION (not per seed); combination via learned cross-tower ATTENTION (not voting/averaging).</>}
        stretch={<>What does deep-ensemble-of-GNNs miss that Multi-GNN-AML catches?</>}
      />

      <VIS.TrapProblem id="mga-p17" difficulty="hard" title="P17 — Skeptic: 'Just use R-GCN — it handles heterogeneous graphs in one tower'. Refute."
        scenario={<><em>Discriminating insight: R-GCN is more parameter-efficient (one tower with per-relation W_r) but MIXES relations EARLY (at every message-passing layer). Multi-GNN-AML keeps relations SEPARATE through message passing (more per-relation specialization), combining only at the LATE attention layer. Empirically (IBM benchmark) late fusion + separate towers beats early fusion + shared tower on AMLSim cross-relation typologies.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Skeptic is right."},
          {key:"b", text:"R-GCN is a real alternative but has architectural limitations Multi-GNN-AML addresses. R-GCN uses ONE TOWER with per-relation transformation matrices W_r INSIDE the message-passing layers — relations interact at EVERY LAYER through the shared node embedding. This is EARLY FUSION: per-relation message types are mixed at layer 1, layer 2, layer 3. R-GCN is parameter-efficient (one tower with K matrices = 1.5-3x a single GNN, vs Multi-GNN-AML's K-times) and works well when relations are tightly intertwined. Multi-GNN-AML uses K INDEPENDENT TOWERS — each tower runs full message passing INDEPENDENTLY on its relation subgraph; relations interact ONLY at the LATE cross-tower attention layer. This is LATE FUSION. Empirically (IBM NeurIPS 2024 benchmark): late fusion + separate towers BEATS R-GCN's early fusion by 3-7 F1 points on AMLSim. Why: each relation in AML has DIFFERENT structural properties (transaction graph is dense + dynamic; ownership graph is sparse + static; residence graph is even sparser); a SHARED tower in R-GCN cannot fully specialize to each relation's structure. Multi-GNN-AML's per-relation specialization wins on this heterogeneity. Trade-off: more parameters, more compute, harder to train. Recommend Multi-GNN-AML when relations are heterogeneous in structure; R-GCN when relations share similar structure or compute budget is tight.", correct:true},
          {key:"c", text:"Always R-GCN."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the late-vs-early-fusion distinction.</>}
        lens={<>R-GCN: one tower, early fusion (per-relation W_r at every layer). Multi-GNN-AML: K independent towers, late fusion via attention. Late wins on heterogeneous structure.</>}
        stretch={<>When is early fusion preferred?</>}
      />

      <VIS.TrapProblem id="mga-p18" difficulty="hard" title="P18 — Cross-tower attention math: what does the computation look like?"
        scenario={<><em>Discriminating insight: per node v with per-relation embeddings h_r(v) (r=1..K): compute query q(v) (per-node), key k_r (per-relation, shared across nodes); attention alpha_r(v) = softmax_r(q(v) · k_r); combined h(v) = sum_r alpha_r(v) * h_r(v). Or use multi-head attention. Standard attention math; per-node query is the innovation over global per-relation weighting.</em><br/><br/>Math.</>}
        options={[
          {key:"a", text:"Random average."},
          {key:"b", text:"Standard scaled dot-product attention with per-node queries and per-relation keys/values. For each node v with K per-relation embeddings h_1(v), h_2(v), ..., h_K(v) — one per tower v appears in — compute. (1) PER-NODE QUERY: q(v) = W_Q * mean_r(h_r(v)) — query is a learned projection of the average of v's tower outputs; alternative: query is the projection of a NODE-TYPE EMBEDDING. (2) PER-RELATION KEY: k_r = W_K * c_r where c_r is a learned per-relation embedding (a token representing relation r); keys are SHARED across all nodes. (3) ATTENTION SCORE: e_r(v) = q(v) dot k_r / sqrt(d), where d is the embedding dim (scaled dot-product). (4) ATTENTION WEIGHTS: alpha_r(v) = softmax_r(e_r(v)) — per-node softmax across the K relations. (5) COMBINED EMBEDDING: h(v) = sum_r alpha_r(v) * (W_V * h_r(v)) — weighted sum of per-relation embeddings with value projection. Optionally use MULTI-HEAD attention: H heads each computing their own alpha, concatenate. The INNOVATION over R-GCN-style per-relation summation is the PER-NODE QUERY q(v) — different nodes generate different attention patterns over the same relation set. Train end-to-end with the AML classification loss.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip attention."},
        ]}
        trap={<>(a)(c)(d) miss the standard attention computation.</>}
        lens={<>Per-node query q(v); per-relation keys k_r; softmax over r gives alpha_r(v); sum alpha_r * V * h_r. Standard attention.</>}
        stretch={<>Multi-head vs single-head attention here?</>}
      />

      <VIS.TrapProblem id="mga-p19" difficulty="medium" title="P19 — Which relations do real banks have for AML?"
        scenario={<><em>Discriminating insight: typical bank-side relations: (1) ACCOUNT-TO-ACCOUNT transactions (the dominant relation); (2) ACCOUNT-TO-ENTITY ownership; (3) ENTITY-TO-ADDRESS residence; (4) ENTITY-TO-ENTITY ownership chains / board membership; (5) ACCOUNT-TO-DEVICE login/fingerprint; (6) ENTITY-TO-SANCTIONS-LIST OFAC; (7) ACCOUNT-TO-CRYPTO-WALLET (for crypto exposure). K = 5-10 in practice.</em><br/><br/>Relations.</>}
        options={[
          {key:"a", text:"Only transactions."},
          {key:"b", text:"Typical real-bank relations for Multi-GNN-AML, K = 5-10. (1) ACCOUNT-TO-ACCOUNT TRANSACTIONS — the dominant relation; billions of edges; high temporal density. (2) ACCOUNT-TO-ENTITY OWNERSHIP — accounts owned by entities (LLCs, sole proprietors); ownership share / proportion as edge attribute. (3) ENTITY-TO-ADDRESS RESIDENCE — entities registered at addresses; many entities can share an address (shell signal). (4) ENTITY-TO-ENTITY OWNERSHIP CHAINS / BOARD MEMBERSHIP — corporate hierarchies, board directors (Panama Papers style mapping). (5) ACCOUNT-TO-DEVICE LOGIN — devices used to access accounts; same device across multiple accounts is a smurf signal. (6) ENTITY-TO-SANCTIONS-LIST OFAC — direct or N-hop link to a sanctioned entity. (7) ACCOUNT-TO-CRYPTO-WALLET — for banks with crypto exposure, link to on-chain addresses (mixers, sanctioned addresses). (8) ACCOUNT-TO-COUNTERPARTY-JURISDICTION — high-risk jurisdiction tags. Each relation becomes a tower in Multi-GNN-AML; cross-tower attention learns per-node weights. Data engineering challenge: keeping all relations FRESH (transactions update hourly; ownership/residence change quarterly; OFAC list updates weekly).", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip relations."},
        ]}
        trap={<>(a)(c)(d) miss the relation diversity.</>}
        lens={<>K = 5-10 typical: transactions, ownership, residence, board, device, OFAC, crypto, jurisdiction. Each = a tower.</>}
        stretch={<>What's the freshness cadence per relation?</>}
      />

      <VIS.TrapProblem id="mga-p20" difficulty="hard" title="P20 — Concept-specific misattribution: cross-tower attention collapses to single tower at inference."
        scenario={<><em>Discriminating insight (concept-specific): (1) test data distribution differs from train (covariate shift on one relation); (2) one tower's embedding norm dwarfs others (scale mismatch); (3) softmax temperature too low (one-hot attention); (4) data path issue — one relation&apos;s features always missing at inference. Per-tower diagnostics.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Bug in attention."},
          {key:"b", text:"Multi-GNN-AML-specific causes for attention collapse at inference. (1) COVARIATE SHIFT — test data distribution differs from training in one relation (e.g., ownership data quality degraded after a vendor change); the per-tower embedding for that relation becomes uninformative; attention learns to ignore it. Diagnose: per-tower validation metrics on the test distribution. (2) TOWER OUTPUT SCALE MISMATCH — if one tower's embedding norm is 100x another's (because of different message-passing depth or different feature magnitudes), the attention softmax saturates on the high-norm tower. Fix: layer-normalize each tower's output before attention. (3) SOFTMAX TEMPERATURE TOO LOW — if attention uses softmax with temperature << 1, alpha collapses to one-hot. Increase temperature or use sparsemax. (4) DATA PATH ISSUE — at inference, one relation's features are missing or stale (residence not updated in 6 months) and the corresponding tower outputs garbage; attention rationally ignores it. Diagnose: per-tower input feature completeness check at inference time. (5) MODEL DRIFT — model trained 6 months ago, the relevant relation has shifted; retrain.", correct:true},
          {key:"c", text:"Use Platt scaling."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Covariate shift / scale mismatch / temperature too low / missing inference features / drift. Per-tower diagnostics.</>}
        stretch={<>How do you per-tower validate at inference?</>}
      />

      <VIS.TrapProblem id="mga-p21" difficulty="hard" title="P21 — In one sentence, THE unique mechanism of Multi-GNN-AML."
        scenario={<><em>Discriminating insight: HETEROGENEOUS GRAPH + ONE GNN TOWER PER RELATION TYPE (independent parameters, message passing on per-relation subgraph) + CROSS-TOWER ATTENTION (per-node alpha_r weighting) + per-node classifier. NOT homogeneous GNN; NOT R-GCN/HAN one-tower; NOT ensemble.</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"It is a deep ensemble."},
          {key:"b", text:"FOUR-COMPONENT ARCHITECTURE on a HETEROGENEOUS AML graph (multiple node types: account, transaction, entity, address; multiple edge types: transfers, ownership, residence, board, device, OFAC link). (1) PER-RELATION SUBGRAPH SPLIT: for each edge type r, build sub-graph G_r. (2) PER-RELATION TOWERS: K INDEPENDENT GNN towers (one per relation), each with INDEPENDENT parameters, running full message passing on its own subgraph; produces per-node per-relation embedding h_r(v). (3) CROSS-TOWER ATTENTION: per-node learned attention weights alpha_r(v) = softmax_r(q(v) dot k_r); combined embedding h(v) = sum_r alpha_r(v) * V * h_r(v). (4) PER-NODE CLASSIFIER: MLP on h(v) outputs AML label. Trained end-to-end with binary cross-entropy on labeled accounts. IBM Research, NeurIPS 2024 (Multi-GNN-AML on AMLSim benchmark). NOT a homogeneous GNN (CARE-GNN, GraphSAGE — single relation, single tower). NOT R-GCN/HAN (one tower with per-relation matrices/attention INSIDE message passing — early fusion). NOT motif mining (classical, no learning). NOT deep ensemble (towers per RELATION, not per seed; combination via learned ATTENTION, not voting).", correct:true},
          {key:"c", text:"It is a single-relation GNN."},
          {key:"d", text:"It is motif mining."},
        ]}
        trap={<>(a)(c)(d) miss the per-relation-tower + cross-tower-attention mechanism.</>}
        lens={<>Heterogeneous graph + K independent per-relation towers + cross-tower attention + per-node classifier. Late fusion.</>}
        stretch={<>What does the IBM NeurIPS 2024 paper title emphasize?</>}
      />

      <VIS.TrapProblem id="mga-p22" difficulty="medium" title="P22 — When NOT to use Multi-GNN-AML."
        scenario={<><em>Discriminating insight (concept-specific): (1) only ONE relation in data (no heterogeneity to exploit); (2) labels too sparse for K * P_tower params; (3) compute budget cannot afford K-fold training; (4) regulator demands strict typology-code mapping (motif mining wins); (5) relations carry no real cross-relation signal. Concept-specific.</em><br/><br/>Skip.</>}
        options={[
          {key:"a", text:"Always use Multi-GNN-AML."},
          {key:"b", text:"Skip Multi-GNN-AML when: (1) ONLY ONE RELATION in data — if your AML data is just account-to-account transactions with no ownership / residence / device data, there's no heterogeneity to exploit; use a homogeneous GNN (GraphSAGE, CARE-GNN) and save the per-relation complexity. (2) LABEL SPARSITY too high for K * P_tower parameters — if labeled positives are <10K and K = 5 towers each ~20M params, the model is hugely over-parameterized; use a simpler model. (3) COMPUTE BUDGET cannot afford K-fold training — if training a single GNN takes 1 GPU-day, Multi-GNN-AML takes ~K = 5 GPU-days; if you can't afford that, use R-GCN (parameter-efficient one-tower alternative). (4) REGULATOR DEMANDS STRICT TYPOLOGY-CODE MAPPING — Multi-GNN-AML's interpretability is cross-tower attention weights ('this account flagged 80% via residence tower') — useful but not as defensible as motif mining's typology-code mapping. For FinCEN SAR alerts where every alert must be packaged with a typology code, prefer motif mining (or hybrid: motif features → Multi-GNN-AML). (5) RELATIONS CARRY NO CROSS-RELATION SIGNAL — if your data's AML signal is genuinely concentrated in one relation (validate via per-tower ablation), the extra towers are noise. (6) SUB-MS LATENCY required — full Multi-GNN-AML forward pass is ms-scale; for sub-ms, use a candidate-filter + on-demand pattern.", correct:true},
          {key:"c", text:"Never use Multi-GNN-AML."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>Skip when single relation / sparse labels / K-fold compute infeasible / regulator demands motif codes / no cross-relation signal / sub-ms latency.</>}
        stretch={<>What's the hybrid motif-feature + Multi-GNN-AML pattern?</>}
      />

      <VIS.TrapProblem id="mga-p23" difficulty="hard" title="P23 — Production: how does Multi-GNN-AML slot into the bank AML stack?"
        scenario={<><em>Discriminating insight: nightly batch heterogeneous-graph ingest → per-relation subgraph build → Multi-GNN-AML inference on all accounts → top-K alerts to investigator queue with cross-tower attention attribution → SAR decision. Inputs from multiple data sources; relation-specific freshness. Audit log includes per-tower contribution and attention weights.</em><br/><br/>Pipeline.</>}
        options={[
          {key:"a", text:"Just run the model."},
          {key:"b", text:"End-to-end production pipeline. (1) MULTI-SOURCE INGEST: transactions from core banking (hourly); ownership from corporate registry feeds (quarterly); residence from KYC/onboarding (per-update); board from corporate registry (quarterly); device from auth logs (real-time); OFAC list (weekly). Each source ingested to its own typed table. (2) GRAPH BUILD: nightly job constructs the heterogeneous graph with K = 5-10 edge types; stored in distributed graph DB (DGL or PyG with feature store). (3) PER-RELATION SUBGRAPH MATERIALIZATION: pre-compute per-relation neighbor lists for sampling. (4) MULTI-GNN-AML INFERENCE: forward pass on all accounts in nightly batch; ~4-8 GPU-hours for 100M accounts on 8 GPUs. Output: per-account risk score + cross-tower attention weights (alpha_r(v)). (5) ALERT QUEUE: top-K (e.g., top-1000) routed to investigator queue. Each alert package includes: risk score, cross-tower attention attribution (which relation drove the alert), per-tower top neighbors (graph context for investigator review). (6) INVESTIGATOR REVIEW: SAR decision; confirmed SARs become labeled data. (7) FEEDBACK LOOP: quarterly retrain with new labels and updated graph. (8) MONITORING: per-tower mean alpha over time (drift signal); per-tower validation AUC; per-relation data freshness. (9) AUDIT: every alert documents model version, tower versions, per-tower contribution; regulator can reproduce.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt scaling."},
        ]}
        trap={<>(a)(c)(d) miss the end-to-end pipeline.</>}
        lens={<>Multi-source ingest → graph build → per-relation subgraphs → Multi-GNN inference → attention-attributed alerts → SAR → feedback → monitoring → audit.</>}
        stretch={<>What does per-tower attention attribution add to alert packages?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2306.16424" target="_blank" rel="noopener"><strong>IBM Research — Realistic Synthetic Financial Transactions for Anti-Money Laundering Models (AMLSim + Multi-GNN benchmark)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2024 Datasets &amp; Benchmarks, paper)</span><br/>The reference paper for Multi-GNN-AML and the AMLSim synthetic benchmark. Section 3 defines the per-relation tower architecture; Section 4 ablates vs R-GCN/HAN/GraphSAGE.</li>
        <li><a href="https://arxiv.org/abs/1703.06103" target="_blank" rel="noopener"><strong>Schlichtkrull, Kipf, Bloem, van den Berg, Titov, Welling — Modeling Relational Data with Graph Convolutional Networks (R-GCN)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(ESWC 2018, paper)</span><br/>The early-fusion one-tower baseline Multi-GNN-AML compares against. Read to understand the per-relation transformation-matrix design.</li>
        <li><a href="https://arxiv.org/abs/1903.07293" target="_blank" rel="noopener"><strong>Wang, Ji, Shi, Wang, Cui, Yu — Heterogeneous Graph Attention Network (HAN)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(WWW 2019, paper)</span><br/>Per-relation hierarchical attention inside ONE tower — the architectural contrast point for Multi-GNN-AML's separate-towers + late-fusion design.</li>
        <li><a href="https://docs.dgl.ai/en/latest/tutorials/large/L1_large_node_classification.html" target="_blank" rel="noopener"><strong>DGL — Distributed Heterogeneous Graph Learning tutorial</strong></a> <span style={{color:"#64748b", fontSize:14}}>(tutorial)</span><br/>Practitioner walkthrough for building per-relation towers, mini-batch sampling, and distributed training. The de-facto Python implementation reference.</li>
        <li><a href="https://www.ibm.com/blog/aml-graph-neural-networks/" target="_blank" rel="noopener"><strong>IBM Research — Graph Neural Networks for AML at scale</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Engineering walk-through of deploying heterogeneous GNN models for AML; covers data engineering, per-relation freshness, monitoring patterns from the AMLSim benchmark to commercial deployments.</li>
      </ul>
    </VIS.Section>
