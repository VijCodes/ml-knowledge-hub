<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Shadow scoring & dark-launch — score in shadow against live policy, A/B compare before promoting.
// Stripe Radar / PayPal practice.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · MLOps"
      title="Shadow scoring &amp; dark-launch"
      subtitle="Score the new model in shadow against the live production policy, A/B compare confusion matrices and downstream business impact before promoting the new model to live decisions."
      byline={[
        {label: "Source", value: "Stripe Radar blog + PayPal practice 2024-2025"},
        {label: "Year", value: "2024"},
        {label: "L3", value: "Production ML for fraud / MLOps"},
      ]}/>

    <VIS.TLDR>
      Direct deploy of a new fraud model means betting the business on offline AUC matching online behaviour. A{" "}
      <VIS.Term def="Shadow scoring: run the new model alongside the live model on every production request, log both predictions, but only the live model's decisions actually act. The shadow log enables direct comparison of new vs live behaviour on real production traffic before any policy change.">shadow-scoring</VIS.Term>{" "}
      and dark-launch protocol runs the new model on real production traffic, logs both new and live decisions, and lets you compare confusion matrices and business KPIs before flipping the new model to live. Senior issues: how to handle label-delay (labels arrive 30+ days later), what KPIs you can measure pre-label, and when shadow is sufficient vs when A/B is required.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        For each production request, the live model scores and acts (approve / decline / step-up). In parallel, the shadow model also scores; its decision is logged but not enforced. Over a sufficient window, compare: (i) score distributions, (ii) decision-agreement rates, (iii) for cases where labels are observable quickly (CVV-fail, instant chargeback), confusion matrix deltas, (iv) downstream business KPIs (approval rate, false-decline reports, customer complaints).
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  REQ["Production request"]
  LIVE["Live model"]
  SHADOW["Shadow model"]
  ACT["Decision acted on"]
  LOG["Shadow + live logs"]
  COMP["Comparison report"]
  REQ --> LIVE
  REQ --> SHADOW
  LIVE --> ACT
  LIVE --> LOG
  SHADOW --> LOG
  LOG --> COMP
  style SHADOW fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style COMP fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the shadow model (logs only, no enforcement). Yellow = the comparison report driving the promotion decision. Critical: the new model sees the SAME PRODUCTION TRAFFIC at the same moment as live; offline metrics on a holdout are NOT a substitute.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Direct cutover</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Holdout A/B only</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Shadow then A/B</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Risk to live business</td>
            <td style={{padding:"8px 10px"}}>High</td>
            <td style={{padding:"8px 10px"}}>Limited to A/B share</td>
            <td style={{padding:"8px 10px"}}>Near zero in shadow</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Detects offline-online divergence</td>
            <td style={{padding:"8px 10px"}}>After damage</td>
            <td style={{padding:"8px 10px"}}>Yes (slow)</td>
            <td style={{padding:"8px 10px"}}>Yes (immediate)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Provides causal lift estimate</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
            <td style={{padding:"8px 10px"}}>Yes (A/B phase)</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Time to confidence</td>
            <td style={{padding:"8px 10px"}}>0 days</td>
            <td style={{padding:"8px 10px"}}>Weeks-months</td>
            <td style={{padding:"8px 10px"}}>Weeks-months</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Cost</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>Medium (A/B infra)</td>
            <td style={{padding:"8px 10px"}}>High (shadow + A/B infra)</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Any policy-impacting model change</strong> — new model, new feature set, materially different threshold.</li>
        <li><strong>Label delay is long</strong> — fraud labels arrive 30+ days later, so direct A/B is high-risk without shadow preflight.</li>
        <li><strong>You have the engineering budget</strong> — shadow infrastructure costs roughly 2x serving cost on the shadow traffic share.</li>
        <li><strong>The business cannot tolerate a multi-percentage-point regression for even a day</strong> — fraud touches revenue, customer-experience, and compliance simultaneously.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Labels arrive 30+ days later for fraud">
        Shadow scoring gives you decisions IMMEDIATELY but labels (was this transaction fraud?) take weeks. You can compare distributions and decision agreement instantly, but confusion-matrix-level evaluation needs label maturity. Don't promote a model on agreement metrics alone.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Shadow does not capture causal effects of action">
        The new model never actually acts in shadow — so you don't see how customers respond to its decisions. Step-up auth recovers some legitimate transactions; in shadow you cannot measure the recovery rate. A/B is required after shadow for causal lift.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Feature parity between shadow and offline matters">
        Shadow must use the SAME feature pipeline you'll use in production, not the offline-training feature pipeline. If you shadow against a different pipeline, you measure pipeline divergence not model lift.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade traps on designing the shadow protocol, label-delay handling, KPI selection, and promotion criteria.
      </p>

      <VIS.TrapProblem
        id="ssd-p1"
        difficulty="hard"
        title="P1 — Design a shadow-launch protocol when labels arrive 30 days later"
        scenario={<>You are launching a new fraud model. Labels (chargebacks, confirmed fraud) arrive 30 days after the transaction. You cannot wait 30 days before promoting. Design the protocol.</>}
        options={[
          {key:"a", text:"Phase 1 (shadow, 1-2 weeks): score every production transaction with new model; log both decisions; compare score distributions, decision-agreement rates, and approve / decline / step-up rate deltas; compare on FAST-LABEL signals (CVV fail, instant 3DS challenge, real-time auth decline). Phase 2 (A/B, 4-8 weeks): if shadow passes, route a small share (1-5%) of traffic to new model as live; measure causal business KPIs and the partial label window (early-arriving chargebacks). Phase 3 (full label maturity, after 30+ days): full confusion-matrix evaluation on A/B labels; promote if lift positive on the metrics that matter; gradually ramp share to 100%. Pre-define stop conditions at every phase.", correct:true},
          {key:"b", text:"Direct cutover — labels will come."},
          {key:"c", text:"Wait 30 days in shadow before any production traffic flips."},
          {key:"d", text:"Skip shadow; go straight to a small A/B."},
        ]}
        trap={<>(b) bets the business on offline AUC. (c) trades velocity for false safety — shadow only measures non-label KPIs; you cannot extract label-based evaluation without actual production decisions. (d) skips the cheapest risk-mitigation step.</>}
        lens={<>(a). The three-phase protocol is standard at Stripe, PayPal, Block. Shadow catches pipeline issues and gross distributional anomalies in 1-2 weeks. A/B captures causal lift while exposing limited traffic. Full label maturity is the final gate. Pre-define stop conditions at every phase so a regression triggers automatic rollback, not human deliberation.</>}
        stretch={<>What single early-label signal carries the most information about likely 30-day-label outcomes?</>}
      />

      <VIS.TrapProblem
        id="ssd-p2"
        difficulty="hard"
        multiSelect
        title="P2 — KPIs measurable BEFORE label maturity"
        scenario={<>You are in shadow. Labels won't be mature for 30 days. Which metrics can you usefully compare new vs live during shadow?</>}
        options={[
          {key:"a", text:"Score distribution: histogram of new-model scores vs live-model scores on the same traffic. Major distribution shifts indicate feature or model regressions.", correct:true},
          {key:"b", text:"Decision-agreement rate: fraction of transactions where new and live agree on approve / decline / step-up.", correct:true},
          {key:"c", text:"Approval-rate delta: change in fraction of transactions approved. Large drops without label evidence is a red flag.", correct:true},
          {key:"d", text:"Step-up rate delta: how much more / less step-up auth the new model triggers — high step-up hurts user experience.", correct:true},
          {key:"e", text:"Final 30-day chargeback rate (impossible during shadow window)."},
          {key:"f", text:"Early-label signals: CVV fail, instant 3DS challenge fail, real-time auth decline by issuer.", correct:true},
        ]}
        trap={<>(e) is the one impossible-during-shadow metric — the entire point of shadow is that you cannot wait for it. Some candidates list it anyway because it is the "right" metric in the abstract; the trap is recognizing temporal feasibility.</>}
        lens={<>Five correct. <strong>(a)</strong> distributions, <strong>(b)</strong> agreement, <strong>(c)</strong> approval-rate delta, <strong>(d)</strong> step-up delta, <strong>(f)</strong> fast-label signals. These all can be measured in days, not 30+. Senior signal: name the metric AND the time-to-measurement.</>}
        stretch={<>What single distribution-shift metric would you set an automatic alarm on?</>}
      />

      <VIS.TrapProblem
        id="ssd-p3"
        difficulty="hard"
        title="P3 — Decision-agreement is 99%. Promote?"
        scenario={<>One week into shadow. New model and live model agree on 99% of decisions. Approve / decline / step-up rates match within 0.5%. Score distributions look similar. Promote the new model?</>}
        options={[
          {key:"a", text:"No — high agreement is a NECESSARY but NOT SUFFICIENT condition. Agreement tells you the new model is not breaking, but it does not tell you whether the 1% it DISAGREES on is better or worse. The whole point of replacing the model is presumably to do something different on cases that matter. Look at the disagreement set specifically: on cases where new declines but live approves, what does fast-label or expected-loss evidence say? On cases where new approves but live declines, what is the recovered-revenue evidence? Agreement-only promotion ships a model whose changes you have not evaluated.", correct:true},
          {key:"b", text:"Yes — 99% agreement plus matching rates means the models are equivalent."},
          {key:"c", text:"Yes — high agreement de-risks the rollout."},
          {key:"d", text:"No — wait for full 30-day label maturity in shadow regardless."},
        ]}
        trap={<>(b) and (c) confuse no-regression with positive lift. A model that agrees 100% with live has zero value as a replacement; the disagreements ARE the model's contribution. (d) is over-cautious; you can extract substantial signal from the disagreement set before label maturity.</>}
        lens={<>(a). The disagreement set is where the model's behavior lives. Audit it specifically: what is the expected loss / expected lift on the cases where the two models diverge? This audit is what separates shadow from offline holdout — shadow gives you the REAL production disagreement distribution.</>}
        stretch={<>How would you sample the disagreement set for fast manual labeling to accelerate evaluation?</>}
      />

      <VIS.TrapProblem
        id="ssd-p4"
        difficulty="hard"
        title="P4 — Shadow score distribution looks wildly different from offline holdout"
        scenario={<>In offline evaluation, new-model scores looked similar to live-model scores; offline AUC was 0.93. In shadow, the new model's score distribution is dramatically shifted toward higher scores; approval rate would drop 8% if it were live. Diagnose.</>}
        options={[
          {key:"a", text:"The shadow infrastructure is exposing a feature-pipeline divergence between offline training and online serving. Common causes: feature definition differences (offline 'as-of-end-of-day' vs online 'as-of-now'), feature freshness (ingestion lag), schema drift (a feature renamed in one path), null-handling differences. Audit shadow-vs-offline feature vectors row-by-row on a sample; the discrepancy IS the bug.", correct:true},
          {key:"b", text:"The new model is correctly more conservative; promote."},
          {key:"c", text:"Online traffic differs from training distribution; retrain."},
          {key:"d", text:"Shadow infrastructure is buggy; ignore it."},
        ]}
        trap={<>(b) ships a model with an 8% approval-rate regression. (c) misattributes a feature-pipeline bug to data drift. (d) discards the most informative signal you have.</>}
        lens={<>(a). Shadow vs offline divergence on the same data is almost always a feature-pipeline parity bug, not a model issue. Audit feature vectors; the discrepancy is the root cause. This is the same shape as the feature-store PIT problem (sister visual): offline-online parity is the real production-truth check.</>}
        stretch={<>What is the minimum number of sample rows needed to reliably surface a feature-pipeline divergence?</>}
      />

      <VIS.TrapProblem
        id="ssd-p5"
        difficulty="hard"
        multiSelect
        title="P5 — A/B phase: causal lift estimation under label delay"
        scenario={<>Shadow passed. You are in A/B with 5% traffic on new model. Labels still take 30 days. Which causal lift estimates can you produce mid-A/B?</>}
        options={[
          {key:"a", text:"Approval-rate delta with bootstrap confidence intervals — immediate.", correct:true},
          {key:"b", text:"Step-up auth rate delta and downstream conversion among stepped-up users — measurable within days.", correct:true},
          {key:"c", text:"Early-arriving chargeback rate (CVV-fail, instant 3DS fail) by treatment arm — within days.", correct:true},
          {key:"d", text:"Survival-model estimate of 30-day chargeback rate using early labels and the historical label-arrival curve — partial estimate within 2-3 weeks.", correct:true},
          {key:"e", text:"Final 30-day chargeback rate (impossible until 30 days have elapsed)."},
          {key:"f", text:"Customer-complaint rate by treatment arm — measurable within days if complaint channels are tagged.", correct:true},
        ]}
        trap={<>(e) is the impossible-during-A/B metric. The trap is that some candidates list ALL chargeback metrics without separating which are observable and which are not.</>}
        lens={<>Five correct. <strong>(a)</strong> approval-rate, <strong>(b)</strong> step-up + downstream conversion, <strong>(c)</strong> early-label rates, <strong>(d)</strong> survival-model partial estimate, <strong>(f)</strong> complaint rate. Senior signal: distinguish observable-now from observable-eventually KPIs.</>}
        stretch={<>What is the right A/B sample size to detect a 0.1% chargeback-rate change at 80% power?</>}
      />

      <VIS.TrapProblem
        id="ssd-p6"
        difficulty="medium"
        title="P6 — Shadow vs canary"
        scenario={<>A teammate proposes skipping shadow and going straight to a 1% canary (live traffic). Why do you push back?</>}
        options={[
          {key:"a", text:"A 1% canary exposes 1% of customers to potential regressions before you have done basic distributional sanity checks. Shadow gives you the same scoring evidence on 100% of traffic with ZERO customer risk; canary gives you 1% of decisions at full risk. Shadow first, then canary, then ramp. The cost of shadow is engineering; the cost of skipping is customer harm if the model has a feature-pipeline bug.", correct:true},
          {key:"b", text:"Canary is fine; 1% is small."},
          {key:"c", text:"Shadow is unnecessary; offline AUC is enough."},
          {key:"d", text:"Canary > shadow because it gets real labels."},
        ]}
        trap={<>(b) underestimates the cost of harming 1% of customers (1% of millions of transactions). (c) ignores shadow's specific value (online-feature-pipeline parity check). (d) trades cheap risk-free signal for early but limited labels.</>}
        lens={<>(a). Shadow and canary are complementary; shadow is the cheap zero-risk pre-flight, canary is the small causal-lift step. Order them: shadow then canary then ramp. The cost-benefit of skipping shadow is asymmetric — small engineering save, large potential customer harm.</>}
        stretch={<>What single observable metric would let you SKIP shadow and go straight to canary safely?</>}
      />

      <VIS.TrapProblem
        id="ssd-p7"
        difficulty="hard"
        title="P7 — Step-up auth changes user behavior; shadow cannot measure that"
        scenario={<>The new model triggers more step-up auth (5% vs 3% live). Some users will abandon checkout when faced with step-up; others will recover by completing the challenge. Shadow shows the decision deltas but cannot observe abandonment because the step-up never actually happens. How do you measure step-up impact?</>}
        options={[
          {key:"a", text:"You cannot measure step-up impact in shadow. This is exactly the kind of causal effect that REQUIRES A/B — you must actually trigger step-up to observe abandonment vs recovery. Shadow gives you the decision-rate evidence; A/B gives you the behavioral-response evidence. Plan A/B with traffic share sized for step-up power calculation, not just chargeback power.", correct:true},
          {key:"b", text:"Estimate abandonment from historical step-up data."},
          {key:"c", text:"Increase shadow scoring to capture causal effects."},
          {key:"d", text:"Skip A/B; shadow is sufficient."},
        ]}
        trap={<>(b) uses historical baseline which may not transfer (different user segments, different challenge types). (c) misunderstands shadow's fundamental limitation. (d) ships without ever measuring the behavior change.</>}
        lens={<>(a). Shadow is necessary but not sufficient because it never enforces decisions. Causal behavioral effects (abandonment, recovery, complaint, retention) require actual production decisions, hence A/B after shadow. Plan A/B sample-size for the KPI you want to measure, not just the AUC delta.</>}
        stretch={<>How do you size A/B for step-up abandonment power vs chargeback-rate power simultaneously?</>}
      />

      <VIS.TrapProblem
        id="ssd-p8"
        difficulty="hard"
        multiSelect
        title="P8 — Pre-defined stop conditions"
        scenario={<>You are setting automatic stop conditions for the shadow and A/B phases. Which conditions deserve hard stops vs alerts?</>}
        options={[
          {key:"a", text:"Approval-rate change exceeding ±2 percentage points in shadow — hard stop, investigate feature pipeline.", correct:true},
          {key:"b", text:"Score distribution KL-divergence above a threshold (e.g., 0.5) — hard stop in shadow.", correct:true},
          {key:"c", text:"Early-label chargeback-rate worse in treatment arm by more than the historical noise band — hard stop A/B.", correct:true},
          {key:"d", text:"Step-up rate change exceeding ±50% — alert, not stop, unless customer-complaint rate also rises.", correct:true},
          {key:"e", text:"Customer-complaint rate worse in treatment arm by more than 2x — hard stop A/B.", correct:true},
          {key:"f", text:"Disagreement rate above 5% — hard stop (always)."},
        ]}
        trap={<>(f) is the trap — high disagreement is the WHOLE POINT of a meaningfully-different new model. If disagreement is the stop condition, you've banned any model that actually changes behavior. Disagreement should be ANALYZED, not stopped on.</>}
        lens={<>Five correct stops + one trap. <strong>(a) (b)</strong> distributional / approval-rate stops in shadow. <strong>(c) (e)</strong> business-KPI stops in A/B. <strong>(d)</strong> step-up rate is alert-only because it can legitimately rise with a more conservative model. Senior signal: pre-defined, automatic, with clear distinction between hard stops and investigate-alerts.</>}
        stretch={<>What is the right approval-rate change threshold, given the fintech's typical week-to-week approval-rate variance?</>}
      />

      <VIS.TrapProblem
        id="ssd-p9"
        difficulty="hard"
        title="P9 — Shadow shows new model is more permissive on a vulnerable segment"
        scenario={<>Shadow analysis shows the new model approves 12% more transactions on a specific high-risk merchant category than the live model. The disagreement set is enriched in this segment. Promote?</>}
        options={[
          {key:"a", text:"Slice the analysis by segment and check expected-loss / fast-label signals SPECIFICALLY on the disagreement set within that segment. If the new model's additional approvals on that segment correlate with high fast-label chargeback signals, the new model has a segment-level regression — do NOT promote without segment-level remediation (capacity / feature work / segment-specific threshold). Aggregate AUC can look good while a specific segment is broken; segment-level audit is mandatory before promotion.", correct:true},
          {key:"b", text:"Promote — aggregate metrics are what matter."},
          {key:"c", text:"Block the segment manually post-promotion."},
          {key:"d", text:"Wait for full 30-day labels."},
        ]}
        trap={<>(b) ships a model with a segment-level regression. (c) is a brittle band-aid. (d) loses the velocity benefit of the protocol.</>}
        lens={<>(a). Segment-level audits catch model regressions that aggregate metrics hide. Standard pattern: pre-define key segments (merchant category, region, currency, transaction-size band) and audit each in shadow. Promote only when segment-level metrics are acceptable, not just aggregate.</>}
        stretch={<>Which segment dimension is most often the source of hidden regressions in fraud models?</>}
      />

      <VIS.TrapProblem
        id="ssd-p10"
        difficulty="hard"
        title="P10 — End-to-end shadow + dark-launch architecture"
        scenario={<>You are designing the full deployment pipeline for fraud-model changes at a fintech: 50M transactions/day, 30-day chargeback delay, multi-jurisdiction. Pick the architecture.</>}
        options={[
          {key:"a", text:"Three-phase pipeline: (1) Shadow (1-2 weeks): new model scores every transaction; both decisions logged; compare distributions, agreement, approval/step-up rate, early-label signals, segment-level slices; pre-defined hard stops on approval-rate, KL-divergence, segment regressions. (2) Canary A/B (4-8 weeks): if shadow passes, route 1-5% traffic to new model live; measure causal KPIs (step-up abandonment, recovery, complaints, early chargebacks) and partial 30-day label estimate via survival model. (3) Ramp (after early-label maturity): gradually increase share to 100% on label evidence, with automatic rollback on regression. Feature-pipeline parity audited continuously via shadow's offline-online compare. Promotion gated on full-label confusion-matrix delta and business KPIs.", correct:true},
          {key:"b", text:"Direct cutover after offline holdout passes."},
          {key:"c", text:"Skip shadow; go to A/B directly with 50% traffic."},
          {key:"d", text:"Permanent shadow; never promote."},
        ]}
        trap={<>(b) bets on offline metrics. (c) skips the cheapest preflight and exposes 50% of customers to risk. (d) never gets the model's benefit; shadow is preflight, not endpoint.</>}
        lens={<>(a). The complete senior architecture: three-phase pipeline with shadow preflight, canary A/B for causal lift, ramp on label evidence, segment-level audits, pre-defined stop conditions, continuous pipeline parity audit, gated promotion. Each phase addresses risks the prior problems exposed.</>}
        stretch={<>Which single piece of this pipeline has the highest ROI for a team that currently does direct cutovers?</>}
      />
    </VIS.Section>
