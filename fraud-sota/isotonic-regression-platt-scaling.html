      />

      <VIS.TrapProblem
        id="cal-p9"
        difficulty="medium"
        title="P9 — Platt's original training labels: y_+ = (N_+ + 1) / (N_+ + 2). Why?"
        scenario={<><em>Discriminating insight: Bayesian smoothing to avoid the calibrator over-fitting the held-out set's exact label distribution. Plain (0, 1) labels would push the sigmoid to saturate; smoothed labels keep gradient on the sigmoid's mid-section.</em><br/><br/>Why smoothed labels.</>}
        options={[
          {key:"a", text:"Random."},
          {key:"b", text:"Bayesian smoothing to avoid the calibrator over-fitting the held-out set. Plain (0, 1) labels in the logistic-regression fit push the sigmoid toward its saturating regions: for confident positives the loss tries to push p to 1 (logit to +infinity), and the held-out set is finite, so this overfits. Platt's smoothing replaces y=1 with (N_+ + 1) / (N_+ + 2) and y=0 with 1 / (N_- + 2). For 100 positives and 9900 negatives in the calibration set, these labels become ~0.99 and ~0.0001 — close to 0/1 but pulled in slightly. The fit stays on the sigmoid's mid-section and generalizes better. Modern Platt implementations often skip this smoothing if regularization is added directly; the original paper used smoothing because L2 regularization on the logistic fit was less standard then.", correct:true},
          {key:"c", text:"Just to be different from logistic regression."},
          {key:"d", text:"Required for numerical stability."},
        ]}
        trap={<>(a)(c) miss the regularization story; (d) is partial (it's about generalization, not just numerics).</>}
        lens={<>Smoothed labels = Bayesian prior preventing calibrator overfit.</>}
        stretch={<>Could you replace smoothing with L2 regularization?</>}
      />

      <VIS.TrapProblem
        id="cal-p10"
        difficulty="hard"
        title="P10 — Reliability diagram shows over-confidence at high scores, under-confidence at low. Which calibrator?"
        scenario={<><em>Discriminating insight: that's S-shaped miscalibration — the curve crosses the diagonal twice. Platt's single sigmoid can't fit S-shape (sigmoid is monotone but has a fixed inflection). Isotonic fits any monotone shape. Beta calibration's 3-parameter family also fits S-shapes well.</em><br/><br/>Pick the method.</>}
        options={[
          {key:"a", text:"Platt."},
          {key:"b", text:"Isotonic regression OR beta calibration. The reliability diagram shape — over-confident at high scores AND under-confident at low scores — implies the diagonal is crossed twice; this is an S-shaped curve, not a plain sigmoid (which crosses the diagonal at most twice but with a fixed inflection that Platt's 2-parameter fit can't reposition independently). Platt's logistic regression with parameters (A, B) maps to a sigmoid with location-and-scale only — the shape is fixed. Isotonic regression is non-parametric and fits any monotone shape, including S-curves, exactly (given enough data). Beta calibration uses a 3-parameter beta-family curve (a, b, c) which CAN reposition the inflection and asymmetry. Both fit S-curves; isotonic is more flexible but needs more data; beta is a parametric middle ground specifically designed for this shape and common with GBDT outputs.", correct:true},
          {key:"c", text:"Just use threshold moving."},
          {key:"d", text:"Don't calibrate."},
        ]}
        trap={<>(a) underfits the S-curve; (c) doesn't change probabilities; (d) wrong.</>}
        lens={<>S-curve: isotonic (non-parametric) or beta (3-param). Platt under-fits.</>}
        stretch={<>Could you fit Platt on logit(s) instead of s to expand its expressiveness?</>}
      />

      <VIS.TrapProblem
        id="cal-p11"
        difficulty="hard"
        title="P11 — You ship calibrated probabilities. PM asks why decisions are unchanged. Diagnose."
        scenario={<><em>Discriminating insight (concept-specific): if your decision rule is 'reject if score greater than T_old', then changing the score-to-probability map does NOT change decisions until you also re-tune T to a probability-based threshold. Calibration changes the VALUE of probabilities; the decision rule must consume those values. If your rule still uses raw scores, calibration is doing nothing for the decision.</em><br/><br/>Plumbing bug.</>}
        options={[
          {key:"a", text:"Random."},
          {key:"b", text:"Calibration changes the score-to-probability MAP; it does not change the score's RANKING, and your decision rule needs to actually consume the calibrated probability for downstream behavior to change. If the production decision is 'reject if score greater than 0.85' and you swap in a calibrator, the model's RAW scores are unchanged, and the rule fires on the same rows as before — calibration buys nothing operationally. To realize the benefit: (1) re-express the decision rule in PROBABILITY terms: 'reject if p_cal greater than threshold' or, better, 'reject if expected_loss = p_cal * loss_amount greater than $threshold'; (2) re-tune the threshold to the new probability scale (the old 0.85 raw-score cutoff and the new equivalent probability cutoff are different numbers). Without these changes, calibration is a no-op for the decisions made.", correct:true},
          {key:"c", text:"Calibration is broken."},
          {key:"d", text:"Use isotonic."},
        ]}
        trap={<>(a) dismisses; (c) wrong; (d) doesn't address the decision plumbing.</>}
        lens={<>Calibration only matters if the decision rule consumes the probability. Re-tune the threshold.</>}
        stretch={<>How to A/B calibrated vs raw probabilities safely?</>}
      />

      <VIS.TrapProblem
        id="cal-p12"
        difficulty="medium"
        title="P12 — At 1:1M imbalance, isotonic returns p_cal = 0 on most calibration scores. Why?"
        scenario={<><em>Discriminating insight: at extreme imbalance the calibration set has very few positives. Isotonic's step function gets a step value equal to the empirical rate per pool, and many pools have zero positives, so the step value is exactly 0. p_cal = 0 is technically correct but unusable for downstream policies that take logs.</em><br/><br/>Underflow story.</>}
        options={[
          {key:"a", text:"Bug in isotonic."},
          {key:"b", text:"Mathematically correct, operationally a problem. At 1:1M imbalance with a 10K calibration set, you have ~0.01 positives — typically 0 or 1. Isotonic's PAV pools adjacent scores until the pool's empirical rate is monotone; pools with zero positives get step value 0 exactly. Downstream policies that take log(p) or compute log-odds blow up at log(0). Fixes: (1) add Laplace smoothing to the per-pool empirical rate: p_pool = (N_+ + 1) / (N + 2); (2) clip output to a small epsilon (e.g., 1e-6) before downstream consumption; (3) increase the calibration set or pool fewer bins (sklearn's IsotonicRegression has out_of_bounds and y_min parameters for this); (4) for extreme imbalance, prefer Platt — its sigmoid output is naturally bounded away from 0/1.", correct:true},
          {key:"c", text:"Isotonic is wrong for fraud."},
          {key:"d", text:"Always clip to 0.5."},
        ]}
        trap={<>(a) misses the math; (c) too strong; (d) destroys the calibration.</>}
        lens={<>Extreme imbalance plus isotonic = zero-prob pools. Smooth or clip or use Platt.</>}
        stretch={<>What about the other tail (p_cal = 1)?</>}
      />

        scenario={<><em>Discriminating insight: when the model is over-confident (typical after focal/class-weighting), the calibrator REDUCES probabilities for high scores. 0.74 score mapped to 0.32 probability means the empirical positive rate at score=0.74 on the held-out set was 0.32. No paradox; just a remap.</em><br/><br/>Direction of remap.</>}
        options={[
          {key:"a", text:"Bug — p must equal s."},
          {key:"b", text:"No paradox. The model's RAW score 0.74 is the model's own (possibly poorly-calibrated) belief about fraud probability; the calibrated p_cal = 0.32 is the EMPIRICAL positive rate among held-out rows that received score 0.74. After class-weighted training, focal loss, or SMOTE, the model is typically over-confident on positives — it pushes scores high. The calibrator pulls them back to match observed reality. Direction: if the model is over-confident at high scores, p_cal less than s for high s; if under-confident at low scores, p_cal greater than s for low s. The remap is what calibration is for. To validate: reliability diagram on held-out should now sit on the diagonal.", correct:true},

      <VIS.TrapProblem
        id="cal-p14"
        difficulty="hard"
        title="P14 — Calibrator stale and probabilities now over-confident again. Concept-specific diagnostic."
        scenario={<><em>Discriminating insight (concept-specific): the model's score-to-probability MAP drifted because the score distribution shifted. Run a fresh reliability diagram on recent data. If the curve has drifted away from the diagonal, refit the calibrator on a fresh holdout. The diagnostic is the reliability diagram on RECENT labels.</em><br/><br/>Stale-calibrator diagnostic.</>}
        options={[
          {key:"a", text:"Random."},
          {key:"b", text:"Concept-specific diagnostic: re-plot the reliability diagram on a recent labeled holdout. Bucket calibrated probabilities into 10-20 bins, plot mean predicted prob vs empirical positive rate per bin. If the curve sits on the diagonal, calibration is healthy. If it drifts above (model under-confident overall) or below (over-confident), the score-to-probability map has shifted. Common cause: the model was retrained on new data but the calibrator wasn't refit, so the new score distribution doesn't match the calibrator's reference. Fix: refit the calibrator on a fresh holdout from the new training window. Add an automated check in CI that re-plots the reliability diagram weekly and alerts if ECE crosses a threshold. This is calibration-specific (CTGAN/SimFraud regressions look completely different).", correct:true},
          {key:"c", text:"Use focal loss."},
          {key:"d", text:"Retrain the model."},

      <VIS.TrapProblem
        id="cal-p15"
        difficulty="medium"
        title="P15 — Class-weighted training plus Platt: does Platt undo the class weighting?"
        scenario={<><em>Discriminating insight: no — Platt remaps the SCORES; it doesn't undo the model. Class weighting changes which features the model attends to, which improves ranking; Platt then maps the (improved) ranking to honest probabilities. Both layers operate on different surgical levers.</em><br/><br/>Are they redundant.</>}
        options={[
          {key:"a", text:"Yes, redundant."},
          {key:"b", text:"Not redundant — they operate on different surgical layers. Class weighting (or SMOTE / focal loss) changes the TRAINING objective so the model attends more to minority structure; this improves what the model LEARNS — better feature representations, better decision boundary, better ranking. The trained model emits scores that rank well but are systematically biased in VALUE. Platt then takes the (already-better-trained) scores and post-hoc remaps them to honest probabilities. Platt does not undo the model's improvements — it preserves ranking exactly (monotone) and only changes the score-to-probability map. Net effect of the stack: model that ranks well (from class weighting) plus probabilities that match reality (from Platt) — strictly better than either alone for decisions that consume probabilities.", correct:true},
          {key:"c", text:"They cancel out."},
          {key:"d", text:"Class weighting includes calibration."},

        trap={<>(a)(c)(d) collapse the layers.</>}

      />

      <VIS.TrapProblem
        id="cal-p16"
        difficulty="hard"
        title="P16 — Cross-validated isotonic: how to fit?"
        scenario={<><em>Discriminating insight: K-fold CV on training, collect out-of-fold predictions for every row, fit isotonic on (OOF_score, label). Then refit the final model on all training data and apply the SAME calibrator at inference. The calibrator never sees a model that trained on the row whose score it's calibrating.</em><br/><br/>CV calibrator recipe.</>}
        options={[
          {key:"a", text:"Fit isotonic on training predictions directly."},
          {key:"b", text:"K-fold cross-validated isotonic recipe: (1) split training into K folds. (2) For each fold k, train a model on the other K-1 folds, predict on fold k, save (score, label) pairs. (3) Concatenate all K folds of OOF predictions to get one set of (score, label) pairs that cover every training row, where each row's score comes from a model that never trained on that row. (4) Fit isotonic regression on this OOF set. (5) Refit the FINAL model on ALL training data. (6) At inference: final model emits a raw score; apply the isotonic calibrator from step 4. Why it works: the calibrator was fit on un-biased (OOF) predictions, so it correctly maps the model's score distribution at test time. This recovers the 15% data cost of a dedicated holdout at the cost of K training runs. Standard in sklearn's CalibratedClassifierCV.", correct:true},
          {key:"c", text:"Train K models and average."},
          {key:"d", text:"Random folds."},
        ]}
        trap={<>(a) over-confident predictions; (c) averaging is different (ensemble, not calibration).</>}
        lens={<>OOF predictions then fit calibrator. Refit final model on all training data, apply calibrator at inference.</>}
        stretch={<>What's the gotcha if folds aren't stratified by label?</>}
      />

      <VIS.TrapProblem
        id="cal-p17"
        difficulty="medium"
        title="P17 — Platt vs temperature scaling: which is which?"
        scenario={<><em>Discriminating insight: temperature scaling is Platt with B=0 (single scalar T on the logit: p = sigmoid(z / T)). One parameter, simplest possible calibration. Platt has 2 (A, B). Temperature is popular for neural-net classifiers because the logit is naturally available.</em><br/><br/>Map the relationship.</>}
        options={[
          {key:"a", text:"Completely unrelated."},
          {key:"b", text:"Temperature scaling is a 1-parameter restriction of Platt: instead of p = sigmoid(A * z + B), use p = sigmoid(z / T) where T is a single scalar fit by minimizing NLL on a held-out set. Temperature was popularized by Guo et al. 2017 for modern neural networks where the logit z is naturally available and the miscalibration is approximately a uniform scale of the logit (over-confident by the same factor at all scores). Platt's 2-parameter version is strictly more flexible — it can shift (B) as well as scale (A). Both are sigmoid-based and assume sigmoid-shaped miscalibration. For trees / GBDT where logits aren't natural, Platt on the score is more common; for nets, temperature is the standard first try. Both are out-fitted by isotonic on small-data S-shapes.", correct:true},
          {key:"c", text:"Same thing."},
          {key:"d", text:"Temperature is a 2-param Platt."},
        ]}
        trap={<>(a)(c)(d) misunderstand the parameter count.</>}
        lens={<>Temperature = 1-param Platt. Both are sigmoid-family. Net default = temperature; tree default = Platt or beta.</>}
        stretch={<>When is temperature too restrictive?</>}
      />

      <VIS.TrapProblem
        id="cal-p18"
        difficulty="hard"
        title="P18 — Calibration after SMOTE: are scores naturally calibrated?"
        scenario={<><em>Discriminating insight: NO. SMOTE changes the training-set class balance, so the model emits scores whose ranking is good but probability VALUES are biased toward the artificial rate. After SMOTE you MUST recalibrate on a held-out set with the ORIGINAL (un-resampled) class balance — otherwise probabilities reflect the SMOTE-inflated minority rate, not reality.</em><br/><br/>Post-SMOTE calibration discipline.</>}
        options={[
          {key:"a", text:"SMOTE already calibrates."},
          {key:"b", text:"Strongly miscalibrated after SMOTE; recalibration is essential. SMOTE alters the training-set class balance — e.g., from 1:1000 to 1:1 — so the model is trained on a distribution where p(y=1) is artificially inflated. Scores reflect this inflated rate: a 0.5 score from the SMOTE-trained model corresponds to roughly 1:1 fraud odds in TRAINING, but real-world odds are still 1:1000. Calibration discipline: (1) hold out a calibration set with the ORIGINAL natural class balance (NOT SMOTE-resampled); (2) collect (score, label) pairs from the SMOTE-trained model on this holdout; (3) fit Platt or isotonic on these pairs. The fitted calibrator now maps SMOTE-distorted scores back to real-world probabilities. Without this step, downstream policies that consume probabilities (expected-loss, pricing) will over-react to inflated probabilities and approve too few transactions.", correct:true},
          {key:"c", text:"Skip calibration after SMOTE."},
          {key:"d", text:"Use raw scores."},
        ]}
        trap={<>(a)(c)(d) ship inflated probabilities.</>}
        lens={<>Post-SMOTE: calibrate on a holdout with ORIGINAL class balance. Mandatory.</>}
        stretch={<>What's the equivalent discipline after focal loss?</>}
      />

      <VIS.TrapProblem
        id="cal-p19"
        difficulty="hard"
        title="P19 — Calibration helps Brier but not expected $ savings. Diagnose."
        scenario={<><em>Discriminating insight: expected $ savings depends on (probability * $ value) summed over decisions. If the high-$ cases are at extreme score values (top/bottom of score distribution) where the calibrator has few samples, calibration's improvement is concentrated in the middle of the distribution and may not move $ savings. Inspect calibration quality per score percentile.</em><br/><br/>Brier up, $ flat.</>}
        options={[
          {key:"a", text:"Brier is wrong."},
          {key:"b", text:"Brier improvement may be concentrated in mid-distribution bins where most data lives; expected $ savings is dominated by the FEW high-$ cases at score extremes. Concretely: Brier is averaged over ALL rows, so a calibrator that fixes mid-distribution probabilities well lowers Brier substantially even if the top 1% of scores are not better-calibrated. Expected $ savings is dominated by high-$ cases (a $5K fraud accepted = much worse than a $20 fraud accepted); if those cases sit at the top or bottom of the score distribution where the calibrator had few training samples (because positives at scores greater than 0.99 are rare), calibration in those regions is noisy. Diagnostic: compute per-score-percentile calibration error AND per-score-percentile $ value at risk. Fix: collect more calibration data at score extremes (oversample the tails) OR use a $-weighted calibration loss instead of plain NLL.", correct:true},
          {key:"c", text:"$ savings is wrong."},
          {key:"d", text:"Use threshold moving."},
        ]}
        trap={<>(a)(c) dismiss valid metrics; (d) different layer.</>}
        lens={<>Brier averages; $ savings concentrates on extremes. Per-percentile calibration error.</>}
        stretch={<>Design a $-weighted Platt fit.</>}
      />

      <VIS.TrapProblem
        id="cal-p20"
        difficulty="medium"
        title="P20 — When NOT to use Platt or isotonic."
        scenario={<><em>Discriminating insight (concept-specific): (1) you need finite-sample coverage guarantee (use conformal instead); (2) S-shape miscalibration on a small calibration set (use beta calibration); (3) downstream consumes ranking only (skip); (4) model is already well-calibrated (skip).</em><br/><br/>Skip-isotonic/Platt cases.</>}
        options={[
          {key:"a", text:"Always use Platt or isotonic."},
          {key:"b", text:"Skip Platt and isotonic when: (1) you need a coverage GUARANTEE (Type I error bounded) — use conformal prediction, which gives finite-sample coverage (1 - alpha) under exchangeability; Platt/isotonic only optimize a calibration loss, no guarantee. (2) S-shape miscalibration and the calibration set is too small for isotonic — use beta calibration instead (3 params, designed for boosting outputs). (3) Downstream decision consumes ranking only (top-K review queue) — calibration is operationally a no-op. (4) The model is already well-calibrated out-of-the-box (a logistic regression with no class weighting, an XGBoost with reg:logistic and natural class balance) — fit Platt anyway and check if it does anything; often it doesn't. (5) The miscalibration shape is non-monotone (rare but possible with adversarial data) — no monotone calibrator works; investigate the data.", correct:true},
          {key:"c", text:"Never use them."},
          {key:"d", text:"Always use them."},
        ]}
        trap={<>(a)(c)(d) absolutist.</>}
        lens={<>Use Platt or isotonic when miscalibration is monotone and the decision uses probabilities. Otherwise pick a different tool.</>}
        stretch={<>How to detect non-monotone miscalibration?</>}
      />

      <VIS.TrapProblem
        id="cal-p21"
        difficulty="hard"
        title="P21 — 'Calibration is a free win — always apply it.' Critique."
        scenario={<><em>Discriminating insight: not free. Costs: a held-out calibration set you could have trained on; risk of calibrator overfit (especially isotonic on small N); operational complexity (new artifact to retrain and version); risk that downstream policy isn't probability-aware (no benefit captured). Free-win is wrong; cost-benefit is the right framing.</em><br/><br/>Critique the claim.</>}
        options={[
          {key:"a", text:"Critique is wrong — it IS free."},
          {key:"b", text:"Not free. Concrete costs: (1) data cost — a dedicated 10-15% holdout for calibration is data you could have used to train, modestly hurting model quality (mitigable with cross-validated OOF fitting). (2) Overfit risk — isotonic on a too-small calibration set learns step-function noise that generalizes worse than the raw scores; Platt on a non-sigmoid shape under-fits. (3) Operational complexity — a new artifact in the inference path that must be versioned, monitored for drift, retrained on the model's cadence, and rolled back if it regresses. (4) No benefit if downstream consumes ranking only — top-K review queues don't care about probability values, so calibration is a no-op. The right framing: calibration is justified WHEN downstream decisions consume probability values (pricing, expected-loss, regulator reporting) AND you have enough holdout to fit a non-overfitting calibrator AND the miscalibration is large enough to matter.", correct:true},
          {key:"c", text:"It IS always a free win."},
          {key:"d", text:"Calibration is harmful."},
        ]}
        trap={<>(a)(c) miss costs; (d) too strong.</>}
        lens={<>Costs: data, overfit risk, ops complexity, possibly no benefit. Free-win framing is wrong.</>}
        stretch={<>What's the operational shape of a 'calibration regressed in production' incident?</>}
      />

      <VIS.TrapProblem
        id="cal-p22"
        difficulty="hard"
        title="P22 — In one sentence, what is THE unique mechanism of isotonic + Platt?"
        scenario={<><em>Discriminating insight: POST-HOC, MONOTONIC remapping of model scores to probabilities, fit on a held-out (score, label) set. Strip "monotonic remapping" and you have conformal (prediction sets, not probabilities) or threshold moving (probabilities untouched).</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"They re-train the model."},
          {key:"b", text:"POST-HOC, MONOTONIC NON-DECREASING REMAPPING of model scores to probabilities, fit on a held-out (score, label) set the model never trained on. Platt: 2-parameter sigmoid f(s) = sigmoid(A s + B). Isotonic: non-parametric monotone step function f via pool-adjacent-violators. Both preserve ranking exactly (AUC unchanged) and only change the probability VALUE — what pricing, expected-loss policies, and Brier-driven decisions consume. This distinguishes them from beta calibration (a 3-parameter beta family — also monotone remapping but more flexible curve shape than Platt), from conformal prediction (distribution-free prediction sets with finite-sample coverage — a different output type), and from threshold moving (probabilities untouched; decision cutoff moves).", correct:true},
          {key:"c", text:"They change AUC."},
          {key:"d", text:"They move the threshold."},
        ]}
        trap={<>(a) wrong (post-hoc); (c) wrong (monotone preserves AUC); (d) describes threshold moving.</>}
        lens={<>The anchor: post-hoc monotonic remapping of scores to probabilities. Ranking preserved.</>}
        stretch={<>Why is monotonicity the structural constraint that defines this method family?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://www.cs.cornell.edu/~caruana/niculescu.scldbst.crc.rev4.pdf" target="_blank" rel="noopener"><strong>Niculescu-Mizil & Caruana — Predicting Good Probabilities With Supervised Learning</strong></a> <span style={{color:"#64748b", fontSize:14}}>(ICML 2005, paper)</span><br/>The canonical Platt-vs-isotonic empirical study across model families. Sections 3-4 are the load-bearing reads.</li>
        <li><a href="https://scikit-learn.org/stable/modules/calibration.html" target="_blank" rel="noopener"><strong>scikit-learn — Probability calibration user guide</strong></a> <span style={{color:"#64748b", fontSize:14}}>(library docs)</span><br/>The clearest practitioner walkthrough: CalibratedClassifierCV, reliability diagrams, when to pick Platt vs isotonic. Start here.</li>
        <li><a href="https://arxiv.org/abs/1706.04599" target="_blank" rel="noopener"><strong>Guo et al. — On Calibration of Modern Neural Networks (ICML 2017)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The paper that popularized temperature scaling. Section 4 derives why nets are over-confident and why a single-parameter remap helps.</li>
        <li><a href="https://machinelearningmastery.com/calibrated-classification-model-in-scikit-learn/" target="_blank" rel="noopener"><strong>Jason Brownlee — How to Calibrate a Classifier (blog)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>A worked example with sklearn on imbalanced data. Walks through the reliability diagram interpretation.</li>
        <li><a href="https://www.fharrell.com/post/calibration/" target="_blank" rel="noopener"><strong>Frank Harrell — Statistically Efficient Ways to Quantify Added Predictive Value (blog)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>The statistician's perspective on calibration, ECE, and why Brier score is the right metric for probability-consuming decisions.</li>
      </ul>
    </VIS.Section>
  </main>
);
