<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// UEBA via GNN — graph neural network over user-entity access graph for lateral-movement and exfil detection.
// Microsoft Sentinel + KDD 2024 pattern.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Insider threat"
      title="UEBA via GNN (user-entity behavior analytics)"
      subtitle="A graph neural network over the user / file / system / service access graph flags lateral movement and exfiltration patterns that per-user anomaly detection misses."
      byline={[
        {label: "Source", value: "Microsoft Sentinel docs + KDD 2024 'UEBA at Scale'"},
        {label: "Year", value: "2024"},
        {label: "L3", value: "Insider threat / SOC operations"},
      ]}/>

    <VIS.TLDR>
      Per-user anomaly detection misses the cross-entity patterns that real attacks leave: lateral movement across systems, exfiltration paths that touch unusual file-server / share / cloud combinations, service-account abuse. A{" "}
      <VIS.Term def="A neural network that operates on graph-structured data. Each node aggregates information from its neighbours through message passing; the final node embedding captures the node's role in the larger graph structure.">graph neural network</VIS.Term>{" "}
      over the user-entity access graph learns role-typical neighborhood structure and flags edges (accesses) or subgraphs (sessions) that deviate. Senior issues: graph scale (billions of edges/day), inductive vs transductive learning, and explainability for SOC review.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Build a heterogeneous graph: nodes are users, files, hosts, services, IP addresses; edges are access events with timestamps and access types. Train a GNN (typically{" "}
        <VIS.Term def="Graph Attention Network — a GNN variant where each node weights its neighbours via learned attention coefficients rather than uniform averaging. Standard for heterogeneous graphs.">GAT</VIS.Term>{" "}
        or{" "}
        <VIS.Term def="GraphSAGE — an inductive GNN that learns aggregator functions over node neighborhoods, allowing the model to embed nodes it never saw during training. Standard for production graphs that grow.">GraphSAGE</VIS.Term>) to predict normal access patterns. At inference, score new edges against the predicted distribution; flag low-likelihood edges and the subgraphs containing them.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  EVENTS["Access events"]
  GRAPH["User-entity graph"]
  GNN["GNN encoder"]
  EDGE["Edge anomaly score"]
  SUB["Subgraph alert"]
  EVENTS --> GRAPH
  GRAPH --> GNN
  GNN --> EDGE
  EDGE --> SUB
  style GNN fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style SUB fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the GNN encoder. Yellow = the SOC-facing alert object: a subgraph with one or more low-likelihood edges, enriched with neighborhood evidence. The GNN's value is treating the data as a graph instead of as independent per-user sequences.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Per-user anomaly</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Heuristic graph rules</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>GNN-based UEBA</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Captures cross-entity patterns</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Partially</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Detects lateral movement</td>
            <td style={{padding:"8px 10px"}}>Weak</td>
            <td style={{padding:"8px 10px"}}>Yes (specific patterns)</td>
            <td style={{padding:"8px 10px"}}>Yes (learned)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Adapts to novel attack shapes</td>
            <td style={{padding:"8px 10px"}}>Limited</td>
            <td style={{padding:"8px 10px"}}>No (fixed rules)</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Engineering scale</td>
            <td style={{padding:"8px 10px"}}>Manageable</td>
            <td style={{padding:"8px 10px"}}>Manageable</td>
            <td style={{padding:"8px 10px"}}>Hard (billions of edges/day)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>SOC explainability</td>
            <td style={{padding:"8px 10px"}}>Easy</td>
            <td style={{padding:"8px 10px"}}>Trivial (rule name)</td>
            <td style={{padding:"8px 10px"}}>Hard — needs GNN explainer</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>You operate a SOC at enterprise scale</strong> — billions of access events / day, 10k-100k users.</li>
        <li><strong>Lateral movement is in your threat model</strong> — APT, ransomware operators, supply-chain attacks.</li>
        <li><strong>Heuristic rules are saturating</strong> — you keep adding patterns and the FN rate stays high.</li>
        <li><strong>You can engineer the graph</strong> — streaming edge ingestion, near-real-time updates, inductive training so new nodes are handled.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Transductive GNNs break on new nodes">
        Vanilla GCN trains node embeddings for the specific graph seen at training time. New employees, new files, new services don't get embeddings without retraining. Production UEBA needs inductive methods (GraphSAGE, GAT with feature-based init) that generalize to unseen nodes.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Graph scale at enterprise is brutal">
        Hyperscale orgs have billions of access edges per day across hundreds of millions of nodes. Full-graph batch GNNs are infeasible. Production approaches: neighbor sampling, mini-batch training, streaming inference with cached embeddings updated on a heartbeat.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Explainability is non-trivial">
        SOC analysts cannot review a low-likelihood edge score on its own. They need: which neighbors made this edge surprising, which historical pattern was violated, what a comparable benign edge would look like. GNNExplainer / PGExplainer-style post-hoc explanations are part of the stack, not optional.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade traps on graph design, lateral movement signatures, scale, explainability, and adversarial drift.
      </p>

      <VIS.TrapProblem
        id="ueg-p1"
        difficulty="hard"
        title="P1 — Walk me through a lateral-movement attack and the graph signature that flags it"
        scenario={<>An APT operator compromises a marketing employee's laptop via phishing. From there they pivot to a developer workstation (stolen SSH key), then to a build server, then to the cloud admin console, then to the customer-data S3 bucket. Total chain: 5 hops over 36 hours. What graph signature flags this, and why does per-user anomaly miss it?</>}
        options={[
          {key:"a", text:"The signature is a low-likelihood PATH in the access graph that crosses role boundaries (marketing -> developer -> build -> cloud admin -> customer data). No single edge is necessarily highly anomalous on its own (each hop uses a stolen credential that has some prior usage history). The PATH is the signal: the joint probability of that sequence of edges under the normal-role-mixing distribution is near zero. Per-user anomaly misses it because each user's individual edges look only slightly off; the lateral cross-role chain is invisible without graph context.", correct:true},
          {key:"b", text:"Per-user anomaly would catch this; the marketing employee accessing a build server is anomalous."},
          {key:"c", text:"The signature is a high-volume edge from one user."},
          {key:"d", text:"Only EDR endpoint detection catches this; UEBA cannot."},
        ]}
        trap={<>(b) is partially right — the first hop IS anomalous — but the attacker's first move on a stolen marketing laptop is to harvest credentials, then operate as the next user. Per-user anomaly never sees the marketing user touching the build server; it sees the developer doing it. (c) is the volume heuristic that catches only the dumbest attackers. (d) underestimates UEBA.</>}
        lens={<>(a). Path-level anomaly across role boundaries is the GNN value-add. Each hop reuses credentials of users with legitimate access; only the joint cross-role sequence reveals the operator. Graph embedding distance between source and destination nodes (or path likelihood under the learned access distribution) is the formal signal.</>}
        stretch={<>If the operator paces the attack over 30 days instead of 36 hours, does the signature still hold?</>}
      />

      <VIS.TrapProblem
        id="ueg-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Scale: billions of edges per day"
        scenario={<>A hyperscale customer has 100k employees, 50M files, 200k services, generating about 5 billion access edges per day. Full-graph GNN training is infeasible. Which engineering patterns make this tractable?</>}
        options={[
          {key:"a", text:"Use an inductive GNN (GraphSAGE / GAT) with neighbor sampling — sample fixed-size neighborhoods per node during training rather than full-graph message passing.", correct:true},
          {key:"b", text:"Cache and incrementally update node embeddings on a heartbeat (every 5-15 minutes) rather than re-embedding the full graph on every query.", correct:true},
          {key:"c", text:"Decompose into role-specific subgraphs and train one GNN per role — each subgraph is tractable.", correct:true},
          {key:"d", text:"Just use a bigger cluster; GPU scale solves graph scale."},
          {key:"e", text:"Pre-aggregate edges to daily counts, losing per-event resolution."},
        ]}
        trap={<>(d) is the brute-force fallacy; full-graph batch training on billions of edges per day exceeds any reasonable compute budget. (e) loses the per-event order that lateral movement signatures depend on (P1).</>}
        lens={<>Three correct. <strong>(a)</strong> neighbor sampling is the canonical scalability primitive. <strong>(b)</strong> incremental embedding updates are how production UEBA stays near-real-time. <strong>(c)</strong> subgraph decomposition reduces cost while preserving the role-mixing signal that matters. All three appear in Microsoft Sentinel + the KDD 2024 paper.</>}
        stretch={<>What is the right heartbeat cadence for embedding refresh, given a 36-hour lateral attack and SOC latency target?</>}
      />

      <VIS.TrapProblem
        id="ueg-p3"
        difficulty="hard"
        title="P3 — A new contractor joins. They have no embedding."
        scenario={<>A contractor starts Monday. They have no historical edges in the graph; the GNN has never seen them. By Wednesday they have made 200 accesses, some routine, some borderline (a few accesses to sensitive-data shares). Your GNN flags some of them as low-likelihood. Are these alerts trustworthy?</>}
        options={[
          {key:"a", text:"Only if the GNN is inductive (e.g., GraphSAGE / GAT with feature-based init): the new node's embedding is computed from its role / department / hire-date features plus the embeddings of its first neighbours. The low-likelihood score is meaningful relative to others-with-similar-init. If the GNN is transductive (vanilla GCN), the new node has no embedding and the scores are not interpretable.", correct:true},
          {key:"b", text:"Yes — any GNN handles new nodes fine."},
          {key:"c", text:"No — wait 30 days for a stable embedding before scoring."},
          {key:"d", text:"Yes if you assign the contractor a generic 'contractor' embedding."},
        ]}
        trap={<>(b) ignores the transductive/inductive distinction — vanilla GCN literally cannot embed unseen nodes. (c) gives the attacker (or careless onboarder) a 30-day free pass. (d) loses all individuation; every contractor scored identically.</>}
        lens={<>(a). Inductive GNNs (GraphSAGE, GAT with feature-conditioned init) are the production standard precisely because new nodes constantly appear in enterprise graphs. Feature-based init (role, department, hire date, manager) gives the new node a meaningful starting embedding; neighbor aggregation refines it as edges accumulate.</>}
        stretch={<>What features beyond role / department most help the cold-start embedding?</>}
      />

      <VIS.TrapProblem
        id="ueg-p4"
        difficulty="hard"
        multiSelect
        title="P4 — SOC explainability for a low-likelihood edge"
        scenario={<>An analyst sees an alert: edge (alice@corp, /secrets/prod-db-credentials) flagged with score 0.92. Alice is a senior engineer; she has touched that file class before. Why is the score high, and what do you show the analyst?</>}
        options={[
          {key:"a", text:"Run a GNN explainer (GNNExplainer / PGExplainer) to identify which neighbors of Alice and which neighbors of the file made the edge surprising; surface the top-K influential neighbours.", correct:true},
          {key:"b", text:"Show comparable benign edges: 'other senior engineers accessing this file class look like X; Alice's neighborhood pattern looks like Y.'", correct:true},
          {key:"c", text:"Surface the time-of-day and access-source features alongside the structural anomaly (3am from a never-before-seen IP is part of the picture).", correct:true},
          {key:"d", text:"Just show the raw score 0.92 and let the analyst decide."},
          {key:"e", text:"Hide the model's reasoning to prevent attacker reverse-engineering."},
        ]}
        trap={<>(d) is the black-box failure mode that gets UEBA programs distrusted by SOC. (e) protects nothing real (attackers don't see SOC tooling) and breaks the analyst's ability to act.</>}
        lens={<>Three correct. <strong>(a)</strong> GNN-explainer attribution. <strong>(b)</strong> comparable-benign reference points. <strong>(c)</strong> structural anomaly combined with time / source features. Senior pattern: alerts are stories, not numbers.</>}
        stretch={<>How do you measure whether the explanations are actually useful to SOC analysts?</>}
      />

      <VIS.TrapProblem
        id="ueg-p5"
        difficulty="hard"
        title="P5 — Service-account abuse"
        scenario={<>An attacker compromises a service account used by a CI/CD pipeline. Service accounts often have broad access by design. The attacker uses the account to pull data from systems the service legitimately accesses. Per-user anomaly says everything is normal (the account is doing what service accounts do). How does the GNN catch it?</>}
        options={[
          {key:"a", text:"The GNN looks at the joint pattern of access across systems, not the access of any single edge. A service account that normally pulls config from system A and writes to system B doing both PLUS reading customer-PII from system C is an unusual neighborhood pattern even if each individual edge has been seen before. Additionally, the calling client (workstation / IP / TLS-fingerprint) appears as a node — a service account being invoked from an unusual client neighborhood is the discriminating signal.", correct:true},
          {key:"b", text:"Service-account abuse is undetectable by UEBA."},
          {key:"c", text:"Just block all service accounts after-hours."},
          {key:"d", text:"Reduce service-account permissions until the model fits."},
        ]}
        trap={<>(b) gives up. (c) breaks legitimate operations (deploys often run 24/7). (d) is the right long-term governance answer but doesn't address the detection question being asked.</>}
        lens={<>(a). The graph captures BOTH the service account's outgoing access pattern AND its incoming caller pattern. Both must match historical norms; a deviation in either is the signal. This is exactly the cross-entity pattern that per-user anomaly cannot see.</>}
        stretch={<>What additional node type (beyond user / file / host / service) would most strengthen service-account-abuse detection?</>}
      />

      <VIS.TrapProblem
        id="ueg-p6"
        difficulty="hard"
        multiSelect
        title="P6 — Edge features and temporal weighting"
        scenario={<>You're designing the edge representation. Raw events have user, target, access type, timestamp, byte volume, source IP, session ID. Which design choices matter?</>}
        options={[
          {key:"a", text:"Edge features include access type, time-of-day, byte volume bucket, source-IP class — not just node-pair existence.", correct:true},
          {key:"b", text:"Apply temporal decay (recent edges weight more) to keep the graph fresh as access patterns evolve.", correct:true},
          {key:"c", text:"Use session ID to group edges into session subgraphs scored jointly.", correct:true},
          {key:"d", text:"Drop edge features; the graph topology alone is sufficient."},
          {key:"e", text:"Treat every byte-volume value as a distinct feature bin to avoid information loss."},
        ]}
        trap={<>(d) discards half the signal (a 10MB pull vs a 10GB pull at the same edge tells very different stories). (e) explodes the feature space; bucketing is correct.</>}
        lens={<>Three correct. <strong>(a)</strong> edge features carry signal. <strong>(b)</strong> temporal decay handles drift without manual baseline resets. <strong>(c)</strong> session aggregation surfaces multi-edge attack patterns. Senior signal: the graph is heterogeneous AND temporal, not a static topology.</>}
        stretch={<>How do you choose the temporal-decay half-life given typical APT dwell times?</>}
      />

      <VIS.TrapProblem
        id="ueg-p7"
        difficulty="hard"
        title="P7 — Adversarial evasion: attacker pre-warms the graph"
        scenario={<>An attacker with patience first plays a long pre-warm: many small benign-looking accesses across role boundaries to teach the GNN that these mixed patterns are normal, then executes the real exfiltration. The GNN sees the final exfil edges as low-but-not-extremely-low likelihood. How does the architecture respond?</>}
        options={[
          {key:"a", text:"Resist baseline poisoning structurally: (i) train embeddings on a long-historical / multi-organization corpus that the attacker cannot influence; (ii) detect long-horizon drift in a node's own embedding (if Alice's role-mixing pattern is drifting toward attacker-style, that drift is itself the alert); (iii) overlay rule-based guardrails for high-impact accesses (customer-PII reads above a threshold) that bypass the learned model; (iv) require human review on subgraphs touching crown-jewel assets regardless of score.", correct:true},
          {key:"b", text:"Re-train more frequently to be more responsive."},
          {key:"c", text:"Increase model capacity."},
          {key:"d", text:"Accept that determined APT operators are unstoppable."},
        ]}
        trap={<>(b) makes the problem worse — faster training absorbs the attacker's pre-warm pattern faster. (c) doesn't address the baseline-poisoning structural failure.</>}
        lens={<>(a). Same pattern as autoencoder baseline poisoning (sister visual): clean training windows, drift-of-drift detectors, guardrail rules over crown-jewel assets, human-in-the-loop on high-impact subgraphs. UEBA-GNN is one layer in a defense-in-depth stack precisely so adversarial pre-warming doesn't defeat detection.</>}
        stretch={<>What is the right test to verify the pre-warm-resistance of a deployed model?</>}
      />

      <VIS.TrapProblem
        id="ueg-p8"
        difficulty="medium"
        title="P8 — GNN architecture choice"
        scenario={<>You are picking the GNN architecture. Graph is heterogeneous (users, files, hosts, services), temporal, and large. What do you start with?</>}
        options={[
          {key:"a", text:"Heterogeneous GraphSAGE or R-GAT (relation-aware GAT): inductive, scales with neighbor sampling, handles edge-type heterogeneity via type-specific aggregation. Add temporal embedding to handle recency. Move to TGN / TGAT (temporal GNNs) only if first-version saturates.", correct:true},
          {key:"b", text:"Vanilla GCN with one-hot node features."},
          {key:"c", text:"Full-graph Transformer over all nodes."},
          {key:"d", text:"Pure Node2Vec with no neighbor aggregation."},
        ]}
        trap={<>(b) is transductive and ignores edge types; breaks on new nodes and loses heterogeneity. (c) is infeasible at billion-edge scale. (d) is an embedding-only method that doesn't capture path-conditional anomalies.</>}
        lens={<>(a). Heterogeneous GraphSAGE / R-GAT is the production-default starting point. Inductive + heterogeneity-aware + scalable via neighbor sampling. Temporal GNN escalation only when first-version hits a quality ceiling on temporal patterns.</>}
        stretch={<>What single metric tells you you've hit the temporal-GNN escalation threshold?</>}
      />

      <VIS.TrapProblem
        id="ueg-p9"
        difficulty="medium"
        multiSelect
        title="P9 — Combining UEBA-GNN with autoencoder + rules"
        scenario={<>You already have a per-employee autoencoder and a rules engine. Where does UEBA-GNN fit, and how do you combine the three?</>}
        options={[
          {key:"a", text:"GNN catches cross-entity patterns that the per-user autoencoder cannot — lateral movement, service-account abuse, exfil paths.", correct:true},
          {key:"b", text:"Rules engine retains absolute-volume / crown-jewel guardrails that don't need ML.", correct:true},
          {key:"c", text:"Combine all three scores via a meta-classifier (LR / GBDT) trained on labeled SOC outcomes; surface the highest joint-risk alerts.", correct:true},
          {key:"d", text:"Replace the per-employee autoencoder with the GNN."},
          {key:"e", text:"Run the GNN only on alerts the rules engine fires."},
        ]}
        trap={<>(d) loses per-user temporal signal. (e) gates the GNN behind rules and misses patterns the rules engine cannot articulate.</>}
        lens={<>Three correct. <strong>(a)</strong> GNN is the cross-entity layer. <strong>(b)</strong> rules are the guardrail layer. <strong>(c)</strong> meta-classifier on labeled SOC outcomes is how production systems combine the three. Each layer catches what the others miss.</>}
        stretch={<>What labels does the meta-classifier train on, given how rare true positives are?</>}
      />

      <VIS.TrapProblem
        id="ueg-p10"
        difficulty="hard"
        title="P10 — End-to-end SOC UEBA architecture"
        scenario={<>You are building UEBA for a hyperscale SOC: 100k users, 5B edges/day, mix of regulated / non-regulated workloads. Pick the architecture.</>}
        options={[
          {key:"a", text:"Heterogeneous inductive GNN (R-GAT / GraphSAGE) with neighbor sampling and incremental embedding refresh on a 5-15 minute heartbeat. Subgraph decomposition for tractable training. Temporal decay on edge weights. Session-grouped scoring for multi-edge attacks. Service-account caller-pattern modeling. Rules-engine guardrails on crown-jewel assets bypass the model. Per-user autoencoder (sister system) as a complementary signal. GNN-explainer (GNNExplainer / PGExplainer) surfaces influential neighbours per alert. Comparable-benign reference points for SOC review. Meta-classifier blends GNN + autoencoder + rules into a unified alert score. Clean-window training to resist pre-warm poisoning. Drift-of-drift detectors on node embeddings. Continuous red-team injection + historical-incident replay for eval.", correct:true},
          {key:"b", text:"Vanilla GCN on the full graph; refresh nightly."},
          {key:"c", text:"Rules engine only; ML adds noise."},
          {key:"d", text:"GNN only; replace per-user and rule systems."},
        ]}
        trap={<>(b) is non-inductive (breaks on new nodes) and infeasible at full-graph scale. (c) caps detection at the rules you've thought to write. (d) loses the complementary signals each layer captures.</>}
        lens={<>(a). The complete senior architecture: inductive heterogeneous GNN, sub-graph + sampling scale strategy, temporal decay, session scoring, service-account modeling, rules + autoencoder companion layers, explainer-driven alerts, clean-window training, drift detection, continuous eval. Each component addresses a failure mode the prior problems exposed.</>}
        stretch={<>Which single component's removal would degrade the system most?</>}
      />
    </VIS.Section>
