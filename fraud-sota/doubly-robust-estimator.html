<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Doubly robust estimator — combines outcome model + propensity score with orthogonalization;
// consistent if EITHER model is correct. Workhorse for off-policy evaluation of fraud rules.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Causal inference"
      title="Doubly robust estimator (DR / DML)"
      subtitle="Combines an outcome model with a propensity-score model and adds an orthogonalization correction — robust if EITHER component is correct."
      byline={[
        {label: "Source", value: "Chernozhukov et al. — Double Machine Learning (Econometrica 2018); NeurIPS 2024 — DML for Fraud Policy Evaluation"},
        {label: "Year", value: "2018 / 2024"},
        {label: "L2", value: "Causal inference for fraud / risk"},
      ]}/>

    <VIS.TLDR>
      Two single-model causal estimators dominate in practice:{" "}
      <VIS.Term def="Outcome regression — fit a model that predicts the outcome given features and treatment, then differences predictions across treatment values to estimate the causal effect.">outcome regression</VIS.Term>{" "}
      is unbiased if the outcome model is correct but biased if it is wrong;{" "}
      <VIS.Term def="Inverse Probability Weighting — reweight each observation by 1 over its probability of receiving the assigned treatment, so the weighted sample resembles a randomized experiment.">IPW</VIS.Term>{" "}
      is unbiased if the propensity model is correct but high-variance when propensities are near 0 or 1.{" "}
      <VIS.Term def="A causal estimator that combines an outcome model and a propensity model with an orthogonalization correction term, yielding consistent estimates if EITHER component is correctly specified.">Doubly robust</VIS.Term>{" "}
      (DR), and its modern descendant{" "}
      <VIS.Term def="Double Machine Learning — DR estimation with sample-splitting (cross-fitting) so nuisance models do not see their own training data, plus orthogonalization that makes the final estimate insensitive to first-order errors in either nuisance.">Double Machine Learning (DML)</VIS.Term>, give you both: consistent estimates if EITHER component is right, and dramatically lower variance than IPW alone. Standard tool for off-policy evaluation of a proposed fraud-rule change.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>Three estimators, increasing in robustness:</p>
      <ul>
        <li><strong>Outcome regression</strong> — fit <code>mu_t(x)</code>, the expected outcome conditional on features and treatment. Estimate ATE as the average of <code>mu_1(x) - mu_0(x)</code> across the population.</li>
        <li><strong>IPW</strong> — fit a propensity model <code>e(x)</code>. Reweight observations by <code>1/e(x)</code> for treated and <code>1/(1 - e(x))</code> for control. Compute weighted outcome difference.</li>
        <li><strong>Doubly robust</strong> — combine the two. The estimator subtracts the outcome model from the IPW-weighted residuals, so the bias of one model is corrected by the other:
        </li>
      </ul>

      <VIS.Equation display
        tex="\hat{\tau}_{DR} = \frac{1}{n}\sum_i \Bigg[ \underbrace{\big(\hat{\mu}_1(x_i) - \hat{\mu}_0(x_i)\big)}_{\text{outcome model}} \;+\; \underbrace{\frac{T_i (Y_i - \hat{\mu}_1(x_i))}{\hat{e}(x_i)} - \frac{(1-T_i)(Y_i - \hat{\mu}_0(x_i))}{1-\hat{e}(x_i)}}_{\text{IPW-weighted residual correction}} \Bigg]" />

      <VIS.Mermaid chart={`
flowchart TB
  D["Observed data: x, T, Y"]
  D --> M["Outcome model mu_t of x"]
  D --> E["Propensity model e of x"]
  M --> C["Combine via DR formula"]
  E --> C
  C --> A["ATE estimate"]
  style C fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style A fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>Blue is the DR combination step. Yellow is the causal estimate that drives policy decisions.</p>

      <p style={{marginTop: 16}}><strong>Why doubly robust:</strong></p>
      <ul>
        <li>If <code>mu_t</code> is correct, the residuals <code>Y - mu_t(x)</code> are mean-zero and the correction term vanishes in expectation — outcome model carries it.</li>
        <li>If <code>e</code> is correct, the IPW-weighted residuals are unbiased for the missing counterfactuals — propensity carries it.</li>
        <li>You only need ONE to be right. Both being correct gives the lowest variance.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from baseline estimators">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Property</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Outcome regression</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>IPW</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Doubly robust / DML</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Consistent if outcome model wrong</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Consistent if propensity wrong</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Variance with near-0 propensity</td>
            <td style={{padding:"8px 10px"}}>Low</td>
            <td style={{padding:"8px 10px"}}>Explodes</td>
            <td style={{padding:"8px 10px"}}>Lower than IPW; clip propensities</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Requires sample splitting</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Yes (DML cross-fitting)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Compatible with ML nuisance models</td>
            <td style={{padding:"8px 10px"}}>Limited</td>
            <td style={{padding:"8px 10px"}}>Limited</td>
            <td style={{padding:"8px 10px"}}>Yes — main DML advantage</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Off-policy evaluation of a proposed fraud-rule change</strong> — you want to estimate "if we deploy rule B instead of rule A, what happens to fraud loss?" using data collected under A.</li>
        <li><strong>You can specify an outcome model AND a propensity model</strong> — both modest-quality is enough; DR gives you the safety net.</li>
        <li><strong>You want valid confidence intervals from ML nuisance models</strong> — DML's orthogonalization is the only principled way to use gradient-boosted trees or neural nets as nuisance estimators and still get asymptotic inference.</li>
        <li><strong>You have enough data to support sample splitting</strong> — DML needs at least a few thousand samples per fold.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Propensity clipping is mandatory in fraud">
        Many fraud-segment customers have propensities near 0 or 1 (no one was ever reviewed; everyone was). The IPW correction term blows up. Standard practice: clip propensities to 0.05 to 0.95 and report the fraction clipped — it is a measure of overlap.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Sample splitting is non-negotiable for DML">
        Without cross-fitting, the nuisance models see the data they will be evaluated on; DR loses its asymptotic-Normal guarantee. The Chernozhukov et al. paper is explicit on this — sample splitting is what makes ML nuisance models valid.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Analyst-unfriendly to debug">
        DR-DML is a multi-stage pipeline: nuisance models, sample splitting, orthogonalization, variance estimation. When something is off, it is hard to localize. Build it with a known-effect simulation harness so you can sanity-check before applying to real data.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Both models wrong, you are still wrong">
        Doubly robust does not mean "magic." If BOTH outcome and propensity models are misspecified, DR has no guarantees. You still need to think about whether each component is reasonable; DR just buys you a 1-of-2 safety net.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Trap problems on DR formula intuition, sample splitting, propensity overlap, and off-policy evaluation of fraud rule changes.
      </p>

      <VIS.TrapProblem
        id="dr-p1"
        difficulty="hard"
        title="P1 — Outcome regression alone — when does it fail?"
        scenario={<>You estimate the effect of a fraud-review rule change using outcome regression alone. The team trusts the outcome model. Why might this be wrong?</>}
        options={[
          {key:"a", text:"Outcome regression is unbiased ONLY if the outcome model is correctly specified across both treatment arms — which often fails in fraud where treated and untreated populations are very different. The treated arm may be tiny and skewed (operators picked the suspicious cases), so the outcome model extrapolates poorly outside its training support. DR adds an IPW-weighted correction that uses observed residuals to correct the misspecification.", correct:true},
          {key:"b", text:"Outcome regression is high-variance — DR fixes variance."},
          {key:"c", text:"Outcome regression cannot handle binary outcomes."},
          {key:"d", text:"Outcome regression is biased by definition."},
        ]}
        trap={<>(b) reverses the issue — variance is the IPW problem. (c) is false. (d) is over-general.</>}
        lens={<>(a) is the textbook DR motivation: outcome regression is bias-sensitive to misspecification; the correction term rescues it.</>}
        stretch={<>How would you detect outcome-model misspecification before computing DR?</>}
      />

      <VIS.TrapProblem
        id="dr-p2"
        difficulty="hard"
        title="P2 — Why does IPW alone explode in fraud settings?"
        scenario={<>You try IPW alone on a fraud-rule evaluation. ATE estimate is 0.03; 95 percent CI is wide. Why?</>}
        options={[
          {key:"a", text:"IPW reweights observations by 1 over propensity. In fraud, many segments have near-0 or near-1 propensities (no one was reviewed; everyone was). The weights then become huge, a handful of observations dominate the estimate, and variance explodes. DR's outcome-model component smooths over these regions and the correction-term residuals are bounded.", correct:true},
          {key:"b", text:"IPW has a bug in the formula."},
          {key:"c", text:"IPW is biased."},
          {key:"d", text:"IPW does not work for binary outcomes."},
        ]}
        trap={<>(b) (c) (d) are all wrong or off-topic.</>}
        lens={<>(a) is the IPW pathology. Extreme propensities drive variance; DR helps by reducing the dependence on IPW alone.</>}
        stretch={<>If propensity is at 0.01, what is the implicit weight on that observation?</>}
      />

      <VIS.TrapProblem
        id="dr-p3"
        difficulty="hard"
        multiSelect
        title="P3 — Cross-fitting (sample splitting) — pick the valid claims"
        scenario={<>You implement DML with K-fold cross-fitting. Which claims about it are TRUE? Select all that apply.</>}
        options={[
          {key:"a", text:"Nuisance models are trained on K-1 folds and used to predict on the held-out fold; the orthogonal moments are computed on the held-out fold and averaged.", correct:true},
          {key:"b", text:"Without cross-fitting, asymptotic normality of the DML estimator can break — even with the orthogonalization correction.", correct:true},
          {key:"c", text:"Cross-fitting is just for hyperparameter tuning of nuisance models."},
          {key:"d", text:"Increasing K from 2 to 10 generally reduces nuisance-model overfitting concerns at the cost of more compute.", correct:true},
          {key:"e", text:"Cross-fitting eliminates the need for propensity overlap."},
          {key:"f", text:"K=1 (no splitting) is fine if the nuisance models are well-regularized."},
        ]}
        trap={<>(c) confuses CF with HP tuning. (e) overlap is a separate condition unrelated to splitting. (f) is exactly what the Chernozhukov paper argues against.</>}
        lens={<>(a) (b) (d) are correct. CF is the mechanism that lets ML nuisance models be used in causal inference without losing inferential validity.</>}
        stretch={<>What is the smallest K that gives DML its asymptotic guarantees?</>}
      />

      <VIS.TrapProblem
        id="dr-p4"
        difficulty="hard"
        title="P4 — Off-policy evaluation of a new fraud rule — DR setup"
        scenario={<>Product wants to know: "if we deploy a stricter review rule that flags 30 percent more transactions, how does fraud loss change?" You only have data under the current rule. Walk through DR setup.</>}
        options={[
          {key:"a", text:"Define treatment as the new rule's flag status (synthetic, computed offline by replaying transactions through the proposed rule). Define outcome as fraud loss. Fit propensity e(x) modeling the probability of being flagged by the OLD rule (logged). Fit two outcome models mu_0 and mu_1 conditioned on the OLD-rule treatment. Compute DR ATE; report 95 percent CI via cross-fitted variance. Sanity check on a known-effect simulation slice. Roll out only after CI excludes negative impact.", correct:true},
          {key:"b", text:"Just A/B test the new rule for 2 weeks."},
          {key:"c", text:"Compute the fraud-rate difference between OLD-flagged and NOT-flagged customers."},
          {key:"d", text:"Use the new rule's predicted flag rate as the treatment effect."},
        ]}
        trap={<>(b) is the correct option if you have time and risk tolerance — but the question says OFF-policy evaluation (no A/B). (c) is naive subgroup analysis with severe confounding. (d) confuses rule rate with causal effect.</>}
        lens={<>(a) is the senior off-policy evaluation pipeline. DR plus cross-fitting plus simulation sanity check plus CI guardrail before rollout.</>}
        stretch={<>If the DR CI straddles zero, do you ship?</>}
      />

      <VIS.TrapProblem
        id="dr-p5"
        difficulty="hard"
        title="P5 — Propensity clipping at 0.05 / 0.95 — what does it cost?"
        scenario={<>You clip propensities to 0.05 to 0.95. 12 percent of observations have propensities outside this band. What is the cost?</>}
        options={[
          {key:"a", text:"Clipping introduces bias proportional to the fraction clipped and the magnitude of out-of-band weights. You are essentially estimating the ATE on the overlap region (the 88 percent inside the band), not the full population. Report this as the effective estimand and disclose the clipped fraction. If 12 percent is large enough to matter, segment-stratified analysis or a different design (RCT) may be needed.", correct:true},
          {key:"b", text:"Clipping is free — there is no cost."},
          {key:"c", text:"Clipping increases variance only."},
          {key:"d", text:"Clipping makes DR invalid."},
        ]}
        trap={<>(b) is wrong — clipping trades variance for bias. (c) only half-right. (d) is over-strong.</>}
        lens={<>(a) is the senior framing: clipping shifts your estimand from the full-population ATE to the overlap-region ATE. Disclose it.</>}
        stretch={<>At what clipped fraction does it stop making sense to report a full-population ATE?</>}
      />

      <VIS.TrapProblem
        id="dr-p6"
        difficulty="hard"
        multiSelect
        title="P6 — DR variance — what determines it?"
        scenario={<>Your DR estimate has a wide CI. Which factors are CONTRIBUTORS to the variance? Select all that apply.</>}
        options={[
          {key:"a", text:"Residual variance of the outcome model (signal-to-noise on Y given x and treatment).", correct:true},
          {key:"b", text:"How extreme propensities get — even after clipping, the IPW residual correction has larger weights in low-propensity regions.", correct:true},
          {key:"c", text:"Treatment-arm imbalance — a tiny treated arm contributes a noisier IPW residual.", correct:true},
          {key:"d", text:"Sample size — the variance scales as roughly 1 over n.", correct:true},
          {key:"e", text:"The exact gradient-boosting hyperparameters of the nuisance models — DR variance is invariant to these."},
          {key:"f", text:"Whether you use K=5 or K=10 folds matters at the orders-of-magnitude level."},
        ]}
        trap={<>(e) is wrong — nuisance model quality directly affects the residuals. (f) overstates the K dependence — it matters but not at the orders-of-magnitude level.</>}
        lens={<>(a) (b) (c) (d) are the four levers. To shrink CI, improve nuisance model fit, fix overlap, balance arms, collect more data.</>}
        stretch={<>If you had to pick ONE lever to shrink the CI fastest, which would it be?</>}
      />

      <VIS.TrapProblem
        id="dr-p7"
        difficulty="hard"
        title="P7 — Outcome model is correct, propensity model is wrong. What happens?"
        scenario={<>Simulation: you generate data where the outcome model is correctly specified but the propensity model is misspecified. You run DR. What is the expected behavior?</>}
        options={[
          {key:"a", text:"DR gives a consistent ATE estimate — this is half the point of double robustness. The correction term has expected value zero because outcome residuals are mean-zero by correct specification; the misspecified propensity scales the residuals but does not introduce bias as n grows. Variance may be larger than if both models were correct.", correct:true},
          {key:"b", text:"DR is biased because propensity is wrong."},
          {key:"c", text:"DR returns zero."},
          {key:"d", text:"DR is unaffected — variance and bias both stay the same."},
        ]}
        trap={<>(b) misses the "doubly" part. (c) (d) are wrong.</>}
        lens={<>(a) is the textbook DR property: consistent if EITHER nuisance is correct. The outcome model in this case rescues the estimator.</>}
        stretch={<>Now flip it: outcome wrong, propensity correct. What happens?</>}
      />

      <VIS.TrapProblem
        id="dr-p8"
        difficulty="hard"
        title="P8 — DR vs causal forests for heterogeneous effects"
        scenario={<>You want per-customer treatment effects, not just an ATE. A teammate says "use DR with subgroup analysis." Another says "use a causal forest." When does each win?</>}
        options={[
          {key:"a", text:"DR with subgroup analysis is fine when you have hypotheses about which segments matter and want valid CIs per segment. Causal forests (Wager and Athey) directly estimate the CATE function nonparametrically and are better when you do not know which segments matter or want a per-customer effect score for downstream policy. Both are valid; the choice is hypothesis-driven vs exploratory.", correct:true},
          {key:"b", text:"DR is for ATE only; never use it for heterogeneity."},
          {key:"c", text:"Causal forests are always better."},
          {key:"d", text:"Subgroup analysis is statistically invalid."},
        ]}
        trap={<>(b) (c) (d) all over-claim.</>}
        lens={<>(a) is the senior framing. The choice is about whether you have hypotheses or are exploring. Both are valid tools.</>}
        stretch={<>How would you combine DR-style sample splitting with a causal forest?</>}
      />

      <VIS.TrapProblem
        id="dr-p9"
        difficulty="hard"
        title="P9 — Why is the OUTCOME residual the term that disappears, not the IPW residual?"
        scenario={<>Look at the DR formula: outcome model plus IPW-weighted residual of outcome. Why is it the OUTCOME residual that gets reweighted by IPW, rather than the treatment-residual?</>}
        options={[
          {key:"a", text:"DR (specifically AIPW) is constructed so that the IPW-weighted outcome residual corrects the bias of the outcome model. If the outcome model is correct, the residuals are mean-zero, and the correction term vanishes in expectation. If propensity is correct, IPW unbiasedly recovers the counterfactual outcome. The orthogonalization structure (Neyman-orthogonal moments) requires the residuals of the outcome model, not the treatment.", correct:true},
          {key:"b", text:"The treatment residual would not have the right scale."},
          {key:"c", text:"It is an arbitrary choice — both work."},
          {key:"d", text:"This is a typo in the DR formula."},
        ]}
        trap={<>(b) is a partial answer. (c) and (d) are wrong.</>}
        lens={<>(a) is the deep answer. Neyman-orthogonality is the formal reason — the score function must be insensitive to first-order errors in nuisance models, and the outcome-residual structure achieves that.</>}
        stretch={<>What goes wrong if you swap which residual goes in the IPW term?</>}
      />

      <VIS.TrapProblem
        id="dr-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Production checklist for DR-DML in a fraud team"
        scenario={<>You ship DR-DML in production for off-policy fraud rule evaluation. Which of these are essential ingredients? Select all that apply.</>}
        options={[
          {key:"a", text:"K-fold cross-fitting with K at least 5.", correct:true},
          {key:"b", text:"Propensity clipping at 0.05 to 0.95 with the clipped fraction reported.", correct:true},
          {key:"c", text:"A simulation harness with known-effect data to validate the pipeline before each real-data run.", correct:true},
          {key:"d", text:"Overlap diagnostics (covariate balance, propensity histograms) reported alongside the ATE.", correct:true},
          {key:"e", text:"Skip nuisance model evaluation; trust the orthogonalization."},
          {key:"f", text:"Confidence interval reported for each estimate; CI excluding zero is the rollout gate.", correct:true},
          {key:"g", text:"Use the same training data for nuisance models and for the final DR moment computation."},
        ]}
        trap={<>(e) is reckless — bad nuisance models still produce wide CIs. (g) violates cross-fitting.</>}
        lens={<>(a) (b) (c) (d) (f) are the senior ingredients. Cross-fit, clip, simulate, diagnose overlap, gate by CI.</>}
        stretch={<>What single diagnostic would you put on a permanent dashboard for ongoing DR validity?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1608.00060" target="_blank" rel="noopener">
            <strong>Chernozhukov et al. — Double/Debiased Machine Learning for Treatment and Structural Parameters</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, Econometrica 2018)</span>
          <br/>The DML paper. Sections 3 and 4 give the cleanest formal motivation for cross-fitting and orthogonalization.
        </li>
        <li>
          <a href="https://matheusfacure.github.io/python-causality-handbook/landing-page.html" target="_blank" rel="noopener">
            <strong>Matheus Facure — Causal Inference for the Brave and True (Doubly Robust chapter)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(open-source book)</span>
          <br/>The most accessible practitioner introduction to DR. Code-first, with intuition on why double robustness rescues either nuisance.
        </li>
        <li>
          <a href="https://econml.azurewebsites.net/" target="_blank" rel="noopener">
            <strong>Microsoft EconML — Python library</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(library docs)</span>
          <br/>Production implementations of DRLearner, LinearDML, and CausalForestDML. The user guide is the best reference for picking among these in practice.
        </li>
        <li>
          <a href="https://www.markhw.com/blog/dr-explainer" target="_blank" rel="noopener">
            <strong>Mark White — Why Doubly Robust Estimation Is Magic (and isn't)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Honest practitioner take on what DR delivers and what it doesn't. Read this before you over-trust the doubly-robust label.
        </li>
        <li>
          <a href="https://www.alquraan.dev/causal-orth" target="_blank" rel="noopener">
            <strong>Neyman-orthogonality — visual primer</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Geometric intuition for why orthogonal scores make first-order nuisance errors vanish. Helpful if the algebra in the Chernozhukov paper feels opaque.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"

      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
