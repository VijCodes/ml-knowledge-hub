      <VIS.TrapProblem id="dr-p19" difficulty="hard" title="P19 — DR with a Bayesian outcome model: does it still work?"
        scenario={<><em>Discriminating insight: YES — DR double-robustness theorem does not care about how mu was estimated, only that it converges to truth. Bayesian posterior mean plugs in directly. Cross-fitting still required.</em><br/><br/>Bayes.</>}
        options={[
          {key:"a", text:"DR does not allow Bayes."},
          {key:"b", text:"Yes — DR is agnostic to the learner. The theorem requires mu and e to converge at some rate; it does not care whether they are fit by ML, GBM, or Bayesian posterior. For Bayesian: take the posterior mean of mu_T(x) and plug into the DR score. Cross-fitting still required so the posterior is not conditioned on the same data the score is evaluated on. Posterior uncertainty on mu does NOT replace the DR CI — the right SE is still sd(psi_i)/sqrt(n); if you want Bayesian uncertainty on V(pi), sample mu and e from their posteriors, compute V-hat for each draw, and report the posterior. Sometimes called Bayesian DR.", correct:true},
          {key:"c", text:"Bayes breaks DR."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the agnostic structure.</>}
        lens={<>DR is learner-agnostic. Posterior mean of mu plugs in directly.</>}
        stretch={<>Bayesian DR CI vs DR CI?</>}
      />

      <VIS.TrapProblem id="dr-p20" difficulty="hard" title="P20 — Concept-specific misattribution: DR estimate flips sign across folds. Cause?"
        scenario={<><em>Discriminating insight (concept-specific): (1) extreme propensity in some folds; (2) policy class crosses positivity boundary in some folds; (3) seasonality — need time-stratified folds; (4) sample size per fold too small. Concept-specific; not noise.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Training is noisy."},
          {key:"b", text:"Concept-specific causes for fold-to-fold sign flips. (1) Extreme propensity confined to a fold — one fold contains units with e close to 0; residual term blows up; fold psi dominated by a few units; sign flips by fold. Fix: trim e in [0.05, 0.95]. (2) Positivity boundary — pi takes an action never logged for some subset; if concentrated in some folds, those folds DR undefined; imputation introduces fold-dependent bias. (3) Seasonality — random folds split across weekly fraud cycles; nuisances misfit. Fix: time-stratified folds. (4) Insufficient fold size — at K=10 each fold has n/10; for fraud-rate 0.1%, fewer than 5 fraud cases per fold; degenerate. Fix: reduce K or increase n.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Use Platt."},
        ]}
        trap={<>(a)(c)(d) generic.</>}
        lens={<>Propensity tail / positivity / seasonality / fold-size. Each fold-level diagnostic.</>}
        stretch={<>Time-stratified folds vs random — when to default which?</>}
      />

      <VIS.TrapProblem id="dr-p21" difficulty="medium" title="P21 — AIPW vs DR-learner — same thing?"
        scenario={<><em>Discriminating insight: AIPW estimates a SCALAR (V(pi) or ATE). DR-learner uses the AIPW pseudo-outcome as the target of a SECOND-STAGE REGRESSION to learn the CATE FUNCTION tau(x). Same orthogonal score; different downstream object.</em><br/><br/>Distinguish.</>}
        options={[
          {key:"a", text:"Identical."},
          {key:"b", text:"Different downstream objects, same underlying score. AIPW (Robins, Rotnitzky, Zhao 1994): estimates a SCALAR — ATE or V(pi) — by averaging the orthogonal score. DR-learner (Kennedy 2020): uses the AIPW pseudo-outcome psi_i (which targets tau(x_i)) as the target of a SECOND-STAGE REGRESSION; learns the FUNCTION tau-hat(x). Both rely on the doubly-robust score; both need cross-fitting. AIPW → average treatment effect; DR-learner → heterogeneous treatment effect function. Production fraud: AIPW for off-policy evaluation of fixed rules; DR-learner for per-customer uplift functions.", correct:true},
          {key:"c", text:"Unrelated."},
          {key:"d", text:"Random."},
        ]}
        trap={<>(a)(c)(d) miss the scalar-vs-function distinction.</>}
        lens={<>AIPW: scalar V or ATE. DR-learner: tau(x) via second-stage regression.</>}
        stretch={<>How does DR-learner relate to X-learner?</>}
      />

      <VIS.TrapProblem id="dr-p22" difficulty="hard" title="P22 — Skeptic: 'DR has too many moving parts'. Refute."
        scenario={<><em>Discriminating insight: each part has a concrete reason; the alternatives (IPW, outcome-only) have fewer parts but worse guarantees. DR parts are the price of double-robustness + valid sqrt(n) inference.</em><br/><br/>Refute.</>}
        options={[
          {key:"a", text:"Skeptic is right."},
          {key:"b", text:"DR has more parts than IPW or outcome-only, but each exists for a concrete reason: (1) outcome model mu_T(x) — gives unbiasedness if e is wrong, reduces variance as control variate. (2) Propensity e(x, T) — gives unbiasedness if mu is wrong, allows residual correction. (3) Orthogonal score — gives the product-bias structure: total bias is mu-error TIMES e-error; vanishes if either small. (4) Cross-fitting — restores sqrt(n) asymptotic normality under flexible learners. Together: doubly-robust unbiasedness, valid CIs, low variance, works on logged data. The alternative (IPW) has fewer parts but variance explodes and is biased if propensity wrong; outcome-only has even fewer parts but is biased if model wrong. DR complexity is the price of robustness + valid inference. For regulated fraud-policy decisions, worth paying.", correct:true},
          {key:"c", text:"Skip DR."},
          {key:"d", text:"Always IPW."},
        ]}
        trap={<>(a)(c)(d) ignore the trade-off.</>}
        lens={<>Each DR part has a reason. Price of double-robustness + sqrt(n) inference.</>}
        stretch={<>Quantify SE reduction of DR vs IPW.</>}
      />

      <VIS.TrapProblem id="dr-p23" difficulty="hard" title="P23 — Asymmetric cost: false-block costs 50, false-pass costs 200. DR cost estimate?"
        scenario={<><em>Discriminating insight: replace Y with a COST function C(T, Y), then run DR on C. Same orthogonal score, same theorem. Policy minimizes E[C(pi(X), Y)].</em><br/><br/>Cost.</>}
        options={[
          {key:"a", text:"DR cannot do costs."},
          {key:"b", text:"DR is agnostic to the reward — it estimates E[f(X, T, Y)] for any function f. Define C(T, Y) = 50 * 1{T=block AND Y=legit} + 200 * 1{T=pass AND Y=fraud} otherwise 0. Run DR with C in place of Y: psi_i = mu_C_pi(x_i)(x_i) + (1{T_i = pi(x_i)} / e(x_i, T_i))(C_i - mu_C_T_i(x_i)). Estimates V_C(pi) = E[C(pi(X), Y(pi(X)))]. Optimal policy minimizes V_C under capacity / fairness constraints. Asymmetric costs propagate directly. This is how production teams operationalize dollar optimization without giving up DR robustness. Library: econml.policy.DRPolicyTree.", correct:true},
          {key:"c", text:"Random."},
          {key:"d", text:"Skip DR."},
        ]}
        trap={<>(a)(c)(d) miss the generality.</>}
        lens={<>Replace Y with C(T,Y); rerun DR; minimize V_C(pi).</>}
        stretch={<>Add a fairness constraint via Lagrangian dual.</>}
      />

      <VIS.TrapProblem id="dr-p24" difficulty="hard" title="P24 — In one sentence, what is THE unique mechanism of DR?"
        scenario={<><em>Discriminating insight: ORTHOGONAL SCORE COMBINING OUTCOME MODEL mu AND PROPENSITY MODEL e, UNBIASED IF EITHER nuisance is correctly specified (BIAS FACTORS AS PRODUCT). With cross-fitting, gives sqrt(n) asymptotically normal estimates of policy value from logged data. Strip &quot;two nuisances&quot; or &quot;either correct&quot; and answer collapses.</em><br/><br/>State the anchor.</>}
        options={[
          {key:"a", text:"It is IPW with smoothing."},
          {key:"b", text:"COMBINE OUTCOME MODEL mu_T(x) AND PROPENSITY MODEL e(x, T) IN A SINGLE NEYMAN-ORTHOGONAL SCORE psi = mu_pi(x)(x) + (1{T=pi(x)}/e(x,T))(Y - mu_T(x)), UNBIASED FOR V(pi) IF EITHER NUISANCE IS CORRECTLY SPECIFIED — the BIAS FACTORS AS THE PRODUCT (mu-error)(e-error). Combined with CROSS-FITTING (K-fold sample splitting), gives sqrt(n) asymptotically normal estimates of policy value from LOGGED PRODUCTION DATA — no rollout needed. This is what distinguishes DR from IPW (needs e correct AND high variance) and from outcome-only (needs mu correct AND no inference theory under flexible learners).", correct:true},
          {key:"c", text:"It is outcome regression."},
          {key:"d", text:"It is just IPW."},
        ]}
        trap={<>(a)(c)(d) miss either-correct.</>}
        lens={<>Two-nuisance orthogonal score; unbiased if either correct; cross-fitted for sqrt(n).</>}
        stretch={<>Why DR is the regulatory-grade tool over IPW or outcome-only?</>}
      />
    </VIS.Section>
